<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xenotactic v1.0.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; margin: 0; overflow: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        canvas { image-rendering: pixelated; background: #111; border-radius: 12px; cursor: crosshair; }
        .tower-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div id="root">
        <div id="loading-screen" style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #050505; color: white;">
            <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px; letter-spacing: 2px;">XENOTACTIC</div>
            <div id="status-text" style="font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 4px;">Loading Defense Systems...</div>
            <div id="error-log" style="margin-top: 20px; color: #ff4444; font-size: 10px; font-family: monospace; max-width: 80%; text-align: center;"></div>
        </div>
    </div>

    <!-- 라이브러리 로드 (가장 안정적인 방식) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        // 에러 캡처 시스템
        window.onerror = function(msg, url, line, col, error) {
            const log = document.getElementById('error-log');
            if (log) log.innerHTML = `ERROR: ${msg}<br>Line: ${line}`;
            return false;
        };

        const { useState, useEffect, useRef, useCallback } = React;

        // --- A* 알고리즘 ---
        function aStar(start, end, grid, w, h) {
            const open = [{x: start.x, y: start.y, g:0, f:0, p:null}];
            const closed = new Set();
            const isInside = (x, y) => x >= 0 && x < w && y >= 0 && y < h;
            while(open.length > 0) {
                open.sort((a,b) => a.f - b.f);
                const curr = open.shift();
                if(curr.x === end.x && curr.y === end.y) {
                    const path = []; let temp = curr;
                    while(temp.p) { path.push({x: temp.x, y: temp.y}); temp = temp.p; }
                    return path.reverse();
                }
                closed.add(`${curr.x},${curr.y}`);
                [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}].forEach(n => {
                    const nx = curr.x + n.x, ny = curr.y + n.y;
                    if(!isInside(nx, ny) || grid[ny][nx] || closed.has(`${nx},${ny}`)) return;
                    const g = curr.g + 1;
                    const h = Math.abs(nx - end.x) + Math.abs(ny - end.y);
                    const existing = open.find(o => o.x === nx && o.y === ny);
                    if(!existing) open.push({x:nx, y:ny, g, f:g+h, p:curr});
                    else if(g < existing.g) { existing.g = g; existing.f = g+h; existing.p = curr; }
                });
            }
            return null;
        }

        // --- 데이터 ---
        const MAPS = {
            CLASSIC: { id: 'CLASSIC', name: 'Classic 20x20', width: 20, height: 20, cellSize: 30, start: { x: 0, y: 9 }, end: { x: 19, y: 9 } },
            ELITE: { id: 'ELITE', name: 'Xenotactic 32x32', width: 32, height: 32, cellSize: 20, start: { x: 0, y: 15 }, end: { x: 31, y: 15 } }
        };

        const TOWER_DATA = {
            BASIC: { cost: 10, range: 3, damage: 10, fireRate: 1000, color: '#4ade80', label: 'Basic', icon: 'crosshair' },
            SNIPER: { cost: 25, range: 7, damage: 40, fireRate: 2500, color: '#60a5fa', label: 'Sniper', icon: 'target' },
            MACHINE: { cost: 20, range: 3.5, damage: 4, fireRate: 150, color: '#fbbf24', label: 'M-Gun', icon: 'layout-grid' },
            LASER: { cost: 60, range: 4, damage: 2, fireRate: 50, color: '#ef4444', label: 'Laser', icon: 'zap' },
            POISON: { cost: 35, range: 3, damage: 5, fireRate: 1200, color: '#a855f7', label: 'Poison', icon: 'skull' }
        };

        function App() {
            const [money, setMoney] = useState(100);
            const [lives, setLives] = useState(20);
            const [wave, setWave] = useState(0);
            const [towers, setTowers] = useState([]);
            const [enemies, setEnemies] = useState([]);
            const [selectedType, setSelectedType] = useState('BASIC');
            const [currentMap, setCurrentMap] = useState(MAPS.CLASSIC);
            const [grid, setGrid] = useState([]);
            const [path, setPath] = useState([]);
            const [isPaused, setIsPaused] = useState(true);

            const canvasRef = useRef(null);
            const lastTime = useRef(0);

            useEffect(() => {
                const newGrid = Array.from({ length: currentMap.height }, () => Array(currentMap.width).fill(false));
                setGrid(newGrid);
                setTowers([]);
                setEnemies([]);
                setPath(aStar(currentMap.start, currentMap.end, newGrid, currentMap.width, currentMap.height) || []);
                setMoney(100); setLives(20); setWave(0); setIsPaused(true);
            }, [currentMap]);

            const placeTower = (x, y) => {
                if(grid[y][x] || (x === currentMap.start.x && y === currentMap.start.y)) return;
                const cost = TOWER_DATA[selectedType].cost;
                if(money < cost) return;
                const newGrid = grid.map(r => [...r]); newGrid[y][x] = true;
                const newPath = aStar(currentMap.start, currentMap.end, newGrid, currentMap.width, currentMap.height);
                if(!newPath) return;
                setGrid(newGrid); setPath(newPath); setMoney(m => m - cost);
                setTowers(t => [...t, {x, y, type: selectedType, angle: 0, lastShot: 0}]);
            };

            const startWave = () => {
                setWave(w => w + 1); setIsPaused(false);
                for(let i=0; i<10; i++) {
                    setTimeout(() => {
                        setEnemies(prev => [...prev, {
                            id: Math.random(), x: currentMap.start.x, y: currentMap.start.y,
                            hp: 20 + wave*10, maxHp: 20 + wave*10, speed: 0.03, pathIdx: 0
                        }]);
                    }, i * 800);
                }
            };

            useEffect(() => {
                const loop = (t) => {
                    if(!isPaused) {
                        setEnemies(prev => prev.map(e => {
                            const target = path[e.pathIdx];
                            if(!target) return {...e, x: e.x + e.speed};
                            const dx = target.x - e.x, dy = target.y - e.y;
                            const dist = Math.sqrt(dx*dx + dy*dy);
                            if(dist < e.speed) return {...e, x: target.x, y: target.y, pathIdx: e.pathIdx + 1};
                            return {...e, x: e.x + (dx/dist)*e.speed, y: e.y + (dy/dist)*e.speed};
                        }).filter(e => {
                            if(e.x >= currentMap.width) { setLives(l => l - 1); return false; }
                            return e.hp > 0;
                        }));
                    }
                    
                    const ctx = canvasRef.current?.getContext('2d');
                    if(ctx) {
                        const cs = currentMap.cellSize;
                        ctx.clearRect(0,0,2000,2000);
                        // Grid
                        ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
                        for(let i=0; i<=currentMap.width; i++) { ctx.beginPath(); ctx.moveTo(i*cs, 0); ctx.lineTo(i*cs, currentMap.height*cs); ctx.stroke(); }
                        for(let i=0; i<=currentMap.height; i++) { ctx.beginPath(); ctx.moveTo(0, i*cs); ctx.lineTo(currentMap.width*cs, i*cs); ctx.stroke(); }
                        // Path
                        ctx.strokeStyle = 'rgba(0,255,0,0.1)'; ctx.lineWidth = 4; ctx.beginPath();
                        ctx.moveTo(currentMap.start.x*cs+cs/2, currentMap.start.y*cs+cs/2);
                        path.forEach(p => ctx.lineTo(p.x*cs+cs/2, p.y*cs+cs/2)); ctx.stroke();
                        // Towers
                        towers.forEach(tw => {
                            ctx.fillStyle = TOWER_DATA[tw.type].color;
                            ctx.fillRect(tw.x*cs+4, tw.y*cs+4, cs-8, cs-8);
                        });
                        // Enemies
                        enemies.forEach(e => {
                            ctx.fillStyle = '#ff4444'; ctx.beginPath(); ctx.arc((e.x+0.5)*cs, (e.y+0.5)*cs, cs/3, 0, Math.PI*2); ctx.fill();
                        });
                    }
                    requestAnimationFrame(loop);
                };
                const anim = requestAnimationFrame(loop);
                return () => cancelAnimationFrame(anim);
            }, [isPaused, enemies, towers, path, currentMap]);

            // 아이콘 렌더링 헬퍼
            useEffect(() => { lucide.createIcons(); }, [money, selectedType]);

            return React.createElement('div', { className: 'flex flex-col h-screen' },
                // Header
                React.createElement('header', { className: 'p-4 border-b border-white/10 flex justify-between items-center bg-black' },
                    React.createElement('div', { className: 'flex items-center gap-3' },
                        React.createElement('i', { 'data-lucide': 'shield', className: 'w-6 h-6 text-white' }),
                        React.createElement('h1', { className: 'font-bold italic' }, `XENOTACTIC v${APP_VERSION}`)
                    ),
                    React.createElement('div', { className: 'flex gap-6 font-mono text-sm' },
                        React.createElement('div', null, React.createElement('span', { className: 'text-white/40 mr-2' }, 'CREDITS'), React.createElement('span', { className: 'text-yellow-500' }, `$${money}`)),
                        React.createElement('div', null, React.createElement('span', { className: 'text-white/40 mr-2' }, 'LIVES'), React.createElement('span', { className: 'text-red-500' }, lives))
                    )
                ),
                // Main
                React.createElement('main', { className: 'flex-1 flex p-6 gap-8 overflow-hidden' },
                    React.createElement('div', { className: 'flex-1 flex flex-col items-center gap-6' },
                        React.createElement('canvas', {
                            ref: canvasRef,
                            width: currentMap.width * currentMap.cellSize,
                            height: currentMap.height * currentMap.cellSize,
                            onClick: (e) => {
                                const rect = canvasRef.current.getBoundingClientRect();
                                const x = Math.floor((e.clientX - rect.left) / currentMap.cellSize);
                                const y = Math.floor((e.clientY - rect.top) / currentMap.cellSize);
                                placeTower(x, y);
                            }
                        }),
                        // Bottom Bar
                        React.createElement('div', { className: 'w-full bg-white/5 border border-white/10 p-4 rounded-2xl flex items-center justify-between gap-4' },
                            React.createElement('div', { className: 'flex gap-2 overflow-x-auto scrollbar-hide' },
                                Object.entries(TOWER_DATA).map(([type, data]) => 
                                    React.createElement('button', {
                                        key: type,
                                        onClick: () => setSelectedType(type),
                                        className: `flex flex-col items-center p-2 rounded-xl border transition-all min-w-[70px] tower-card ${selectedType === type ? 'bg-white/20 border-white/40' : 'bg-white/5 border-white/5'}`
                                    },
                                        React.createElement('i', { 'data-lucide': data.icon, style: { color: data.color }, className: 'w-5 h-5 mb-1' }),
                                        React.createElement('span', { className: 'text-[9px] font-bold' }, data.label),
                                        React.createElement('span', { className: 'text-[9px] text-yellow-500' }, `$${data.cost}`)
                                    )
                                )
                            ),
                            React.createElement('button', {
                                onClick: startWave,
                                disabled: enemies.length > 0,
                                className: 'px-6 py-3 bg-green-500 text-black font-bold rounded-xl hover:bg-green-400 disabled:opacity-50 transition-all'
                            }, 'NEXT WAVE')
                        )
                    ),
                    // Sidebar
                    React.createElement('aside', { className: 'w-64 space-y-6' },
                        React.createElement('div', { className: 'bg-white/5 p-4 rounded-xl border border-white/10' },
                            React.createElement('h3', { className: 'text-[10px] text-white/40 mb-3 tracking-widest' }, 'SECTOR SELECTION'),
                            React.createElement('div', { className: 'grid gap-2' },
                                Object.values(MAPS).map(m => 
                                    React.createElement('button', {
                                        key: m.id,
                                        onClick: () => setCurrentMap(m),
                                        className: `p-3 rounded-lg border text-xs transition-all ${currentMap.id === m.id ? 'bg-white/10 border-white/30' : 'border-white/5 hover:border-white/20'}`
                                    }, m.name)
                                )
                            )
                        )
                    )
                )
            );
        }

        // 초기화 및 렌더링
        setTimeout(() => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(React.createElement(App));
            document.getElementById('loading-screen').style.display = 'none';
        }, 500);
    </script>
</body>
</html>
