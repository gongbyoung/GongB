<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xenotactic v1.0.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; margin: 0; overflow: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        canvas { image-rendering: pixelated; background: #111; border-radius: 12px; cursor: crosshair; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        .tower-card { transition: all 0.2s ease; }
        .tower-card:hover:not(:disabled) { transform: translateY(-4px); background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <div id="loading-overlay" style="position: fixed; inset: 0; background: #050505; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;">
        <div style="font-size: 24px; font-weight: 900; letter-spacing: 4px; color: #fff; margin-bottom: 10px; font-style: italic;">XENOTACTIC</div>
        <div style="font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 3px;">Loading Combat Systems...</div>
    </div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script>
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // --- 아이콘 데이터 (SVG) ---
        const ICONS = {
            Shield: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
            Zap: '<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>',
            Target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
            Crosshair: '<circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/>',
            Skull: '<path d="M9 10L9.01 10"/><path d="M15 10L15.01 10"/><path d="M12 2a8 8 0 0 0-8 8v2a2 2 0 0 0 2 2 1 1 0 0 1 1 1v1a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-1a1 1 0 0 1 1-1 2 2 0 0 0 2-2v-2a8 8 0 0 0-8-8z"/><path d="M10 18l4 0"/>',
            Play: '<polygon points="5 3 19 12 5 21 5 3"/>',
            Pause: '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>',
            Info: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>',
            X: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
            History: '<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>'
        };

        const Icon = ({ name, color = "currentColor", size = 20, className = "" }) => {
            return React.createElement('svg', {
                width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: color,
                strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round", className,
                dangerouslySetInnerHTML: { __html: ICONS[name] || '' }
            });
        };

        // --- A* Pathfinding ---
        function aStar(start, end, grid, w, h) {
            const open = [{x: start.x, y: start.y, g:0, f:0, p:null}];
            const closed = new Set();
            while(open.length > 0) {
                open.sort((a,b) => a.f - b.f);
                const curr = open.shift();
                if(curr.x === end.x && curr.y === end.y) {
                    const path = []; let t = curr;
                    while(t.p) { path.push({x: t.x, y: t.y}); t = t.p; }
                    return path.reverse();
                }
                closed.add(`${curr.x},${curr.y}`);
                [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}].forEach(n => {
                    const nx = curr.x + n.x, ny = curr.y + n.y;
                    if(nx<0||nx>=w||ny<0||ny>=h||grid[ny][nx]||closed.has(`${nx},${ny}`)) return;
                    const g = curr.g + 1, hVal = Math.abs(nx-end.x)+Math.abs(ny-end.y);
                    const exist = open.find(o => o.x === nx && o.y === ny);
                    if(!exist) open.push({x:nx, y:ny, g, f:g+hVal, p:curr});
                    else if(g < exist.g) { exist.g = g; exist.f = g+hVal; exist.p = curr; }
                });
            }
            return null;
        }

        // --- Constants ---
        const MAPS = {
            CLASSIC: { id: 'CLASSIC', name: 'Classic 20x20', width: 20, height: 20, cellSize: 30, start: { x: 0, y: 9 }, end: { x: 19, y: 9 } },
            ELITE: { id: 'ELITE', name: 'Elite 32x32', width: 32, height: 32, cellSize: 20, start: { x: 0, y: 15 }, end: { x: 31, y: 15 } }
        };

        const TOWER_DATA = {
            BASIC: { cost: 10, range: 3, damage: 10, fireRate: 1000, color: '#4ade80', label: 'Basic', icon: 'Crosshair' },
            SNIPER: { cost: 25, range: 7, damage: 40, fireRate: 2500, color: '#60a5fa', label: 'Sniper', icon: 'Target' },
            MACHINE: { cost: 20, range: 3.5, damage: 4, fireRate: 150, color: '#fbbf24', label: 'M-Gun', icon: 'Zap' },
            LASER: { cost: 60, range: 4, damage: 2, fireRate: 50, color: '#ef4444', label: 'Laser', icon: 'Target' },
            POISON: { cost: 35, range: 3, damage: 5, fireRate: 1200, color: '#a855f7', label: 'Poison', icon: 'Skull' }
        };

        function App() {
            const [money, setMoney] = useState(100);
            const [lives, setLives] = useState(20);
            const [wave, setWave] = useState(0);
            const [towers, setTowers] = useState([]);
            const [enemies, setEnemies] = useState([]);
            const [projectiles, setProjectiles] = useState([]);
            const [selectedType, setSelectedType] = useState('BASIC');
            const [selectedIdx, setSelectedIdx] = useState(null);
            const [currentMap, setCurrentMap] = useState(MAPS.CLASSIC);
            const [grid, setGrid] = useState(() => Array.from({ length: 20 }, () => Array(20).fill(false)));
            const [path, setPath] = useState([]);
            const [isPaused, setIsPaused] = useState(true);
            const [saveSlots, setSaveSlots] = useState([
                { id: 1, date: localStorage.getItem('save_1_date') },
                { id: 2, date: localStorage.getItem('save_2_date') },
                { id: 3, date: localStorage.getItem('save_3_date') }
            ]);

            const canvasRef = useRef(null);
            const requestRef = useRef();

            // 초기화
            useEffect(() => {
                const g = Array.from({ length: currentMap.height }, () => Array(currentMap.width).fill(false));
                setGrid(g); setTowers([]); setEnemies([]); setProjectiles([]);
                setPath(aStar(currentMap.start, currentMap.end, g, currentMap.width, currentMap.height) || []);
                setMoney(100); setLives(20); setWave(0); setIsPaused(true);
                document.getElementById('loading-overlay').style.display = 'none';
            }, [currentMap]);

            const placeTower = (x, y) => {
                if(x<0 || x>=currentMap.width || y<0 || y>=currentMap.height) return;
                const existing = towers.findIndex(t => t.x === x && t.y === y);
                if(existing !== -1) { setSelectedIdx(existing); return; }
                
                if(grid[y][x] || (x === currentMap.start.x && y === currentMap.start.y)) return;
                const cost = TOWER_DATA[selectedType].cost;
                if(money < cost) return;
                
                const newGrid = grid.map(r => [...r]); newGrid[y][x] = true;
                const newPath = aStar(currentMap.start, currentMap.end, newGrid, currentMap.width, currentMap.height);
                if(!newPath) return;
                
                setGrid(newGrid); setPath(newPath); setMoney(m => m - cost);
                setTowers(t => [...t, {x, y, type: selectedType, level: 1, lastShot: 0}]);
                setSelectedIdx(towers.length);
            };

            const sellTower = (idx) => {
                const t = towers[idx];
                const refund = Math.floor(TOWER_DATA[t.type].cost * 0.7);
                setMoney(m => m + refund);
                setTowers(prev => prev.filter((_, i) => i !== idx));
                const newGrid = grid.map(r => [...r]); newGrid[t.y][t.x] = false;
                setGrid(newGrid);
                setPath(aStar(currentMap.start, currentMap.end, newGrid, currentMap.width, currentMap.height));
                setSelectedIdx(null);
            };

            const startWave = () => {
                setWave(w => w + 1); setIsPaused(false);
                for(let i=0; i<10; i++) {
                    setTimeout(() => {
                        setEnemies(prev => [...prev, {
                            id: Math.random(), x: currentMap.start.x, y: currentMap.start.y,
                            hp: 20 + wave*15, maxHp: 20 + wave*15, speed: 0.03, pathIdx: 0
                        }]);
                    }, i * 800);
                }
            };

            const saveGame = (id) => {
                const date = new Date().toLocaleString();
                localStorage.setItem(`save_${id}`, JSON.stringify({ money, lives, wave, towers, grid, currentMapId: currentMap.id }));
                localStorage.setItem(`save_${id}_date`, date);
                setSaveSlots(prev => prev.map(s => s.id === id ? { ...s, date } : s));
            };

            const loadGame = (id) => {
                const data = JSON.parse(localStorage.getItem(`save_${id}`));
                if(!data) return;
                setMoney(data.money); setLives(data.lives); setWave(data.wave); setTowers(data.towers); setGrid(data.grid);
                setCurrentMap(MAPS[data.currentMapId] || MAPS.CLASSIC);
                setIsPaused(true); setEnemies([]); setProjectiles([]);
            };

            // 게임 루프 (공격 로직 포함)
            useEffect(() => {
                const loop = (time) => {
                    if(!isPaused) {
                        // 적 이동
                        setEnemies(prev => prev.map(e => {
                            const target = path[e.pathIdx];
                            if(!target) return {...e, x: e.x + e.speed};
                            const dx = target.x - e.x, dy = target.y - e.y;
                            const dist = Math.sqrt(dx*dx + dy*dy);
                            if(dist < e.speed) return {...e, x: target.x, y: target.y, pathIdx: e.pathIdx + 1};
                            return {...e, x: e.x + (dx/dist)*e.speed, y: e.y + (dy/dist)*e.speed};
                        }).filter(e => {
                            if(e.x >= currentMap.width) { setLives(l => Math.max(0, l - 1)); return false; }
                            return e.hp > 0;
                        }));

                        // 타워 공격
                        towers.forEach((tw, idx) => {
                            const data = TOWER_DATA[tw.type];
                            if(time - tw.lastShot > data.fireRate) {
                                const target = enemies.find(e => Math.sqrt(Math.pow(e.x - tw.x, 2) + Math.pow(e.y - tw.y, 2)) <= data.range);
                                if(target) {
                                    tw.lastShot = time;
                                    setProjectiles(p => [...p, { x: tw.x+0.5, y: tw.y+0.5, targetId: target.id, damage: data.damage, speed: 0.2, color: data.color }]);
                                }
                            }
                        });

                        // 투사체 이동 및 충돌
                        setProjectiles(prev => prev.map(p => {
                            const target = enemies.find(e => e.id === p.targetId);
                            if(!target) return null;
                            const dx = target.x+0.5 - p.x, dy = target.y+0.5 - p.y;
                            const dist = Math.sqrt(dx*dx + dy*dy);
                            if(dist < p.speed) {
                                target.hp -= p.damage;
                                if(target.hp <= 0) setMoney(m => m + 5);
                                return null;
                            }
                            return { ...p, x: p.x + (dx/dist)*p.speed, y: p.y + (dy/dist)*p.speed };
                        }).filter(Boolean));
                    }
                    
                    // 그리기
                    const ctx = canvasRef.current?.getContext('2d');
                    if(ctx) {
                        const cs = currentMap.cellSize;
                        ctx.clearRect(0,0,2000,2000);
                        // Grid
                        ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
                        for(let i=0; i<=currentMap.width; i++) { ctx.beginPath(); ctx.moveTo(i*cs, 0); ctx.lineTo(i*cs, currentMap.height*cs); ctx.stroke(); }
                        for(let i=0; i<=currentMap.height; i++) { ctx.beginPath(); ctx.moveTo(0, i*cs); ctx.lineTo(currentMap.width*cs, i*cs); ctx.stroke(); }
                        // Path
                        ctx.strokeStyle = 'rgba(74, 222, 128, 0.1)'; ctx.lineWidth = 4; ctx.beginPath();
                        ctx.moveTo(currentMap.start.x*cs+cs/2, currentMap.start.y*cs+cs/2);
                        path.forEach(p => ctx.lineTo(p.x*cs+cs/2, p.y*cs+cs/2)); ctx.stroke();
                        // Towers
                        towers.forEach((tw, i) => {
                            ctx.fillStyle = TOWER_DATA[tw.type].color;
                            ctx.beginPath(); ctx.roundRect(tw.x*cs+4, tw.y*cs+4, cs-8, cs-8, 6); ctx.fill();
                            if(selectedIdx === i) {
                                ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();
                                ctx.beginPath(); ctx.arc(tw.x*cs+cs/2, tw.y*cs+cs/2, TOWER_DATA[tw.type].range*cs, 0, Math.PI*2);
                                ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fill(); ctx.stroke();
                            }
                        });
                        // Enemies
                        enemies.forEach(e => {
                            ctx.fillStyle = '#ff4444'; ctx.beginPath(); ctx.arc((e.x+0.5)*cs, (e.y+0.5)*cs, cs/3, 0, Math.PI*2); ctx.fill();
                            ctx.fillStyle = '#000'; ctx.fillRect(e.x*cs+4, e.y*cs-6, cs-8, 3);
                            ctx.fillStyle = '#4ade80'; ctx.fillRect(e.x*cs+4, e.y*cs-6, (cs-8)*(e.hp/e.maxHp), 3);
                        });
                        // Projectiles
                        projectiles.forEach(p => {
                            ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x*cs, p.y*cs, 3, 0, Math.PI*2); ctx.fill();
                        });
                    }
                    requestRef.current = requestAnimationFrame(loop);
                };
                requestRef.current = requestAnimationFrame(loop);
                return () => cancelAnimationFrame(requestRef.current);
            }, [isPaused, enemies, towers, path, currentMap, selectedIdx, projectiles]);

            return React.createElement('div', { className: 'flex flex-col h-screen bg-[#050505]' },
                // Header
                React.createElement('header', { className: 'p-4 border-b border-white/5 bg-black/50 backdrop-blur-xl flex justify-between items-center' },
                    React.createElement('div', { className: 'flex items-center gap-3' },
                        React.createElement(Icon, { name: 'Shield', className: 'text-white' }),
                        React.createElement('h1', { className: 'font-black italic tracking-tighter text-lg' }, `XENOTACTIC v1.0.2`)
                    ),
                    React.createElement('div', { className: 'flex gap-8 font-mono' },
                        React.createElement('div', { className: 'text-right' }, 
                            React.createElement('p', { className: 'text-[9px] text-white/30 tracking-widest' }, 'CREDITS'),
                            React.createElement('p', { className: 'text-yellow-500 font-bold' }, `$${money}`)
                        ),
                        React.createElement('div', { className: 'text-right' }, 
                            React.createElement('p', { className: 'text-[9px] text-white/30 tracking-widest' }, 'LIVES'),
                            React.createElement('p', { className: 'text-red-500 font-bold' }, lives)
                        ),
                        React.createElement('button', { 
                            onClick: () => setIsPaused(!isPaused),
                            className: 'p-2 bg-white/5 rounded-lg border border-white/10 hover:bg-white/10'
                        }, React.createElement(Icon, { name: isPaused ? 'Play' : 'Pause' }))
                    )
                ),
                // Main
                React.createElement('main', { className: 'flex-1 flex p-6 gap-8 overflow-hidden justify-center' },
                    React.createElement('div', { className: 'flex flex-col items-center gap-6' },
                        React.createElement('div', { className: 'relative' },
                            React.createElement('canvas', {
                                ref: canvasRef,
                                width: currentMap.width * currentMap.cellSize,
                                height: currentMap.height * currentMap.cellSize,
                                onClick: (e) => {
                                    const rect = canvasRef.current.getBoundingClientRect();
                                    placeTower(Math.floor((e.clientX - rect.left) / currentMap.cellSize), Math.floor((e.clientY - rect.top) / currentMap.cellSize));
                                }
                            }),
                            // Upgrade Panel
                            selectedIdx !== null && React.createElement('div', { className: 'absolute bottom-4 left-4 right-4 bg-black/90 border border-white/20 p-4 rounded-xl flex items-center justify-between backdrop-blur-md' },
                                React.createElement('div', { className: 'flex items-center gap-4' },
                                    React.createElement('div', { className: 'w-10 h-10 rounded-lg flex items-center justify-center', style: { background: TOWER_DATA[towers[selectedIdx].type].color + '22' } },
                                        React.createElement(Icon, { name: TOWER_DATA[towers[selectedIdx].type].icon, color: TOWER_DATA[towers[selectedIdx].type].color })
                                    ),
                                    React.createElement('div', null,
                                        React.createElement('p', { className: 'font-bold text-sm' }, TOWER_DATA[towers[selectedIdx].type].label),
                                        React.createElement('p', { className: 'text-[10px] text-white/40' }, `LVL ${towers[selectedIdx].level}`)
                                    )
                                ),
                                React.createElement('div', { className: 'flex gap-2' },
                                    React.createElement('button', { onClick: () => sellTower(selectedIdx), className: 'px-4 py-2 bg-red-500/20 text-red-500 border border-red-500/30 rounded-lg text-xs font-bold' }, 'SELL'),
                                    React.createElement('button', { onClick: () => setSelectedIdx(null), className: 'p-2 hover:bg-white/10 rounded-lg' }, React.createElement(Icon, { name: 'X', size: 16 }))
                                )
                            )
                        ),
                        // Bottom Bar
                        React.createElement('div', { className: 'w-full max-w-4xl bg-white/5 border border-white/10 p-4 rounded-2xl flex items-center justify-between gap-6' },
                            React.createElement('div', { className: 'flex items-center gap-3 min-w-[140px]' },
                                React.createElement('div', { className: 'p-2 bg-white/10 rounded-lg' }, React.createElement(Icon, { name: 'Info', size: 16, color: '#60a5fa' })),
                                React.createElement('div', null, React.createElement('p', { className: 'text-[10px] font-bold uppercase' }, 'Mazing Strategy'), React.createElement('p', { className: 'text-[9px] text-white/40' }, 'Block the path.'))
                            ),
                            React.createElement('div', { className: 'flex-1 flex gap-2 overflow-x-auto scrollbar-hide px-4 border-x border-white/5' },
                                Object.entries(TOWER_DATA).map(([type, data]) => 
                                    React.createElement('button', {
                                        key: type,
                                        onClick: () => setSelectedType(type),
                                        disabled: money < data.cost,
                                        className: `flex flex-col items-center p-2 rounded-xl border transition-all min-w-[75px] tower-card ${selectedType === type ? 'bg-white/20 border-white/40 shadow-lg' : 'bg-white/5 border-white/5'} ${money < data.cost ? 'opacity-30' : ''}`
                                    },
                                        React.createElement(Icon, { name: data.icon, color: data.color, size: 18, className: 'mb-1' }),
                                        React.createElement('span', { className: 'text-[9px] font-bold' }, data.label),
                                        React.createElement('span', { className: 'text-[9px] text-yellow-500 font-mono' }, `$${data.cost}`)
                                    )
                                )
                            ),
                            React.createElement('button', {
                                onClick: startWave,
                                disabled: enemies.length > 0,
                                className: 'px-6 py-3 bg-green-500 text-black font-bold rounded-xl hover:bg-green-400 disabled:opacity-30 transition-all text-sm shadow-[0_0_20px_rgba(34,197,94,0.2)]'
                            }, 'NEXT WAVE')
                        )
                    ),
                    // Sidebar
                    React.createElement('aside', { className: 'w-64 space-y-6' },
                        // Save/Load Section
                        React.createElement('div', { className: 'bg-white/5 p-5 rounded-2xl border border-yellow-500/20 shadow-[0_0_20px_rgba(234,179,8,0.05)]' },
                            React.createElement('h3', { className: 'text-[10px] font-bold text-yellow-500 mb-4 tracking-[0.2em] flex items-center gap-2' }, 
                                React.createElement(Icon, { name: 'Shield', size: 12 }), 'DATA ARCHIVE'
                            ),
                            React.createElement('div', { className: 'space-y-3' },
                                saveSlots.map(s => React.createElement('div', { key: s.id, className: 'p-3 rounded-xl bg-black/40 border border-white/5 flex flex-col gap-2' },
                                    React.createElement('div', null, 
                                        React.createElement('p', { className: 'text-[9px] text-white/40' }, `SLOT ${s.id}`),
                                        React.createElement('p', { className: 'text-[10px] truncate' }, s.date || 'Empty Slot')
                                    ),
                                    React.createElement('div', { className: 'flex gap-1' },
                                        React.createElement('button', { onClick: () => saveGame(s.id), className: 'flex-1 py-1 bg-yellow-500/10 text-yellow-500 text-[9px] font-bold rounded border border-yellow-500/20 hover:bg-yellow-500/20' }, 'SAVE'),
                                        React.createElement('button', { onClick: () => loadGame(s.id), disabled: !s.date, className: 'flex-1 py-1 bg-white/5 text-white/60 text-[9px] font-bold rounded border border-white/5 disabled:opacity-20' }, 'LOAD')
                                    )
                                ))
                            )
                        ),
                        // Sector Selection
                        React.createElement('div', { className: 'bg-white/5 p-5 rounded-2xl border border-white/10' },
                            React.createElement('h3', { className: 'text-[10px] font-bold text-white/30 mb-4 tracking-[0.2em]' }, 'SECTOR SELECTION'),
                            React.createElement('div', { className: 'grid gap-2' },
                                Object.values(MAPS).map(m => 
                                    React.createElement('button', {
                                        key: m.id,
                                        onClick: () => setCurrentMap(m),
                                        className: `p-3 rounded-xl border text-xs font-bold transition-all ${currentMap.id === m.id ? 'bg-white/10 border-white/40 text-white' : 'border-white/5 text-white/40 hover:border-white/20'}`
                                    }, m.name)
                                )
                            )
                        )
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
