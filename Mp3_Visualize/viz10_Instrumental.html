<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM ORCHESTRA v16.0.005 — Final Integrated</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#010103; --panel:#0a0a12; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; --muted:#44445a; }
body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

.topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;}

.main{ display:grid; grid-template-columns:380px 1fr; flex:1; min-height:0; }
.left-panel{ background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:15px; overflow-y:auto; }

.ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
.label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}

.control-group { margin-bottom:8px; }
.control-group label { display:block; font-size:8px; color:#888; margin-bottom:2px; }
.val-label { float:right; color:var(--accent); font-weight:bold; font-size:9px; }
input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; }
select { width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:8px; border-radius:4px; font-size:11px; outline:none; margin-bottom:5px; }

.btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:6px; cursor:pointer; font-size:9px; width:100%; transition:0.2s; margin-bottom:5px;}
.btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.btn.primary { background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:bold; font-size:11px; padding:15px; margin-top:10px; }

.viz-area { position:relative; display:flex; justify-content:center; align-items:center; flex:1; background:#000; overflow:hidden; }
#p5-container canvas { max-width: 100% !important; max-height: 100% !important; object-fit: contain; }

.playbar { height:2px; background:#111; position:relative; }
#progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }
.rgb-label-group { display: flex; justify-content: space-between; font-size: 8px; color: var(--muted); }
.inst-slot { display: grid; grid-template-columns: 1fr 2fr; gap: 5px; align-items: center; margin-bottom: 4px; }
.inst-slot span { font-size: 9px; color: var(--accent2); font-weight: bold; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM ORCHESTRA v16.0.005</div>
  <div id="timeCode" style="font-family:monospace; font-size:12px;">00:00 / 00:00</div>
</div>

<div class="main">
  <div class="left-panel">
    <div class="ctrl-box">
      <span class="label-small">1. Audio Analysis</span>
      <button class="btn" onclick="document.getElementById('mIn').click()">SELECT MP3</button>
      <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
      <button class="btn" id="analyzeBtn" onclick="runAnalysis()" disabled style="border-color:#ffcc00; color:#ffcc00;">PRE-ANALYZE & START</button>
      <div id="statusLog" style="font-size:9px; text-align:center; color:#ffcc00; margin-top:4px;">No music loaded</div>
    </div>

    <div class="ctrl-box">
      <span class="label-small">2. Instrument PNG Slots</span>
      <div class="inst-slot"><span>KICK</span><button class="btn" onclick="document.getElementById('i0').click()">LOAD PNG</button></div>
      <div class="inst-slot"><span>SNARE</span><button class="btn" onclick="document.getElementById('i1').click()">LOAD PNG</button></div>
      <div class="inst-slot"><span>HIHAT</span><button class="btn" onclick="document.getElementById('i2').click()">LOAD PNG</button></div>
      <div class="inst-slot"><span>MELODY</span><button class="btn" onclick="document.getElementById('i3').click()">LOAD PNG</button></div>
      <div class="inst-slot"><span>PERC</span><button class="btn" onclick="document.getElementById('i4').click()">LOAD PNG</button></div>
      
      <input type="file" id="i0" style="display:none" onchange="loadInst(0, this.files)">
      <input type="file" id="i1" style="display:none" onchange="loadInst(1, this.files)">
      <input type="file" id="i2" style="display:none" onchange="loadInst(2, this.files)">
      <input type="file" id="i3" style="display:none" onchange="loadInst(3, this.files)">
      <input type="file" id="i4" style="display:none" onchange="loadInst(4, this.files)">

      <button class="btn" style="border-color:#00ffcc; color:#00ffcc; margin-top:8px;" onclick="document.getElementById('bgIn').click()">LOAD BACKGROUND PNG</button>
      <input type="file" id="bgIn" accept="image/*" style="display:none" onchange="handleBG(this.files)">
    </div>

    <div class="ctrl-box">
      <span class="label-small">3. Procedural Motion</span>
      <div class="control-group">
        <label>PLACEMENT (배치)</label>
        <select id="placeMode" onchange="initParticles()">
            <option value="balanced">Balanced (균형)</option>
            <option value="floor">Floor (바닥)</option>
            <option value="center">Center (중앙)</option>
        </select>
      </div>
      <div class="control-group">
        <label>MOTION STYLE (움직임)</label>
        <select id="moveMode">
            <option value="relUp">Relative Up (이미지 위로)</option>
            <option value="relSide">Relative Side (이미지 옆으로)</option>
            <option value="upDown">Global Up & Down</option>
            <option value="circular">Circular Orbit</option>
            <option value="perlin">Perlin Noise</option>
        </select>
      </div>
      <div class="control-group">
        <label>REACTION FORCE <span class="val-label" id="vReactF">2.5</span></label>
        <input type="range" id="reactF" min="0.1" max="10.0" step="0.1" value="2.5">
      </div>
    </div>

    <div class="ctrl-box">
      <span class="label-small">4. Visual Tint & Scale</span>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
          <div class="control-group">
            <div class="rgb-label-group"><label>R Min</label><span class="val-label" id="vRMin">150</span></div>
            <input type="range" id="rMin" min="0" max="255" value="150">
            <div class="rgb-label-group"><label>R Max</label><span class="val-label" id="vRMax">255</span></div>
            <input type="range" id="rMax" min="0" max="255" value="255">
          </div>
          <div class="control-group">
            <div class="rgb-label-group"><label>B Min</label><span class="val-label" id="vBMin">180</span></div>
            <input type="range" id="bMin" min="0" max="255" value="180">
            <div class="rgb-label-group"><label>B Max</label><span class="val-label" id="vBMax">255</span></div>
            <input type="range" id="bMax" min="0" max="255" value="255">
          </div>
      </div>
      <div class="control-group" style="margin-top:10px;">
        <label>PARTICLE SCALE <span class="val-label" id="vPScale">1.0</span></label>
        <input type="range" id="pScale" min="0.1" max="4.0" step="0.1" value="1.0">
        <label style="margin-top:5px;">TRAIL (잔상) <span class="val-label" id="vTrail">40</span></label>
        <input type="range" id="trail" min="0" max="255" value="40">
      </div>
    </div>

    <div class="ctrl-box">
      <span class="label-small">5. High-Res Export</span>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-bottom:5px;">
          <button class="btn active" id="resFHD" onclick="setRes('FHD')">FHD</button>
          <button class="btn" id="resUHD" onclick="setRes('UHD')">UHD</button>
      </div>
      <button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START RECORD (24fps)</button>
    </div>
  </div>

  <div class="viz-area" id="p5-container"></div>
</div>

<div class="playbar"><div id="progFill"></div></div>

<script>
let exportRes = 'FHD', isRecording = false, isPlaying = false;
let audio, fft, ampObj;
let particles = [];
let mediaRecorder, recordedChunks = [];
let canvasRef, bgImg = null;
let instAssets = new Array(5).fill(null); // 5개 악기 이미지 저장
let isAnalyzed = false;

function setup() {
    let container = document.getElementById('p5-container');
    let w = (exportRes === 'FHD') ? 1920 : 3840;
    let h = (exportRes === 'FHD') ? 1080 : 2160;
    let cnv = createCanvas(w, h);
    cnv.parent(container);
    canvasRef = cnv.elt;
    colorMode(RGB, 255, 255, 255, 255);
    fft = new p5.FFT(0.8, 256);
    ampObj = new p5.Amplitude();
    imageMode(CENTER);
    initParticles();
}

function initParticles() {
    particles = [];
    let pMode = document.getElementById('placeMode').value;
    for(let i=0; i<24; i++) {
        // 각 입자별로 악기 그룹(0~4) 배정
        let group = 0;
        if(i < 4) group = 0; // KICK
        else if(i < 8) group = 1; // SNARE
        else if(i < 13) group = 2; // HIHAT
        else if(i < 19) group = 3; // MELODY
        else group = 4; // PERC
        particles.push(new OrchestraParticle(i, pMode, group));
    }
}

async function runAnalysis() {
    if (!audio) return;
    isAnalyzed = true;
    document.getElementById('recBtn').disabled = false;
    document.getElementById('statusLog').innerText = "ANALYSIS COMPLETE (v16.0.005)";
}

function draw() {
    let trVal = parseInt(document.getElementById('trail').value);
    background(2, 2, 8, trVal);

    let bands = new Array(24).fill(0);
    if (audio && audio.isPlaying()) {
        fft.analyze();
        for(let i=0; i<24; i++) {
            bands[i] = fft.getEnergy(pow(2, i/2)*20, pow(2, (i+1)/2)*20) / 255;
        }
    } else {
        push(); fill(255, 120); textAlign(CENTER); textSize(width*0.012);
        text("SPECTRUM ORCHESTRA v16.0.005 - READY", width/2, height/2 + 250);
        pop();
    }

    if (bgImg) drawBG(bands[2] || 0);

    let mMode = document.getElementById('moveMode').value;
    let force = parseFloat(document.getElementById('reactF').value);
    let scale = parseFloat(document.getElementById('pScale').value);

    for (let p of particles) {
        let bVal = bands[p.id] || 0;
        p.update(bVal, mMode, force);
        p.display(bVal, scale);
    }
    updateUI();
}

function drawBG(bass) {
    push();
    translate(width/2, height/2);
    let finalScale = max(width/bgImg.width, height/bgImg.height) * (1.0 + bass*0.03);
    image(bgImg, 0, 0, bgImg.width * finalScale, bgImg.height * finalScale);
    pop();
}

class OrchestraParticle {
    constructor(id, placeMode, group) {
        this.id = id;
        this.group = group;
        this.resetPosition(placeMode);
        this.angle = random(TWO_PI);
        this.size = random(180, 400);
        this.updateColors();
    }

    updateColors() {
        this.r = random(parseInt(rMin.value), parseInt(rMax.value));
        this.g = random(100, 200); // G는 적절히 고정/랜덤
        this.b = random(parseInt(bMin.value), parseInt(bMax.value));
    }

    resetPosition(mode) {
        if(mode === 'center') this.origin = createVector(width/2, height/2);
        else if(mode === 'floor') this.origin = createVector(random(width), height * 0.9);
        else this.origin = createVector(random(width), random(height));
        this.pos = this.origin.copy();
    }

    update(amp, moveMode, force) {
        let shift = amp * 280 * force;
        if (moveMode === 'relUp') {
            this.pos.x = this.origin.x + cos(this.angle - HALF_PI) * shift;
            this.pos.y = this.origin.y + sin(this.angle - HALF_PI) * shift;
        } else if (moveMode === 'relSide') {
            this.pos.x = this.origin.x + cos(this.angle) * shift;
            this.pos.y = this.origin.y + sin(this.angle) * shift;
        } else if (moveMode === 'upDown') {
            this.pos.y = this.origin.y - shift;
        } else if (moveMode === 'circular') {
            this.pos.x = this.origin.x + cos(frameCount * 0.05 + this.id) * shift;
            this.pos.y = this.origin.y + sin(frameCount * 0.05 + this.id) * shift;
        } else {
            this.pos.x = this.origin.x + (noise(this.id, frameCount*0.01)-0.5) * shift * 2;
            this.pos.y = this.origin.y + (noise(this.id+50, frameCount*0.01)-0.5) * shift * 2;
        }
        this.angle += 0.015 + amp * 0.12;
    }

    display(amp, scale) {
        push();
        translate(this.pos.x, this.pos.y);
        rotate(this.angle);
        tint(this.r, this.g, this.b, 200);
        let finalSz = this.size * scale * (0.8 + amp * 2.2);
        let img = instAssets[this.group];
        if (img) {
            image(img, 0, 0, img.width * (finalSz/800), img.height * (finalSz/800));
        } else {
            noStroke(); fill(this.r, this.g, this.b, 150);
            ellipse(0, 0, finalSz * 0.6, finalSz);
        }
        pop();
    }
}

// Handlers
function handleFile(files) {
    audio = loadSound(URL.createObjectURL(files[0]), () => {
        document.getElementById('analyzeBtn').disabled = false;
        document.getElementById('statusLog').innerText = "MP3 LOADED";
    });
}
function handleBG(files) { loadImage(URL.createObjectURL(files[0]), (img) => { bgImg = img; }); }
function loadInst(id, files) {
    loadImage(URL.createObjectURL(files[0]), (img) => {
        instAssets[id] = img;
        particles.forEach(p => p.updateColors());
    });
}
function setRes(res) { exportRes = res; setup(); }

async function toggleSync() {
    if (!audio || !isAnalyzed) return;
    if (isPlaying) {
        audio.stop(); if (mediaRecorder) mediaRecorder.stop();
        isPlaying = false;
        document.getElementById('recBtn').innerText = "▶ START RECORD";
    } else {
        if (getAudioContext().state === 'suspended') await userStartAudio();
        recordedChunks = [];
        const stream = canvasRef.captureStream(24);
        const dest = getAudioContext().createMediaStreamDestination();
        p5.soundOut.output.connect(dest);
        const combined = new MediaStream([...stream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
        mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/webm; codecs=vp9,opus', videoBitsPerSecond: 60000000 });
        mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
        mediaRecorder.onstop = saveVideo;
        audio.play(); mediaRecorder.start(); isPlaying = true;
        document.getElementById('recBtn').innerText = "■ STOP & SAVE";
    }
}
function saveVideo() {
    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `GrandOrchestra_${new Date().getTime()}.mp4`; a.click();
}
function updateUI() {
    if (audio && audio.isPlaying()) {
        let curr = audio.currentTime(), dur = audio.duration();
        document.getElementById('timeCode').innerText = `${nf(floor(curr/60),2)}:${nf(floor(curr%60),2)} / ${nf(floor(dur/60),2)}:${nf(floor(dur%60),2)}`;
        document.getElementById('progFill').style.width = (curr/dur * 100) + '%';
    }
}

// Label Update Fix
const list = ['pScale','reactF','trail','rMin','rMax','bMin','bMax'];
list.forEach(id => {
    let el = document.getElementById(id);
    if(el) {
        el.oninput = function() { 
            let labelId = 'v' + id.charAt(0).toUpperCase() + id.slice(1);
            let label = document.getElementById(labelId);
            if(label) label.innerText = this.value;
            if(id.includes('Min') || id.includes('Max')) particles.forEach(p => p.updateColors());
        }
    }
});
</script>
</body>
</html>
