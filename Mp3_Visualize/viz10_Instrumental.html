<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM DRUM v16.0.002 — Top-Down POV</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#020204; --panel:#0d0d15; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; }
body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

.topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;}

.main{ display:grid; grid-template-columns:380px 1fr; flex:1; min-height:0; }
.left-panel{ background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:15px; overflow-y:auto; }

.ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
.label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}

.drum-slot { display:grid; grid-template-columns:1fr 2fr; gap:5px; margin-bottom:8px; align-items:center;}
.drum-slot span { font-size:10px; color:var(--accent2); font-weight:bold;}

.btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:8px; cursor:pointer; font-size:9px; width:100%; transition:0.2s; }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:bold; font-size:11px; padding:15px; margin-top:10px; }

.viz-area { position:relative; display:flex; justify-content:center; align-items:center; flex:1; background:#000; overflow:hidden; }
#p5-container canvas { max-width: 100% !important; max-height: 100% !important; object-fit: contain; }

.playbar { height:2px; background:#111; position:relative; }
#progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM DRUM v16.0.002</div>
  <div id="timeCode" style="font-family:monospace; font-size:12px;">00:00 / 00:00</div>
</div>

<div class="main">
  <div class="left-panel">
    <div class="ctrl-box">
      <span class="label-small">1. Audio Source</span>
      <button class="btn" onclick="document.getElementById('mIn').click()">SELECT MP3 FILE</button>
      <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
    </div>

    <div class="ctrl-box">
      <span class="label-small">2. Drum Mapping (PNGs)</span>
      <div class="drum-slot"><span>KICK</span><button class="btn" onclick="document.getElementById('f0').click()">LOAD PNG</button></div>
      <div class="drum-slot"><span>SNARE</span><button class="btn" onclick="document.getElementById('f1').click()">LOAD PNG</button></div>
      <div class="drum-slot"><span>HI-HAT</span><button class="btn" onclick="document.getElementById('f2').click()">LOAD PNG</button></div>
      <div class="drum-slot"><span>TOMS</span><button class="btn" onclick="document.getElementById('f3').click()">LOAD PNG</button></div>
      <div class="drum-slot"><span>CYMBALS</span><button class="btn" onclick="document.getElementById('f4').click()">LOAD PNG</button></div>
      
      <input type="file" id="f0" style="display:none" onchange="loadD(0, this.files)">
      <input type="file" id="f1" style="display:none" onchange="loadD(1, this.files)">
      <input type="file" id="f2" style="display:none" onchange="loadD(2, this.files)">
      <input type="file" id="f3" style="display:none" onchange="loadD(3, this.files)">
      <input type="file" id="f4" style="display:none" onchange="loadD(4, this.files)">
    </div>

    <div class="ctrl-box">
      <span class="label-small">3. Global Setup</span>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
          <button class="btn active" id="resFHD" onclick="setRes('FHD')">FHD</button>
          <button class="btn" id="resUHD" onclick="setRes('UHD')">UHD (4K)</button>
      </div>
      <button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START DRUM RECORD (24fps)</button>
    </div>
  </div>

  <div class="viz-area" id="p5-container"></div>
</div>

<div class="playbar"><div id="progFill"></div></div>

<script>
let exportRes = 'FHD', isRecording = false, isPlaying = false;
let audio, fft, ampObj;
let canvasRef, mediaRecorder, recordedChunks = [];
let drumAssets = new Array(5).fill(null);
let drumParts = [];

function setup() {
    let container = document.getElementById('p5-container');
    let w = (exportRes === 'FHD') ? 1920 : 3840;
    let h = (exportRes === 'FHD') ? 1080 : 2160;
    let cnv = createCanvas(w, h);
    cnv.parent(container);
    canvasRef = cnv.elt;
    fft = new p5.FFT(0.7, 512);
    ampObj = new p5.Amplitude();
    imageMode(CENTER);
    initDrums();
}

function initDrums() {
    drumParts = [];
    const layout = [
        {x: 0.5, y: 0.6, type: 'kick'},   // 중앙 하단
        {x: 0.6, y: 0.45, type: 'snare'}, // 살짝 오른쪽 위
        {x: 0.75, y: 0.6, type: 'hihat'}, // 오른쪽 아래
        {x: 0.4, y: 0.45, type: 'toms'},  // 왼쪽 위
        {x: 0.25, y: 0.4, type: 'cymbal'} // 왼쪽 끝 상단
    ];
    for(let i=0; i<5; i++) {
        drumParts.push(new DrumPart(i, layout[i]));
    }
}

function draw() {
    background(3, 3, 7);

    if (!audio || !audio.isPlaying()) {
        drumParts.forEach(d => d.display(0));
        return;
    }

    fft.analyze();
    let energies = [
        fft.getEnergy(20, 80) / 255,   // Kick
        fft.getEnergy(200, 1500) / 255, // Snare
        fft.getEnergy(8000, 16000) / 255, // Hi-Hat
        fft.getEnergy(100, 400) / 255,  // Toms
        fft.getEnergy(3000, 8000) / 255 // Cymbal
    ];

    drumParts.forEach((d, i) => {
        d.update(energies[i]);
        d.display(energies[i]);
    });

    updateUI();
}

class DrumPart {
    constructor(id, config) {
        this.id = id;
        this.basePos = createVector(width * config.x, height * config.y);
        this.pos = this.basePos.copy();
        this.type = config.type;
        this.angle = 0;
        this.size = width * 0.25;
    }

    update(energy) {
        let e = energy * 2.0;
        if (this.type === 'kick') {
            // 킥은 깊이감 있게 스케일링 + 미세한 흔들림
            this.pos.y = this.basePos.y + e * 30;
        } else if (this.type === 'snare') {
            // 스네어는 위로 튀어오름
            this.pos.y = this.basePos.y - e * 80;
        } else if (this.type === 'hihat') {
            // 하이햇은 아주 빠른 사이드 진동
            this.pos.x = this.basePos.x + (noise(frameCount * 0.5) - 0.5) * e * 50;
        } else if (this.type === 'toms') {
            // 탐탐은 좌우 스웨이
            this.angle = sin(frameCount * 0.1) * e * 0.2;
        } else if (this.type === 'cymbal') {
            // 심벌은 틸트(기울어짐) 진동
            this.angle = (noise(frameCount * 0.2) - 0.5) * e * 0.5;
            this.pos.y = this.basePos.y - e * 20;
        }
    }

    display(energy) {
        push();
        translate(this.pos.x, this.pos.y);
        rotate(this.angle);
        
        let sc = 1.0 + energy * 0.2;
        let img = drumAssets[this.id];

        if (img) {
            image(img, 0, 0, img.width * (this.size/800) * sc, img.height * (this.size/800) * sc);
        } else {
            noStroke(); fill(255, 50);
            ellipse(0, 0, 150 * sc);
            fill(255); textAlign(CENTER); textSize(width*0.01);
            text(this.type.toUpperCase(), 0, 0);
        }
        pop();
    }
}

// --- HANDLERS ---
function handleFile(files) {
    if (audio) audio.stop();
    audio = loadSound(URL.createObjectURL(files[0]), () => {
        document.getElementById('recBtn').disabled = false;
    });
}
function loadD(id, files) {
    loadImage(URL.createObjectURL(files[0]), (img) => { drumAssets[id] = img; });
}
function setRes(res) { exportRes = res; setup(); }
async function toggleSync() {
    if (isPlaying) {
        audio.stop(); if (mediaRecorder) mediaRecorder.stop();
        isPlaying = false;
    } else {
        if (getAudioContext().state === 'suspended') await userStartAudio();
        recordedChunks = [];
        const stream = canvasRef.captureStream(24);
        const dest = getAudioContext().createMediaStreamDestination();
        p5.soundOut.output.connect(dest);
        const combined = new MediaStream([...stream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
        mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/webm; codecs=vp9,opus', videoBitsPerSecond: 50000000 });
        mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
        mediaRecorder.onstop = saveVideo;
        audio.play(); mediaRecorder.start(); isPlaying = true;
    }
}
function saveVideo() {
    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `DrumSession_${new Date().getTime()}.mp4`; a.click();
}
function updateUI() {
    if (audio && audio.isPlaying()) {
        let curr = audio.currentTime(), dur = audio.duration();
        document.getElementById('timeCode').innerText = `${nf(floor(curr/60),2)}:${nf(floor(curr%60),2)} / ${nf(floor(dur/60),2)}:${nf(floor(dur%60),2)}`;
        document.getElementById('progFill').style.width = (curr/dur * 100) + '%';
    }
}
</script>
</body>
</html>
