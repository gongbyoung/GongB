<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO PRODUCTION v22.3.0 — Clean View</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root{ --bg:#000; --accent:#00ffcc; --panel:#0e0e15; --text:#fff; --record:#ff3377; }
        body{ background:var(--bg); color:var(--text); margin:0; overflow:hidden; font-family:'Pretendard', sans-serif; display:flex; }
        #editor-panel { width:420px; background:var(--panel); height:100vh; padding:15px; border-right:1px solid rgba(0,255,204,0.2); z-index:10; display:flex; flex-direction:column; }
        #subtitle-list { flex:1; overflow-y:auto; padding-right:5px; scrollbar-width:thin; }
        .sub-item { background:rgba(255,255,255,0.03); border:1px solid #333; border-radius:6px; padding:12px; margin-bottom:10px; font-size:11px; cursor: pointer; }
        .sub-item.active { border-color:var(--accent); background:rgba(0,255,204,0.05); }
        .grid-ctrl { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        label { font-size:9px; color:#888; display:block; margin-top:5px; }
        select, input { width:100%; background:#000; color:#fff; border:1px solid #444; padding:4px; font-size:10px; border-radius:3px; }
        input[type=range] { accent-color:var(--accent); height:2px; margin: 10px 0; }
        
        #canvas-container { flex:1; position:relative; background:#000; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        /* 캔버스 테두리 가이드 명확화 */
        canvas { border: 1px solid #333 !important; }
        
        .btn { padding:6px 10px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; font-size:9px; border-radius:4px; font-weight:bold; }
        #playBtn { background:var(--accent); color:#000; width:100%; height:30px; border:none; margin-top:10px; cursor:pointer; font-size:10px; font-weight:bold; border-radius:4px; }
    </style>
</head>
<body>

<div id="editor-panel">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-bottom:10px;">
        <button class="btn" onclick="document.getElementById('fIn').click()" style="color:var(--record); border-color:var(--record);">1. 🔤 FONT</button>
        <button class="btn" onclick="document.getElementById('mIn').click()">2. 🎵 AUDIO</button>
        <button class="btn" onclick="document.getElementById('sIn').click()">3. 📝 SRT</button>
        <select class="btn" id="aspectRatio" onchange="resizeStudio()">
            <option value="9:16">📱 9:16 Portrait</option>
            <option value="16:9">📺 16:9 Landscape</option>
        </select>
    </div>
    <div id="status-bar" style="font-size:10px; text-align:center; color:var(--accent); margin-bottom:10px;">VER 22.3.0 - CLEAN VIEW</div>
    <input type="file" id="mIn" style="display:none" onchange="handleAudio(this.files)">
    <input type="file" id="sIn" style="display:none" onchange="handleSRT(this.files)">
    <input type="file" id="fIn" style="display:none" onchange="handleFont(this.files)">
    <button id="playBtn" onclick="startProduction()" disabled>▶ START MP4 PRODUCTION</button>
    <div id="subtitle-list"></div>
</div>
<div id="canvas-container"></div>

<script>
    let audio, fft, subCanvas, myFont;
    let subtitles = [], settings = [];
    let isPlaying = false, isStarted = false;
    let mediaRecorder, recordedChunks = [];
    let editingIdx = 0;

    function setup() {
        resizeStudio();
        fft = new p5.FFT();
    }

    function handleFont(files) {
        const url = URL.createObjectURL(files[0]);
        loadFont(url, (f) => { myFont = f; checkReady(); });
    }

    function checkReady() {
        if(myFont && audio && subtitles.length > 0) document.getElementById('playBtn').disabled = false;
    }

    function resizeStudio() {
        const ratio = document.getElementById('aspectRatio').value;
        let w = 720, h = 1280; // 기본값 9:16
        if(ratio === "16:9") { w = 1280; h = 720; }
        
        let cnv = createCanvas(w, h, WEBGL);
        cnv.parent('canvas-container');
        subCanvas = createGraphics(w, h, WEBGL);
        subCanvas.colorMode(HSB, 360, 100, 100, 100);
        
        updateSliderLimits(w, h);

        // [핵심] 스케일 계산 최적화: 회색 영역 제거용
        const container = document.getElementById('canvas-container');
        const scale = Math.min(container.clientWidth/w, container.clientHeight/h) * 0.95;
        document.querySelector('canvas').style.transformOrigin = "center center";
        document.querySelector('canvas').style.transform = `scale(${scale})`;
    }

    function updateSliderLimits(w, h) {
        const xLimit = w / 2; const yLimit = h / 2;
        document.querySelectorAll('.x-slider').forEach(s => { s.min = -xLimit; s.max = xLimit; });
        document.querySelectorAll('.y-slider').forEach(s => { s.min = -yLimit; s.max = yLimit; });
    }

    function draw() {
        background(0); // 바깥 배경을 완전한 검정으로
        subCanvas.clear();
        if (myFont) {
            if (!isStarted) {
                drawVisualGuide();
            } else if (audio && audio.isPlaying()) {
                fft.analyze();
                renderTypo(audio.currentTime());
            }
        }
        push(); translate(-width/2, -height/2); image(subCanvas, 0, 0); pop();
    }

    function drawVisualGuide() {
        if (subtitles.length === 0) return;
        let set = settings[editingIdx];
        subCanvas.push();
        // 빨간 십자선 가이드
        subCanvas.stroke(255, 0, 0, 150);
        subCanvas.line(set.x, -height/2, set.x, height/2);
        subCanvas.line(-width/2, set.y, width/2, set.y);
        
        // 글자 프리뷰
        subCanvas.translate(set.x, set.y);
        subCanvas.rotateZ(radians(set.rot));
        subCanvas.textFont(myFont);
        subCanvas.textAlign(CENTER, CENTER);
        subCanvas.fill(set.hue, 80, 100, 80);
        subCanvas.textSize(set.size);
        subCanvas.text(subtitles[editingIdx].text, 0, 0);
        subCanvas.pop();
    }

    async function startProduction() {
        if (!isPlaying) { isStarted = true; recordedChunks = []; startRecording(); audio.play(); isPlaying = true; document.getElementById('playBtn').innerText = "⏹ STOP & SAVE"; }
        else { audio.stop(); if(mediaRecorder) mediaRecorder.stop(); isPlaying = false; isStarted = false; document.getElementById('playBtn').innerText = "▶ START MP4 PRODUCTION"; }
    }

    function handleSRT(files) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const blocks = e.target.result.replace(/\r/g, '').split('\n\n');
            subtitles = []; settings = [];
            const listEl = document.getElementById('subtitle-list'); listEl.innerHTML = '';
            blocks.forEach((block, i) => {
                const lines = block.split('\n'); if (lines.length < 3) return;
                const times = lines[1].split(' --> '), text = lines.slice(2).join(' ').trim();
                subtitles.push({ start: timeToSec(times[0]), end: timeToSec(times[1]), text: text });
                settings.push({ motion: 'Char_Wave', size: 70, x: 0, y: 0, hue: 180, rot: 0 });
                
                const item = document.createElement('div');
                item.className = 'sub-item'; item.id = `item-${i}`;
                item.onclick = () => { editingIdx = i; document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('active')); item.classList.add('active'); };
                item.innerHTML = `
                    <div style="color:var(--accent); font-weight:bold; font-size:10px; margin-bottom:5px;">${i+1}. ${text}</div>
                    <div class="grid-ctrl">
                        <div><label>ENGINE</label><select onchange="updateSet(${i}, 'motion', this.value)"><option value="Char_Wave">Wave</option><option value="Typing">Typing</option><option value="Pulse">Pulse</option></select></div>
                        <div><label>SIZE</label><input type="range" min="10" max="300" value="70" oninput="updateSet(${i}, 'size', this.value)"></div>
                        <div><label>X POS</label><input type="range" class="x-slider" value="0" oninput="updateSet(${i}, 'x', this.value)"></div>
                        <div><label>Y POS</label><input type="range" class="y-slider" value="0" oninput="updateSet(${i}, 'y', this.value)"></div>
                        <div><label>HUE</label><input type="range" min="0" max="360" value="180" oninput="updateSet(${i}, 'hue', this.value)"></div>
                        <div><label>ROT</label><input type="range" min="-180" max="180" value="0" oninput="updateSet(${i}, 'rot', this.value)"></div>
                    </div>
                `;
                listEl.appendChild(item);
            });
            resizeStudio(); checkReady();
        };
        reader.readAsText(files[0]);
    }

    function renderTypo(curr) {
        let idx = subtitles.findIndex(s => curr >= s.start && curr <= s.end);
        if (idx === -1) return;
        let sub = subtitles[idx], set = settings[idx], progress = map(curr, sub.start, sub.end, 0, 1), bass = fft.getEnergy("bass");
        subCanvas.push(); 
        subCanvas.translate(set.x, set.y); 
        subCanvas.rotateZ(radians(set.rot)); 
        subCanvas.textFont(myFont); 
        subCanvas.textAlign(CENTER, CENTER);
        subCanvas.textSize(set.size); 
        subCanvas.fill(set.hue, 80, 100);

        if (set.motion === 'Char_Wave') {
            let chars = sub.text.split(''), totalW = subCanvas.textWidth(sub.text), curX = -totalW/2;
            chars.forEach((c, i) => { 
                let offY = sin(frameCount*0.1 + i*0.5)*(bass/10); 
                subCanvas.text(c, curX + subCanvas.textWidth(c)/2, offY); curX += subCanvas.textWidth(c); 
            });
        } else if (set.motion === 'Typing') { 
            subCanvas.text(sub.text.substring(0, floor(map(progress, 0, 0.4, 0, sub.text.length, true))), 0, 0);
        } else {
            if(set.motion === 'Pulse') subCanvas.scale(1.0 + (bass/500));
            subCanvas.text(sub.text, 0, 0);
        }
        subCanvas.pop();
    }

    function startRecording() {
        let stream = document.querySelector('canvas').captureStream(30), options = { mimeType: 'video/mp4; codecs=avc1' };
        if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/webm; codecs=vp9' };
        mediaRecorder = new MediaRecorder(stream, options);
        mediaRecorder.ondataavailable = (e) => { if(e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => { let blob = new Blob(recordedChunks, { type: options.mimeType }); let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `production_${Date.now()}.mp4`; a.click(); };
        mediaRecorder.start();
    }

    function updateSet(idx, key, val) { settings[idx][key] = isNaN(val) ? val : parseFloat(val); }
    function timeToSec(t) { let p = t.split(':'); return parseInt(p[0])*3600 + parseInt(p[1])*60 + parseFloat(p[2].replace(',','.')); }
    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0]), () => { checkReady(); }); }
</script>
</body>
</html>
