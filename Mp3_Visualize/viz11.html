<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>MOTION TYPO STUDIO v21.4.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root{ --bg:#08080c; --accent:#00ffcc; --panel:#15151e; --text:#e0f0ff; --record:#ff3377; }
        body{ background:var(--bg); color:var(--text); margin:0; overflow:hidden; font-family:'Pretendard', sans-serif; display:flex; }
        #ctrl-panel { width:340px; background:var(--panel); height:100vh; padding:20px; border-right:1px solid rgba(0,255,204,0.2); z-index:10; overflow-y:auto; }
        #canvas-container { flex:1; position:relative; display:flex; align-items:center; justify-content:center; background:#000; }
        .box { background:rgba(255,255,255,0.03); padding:15px; border-radius:8px; margin-bottom:15px; border:1px solid rgba(255,255,255,0.1); }
        h3 { font-size:11px; color:var(--accent); margin-bottom:10px; letter-spacing:2px; text-transform:uppercase; }
        .btn { width:100%; padding:12px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; margin-bottom:8px; font-size:11px; transition:0.3s; border-radius:4px; }
        .btn:hover { background:rgba(0,255,204,0.1); }
        .btn-rec { border-color:var(--record); color:var(--record); font-weight:bold; }
        .btn-rec.active { background:var(--record); color:#fff; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.6; } }
        label { font-size:10px; color:#888; display:block; margin-bottom:5px; }
        input[type=range] { width:100%; accent-color:var(--accent); margin-bottom:15px; cursor:pointer; }
        #log { font-family:'Courier New', monospace; font-size:10px; color:#6a6a7a; height:120px; overflow-y:auto; background:#000; padding:10px; border-radius:4px; line-height:1.5; }
    </style>
</head>
<body>

<div id="ctrl-panel">
    <div class="box">
        <h3>1. SOURCE FILES</h3>
        <button class="btn" onclick="document.getElementById('mIn').click()">🎵 LOAD MP3</button>
        <button class="btn" onclick="document.getElementById('sIn').click()">📝 LOAD SRT (TAGS)</button>
        <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
        <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    </div>

    <div class="box">
        <h3>2. GLOBAL STYLING</h3>
        <label>BASE FONT SIZE</label><input type="range" id="baseSize" min="20" max="200" value="70">
        <label>GLOW INTENSITY</label><input type="range" id="glowPwr" min="0" max="50" value="20">
        <label>MOTION SMOOTHING</label><input type="range" id="smooth" min="1" max="20" value="10">
    </div>

    <div class="box">
        <h3>3. EXPORT / RECORD</h3>
        <button class="btn btn-rec" id="recBtn" onclick="toggleRecord()" disabled>🔴 START RECORDING</button>
        <div id="log">> Awaiting Files...</div>
    </div>
    
    <button class="btn" id="playBtn" onclick="togglePlay()" disabled style="background:var(--accent); color:#000; font-weight:bold;">▶ START PRODUCTION</button>
</div>

<div id="canvas-container"></div>

<script>
    let audio, fft, subCanvas;
    let subtitles = [];
    let isPlaying = false, isRecording = false;
    let mediaRecorder, recordedChunks = [];

    function addLog(m) { 
        const l = document.getElementById('log');
        l.innerHTML = `[${new Date().toLocaleTimeString()}] ${m}<br>` + l.innerHTML;
    }

    function setup() {
        let cnv = createCanvas(1280, 720, WEBGL); // 720p 영상 기준
        cnv.parent('canvas-container');
        
        // 가사 렌더링용 고해상도 2D 버퍼
        subCanvas = createGraphics(1280, 720);
        subCanvas.textAlign(CENTER, CENTER);
        subCanvas.colorMode(HSB, 360, 100, 100, 100);
        
        fft = new p5.FFT();
        addLog("Engine v21.4.0 Initialized.");
    }

    function draw() {
        background(5);
        subCanvas.clear();

        fft.analyze();
        let bass = fft.getEnergy("bass");
        let mid = fft.getEnergy("mid");
        let high = fft.getEnergy("treble");

        if (audio && audio.isPlaying()) {
            renderSubtitles(audio.currentTime(), bass, mid, high);
        }

        // 메인 캔버스에 결과물 투사
        push();
        translate(-width/2, -height/2);
        image(subCanvas, 0, 0);
        pop();
    }

    // --- 1. SRT 파서 (줄 분석 및 태그 추출) ---
    function handleSRT(files) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const lines = e.target.result.replace(/\r/g, '').split('\n\n');
            subtitles = lines.map(block => {
                const parts = block.split('\n');
                if(parts.length < 3) return null;
                const timeMatch = parts[1].split(' --> ');
                const textRaw = parts.slice(2).join(' ');
                
                return {
                    start: timeToSec(timeMatch[0]),
                    end: timeToSec(timeMatch[1]),
                    text: textRaw.replace(/\[.*?\]/g, '').trim(),
                    // 태그 분석[cite: 1]
                    x: parseTag(textRaw, 'X', 0),
                    y: parseTag(textRaw, 'Y', 0),
                    size: parseTag(textRaw, 'S', 0),
                    motion: parseTag(textRaw, 'M', 'Pulse'),
                    font: parseTag(textRaw, 'F', 'sans-serif')
                };
            }).filter(s => s !== null);
            addLog(`Analysis Complete: ${subtitles.length} Lyric Lines Loaded.`);
        };
        reader.readAsText(files[0]);
    }

    function parseTag(str, key, def) {
        let match = str.match(new RegExp(`\\[${key}:(.*?)\\]`));
        if (!match) return def;
        let val = match[1];
        return isNaN(val) ? val : parseFloat(val);
    }

    function timeToSec(t) {
        let p = t.split(':');
        return parseInt(p[0]) * 3600 + parseInt(p[1]) * 60 + parseFloat(p[2].replace(',', '.'));
    }

    // --- 2 & 3. 모션 그래픽 및 스타일 적용 ---
    function renderSubtitles(curr, b, m, h) {
        let active = subtitles.find(s => curr >= s.start && curr <= s.end);
        
        if (active) {
            let baseSize = parseFloat(document.getElementById('baseSize').value);
            let glow = parseFloat(document.getElementById('glowPwr').value);

            subCanvas.push();
            subCanvas.translate(width/2 + active.x, height/2 + active.y);
            
            // 모션 로직 분기[cite: 1]
            let mScale = 1.0;
            if (active.motion === 'Pulse') mScale = 1.0 + (b / 255) * 0.2;
            if (active.motion === 'Shake') subCanvas.translate(random(-2,2), random(-2,2));
            if (active.motion === 'Float') subCanvas.translate(0, sin(frameCount * 0.1) * 20);
            
            subCanvas.scale(mScale);
            
            // 스타일 적용
            subCanvas.textFont(active.font);
            subCanvas.textSize(active.size || baseSize);
            subCanvas.fill(255);
            
            // 텍스트 글로우 (네온 효과)
            subCanvas.drawingContext.shadowBlur = glow + (b/10);
            subCanvas.drawingContext.shadowColor = '#00ffcc';
            
            subCanvas.text(active.text, 0, 0);
            subCanvas.pop();
        }
    }

    // --- 4. 영상 저장 기능 (MediaRecorder) ---
    function toggleRecord() {
        if (!isRecording) {
            startRecording();
        } else {
            stopRecording();
        }
    }

    function startRecording() {
        recordedChunks = [];
        let stream = document.querySelector('canvas').captureStream(30); // 30fps
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
        
        mediaRecorder.ondataavailable = (e) => { if(e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = exportVideo;
        
        mediaRecorder.start();
        isRecording = true;
        document.getElementById('recBtn').innerText = "⏹ STOP & SAVE VIDEO";
        document.getElementById('recBtn').classList.add('active');
        addLog("Recording Started...");
    }

    function stopRecording() {
        mediaRecorder.stop();
        isRecording = false;
        document.getElementById('recBtn').innerText = "🔴 START RECORDING";
        document.getElementById('recBtn').classList.remove('active');
        addLog("Recording Stopped. Saving file...");
    }

    function exportVideo() {
        let blob = new Blob(recordedChunks, { type: 'video/webm' });
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url;
        a.download = `spectrum_motion_${Date.now()}.webm`;
        a.click();
    }

    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0]), () => { addLog("Audio Ready."); document.getElementById('playBtn').disabled = false; document.getElementById('recBtn').disabled = false; }); }
    function togglePlay() { if (isPlaying) { audio.pause(); isPlaying = false; } else { audio.play(); isPlaying = true; } }
</script>
</body>
</html>
