<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO PRODUCTION STUDIO v21.7.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root{ --bg:#050508; --accent:#00ffcc; --panel:#0e0e15; --text:#fff; --record:#ff3377; }
        body{ background:var(--bg); color:var(--text); margin:0; overflow:hidden; font-family:'Pretendard', sans-serif; display:flex; }
        
        #editor-panel { width:420px; background:var(--panel); height:100vh; padding:15px; border-right:1px solid rgba(0,255,204,0.2); z-index:10; display:flex; flex-direction:column; }
        #subtitle-list { flex:1; overflow-y:auto; margin-top:15px; padding-right:5px; scrollbar-width:thin; }
        
        .sub-item { background:rgba(255,255,255,0.03); border:1px solid #333; border-radius:6px; padding:12px; margin-bottom:10px; font-size:11px; }
        .sub-item.active { border-color:var(--accent); background:rgba(0,255,204,0.05); }
        .sub-text { color:var(--accent); font-weight:bold; margin-bottom:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        
        .grid-ctrl { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        label { font-size:9px; color:#888; display:block; margin-top:5px; }
        select, input { width:100%; background:#000; color:#fff; border:1px solid #444; padding:4px; font-size:10px; border-radius:3px; outline:none; }
        input[type=range] { accent-color:var(--accent); height:2px; }

        #canvas-container { flex:1; position:relative; display:flex; align-items:center; justify-content:center; background:#000; overflow:hidden; }
        /* 1. Start 버튼 크기 축소 */
        .btn { padding:8px 12px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; font-size:10px; border-radius:4px; font-weight:bold; }
        .btn:hover { background:rgba(0,255,204,0.1); }
        .btn-rec { border-color:var(--record); color:var(--record); }
        .top-btns { display:flex; gap:5px; margin-bottom:10px; }
        
        #playBtn { background:var(--accent); color:#000; width:100%; height:32px; border:none; margin-top:10px; cursor:pointer; font-size:11px; font-weight:bold; border-radius:4px; }
    </style>
</head>
<body>

<div id="editor-panel">
    <div class="top-btns">
        <button class="btn" onclick="document.getElementById('mIn').click()">🎵 AUDIO</button>
        <button class="btn" onclick="document.getElementById('sIn').click()">📝 SRT</button>
        <!-- 3. 종횡비 선택 추가 -->
        <select class="btn" id="aspectRatio" onchange="resizeStudio()" style="flex:1.5;">
            <option value="16:9">16:9 Landscape</option>
            <option value="9:16">9:16 Portrait</option>
        </select>
    </div>
    
    <!-- 4. 공통 폰트 설정 추가 -->
    <div class="sub-item" style="border-color:var(--accent2);">
        <label>GLOBAL FONT FAMILY</label>
        <input type="text" id="globalFont" value="sans-serif" placeholder="Font Name (e.g. Impact, Arial)" oninput="updateAllFonts()">
    </div>

    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    
    <!-- 1 & 2. Start 버튼 축소 및 원클릭 녹화 연동 -->
    <button id="playBtn" onclick="startProduction()" disabled>▶ START PRODUCTION (REC)</button>

    <div id="subtitle-list">
        <div style="text-align:center; color:#555; margin-top:50px;">Load files to start production...</div>
    </div>
</div>

<div id="canvas-container"></div>

<script>
    let audio, fft, subCanvas;
    let subtitles = [], settings = [];
    let isPlaying = false, isRecording = false, isStarted = false;
    let mediaRecorder, recordedChunks = [];

    function setup() {
        resizeStudio();
        fft = new p5.FFT();
    }

    // 3. 종횡비 실시간 변경 로직
    function resizeStudio() {
        const ratio = document.getElementById('aspectRatio').value;
        let w = 1280, h = 720;
        if(ratio === "9:16") { w = 720; h = 1280; }
        
        let cnv = createCanvas(w, h, WEBGL);
        cnv.parent('canvas-container');
        subCanvas = createGraphics(w, h, WEBGL);
        subCanvas.colorMode(HSB, 360, 100, 100, 100);
        
        // 컨테이너 크기에 맞춰 캔버스 스케일 조정 (CSS)
        const container = document.getElementById('canvas-container');
        const scale = Math.min(container.clientWidth/w, container.clientHeight/h) * 0.9;
        document.querySelector('canvas').style.transform = `scale(${scale})`;
    }

    function draw() {
        background(2);
        subCanvas.clear();

        // 6. 시작 전 가이드 텍스트 표시
        if (!isStarted) {
            drawIntro();
        } else if (audio && audio.isPlaying()) {
            fft.analyze();
            renderTypo(audio.currentTime());
        }

        push();
        translate(-width/2, -height/2);
        image(subCanvas, 0, 0);
        pop();
    }

    function drawIntro() {
        subCanvas.push();
        subCanvas.textAlign(CENTER, CENTER);
        subCanvas.fill(255);
        subCanvas.textSize(30);
        subCanvas.text("PRODUCTION READY", 0, -50);
        subCanvas.textSize(15);
        subCanvas.fill(0, 255, 204);
        subCanvas.text("1. LOAD MP3 & SRT FILES\n2. SET MOTIONS & STYLES\n3. CLICK 'START' TO RECORD AUTOMATICALLY", 0, 30);
        subCanvas.pop();
    }

    // 2. Start 버튼 클릭 시 녹화 자동 시작
    async function startProduction() {
        if (!isPlaying) {
            isStarted = true;
            await toggleRecord(true); // 녹화 시작
            audio.play();
            isPlaying = true;
            document.getElementById('playBtn').innerText = "⏹ STOP PRODUCTION";
        } else {
            audio.stop();
            toggleRecord(false); // 녹화 중지 및 저장
            isPlaying = false;
            isStarted = false;
            document.getElementById('playBtn').innerText = "▶ START PRODUCTION (REC)";
        }
    }

    function handleSRT(files) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const blocks = e.target.result.replace(/\r/g, '').split('\n\n');
            subtitles = []; settings = [];
            const listEl = document.getElementById('subtitle-list');
            listEl.innerHTML = '';

            blocks.forEach((block, i) => {
                const lines = block.split('\n');
                if (lines.length < 3) return;
                const times = lines[1].split(' --> ');
                const text = lines.slice(2).join(' ').trim();

                subtitles.push({ start: timeToSec(times[0]), end: timeToSec(times[1]), text: text });
                // 5. 신규 분리 모션 기본값 추가
                settings.push({ motion: 'Char_Wave', size: 70, x: 0, y: 150, hue: 180, rot: 0 });

                const item = document.createElement('div');
                item.className = 'sub-item';
                item.id = `item-${i}`;
                item.innerHTML = `
                    <div class="sub-text">${i+1}. ${text}</div>
                    <div class="grid-ctrl">
                        <div>
                            <label>MOTION ENGINE</label>
                            <select onchange="updateSet(${i}, 'motion', this.value)">
                                <option value="Char_Wave">Char: Wave</option>
                                <option value="Word_Bounce">Word: Bounce</option>
                                <option value="Typing">Typing</option>
                                <option value="Pulse">Pulse (Bass)</option>
                                <option value="3D_Flip">3D Flip</option>
                            </select>
                        </div>
                        <div><label>SIZE</label><input type="range" min="20" max="250" value="70" oninput="updateSet(${i}, 'size', this.value)"></div>
                        <div><label>POS X/Y</label><div style="display:flex;gap:2px;"><input type="number" value="0" oninput="updateSet(${i}, 'x', this.value)"><input type="number" value="150" oninput="updateSet(${i}, 'y', this.value)"></div></div>
                        <div><label>HUE / ROT</label><div style="display:flex;gap:2px;"><input type="range" min="0" max="360" value="180" oninput="updateSet(${i}, 'hue', this.value)"><input type="range" min="-180" max="180" value="0" oninput="updateSet(${i}, 'rot', this.value)"></div></div>
                    </div>
                `;
                listEl.appendChild(item);
            });
        };
        reader.readAsText(files[0]);
    }

    function renderTypo(curr) {
        let idx = subtitles.findIndex(s => curr >= s.start && curr <= s.end);
        if (idx === -1) return;

        let sub = subtitles[idx];
        let set = settings[idx];
        let progress = map(curr, sub.start, sub.end, 0, 1);
        let bass = fft.getEnergy("bass");

        document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.getElementById(`item-${idx}`);
        if(activeItem) {
            activeItem.classList.add('active');
            activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        subCanvas.push();
        subCanvas.textFont(document.getElementById('globalFont').value); // 4. 공통 폰트 적용
        subCanvas.translate(set.x, set.y, 0);
        subCanvas.rotateZ(radians(set.rot));
        subCanvas.textAlign(CENTER, CENTER);
        subCanvas.textSize(set.size);
        subCanvas.fill(set.hue, 80, 100);

        // 5. 개별 글자/단어 분리 모션 로직
        if (set.motion === 'Char_Wave') {
            let chars = sub.text.split('');
            let totalW = subCanvas.textWidth(sub.text);
            let currentX = -totalW / 2;
            chars.forEach((c, i) => {
                let offY = sin(frameCount * 0.1 + i * 0.5) * (bass/10);
                subCanvas.text(c, currentX, offY);
                currentX += subCanvas.textWidth(c);
            });
        } 
        else if (set.motion === 'Word_Bounce') {
            let words = sub.text.split(' ');
            let totalW = subCanvas.textWidth(sub.text);
            let currentX = -totalW / 2;
            words.forEach((w, i) => {
                let bounce = abs(sin(frameCount * 0.1 + i)) * (bass/5);
                subCanvas.text(w, currentX + subCanvas.textWidth(w)/2, -bounce);
                currentX += subCanvas.textWidth(w + ' ');
            });
        }
        else if (set.motion === 'Typing') {
            let count = floor(map(progress, 0, 0.4, 0, sub.text.length, true));
            subCanvas.text(sub.text.substring(0, count), 0, 0);
        }
        else if (set.motion === '3D_Flip') {
            subCanvas.rotateX(progress * TWO_PI);
            subCanvas.text(sub.text, 0, 0);
        }
        else if (set.motion === 'Pulse') {
            subCanvas.scale(1.0 + (bass/500));
            subCanvas.text(sub.text, 0, 0);
        }

        subCanvas.pop();
    }

    async function toggleRecord(start) {
        if (start) {
            recordedChunks = [];
            let stream = document.querySelector('canvas').captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                let blob = new Blob(recordedChunks, { type: 'video/webm' });
                let a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = `typo_production_${Date.now()}.webm`; a.click();
            };
            mediaRecorder.start();
            isRecording = true;
        } else {
            if(mediaRecorder) mediaRecorder.stop();
            isRecording = false;
        }
    }

    function updateSet(idx, key, val) { settings[idx][key] = isNaN(val) ? val : parseFloat(val); }
    function timeToSec(t) { let p = t.split(':'); return parseInt(p[0]) * 3600 + parseInt(p[1]) * 60 + parseFloat(p[2].replace(',', '.')); }
    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0]), () => { document.getElementById('playBtn').disabled = false; }); }
</script>
</body>
</html>
