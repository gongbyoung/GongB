<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO ARCHITECT v23.1.0 — Full Integrated PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root{ --bg:#050508; --accent:#00ffcc; --panel:#0e0e15; --text:#fff; --record:#ff3377; }
        body{ background:var(--bg); color:var(--text); margin:0; overflow:hidden; font-family:'Pretendard', sans-serif; display:flex; }
        
        /* 4. UI 레이아웃: 왼쪽 설정 패널 / 오른쪽 프리뷰 */
        #editor-panel { width:450px; background:var(--panel); height:100vh; padding:15px; border-right:1px solid rgba(0,255,204,0.2); overflow-y:auto; display:flex; flex-direction:column; }
        #canvas-container { flex:1; background:#000; display:flex; align-items:center; justify-content:center; position:relative; }
        
        .sub-item { background:rgba(255,255,255,0.03); border:1px solid #333; border-radius:6px; padding:12px; margin-bottom:15px; }
        .sub-item.active { border-color:var(--accent); background:rgba(0,255,204,0.08); }
        
        /* 1. 수치 직접 입력 UI */
        .ctrl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .ctrl-row label { font-size:9px; color:#888; width:70px; }
        .ctrl-row input[type=range] { flex:1; accent-color:var(--accent); height:2px; }
        .num-in { width:55px; background:#000; color:var(--accent); border:1px solid #444; font-size:10px; text-align:center; padding:2px; }

        .btn { padding:8px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; font-size:10px; border-radius:4px; font-weight:bold; width:100%; margin-bottom:5px; }
        #recBtn { border-color:var(--record); color:var(--record); }
        #recBtn.active { background:var(--record); color:#fff; animation:blink 1s infinite; }
        @keyframes blink { 50% { opacity:0.5; } }
        canvas { border: 1px solid var(--accent); }
    </style>
</head>
<body>

<div id="editor-panel">
    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; margin-bottom:10px;">
        <button class="btn" onclick="document.getElementById('fIn').click()">🔤 FONT</button>
        <button class="btn" onclick="document.getElementById('mIn').click()">🎵 AUDIO</button>
        <button class="btn" onclick="document.getElementById('sIn').click()">📝 SRT</button>
    </div>
    <input type="file" id="fIn" accept=".ttf,.otf" style="display:none" onchange="handleFont(this.files)">
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    
    <button class="btn" id="playBtn" onclick="toggleProduction()" disabled>▶ START MP4 PRODUCTION</button>
    <button class="btn" onclick="savePreset()" style="border-color:#aaa; color:#aaa;">💾 SAVE PRESET (JSON)</button>

    <div id="subtitle-list"></div>
</div>

<div id="canvas-container"></div>

<script>
    let audio, fft, subCanvas, myFont;
    let subtitles = [], settings = [];
    let isPlaying = false, isStarted = false;
    let mediaRecorder, recordedChunks = [];

    function setup() {
        let w = 1280, h = 720;
        let cnv = createCanvas(w, h, WEBGL);
        cnv.parent('canvas-container');
        subCanvas = createGraphics(w, h, WEBGL);
        subCanvas.colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT();
        
        const scale = Math.min((windowWidth-450)/w, windowHeight/h) * 0.95;
        cnv.elt.style.transform = `scale(${scale})`;
    }

    function draw() {
        background(0);
        subCanvas.clear();
        if (myFont) {
            if (audio && audio.isPlaying()) {
                fft.analyze();
                renderTypoEngine(audio.currentTime());
            } else if (!isStarted) {
                subCanvas.push(); subCanvas.textFont(myFont); subCanvas.textAlign(CENTER, CENTER);
                subCanvas.fill(0, 255, 204); subCanvas.textSize(30);
                subCanvas.text("READY FOR MP4 PRODUCTION\nLOAD FONT/AUDIO/SRT", 0, 0); subCanvas.pop();
            }
        }
        push(); translate(-width/2, -height/2); image(subCanvas, 0, 0); pop();
    }

    // --- 2. 8종 고난도 모션 엔진 구현 ---
    function renderTypoEngine(curr) {
        let idx = subtitles.findIndex(s => curr >= s.start && curr <= s.end);
        if (idx === -1) return;
        let sub = subtitles[idx], set = settings[idx], prog = map(curr, sub.start, sub.end, 0, 1), bass = fft.getEnergy("bass");

        subCanvas.push();
        subCanvas.textFont(myFont);
        subCanvas.textAlign(CENTER, CENTER);
        subCanvas.textSize(set.size);
        subCanvas.fill(255);

        let txt = set.isVertical ? sub.text.split('').join('\n') : sub.text;

        switch(set.motion) {
            case 'Directional': // 2-1 사방 진입
                let d = floor(sub.start % 4);
                let ox = d==0?-width*(1-prog):(d==1?width*(1-prog):0);
                let oy = d==2?-height*(1-prog):(d==3?height*(1-prog):0);
                subCanvas.translate(set.x + ox, set.y + oy);
                subCanvas.text(txt, 0, 0);
                break;

            case 'Orbit90': // 2-2 90도 회전 진입/퇴장
                let rot = prog<0.2?map(prog,0,0.2,-HALF_PI,0):(prog>0.8?map(prog,0.8,1,0,HALF_PI):0);
                subCanvas.translate(set.x, set.y); subCanvas.rotateZ(rot);
                subCanvas.text(txt, 0, 0);
                break;

            case 'Dissolve': // 2-3 & 2-4 가루 분해/비산
                let chars = sub.text.split('');
                chars.forEach((c, i) => {
                    subCanvas.push();
                    let sc = prog>0.7?map(prog,0.7,1,0,200):0;
                    subCanvas.translate(set.x+(i-chars.length/2)*set.size*0.6+random(-sc,sc), set.y+random(-sc,sc));
                    subCanvas.fill(255, map(prog,0.7,1,100,0));
                    subCanvas.text(c, 0, 0); subCanvas.pop();
                });
                break;

            case 'BusDrift': // 2-5 버스 뒤틀림
                let bx = prog<0.2?map(prog,0,0.2,width,0):(prog>0.8?map(prog,0.8,1,0,-width):0);
                subCanvas.translate(set.x+bx, set.y);
                subCanvas.rotateZ(sin(prog*PI)*0.1);
                subCanvas.text(txt, 0, 0);
                break;

            case 'Stamp': // 2-8 도장 찍기
                let s = prog<0.15?map(prog,0,0.15,8,1):(prog>0.85?map(prog,0.85,1,1,8):1);
                subCanvas.translate(set.x, set.y); subCanvas.scale(s);
                subCanvas.text(txt, 0, 0);
                break;

            case 'Laser': // 2-6 레이저 각인 (타이핑 변형)
                let l = floor(map(prog, 0, 0.5, 0, txt.length, true));
                if(prog < 0.5) { subCanvas.drawingContext.shadowBlur = 15; subCanvas.drawingContext.shadowColor = 'cyan'; }
                subCanvas.translate(set.x, set.y);
                subCanvas.text(txt.substring(0, l), 0, 0);
                break;

            default:
                subCanvas.translate(set.x, set.y); subCanvas.text(txt, 0, 0);
        }
        subCanvas.pop();
    }

    // --- 1. UI 및 양방향 제어 ---
    function handleSRT(files) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const blocks = e.target.result.replace(/\r/g, '').split('\n\n');
            subtitles = []; settings = [];
            const listEl = document.getElementById('subtitle-list'); listEl.innerHTML = '';
            blocks.forEach((block, i) => {
                const lines = block.split('\n'); if(lines.length<3) return;
                const times = lines[1].split(' --> '), text = lines.slice(2).join(' ');
                subtitles.push({ start: timeToSec(times[0]), end: timeToSec(times[1]), text: text });
                settings.push({ motion: 'Directional', size: 60, x: 0, y: 0, isVertical: false });
                
                const item = document.createElement('div');
                item.className = 'sub-item';
                item.innerHTML = `
                    <div style="color:var(--accent); font-size:10px; margin-bottom:8px;">${i+1}. ${text}</div>
                    <select class="btn" onchange="updateSet(${i}, 'motion', this.value)">
                        <option value="Directional">Directional In</option>
                        <option value="Orbit90">Orbit 90deg</option>
                        <option value="Dissolve">Dust Dissolve</option>
                        <option value="BusDrift">Bus Drift</option>
                        <option value="Stamp">Stamp Zoom</option>
                        <option value="Laser">Laser Engrave</option>
                    </select>
                    ${createCtrl(i, 'SIZE', 'size', 10, 300, 60)}
                    ${createCtrl(i, 'POS X', 'x', -640, 640, 0)}
                    ${createCtrl(i, 'POS Y', 'y', -360, 360, 0)}
                    <label style="font-size:9px;"><input type="checkbox" onchange="updateSet(${i}, 'isVertical', this.checked)"> VERTICAL TEXT</label>
                `;
                listEl.appendChild(item);
            });
            document.getElementById('playBtn').disabled = false;
        };
        reader.readAsText(files[0]);
    }

    function createCtrl(i, label, key, min, max, def) {
        return `
            <div class="ctrl-row">
                <label>${label}</label>
                <input type="range" id="sl_${key}_${i}" min="${min}" max="${max}" value="${def}" oninput="syncIn(${i},'${key}',this.value)">
                <input type="number" id="num_${key}_${i}" class="num-in" value="${def}" oninput="syncSl(${i},'${key}',this.value)">
            </div>
        `;
    }

    function syncIn(i, k, v) { document.getElementById(`num_${k}_${i}`).value = v; updateSet(i,k,v); }
    function syncSl(i, k, v) { document.getElementById(`sl_${k}_${i}`).value = v; updateSet(i,k,v); }
    function updateSet(i, k, v) { settings[i][k] = (typeof v === 'boolean') ? v : (isNaN(v) ? v : parseFloat(v)); }

    // --- 4. 프리셋 저장 ---
    function savePreset() {
        const blob = new Blob([JSON.stringify(settings)], {type: 'application/json'});
        const a = document.createElement('a');
        const now = new Date();
        a.href = URL.createObjectURL(blob);
        a.download = `preset_${now.getHours()}${now.getMinutes()}${now.getSeconds()}.json`;
        a.click();
    }

    // --- 5. MP4 저장 통합 ---
    async function toggleProduction() {
        if(isPlaying) {
            audio.stop(); isPlaying = false; mediaRecorder.stop();
            document.getElementById('playBtn').innerText = "▶ START MP4 PRODUCTION";
        } else {
            recordedChunks = [];
            const stream = document.querySelector('canvas').captureStream(60);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/mp4; codecs=avc1' });
            mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = `production_${Date.now()}.mp4`; a.click();
            };
            mediaRecorder.start(); audio.play(); isPlaying = true; isStarted = true;
            document.getElementById('playBtn').innerText = "⏹ STOP & EXPORT MP4";
        }
    }

    function handleFont(f) { loadFont(URL.createObjectURL(f[0]), (font) => { myFont = font; }); }
    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0])); }
    function timeToSec(t) { let p = t.split(':'); return parseInt(p[0])*3600 + parseInt(p[1])*60 + parseFloat(p[2].replace(',','.')); }
</script>
</body>
</html>
