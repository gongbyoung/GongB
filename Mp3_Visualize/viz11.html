<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO ARCHITECT v23.4.0 — Animation Principles Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root{ --bg:#020205; --accent:#00ffcc; --accent2:#ff3377; --panel:#0a0a10; --text:#e0f0ff; --border:rgba(0,255,204,0.25); }
        body{ background:var(--bg); color:var(--text); margin:0; overflow:hidden; font-family:'Pretendard', sans-serif; display:flex; }
        
        #left-panel { width:320px; background:var(--panel); height:100vh; padding:20px; border-right:1px solid var(--border); overflow-y:auto; display:flex; flex-direction:column; gap:15px; }
        #canvas-container { flex:1; background:#000; display:flex; align-items:center; justify-content:center; position:relative; }
        #right-panel { width:360px; background:var(--panel); height:100vh; padding:20px; border-left:1px solid var(--border); overflow-y:auto; }
        
        .sub-item { background:rgba(255,255,255,0.03); border:1px solid #333; border-radius:8px; padding:12px; cursor:pointer; font-size:12px; transition: 0.3s; line-height:1.4; }
        .sub-item.active { border-color:var(--accent); background:rgba(0,255,204,0.1); box-shadow: 0 0 15px rgba(0,255,204,0.1); }
        
        .ctrl-box { background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:10px; padding:15px; margin-bottom:15px; }
        .ctrl-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .ctrl-row label { font-size:11px; color:#aaa; width:70px; font-weight: 600; text-transform: uppercase; }
        input[type=range] { flex:1; accent-color:var(--accent); cursor:pointer; }
        .num-in { width:65px; background:#000; color:var(--accent); border:1px solid #444; font-size:12px; text-align:center; padding:5px; border-radius:4px; outline:none; }

        .btn { width:100%; padding:12px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; font-size:11px; border-radius:6px; font-weight:bold; transition:0.3s; text-transform: uppercase; letter-spacing:1px; }
        .btn:hover { background:var(--accent); color:#000; box-shadow: 0 0 20px rgba(0,255,204,0.3); }
        #playBtn.active { background:var(--accent2); color:#fff; border-color:var(--accent2); animation:pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 51, 119, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 51, 119, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 51, 119, 0); } }
    </style>
</head>
<body>

<div id="left-panel">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
        <button class="btn" onclick="document.getElementById('fIn').click()">Font</button>
        <button class="btn" onclick="document.getElementById('mIn').click()">Audio</button>
    </div>
    <button class="btn" style="border-color:#fff; color:#fff;" onclick="document.getElementById('sIn').click()">Load SRT Subtitles</button>
    <div id="subtitle-list" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:8px; margin-top:10px;">
        <!-- SRT 리스트가 여기에 렌더링됨 -->
    </div>
    
    <input type="file" id="fIn" accept=".ttf,.otf" style="display:none" onchange="handleFont(this.files)">
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
</div>

<div id="canvas-container"></div>

<div id="right-panel">
    <div class="ctrl-box">
        <h3 style="font-size:12px; color:var(--accent); margin:0 0 15px 0;">MOTION ARCHITECT</h3>
        <div class="ctrl-row">
            <label>Engine</label>
            <select class="num-in" id="mSelect" style="width:100%; text-align:left;" onchange="updateSet('motion', this.value)">
                <option value="Directional">Directional (Overshoot)</option>
                <option value="ElasticPop">Elastic Pop (Squash)</option>
                <option value="Assembly">Assembly (Overlap)</option>
                <option value="BusDrift">Bus Drift (Inertia)</option>
                <option value="Stamp">Heavy Stamp (Shake)</option>
                <option value="Laser">Laser Scan</option>
                <option value="Pulse">Bass Pulse</option>
            </select>
        </div>
        <div class="ctrl-row">
            <label>Size</label>
            <input type="range" id="sl_size" min="10" max="400" oninput="syncIn('size', this.value)">
            <input type="number" id="num_size" class="num-in" oninput="syncSl('size', this.value)">
        </div>
        <div class="ctrl-row">
            <label>X-Pos</label>
            <input type="range" id="sl_x" min="-640" max="640" oninput="syncIn('x', this.value)">
            <input type="number" id="num_x" class="num-in" oninput="syncSl('x', this.value)">
        </div>
        <div class="ctrl-row">
            <label>Y-Pos</label>
            <input type="range" id="sl_y" min="-360" max="360" oninput="syncIn('y', this.value)">
            <input type="number" id="num_y" class="num-in" oninput="syncSl('y', this.value)">
        </div>
        <label style="font-size:11px; color:var(--accent); cursor:pointer;"><input type="checkbox" id="chkVertical" onchange="updateSet('isVertical', this.checked)"> VERTICAL MODE</label>
    </div>

    <div class="ctrl-box">
        <button class="btn" id="playBtn" onclick="toggleProduction()" disabled>▶ Start Production</button>
        <button class="btn" onclick="savePreset()" style="border-color:#555; color:#888; margin-top:10px;">Save Preset</button>
    </div>
</div>

<script>
    let audio, fft, subCanvas, myFont;
    let subtitles = [], settings = [];
    let isPlaying = false, editingIdx = 0;
    let mediaRecorder, recordedChunks = [];

    function setup() {
        let cnv = createCanvas(1280, 720, WEBGL);
        cnv.parent('canvas-container');
        subCanvas = createGraphics(1280, 720, WEBGL);
        subCanvas.colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT();
        
        const scale = Math.min((windowWidth-750)/1280, windowHeight/720) * 0.95;
        cnv.elt.style.transform = `scale(${scale})`;
    }

    function draw() {
        background(0); subCanvas.clear();
        let curr = (audio && audio.isPlaying()) ? audio.currentTime() : (subtitles[editingIdx] ? subtitles[editingIdx].start + 0.01 : 0);

        if (myFont && subtitles.length > 0) {
            renderTypoEngine(curr);
        } else {
            drawSystemMsg(myFont ? "LOAD SRT TO START" : "LOAD FONT & AUDIO FIRST");
        }
        push(); translate(-width/2, -height/2); image(subCanvas, 0, 0); pop();
    }

    function drawSystemMsg(m) {
        subCanvas.push(); subCanvas.textAlign(CENTER, CENTER); subCanvas.fill(0,0,100,30); subCanvas.textSize(24);
        subCanvas.text(m, 0, 0); subCanvas.pop();
    }

    // --- 12가지 애니메이션 원칙이 적용된 물리 엔진 ---
    function renderTypoEngine(curr) {
        let idx = subtitles.findIndex(s => curr >= s.start && curr <= s.end);
        if (idx === -1) return;
        
        let sub = subtitles[idx], set = settings[idx];
        let prog = map(curr, sub.start, sub.end, 0, 1);
        let bass = fft.getEnergy("bass") / 255;

        subCanvas.push();
        subCanvas.textFont(myFont); subCanvas.textAlign(CENTER, CENTER);
        subCanvas.textSize(set.size); subCanvas.fill(0, 0, 100);

        let txt = set.isVertical ? sub.text.split('').join('\n') : sub.text;

        switch(set.motion) {
            case 'Directional': // Overshoot + Anticipation
                let moveX = 0;
                if(prog < 0.2) moveX = lerp(1000, -30, pow(map(prog, 0, 0.2, 0, 1), 0.5));
                else if(prog > 0.8) moveX = lerp(-30, -1000, pow(map(prog, 0.8, 1, 0, 1), 2));
                else moveX = lerp(-30, 30, map(prog, 0.2, 0.8, 0, 1));
                
                subCanvas.translate(set.x + moveX, set.y);
                subCanvas.scale(1 + abs(moveX)*0.001, 1 - abs(moveX)*0.001); // Stretch
                subCanvas.text(txt, 0, 0);
                break;

            case 'ElasticPop': // Squash & Stretch
                let s = 1;
                if(prog < 0.2) s = map(sin(map(prog, 0, 0.2, 0, PI)), 0, 1, 1, 1.4);
                subCanvas.translate(set.x, set.y);
                subCanvas.scale(s, 2-s); // Squash & Stretch
                subCanvas.text(txt, 0, 0);
                break;

            case 'Assembly': // Overlapping Action (글자별 시간차)
                let chars = sub.text.split('');
                chars.forEach((c, i) => {
                    let delay = i * 0.03;
                    let p = constrain(map(prog, delay, delay+0.2, 0, 1), 0, 1);
                    if(p > 0) {
                        subCanvas.push();
                        let yOff = (1-p) * -100 + sin(p * PI) * -20;
                        subCanvas.translate(set.x + (i - chars.length/2) * (set.size*0.7), set.y + yOff);
                        subCanvas.rotateZ((1-p) * 0.5);
                        subCanvas.fill(0, 0, 100, p*100);
                        subCanvas.text(c, 0, 0);
                        subCanvas.pop();
                    }
                });
                break;

            case 'Stamp': // Shake + Weight
                let st = prog < 0.1 ? map(prog, 0, 0.1, 5, 1) : 1;
                subCanvas.translate(set.x, set.y);
                if(prog > 0.08 && prog < 0.15) subCanvas.translate(random(-10,10), random(-10,10));
                subCanvas.scale(st);
                subCanvas.text(txt, 0, 0);
                break;

            default:
                subCanvas.translate(set.x, set.y);
                subCanvas.text(txt, 0, 0);
        }
        subCanvas.pop();
    }

    // --- SRT 파싱 강화 로직 ---
    function handleSRT(files) {
        if(!files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const raw = e.target.result;
            // 정규표현식: 숫자 -> 시간 -> 내용 순으로 유연하게 매칭
            const regex = /(\d+)\n(\d{2}:\d{2}:\d{2}[,\.]\d{3}) --> (\d{2}:\d{2}:\d{2}[,\.]\d{3})\n([\s\S]*?)(?=\n{2,}|\n\d+\n|$)/g;
            subtitles = []; settings = [];
            let match;
            const listEl = document.getElementById('subtitle-list');
            listEl.innerHTML = '';
            
            while ((match = regex.exec(raw)) !== null) {
                let text = match[4].trim().replace(/\n/g, ' ');
                subtitles.push({
                    start: timeToSec(match[2]),
                    end: timeToSec(match[3]),
                    text: text
                });
                settings.push({ motion: 'Directional', size: 60, x: 0, y: 0, isVertical: false });
                
                let i = subtitles.length - 1;
                let item = document.createElement('div');
                item.className = 'sub-item';
                item.id = `sub_${i}`;
                item.innerHTML = `<span style="color:var(--accent)">#${match[1]}</span><br>${text}`;
                item.onclick = () => selectSubtitle(i);
                listEl.appendChild(item);
            }
            
            if(subtitles.length > 0) {
                selectSubtitle(0);
                document.getElementById('playBtn').disabled = false;
            } else {
                alert("SRT 형식이 올바르지 않습니다. (인코딩을 UTF-8로 확인해주세요)");
            }
        };
        reader.readAsText(files[0]);
    }

    function timeToSec(t) {
        let p = t.replace(',', '.').split(':');
        return parseFloat(p[0]) * 3600 + parseFloat(p[1]) * 60 + parseFloat(p[2]);
    }

    function selectSubtitle(idx) {
        editingIdx = idx;
        document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`sub_${idx}`).classList.add('active');
        let s = settings[idx];
        document.getElementById('mSelect').value = s.motion;
        document.getElementById('sl_size').value = s.size; document.getElementById('num_size').value = s.size;
        document.getElementById('sl_x').value = s.x; document.getElementById('num_x').value = s.x;
        document.getElementById('sl_y').value = s.y; document.getElementById('num_y').value = s.y;
        document.getElementById('chkVertical').checked = s.isVertical;
    }

    function syncIn(k, v) { document.getElementById(`num_${k}`).value = v; settings[editingIdx][k] = parseFloat(v); }
    function syncSl(k, v) { document.getElementById(`sl_${k}`).value = v; settings[editingIdx][k] = parseFloat(v); }
    function updateSet(k, v) { settings[editingIdx][k] = (typeof v === 'boolean') ? v : (isNaN(v) ? v : parseFloat(v)); }

    function handleFont(f) { loadFont(URL.createObjectURL(f[0]), (font) => { myFont = font; }); }
    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0])); }

    async function toggleProduction() {
        if(isPlaying) {
            audio.stop(); isPlaying = false; mediaRecorder.stop();
            document.getElementById('playBtn').innerText = "▶ Start Production";
            document.getElementById('playBtn').classList.remove('active');
        } else {
            recordedChunks = [];
            const stream = document.querySelector('canvas').captureStream(60);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = `TYPO_ARCHITECT_RENDER.webm`; a.click();
            };
            mediaRecorder.start(); audio.play(); isPlaying = true;
            document.getElementById('playBtn').innerText = "⏹ Stop & Save";
            document.getElementById('playBtn').classList.add('active');
        }
    }
</script>
</body>
</html>
