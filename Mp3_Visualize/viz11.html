<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO ARCHITECT v23.2.0 — Motion Master PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root{ --bg:#020205; --accent:#00ffcc; --accent2:#ff3377; --panel:#0a0a10; --text:#e0f0ff; --border:rgba(0,255,204,0.15); }
        body{ background:var(--bg); color:var(--text); margin:0; overflow:hidden; font-family:'Pretendard', sans-serif; display:flex; }
        
        #left-panel { width:300px; background:var(--panel); height:100vh; padding:15px; border-right:1px solid var(--border); overflow-y:auto; display:flex; flex-direction:column; }
        #canvas-container { flex:1; background:#000; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
        #right-panel { width:360px; background:var(--panel); height:100vh; padding:15px; border-left:1px solid var(--border); overflow-y:auto; }
        
        canvas { border: 1px solid var(--accent); box-shadow: 0 0 20px rgba(0,255,204,0.2); }
        .sub-item { background:rgba(255,255,255,0.02); border:1px solid #333; border-radius:6px; padding:10px; margin-bottom:10px; cursor:pointer; font-size:11px; transition: 0.2s; }
        .sub-item:hover { background:rgba(255,255,255,0.05); }
        .sub-item.active { border-color:var(--accent); background:rgba(0,255,204,0.1); color:var(--accent); }
        
        .ctrl-box { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
        .ctrl-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .ctrl-row label { font-size:10px; color:#888; width:60px; font-weight: bold; }
        input[type=range] { flex:1; accent-color:var(--accent); cursor:pointer; }
        .num-in { width:60px; background:#000; color:var(--accent); border:1px solid #444; font-size:11px; text-align:center; padding:4px; border-radius:4px; outline:none; }
        .num-in:focus { border-color:var(--accent); }

        .btn { width:100%; padding:10px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; font-size:11px; border-radius:4px; font-weight:bold; margin-top:5px; transition:0.3s; }
        .btn:hover { background:var(--accent); color:#000; }
        .btn:disabled { border-color:#444; color:#444; cursor:default; }
        #playBtn.active { background:var(--accent2); color:#fff; border-color:var(--accent2); animation:blink 1s infinite; }
        @keyframes blink { 50% { opacity:0.6; } }
    </style>
</head>
<body>

<div id="left-panel">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:10px;">
        <button class="btn" onclick="document.getElementById('fIn').click()">🔤 FONT</button>
        <button class="btn" onclick="document.getElementById('mIn').click()">🎵 AUDIO</button>
    </div>
    <button class="btn" onclick="document.getElementById('sIn').click()">📝 LOAD SRT SUBTITLES</button>
    <hr style="border:0.5px solid var(--border); margin:15px 0;">
    <div id="subtitle-list"></div>
    
    <input type="file" id="fIn" accept=".ttf,.otf" style="display:none" onchange="handleFont(this.files)">
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
</div>

<div id="canvas-container"></div>

<div id="right-panel">
    <div class="ctrl-box" id="param-editor">
        <h3 style="font-size:11px; color:var(--accent); margin:0 0 12px 0; letter-spacing:1px;">ENGINE: MOTION SETTINGS</h3>
        
        <div class="ctrl-row" style="margin-bottom:15px;">
            <label>ENGINE</label>
            <select class="num-in" id="mSelect" style="width:100%; text-align:left;" onchange="updateSet('motion', this.value)">
                <option value="Directional">Directional (4-Way)</option>
                <option value="Orbit90">Orbit 90 (Rot In/Out)</option>
                <option value="Dissolve">Dust Dissolve (Particle)</option>
                <option value="BusDrift">Bus Drift (Inertia)</option>
                <option value="Laser">Laser Engrave</option>
                <option value="Stamp">Stamp Zoom</option>
                <option value="Assembly">Char Assembly</option>
                <option value="Pulse">Bass Pulse</option>
            </select>
        </div>

        <div class="ctrl-row">
            <label>SIZE</label>
            <input type="range" id="sl_size" min="10" max="300" oninput="syncIn('size', this.value)">
            <input type="number" id="num_size" class="num-in" oninput="syncSl('size', this.value)">
        </div>
        <div class="ctrl-row">
            <label>POS X</label>
            <input type="range" id="sl_x" min="-640" max="640" oninput="syncIn('x', this.value)">
            <input type="number" id="num_x" class="num-in" oninput="syncSl('x', this.value)">
        </div>
        <div class="ctrl-row">
            <label>POS Y</label>
            <input type="range" id="sl_y" min="-360" max="360" oninput="syncIn('y', this.value)">
            <input type="number" id="num_y" class="num-in" oninput="syncSl('y', this.value)">
        </div>
        
        <label style="font-size:10px; margin-top:15px; display:flex; align-items:center; gap:5px; cursor:pointer;">
            <input type="checkbox" id="chkVertical" onchange="updateSet('isVertical', this.checked)"> VERTICAL MODE
        </label>
    </div>

    <div class="ctrl-box">
        <h3 style="font-size:11px; color:var(--accent2); margin:0 0 10px 0;">PRODUCTION</h3>
        <button class="btn" id="playBtn" onclick="toggleProduction()" disabled>▶ START MP4 PRODUCTION</button>
        <button class="btn" onclick="savePreset()" style="border-color:#555; color:#888; margin-top:8px;">💾 SAVE PRESET (JSON)</button>
    </div>
</div>

<script>
    let audio, fft, subCanvas, myFont;
    let subtitles = [], settings = [];
    let isPlaying = false, isStarted = false, editingIdx = 0;
    let mediaRecorder, recordedChunks = [];

    function setup() {
        let w = 1280, h = 720;
        let cnv = createCanvas(w, h, WEBGL);
        cnv.parent('canvas-container');
        subCanvas = createGraphics(w, h, WEBGL);
        subCanvas.colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT();
        
        // 캔버스 크기 반응형 조절
        const scale = Math.min((windowWidth-700)/w, windowHeight/h) * 0.9;
        cnv.elt.style.transform = `scale(${scale})`;
    }

    function draw() {
        background(2, 2, 5); 
        subCanvas.clear();

        let currTime = 0;
        if (audio && audio.isPlaying()) {
            currTime = audio.currentTime();
            fft.analyze();
        } else {
            // 정지 상태일 때 현재 선택된 자막 시점을 미리보기
            if (subtitles.length > 0) currTime = subtitles[editingIdx].start + 0.1;
        }

        if (myFont) {
            renderTypoEngine(currTime);
        } else {
            drawGuideText("PLEASE LOAD FONT (.TTF / .OTF)");
        }

        push(); 
        translate(-width/2, -height/2); 
        image(subCanvas, 0, 0); 
        pop();
    }

    function drawGuideText(msg) {
        subCanvas.push();
        subCanvas.noFill(); subCanvas.stroke(180, 100, 100, 50);
        subCanvas.rect(-300, -50, 600, 100, 10);
        subCanvas.fill(180, 100, 100); subCanvas.textAlign(CENTER, CENTER);
        subCanvas.textSize(20); subCanvas.text(msg, 0, 0);
        subCanvas.pop();
    }

    function renderTypoEngine(curr) {
        let idx = subtitles.findIndex(s => curr >= s.start && curr <= s.end);
        if (idx === -1) return;
        
        let sub = subtitles[idx];
        let set = settings[idx];
        let duration = sub.end - sub.start;
        let elapsed = curr - sub.start;
        let prog = constrain(elapsed / duration, 0, 1);
        let bass = fft.getEnergy("bass") / 255;

        subCanvas.push();
        subCanvas.textFont(myFont);
        subCanvas.textAlign(CENTER, CENTER);
        subCanvas.textSize(set.size);
        subCanvas.fill(0, 0, 100); // White

        let txt = set.isVertical ? sub.text.split('').join('\n') : sub.text;

       // --- 렌더링 엔진 핵심 모션 로직 수정본 (기존 switch문 내부 대체) ---

switch(set.motion) {
    case 'Directional': // [예비동작 + 스쿼시 & 스트레치 + 오버슈트]
        // 오른쪽에서 왼쪽으로 들어왔다 멈추고 다시 왼쪽으로 나가는 로직
        let dX = 0;
        let sW = 1, sH = 1; // 스쿼시&스트레치 비율
        
        if (prog < 0.2) { // 1. 예비동작 & 진입 (Anticipation)
            let p = map(prog, 0, 0.2, 0, 1);
            dX = lerp(800, -20, p); // 살짝 더 갔다가(Overshoot)
            sW = map(p, 0, 1, 1.5, 1); // 이동 방향으로 길게 늘어남
            sH = map(p, 0, 1, 0.7, 1);
        } else if (prog < 0.8) { // 2. 유지 및 미세 움직임 (Staging)
            let p = map(prog, 0.2, 0.8, 0, 1);
            dX = lerp(-20, 20, p); // 멈춰있지 않고 서서히 흐름
        } else { // 3. 퇴장 (Follow Through)
            let p = map(prog, 0.8, 1, 0, 1);
            dX = lerp(20, -1000, pow(p, 2));
            sW = map(p, 0, 1, 1, 2); // 나갈 때 강하게 늘어남
        }
        
        subCanvas.translate(set.x + dX, set.y);
        subCanvas.scale(sW, sH);
        subCanvas.text(txt, 0, 0);
        break;

    case 'Assembly': // [시간차/순차적 등장 + 탄성 이징]
        let chars = sub.text.split('');
        chars.forEach((c, i) => {
            let charDelay = i * 0.05; // 한글자씩 시간차 (Overlap)
            let p = constrain(map(prog, charDelay, charDelay + 0.3, 0, 1), 0, 1);
            
            if (p > 0) {
                subCanvas.push();
                // Elastic Out Easing: 튕기는 느낌의 수학적 구현
                let bounce = sin(p * PI * 1.5) * exp(-p * 3) * (1-p);
                let yOff = map(p, 0, 1, -200, 0) + (bounce * 100);
                let rot = map(p, 0, 1, -0.5, 0);
                
                subCanvas.translate(set.x + (i - chars.length/2) * (set.size * 0.7), set.y + yOff);
                subCanvas.rotateZ(rot);
                subCanvas.scale(1 + bounce, 1 - bounce); // 떨어질 때 찌그러짐
                subCanvas.fill(0, 0, 100, p * 100);
                subCanvas.text(c, 0, 0);
                subCanvas.pop();
            }
        });
        break;

    case 'BusDrift': // [관성 + 무게감]
        let driftX = sin(prog * PI) * 100;
        let tilt = cos(prog * PI) * 0.2; // 관성에 의한 기울기
        subCanvas.translate(set.x + driftX, set.y);
        subCanvas.shearX(tilt);
        subCanvas.scale(1 + abs(tilt)*0.5, 1 - abs(tilt)*0.2); // 급커브 시 찌그러짐
        subCanvas.text(txt, 0, 0);
        break;

    case 'Stamp': // [강한 타격감 + 예비동작]
        let stampS = 1;
        if (prog < 0.1) stampS = map(prog, 0, 0.1, 8, 0.9); // 위에서 강하게 내려찍음
        else if (prog < 0.2) stampS = map(prog, 0.1, 0.2, 0.9, 1.1); // 반동 (Squash)
        else if (prog < 0.3) stampS = map(prog, 0.2, 0.3, 1.1, 1); // 복원
        
        subCanvas.translate(set.x, set.y);
        subCanvas.scale(stampS);
        // 찍을 때 화면 흔들림 효과 (Shake) 시각화용 미세 좌표 변동
        if (prog > 0.08 && prog < 0.15) subCanvas.translate(random(-5,5), random(-5,5));
        subCanvas.text(txt, 0, 0);
        break;
        
    // ... 나머지 모션도 동일한 물리 법칙(Physics) 기반으로 업데이트
}

    // --- 수치 동기화 및 핸들러 ---
    function syncIn(key, v) {
        document.getElementById(`num_${key}`).value = v;
        if(settings[editingIdx]) settings[editingIdx][key] = parseFloat(v);
    }

    function syncSl(key, v) {
        document.getElementById(`sl_${key}`).value = v;
        if(settings[editingIdx]) settings[editingIdx][key] = parseFloat(v);
    }

    function updateSet(key, v) {
        if(settings[editingIdx]) {
            settings[editingIdx][key] = (typeof v === 'boolean') ? v : (isNaN(v) ? v : parseFloat(v));
        }
    }

    function handleSRT(files) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const blocks = e.target.result.replace(/\r/g, '').split(/\n\s*\n/);
            subtitles = []; settings = [];
            const listEl = document.getElementById('subtitle-list');
            listEl.innerHTML = '';
            
            blocks.forEach((block, i) => {
                const lines = block.trim().split('\n');
                if(lines.length < 3) return;
                const times = lines[1].split(' --> ');
                const text = lines.slice(2).join(' ');
                
                subtitles.push({ start: timeToSec(times[0]), end: timeToSec(times[1]), text: text });
                settings.push({ motion: 'Directional', size: 60, x: 0, y: 0, isVertical: false });
                
                let item = document.createElement('div');
                item.className = 'sub-item';
                item.id = `sub_${i}`;
                item.innerHTML = `<small style="color:#666">${i+1}</small> ${text.substring(0,15)}...`;
                item.onclick = () => selectSubtitle(i);
                listEl.appendChild(item);
            });
            selectSubtitle(0);
            document.getElementById('playBtn').disabled = false;
        };
        reader.readAsText(files[0]);
    }

    function selectSubtitle(idx) {
        editingIdx = idx;
        document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.getElementById(`sub_${idx}`);
        if(activeItem) activeItem.classList.add('active');
        
        let s = settings[idx];
        document.getElementById('mSelect').value = s.motion;
        document.getElementById('sl_size').value = s.size; document.getElementById('num_size').value = s.size;
        document.getElementById('sl_x').value = s.x; document.getElementById('num_x').value = s.x;
        document.getElementById('sl_y').value = s.y; document.getElementById('num_y').value = s.y;
        document.getElementById('chkVertical').checked = s.isVertical;
    }

    async function toggleProduction() {
        const btn = document.getElementById('playBtn');
        if(isPlaying) {
            audio.stop(); isPlaying = false; mediaRecorder.stop();
            btn.innerText = "▶ START MP4 PRODUCTION";
            btn.classList.remove('active');
        } else {
            recordedChunks = [];
            const stream = document.querySelector('canvas').captureStream(60);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' }); 
            mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = `TYPO_ARCHITECT_EXPORT_${Date.now()}.webm`; a.click();
            };
            mediaRecorder.start();
            audio.play();
            isPlaying = true;
            btn.innerText = "⏹ STOP & SAVE MP4";
            btn.classList.add('active');
        }
    }

    function handleFont(f) { loadFont(URL.createObjectURL(f[0]), (font) => { myFont = font; }); }
    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0])); }
    function timeToSec(t) { 
        let p = t.split(':'); 
        let s = p[2].split(',');
        return parseInt(p[0])*3600 + parseInt(p[1])*60 + parseInt(s[0]) + parseInt(s[1])/1000; 
    }
    function savePreset() {
        const blob = new Blob([JSON.stringify({subtitles, settings}, null, 2)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `preset_${Date.now()}.json`; a.click();
    }
</script>
</body>
</html>
