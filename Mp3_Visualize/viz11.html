<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO PRODUCTION v21.8.0 — MP4 Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root{ --bg:#050508; --accent:#00ffcc; --panel:#0e0e15; --text:#fff; --record:#ff3377; }
        body{ background:var(--bg); color:var(--text); margin:0; overflow:hidden; font-family:'Pretendard', sans-serif; display:flex; }
        
        #editor-panel { width:400px; background:var(--panel); height:100vh; padding:15px; border-right:1px solid rgba(0,255,204,0.2); z-index:10; display:flex; flex-direction:column; }
        
        /* 상태창 분리 (폰트 로딩 시 UI 사라짐 방지) */
        #status-bar { background:rgba(0,0,0,0.5); padding:10px; border-radius:4px; margin-bottom:10px; font-size:10px; color:var(--accent); border:1px solid #333; }
        
        #subtitle-list { flex:1; overflow-y:auto; padding-right:5px; scrollbar-width:thin; }
        .sub-item { background:rgba(255,255,255,0.03); border:1px solid #333; border-radius:6px; padding:12px; margin-bottom:10px; font-size:11px; }
        .sub-item.active { border-color:var(--accent); background:rgba(0,255,204,0.05); }
        .sub-text { color:var(--accent); font-weight:bold; margin-bottom:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        
        .grid-ctrl { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        label { font-size:9px; color:#888; display:block; margin-top:5px; }
        select, input { width:100%; background:#000; color:#fff; border:1px solid #444; padding:4px; font-size:10px; border-radius:3px; outline:none; }
        input[type=range] { accent-color:var(--accent); height:2px; }

        #canvas-container { flex:1; position:relative; display:flex; align-items:center; justify-content:center; background:#000; overflow:hidden; }
        .btn { padding:6px 10px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; font-size:9px; border-radius:4px; font-weight:bold; }
        .btn:hover { background:rgba(0,255,204,0.1); }
        .top-btns { display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-bottom:10px; }
        
        #playBtn { background:var(--accent); color:#000; width:100%; height:32px; border:none; margin-top:10px; cursor:pointer; font-size:10px; font-weight:bold; border-radius:4px; }
        #playBtn:disabled { opacity:0.3; cursor:default; }
    </style>
</head>
<body>

<div id="editor-panel">
    <div class="top-btns">
        <button class="btn" onclick="document.getElementById('mIn').click()">🎵 AUDIO</button>
        <button class="btn" onclick="document.getElementById('sIn').click()">📝 SRT</button>
        <button class="btn" onclick="document.getElementById('fIn').click()" style="color:var(--record); border-color:var(--record);">🔤 FONT</button>
        <select class="btn" id="aspectRatio" onchange="resizeStudio()">
            <option value="16:9">16:9 Landscape</option>
            <option value="9:16">9:16 Portrait</option>
        </select>
    </div>
    
    <!-- 분리된 상태 표시창 -->
    <div id="status-bar">Waiting for files...</div>

    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    <input type="file" id="fIn" accept=".ttf,.otf" style="display:none" onchange="handleFont(this.files)">
    
    <button id="playBtn" onclick="startProduction()" disabled>▶ START MP4 PRODUCTION</button>

    <div id="subtitle-list"></div>
</div>

<div id="canvas-container"></div>

<script>
    let audio, fft, subCanvas, myFont;
    let subtitles = [], settings = [];
    let isPlaying = false, isRecording = false, isStarted = false;
    let mediaRecorder, recordedChunks = [];

    function setup() {
        resizeStudio();
        fft = new p5.FFT();
    }

    // 폰트 로드: 리스트 삭제 없이 상태만 업데이트
    function handleFont(files) {
        const url = URL.createObjectURL(files[0]);
        loadFont(url, (f) => {
            myFont = f;
            document.getElementById('status-bar').innerText = `Font Active: ${files[0].name}`;
            checkReady();
        });
    }

    function checkReady() {
        if(myFont && audio && subtitles.length > 0) {
            document.getElementById('playBtn').disabled = false;
        }
    }

    function resizeStudio() {
        const ratio = document.getElementById('aspectRatio').value;
        let w = 1280, h = 720;
        if(ratio === "9:16") { w = 720; h = 1280; }
        resizeCanvas(w, h);
        subCanvas = createGraphics(w, h, WEBGL);
        subCanvas.colorMode(HSB, 360, 100, 100, 100);
        const container = document.getElementById('canvas-container');
        const scale = Math.min(container.clientWidth/w, container.clientHeight/h) * 0.9;
        document.querySelector('canvas').style.transform = `scale(${scale})`;
    }

    function draw() {
        background(2);
        subCanvas.clear();
        if (!isStarted) {
            drawIntro();
        } else if (audio && audio.isPlaying()) {
            fft.analyze();
            renderTypo(audio.currentTime());
        }
        push(); translate(-width/2, -height/2); image(subCanvas, 0, 0); pop();
    }

    function drawIntro() {
        subCanvas.push();
        if(myFont) subCanvas.textFont(myFont);
        subCanvas.textAlign(CENTER, CENTER);
        subCanvas.fill(255);
        subCanvas.textSize(30);
        subCanvas.text("PRODUCTION READY", 0, -50);
        subCanvas.textSize(15);
        subCanvas.fill(0, 255, 204);
        subCanvas.text("H.264 MP4 EXPORT MODE\nLOAD FONT -> MP3 -> SRT -> CLICK START", 0, 30);
        subCanvas.pop();
    }

    async function startProduction() {
        if (!isPlaying) {
            isStarted = true;
            recordedChunks = [];
            startRecording(); 
            audio.play();
            isPlaying = true;
            document.getElementById('playBtn').innerText = "⏹ STOP & SAVE MP4";
        } else {
            audio.stop();
            if(mediaRecorder) mediaRecorder.stop();
            isPlaying = false;
            isStarted = false;
            document.getElementById('playBtn').innerText = "▶ START MP4 PRODUCTION";
        }
    }

    function handleSRT(files) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const blocks = e.target.result.replace(/\r/g, '').split('\n\n');
            subtitles = []; settings = [];
            const listEl = document.getElementById('subtitle-list');
            listEl.innerHTML = '';
            blocks.forEach((block, i) => {
                const lines = block.split('\n');
                if (lines.length < 3) return;
                const times = lines[1].split(' --> ');
                const text = lines.slice(2).join(' ').trim();
                subtitles.push({ start: timeToSec(times[0]), end: timeToSec(times[1]), text: text });
                settings.push({ motion: 'Char_Wave', size: 70, x: 0, y: 150, hue: 180, rot: 0 });
                const item = document.createElement('div');
                item.className = 'sub-item';
                item.id = `item-${i}`;
                item.innerHTML = `
                    <div class="sub-text">${i+1}. ${text}</div>
                    <div class="grid-ctrl">
                        <div><label>MOTION</label><select onchange="updateSet(${i}, 'motion', this.value)"><option value="Char_Wave">Char: Wave</option><option value="Word_Bounce">Word: Bounce</option><option value="Typing">Typing</option><option value="Pulse">Pulse</option><option value="3D_Flip">3D Flip</option></select></div>
                        <div><label>SIZE</label><input type="range" min="20" max="300" value="70" oninput="updateSet(${i}, 'size', this.value)"></div>
                        <div><label>X / Y</label><div style="display:flex;gap:2px;"><input type="number" value="0" oninput="updateSet(${i}, 'x', this.value)"><input type="number" value="150" oninput="updateSet(${i}, 'y', this.value)"></div></div>
                        <div><label>HUE/ROT</label><div style="display:flex;gap:2px;"><input type="range" min="0" max="360" value="180" oninput="updateSet(${i}, 'hue', this.value)"><input type="range" min="-180" max="180" value="0" oninput="updateSet(${i}, 'rot', this.value)"></div></div>
                    </div>
                `;
                listEl.appendChild(item);
            });
            document.getElementById('status-bar').innerText += " | SRT Loaded";
            checkReady();
        };
        reader.readAsText(files[0]);
    }

    function renderTypo(curr) {
        let idx = subtitles.findIndex(s => curr >= s.start && curr <= s.end);
        if (idx === -1) return;
        let sub = subtitles[idx], set = settings[idx];
        let progress = map(curr, sub.start, sub.end, 0, 1);
        let bass = fft.getEnergy("bass");

        // UI 하이라이트
        document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.getElementById(`item-${idx}`);
        if(activeItem) { activeItem.classList.add('active'); activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }

        subCanvas.push();
        if(myFont) subCanvas.textFont(myFont);
        subCanvas.translate(set.x, set.y, 0);
        subCanvas.rotateZ(radians(set.rot));
        subCanvas.textAlign(CENTER, CENTER);
        subCanvas.textSize(set.size);
        subCanvas.fill(set.hue, 80, 100);

        // 정밀 분리 모션 로직
        if (set.motion === 'Char_Wave') {
            let chars = sub.text.split('');
            let totalW = subCanvas.textWidth(sub.text);
            let currentX = -totalW / 2;
            chars.forEach((c, i) => {
                let offY = sin(frameCount * 0.1 + i * 0.5) * (bass/10);
                subCanvas.text(c, currentX + subCanvas.textWidth(c)/2, offY);
                currentX += subCanvas.textWidth(c);
            });
        } 
        else if (set.motion === 'Word_Bounce') {
            let words = sub.text.split(' ');
            let totalW = subCanvas.textWidth(sub.text);
            let currentX = -totalW / 2;
            words.forEach((w, i) => {
                let bounce = abs(sin(frameCount * 0.1 + i)) * (bass/5);
                subCanvas.text(w, currentX + subCanvas.textWidth(w)/2, -bounce);
                currentX += subCanvas.textWidth(w + ' ');
            });
        }
        else if (set.motion === 'Typing') {
            subCanvas.text(sub.text.substring(0, floor(map(progress, 0, 0.4, 0, sub.text.length, true))), 0, 0);
        }
        else if (set.motion === '3D_Flip') {
            subCanvas.rotateX(progress * TWO_PI);
            subCanvas.text(sub.text, 0, 0);
        }
        else if (set.motion === 'Pulse') {
            subCanvas.scale(1.0 + (bass/500));
            subCanvas.text(sub.text, 0, 0);
        }
        subCanvas.pop();
    }

    function startRecording() {
        let stream = document.querySelector('canvas').captureStream(30);
        let options = { mimeType: 'video/mp4; codecs=avc1' };
        if (!MediaRecorder.isTypeSupported(options.mimeType)) {
            options = { mimeType: 'video/webm; codecs=vp9' };
        }
        mediaRecorder = new MediaRecorder(stream, options);
        mediaRecorder.ondataavailable = (e) => { if(e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            let blob = new Blob(recordedChunks, { type: options.mimeType });
            let a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `typo_mp4_${Date.now()}.mp4`; a.click();
        };
        mediaRecorder.start();
    }

    function updateSet(idx, key, val) { settings[idx][key] = isNaN(val) ? val : parseFloat(val); }
    function timeToSec(t) { let p = t.split(':'); return parseInt(p[0]) * 3600 + parseInt(p[1]) * 60 + parseFloat(p[2].replace(',', '.')); }
    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0]), () => { 
        document.getElementById('status-bar').innerText += " | Audio Ready";
        checkReady(); 
    }); }
</script>
</body>
</html>
