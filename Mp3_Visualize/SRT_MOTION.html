<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO ARCHITECT v23.5.0 — Pro Motion Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root{ --bg:#020205; --accent:#00ffcc; --accent2:#ff3377; --panel:#0a0a10; --text:#e0f0ff; --border:rgba(0,255,204,0.25); }
        body{ background:var(--bg); color:var(--text); margin:0; overflow:hidden; font-family:'Pretendard', sans-serif; display:flex; }
        
        #left-panel { width:320px; background:var(--panel); height:100vh; padding:20px; border-right:1px solid var(--border); overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
        #canvas-container { flex:1; background:#000; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
        #right-panel { width:360px; background:var(--panel); height:100vh; padding:20px; border-left:1px solid var(--border); overflow-y:auto; }
        
        .sub-item { background:rgba(255,255,255,0.02); border:1px solid #333; border-radius:8px; padding:10px; cursor:pointer; font-size:12px; transition:0.2s; }
        .sub-item.active { border-color:var(--accent); background:rgba(0,255,204,0.15); }
        
        .ctrl-box { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:10px; padding:15px; margin-bottom:12px; }
        .ctrl-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .ctrl-row label { font-size:10px; color:#888; width:75px; font-weight:bold; }
        input[type=range] { flex:1; accent-color:var(--accent); cursor:pointer; }
        .num-in { width:60px; background:#000; color:var(--accent); border:1px solid #444; font-size:11px; text-align:center; padding:4px; border-radius:4px; }

        .btn { width:100%; padding:10px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; font-size:11px; border-radius:4px; font-weight:bold; margin-top:5px; transition:0.3s; }
        .btn:hover { background:var(--accent); color:#000; }
        #playBtn.active { background:var(--accent2); color:#fff; border-color:var(--accent2); animation:blink 1s infinite; }
        @keyframes blink { 50% { opacity:0.6; } }

        /* 캔버스 보색 테두리 가이드 */
        #canvas-guide { position:absolute; border:2px solid #ff3377; pointer-events:none; box-sizing:border-box; z-index:10; }
    </style>
</head>
<body>

<div id="left-panel">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
        <button class="btn" onclick="document.getElementById('fIn').click()">FONT</button>
        <button class="btn" onclick="document.getElementById('mIn').click()">AUDIO</button>
    </div>
    <button class="btn" style="border-color:#fff; color:#fff;" onclick="document.getElementById('sIn').click()">LOAD SRT SUBTITLES</button>
    <div class="ctrl-box" style="margin-top:10px;">
        <label style="font-size:10px; color:var(--accent);">ASPECT RATIO</label>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:5px;">
            <button class="btn" onclick="resizeCanvasRel(1280, 720)">16:9 (Horizontal)</button>
            <button class="btn" onclick="resizeCanvasRel(720, 1280)">9:16 (Vertical/Shorts)</button>
        </div>
    </div>
    <div id="subtitle-list" style="flex:1; overflow-y:auto; margin-top:5px;"></div>
    
    <input type="file" id="fIn" accept=".ttf,.otf" style="display:none" onchange="handleFont(this.files)">
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
</div>

<div id="canvas-container">
    <div id="canvas-guide"></div>
</div>

<div id="right-panel">
    <div class="ctrl-box">
        <h3 style="font-size:11px; color:var(--accent); margin:0 0 10px 0;">MOTION ARCHITECT</h3>
        <div class="ctrl-row">
            <label>ENGINE</label>
            <select class="num-in" id="mSelect" style="width:100%; text-align:left;" onchange="updateSet('motion', this.value)">
                <option value="Directional">Directional (Physics)</option>
                <option value="ElasticPop">Elastic Pop</option>
                <option value="Assembly">Assembly (Gravity)</option>
                <option value="Stamp">Heavy Stamp</option>
                <option value="Pulse">Bass Pulse</option>
            </select>
        </div>
        <div class="ctrl-row">
            <label>UNIT OPTION</label>
            <select class="num-in" id="uSelect" style="width:100%; text-align:left;" onchange="updateSet('unit', this.value)">
                <option value="all">Whole Line (한꺼번에)</option>
                <option value="char">By Character (글자씩)</option>
                <option value="word">By Word (단어씩)</option>
            </select>
        </div>
        <div class="ctrl-row">
            <label>SIZE</label>
            <input type="range" id="sl_size" min="10" max="400" oninput="syncIn('size', this.value)">
            <input type="number" id="num_size" class="num-in" oninput="syncSl('size', this.value)">
        </div>
        <div class="ctrl-row">
            <label>X-POS</label>
            <input type="range" id="sl_x" min="-640" max="640" oninput="syncIn('x', this.value)">
            <input type="number" id="num_x" class="num-in" oninput="syncSl('x', this.value)">
        </div>
        <div class="ctrl-row">
            <label>Y-POS</label>
            <input type="range" id="sl_y" min="-640" max="640" oninput="syncIn('y', this.value)">
            <input type="number" id="num_y" class="num-in" oninput="syncSl('y', this.value)">
        </div>
    </div>

    <div class="ctrl-box">
        <button class="btn" id="playBtn" onclick="toggleProduction()" disabled>▶ START PRODUCTION</button>
        <button class="btn" onclick="savePreset()" style="border-color:#555; color:#888; margin-top:5px;">SAVE PRESET (JSON)</button>
    </div>
</div>

<script>
    let audio, fft, subCanvas, myFont;
    let subtitles = [], settings = [];
    let isPlaying = false, editingIdx = 0;
    let mediaRecorder, recordedChunks = [];
    let canvasW = 1280, canvasH = 720;

    function setup() {
        let cnv = createCanvas(canvasW, canvasH, WEBGL);
        cnv.parent('canvas-container');
        subCanvas = createGraphics(canvasW, canvasH, WEBGL);
        subCanvas.colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT();
        updateGuide();
    }

    function draw() {
        background(0); subCanvas.clear();
        let curr = (audio && audio.isPlaying()) ? audio.currentTime() : (subtitles[editingIdx] ? subtitles[editingIdx].start + 0.001 : 0);

        if (myFont && subtitles.length > 0) {
            renderTypoEngine(curr);
        }
        push(); translate(-width/2, -height/2); image(subCanvas, 0, 0); pop();
    }

    function renderTypoEngine(curr) {
        let idx = subtitles.findIndex(s => curr >= s.start && curr <= s.end);
        if (idx === -1) return;
        
        let sub = subtitles[idx], set = settings[idx];
        let duration = sub.end - sub.start;
        let prog = (curr - sub.start) / duration;
        let bass = fft.getEnergy("bass") / 255;

        subCanvas.push();
        subCanvas.textFont(myFont); subCanvas.textAlign(CENTER, CENTER);
        subCanvas.textSize(set.size); subCanvas.fill(0, 0, 100);

        // 유닛 옵션에 따른 텍스트 분리 로직
        let items = [];
        if (set.unit === 'char') items = sub.text.split('');
        else if (set.unit === 'word') items = sub.text.split(' ');
        else items = [sub.text];

        items.forEach((item, i) => {
            let offsetProg = constrain(map(prog, i * (0.3/items.length), 0.7 + i * (0.3/items.length), 0, 1), 0, 1);
            if(offsetProg <= 0) return;

            subCanvas.push();
            let xPos = set.x + (i - (items.length-1)/2) * (set.unit === 'char' ? set.size*0.7 : set.size*2);
            let yPos = set.y;

            // 8종 애니메이션 핵심 로직 (12원칙 적용)
            switch(set.motion) {
                case 'Directional':
                    let moveX = (1 - pow(offsetProg, 0.3)) * 800;
                    subCanvas.translate(xPos + moveX, yPos);
                    subCanvas.scale(1 + (1-offsetProg), 1); // Stretch
                    break;
                case 'ElasticPop':
                    let s = offsetProg < 0.3 ? map(sin(offsetProg*PI*3), 0, 1, 1, 1.5) : 1;
                    subCanvas.translate(xPos, yPos);
                    subCanvas.scale(s, 2-s); // Squash
                    break;
                case 'Assembly':
                    let fall = (1 - offsetProg) * -500;
                    let rot = (1 - offsetProg) * HALF_PI;
                    subCanvas.translate(xPos, yPos + fall);
                    subCanvas.rotateZ(rot);
                    break;
                case 'Stamp':
                    let zoom = offsetProg < 0.15 ? map(offsetProg, 0, 0.15, 6, 1) : 1;
                    subCanvas.translate(xPos, yPos);
                    subCanvas.scale(zoom);
                    if(offsetProg < 0.2) subCanvas.translate(random(-5,5), random(-5,5)); // Shake
                    break;
                case 'Pulse':
                    subCanvas.translate(xPos, yPos);
                    subCanvas.scale(1 + bass * 0.4);
                    break;
                default:
                    subCanvas.translate(xPos, yPos);
            }
            
            subCanvas.fill(0, 0, 100, offsetProg * 100);
            subCanvas.text(item, 0, 0);
            subCanvas.pop();
        });
        subCanvas.pop();
    }

    // --- 시스템 기능: 비율 조절 및 가이드 ---
    function resizeCanvasRel(w, h) {
        canvasW = w; canvasH = h;
        resizeCanvas(w, h);
        subCanvas = createGraphics(w, h, WEBGL);
        subCanvas.colorMode(HSB, 360, 100, 100, 100);
        updateGuide();
    }

    function updateGuide() {
        let guide = document.getElementById('canvas-guide');
        let scale = Math.min((window.innerWidth-750)/canvasW, window.innerHeight/canvasH) * 0.95;
        guide.style.width = (canvasW * scale) + "px";
        guide.style.height = (canvasH * scale) + "px";
        let cnv = document.querySelector('canvas');
        cnv.style.transform = `scale(${scale})`;
    }

    // --- 시스템 기능: SRT 로딩 (첫번째 누락 방지 수정) ---
    function handleSRT(files) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const raw = e.target.result.replace(/\r/g, '').trim();
            // 첫 번째 자막이 번호 없이 시작하거나 공백이 있는 경우 대응 강화
            const blocks = raw.split(/\n\s*\n/);
            subtitles = []; settings = [];
            const listEl = document.getElementById('subtitle-list');
            listEl.innerHTML = '';
            
            blocks.forEach((block, i) => {
                const lines = block.trim().split('\n');
                if(lines.length < 3) return;
                
                const timeLine = lines.find(l => l.includes(' --> '));
                const timeIdx = lines.indexOf(timeLine);
                const times = timeLine.split(' --> ');
                const text = lines.slice(timeIdx + 1).join(' ');
                
                subtitles.push({ start: timeToSec(times[0]), end: timeToSec(times[1]), text: text });
                settings.push({ motion: 'Directional', unit: 'char', size: 60, x: 0, y: 0 });
                
                let item = document.createElement('div');
                item.className = 'sub-item'; item.id = `sub_${i}`;
                item.innerHTML = `<small>#${i+1}</small> ${text.substring(0,18)}`;
                item.onclick = () => selectSubtitle(i);
                listEl.appendChild(item);
            });
            if(subtitles.length > 0) { selectSubtitle(0); document.getElementById('playBtn').disabled = false; }
        };
        reader.readAsText(files[0]);
    }

    function selectSubtitle(idx) {
        editingIdx = idx;
        document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`sub_${idx}`).classList.add('active');
        let s = settings[idx];
        document.getElementById('mSelect').value = s.motion;
        document.getElementById('uSelect').value = s.unit;
        document.getElementById('sl_size').value = s.size; document.getElementById('num_size').value = s.size;
        document.getElementById('sl_x').value = s.x; document.getElementById('num_x').value = s.x;
        document.getElementById('sl_y').value = s.y; document.getElementById('num_y').value = s.y;
    }

    // 유틸리티
    function timeToSec(t) { let p = t.replace(',','.').split(':'); return parseFloat(p[0])*3600 + parseFloat(p[1])*60 + parseFloat(p[2]); }
    function syncIn(k, v) { document.getElementById(`num_${k}`).value = v; settings[editingIdx][k] = parseFloat(v); }
    function syncSl(k, v) { document.getElementById(`sl_${k}`).value = v; settings[editingIdx][k] = parseFloat(v); }
    function updateSet(k, v) { settings[editingIdx][k] = v; }
    function handleFont(f) { loadFont(URL.createObjectURL(f[0]), (font) => { myFont = font; }); }
    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0])); }
    
    async function toggleProduction() {
        if(isPlaying) {
            audio.stop(); isPlaying = false; mediaRecorder.stop();
            document.getElementById('playBtn').innerText = "▶ START PRODUCTION";
        } else {
            recordedChunks = [];
            const stream = document.querySelector('canvas').captureStream(60);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = `render_${Date.now()}.webm`; a.click();
            };
            mediaRecorder.start(); audio.play(); isPlaying = true;
            document.getElementById('playBtn').innerText = "⏹ STOP & SAVE";
        }
    }
</script>
</body>
</html>
