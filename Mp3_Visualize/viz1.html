<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM LAB v15.0.38 — Spectral Scoping</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#030305; --panel:#0a0a10; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.15); --text:#fff0f5; --muted:#554455; }
body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo{letter-spacing:5px; color:var(--accent); font-weight:bold; font-size:13px;}

.main{ display:grid; grid-template-columns:380px 1fr; flex:1; min-height:0; }
.left-panel{ background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:12px; overflow-y:auto; }

.ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
.label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}

.control-group { margin-bottom:10px; }
.control-group label { display:block; font-size:8px; color:var(--muted); margin-bottom:3px; }
.val-label { float:right; color:var(--accent); font-weight:bold; font-size:9px; }
input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; }
select { width:100%; background:#000; border:1px solid var(--border); color:var(--text); padding:8px; border-radius:4px; font-size:11px; outline:none; margin-bottom:5px; }

.btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:10px; cursor:pointer; font-size:10px; width:100%; margin-bottom:5px; transition:0.2s; }
.btn.active { background:var(--accent); color:#000; font-weight:bold;}
.btn.primary { background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:bold; font-size:11px; padding:15px; margin-top:5px; }
.btn.primary.recording { background:#fff; color:var(--accent2); animation: pulse 1s infinite; }

@keyframes pulse { 0%{opacity:1;} 50%{opacity:0.6;} 100%{opacity:1;} }

.viz-area { position:relative; display:flex; justify-content:center; align-items:center; flex:1; background:#000; overflow:hidden; padding:20px;}
#p5-container canvas { 
    max-width: 100% !important; max-height: 100% !important; 
    width: auto !important; height: auto !important; 
    object-fit: contain; box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 1px solid #1a1a1a;
}
.playbar { height:4px; background:#111; position:relative; }
#progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM LAB v15.0.38</div>
  <div id="timeCode" style="font-family:monospace; font-size:13px; color:var(--accent);">00:00 / 00:00</div>
</div>

<div class="main">
  <div class="left-panel">
    <div class="ctrl-box">
      <span class="label-small">A. System & Export</span>
      <button class="btn" onclick="document.getElementById('mIn').click()">LOAD MP3 FILE</button>
      <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:8px;">
          <button class="btn active" id="resFHD" onclick="setExportRes('FHD')">FHD</button>
          <button class="btn" id="resUHD" onclick="setExportRes('UHD')">UHD (4K)</button>
      </div>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
          <button class="btn active" id="asp169" onclick="setAspect('16:9')">16:9</button>
          <button class="btn" id="asp916" onclick="setAspect('9:16')">9:16</button>
      </div>
      <button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START SYNC RECORD</button>
    </div>

    <div class="ctrl-box">
      <span class="label-small">B. Spectral Scoping Engine</span>
      <div class="control-group">
        <label>FREQ RANGE (Low-High) <span class="val-label" id="vFreqR">0 - 1024</span></label>
        <input type="range" id="freqLow" min="0" max="512" value="0" oninput="updateRangeLabel()">
        <input type="range" id="freqHigh" min="512" max="1024" value="1024" oninput="updateRangeLabel()" style="margin-top:5px;">
      </div>
      <div class="control-group">
        <label>SENSITIVITY (반응성) <span class="val-label" id="vSense">2.5</span></label>
        <input type="range" id="sense" min="0.5" max="10.0" step="0.1" value="2.5">
      </div>
      <div class="control-group">
        <label>THRESHOLD (임계값) <span class="val-label" id="vThresh">20</span></label>
        <input type="range" id="thresh" min="0" max="100" value="20">
      </div>
      <div class="control-group">
        <label>TRAIL (잔상) <span class="val-label" id="vTrail">40</span></label>
        <input type="range" id="trail" min="0" max="150" value="40">
      </div>
    </div>

    <div class="ctrl-box">
      <span class="label-small">C. Main Flower Transform</span>
      <button class="btn" style="border-color:#00ffcc; color:#00ffcc;" onclick="document.getElementById('fIn').click()">LOAD FLOWER PNG</button>
      <input type="file" id="fIn" accept="image/png" style="display:none" onchange="handleFlowerPNG(this.files)">
      <div class="control-group" style="margin-top:10px;">
        <label>POS X / Y / SCALE</label>
        <input type="range" id="fX" min="-1000" max="1000" value="0">
        <input type="range" id="fY" min="-1000" max="1000" value="0" style="margin-top:5px;">
        <input type="range" id="fS" min="0.1" max="4.0" step="0.1" value="1.0" style="margin-top:5px;">
      </div>
    </div>

    <div class="ctrl-box">
      <span class="label-small">D. Petal Color Range</span>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
          <div class="control-group"><label>R Min/Max</label><input type="range" id="rMin" min="0" max="255" value="150"><input type="range" id="rMax" min="0" max="255" value="255"></div>
          <div class="control-group"><label>G Min/Max</label><input type="range" id="gMin" min="0" max="255" value="50"><input type="range" id="gMax" min="0" max="255" value="150"></div>
          <div class="control-group"><label>B Min/Max</label><input type="range" id="bMin" min="0" max="255" value="200"><input type="range" id="bMax" min="0" max="255" value="255"></div>
      </div>
    </div>
  </div>

  <div class="viz-area" id="p5-container"></div>
</div>

<div class="playbar"><div id="progFill"></div></div>

<script>
let exportRes = 'FHD', aspect = '16:9';
let isRecording = false, isPlaying = false;
let audio, fft, ampObj;
let petals = [];
let mediaRecorder, recordedChunks = [];
let canvasRef, flowerImg = null;

function setup() {
    let container = document.getElementById('p5-container');
    let w = (exportRes === 'FHD') ? 1920 : 3840;
    let h = (exportRes === 'FHD') ? 1080 : 2160;
    if (aspect === '9:16') { let t = w; w = h; h = t; }

    let cnv = createCanvas(w, h);
    cnv.parent(container);
    canvasRef = cnv.elt;
    
    colorMode(RGB, 255, 255, 255, 255);
    fft = new p5.FFT(0.8, 1024); // 1024 bins
    ampObj = new p5.Amplitude();
    imageMode(CENTER);
    initPetals();
}

function initPetals() {
    petals = [];
    // 1024개 입자를 그리드 형태로 배치
    let cols = 32, rows = 32;
    for(let i=0; i<1024; i++) {
        petals.push(new Petal(i));
    }
}

function draw() {
    let trVal = parseInt(document.getElementById('trail').value);
    background(3, 3, 5, trVal);

    if (!audio || !audio.isLoaded()) return;

    let spectrum = fft.analyze();
    let vol = ampObj.getLevel();

    // --- 주파수 범위 설정 읽기 ---
    let low = parseInt(document.getElementById('freqLow').value);
    let high = parseInt(document.getElementById('freqHigh').value);
    let sense = parseFloat(document.getElementById('sense').value);
    let threshold = parseInt(document.getElementById('thresh').value);

    // --- 입자 필드 업데이트 ---
    for (let i = 0; i < petals.length; i++) {
        // 입자의 인덱스가 설정한 주파수 범위 내에 있을 때만 데이터 추출
        let freqValue = 0;
        if (i >= low && i <= high) {
            freqValue = spectrum[i] || 0;
        }

        // 임계값 처리 (소리가 일정 수준 이상일 때만 반응)
        let effectiveAmp = (freqValue > threshold) ? freqValue / 255 : 0;
        
        petals[i].update(effectiveAmp * sense, vol);
        petals[i].display(effectiveAmp * sense, vol);
    }

    // --- 메인 꽃 (Bass 반응) ---
    let bass = fft.getEnergy("bass") / 255;
    drawMainFlower(bass);

    // --- 주파수 모니터 UI (Canvas 위에 덧그림) ---
    drawSpectrumMonitor(spectrum, low, high);

    updateUI();
}

function drawSpectrumMonitor(spec, low, high) {
    push();
    resetMatrix(); // 캔버스 좌표계 초기화
    let mw = width * 0.3, mh = 60;
    let mx = 20, my = height - 80;
    
    fill(0, 150); noStroke();
    rect(mx, my, mw, mh);
    
    stroke(0, 255, 204, 100);
    for (let i = 0; i < spec.length; i++) {
        let x = map(i, 0, spec.length, mx, mx + mw);
        let h = map(spec[i], 0, 255, 0, mh);
        if (i >= low && i <= high) stroke(255, 51, 119); else stroke(0, 255, 204, 50);
        line(x, my + mh, x, my + mh - h);
    }
    pop();
}

function drawMainFlower(bass) {
    if (!flowerImg) return;
    push();
    let x = width/2 + parseInt(document.getElementById('fX').value);
    let y = height/2 + parseInt(document.getElementById('fY').value);
    let s = parseFloat(document.getElementById('fS').value);
    translate(x, y);
    rotate(sin(millis()*0.002) * bass * 0.15);
    let sc = (height * 0.4 / flowerImg.height) * s * (1.0 + bass * 0.2);
    image(flowerImg, 0, 0, flowerImg.width * sc, flowerImg.height * sc);
    pop();
}

class Petal {
    constructor(index) {
        this.index = index;
        // 초기 위치 그리드 배치
        let col = index % 32;
        let row = floor(index / 32);
        this.origin = createVector(
            map(col, 0, 31, width * 0.1, width * 0.9),
            map(row, 0, 31, height * 0.1, height * 0.9)
        );
        this.pos = this.origin.copy();
        this.size = random(10, 25);
        this.angle = random(TWO_PI);
        this.color = color(
            random(parseInt(document.getElementById('rMin').value), parseInt(document.getElementById('rMax').value)),
            random(parseInt(document.getElementById('gMin').value), parseInt(document.getElementById('gMax').value)),
            random(parseInt(document.getElementById('bMin').value), parseInt(document.getElementById('bMax').value)),
            200
        );
    }

    update(freqAmp, vol) {
        // 주파수 에너지가 있을 때 원점에서 튕겨나가는 효과 (Impulse)
        if (freqAmp > 0) {
            let offset = p5.Vector.random2D().mult(freqAmp * 100);
            this.pos = p5.Vector.lerp(this.pos, p5.Vector.add(this.origin, offset), 0.5);
        } else {
            // 소리가 없으면 다시 제자리로 (Restoring Force)
            this.pos = p5.Vector.lerp(this.pos, this.origin, 0.1);
        }
        this.angle += 0.02 + freqAmp * 0.2;
    }

    display(freqAmp, vol) {
        push();
        translate(this.pos.x, this.pos.y);
        rotate(this.angle);
        noStroke();
        fill(this.color);
        // 주파수 강도에 비례한 크기 확장
        let s = this.size * (0.6 + freqAmp * 2.0);
        
        beginShape();
        for(let a=0; a<TWO_PI; a+=1.2) {
            let r = s * (1 + 0.5 * sin(a));
            vertex(cos(a)*r*0.4, sin(a)*r);
        }
        endShape(CLOSE);
        pop();
    }
}

// --- SYSTEM HANDLERS ---
function handleFile(files) {
    if (audio) audio.stop();
    audio = loadSound(URL.createObjectURL(files[0]), () => {
        document.getElementById('recBtn').disabled = false;
    });
}
function handleFlowerPNG(files) {
    loadImage(URL.createObjectURL(files[0]), (img) => { flowerImg = img; });
}
function setExportRes(res) { exportRes = res; setup(); }
function setAspect(asp) { aspect = asp; setup(); }
function updateRangeLabel() {
    let l = document.getElementById('freqLow').value;
    let h = document.getElementById('freqHigh').value;
    document.getElementById('vFreqR').innerText = `${l} - ${h}`;
}

async function toggleSync() {
    if (!audio || !audio.isLoaded()) return;
    if (isPlaying) {
        audio.stop(); if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        isPlaying = false;
        document.getElementById('recBtn').innerText = "▶ START SYNC RECORD";
        document.getElementById('recBtn').classList.remove('recording');
    } else {
        if (getAudioContext().state === 'suspended') await userStartAudio();
        recordedChunks = [];
        const stream = canvasRef.captureStream(60);
        const dest = getAudioContext().createMediaStreamDestination();
        p5.soundOut.output.connect(dest);
        const combined = new MediaStream([...stream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
        mediaRecorder = new MediaRecorder(combined, { 
            mimeType: 'video/webm; codecs=vp9,opus',
            videoBitsPerSecond: exportRes === 'UHD' ? 60000000 : 20000000 
        });
        mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = saveVideo;
        audio.play(); mediaRecorder.start(); isPlaying = true;
        document.getElementById('recBtn').innerText = "■ STOP & SAVE VIDEO";
        document.getElementById('recBtn').classList.add('recording');
    }
}
function saveVideo() {
    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `Spectral_Scoping_${new Date().getTime()}.mp4`; a.click();
}
function updateUI() {
    if (audio && audio.isPlaying()) {
        let curr = audio.currentTime(), dur = audio.duration();
        document.getElementById('timeCode').innerText = `${nf(floor(curr/60),2)}:${nf(floor(curr%60),2)} / ${nf(floor(dur/60),2)}:${nf(floor(dur%60),2)}`;
        document.getElementById('progFill').style.width = (curr/dur * 100) + '%';
    }
}

// Slider Display Sync
['sense','thresh','trail','fX','fY','fS'].forEach(id => {
    let el = document.getElementById(id);
    if(el) el.oninput = function() { document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1)).innerText = this.value; }
});
</script>
</body>
</html>
