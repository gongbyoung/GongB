<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM LAB v15.0.36 — Cinematic HD</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#030305; --panel:#0a0a10; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.15); --text:#fff0f5; --muted:#554455; }
body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo{letter-spacing:5px; color:var(--accent); font-weight:bold; font-size:13px;}

.main{ display:grid; grid-template-columns:380px 1fr; flex:1; min-height:0; }
.left-panel{ background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:12px; overflow-y:auto; }

.ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
.label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}

.control-group { margin-bottom:10px; }
.control-group label { display:block; font-size:8px; color:var(--muted); margin-bottom:3px; }
.val-label { float:right; color:var(--accent); font-weight:bold; font-size:9px; }
input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; }
select { width:100%; background:#000; border:1px solid var(--border); color:var(--text); padding:8px; border-radius:4px; font-size:11px; outline:none; margin-bottom:5px; }

.btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:10px; cursor:pointer; font-size:10px; width:100%; margin-bottom:5px; transition:0.2s; }
.btn.active { background:var(--accent); color:#000; font-weight:bold;}
.btn.primary { background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:bold; font-size:11px; padding:15px; margin-top:5px; }
.btn.primary.recording { background:#fff; color:var(--accent2); animation: pulse 1s infinite; }

@keyframes pulse { 0%{opacity:1;} 50%{opacity:0.6;} 100%{opacity:1;} }

.viz-area { position:relative; display:flex; justify-content:center; align-items:center; flex:1; background:#000; overflow:hidden; padding:20px;}
/* 캔버스가 화면을 벗어나지 않도록 하는 핵심 설정 */
#p5-container canvas { 
    max-width: 100% !important; 
    max-height: 100% !important; 
    width: auto !important; 
    height: auto !important; 
    object-fit: contain;
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
    border: 1px solid #1a1a1a;
}

.playbar { height:2px; background:#111; position:relative; }
#progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }
.status-log { font-size:10px; color:var(--muted); margin-top:4px; text-align:center; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM LAB v15.0.36</div>
  <div id="timeCode" style="font-family:monospace; font-size:13px; color:var(--accent);">00:00 / 00:00</div>
</div>

<div class="main">
  <div class="left-panel">
    <div class="ctrl-box">
      <span class="label-small">A. System & Export Res</span>
      <button class="btn" onclick="document.getElementById('mIn').click()">1. LOAD MP3 FILE</button>
      <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
      <div id="statusLog" class="status-log">No file loaded</div>
      
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:8px;">
          <button class="btn active" id="resFHD" onclick="setExportRes('FHD')">FHD (1080p)</button>
          <button class="btn" id="resUHD" onclick="setExportRes('UHD')">UHD (4K)</button>
      </div>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-bottom:5px;">
          <button class="btn active" id="asp169" onclick="setAspect('16:9')">16:9 (가로)</button>
          <button class="btn" id="asp916" onclick="setAspect('9:16')">9:16 (세로)</button>
      </div>
      <button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START SYNC RECORD</button>
    </div>

    <div class="ctrl-box">
      <span class="label-small">B. Background Visual Style</span>
      <select id="bgStyle">
          <option value="rain">1. PETAL RAIN (꽃비)</option>
          <option value="waveField">2. WAVE FIELD (전면 물결)</option>
          <option value="surge">3. SURGE WAVE (몰아치는 파도)</option>
      </select>
      <div class="control-group">
        <label>EMISSION RATE (입자량) <span class="val-label" id="vEmit">50</span></label>
        <input type="range" id="emitRate" min="10" max="200" value="50">
      </div>
      <div class="control-group">
        <label>TRAIL (잔상 효과) <span class="val-label" id="vTrail">40</span></label>
        <input type="range" id="trail" min="0" max="150" value="40">
      </div>
    </div>

    <div class="ctrl-box">
      <span class="label-small">C. Main Flower Transform</span>
      <button class="btn" style="border-color:#00ffcc; color:#00ffcc;" onclick="document.getElementById('fIn').click()">LOAD FLOWER PNG</button>
      <input type="file" id="fIn" accept="image/png" style="display:none" onchange="handleFlowerPNG(this.files)">
      
      <div class="control-group" style="margin-top:10px;">
        <label>POS X / Y</label>
        <input type="range" id="fX" min="-1000" max="1000" value="0">
        <input type="range" id="fY" min="-1000" max="1000" value="0" style="margin-top:5px;">
      </div>
      <div class="control-group">
        <label>SCALE / BASE ROT</label>
        <input type="range" id="fS" min="0.1" max="4.0" step="0.1" value="1.0">
        <input type="range" id="fR" min="-180" max="180" value="0">
      </div>
    </div>

    <div class="ctrl-box">
      <span class="label-small">D. Petal Color Range</span>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
          <div class="control-group"><label>R Min/Max</label><input type="range" id="rMin" min="0" max="255" value="200"><input type="range" id="rMax" min="0" max="255" value="255"></div>
          <div class="control-group"><label>G Min/Max</label><input type="range" id="gMin" min="0" max="255" value="100"><input type="range" id="gMax" min="0" max="255" value="200"></div>
          <div class="control-group"><label>B Min/Max</label><input type="range" id="bMin" min="0" max="255" value="150"><input type="range" id="bMax" min="0" max="255" value="255"></div>
      </div>
    </div>
  </div>

  <div class="viz-area" id="p5-container"></div>
</div>

<div class="playbar"><div id="progFill"></div></div>

<script>
let exportRes = 'FHD', aspect = '16:9';
let isRecording = false, isPlaying = false;
let audio, fft, ampObj;
let petals = [];
let mediaRecorder, recordedChunks = [];
let canvasRef, flowerImg = null;
let smoothBass = 0, smoothMid = 0;

function setup() {
    let container = document.getElementById('p5-container');
    let w, h;
    
    // 해상도 결정
    if (exportRes === 'FHD') { w = 1920; h = 1080; }
    else { w = 3840; h = 2160; }
    
    // 비율 적용
    if (aspect === '9:16') { let temp = w; w = h; h = temp; }

    let cnv = createCanvas(w, h);
    cnv.parent(container);
    canvasRef = cnv.elt;
    
    colorMode(RGB, 255, 255, 255, 255);
    fft = new p5.FFT(0.8, 1024);
    ampObj = new p5.Amplitude();
    imageMode(CENTER);
    
    // 초기 꽃잎 필드 생성 (Style 2 용)
    initPetals();
}

function initPetals() {
    petals = [];
    for(let i=0; i<400; i++) petals.push(new Petal());
}

function draw() {
    let trVal = parseInt(document.getElementById('trail').value);
    background(3, 3, 5, trVal);

    if (!audio || !audio.isLoaded()) return;

    fft.analyze();
    let bass = fft.getEnergy("bass") / 255;
    let mid = fft.getEnergy("mid") / 255;
    smoothBass = lerp(smoothBass, bass, 0.15);
    smoothMid = lerp(smoothMid, mid, 0.1);
    let vol = ampObj.getLevel();

    let style = document.getElementById('bgStyle').value;
    let emitRate = parseInt(document.getElementById('emitRate').value);

    // --- 배경 스타일 렌더링 ---
    if (style === 'rain') {
        // 스타일 1: 꽃비 (실시간 생성 및 소멸)
        if (isPlaying && vol > 0.02) {
            let count = map(vol, 0, 0.5, 0, emitRate/5);
            for(let i=0; i<count; i++) petals.push(new Petal('rain'));
        }
    }

    for (let i = petals.length - 1; i >= 0; i--) {
        let p = petals[i];
        p.update(style, smoothBass, smoothMid, vol);
        p.display(vol);
        if (style === 'rain' && p.isOffScreen()) petals.splice(i, 1);
    }

    // --- 메인 꽃 렌더링 (Bass 반응) ---
    drawMainFlower(smoothBass);

    updateUI();
}

function drawMainFlower(bass) {
    if (!flowerImg) return;
    
    let x = width/2 + parseInt(document.getElementById('fX').value);
    let y = height/2 + parseInt(document.getElementById('fY').value);
    let s = parseFloat(document.getElementById('fS').value);
    let r = radians(parseInt(document.getElementById('fR').value));
    
    push();
    translate(x, y);
    // Bass에 반응하는 유기적인 흔들림과 펄스
    let time = millis() * 0.001;
    let audioSway = sin(time * 4) * bass * 0.1;
    let audioPulse = 1.0 + bass * 0.2;
    
    rotate(r + audioSway);
    let imgScale = (height * 0.4 / flowerImg.height) * s * audioPulse;
    image(flowerImg, 0, 0, flowerImg.width * imgScale, flowerImg.height * imgScale);
    pop();
}

class Petal {
    constructor(mode) {
        this.reset(mode);
    }

    reset(mode) {
        this.pos = createVector(random(width), mode === 'rain' ? -50 : random(height));
        this.baseY = this.pos.y;
        this.vel = createVector(random(-1, 1), random(1, 3));
        this.acc = createVector(0, 0);
        this.size = random(10, 25);
        this.angle = random(TWO_PI);
        this.rotSpeed = random(-0.05, 0.05);
        this.noiseOff = random(1000);
        
        let rMin = parseInt(document.getElementById('rMin').value);
        let rMax = parseInt(document.getElementById('rMax').value);
        let gMin = parseInt(document.getElementById('gMin').value);
        let gMax = parseInt(document.getElementById('gMax').value);
        let bMin = parseInt(document.getElementById('bMin').value);
        let bMax = parseInt(document.getElementById('bMax').value);
        this.color = color(random(rMin, rMax), random(gMin, gMax), random(bMin, bMax), 180);
    }

    update(style, bass, mid, vol) {
        if (style === 'rain') {
            let wind = map(noise(this.noiseOff, frameCount*0.01), 0, 1, -2, 2);
            this.acc.add(wind * 0.1, 0.05);
            this.vel.add(this.acc);
            this.vel.limit(5 + vol * 10);
            this.pos.add(this.vel);
            this.acc.mult(0);
        } 
        else if (style === 'waveField') {
            // 스타일 2: 화면 가득 물결 (Sway + Frequency)
            let wave = sin(this.pos.x * 0.005 + frameCount * 0.05) * 50 * mid;
            this.pos.y = this.baseY + wave + (bass * 30);
        } 
        else if (style === 'surge') {
            // 스타일 3: 파도 (횡으로 이동)
            this.pos.x += (2 + mid * 15);
            this.pos.y += sin(this.pos.x * 0.01) * 5;
            if(this.pos.x > width) this.pos.x = -50;
        }
        this.angle += this.rotSpeed + (vol * 0.2);
        this.noiseOff += 0.01;
    }

    display(vol) {
        push();
        translate(this.pos.x, this.pos.y);
        rotate(this.angle);
        noStroke();
        fill(this.color);
        let s = this.size * (0.8 + vol);
        // 기본 꽃잎 도형 (Leaf 형태)
        beginShape();
        for(let a=0; a<TWO_PI; a+=0.5) {
            let r = s * (1 + 0.5 * sin(a));
            vertex(cos(a)*r*0.4, sin(a)*r);
        }
        endShape(CLOSE);
        pop();
    }

    isOffScreen() { return (this.pos.y > height + 50 || this.pos.x < -100 || this.pos.x > width + 100); }
}

// --- 오디오 및 파일 핸들러 ---
function handleFile(files) {
    const log = document.getElementById('statusLog');
    log.innerText = "LOADING AUDIO...";
    if (audio) audio.stop();
    audio = loadSound(URL.createObjectURL(files[0]), () => {
        log.innerText = "READY: " + files[0].name;
        document.getElementById('recBtn').disabled = false;
    });
}

function handleFlowerPNG(files) {
    loadImage(URL.createObjectURL(files[0]), (img) => {
        flowerImg = img;
        document.getElementById('statusLog').innerText = "FLOWER PNG LOADED";
    });
}

function setExportRes(res) {
    exportRes = res;
    document.getElementById('resFHD').classList.toggle('active', res === 'FHD');
    document.getElementById('resUHD').classList.toggle('active', res === 'UHD');
    setup();
}

function setAspect(asp) {
    aspect = asp;
    document.getElementById('asp169').classList.toggle('active', asp === '16:9');
    document.getElementById('asp916').classList.toggle('active', asp === '9:16');
    setup();
}

async function toggleSync() {
    if (!audio || !audio.isLoaded()) return;
    if (isPlaying) {
        audio.stop();
        if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        isPlaying = false;
        document.getElementById('recBtn').innerText = "▶ START SYNC RECORD";
        document.getElementById('recBtn').classList.remove('recording');
    } else {
        if (getAudioContext().state === 'suspended') await userStartAudio();
        recordedChunks = [];
        const stream = canvasRef.captureStream(60);
        const dest = getAudioContext().createMediaStreamDestination();
        p5.soundOut.output.connect(dest);
        const combined = new MediaStream([...stream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
        
        mediaRecorder = new MediaRecorder(combined, { 
            mimeType: 'video/webm; codecs=vp9,opus',
            videoBitsPerSecond: exportRes === 'UHD' ? 50000000 : 15000000 
        });
        
        mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = saveVideo;
        
        audio.play();
        mediaRecorder.start();
        isPlaying = true;
        document.getElementById('recBtn').innerText = "■ STOP & SAVE VIDEO";
        document.getElementById('recBtn').classList.add('recording');
    }
}

function saveVideo() {
    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
    const ts = `${new Date().getHours()}${new Date().getMinutes()}${new Date().getSeconds()}`;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Spectrum_${exportRes}_${ts}.mp4`;
    a.click();
}

function updateUI() {
    if (audio && audio.isPlaying()) {
        let curr = audio.currentTime(), dur = audio.duration();
        document.getElementById('timeCode').innerText = `${nf(floor(curr/60),2)}:${nf(floor(curr%60),2)} / ${nf(floor(dur/60),2)}:${nf(floor(dur%60),2)}`;
        document.getElementById('progFill').style.width = (curr/dur * 100) + '%';
    }
}

// Slider Labels Sync
['emitRate','trail','fX','fY','fS','fR'].forEach(id => {
    let el = document.getElementById(id);
    if(el) el.oninput = function() {
        let label = document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1));
        if(label) label.innerText = this.value;
    }
});
</script>
</body>
</html>
