<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM LAB v15.0.45 — Optimized 64 Grid</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#020205; --panel:#08080f; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.12); --text:#e0f0ff; --muted:#44445a; }
body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo{letter-spacing:5px; color:var(--accent); font-weight:bold; font-size:12px;}

.main{ display:grid; grid-template-columns:380px 1fr; flex:1; min-height:0; }
.left-panel{ background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:12px; overflow-y:auto; }

.ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:10px; }
.label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}

.control-group { margin-bottom:8px; }
.control-group label { display:block; font-size:8px; color:var(--muted); margin-bottom:2px; }
.val-label { float:right; color:var(--accent); font-weight:bold; font-size:9px; }
input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; }
select { width:100%; background:#000; border:1px solid var(--border); color:var(--text); padding:8px; border-radius:4px; font-size:11px; outline:none; margin-bottom:5px; }

.btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:10px; cursor:pointer; font-size:10px; width:100%; margin-bottom:5px; transition:0.2s; }
.btn.active { background:var(--accent); color:#000; font-weight:bold;}
.btn.primary { background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:bold; font-size:11px; padding:15px; margin-top:5px; }
.btn.primary.recording { background:#fff; color:var(--accent2); animation: pulse 1s infinite; }

@keyframes pulse { 0%{opacity:1;} 50%{opacity:0.6;} 100%{opacity:1;} }

.viz-area { position:relative; display:flex; justify-content:center; align-items:center; flex:1; background:#000; overflow:hidden; }
#p5-container canvas { max-width: 100% !important; max-height: 100% !important; object-fit: contain; box-shadow: 0 0 60px rgba(0,0,0,1); }

.playbar { height:2px; background:#111; position:relative; }
#progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM LAB v15.0.45</div>
  <div id="timeCode" style="font-family:monospace; font-size:12px; color:var(--accent);">00:00 / 00:00</div>
</div>

<div class="main">
  <div class="left-panel">
    <div class="ctrl-box">
      <span class="label-small">A. System & 24FPS Export</span>
      <button class="btn" onclick="document.getElementById('mIn').click()">LOAD MP3</button>
      <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:5px;">
          <button class="btn active" id="resFHD" onclick="setExportRes('FHD')">FHD</button>
          <button class="btn" id="resUHD" onclick="setExportRes('UHD')">UHD (4K)</button>
      </div>
      <button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START SYNC RECORD (24fps)</button>
    </div>

    <div class="ctrl-box">
      <span class="label-small">B. Simulation Mode</span>
      <select id="simMode" onchange="initParticles()">
          <option value="spectralGrid">1. OPTIMIZED 64 GRID (시스템 최적화)</option>
          <option value="cosmic">2. COSMIC GLIDE (우주 활공)</option>
          <option value="flowerField">3. FLOWER FIELD RUN (꽃밭 주행)</option>
          <option value="oceanDrive">4. OCEAN SURGE (파도 주행)</option>
      </select>
      <div class="control-group">
        <label>GLOBAL SPEED/FORCE <span class="val-label" id="vSpeed">2.0</span></label>
        <input type="range" id="simSpeed" min="0.1" max="10.0" step="0.1" value="2.0">
      </div>
    </div>

    <div class="ctrl-box">
      <span class="label-small">C. Particle Advanced Dynamics</span>
      <div class="control-group">
        <label>SHAPE MORPHING (고음 반응) <span class="val-label" id="vMorph">0.0</span></label>
        <input type="range" id="morph" min="0.0" max="1.0" step="0.01" value="0.0">
      </div>
    </div>

    <div class="ctrl-box">
      <span class="label-small">D. Particle Style & Color</span>
      <button class="btn" style="border-color:#ffcc00; color:#ffcc00;" onclick="document.getElementById('pIn').click()">LOAD PETAL PNG</button>
      <input type="file" id="pIn" accept="image/png" style="display:none" onchange="handlePetalPNG(this.files)">
      
      <div class="control-group" style="margin-top:10px;">
        <label>TRAIL (잔상 효과) <span class="val-label" id="vTrail">40</span></label>
        <input type="range" id="trail" min="0" max="255" value="40">
      </div>

      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
          <div class="control-group"><label>R Range</label><input type="range" id="rMin" min="0" max="255" value="180"><input type="range" id="rMax" min="0" max="255" value="255"></div>
          <div class="control-group"><label>G Range</label><input type="range" id="gMin" min="0" max="255" value="100"><input type="range" id="gMax" min="0" max="255" value="200"></div>
          <div class="control-group"><label>B Range</label><input type="range" id="bMin" min="0" max="255" value="150"><input type="range" id="bMax" min="0" max="255" value="255"></div>
      </div>
    </div>
  </div>

  <div class="viz-area" id="p5-container"></div>
</div>

<div class="playbar"><div id="progFill"></div></div>

<script>
let exportRes = 'FHD', aspect = '16:9';
let isRecording = false, isPlaying = false;
let audio, fft, ampObj;
let particles = [];
let mediaRecorder, recordedChunks = [];
let canvasRef, flowerImg = null, petalImg = null;
let camX = 0, camY = 0, camScale = 1.0;
let smoothBass = 0;

function setup() {
    let container = document.getElementById('p5-container');
    let w = (exportRes === 'FHD') ? 1920 : 3840;
    let h = (exportRes === 'FHD') ? 1080 : 2160;
    let cnv = createCanvas(w, h);
    cnv.parent(container);
    canvasRef = cnv.elt;
    colorMode(RGB, 255, 255, 255, 255);
    // 분석 Bins 최적화 (64개에 맞춤)
    fft = new p5.FFT(0.85, 128); 
    ampObj = new p5.Amplitude();
    imageMode(CENTER);
    initParticles();
}

function initParticles() {
    particles = [];
    let mode = document.getElementById('simMode').value;
    // 64개 입자로 극적 축소
    let count = (mode === 'spectralGrid') ? 64 : 100;
    for(let i=0; i<count; i++) particles.push(new UniversalParticle(i, mode));
}

function draw() {
    let trVal = parseInt(document.getElementById('trail').value);
    background(2, 2, 8, trVal);

    let vol = 0, spectrum = [];
    if (audio && audio.isLoaded() && audio.isPlaying()) {
        spectrum = fft.analyze();
        smoothBass = lerp(smoothBass, fft.getEnergy("bass")/255, 0.15);
        vol = ampObj.getLevel();
    } else {
        push();
        fill(255, 150); textAlign(CENTER); textSize(width * 0.02);
        text("PLEASE LOAD MP3 FILE (OPTIMIZED 64 GRID)", width/2, height/2 + 100);
        pop();
    }

    let mode = document.getElementById('simMode').value;
    let morphVal = parseFloat(document.getElementById('morph').value);
    let treble = (spectrum.length > 0) ? fft.getEnergy("treble")/255 : 0;

    push();
    translate(camX + width/2, camY + height/2);
    scale(camScale);
    translate(-width/2, -height/2);

    for (let p of particles) {
        let freq = (spectrum.length > 0) ? spectrum[p.id % spectrum.length] / 255 : 0;
        p.update(mode, freq, vol, smoothBass);
        // Morphing 옵션 전달
        p.display(freq, vol, morphVal, treble);
    }
    pop();
    updateUI();
}

class UniversalParticle {
    constructor(id, mode) {
        this.id = id;
        this.reset(mode);
    }
    reset(mode) {
        if (mode === 'spectralGrid') {
            // 8x8 그리드로 재배치
            let cols = 8, rows = 8;
            let spacingX = width / cols;
            let spacingY = height / rows;
            this.origin = createVector((this.id % cols) * spacingX + spacingX/2, floor(this.id / cols) * spacingY + spacingY/2);
            this.pos = this.origin.copy();
        } else if (mode === 'cosmic') {
            this.pos = createVector(random(-width, width), random(-height, height), random(width));
        } else {
            this.pos = createVector(random(width*0.1, width*0.9), random(height*0.1, height*0.9));
            this.origin = this.pos.copy();
        }
        this.angle = random(TWO_PI);
        // 기본 크기를 키워서 풍성하게
        this.size = random(40, 80);
        this.r = random(parseInt(rMin.value), parseInt(rMax.value));
        this.g = random(parseInt(gMin.value), parseInt(gMax.value));
        this.b = random(parseInt(bMin.value), parseInt(bMax.value));
    }
    update(mode, freq, vol, bass) {
        let speed = parseFloat(document.getElementById('simSpeed').value);
        if (mode === 'spectralGrid') {
            this.pos.y = this.origin.y - freq * 200 * speed;
            this.angle += 0.02 + freq * 0.15 * speed;
        } else if (mode === 'cosmic') {
            this.pos.z -= speed * 12 * (1 + bass * 2);
            if (this.pos.z < 1) this.pos.z = width;
        } else if (mode === 'flowerField') {
            this.pos.y += speed * 15 * (1 + vol * 2);
            if (this.pos.y > height) this.pos.y = -50;
        } else if (mode === 'oceanDrive') {
            this.pos.x -= speed * 18 * (1 + bass * 2);
            this.pos.y = this.origin.y + sin(this.pos.x * 0.015) * 80 * vol;
            if (this.pos.x < -100) this.pos.x = width + 100;
        }
    }
    display(freq, vol, morphVal, treble) {
        push();
        let sx = this.pos.x, sy = this.pos.y, sz = this.size;
        let mode = document.getElementById('simMode').value;
        if (mode === 'cosmic') {
            sx = map(this.pos.x / this.pos.z, 0, 1, 0, width) + width/2;
            sy = map(this.pos.y / this.pos.z, 0, 1, 0, height) + height/2;
            sz = map(this.pos.z, 0, width, 100, 1);
        }
        translate(sx, sy);
        rotate(this.angle);
        tint(this.r, this.g, this.b, 200);
        // 스케일 반응을 더 크게
        let finalSz = sz * (0.8 + freq * 2.0);
        if (petalImg) image(petalImg, 0, 0, petalImg.width*(finalSz/200), petalImg.height*(finalSz/200));
        else { 
            // Shape Morphing 구현 (Treble 반응)
            noStroke(); fill(this.r, this.g, this.b, 150);
            let morphFactor = lerp(0.5, 1.2, mid(0, morphVal, mid(0, morphVal, treble))); // mid -> mid 였음. mid는 없음.
            ellipse(0, 0, finalSz * morphFactor, finalSz);
        }
        pop();
    }
}

// SYSTEM HANDLERS
function handleFile(files) {
    if (audio) audio.stop();
    audio = loadSound(URL.createObjectURL(files[0]), () => {
        document.getElementById('recBtn').disabled = false;
        isPlaying = false;
    });
}
function handlePetalPNG(files) { loadImage(URL.createObjectURL(files[0]), (img) => { petalImg = img; initParticles(); }); }
function setExportRes(res) { exportRes = res; setup(); }

async function toggleSync() {
    if (!audio || !audio.isLoaded()) return;
    if (isPlaying) {
        audio.stop(); if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        isPlaying = false;
        document.getElementById('recBtn').innerText = "▶ START SYNC RECORD (24fps)";
        document.getElementById('recBtn').classList.remove('recording');
    } else {
        if (getAudioContext().state === 'suspended') await userStartAudio();
        recordedChunks = [];
        const stream = canvasRef.captureStream(24);
        const dest = getAudioContext().createMediaStreamDestination();
        p5.soundOut.output.connect(dest);
        const combined = new MediaStream([...stream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
        mediaRecorder = new MediaRecorder(combined, { 
            mimeType: 'video/webm; codecs=vp9,opus',
            videoBitsPerSecond: exportRes === 'UHD' ? 60000000 : 20000000 
        });
        mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = saveVideo;
        audio.play(); mediaRecorder.start(); isPlaying = true;
        document.getElementById('recBtn').innerText = "■ STOP & SAVE 24FPS VIDEO";
        document.getElementById('recBtn').classList.add('recording');
    }
}
function saveVideo() {
    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `Opt64_v45_${new Date().getTime()}.mp4`; a.click();
}
function updateUI() {
    if (audio && audio.isPlaying()) {
        let curr = audio.currentTime(), dur = audio.duration();
        document.getElementById('timeCode').innerText = `${nf(floor(curr/60),2)}:${nf(floor(curr%60),2)} / ${nf(floor(dur/60),2)}:${nf(floor(dur%60),2)}`;
        document.getElementById('progFill').style.width = (curr/dur * 100) + '%';
    }
}

// Slider label display
['simSpeed','morph','trail','rMin','rMax','gMin','gMax','bMin','bMax'].forEach(id => {
    let el = document.getElementById(id);
    if(el) el.oninput = function() { document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1)).innerText = this.value; }
});
</script>
</body>
</html>
