<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM LAB v15.0.50 — Procedural Choreography</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#020205; --panel:#08080f; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.15); --text:#e0f0ff; --muted:#44445a; }
body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo{letter-spacing:5px; color:var(--accent); font-weight:bold; font-size:12px;}

.main{ display:grid; grid-template-columns:380px 1fr; flex:1; min-height:0; }
.left-panel{ background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:12px; overflow-y:auto; }

.ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:10px; }
.label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}

.control-group { margin-bottom:8px; }
.control-group label { display:block; font-size:8px; color:var(--muted); margin-bottom:2px; }
.val-label { float:right; color:var(--accent); font-weight:bold; font-size:9px; }
input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; }
select { width:100%; background:#000; border:1px solid var(--border); color:var(--text); padding:8px; border-radius:4px; font-size:11px; outline:none; margin-bottom:5px; }

.btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:10px; cursor:pointer; font-size:10px; width:100%; margin-bottom:5px; transition:0.2s; }
.btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.btn.primary { background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:bold; font-size:11px; padding:15px; margin-top:5px; }
.btn.primary:disabled { opacity: 0.3; cursor: not-allowed; }

.viz-area { position:relative; display:flex; justify-content:center; align-items:center; flex:1; background:#000; overflow:hidden; }
#p5-container canvas { max-width: 100% !important; max-height: 100% !important; object-fit: contain; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM LAB v15.0.50</div>
  <div id="timeCode" style="font-family:monospace; font-size:12px; color:var(--accent);">00:00 / 00:00</div>
</div>

<div class="main">
  <div class="left-panel">
    <div class="ctrl-box">
      <span class="label-small">1. Audio Analysis</span>
      <button class="btn" onclick="document.getElementById('mIn').click()">SELECT MP3</button>
      <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
      <button class="btn" id="analyzeBtn" onclick="runAnalysis()" disabled style="border-color:#ffcc00; color:#ffcc00;">PRE-ANALYZE (24 BANDS)</button>
      <div id="statusLog" style="font-size:10px; text-align:center; color:#ffcc00;">Wait for load...</div>
    </div>

    <div class="ctrl-box">
      <span class="label-small">2. Procedural Choreography</span>
      <div class="control-group">
        <label>PLACEMENT (배치)</label>
        <select id="placeMode" onchange="initParticles()">
            <option value="balanced">Balanced (균형)</option>
            <option value="side">Side (사이드)</option>
            <option value="floor">Floor (바닥)</option>
            <option value="center">Center (중앙)</option>
        </select>
      </div>
      <div class="control-group">
        <label>MOTION STYLE (움직임)</label>
        <select id="moveMode">
            <option value="upDown">Up & Down</option>
            <option value="leftRight">Left & Right</option>
            <option value="circular">Circular (원형)</option>
            <option value="perlin">Perlin Noise</option>
            <option value="noise1">Noise Level 1 (Smooth)</option>
            <option value="noise2">Noise Level 2 (Vivid)</option>
            <option value="noise3">Noise Level 3 (Fast)</option>
            <option value="noise4">Noise Level 4 (Chaos)</option>
        </select>
      </div>
      <div class="control-group">
        <label>GLOBAL SCALE <span class="val-label" id="vPScale">1.0</span></label>
        <input type="range" id="pScale" min="0.1" max="4.0" step="0.1" value="1.0">
      </div>
      <div class="control-group">
        <label>REACTION FORCE <span class="val-label" id="vSimF">2.0</span></label>
        <input type="range" id="simF" min="0.1" max="10.0" step="0.1" value="2.0">
      </div>
    </div>

    <div class="ctrl-box">
      <span class="label-small">3. Assets & Mood</span>
      <button class="btn" style="border-color:#ffcc00; color:#ffcc00;" onclick="document.getElementById('pIn').click()">LOAD PETAL PNG</button>
      <input type="file" id="pIn" accept="image/png" style="display:none" onchange="handlePetal(this.files)">
      
      <button class="btn" style="border-color:#00ffcc; color:#00ffcc;" onclick="document.getElementById('bgIn').click()">LOAD BACKGROUND PNG</button>
      <input type="file" id="bgIn" accept="image/png, image/jpeg" style="display:none" onchange="handleBG(this.files)">
      
      <div class="control-group" style="margin-top:8px;">
        <label>TRAIL (잔상) <span class="val-label" id="vTrail">40</span></label>
        <input type="range" id="trail" min="0" max="255" value="40">
      </div>
    </div>

    <div class="ctrl-box">
      <span class="label-small">4. Export Config</span>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-bottom:5px;">
          <button class="btn active" id="resFHD" onclick="setExportRes('FHD')">FHD</button>
          <button class="btn" id="resUHD" onclick="setExportRes('UHD')">UHD</button>
      </div>
      <button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START RECORD (24fps)</button>
    </div>
  </div>

  <div class="viz-area" id="p5-container"></div>
</div>

<div class="playbar"><div id="progFill"></div></div>

<script>
let exportRes = 'FHD', isRecording = false, isPlaying = false;
let audio, fft, ampObj;
let particles = [];
let mediaRecorder, recordedChunks = [];
let canvasRef, bgImg = null, petalImg = null;
let isAnalyzed = false;

function setup() {
    let container = document.getElementById('p5-container');
    let w = (exportRes === 'FHD') ? 1920 : 3840;
    let h = (exportRes === 'FHD') ? 1080 : 2160;
    let cnv = createCanvas(w, h);
    cnv.parent(container);
    canvasRef = cnv.elt;
    colorMode(RGB, 255, 255, 255, 255);
    fft = new p5.FFT(0.8, 256);
    ampObj = new p5.Amplitude();
    imageMode(CENTER);
    initParticles();
}

function initParticles() {
    particles = [];
    let pMode = document.getElementById('placeMode').value;
    for(let i=0; i<24; i++) {
        particles.push(new ProceduralParticle(i, pMode));
    }
}

async function runAnalysis() {
    if (!audio) return;
    isAnalyzed = true;
    document.getElementById('statusLog').innerText = "24-BAND ANALYSIS READY";
    document.getElementById('recBtn').disabled = false;
}

function draw() {
    let trVal = parseInt(document.getElementById('trail').value);
    background(2, 2, 8, trVal);

    let vol = 0, bands = new Array(24).fill(0);
    if (audio && audio.isPlaying()) {
        fft.analyze();
        vol = ampObj.getLevel();
        for(let i=0; i<24; i++) {
            bands[i] = fft.getEnergy(pow(2, i/2)*20, pow(2, (i+1)/2)*20) / 255;
        }
    } else {
        push(); fill(255, 120); textAlign(CENTER); textSize(width*0.012);
        text(isAnalyzed ? "READY TO RECORD" : "LOAD MUSIC → PRE-ANALYZE", width/2, height/2 + 200);
        pop();
    }

    // 1. Background Pulse (Bass)
    drawBackground(bands[2] || 0);

    // 2. 24 Semantic Particles
    let mMode = document.getElementById('moveMode').value;
    let force = parseFloat(document.getElementById('simF').value);
    let scale = parseFloat(document.getElementById('pScale').value);

    for (let p of particles) {
        let bVal = bands[p.id] || 0;
        p.update(bVal, mMode, force);
        p.display(bVal, scale);
    }

    updateUI();
}

function drawBackground(bass) {
    if (!bgImg) return;
    push();
    translate(width/2, height/2);
    let pulse = 1.0 + (bass * 0.05); // 0.05 고정 혹은 조절가능
    let finalScale = max(width/bgImg.width, height/bgImg.height) * pulse;
    image(bgImg, 0, 0, bgImg.width * finalScale, bgImg.height * finalScale);
    pop();
}

class ProceduralParticle {
    constructor(id, placeMode) {
        this.id = id;
        this.angle = random(TWO_PI);
        this.size = random(150, 300);
        this.noiseOff = random(1000);
        this.color = color(random(150, 255), random(150, 255), random(200, 255), 200);
        this.resetPosition(placeMode);
    }

    resetPosition(mode) {
        const W = width, H = height;
        if(mode === 'center') {
            this.origin = createVector(W/2 + random(-W*0.1, W*0.1), H/2 + random(-H*0.1, H*0.1));
        } else if(mode === 'side') {
            this.origin = (random() > 0.5) ? createVector(random(W*0.1), random(H)) : createVector(W - random(W*0.1), random(H));
        } else if(mode === 'floor') {
            this.origin = createVector(random(W), H - random(H*0.2));
        } else { // balanced
            this.origin = createVector(random(W*0.05, W*0.95), random(H*0.05, H*0.95));
        }
        this.pos = this.origin.copy();
    }

    update(amp, moveMode, force) {
        let time = frameCount * 0.02;
        let shift = amp * 200 * force;

        if (moveMode === 'upDown') {
            this.pos.y = this.origin.y + sin(time + this.id) * shift;
        } else if (moveMode === 'leftRight') {
            this.pos.x = this.origin.x + cos(time + this.id) * shift;
        } else if (moveMode === 'circular') {
            this.pos.x = this.origin.x + cos(time + this.id) * shift;
            this.pos.y = this.origin.y + sin(time + this.id) * shift;
        } else if (moveMode.startsWith('noise')) {
            let nScale = parseInt(moveMode.slice(-1)) * 0.01;
            let nx = (noise(this.noiseOff, frameCount * nScale) - 0.5) * 500 * amp * force;
            let ny = (noise(this.noiseOff + 100, frameCount * nScale) - 0.5) * 500 * amp * force;
            this.pos.x = this.origin.x + nx;
            this.pos.y = this.origin.y + ny;
        } else { // Perlin (Basic)
            this.pos.x = this.origin.x + (noise(this.id, time) - 0.5) * shift;
            this.pos.y = this.origin.y + (noise(this.id + 50, time) - 0.5) * shift;
        }
        
        this.angle += 0.01 + amp * 0.1;
        this.noiseOff += 0.005;
    }

    display(amp, scale) {
        push();
        translate(this.pos.x, this.pos.y);
        rotate(this.angle);
        let finalSz = this.size * scale * (0.8 + amp * 2.5);
        if (petalImg) {
            tint(this.color);
            image(petalImg, 0, 0, petalImg.width * (finalSz/500), petalImg.height * (finalSz/500));
        } else {
            noStroke(); fill(this.color);
            ellipse(0, 0, finalSz * 0.6, finalSz);
        }
        pop();
    }
}

// Handlers
function handleFile(files) {
    if (audio) audio.stop();
    audio = loadSound(URL.createObjectURL(files[0]), () => {
        document.getElementById('statusLog').innerText = "LOADED: " + files[0].name;
        document.getElementById('analyzeBtn').disabled = false;
    });
}
function handleBG(files) { loadImage(URL.createObjectURL(files[0]), (img) => { bgImg = img; }); }
function handlePetal(files) { loadImage(URL.createObjectURL(files[0]), (img) => { petalImg = img; initParticles(); }); }
function setExportRes(res) { exportRes = res; setup(); }

async function toggleSync() {
    if (!audio || !isAnalyzed) return;
    if (isPlaying) {
        audio.stop(); if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        isPlaying = false;
        document.getElementById('recBtn').innerText = "▶ START RECORD";
    } else {
        if (getAudioContext().state === 'suspended') await userStartAudio();
        recordedChunks = [];
        const stream = canvasRef.captureStream(24);
        const dest = getAudioContext().createMediaStreamDestination();
        p5.soundOut.output.connect(dest);
        const combined = new MediaStream([...stream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
        mediaRecorder = new MediaRecorder(combined, { 
            mimeType: 'video/webm; codecs=vp9,opus',
            videoBitsPerSecond: exportRes === 'UHD' ? 60000000 : 20000000 
        });
        mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = saveVideo;
        audio.play(); mediaRecorder.start(); isPlaying = true;
        document.getElementById('recBtn').innerText = "■ STOP & SAVE";
    }
}
function saveVideo() {
    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `Procedural_V50_${new Date().getTime()}.mp4`; a.click();
}
function updateUI() {
    if (audio && audio.isPlaying()) {
        let curr = audio.currentTime(), dur = audio.duration();
        document.getElementById('timeCode').innerText = `${nf(floor(curr/60),2)}:${nf(floor(curr%60),2)} / ${nf(floor(dur/60),2)}:${nf(floor(dur%60),2)}`;
        document.getElementById('progFill').style.width = (curr/dur * 100) + '%';
    }
}

// Label Update Fix
const syncIds = ['pScale','simF','trail'];
syncIds.forEach(id => {
    let el = document.getElementById(id);
    if(el) el.oninput = function() { 
        let label = document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1));
        if(label) label.innerText = this.value;
    }
});
</script>
</body>
</html>
