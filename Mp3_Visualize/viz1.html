<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM LAB v15.0.35 — Precision Tri-Band</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#030305; --panel:#0a0a10; --accent:#00ffcc; --accent2:#ff77aa; --border:rgba(0,255,204,0.15); --text:#fff0f5; --muted:#554455; --group-bg:rgba(255,255,255,0.01); }
body{ background:var(--bg); color:var(--text); font-family:'Pretendard',monospace; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo{letter-spacing:5px; color:var(--accent); font-weight:bold; font-size:13px;}

.main{ display:grid; grid-template-columns:400px 1fr; flex:1; min-height:0; }
.left-panel{ background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:12px; overflow-y:auto; }

.ctrl-box { background:var(--group-bg); border:1px solid var(--border); border-radius:8px; padding:10px; margin-bottom:12px; }
.label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}
.label-sub { font-size:8px; color:var(--accent2); margin-top:5px; display:block; text-transform: uppercase;}

.control-group { margin-bottom:8px; }
.control-group label { display:block; font-size:8px; color:var(--muted); margin-bottom:2px; }
.val-label { float:right; color:var(--accent); font-weight:bold; font-size:9px; }
input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; }
select { width:100%; background:#000; border:1px solid var(--border); color:var(--text); padding:6px; border-radius:4px; font-size:11px; outline:none; }

.rgb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 5px; }

.btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:8px; cursor:pointer; font-size:9px; width:100%; margin-bottom:5px; transition:0.2s; }
.btn:hover { background:rgba(0,255,204,0.1); border-color: var(--accent); }
.btn.active { background:var(--accent); color:#000; }
.btn.primary { background:#ff3377; border-color:#ff3377; color:#fff; font-weight:bold; font-size:11px; padding:14px; margin-top:5px; }
.btn.primary.recording { background:#fff; color:#ff3377; animation: pulse 1s infinite; }

@keyframes pulse { 0%{opacity:1;} 50%{opacity:0.6;} 100%{opacity:1;} }

.viz-area { position:relative; display:flex; justify-content:center; align-items:center; flex:1; background:#000; overflow:hidden;}
#p5-container canvas { box-shadow: 0 0 40px rgba(0,0,0,0.8); border:1px solid #1a1a1a; }

.playbar { height:2px; background:#111; position:relative; }
#progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }

.status-log { font-size:10px; color:var(--muted); margin-top:4px; text-align:center; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM LAB v15.0.35</div>
  <div id="timeCode" style="font-family:monospace; font-size:13px; color:var(--accent);">00:00 / 00:00</div>
</div>

<div class="main">
  <div class="left-panel">
    <div class="ctrl-box">
      <span class="label-small">A. Audio & Canvas</span>
      <button class="btn" onclick="document.getElementById('mIn').click()">LOAD MP3 FILE</button>
      <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
      <div id="statusLog" class="status-log">No file loaded</div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:5px;">
        <button class="btn active" id="res169" onclick="setRes('16:9')">16:9</button>
        <button class="btn" id="res916" onclick="setRes('9:16')">9:16</button>
      </div>
      <button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START SYNC RECORD</button>
    </div>

    <div class="ctrl-box">
      <span class="label-small">E. Precise Asset Transform</span>
      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; margin-bottom:10px;">
          <button class="btn" style="color:#00ffcc;" onclick="document.getElementById('stemIn').click()">STEM PNG</button>
          <button class="btn" style="color:#ffcc00;" onclick="document.getElementById('leafIn').click()">LEAF PNG</button>
          <button class="btn" style="color:#ff77aa;" onclick="document.getElementById('flowerIn').click()">FLOWER PNG</button>
      </div>
      <input type="file" id="stemIn" accept="image/png" style="display:none" onchange="loadAsset('stem', this.files)">
      <input type="file" id="leafIn" accept="image/png" style="display:none" onchange="loadAsset('leaf', this.files)">
      <input type="file" id="flowerIn" accept="image/png" style="display:none" onchange="loadAsset('flower', this.files)">

      <span class="label-sub">1. Stem (Bass Response)</span>
      <div class="control-group">
          <label>POS X / Y</label>
          <input type="range" id="stemX" min="-500" max="500" value="0">
          <input type="range" id="stemY" min="-500" max="500" value="0">
      </div>
      <div class="control-group">
          <label>SCALE / BASE ROT</label>
          <input type="range" id="stemS" min="0.1" max="3.0" step="0.1" value="1.0">
          <input type="range" id="stemR" min="-180" max="180" value="0">
      </div>

      <span class="label-sub">2. Leaf (Mid Response)</span>
      <div class="control-group">
          <label>POS X / Y</label>
          <input type="range" id="leafX" min="-500" max="500" value="0">
          <input type="range" id="leafY" min="-500" max="500" value="0">
      </div>
      <div class="control-group">
          <label>SCALE / BASE ROT</label>
          <input type="range" id="leafS" min="0.1" max="3.0" step="0.1" value="1.0">
          <input type="range" id="leafR" min="-180" max="180" value="0">
      </div>

      <span class="label-sub">3. Flower (Treble Response)</span>
      <div class="control-group">
          <label>POS X / Y</label>
          <input type="range" id="flowerX" min="-500" max="500" value="0">
          <input type="range" id="flowerY" min="-500" max="500" value="0">
      </div>
      <div class="control-group">
          <label>SCALE / BASE ROT</label>
          <input type="range" id="flowerS" min="0.1" max="3.0" step="0.1" value="1.0">
          <input type="range" id="flowerR" min="-180" max="180" value="0">
      </div>
    </div>

    <div class="ctrl-box">
      <span class="label-small">B. Global Reaction</span>
      <div class="control-group">
        <label>REACTION SENSE (감도) <span class="val-label" id="vSway">8</span></label>
        <input type="range" id="sway" min="1" max="20" value="8">
      </div>
      <div class="control-group">
        <label>EMISSION RATE <span class="val-label" id="vEmit">30</span></label>
        <input type="range" id="emitRate" min="0" max="100" value="30">
      </div>
      <div class="control-group">
        <label>TRAIL (잔상) <span class="val-label" id="vTrail">40</span></label>
        <input type="range" id="trail" min="0" max="150" value="40">
      </div>
    </div>
  </div>

  <div class="viz-area" id="p5-container"></div>
</div>

<div class="playbar"><div id="progFill"></div></div>

<script>
let aspect = '16:9', isRecording = false, isPlaying = false;
let audio, fft, ampObj;
let petals = [];
let mediaRecorder, recordedChunks = [];
let canvasRef;

// Assets Storage
let assets = { stem: null, leaf: null, flower: null };

function setup() {
    let container = document.getElementById('p5-container');
    let w = aspect === '16:9' ? 1280 : 720;
    let h = aspect === '16:9' ? 720 : 1280;
    let cnv = createCanvas(w, h);
    cnv.parent(container);
    canvasRef = cnv.elt;
    
    colorMode(RGB, 255, 255, 255, 255);
    fft = new p5.FFT();
    ampObj = new p5.Amplitude();
    
    cnv.style('max-width', '100%');
    cnv.style('max-height', '100%');
    cnv.style('height', 'auto');
    cnv.style('width', 'auto');
    imageMode(CENTER);
}

function draw() {
    let trVal = parseInt(document.getElementById('trail').value);
    background(3, 3, 5, trVal);

    fft.analyze();
    let bass = fft.getEnergy("bass") / 255;
    let mid = fft.getEnergy("mid") / 255;
    let treble = fft.getEnergy("treble") / 255;
    let vol = ampObj.getLevel();

    if (isPlaying && audio && audio.isPlaying()) {
        // 입자 시뮬레이션 (Mid/Treble)
        let emitRate = parseInt(document.getElementById('emitRate').value);
        if (vol > 0.02) {
            let spawn = map(vol, 0, 0.6, 0, emitRate/3);
            for(let i=0; i<spawn; i++) { petals.push(new Petal()); }
        }
        for (let i = petals.length - 1; i >= 0; i--) {
            let p = petals[i];
            p.applyForce(mid * 5, 0.08);
            p.update();
            p.display(vol);
            if (p.isOffScreen()) petals.splice(i, 1);
        }
    }

    // 메인 정밀 트랜스폼 식물 렌더링
    drawPreciseFlower(bass, mid, treble);
    updateUI();
}

// --- 핵심: 부위별 정밀 트랜스폼 로직 ---
function drawPreciseFlower(bass, mid, treble) {
    const W = width, H = height;
    let sense = parseInt(document.getElementById('sway').value);
    let time = millis() * 0.001;

    // 1. STEM (저음 반응)
    if (assets.stem) {
        push();
        let x = W/2 + parseInt(document.getElementById('stemX').value);
        let y = H + parseInt(document.getElementById('stemY').value);
        let s = parseFloat(document.getElementById('stemS').value);
        let r = radians(parseInt(document.getElementById('stemR').value));
        
        translate(x, y);
        let audioSway = sin(time * 5) * bass * sense * 0.04;
        rotate(r + audioSway);
        
        let sc = (H * 0.8 / assets.stem.height) * s * (1.0 + bass * 0.1);
        image(assets.stem, 0, -assets.stem.height * sc / 2, assets.stem.width * sc, assets.stem.height * sc);
        pop();
    }

    // 2. LEAF (중음 반응)
    if (assets.leaf) {
        push();
        let x = W/2 + parseInt(document.getElementById('leafX').value);
        let y = H + parseInt(document.getElementById('leafY').value);
        let s = parseFloat(document.getElementById('leafS').value);
        let r = radians(parseInt(document.getElementById('leafR').value));
        
        translate(x, y);
        let audioShake = sin(time * 12) * mid * sense * 0.02;
        rotate(r + audioShake);
        
        let sc = (H * 0.8 / assets.leaf.height) * s * (1.0 + mid * 0.15);
        image(assets.leaf, 0, -assets.leaf.height * sc / 2, assets.leaf.width * sc, assets.leaf.height * sc);
        pop();
    }

    // 3. FLOWER (고음 반응)
    if (assets.flower) {
        push();
        let x = W/2 + parseInt(document.getElementById('flowerX').value);
        let y = H + parseInt(document.getElementById('flowerY').value);
        let s = parseFloat(document.getElementById('flowerS').value);
        let r = radians(parseInt(document.getElementById('flowerR').value));
        
        translate(x, y);
        let audioJitter = sin(time * 25) * treble * sense * 0.015;
        rotate(r + audioJitter);
        
        let sc = (H * 0.8 / assets.flower.height) * s * (1.0 + treble * 0.3);
        image(assets.flower, 0, -assets.flower.height * sc / 2, assets.flower.width * sc, assets.flower.height * sc);
        pop();
    }
}

// 입자 클래스 (v15.0.34 동일)
class Petal {
    constructor() {
        this.pos = createVector(random(width), -30);
        this.vel = createVector(random(-0.5, 0.5), random(1, 2.5));
        this.acc = createVector(0, 0);
        this.angle = random(TWO_PI);
        this.rotSpeed = random(-0.04, 0.04);
        this.size = random(8, 15);
        this.noiseOff = random(1000);
    }
    applyForce(wind, grav) {
        let w = map(noise(this.noiseOff, frameCount * 0.01), 0, 1, -wind, wind);
        this.acc.add(w * 0.02, grav);
        this.noiseOff += 0.01;
    }
    update() { this.vel.add(this.acc); this.vel.limit(4); this.pos.add(this.vel); this.acc.mult(0); this.angle += this.rotSpeed; }
    display(amp) {
        push(); translate(this.pos.x, this.pos.y); rotate(this.angle);
        let s = this.size * (0.8 + amp*0.3); noStroke(); fill(255, 120, 180, 180);
        ellipse(0, 0, s*0.7, s); pop();
    }
    isOffScreen() { return (this.pos.y > height + 50 || this.pos.x < -50 || this.pos.x > width + 50); }
}

// 파일 및 오디오 시스템
function handleFile(files) {
    const log = document.getElementById('statusLog');
    log.innerText = "LOADING AUDIO...";
    if (audio) audio.stop();
    audio = loadSound(URL.createObjectURL(files[0]), () => {
        log.innerText = "READY: " + files[0].name;
        document.getElementById('recBtn').disabled = false;
    });
}
function loadAsset(type, files) {
    loadImage(URL.createObjectURL(files[0]), (img) => {
        assets[type] = img;
        document.getElementById('statusLog').innerText = type.toUpperCase() + " LOADED";
    });
}
function toggleSync() { if (!audio || !audio.isLoaded()) return; if (isPlaying) stopRecording(); else startRecording(); }
async function startRecording() {
    if (getAudioContext().state === 'suspended') await userStartAudio();
    recordedChunks = [];
    const stream = canvasRef.captureStream(60);
    const dest = getAudioContext().createMediaStreamDestination();
    p5.soundOut.output.connect(dest);
    const combined = new MediaStream([...stream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
    mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/webm; codecs=vp9,opus' });
    mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = saveVideo;
    audio.play(); mediaRecorder.start(); isPlaying = true;
    document.getElementById('recBtn').innerText = "■ STOP & SAVE MP4";
    document.getElementById('recBtn').classList.add('recording');
}
function stopRecording() { audio.stop(); if(mediaRecorder.state !== 'inactive') mediaRecorder.stop(); isPlaying = false; document.getElementById('recBtn').innerText = "▶ START SYNC RECORD"; document.getElementById('recBtn').classList.remove('recording'); }
function saveVideo() { const blob = new Blob(recordedChunks, { type: 'video/mp4' }); const ts = `${new Date().getHours()}${new Date().getMinutes()}${new Date().getSeconds()}`; const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Precision_Flower_${ts}.mp4`; a.click(); }
function setRes(r) { aspect = r; setup(); }
function updateUI() {
    if (audio && audio.isPlaying()) {
        let curr = audio.currentTime(), dur = audio.duration();
        document.getElementById('timeCode').innerText = `${nf(floor(curr/60),2)}:${nf(floor(curr%60),2)} / ${nf(floor(dur/60),2)}:${nf(floor(dur%60),2)}`;
        document.getElementById('progFill').style.width = (curr/dur * 100) + '%';
    }
}
</script>
</body>
</html>
