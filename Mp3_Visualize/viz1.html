<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM ART LAB v15.0.27 — Botanical Simulation</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#050508; --panel:#0d0d15; --accent:#00ffcc; --border:rgba(0,255,204,0.15); --text:#e0f0ff; --muted:#44445a; --group-bg:rgba(255,255,255,0.02); }
body{ background:var(--bg); color:var(--text); font-family:'Courier New',monospace; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

/* LAYOUT */
.topbar{ padding:12px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.logo{letter-spacing:6px; color:var(--accent); font-weight:bold; font-size:14px;}

.main{ display:grid; grid-template-columns:380px 1fr; flex:1; min-height:0; }
.left-panel{ background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:15px; overflow-y:auto; }

/* GROUPING UI */
.ctrl-group-box { background:var(--group-bg); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:15px; }
.group-label { font-size:9px; color:var(--accent); letter-spacing:3px; text-transform:uppercase; margin-bottom:10px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:4px;}

.control-group { margin-bottom:10px; }
.control-group label { display:block; font-size:9px; color:var(--muted); margin-bottom:4px; }
.val-label { float:right; color:var(--accent); font-weight:bold; font-size:10px; }
input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:3px; }

.btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:10px; cursor:pointer; font-family:monospace; font-size:10px; width:100%; margin-bottom:5px; transition:0.2s; }
.btn.active { background:var(--accent); color:#000; }
.btn.primary { background:#ff3366; border-color:#ff3366; color:#fff; font-weight:bold; font-size:12px; padding:15px; margin-top:5px; }
.btn.primary.recording { background:#fff; color:#ff3366; animation: pulse 1s infinite; }

@keyframes pulse { 0%{opacity:1;} 50%{opacity:0.6;} 100%{opacity:1;} }

.viz-area { background:#000; position:relative; display:flex; justify-content:center; align-items:center; overflow:hidden; flex:1; }
#artCanvas { background:#000; box-shadow: 0 0 40px rgba(0,0,0,0.8); }

.playbar { height:4px; background:#111; position:relative; flex-shrink:0; }
#progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM ART LAB v15.0.27</div>
  <div id="timeCode" style="font-family:monospace; font-size:13px; color:var(--accent);">00:00 / 00:00</div>
</div>

<div class="main">
  <div class="left-panel">
    
    <div class="ctrl-group-box">
      <span class="group-label">A. System & Record</span>
      <button class="btn" onclick="document.getElementById('mIn').click()">LOAD MP3</button>
      <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleMusic(this.files)">
      
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin:5px 0;">
        <button class="btn active" id="res169" onclick="setRes('16:9')">16:9</button>
        <button class="btn" id="res916" onclick="setRes('9:16')">9:16</button>
      </div>
      <button class="btn primary" id="recBtn" onclick="startSync()">▶ START SYNC RECORD</button>
    </div>

    <div class="ctrl-group-box">
      <span class="group-label">B. Environment (Rain/Water)</span>
      <div class="control-group">
        <label>RAIN (낙하) <span class="val-label" id="vRain">30</span></label>
        <input type="range" id="rain" min="0" max="100" value="30">
      </div>
      <div class="control-group">
        <label>RIPPLE (물결) <span class="val-label" id="vRipple">20</span></label>
        <input type="range" id="ripple" min="0" max="100" value="20">
      </div>
    </div>

    <div class="ctrl-group-box">
      <span class="group-label">C. Botanical Morpher</span>
      <div class="control-group">
        <label>CLASSIC BLOOM (개화) <span class="val-label" id="vBloom">40</span></label>
        <input type="range" id="bloom" min="0" max="100" value="40">
      </div>
      <div class="control-group">
        <label>PHYLLOTAXIS (씨앗 나선) <span class="val-label" id="vPhy">0</span></label>
        <input type="range" id="phy" min="0" max="100" value="0">
      </div>
      <div class="control-group">
        <label>MANDALA (기하학 꽃) <span class="val-label" id="vMan">0</span></label>
        <input type="range" id="man" min="0" max="100" value="0">
      </div>
      <div class="control-group">
        <label>VINES (덩굴 줄기) <span class="val-label" id="vVine">0</span></label>
        <input type="range" id="vine" min="0" max="100" value="0">
      </div>
      <div class="control-group">
        <label>POLLEN DRIFT (꽃가루) <span class="val-label" id="vPol">20</span></label>
        <input type="range" id="pol" min="0" max="100" value="20">
      </div>
    </div>

    <div class="ctrl-group-box">
      <span class="group-label">D. Physics & Style</span>
      <div class="control-group">
        <label>SENSITIVITY <span class="val-label" id="vSense">8</span></label>
        <input type="range" id="sense" min="1" max="15" value="8">
      </div>
      <div class="control-group">
        <label>COLOR HUE <span class="val-label" id="vHue">280</span></label>
        <input type="range" id="hue" min="0" max="360" value="280">
      </div>
      <div class="control-group">
        <label>TRAIL POWER <span class="val-label" id="vTrail">0.15</span></label>
        <input type="range" id="trail" min="0.01" max="0.5" step="0.01" value="0.15">
      </div>
    </div>

  </div>

  <div class="viz-area">
    <canvas id="artCanvas"></canvas>
  </div>
</div>

<div class="playbar"><div id="progFill"></div></div>

<script>
let aspect = '16:9', isRecording = false, isPlaying = false;
let audioCtx, analyser, source, audioBuffer, startTime = 0;
let mediaRecorder, recordedChunks = [];
const canvas = document.getElementById('artCanvas'), ctx = canvas.getContext('2d');

// Particle Pools
let drops = []; for(let i=0; i<150; i++) drops.push({x:Math.random(), y:Math.random(), speed:Math.random()*0.02+0.01});
let ripples = [], pollens = []; for(let i=0; i<100; i++) pollens.push({x:Math.random(), y:Math.random(), vx:Math.random()*0.002-0.001, vy:Math.random()*0.002-0.001});

function handleMusic(files) {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const reader = new FileReader();
    reader.onload = e => {
        audioCtx.decodeAudioData(e.target.result, buf => { audioBuffer = buf; });
    };
    reader.readAsArrayBuffer(files[0]);
}

async function startSync() {
    if(!audioBuffer) return alert("MP3를 먼저 로딩하세요!");
    if(isPlaying) { stopAll(); return; }
    if(audioCtx.state === 'suspended') await audioCtx.resume();
    
    source = audioCtx.createBufferSource(); source.buffer = audioBuffer;
    analyser = audioCtx.createAnalyser(); analyser.fftSize = 1024;
    source.connect(analyser); analyser.connect(audioCtx.destination);

    recordedChunks = [];
    const stream = canvas.captureStream(60);
    const audioStreamDest = audioCtx.createMediaStreamDestination();
    source.connect(audioStreamDest);
    const combined = new MediaStream([...stream.getVideoTracks(), ...audioStreamDest.stream.getAudioTracks()]);

    mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/webm; codecs=vp9,opus' });
    mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
    mediaRecorder.onstop = saveVideo;

    source.start(0); mediaRecorder.start();
    startTime = audioCtx.currentTime; isPlaying = true; isRecording = true;
    document.getElementById('recBtn').innerText = "■ STOP & SAVE";
    document.getElementById('recBtn').classList.add('recording');
    source.onended = stopAll;
    animate();
}

function stopAll() {
    if(source) source.stop();
    if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    isPlaying = false; isRecording = false;
    document.getElementById('recBtn').innerText = "▶ START SYNC RECORD";
    document.getElementById('recBtn').classList.remove('recording');
}

function saveVideo() {
    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
    const url = URL.createObjectURL(blob);
    const now = new Date();
    const ts = `${now.getFullYear()}${now.getMonth()+1}${now.getDate()}_${now.getHours()}${now.getMinutes()}${now.getSeconds()}`;
    const a = document.createElement('a'); a.href = url; a.download = `Botanical_Art_${ts}.mp4`; a.click();
}

function animate() {
    if(!isPlaying) return;
    requestAnimationFrame(animate);

    const W = canvas.width, H = canvas.height;
    const trail = parseFloat(document.getElementById('trail').value);
    ctx.fillStyle = `rgba(5, 5, 8, ${trail})`; ctx.fillRect(0,0,W,H);

    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    let bass = data[0]/255, energy = (data.reduce((a,b)=>a+b,0)/data.length/255);
    const amp = energy * parseFloat(document.getElementById('sense').value);
    const hue = parseInt(document.getElementById('hue').value);

    // 1. RAIN & RIPPLE (Environment)
    const rInt = parseInt(document.getElementById('rain').value);
    if(rInt > 0) drops.forEach(d => {
        d.y += d.speed*(1+amp); if(d.y>1){d.y=0; d.x=Math.random();}
        ctx.fillStyle = `hsla(${hue}, 70%, 70%, ${amp*(rInt/100)})`;
        ctx.fillRect(d.x*W, d.y*H, 2, 10*amp);
    });
    const ripInt = parseInt(document.getElementById('ripple').value);
    if(ripInt>0 && bass>0.7) ripples.push({x:Math.random()*W, y:Math.random()*H, r:0, a:1});
    ripples.forEach((r,i)=>{
        r.r += 2+amp*4; r.a -= 0.02;
        ctx.strokeStyle = `hsla(${hue+40}, 100%, 70%, ${r.a*(ripInt/100)})`;
        ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI*2); ctx.stroke();
        if(r.a<=0) ripples.splice(i,1);
    });

    // 2. BOTANICAL FORMS
    // Classic Bloom
    const blInt = parseInt(document.getElementById('bloom').value);
    if(blInt>0){
        ctx.save(); ctx.translate(W/2, H/2);
        ctx.beginPath();
        for(let a=0; a<Math.PI*2; a+=0.1){
            let r = (H*0.2*(blInt/100))*(1+0.4*Math.sin(a*6+audioCtx.currentTime*2))*amp;
            ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
        }
        ctx.fillStyle=`hsla(${hue}, 80%, 50%, 0.1)`; ctx.fill();
        ctx.strokeStyle=`hsla(${hue}, 100%, 80%, 0.5)`; ctx.stroke(); ctx.restore();
    }

    // Phyllotaxis (Sunflower)
    const phyInt = parseInt(document.getElementById('phy').value);
    if(phyInt > 0){
        ctx.save(); ctx.translate(W/2, H/2);
        for(let n=0; n<200; n++){
            let a = n * 137.5 * (Math.PI/180);
            let r = 4 * Math.sqrt(n) * (phyInt/50) * (0.5+amp);
            ctx.fillStyle = `hsla(${hue+n*0.5}, 100%, 70%, ${0.5*amp})`;
            ctx.beginPath(); ctx.arc(Math.cos(a)*r, Math.sin(a)*r, 2*amp, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
    }

    // Mandala
    const manInt = parseInt(document.getElementById('man').value);
    if(manInt > 0){
        ctx.save(); ctx.translate(W/2, H/2);
        for(let i=0; i<8; i++){
            ctx.rotate(Math.PI/4);
            ctx.strokeStyle=`hsla(${hue-60}, 100%, 80%, ${0.3*amp*(manInt/100)})`;
            ctx.strokeRect(-50*amp, -50*amp, 100*amp, 100*amp);
        }
        ctx.restore();
    }

    // Vines
    const vinInt = parseInt(document.getElementById('vine').value);
    if(vinInt > 0 && bass > 0.6){
        ctx.save(); ctx.translate(W/2, H/2);
        ctx.beginPath(); ctx.moveTo(0,0);
        for(let i=0; i<10; i++){
            ctx.quadraticCurveTo(Math.sin(audioCtx.currentTime+i)*100*amp, i*20, Math.cos(audioCtx.currentTime)*50, i*40);
        }
        ctx.strokeStyle=`hsla(120, 100%, 60%, ${0.4*amp*(vinInt/100)})`; ctx.stroke(); ctx.restore();
    }

    // Pollen
    const polInt = parseInt(document.getElementById('pol').value);
    if(polInt > 0) pollens.forEach(p => {
        p.x += p.vx*(1+amp*10); p.y += p.vy*(1+amp*10);
        if(p.x<0||p.x>1) p.vx*=-1; if(p.y<0||p.y>1) p.vy*=-1;
        ctx.fillStyle = `hsla(${hue+120}, 100%, 90%, ${0.3*amp*(polInt/100)})`;
        ctx.beginPath(); ctx.arc(p.x*W, p.y*H, 1, 0, Math.PI*2); ctx.fill();
    });

    const elapsed = audioCtx.currentTime - startTime;
    document.getElementById('timeCode').innerText = `${formatTime(elapsed)} / ${formatTime(audioBuffer.duration)}`;
    document.getElementById('progFill').style.width = (elapsed/audioBuffer.duration*100)+'%';
}

function setRes(r) {
    aspect = r;
    document.getElementById('res169').classList.toggle('active', r === '16:9');
    document.getElementById('res916').classList.toggle('active', r === '9:16');
    canvas.width = (r==='16:9')?1280:720; canvas.height = (r==='16:9')?720:1280;
}
setRes('16:9');
function formatTime(s) { const m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }

// UI Slider Sync
['rain','ripple','bloom','phy','man','vine','pol','sense','hue','trail'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.oninput = function() {
        const label = document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1));
        if(label) label.innerText = this.value;
    }
});
</script>
</body>
</html>
