<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM LAB v15.0.42 — Grid & Interactive Cam</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#020205; --panel:#08080f; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.12); --text:#e0f0ff; --muted:#44445a; }
body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo{letter-spacing:5px; color:var(--accent); font-weight:bold; font-size:12px;}

.main{ display:grid; grid-template-columns:380px 1fr; flex:1; min-height:0; }
.left-panel{ background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:12px; overflow-y:auto; }

.ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:10px; }
.label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}

.control-group { margin-bottom:8px; }
.control-group label { display:block; font-size:8px; color:var(--muted); margin-bottom:2px; }
input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; }
select { width:100%; background:#000; border:1px solid var(--border); color:var(--text); padding:8px; border-radius:4px; font-size:11px; outline:none; margin-bottom:5px; }

.btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:10px; cursor:pointer; font-size:10px; width:100%; margin-bottom:5px; transition:0.2s; }
.btn.active { background:var(--accent); color:#000; font-weight:bold;}
.btn.primary { background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:bold; font-size:11px; padding:15px; margin-top:5px; }
.btn.primary.recording { background:#fff; color:var(--accent2); animation: pulse 1s infinite; }

@keyframes pulse { 0%{opacity:1;} 50%{opacity:0.6;} 100%{opacity:1;} }

.viz-area { position:relative; display:flex; justify-content:center; align-items:center; flex:1; background:#000; overflow:hidden; }
#p5-container canvas { max-width: 100% !important; max-height: 100% !important; object-fit: contain; }

.playbar { height:2px; background:#111; position:relative; }
#progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM LAB v15.0.42</div>
  <div id="timeCode" style="font-family:monospace; font-size:12px; color:var(--accent);">00:00 / 00:00</div>
</div>

<div class="main">
  <div class="left-panel">
    <div class="ctrl-box">
      <span class="label-small">A. System & Export</span>
      <button class="btn" onclick="document.getElementById('mIn').click()">LOAD MP3</button>
      <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:5px;">
          <button class="btn active" id="resFHD" onclick="setExportRes('FHD')">FHD</button>
          <button class="btn" id="resUHD" onclick="setExportRes('UHD')">UHD (4K)</button>
      </div>
      <button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START SYNC RECORD</button>
    </div>

    <div class="ctrl-box">
      <span class="label-small">B. Interactive Camera</span>
      <select id="camMode">
          <option value="auto">Auto (음악 흐름 반응)</option>
          <option value="manual">Manual (방향키 조작)</option>
      </select>
      <div class="control-group">
        <label>CAM SENSITIVITY <span id="vCamS" style="float:right; color:var(--accent);">5.0</span></label>
        <input type="range" id="camSense" min="1.0" max="20.0" step="0.5" value="5.0" oninput="document.getElementById('vCamS').innerText=this.value">
      </div>
      <div style="font-size: 8px; color:var(--muted); line-height: 1.4;">
        * Manual: Use Arrow Keys (Up, Down, Left, Right)<br>
        * Auto: Cam speed scales with Audio energy.
      </div>
    </div>

    <div class="ctrl-box">
      <span class="label-small">C. 1024 Grid Dynamics</span>
      <div class="control-group">
        <label>JUMP FORCE (저음 반응) <span id="vJump" style="float:right; color:var(--accent);">50</span></label>
        <input type="range" id="jumpF" min="0" max="200" value="50" oninput="document.getElementById('vJump').innerText=this.value">
      </div>
      <div class="control-group">
        <label>SPIN SPEED (고음 반응) <span id="vSpin" style="float:right; color:var(--accent);">2.0</span></label>
        <input type="range" id="spinS" min="0" max="10.0" step="0.1" value="2.0" oninput="document.getElementById('vSpin').innerText=this.value">
      </div>
    </div>

    <div class="ctrl-box">
      <span class="label-small">D. Particle & Hero PNG</span>
      <button class="btn" style="border-color:#ffcc00; color:#ffcc00;" onclick="document.getElementById('pIn').click()">LOAD PARTICLE PNG</button>
      <input type="file" id="pIn" accept="image/png" style="display:none" onchange="handlePetalPNG(this.files)">
      
      <button class="btn" style="border-color:#00ffcc; color:#00ffcc; margin-top:5px;" onclick="document.getElementById('fIn').click()">LOAD MAIN HERO PNG</button>
      <input type="file" id="fIn" accept="image/png" style="display:none" onchange="handleFlowerPNG(this.files)">
    </div>
  </div>

  <div class="viz-area" id="p5-container"></div>
</div>

<div class="playbar"><div id="progFill"></div></div>

<script>
let exportRes = 'FHD', aspect = '16:9';
let isRecording = false, isPlaying = false;
let audio, fft, ampObj;
let gridItems = [];
let mediaRecorder, recordedChunks = [];
let canvasRef, flowerImg = null, petalImg = null;

// Camera state
let camX = 0, camY = 0, camScale = 1.0;

function setup() {
    let container = document.getElementById('p5-container');
    let w = (exportRes === 'FHD') ? 1920 : 3840;
    let h = (exportRes === 'FHD') ? 1080 : 2160;
    let cnv = createCanvas(w, h);
    cnv.parent(container);
    canvasRef = cnv.elt;
    
    colorMode(RGB, 255, 255, 255, 255);
    fft = new p5.FFT(0.85, 1024); // 1024 bins
    ampObj = new p5.Amplitude();
    imageMode(CENTER);
    initGrid();
}

function initGrid() {
    gridItems = [];
    let cols = 32, rows = 32; // 32x32 = 1024
    let spacingX = width / cols;
    let spacingY = height / rows;
    for (let i = 0; i < 1024; i++) {
        let x = (i % cols) * spacingX + spacingX/2;
        let y = floor(i / cols) * spacingY + spacingY/2;
        gridItems.push(new GridObject(i, x, y));
    }
}

function draw() {
    background(2, 2, 8); // 고정 배경

    if (!audio || !audio.isLoaded()) {
        // 프리뷰 상태에서도 카메라 조작 가능
        handleCameraLogic(0);
        push();
        translate(camX, camY);
        scale(camScale);
        for(let item of gridItems) item.display(0, 0);
        pop();
        return;
    }

    fft.analyze();
    let bass = fft.getEnergy("bass") / 255;
    let treble = fft.getEnergy("treble") / 255;
    let vol = ampObj.getLevel();
    let spectrum = fft.analyze();

    // 1. 카메라 로직 적용
    handleCameraLogic(vol);

    push();
    translate(camX, camY);
    scale(camScale);

    // 2. 1024 그리드 렌더링
    for (let i = 0; i < gridItems.length; i++) {
        let freqVal = spectrum[i] / 255;
        gridItems[i].update(freqVal, bass, treble);
        gridItems[i].display(freqVal, vol);
    }
    pop();

    // 3. 메인 히어로 (카메라 영향을 받지 않는 레이어 혹은 중앙 배치)
    drawMainHero(bass);

    updateUI();
}

function handleCameraLogic(vol) {
    let mode = document.getElementById('camMode').value;
    let sense = parseFloat(document.getElementById('camSense').value);

    if (mode === 'auto') {
        // 음악 흐름에 따른 자동 유영
        let time = millis() * 0.001;
        camX = lerp(camX, (noise(time * 0.3) - 0.5) * width * 0.2 * (1 + vol * sense), 0.05);
        camY = lerp(camY, (noise(time * 0.3 + 100) - 0.5) * height * 0.2 * (1 + vol * sense), 0.05);
        camScale = lerp(camScale, 1.0 + vol * 0.5, 0.05);
    } else {
        // 방향키 수동 조작
        let moveStep = 10 * (sense/2);
        if (keyIsDown(UP_ARROW)) camY += moveStep;
        if (keyIsDown(DOWN_ARROW)) camY -= moveStep;
        if (keyIsDown(LEFT_ARROW)) camX += moveStep;
        if (keyIsDown(RIGHT_ARROW)) camX -= moveStep;
    }
}

class GridObject {
    constructor(id, x, y) {
        this.id = id;
        this.origin = createVector(x, y);
        this.pos = this.origin.copy();
        this.angle = 0;
        this.size = random(20, 40);
        this.color = color(random(100, 255), random(100, 200), 255, 180);
    }

    update(freq, bass, treble) {
        let jumpF = parseInt(document.getElementById('jumpF').value);
        let spinS = parseFloat(document.getElementById('spinS').value);

        // 점핑 (저음/개별 주파수 반응)
        let jump = freq * jumpF;
        this.pos.y = this.origin.y - jump;

        // 회전 (고음/개별 주파수 반응)
        this.angle += 0.02 + freq * spinS;
    }

    display(freq, vol) {
        push();
        translate(this.pos.x, this.pos.y);
        rotate(this.angle);
        
        let finalSz = this.size * (0.8 + freq * 1.5);
        if (petalImg) {
            tint(this.color);
            image(petalImg, 0, 0, petalImg.width * (finalSz/200), petalImg.height * (finalSz/200));
            noTint();
        } else {
            noStroke(); fill(this.color);
            ellipse(0, 0, finalSz * 0.6, finalSz);
        }
        pop();
    }
}

function drawMainHero(bass) {
    if (!flowerImg) return;
    push();
    translate(width/2, height/2);
    let imgScale = (height * 0.5 / flowerImg.height) * (1.0 + bass * 0.2);
    image(flowerImg, 0, 0, flowerImg.width * imgScale, flowerImg.height * imgScale);
    pop();
}

// --- SYSTEM HANDLERS ---
function handleFile(files) {
    if (audio) audio.stop();
    audio = loadSound(URL.createObjectURL(files[0]), () => {
        document.getElementById('recBtn').disabled = false;
    });
}
function handleFlowerPNG(files) { loadImage(URL.createObjectURL(files[0]), (img) => { flowerImg = img; }); }
function handlePetalPNG(files) { loadImage(URL.createObjectURL(files[0]), (img) => { petalImg = img; initGrid(); }); }
function setExportRes(res) { exportRes = res; setup(); }

async function toggleSync() {
    if (!audio || !audio.isLoaded()) return;
    if (isPlaying) {
        audio.stop(); if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        isPlaying = false;
        document.getElementById('recBtn').innerText = "▶ START SYNC RECORD";
        document.getElementById('recBtn').classList.remove('recording');
    } else {
        if (getAudioContext().state === 'suspended') await userStartAudio();
        recordedChunks = [];
        const stream = canvasRef.captureStream(60);
        const dest = getAudioContext().createMediaStreamDestination();
        p5.soundOut.output.connect(dest);
        const combined = new MediaStream([...stream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
        mediaRecorder = new MediaRecorder(combined, { 
            mimeType: 'video/webm; codecs=vp9,opus',
            videoBitsPerSecond: exportRes === 'UHD' ? 60000000 : 20000000 
        });
        mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = saveVideo;
        audio.play(); mediaRecorder.start(); isPlaying = true;
        document.getElementById('recBtn').innerText = "■ STOP & SAVE VIDEO";
        document.getElementById('recBtn').classList.add('recording');
    }
}
function saveVideo() {
    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `GridCam_${new Date().getTime()}.mp4`; a.click();
}
function updateUI() {
    if (audio && audio.isPlaying()) {
        let curr = audio.currentTime(), dur = audio.duration();
        document.getElementById('timeCode').innerText = `${nf(floor(curr/60),2)}:${nf(floor(curr%60),2)} / ${nf(floor(dur/60),2)}:${nf(floor(dur%60),2)}`;
        document.getElementById('progFill').style.width = (curr/dur * 100) + '%';
    }
}
</script>
</body>
</html>
