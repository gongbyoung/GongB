<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM LAB v15.0.31 — RGB Customization</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#030305; --panel:#0a0a10; --accent:#ff77aa; --border:rgba(255,119,170,0.15); --text:#fff0f5; --muted:#554455; --group-bg:rgba(255,255,255,0.01); }
body{ background:var(--bg); color:var(--text); font-family:'Courier New',monospace; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo{letter-spacing:5px; color:var(--accent); font-weight:bold; font-size:13px;}

.main{ display:grid; grid-template-columns:380px 1fr; flex:1; min-height:0; }
.left-panel{ background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:12px; overflow-y:auto; }

.ctrl-box { background:var(--group-bg); border:1px solid var(--border); border-radius:8px; padding:10px; margin-bottom:12px; }
.label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(255,119,170,0.1); padding-bottom:3px;}

.control-group { margin-bottom:10px; }
.control-group label { display:block; font-size:9px; color:var(--muted); margin-bottom:3px; }
.val-label { float:right; color:var(--accent); font-weight:bold; font-size:10px; }
input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:3px; }
select { width:100%; background:#000; border:1px solid var(--border); color:var(--text); padding:6px; border-radius:4px; font-size:11px; outline:none; }

.rgb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }

.btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:10px; cursor:pointer; font-size:10px; width:100%; margin-bottom:5px; transition:0.2s; }
.btn:hover { background:rgba(255,119,170,0.1); }
.btn.active { background:var(--accent); color:#000; }
.btn.primary { background:#ff3377; border-color:#ff3377; color:#fff; font-weight:bold; font-size:11px; padding:14px; margin-top:5px; }
.btn.primary.recording { background:#fff; color:#ff3377; animation: pulse 1s infinite; }

@keyframes pulse { 0%{opacity:1;} 50%{opacity:0.6;} 100%{opacity:1;} }

.viz-area { position:relative; display:flex; justify-content:center; align-items:center; flex:1; background:#000; overflow:hidden;}
#p5-container canvas { box-shadow: 0 0 40px rgba(0,0,0,0.8); border:1px solid #1a1a1a; }

.playbar { height:2px; background:#111; position:relative; }
#progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }

.status-log { font-size:10px; color:var(--muted); margin-top:4px; text-align:center; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM LAB v15.0.31</div>
  <div id="timeCode" style="font-family:monospace; font-size:13px; color:var(--accent);">00:00 / 00:00</div>
</div>

<div class="main">
  <div class="left-panel">
    <div class="ctrl-box">
      <span class="label-small">A. Audio & Canvas</span>
      <button class="btn" onclick="document.getElementById('mIn').click()">1. LOAD MP3 FILE</button>
      <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
      <div id="statusLog" class="status-log">No file loaded</div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:5px;">
        <button class="btn active" id="res169" onclick="setRes('16:9')">16:9</button>
        <button class="btn" id="res916" onclick="setRes('9:16')">9:16</button>
      </div>
      <button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START SYNC RECORD</button>
    </div>

    <div class="ctrl-box">
      <span class="label-small">E. Central Main Flower</span>
      <div class="control-group">
        <label>SIZE (크기) <span class="val-label" id="vMainSz">1.0</span></label>
        <input type="range" id="mainSz" min="0.5" max="2.5" step="0.1" value="1.0">
      </div>
      <div class="control-group">
        <label>SWAY (유연성) <span class="val-label" id="vSway">5</span></label>
        <input type="range" id="sway" min="1" max="15" value="5">
      </div>
    </div>

    <div class="ctrl-box">
      <span class="label-small">B. Falling Petal Style</span>
      <select id="pStyle">
          <option value="sakura" selected>Sakura (벚꽃잎)</option>
          <option value="round">Round (둥근)</option>
          <option value="heart">Heart (하트)</option>
          <option value="leaf">Leaf (나뭇잎)</option>
      </select>
      <div class="control-group" style="margin-top:10px;">
        <label>EMISSION (생성량) <span class="val-label" id="vEmit">30</span></label>
        <input type="range" id="emitRate" min="0" max="100" value="30">
      </div>
    </div>

    <div class="ctrl-box">
      <span class="label-small">D. Color RGB Range (Petals)</span>
      <div class="rgb-grid">
          <div class="control-group"><label>R-Min</label><input type="range" id="rMin" min="0" max="255" value="200"></div>
          <div class="control-group"><label>R-Max</label><input type="range" id="rMax" min="0" max="255" value="255"></div>
          <div class="control-group"><label>G-Min</label><input type="range" id="gMin" min="0" max="255" value="100"></div>
          <div class="control-group"><label>G-Max</label><input type="range" id="gMax" min="0" max="255" value="180"></div>
          <div class="control-group"><label>B-Min</label><input type="range" id="bMin" min="0" max="255" value="150"></div>
          <div class="control-group"><label>B-Max</label><input type="range" id="bMax" min="0" max="255" value="255"></div>
      </div>
      <div class="control-group" style="margin-top:10px;">
        <label>TRAIL (잔상) <span class="val-label" id="vTrail">30</span></label>
        <input type="range" id="trail" min="0" max="150" value="30">
      </div>
    </div>
  </div>

  <div class="viz-area" id="p5-container"></div>
</div>

<div class="playbar"><div id="progFill"></div></div>

<script>
let aspect = '16:9', isRecording = false, isPlaying = false;
let audio, fft, ampObj;
let petals = [];
let mediaRecorder, recordedChunks = [];
let canvasRef;
let mainFlowerSway = 0;

// --- p5.js 엔진 ---
function setup() {
    let container = document.getElementById('p5-container');
    let w = aspect === '16:9' ? 1280 : 720;
    let h = aspect === '16:9' ? 720 : 1280;
    let cnv = createCanvas(w, h);
    cnv.parent(container);
    canvasRef = cnv.elt;
    
    // RGB 모드로 전환 (HSB 대신 직접 RGB 제어)
    colorMode(RGB, 255, 255, 255, 255);
    fft = new p5.FFT();
    ampObj = new p5.Amplitude();
    
    cnv.style('max-width', '100%');
    cnv.style('max-height', '100%');
    cnv.style('height', 'auto');
    cnv.style('width', 'auto');
}

function draw() {
    let trVal = parseInt(document.getElementById('trail').value);
    background(3, 3, 5, trVal);

    if (!isPlaying || !audio || !audio.isPlaying()) {
        drawCentralFlower(0); // 정지 상태에서도 0값 전달하여 그림
        return;
    }

    // --- 오디오 데이터 안전 추출 ---
    fft.analyze();
    let rawBass = fft.getEnergy("bass");
    let rawMid = fft.getEnergy("mid");
    
    let bassLevel = isNaN(rawBass) ? 0 : rawBass / 255;
    let midsLevel = isNaN(rawMid) ? 0 : rawMid / 255;
    let vol = ampObj.getLevel();
    
    // --- 1. 입자 생성 (RGB 범위 적용) ---
    let emitRate = parseInt(document.getElementById('emitRate').value);
    if (vol > 0.02) {
        let spawn = map(vol, 0, 0.6, 0, emitRate/3);
        for(let i=0; i<spawn; i++) {
            petals.push(new Petal());
        }
    }

    for (let i = petals.length - 1; i >= 0; i--) {
        let p = petals[i];
        p.applyForce(midsLevel * 5, 0.08); // 바람 세기 고정값 적용하여 최적화
        p.update();
        p.display(vol);
        if (p.isOffScreen()) petals.splice(i, 1);
    }

    // --- 2. 메인 꽃 (Bass 반응) ---
    drawCentralFlower(bassLevel);

    updateUI();
}

// --- 메인 꽃 그리기 (안전장치 추가) ---
function drawCentralFlower(bass) {
    const W = width, H = height;
    let sz = parseFloat(document.getElementById('mainSz').value);
    let swaySense = parseInt(document.getElementById('sway').value);

    push();
    translate(W/2, H);
    
    let time = millis() * 0.001;
    let baseSway = sin(time * 1.5) * 0.04;
    let audioSway = sin(time * 8) * bass * swaySense * 0.02;
    mainFlowerSway = lerp(mainFlowerSway, baseSway + audioSway, 0.1);
    
    rotate(mainFlowerSway);

    // 줄기
    let stemLen = H * 0.6;
    stroke(80, 120, 60, 200);
    strokeWeight(12 * sz);
    noFill();
    beginShape();
    vertex(0, 0);
    bezierVertex(0, -stemLen*0.3, 0, -stemLen*0.6, 0, -stemLen);
    endShape();

    translate(0, -stemLen);
    
    // 꽃잎 (Bass에 움찔거림)
    noStroke();
    fill(255, 100, 150, 230);
    let pSize = H * 0.15 * sz * (0.9 + bass * 0.3);
    
    for(let i=0; i<5; i++) {
        push();
        rotate(i * TWO_PI / 5 + time * 0.3);
        beginShape();
        for(let a=0; a<PI; a+=0.2) {
            let r = pSize * (abs(sin(a)) + 0.2 * abs(sin(a*3)));
            let drift = (a > PI*0.4 && a < PI*0.6) ? pSize*0.2 : 0;
            vertex(cos(a-PI/2)*r*0.7, (sin(a-PI/2)*r) + drift);
        }
        endShape(CLOSE);
        pop();
    }
    
    fill(255, 220, 100);
    circle(0, 0, pSize * 0.3);
    pop();
}

// --- RGB 랜덤 입자 클래스 ---
class Petal {
    constructor() {
        this.pos = createVector(random(width), -30);
        this.vel = createVector(random(-0.5, 0.5), random(1, 2.5));
        this.acc = createVector(0, 0);
        this.angle = random(TWO_PI);
        this.rotSpeed = random(-0.04, 0.04);
        this.size = random(10, 20);
        this.style = document.getElementById('pStyle').value;
        this.noiseOff = random(1000);

        // RGB 범위 적용
        let rMin = parseInt(document.getElementById('rMin').value);
        let rMax = parseInt(document.getElementById('rMax').value);
        let gMin = parseInt(document.getElementById('gMin').value);
        let gMax = parseInt(document.getElementById('gMax').value);
        let bMin = parseInt(document.getElementById('bMin').value);
        let bMax = parseInt(document.getElementById('bMax').value);

        this.r = random(rMin, rMax);
        this.g = random(gMin, gMax);
        this.b = random(bMin, bMax);
    }

    applyForce(wind, grav) {
        let w = map(noise(this.noiseOff, frameCount * 0.01), 0, 1, -wind, wind);
        this.acc.add(w * 0.02, grav);
        this.noiseOff += 0.01;
    }

    update() {
        this.vel.add(this.acc);
        this.vel.limit(4);
        this.pos.add(this.vel);
        this.acc.mult(0);
        this.angle += this.rotSpeed;
    }

    display(amp) {
        push();
        translate(this.pos.x, this.pos.y);
        rotate(this.angle);
        let s = this.size * (0.8 + amp*0.3);
        noStroke();
        fill(this.r, this.g, this.b, 200);
        
        beginShape();
        if (this.style === 'sakura') {
            for(let a=0; a<TWO_PI; a+=0.3) {
                let r = s * (abs(sin(a)) + 0.2 * abs(sin(a*3)));
                let drift = (a > PI*0.4 && a < PI*0.6) ? s*0.2 : 0;
                vertex(cos(a)*r*0.7, (sin(a)*r) - drift);
            }
        } else if (this.style === 'round') {
            ellipse(0, 0, s*0.8, s*1.3);
        } else if (this.style === 'heart') {
            for(let a=0; a<TWO_PI; a+=0.2) {
                let x = 16 * pow(sin(a), 3);
                let y = -(13 * cos(a) - 5 * cos(2*a) - 2 * cos(3*a) - cos(4*a));
                vertex(x * (s/18), y * (s/18));
            }
        } else if (this.style === 'leaf') {
            for(let a=0; a<TWO_PI; a+=0.3) {
                let r = s * (1 + 0.8 * sin(a));
                vertex(cos(a)*r*0.3, sin(a)*r);
            }
        }
        endShape(CLOSE);
        pop();
    }
    isOffScreen() { return (this.pos.y > height + 50 || this.pos.x < -50 || this.pos.x > width + 50); }
}

// --- 오디오 로딩 및 시스템 (v15.0.30 유지) ---
function handleFile(files) {
    const log = document.getElementById('statusLog');
    const recBtn = document.getElementById('recBtn');
    log.innerText = "LOADING AUDIO...";
    log.style.color = "#ffcc00";
    if (audio) audio.stop();
    let url = URL.createObjectURL(files[0]);
    audio = loadSound(url, 
        () => {
            log.innerText = "READY: " + files[0].name;
            log.style.color = "var(--accent)";
            recBtn.disabled = false;
        },
        (err) => {
            log.innerText = "ERROR LOADING FILE";
            log.style.color = "#ff4466";
        }
    );
}

function toggleSync() {
    if (!audio || !audio.isLoaded()) return;
    if (isPlaying) stopRecording(); else startRecording();
}

async function startRecording() {
    if (getAudioContext().state === 'suspended') await userStartAudio();
    recordedChunks = [];
    const stream = canvasRef.captureStream(60);
    const dest = getAudioContext().createMediaStreamDestination();
    p5.soundOut.output.connect(dest);
    const combined = new MediaStream([...stream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
    mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/webm; codecs=vp9,opus' });
    mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = saveVideo;
    audio.play();
    mediaRecorder.start();
    isPlaying = true;
    document.getElementById('recBtn').innerText = "■ STOP & SAVE MP4";
    document.getElementById('recBtn').classList.add('recording');
}

function stopRecording() {
    audio.stop();
    if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    isPlaying = false;
    document.getElementById('recBtn').innerText = "▶ START SYNC RECORD";
    document.getElementById('recBtn').classList.remove('recording');
}

function saveVideo() {
    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
    const url = URL.createObjectURL(blob);
    const now = new Date();
    const ts = `${now.getHours()}${now.getMinutes()}${now.getSeconds()}`;
    const a = document.createElement('a'); a.href = url; a.download = `RGB_Flower_${ts}.mp4`; a.click();
}

function setRes(r) { aspect = r; setup(); }
function updateUI() {
    if (audio && audio.isPlaying()) {
        let curr = audio.currentTime(), dur = audio.duration();
        document.getElementById('timeCode').innerText = `${nf(floor(curr/60),2)}:${nf(floor(curr%60),2)} / ${nf(floor(dur/60),2)}:${nf(floor(dur%60),2)}`;
        document.getElementById('progFill').style.width = (curr/dur * 100) + '%';
    }
}

// Slider Labels Sync
['mainSz','sway','emitRate','trail'].forEach(id => {
    let el = document.getElementById(id);
    if(el) el.oninput = function() { document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1)).innerText = this.value; }
});
</script>
</body>
</html>
