<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Generative Painter</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #222; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
        }
        #controls { 
            margin-bottom: 20px; 
            padding: 15px;
            background: #333;
            border-radius: 8px;
        }
        canvas { 
            background: #f4f4f0; /* 약간의 종이 질감 색상 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            max-width: 100%; 
        }
    </style>
</head>
<body>
    <div id="controls">
        <label for="imageLoader">그림 그릴 이미지 선택: </label>
        <input type="file" id="imageLoader" accept="image/*">
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let imgData, width, height;
        let edgePoints = [];
        let colorPoints = [];
        let isDrawing = false;
        let animationId;

        document.getElementById('imageLoader').addEventListener('change', handleImage);

        function handleImage(e) {
            if(animationId) cancelAnimationFrame(animationId);
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // 브라우저 과부하 방지를 위해 최대 800px로 리사이징
                    const MAX_SIZE = 800;
                    let scale = 1;
                    if(img.width > MAX_SIZE || img.height > MAX_SIZE) {
                        scale = Math.min(MAX_SIZE / img.width, MAX_SIZE / img.height);
                    }
                    width = canvas.width = Math.floor(img.width * scale);
                    height = canvas.height = Math.floor(img.height * scale);

                    // 원본 픽셀 데이터를 분석하기 위해 임시 캔버스에 그리기
                    const offCanvas = document.createElement('canvas');
                    offCanvas.width = width;
                    offCanvas.height = height;
                    const offCtx = offCanvas.getContext('2d');
                    offCtx.drawImage(img, 0, 0, width, height);
                    imgData = offCtx.getImageData(0, 0, width, height);

                    analyzePixels();
                    startDrawing();
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        function analyzePixels() {
            edgePoints = [];
            colorPoints = [];
            const data = imgData.data;
            const threshold = 25; // 윤곽선 감지 민감도

            // 픽셀을 건너뛰며 샘플링 (거친 느낌을 위해 step을 2로 설정)
            for(let y = 0; y < height; y += 2) {
                for(let x = 0; x < width; x += 2) {
                    const idx = (y * width + x) * 4;
                    const brightness = (data[idx] + data[idx+1] + data[idx+2]) / 3;
                    let isEdge = false;

                    // 간단한 엣지(윤곽선) 디텍션 알고리즘
                    if (x < width - 2 && y < height - 2) {
                        const rightIdx = (y * width + (x+2)) * 4;
                        const bottomIdx = ((y+2) * width + x) * 4;
                        const rightB = (data[rightIdx] + data[rightIdx+1] + data[rightIdx+2]) / 3;
                        const bottomB = (data[bottomIdx] + data[bottomIdx+1] + data[bottomIdx+2]) / 3;

                        if (Math.abs(brightness - rightB) > threshold || Math.abs(brightness - bottomB) > threshold) {
                            isEdge = true;
                        }
                    }

                    const point = { x, y, r: data[idx], g: data[idx+1], b: data[idx+2] };
                    if (isEdge) edgePoints.push(point);
                    else colorPoints.push(point);
                }
            }
            // 랜덤한 순서로 그리도록 배열 섞기
            edgePoints.sort(() => Math.random() - 0.5);
            colorPoints.sort(() => Math.random() - 0.5);
        }

        let currentPen = { x: 0, y: 0 };
        let mode = 'OUTLINE'; 
        let progressIdx = 0;

        function startDrawing() {
            ctx.fillStyle = '#f4f4f0'; // 바탕색 초기화
            ctx.fillRect(0, 0, width, height);
            
            isDrawing = true;
            mode = 'OUTLINE';
            progressIdx = 0;
            currentPen = { x: width/2, y: height/2 }; // 화면 중앙 근처에서 펜 시작
            
            drawLoop();
        }

        function drawLoop() {
            if (!isDrawing) return;

            if (mode === 'OUTLINE') {
                // 연필 스케치 느낌의 색상 및 투명도
                ctx.strokeStyle = 'rgba(30, 30, 40, 0.3)';
                ctx.lineWidth = 0.8;

                // 애니메이션 속도를 위해 한 프레임당 40번의 선 긋기
                for(let i = 0; i < 40; i++) {
                    if (progressIdx >= edgePoints.length) {
                        mode = 'COLOR'; // 윤곽선이 끝나면 채색 모드로 전환
                        progressIdx = 0;
                        break;
                    }

                    let target = edgePoints[progressIdx];

                    // 1. 노이즈 적용: 원래 위치에서 최대 12px 벗어나게 목표점 설정
                    let destX = target.x + (Math.random() - 0.5) * 24;
                    let destY = target.y + (Math.random() - 0.5) * 24;

                    ctx.beginPath();
                    
                    // 2. 가끔씩 펜을 떼고 완전히 어긋난 새 위치에서 시작 (시작부분 벗어남 구현)
                    if (progressIdx === 0 || Math.random() < 0.03) {
                        currentPen.x = destX - (Math.random() - 0.5) * 40;
                        currentPen.y = destY - (Math.random() - 0.5) * 40;
                    }

                    ctx.moveTo(currentPen.x, currentPen.y);
                    
                    // 3. 직선이 아닌 베지에 곡선을 이용해 삐뚤빼뚤한 노이즈 선 생성
                    let cpX = (currentPen.x + destX) / 2 + (Math.random() - 0.5) * 15;
                    let cpY = (currentPen.y + destY) / 2 + (Math.random() - 0.5) * 15;
                    
                    ctx.quadraticCurveTo(cpX, cpY, destX, destY);
                    ctx.stroke();

                    // 한붓그리기를 위해 현재 펜 위치를 방금 그린 끝점으로 업데이트
                    currentPen.x = destX;
                    currentPen.y = destY;

                    progressIdx++;
                }
            } 
            else if (mode === 'COLOR') {
                // 물감이나 마커로 거칠게 칠하는 느낌
                for(let i = 0; i < 150; i++) {
                    if (progressIdx >= colorPoints.length) {
                        isDrawing = false;
                        break;
                    }

                    let p = colorPoints[progressIdx];
                    
                    // 색상에 투명도를 주어 겹쳐 칠해지는 효과
                    ctx.fillStyle = `rgba(${p.r}, ${p.g}, ${p.b}, 0.15)`;
                    ctx.beginPath();
                    
                    // 칠하는 위치와 크기에도 노이즈 부여
                    let brushSize = Math.random() * 6 + 2;
                    let offsetX = (Math.random() - 0.5) * 12;
                    let offsetY = (Math.random() - 0.5) * 12;
                    
                    ctx.arc(p.x + offsetX, p.y + offsetY, brushSize, 0, Math.PI * 2);
                    ctx.fill();

                    progressIdx++;
                }
            }

            if (isDrawing) {
                animationId = requestAnimationFrame(drawLoop);
            }
        }
    </script>
</body>
</html>
