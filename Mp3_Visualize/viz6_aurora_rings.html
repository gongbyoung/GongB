<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualizer 06 — Aurora Rings</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #010306;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  .label {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 6px;
    color: #006633;
    text-transform: uppercase;
  }
  canvas { display: block; }
  .controls {
    position: fixed;
    bottom: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
  }
  .drop-zone {
    border: 1px dashed #004422;
    border-radius: 10px;
    padding: 12px 32px;
    cursor: pointer;
    font-size: 12px;
    color: #006633;
    letter-spacing: 2px;
    transition: all 0.3s;
  }
  .drop-zone:hover { border-color: #00ff88; color: #80ffcc; }
  input[type=file] { display: none; }
  button {
    background: rgba(0,15,10,0.7);
    border: 1px solid #004422;
    border-radius: 6px;
    color: #00aa66;
    padding: 7px 16px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover { border-color: #00ff88; color: #80ffcc; }
</style>
</head>
<body>
<div class="label">06 — AURORA RINGS</div>
<canvas id="c"></canvas>
<div class="controls">
  <div class="drop-zone" id="dz">♫ MP3 드래그 또는 클릭</div>
  <button id="playBtn" style="display:none">▶ PLAY</button>
</div>
<input type="file" id="fi" accept="audio/*">
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

let audioCtx, analyser, source, gainNode, isPlaying = false, audioBuffer, startTime = 0, pauseOffset = 0;
let t = 0;

document.getElementById('dz').addEventListener('click', () => document.getElementById('fi').click());
document.getElementById('dz').addEventListener('dragover', e => e.preventDefault());
document.getElementById('dz').addEventListener('drop', e => { e.preventDefault(); load(e.dataTransfer.files[0]); });
document.getElementById('fi').addEventListener('change', e => load(e.target.files[0]));

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    gainNode = audioCtx.createGain();
    gainNode.connect(audioCtx.destination);
    analyser.connect(gainNode);
  }
}
function load(file) {
  initAudio();
  if (source) { try { source.stop(); source.disconnect(); } catch(e){} }
  const reader = new FileReader();
  reader.onload = e => {
    audioCtx.decodeAudioData(e.target.result, buf => {
      audioBuffer = buf; pauseOffset = 0;
      document.getElementById('playBtn').style.display = ''; play();
    });
  };
  reader.readAsArrayBuffer(file);
}
function play() {
  if (!audioBuffer) return;
  if (source) { try { source.stop(); source.disconnect(); } catch(e){} }
  source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(analyser);
  source.start(0, pauseOffset);
  startTime = audioCtx.currentTime - pauseOffset;
  isPlaying = true;
  document.getElementById('playBtn').textContent = '⏸ PAUSE';
  source.onended = () => { isPlaying = false; pauseOffset = 0; document.getElementById('playBtn').textContent = '▶ PLAY'; };
}
document.getElementById('playBtn').addEventListener('click', () => {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (isPlaying) {
    pauseOffset = audioCtx.currentTime - startTime;
    source.stop(); isPlaying = false;
    document.getElementById('playBtn').textContent = '▶ PLAY';
  } else play();
});

// Aurora ribbons
const RIBBONS = 6;
const ribbons = Array.from({length: RIBBONS}, (_, i) => ({
  offset: (i / RIBBONS) * Math.PI * 2,
  phaseSpeed: 0.003 + i * 0.0015,
  colorShift: i * 40,
  thickness: 8 + i * 4,
  ringScale: 0.5 + i * 0.09
}));

function drawRibbon(freqData, cx, cy, maxR, ribbon, time) {
  const POINTS = 180;
  const r = maxR * ribbon.ringScale;
  const timeData = new Uint8Array(analyser ? analyser.frequencyBinCount : 512);
  if (analyser) analyser.getByteTimeDomainData(timeData);

  ctx.beginPath();
  let started = false;
  for (let i = 0; i <= POINTS; i++) {
    const angle = (i / POINTS) * Math.PI * 2 + ribbon.offset + time * ribbon.phaseSpeed * 60;
    const fi = Math.floor((i / POINTS) * freqData.length * 0.7);
    const amp = (freqData[Math.min(fi, freqData.length - 1)] || 0) / 255;
    const wave1 = Math.sin(angle * 3 + time * 2) * amp * r * 0.25;
    const wave2 = Math.sin(angle * 5 - time * 1.5 + ribbon.offset) * amp * r * 0.12;
    const pr = r + wave1 + wave2;
    const x = cx + Math.cos(angle) * pr;
    const y = cy + Math.sin(angle) * pr * 0.55;
    if (!started) { ctx.moveTo(x, y); started = true; }
    else ctx.lineTo(x, y);
  }
  ctx.closePath();

  // Aurora gradient stroke — layered for ribbon glow
  const avgAmp = (() => {
    let s = 0;
    for (let i = 0; i < Math.min(80, freqData.length); i++) s += freqData[i];
    return s / 80 / 255;
  })();

  const hue = 140 + ribbon.colorShift + avgAmp * 60 + Math.sin(time * 0.5) * 30;
  ctx.strokeStyle = `hsla(${hue}, 90%, 65%, ${0.15 + avgAmp * 0.5})`;
  ctx.lineWidth = ribbon.thickness * (0.5 + avgAmp * 1.5);
  ctx.stroke();

  // Inner bright edge
  ctx.strokeStyle = `hsla(${hue + 20}, 100%, 85%, ${0.3 + avgAmp * 0.5})`;
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function draw() {
  requestAnimationFrame(draw);
  t += 0.01;
  ctx.fillStyle = 'rgba(1,3,6,0.2)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  const freqData = new Uint8Array(analyser ? analyser.frequencyBinCount : 512);
  if (analyser) analyser.getByteFrequencyData(freqData);

  let bass = 0;
  for (let i = 0; i < 12; i++) bass += (freqData[i] || 0);
  bass = bass / 12 / 255;

  const maxR = Math.min(W, H) * 0.46;

  // Stars background
  ctx.save();
  for (let i = 0; i < 5; i++) {
    const sx = Math.cos(t * 0.01 + i * 1.2) * W * 0.4 + cx;
    const sy = Math.sin(t * 0.013 + i * 0.8) * H * 0.3 + cy;
    ctx.beginPath();
    ctx.arc(sx, sy, 0.8, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200,255,220,0.4)';
    ctx.fill();
  }
  ctx.restore();

  // Draw all ribbons
  ribbons.forEach(r => drawRibbon(freqData, cx, cy, maxR, r, t));

  // Outer halo
  const haloGrd = ctx.createRadialGradient(cx, cy, maxR * 0.4, cx, cy, maxR * 1.1);
  haloGrd.addColorStop(0, 'rgba(0,0,0,0)');
  haloGrd.addColorStop(0.7, `rgba(0, 80, 40, ${0.05 + bass * 0.15})`);
  haloGrd.addColorStop(1, `rgba(0, 150, 80, ${0.1 + bass * 0.2})`);
  ctx.beginPath();
  ctx.arc(cx, cy, maxR * 1.1, 0, Math.PI * 2);
  ctx.fillStyle = haloGrd;
  ctx.fill();

  // Center bright core
  const coreGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40 + bass * 60);
  coreGrd.addColorStop(0, `rgba(200, 255, 230, ${0.7 + bass * 0.3})`);
  coreGrd.addColorStop(0.4, `rgba(0, 200, 120, 0.3)`);
  coreGrd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, 40 + bass * 60, 0, Math.PI * 2);
  ctx.fillStyle = coreGrd;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, cy, 6 + bass * 10, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(220,255,240,1)';
  ctx.fill();
}
draw();
</script>
</body>
</html>
