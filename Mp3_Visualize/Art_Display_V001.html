
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0f; color: #fff; font-family: var(--font-sans, sans-serif); }
#app { width: 100%; min-height: 600px; background: #0a0a0f; padding: 12px; }
#canvas-wrap { position: relative; width: 100%; background: #000; border-radius: 8px; overflow: hidden; }
canvas#vis { display: block; width: 100%; }
#controls { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; align-items: center; }
.btn { padding: 7px 14px; border: 1px solid #444; border-radius: 6px; background: #1a1a2e; color: #fff; cursor: pointer; font-size: 13px; transition: all 0.2s; }
.btn:hover { background: #2a2a4e; border-color: #7c6cf0; }
.btn.active { background: #7c6cf0; border-color: #7c6cf0; color: #fff; }
.btn.rec { background: #c0392b; border-color: #e74c3c; }
.btn.rec:hover { background: #e74c3c; }
select, input[type=file] { padding: 6px 10px; border: 1px solid #444; border-radius: 6px; background: #1a1a2e; color: #fff; font-size: 13px; cursor: pointer; }
label.file-btn { padding: 7px 14px; border: 1px solid #444; border-radius: 6px; background: #1a1a2e; color: #bbb; cursor: pointer; font-size: 13px; }
label.file-btn:hover { border-color: #7c6cf0; color: #fff; }
#status { font-size: 12px; color: #888; margin-left: auto; }
#rec-time { font-size: 12px; color: #e74c3c; font-weight: 500; display: none; }
.ratio-btns { display: flex; gap: 4px; }
</style>

<div id="app">
  <div id="canvas-wrap">
    <canvas id="vis"></canvas>
  </div>
  <div id="controls">
    <label class="file-btn">🎵 MP3 불러오기 <input type="file" id="fileInput" accept="audio/*" style="display:none"></label>
    <button class="btn" id="playBtn" disabled>▶ 재생</button>
    <select id="styleSelect">
      <option value="fire">🔥 모닥불</option>
      <option value="wave">🌊 파도</option>
      <option value="cloud">☁️ 구름</option>
      <option value="petal">🌸 꽃잎날림</option>
      <option value="grass">🌿 잔디흔들림</option>
    </select>
    <div class="ratio-btns">
      <button class="btn active" id="r169">16:9</button>
      <button class="btn" id="r916">9:16</button>
    </div>
    <button class="btn" id="recBtn" disabled>⏺ 녹화</button>
    <span id="rec-time" id="recTime">● REC <span id="recSec">0</span>s</span>
    <span id="status">MP3 파일을 불러오세요</span>
  </div>
</div>

<script>
const canvas = document.getElementById('vis');
const ctx = canvas.getContext('2d');
const fileInput = document.getElementById('fileInput');
const playBtn = document.getElementById('playBtn');
const styleSelect = document.getElementById('styleSelect');
const recBtn = document.getElementById('recBtn');
const status = document.getElementById('status');
const recTimeEl = document.getElementById('rec-time');
const recSecEl = document.getElementById('recSec');
const r169Btn = document.getElementById('r169');
const r916Btn = document.getElementById('r916');

let audioCtx, analyser, source, audioBuffer, gainNode;
let isPlaying = false, rafId, startTime = 0, pauseOffset = 0;
let ratio = '16:9';
let mediaRecorder = null, recChunks = [], recInterval = null, recSeconds = 0;
let currentStyle = 'fire';

function setRatio(r) {
  ratio = r;
  resizeCanvas();
  r169Btn.classList.toggle('active', r === '16:9');
  r916Btn.classList.toggle('active', r === '9:16');
}
r169Btn.onclick = () => setRatio('16:9');
r916Btn.onclick = () => setRatio('9:16');

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const w = wrap.clientWidth || 640;
  if (ratio === '16:9') {
    canvas.width = Math.min(w, 960);
    canvas.height = Math.round(canvas.width * 9 / 16);
  } else {
    canvas.width = Math.min(w, 360);
    canvas.height = Math.round(canvas.width * 16 / 9);
  }
  canvas.style.width = canvas.width + 'px';
  canvas.style.height = canvas.height + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

fileInput.addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  status.textContent = '로딩 중...';
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const ab = await file.arrayBuffer();
  audioBuffer = await audioCtx.decodeAudioData(ab);
  playBtn.disabled = false;
  recBtn.disabled = false;
  status.textContent = file.name.slice(0, 30);
  if (!analyser) {
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    gainNode = audioCtx.createGain();
    analyser.connect(gainNode);
    gainNode.connect(audioCtx.destination);
  }
});

playBtn.addEventListener('click', () => {
  if (!audioBuffer) return;
  if (isPlaying) { stopAudio(); playBtn.textContent = '▶ 재생'; }
  else { startAudio(pauseOffset); playBtn.textContent = '⏸ 일시정지'; }
});

function startAudio(offset = 0) {
  if (!audioCtx) return;
  source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(analyser);
  source.start(0, offset);
  startTime = audioCtx.currentTime - offset;
  isPlaying = true;
  source.onended = () => { if (isPlaying) { isPlaying = false; pauseOffset = 0; playBtn.textContent = '▶ 재생'; } };
  draw();
}
function stopAudio() {
  if (source) { try { source.stop(); } catch(e){} }
  pauseOffset = audioCtx.currentTime - startTime;
  isPlaying = false;
  cancelAnimationFrame(rafId);
}

styleSelect.addEventListener('change', () => { currentStyle = styleSelect.value; });

const W = () => canvas.width, H = () => canvas.height;

// Particle systems
let particles = [];
function initParticles(style) {
  particles = [];
  if (style === 'petal') {
    for (let i = 0; i < 80; i++) particles.push({ x: Math.random()*W(), y: Math.random()*H(), vx: (Math.random()-0.5)*1.5, vy: -Math.random()*1.5-0.5, size: Math.random()*10+5, rot: Math.random()*Math.PI*2, rspeed: (Math.random()-0.5)*0.05, color: `hsl(${Math.random()*60+300},90%,${60+Math.random()*20}%)`, alpha: Math.random()*0.5+0.5, swing: Math.random()*2*Math.PI, swingSpeed: 0.02+Math.random()*0.03 });
  } else if (style === 'grass') {
    for (let i = 0; i < 120; i++) particles.push({ x: (i/120)*W(), baseH: Math.random()*H()*0.25+H()*0.1, segments: 5, phase: Math.random()*Math.PI*2, color: `hsl(${100+Math.random()*40},${70+Math.random()*20}%,${30+Math.random()*20}%)` });
  }
}
initParticles('fire');

const fireEmbers = Array.from({length: 120}, () => ({ x: 0, y: 0, vx: 0, vy: 0, life: 0, maxLife: 0, size: 0, hue: 0 }));

function getFreqData() {
  if (!analyser) return { bass: 0, mid: 0, treble: 0, data: new Uint8Array(512) };
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  const bassEnd = Math.floor(data.length * 0.1);
  const midEnd = Math.floor(data.length * 0.4);
  let bass = 0, mid = 0, treble = 0;
  for (let i = 0; i < bassEnd; i++) bass += data[i];
  for (let i = bassEnd; i < midEnd; i++) mid += data[i];
  for (let i = midEnd; i < data.length; i++) treble += data[i];
  bass /= bassEnd * 255; mid /= (midEnd - bassEnd) * 255; treble /= (data.length - midEnd) * 255;
  return { bass, mid, treble, data };
}

let time = 0;
function draw() {
  rafId = requestAnimationFrame(draw);
  time += 0.016;
  const { bass, mid, treble, data } = getFreqData();
  const vol = (bass * 0.5 + mid * 0.3 + treble * 0.2);

  ctx.clearRect(0, 0, W(), H());

  if (currentStyle === 'fire') drawFire(bass, mid, treble, vol, data);
  else if (currentStyle === 'wave') drawWave(bass, mid, treble, vol, data);
  else if (currentStyle === 'cloud') drawCloud(bass, mid, treble, vol, data);
  else if (currentStyle === 'petal') drawPetal(bass, mid, treble, vol, data);
  else if (currentStyle === 'grass') drawGrass(bass, mid, treble, vol, data);
}

// ---- FIRE ----
let fireLayer = Array.from({length: 80}, () => ({ x: 0, y: 0, h: 0, phase: Math.random()*Math.PI*2, hue: 0 }));
function drawFire(bass, mid, treble, vol, data) {
  const w = W(), h = H();
  ctx.fillStyle = `rgb(5,3,8)`;
  ctx.fillRect(0, 0, w, h);

  const fireH = h * (0.35 + bass * 0.55);
  const cx = w / 2;
  const fireW = w * (0.25 + mid * 0.35);

  // Ground glow
  const grd = ctx.createRadialGradient(cx, h, 0, cx, h, fireW * 0.8);
  grd.addColorStop(0, `rgba(255,120,20,${0.5 + bass * 0.4})`);
  grd.addColorStop(0.4, `rgba(200,50,5,${0.2 + bass * 0.2})`);
  grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(cx - fireW, h * 0.7, fireW * 2, h * 0.35);

  // Multiple flame layers
  for (let layer = 0; layer < 5; layer++) {
    const lFade = 1 - layer / 5;
    const lW = fireW * (1 - layer * 0.12) * (0.7 + bass * 0.4);
    const lH = fireH * (1 - layer * 0.08) * (0.8 + mid * 0.3);
    const lHue = 15 + layer * 12 + treble * 30;
    const alpha = (0.6 - layer * 0.08) * (0.5 + vol * 0.8);

    ctx.beginPath();
    ctx.moveTo(cx - lW * 0.5, h);
    const segs = 30;
    for (let i = 0; i <= segs; i++) {
      const t = i / segs;
      const fx = cx - lW * 0.5 + lW * t;
      const noiseX = Math.sin(time * (1.2 + layer * 0.3) + t * 8 + layer) * lW * 0.12 * (0.5 + vol);
      const noiseY = Math.sin(time * (1.5 + layer * 0.4) + t * 5 + layer * 2) * lH * 0.1;
      const shape = Math.sin(t * Math.PI);
      const envelope = Math.pow(Math.sin(t * Math.PI), 1.5 + layer * 0.2);
      const fy = h - envelope * lH + noiseY;
      if (i === 0) ctx.moveTo(fx + noiseX, h);
      else ctx.lineTo(fx + noiseX, fy);
    }
    ctx.lineTo(cx + lW * 0.5, h);
    ctx.closePath();

    const fg = ctx.createLinearGradient(cx, h - lH, cx, h);
    fg.addColorStop(0, `hsla(${lHue + 40},100%,90%,0)`);
    fg.addColorStop(0.3, `hsla(${lHue + 20},100%,75%,${alpha * 0.6})`);
    fg.addColorStop(0.7, `hsla(${lHue},100%,55%,${alpha})`);
    fg.addColorStop(1, `hsla(${lHue - 10},100%,30%,${alpha * 1.2})`);
    ctx.fillStyle = fg;
    ctx.fill();
  }

  // Embers
  for (let i = 0; i < fireEmbers.length; i++) {
    const e = fireEmbers[i];
    if (e.life <= 0 && bass > 0.15 && Math.random() < 0.3) {
      e.x = cx + (Math.random() - 0.5) * fireW * 0.6;
      e.y = h - fireH * 0.2;
      e.vx = (Math.random() - 0.5) * 2 * (1 + treble * 2);
      e.vy = -(Math.random() * 3 + 1) * (1 + bass * 2);
      e.maxLife = Math.random() * 60 + 30;
      e.life = e.maxLife;
      e.size = Math.random() * 2.5 + 0.5;
      e.hue = Math.random() * 40 + 10;
    }
    if (e.life > 0) {
      e.life--;
      e.x += e.vx + Math.sin(time * 3 + i) * 0.5;
      e.y += e.vy;
      e.vy += 0.04;
      e.vx *= 0.98;
      const a = e.life / e.maxLife;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size * a, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${e.hue},100%,80%,${a * 0.9})`;
      ctx.fill();
    }
  }

  // Smoke
  for (let i = 0; i < 8; i++) {
    const sx = cx + Math.sin(time * 0.5 + i * 1.2) * fireW * 0.3;
    const sy = h - fireH - i * h * 0.05 - mid * h * 0.1;
    const sr = (i * 12 + 8) * (0.5 + vol * 0.5);
    const sa = (0.06 - i * 0.006) * (0.3 + vol * 0.5);
    const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr);
    sg.addColorStop(0, `rgba(80,70,90,${sa})`);
    sg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ---- WAVE ----
function drawWave(bass, mid, treble, vol, data) {
  const w = W(), h = H();
  const skyG = ctx.createLinearGradient(0, 0, 0, h * 0.55);
  skyG.addColorStop(0, `hsl(${210 + bass * 20},${50 + mid * 30}%,${15 + bass * 10}%)`);
  skyG.addColorStop(1, `hsl(${190 + mid * 20},${60 + vol * 20}%,${25 + vol * 15}%)`);
  ctx.fillStyle = skyG;
  ctx.fillRect(0, 0, w, h);

  // Moon/sun
  const moonR = w * 0.04 + bass * w * 0.02;
  const moonG = ctx.createRadialGradient(w * 0.8, h * 0.15, 0, w * 0.8, h * 0.15, moonR * 2.5);
  moonG.addColorStop(0, `rgba(255,240,180,${0.7 + vol * 0.3})`);
  moonG.addColorStop(0.4, `rgba(255,220,120,${0.2 + vol * 0.2})`);
  moonG.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = moonG;
  ctx.fillRect(w * 0.7, 0, w * 0.3, h * 0.35);
  ctx.beginPath();
  ctx.arc(w * 0.8, h * 0.15, moonR, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,245,200,${0.85 + vol * 0.15})`;
  ctx.fill();

  // Wave layers
  const waveLayers = 5;
  for (let l = waveLayers; l >= 0; l--) {
    const ly = h * (0.45 + l * 0.09 + bass * 0.05);
    const lAmp = (h * 0.035 + bass * h * 0.055) * (1 - l * 0.12);
    const lSpeed = 0.8 + l * 0.3 + mid * 0.8;
    const lFreq = 2 + l * 0.7 + treble * 1.5;
    const lHue = 200 + l * 8;
    const lLight = 20 + l * 10 + vol * 15;
    const lAlpha = 0.7 + l * 0.06;

    ctx.beginPath();
    ctx.moveTo(0, h);
    for (let x = 0; x <= w; x += 3) {
      const nx = x / w;
      const y = ly + Math.sin(nx * Math.PI * lFreq + time * lSpeed) * lAmp
        + Math.sin(nx * Math.PI * (lFreq * 1.7) + time * lSpeed * 1.3) * lAmp * 0.4
        + Math.sin(nx * Math.PI * (lFreq * 0.5) + time * lSpeed * 0.7) * lAmp * 0.6;
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
    const wg = ctx.createLinearGradient(0, ly - lAmp, 0, h);
    wg.addColorStop(0, `hsla(${lHue},70%,${lLight}%,${lAlpha})`);
    wg.addColorStop(0.5, `hsla(${lHue + 10},65%,${lLight - 8}%,${lAlpha})`);
    wg.addColorStop(1, `hsla(${lHue + 20},60%,${10 + l * 3}%,1)`);
    ctx.fillStyle = wg;
    ctx.fill();
  }

  // Foam / sparkle on top wave
  const topY = h * (0.45 + bass * 0.05);
  for (let i = 0; i < 40; i++) {
    const fx = (Math.sin(i * 2.3 + time * 1.5) * 0.5 + 0.5) * w;
    const wAmp = h * 0.04 + bass * h * 0.06;
    const fy = topY + Math.sin(fx / w * Math.PI * (2 + treble) + time * 0.8) * wAmp;
    const fa = (0.3 + treble * 0.5) * (0.5 + Math.random() * 0.5);
    ctx.beginPath();
    ctx.arc(fx, fy, 1.5 + treble * 2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${fa})`;
    ctx.fill();
  }

  // Moonlight reflection
  const reflG = ctx.createLinearGradient(w * 0.75, h * 0.45, w * 0.85, h);
  reflG.addColorStop(0, `rgba(255,245,180,${0.15 + vol * 0.1})`);
  reflG.addColorStop(1, `rgba(255,245,180,0)`);
  ctx.fillStyle = reflG;
  ctx.fillRect(w * 0.73, h * 0.45, w * 0.14, h * 0.55);
}

// ---- CLOUD ----
let cloudPos = Array.from({length: 10}, (_, i) => ({ x: Math.random() * 1200 - 100, y: Math.random() * 0.45, size: 0.5 + Math.random() * 0.8, speed: 0.1 + Math.random() * 0.3, puffs: Math.floor(3 + Math.random() * 4), hue: Math.random() * 30 - 10 }));
function drawCloud(bass, mid, treble, vol, data) {
  const w = W(), h = H();

  // Sky gradient - shifts with music
  const skyG = ctx.createLinearGradient(0, 0, 0, h);
  const skyHue = 200 + bass * 30;
  skyG.addColorStop(0, `hsl(${skyHue + 20},${60 + vol * 20}%,${25 + vol * 20}%)`);
  skyG.addColorStop(0.5, `hsl(${skyHue},${50 + mid * 20}%,${45 + bass * 15}%)`);
  skyG.addColorStop(1, `hsl(${skyHue - 20},${40 + treble * 20}%,${60 + vol * 10}%)`);
  ctx.fillStyle = skyG;
  ctx.fillRect(0, 0, w, h);

  // Stars
  for (let i = 0; i < 60; i++) {
    const sx = ((i * 137.5) % 1) * w;
    const sy = ((i * 97.3) % 0.5) * h;
    const sa = (0.3 + Math.sin(time * 2 + i) * 0.2) * (1 - vol * 0.8);
    if (sa > 0) {
      ctx.beginPath();
      ctx.arc(sx, sy, 1 + treble, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,220,${sa})`;
      ctx.fill();
    }
  }

  // Sun/light source
  const sunY = h * (0.15 + bass * 0.08);
  const sunR = w * 0.06 + vol * w * 0.03;
  const sunHue = 30 + treble * 30;
  const sunG = ctx.createRadialGradient(w * 0.5, sunY, 0, w * 0.5, sunY, sunR * 3);
  sunG.addColorStop(0, `hsla(${sunHue},100%,90%,${0.9 + bass * 0.1})`);
  sunG.addColorStop(0.3, `hsla(${sunHue - 10},100%,70%,${0.4 + vol * 0.2})`);
  sunG.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = sunG;
  ctx.fillRect(0, 0, w, h * 0.5);

  // Clouds
  cloudPos.forEach(c => {
    c.x += c.speed * (1 + mid * 2) * (w / 800);
    if (c.x > w + 200) c.x = -200;
    const cy = c.y * h;
    const cs = c.size * w * 0.12 * (1 + bass * 0.3);
    const alpha = 0.6 + vol * 0.3;
    for (let p = 0; p < c.puffs; p++) {
      const px = c.x + p * cs * 0.55;
      const py = cy + Math.sin(p * 1.5) * cs * 0.25;
      const pr = cs * (0.5 + Math.sin(p * 2) * 0.2) * (1 + Math.sin(time * 0.5 + p) * 0.05 * bass);
      const cg = ctx.createRadialGradient(px, py - pr * 0.2, 0, px, py, pr);
      const lightness = 85 + vol * 10;
      cg.addColorStop(0, `hsla(${c.hue + 200},20%,${lightness}%,${alpha})`);
      cg.addColorStop(0.7, `hsla(${c.hue + 210},15%,${lightness - 10}%,${alpha * 0.7})`);
      cg.addColorStop(1, `hsla(${c.hue + 220},10%,${lightness - 20}%,0)`);
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.arc(px, py, pr, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  // Horizon glow
  const hg = ctx.createLinearGradient(0, h * 0.6, 0, h);
  hg.addColorStop(0, `hsla(${30 + bass * 20},${80 + vol * 20}%,70%,${0.2 + vol * 0.2})`);
  hg.addColorStop(1, `hsla(20,60%,50%,0)`);
  ctx.fillStyle = hg;
  ctx.fillRect(0, h * 0.6, w, h * 0.4);
}

// ---- PETAL ----
function drawPetal(bass, mid, treble, vol, data) {
  const w = W(), h = H();
  ctx.fillStyle = `rgba(5,5,15,0.25)`;
  ctx.fillRect(0, 0, w, h);

  // Background gradient
  const bg = ctx.createRadialGradient(w * 0.5, h * 0.5, 0, w * 0.5, h * 0.5, w * 0.7);
  bg.addColorStop(0, `hsla(${310 + bass * 30},60%,${10 + vol * 15}%,0.4)`);
  bg.addColorStop(1, `hsla(260,40%,5%,0.2)`);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  // Spawn new petals based on beat
  if (bass > 0.25 && particles.length < 200) {
    for (let i = 0; i < Math.floor(bass * 5); i++) {
      particles.push({ x: Math.random() * w, y: h + 20, vx: (Math.random() - 0.5) * 2, vy: -(Math.random() * 2 + 1) * (1 + bass * 2), size: Math.random() * 12 + 4, rot: Math.random() * Math.PI * 2, rspeed: (Math.random() - 0.5) * 0.1, color: `hsl(${Math.random() * 80 + 290},90%,${60 + Math.random() * 20}%)`, alpha: 0.8 + Math.random() * 0.2, swing: Math.random() * 2 * Math.PI, swingSpeed: 0.02 + Math.random() * 0.03 });
    }
  }

  particles.forEach((p, i) => {
    p.swing += p.swingSpeed * (1 + mid * 2);
    p.vx = Math.sin(p.swing) * (0.8 + treble * 1.5);
    p.y += p.vy * (0.5 + vol * 0.8);
    p.x += p.vx;
    p.rot += p.rspeed * (1 + bass * 2);
    p.vy += 0.01;
    p.alpha -= 0.002;

    if (p.alpha > 0 && p.y > -50) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = p.alpha;
      // Petal shape
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(p.size * 0.5, -p.size * 0.4, p.size, -p.size * 0.3, p.size * 0.5, 0);
      ctx.bezierCurveTo(p.size, p.size * 0.3, p.size * 0.5, p.size * 0.4, 0, 0);
      ctx.fillStyle = p.color;
      ctx.fill();
      ctx.strokeStyle = `rgba(255,255,255,0.3)`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
      ctx.restore();
    }
  });
  particles = particles.filter(p => p.alpha > 0 && p.y > -60 && p.y < h + 60);

  // Frequency bars as light streaks
  const barCount = 32;
  for (let i = 0; i < barCount; i++) {
    const idx = Math.floor(i / barCount * data.length * 0.5);
    const val = data[idx] / 255;
    if (val < 0.1) continue;
    const x = (i / barCount) * w;
    const bh = val * h * 0.3;
    const hue = 290 + i * 3 + bass * 30;
    const lg = ctx.createLinearGradient(x, h, x, h - bh);
    lg.addColorStop(0, `hsla(${hue},100%,70%,0.5)`);
    lg.addColorStop(1, `hsla(${hue + 20},100%,90%,0)`);
    ctx.fillStyle = lg;
    ctx.fillRect(x - 1, h - bh, 3, bh);
  }
}

// ---- GRASS ----
function drawGrass(bass, mid, treble, vol, data) {
  const w = W(), h = H();

  // Sky
  const skyG = ctx.createLinearGradient(0, 0, 0, h * 0.7);
  const dusk = bass * 0.5;
  skyG.addColorStop(0, `hsl(${195 + dusk * 40},${55 + vol * 25}%,${30 + bass * 20}%)`);
  skyG.addColorStop(0.6, `hsl(${170 + mid * 30},${45 + vol * 20}%,${55 + bass * 15}%)`);
  skyG.addColorStop(1, `hsl(${100 + treble * 30},${50 + vol * 20}%,${50 + bass * 10}%)`);
  ctx.fillStyle = skyG;
  ctx.fillRect(0, 0, w, h);

  // Wind streaks
  const windStr = mid * 0.8 + treble * 0.2;
  for (let i = 0; i < 15; i++) {
    const wy = Math.random() * h * 0.5;
    const wx = (time * 60 * (0.5 + i * 0.1) + i * 137) % (w + 200) - 100;
    ctx.beginPath();
    ctx.moveTo(wx, wy);
    ctx.lineTo(wx + 30 + windStr * 80, wy + (Math.random() - 0.5) * 10);
    ctx.strokeStyle = `rgba(255,255,255,${windStr * 0.12})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Ground
  const groundG = ctx.createLinearGradient(0, h * 0.65, 0, h);
  groundG.addColorStop(0, `hsl(${110 + bass * 20},${55 + vol * 20}%,${25 + bass * 10}%)`);
  groundG.addColorStop(1, `hsl(90,40%,12%)`);
  ctx.fillStyle = groundG;
  ctx.fillRect(0, h * 0.65, w, h * 0.35);

  // Grass blades
  const bladeCount = 200;
  const windPhase = time * (1.5 + mid * 2.5);
  const windAmp = 0.2 + vol * 0.6 + bass * 0.3;

  for (let i = 0; i < bladeCount; i++) {
    const bx = (i / bladeCount) * w + Math.sin(i * 7.3) * 8;
    const bBaseY = h * (0.65 + Math.sin(i * 3.1) * 0.03);
    const bHeight = h * (0.08 + Math.sin(i * 5.7) * 0.04 + bass * 0.06) * (1 + vol * 0.3);
    const bPhase = i * 0.4 + windPhase;
    const bSway = Math.sin(bPhase) * windAmp * bHeight * 0.6;
    const bSway2 = Math.sin(bPhase * 1.7 + 1.2) * windAmp * bHeight * 0.2;
    const hue = 95 + Math.sin(i * 2.1) * 20 + bass * 15;
    const lightness = 30 + Math.sin(i * 1.7) * 8 + vol * 10;

    ctx.beginPath();
    ctx.moveTo(bx, bBaseY);
    ctx.quadraticCurveTo(bx + bSway * 0.5 + bSway2, bBaseY - bHeight * 0.5, bx + bSway + bSway2, bBaseY - bHeight);
    ctx.lineWidth = 1.5 + Math.sin(i * 2.3) * 0.8;
    ctx.strokeStyle = `hsl(${hue},${65 + vol * 15}%,${lightness}%)`;
    ctx.stroke();

    // Seed head on some blades
    if (i % 5 === 0 && bass > 0.1) {
      const tx = bx + bSway + bSway2;
      const ty = bBaseY - bHeight;
      ctx.beginPath();
      ctx.arc(tx, ty, 2 + bass * 2, 0, Math.PI * 2);
      ctx.fillStyle = `hsl(${hue + 20},70%,${lightness + 20}%)`;
      ctx.fill();
    }
  }

  // Frequency waveform on ground
  ctx.beginPath();
  for (let i = 0; i <= w; i += 4) {
    const di = Math.floor(i / w * data.length * 0.5);
    const val = (data[di] / 255) * h * 0.04;
    const y = h * 0.65 - val;
    if (i === 0) ctx.moveTo(0, y);
    else ctx.lineTo(i, y);
  }
  ctx.strokeStyle = `rgba(150,255,100,${0.3 + vol * 0.3})`;
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

// ---- Recording ----
recBtn.addEventListener('click', () => {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    stopRec();
  } else {
    startRec();
  }
});

function startRec() {
  recChunks = [];
  const stream = canvas.captureStream(30);
  const opts = ['video/mp4;codecs=avc1', 'video/mp4', 'video/webm;codecs=h264', 'video/webm;codecs=vp9', 'video/webm'];
  let mimeType = opts.find(t => MediaRecorder.isTypeSupported(t)) || 'video/webm';
  mediaRecorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 5000000 });
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
  mediaRecorder.onstop = saveRec;
  mediaRecorder.start(100);
  recBtn.textContent = '⏹ 녹화중지';
  recBtn.classList.add('rec');
  recTimeEl.style.display = 'inline';
  recSeconds = 0;
  recInterval = setInterval(() => { recSeconds++; recSecEl.textContent = recSeconds; }, 1000);
  status.textContent = '🔴 녹화 중...';
}

function stopRec() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  clearInterval(recInterval);
  recBtn.textContent = '⏺ 녹화';
  recBtn.classList.remove('rec');
  recTimeEl.style.display = 'none';
}

function saveRec() {
  const opts = ['video/mp4;codecs=avc1', 'video/mp4', 'video/webm;codecs=h264', 'video/webm;codecs=vp9', 'video/webm'];
  const mimeType = opts.find(t => MediaRecorder.isTypeSupported(t)) || 'video/webm';
  const isMP4 = mimeType.includes('mp4');
  const blob = new Blob(recChunks, { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `visualizer_${currentStyle}_${ratio.replace(':','x')}_${Date.now()}.${isMP4 ? 'mp4' : 'webm'}`;
  a.click();
  URL.revokeObjectURL(url);
  status.textContent = `✅ 저장완료 (${isMP4 ? 'MP4/H264' : 'WebM'})`;
}

// Draw idle frame
(function idleDraw() {
  ctx.fillStyle = '#05030a';
  ctx.fillRect(0, 0, W(), H());
  ctx.fillStyle = 'rgba(120,100,180,0.7)';
  ctx.font = `${Math.max(12, W() * 0.025)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('MP3 파일을 불러오면 시각화가 시작됩니다', W() / 2, H() / 2);
  ctx.fillStyle = 'rgba(80,70,120,0.5)';
  ctx.font = `${Math.max(10, W() * 0.018)}px sans-serif`;
  ctx.fillText('16:9 / 9:16 비율 선택 후 녹화 가능', W() / 2, H() / 2 + W() * 0.04);
})();
