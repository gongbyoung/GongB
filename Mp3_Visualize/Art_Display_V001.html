<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>디지털 브러시 화풍 생성기</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f4; padding: 20px; }
        canvas { background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); cursor: crosshair; }
        .controls { background: white; padding: 20px; border-radius: 8px; margin-top: 10px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
    </style>
</head>
<body>
    <h2>이미지 브러시 스타일 변환기</h2>
    <input type="file" id="upload" accept="image/*">
    <div class="controls">
        <label>브러시 크기: <input type="range" id="size" min="2" max="20" value="5"></label>
        <label>브러시 모양: 
            <select id="shape">
                <option value="circle">원형 (점묘법)</option>
                <option value="square">사각형 (모자이크)</option>
            </select>
        </label>
        <button onclick="processImage()">스타일 적용하기</button>
        <button onclick="download()">이미지 저장</button>
    </div>
    <canvas id="outputCanvas"></canvas>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d');
        let img = new Image();

        upload.addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        function processImage() {
            const size = parseInt(document.getElementById('size').value);
            const shape = document.getElementById('shape').value;
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < canvas.height; y += size) {
                for (let x = 0; x < canvas.width; x += size) {
                    const i = (y * canvas.width + x) * 4;
                    const r = imageData[i], g = imageData[i+1], b = imageData[i+2];
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    
                    if (shape === 'circle') {
                        ctx.beginPath();
                        ctx.arc(x, y, size/2, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.fillRect(x, y, size, size);
                    }
                }
            }
        }

        function download() {
            const link = document.createElement('a');
            link.download = 'my-art.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
