<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM ART LAB v2.0 — Music Painter</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#08080a;
  --panel:#111116;
  --border:rgba(255,255,255,0.08);
  --accent:#00ffcc;
  --text:#f0f0f0;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Courier New',monospace;
  height:100vh;
  overflow:hidden;
  display: flex;
  flex-direction: column;
}

/* TOPBAR */
.topbar{
  padding:12px 20px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:13px;}

/* MAIN LAYOUT */
.container {
  display: grid;
  grid-template-columns: 260px 1fr 320px;
  flex: 1;
  min-height: 0;
}

.side-panel {
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 18px;
  overflow-y: auto;
}
.side-panel.right { border-right:none; border-left: 1px solid var(--border); }

h3 { font-size: 10px; letter-spacing: 2px; color: #555; margin-bottom: 15px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px;}

/* CONTROLS */
.control-group { margin-bottom: 18px; }
.control-group label { display: block; font-size: 10px; color: #888; margin-bottom: 6px; }
.rgb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.rgb-grid div { display: flex; flex-direction: column; }

input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; height: 4px;}
select { width: 100%; background: #000; color: #fff; border: 1px solid var(--border); padding: 6px; font-family: inherit; font-size: 11px; }

/* PLAYLIST */
.pl-item { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.02); cursor: pointer; font-size: 10.5px; opacity: 0.7; }
.pl-item:hover { opacity: 1; background: rgba(255,255,255,0.03); }
.pl-item.active { color: var(--accent); opacity: 1; border-left: 2px solid var(--accent); padding-left: 12px;}

/* CANVAS AREA */
.viz-area { position: relative; background: #000; display: flex; flex-direction: column;}
#artCanvas { flex: 1; width: 100%; height: 100%; }

.bottom-ctrl {
  padding: 12px 20px; background: #050505; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 15px;
}
.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 8px 16px; cursor: pointer; font-size: 10px; transition: 0.2s; }
.btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.05); }
.btn.primary { background: var(--accent); color: #000; border: none; font-weight: bold; }

#trackInfo { font-size: 10px; color: #555; flex: 1; text-align: right; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">AUDIO ARTIST LAB V2.0</div>
  <div style="font-size:10px; color: #444;">ACT ART & MUSIC VISUALIZER</div>
</div>

<div class="container">
  <div class="side-panel">
    <h3>Audio Source</h3>
    <button class="btn" onclick="document.getElementById('fileInput').click()" style="width:100%; margin-bottom:15px;">ADD MUSIC</button>
    <input type="file" id="fileInput" accept="audio/*" multiple onchange="handleFiles(this.files)">
    <div id="playlist"></div>
  </div>

  <div class="viz-area">
    <canvas id="artCanvas"></canvas>
    <div class="bottom-ctrl">
      <button class="btn" onclick="clearCanvas()">RESET</button>
      <button class="btn primary" id="playBtn" onclick="togglePlay()">RUN PERFORMANCE</button>
      <button class="btn" onclick="saveImage()">EXPORT PNG</button>
      <div id="trackInfo">Ready to paint.</div>
    </div>
  </div>

  <div class="side-panel right">
    <h3>Brush & Shape</h3>
    <div class="control-group">
      <label>BRUSH SIZE (크기)</label>
      <input type="range" id="pSize" min="1" max="150" value="40">
    </div>
    <div class="control-group">
      <label>DENSITY (뿌리는 양)</label>
      <input type="range" id="pCount" min="1" max="50" value="10">
    </div>
    <div class="control-group">
      <label>SHAPE (브러시 종류)</label>
      <select id="pShape">
        <option value="oil">Oil Paint (유화 터치)</option>
        <option value="splatter">Splatter (물감 뿌리기)</option>
        <option value="abstract">Soft Glow (부드러운 빛)</option>
        <option value="cloud">Mystery Mist (안개)</option>
        <option value="particle">Star Dust (미세 입자)</option>
        <option value="line">Cyber String (실선)</option>
      </select>
    </div>

    <h3>RGB Color Range (랜덤 범위)</h3>
    <div class="control-group rgb-grid">
      <div>
        <label>R Min</label>
        <input type="range" id="rMin" min="0" max="255" value="0">
      </div>
      <div>
        <label>R Max</label>
        <input type="range" id="rMax" min="0" max="255" value="255">
      </div>
      <div>
        <label>G Min</label>
        <input type="range" id="gMin" min="0" max="255" value="100">
      </div>
      <div>
        <label>G Max</label>
        <input type="range" id="gMax" min="0" max="255" value="255">
      </div>
      <div>
        <label>B Min</label>
        <input type="range" id="bMin" min="0" max="255" value="150">
      </div>
      <div>
        <label>B Max</label>
        <input type="range" id="bMax" min="0" max="255" value="255">
      </div>
    </div>

    <div class="control-group">
      <label>SENSITIVITY (반응도)</label>
      <input type="range" id="pSens" min="1" max="10" step="1" value="6">
    </div>
  </div>
</div>

<script>
let audioCtx, analyser, source;
let playlist = [];
let currentIdx = -1;
let isPlaying = false;
let audioBuffer = null;
let startTime = 0;
let pauseOffset = 0;

const canvas = document.getElementById('artCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  const temp = ctx.getImageData(0,0,canvas.width,canvas.height);
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
  ctx.putImageData(temp, 0, 0);
  if(!temp.data.some(x=>x!==0)) clearCanvas();
}
window.onresize = resize;
resize();

function clearCanvas() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function saveImage() {
  const link = document.createElement('a');
  link.download = `art-${Date.now()}.png`;
  link.href = canvas.toDataURL();
  link.click();
}

function handleFiles(files) {
  for(let f of files) playlist.push({ file: f, name: f.name.replace(/\.[^.]+$/, '') });
  renderPlaylist();
  if(currentIdx === -1) loadTrack(0);
}

function renderPlaylist() {
  document.getElementById('playlist').innerHTML = playlist.map((t, i) => `
    <div class="pl-item ${i===currentIdx?'active':''}" onclick="loadTrack(${i})">${t.name}</div>
  `).join('');
}

function loadTrack(idx) {
  if(idx < 0 || idx >= playlist.length) return;
  currentIdx = idx;
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(source) source.stop();
  
  const reader = new FileReader();
  reader.onload = (e) => {
    audioCtx.decodeAudioData(e.target.result, (buf) => {
      audioBuffer = buf;
      pauseOffset = 0;
      playAudio();
      renderPlaylist();
      document.getElementById('trackInfo').textContent = playlist[idx].name;
    });
  };
  reader.readAsArrayBuffer(playlist[idx].file);
}

function playAudio() {
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
  source.start(0, pauseOffset);
  startTime = audioCtx.currentTime - pauseOffset;
  isPlaying = true;
  document.getElementById('playBtn').textContent = "PAUSE PERFORMANCE";
}

function togglePlay() {
  if(isPlaying) {
    pauseOffset = audioCtx.currentTime - startTime;
    source.stop();
    isPlaying = false;
    document.getElementById('playBtn').textContent = "RESUME PERFORMANCE";
  } else if(audioBuffer) {
    playAudio();
  }
}

function getRandomColor(amp) {
  const r = Math.floor(Math.random() * (parseInt(document.getElementById('rMax').value) - parseInt(document.getElementById('rMin').value)) + parseInt(document.getElementById('rMin').value));
  const g = Math.floor(Math.random() * (parseInt(document.getElementById('gMax').value) - parseInt(document.getElementById('gMin').value)) + parseInt(document.getElementById('gMin').value));
  const b = Math.floor(Math.random() * (parseInt(document.getElementById('bMax').value) - parseInt(document.getElementById('bMin').value)) + parseInt(document.getElementById('bMin').value));
  return { r, g, b, a: 0.1 + (amp * 0.6) };
}

function draw() {
  requestAnimationFrame(draw);
  if(!isPlaying || !analyser) return;

  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);

  const density = parseInt(document.getElementById('pCount').value);
  const brushBaseSize = parseInt(document.getElementById('pSize').value);
  const shape = document.getElementById('pShape').value;
  const sens = parseInt(document.getElementById('pSens').value);

  for(let i=0; i<density; i++) {
    const sampleIdx = Math.floor(Math.random() * data.length);
    const amp = data[sampleIdx] / 255;

    if(amp > (1.1 - sens/10)) {
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height;
      const finalSize = amp * brushBaseSize;
      const c = getRandomColor(amp);
      
      ctx.save();
      ctx.fillStyle = `rgba(${c.r}, ${c.g}, ${c.b}, ${c.a})`;
      ctx.strokeStyle = `rgba(${c.r}, ${c.g}, ${c.b}, ${c.a})`;
      
      if(shape === 'oil') {
        ctx.translate(x, y);
        ctx.rotate(Math.random() * Math.PI);
        ctx.fillRect(-finalSize, -finalSize/4, finalSize*2, finalSize/2);
      } 
      else if(shape === 'splatter') {
        for(let j=0; j<8; j++) {
          const sx = x + (Math.random()-0.5) * finalSize * 3;
          const sy = y + (Math.random()-0.5) * finalSize * 3;
          ctx.beginPath();
          ctx.arc(sx, sy, Math.random() * (finalSize/5), 0, Math.PI*2);
          ctx.fill();
        }
      }
      else if(shape === 'abstract') {
        const grd = ctx.createRadialGradient(x, y, 0, x, y, finalSize*1.5);
        grd.addColorStop(0, `rgba(${c.r}, ${c.g}, ${c.b}, ${c.a})`);
        grd.addColorStop(1, 'transparent');
        ctx.fillStyle = grd;
        ctx.beginPath(); ctx.arc(x, y, finalSize*1.5, 0, Math.PI*2); ctx.fill();
      }
      else if(shape === 'cloud') {
        ctx.filter = 'blur(10px)';
        ctx.beginPath(); ctx.arc(x, y, finalSize*2, 0, Math.PI*2); ctx.fill();
        ctx.filter = 'none';
      }
      else if(shape === 'particle') {
        ctx.beginPath(); ctx.arc(x, y, Math.random()*2, 0, Math.PI*2); ctx.fill();
      }
      else if(shape === 'line') {
        ctx.lineWidth = amp * 2;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + (Math.random()-0.5) * finalSize * 10, y + (Math.random()-0.5) * finalSize * 10);
        ctx.stroke();
      }
      ctx.restore();
    }
  }
}

draw();
</script>
</body>
</html>
