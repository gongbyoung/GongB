<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM ART LAB — Music Painter</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0c;
  --panel:#121218;
  --border:rgba(255,255,255,0.1);
  --accent:#ff3366;
  --text:#e0e0e0;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Courier New',monospace;
  height:100vh;
  overflow:hidden;
  display: flex;
  flex-direction: column;
}

/* TOPBAR */
.topbar{
  padding:15px 20px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.logo{letter-spacing:3px; color:var(--accent); font-weight:bold; font-size:14px;}

/* MAIN LAYOUT */
.container {
  display: grid;
  grid-template-columns: 280px 1fr 300px;
  flex: 1;
  min-height: 0;
}

/* PANELS */
.side-panel {
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 20px;
  overflow-y: auto;
}
.side-panel.right { border-right:none; border-left: 1px solid var(--border); }

h3 { font-size: 11px; letter-spacing: 2px; color: #666; margin-bottom: 20px; text-transform: uppercase; }

/* CONTROLS */
.control-group { margin-bottom: 20px; }
.control-group label { display: block; font-size: 10px; color: #aaa; margin-bottom: 8px; }
input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
select { width: 100%; background: #000; color: #fff; border: 1px solid var(--border); padding: 8px; font-family: inherit; font-size: 11px; }

/* PLAYLIST */
.pl-item { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; font-size: 11px; }
.pl-item:hover { background: rgba(255,255,255,0.05); }
.pl-item.active { color: var(--accent); font-weight: bold; }

/* CANVAS AREA */
.viz-area { position: relative; background: #050505; display: flex; flex-direction: column;}
#artCanvas { flex: 1; width: 100%; height: 100%; cursor: crosshair; }

.bottom-ctrl {
  padding: 15px 25px; background: #000; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 20px;
}
.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 10px 20px; cursor: pointer; font-size: 11px; letter-spacing: 1px; }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent); color: #fff; border: none; }

#trackInfo { font-size: 11px; color: #888; flex: 1; text-align: right; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">AUDIO ARTIST LAB v1.0</div>
  <div style="font-size:10px; opacity: 0.5;">MUSIC TO ABSTRACT PAINTING</div>
</div>

<div class="container">
  <div class="side-panel">
    <h3>Music Library</h3>
    <button class="btn" onclick="document.getElementById('fileInput').click()" style="width:100%; margin-bottom:20px;">파일 업로드</button>
    <input type="file" id="fileInput" accept="audio/*" multiple onchange="handleFiles(this.files)">
    <div id="playlist"></div>
  </div>

  <div class="viz-area">
    <canvas id="artCanvas"></canvas>
    <div class="bottom-ctrl">
      <button class="btn" onclick="clearCanvas()">🎨 캔버스 초기화</button>
      <button class="btn primary" id="playBtn" onclick="togglePlay()">시작</button>
      <button class="btn" onclick="saveImage()">🖼 이미지 저장</button>
      <div id="trackInfo">대기 중...</div>
    </div>
  </div>

  <div class="side-panel right">
    <h3>Painting Option</h3>
    
    <div class="control-group">
      <label>BRUSH DENSITY (물감 양)</label>
      <input type="range" id="pCount" min="1" max="20" value="5">
    </div>

    <div class="control-group">
      <label>PAINT COLOR (메인 색상)</label>
      <input type="range" id="pHue" min="0" max="360" value="340">
    </div>

    <div class="control-group">
      <label>BRUSH SHAPE (붓 모양)</label>
      <select id="pShape">
        <option value="abstract">Abstract (추상적 터치)</option>
        <option value="splatter">Splatter (뿌리기)</option>
        <option value="rect">Block (면 분할)</option>
        <option value="drone">Drone Path (비행 궤적)</option>
      </select>
    </div>

    <div class="control-group">
      <label>SENSITIVITY (음악 반응도)</label>
      <input type="range" id="pSens" min="1" max="10" step="1" value="5">
    </div>

    <div style="margin-top: auto; font-size: 9px; color: #555; line-height: 1.6;">
      * 음악의 주파수에 따라 실시간으로 물감이 찍힙니다.<br>
      * 캔버스가 지워지지 않고 음악의 흔적을 기록합니다.<br>
      * '비행 궤적' 모드는 소리의 흐름을 선으로 연결합니다.
    </div>
  </div>
</div>

<script>
let audioCtx, analyser, source, gainNode;
let playlist = [];
let currentIdx = -1;
let isPlaying = false;
let audioBuffer = null;
let startTime = 0;
let pauseOffset = 0;

const canvas = document.getElementById('artCanvas');
const ctx = canvas.getContext('2d');

// --- 초기화 ---
function resize() {
  const tempId = ctx.getImageData(0,0,canvas.width,canvas.height);
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
  ctx.putImageData(tempId, 0, 0); // 리사이즈 시 그림 유지
  ctx.fillStyle = '#050505';
  if(!tempId.data.some(x => x !== 0)) ctx.fillRect(0,0,canvas.width,canvas.height);
}
window.onresize = resize;
resize();

function clearCanvas() {
  ctx.fillStyle = '#050505';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function saveImage() {
  const link = document.createElement('a');
  link.download = 'music-art.png';
  link.href = canvas.toDataURL();
  link.click();
}

// --- 오디오 로직 ---
function handleFiles(files) {
  for(let f of files) playlist.push({ file: f, name: f.name.replace(/\.[^.]+$/, '') });
  renderPlaylist();
  if(currentIdx === -1) loadTrack(0);
}

function renderPlaylist() {
  document.getElementById('playlist').innerHTML = playlist.map((t, i) => `
    <div class="pl-item ${i===currentIdx?'active':''}" onclick="loadTrack(${i})">
      ${t.name}
    </div>
  `).join('');
}

function loadTrack(idx) {
  if(idx < 0 || idx >= playlist.length) return;
  currentIdx = idx;
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(source) source.stop();
  
  const reader = new FileReader();
  reader.onload = (e) => {
    audioCtx.decodeAudioData(e.target.result, (buf) => {
      audioBuffer = buf;
      pauseOffset = 0;
      playAudio();
      renderPlaylist();
      document.getElementById('trackInfo').textContent = playlist[idx].name;
    });
  };
  reader.readAsArrayBuffer(playlist[idx].file);
}

function playAudio() {
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
  source.start(0, pauseOffset);
  startTime = audioCtx.currentTime - pauseOffset;
  isPlaying = true;
  document.getElementById('playBtn').textContent = "일시정지";
}

function togglePlay() {
  if(isPlaying) {
    pauseOffset = audioCtx.currentTime - startTime;
    source.stop();
    isPlaying = false;
    document.getElementById('playBtn').textContent = "재개";
  } else if(audioBuffer) {
    playAudio();
  }
}

// --- 페인팅 엔진 (핵심) ---
function draw() {
  requestAnimationFrame(draw);
  if(!isPlaying || !analyser) return;

  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);

  const density = parseInt(document.getElementById('pCount').value);
  const mainHue = parseInt(document.getElementById('pHue').value);
  const shape = document.getElementById('pShape').value;
  const sens = parseInt(document.getElementById('pSens').value);

  for(let i=0; i<density; i++) {
    // 랜덤 주파수 선택
    const sampleIdx = Math.floor(Math.random() * data.length);
    const amp = data[sampleIdx] / 255;

    // 소리가 일정 크기 이상일 때만 찍기
    if(amp > (1 - sens/10)) {
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height;
      const size = amp * 50 * (sens/5);
      const hue = (mainHue + (amp * 60) - 30) % 360;
      
      ctx.save();
      ctx.globalAlpha = 0.2 + (amp * 0.5);
      ctx.fillStyle = `hsla(${hue}, 80%, 50%, ${0.3 + amp * 0.4})`;
      
      if(shape === 'abstract') {
        // 부드러운 원형 터치
        const grd = ctx.createRadialGradient(x, y, 0, x, y, size);
        grd.addColorStop(0, `hsla(${hue}, 90%, 60%, 0.8)`);
        grd.addColorStop(1, 'transparent');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
      } 
      else if(shape === 'splatter') {
        // 흩뿌리기 효과
        for(let j=0; j<5; j++) {
          ctx.beginPath();
          ctx.arc(x + (Math.random()-0.5)*size*2, y + (Math.random()-0.5)*size*2, Math.random()*3, 0, Math.PI*2);
          ctx.fill();
        }
      } 
      else if(shape === 'rect') {
        // 면 분할 추상화 (이미지 느낌)
        ctx.rotate(Math.random() * Math.PI);
        ctx.fillRect(x, y, size * 2, size / 4);
      } 
      else if(shape === 'drone') {
        // 드론 궤적 (선으로 연결)
        ctx.strokeStyle = ctx.fillStyle;
        ctx.lineWidth = amp * 2;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + (Math.random()-0.5)*100, y + (Math.random()-0.5)*100);
        ctx.stroke();
      }
      ctx.restore();
    }
  }
}

draw();
</script>
</body>
</html>
