<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SPECTRUM STUDIO v21.0.020 — GitHub Cloud</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{ --bg:#05050a; --panel:#0d0d1a; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; }
        body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
        .topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;}
        .main-workspace { display: grid; grid-template-columns: 380px 1fr 340px; flex:1; min-height:0; }
        .side-panel { background:var(--panel); padding:15px; overflow-y:auto; scrollbar-width: thin; border-left:1px solid var(--border); border-right:1px solid var(--border); }
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
        .label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}
        .val-label { float:right; color:var(--accent); font-weight:bold; font-size:9px; }
        input[type=text], input[type=password] { width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:5px; border-radius:4px; font-size:10px; margin-bottom:5px; outline:none; }
        input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; margin-top:5px; }
        .btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:6px; cursor:pointer; font-size:9px; width:100%; transition:0.2s; height: 32px; display: flex; align-items: center; justify-content: center; margin-bottom:5px;}
        .btn:hover { border-color: var(--accent); background: rgba(0,255,204,0.05); }
        .btn.primary { background:var(--accent2); border-color:var(--accent2); font-weight:bold; font-size:11px; margin-top:10px; height: auto; padding:12px; }
        .fx-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 5px; max-height: 380px; overflow-y: auto; padding-right:5px; }
        .fx-thumb { aspect-ratio: 1; border: 2px solid rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; background-size: cover; position: relative; transition: 0.2s; background-color: #111;}
        .fx-thumb.active { border-color: var(--accent2); box-shadow: 0 0 10px var(--accent2); }
        .fx-thumb::after { content: attr(data-name); position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.85); font-size: 5px; text-align: center; color: #fff; padding: 2px 0; overflow: hidden; white-space: nowrap; }
        .viz-area { position:relative; background:#000; overflow:hidden; display: flex; align-items: center; justify-content: center; }
        #p5-container canvas { width: 100% !important; height: auto !important; max-height: 100% !important; }
        .playbar { height:3px; background:#111; position:relative; }
        #progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">SPECTRUM STUDIO v21.0.020 — GitHub Cloud</div>
    <div id="timeCode">00:00 / 00:00</div>
</div>

<div class="main-workspace">
    <!-- LEFT: FX Palette -->
    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">1. Visual Palette (24 FX)</span>
            <div class="fx-grid" id="fxThumbGrid"></div>
        </div>
        <div class="ctrl-box">
            <span class="label-small">2. Custom Parameter</span>
            <label>SCALE <span class="val-label" id="vFxScale">1.0</span></label><input type="range" id="fxScale" min="0.1" max="5.0" step="0.1" value="1.0">
            <label>INTENSITY <span class="val-label" id="vFxInten">1.5</span></label><input type="range" id="fxInten" min="0.1" max="10.0" step="0.1" value="1.5">
            <label style="margin-top:10px; display:block;">SPEED <span class="val-label" id="vFxSpeed">1.0</span></label><input type="range" id="fxSpeed" min="0" max="5.0" step="0.1" value="1.0">
            <label style="margin-top:10px; display:block;">COLOR HUE <span class="val-label" id="vFxHue">200</span></label><input type="range" id="fxHue" min="0" max="360" value="200">
        </div>
    </div>

    <div class="viz-area" id="p5-container"></div>

    <!-- RIGHT: GitHub & Production -->
    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">3. GitHub Cloud Settings</span>
            <input type="text" id="ghUser" placeholder="GitHub Username" onchange="saveCloudInfo()">
            <input type="text" id="ghRepo" placeholder="Repository Name" onchange="saveCloudInfo()">
            <input type="password" id="ghToken" placeholder="GitHub PAT (Token)" onchange="saveCloudInfo()">
            <div style="font-size:8px; color:#666; margin-top:3px;">*토큰은 브라우저에만 저장됩니다.</div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">4. Cloud Export</span>
            <button class="btn" onclick="uploadToGitHub('config')">📤 PUSH CONFIG TO GITHUB</button>
            <button class="btn" onclick="uploadToGitHub('thumb')" style="border-color:var(--accent2); color:var(--accent2);">🖼️ PUSH THUMBNAIL TO GITHUB</button>
            <div id="cloudStatus" style="font-size:9px; color:var(--accent2); text-align:center; margin-top:5px;">연결 대기 중</div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">5. Master Recorder</span>
            <button class="btn" onclick="document.getElementById('mIn').click()">LOAD MP3</button>
            <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
            <button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START PRODUCTION</button>
        </div>
    </div>
</div>
<div class="playbar"><div id="progFill"></div></div>

<script>
    let audio, fft, ampObj, canvasRef, bgCanvas, isPlaying = false, mediaRecorder, recordedChunks = [];
    let overlayT = 0, currentFXId = 'waves';

    const FX_DB = [
        {id:'waves', n:'Wave Layer'}, {id:'matrix', n:'KR Matrix'}, {id:'ripBok', n:'Rip-Bokeh'}, {id:'bokRip', n:'Bok-Ripple'},
        {id:'dna', n:'DNA Helix'}, {id:'nebula', n:'Nebula'}, {id:'mandala', n:'Mandala'}, {id:'lightning', n:'Storm'},
        {id:'web', n:'Electric Web'}, {id:'vortex', n:'Vortex Rect'}, {id:'chladni', n:'Chladni'}, {id:'starfield', n:'Star Orbit'},
        {id:'cyber', n:'Cyber Grid'}, {id:'radar', n:'Radar Scan'}, {id:'hex', n:'Hexagon'}, {id:'flow', n:'Flow Field'},
        {id:'orbit', n:'Orbit Path'}, {id:'tree', n:'Fractal Tree'}, {id:'triangles', n:'Triangle'}, {id:'spiral', n:'Spiral'},
        {id:'particles', n:'Swarm'}, {id:'tunnel', n:'Tunnel'}, {id:'warp', n:'Hyper Warp'}, {id:'ripples', n:'Ripple Circle'}
    ];

    function setup() {
        let cnv = createCanvas(1920, 1080, WEBGL);
        cnv.parent('p5-container'); canvasRef = cnv.elt;
        bgCanvas = createGraphics(1920, 1080); bgCanvas.imageMode(CENTER); bgCanvas.colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512); ampObj = new p5.Amplitude();
        generateThumbnails();
        loadCloudInfo();
    }

    function generateThumbnails() {
        const grid = document.getElementById('fxThumbGrid');
        let tPg = createGraphics(80, 80);
        FX_DB.forEach(fx => {
            tPg.background(15, 20, 30); tPg.push(); tPg.translate(40, 40); tPg.stroke(0,255,200); tPg.noFill(); tPg.circle(0,0,25); tPg.pop();
            let btn = document.createElement('div');
            btn.className = 'fx-thumb' + (fx.id===currentFXId?' active':'');
            btn.setAttribute('id', 'fxBtn_' + fx.id);
            btn.setAttribute('data-name', fx.n);
            btn.style.backgroundImage = `url(${tPg.canvas.toDataURL()})`;
            btn.onclick = () => { selectFX(fx.id); };
            grid.appendChild(btn);
        });
        tPg.remove();
    }

    function selectFX(id) {
        document.querySelectorAll('.fx-thumb').forEach(b=>b.classList.remove('active'));
        let target = document.getElementById('fxBtn_'+id); if(target) target.classList.add('active');
        currentFXId = id; bgCanvas.clear();
    }

    function draw() {
        background(2, 2, 8); bgCanvas.clear();
        let bands = new Array(12).fill(0), vol = 0;
        if (audio && audio.isPlaying()) {
            fft.analyze(); vol = ampObj.getLevel();
            for(let i=0; i<12; i++) bands[i] = fft.getEnergy(pow(2, i/1.2)*20, pow(2, (i+1)/1.2)*20);
        }
        let spd = parseFloat(document.getElementById('fxSpeed').value);
        overlayT += 0.015 * spd;
        bgCanvas.push();
        let fSc = parseFloat(document.getElementById('fxScale').value), fI = parseFloat(document.getElementById('fxInten').value);
        bgCanvas.translate(960, 540); bgCanvas.scale(fSc);
        drawVisualCore(bgCanvas, overlayT, bands, fI, vol);
        bgCanvas.pop();
        push(); translate(-width/2, -height/2); image(bgCanvas, 0, 0); pop();
        updateUI();
    }

    function drawVisualCore(pg, t, bands, fI, vol) {
        let sid = currentFXId; pg.noFill(); pg.strokeWeight(2 * fI);
        let h = parseFloat(document.getElementById('fxHue').value);
        pg.stroke(h, 80, 100);
        if(sid==='waves'){
            for(let j=0; j<5; j++){
                let c = pg.color(h, 70, 100, 70); pg.fill(c); pg.stroke(h, 70, 100); pg.beginShape();
                for(let i=-960; i<=960; i+=40){ let y = sin(i*0.005 + t*(j+1.2)) * bands[j] * fI; pg.vertex(i, 200 + j*100 + y); }
                pg.vertex(960, 540); pg.vertex(-960, 540); pg.endShape(CLOSE);
            }
        } else if(sid==='matrix'){
            pg.fill(h, 80, 100); pg.textSize(26); let chars = ['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
            for(let i=0; i<30; i++){ pg.text(chars[floor(random(chars.length))], -960+(i*70), (t*500+i*200)%1080-540 + bands[i%12]); }
        } else if(sid==='ripBok'){
            for(let i=0; i<8; i++){ pg.stroke(h, 50, 100, 150); pg.circle(0, 0, (t*250+i*180)%1300 + bands[i]); pg.fill(h, 80, 100, 40); pg.circle(cos(t+i)*500, sin(t+i)*500, 70+bands[i]); }
        } else if(sid==='bokRip'){
            pg.noStroke(); for(let i=0; i<25; i++){ pg.fill(h, 80, 100, 80); pg.circle(cos(t+i)*bands[i%12]*4, sin(t+i)*bands[i%12]*4, 120 + bands[i%12]); }
        } else {
            pg.stroke(h, 80, 100); for(let i=0; i<10; i++){ pg.rotate(t*0.01); pg.rect(-100-i*10, -100-i*10, 200+i*20 + bands[0], 200+i*20); }
        }
    }

    // --- GitHub API Logic ---
    async function uploadToGitHub(type) {
        const user = document.getElementById('ghUser').value;
        const repo = document.getElementById('ghRepo').value;
        const token = document.getElementById('ghToken').value;
        const status = document.getElementById('cloudStatus');

        if(!user || !repo || !token) { alert('GitHub 정보를 모두 입력해주세요.'); return; }
        status.innerText = "⏳ 업로드 중...";

        const timestamp = `${year()}${nf(month(),2)}${nf(day(),2)}_${nf(hour(),2)}${nf(minute(),2)}${nf(second(),2)}`;
        let fileName, content, message;

        if(type === 'config') {
            fileName = `configs/cfg_${timestamp}.json`;
            const config = { currentFXId, scale: document.getElementById('fxScale').value, inten: document.getElementById('fxInten').value, speed: document.getElementById('fxSpeed').value, hue: document.getElementById('fxHue').value };
            content = btoa(JSON.stringify(config, null, 2));
            message = `Save Config: ${timestamp}`;
        } else {
            fileName = `thumbnails/thumb_${timestamp}.png`;
            const dataUrl = canvasRef.toDataURL('image/png');
            content = dataUrl.split(',')[1];
            message = `Save Thumbnail: ${timestamp}`;
        }

        const url = `https://api.github.com/repos/${user}/${repo}/contents/${fileName}`;
        
        try {
            const response = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, content })
            });

            if(response.ok) { status.innerText = "✅ 업로드 완료!"; setTimeout(()=>status.innerText="연결 대기 중", 3000); }
            else { const err = await response.json(); throw new Error(err.message); }
        } catch (e) {
            alert('업로드 실패: ' + e.message); status.innerText = "❌ 실패";
        }
    }

    function saveCloudInfo() {
        const info = { user: document.getElementById('ghUser').value, repo: document.getElementById('ghRepo').value, token: document.getElementById('ghToken').value };
        localStorage.setItem('spectrum_gh_info', JSON.stringify(info));
    }
    function loadCloudInfo() {
        const info = JSON.parse(localStorage.getItem('spectrum_gh_info'));
        if(info) { document.getElementById('ghUser').value = info.user; document.getElementById('ghRepo').value = info.repo; document.getElementById('ghToken').value = info.token; }
    }

    // System Logics
    function handleFile(files) { audio = loadSound(URL.createObjectURL(files[0]), () => { document.getElementById('recBtn').disabled = false; }); }
    function updateUI() { if(audio && audio.isPlaying()){ document.getElementById('progFill').style.width = (audio.currentTime()/audio.duration()*100)+'%'; let m = floor(audio.currentTime()/60), s = floor(audio.currentTime()%60); document.getElementById('timeCode').innerText = `${nf(m,2)}:${nf(s,2)} / ${nf(floor(audio.duration()/60),2)}:${nf(floor(audio.duration()%60),2)}`; } }
    async function toggleSync() { if (isPlaying) { audio.stop(); isPlaying = false; } else { if (getAudioContext().state === 'suspended') await userStartAudio(); recordedChunks = []; const dest = getAudioContext().createMediaStreamDestination(); p5.soundOut.output.connect(dest); mediaRecorder = new MediaRecorder(new MediaStream([...canvasRef.captureStream(30).getVideoTracks(), ...dest.stream.getAudioTracks()]), { videoBitsPerSecond: 80000000 }); mediaRecorder.ondataavailable = e => recordedChunks.push(e.data); mediaRecorder.onstop = () => { const n = new Date(); let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/mp4' })); a.download = `VFX_${timestamp()}.mp4`; a.click(); }; audio.play(); mediaRecorder.start(); isPlaying = true; document.getElementById('recBtn').innerText = "■ STOP & SAVE"; } }
    function timestamp() { return `${year()}${nf(month(),2)}${nf(day(),2)}${nf(hour(),2)}${nf(minute(),2)}`; }
    setInterval(() => { ['fxScale','fxInten','fxSpeed','fxHue'].forEach(id => { let el = document.getElementById(id); if(el) document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1)).innerText = el.value; }); }, 100);
</script>
</body>
</html>
