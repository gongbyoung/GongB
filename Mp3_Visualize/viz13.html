<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPECTRUM MOTION v21.0.001 — SRT Master</title>
    <link rel="icon" href="data:,">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{ --bg:#020205; --panel:#0d0d1a; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; }
        body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
        .topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;}
        .main-workspace { display: grid; grid-template-columns: 340px 1fr 340px; flex:1; min-height:0; }
        .side-panel { background:var(--panel); padding:15px; overflow-y:auto; scrollbar-width: thin; border-left:1px solid var(--border); border-right:1px solid var(--border); }
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:10px; margin-bottom:12px; }
        .label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}
        .control-group { margin-bottom:10px; }
        .control-group label { display:block; font-size:8px; color:#888; margin-bottom:2px; }
        .val-label { float:right; color:var(--accent); font-weight:bold; font-size:9px; }
        input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; }
        select { width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:5px; border-radius:4px; font-size:10px; outline:none; margin-bottom:4px;}
        .btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:6px; cursor:pointer; font-size:9px; width:100%; transition:0.2s; background-position: center; background-size: cover; height: 32px; display: flex; align-items: center; justify-content: center; text-shadow: 0px 0px 3px #000; }
        .btn:hover { border-color: var(--accent); }
        .btn.primary { background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:bold; font-size:11px; padding:12px; margin-top:10px; height: auto;}
        .viz-area { position:relative; display:flex; justify-content:center; align-items:center; background:#000; overflow:hidden; }
        #p5-container canvas { width: 100% !important; height: auto !important; max-height: 100% !important; object-fit: contain; }
        .inst-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; border-bottom: 1px dashed rgba(255,255,255,0.05); padding-bottom: 5px;}
        .playbar { height:2px; background:#111; position:relative; }
        #progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">SPECTRUM UNIVERSAL v21.0.001 — SRT Master</div>
    <div id="timeCode">00:00 / 00:00</div>
</div>

<div class="main-workspace">
    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">1. Audio Analysis</span>
            <button class="btn" onclick="document.getElementById('mIn').click()">SELECT MP3 FILE</button>
            <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
            <button class="btn" id="analyzeBtn" onclick="runAnalysis()" disabled style="border-color:#ffcc00; color:#ffcc00; height:auto; margin-top:5px;">PRE-ANALYZE & START</button>
        </div>

        <div class="ctrl-box">
            <span class="label-small">2. Background FX Library</span>
            <select id="backdropFX">
                <option value="dna">01. DNA Helix</option>
                <option value="nebula">02. Galaxy Nebula</option>
                <option value="mandala">03. Mandala Bloom</option>
                <option value="web">04. Electric Web</option>
                <option value="vortex">05. Vortex Tunnel</option>
                <option value="ocean">08. Ocean Waves</option>
                <option value="starfield">10. Starfield</option>
                <option value="matrix">14. Matrix Rain</option>
                <option value="storm">26. Lightning Storm</option>
                <option value="warp">29. Warp Speed</option>
            </select>
            <div class="control-group">
                <label>FX SCALE <span class="val-label" id="vFxScale">1.0</span></label><input type="range" id="fxScale" min="0.1" max="4.0" step="0.1" value="1.0">
                <label>FX X <span class="val-label" id="vFxX">0</span></label><input type="range" id="fxX" min="-1000" max="1000" value="0">
                <label>FX Y <span class="val-label" id="vFxY">0</span></label><input type="range" id="fxY" min="-1000" max="1000" value="0">
                <label>FX INTENSITY <span class="val-label" id="vFxInten">1.5</span></label><input type="range" id="fxInten" min="0.1" max="5.0" step="0.1" value="1.5">
            </div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">3. BG Art Style (Separate)</span>
            <select id="bgArtStyle">
                <option value="none">Standard</option>
                <option value="bw">흑백 (B&W)</option>
                <option value="pastel">파스텔 (Pastel)</option>
                <option value="neon">네온 (Neon Glow)</option>
                <option value="dreamy">몽환 (Dreamy)</option>
            </select>
            <div class="control-group"><label>STYLE POWER <span class="val-label" id="vBgArtI">1.5</span></label><input type="range" id="bgArtI" min="0" max="5" step="0.1" value="1.5"></div>
        </div>
    </div>

    <div class="viz-area" id="p5-container"></div>

    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">4. Subtitle System (SRT)</span>
            <button class="btn" onclick="document.getElementById('srtIn').click()" style="border-color:#ff3377;">LOAD SRT FILE</button>
            <input type="file" id="srtIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
            <label style="font-size:8px; color:#888; margin-top:5px; display:block;">SUBTITLE MOTION (24 TYPES)</label>
            <select id="textMotion">
                <option value="fade">01. Fade In/Out</option>
                <option value="slideL">02. Slide (L to R)</option>
                <option value="slideB">03. Slide (B to T)</option>
                <option value="zoom">04. Zoom In/Out</option>
                <option value="typewriter">06. Typewriter</option>
                <option value="glitch">12. Glitch</option>
                <option value="pulse">17. Pulse (Beat)</option>
                <option value="explode">23. Explosion</option>
                <option value="vortex">24. Vortex (Absorb)</option>
            </select>
            <div class="control-group">
                <label>TEXT SIZE <span class="val-label" id="vTextSz">48</span></label><input type="range" id="textSz" min="10" max="200" value="48">
                <label>TEXT Y POS <span class="val-label" id="vTextY">800</span></label><input type="range" id="textY" min="0" max="1080" value="800">
            </div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">5. Image Assets (1, 2, 3)</span>
            <div class="inst-row"><span>IMG 1</span><button class="btn" id="btnI0" onclick="openL('i0')">LOAD</button><select id="m0"><option value="petal">Petal Fall</option><option value="noiseRot">Noise Rotate</option></select><input type="range" id="sc0" min="0.1" max="3" step="0.1" value="1"></div>
            <div class="inst-row"><span>IMG 2</span><button class="btn" id="btnI1" onclick="openL('i1')">LOAD</button><select id="m1"><option value="petal">Petal Fall</option><option value="zoomOut">Center Out</option></select><input type="range" id="sc1" min="0.1" max="3" step="0.1" value="1"></div>
            <input type="file" id="i0" style="display:none" onchange="loadAsset(0, this.files)"><input type="file" id="i1" style="display:none" onchange="loadAsset(1, this.files)">
        </div>

        <div class="ctrl-box">
            <button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START & SAVE MP4</button>
        </div>
    </div>
</div>
<div class="playbar"><div id="progFill"></div></div>

<script>
    let audio, fft, ampObj, canvasRef, mainCanvas, bgCanvas, textCanvas, instAssets = new Array(3).fill(null);
    let srtData = [], isPlaying = false, mediaRecorder, recordedChunks = [];
    let particles = [], overlayT = 0;

    function setup() {
        let cnv = createCanvas(1920, 1080, WEBGL);
        cnv.parent('p5-container'); canvasRef = cnv.elt;
        
        mainCanvas = createGraphics(1920, 1080); // Images
        bgCanvas = createGraphics(1920, 1080);   // FX
        textCanvas = createGraphics(1920, 1080); // Subtitles
        
        mainCanvas.imageMode(CENTER); bgCanvas.imageMode(CENTER); textCanvas.textAlign(CENTER, CENTER);
        fft = new p5.FFT(0.8, 512); ampObj = new p5.Amplitude();
        initParticles();
    }

    function initParticles() {
        particles = []; for(let i=0; i<50; i++) particles.push(new MasterParticle(i % 2));
    }

    function draw() {
        background(2, 2, 8); 
        let trail = parseInt(document.getElementById('ptSmoke').value || 45);
        bgCanvas.clear();
        textCanvas.clear();
        mainCanvas.clear(); 
        mainCanvas.drawingContext.globalCompositeOperation = 'destination-out';
        mainCanvas.background(255, trail);
        mainCanvas.drawingContext.globalCompositeOperation = 'source-over';
        
        overlayT += 0.015;
        let spectrum = new Uint8Array(512), bands = new Array(24).fill(0), vol = 0;
        if (audio && audio.isPlaying()) {
            spectrum = fft.analyze(); vol = ampObj.getLevel();
            for(let i=0; i<24; i++) bands[i] = fft.getEnergy(pow(2, i/2.5)*20, pow(2, (i+1)/2.5)*20);
        }

        // --- LAYER 1: Background FX ---
        bgCanvas.push();
        let fSc = parseFloat(document.getElementById('fxScale').value);
        let fX = parseFloat(document.getElementById('fxX').value);
        let fY = parseFloat(document.getElementById('fxY').value);
        let fI = parseFloat(document.getElementById('fxInten').value);
        bgCanvas.translate(960 + fX, 540 + fY); bgCanvas.scale(fSc);
        drawBackdropHub(bgCanvas, 1920, 1080, overlayT, spectrum, bands, fI);
        applyFilter(bgCanvas, vol, 'bgArtStyle', 'bgArtI');
        bgCanvas.pop();

        // --- LAYER 2: Image Engine ---
        const mPower = parseFloat(document.getElementById('reactF').value);
        for(let p of particles) {
            if (instAssets[p.group]) { p.update(bands[p.group*7]||0, mPower); p.display(mainCanvas, bands[p.group*7]||0, instAssets[p.group]); }
        }

        // --- LAYER 3: SRT Subtitles ---
        if (audio && audio.isPlaying()) { drawSubtitles(textCanvas, audio.currentTime(), vol); }

        // Final Composite
        push(); translate(-width/2, -height/2);
        image(bgCanvas, 0, 0); image(mainCanvas, 0, 0); image(textCanvas, 0, 0); 
        pop();
        updateUI();
    }

    // --- 24 SRT MOTION GRAPHICS CORE ---
    function drawSubtitles(pg, currTime, vol) {
        let activeSub = srtData.find(s => currTime >= s.start && currTime <= s.end);
        if (!activeSub) return;

        let motion = document.getElementById('textMotion').value;
        let tSize = parseFloat(document.getElementById('textSz').value);
        let tY = parseFloat(document.getElementById('textY').value);
        let life = map(currTime, activeSub.start, activeSub.end, 0, 1);
        
        pg.push();
        pg.translate(960, tY);
        pg.textSize(tSize); pg.fill(255); pg.noStroke();

        switch(motion) {
            case 'fade': pg.fill(255, sin(life * PI) * 255); pg.text(activeSub.text, 0, 0); break;
            case 'slideL': pg.translate(-500 + life * 500, 0); pg.text(activeSub.text, 0, 0); break;
            case 'zoom': pg.scale(0.5 + life * 1.5); pg.text(activeSub.text, 0, 0); break;
            case 'typewriter': let len = floor(activeSub.text.length * life); pg.text(activeSub.text.substring(0, len), 0, 0); break;
            case 'glitch': pg.translate(random(-10,10), random(-5,5)); pg.fill(random(255), 255, 255); pg.text(activeSub.text, 0, 0); break;
            case 'pulse': pg.scale(1 + vol * 2); pg.text(activeSub.text, 0, 0); break;
            case 'explode': pg.translate(0, -life * 200); pg.fill(255, (1-life)*255); pg.text(activeSub.text, 0, 0); break;
        }
        pg.pop();
    }

    // --- BACKGROUND FX ENGINE ---
    function drawBackdropHub(pg, W, H, t, freq, bands, inten) {
        let fx = document.getElementById('backdropFX').value;
        pg.strokeWeight(2 * inten);
        if(fx==='dna'){ for(let s=0;s<2;s++){ let po=(s/2)*PI; for(let i=0;i<48;i++){ let a=(i/48)*TWO_PI+t+po; let amp=freq[i]/255; let x=cos(a)*H*0.3*(0.5+amp*0.7), y=sin(a)*H*0.1; pg.beginPath(); pg.arc(x,y,2+amp*10,0,TWO_PI); pg.fillStyle=`hsla(${220+s*40},80%,65%,0.7)`; pg.fill(); } } }
        else if(fx==='nebula'){ let g=pg.drawingContext.createRadialGradient(0,0,0,0,0,H*0.6); g.addColorStop(0,'rgba(120,100,255,0.4)'); g.addColorStop(1,'rgba(0,0,0,0)'); pg.drawingContext.fillStyle=g; pg.rect(-W/2,-H/2,W,H); }
        else if(fx==='matrix'){ pg.fill(0,255,100); pg.textSize(20); for(let i=0;i<20;i++) pg.text(String.fromCharCode(0x30A0+floor(random(96))), random(-W/2,W/2), (t*500+i*50)%(H/2)); }
    }

    function applyFilter(pg, vol, styleId, intenId) {
        let style = document.getElementById(styleId).value;
        let inten = parseFloat(document.getElementById(intenId).value);
        if(style==='bw') pg.filter(GRAY);
        else if(style==='neon') { pg.drawingContext.shadowBlur=20*inten*vol; pg.drawingContext.shadowColor='cyan'; }
    }

    class MasterParticle {
        constructor(group) { this.group=group; this.origin=createVector(random(1920),random(1080)); this.pos=this.origin.copy(); this.angle=random(TWO_PI); }
        update(amp, force) {
            let namp=amp/255; let m=document.getElementById('m'+this.group).value;
            if(m==='petal'){ this.pos.y+=(2+namp*15); this.pos.x+=sin(frameCount*0.05)*5; if(this.pos.y>1080)this.pos.y=-100; }
            else if(m==='noiseRot'){ this.angle+=0.02+namp*0.1; this.pos.x=this.origin.x+cos(this.angle)*200; this.pos.y=this.origin.y+sin(this.angle)*200; }
        }
        display(pg, amp, img) {
            let namp=amp/255; let sc=parseFloat(document.getElementById('sc'+this.group).value);
            pg.push(); pg.translate(this.pos.x, this.pos.y);
            pg.image(img, 0,0, img.width*(450*sc*(0.6+namp*2.8)/1000), img.height*(450*sc*(0.6+namp*2.8)/1000));
            pg.pop();
        }
    }

    // 시스템 핸들러
    function handleSRT(files) {
        let reader = new FileReader();
        reader.onload = e => {
            let raw = e.target.result;
            srtData = raw.split(/\r?\n\r?\n/).map(block => {
                let parts = block.split(/\r?\n/);
                if (parts.length < 3) return null;
                let timeParts = parts[1].split(' --> ');
                return { start: timeToSec(timeParts[0]), end: timeToSec(timeParts[1]), text: parts.slice(2).join('\n') };
            }).filter(s => s);
        };
        reader.readAsText(files[0]);
    }
    function timeToSec(t) { let p = t.replace(',','.').split(':'); return parseInt(p[0])*3600 + parseInt(p[1])*60 + parseFloat(p[2]); }
    function handleFile(files) { audio = loadSound(URL.createObjectURL(files[0]), () => { document.getElementById('analyzeBtn').disabled = false; }); }
    function openL(id) { document.getElementById(id).click(); }
    function loadAsset(id, files) { loadImage(URL.createObjectURL(files[0]), (img) => { instAssets[id] = img; let b = document.getElementById('btnI'+id); b.style.backgroundImage = `url(${URL.createObjectURL(files[0])})`; b.innerText=""; }); }
    function runAnalysis() { isAnalyzed = true; document.getElementById('recBtn').disabled = false; }
    function updateUI() { if(audio && audio.isPlaying()){ document.getElementById('progFill').style.width = (audio.currentTime()/audio.duration()*100)+'%'; } }

    async function toggleSync() {
        if (isPlaying) { audio.stop(); isPlaying = false; }
        else {
            if (getAudioContext().state === 'suspended') await userStartAudio();
            const dest = getAudioContext().createMediaStreamDestination();
            p5.soundOut.output.connect(dest);
            const combined = new MediaStream([...canvasRef.captureStream(30).getVideoTracks(), ...dest.stream.getAudioTracks()]);
            mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/webm; codecs=vp9,opus', videoBitsPerSecond: 80000000 });
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => { 
                const n = new Date(); const ts = `${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}${String(n.getHours()).padStart(2,'0')}${String(n.getMinutes()).padStart(2,'0')}${String(n.getSeconds()).padStart(2,'0')}`;
                let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/mp4' })); a.download = `${ts}.mp4`; a.click(); 
            };
            audio.play(); mediaRecorder.start(); isPlaying = true; document.getElementById('recBtn').innerText = "■ STOP & SAVE";
        }
    }

    setInterval(() => {
        ['fxScale','fxX','fxY','fxInten','bgArtI','reactF','textSz','textY','sc0','sc1'].forEach(id => {
            let el = document.getElementById(id);
            if(el) { let lab = document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1)); if(lab) lab.innerText = el.value; }
        });
    }, 100);
</script>
</body>
</html>
