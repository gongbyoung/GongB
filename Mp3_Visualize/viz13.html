<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SPECTRUM STUDIO v21.1.8 — MP4 Exporter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <script src="fx_library.js" onload="isLibraryReady = true;"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{ --bg:#05050a; --panel:#0d0d1a; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; }
        body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
        .topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .main-workspace { display: grid; grid-template-columns: 360px 1fr 340px; flex:1; min-height:0; }
        .side-panel { background:var(--panel); padding:15px; overflow-y:auto; scrollbar-width: thin; border-left:1px solid var(--border); border-right:1px solid var(--border); display: flex; flex-direction: column; }
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
        .fx-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .fx-thumb { aspect-ratio: 1; border: 2px solid rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; background-color: #111; position: relative; background-size: cover; background-position: center; }
        .fx-thumb.active { border-color: var(--accent2); box-shadow: 0 0 10px var(--accent2); }
        .fx-thumb::after { content: attr(data-name); position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); font-size: 5px; text-align: center; color: #fff; padding: 2px 0; overflow: hidden; white-space: nowrap; }
        .viz-area { position:relative; background:#000; display: flex; align-items: center; justify-content: center; flex:1; }
        #p5-container canvas { width: 100% !important; height: auto !important; max-height: 100% !important; border: 1px solid var(--accent); }
        .log-panel { background:#000; border:1px solid #222; border-radius:4px; padding:10px; flex:1; overflow-y:auto; font-family: monospace; font-size:10px; color: #888; }
        .btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:6px; cursor:pointer; font-size:9px; width:100%; height: 32px; margin-bottom:5px; transition: 0.2s; }
        .btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(0,255,204,0.05); }
        select { width:100%; background:#000; color:var(--accent); border:1px solid var(--border); padding:5px; font-size:10px; margin-bottom:5px; border-radius:4px; outline:none; }
        input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; margin: 5px 0; }
        .rot-label { font-size:8px; color:var(--accent2); display: flex; justify-content: space-between; }
        #recBtn.recording { background: var(--accent2) !important; color: white; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="topbar">
    <div style="letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;">SPECTRUM STUDIO v21.1.8</div>
    <div id="timeCode">00:00 / 00:00</div>
</div>

<div class="main-workspace">
    <div class="side-panel">
        <div class="ctrl-box">
            <span style="font-size:9px; color:var(--accent);">1. 35 FX PALETTE</span>
            <div class="fx-grid" id="fxThumbGrid"></div>
            <button class="btn" onclick="syncThumbnails(true)">☁️ FORCE SYNC THUMBS</button>
        </div>
        <div class="ctrl-box">
            <span style="font-size:9px; color:var(--accent);">2. SYSTEM ENGINE</span>
            <button class="btn" id="analyzeBtn" onclick="activateEngine()" disabled>⚡ PRE-ANALYZE AUDIO</button>
        </div>
    </div>

    <div class="viz-area" id="p5-container"></div>

    <div class="side-panel">
        <div class="ctrl-box">
            <span style="font-size:9px; color:var(--accent);">3. CUSTOM SETTINGS</span>
            <label style="font-size:8px;">ART STYLE</label>
            <select id="artStyle"><option value="hue">Standard HUE</option><option value="shadow">Shadow & Glow</option><option value="pastel">Soft Pastel</option><option value="bw">Monochrome</option><option value="random">Chaotic Random</option></select>
            <label style="font-size:8px;">BACKGROUND</label>
            <div style="display:flex; gap:5px; margin-bottom:5px;"><button class="btn" onclick="setBG('black')">BLK</button><button class="btn" onclick="setBG('white')">WHT</button><button class="btn" onclick="setBG('gray')">GRY</button></div>
            <label style="font-size:8px;">FOCUS FREQUENCY</label>
            <select id="focusFreq"><option value="0">Bass Focus (B1)</option><option value="5">Mid Focus (B6)</option><option value="11">High Focus (B12)</option></select>
            
            <hr style="border:0.5px solid var(--border); margin:10px 0;">
            <span style="font-size:9px; color:var(--accent2);">GLOBAL ORIENTATION</span>
            <div class="rot-label"><span>ROT X</span><span id="vRotX">0</span></div><input type="range" id="rotX" min="-180" max="180" value="0" oninput="document.getElementById('vRotX').innerText=this.value">
            <div class="rot-label"><span>ROT Y</span><span id="vRotY">0</span></div><input type="range" id="rotY" min="-180" max="180" value="0" oninput="document.getElementById('vRotY').innerText=this.value">
            <div class="rot-label"><span>ROT Z</span><span id="vRotZ">0</span></div><input type="range" id="rotZ" min="-180" max="180" value="0" oninput="document.getElementById('vRotZ').innerText=this.value">
        </div>
        
        <div class="ctrl-box">
            <span style="font-size:9px; color:var(--accent);">4. LIVE PARAMETERS</span>
            <label style="font-size:8px;">P1: DENSITY</label><input type="range" id="fxP1" min="1" max="100" value="25">
            <label style="font-size:8px;">P2: SCALE/SPEED</label><input type="range" id="fxP2" min="0.1" max="10.0" step="0.1" value="2.0">
            <label style="font-size:8px;">P3: ALPHA</label><input type="range" id="fxP3" min="1" max="255" value="180">
            <label style="font-size:8px;">HUE</label><input type="range" id="fxHue" min="0" max="360" value="200">
        </div>
        <div class="ctrl-box">
            <button class="btn" onclick="saveThumbnail()">📷 SAVE PALETTE PNG</button>
            <button class="btn" onclick="document.getElementById('mIn').click()">1. LOAD MP3</button>
            <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
            <!-- 녹화 기능이 통합된 버튼 -->
            <button class="btn" id="recBtn" onclick="toggleSync()" disabled style="background:var(--accent2); border:none;">2. START PRODUCTION (MP4)</button>
        </div>
        <div class="log-panel" id="logPanel"></div>
    </div>
</div>

<script>
    let audio, fft, canvasRef, bgCanvas, isPlaying = false, currentFXId = '';
    let isEngineActive = false, lastDataLogTime = 0, bgColor = [2, 2, 8];

    // 녹화 관련 변수
    let mediaRecorder;
    let recordedChunks = [];

    function addLog(msg, type = 'info') {
        const p = document.getElementById('logPanel'); const e = document.createElement('div');
        e.className = `log-entry log-${type}`; e.innerText = `> ${msg}`;
        p.appendChild(e); p.scrollTop = p.scrollHeight; if(p.childNodes.length > 30) p.removeChild(p.childNodes[0]);
    }

    function setBG(mode) {
        if(mode === 'black') bgColor = [2, 2, 8]; else if(mode === 'white') bgColor = [0, 0, 100]; else if(mode === 'gray') bgColor = [0, 0, 20];
        addLog(`Background changed: ${mode}`);
    }

    function setup() {
        let cnv = createCanvas(1920, 1080, WEBGL); cnv.parent('p5-container'); canvasRef = cnv.elt;
        bgCanvas = createGraphics(1920, 1080, WEBGL); bgCanvas.colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);
        let check = setInterval(() => {
            if(window.FX_ENGINES) { addLog(`Engine v21.1.8 Ready.`, "success"); generateUI(); clearInterval(check); }
        }, 300);
    }

    function generateUI() {
        const grid = document.getElementById('fxThumbGrid'); grid.innerHTML = '';
        const keys = Object.keys(window.FX_ENGINES);
        keys.forEach(id => {
            let b = document.createElement('div'); b.className = 'fx-thumb'; b.id = 'fxBtn_' + id;
            b.setAttribute('data-name', id.toUpperCase());
            b.onclick = () => { currentFXId = id; document.querySelectorAll('.fx-thumb').forEach(el => el.classList.remove('active')); b.classList.add('active'); addLog(`FX: ${id}`); };
            grid.appendChild(b);
        });
        if (keys.length > 0) { currentFXId = keys[0]; document.getElementById('fxBtn_' + currentFXId).classList.add('active'); syncThumbnails(); }
    }

    function syncThumbnails(force = false) {
        if (!window.FX_ENGINES) return;
        const keys = Object.keys(window.FX_ENGINES);
        keys.forEach(id => {
            const path = `thumbnails/palette_${id.trim()}.png${force ? '?v='+Date.now() : ''}`;
            const img = new Image(); img.onload = () => { document.getElementById('fxBtn_'+id).style.backgroundImage = `url(${path})`; }; img.src = path;
        });
    }

    function activateEngine() {
        userStartAudio().then(() => { isEngineActive = true; addLog("WEBGL Core Active.", "success"); document.getElementById('analyzeBtn').innerText = "✅ ANALYZE ACTIVE"; document.getElementById('recBtn').disabled = false; });
    }

    function draw() {
        background(bgColor[0], bgColor[1], bgColor[2]); bgCanvas.clear();
        let bands = new Array(12).fill(0), fI = 1.0;
        if (isEngineActive && audio && audio.isPlaying()) {
            let spectrum = fft.analyze();
            if (spectrum) {
                for (let i = 0; i < 12; i++) {
                    let start = floor(map(i, 0, 12, 0, spectrum.length * 0.4));
                    let end = floor(map(i + 1, 0, 12, 0, spectrum.length * 0.4));
                    let bandSum = 0; for (let j = start; j < end; j++) bandSum += spectrum[j];
                    bands[i] = bandSum / (end - start || 1);
                }
                fI = map(bands[parseInt(document.getElementById('focusFreq').value)], 0, 255, 0.5, 3.0); 
            }
        }

        bgCanvas.push();
        bgCanvas.rotateX(radians(parseFloat(document.getElementById('rotX').value)));
        bgCanvas.rotateY(radians(parseFloat(document.getElementById('rotY').value)));
        bgCanvas.rotateZ(radians(parseFloat(document.getElementById('rotZ').value)));

        if (window.FX_ENGINES && window.FX_ENGINES[currentFXId]) {
            window.FX_ENGINES[currentFXId](bgCanvas, frameCount * 0.02, bands, fI, parseFloat(document.getElementById('fxHue').value), document.getElementById('artStyle').value, parseFloat(document.getElementById('fxP1').value), parseFloat(document.getElementById('fxP2').value), parseFloat(document.getElementById('fxP3').value));
        }
        bgCanvas.pop();

        push(); translate(-width/2, -height/2); image(bgCanvas, 0, 0); pop();
        
        if (audio && audio.isPlaying()) {
            let cur = audio.currentTime(); let dur = audio.duration();
            document.getElementById('timeCode').innerText = `${nf(floor(cur/60),2)}:${nf(floor(cur%60),2)} / ${nf(floor(dur/60),2)}:${nf(floor(dur%60),2)}`;
        }
    }

    function handleFile(files) { audio = loadSound(URL.createObjectURL(files[0]), () => { document.getElementById('analyzeBtn').disabled = false; addLog("MP3 Loaded."); }); }
    
    function saveThumbnail() { saveCanvas(canvasRef, 'palette_'+currentFXId, 'png'); addLog("Thumb Saved."); }

    // --- MP4 녹화 핵심 로직 ---
    async function toggleSync() {
        if (isPlaying) {
            // 정지 및 저장
            audio.stop();
            isPlaying = false;
            mediaRecorder.stop();
            document.getElementById('recBtn').innerText = "2. START PRODUCTION (MP4)";
            document.getElementById('recBtn').classList.remove('recording');
            addLog("Recording stopped. Saving MP4...");
        } else {
            // 녹화 시작
            recordedChunks = [];
            const stream = canvasRef.captureStream(60); // 60fps 캡처
            
            // H264 MP4 코덱 설정 시도 (브라우저 지원 여부에 따라 다름)
            let options = { mimeType: 'video/mp4; codecs=avc1' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                addLog("MP4/H264 not supported. Using WebM/VP9 instead.", "warn");
                options = { mimeType: 'video/webm; codecs=vp9' };
            }

            mediaRecorder = new MediaRecorder(stream, options);
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) recordedChunks.push(event.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: options.mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `viz_production_${Date.now()}.${options.mimeType.includes('mp4') ? 'mp4' : 'webm'}`;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                }, 100);
            };

            mediaRecorder.start();
            audio.play();
            isPlaying = true;
            document.getElementById('recBtn').innerText = "⏹ STOP & EXPORT VIDEO";
            document.getElementById('recBtn').classList.add('recording');
            addLog(`Recording started (${options.mimeType})...`, "success");
        }
    }
</script>
</body>
</html>
