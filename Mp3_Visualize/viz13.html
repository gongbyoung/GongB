<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPECTRUM MOTION v21.0.003 — Symphony Master</title>
    <link rel="icon" href="data:,">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{ --bg:#020205; --panel:#0d0d1a; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; }
        body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
        .topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;}
        .main-workspace { display: grid; grid-template-columns: 340px 1fr 340px; flex:1; min-height:0; }
        .side-panel { background:var(--panel); padding:15px; overflow-y:auto; scrollbar-width: thin; border-left:1px solid var(--border); border-right:1px solid var(--border); }
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:10px; margin-bottom:12px; }
        .label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}
        .control-group { margin-bottom:10px; }
        .control-group label { display:block; font-size:8px; color:#888; margin-bottom:2px; }
        .val-label { float:right; color:var(--accent); font-weight:bold; font-size:9px; }
        input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; }
        select { width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:5px; border-radius:4px; font-size:10px; outline:none; margin-bottom:4px;}
        .btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:6px; cursor:pointer; font-size:9px; width:100%; transition:0.2s; background-position: center; background-size: cover; height: 35px; display: flex; align-items: center; justify-content: center; text-shadow: 0px 0px 3px #000; }
        .btn:hover { border-color: var(--accent); }
        .btn.primary { background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:bold; font-size:11px; padding:12px; margin-top:10px; height: auto;}
        .viz-area { position:relative; display:flex; justify-content:center; align-items:center; background:#000; overflow:hidden; }
        #p5-container canvas { width: 100% !important; height: auto !important; max-height: 100% !important; object-fit: contain; }
        .inst-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; border-bottom: 1px dashed rgba(255,255,255,0.05); padding-bottom: 5px;}
        .playbar { height:2px; background:#111; position:relative; }
        #progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">SPECTRUM MOTION v21.0.003 — Symphony Master</div>
    <div id="timeCode">00:00 / 00:00</div>
</div>

<div class="main-workspace">
    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">1. Audio Analysis</span>
            <button class="btn" onclick="document.getElementById('mIn').click()">SELECT MP3</button>
            <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
            <button class="btn" id="analyzeBtn" onclick="runAnalysis()" disabled style="border-color:#ffcc00; color:#ffcc00; height:auto; margin-top:5px;">PRE-ANALYZE & START</button>
        </div>

        <div class="ctrl-box">
            <span class="label-small">2. Background FX Library (12+)</span>
            <select id="backdropFX">
                <option value="lightning">01. L-System Lightning</option>
                <option value="notes">02. Musical Notes</option>
                <option value="waves">03. Layered Waves</option>
                <option value="ripples">04. 12-Grid Ripples</option>
                <option value="mandel">05. Mandelbulb (2D)</option>
                <option value="chladni">06. Chladni Pattern</option>
                <option value="reaction">07. Reaction Diffusion</option>
                <option value="magnetic">10. Magnetic Field</option>
                <option value="voronoi">13. Curve Voronoi</option>
                <option value="snowflake">16. Snowflake Crystal</option>
                <option value="nebula">Galaxy Nebula</option>
            </select>
            <div class="control-group">
                <label>FX SCALE <span class="val-label" id="vFxScale">1.0</span></label><input type="range" id="fxScale" min="0.1" max="4.0" step="0.1" value="1.0">
                <label>FX X / Y POS <span class="val-label" id="vFxX">0</span> / <span class="val-label" id="vFxY">0</span></label>
                <input type="range" id="fxX" min="-1000" max="1000" value="0">
                <input type="range" id="fxY" min="-1000" max="1000" value="0">
                <label>FX INTENSITY <span class="val-label" id="vFxInten">1.5</span></label><input type="range" id="fxInten" min="0.1" max="5.0" step="0.1" value="1.5">
            </div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">3. BG Art Style</span>
            <select id="bgArtStyle">
                <option value="none">Original</option>
                <option value="bw">흑백 (B&W)</option>
                <option value="pastel">파스텔 (Pastel)</option>
                <option value="neon">네온 (Neon)</option>
                <option value="dreamy">몽환 (Dreamy)</option>
            </select>
        </div>
    </div>

    <div class="viz-area" id="p5-container"></div>

    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">4. Subtitle Motion Maestro</span>
            <button class="btn" onclick="document.getElementById('srtIn').click()" style="border-color:#ff3377;">LOAD SRT FILE</button>
            <input type="file" id="srtIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
            <div style="font-size:10px; color:var(--accent2); margin-top:5px; font-weight:bold;" id="srtCount">자막: 분석 대기 중</div>
            
            <label style="font-size:8px; color:#888; margin-top:10px; display:block;">SUBTITLE MASTER MODE</label>
            <select id="srtMode">
                <option value="shuffle">줄마다 다른 무작위 모션</option>
                <option value="fixed">아래 선택한 모션으로 고정</option>
            </select>
            <select id="textMotion">
                <option value="fade">01. Fade In/Out</option>
                <option value="glitch">12. Glitch Art</option>
                <option value="typewriter">06. Typewriter</option>
                <option value="vortex">24. Vortex 흡입</option>
                <option value="bounce">05. Bounce 튕김</option>
                <option value="explode">23. Explosion 폭발</option>
            </select>
            <div class="control-group">
                <label>TEXT SIZE <span class="val-label" id="vTextSz">48</span></label><input type="range" id="textSz" min="10" max="250" value="48">
                <label>POSITION X / Y <span class="val-label" id="vTextX">960</span> / <span class="val-label" id="vTextY">800</span></label>
                <input type="range" id="textX" min="0" max="1920" value="960">
                <input type="range" id="textY" min="0" max="1080" value="800">
            </div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">5. Image Assets</span>
            <div class="inst-row"><span>IMG 1</span><button class="btn" onclick="openL('i0')">LOAD</button><select id="m0"><option value="petal">Petal Fall</option><option value="noiseRot">Noise Rot</option></select><input type="range" id="sc0" min="0.1" max="3" step="0.1" value="1"></div>
            <div class="inst-row"><span>IMG 2</span><button class="btn" onclick="openL('i1')">LOAD</button><select id="m1"><option value="petal">Petal Fall</option><option value="zoomOut">Center Out</option></select><input type="range" id="sc1" min="0.1" max="3" step="0.1" value="1"></div>
            <input type="file" id="i0" style="display:none" onchange="loadAsset(0, this.files)"><input type="file" id="i1" style="display:none" onchange="loadAsset(1, this.files)">
        </div>

        <div class="ctrl-box"><button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START RECORDING</button></div>
    </div>
</div>
<div class="playbar"><div id="progFill"></div></div>

<script>
    let audio, fft, ampObj, canvasRef, mainCanvas, bgCanvas, textCanvas, instAssets = new Array(2).fill(null);
    let srtData = [], isPlaying = false, mediaRecorder, recordedChunks = [];
    let particles = [], overlayT = 0;
    const MOTIONS = ['fade', 'glitch', 'typewriter', 'vortex', 'bounce', 'explode', 'slideL', 'slideB', 'zoom', 'pulse', 'shake', 'rainbow'];

    function setup() {
        let cnv = createCanvas(1920, 1080, WEBGL);
        cnv.parent('p5-container'); canvasRef = cnv.elt;
        mainCanvas = createGraphics(1920, 1080);
        bgCanvas = createGraphics(1920, 1080);
        textCanvas = createGraphics(1920, 1080);
        mainCanvas.imageMode(CENTER); bgCanvas.imageMode(CENTER); textCanvas.textAlign(CENTER, CENTER);
        fft = new p5.FFT(0.8, 512); ampObj = new p5.Amplitude();
        initParticles();
    }

    function initParticles() {
        particles = []; for(let i=0; i<60; i++) particles.push(new MasterParticle(i % 2));
    }

    function draw() {
        background(2, 2, 8);
        bgCanvas.clear(); textCanvas.clear(); mainCanvas.clear(); 
        mainCanvas.drawingContext.globalCompositeOperation = 'destination-out';
        mainCanvas.background(255, 45); // Trail effect
        mainCanvas.drawingContext.globalCompositeOperation = 'source-over';
        
        overlayT += 0.015;
        let spectrum = new Uint8Array(512), bands = new Array(24).fill(0), vol = 0;
        if (audio && audio.isPlaying()) {
            spectrum = fft.analyze(); vol = ampObj.getLevel();
            for(let i=0; i<24; i++) bands[i] = fft.getEnergy(pow(2, i/2.5)*20, pow(2, (i+1)/2.5)*20);
        }

        // LAYER 1: Backdrop
        bgCanvas.push();
        let fSc = parseFloat(document.getElementById('fxScale').value), fX = parseFloat(document.getElementById('fxX').value), fY = parseFloat(document.getElementById('fxY').value), fI = parseFloat(document.getElementById('fxInten').value);
        bgCanvas.translate(960 + fX, 540 + fY); bgCanvas.scale(fSc);
        drawBackdropHub(bgCanvas, 1920, 1080, overlayT, spectrum, bands, fI);
        applyFilter(bgCanvas, vol, 'bgArtStyle');
        bgCanvas.pop();

        // LAYER 2: Image
        for(let p of particles) { if (instAssets[p.group]) { p.update(bands[p.group*7]||0); p.display(mainCanvas, bands[p.group*7]||0, instAssets[p.group]); } }

        // LAYER 3: SRT ( 줄마다 다른 모션)
        if (audio && audio.isPlaying()) { renderSRTPro(textCanvas, audio.currentTime(), vol); }

        push(); translate(-width/2, -height/2); image(bgCanvas, 0, 0); image(mainCanvas, 0, 0); image(textCanvas, 0, 0); pop();
        updateUI();
    }

    // --- SRT PRO MOTION GRAPHICS ---
    function renderSRTPro(pg, currTime, vol) {
        let activeSub = srtData.find(s => currTime >= s.start && currTime <= s.end);
        if (!activeSub) return;

        let mode = document.getElementById('srtMode').value;
        let motion = (mode === 'shuffle') ? activeSub.assignedMotion : document.getElementById('textMotion').value;
        let tSize = parseFloat(document.getElementById('textSz').value);
        let tX = parseFloat(document.getElementById('textX').value);
        let tY = parseFloat(document.getElementById('textY').value);
        let life = map(currTime, activeSub.start, activeSub.end, 0, 1);
        
        pg.push(); pg.translate(tX, tY); pg.textSize(tSize); pg.fill(255); pg.noStroke(); pg.textStyle(BOLD);

        switch(motion) {
            case 'fade': pg.fill(255, sin(life * PI) * 255); pg.text(activeSub.text, 0, 0); break;
            case 'glitch': if(random()>0.8) pg.translate(random(-20,20), random(-10,10)); pg.fill(random(100,255), 255, 255); pg.text(activeSub.text, 0, 0); break;
            case 'typewriter': let len = floor(activeSub.text.length * (life * 2)); pg.text(activeSub.text.substring(0, len), 0, 0); break;
            case 'zoom': pg.scale(0.5 + sin(life*PI)*1.2); pg.text(activeSub.text, 0, 0); break;
            case 'vortex': pg.rotate(life * TWO_PI); pg.scale(1-life); pg.text(activeSub.text, 0, 0); break;
            case 'pulse': pg.scale(1 + vol * 2); pg.text(activeSub.text, 0, 0); break;
            case 'explode': pg.translate(0, -life * 200); pg.fill(255, (1-life)*255); pg.text(activeSub.text, 0, 0); break;
            default: pg.text(activeSub.text, 0, 0);
        }
        pg.pop();
    }

    function drawBackdropHub(pg, W, H, t, freq, bands, inten) {
        let fx = document.getElementById('backdropFX').value;
        pg.strokeWeight(2 * inten);
        if(fx==='lightning'){ pg.stroke(255); drawBranch(pg, 0, 200, -PI/2, (bands[20]/1.5)*inten, 5); }
        else if(fx==='notes'){ pg.fill(0,255,204); for(let i=0;i<24;i++){ pg.rect(-960+i*80, 200-bands[i]*3*inten, 30, bands[i]*3*inten); } }
        else if(fx==='mandel'){ for(let i=0;i<100;i++){ let a=i*0.2+t; let r=(i/100)*H*0.4*(1+freq[i%100]/255); pg.point(cos(a)*r, sin(a)*r); } }
        else if(fx==='voronoi'){ pg.stroke(0,255,200,100); for(let i=0;i<10;i++) pg.line(cos(t+i)*500, sin(t+i)*500, cos(t+i+1)*500, sin(t+i+1)*500); }
        else if(fx==='snowflake'){ pg.stroke(255); for(let i=0;i<6;i++){ pg.push(); pg.rotate(i*PI/3); pg.line(0,0,150+bands[2]*inten,0); pg.pop(); } }
    }

    function drawBranch(pg, x, y, ang, len, gen) { if(gen <= 0 || len < 5) return; let nx = x + cos(ang)*len; let ny = y + sin(ang)*len; pg.line(x, y, nx, ny); drawBranch(pg, nx, ny, ang + 0.45, len*0.7, gen-1); drawBranch(pg, nx, ny, ang - 0.45, len*0.7, gen-1); }

    function applyFilter(pg, vol, styleId) {
        let s = document.getElementById(styleId).value;
        if(s==='bw') pg.filter(GRAY); else if(s==='neon') { pg.drawingContext.shadowBlur=25*vol; pg.drawingContext.shadowColor='cyan'; }
    }

    class MasterParticle {
        constructor(group) { this.group=group; this.origin=createVector(random(1920),random(1080)); this.pos=this.origin.copy(); this.angle=random(TWO_PI); }
        update(amp) {
            let namp=amp/255; let m=document.getElementById('m'+this.group).value;
            if(m==='petal'){ this.pos.y+=(2+namp*15); this.pos.x+=sin(frameCount*0.05)*5; if(this.pos.y>1080)this.pos.y=-100; }
            else if(m==='noiseRot'){ this.angle+=0.02+namp*0.1; this.pos.x=this.origin.x+cos(this.angle)*250; this.pos.y=this.origin.y+sin(this.angle)*250; }
        }
        display(pg, amp, img) {
            let sc=parseFloat(document.getElementById('sc'+this.group).value);
            pg.push(); pg.translate(this.pos.x, this.pos.y);
            pg.image(img, 0,0, img.width*(480*sc*(0.6+(amp/255)*2.8)/1000), img.height*(480*sc*(0.6+(amp/255)*2.8)/1000));
            pg.pop();
        }
    }

    // 시스템 핸들러
    function handleSRT(files) {
        let reader = new FileReader();
        reader.onload = e => {
            srtData = e.target.result.split(/\r?\n\r?\n/).map(block => {
                let parts = block.split(/\r?\n/);
                if (parts.length < 3) return null;
                let timeParts = parts[1].split(' --> ');
                return { start: timeToSec(timeParts[0]), end: timeToSec(timeParts[1]), text: parts.slice(2).join('\n'), assignedMotion: MOTIONS[floor(random(MOTIONS.length))] };
            }).filter(s => s);
            document.getElementById('srtCount').innerText = `자막: ${srtData.length} 줄 분석됨`;
        };
        reader.readAsText(files[0]);
    }
    function timeToSec(t) { let p = t.replace(',','.').split(':'); return parseInt(p[0])*3600 + parseInt(p[1])*60 + parseFloat(p[2]); }
    function handleFile(files) { audio = loadSound(URL.createObjectURL(files[0]), () => { document.getElementById('analyzeBtn').disabled = false; }); }
    function openL(id) { document.getElementById(id).click(); }
    function loadAsset(id, files) { loadImage(URL.createObjectURL(files[0]), (img) => { instAssets[id] = img; let b = document.getElementById('btnI'+id); }); }
    function runAnalysis() { isPlaying = true; document.getElementById('recBtn').disabled = false; }
    function updateUI() { if(audio && audio.isPlaying()){ 
        document.getElementById('progFill').style.width = (audio.currentTime()/audio.duration()*100)+'%'; 
        let m = floor(audio.currentTime()/60), s = floor(audio.currentTime()%60);
        document.getElementById('timeCode').innerText = `${nf(m,2)}:${nf(s,2)} / ${nf(floor(audio.duration()/60),2)}:${nf(floor(audio.duration()%60),2)}`;
    } }

    async function toggleSync() {
        if (isPlaying && audio.isPlaying()) { audio.stop(); isPlaying = false; }
        else {
            if (getAudioContext().state === 'suspended') await userStartAudio();
            const dest = getAudioContext().createMediaStreamDestination();
            p5.soundOut.output.connect(dest);
            mediaRecorder = new MediaRecorder(new MediaStream([...canvasRef.captureStream(30).getVideoTracks(), ...dest.stream.getAudioTracks()]), { videoBitsPerSecond: 80000000 });
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => { let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/mp4' })); a.download = `${nf(month(),2)}${nf(day(),2)}${nf(hour(),2)}${nf(minute(),2)}.mp4`; a.click(); };
            audio.play(); mediaRecorder.start(); isPlaying = true; document.getElementById('recBtn').innerText = "■ STOP & SAVE";
        }
    }

    setInterval(() => {
        ['fxScale','fxX','fxY','fxInten','textSz','textX','textY','sc0','sc1'].forEach(id => {
            let el = document.getElementById(id); if(el) { let lab = document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1)); if(lab) lab.innerText = el.value; }
        });
    }, 100);
</script>
</body>
</html>
