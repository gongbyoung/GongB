<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SPECTRUM STUDIO v21.0.39 — Ultra Stability</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <script src="fx_library.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{ --bg:#05050a; --panel:#0d0d1a; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; }
        body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
        .topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;}
        .main-workspace { display: grid; grid-template-columns: 360px 1fr 340px; flex:1; min-height:0; }
        .side-panel { background:var(--panel); padding:15px; overflow-y:auto; border-left:1px solid var(--border); border-right:1px solid var(--border); }
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
        .fx-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .fx-thumb { aspect-ratio: 1; border: 2px solid rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; background-color: #111; position: relative; }
        .fx-thumb.active { border-color: var(--accent2); box-shadow: 0 0 10px var(--accent2); }
        .viz-area { position:relative; background:#000; overflow:hidden; display: flex; align-items: center; justify-content: center; }
        #p5-container canvas { width: 100% !important; height: auto !important; max-height: 100% !important; }
        .btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:6px; cursor:pointer; font-size:9px; width:100%; height: 32px; margin-bottom:5px; transition: 0.2s; }
        .btn:hover { border-color: var(--accent); background: rgba(0,255,204,0.05); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn.active-engine { background: var(--accent2); border-color: var(--accent2); font-weight: bold; }
    </style>
</head>
<body>

<div class="topbar"><div class="logo">SPECTRUM STUDIO v21.0.39</div><div id="timeCode">00:00 / 00:00</div></div>

<div class="main-workspace">
    <div class="side-panel">
        <div class="ctrl-box">
            <span style="font-size:9px; color:var(--accent);">1. VISUAL PALETTE</span>
            <div class="fx-grid" id="fxThumbGrid"></div>
            <button class="btn" onclick="fetchGithubAssets()" style="margin-top:10px; color:var(--accent2); border-color:var(--accent2);">☁️ FETCH CLOUD THUMBS</button>
        </div>
        <div class="ctrl-box">
            <span style="font-size:9px; color:var(--accent);">2. ENGINE STATUS</span>
            <button class="btn" id="analyzeBtn" onclick="activateEngine()" disabled>⚡ PRE-ANALYZE AUDIO</button>
            <div id="engineStatus" style="font-size:10px; color:#555; text-align:center; margin-top:5px;">ENGINE IDLE</div>
        </div>
    </div>

    <div class="viz-area" id="p5-container"></div>

    <div class="side-panel">
        <div class="ctrl-box">
            <span style="font-size:9px; color:var(--accent);">3. PARAMETERS</span>
            <input type="range" id="fxP1" min="1" max="100" value="25" style="width:100%;">
            <input type="range" id="fxP2" min="0.1" max="10.0" step="0.1" value="2.5" style="width:100%;">
            <input type="range" id="fxP3" min="1" max="255" value="150" style="width:100%;">
            <label style="font-size:9px; margin-top:10px; display:block;">HUE</label>
            <input type="range" id="fxHue" min="0" max="360" value="200" style="width:100%;">
            <select id="colorStyle" style="width:100%; background:#000; color:#fff; font-size:10px; margin-top:10px; padding:5px;">
                <option value="hue">Standard HUE</option>
                <option value="shadow">Shadow & Glow</option>
                <option value="pastel">Soft Pastel</option>
            </select>
        </div>
        <div class="ctrl-box">
            <button class="btn" onclick="saveThumbnail()">📷 SAVE PALETTE PNG</button>
        </div>
        <div class="ctrl-box">
            <button class="btn" onclick="document.getElementById('mIn').click()">1. LOAD MP3</button>
            <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
            <button class="btn primary" id="recBtn" onclick="toggleSync()" disabled style="background:var(--accent2); border:none;">2. START PRODUCTION</button>
            <div id="statusInfo" style="font-size:9px; color:var(--accent); text-align:center; margin-top:8px;">READY</div>
        </div>
    </div>
</div>

<script>
    let audio, fft, canvasRef, bgCanvas, isPlaying = false, currentFXId = 'waves';
    let isEngineActive = false;

    function setup() {
        let cnv = createCanvas(1920, 1080, WEBGL); cnv.parent('p5-container'); canvasRef = cnv.elt;
        bgCanvas = createGraphics(1920, 1080); bgCanvas.imageMode(CENTER); bgCanvas.colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);
        generateThumbnails();
    }

    function activateEngine() {
        if (!audio) return;
        userStartAudio().then(() => {
            isEngineActive = true;
            fft.setInput(audio); // 명시적으로 입력 소스 고정
            document.getElementById('analyzeBtn').innerText = "✅ ANALYZE ACTIVE";
            document.getElementById('analyzeBtn').classList.add('active-engine');
            document.getElementById('engineStatus').innerText = "ENGINE RUNNING";
            document.getElementById('engineStatus').style.color = "var(--accent)";
            document.getElementById('recBtn').disabled = false;
        });
    }

    function draw() {
        background(2, 2, 8); bgCanvas.clear();
        let bands = new Array(12).fill(0);
        
        // [초강력 수정] getEnergy를 사용하지 않고 직접 주파수 데이터를 계산합니다.
        if (isEngineActive && audio && audio.isPlaying()) {
            let spectrum = fft.analyze();
            if (spectrum && spectrum.length > 0) {
                for (let i = 0; i < 12; i++) {
                    // 전체 스펙트럼에서 각 밴드별 평균값을 추출 (viz13:108 에러 원천 차단)
                    let start = floor(map(i, 0, 12, 0, spectrum.length * 0.5)); // 저/중역대 집중
                    let end = floor(map(i + 1, 0, 12, 0, spectrum.length * 0.5));
                    let sum = 0;
                    for (let j = start; j < end; j++) sum += spectrum[j];
                    bands[i] = sum / (end - start || 1);
                }
            }
        }

        bgCanvas.push();
        bgCanvas.translate(960, 540);
        
        if (typeof FX_ENGINES !== 'undefined' && FX_ENGINES[currentFXId]) {
            FX_ENGINES[currentFXId](bgCanvas, frameCount * 0.02, bands, 1.5, 
                   parseFloat(document.getElementById('fxHue').value), 
                   document.getElementById('colorStyle').value,
                   parseFloat(document.getElementById('fxP1').value),
                   parseFloat(document.getElementById('fxP2').value),
                   parseFloat(document.getElementById('fxP3').value));
        }
        
        bgCanvas.pop();
        push(); translate(-width/2, -height/2); image(bgCanvas, 0, 0); pop();
        
        // 시간 표시 업데이트
        if (audio && audio.isPlaying()) {
            let cur = audio.currentTime();
            let dur = audio.duration();
            document.getElementById('timeCode').innerText = `${nf(floor(cur/60),2)}:${nf(floor(cur%60),2)} / ${nf(floor(dur/60),2)}:${nf(floor(dur%60),2)}`;
        }
    }

    function handleFile(files) { 
        audio = loadSound(URL.createObjectURL(files[0]), () => { 
            document.getElementById('analyzeBtn').disabled = false; 
            document.getElementById('statusInfo').innerText = "AUDIO LOADED";
            document.getElementById('engineStatus').innerText = "WAITING FOR ANALYZE";
        }); 
    }

    function generateThumbnails() {
        const grid = document.getElementById('fxThumbGrid');
        if (typeof FX_ENGINES !== 'undefined') {
            Object.keys(FX_ENGINES).forEach(id => {
                let b = document.createElement('div'); b.className = 'fx-thumb'; b.id = 'fxBtn_'+id;
                b.onclick = () => { currentFXId = id; document.querySelectorAll('.fx-thumb').forEach(el=>el.classList.remove('active')); b.classList.add('active'); };
                grid.appendChild(b);
            });
            if(document.getElementById('fxBtn_waves')) document.getElementById('fxBtn_waves').classList.add('active');
        }
    }

    function saveThumbnail() { saveCanvas(canvasRef, 'palette_'+currentFXId, 'png'); }
    
    function fetchGithubAssets() {
        const u = "gongbyoung", r = "GongB", p = "Mp3_Visualize";
        Object.keys(FX_ENGINES).forEach(id => {
            const url = `https://raw.githubusercontent.com/${u}/${r}/main/${p}/thumbnails/palette_${id}.png?v=${Date.now()}`;
            const btn = document.getElementById('fxBtn_'+id);
            if(btn) btn.style.backgroundImage = `url(${url})`;
        });
    }

    async function toggleSync() { 
        if (isPlaying) { audio.stop(); isPlaying = false; } 
        else { audio.play(); isPlaying = true; } 
    }
</script>
</body>
</html>
