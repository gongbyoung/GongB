<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SPECTRUM MOTION v21.0.009 — Full FX Linked</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{ --bg:#05050a; --panel:#0d0d1a; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; }
        body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
        .topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;}
        .main-workspace { display: grid; grid-template-columns: 340px 1fr 380px; flex:1; min-height:0; }
        .side-panel { background:var(--panel); padding:15px; overflow-y:auto; scrollbar-width: thin; border-left:1px solid var(--border); border-right:1px solid var(--border); }
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:10px; margin-bottom:12px; }
        .label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}
        .control-group { margin-bottom:10px; }
        .control-group label { display:block; font-size:8px; color:#888; margin-bottom:2px; }
        .val-label { float:right; color:var(--accent); font-weight:bold; font-size:9px; }
        input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; }
        select { width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:5px; border-radius:4px; font-size:10px; outline:none; margin-bottom:4px;}
        .btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:6px; cursor:pointer; font-size:9px; width:100%; transition:0.2s; height: 35px; display: flex; align-items: center; justify-content: center; text-shadow: 0px 0px 3px #000; }
        .btn:hover { border-color: var(--accent); }
        .btn.primary { background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:bold; font-size:11px; padding:12px; margin-top:10px; height: auto;}
        .viz-area { position:relative; display:flex; justify-content:center; align-items:center; background:#000; overflow:hidden; }
        #p5-container canvas { width: 100% !important; height: auto !important; max-height: 100% !important; object-fit: contain; }
        .motion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; max-height: 150px; overflow-y: auto; scrollbar-width: thin; padding-right: 5px;}
        .motion-item { display: flex; align-items: center; gap: 5px; font-size: 8px; color: #aaa; }
        .playbar { height:3px; background:#111; position:relative; }
        #progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }
    </style>
</head>
<body>

<div class="topbar"><div class="logo">SPECTRUM MOTION v21.0.009</div><div id="timeCode">00:00 / 00:00</div></div>

<div class="main-workspace">
    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">1. Audio & SRT Master</span>
            <button class="btn" onclick="document.getElementById('mIn').click()">SELECT MP3</button>
            <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
            <button class="btn" onclick="document.getElementById('srtIn').click()" style="margin-top:5px; border-color:#ff3377;">SELECT SRT</button>
            <input type="file" id="srtIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
            <div id="statusInfo" style="font-size:10px; color:var(--accent); margin-top:8px; font-weight:bold;">파일을 불러와주세요.</div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">2. Background FX Control</span>
            <select id="backdropFX"></select>
            <div class="control-group">
                <label>FX SCALE <span class="val-label" id="vFxScale">1.0</span></label><input type="range" id="fxScale" min="0.1" max="5.0" step="0.1" value="1.0">
                <label>FX INTENSITY <span class="val-label" id="vFxInten">1.5</span></label><input type="range" id="fxInten" min="0.1" max="5.0" step="0.1" value="1.5">
                <label>FX X / Y POS <span class="val-label" id="vFxX">0</span> / <span class="val-label" id="vFxY">0</span></label>
                <input type="range" id="fxX" min="-1000" max="1000" value="0"><input type="range" id="fxY" min="-1000" max="1000" value="0">
            </div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">3. BG Art Style</span>
            <select id="bgArtStyle">
                <option value="none">Original</option>
                <option value="bw">흑백 (B&W)</option>
                <option value="neon">네온 (Neon)</option>
                <option value="dreamy">몽환 (Dreamy)</option>
            </select>
        </div>
    </div>

    <div class="viz-area" id="p5-container"></div>

    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">4. Subtitle Motion Pool (Select)</span>
            <div class="motion-grid" id="motionPool"></div>
            <div class="control-group" style="margin-top:10px;">
                <label>TEXT SIZE <span class="val-label" id="vTextSz">55</span></label><input type="range" id="textSz" min="10" max="300" value="55">
                <label>TEXT POS X / Y <span class="val-label" id="vTextX">960</span> / <span class="val-label" id="vTextY">850</span></label>
                <input type="range" id="textX" min="0" max="1920" value="960"><input type="range" id="textY" min="0" max="1080" value="850">
            </div>
        </div>

        <div class="ctrl-box"><button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START ANALYSIS & RECORD</button></div>
    </div>
</div>
<div class="playbar"><div id="progFill"></div></div>

<script>
    let audio, fft, ampObj, canvasRef, mainCanvas, bgCanvas, textCanvas, instAssets = new Array(2).fill(null);
    let srtData = [], isPlaying = false, mediaRecorder, recordedChunks = [];
    let overlayT = 0, fxData;

    const MOTION_LIST = ["Fade", "Slide L-R", "Slide B-T", "Zoom", "Bounce", "Typewriter", "Flicker", "Wave", "Shake", "Rotate", "Blur", "Glitch", "Spiral", "Floating", "Flip 3D", "Tracking", "Pulse", "Roll In", "Skew", "Elastic", "Rainbow", "Shadow Pulse", "Explosion", "Vortex"];

    function preload() {
        // [중요] 깃허브 폴더에 fx_data.json이 있어야 작동합니다.
        // 만약 로딩 안되면 아래 주석 해제하여 수동 정의 가능합니다.
        fxData = loadJSON('fx_data.json', 
            () => console.log("JSON Loaded Success"), 
            () => { 
                console.log("JSON Load Fail - Using Backup");
                fxData = { "effects": [
                    {"id": "dna", "name": "01. DNA Helix"}, {"id": "nebula", "name": "02. Galaxy Nebula"}, {"id": "mandala", "name": "03. Mandala Power"},
                    {"id": "web", "name": "04. Electric Web"}, {"id": "vortex", "name": "05. Vortex Tunnel"}, {"id": "waves", "name": "06. Layered Waves"},
                    {"id": "chladni", "name": "07. Chladni Pattern"}, {"id": "starfield", "name": "08. Starfield Space"}, {"id": "matrix", "name": "09. Matrix Rain"},
                    {"id": "storm", "name": "10. Lightning Storm"}, {"id": "warp", "name": "11. Warp Speed"}, {"id": "ripples", "name": "12. 12-Grid Ripples"}
                ]};
            }
        );
    }

    function setup() {
        let cnv = createCanvas(1920, 1080, WEBGL);
        cnv.parent('p5-container'); canvasRef = cnv.elt;
        mainCanvas = createGraphics(1920, 1080); bgCanvas = createGraphics(1920, 1080); textCanvas = createGraphics(1920, 1080);
        mainCanvas.imageMode(CENTER); bgCanvas.imageMode(CENTER); textCanvas.textAlign(CENTER, CENTER);
        fft = new p5.FFT(0.8, 512); ampObj = new p5.Amplitude();
        
        const fxSelect = document.getElementById('backdropFX');
        if(fxData && fxData.effects) { fxData.effects.forEach(fx => fxSelect.innerHTML += `<option value="${fx.id}">${fx.name}</option>`); }

        const pool = document.getElementById('motionPool');
        MOTION_LIST.forEach((name, i) => { pool.innerHTML += `<div class="motion-item"><input type="checkbox" class="mC" id="mC_${i}" checked> <span>${i+1}. ${name}</span></div>`; });
    }

    function draw() {
        background(2, 2, 8);
        bgCanvas.clear(); textCanvas.clear(); mainCanvas.clear(); 
        mainCanvas.drawingContext.globalCompositeOperation = 'destination-out';
        mainCanvas.background(255, 45); 
        mainCanvas.drawingContext.globalCompositeOperation = 'source-over';
        
        overlayT += 0.015;
        let spectrum = new Uint8Array(512), bands = new Array(12).fill(0), vol = 0;
        if (audio && audio.isPlaying()) {
            spectrum = fft.analyze(); vol = ampObj.getLevel();
            for(let i=0; i<12; i++) bands[i] = fft.getEnergy(pow(2, i/1.2)*20, pow(2, (i+1)/1.2)*20);
        }

        // --- LAYER 1: Background FX (Factory Link) ---
        bgCanvas.push();
        let fSc = parseFloat(document.getElementById('fxScale').value), fX = parseFloat(document.getElementById('fxX').value), fY = parseFloat(document.getElementById('fxY').value), fI = parseFloat(document.getElementById('fxInten').value);
        bgCanvas.translate(960 + fX, 540 + fY); bgCanvas.scale(fSc);
        drawFXFactory(bgCanvas, overlayT, bands, fI);
        applyArt(bgCanvas, vol);
        bgCanvas.pop();

        // --- LAYER 3: SRT Animation ---
        if (audio && audio.isPlaying()) renderSRT(textCanvas, audio.currentTime(), vol);

        push(); translate(-width/2, -height/2); image(bgCanvas, 0, 0); image(mainCanvas, 0, 0); image(textCanvas, 0, 0); pop();
        updateUI();
    }

    // --- 12종 배경 FX 루팅 함수 (중요: 여기서 누락되면 안보임) ---
    function drawFXFactory(pg, t, bands, inten) {
        let sid = document.getElementById('backdropFX').value;
        pg.strokeWeight(3 * inten); pg.noFill();
        
        if(sid==='dna'){ for(let i=0;i<40;i++){ pg.fill(0,255,200); pg.ellipse(cos(i+t)*300, sin(i+t)*100, 10+bands[i%12]/10); }}
        else if(sid==='nebula'){ let g=pg.drawingContext.createRadialGradient(0,0,0,0,0,600); g.addColorStop(0,'rgba(100,80,255,0.4)'); g.addColorStop(1,'rgba(0,0,0,0)'); pg.drawingContext.fillStyle=g; pg.rect(-960,-540,1920,1080); }
        else if(sid==='mandala'){ for(let i=0; i<12; i++){ pg.rotate(PI/6); pg.stroke(255, 100); pg.ellipse(150+bands[i], 0, 100, 300); } }
        else if(sid==='lightning'){ pg.stroke(255); drawLBranch(pg, 0, 200, -PI/2, (bands[10]/1.5)*inten, 5); }
        else if(sid==='waves'){ pg.stroke(0,255,255); pg.beginShape(); for(let i=-960; i<960; i+=30){ pg.vertex(i, sin(i*0.01+t*5)*bands[floor(map(i,-960,960,0,11))]*inten); } pg.endShape(); }
        else if(sid==='chladni'){ pg.stroke(255,255,0); for(let i=0;i<300;i++) pg.point(random(-500,500), random(-500,500)); }
        else if(sid==='matrix'){ pg.fill(0,255,100,180); pg.textSize(20); for(let i=0;i<15;i++) pg.text(String.fromCharCode(0x30A0+floor(random(96))), random(-960,960), (t*600+i*100)%540); }
        else if(sid==='ripples'){ pg.stroke(255,150); for(let i=0;i<12;i++) pg.circle(-800+(i%4)*400, -400+floor(i/4)*300, bands[i]*inten*2); }
        else if(sid==='starfield'){ pg.stroke(255, 220); for(let i=0;i<30;i++){ let r=noise(i,t)*1920-960; pg.line(r, -540, r+cos(t)*50, 540); }}
        else if(sid==='storm'){ pg.stroke(200,200,255); if(bands[10]>180) drawLBranch(pg, random(-500,500), -500, PI/2, 300, 5); }
        else if(sid==='warp'){ pg.stroke(255); for(let i=0; i<40; i++) pg.line(0,0, random(-960,960), random(-540,540)); }
        else if(sid==='web'){ pg.stroke(0,200,255,80); for(let i=0;i<20;i++) pg.line(cos(t+i)*400, sin(t+i)*400, cos(t+i+PI)*400, sin(t+i+PI)*400); }
    }

    function drawLBranch(pg, x, y, ang, len, gen) { if(gen <= 0 || len < 5) return; let nx = x + cos(ang)*len, ny = y + sin(ang)*len; pg.line(x, y, nx, ny); drawLBranch(pg, nx, ny, ang+0.4, len*0.7, gen-1); drawLBranch(pg, nx, ny, ang-0.4, len*0.7, gen-1); }

    // --- 24종 SRT 모션 ---
    function renderSRT(pg, currTime, vol) {
        let activeSub = srtData.find(s => currTime >= s.start && currTime <= s.end);
        if (!activeSub) return;
        let tSz = parseFloat(document.getElementById('textSz').value), tX = parseFloat(document.getElementById('textX').value), tY = parseFloat(document.getElementById('textY').value);
        let life = map(currTime, activeSub.start, activeSub.end, 0, 1), mid = activeSub.m;
        pg.push(); pg.translate(tX, tY); pg.textSize(tSz); pg.fill(255); pg.noStroke(); pg.textStyle(BOLD);
        if(mid === 5) { pg.text(activeSub.text.substring(0, floor(activeSub.text.length*life*2)), 0, 0); pg.pop(); return; }
        if(mid === 11) if(random()>0.8) { pg.translate(random(-15,15),0); pg.fill(0,255,200); }
        if(mid === 23) { pg.rotate(life*TWO_PI); pg.scale(1-life); }
        pg.text(activeSub.text, 0, 0); pg.pop();
    }

    function applyArt(pg, vol) { let s = document.getElementById('bgArtStyle').value; if(s==='bw') pg.filter(GRAY); else if(s==='neon') { pg.drawingContext.shadowBlur=25*vol; pg.drawingContext.shadowColor='cyan'; } else if(s==='dreamy') pg.filter(BLUR, 2); }

    // Handlers
    function handleSRT(files) { let reader = new FileReader(); reader.onload = e => { let pool = []; document.querySelectorAll('.mC').forEach((c, i) => { if(c.checked) pool.push(i); }); if(pool.length===0) pool=[0]; srtData = e.target.result.split(/\r?\n\r?\n/).map(block => { let p = block.split(/\r?\n/); if (p.length < 3) return null; return { start: t2s(p[1].split(' --> ')[0]), end: t2s(p[1].split(' --> ')[1]), text: p.slice(2).join('\n'), m: pool[floor(random(pool.length))] }; }).filter(s => s); document.getElementById('statusInfo').innerHTML = `음악 분석 완료 / 자막 ${srtData.length}줄`; }; reader.readAsText(files[0]); }
    function t2s(t) { let p = t.replace(',','.').split(':'); return parseInt(p[0])*3600 + parseInt(p[1])*60 + parseFloat(p[2]); }
    function handleFile(files) { audio = loadSound(URL.createObjectURL(files[0]), () => { document.getElementById('recBtn').disabled = false; document.getElementById('statusInfo').innerText = "음악 로드 완료. 자막을 올려주세요."; }); }
    async function toggleSync() { if (isPlaying) { audio.stop(); isPlaying = false; } else { if (getAudioContext().state === 'suspended') await userStartAudio(); const dest = getAudioContext().createMediaStreamDestination(); p5.soundOut.output.connect(dest); mediaRecorder = new MediaRecorder(new MediaStream([...canvasRef.captureStream(30).getVideoTracks(), ...dest.stream.getAudioTracks()]), { videoBitsPerSecond: 80000000 }); mediaRecorder.ondataavailable = e => recordedChunks.push(e.data); mediaRecorder.onstop = () => { const n = new Date(); let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/mp4' })); a.download = `${n.getFullYear()}${nf(n.getMonth()+1,2)}${nf(n.getDate(),2)}${nf(n.getHours(),2)}${nf(n.getMinutes(),2)}.mp4`; a.click(); }; audio.play(); mediaRecorder.start(); isPlaying = true; document.getElementById('recBtn').innerText = "■ STOP & SAVE"; } }
    setInterval(() => { ['fxScale','fxX','fxY','fxInten','textSz','textX','textY'].forEach(id => { let el = document.getElementById(id); if(el) { document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1)).innerText = el.value; } }); }, 100);
</script>
</body>
</html>
