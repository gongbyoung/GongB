<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SPECTRUM STUDIO v21.0.43 — System Monitor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <script src="fx_library.js" onload="isLibraryReady = true;"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{ --bg:#05050a; --panel:#0d0d1a; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; }
        body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
        .topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;}
        .main-workspace { display: grid; grid-template-columns: 360px 1fr 340px; flex:1; min-height:0; }
        .side-panel { background:var(--panel); padding:15px; overflow-y:auto; scrollbar-width: thin; border-left:1px solid var(--border); border-right:1px solid var(--border); display: flex; flex-direction: column; }
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
        .fx-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .fx-thumb { aspect-ratio: 1; border: 2px solid rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; background-color: #111; position: relative; background-size: cover; }
        .fx-thumb.active { border-color: var(--accent2); box-shadow: 0 0 10px var(--accent2); }
        .viz-area { position:relative; background:#000; display: flex; align-items: center; justify-content: center; flex:1; border-top:1px solid #111; }
        
        /* [신규] 시스템 로그 패널 스타일 */
        .log-panel { background:#000; border:1px solid #222; border-radius:4px; padding:10px; flex:1; overflow-y:auto; font-family: 'Courier New', Courier, monospace; font-size:10px; line-height:1.4; color: #888; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .log-info { color: #aaa; }
        .log-success { color: var(--accent); }
        .log-error { color: var(--accent2); }

        #p5-container canvas { width: 100% !important; height: auto !important; max-height: 100% !important; }
        .btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:6px; cursor:pointer; font-size:9px; width:100%; height: 32px; margin-bottom:5px; }
        .btn:hover { border-color: var(--accent); }
    </style>
</head>
<body>

<div class="topbar"><div class="logo">SPECTRUM STUDIO v21.0.43</div><div id="timeCode">00:00 / 00:00</div></div>

<div class="main-workspace">
    <div class="side-panel">
        <div class="ctrl-box">
            <span style="font-size:9px; color:var(--accent);">1. VISUAL PALETTE</span>
            <div class="fx-grid" id="fxThumbGrid"></div>
            <button class="btn" onclick="fetchGithubAssets(true)" style="margin-top:10px; color:var(--accent2); border-color:var(--accent2);">☁️ FORCE SYNC FROM CLOUD</button>
        </div>
        <div class="ctrl-box">
            <span style="font-size:9px; color:var(--accent);">2. ENGINE CONTROL</span>
            <button class="btn" id="analyzeBtn" onclick="activateEngine()" disabled>⚡ PRE-ANALYZE AUDIO</button>
        </div>
    </div>

    <div class="viz-area" id="p5-container"></div>

    <div class="side-panel">
        <div class="ctrl-box">
            <span style="font-size:9px; color:var(--accent);">3. PARAMETERS</span>
            <input type="range" id="fxP1" min="1" max="100" value="25" style="width:100%;">
            <input type="range" id="fxP2" min="0.1" max="10.0" step="0.1" value="2.5" style="width:100%;">
            <input type="range" id="fxP3" min="1" max="255" value="150" style="width:100%;">
        </div>
        
        <div class="ctrl-box">
            <button class="btn" onclick="document.getElementById('mIn').click()">1. LOAD MP3</button>
            <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
            <button class="btn" id="recBtn" onclick="toggleSync()" disabled style="background:var(--accent2); border:none;">2. START PRODUCTION</button>
        </div>

        <!-- [신규] 시스템 로그 출력 영역 -->
        <span style="font-size:9px; color:var(--accent); margin-bottom:5px; display:block;">4. SYSTEM MONITOR LOG</span>
        <div class="log-panel" id="logPanel">
            <div class="log-entry log-info">> System Initializing...</div>
        </div>
    </div>
</div>

<script>
    let audio, fft, canvasRef, bgCanvas, isPlaying = false, currentFXId = '';
    let isLibraryReady = false, isEngineActive = false;

    // --- [신규] 로그 출력 함수 ---
    function addLog(msg, type = 'info') {
        const panel = document.getElementById('logPanel');
        const entry = document.createElement('div');
        const now = new Date();
        const timeStr = `[${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}]`;
        
        entry.className = `log-entry log-${type}`;
        entry.innerText = `${timeStr} ${msg}`;
        panel.appendChild(entry);
        panel.scrollTop = panel.scrollHeight;
    }

    function setup() {
        let cnv = createCanvas(1920, 1080, WEBGL); cnv.parent('p5-container'); canvasRef = cnv.elt;
        bgCanvas = createGraphics(1920, 1080); bgCanvas.imageMode(CENTER); bgCanvas.colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);
        
        addLog("Canvas created. 1920x1080 resolution.", "info");

        let checkInt = setInterval(() => {
            if(window.FX_ENGINES) {
                const count = Object.keys(FX_ENGINES).length;
                addLog(`FX Library Detected: ${count} effects found.`, "success");
                generateThumbnails();
                clearInterval(checkInt);
            }
        }, 200);
    }

    function generateThumbnails() {
        const grid = document.getElementById('fxThumbGrid');
        grid.innerHTML = '';
        const keys = Object.keys(FX_ENGINES);
        keys.forEach(id => {
            let b = document.createElement('div'); b.className = 'fx-thumb'; b.id = 'fxBtn_' + id;
            b.setAttribute('data-name', id.toUpperCase());
            b.onclick = () => { 
                currentFXId = id; 
                addLog(`FX Selected: ${id}`, "info");
                document.querySelectorAll('.fx-thumb').forEach(el => el.classList.remove('active')); 
                b.classList.add('active'); 
            };
            grid.appendChild(b);
        });
        if (keys.length > 0) {
            currentFXId = keys[0];
            document.getElementById('fxBtn_' + currentFXId).classList.add('active');
            addLog("Initial FX Thumbnails generated.", "info");
            fetchGithubAssets(false);
        }
    }

    async function fetchGithubAssets(force = false) {
        const u = "gongbyoung", r = "GongB", p = "Mp3_Visualize";
        const keys = Object.keys(FX_ENGINES);
        addLog(`Starting Cloud Asset Sync (Total: ${keys.length})...`, "info");
        
        let loaded = 0;
        keys.forEach(id => {
            const url = `https://raw.githubusercontent.com/${u}/${r}/main/${p}/thumbnails/palette_${id}.png${force ? '?v='+Date.now() : ''}`;
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => {
                document.getElementById('fxBtn_'+id).style.backgroundImage = `url(${url})`;
                loaded++;
                if(loaded === keys.length) addLog("All cloud thumbnails loaded successfully.", "success");
            };
            img.onerror = () => { 
                loaded++;
                addLog(`Asset Missing: palette_${id}.png`, "error");
            };
            img.src = url;
        });
    }

    function activateEngine() {
        if (!audio) {
            addLog("Error: No audio file loaded.", "error");
            return;
        }
        addLog("Activating Audio Engine...", "info");
        userStartAudio().then(() => {
            isEngineActive = true;
            addLog("Audio Engine Active. FFT Input Ready.", "success");
            document.getElementById('analyzeBtn').innerText = "✅ ANALYZE ACTIVE";
            document.getElementById('recBtn').disabled = false;
        }).catch(err => addLog(`Engine Error: ${err.message}`, "error"));
    }

    function draw() {
        background(2, 2, 8); bgCanvas.clear();
        let bands = new Array(12).fill(0);
        
        if (isEngineActive && audio && audio.isPlaying()) {
            let spectrum = fft.analyze();
            if (spectrum) {
                for (let i = 0; i < 12; i++) {
                    let start = floor(map(i, 0, 12, 0, spectrum.length * 0.4));
                    let end = floor(map(i + 1, 0, 12, 0, spectrum.length * 0.4));
                    let sum = 0; for (let j = start; j < end; j++) sum += spectrum[j];
                    bands[i] = sum / (end - start || 1);
                }
            }
        }
        bgCanvas.push(); bgCanvas.translate(960, 540);
        if (window.FX_ENGINES && FX_ENGINES[currentFXId]) {
            FX_ENGINES[currentFXId](bgCanvas, frameCount * 0.02, bands, 1.5, parseFloat(document.getElementById('fxHue').value), "hue", parseFloat(document.getElementById('fxP1').value), parseFloat(document.getElementById('fxP2').value), parseFloat(document.getElementById('fxP3').value));
        }
        bgCanvas.pop();
        push(); translate(-width/2, -height/2); image(bgCanvas, 0, 0); pop();
    }

    function handleFile(files) { 
        addLog(`File Selected: ${files[0].name}`, "info");
        audio = loadSound(URL.createObjectURL(files[0]), () => { 
            addLog("Audio Load Complete. Ready for Pre-Analyze.", "success");
            document.getElementById('analyzeBtn').disabled = false; 
        }, (err) => addLog(`Audio Load Error: ${err}`, "error")); 
    }

    async function toggleSync() { 
        if (isPlaying) { 
            audio.stop(); isPlaying = false; 
            addLog("Production Stopped.", "info");
        } else { 
            audio.play(); isPlaying = true; 
            addLog("Production Started.", "success");
        } 
    }
</script>
</body>
</html>
