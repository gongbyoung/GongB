<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SPECTRUM STUDIO v21.0.41 — Asset Sync Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    
    <!-- [중요] fx_library.js 로드 대기 로직 포함 -->
    <script src="fx_library.js" onload="console.log('FX Library Loaded'); isLibraryReady = true;"></script>
    
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{ --bg:#05050a; --panel:#0d0d1a; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; }
        body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
        .topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;}
        .main-workspace { display: grid; grid-template-columns: 360px 1fr 340px; flex:1; min-height:0; }
        .side-panel { background:var(--panel); padding:15px; overflow-y:auto; scrollbar-width: thin; border-left:1px solid var(--border); border-right:1px solid var(--border); }
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
        .fx-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .fx-thumb { aspect-ratio: 1; border: 2px solid rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; background-color: #111; position: relative; background-size: cover; background-position: center; transition: 0.2s; }
        .fx-thumb.active { border-color: var(--accent2); box-shadow: 0 0 10px var(--accent2); }
        .fx-thumb::after { content: attr(data-name); position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); font-size: 5px; text-align: center; color: #fff; padding: 2px 0; border-radius: 0 0 4px 4px; overflow: hidden; white-space: nowrap; }
        .viz-area { position:relative; background:#000; overflow:hidden; display: flex; align-items: center; justify-content: center; }
        #p5-container canvas { width: 100% !important; height: auto !important; max-height: 100% !important; }
        .btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:6px; cursor:pointer; font-size:9px; width:100%; height: 32px; margin-bottom:5px; transition: 0.2s; }
        .btn:hover { border-color: var(--accent); background: rgba(0,255,204,0.05); }
        .btn.active-engine { background: var(--accent2); border-color: var(--accent2); font-weight: bold; }
    </style>
</head>
<body>

<div class="topbar"><div class="logo">SPECTRUM STUDIO v21.0.41</div><div id="timeCode">00:00 / 00:00</div></div>

<div class="main-workspace">
    <div class="side-panel">
        <div class="ctrl-box">
            <span style="font-size:9px; color:var(--accent);">1. VISUAL PALETTE</span>
            <div class="fx-grid" id="fxThumbGrid"></div>
            <!-- [강화] FETCH 버튼 누를 때 경로를 한 번 더 정제함 -->
            <button class="btn" onclick="fetchGithubAssets()" style="margin-top:10px; color:var(--accent2); border-color:var(--accent2); font-weight:bold;">☁️ FORCE SYNC PNG FROM GITHUB</button>
        </div>
        <div class="ctrl-box">
            <span style="font-size:9px; color:var(--accent);">2. ENGINE STATUS</span>
            <button class="btn" id="analyzeBtn" onclick="activateEngine()" disabled>⚡ PRE-ANALYZE AUDIO</button>
            <div id="engineStatus" style="font-size:10px; color:#555; text-align:center; margin-top:5px;">ENGINE IDLE</div>
        </div>
    </div>

    <div class="viz-area" id="p5-container"></div>

    <div class="side-panel">
        <div class="ctrl-box">
            <span style="font-size:9px; color:var(--accent);">3. CLOUD PATH SETTINGS</span>
            <input type="text" id="ghUser" placeholder="gongbyoung" onchange="saveLocalSettings()">
            <input type="text" id="ghRepo" placeholder="GongB" onchange="saveLocalSettings()">
            <input type="text" id="ghPath" placeholder="Mp3_Visualize" onchange="saveLocalSettings()">
            <p style="font-size:8px; color:rgba(255,255,255,0.4); margin-top:5px;">※ 썸네일은 /thumbnails/ 폴더 안 palette_[id].png 여야 함</p>
        </div>
        <div class="ctrl-box">
            <button class="btn" onclick="saveThumbnail()">📷 SAVE CURRENT AS PNG</button>
        </div>
        <div class="ctrl-box">
            <button class="btn" onclick="document.getElementById('mIn').click()">1. LOAD MP3</button>
            <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
            <button class="btn" id="recBtn" onclick="toggleSync()" disabled style="background:var(--accent2); border:none;">2. START PRODUCTION</button>
        </div>
    </div>
</div>

<script>
    let audio, fft, canvasRef, bgCanvas, isPlaying = false, currentFXId = '';
    let isLibraryReady = false;
    let isEngineActive = false;

    function setup() {
        let cnv = createCanvas(1920, 1080, WEBGL); cnv.parent('p5-container'); canvasRef = cnv.elt;
        bgCanvas = createGraphics(1920, 1080); bgCanvas.imageMode(CENTER); bgCanvas.colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);
        
        // 라이브러리 로드 대기 후 썸네일 생성
        let checkInt = setInterval(() => {
            if(isLibraryReady) {
                generateThumbnails();
                loadLocalSettings(); // 설정 로드 후 즉시 동기화 시도
                clearInterval(checkInt);
            }
        }, 100);
    }

    function generateThumbnails() {
        const grid = document.getElementById('fxThumbGrid');
        grid.innerHTML = '';
        if (typeof FX_ENGINES !== 'undefined') {
            const keys = Object.keys(FX_ENGINES);
            let tPg = createGraphics(80, 80);
            keys.forEach(id => {
                let b = document.createElement('div'); b.className = 'fx-thumb'; b.id = 'fxBtn_' + id;
                b.setAttribute('data-name', id.toUpperCase());
                
                tPg.background(15, 20, 30); tPg.push(); tPg.translate(40, 40); tPg.stroke(0, 255, 200, 50); tPg.noFill(); tPg.circle(0,0,20); tPg.pop();
                b.style.backgroundImage = `url(${tPg.canvas.toDataURL()})`;
                
                b.onclick = () => { 
                    currentFXId = id; 
                    document.querySelectorAll('.fx-thumb').forEach(el => el.classList.remove('active')); 
                    b.classList.add('active'); 
                };
                grid.appendChild(b);
            });
            tPg.remove();
            if (keys.length > 0) {
                currentFXId = keys[0];
                const firstBtn = document.getElementById('fxBtn_' + currentFXId);
                if(firstBtn) firstBtn.classList.add('active');
            }
            // 팔레트 생성 후 자동으로 깃허브 데이터 한번 땡겨오기
            setTimeout(fetchGithubAssets, 500);
        }
    }

    // [강화] 경로 최적화 및 404 방지 로직이 들어간 에셋 로더
    function fetchGithubAssets() {
        const u = document.getElementById('ghUser').value || 'gongbyoung';
        const r = document.getElementById('ghRepo').value || 'GongB';
        let p = document.getElementById('ghPath').value || 'Mp3_Visualize';
        
        // 경로 정제: 앞뒤 공백 제거 및 슬래시 처리
        p = p.trim().replace(/^\/|\/$/g, '');
        
        if (typeof FX_ENGINES !== 'undefined') {
            Object.keys(FX_ENGINES).forEach(id => {
                const url = `https://raw.githubusercontent.com/${u}/${r}/main/${p}/thumbnails/palette_${id}.png?v=${Date.now()}`;
                const btn = document.getElementById('fxBtn_'+id);
                if(btn) {
                    const img = new Image();
                    img.crossOrigin = "Anonymous";
                    img.onload = () => { 
                        btn.style.backgroundImage = `url(${url})`; 
                        console.log(`Success: ${id} thumb loaded.`);
                    };
                    img.onerror = () => { 
                        // 실패 시 로그만 남기고 기본 유지
                        console.warn(`Failed: ${id} thumb not found at ${url}`);
                    };
                    img.src = url;
                }
            });
        }
    }

    function activateEngine() {
        if (!audio) return;
        userStartAudio().then(() => {
            isEngineActive = true;
            document.getElementById('analyzeBtn').innerText = "✅ ANALYZE ACTIVE";
            document.getElementById('analyzeBtn').classList.add('active-engine');
            document.RecBtn; document.getElementById('recBtn').disabled = false;
        });
    }

    function draw() {
        background(2, 2, 8); bgCanvas.clear();
        let bands = new Array(12).fill(0);
        if (isEngineActive && audio && audio.isPlaying()) {
            let spectrum = fft.analyze();
            if (spectrum && spectrum.length > 0) {
                for (let i = 0; i < 12; i++) {
                    let start = floor(map(i, 0, 12, 0, spectrum.length * 0.4));
                    let end = floor(map(i + 1, 0, 12, 0, spectrum.length * 0.4));
                    let sum = 0; for (let j = start; j < end; j++) sum += spectrum[j];
                    bands[i] = sum / (end - start || 1);
                }
            }
        }
        bgCanvas.push(); bgCanvas.translate(960, 540);
        if (typeof FX_ENGINES !== 'undefined' && FX_ENGINES[currentFXId]) {
            FX_ENGINES[currentFXId](bgCanvas, frameCount * 0.02, bands, 1.5, parseFloat(document.getElementById('fxHue').value), document.getElementById('colorStyle').value, parseFloat(document.getElementById('fxP1').value), parseFloat(document.getElementById('fxP2').value), parseFloat(document.getElementById('fxP3').value));
        }
        bgCanvas.pop();
        push(); translate(-width/2, -height/2); image(bgCanvas, 0, 0); pop();
    }

    function handleFile(files) { audio = loadSound(URL.createObjectURL(files[0]), () => { document.getElementById('analyzeBtn').disabled = false; }); }
    function saveThumbnail() { saveCanvas(canvasRef, 'palette_'+currentFXId, 'png'); }
    function saveLocalSettings() { localStorage.setItem('vfx_settings', JSON.stringify({u:document.getElementById('ghUser').value, r:document.getElementById('ghRepo').value, p:document.getElementById('ghPath').value})); }
    function loadLocalSettings() { const s = JSON.parse(localStorage.getItem('vfx_settings')); if(s){ document.getElementById('ghUser').value=s.u; document.getElementById('ghRepo').value=s.r; document.getElementById('ghPath').value=s.p; fetchGithubAssets(); } }
    async function toggleSync() { if (isPlaying) { audio.stop(); isPlaying = false; } else { audio.play(); isPlaying = true; } }
</script>
</body>
</html>
