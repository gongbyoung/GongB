<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SPECTRUM MOTION v21.0.013 — Final Production</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{ --bg:#05050a; --panel:#0d0d1a; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; }
        body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
        .topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;}
        .main-workspace { display: grid; grid-template-columns: 360px 1fr 380px; flex:1; min-height:0; }
        .side-panel { background:var(--panel); padding:15px; overflow-y:auto; scrollbar-width: thin; border-left:1px solid var(--border); border-right:1px solid var(--border); }
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:10px; margin-bottom:12px; }
        .label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}
        .control-group { margin-bottom:10px; }
        .control-group label { display:block; font-size:8px; color:#888; margin-bottom:2px; }
        .val-label { float:right; color:var(--accent); font-weight:bold; font-size:9px; }
        input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; }
        select { width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:5px; border-radius:4px; font-size:10px; outline:none; margin-bottom:4px;}
        .btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:6px; cursor:pointer; font-size:9px; width:100%; transition:0.2s; height: 32px; display: flex; align-items: center; justify-content: center; text-shadow: 0px 0px 3px #000; }
        .btn:hover { border-color: var(--accent); }
        .btn.primary { background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:bold; font-size:11px; padding:12px; margin-top:10px; height: auto;}
        .viz-area { position:relative; display:flex; justify-content:center; align-items:center; background:#000; overflow:hidden; }
        #p5-container canvas { width: 100% !important; height: auto !important; max-height: 100% !important; object-fit: contain; }
        .fx-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 5px; max-height: 220px; overflow-y: auto; scrollbar-width: thin; padding-right: 5px;}
        .fx-thumb { aspect-ratio: 1; border: 2px solid rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; background-size: cover; position: relative; transition: 0.2s; background-color: #111;}
        .fx-thumb.active { border-color: var(--accent2); box-shadow: 0 0 10px var(--accent2); }
        .fx-thumb::after { content: attr(data-name); position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); font-size: 6px; text-align: center; color: #fff; }
        .motion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; max-height: 180px; overflow-y: auto; scrollbar-width: thin; padding-right: 5px;}
        .motion-item { display: flex; align-items: center; gap: 5px; font-size: 8px; color: #aaa; }
        .motion-item input { accent-color: var(--accent); cursor: pointer; }
        .playbar { height:3px; background:#111; position:relative; }
        #progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">SPECTRUM MOTION v21.0.013 — Final Production</div>
    <div id="timeCode">00:00 / 00:00</div>
</div>

<div class="main-workspace">
    <!-- LEFT: FX & AUDIO -->
    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">1. Data Analysis</span>
            <button class="btn" onclick="document.getElementById('mIn').click()">LOAD MP3</button>
            <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
            <button class="btn" onclick="document.getElementById('srtIn').click()" style="margin-top:5px; border-color:#ff3377;">LOAD SRT</button>
            <input type="file" id="srtIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
            <div id="statusInfo" style="font-size:10px; color:var(--accent); margin-top:8px; font-weight:bold;">파일을 불러와주세요.</div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">2. Visual Palette (24 Background FX)</span>
            <div class="fx-grid" id="fxThumbGrid"></div>
            <div class="control-group" style="margin-top:12px;">
                <label>FX SCALE <span class="val-label" id="vFxScale">1.0</span></label><input type="range" id="fxScale" min="0.1" max="5.0" step="0.1" value="1.0">
                <label>FX INTEN. <span class="val-label" id="vFxInten">1.5</span></label><input type="range" id="fxInten" min="0.1" max="5.0" step="0.1" value="1.5">
            </div>
            <select id="bgArtStyle">
                <option value="none">Original</option>
                <option value="bw">흑백 (B&W)</option>
                <option value="pastel">파스텔</option>
                <option value="neon">네온</option>
                <option value="dreamy">몽환</option>
            </select>
        </div>
    </div>

    <!-- CENTER -->
    <div class="viz-area" id="p5-container"></div>

    <!-- RIGHT: SRT & RECORDING -->
    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">3. Subtitle Motion Selection (24)</span>
            <div class="motion-grid" id="motionPool"></div>
            <div class="control-group" style="margin-top:10px;">
                <select id="textFont">
                    <option value="Pretendard">Pretendard (Sans)</option>
                    <option value="ChosunGs">Chosun (Serif)</option>
                    <option value="Monospace">Monospace</option>
                </select>
                <label>FONT SIZE <span class="val-label" id="vTextSz">55</span></label><input type="range" id="textSz" min="10" max="300" value="55">
                <label>POSITION X <span class="val-label" id="vTextX">960</span></label><input type="range" id="textX" min="0" max="1920" value="960">
                <label>POSITION Y <span class="val-label" id="vTextY">850</span></label><input type="range" id="textY" min="0" max="1080" value="850">
            </div>
        </div>

        <div class="ctrl-box"><button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START RECORDING</button></div>
    </div>
</div>
<div class="playbar"><div id="progFill"></div></div>

<script>
    let audio, fft, ampObj, canvasRef, mainCanvas, bgCanvas, textCanvas, instAssets = new Array(2).fill(null);
    let srtData = [], isPlaying = false, mediaRecorder, recordedChunks = [];
    let overlayT = 0, currentFXId = 'waves', srtChars = [];

    const FX_DB = [
        {id:'waves', name:'WAVE Layer'}, {id:'matrix', name:'KR Matrix'}, {id:'ripBokeh', name:'Rip-Bokeh'}, {id:'bokRip', name:'Bok-Ripple'},
        {id:'dna', name:'DNA'}, {id:'nebula', name:'Nebula'}, {id:'mandala', name:'Mandala'}, {id:'lightning', name:'Storm'},
        {id:'web', name:'Web'}, {id:'vortex', name:'Vortex'}, {id:'chladni', name:'Chladni'}, {id:'starfield', name:'Star'},
        {id:'cyber', name:'Cyber'}, {id:'radar', name:'Radar'}, {id:'hex', name:'Hexagon'}, {id:'flow', name:'Flow'},
        {id:'orbit', name:'Orbit'}, {id:'tree', name:'Tree'}, {id:'triangles', name:'Tri'}, {id:'spiral', name:'Spiral'},
        {id:'particles', name:'Part'}, {id:'tunnel', name:'Tunnel'}, {id:'warp', name:'Warp'}, {id:'ripples', name:'Ripple'}
    ];

    const MOTIONS = ["Fade", "Slide L-R", "Slide B-T", "Zoom", "Bounce", "Typewriter", "Flicker", "Wave", "Shake", "Rotate", "Blur", "Glitch", "Spiral", "Floating", "Flip 3D", "Tracking", "Pulse", "Roll In", "Skew", "Elastic", "Rainbow", "Shadow", "Explosion", "Vortex"];

    function setup() {
        let cnv = createCanvas(1920, 1080, WEBGL);
        cnv.parent('p5-container'); canvasRef = cnv.elt;
        mainCanvas = createGraphics(1920, 1080); bgCanvas = createGraphics(1920, 1080); textCanvas = createGraphics(1920, 1080);
        mainCanvas.imageMode(CENTER); bgCanvas.imageMode(CENTER); textCanvas.textAlign(CENTER, CENTER);
        fft = new p5.FFT(0.8, 512); ampObj = new p5.Amplitude();
        generateFXPalette();
        const pool = document.getElementById('motionPool');
        MOTIONS.forEach((name, i) => { pool.innerHTML += `<div class="motion-item"><input type="checkbox" class="mC" id="mC_${i}" checked> <span>${i+1}. ${name}</span></div>`; });
    }

    function generateFXPalette() {
        const grid = document.getElementById('fxThumbGrid');
        FX_DB.forEach(fx => {
            let btn = document.createElement('div');
            btn.className = 'fx-thumb' + (fx.id==='waves'?' active':'');
            btn.setAttribute('data-name', fx.name);
            btn.onclick = () => { document.querySelectorAll('.fx-thumb').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentFXId = fx.id; };
            grid.appendChild(btn);
        });
    }

    function draw() {
        background(2, 2, 8);
        bgCanvas.clear(); textCanvas.clear(); mainCanvas.clear(); 
        mainCanvas.drawingContext.globalCompositeOperation = 'destination-out';
        mainCanvas.background(255, 45); 
        mainCanvas.drawingContext.globalCompositeOperation = 'source-over';
        
        overlayT += 0.015;
        let bands = new Array(12).fill(0), vol = 0;
        if (audio && audio.isPlaying()) {
            fft.analyze(); vol = ampObj.getLevel();
            for(let i=0; i<12; i++) bands[i] = fft.getEnergy(pow(2, i/1.2)*20, pow(2, (i+1)/1.2)*20);
        }

        // --- LAYER 1: Background FX (Full 24 Logic) ---
        bgCanvas.push();
        let fSc = parseFloat(document.getElementById('fxScale').value), fI = parseFloat(document.getElementById('fxInten').value);
        bgCanvas.translate(960, 540); bgCanvas.scale(fSc);
        drawFinalFX(bgCanvas, overlayT, bands, fI);
        applyArt(bgCanvas, vol);
        bgCanvas.pop();

        // --- LAYER 3: SRT (24 Motion Logic) ---
        if (audio && audio.isPlaying()) renderFinalSRT(textCanvas, audio.currentTime(), vol, bands);

        push(); translate(-width/2, -height/2); image(bgCanvas,0,0); image(mainCanvas,0,0); image(textCanvas,0,0); pop();
        updateUI();
    }

    function drawFinalFX(pg, t, bands, fI) {
        let sid = currentFXId; pg.noFill(); pg.strokeWeight(2 * fI);
        if(sid==='waves'){ // WAVE Logic Fix
            for(let j=0; j<5; j++){
                let c = color(100+j*35, 150+bands[j], 255);
                pg.fill(red(c), green(c), blue(c), 70); pg.stroke(c); pg.beginShape();
                for(let i=-960; i<=960; i+=40){ let h = sin(i*0.005 + t*(j+1.2)) * bands[j] * fI; pg.vertex(i, 200 + j*100 + h); }
                pg.vertex(960, 540); pg.vertex(-960, 540); pg.endShape(CLOSE);
            }
        } else if(sid==='matrix'){ // KR Matrix Logic Fix
            pg.fill(0, 255, 150, 220); pg.textSize(26);
            let chars = srtChars.length > 0 ? srtChars : ['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
            for(let i=0; i<30; i++){ let x=-960+(i*70); let y=(t*500+i*200)%1080-540; pg.text(chars[floor(random(chars.length))], x, y + bands[i%12]); }
        } else if(sid==='ripBokeh'){ // Ripple-Bokeh Fix
            for(let i=0; i<8; i++){ pg.stroke(random(255), 100+bands[i], 255, 150); pg.circle(0, 0, (t*200+i*150)%1200 + bands[i]); pg.fill(255, 150+bands[i], 150, 60); pg.circle(cos(t+i)*500, sin(t+i)*500, 60+bands[i]); }
        } else if(sid==='lightning'){ pg.stroke(255); drawBranch(pg, 0, 250, -PI/2, (bands[10]/1.5)*fI, 5); }
        else if(sid==='hex'){ pg.stroke(0,255,255); for(let j=0;j<4;j++){ pg.beginShape(); for(let i=0;i<6;i++) pg.vertex(cos(i*PI/3)*(250+bands[j]*2), sin(i*PI/3)*(250+bands[j]*2)); pg.endShape(CLOSE); }}
        else if(sid==='starfield'){ pg.stroke(255); for(let i=0; i<40; i++){ let r=noise(i,t)*2000-1000; pg.line(r, -540, r+cos(t)*bands[0], 540); }}
        else { pg.stroke(255, 100); pg.circle(0,0, bands[0]*fI*3); }
    }

    function drawBranch(pg, x, y, ang, len, gen) { if(gen <= 0 || len < 5) return; let nx = x + cos(ang)*len, ny = y + sin(ang)*len; pg.line(x, y, nx, ny); drawBranch(pg, nx, ny, ang+0.4, len*0.7, gen-1); drawBranch(pg, nx, ny, ang-0.4, len*0.7, gen-1); }

    function renderFinalSRT(pg, currTime, vol, bands) {
        let active = srtData.find(s => currTime >= s.start && currTime <= s.end);
        if (!active) return;
        let tSz = parseFloat(document.getElementById('textSz').value), tX = parseFloat(document.getElementById('textX').value), tY = parseFloat(document.getElementById('textY').value);
        let life = map(currTime, active.start, active.end, 0, 1), mid = active.m;
        pg.push(); pg.translate(tX, tY); pg.textSize(tSz); pg.fill(255); pg.noStroke(); pg.textFont(document.getElementById('textFont').value); pg.textStyle(BOLD);

        if(mid === 0) pg.fill(255, sin(life*PI)*255); // Fade
        else if(mid === 3) pg.scale(0.5 + sin(life*PI)); // Zoom
        else if(mid === 5) { pg.text(active.text.substring(0, floor(active.text.length*life*2.5)), 0, 0); pg.pop(); return; } // Typewriter
        else if(mid === 7) pg.translate(0, sin(t*10)*30); // Wave
        else if(mid === 11) { if(random()>0.8){ pg.translate(random(-20,20),0); pg.fill(0,255,200); } } // Glitch
        else if(mid === 16) pg.scale(1 + vol*3); // Pulse
        else if(mid === 20) pg.fill(random(100,255), 255, 200); // Rainbow
        else if(mid === 23) { pg.rotate(life*TWO_PI); pg.scale(1-life); } // Vortex

        pg.text(active.text, 0, 0); pg.pop();
    }

    function applyArt(pg, vol) { let s = document.getElementById('bgArtStyle').value; if(s==='bw') pg.filter(GRAY); else if(s==='neon') { pg.drawingContext.shadowBlur=25*vol; pg.drawingContext.shadowColor='cyan'; } else if(s==='dreamy') pg.filter(BLUR, 2); }
    function updateUI() { if(audio && audio.isPlaying()){ document.getElementById('progFill').style.width = (audio.currentTime()/audio.duration()*100)+'%'; let m = floor(audio.currentTime()/60), s = floor(audio.currentTime()%60); document.getElementById('timeCode').innerText = `${nf(m,2)}:${nf(s,2)} / ${nf(floor(audio.duration()/60),2)}:${nf(floor(audio.duration()%60),2)}`; } }
    function handleSRT(files) { let reader = new FileReader(); reader.onload = e => { let pool = []; document.querySelectorAll('.mC').forEach((c, i) => { if(c.checked) pool.push(i); }); srtData = e.target.result.split(/\r?\n\r?\n/).map(block => { let p = block.split(/\r?\n/); if (p.length < 3) return null; let txt = p.slice(2).join(' '); let cons = txt.match(/[ㄱ-ㅎ]/g); if(cons) srtChars.push(...cons); return { start: t2s(p[1].split(' --> ')[0]), end: t2s(p[1].split(' --> ')[1]), text: txt, m: pool[floor(random(pool.length))] }; }).filter(s => s); document.getElementById('statusInfo').innerText = `자막 ${srtData.length}줄 분석 완료`; }; reader.readAsText(files[0]); }
    function t2s(t) { let p = t.replace(',','.').split(':'); return parseInt(p[0])*3600 + parseInt(p[1])*60 + parseFloat(p[2]); }
    function handleFile(files) { audio = loadSound(URL.createObjectURL(files[0]), () => { document.getElementById('recBtn').disabled = false; }); }
    function openL(id) { document.getElementById(id).click(); }
    function loadAsset(id, files) { loadImage(URL.createObjectURL(files[0]), (img) => { instAssets[id] = img; }); }
    async function toggleSync() { if (isPlaying) { audio.stop(); if(mediaRecorder) mediaRecorder.stop(); isPlaying = false; } else { if (getAudioContext().state === 'suspended') await userStartAudio(); const dest = getAudioContext().createMediaStreamDestination(); p5.soundOut.output.connect(dest); mediaRecorder = new MediaRecorder(new MediaStream([...canvasRef.captureStream(30).getVideoTracks(), ...dest.stream.getAudioTracks()]), { videoBitsPerSecond: 80000000 }); mediaRecorder.ondataavailable = e => recordedChunks.push(e.data); mediaRecorder.onstop = () => { let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/mp4' })); a.download = `${nf(year(),4)}${nf(month(),2)}${nf(day(),2)}${nf(hour(),2)}${nf(minute(),2)}${nf(second(),2)}.mp4`; a.click(); }; audio.play(); mediaRecorder.start(); isPlaying = true; document.getElementById('recBtn').innerText = "■ STOP & SAVE"; } }
    setInterval(() => { ['fxScale','fxInten','textSz','textX','textY'].forEach(id => { let el = document.getElementById(id); if(el) document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1)).innerText = el.value; }); }, 100);
</script>
</body>
</html>
