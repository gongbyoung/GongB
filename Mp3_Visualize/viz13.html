<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPECTRUM UNIVERSAL v19.0.002</title>
    <link rel="icon" href="data:,">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{ --bg:#020205; --panel:#0d0d1a; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; }
        body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
        .topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;}
        .main-workspace { display: grid; grid-template-columns: 320px 1fr 320px; flex:1; min-height:0; }
        .side-panel { background:var(--panel); padding:15px; overflow-y:auto; scrollbar-width: thin; border-left:1px solid var(--border); border-right:1px solid var(--border); }
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
        .label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}
        .control-group { margin-bottom:10px; }
        .control-group label { display:block; font-size:8px; color:#888; margin-bottom:2px; }
        .val-label { float:right; color:var(--accent); font-weight:bold; font-size:9px; }
        input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; }
        select { width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:5px; border-radius:4px; font-size:10px; outline:none; margin-bottom:4px;}
        .btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:6px; cursor:pointer; font-size:9px; width:100%; transition:0.2s; background-position: center; background-size: cover; height: 32px; display: flex; align-items: center; justify-content: center; text-shadow: 0px 0px 3px #000; }
        .btn:hover { border-color: var(--accent); }
        .btn.primary { background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:bold; font-size:11px; padding:12px; margin-top:10px; height: auto;}
        .viz-area { position:relative; display:flex; justify-content:center; align-items:center; background:#000; overflow:hidden; }
        #p5-container canvas { width: 100% !important; height: auto !important; max-height: 100% !important; object-fit: contain; }
        .inst-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; border-bottom: 1px dashed rgba(255,255,255,0.05); padding-bottom: 6px;}
        .inst-header { display: grid; grid-template-columns: 45px 1fr; gap: 8px; align-items: center; }
        .inst-header span { font-size: 8px; color: var(--accent2); font-weight: bold; }
        .playbar { height:2px; background:#111; position:relative; }
        #progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">SPECTRUM UNIVERSAL v19.0.002</div>
    <div id="timeCode">00:00 / 00:00</div>
</div>

<div class="main-workspace">
    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">1. Audio Center</span>
            <button class="btn" onclick="document.getElementById('mIn').click()">SELECT MP3 FILE</button>
            <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
            <button class="btn" id="analyzeBtn" onclick="runAnalysis()" disabled style="border-color:#ffcc00; color:#ffcc00; margin-top:5px; height:auto; padding:8px;">PRE-ANALYZE & START</button>
        </div>

        <div class="ctrl-box">
            <span class="label-small">2. Backdrop Elements (30 Effects)</span>
            <select id="backdropFX">
                <option value="dna">01 DNA Helix</option>
                <option value="nebula" selected>02 Galaxy Nebula</option>
                <option value="mandala">03 Mandala</option>
                <option value="web">04 Electric Web</option>
                <option value="vortex">05 Vortex Tunnel</option>
                <option value="aurora">06 Aurora Rings</option>
                <option value="fire">07 Fire Ring</option>
                <option value="ocean">08 Ocean Wave</option>
                <option value="crystal">09 Crystal Shards</option>
                <option value="matrix">14 Matrix Rain</option>
                <option value="snake">16 Neon Snake</option>
                <option value="geo">18 Geo Pulse</option>
                <option value="nova">23 Supernova</option>
                <option value="storm">26 Lightning Storm</option>
                <option value="warp">29 Warp Speed</option>
                <option value="atomic">30 Atomic Orbit</option>
            </select>
            <div class="control-group" style="margin-top:10px;">
                <label>FX INTENSITY <span class="val-label" id="vGlowI">1.5</span></label>
                <input type="range" id="glowI" min="0" max="5" step="0.1" value="1.5">
            </div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">3. Atmospheric Controls</span>
            <div class="control-group"><label>BOLT <span class="val-label" id="vBolt">1.0</span></label><input type="range" id="boltI" min="0" max="3" step="0.1" value="1.0"></div>
            <div class="control-group"><label>SMOKE <span class="val-label" id="vSmoke">1.0</span></label><input type="range" id="smokeI" min="0" max="3" step="0.1" value="1.0"></div>
            <div class="control-group"><label>WAVE <span class="val-label" id="vWave">1.0</span></label><input type="range" id="waveI" min="0" max="3" step="0.1" value="1.0"></div>
        </div>
    </div>

    <div class="viz-area" id="p5-container"></div>

    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">4. Master Rig</span>
            <button class="btn" id="btnBg" style="border-color:#00ffcc;" onclick="document.getElementById('bgIn').click()">LOAD BG PNG</button>
            <input type="file" id="bgIn" style="display:none" onchange="handleBG(this.files)">
            <div class="control-group" style="margin-top:8px;">
                <label>BG SCALE <span class="val-label" id="vBgScale">1.0</span></label><input type="range" id="bgScale" min="0.1" max="5.0" step="0.05" value="1.0">
            </div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">5. Master Motion (Unified)</span>
            <select id="masterMotion" style="width:100%; border-color:var(--accent2);">
                <option value="noise" selected>Noise Float (Perlin)</option>
                <option value="petal">Petal Fall (Falling)</option>
                <option value="bounce">Bounce Jump (Rhythmic)</option>
                <option value="wave">Wave Drift (Oscillation)</option>
                <option value="elastic">Elastic Jitter (Vibration)</option>
            </select>
        </div>

        <div class="ctrl-box">
            <span class="label-small">6. Image Assets (1, 2, 3)</span>
            <div class="inst-row">
                <div class="inst-header"><span>IMG 1</span><button class="btn" id="btnI0" onclick="openL('i0')">LOAD</button></div>
                <input type="range" id="sc0" min="0.1" max="3.0" step="0.1" value="1.0">
            </div>
            <div class="inst-row">
                <div class="inst-header"><span>IMG 2</span><button class="btn" id="btnI1" onclick="openL('i1')">LOAD</button></div>
                <input type="range" id="sc1" min="0.1" max="3.0" step="0.1" value="1.0">
            </div>
            <div class="inst-row">
                <div class="inst-header"><span>IMG 3</span><button class="btn" id="btnI2" onclick="openL('i2')">LOAD</button></div>
                <input type="range" id="sc2" min="0.1" max="3.0" step="0.1" value="1.0">
            </div>
            <input type="file" id="i0" style="display:none" onchange="loadAsset(0, this.files)"><input type="file" id="i1" style="display:none" onchange="loadAsset(1, this.files)"><input type="file" id="i2" style="display:none" onchange="loadAsset(2, this.files)">
        </div>

        <div class="ctrl-box">
            <button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START & SAVE MP4</button>
        </div>
    </div>
</div>
<div class="playbar"><div id="progFill"></div></div>

<script>
    let audio, fft, ampObj, canvasRef, mainCanvas, bgImg = null, instAssets = new Array(3).fill(null);
    let isPlaying = false, isRecording = false, isAnalyzed = false, mediaRecorder, recordedChunks = [];
    let particles = [], overlayT = 0;

    function setup() {
        let cnv = createCanvas(1920, 1080, WEBGL);
        cnv.parent('p5-container');
        canvasRef = cnv.elt;
        mainCanvas = createGraphics(1920, 1080);
        mainCanvas.imageMode(CENTER);
        fft = new p5.FFT(0.8, 512);
        ampObj = new p5.Amplitude();
        initParticles();
    }

    function initParticles() {
        particles = [];
        for(let i=0; i<36; i++) particles.push(new MasterParticle(i % 3));
    }

    function draw() {
        background(0);
        mainCanvas.background(2, 2, 8, 45);
        overlayT += 0.015;
        
        let bands = new Array(24).fill(0), vol = 0;
        let d = new Uint8Array(512);
        if (audio && audio.isPlaying()) {
            fft.analyze(); vol = ampObj.getLevel();
            fft.getByteFrequencyData(d);
            for(let i=0; i<24; i++) bands[i] = fft.getEnergy(pow(2, i/2.5)*20, pow(2, (i+1)/2.5)*20);
        }

        // 1. BACKDROP FX ( drawingContext 전달로 createRadialGradient 에러 수정)
        drawBackdropFX(mainCanvas.drawingContext, 1920, 1080, overlayT, d);

        // 2. BG Image
        if (bgImg) {
            mainCanvas.push();
            let bSc = parseFloat(document.getElementById('bgScale').value);
            mainCanvas.translate(1920/2, 1080/2);
            mainCanvas.image(bgImg, 0, 0, 1920*bSc, 1080*bSc);
            mainCanvas.pop();
        }

        // 3. MASTER IMAGE MOTION
        const masterM = document.getElementById('masterMotion').value;
        for(let p of particles) {
            if (instAssets[p.group]) {
                p.update(bands[p.group*7]||0, masterM);
                p.display(bands[p.group*7]||0, instAssets[p.group]);
            }
        }

        // 4. Output to WEBGL
        push(); translate(-width/2, -height/2); image(mainCanvas, 0, 0); pop();
        updateUI();
    }

    // --- EFFECT HUB (30 Visualizers Logic) ---
    function drawBackdropFX(ctx, W, H, t, freq) {
        let fx = document.getElementById('backdropFX').value;
        let inten = parseFloat(document.getElementById('glowI').value);
        ctx.globalAlpha = inten / 5;
        
        if (fx === 'nebula') drawNebula(ctx, W, H, t, freq);
        else if (fx === 'dna') drawDNA(ctx, W, H, t, freq);
        else if (fx === 'mandala') drawMandala(ctx, W, H, t, freq);
        else if (fx === 'web') drawWeb(ctx, W, H, t, freq);
        else if (fx === 'vortex') drawVortex(ctx, W, H, t, freq);
        else if (fx === 'fire') drawFire(ctx, W, H, t, freq);
        else if (fx === 'matrix') drawMatrix(ctx, W, H, t, freq);
        else if (fx === 'storm') drawStorm(ctx, W, H, t, freq);
        else if (fx === 'warp') drawWarp(ctx, W, H, t, freq);
        else if (fx === 'atomic') drawAtomic(ctx, W, H, t, freq);
        
        ctx.globalAlpha = 1.0;
    }

    class MasterParticle {
        constructor(group) {
            this.group = group; this.origin = createVector(random(1920), random(1080));
            this.pos = this.origin.copy(); this.noiseOff = random(1000); this.vel = createVector(0,0);
        }
        update(amp, m) {
            let namp = amp/255;
            if(m === 'petal') {
                this.pos.y += (1 + namp*8); this.pos.x += sin(frameCount*0.03 + this.noiseOff)*2;
                if(this.pos.y > 1080) this.pos.y = -100;
            } else if(m === 'noise') {
                this.pos.x = this.origin.x + (noise(this.noiseOff)-0.5)*namp*800;
                this.pos.y = this.origin.y + (noise(this.noiseOff+50)-0.5)*namp*800;
            } else if(m === 'bounce') {
                this.pos.y = this.origin.y - abs(sin(frameCount*0.1 + this.noiseOff)*150)*namp;
            } else if(m === 'wave') {
                this.pos.x = this.origin.x + sin(frameCount*0.05 + this.noiseOff)*100*namp;
                this.pos.y = this.origin.y + cos(frameCount*0.02 + this.noiseOff)*50*namp;
            } else if(m === 'elastic') {
                this.pos.x = this.origin.x + random(-namp*40, namp*40);
                this.pos.y = this.origin.y + random(-namp*40, namp*40);
            }
            this.noiseOff += 0.01;
        }
        display(amp, img) {
            let namp = amp/255;
            const sc = parseFloat(document.getElementById('sc'+this.group).value);
            mainCanvas.push(); mainCanvas.translate(this.pos.x, this.pos.y);
            let sz = 380 * sc * (0.6 + namp*2.4);
            mainCanvas.image(img, 0, 0, img.width*(sz/1000), img.height*(sz/1000));
            mainCanvas.pop();
        }
    }

    // --- 30종 드로우 함수 일부 이식 (ctx 기반) ---
    function drawNebula(ctx, W, H, t, freq) {
        let bass = freq[0]/255;
        const grd = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, H*0.5*(1+bass));
        grd.addColorStop(0, 'rgba(100,80,255,0.4)'); grd.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);
    }
    function drawDNA(ctx, W, H, t, freq) {
        for(let s=0; s<2; s++){ let po=(s/2)*Math.PI;
            for(let i=0; i<48; i++){ let a=(i/48)*Math.PI*2+t+po; let amp=(freq[i%64]||0)/255;
                let r=H*0.3*(0.5+amp*0.7); let x=W/2+Math.cos(a)*r, y=H/2+Math.sin(a)*r*0.4;
                ctx.beginPath(); ctx.arc(x, y, 2+amp*10, 0, Math.PI*2); ctx.fillStyle=`hsla(${220+s*40},80%,70%,0.8)`; ctx.fill();
            }
        }
    }
    function drawMatrix(ctx, W, H, t, freq) {
        ctx.fillStyle = 'rgba(0,10,0,0.1)'; ctx.fillRect(0,0,W,H);
        ctx.font = '16px monospace'; ctx.fillStyle = '#0f8';
        for(let i=0; i<30; i++) ctx.fillText(String.fromCharCode(0x30A0+Math.floor(Math.random()*96)), Math.random()*W, (t*500 + i*100)%H);
    }
    function drawFire(ctx, W, H, t, freq) {
        let bass = freq[0]/255;
        const grd = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 100+bass*300);
        grd.addColorStop(0, 'rgba(255,100,0,0.6)'); grd.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);
    }
    function drawStorm(ctx, W, H, t, freq) {
        if(Math.random()>0.95) { ctx.fillStyle='white'; ctx.fillRect(0,0,W,H); }
    }
    function drawWarp(ctx, W, H, t, freq) {
        ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth=2;
        for(let i=0; i<20; i++){ ctx.beginPath(); ctx.moveTo(W/2, H/2); ctx.lineTo(Math.random()*W, Math.random()*H); ctx.stroke(); }
    }

    // 시스템 핸들러
    function openL(id) { document.getElementById(id).click(); }
    function handleFile(files) { audio = loadSound(URL.createObjectURL(files[0]), () => { document.getElementById('analyzeBtn').disabled = false; }); }
    function handleBG(files) { loadImage(URL.createObjectURL(files[0]), (img) => { bgImg = img; setBtnThumb('btnBg', files[0]); }); }
    function loadAsset(id, files) { loadImage(URL.createObjectURL(files[0]), (img) => { instAssets[id] = img; }); setBtnThumb('btnI'+id, files[0]); }
    function setBtnThumb(btnId, file) {
        let r = new FileReader(); r.onload = e => { let b = document.getElementById(btnId); b.style.backgroundImage = `url(${e.target.result})`; b.innerText = ""; }; r.readAsDataURL(file);
    }
    function runAnalysis() { isAnalyzed = true; document.getElementById('recBtn').disabled = false; }
    function updateUI() { if(audio && audio.isPlaying()){ document.getElementById('progFill').style.width = (audio.currentTime()/audio.duration()*100)+'%'; } }

    async function toggleSync() {
        if (isPlaying) { audio.stop(); if (mediaRecorder) mediaRecorder.stop(); isPlaying = false; document.getElementById('recBtn').innerText = "▶ START RECORD"; }
        else {
            if (getAudioContext().state === 'suspended') await userStartAudio();
            recordedChunks = []; const stream = canvasRef.captureStream(24);
            const dest = getAudioContext().createMediaStreamDestination(); p5.soundOut.output.connect(dest);
            const combined = new MediaStream([...stream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
            mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/webm; codecs=vp9,opus', videoBitsPerSecond: 60000000 });
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => { 
                const n = new Date();
                const ts = `${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}${String(n.getHours()).padStart(2,'0')}${String(n.getMinutes()).padStart(2,'0')}${String(n.getSeconds()).padStart(2,'0')}`;
                let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/mp4' })); a.download = `${ts}.mp4`; a.click(); 
            };
            audio.play(); mediaRecorder.start(); isPlaying = true; document.getElementById('recBtn').innerText = "■ STOP & SAVE";
        }
    }

    const sL = ['boltI','smokeI','waveI','glowI','bgScale','sc0','sc1','sc2'];
    sL.forEach(id => {
        let el = document.getElementById(id);
        if(el) el.oninput = function() { document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1)).innerText = this.value; };
    });
</script>
</body>
</html>
