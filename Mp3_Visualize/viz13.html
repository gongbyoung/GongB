<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPECTRUM NATURAL v18.0.003 — Performance Fix</title>
    <link rel="icon" href="data:,">
    <script src="p5.min.js"></script>
    <script src="p5.sound.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{ --bg:#020205; --panel:#0d0d1a; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; }
        body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
        .topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;}
        .main-workspace { display: grid; grid-template-columns: 320px 1fr 320px; flex:1; min-height:0; }
        .side-panel { background:var(--panel); padding:15px; overflow-y:auto; scrollbar-width: thin; border-left:1px solid var(--border); border-right:1px solid var(--border); }
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
        .label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}
        .control-group { margin-bottom:10px; }
        .control-group label { display:block; font-size:8px; color:#888; margin-bottom:2px; }
        .val-label { float:right; color:var(--accent); font-weight:bold; font-size:9px; }
        input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; }
        select { width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:5px; border-radius:4px; font-size:10px; outline:none; margin-bottom:4px;}
        .btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:6px; cursor:pointer; font-size:9px; width:100%; transition:0.2s; background-position: center; background-size: cover; height: 32px; display: flex; align-items: center; justify-content: center; }
        .btn:hover { border-color: var(--accent); }
        .btn.primary { background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:bold; font-size:11px; padding:12px; margin-top:10px; height: auto;}
        .viz-area { position:relative; display:flex; justify-content:center; align-items:center; background:#000; overflow:hidden; }
        #p5-container canvas { width: 100% !important; height: auto !important; max-height: 100% !important; object-fit: contain; }
        .inst-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; border-bottom: 1px dashed rgba(255,255,255,0.05); padding-bottom: 8px;}
        .inst-header { display: grid; grid-template-columns: 45px 1fr 1fr; gap: 5px; align-items: center; }
        .inst-header span { font-size: 8px; color: var(--accent2); font-weight: bold; }
        .playbar { height:2px; background:#111; position:relative; }
        #progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">SPECTRUM NATURAL v18.0.003</div>
    <div id="timeCode">00:00 / 00:00</div>
</div>

<div class="main-workspace">
    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">1. Audio Analysis</span>
            <button class="btn" onclick="document.getElementById('mIn').click()">SELECT MP3 FILE</button>
            <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
            <button class="btn" id="analyzeBtn" onclick="runAnalysis()" disabled style="border-color:#ffcc00; color:#ffcc00; margin-top:5px; height:auto; padding:8px;">PRE-ANALYZE & START</button>
        </div>

        <div class="ctrl-box">
            <span class="label-small">2. Natural Elements</span>
            <div class="control-group"><label>LIGHTNING STRENGTH <span class="val-label" id="vBolt">1.0</span></label><input type="range" id="boltI" min="0" max="3" step="0.1" value="1.0"></div>
            <div class="control-group"><label>SMOKE DENSITY <span class="val-label" id="vSmoke">1.0</span></label><input type="range" id="smokeI" min="0" max="3" step="0.1" value="1.0"></div>
            <div class="control-group"><label>WAVE AMPLITUDE <span class="val-label" id="vWave">1.0</span></label><input type="range" id="waveI" min="0" max="3" step="0.1" value="1.0"></div>
        </div>
        
        <div class="ctrl-box">
            <span class="label-small">3. Global Style Intensity</span>
            <select id="colorTheme"><option value="cyberpunk">Cyberpunk</option><option value="pastel">Pastel</option></select>
            <div class="control-group" style="margin-top:10px;">
                <label>GLOW BLOOM INTEN. <span class="val-label" id="vGlowI">1.5</span></label>
                <input type="range" id="glowI" min="0" max="5" step="0.1" value="1.5">
            </div>
        </div>
    </div>

    <div class="viz-area" id="p5-container"></div>

    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">4. Background Rig</span>
            <button class="btn" id="btnBg" style="border-color:#00ffcc;" onclick="document.getElementById('bgIn').click()">LOAD BG PNG</button>
            <input type="file" id="bgIn" style="display:none" onchange="handleBG(this.files)">
            <div class="control-group" style="margin-top:8px;">
                <label>BG SCALE <span class="val-label" id="vBgScale">1.0</span></label>
                <input type="range" id="bgScale" min="0.5" max="3.0" step="0.05" value="1.0">
            </div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">5. Instrument Scatters</span>
            <div class="inst-row">
                <div class="inst-header"><span>KICK</span><button class="btn" id="btnI0" onclick="openL('i0')">LOAD</button><select id="m0"><option value="petal">Petal Fall</option><option value="noise">Noise Fly</option><option value="sunray">Sunray Glow</option><option value="scatter">Scatter Build</option><option value="invert">Freq Invert</option></select></div>
                <div class="control-group"><input type="range" id="sc0" min="0.1" max="3.0" step="0.1" value="1.0"><input type="range" id="str0" min="0" max="3.0" step="0.1" value="1.0"></div>
            </div>
            <div class="inst-row">
                <div class="inst-header"><span>SNARE</span><button class="btn" id="btnI1" onclick="openL('i1')">LOAD</button><select id="m1"><option value="noise">Noise Fly</option><option value="petal">Petal Fall</option><option value="ripple">Ripple Wave</option></select></div>
                <div class="control-group"><input type="range" id="sc1" min="0.1" max="3.0" step="0.1" value="1.0"><input type="range" id="str1" min="0" max="3.0" step="0.1" value="1.0"></div>
            </div>
            <div class="inst-row">
                <div class="inst-header"><span>HIHAT</span><button class="btn" id="btnI2" onclick="openL('i2')">LOAD</button><select id="m2"><option value="sunray">Sunray Glow</option><option value="scatter">Scatter Build</option><option value="noise">Noise Fly</option></select></div>
                <div class="control-group"><input type="range" id="sc2" min="0.1" max="3.0" step="0.1" value="1.0"><input type="range" id="str2" min="0" max="3.0" step="0.1" value="1.0"></div>
            </div>
            <input type="file" id="i0" style="display:none" onchange="loadAsset(0, this.files)"><input type="file" id="i1" style="display:none" onchange="loadAsset(1, this.files)"><input type="file" id="i2" style="display:none" onchange="loadAsset(2, this.files)">
        </div>

        <div class="ctrl-box">
            <span class="label-small">6. Recording Session</span>
            <button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START & SAVE MP4</button>
        </div>
    </div>
</div>
<div class="playbar"><div id="progFill"></div></div>

<script>
    let audio, fft, ampObj, canvasRef, mainCanvas, bgImg = null, instAssets = new Array(3).fill(null);
    let isPlaying = false, isRecording = false, isAnalyzed = false, mediaRecorder, recordedChunks = [];
    let particles = [];

    function setup() {
        // RTX 5070 Ti 파워를 고려한 고해상도 캔버스 설정
        let cnv = createCanvas(1920, 1080, WEBGL);
        cnv.parent('p5-container');
        canvasRef = cnv.elt;
        
        // willReadFrequently 최적화를 위해 mainCanvas 속성 조정
        mainCanvas = createGraphics(1920, 1080);
        mainCanvas.colorMode(RGB, 255);
        mainCanvas.imageMode(CENTER);
        
        fft = new p5.FFT(0.8, 256);
        ampObj = new p5.Amplitude();
        initParticles();
    }

    function initParticles() {
        particles = [];
        for(let i=0; i<30; i++) particles.push(new MasterParticle(i % 3));
    }

    function draw() {
        background(0);
        mainCanvas.background(2, 2, 8, 50); // 트레일 효과 병목 완화
        
        let bands = new Array(24).fill(0), vol = 0;
        if (audio && audio.isPlaying()) {
            fft.analyze(); vol = ampObj.getLevel();
            for(let i=0; i<24; i++) bands[i] = fft.getEnergy(pow(2, i/2)*20, pow(2, (i+1)/2)*20) / 255;
        }

        if (bgImg) {
            mainCanvas.push(); mainCanvas.translate(width/2, height/2);
            let bSc = parseFloat(document.getElementById('bgScale').value);
            mainCanvas.image(bgImg, 0, 0, width*bSc*(1+bands[2]*0.02), height*bSc*(1+bands[2]*0.02));
            mainCanvas.pop();
        }

        // [핵심] 이미지가 로드된 슬롯만 연산 및 출력
        for(let p of particles) {
            if (instAssets[p.group]) { // 이미지가 로드된 상태인지 체크
                p.update(bands[p.group*4]||0);
                p.display(bands[p.group*4]||0, instAssets[p.group]);
            }
        }

        // WEBGL 화면 출력
        push(); translate(-width/2, -height/2); image(mainCanvas, 0, 0); pop();
        updateUI();
    }

    class MasterParticle {
        constructor(group) {
            this.group = group; this.origin = createVector(random(width), random(height));
            this.pos = this.origin.copy(); this.noiseOff = random(1000);
        }
        update(amp) {
            const m = document.getElementById('m'+this.group).value;
            const str = parseFloat(document.getElementById('str'+this.group).value);
            if(m === 'petal') {
                this.pos.y += (2 + amp*8) * str; this.pos.x += sin(frameCount*0.05 + this.noiseOff)*2;
                if(this.pos.y > height) this.pos.y = -50;
            } else if(m === 'noise') {
                this.pos.x += (noise(this.noiseOff)-0.5)*amp*str*50;
                this.pos.y += (noise(this.noiseOff+50)-0.5)*amp*str*50;
            } else if(m === 'scatter') {
                let target = (amp > 0.7) ? this.origin : createVector(this.origin.x+random(-150,150), this.origin.y+random(-150,150));
                this.pos.lerp(target, 0.1);
            }
            this.noiseOff += 0.01;
        }
        display(amp, img) {
            const sc = parseFloat(document.getElementById('sc'+this.group).value);
            const m = document.getElementById('m'+this.group).value;
            mainCanvas.push();
            mainCanvas.translate(this.pos.x, this.pos.y);
            // Invert 필터는 무거우므로 조건부 실행
            if(m === 'invert' && amp > 0.8) mainCanvas.filter(INVERT);
            let sz = 280 * sc * (0.8 + amp*2);
            mainCanvas.image(img, 0, 0, img.width*(sz/900), img.height*(sz/900));
            mainCanvas.pop();
        }
    }

    // 시스템 핸들러
    function openL(id) { document.getElementById(id).click(); }
    function handleFile(files) { audio = loadSound(URL.createObjectURL(files[0]), () => { document.getElementById('analyzeBtn').disabled = false; }); }
    function handleBG(files) { loadImage(URL.createObjectURL(files[0]), (img) => { bgImg = img; setBtnThumb('btnBg', files[0]); }); }
    function loadAsset(id, files) { loadImage(URL.createObjectURL(files[0]), (img) => { instAssets[id] = img; setBtnThumb('btnI'+id, files[0]); }); }
    
    function setBtnThumb(btnId, file) {
        let reader = new FileReader();
        reader.onload = e => { document.getElementById(btnId).style.backgroundImage = `url(${e.target.result})`; document.getElementById(btnId).innerText = ""; }
        reader.readAsDataURL(file);
    }
    
    function runAnalysis() { isAnalyzed = true; document.getElementById('recBtn').disabled = false; }
    function updateUI() { if(audio && audio.isPlaying()){ document.getElementById('progFill').style.width = (audio.currentTime()/audio.duration()*100)+'%'; } }

    async function toggleSync() {
        if (isPlaying) { audio.stop(); if (mediaRecorder) mediaRecorder.stop(); isPlaying = false; document.getElementById('recBtn').innerText = "▶ START RECORD"; }
        else {
            if (getAudioContext().state === 'suspended') await userStartAudio();
            recordedChunks = []; const stream = canvasRef.captureStream(24);
            const combined = new MediaStream([...stream.getVideoTracks(), ...p5.soundOut.output.connect(getAudioContext().createMediaStreamDestination()).stream.getAudioTracks()]);
            // RTX 성능을 고려한 고화질 비트레이트 설정
            mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/webm; codecs=vp9,opus', videoBitsPerSecond: 40000000 });
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => { 
                const n = new Date();
                const ts = `${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}${String(n.getHours()).padStart(2,'0')}${String(n.getMinutes()).padStart(2,'0')}${String(n.getSeconds()).padStart(2,'0')}`;
                let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/mp4' })); a.download = `${ts}.mp4`; a.click(); 
            };
            audio.play(); mediaRecorder.start(); isPlaying = true; document.getElementById('recBtn').innerText = "■ STOP & SAVE";
        }
    }

    const sL = ['boltI','smokeI','waveI','glowI','bgScale','sc0','str0','sc1','str1','sc2','str2'];
    sL.forEach(id => {
        let el = document.getElementById(id);
        if(el) el.oninput = function() { 
            let lab = document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1));
            if(lab) lab.innerText = this.value;
        };
    });
</script>
</body>
</html>
