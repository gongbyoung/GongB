<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPECTRUM GENERATIVE v20.0.009 — Master</title>
    <link rel="icon" href="data:,">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{ --bg:#020205; --panel:#0d0d1a; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; }
        body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
        .topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;}
        .main-workspace { display: grid; grid-template-columns: 340px 1fr 340px; flex:1; min-height:0; }
        .side-panel { background:var(--panel); padding:15px; overflow-y:auto; scrollbar-width: thin; border-left:1px solid var(--border); border-right:1px solid var(--border); }
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
        .label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}
        .control-group { margin-bottom:10px; }
        .control-group label { display:block; font-size:8px; color:#888; margin-bottom:2px; }
        .val-label { float:right; color:var(--accent); font-weight:bold; font-size:9px; }
        input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; }
        select { width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:5px; border-radius:4px; font-size:10px; outline:none; margin-bottom:4px;}
        .btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:6px; cursor:pointer; font-size:9px; width:100%; transition:0.2s; background-position: center; background-size: cover; height: 32px; display: flex; align-items: center; justify-content: center; text-shadow: 0px 0px 3px #000; }
        .btn:hover { border-color: var(--accent); }
        .btn.primary { background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:bold; font-size:11px; padding:12px; margin-top:10px; height: auto;}
        .viz-area { position:relative; display:flex; justify-content:center; align-items:center; background:#000; overflow:hidden; }
        #p5-container canvas { width: 100% !important; height: auto !important; max-height: 100% !important; object-fit: contain; }
        .inst-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; border-bottom: 1px dashed rgba(255,255,255,0.05); padding-bottom: 8px;}
        .playbar { height:2px; background:#111; position:relative; }
        #progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">SPECTRUM GENERATIVE v20.0.009</div>
    <div id="timeCode">00:00 / 00:00</div>
</div>

<div class="main-workspace">
    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">1. Audio Engine</span>
            <button class="btn" onclick="document.getElementById('mIn').click()">SELECT MP3 FILE</button>
            <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
            <button class="btn" id="analyzeBtn" onclick="runAnalysis()" disabled style="border-color:#ffcc00; color:#ffcc00; margin-top:5px; height:auto;">PRE-ANALYZE & START</button>
        </div>

        <div class="ctrl-box">
            <span class="label-small">2. Background FX Library (12+)</span>
            <select id="backdropFX">
                <option value="lightning">5-1. L-System Lightning (번개)</option>
                <option value="notes">5-2. Musical Notes (음표)</option>
                <option value="waves">5-3. Layered Waves (파도)</option>
                <option value="ripples">5-4. 12-Grid Ripples (리플)</option>
                <option value="chladni">5-6. Chladni Patterns (칼라드니)</option>
                <option value="magnetic">5-10. Magnetic Field (자기장)</option>
                <option value="voronoi">5-13. Curve Voronoi (보로노이)</option>
                <option value="snowflake">5-16. Snowflake (눈 결정)</option>
            </select>
            <div class="control-group">
                <label>FX SCALE <span class="val-label" id="vFxScale">1.0</span></label><input type="range" id="fxScale" min="0.1" max="4.0" step="0.1" value="1.0">
                <label>FX POS X <span class="val-label" id="vFxX">0</span></label><input type="range" id="fxX" min="-1000" max="1000" value="0">
                <label>FX POS Y <span class="val-label" id="vFxY">0</span></label><input type="range" id="fxY" min="-1000" max="1000" value="0">
            </div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">3. BG Art Style (Filter)</span>
            <select id="bgArtStyle">
                <option value="none">None</option>
                <option value="neon">Neon Glow</option>
                <option value="sketch">Sketch Mode</option>
                <option value="impressionist">Impressionist</option>
            </select>
            <div class="control-group"><label>BG STYLE POWER <span class="val-label" id="vBgArtI">1.5</span></label><input type="range" id="bgArtI" min="0" max="5" step="0.1" value="1.5"></div>
        </div>
    </div>

    <div class="viz-area" id="p5-container"></div>

    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">4. Master Backdrop Color</span>
            <select id="bgColor">
                <option value="black">Black</option>
                <option value="gray">Gray</option>
                <option value="white">White</option>
            </select>
        </div>

        <div class="ctrl-box">
            <span class="label-small">5. IMG Art Style & Motion</span>
            <select id="imgArtStyle">
                <option value="none">None</option>
                <option value="neon">Neon Glow</option>
                <option value="rgb">RGB Random</option>
            </select>
            <div class="control-group" style="margin-top:8px;">
                <label>MOTION POWER <span class="val-label" id="vReactF">2.5</span></label><input type="range" id="reactF" min="0.1" max="10" step="0.1" value="2.5">
                <label>SMOKE TRAIL (ALPHA) <span class="val-label" id="vPtSmoke">45</span></label><input type="range" id="ptSmoke" min="1" max="255" value="45">
            </div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">6. Image Individual Set (1, 2, 3)</span>
            <div class="inst-row">
                <div style="display:flex; justify-content:space-between; align-items:center;"><span>IMG 1</span><button class="btn" id="btnI0" style="width:40px;" onclick="openL('i0')">LOAD</button></div>
                <select id="m0">
                    <option value="noiseRot">M1. Noise Rotate</option>
                    <option value="xRise">M2. X-Rise Wrap</option>
                    <option value="yRise">M3. Y-Rise Wrap</option>
                    <option value="pulse">M4. Wave Pulse</option>
                    <option value="petal">M5. Petal Sway</option>
                    <option value="lToR">M6. L-R Vibr</option>
                    <option value="rToL">M7. R-L Vibr</option>
                    <option value="zoomOut">M8. Center Out</option>
                    <option value="zoomIn">M9. Edge In</option>
                </select>
                <input type="range" id="sc0" min="0.1" max="3" step="0.1" value="1">
            </div>
            <div class="inst-row">
                <div style="display:flex; justify-content:space-between;"><span>IMG 2</span><button class="btn" id="btnI1" style="width:40px;" onclick="openL('i1')">LOAD</button></div>
                <select id="m1"><option value="petal">M5. Petal Sway</option><option value="zoomOut">M8. Center Out</option><option value="noiseRot">M1. Noise Rotate</option></select>
                <input type="range" id="sc1" min="0.1" max="3" step="0.1" value="1">
            </div>
            <div class="inst-row">
                <div style="display:flex; justify-content:space-between;"><span>IMG 3</span><button class="btn" id="btnI2" style="width:40px;" onclick="openL('i2')">LOAD</button></div>
                <select id="m2"><option value="pulse">M4. Wave Pulse</option><option value="yRise">M3. Y-Rise Wrap</option><option value="noiseRot">M1. Noise Rotate</option></select>
                <input type="range" id="sc2" min="0.1" max="3" step="0.1" value="1">
            </div>
            <input type="file" id="i0" style="display:none" onchange="loadAsset(0, this.files)"><input type="file" id="i1" style="display:none" onchange="loadAsset(1, this.files)"><input type="file" id="i2" style="display:none" onchange="loadAsset(2, this.files)">
        </div>

        <div class="ctrl-box"><button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START & SAVE MP4</button></div>
    </div>
</div>
<div class="playbar"><div id="progFill"></div></div>

<script>
    let audio, fft, ampObj, canvasRef, mainCanvas, bgCanvas, instAssets = new Array(3).fill(null);
    let isPlaying = false, mediaRecorder, recordedChunks = [];
    let particles = [], overlayT = 0;

    function setup() {
        let cnv = createCanvas(1920, 1080, WEBGL);
        cnv.parent('p5-container'); canvasRef = cnv.elt;
        
        mainCanvas = createGraphics(1920, 1080); // Foreground
        bgCanvas = createGraphics(1920, 1080);   // Backdrop
        mainCanvas.imageMode(CENTER); bgCanvas.imageMode(CENTER);
        
        fft = new p5.FFT(0.8, 512); ampObj = new p5.Amplitude();
        initParticles();
    }

    function initParticles() {
        particles = []; for(let i=0; i<60; i++) particles.push(new MasterParticle(i % 3));
    }

    function draw() {
        // --- BASE LAYER COLOR ---
        let bgC = document.getElementById('bgColor').value;
        let c = (bgC==='black'? [2,2,8] : bgC==='gray'? [50,50,50] : [240,240,240]);
        background(c[0], c[1], c[2]);
        
        // --- SMOKE TRAIL & TRANSPARENCY FIX ---
        let trail = parseInt(document.getElementById('ptSmoke').value);
        bgCanvas.clear(); // 배경 효과는 매 프레임 초기화
        
        // 이미지 레이어 투명 잔상 처리
        mainCanvas.drawingContext.globalCompositeOperation = 'destination-out';
        mainCanvas.background(255, trail);
        mainCanvas.drawingContext.globalCompositeOperation = 'source-over';
        
        overlayT += 0.015;
        let spectrum = new Uint8Array(512), bands = new Array(24).fill(0), vol = 0;
        
        if (audio && audio.isPlaying()) {
            spectrum = fft.analyze(); vol = ampObj.getLevel();
            for(let i=0; i<24; i++) bands[i] = fft.getEnergy(pow(2, i/2.5)*20, pow(2, (i+1)/2.5)*20);
        }

        // --- LAYER 1: Background Generative FX ---
        bgCanvas.push();
        let fSc = parseFloat(document.getElementById('fxScale').value);
        let fX = parseFloat(document.getElementById('fxX').value);
        let fY = parseFloat(document.getElementById('fxY').value);
        bgCanvas.translate(960 + fX, 540 + fY); bgCanvas.scale(fSc);
        drawBackdropLib(bgCanvas, 1920, 1080, overlayT, spectrum, bands);
        applyFilter(bgCanvas, vol, 'bgArtStyle', 'bgArtI');
        bgCanvas.pop();

        // --- LAYER 2: Image Engine ---
        const mPower = parseFloat(document.getElementById('reactF').value);
        for(let p of particles) {
            if (instAssets[p.group]) {
                p.update(bands[p.group*7]||0, mPower);
                p.display(mainCanvas, bands[p.group*7]||0, instAssets[p.group]);
            }
        }
        applyFilter(mainCanvas, vol, 'imgArtStyle', 'reactF');

        // --- COMPOSITE ALL ---
        push(); translate(-width/2, -height/2);
        image(bgCanvas, 0, 0); 
        image(mainCanvas, 0, 0); 
        pop();
        
        updateUI();
    }

    function drawBackdropLib(pg, W, H, t, freq, bands) {
        let fx = document.getElementById('backdropFX').value;
        pg.strokeWeight(3);
        if (fx === 'lightning') { pg.stroke(255); drawBranch(pg, 0, 200, -PI/2, bands[20]/1.3, 5); }
        else if (fx === 'notes') { pg.fill(0,255,204); for(let i=0;i<24;i++){ pg.rect(-960+i*80, 200-bands[i]*3, 30, bands[i]*3); } }
        else if (fx === 'waves') { pg.noFill(); pg.stroke(0,255,255,180); pg.beginShape(); for(let i=-960;i<960;i+=30){ pg.vertex(i, sin(i*0.01+t*4)*bands[floor(map(i,-960,960,0,10))]); } pg.endShape(); }
        else if (fx === 'chladni') { pg.stroke(255,255,0); for(let i=0;i<300;i++){ pg.point(random(-500,500), random(-500,500)); } }
        else if (fx === 'magnetic') { pg.stroke(200,255,255,150); for(let i=-960;i<960;i+=80){ for(let j=-540;j<540;j+=80){ pg.line(i,j,i+cos(noise(i*0.01,j*0.01,t)*TWO_PI)*bands[2]/4,j+sin(noise(i*0.01,j*0.01,t)*TWO_PI)*bands[2]/4); }} }
        else if (fx === 'ripples') { pg.noFill(); pg.stroke(255,150); for(let i=0;i<12;i++) pg.circle(-800+(i%4)*400, -400+floor(i/4)*300, bands[i]*2); }
        else if (fx === 'snowflake') { pg.stroke(255); for(let i=0;i<6;i++){ pg.push(); pg.rotate(i*PI/3); pg.line(0,0,150+bands[2],0); pg.pop(); } }
    }

    function drawBranch(pg, x, y, ang, len, gen) {
        if(gen <= 0 || len < 5) return;
        let nx = x + cos(ang)*len; let ny = y + sin(ang)*len;
        pg.line(x, y, nx, ny);
        drawBranch(pg, nx, ny, ang + 0.45 + random(-0.2,0.2), len*0.75, gen-1);
    }

    function applyFilter(pg, vol, styleId, intenId) {
        let style = document.getElementById(styleId).value;
        let inten = parseFloat(document.getElementById(intenId).value);
        if(style === 'none') return;
        if(style === 'neon') { pg.drawingContext.shadowBlur = 25 * inten * vol; pg.drawingContext.shadowColor = 'cyan'; }
        else if(style === 'sketch') { pg.filter(GRAY); pg.filter(THRESHOLD, 0.45); }
    }

    class MasterParticle {
        constructor(group) {
            this.group = group; this.origin = createVector(random(1920), random(1080));
            this.pos = this.origin.copy(); this.noiseOff = random(1000); this.angle = random(TWO_PI);
        }
        update(amp, force) {
            let namp = amp/255; let psh = namp * force * 50;
            let m = document.getElementById('m'+this.group).value;
            if(m==='noiseRot'){ this.angle += 0.02 + namp*0.1; this.pos.x = this.origin.x + cos(this.angle)*(180+psh); this.pos.y = this.origin.y + sin(this.angle)*(180+psh); }
            else if(m==='xRise'){ this.pos.x += (3 + namp*30)*force; if(this.pos.x>1920){ this.pos.x=0; this.pos.y=random(1080); } }
            else if(m==='yRise'){ this.pos.y -= (3 + namp*30)*force; if(this.pos.y<0){ this.pos.y=1080; this.pos.x=random(1920); } }
            else if(m==='pulse'){ this.pos = this.origin.copy(); }
            else if(m==='petal'){ this.pos.y += (2 + namp*15); this.pos.x += sin(frameCount*0.05+this.noiseOff)*6; if(this.pos.y>1080) this.pos.y=-100; }
            else if(m==='lToR'){ this.pos.x += 6*force; this.pos.y = this.origin.y + sin(this.pos.x*0.015)*psh*4; if(this.pos.x>1920) this.pos.x=0; }
            else if(m==='rToL'){ this.pos.x -= 6*force; this.pos.y = this.origin.y + sin(this.pos.x*0.015)*psh*4; if(this.pos.x<0) this.pos.x=1920; }
            else if(m==='zoomOut'){ let d = p5.Vector.sub(this.pos, createVector(960,540)); this.pos.add(d.normalize().mult(psh*1.5)); if(dist(960,540,this.pos.x,this.pos.y)>1400) this.pos=createVector(960+random(-50,50), 540+random(-50,50)); }
            else if(m==='zoomIn'){ let d = p5.Vector.sub(createVector(960,540), this.pos); this.pos.add(d.normalize().mult(6+psh*0.5)); if(dist(960,540,this.pos.x,this.pos.y)<20) this.pos=createVector(random(1920), random(1080)); }
            this.noiseOff += 0.01;
        }
        display(pg, amp, img) {
            let namp = amp/255; let sc = parseFloat(document.getElementById('sc'+this.group).value);
            pg.push(); pg.translate(this.pos.x, this.pos.y);
            let sz = 450 * sc * (0.6 + namp*2.8);
            pg.image(img, 0, 0, img.width*(sz/1000), img.height*(sz/1000));
            pg.pop();
        }
    }

    // 시스템 핸들러
    function openL(id) { document.getElementById(id).click(); }
    function handleFile(files) { audio = loadSound(URL.createObjectURL(files[0]), () => { document.getElementById('analyzeBtn').disabled = false; }); }
    function loadAsset(id, files) { loadImage(URL.createObjectURL(files[0]), (img) => { instAssets[id] = img; let b = document.getElementById('btnI'+id); b.style.backgroundImage = `url(${URL.createObjectURL(files[0])})`; b.innerText=""; }); }
    function runAnalysis() { isAnalyzed = true; document.getElementById('recBtn').disabled = false; }
    function updateUI() { if(audio && audio.isPlaying()){ document.getElementById('progFill').style.width = (audio.currentTime()/audio.duration()*100)+'%'; } }

    async function toggleSync() {
        if (isPlaying) { audio.stop(); if (mediaRecorder) mediaRecorder.stop(); isPlaying = false; document.getElementById('recBtn').innerText="▶ START RECORD"; }
        else {
            if (getAudioContext().state === 'suspended') await userStartAudio();
            recordedChunks = []; 
            const dest = getAudioContext().createMediaStreamDestination();
            p5.soundOut.output.connect(dest);
            const combined = new MediaStream([...canvasRef.captureStream(24).getVideoTracks(), ...dest.stream.getAudioTracks()]);
            mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/webm; codecs=vp9,opus', videoBitsPerSecond: 80000000 });
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => { 
                const n = new Date(); const ts = `${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}${String(n.getHours()).padStart(2,'0')}${String(n.getMinutes()).padStart(2,'0')}${String(n.getSeconds()).padStart(2,'0')}`;
                let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/mp4' })); a.download = `${ts}.mp4`; a.click(); 
            };
            audio.play(); mediaRecorder.start(); isPlaying = true; document.getElementById('recBtn').innerText = "■ STOP & SAVE";
        }
    }

    setInterval(() => {
        ['fxScale','fxX','fxY','bgArtI','reactF','ptSmoke','sc0','sc1','sc2'].forEach(id => {
            let el = document.getElementById(id);
            if(el) { let lab = document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1)); if(lab) lab.innerText = el.value; }
        });
    }, 100);
</script>
</body>
</html>
