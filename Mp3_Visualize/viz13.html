<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPECTRUM MASTER v19.0.006 — Full Cinematic</title>
    <link rel="icon" href="data:,">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{ --bg:#020205; --panel:#0d0d1a; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; }
        body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
        .topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;}
        .main-workspace { display: grid; grid-template-columns: 320px 1fr 320px; flex:1; min-height:0; }
        .side-panel { background:var(--panel); padding:15px; overflow-y:auto; scrollbar-width: thin; border-left:1px solid var(--border); border-right:1px solid var(--border); }
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
        .label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}
        .control-group { margin-bottom:10px; }
        .control-group label { display:block; font-size:8px; color:#888; margin-bottom:2px; }
        .val-label { float:right; color:var(--accent); font-weight:bold; font-size:9px; }
        input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; }
        select { width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:5px; border-radius:4px; font-size:10px; outline:none; margin-bottom:4px;}
        .btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:6px; cursor:pointer; font-size:9px; width:100%; transition:0.2s; background-position: center; background-size: cover; height: 35px; display: flex; align-items: center; justify-content: center; text-shadow: 0px 0px 3px #000; }
        .btn:hover { border-color: var(--accent); }
        .btn.primary { background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:bold; font-size:11px; padding:12px; margin-top:10px; height: auto;}
        .viz-area { position:relative; display:flex; justify-content:center; align-items:center; background:#000; overflow:hidden; }
        #p5-container canvas { width: 100% !important; height: auto !important; max-height: 100% !important; object-fit: contain; }
        .inst-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; border-bottom: 1px dashed rgba(255,255,255,0.05); padding-bottom: 8px;}
        .inst-header { display: grid; grid-template-columns: 45px 1fr; gap: 5px; align-items: center; }
        .inst-header span { font-size: 8px; color: var(--accent2); font-weight: bold; }
        .playbar { height:2px; background:#111; position:relative; }
        #progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">SPECTRUM UNIVERSAL v19.0.006</div>
    <div id="timeCode">00:00 / 00:00</div>
</div>

<div class="main-workspace">
    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">1. Audio Analysis</span>
            <button class="btn" onclick="document.getElementById('mIn').click()">SELECT MP3 FILE</button>
            <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
            <button class="btn" id="analyzeBtn" onclick="runAnalysis()" disabled style="border-color:#ffcc00; color:#ffcc00; margin-top:5px; height:auto; padding:10px;">PRE-ANALYZE & START</button>
        </div>

        <div class="ctrl-box">
            <span class="label-small">2. Background FX</span>
            <select id="backdropFX">
                <option value="none">None</option>
                <option value="nebula" selected>Galaxy Nebula</option>
                <option value="dna">DNA Helix</option>
                <option value="web">Electric Web</option>
                <option value="matrix">Matrix Rain</option>
                <option value="warp">Warp Space</option>
            </select>
            <div class="control-group"><label>FX INTENSITY <span class="val-label" id="vGlowI">1.5</span></label><input type="range" id="glowI" min="0" max="5" step="0.1" value="1.5"></div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">3. Global Art Style</span>
            <select id="artStyle">
                <option value="none">Standard</option>
                <option value="impressionist">Impressionist (인상파)</option>
                <option value="pastel">Pastel (파스텔)</option>
                <option value="sketch">Sketch (소묘)</option>
                <option value="neon">Neon (네온)</option>
                <option value="rgb">RGB Random</option>
            </select>
            <div class="control-group"><label>STYLE STRENGTH <span class="val-label" id="vArtI">1.0</span></label><input type="range" id="artI" min="0" max="3" step="0.1" value="1.0"></div>
        </div>
    </div>

    <div class="viz-area" id="p5-container"></div>

    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">4. Background Rig</span>
            <button class="btn" id="btnBg" style="border-color:#00ffcc;" onclick="document.getElementById('bgIn').click()">LOAD BG PNG</button>
            <input type="file" id="bgIn" style="display:none" onchange="handleBG(this.files)">
            <div class="control-group" style="margin-top:8px;">
                <label>SCALE <span class="val-label" id="vBgScale">1.0</span></label><input type="range" id="bgScale" min="0.1" max="5.0" step="0.05" value="1.0">
                <label>POS X <span class="val-label" id="vBgX">0</span></label><input type="range" id="bgX" min="-1000" max="1000" value="0">
                <label>POS Y <span class="val-label" id="vBgY">0</span></label><input type="range" id="bgY" min="-1000" max="1000" value="0">
            </div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">5. Master Motion (Unified)</span>
            <select id="masterMotion">
                <option value="petal">Petal Fall (낙화)</option>
                <option value="noise" selected>Noise Fly (날림)</option>
                <option value="sunray">Sunray Glow (빛무리)</option>
                <option value="scatter">Scatter Build (스캐터)</option>
                <option value="invert">Freq Invert (반전)</option>
                <option value="ripple">Ripple Wave (리플)</option>
            </select>
            <div class="control-group"><label>STRENGTH <span class="val-label" id="vReactF">2.5</span></label><input type="range" id="reactF" min="0.1" max="10" step="0.1" value="2.5"></div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">6. Image Assets (1, 2, 3)</span>
            <div class="inst-row"><div class="inst-header"><span>IMG 1</span><button class="btn" id="btnI0" onclick="openL('i0')">LOAD</button></div><input type="range" id="sc0" min="0.1" max="3.0" step="0.1" value="1.0"></div>
            <div class="inst-row"><div class="inst-header"><span>IMG 2</span><button class="btn" id="btnI1" onclick="openL('i1')">LOAD</button></div><input type="range" id="sc1" min="0.1" max="3.0" step="0.1" value="1.0"></div>
            <div class="inst-row"><div class="inst-header"><span>IMG 3</span><button class="btn" id="btnI2" onclick="openL('i2')">LOAD</button></div><input type="range" id="sc2" min="0.1" max="3.0" step="0.1" value="1.0"></div>
            <input type="file" id="i0" style="display:none" onchange="loadAsset(0, this.files)"><input type="file" id="i1" style="display:none" onchange="loadAsset(1, this.files)"><input type="file" id="i2" style="display:none" onchange="loadAsset(2, this.files)">
        </div>

        <div class="ctrl-box">
            <button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START & SAVE MP4</button>
        </div>
    </div>
</div>
<div class="playbar"><div id="progFill"></div></div>

<script>
    let audio, fft, ampObj, canvasRef, mainCanvas, bgImg = null, instAssets = new Array(3).fill(null);
    let isPlaying = false, isRecording = false, isAnalyzed = false, mediaRecorder, recordedChunks = [];
    let particles = [], overlayT = 0;

    function setup() {
        let cnv = createCanvas(1920, 1080, WEBGL);
        cnv.parent('p5-container');
        canvasRef = cnv.elt;
        mainCanvas = createGraphics(1920, 1080);
        mainCanvas.imageMode(CENTER);
        fft = new p5.FFT(0.8, 512);
        ampObj = new p5.Amplitude();
        initParticles();
    }

    function initParticles() {
        particles = [];
        for(let i=0; i<45; i++) particles.push(new MasterParticle(i % 3));
    }

    function draw() {
        background(0);
        mainCanvas.background(2, 2, 8, 45);
        overlayT += 0.012;
        
        let spectrum = new Uint8Array(512);
        let bands = new Array(24).fill(0);
        let vol = 0;
        
        if (audio && audio.isPlaying()) {
            spectrum = fft.analyze();
            vol = ampObj.getLevel();
            for(let i=0; i<24; i++) bands[i] = fft.getEnergy(pow(2, i/2.5)*20, pow(2, (i+1)/2.5)*20);
        }

        // 1. BACKDROP LAYER (배경 효과)
        drawBackdrop(mainCanvas.drawingContext, 1920, 1080, overlayT, spectrum);

        // 2. BACKGROUND IMAGE LAYER
        if (bgImg) {
            mainCanvas.push();
            let bSc = parseFloat(document.getElementById('bgScale').value);
            let bX = parseFloat(document.getElementById('bgX').value);
            let bY = parseFloat(document.getElementById('bgY').value);
            mainCanvas.translate(1920/2 + bX, 1080/2 + bY);
            mainCanvas.image(bgImg, 0, 0, 1920*bSc, 1080*bSc);
            mainCanvas.pop();
        }

        // 3. GLOBAL ART STYLE
        applyArtStyle(mainCanvas, vol);

        // 4. IMAGE MASTER MOTION LAYER
        const masterM = document.getElementById('masterMotion').value;
        const masterF = parseFloat(document.getElementById('reactF').value);
        for(let p of particles) {
            if (instAssets[p.group]) {
                p.update(bands[p.group*7]||0, masterM, masterF);
                p.display(bands[p.group*7]||0, instAssets[p.group], masterM);
            }
        }

        // 5. NATURAL ELEMENTS
        if(bands[20] > 200) drawLightning(mainCanvas, vol);

        // WEBGL Final Output
        push(); translate(-width/2, -height/2); image(mainCanvas, 0, 0); pop();
        updateUI();
    }

    // --- ART STYLE LOGIC (5 STYLES) ---
    function applyArtStyle(ctx, vol) {
        let s = document.getElementById('artStyle').value;
        let ai = parseFloat(document.getElementById('artI').value);
        if(s==='none') return;
        ctx.push();
        if(s==='impressionist') { ctx.noStroke(); ctx.fill(255, 255, 255, 10*ai); for(let i=0;i<5;i++) ctx.ellipse(random(1920),random(1080), 150*vol, 5); }
        else if(s==='pastel') { ctx.fill(255,255,255,35*ai); ctx.rect(0,0,1920,1080); }
        else if(s==='sketch') { ctx.filter(GRAY); ctx.filter(THRESHOLD, 0.4); }
        else if(s==='neon') { ctx.drawingContext.shadowBlur = 25*ai*vol; ctx.drawingContext.shadowColor = 'cyan'; }
        else if(s==='rgb') { ctx.tint(random(255),random(255),random(255), 150*ai); }
        ctx.pop();
    }

    // --- BACKDROP ENGINE (INTEGRATED) ---
    function drawBackdrop(ctx, W, H, t, freq) {
        let fx = document.getElementById('backdropFX').value;
        let inten = parseFloat(document.getElementById('glowI').value);
        if(fx==='none') return;
        ctx.globalAlpha = inten / 5;
        if(fx==='nebula'){
            let g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,H*0.6*(1+freq[0]/255));
            g.addColorStop(0,'rgba(100,80,255,0.4)'); g.addColorStop(1,'rgba(0,0,0,0)');
            ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
        } else if(fx==='dna'){
            for(let s=0;s<2;s++){ let po=(s/2)*PI; for(let i=0;i<64;i++){ let a=(i/64)*TWO_PI+t+po; let amp=freq[i]/255; let x=W/2+cos(a)*H*0.3*(0.5+amp*0.7), y=H/2+sin(a)*H*0.1; ctx.beginPath(); ctx.arc(x,y,2+amp*10,0,TWO_PI); ctx.fillStyle=`hsla(${220+s*40},80%,65%,0.7)`; ctx.fill(); } }
        } else if(fx==='web'){
            ctx.strokeStyle='cyan'; ctx.lineWidth=0.5; for(let i=0;i<20;i++){ ctx.beginPath(); ctx.moveTo(W/2,H/2); ctx.lineTo(random(W),random(H)); ctx.stroke(); }
        } else if(fx==='matrix'){
            ctx.fillStyle='rgba(0,15,0,0.2)'; ctx.fillRect(0,0,W,H); ctx.font='16px monospace'; ctx.fillStyle='#0f8';
            for(let i=0;i<30;i++) ctx.fillText(String.fromCharCode(0x30A0+floor(random(96))), random(W), (t*500+i*50)%H);
        } else if(fx==='warp'){
            ctx.strokeStyle='white'; for(let i=0;i<40;i++) { ctx.beginPath(); ctx.moveTo(W/2,H/2); ctx.lineTo(random(W),random(H)); ctx.stroke(); }
        }
        ctx.globalAlpha = 1.0;
    }

    function drawLightning(ctx, vol) {
        ctx.stroke(255, 255, 255, 200); ctx.strokeWeight(2);
        let lx=random(1920), ly=0; for(let i=0;i<10;i++){ let nx=lx+random(-80,80), ny=ly+random(60,150); ctx.line(lx,ly,nx,ny); lx=nx; ly=ny; }
    }

    class MasterParticle {
        constructor(group) {
            this.group = group; this.origin = createVector(random(1920), random(1080));
            this.pos = this.origin.copy(); this.noiseOff = random(1000); this.angle = random(TWO_PI);
        }
        update(amp, m, force) {
            let namp = amp/255;
            let push = namp * force * 50;
            if(m === 'petal') {
                this.pos.y += (1.5 + namp*15) * (force/2.5); this.pos.x += sin(frameCount*0.04 + this.noiseOff)*4;
                if(this.pos.y > 1080) this.pos.y = -100;
            } else if(m === 'noise') {
                this.pos.x = this.origin.x + (noise(this.noiseOff)-0.5)*push*20;
                this.pos.y = this.origin.y + (noise(this.noiseOff+50)-0.5)*push*20;
            } else if(m === 'sunray') {
                this.pos.x = 1920/2 + cos(this.angle)*push*10; this.pos.y = 1080/2 + sin(this.angle)*push*10;
            } else if(m === 'scatter') {
                let target = (namp > 0.75) ? this.origin : createVector(this.origin.x+random(-300,300), this.origin.y+random(-300,300));
                this.pos.lerp(target, 0.1);
            } else if(m === 'ripple') {
                this.pos.x = this.origin.x + sin(this.origin.y*0.01 + frameCount*0.1)*push*2;
            } else if(m === 'invert') {
                this.pos = this.origin.copy();
            }
            this.noiseOff += 0.01;
        }
        display(amp, img, m) {
            let namp = amp/255;
            const sc = parseFloat(document.getElementById('sc'+this.group).value);
            mainCanvas.push(); mainCanvas.translate(this.pos.x, this.pos.y);
            if(m==='invert' && namp > 0.8) mainCanvas.filter(INVERT);
            let sz = 400 * sc * (0.6 + namp*2.8);
            mainCanvas.image(img, 0, 0, img.width*(sz/1000), img.height*(sz/1000));
            mainCanvas.pop();
        }
    }

    // 시스템 핸들러
    function openL(id) { document.getElementById(id).click(); }
    function handleFile(files) { audio = loadSound(URL.createObjectURL(files[0]), () => { document.getElementById('analyzeBtn').disabled = false; }); }
    function handleBG(files) { loadImage(URL.createObjectURL(files[0]), (img) => { bgImg = img; setBtnThumb('btnBg', files[0]); }); }
    function loadAsset(id, files) { loadImage(URL.createObjectURL(files[0]), (img) => { instAssets[id] = img; }); setBtnThumb('btnI'+id, files[0]); }
    function setBtnThumb(btnId, file) {
        let r = new FileReader(); r.onload = e => { let b = document.getElementById(btnId); b.style.backgroundImage = `url(${e.target.result})`; b.innerText = ""; }; r.readAsDataURL(file);
    }
    function runAnalysis() { isAnalyzed = true; document.getElementById('recBtn').disabled = false; }
    function updateUI() { if(audio && audio.isPlaying()){ document.getElementById('progFill').style.width = (audio.currentTime()/audio.duration()*100)+'%'; } }

    async function toggleSync() {
        if (isPlaying) { audio.stop(); if (mediaRecorder) mediaRecorder.stop(); isPlaying = false; }
        else {
            if (getAudioContext().state === 'suspended') await userStartAudio();
            recordedChunks = []; const stream = canvasRef.captureStream(24);
            const dest = getAudioContext().createMediaStreamDestination(); p5.soundOut.output.connect(dest);
            const combined = new MediaStream([...stream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
            mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/webm; codecs=vp9,opus', videoBitsPerSecond: 80000000 });
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => { 
                const n = new Date(); const ts = `${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}${String(n.getHours()).padStart(2,'0')}${String(n.getMinutes()).padStart(2,'0')}${String(n.getSeconds()).padStart(2,'0')}`;
                let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/mp4' })); a.download = `${ts}.mp4`; a.click(); 
            };
            audio.play(); mediaRecorder.start(); isPlaying = true; document.getElementById('recBtn').innerText = "■ STOP & SAVE";
        }
    }

    const sL = ['glowI','bgScale','bgX','bgY','sc0','sc1','sc2','artI','reactF'];
    sL.forEach(id => {
        let el = document.getElementById(id);
        if(el) el.oninput = function() { document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1)).innerText = this.value; };
    });
</script>
</body>
</html>
