<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SPECTRUM STUDIO v22.8.5 — Final Master</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <script src="fx_library.js"></script>
    <style>
        :root{ --bg:#020205; --accent:#00ffcc; --accent2:#ff3377; --panel:#0a0a10; --border:rgba(0,255,204,0.15); }
        body{ background:var(--bg); color:#e0f0ff; margin:0; overflow:hidden; font-family:'Pretendard', sans-serif; display:flex; }
        
        /* 왼쪽: FX 팔레트 (썸네일 이미지 규칙 적용) */
        #left-panel { width:260px; background:var(--panel); height:100vh; padding:15px; border-right:1px solid var(--border); overflow-y:auto; }
        .fx-thumb { width:100%; aspect-ratio:1.6; border:1px solid #333; margin-bottom:10px; border-radius:4px; cursor:pointer; background-size:cover; background-position:center; position:relative; overflow:hidden; transition:0.2s; }
        .fx-thumb:hover { border-color:var(--accent); }
        .fx-thumb.active { border-color:var(--accent2); box-shadow:0 0 12px var(--accent2); }
        .fx-name { position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.7); font-size:10px; padding:4px; color:var(--accent); text-align:center; text-transform:uppercase; }

        #canvas-container { flex:1; background:#000; display:flex; align-items:center; justify-content:center; }
        #right-panel { width:360px; background:var(--panel); height:100vh; padding:15px; border-left:1px solid var(--border); overflow-y:auto; }
        
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
        h3 { font-size:10px; color:var(--accent); margin:0 0 12px 0; letter-spacing:1px; }

        /* 슬라이더 및 수치 입력 */
        .slider-row { display:flex; align-items:center; gap:8px; margin-top:8px; }
        .slider-row label { font-size:9px; color:#888; width:70px; }
        input[type=range] { flex:1; accent-color:var(--accent); height:2px; cursor:pointer; }
        .num-in { width:55px; background:#000; color:var(--accent); border:1px solid #333; font-size:10px; text-align:center; padding:3px; }

        /* 하단 로그 패널 */
        #log-panel { height:130px; background:#000; border:1px solid #222; font-family:monospace; font-size:10px; color:#00ff00; padding:10px; overflow-y:hidden; margin-top:10px; border-radius:4px; }
        
        .btn { width:100%; padding:10px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; font-size:10px; border-radius:4px; font-weight:bold; margin-top:6px; transition:0.2s; }
        .btn:hover:not(:disabled) { background:rgba(0,255,204,0.1); }
        #analyzeBtn.ready { background:var(--accent); color:#000; }
        #recBtn { border-color:var(--accent2); color:var(--accent2); }
        #recBtn.active { background:var(--accent2); color:#fff; animation:blink 1s infinite; }
        @keyframes blink { 50% { opacity:0.6; } }
    </style>
</head>
<body>

<div id="left-panel">
    <h3 style="color:var(--accent2)">FX PALETTE</h3>
    <div id="fxGrid"></div>
</div>

<div id="canvas-container"></div>

<div id="right-panel">
    <div class="ctrl-box">
        <h3>1. SYSTEM & EXPORT</h3>
        <button class="btn" onclick="document.getElementById('mIn').click()">🎵 LOAD MP3</button>
        <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
        <button class="btn" id="analyzeBtn" onclick="activateEngine()" disabled>⚡ READY (분석 대기)</button>
        <button class="btn" id="recBtn" onclick="toggleProduction()" disabled>🔴 START MP4 PRODUCTION</button>
    </div>

    <div class="ctrl-box">
        <h3>2. LIVE PARAMETERS (P1-P3)</h3>
        <div class="slider-row"><label>P1: INTENSITY</label><input type="range" id="p1" min="1" max="200" value="50" oninput="uV('vP1',this.value)"><input type="number" id="vP1" class="num-in" value="50" oninput="uS('p1',this.value)"></div>
        <!-- [복구] Scale(P2) 조정 바 -->
        <div class="slider-row"><label>P2: SCALE</label><input type="range" id="p2" min="1" max="100" step="0.1" value="5" oninput="uV('vP2',this.value)"><input type="number" id="vP2" class="num-in" value="5" step="0.1" oninput="uS('p2',this.value)"></div>
        <div class="slider-row"><label>P3: RADIUS</label><input type="range" id="p3" min="1" max="800" value="250" oninput="uV('vP3',this.value)"><input type="number" id="vP3" class="num-in" value="250" oninput="uS('p3',this.value)"></div>
    </div>

    <div class="ctrl-box">
        <h3>3. ORIENTATION (3-AXIS)</h3>
        <div class="slider-row"><label>ROT X</label><input type="range" id="rX" min="-180" max="180" value="0"></div>
        <div class="slider-row"><label>ROT Y</label><input type="range" id="rY" min="-180" max="180" value="0"></div>
        <div class="slider-row"><label>ROT Z</label><input type="range" id="rZ" min="-180" max="180" value="0"></div>
    </div>

    <div id="log-panel">
        <div style="color:var(--accent2); margin-bottom:5px;">[ENGINE LOG v22.8.5]</div>
        <div id="log-content">시스템 준비됨. MP3 파일을 로드하세요.</div>
    </div>
</div>

<script>
    let audio, fft, subCanvas, isPlaying = false, isStarted = false, currentFX = 'matrix';
    let mediaRecorder, recordedChunks = [];
    
    function uV(id, v){ document.getElementById(id).value = v; }
    function uS(slId, v){ document.getElementById(slId).value = v; }

    function setup() {
        let cnv = createCanvas(1280, 720, WEBGL);
        cnv.parent('canvas-container');
        subCanvas = createGraphics(1280, 720, WEBGL);
        subCanvas.colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);
        
        // [수정] 썸네일 파일명 규칙 적용: palette_FX명.png
        const grid = document.getElementById('fxGrid');
        const FX_KEYS = Object.keys(window.ENGINES);
        FX_KEYS.forEach(id => {
            if(typeof window.ENGINES[id] === 'function') {
                let t = document.createElement('div'); 
                t.className = 'fx-thumb';
                // 사진에 나온 규칙대로 파일명 설정
                t.style.backgroundImage = `url('thumbnails/palette_${id}.png')`; 
                t.innerHTML = `<div class="fx-name">${id}</div>`;
                if(id === currentFX) t.classList.add('active');
                t.onclick = () => { 
                    currentFX = id; 
                    document.querySelectorAll('.fx-thumb').forEach(x=>x.classList.remove('active')); 
                    t.classList.add('active'); 
                };
                grid.appendChild(t);
            }
        });
        
        resizeCanvas();
    }

    function resizeCanvas() {
        const container = document.getElementById('canvas-container');
        const scale = Math.min((container.clientWidth)/1280, (container.clientHeight)/720) * 0.95;
        document.querySelector('canvas').style.transform = `scale(${scale})`;
    }

    function draw() {
        background(0); subCanvas.clear();
        let bands = new Array(12).fill(0), bass = 0;
        
        if (isStarted && audio && audio.isPlaying()) {
            fft.analyze();
            for(let i=0; i<12; i++) bands[i] = fft.getEnergy(map(i,0,11,20,8000));
            bass = fft.getEnergy("bass");
            
            // 실시간 로그 출력
            document.getElementById('log-content').innerHTML = `
                ACTIVE: ${currentFX.toUpperCase()}<br>
                BASS: ${Math.floor(bass)} | VOL: ${Math.floor(fft.getRawSpectrum()[0]*100)}<br>
                FREQ_LOW: ${bands[0]} | MID: ${bands[5]} | HIGH: ${bands[11]}<br>
                FPS: ${Math.floor(frameRate())} | TIME: ${audio.currentTime().toFixed(2)}s
            `;
        }

        subCanvas.push();
        subCanvas.rotateX(radians(parseFloat(document.getElementById('rX').value)));
        subCanvas.rotateY(radians(parseFloat(document.getElementById('rY').value)));
        subCanvas.rotateZ(radians(parseFloat(document.getElementById('rZ').value)));

        if(window.ENGINES[currentFX]) {
            window.ENGINES[currentFX](
                subCanvas, frameCount*0.02, bands, 
                parseFloat(document.getElementById('p1').value),
                parseFloat(document.getElementById('p2').value),
                parseFloat(document.getElementById('p3').value)
            );
        }
        subCanvas.pop();
        push(); translate(-width/2, -height/2); image(subCanvas, 0, 0); pop();
    }

    function handleAudio(f) { 
        audio = loadSound(URL.createObjectURL(f[0]), () => { 
            document.getElementById('analyzeBtn').disabled = false;
            document.getElementById('analyzeBtn').innerText = "⚡ READY (분석 완료)";
            document.getElementById('analyzeBtn').classList.add('ready');
            document.getElementById('log-content').innerText = "MP3 분석 성공. READY 버튼을 누르세요.";
        }); 
    }

    function activateEngine() { 
        userStartAudio().then(() => { 
            isStarted = true; 
            document.getElementById('recBtn').disabled = false;
            document.getElementById('log-content').innerText = "엔진 활성화. PRODUCTION 가능.";
        }); 
    }

    async function toggleProduction() {
        if(isPlaying) {
            audio.stop(); isPlaying = false; mediaRecorder.stop();
            document.getElementById('recBtn').innerText = "🔴 START MP4 PRODUCTION";
            document.getElementById('recBtn').classList.remove('active');
        } else {
            recordedChunks = [];
            const stream = document.querySelector('canvas').captureStream(60);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/mp4; codecs=avc1' });
            mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = `viz_production_${Date.now()}.mp4`; a.click();
            };
            mediaRecorder.start(); audio.play(); isPlaying = true;
            document.getElementById('recBtn').innerText = "⏹ STOP & SAVE VIDEO";
            document.getElementById('recBtn').classList.add('active');
        }
    }
</script>
</body>
</html>
