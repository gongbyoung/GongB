<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SPECTRUM STUDIO v22.6.0 — Engine Separated</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <!-- [분리] 외부 라이브러리 로드 -->
    <script src="fx_library.js"></script>
    <style>
        :root{ --bg:#020205; --accent:#00ffcc; --accent2:#ff3377; --panel:#0a0a10; --border:rgba(0,255,204,0.15); }
        body{ background:var(--bg); color:#e0f0ff; margin:0; overflow:hidden; font-family:'Pretendard', sans-serif; display:flex; }
        
        /* UI 분리: 왼쪽(FX) / 오른쪽(Params) */
        #left-panel { width:220px; background:var(--panel); height:100vh; padding:15px; border-right:1px solid var(--border); overflow-y:auto; }
        #canvas-container { flex:1; background:#000; display:flex; align-items:center; justify-content:center; }
        #right-panel { width:360px; background:var(--panel); height:100vh; padding:15px; border-left:1px solid var(--border); overflow-y:auto; }
        
        .fx-btn { width:100%; padding:10px; background:#111; border:1px solid #333; color:#666; font-size:10px; text-align:left; cursor:pointer; margin-bottom:4px; border-radius:4px; }
        .fx-btn.active { border-color:var(--accent2); color:var(--accent2); background:rgba(255,51,119,0.1); font-weight:bold; }
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
        .slider-row { display:flex; align-items:center; gap:8px; margin-top:8px; }
        input[type=range] { flex:1; accent-color:var(--accent); height:2px; }
        .num-in { width:60px; background:#000; color:var(--accent); border:1px solid #333; font-size:11px; text-align:center; padding:3px; }
        .btn { width:100%; padding:10px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; font-size:10px; border-radius:4px; font-weight:bold; margin-top:5px; }
    </style>
</head>
<body>

<div id="left-panel">
    <h3 style="font-size:10px; color:var(--accent);">FX PALETTE</h3>
    <div id="fxList"></div>
    <hr style="border:0.5px solid var(--border); margin:15px 0;">
    <button class="btn" onclick="document.getElementById('mIn').click()">🎵 LOAD MP3</button>
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    <button class="btn" id="analyzeBtn" onclick="activateEngine()" disabled>⚡ READY</button>
</div>

<div id="canvas-container"></div>

<div id="right-panel">
    <div class="ctrl-box">
        <h3>MASTER ENGINE</h3>
        <label style="font-size:9px;">TRANS X / Y</label>
        <div class="slider-row"><input type="range" id="mX" min="-600" max="600" value="0" oninput="uV('vMX',this.value)"><input type="number" id="vMX" class="num-in" value="0" oninput="uS('mX',this.value)"></div>
        <div class="slider-row"><input type="range" id="mY" min="-600" max="600" value="0" oninput="uV('vMY',this.value)"><input type="number" id="vMY" class="num-in" value="0" oninput="uS('mY',this.value)"></div>
        <label style="font-size:9px;">ROTATION X / Y / Z</label>
        <input type="range" id="rX" min="-180" max="180" value="0">
        <input type="range" id="rY" min="-180" max="180" value="0">
        <input type="range" id="rZ" min="-180" max="180" value="0">
    </div>

    <div class="ctrl-box">
        <h3>LIVE PARAMETERS</h3>
        <div class="slider-row"><label>P1</label><input type="range" id="p1" min="1" max="200" value="50" oninput="uV('vP1',this.value)"><input type="number" id="vP1" class="num-in" value="50" oninput="uS('p1',this.value)"></div>
        <div class="slider-row"><label>P2</label><input type="range" id="p2" min="0.1" max="20" step="0.1" value="2" oninput="uV('vP2',this.value)"><input type="number" id="vP2" class="num-in" value="2" step="0.1" oninput="uS('p2',this.value)"></div>
        <div class="slider-row"><label>P3</label><input type="range" id="p3" min="1" max="500" value="150" oninput="uV('vP3',this.value)"><input type="number" id="vP3" class="num-in" value="150" oninput="uS('p3',this.value)"></div>
    </div>

    <button class="btn" id="recBtn" onclick="toggleProduction()" disabled style="border-color:var(--accent2); color:var(--accent2);">🔴 START MP4 (H.264)</button>
</div>

<script>
    let audio, fft, subCanvas, isPlaying = false, isStarted = false, currentFX = 'matrix';
    let mediaRecorder, recordedChunks = [];
    
    function uV(id, v){ document.getElementById(id).value = v; }
    function uS(slId, v){ document.getElementById(slId).value = v; }

    function setup() {
        let cnv = createCanvas(1280, 720, WEBGL);
        cnv.parent('canvas-container');
        subCanvas = createGraphics(1280, 720, WEBGL);
        subCanvas.colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);
        
        const list = document.getElementById('fxList');
        const FX_KEYS = Object.keys(window.ENGINES);
        FX_KEYS.forEach(id => {
            let b = document.createElement('button'); b.className = 'fx-btn'; b.innerText = id.toUpperCase();
            if(id === currentFX) b.classList.add('active');
            b.onclick = () => { currentFX = id; document.querySelectorAll('.fx-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); };
            list.appendChild(b);
        });
        
        const scale = Math.min((windowWidth-600)/1280, windowHeight/720) * 0.95;
        cnv.elt.style.transform = `scale(${scale})`;
    }

    function draw() {
        background(0); subCanvas.clear();
        let bands = new Array(12).fill(0), fI = 1.0;
        if (isStarted && audio && audio.isPlaying()) {
            fft.analyze();
            for(let i=0; i<12; i++) bands[i] = fft.getEnergy(map(i,0,11,20,8000));
            fI = map(bands[0], 0, 255, 0.8, 4.0);
        }

        subCanvas.push();
        subCanvas.translate(parseFloat(document.getElementById('mX').value), parseFloat(document.getElementById('mY').value), 0);
        subCanvas.rotateX(radians(parseFloat(document.getElementById('rX').value)));
        subCanvas.rotateY(radians(parseFloat(document.getElementById('rY').value)));
        subCanvas.rotateZ(radians(parseFloat(document.getElementById('rZ').value)));

        // [핵심] 분리된 라이브러리 엔진 호출
        if(window.ENGINES[currentFX]) {
            window.ENGINES[currentFX](
                subCanvas, frameCount*0.02, bands, 
                parseFloat(document.getElementById('p1').value),
                parseFloat(document.getElementById('p2').value),
                parseFloat(document.getElementById('p3').value)
            );
        }
        subCanvas.pop();

        push(); translate(-width/2, -height/2); image(subCanvas, 0, 0); pop();
    }

    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0]), () => { document.getElementById('analyzeBtn').disabled=false; }); }
    function activateEngine() { userStartAudio().then(()=>{ isStarted=true; document.getElementById('recBtn').disabled=false; }); }

    async function toggleProduction() {
        if(isPlaying) {
            audio.stop(); isPlaying = false; mediaRecorder.stop();
            document.getElementById('recBtn').innerText = "🔴 START MP4 (H.264)";
        } else {
            recordedChunks = [];
            const stream = document.querySelector('canvas').captureStream(60);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/mp4; codecs=avc1' });
            mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = `viz_master_${Date.now()}.mp4`; a.click();
            };
            mediaRecorder.start(); audio.play(); isPlaying = true; isStarted = true;
            document.getElementById('recBtn').innerText = "⏹ STOP & SAVE";
        }
    }
</script>
</body>
</html>
