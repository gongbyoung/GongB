<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM GENERATIVE v21.0.01</title>
<link rel="icon" href="data:,">
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;800&family=Space+Mono:wght@400;700&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#04040a;--panel:#090912;
  --a1:#00e5cc;--a2:#ff3d7f;--a3:#ffe066;
  --border:rgba(0,229,204,0.15);--text:#c8dde8;--dim:#445566;
}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Space Mono',monospace;
  display:flex;flex-direction:column;height:100vh;
}

/* TOPBAR */
.topbar{
  height:42px;background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:20px;flex-shrink:0;
}
.logo{font-family:'Oxanium',sans-serif;font-weight:800;font-size:13px;letter-spacing:4px;color:var(--a1);}
.bar-mid{display:flex;align-items:center;gap:14px;flex:1;justify-content:center;}
#timeCode{font-size:13px;color:var(--a1);letter-spacing:2px;min-width:120px;text-align:center;}
.pw{flex:1;max-width:280px;height:3px;background:#111;border-radius:2px;overflow:hidden;}
#pf{height:100%;width:0%;background:linear-gradient(90deg,var(--a1),var(--a2));border-radius:2px;}
#statusL{font-size:9px;color:var(--dim);letter-spacing:2px;}

/* LAYOUT */
.workspace{display:grid;grid-template-columns:272px 1fr 272px;flex:1;min-height:0;}

/* PANELS */
.panel{
  background:var(--panel);border:1px solid var(--border);
  display:flex;flex-direction:column;padding:10px;overflow-y:auto;
}
.panel::-webkit-scrollbar{width:2px;}
.panel::-webkit-scrollbar-thumb{background:var(--a1);}

.box{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:4px;padding:10px;margin-bottom:8px;}
.sec{font-size:8px;color:var(--a1);letter-spacing:3px;text-transform:uppercase;display:block;border-bottom:1px solid rgba(0,229,204,.1);padding-bottom:4px;margin-bottom:8px;font-family:'Oxanium',sans-serif;font-weight:600;}

/* SLIDERS */
.ctrl{margin-bottom:8px;}
.ctrl label{display:flex;justify-content:space-between;font-size:8px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.ctrl label span{color:var(--a1);font-weight:700;}
input[type=range]{width:100%;-webkit-appearance:none;height:2px;background:#1a1a2a;border-radius:1px;cursor:pointer;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--a1);cursor:pointer;transition:.1s;}
select{width:100%;background:#000;border:1px solid var(--border);color:var(--text);padding:6px 8px;font-size:9px;font-family:'Space Mono',monospace;border-radius:3px;outline:none;cursor:pointer;margin-bottom:6px;}

/* BUTTONS */
.btn{width:100%;background:transparent;border:1px solid var(--border);color:var(--dim);padding:7px 6px;cursor:pointer;font-size:9px;font-family:'Space Mono',monospace;border-radius:3px;margin-bottom:4px;transition:.15s;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:6px;position:relative;min-height:32px;overflow:hidden;}
.btn:hover{border-color:var(--a1);color:var(--a1);}
.btn .thumb{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.45;border-radius:3px;}
.btn.loaded{border-color:var(--a1);color:var(--a1);}
.btn.primary{background:linear-gradient(135deg,var(--a2),#c42);border:none;color:#fff;font-family:'Oxanium',sans-serif;font-weight:800;font-size:12px;padding:14px;letter-spacing:3px;margin-top:6px;}
.btn.primary.rec{background:linear-gradient(135deg,#222,#444);}

/* CANVAS */
.viz{position:relative;background:#000;overflow:hidden;flex:1;display:flex;justify-content:center;align-items:center;}
#defaultCanvas0{max-width:100%!important;max-height:100%!important;object-fit:contain;}

.logbox{background:#000;border:1px solid #0d0d1c;border-radius:3px;padding:6px 8px;font-size:8px;color:#333;line-height:1.9;margin-top:4px;}
.logbox b{color:var(--a1);}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM GENERATIVE v21.0.01</div>
  <div class="bar-mid">
    <div id="timeCode">00:00 / 00:00</div>
    <div class="pw"><div id="pf"></div></div>
    <div id="statusL">READY</div>
  </div>
</div>

<div class="workspace">
  <div class="panel">
    <div class="box">
      <span class="sec">1. Audio</span>
      <button class="btn" onclick="document.getElementById('mIn').click()">♪ MP3 / WAV 로드</button>
      <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
      <button class="btn" id="analyzeBtn" onclick="runAnalysis()" disabled>◎ ANALYZE & READY</button>
    </div>

    <div class="box">
      <span class="sec">2. Background FX</span>
      <select id="backdropFX">
        <option value="aurora">Aurora Wave (오로라)</option>
        <option value="flow">Flow Field (플로우장)</option>
        <option value="ripple">Radial Ripple (방사 파동)</option>
        <option value="pollen">Pollen Drift (꽃가루)</option>
        <option value="ocean">Ocean Depth (심해 파도)</option>
        <option value="starfield">Star Field (별빛)</option>
        <option value="mesh">Mesh Network (망사)</option>
        <option value="smoke">Smoke Diffusion (연기)</option>
      </select>
      <div class="ctrl"><label>FX INTENSITY <span id="vFxInt">1.0</span></label><input type="range" id="fxInt" min="0" max="3" step="0.05" value="1" oninput="g('vFxInt').textContent=parseFloat(this.value).toFixed(2)"></div>
      <div class="ctrl"><label>FX SCALE <span id="vFxScale">1.0</span></label><input type="range" id="fxScale" min="0.1" max="4" step="0.05" value="1" oninput="g('vFxScale').textContent=parseFloat(this.value).toFixed(2)"></div>
      <div class="ctrl"><label>FX OFFSET X <span id="vFxX">0</span></label><input type="range" id="fxX" min="-600" max="600" value="0" oninput="g('vFxX').textContent=this.value"></div>
      <div class="ctrl"><label>FX OFFSET Y <span id="vFxY">0</span></label><input type="range" id="fxY" min="-400" max="400" value="0" oninput="g('vFxY').textContent=this.value"></div>
    </div>

    <div class="box">
      <span class="sec">3. BG Color</span>
      <select id="bgColor">
        <option value="night">Night Black</option>
        <option value="deep">Deep Navy</option>
        <option value="dusk">Dusk Purple</option>
        <option value="dawn">Dawn Warm</option>
        <option value="fog">Fog Gray</option>
        <option value="sky">Sky Blue</option>
      </select>
    </div>

    <div class="box">
      <span class="sec">4. Trail Smoke</span>
      <div class="ctrl"><label>TRAIL OPACITY <span id="vTrail">30</span></label><input type="range" id="trail" min="1" max="220" value="30" oninput="g('vTrail').textContent=this.value"></div>
    </div>

    <div class="logbox">
      <div>VOL: <b id="logVol">0.000</b></div>
      <div>BAND: <b id="logBand">—</b></div>
      <div>FPS: <b id="logFps">0</b></div>
    </div>
  </div>

  <div class="viz" id="canvasContainer"></div>

  <div class="panel">
    <div class="box">
      <span class="sec">5. Image Motion</span>
      <select id="motionMode">
        <option value="leaf">① 낙엽</option>
        <option value="seed">② 홀씨</option>
        <option value="sail">③ 돛단배</option>
        <option value="gull">④ 갈매기</option>
        <option value="cosmos">⑤ 우주꽃잎</option>
        <option value="flowerfly">⑥ 꽃밭비행</option>
        <option value="surf">⑦ 파도활강</option>
      </select>
      <div class="ctrl"><label>MOTION SPEED <span id="vSpeed">1.0</span></label><input type="range" id="speed" min="0.1" max="5" step="0.05" value="1" oninput="g('vSpeed').textContent=parseFloat(this.value).toFixed(2)"></div>
      <div class="ctrl"><label>REACT FORCE <span id="vReact">2.0</span></label><input type="range" id="react" min="0" max="8" step="0.1" value="2" oninput="g('vReact').textContent=parseFloat(this.value).toFixed(1)"></div>
      <div class="ctrl"><label>PARTICLE COUNT <span id="vPcount">10</span></label><input type="range" id="pcount" min="1" max="40" value="10" oninput="g('vPcount').textContent=this.value; _needReinit=true;"></div>
      <div class="ctrl"><label>BASE SIZE <span id="vPsize">1.0</span></label><input type="range" id="psize" min="0.1" max="4" step="0.05" value="1" oninput="g('vPsize').textContent=parseFloat(this.value).toFixed(2)"></div>
    </div>

    <div class="box">
      <span class="sec">6. Image Slots</span>
      <div class="box" style="margin-bottom:5px; padding:5px;">
        <button class="btn" id="btnI0" onclick="document.getElementById('i0').click()">IMG 1</button>
        <input type="range" id="sc0" min="0.1" max="4" step="0.05" value="1">
        <input type="range" id="band0" min="0" max="11" step="1" value="2">
      </div>
      <div class="box" style="margin-bottom:5px; padding:5px;">
        <button class="btn" id="btnI1" onclick="document.getElementById('i1').click()">IMG 2</button>
        <input type="range" id="sc1" min="0.1" max="4" step="0.05" value="1">
        <input type="range" id="band1" min="0" max="11" step="1" value="5">
      </div>
      <div class="box" style="padding:5px;">
        <button class="btn" id="btnI2" onclick="document.getElementById('i2').click()">IMG 3</button>
        <input type="range" id="sc2" min="0.1" max="4" step="0.05" value="1">
        <input type="range" id="band2" min="0" max="11" step="1" value="9">
      </div>
      <input type="file" id="i0" style="display:none" onchange="loadAsset(0,this.files)">
      <input type="file" id="i1" style="display:none" onchange="loadAsset(1,this.files)">
      <input type="file" id="i2" style="display:none" onchange="loadAsset(2,this.files)">
    </div>

    <button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START & RECORD</button>
  </div>
</div>

<script>
// --- Global Helpers
const g = id => document.getElementById(id);
const gv = id => parseFloat(g(id).value);

// --- Shared State
let _audio = null;
let _instAssets = [null, null, null];
let _needReinit = false;
let _canvasRef = null;
let _isPlaying = false;
let _mediaRecorder, _recordedChunks = [];

const BG_COLORS = { night:[4,4,10], deep:[4,8,20], dusk:[12,4,18], dawn:[22,12,8], fog:[30,32,36], sky:[8,18,32] };
const FREQ_RANGES = [[20,60],[60,120],[120,250],[250,400],[400,600],[600,900],[900,1400],[1400,2200],[2200,3500],[3500,5500],[5500,9000],[9000,20000]];

// --- HTML Handlers
function handleFile(files) {
  if (!files[0]) return;
  g('statusL').textContent = 'LOADING...';
  if (_audio) { _audio.stop(); _audio.dispose(); }
  _audio = loadSound(URL.createObjectURL(files[0]), () => {
    g('analyzeBtn').disabled = false;
    g('analyzeBtn').textContent = '◎ READY';
    g('statusL').textContent = 'LOADED';
  });
}

function loadAsset(id, files) {
  if (!files[0]) return;
  const url = URL.createObjectURL(files[0]);
  loadImage(url, img => {
    _instAssets[id] = img;
    g('btnI'+id).innerHTML = `<div class="thumb" style="background-image:url(${url})"></div><span>IMG ${id+1} ✓</span>`;
    g('btnI'+id).classList.add('loaded');
  });
}

function runAnalysis() {
  g('recBtn').disabled = false;
  g('statusL').textContent = 'READY';
}

async function toggleSync() {
  if (_isPlaying) {
    if (_audio) _audio.stop();
    _isPlaying = false;
    g('recBtn').textContent = '▶ START & RECORD';
    if (_mediaRecorder && _mediaRecorder.state === 'recording') _mediaRecorder.stop();
  } else {
    if (!_audio) return;
    if (getAudioContext().state === 'suspended') await userStartAudio();
    
    _recordedChunks = [];
    const vStream = _canvasRef.captureStream(30);
    const dest = getAudioContext().createMediaStreamDestination();
    p5.soundOut.output.connect(dest);
    
    const combined = new MediaStream([...vStream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
    const mime = ['video/webm;codecs=vp9,opus', 'video/webm'].find(m => MediaRecorder.isTypeSupported(m));

    _mediaRecorder = new MediaRecorder(combined, { mimeType: mime, videoBitsPerSecond: 40000000 });
    _mediaRecorder.ondataavailable = e => { if (e.data.size > 0) _recordedChunks.push(e.data); };
    _mediaRecorder.onstop = () => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob(_recordedChunks, { type: 'video/webm' }));
      a.download = `SPECTRUM_${Date.now()}.webm`;
      a.click();
    };

    _mediaRecorder.start();
    _audio.play();
    _isPlaying = true;
    g('recBtn').textContent = '■ STOP & SAVE';
    g('statusL').textContent = '● REC';
  }
}

// --- P5 Sketch
let fft, ampObj, bgLayer, mainLayer, particles = [];
let bands12 = new Array(12).fill(0), volSmooth = 0, overlayT = 0;

function setup() {
  let cnv = createCanvas(1920, 1080);
  cnv.parent('canvasContainer');
  _canvasRef = cnv.elt;

  bgLayer = createGraphics(1920, 1080);
  mainLayer = createGraphics(1920, 1080);
  bgLayer.imageMode(CENTER);
  mainLayer.imageMode(CENTER);

  fft = new p5.FFT(0.85, 1024);
  ampObj = new p5.Amplitude(0.9);
  initParticles();
}

function draw() {
  if (_needReinit) { initParticles(); _needReinit = false; }

  const bgC = BG_COLORS[g('bgColor').value] || [4, 4, 10];
  let vol = 0;

  if (_audio && _audio.isPlaying()) {
    fft.analyze();
    vol = ampObj.getLevel();
    volSmooth = lerp(volSmooth, vol, 0.12);
    FREQ_RANGES.forEach((r, i) => { bands12[i] = fft.getEnergy(r[0], r[1]); });
  }

  background(bgC[0], bgC[1], bgC[2]);

  bgLayer.clear();
  bgLayer.push();
  bgLayer.translate(960 + gv('fxX'), 540 + gv('fxY'));
  bgLayer.scale(gv('fxScale'));
  drawBgFX(bgLayer, volSmooth, bgC);
  bgLayer.pop();

  mainLayer.background(bgC[0], bgC[1], bgC[2], parseInt(g('trail').value));

  overlayT += 0.012;
  const mMode = g('motionMode').value;
  const mSpeed = gv('speed'), mReact = gv('react'), mPSize = gv('psize');

  for (let pt of particles) {
    if (!_instAssets[pt.slot]) continue;
    const bAmp = constrain(bands12[parseInt(g('band' + pt.slot).value)] / 255, 0, 1);
    pt.update(mMode, mSpeed, mReact, bAmp);
    pt.display(mainLayer, _instAssets[pt.slot], mMode, bAmp, gv('sc' + pt.slot) * mPSize);
  }

  image(bgLayer, 0, 0);
  image(mainLayer, 0, 0);
  updateUI(vol);
}

function initParticles() {
  particles = [];
  const cnt = parseInt(g('pcount').value);
  const mode = g('motionMode').value;
  for (let i = 0; i < cnt; i++) particles.push(new CinematicParticle(i % 3, mode));
}

class CinematicParticle {
  constructor(slot, mode) { this.slot = slot; this.reset(mode, true); }
  reset(mode, init = false) {
    this.x = random(width); this.y = init ? random(height) : -100;
    this.vx = random(-1, 1); this.vy = random(1, 2);
    this.rotAngle = random(TWO_PI);
    this.rotSpeed = random(-0.02, 0.02);
    this.baseY = this.y;
    this.phase = random(TWO_PI);
  }
  update(mode, speed, react, bAmp) {
    const s = speed * (1 + bAmp * react);
    if (mode === 'leaf') { this.x += sin(frameCount * 0.05 + this.phase) * 2; this.y += this.vy * s; this.rotAngle += this.rotSpeed; if (this.y > height + 100) this.reset(mode); }
    else if (mode === 'seed') { this.x += s * 2; this.y += sin(frameCount * 0.02 + this.phase) * 2; if (this.x > width + 100) this.reset(mode); }
    else { this.x += this.vx * s; this.y += this.vy * s; if (this.y > height + 100 || this.x > width + 100) this.reset(mode); }
  }
  display(pg, img, mode, bAmp, sc) {
    if (!img || img.width === 0) return;
    pg.push();
    pg.translate(this.x, this.y);
    pg.rotate(this.rotAngle);
    pg.image(img, 0, 0, 300 * sc * (1 + bAmp * 0.2), (300 * sc * (img.height/img.width)));
    pg.pop();
  }
}

function drawBgFX(pg, vol, bgC) {
  const fx = g('backdropFX').value;
  const inten = gv('fxInt');
  pg.strokeWeight(2 * inten);
  if (fx === 'aurora') {
    pg.noFill(); pg.stroke(varToCol(bgC, 50));
    pg.beginShape();
    for (let x = -960; x < 960; x += 20) pg.vertex(x, sin(x * 0.005 + overlayT) * 200 * vol * inten);
    pg.endShape();
  } else if (fx === 'ripple') {
    pg.noFill(); pg.stroke(varToCol(bgC, 100));
    pg.ellipse(0, 0, 500 * vol * inten, 500 * vol * inten);
  }
}

function varToCol(c, a) { return color(c[0]+50, c[1]+50, c[2]+100, a); }

function updateUI(vol) {
  if (_audio && _audio.isPlaying()) {
    const cur = _audio.currentTime(), dur = _audio.duration();
    const p2 = n => String(Math.floor(n)).padStart(2, '0');
    g('timeCode').textContent = `${p2(cur/60)}:${p2(cur%60)} / ${p2(dur/60)}:${p2(dur%60)}`;
    g('pf').style.width = (cur / dur * 100) + '%';
  }
  g('logVol').textContent = vol.toFixed(3);
  g('logFps').textContent = Math.round(frameRate());
}
</script>
</body>
</html>
