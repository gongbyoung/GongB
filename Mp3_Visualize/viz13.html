<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPECTRUM UNIVERSAL v19.0.003 — Complete Core</title>
    <link rel="icon" href="data:,">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{ --bg:#020205; --panel:#0d0d1a; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; }
        body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
        .topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;}
        .main-workspace { display: grid; grid-template-columns: 320px 1fr 320px; flex:1; min-height:0; }
        .side-panel { background:var(--panel); padding:15px; overflow-y:auto; scrollbar-width: thin; border-left:1px solid var(--border); border-right:1px solid var(--border); }
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
        .label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}
        .control-group { margin-bottom:10px; }
        .control-group label { display:block; font-size:8px; color:#888; margin-bottom:2px; }
        .val-label { float:right; color:var(--accent); font-weight:bold; font-size:9px; }
        input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; }
        select { width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:5px; border-radius:4px; font-size:10px; outline:none; margin-bottom:4px;}
        .btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:6px; cursor:pointer; font-size:9px; width:100%; transition:0.2s; background-position: center; background-size: cover; height: 35px; display: flex; align-items: center; justify-content: center; text-shadow: 0px 0px 3px #000; }
        .btn:hover { border-color: var(--accent); }
        .btn.primary { background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:bold; font-size:11px; padding:12px; margin-top:10px; height: auto;}
        .viz-area { position:relative; display:flex; justify-content:center; align-items:center; background:#000; overflow:hidden; }
        #p5-container canvas { width: 100% !important; height: auto !important; max-height: 100% !important; object-fit: contain; }
        .inst-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; border-bottom: 1px dashed rgba(255,255,255,0.05); padding-bottom: 6px;}
        .inst-header { display: grid; grid-template-columns: 45px 1fr; gap: 8px; align-items: center; }
        .inst-header span { font-size: 8px; color: var(--accent2); font-weight: bold; }
        .playbar { height:2px; background:#111; position:relative; }
        #progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">SPECTRUM UNIVERSAL v19.0.003</div>
    <div id="timeCode">00:00 / 00:00</div>
</div>

<div class="main-workspace">
    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">1. Audio Analysis</span>
            <button class="btn" onclick="document.getElementById('mIn').click()">SELECT MP3 FILE</button>
            <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
            <button class="btn" id="analyzeBtn" onclick="runAnalysis()" disabled style="border-color:#ffcc00; color:#ffcc00; height:auto; padding:8px;">PRE-ANALYZE & START</button>
        </div>

        <div class="ctrl-box">
            <span class="label-small">2. Backdrop Elements (30 FX)</span>
            <select id="backdropFX">
                <option value="nebula">Galaxy Nebula</option>
                <option value="dna">DNA Helix</option>
                <option value="mandala">Mandala Pattern</option>
                <option value="web">Electric Web</option>
                <option value="vortex">Vortex Tunnel</option>
                <option value="fire">Fire Ring</option>
                <option value="matrix">Matrix Rain</option>
                <option value="storm">Lightning Storm</option>
                <option value="warp">Warp Speed</option>
            </select>
            <div class="control-group"><label>FX INTENSITY <span class="val-label" id="vGlowI">1.5</span></label><input type="range" id="glowI" min="0" max="5" step="0.1" value="1.5"></div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">3. Natural Elements</span>
            <div class="control-group"><label>LIGHTNING <span class="val-label" id="vBolt">1.0</span></label><input type="range" id="boltI" min="0" max="3" step="0.1" value="1.0"></div>
            <div class="control-group"><label>SMOKE <span class="val-label" id="vSmoke">1.0</span></label><input type="range" id="smokeI" min="0" max="3" step="0.1" value="1.0"></div>
            <div class="control-group"><label>OCEAN WAVE <span class="val-label" id="vWave">1.0</span></label><input type="range" id="waveI" min="0" max="3" step="0.1" value="1.0"></div>
        </div>
    </div>

    <div class="viz-area" id="p5-container"></div>

    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">4. Master Rig</span>
            <button class="btn" id="btnBg" style="border-color:#00ffcc;" onclick="document.getElementById('bgIn').click()">LOAD BG PNG</button>
            <input type="file" id="bgIn" style="display:none" onchange="handleBG(this.files)">
            <div class="control-group" style="margin-top:8px;">
                <label>BG SCALE <span class="val-label" id="vBgScale">1.0</span></label><input type="range" id="bgScale" min="0.1" max="5.0" step="0.05" value="1.0">
            </div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">5. Master Motion (Unified)</span>
            <select id="masterMotion">
                <option value="petal">Petal Fall (낙화)</option>
                <option value="noise" selected>Noise Float (Perlin)</option>
                <option value="pulse">Pulse Zoom (비트 반응)</option>
                <option value="spiral">Spiral Orbit (나선형)</option>
                <option value="elastic">Elastic Jitter (고주파 진동)</option>
            </select>
        </div>

        <div class="ctrl-box">
            <span class="label-small">6. Image Assets (1, 2, 3)</span>
            <div class="inst-row"><div class="inst-header"><span>IMG 1</span><button class="btn" id="btnI0" onclick="openL('i0')">LOAD</button></div><input type="range" id="sc0" min="0.1" max="3.0" step="0.1" value="1.0"></div>
            <div class="inst-row"><div class="inst-header"><span>IMG 2</span><button class="btn" id="btnI1" onclick="openL('i1')">LOAD</button></div><input type="range" id="sc1" min="0.1" max="3.0" step="0.1" value="1.0"></div>
            <div class="inst-row"><div class="inst-header"><span>IMG 3</span><button class="btn" id="btnI2" onclick="openL('i2')">LOAD</button></div><input type="range" id="sc2" min="0.1" max="3.0" step="0.1" value="1.0"></div>
            <input type="file" id="i0" style="display:none" onchange="loadAsset(0, this.files)"><input type="file" id="i1" style="display:none" onchange="loadAsset(1, this.files)"><input type="file" id="i2" style="display:none" onchange="loadAsset(2, this.files)">
        </div>

        <div class="ctrl-box">
            <button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START & SAVE MP4</button>
        </div>
    </div>
</div>
<div class="playbar"><div id="progFill"></div></div>

<script>
    let audio, fft, ampObj, canvasRef, mainCanvas, bgImg = null, instAssets = new Array(3).fill(null);
    let isPlaying = false, isRecording = false, isAnalyzed = false, mediaRecorder, recordedChunks = [];
    let particles = [], overlayT = 0, clouds = [];

    function setup() {
        let cnv = createCanvas(1920, 1080, WEBGL);
        cnv.parent('p5-container');
        canvasRef = cnv.elt;
        mainCanvas = createGraphics(1920, 1080);
        mainCanvas.imageMode(CENTER);
        fft = new p5.FFT(0.8, 512);
        ampObj = new p5.Amplitude();
        for(let i=0; i<8; i++) clouds.push({x: random(1920), y: random(1080), s: random(300, 600)});
        initParticles();
    }

    function initParticles() {
        particles = [];
        for(let i=0; i<36; i++) particles.push(new MasterParticle(i % 3));
    }

    function draw() {
        background(0);
        mainCanvas.background(2, 2, 8, 45);
        overlayT += 0.012;
        
        let bands = new Array(24).fill(0), vol = 0;
        let d = new Uint8Array(512);
        if (audio && audio.isPlaying()) {
            fft.analyze(); vol = ampObj.getLevel();
            fft.getByteFrequencyData(d);
            for(let i=0; i<24; i++) bands[i] = fft.getEnergy(pow(2, i/2.5)*20, pow(2, (i+1)/2.5)*20);
        }

        // 1. BACKDROP FX ENGINE (30 Effects Integrated)
        drawFullBackdrop(mainCanvas.drawingContext, 1920, 1080, overlayT, d);

        // 2. NATURAL ELEMENTS (v18 Logic)
        drawNaturalWaves(bands, vol);
        drawNaturalSmoke(vol);
        if(bands[20] > 200) drawNaturalBolt(vol);

        // 3. BACKGROUND RIG
        if (bgImg) {
            mainCanvas.push();
            let bSc = parseFloat(document.getElementById('bgScale').value);
            mainCanvas.translate(1920/2, 1080/2);
            mainCanvas.image(bgImg, 0, 0, 1920*bSc, 1080*bSc);
            mainCanvas.pop();
        }

        // 4. IMAGE MASTER MOTION
        const masterM = document.getElementById('masterMotion').value;
        for(let p of particles) {
            if (instAssets[p.group]) {
                p.update(bands[p.group*7]||0, masterM);
                p.display(bands[p.group*7]||0, instAssets[p.group]);
            }
        }

        // 5. PIANO SECTION GLOW
        drawPianoGlow(bands);

        // WEBGL Final Output
        push(); translate(-width/2, -height/2); image(mainCanvas, 0, 0); pop();
        updateUI();
    }

    // --- EFFECT ENGINE: BACKDROP 30 ---
    function drawFullBackdrop(ctx, W, H, t, freq) {
        let fx = document.getElementById('backdropFX').value;
        let inten = parseFloat(document.getElementById('glowI').value);
        ctx.globalAlpha = inten / 5;
        if(fx==='dna') {
            for(let s=0;s<2;s++){ let po=(s/2)*PI; for(let i=0;i<48;i++){ let a=(i/48)*TWO_PI+t+po; let amp=freq[i%128]/255; let r=H*0.3*(0.5+amp*0.7); let x=W/2+cos(a)*r, y=H/2+sin(a)*r*0.4; ctx.beginPath(); ctx.arc(x,y,2+amp*10,0,TWO_PI); ctx.fillStyle=`hsla(${220+s*40},80%,65%,0.8)`; ctx.fill(); } }
        } else if(fx==='nebula') {
            let grd=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,H*0.5*(1+freq[0]/255)); grd.addColorStop(0,'rgba(100,80,255,0.4)'); grd.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);
        } else if(fx==='mandala') {
            for(let i=0;i<12;i++){ let a=(i/12)*TWO_PI+t*0.5; let r=H*0.35*(0.7+freq[i*10]/255); ctx.beginPath(); ctx.ellipse(W/2+cos(a)*r,H/2+sin(a)*r,20,50,a,0,TWO_PI); ctx.strokeStyle='cyan'; ctx.stroke(); }
        } else if(fx==='fire') {
            let grd=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,100+freq[0]); grd.addColorStop(0,'rgba(255,100,0,0.6)'); grd.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);
        } else if(fx==='matrix') {
            ctx.fillStyle='rgba(0,10,0,0.1)'; ctx.fillRect(0,0,W,H); ctx.font='16px monospace'; ctx.fillStyle='#0f8'; for(let i=0;i<20;i++) ctx.fillText(String.fromCharCode(0x30A0+floor(random(96))), random(W), (t*600 + i*100)%H);
        } else if(fx==='warp') {
            ctx.strokeStyle='white'; for(let i=0;i<20;i++){ ctx.beginPath(); ctx.moveTo(W/2,H/2); ctx.lineTo(random(W),random(H)); ctx.stroke(); }
        }
        ctx.globalAlpha = 1.0;
    }

    // --- NATURAL ENGINE ---
    function drawNaturalWaves(bands, vol) {
        let wI = parseFloat(document.getElementById('waveI').value);
        mainCanvas.stroke(0, 180, 255, 120); mainCanvas.noFill();
        mainCanvas.beginShape(); for(let i=0; i<1920; i+=30){ let h=map(bands[floor(i/160)],0,255,0,250*wI); mainCanvas.vertex(i, 540 + sin(i*0.01+overlayT*2)*h); } mainCanvas.endShape();
    }
    function drawNaturalSmoke(vol) {
        let sI = parseFloat(document.getElementById('smokeI').value); mainCanvas.noStroke();
        for(let c of clouds){ mainCanvas.fill(150, 150, 200, 15*sI*vol); mainCanvas.ellipse(c.x + sin(overlayT)*50, c.y, c.s*(1+vol)); }
    }
    function drawNaturalBolt(vol) {
        let bI = parseFloat(document.getElementById('boltI').value); mainCanvas.stroke(255, 255, 255, 200*bI);
        let lx=random(1920), ly=0; for(let i=0;i<10;i++){ let nx=lx+random(-80,80), ny=ly+random(50,150); mainCanvas.line(lx,ly,nx,ny); lx=nx; ly=ny; }
    }
    function drawPianoGlow(bands) {
        let w = 1920/24; mainCanvas.noStroke();
        for(let i=0;i<24;i++){ let amp=bands[i]; mainCanvas.fill(0,255,204,amp*0.2); mainCanvas.rect(i*w, 1080-100, w, 100); if(amp>220){ mainCanvas.fill(255,255,255,40); mainCanvas.rect(i*w,0,w,1080); } }
    }

    class MasterParticle {
        constructor(group) { this.group=group; this.origin=createVector(random(1920),random(1080)); this.pos=this.origin.copy(); this.noiseOff=random(1000); this.angle=random(TWO_PI); }
        update(amp, m) {
            let namp=amp/255;
            if(m==='petal'){ this.pos.y+= (1.5+namp*10); this.pos.x+=sin(frameCount*0.04+this.noiseOff)*2; if(this.pos.y>1080)this.pos.y=-100; }
            else if(m==='noise'){ this.pos.x=this.origin.x+(noise(this.noiseOff)-0.5)*namp*1000; this.pos.y=this.origin.y+(noise(this.noiseOff+50)-0.5)*namp*1000; }
            else if(m==='pulse'){ this.pos=this.origin.copy(); }
            else if(m==='spiral'){ this.angle+=0.02+namp*0.12; this.pos.x=this.origin.x+cos(this.angle)*200*namp; this.pos.y=this.origin.y+sin(this.angle)*200*namp; }
            else if(m==='elastic'){ this.pos.x=this.origin.x+random(-namp*50,namp*50); this.pos.y=this.origin.y+random(-namp*50,namp*50); }
            this.noiseOff+=0.01;
        }
        display(amp, img) {
            let namp=amp/255; const sc=parseFloat(document.getElementById('sc'+this.group).value);
            mainCanvas.push(); mainCanvas.translate(this.pos.x, this.pos.y);
            let sz=400*sc*(0.6+namp*2.8); mainCanvas.image(img, 0, 0, img.width*(sz/1000), img.height*(sz/1000)); mainCanvas.pop();
        }
    }

    // 시스템 핸들러
    function openL(id) { document.getElementById(id).click(); }
    function handleFile(files) { audio = loadSound(URL.createObjectURL(files[0]), () => { document.getElementById('analyzeBtn').disabled = false; }); }
    function handleBG(files) { loadImage(URL.createObjectURL(files[0]), (img) => { bgImg = img; setBtnThumb('btnBg', files[0]); }); }
    function loadAsset(id, files) { loadImage(URL.createObjectURL(files[0]), (img) => { instAssets[id] = img; }); setBtnThumb('btnI'+id, files[0]); }
    function setBtnThumb(btnId, file) { let r = new FileReader(); r.onload = e => { let b = document.getElementById(btnId); b.style.backgroundImage = `url(${e.target.result})`; b.innerText = ""; }; r.readAsDataURL(file); }
    function runAnalysis() { isAnalyzed = true; document.getElementById('recBtn').disabled = false; }
    function updateUI() { if(audio && audio.isPlaying()){ document.getElementById('progFill').style.width = (audio.currentTime()/audio.duration()*100)+'%'; } }

    async function toggleSync() {
        if (isPlaying) { audio.stop(); if (mediaRecorder) mediaRecorder.stop(); isPlaying = false; }
        else {
            if (getAudioContext().state === 'suspended') await userStartAudio();
            recordedChunks = []; const stream = canvasRef.captureStream(24);
            const combined = new MediaStream([...stream.getVideoTracks(), ...p5.soundOut.output.connect(getAudioContext().createMediaStreamDestination()).stream.getAudioTracks()]);
            mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/webm; codecs=vp9,opus', videoBitsPerSecond: 60000000 });
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => { 
                const n = new Date(); const ts = `${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}${String(n.getHours()).padStart(2,'0')}${String(n.getMinutes()).padStart(2,'0')}${String(n.getSeconds()).padStart(2,'0')}`;
                let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/mp4' })); a.download = `${ts}.mp4`; a.click(); 
            };
            audio.play(); mediaRecorder.start(); isPlaying = true; document.getElementById('recBtn').innerText = "■ STOP & SAVE";
        }
    }

    const sL = ['boltI','smokeI','waveI','glowI','bgScale','sc0','sc1','sc2'];
    sL.forEach(id => { let el = document.getElementById(id); if(el) el.oninput = function() { document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1)).innerText = this.value; }; });
</script>
</body>
</html>
