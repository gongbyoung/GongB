<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SPECTRUM STUDIO v22.9.0 — Professional Configurator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <script src="fx_library.js"></script>
    <style>
        :root{ --bg:#020205; --accent:#00ffcc; --accent2:#ff3377; --panel:#0a0a10; --border:rgba(0,255,204,0.15); }
        body{ background:var(--bg); color:#e0f0ff; margin:0; overflow:hidden; font-family:'Pretendard', sans-serif; display:flex; }
        
        #left-panel { width:240px; background:var(--panel); height:100vh; padding:15px; border-right:1px solid var(--border); overflow-y:auto; }
        .fx-thumb { width:100%; aspect-ratio:1.6; border:1px solid #333; margin-bottom:10px; border-radius:4px; cursor:pointer; background-size:cover; background-position:center; position:relative; overflow:hidden; }
        .fx-thumb.active { border-color:var(--accent2); box-shadow:0 0 10px var(--accent2); }
        .fx-name { position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.7); font-size:10px; padding:4px; color:var(--accent); text-align:center; }

        #canvas-container { flex:1; background:#000; display:flex; align-items:center; justify-content:center; }
        #right-panel { width:380px; background:var(--panel); height:100vh; padding:15px; border-left:1px solid var(--border); overflow-y:auto; }
        
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
        h3 { font-size:10px; color:var(--accent); margin:0 0 10px 0; }

        .slider-row { display:flex; align-items:center; gap:8px; margin-top:8px; }
        .slider-row label { font-size:9px; color:#888; width:75px; flex-shrink:0; }
        input[type=range] { flex:1; accent-color:var(--accent); height:2px; cursor:pointer; }
        .num-in { width:55px; background:#000; color:var(--accent); border:1px solid #333; font-size:10px; text-align:center; padding:3px; border-radius:2px; }

        .btn { width:100%; padding:10px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; font-size:10px; border-radius:4px; font-weight:bold; margin-top:6px; }
        .btn-sub { background:rgba(255,255,255,0.05); border:1px solid #444; color:#ccc; }
        #recBtn.active { background:var(--accent2); color:#fff; animation:blink 1s infinite; }
        @keyframes blink { 50% { opacity:0.6; } }
        #log-panel { height:100px; background:#000; border:1px solid #222; font-family:monospace; font-size:9px; color:#00ff00; padding:8px; margin-top:10px; overflow:hidden; }
    </style>
</head>
<body>

<div id="left-panel">
    <h3 style="color:var(--accent2)">FX PALETTE</h3>
    <div id="fxGrid"></div>
</div>

<div id="canvas-container"></div>

<div id="right-panel">
    <div class="ctrl-box">
        <h3>1. SYSTEM & STORAGE</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
            <button class="btn btn-sub" onclick="saveConfig()">💾 SAVE JSON</button>
            <button class="btn btn-sub" onclick="document.getElementById('confIn').click()">📂 LOAD JSON</button>
        </div>
        <input type="file" id="confIn" accept=".json" style="display:none" onchange="loadConfig(this.files)">
        <button class="btn" onclick="document.getElementById('mIn').click()">🎵 LOAD MP3</button>
        <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
        <button class="btn" id="analyzeBtn" onclick="activateEngine()" disabled>⚡ READY</button>
        <button class="btn" id="recBtn" onclick="toggleProduction()" disabled style="border-color:var(--accent2); color:var(--accent2);">🔴 START MP4 PRODUCTION</button>
    </div>

    <div class="ctrl-box">
        <h3>2. FX POSITION (X, Y)</h3>
        <div class="slider-row"><label>POS X</label><input type="range" id="mX" min="-600" max="600" value="0" oninput="uV('vMX',this.value)"><input type="number" id="vMX" class="num-in" value="0" oninput="uS('mX',this.value)"></div>
        <div class="slider-row"><label>POS Y</label><input type="range" id="mY" min="-600" max="600" value="0" oninput="uV('vMY',this.value)"><input type="number" id="vMY" class="num-in" value="0" oninput="uS('mY',this.value)"></div>
    </div>

    <div class="ctrl-box">
        <h3>3. ORIENTATION (NUMERIC)</h3>
        <div class="slider-row"><label>ROT X</label><input type="range" id="rX" min="-180" max="180" value="0" oninput="uV('vRX',this.value)"><input type="number" id="vRX" class="num-in" value="0" oninput="uS('rX',this.value)"></div>
        <div class="slider-row"><label>ROT Y</label><input type="range" id="rY" min="-180" max="180" value="0" oninput="uV('vRY',this.value)"><input type="number" id="vRY" class="num-in" value="0" oninput="uS('rY',this.value)"></div>
        <div class="slider-row"><label>ROT Z</label><input type="range" id="rZ" min="-180" max="180" value="0" oninput="uV('vRZ',this.value)"><input type="number" id="vRZ" class="num-in" value="0" oninput="uS('rZ',this.value)"></div>
    </div>

    <div class="ctrl-box">
        <h3>4. LIVE PARAMETERS</h3>
        <div class="slider-row"><label>P1: INTEN</label><input type="range" id="p1" min="1" max="200" value="50" oninput="uV('vP1',this.value)"><input type="number" id="vP1" class="num-in" value="50" oninput="uS('p1',this.value)"></div>
        <div class="slider-row"><label>P2: SCALE</label><input type="range" id="p2" min="1" max="100" step="0.1" value="5" oninput="uV('vP2',this.value)"><input type="number" id="vP2" class="num-in" value="5" step="0.1" oninput="uS('p2',this.value)"></div>
        <div class="slider-row"><label>P3: RADIUS</label><input type="range" id="p3" min="1" max="800" value="250" oninput="uV('vP3',this.value)"><input type="number" id="vP3" class="num-in" value="250" oninput="uS('p3',this.value)"></div>
    </div>

    <div id="log-panel"><div id="log-content">READY...</div></div>
</div>

<script>
    let audio, fft, subCanvas, isPlaying = false, isStarted = false, currentFX = 'matrix';
    let mediaRecorder, recordedChunks = [];
    
    // 수치 동기화 함수
    function uV(id, v){ document.getElementById(id).value = v; }
    function uS(slId, v){ document.getElementById(slId).value = v; }

    function setup() {
        let cnv = createCanvas(1280, 720, WEBGL);
        cnv.parent('canvas-container');
        subCanvas = createGraphics(1280, 720, WEBGL);
        subCanvas.colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);
        
        const grid = document.getElementById('fxGrid');
        Object.keys(window.ENGINES).forEach(id => {
            let t = document.createElement('div'); t.className = 'fx-thumb';
            t.style.backgroundImage = `url('thumbnails/palette_${id === 'ripples' ? 'ripple' : id}.png')`;
            t.innerHTML = `<div class="fx-name">${id}</div>`;
            if(id === currentFX) t.classList.add('active');
            t.onclick = () => { currentFX = id; document.querySelectorAll('.fx-thumb').forEach(x=>x.classList.remove('active')); t.classList.add('active'); };
            grid.appendChild(t);
        });
    }

    function draw() {
        background(0); subCanvas.clear();
        let bands = new Array(12).fill(0);
        if (isStarted && audio && audio.isPlaying()) {
            fft.analyze();
            for(let i=0; i<12; i++) bands[i] = fft.getEnergy(map(i,0,11,20,8000));
            document.getElementById('log-content').innerHTML = `FX: ${currentFX} | BASS: ${Math.floor(fft.getEnergy("bass"))} | TIME: ${audio.currentTime().toFixed(2)}s`;
        }

        subCanvas.push();
        // 1. POSITION (X, Y) 적용
        subCanvas.translate(parseFloat(document.getElementById('mX').value), parseFloat(document.getElementById('mY').value), 0);
        // 2. ORIENTATION (수치 입력값) 적용
        subCanvas.rotateX(radians(parseFloat(document.getElementById('vRX').value || 0)));
        subCanvas.rotateY(radians(parseFloat(document.getElementById('vRY').value || 0)));
        subCanvas.rotateZ(radians(parseFloat(document.getElementById('vRZ').value || 0)));

        if(window.ENGINES[currentFX]) {
            window.ENGINES[currentFX](subCanvas, frameCount*0.02, bands, parseFloat(document.getElementById('vP1').value), parseFloat(document.getElementById('vP2').value), parseFloat(document.getElementById('vP3').value));
        }
        subCanvas.pop();
        push(); translate(-width/2, -height/2); image(subCanvas, 0, 0); pop();
    }

    // --- JSON 설정 저장 및 로드 ---
    function saveConfig() {
        const config = {
            fx: currentFX,
            pos: { x: document.getElementById('vMX').value, y: document.getElementById('vMY').value },
            rot: { x: document.getElementById('vRX').value, y: document.getElementById('vRY').value, z: document.getElementById('vRZ').value },
            params: { p1: document.getElementById('vP1').value, p2: document.getElementById('vP2').value, p3: document.getElementById('vP3').value }
        };
        const blob = new Blob([JSON.stringify(config)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `fx_config_${currentFX}_${Date.now()}.json`; a.click();
    }

    function loadConfig(files) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const c = JSON.parse(e.target.result);
            uS('mX', c.pos.x); uV('vMX', c.pos.x);
            uS('mY', c.pos.y); uV('vMY', c.pos.y);
            uS('rX', c.rot.x); uV('vRX', c.rot.x);
            uS('rY', c.rot.y); uV('vRY', c.rot.y);
            uS('rZ', c.rot.z); uV('vRZ', c.rot.z);
            uS('p1', c.params.p1); uV('vP1', c.params.p1);
            uS('p2', c.params.p2); uV('vP2', c.params.p2);
            uS('p3', c.params.p3); uV('vP3', c.params.p3);
            currentFX = c.fx; // 썸네일 active는 수동 갱신 필요
        };
        reader.readAsText(files[0]);
    }

    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0]), () => { document.getElementById('analyzeBtn').disabled = false; }); }
    function activateEngine() { userStartAudio().then(() => { isStarted = true; document.getElementById('recBtn').disabled = false; }); }
    async function toggleProduction() { /* 기존 녹화 로직 동일 */ }
</script>
</body>
</html>
