<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SPECTRUM STUDIO v21.0.34 — Auto-Naming Master</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{ --bg:#05050a; --panel:#0d0d1a; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; }
        body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
        .topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;}
        .main-workspace { display: grid; grid-template-columns: 360px 1fr 340px; flex:1; min-height:0; }
        .side-panel { background:var(--panel); padding:15px; overflow-y:auto; scrollbar-width: thin; border-left:1px solid var(--border); border-right:1px solid var(--border); }
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
        .label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}
        .val-label { float:right; color:var(--accent); font-weight:bold; font-size:9px; }
        input[type=text] { width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:5px; border-radius:4px; font-size:10px; margin-bottom:5px; outline:none; }
        input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; margin-top:5px; }
        select { width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:5px; border-radius:4px; font-size:10px; margin-bottom:8px; outline:none; }
        .btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:6px; cursor:pointer; font-size:9px; width:100%; transition:0.2s; height: 32px; display: flex; align-items: center; justify-content: center; margin-bottom:5px;}
        .btn:hover { border-color: var(--accent); background: rgba(0,255,204,0.05); }
        .btn.primary { background:var(--accent2); border-color:var(--accent2); font-weight:bold; font-size:11px; margin-top:10px; height: auto; padding:12px; }
        .fx-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 5px; max-height: 380px; overflow-y: auto; padding-right:5px; }
        .fx-thumb { aspect-ratio: 1; border: 2px solid rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; background-size: cover; position: relative; transition: 0.2s; background-color: #111;}
        .fx-thumb.active { border-color: var(--accent2); box-shadow: 0 0 10px var(--accent2); }
        .fx-thumb::after { content: attr(data-name); position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.85); font-size: 5px; text-align: center; color: #fff; padding: 2px 0; overflow: hidden; white-space: nowrap; }
        .viz-area { position:relative; background:#000; overflow:hidden; display: flex; align-items: center; justify-content: center; }
        #p5-container canvas { width: 100% !important; height: auto !important; max-height: 100% !important; }
        .playbar { height:3px; background:#111; position:relative; }
        #progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }
    </style>
</head>
<body>

<div class="topbar"><div class="logo">SPECTRUM STUDIO v21.0.34</div><div id="timeCode">00:00 / 00:00</div></div>

<div class="main-workspace">
    <!-- LEFT: Palette & Colors -->
    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">1. Visual Palette (24 FX)</span>
            <div class="fx-grid" id="fxThumbGrid"></div>
            <button class="btn" onclick="fetchGithubAssets()" style="margin-top:8px; border-color:var(--accent2); color:var(--accent2);">☁️ FETCH CLOUD ASSETS</button>
        </div>
        <div class="ctrl-box">
            <span class="label-small">2. Visual Style & Color</span>
            <select id="colorStyle">
                <option value="hue">Standard HUE</option>
                <option value="random">Random Splash</option>
                <option value="pastel">Soft Pastel</option>
                <option value="bw">B&W Grayscale</option>
                <option value="shadow">Shadow & Glow</option>
            </select>
            <label>BASE HUE <span class="val-label" id="vFxHue">200</span></label><input type="range" id="fxHue" min="0" max="360" value="200">
            <label style="margin-top:10px; display:block;">GLOBAL SCALE <span class="val-label" id="vFxScale">1.0</span></label><input type="range" id="fxScale" min="0.1" max="5.0" step="0.1" value="1.0">
        </div>
    </div>

    <!-- CENTER -->
    <div class="viz-area" id="p5-container"></div>

    <!-- RIGHT: FX Custom & Local Save -->
    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">3. FX Custom Parameters</span>
            <label id="lblP1">DENSITY / COUNT <span class="val-label" id="vFxP1">25</span></label><input type="range" id="fxP1" min="1" max="50" value="25">
            <label id="lblP2" style="margin-top:10px; display:block;">JITTER / SPEED <span class="val-label" id="vFxP2">2.5</span></label><input type="range" id="fxP2" min="0.1" max="5.0" step="0.1" value="2.5">
            <label id="lblP3" style="margin-top:10px; display:block;">ALPHA / DEPTH <span class="val-label" id="vFxP3">150</span></label><input type="range" id="fxP3" min="10" max="255" value="150">
        </div>

        <div class="ctrl-box">
            <span class="label-small">4. Data Management</span>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                <button class="btn" onclick="saveConfig()">SAVE JSON</button>
                <button class="btn" onclick="document.getElementById('cfgIn').click()">LOAD JSON</button>
            </div>
            <input type="file" id="cfgIn" accept=".json" style="display:none" onchange="loadConfig(this.files)">
            <!-- [핵심 수정] 이름 지정 자동화 버튼 -->
            <button class="btn" onclick="saveThumbnail()" style="border-color:var(--accent); color:var(--accent); margin-top:5px; font-weight:bold;">📷 SAVE AS PALETTE_NAME.PNG</button>
        </div>

        <div class="ctrl-box">
            <span class="label-small">5. GitHub Info (For Fetching)</span>
            <input type="text" id="ghUser" placeholder="gongbyoung">
            <input type="text" id="ghRepo" placeholder="GongB">
            <input type="text" id="ghPath" placeholder="Mp3_Visualize">
            <div id="fetchStatus" style="font-size:10px; color:var(--accent); text-align:center; margin-top:5px;">IDLE</div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">6. Production</span>
            <button class="btn" onclick="document.getElementById('mIn').click()">LOAD MP3</button>
            <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
            <button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START RECORDING</button>
        </div>
    </div>
</div>
<div class="playbar"><div id="progFill"></div></div>

<script>
    let audio, fft, ampObj, canvasRef, bgCanvas, isPlaying = false, mediaRecorder, recordedChunks = [];
    let overlayT = 0, currentFXId = 'waves';

    const FX_DB = [
        {id:'waves', n:'Wave Layer'}, {id:'matrix', n:'KR Matrix'}, {id:'ripBok', n:'Rip-Bokeh'}, {id:'bokRip', n:'Bok-Ripple'},
        {id:'dna', n:'DNA Helix'}, {id:'nebula', n:'Nebula'}, {id:'mandala', n:'Mandala'}, {id:'lightning', n:'Storm'},
        {id:'web', n:'Electric Web'}, {id:'vortex', n:'Vortex Rect'}, {id:'chladni', n:'Chladni'}, {id:'starfield', n:'Star Orbit'},
        {id:'cyber', n:'Cyber Grid'}, {id:'radar', n:'Radar Scan'}, {id:'hex', n:'Hexagon'}, {id:'flow', n:'Flow Field'},
        {id:'orbit', n:'Orbit Path'}, {id:'tree', n:'Fractal Tree'}, {id:'triangles', n:'Triangle'}, {id:'spiral', n:'Spiral'},
        {id:'particles', n:'Swarm'}, {id:'tunnel', n:'Tunnel'}, {id:'warp', n:'Hyper Warp'}, {id:'ripples', n:'Ripple Circle'}
    ];

    function setup() {
        let cnv = createCanvas(1920, 1080, WEBGL); cnv.parent('p5-container'); canvasRef = cnv.elt;
        bgCanvas = createGraphics(1920, 1080); bgCanvas.imageMode(CENTER); bgCanvas.colorMode(HSB, 360, 100, 100, 100);
        frameRate(30); fft = new p5.FFT(0.8, 512); ampObj = new p5.Amplitude();
        generateThumbnails();
        loadLocalSettings();
    }

    // --- [복구 및 강화] 썸네일 자동 명명 저장 기능 ---
    function saveThumbnail() {
        // 팀장님이 업로드할 때 헷갈리지 않도록 palette_[ID].png 형식으로 강제 지정합니다.
        const fileName = 'palette_' + currentFXId;
        saveCanvas(canvasRef, fileName, 'png');
        console.log(`Saved as ${fileName}.png`);
    }

    // --- GitHub 리소스 로딩 ---
    async function fetchGithubAssets() {
        const user = document.getElementById('ghUser').value || 'gongbyoung';
        const repo = document.getElementById('ghRepo').value || 'GongB';
        let path = document.getElementById('ghPath').value || 'Mp3_Visualize';
        if(path && !path.endsWith('/')) path += '/';
        const status = document.getElementById('fetchStatus');
        status.innerText = "⏳ FETCHING...";

        FX_DB.forEach(fx => {
            const btn = document.getElementById('fxBtn_' + fx.id);
            const imgUrl = `https://raw.githubusercontent.com/${user}/${repo}/main/${path}thumbnails/palette_${fx.id}.png?v=${Date.now()}`;
            const img = new Image(); img.crossOrigin = "Anonymous";
            img.onload = () => { btn.style.backgroundImage = `url(${imgUrl})`; };
            img.src = imgUrl;
        });
        status.innerText = "✅ FETCH COMPLETE";
    }

    // --- 비주얼라이저 로직 ---
    function drawVisualCore(pg, t, bands, fI, vol) {
        const id = currentFXId;
        const h = parseFloat(document.getElementById('fxHue').value);
        const style = document.getElementById('colorStyle').value;
        const p1 = parseFloat(document.getElementById('fxP1').value);
        const p2 = parseFloat(document.getElementById('fxP2').value);
        const p3 = parseFloat(document.getElementById('fxP3').value);

        pg.strokeWeight(2 * fI); pg.noFill();
        pg.stroke(h, 80, 100, p3/255*100);

        if(id==='waves') {
            for(let j=0; j<floor(p1/3); j++){
                pg.beginShape(); for(let i=-960; i<=960; i+=60){ let y = sin(i*0.005 + t*(j*0.2 + p2)) * bands[j%12] * 2; pg.vertex(i, 200 + j*80 + y); } pg.endShape();
            }
        } else if(id==='matrix') {
            pg.textSize(p2*10+10); let chars = ['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
            for(let i=0; i<p1; i++){ let idx = floor(noise(i, floor(t*p2))*chars.length); pg.fill(h, 80, 100, p3/255*100); pg.text(chars[idx], -960+(i*(1920/p1)), (t*500+i*200)%1080-540 + bands[i%12]); }
        } else if(id==='dna') {
            for(let i=0; i<p1; i++){ pg.circle(cos(i*p2+t)*400, sin(i*p2+t)*100, 10+bands[i%12]/5); pg.circle(cos(i*p2+t+PI)*400, sin(i*p2+t+PI)*100, 10+bands[i%12]/5); }
        } else {
            for(let i=0; i<p1; i++){ pg.rotate(t*p2*0.01); pg.rect(-i*10, -i*10, i*20+bands[0], i*20); }
        }
    }

    // --- 시스템 함수들 ---
    function generateThumbnails() {
        const grid = document.getElementById('fxThumbGrid'); grid.innerHTML = "";
        let tPg = createGraphics(80, 80);
        FX_DB.forEach(fx => {
            tPg.background(15, 20, 30); tPg.push(); tPg.translate(40, 40); tPg.stroke(0,255,200); tPg.strokeWeight(2); tPg.noFill();
            if(fx.id==='waves') tPg.bezier(-25,5, -10,-15, 10,15, 25,-5);
            else if(fx.id==='matrix') { tPg.fill(0,255,100); tPg.textSize(20); tPg.text('ㄱ', -10, 10); }
            else { tPg.circle(0,0,20); tPg.line(-15,-15,15,15); }
            tPg.pop();
            let btn = document.createElement('div'); btn.className = 'fx-thumb' + (fx.id===currentFXId?' active':''); btn.setAttribute('id', 'fxBtn_' + fx.id); btn.setAttribute('data-name', fx.n); btn.style.backgroundImage = `url(${tPg.canvas.toDataURL()})`; btn.onclick = () => selectFX(fx.id); grid.appendChild(btn);
        }); tPg.remove();
    }
    function selectFX(id) { document.querySelectorAll('.fx-thumb').forEach(b=>b.classList.remove('active')); let target = document.getElementById('fxBtn_'+id); if(target) target.classList.add('active'); currentFXId = id; bgCanvas.clear(); }
    function saveConfig() { const cfg = { id: currentFXId, hu: document.getElementById('fxHue').value, p1: document.getElementById('fxP1').value, p2: document.getElementById('fxP2').value, p3: document.getElementById('fxP3').value }; const blob = new Blob([JSON.stringify(cfg)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `config_${currentFXId}.json`; a.click(); }
    function loadConfig(files) { const reader = new FileReader(); reader.onload = e => { const cfg = JSON.parse(e.target.result); selectFX(cfg.id); document.getElementById('fxHue').value = cfg.hu; document.getElementById('fxP1').value = cfg.p1; document.getElementById('fxP2').value = cfg.p2; document.getElementById('fxP3').value = cfg.p3; }; reader.readAsText(files[0]); }
    function draw() { background(2, 2, 8); bgCanvas.clear(); let bands = new Array(12).fill(0), vol = 0; if (audio && audio.isPlaying()) { fft.analyze(); vol = ampObj.getLevel(); for(let i=0; i<12; i++) bands[i] = fft.getEnergy(pow(2, i/1.2)*20, pow(2, (i+1)/1.2)*20); } overlayT += 0.03; bgCanvas.push(); let fSc = parseFloat(document.getElementById('fxScale').value); bgCanvas.translate(960, 540); bgCanvas.scale(fSc); drawVisualCore(bgCanvas, overlayT, bands, 1.5, vol); bgCanvas.pop(); push(); translate(-width/2, -height/2); image(bgCanvas, 0, 0); pop(); updateUI(); }
    function handleFile(files) { audio = loadSound(URL.createObjectURL(files[0]), () => { document.getElementById('recBtn').disabled = false; }); }
    function updateUI() { if(audio && audio.isPlaying()){ document.getElementById('progFill').style.width = (audio.currentTime()/audio.duration()*100)+'%'; let m = floor(audio.currentTime()/60), s = floor(audio.currentTime()%60); document.getElementById('timeCode').innerText = `${nf(m,2)}:${nf(s,2)} / ${nf(floor(audio.duration()/60),2)}:${nf(floor(audio.duration()%60),2)}`; } }
    async function toggleSync() { if (isPlaying) { audio.stop(); isPlaying = false; } else { if (getAudioContext().state === 'suspended') await userStartAudio(); recordedChunks = []; const dest = getAudioContext().createMediaStreamDestination(); p5.soundOut.output.connect(dest); mediaRecorder = new MediaRecorder(new MediaStream([...canvasRef.captureStream(30).getVideoTracks(), ...dest.stream.getAudioTracks()]), { videoBitsPerSecond: 80000000 }); mediaRecorder.ondataavailable = e => recordedChunks.push(e.data); mediaRecorder.onstop = () => { let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/mp4' })); a.download = `VFX_PRO_${year()}${nf(month(),2)}${nf(day(),2)}.mp4`; a.click(); }; audio.play(); mediaRecorder.start(); isPlaying = true; document.getElementById('recBtn').innerText = "■ STOP & SAVE"; } }
    function loadLocalSettings() { const info = JSON.parse(localStorage.getItem('spectrum_gh_info')); if(info) { document.getElementById('ghUser').value = info.user || "gongbyoung"; document.getElementById('ghRepo').value = info.repo || "GongB"; document.getElementById('ghPath').value = info.path || "Mp3_Visualize"; } }
    setInterval(() => { ['fxScale','fxHue','fxP1','fxP2','fxP3'].forEach(id => { let el = document.getElementById(id); if(el) document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1)).innerText = el.value; }); }, 100);
</script>
</body>
</html>
