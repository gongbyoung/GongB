<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPECTRUM NATURAL v18.0.001</title>
    <link rel="icon" href="data:,">
    <script src="p5.min.js"></script>
    <script src="p5.sound.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{ --bg:#020205; --panel:#0d0d1a; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; }
        body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
        .topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;}
        .main-workspace { display: grid; grid-template-columns: 320px 1fr 320px; flex:1; min-height:0; }
        .side-panel { background:var(--panel); padding:15px; overflow-y:auto; scrollbar-width: thin; border-left:1px solid var(--border); border-right:1px solid var(--border); }
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
        .label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}
        .control-group { margin-bottom:10px; }
        .control-group label { display:block; font-size:8px; color:#888; margin-bottom:2px; }
        .val-label { float:right; color:var(--accent); font-weight:bold; font-size:9px; }
        input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; }
        .btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:6px; cursor:pointer; font-size:9px; width:100%; transition:0.2s; background-position: center; background-size: cover; height: 32px; display: flex; align-items: center; justify-content: center; }
        .btn:hover { border-color: var(--accent); }
        .btn.primary { background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:bold; font-size:11px; padding:12px; margin-top:10px; height: auto;}
        .viz-area { position:relative; display:flex; justify-content:center; align-items:center; background:#000; overflow:hidden; }
        #p5-container canvas { width: 100% !important; height: auto !important; max-height: 100% !important; object-fit: contain; }
        .inst-slot { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 5px; align-items: center; margin-bottom: 5px; }
        .inst-slot span { font-size: 8px; color: var(--accent2); font-weight: bold; }
        .playbar { height:2px; background:#111; position:relative; }
        #progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">SPECTRUM NATURAL v18.0.001</div>
    <div id="timeCode">00:00 / 00:00</div>
</div>

<div class="main-workspace">
    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">1. Audio Analysis</span>
            <button class="btn" onclick="document.getElementById('mIn').click()">SELECT MP3 FILE</button>
            <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
            <button class="btn" id="analyzeBtn" onclick="runAnalysis()" disabled style="border-color:#ffcc00; color:#ffcc00; margin-top:5px; height:auto; padding:8px;">PRE-ANALYZE & START</button>
        </div>

        <div class="ctrl-box">
            <span class="label-small">2. Natural Elements (Intensity)</span>
            <div class="control-group"><label>LIGHTNING STRENGTH <span class="val-label" id="vBolt">1.0</span></label><input type="range" id="boltI" min="0" max="3" step="0.1" value="1.0"></div>
            <div class="control-group"><label>PYRO SMOKE DENSITY <span class="val-label" id="vSmoke">1.0</span></label><input type="range" id="smokeI" min="0" max="3" step="0.1" value="1.0"></div>
            <div class="control-group"><label>OCEAN WAVE HEIGHT <span class="val-label" id="vWave">1.0</span></label><input type="range" id="waveI" min="0" max="3" step="0.1" value="1.0"></div>
        </div>
        
        <div class="ctrl-box">
            <span class="label-small">3. Style & VFX Theme</span>
            <select id="colorTheme" onchange="updateColors()"><option value="cyberpunk">Cyberpunk</option><option value="pastel">Pastel</option><option value="retro">Retro</option><option value="minimalist">Minimalist</option></select>
        </div>
    </div>

    <div class="viz-area" id="p5-container"></div>

    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">4. Background Rig</span>
            <button class="btn" id="btnBg" style="border-color:#00ffcc;" onclick="document.getElementById('bgIn').click()">LOAD BG PNG</button>
            <input type="file" id="bgIn" style="display:none" onchange="handleBG(this.files)">
            <div class="control-group" style="margin-top:8px;">
                <label>BG SCALE <span class="val-label" id="vBgScale">1.0</span></label>
                <input type="range" id="bgScale" min="0.5" max="3.0" step="0.05" value="1.0">
            </div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">5. Image Assets (Scatters)</span>
            <div class="inst-slot"><span>KICK</span><button class="btn" onclick="openL('i0')">LOAD</button><input type="range" id="sc0" min="0.1" max="2" step="0.1" value="1"></div>
            <div class="inst-slot"><span>SNARE</span><button class="btn" onclick="openL('i1')">LOAD</button><input type="range" id="sc1" min="0.1" max="2" step="0.1" value="1"></div>
            <div class="inst-slot"><span>HIHAT</span><button class="btn" onclick="openL('i2')">LOAD</button><input type="range" id="sc2" min="0.1" max="2" step="0.1" value="1"></div>
            
            <input type="file" id="i0" style="display:none" onchange="loadAsset(0, this.files)"><input type="file" id="i1" style="display:none" onchange="loadAsset(1, this.files)"><input type="file" id="i2" style="display:none" onchange="loadAsset(2, this.files)">
        </div>

        <div class="ctrl-box">
            <span class="label-small">6. Dynamics & Record</span>
            <div class="control-group"><label>GRAVITY <span class="val-label" id="vGrav">0.0</span></label><input type="range" id="grav" min="0" max="1" step="0.05" value="0"></div>
            <button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ PRE-ANALYZE & SAVE MP4</button>
        </div>
    </div>
</div>

<div class="playbar"><div id="progFill"></div></div>

<script>
    let audio, fft, ampObj, canvasRef, mainCanvas, bgImg = null, instAssets = new Array(3).fill(null);
    let isPlaying = false, isRecording = false, isAnalyzed = false, mediaRecorder, recordedChunks = [];
    let clouds = [];

    function setup() {
        let cnv = createCanvas(1920, 1080, WEBGL);
        cnv.parent('p5-container');
        canvasRef = cnv.elt;
        mainCanvas = createGraphics(1920, 1080);
        mainCanvas.colorMode(RGB, 255);
        mainCanvas.imageMode(CENTER);
        fft = new p5.FFT(0.8, 256);
        ampObj = new p5.Amplitude();
        
        // 저음 Smog/Cloud 데이터
        for(let i=0; i<8; i++) clouds.push({x: random(width), y: random(height), s: random(300, 600)});
    }

    function draw() {
        mainCanvas.background(2, 2, 8, 40);
        let bands = new Array(24).fill(0), vol = 0;
        
        if (audio && audio.isPlaying()) {
            fft.analyze(); vol = ampObj.getLevel();
            for(let i=0; i<24; i++) bands[i] = fft.getEnergy(pow(2, i/2)*20, pow(2, (i+1)/2)*20) / 255;
        } else {
            mainCanvas.push(); mainCanvas.fill(255, 100); mainCanvas.textAlign(CENTER); mainCanvas.textSize(mainCanvas.width*0.015);
            mainCanvas.text("LOAD MP3 & PRE-ANALYZE v18.0.001", mainCanvas.width/2, mainCanvas.height/2); mainCanvas.pop();
        }

        // --- NATURAL ELEMENTS ENGINE (v18) ---

        // 7. Piano Sections (하단 Glow 섹션)
        drawPianoGlow(bands);

        // 5. Ocean Wave (사인파 Mesh)
        drawOceanWave(bands);

        // 2. Pyro Smog/Cloud (흐릿한 덩어리)
        drawSmog(fft.getEnergy("bass") / 255);

        // 1, 4. Lightning Bolt (거미줄 번개 & 화면 전체 Glow)
        if (fft.getEnergy("treble") > 160) drawLightning(vol);

        // 3. Fireworks Explosion (입자 폭발)
        if (fft.getEnergy("kick") > 210) drawFireworks(vol);

        // 6. Ripple Wave (퍼지는 파형)
        drawRipple(vol);

        // --- BG & Assets ( v17 통합) ---
        if (bgImg) {
            mainCanvas.push(); mainCanvas.translate(mainCanvas.width/2, mainCanvas.height/2);
            let bSc = parseFloat(document.getElementById('bgScale').value);
            mainCanvas.image(bgImg, 0, 0, mainCanvas.width * bSc * (1.0+(bands[2]||0)*0.03), mainCanvas.height * bSc * (1.0+(bands[2]||0)*0.03));
            mainCanvas.pop();
        }
        
        // 이미지 Scatter 처리 ( 효과 우선 매칭)
        drawScatterAssets(vol, instAssets);

        // WEBGL 메인 캔버스에 그리기
        push(); translate(-width/2, -height/2); image(mainCanvas, 0, 0); pop();
        updateUI();
    }

    // --- 비주얼라이징 모듈 (v18 Natural Engine) ---

    function drawPianoGlow(bands) {
        let sections = 24;
        let w = mainCanvas.width / sections;
        mainCanvas.noStroke();
        for(let i=0; i<sections; i++) {
            let amp = bands[i];
            mainCanvas.fill(0, 255, 204, amp * 0.2);
            mainCanvas.rect(i*w, mainCanvas.height - 150, w, 150);
            if(amp > 220) { // Glow 효과
                mainCanvas.fill(0, 255, 204, 50);
                mainCanvas.rect(i*w, 0, w, mainCanvas.height);
            }
        }
    }

    function drawOceanWave(bands) {
        let wI = parseFloat(document.getElementById('waveI').value);
        mainCanvas.noFill();
        mainCanvas.stroke(0, 180, 255, 100);
        mainCanvas.beginShape();
        for(let i=0; i<mainCanvas.width; i+=20) {
            let idx = floor(map(i, 0, mainCanvas.width, 0, 12));
            let h = map(bands[idx], 0, 255, 0, 200 * wI);
            mainCanvas.vertex(i, mainCanvas.height/2 + sin(i*0.01 + frameCount*0.05) * h);
        }
        mainCanvas.endShape();
    }

    function drawSmog(bass) {
        let sI = parseFloat(document.getElementById('smokeI').value);
        mainCanvas.noStroke();
        for(let c of clouds) {
            mainCanvas.fill(120, 120, 180, 10 * sI * bass); // 흐릿하고 불분명한 덩어리
            mainCanvas.ellipse(c.x + sin(frameCount*0.01)*50, c.y, c.s * (1+bass));
        }
    }

    function drawLightning(vol) {
        let bI = parseFloat(document.getElementById('boltI').value);
        mainCanvas.stroke(200, 255, 255, 220 * bI);
        mainCanvas.strokeWeight(3 * bI);
        let lx = random(mainCanvas.width), ly = 0;
        for(let i=0; i<12; i++){
            let nx = lx + random(-60, 60);
            let ny = ly + random(40, 120);
            mainCanvas.line(lx, ly, nx, ny);
            lx = nx; ly = ny;
        }
        // 화면 전체 Flash Glow
        mainCanvas.fill(255, 255, 255, 40 * bI);
        mainCanvas.rect(0,0,mainCanvas.width,mainCanvas.height);
    }

    function drawFireworks(vol) {
        for(let i=0; i<20; i++){
            let r = random(50, 150) * vol;
            mainCanvas.noFill();
            mainCanvas.stroke(255, 100, 0, 150);
            mainCanvas.line(width/2, height/2, width/2 + cos(random(TWO_PI))*r, height/2 + sin(random(TWO_PI))*r);
        }
    }

    function drawRipple(vol) {
        mainCanvas.noFill();
        mainCanvas.stroke(255, 255, 255, 180);
        mainCanvas.circle(width/2, height/2, 100 + vol * 1200);
    }

    function drawScatterAssets(vol, assets) {
        // 이미지를 펄싱하는 입자들로 처리 ( v17 style 통합)
        mainCanvas.noStroke();
        for(let i=0; i<assets.length; i++){
            let img = assets[i];
            if(img) {
                let sc = parseFloat(document.getElementById('sc'+i).value);
                let sz = (200 + sin(frameCount*0.02 + i)*100) * sc * (1 + vol*1.5);
                mainCanvas.push();
                mainCanvas.translate(mainCanvas.width/3 + i*mainCanvas.width/3, mainCanvas.height/3);
                mainCanvas.image(img, 0, 0, img.width*(sz/900), img.height*(sz/900));
                mainCanvas.pop();
            }
        }
    }

    // --- 시스템 핸들러 ---
    function handleFile(files) { audio = loadSound(URL.createObjectURL(files[0]), () => { document.getElementById('analyzeBtn').disabled = false; }); }
    function handleBG(files) { loadImage(URL.createObjectURL(files[0]), (img) => { bgImg = img; setBtnThumb('btnBg', files[0]); }); }
    function loadAsset(id, files) { loadImage(URL.createObjectURL(files[0]), (img) => { instAssets[id] = img; setBtnThumb('btnI'+id, files[0]); }); }
    function setBtnThumb(btnId, file) {
        let reader = new FileReader();
        reader.onload = e => { document.getElementById(btnId).style.backgroundImage = `url(${e.target.result})`; document.getElementById(btnId).innerText = ""; }
        reader.readAsDataURL(file);
    }
    function runAnalysis() { isAnalyzed = true; document.getElementById('recBtn').disabled = false; }
    function updateUI() { if(audio && audio.isPlaying()){ document.getElementById('progFill').style.width = (audio.currentTime()/audio.duration()*100)+'%'; } }

    async function toggleSync() {
        if (isPlaying) { audio.stop(); if (mediaRecorder) mediaRecorder.stop(); isPlaying = false; document.getElementById('recBtn').innerText = "▶ START & SAVE MP4"; }
        else {
            if (getAudioContext().state === 'suspended') await userStartAudio();
            recordedChunks = []; const stream = canvasRef.captureStream(24);
            const dest = getAudioContext().createMediaStreamDestination(); p5.soundOut.output.connect(dest);
            const combined = new MediaStream([...stream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
            mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/webm; codecs=vp9,opus', videoBitsPerSecond: 80000000 });
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => { 
                const n = new Date();
                // [Master Format] MMDDHHmmss.mp4
                const ts = `${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}${String(n.getHours()).padStart(2,'0')}${String(n.getMinutes()).padStart(2,'0')}${String(n.getSeconds()).padStart(2,'0')}`;
                let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/mp4' })); a.download = `${ts}.mp4`; a.click(); 
            };
            audio.play(); mediaRecorder.start(); isPlaying = true; document.getElementById('recBtn').innerText = "■ STOP & SAVE";
        }
    }

    const sL = ['boltI','smokeI','waveI','grav','bgScale','sc0','sc1','sc2'];
    sL.forEach(id => {
        let el = document.getElementById(id);
        if(el) el.oninput = function() { document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1)).innerText = this.value; };
    });
</script>
</body>
</html>
