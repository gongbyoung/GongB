<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SPECTRUM STUDIO v21.0.44 — Deep Link Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <script src="fx_library.js" onload="isLibraryReady = true;"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{ --bg:#05050a; --panel:#0d0d1a; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; }
        body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
        .topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;}
        .main-workspace { display: grid; grid-template-columns: 360px 1fr 340px; flex:1; min-height:0; }
        .side-panel { background:var(--panel); padding:15px; overflow-y:auto; scrollbar-width: thin; border-left:1px solid var(--border); border-right:1px solid var(--border); display: flex; flex-direction: column; }
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
        .fx-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .fx-thumb { aspect-ratio: 1; border: 2px solid rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; background-color: #111; position: relative; background-size: cover; background-position: center; }
        .fx-thumb.active { border-color: var(--accent2); box-shadow: 0 0 10px var(--accent2); }
        .fx-thumb::after { content: attr(data-name); position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); font-size: 5px; text-align: center; color: #fff; padding: 2px 0; border-radius: 0 0 4px 4px; overflow: hidden; white-space: nowrap; }
        .log-panel { background:#000; border:1px solid #222; border-radius:4px; padding:10px; flex:1; overflow-y:auto; font-family: monospace; font-size:10px; color: #888; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #111; }
        .log-success { color: var(--accent); }
        .log-error { color: var(--accent2); }
        .viz-area { position:relative; background:#000; display: flex; align-items: center; justify-content: center; flex:1; }
        #p5-container canvas { width: 100% !important; height: auto !important; max-height: 100% !important; }
        .btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:6px; cursor:pointer; font-size:9px; width:100%; height: 32px; margin-bottom:5px; transition: 0.2s; }
        .btn:hover { border-color: var(--accent); }
        input[type=text] { width:100%; background:#000; border:1px solid #333; color:#fff; padding:5px; font-size:10px; margin-bottom:5px; border-radius:4px; outline:none; }
    </style>
</head>
<body>

<div class="topbar"><div class="logo">SPECTRUM STUDIO v21.0.44</div><div id="timeCode">00:00 / 00:00</div></div>

<div class="main-workspace">
    <div class="side-panel">
        <div class="ctrl-box">
            <span style="font-size:9px; color:var(--accent);">1. VISUAL PALETTE</span>
            <div class="fx-grid" id="fxThumbGrid"></div>
            <button class="btn" onclick="fetchGithubAssets(true)" style="margin-top:10px; color:var(--accent2); border-color:var(--accent2); font-weight:bold;">☁️ FORCE SYNC CLOUD PNG</button>
        </div>
        <div class="ctrl-box">
            <span style="font-size:9px; color:var(--accent);">2. ENGINE CONTROL</span>
            <button class="btn" id="analyzeBtn" onclick="activateEngine()" disabled>⚡ PRE-ANALYZE AUDIO</button>
        </div>
    </div>

    <div class="viz-area" id="p5-container"></div>

    <div class="side-panel">
        <div class="ctrl-box">
            <span style="font-size:9px; color:var(--accent);">3. CLOUD PATH SETTINGS</span>
            <input type="text" id="ghUser" value="gongbyoung" onchange="saveSet()">
            <input type="text" id="ghRepo" value="GongB" onchange="saveSet()">
            <input type="text" id="ghPath" value="Mp3_Visualize" onchange="saveSet()">
        </div>
        <div class="ctrl-box">
            <button class="btn" onclick="saveThumbnail()">📷 SAVE CURRENT FX PNG</button>
            <button class="btn" onclick="document.getElementById('mIn').click()">1. LOAD MP3</button>
            <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
            <button class="btn" id="recBtn" onclick="toggleSync()" disabled style="background:var(--accent2); border:none;">2. START PRODUCTION</button>
        </div>
        <div class="log-panel" id="logPanel"></div>
    </div>
</div>

<script>
    let audio, fft, canvasRef, bgCanvas, isPlaying = false, currentFXId = '';
    let isLibraryReady = false, isEngineActive = false;

    function addLog(msg, type = 'info') {
        const p = document.getElementById('logPanel');
        const e = document.createElement('div');
        e.className = `log-entry log-${type}`;
        e.innerText = `> ${msg}`;
        p.appendChild(e); p.scrollTop = p.scrollHeight;
    }

    function setup() {
        let cnv = createCanvas(1920, 1080, WEBGL); cnv.parent('p5-container'); canvasRef = cnv.elt;
        bgCanvas = createGraphics(1920, 1080); bgCanvas.imageMode(CENTER); bgCanvas.colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);
        
        let check = setInterval(() => {
            if(window.FX_ENGINES) {
                generateThumbnails();
                loadSet();
                clearInterval(check);
            }
        }, 200);
    }

    function generateThumbnails() {
        const grid = document.getElementById('fxThumbGrid');
        grid.innerHTML = '';
        const keys = Object.keys(FX_ENGINES);
        keys.forEach(id => {
            // ID에 공백이 있을 경우를 대비해 트림 처리
            const cleanId = id.trim();
            let b = document.createElement('div'); b.className = 'fx-thumb'; b.id = 'fxBtn_' + cleanId;
            b.setAttribute('data-name', cleanId.replace(/_/g,' ').toUpperCase());
            b.onclick = () => { 
                currentFXId = id; 
                document.querySelectorAll('.fx-thumb').forEach(el => el.classList.remove('active')); 
                b.classList.add('active'); 
                addLog(`Selected: ${cleanId}`);
            };
            grid.appendChild(b);
        });
        if (keys.length > 0) {
            currentFXId = keys[0];
            const first = document.getElementById('fxBtn_' + currentFXId.trim());
            if(first) first.classList.add('active');
        }
    }

    // --- [중요] 주소 체계 수정 및 Null 체크 보강 ---
    async function fetchGithubAssets(force = false) {
        const u = document.getElementById('ghUser').value.trim();
        const r = document.getElementById('ghRepo').value.trim();
        const p = document.getElementById('ghPath').value.trim().replace(/^\/|\/$/g, '');
        
        const keys = Object.keys(FX_ENGINES);
        addLog(`Syncing Cloud Assets...`, "info");

        keys.forEach(id => {
            const cleanId = id.trim();
            // 공백을 언더바(_)로 강제 치환하여 주소 생성
            const fileName = `palette_${cleanId.replace(/\s+/g, '_')}.png`;
            const url = `https://raw.githubusercontent.com/${u}/${r}/main/${p}/thumbnails/${fileName}${force ? '?v='+Date.now() : ''}`;
            
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => {
                const btn = document.getElementById('fxBtn_' + cleanId);
                if(btn) {
                    btn.style.backgroundImage = `url(${url})`;
                }
            };
            img.onerror = () => { addLog(`404 Not Found: ${fileName}`, "error"); };
            img.src = url;
        });
    }

    function activateEngine() {
        if (!audio) return;
        userStartAudio().then(() => {
            isEngineActive = true;
            addLog("Audio Engine Activated", "success");
            document.getElementById('analyzeBtn').innerText = "✅ ANALYZE ACTIVE";
            document.getElementById('recBtn').disabled = false;
        });
    }

    function draw() {
        background(2, 2, 8); bgCanvas.clear();
        let bands = new Array(12).fill(0);
        if (isEngineActive && audio && audio.isPlaying()) {
            let spectrum = fft.analyze();
            for (let i = 0; i < 12; i++) {
                let start = floor(map(i, 0, 12, 0, spectrum.length * 0.4));
                let end = floor(map(i + 1, 0, 12, 0, spectrum.length * 0.4));
                let sum = 0; for (let j = start; j < end; j++) sum += spectrum[j];
                bands[i] = sum / (end - start || 1);
            }
        }
        bgCanvas.push(); bgCanvas.translate(960, 540);
        if (window.FX_ENGINES && FX_ENGINES[currentFXId]) {
            FX_ENGINES[currentFXId](bgCanvas, frameCount * 0.02, bands, 1.5, parseFloat(document.getElementById('fxHue').value), "hue", 25, 2.5, 150);
        }
        bgCanvas.pop();
        push(); translate(-width/2, -height/2); image(bgCanvas, 0, 0); pop();
    }

    function handleFile(files) { audio = loadSound(URL.createObjectURL(files[0]), () => { document.getElementById('analyzeBtn').disabled = false; addLog("MP3 Loaded"); }); }
    function saveThumbnail() { saveCanvas(canvasRef, 'palette_'+currentFXId.trim(), 'png'); }
    function saveSet() { localStorage.setItem('vfx_set_v2', JSON.stringify({u:document.getElementById('ghUser').value, r:document.getElementById('ghRepo').value, p:document.getElementById('ghPath').value})); }
    function loadSet() { const s = JSON.parse(localStorage.getItem('vfx_set_v2')); if(s){ document.getElementById('ghUser').value=s.u; document.getElementById('ghRepo').value=s.r; document.getElementById('ghPath').value=s.p; fetchGithubAssets(); } }
    async function toggleSync() { if (isPlaying) { audio.stop(); isPlaying = false; } else { audio.play(); isPlaying = true; } }
</script>
</body>
</html>
