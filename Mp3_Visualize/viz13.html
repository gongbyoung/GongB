<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SPECTRUM STUDIO v22.7.0 — UI Restored</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <script src="fx_library.js"></script>
    <style>
        :root{ --bg:#05050a; --panel:#0d0d1a; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); }
        body{ background:var(--bg); color:#e0f0ff; font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; margin:0; }
        
        /* v21.1.8 스타일 레이아웃 복구 */
        .side-panel { width:340px; background:var(--panel); padding:15px; overflow-y:auto; border-right:1px solid var(--border); border-left:1px solid var(--border); }
        .viz-area { flex:1; background:#000; display: flex; align-items: center; justify-content: center; }
        
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
        .fx-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .fx-thumb { aspect-ratio: 1; border: 1px solid #333; border-radius: 4px; cursor: pointer; background:#111; font-size:7px; display:flex; align-items:center; justify-content:center; text-align:center; }
        .fx-thumb.active { border-color: var(--accent2); color: var(--accent2); box-shadow: 0 0 10px var(--accent2); }
        
        .slider-row { margin-top:8px; }
        input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; }
        .num-in { width:55px; background:#000; color:var(--accent); border:1px solid #333; font-size:10px; text-align:center; padding:3px; }
        .btn { width:100%; padding:8px; background:transparent; border:1px solid var(--accent); color:#fff; cursor:pointer; font-size:10px; border-radius:4px; margin-top:5px; }
        #recBtn { border-color: var(--accent2); color: var(--accent2); font-weight:bold; }
    </style>
</head>
<body>

<!-- 왼쪽: FX 선택 -->
<div class="side-panel">
    <div class="ctrl-box">
        <h3 style="font-size:10px; color:var(--accent);">1. FX PALETTE</h3>
        <div class="fx-grid" id="fxGrid"></div>
    </div>
    <div class="ctrl-box">
        <h3 style="font-size:10px; color:var(--accent);">2. SYSTEM</h3>
        <button class="btn" onclick="document.getElementById('mIn').click()">🎵 LOAD MP3</button>
        <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
        <button class="btn" id="analyzeBtn" onclick="activateEngine()" disabled>⚡ READY</button>
    </div>
</div>

<!-- 중앙: 캔버스 -->
<div class="viz-area" id="p5-container"></div>

<!-- 오른쪽: 파라미터 -->
<div class="side-panel">
    <div class="ctrl-box">
        <h3 style="font-size:10px; color:var(--accent);">3. MASTER CONTROL</h3>
        <label style="font-size:8px;">POS X / Y</label>
        <div class="slider-row"><input type="range" id="mX" min="-600" max="600" value="0" oninput="uV('vMX',this.value)"><input type="number" id="vMX" class="num-in" value="0" oninput="uS('mX',this.value)"></div>
        <div class="slider-row"><input type="range" id="mY" min="-600" max="600" value="0" oninput="uV('vMY',this.value)"><input type="number" id="vMY" class="num-in" value="0" oninput="uS('mY',this.value)"></div>
        <label style="font-size:8px;">ROTATION X / Y / Z</label>
        <input type="range" id="rX" min="-180" max="180" value="0">
        <input type="range" id="rY" min="-180" max="180" value="0">
        <input type="range" id="rZ" min="-180" max="180" value="0">
    </div>

    <div class="ctrl-box">
        <h3 style="font-size:10px; color:var(--accent);">4. LIVE PARAMETERS</h3>
        <div class="slider-row"><label style="font-size:8px;">P1</label><input type="range" id="p1" min="1" max="200" value="50" oninput="uV('vP1',this.value)"><input type="number" id="vP1" class="num-in" value="50" oninput="uS('p1',this.value)"></div>
        <div class="slider-row"><label style="font-size:8px;">P2</label><input type="range" id="p2" min="0.1" max="20" step="0.1" value="2" oninput="uV('vP2',this.value)"><input type="number" id="vP2" class="num-in" value="2" step="0.1" oninput="uS('p2',this.value)"></div>
        <div class="slider-row"><label style="font-size:8px;">P3</label><input type="range" id="p3" min="1" max="500" value="150" oninput="uV('vP3',this.value)"><input type="number" id="vP3" class="num-in" value="150" oninput="uS('p3',this.value)"></div>
    </div>

    <button class="btn" id="recBtn" onclick="toggleProduction()" disabled>🔴 START MP4 (H.264)</button>
</div>

<script>
    let audio, fft, subCanvas, isPlaying = false, isStarted = false, currentFX = 'matrix';
    let mediaRecorder, recordedChunks = [];
    
    function uV(id, v){ document.getElementById(id).value = v; }
    function uS(slId, v){ document.getElementById(slId).value = v; }

    function setup() {
        let cnv = createCanvas(1280, 720, WEBGL);
        cnv.parent('p5-container');
        subCanvas = createGraphics(1280, 720, WEBGL);
        subCanvas.colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);
        
        let checkLib = setInterval(() => {
            if (window.ENGINES) {
                const grid = document.getElementById('fxGrid');
                const keys = Object.keys(window.ENGINES);
                keys.forEach(id => {
                    let b = document.createElement('div'); b.className = 'fx-thumb'; b.innerText = id.toUpperCase();
                    if(id === currentFX) b.classList.add('active');
                    b.onclick = () => { currentFX = id; document.querySelectorAll('.fx-thumb').forEach(x=>x.classList.remove('active')); b.classList.add('active'); };
                    grid.appendChild(b);
                });
                clearInterval(checkLib);
            }
        }, 300);
        
        const scale = Math.min((windowWidth-680)/1280, windowHeight/720) * 0.95;
        cnv.elt.style.transform = `scale(${scale})`;
    }

    function draw() {
        background(0); subCanvas.clear();
        let bands = new Array(12).fill(0), fI = 1.0;
        if (isStarted && audio && audio.isPlaying()) {
            fft.analyze();
            for(let i=0; i<12; i++) bands[i] = fft.getEnergy(map(i,0,11,20,8000));
            fI = map(bands[0], 0, 255, 0.8, 4.0);
        }
        subCanvas.push();
        subCanvas.translate(parseFloat(document.getElementById('mX').value), parseFloat(document.getElementById('mY').value), 0);
        subCanvas.rotateX(radians(parseFloat(document.getElementById('rX').value)));
        subCanvas.rotateY(radians(parseFloat(document.getElementById('rY').value)));
        subCanvas.rotateZ(radians(parseFloat(document.getElementById('rZ').value)));
        if(window.ENGINES && window.ENGINES[currentFX]) {
            window.ENGINES[currentFX](subCanvas, frameCount*0.02, bands, parseFloat(document.getElementById('p1').value), parseFloat(document.getElementById('p2').value), parseFloat(document.getElementById('p3').value));
        }
        subCanvas.pop();
        push(); translate(-width/2, -height/2); image(subCanvas, 0, 0); pop();
    }

    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0]), () => { document.getElementById('analyzeBtn').disabled=false; }); }
    function activateEngine() { userStartAudio().then(()=>{ isStarted=true; document.getElementById('recBtn').disabled=false; }); }

    async function toggleProduction() {
        if(isPlaying) {
            audio.stop(); isPlaying = false; mediaRecorder.stop();
            document.getElementById('recBtn').innerText = "🔴 START MP4 (H.264)";
        } else {
            recordedChunks = [];
            const stream = document.querySelector('canvas').captureStream(60);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/mp4; codecs=avc1' });
            mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = `spectrum_studio_${Date.now()}.mp4`; a.click();
            };
            mediaRecorder.start(); audio.play(); isPlaying = true; isStarted = true;
            document.getElementById('recBtn').innerText = "⏹ STOP & SAVE";
        }
    }
</script>
</body>
</html>
