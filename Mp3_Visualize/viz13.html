<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM GENERATIVE v21.0.02</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;800&family=Space+Mono:wght@400;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#04040a;--panel:#090912; --a1:#00e5cc;--a2:#ff3d7f;--a3:#ffe066; --border:rgba(0,229,204,0.15);--text:#c8dde8;--dim:#445566; }
html,body{height:100%;overflow:hidden; background:var(--bg); color:var(--text); font-family:'Space Mono',monospace;}
.topbar{ height:42px;background:var(--panel);border-bottom:1px solid var(--border); display:flex;align-items:center;padding:0 20px;gap:20px; }
.logo{font-family:'Oxanium',sans-serif;font-weight:800;font-size:13px;letter-spacing:4px;color:var(--a1);}
.workspace{display:grid;grid-template-columns:272px 1fr 272px;flex:1;height:calc(100vh - 42px);min-height:0;}
.panel{ background:var(--panel);border:1px solid var(--border); display:flex;flex-direction:column;padding:10px;overflow-y:auto; }
.box{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:4px;padding:10px;margin-bottom:8px;}
.sec{font-size:8px;color:var(--a1);letter-spacing:3px;text-transform:uppercase;display:block;border-bottom:1px solid rgba(0,229,204,.1);padding-bottom:4px;margin-bottom:8px;font-family:'Oxanium',sans-serif;}
.ctrl{margin-bottom:8px;}
.ctrl label{display:flex;justify-content:space-between;font-size:8px;color:var(--dim);margin-bottom:3px;}
input[type=range]{width:100%;-webkit-appearance:none;height:2px;background:#1a1a2a;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--a1);cursor:pointer;}
select{width:100%;background:#000;border:1px solid var(--border);color:var(--text);padding:6px;font-size:9px;margin-bottom:6px;outline:none;}
.btn{width:100%;background:transparent;border:1px solid var(--border);color:var(--dim);padding:8px;cursor:pointer;font-size:9px;margin-bottom:4px;text-transform:uppercase;}
.btn.primary{background:linear-gradient(135deg,var(--a2),#c42);border:none;color:#fff;font-weight:800;font-size:11px;margin-top:10px;}
.viz{position:relative;background:#000;display:flex;justify-content:center;align-items:center;}
#defaultCanvas0{max-width:100%!important;max-height:100%!important;object-fit:contain;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM v21.0.02</div>
  <div style="flex:1; display:flex; align-items:center; gap:15px; justify-content:center;">
    <div id="timeCode" style="font-size:12px; color:var(--a1);">00:00 / 00:00</div>
    <div id="statusL" style="font-size:9px; color:var(--dim);">IDLE</div>
  </div>
</div>

<div class="workspace">
  <div class="panel">
    <div class="box">
      <span class="sec">1. Audio</span>
      <button class="btn" onclick="document.getElementById('mIn').click()">♪ LOAD AUDIO</button>
      <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
    </div>
    <div class="box">
      <span class="sec">2. Background FX</span>
      <select id="backdropFX">
        <option value="aurora">Aurora Wave</option>
        <option value="flow">Flow Field</option>
        <option value="ripple">Radial Ripple</option>
        <option value="pollen">Pollen Drift</option>
        <option value="ocean">Ocean Depth</option>
        <option value="starfield">Star Field</option>
        <option value="mesh">Mesh Network</option>
        <option value="smoke">Smoke Diffusion</option>
      </select>
      <div class="ctrl"><label>INTENSITY <span id="vFxInt">1.0</span></label><input type="range" id="fxInt" min="0" max="3" step="0.1" value="1.0"></div>
      <div class="ctrl"><label>SCALE <span id="vFxScale">1.0</span></label><input type="range" id="fxScale" min="0.1" max="3" step="0.1" value="1.0"></div>
    </div>
    <div class="box">
        <span class="sec">3. Trail & Color</span>
        <select id="bgColor"><option value="night">Night</option><option value="deep">Navy</option></select>
        <div class="ctrl"><label>TRAIL <span id="vTrail">30</span></label><input type="range" id="trail" min="1" max="255" value="30"></div>
    </div>
  </div>

  <div class="viz" id="canvasContainer"></div>

  <div class="panel">
    <div class="box">
      <span class="sec">4. Motion</span>
      <select id="motionMode">
        <option value="leaf">낙엽</option>
        <option value="seed">홀씨</option>
        <option value="cosmos">우주</option>
      </select>
      <div class="ctrl"><label>PARTICLE COUNT <span id="vPcount">10</span></label><input type="range" id="pcount" min="1" max="40" value="10"></div>
    </div>
    <div class="box">
        <span class="sec">5. Image Slots</span>
        <button class="btn" onclick="document.getElementById('i0').click()">IMG 1</button>
        <button class="btn" onclick="document.getElementById('i1').click()">IMG 2</button>
        <button class="btn" onclick="document.getElementById('i2').click()">IMG 3</button>
        <input type="file" id="i0" style="display:none" onchange="loadAsset(0,this.files)">
        <input type="file" id="i1" style="display:none" onchange="loadAsset(1,this.files)">
        <input type="file" id="i2" style="display:none" onchange="loadAsset(2,this.files)">
    </div>
    <button class="btn primary" id="recBtn" onclick="toggleSync()">▶ START & RECORD</button>
  </div>
</div>

<script>
const g = id => document.getElementById(id);
const gv = id => parseFloat(g(id).value);

let _audio = null;
let _instAssets = [null, null, null];
let _canvasRef = null;
let _isPlaying = false;

function handleFile(files) {
  if (_audio) { _audio.stop(); _audio.dispose(); }
  _audio = loadSound(URL.createObjectURL(files[0]), () => { g('statusL').textContent = 'LOADED'; });
}

function loadAsset(id, files) {
  loadImage(URL.createObjectURL(files[0]), img => { _instAssets[id] = img; g('statusL').textContent = `IMG ${id+1} OK`; });
}

async function toggleSync() {
  if (_isPlaying) {
    if (_audio) _audio.stop();
    _isPlaying = false;
    g('recBtn').textContent = '▶ START & RECORD';
  } else {
    if (!_audio) return;
    if (getAudioContext().state === 'suspended') await userStartAudio();
    _audio.play();
    _isPlaying = true;
    g('recBtn').textContent = '■ STOP';
  }
}

// --- P5 SKETCH ---
let fft, amp;
let particles = [];
let overlayT = 0;
const BG_COLORS = { night:[4,4,10], deep:[4,8,25] };

function setup() {
  let cnv = createCanvas(1280, 720);
  cnv.parent('canvasContainer');
  _canvasRef = cnv.elt;
  fft = new p5.FFT(0.8, 512);
  amp = new p5.Amplitude();
  for(let i=0; i<40; i++) particles.push(new CinematicParticle(i % 3));
}

function draw() {
  const bgKey = g('bgColor').value;
  const bgC = BG_COLORS[bgKey] || [4,4,10];
  const trail = gv('trail');
  
  // 트레일 효과를 위해 배경을 반투명하게 덮음
  background(bgC[0], bgC[1], bgC[2], trail);

  let vol = 0;
  if (_audio && _audio.isPlaying()) {
    fft.analyze();
    vol = amp.getLevel();
  }
  overlayT += 0.01;

  // 1. Background FX (먼저 그리기)
  push();
  translate(width/2, height/2);
  scale(gv('fxScale'));
  drawBgFX(vol, bgC);
  pop();

  // 2. Particles (위에 그리기)
  const mode = g('motionMode').value;
  const count = gv('pcount');
  for(let i=0; i<count; i++) {
    if(_instAssets[particles[i].slot]) {
        particles[i].update(mode, vol);
        particles[i].display(_instAssets[particles[i].slot], vol);
    }
  }

  updateUI(vol);
}

function drawBgFX(vol, bgC) {
  const fx = g('backdropFX').value;
  const inten = gv('fxInt');
  const t = overlayT;
  
  noFill();
  strokeWeight(2 * inten);
  
  if (fx === 'aurora') {
    for(let i=0; i<5; i++) {
      stroke(bgC[0]+50, bgC[1]+150, bgC[2]+200, 50 + vol*200);
      beginShape();
      for(let x=-width/2; x<width/2; x+=30) {
        let y = sin(x*0.005 + t + i) * (100 + vol*300);
        vertex(x, y + (i-2.5)*100);
      }
      endShape();
    }
  } else if (fx === 'ripple') {
    for(let i=0; i<6; i++) {
      let r = ((t*200 + i*150) % 1000);
      stroke(200, 255, 255, map(r, 0, 1000, 150, 0));
      ellipse(0, 0, r * (1+vol), r * (1+vol));
    }
  } else if (fx === 'flow') {
    for(let x=-width/2; x<width/2; x+=50) {
      for(let y=-height/2; y<height/2; y+=50) {
        let n = noise(x*0.002, y*0.002, t);
        stroke(100, 200, 200, 50);
        line(x, y, x + cos(n*TWO_PI)*30, y + sin(n*TWO_PI)*30);
      }
    }
  } else if (fx === 'pollen') {
    noStroke();
    fill(255, 255, 200, 100);
    for(let i=0; i<50; i++) {
      let x = (noise(i, t*0.2) - 0.5) * width;
      let y = (noise(i+10, t*0.2) - 0.5) * height;
      ellipse(x, y, 4 + vol*20);
    }
  } else if (fx === 'ocean') {
    stroke(50, 100, 255, 100);
    for(let i=0; i<3; i++) {
      beginShape();
      for(let x=-width/2; x<width/2; x+=20) {
        vertex(x, sin(x*0.01 + t + i)*50 + (i-1)*150);
      }
      endShape();
    }
  } else if (fx === 'starfield') {
    fill(255, 240); noStroke();
    for(let i=0; i<100; i++) {
        let x = (noise(i*10, t*0.05)*2-1)*width;
        let y = (noise(i*20, t*0.05)*2-1)*height;
        ellipse(x, y, 2);
    }
  } else if (fx === 'mesh') {
    stroke(0, 229, 204, 30);
    for(let i=0; i<20; i++) {
        let x1 = (noise(i, t*0.1)-0.5)*width;
        let y1 = (noise(i+5, t*0.1)-0.5)*height;
        line(x1, y1, 0, 0);
    }
  } else if (fx === 'smoke') {
    noStroke();
    for(let i=0; i<20; i++) {
        fill(100, 100, 120, 10);
        let x = (noise(i, t*0.1)-0.5)*width;
        let y = (noise(i+7, t*0.1)-0.5)*height;
        ellipse(x, y, 200 + vol*500);
    }
  }
}

class CinematicParticle {
  constructor(slot) {
    this.slot = slot;
    this.reset();
  }
  reset() {
    this.x = random(width);
    this.y = random(-200, 0);
    this.speed = random(1, 3);
    this.angle = random(TWO_PI);
  }
  update(mode, vol) {
    this.y += this.speed * (1 + vol*5);
    this.x += sin(this.angle + frameCount*0.02) * 2;
    if (this.y > height + 100) this.reset();
  }
  display(img, vol) {
    push();
    translate(this.x, this.y);
    rotate(sin(frameCount*0.01 + this.angle));
    imageMode(CENTER);
    image(img, 0, 0, 100 * (1+vol), 100 * (img.height/img.width) * (1+vol));
    pop();
  }
}

function updateUI(vol) {
  if (_audio && _audio.isPlaying()) {
    const cur = _audio.currentTime(), dur = _audio.duration();
    g('timeCode').textContent = `${nf(floor(cur/60),2)}:${nf(floor(cur%60),2)} / ${nf(floor(dur/60),2)}:${nf(floor(dur%60),2)}`;
    g('pf').style.width = (cur / dur * 100) + '%';
  }
}
</script>
</body>
</html>
