<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SPECTRUM MOTION v21.0.015 — Pure Visual Master</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{ --bg:#05050a; --panel:#0d0d1a; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; }
        body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
        .topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;}
        .main-workspace { display: grid; grid-template-columns: 360px 1fr 280px; flex:1; min-height:0; }
        .side-panel { background:var(--panel); padding:15px; overflow-y:auto; scrollbar-width: thin; border-left:1px solid var(--border); border-right:1px solid var(--border); }
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:10px; margin-bottom:12px; }
        .label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}
        .val-label { float:right; color:var(--accent); font-weight:bold; font-size:9px; }
        input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; margin-top:5px; }
        select { width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:5px; border-radius:4px; font-size:10px; outline:none; }
        .btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:6px; cursor:pointer; font-size:9px; width:100%; transition:0.2s; height: 35px; display: flex; align-items: center; justify-content: center; text-shadow: 0px 0px 3px #000; }
        .btn:hover { border-color: var(--accent); }
        .btn.primary { background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:bold; font-size:11px; padding:12px; margin-top:10px; height: auto;}
        .viz-area { position:relative; display:flex; justify-content:center; align-items:center; background:#000; overflow:hidden; }
        #p5-container canvas { width: 100% !important; height: auto !important; max-height: 100% !important; object-fit: contain; }
        .fx-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 5px; max-height: 350px; overflow-y: auto; scrollbar-width: thin; padding-right: 5px;}
        .fx-thumb { aspect-ratio: 1; border: 2px solid rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; background-size: cover; position: relative; transition: 0.2s; background-color: #111;}
        .fx-thumb.active { border-color: var(--accent2); box-shadow: 0 0 10px var(--accent2); }
        .fx-thumb::after { content: attr(data-name); position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.85); font-size: 5px; text-align: center; color: #fff; padding: 2px 0; overflow: hidden; white-space: nowrap; }
        .playbar { height:3px; background:#111; position:relative; }
        #progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">SPECTRUM FX ENGINE v21.0.015</div>
    <div id="timeCode">00:00 / 00:00</div>
</div>

<div class="main-workspace">
    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">1. Audio Analysis</span>
            <button class="btn" onclick="document.getElementById('mIn').click()">SELECT MP3 FILE</button>
            <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
            <div id="statusInfo" style="font-size:10px; color:var(--accent); margin-top:8px; font-weight:bold;">오디오를 불러와주세요.</div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">2. Visual Palette (24 Background FX)</span>
            <div class="fx-grid" id="fxThumbGrid"></div>
            <div class="control-group" style="margin-top:12px;">
                <label style="font-size:8px; color:#888;">FX SCALE <span class="val-label" id="vFxScale">1.0</span></label><input type="range" id="fxScale" min="0.1" max="5.0" step="0.1" value="1.0">
                <label style="font-size:8px; color:#888; margin-top:5px; display:block;">FX INTENSITY <span class="val-label" id="vFxInten">1.5</span></label><input type="range" id="fxInten" min="0.1" max="5.0" step="0.1" value="1.5">
            </div>
            <select id="bgArtStyle" style="margin-top:10px;">
                <option value="none">Original Filter</option>
                <option value="bw">흑백 (Black & White)</option>
                <option value="pastel">파스텔 (Pastel)</option>
                <option value="neon">네온 (Neon Glow)</option>
                <option value="dreamy">몽환 (Dreamy Blur)</option>
            </select>
        </div>
    </div>

    <div class="viz-area" id="p5-container"></div>

    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">3. Master Recorder</span>
            <div style="font-size:9px; color:#888; margin-bottom:10px; line-height:1.6;">
                - 1920x1080 Resolution<br>
                - H.264 / 80Mbps High Quality<br>
                - Auto Timestamp Filename
            </div>
            <button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START VISUALIZER</button>
        </div>
        
        <div class="ctrl-box">
            <span class="label-small">4. System Stats</span>
            <div id="fpsCounter" style="font-size:10px; color:var(--accent);">FPS: --</div>
        </div>
    </div>
</div>
<div class="playbar"><div id="progFill"></div></div>

<script>
    let audio, fft, ampObj, canvasRef, bgCanvas, isPlaying = false, mediaRecorder, recordedChunks = [];
    let overlayT = 0, currentFXId = 'waves';

    const FX_DB = [
        {id:'waves', name:'WAVE Layer'}, {id:'matrix', name:'KR Matrix'}, {id:'ripBok', name:'Rip-Bokeh'}, {id:'bokRip', name:'Bok-Ripple'},
        {id:'dna', name:'DNA Helix'}, {id:'nebula', name:'Nebula'}, {id:'mandala', name:'Mandala'}, {id:'lightning', name:'Storm'},
        {id:'web', name:'Web'}, {id:'vortex', name:'Vortex'}, {id:'chladni', name:'Chladni'}, {id:'starfield', name:'Star'},
        {id:'cyber', name:'Cyber'}, {id:'radar', name:'Radar'}, {id:'hex', name:'Hexagon'}, {id:'flow', name:'Flow'},
        {id:'orbit', name:'Orbit'}, {id:'tree', name:'Tree'}, {id:'triangles', name:'Tri'}, {id:'spiral', name:'Spiral'},
        {id:'particles', name:'Part'}, {id:'tunnel', name:'Tunnel'}, {id:'warp', name:'Warp'}, {id:'ripples', name:'Ripple'}
    ];

    function setup() {
        let cnv = createCanvas(1920, 1080, WEBGL);
        cnv.parent('p5-container'); canvasRef = cnv.elt;
        bgCanvas = createGraphics(1920, 1080);
        bgCanvas.imageMode(CENTER);
        fft = new p5.FFT(0.8, 512); ampObj = new p5.Amplitude();

        generateVisualThumbnails();
    }

    function generateVisualThumbnails() {
        const grid = document.getElementById('fxThumbGrid');
        let tPg = createGraphics(80, 80);
        FX_DB.forEach(fx => {
            tPg.background(15, 20, 30); tPg.push(); tPg.translate(40, 40); tPg.strokeWeight(2);
            if(fx.id==='waves') { tPg.stroke(0,255,200); tPg.noFill(); tPg.bezier(-30,10, -10,-20, 10,20, 30,-10); }
            else if(fx.id==='matrix') { tPg.fill(0,255,100); tPg.textSize(10); tPg.text('ㄱ ㄴ', -15, 5); }
            else if(fx.id==='ripBok') { tPg.stroke(255,100,200); tPg.circle(0,0,30); tPg.fill(255,50); tPg.circle(10,-10,15); }
            else { tPg.stroke(255,150); tPg.noFill(); tPg.circle(0,0,25); tPg.rotate(QUARTER_PI); tPg.rect(-10,-10,20,20); }
            tPg.pop();
            let btn = document.createElement('div');
            btn.className = 'fx-thumb' + (fx.id==='waves'?' active':'');
            btn.setAttribute('data-name', fx.name);
            btn.style.backgroundImage = `url(${tPg.canvas.toDataURL()})`;
            btn.onclick = () => { document.querySelectorAll('.fx-thumb').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentFXId = fx.id; bgCanvas.clear(); };
            grid.appendChild(btn);
        });
        tPg.remove();
    }

    function draw() {
        background(2, 2, 8);
        bgCanvas.clear();
        
        overlayT += 0.015;
        let bands = new Array(12).fill(0), vol = 0;
        if (audio && audio.isPlaying()) {
            fft.analyze(); vol = ampObj.getLevel();
            for(let i=0; i<12; i++) bands[i] = fft.getEnergy(pow(2, i/1.2)*20, pow(2, (i+1)/1.2)*20);
        }

        // --- FX Rendering ---
        bgCanvas.push();
        let fSc = parseFloat(document.getElementById('fxScale').value), fI = parseFloat(document.getElementById('fxInten').value);
        bgCanvas.translate(960, 540); bgCanvas.scale(fSc);
        drawFXEngine(bgCanvas, overlayT, bands, fI);
        applyFilters(bgCanvas, vol);
        bgCanvas.pop();

        push(); translate(-width/2, -height/2); image(bgCanvas, 0, 0); pop();
        
        updateUI();
    }

    function drawFXEngine(pg, t, bands, fI) {
        let sid = currentFXId; pg.noFill(); pg.strokeWeight(2 * fI);
        if(sid==='waves'){
            for(let j=0; j<5; j++){
                let c = color(100+j*35, 150+bands[j], 255); pg.fill(red(c), green(c), blue(c), 70); pg.stroke(c); pg.beginShape();
                for(let i=-960; i<=960; i+=40){ let h = sin(i*0.005 + t*(j+1.2)) * bands[j] * fI; pg.vertex(i, 200 + j*100 + h); }
                pg.vertex(960, 540); pg.vertex(-960, 540); pg.endShape(CLOSE);
            }
        } else if(sid==='matrix'){
            pg.fill(0, 255, 150, 220); pg.textSize(26);
            let chars = ['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
            for(let i=0; i<30; i++){ pg.text(chars[floor(random(chars.length))], -960+(i*70), (t*500+i*200)%1080-540 + bands[i%12]); }
        } else if(sid==='ripBok'){
            for(let i=0; i<8; i++){ pg.stroke(random(255), 100+bands[i], 255, 150); pg.circle(0, 0, (t*200+i*150)%1200 + bands[i]); pg.fill(255, 150, 150, 50); pg.circle(cos(t+i)*500, sin(t+i)*500, 60+bands[i]); }
        } else if(sid==='bokRip'){
            pg.noStroke(); for(let i=0; i<20; i++){ pg.fill(255, 150, bands[i%12]*2, 100); pg.circle(cos(t+i)*bands[i%12]*3, sin(t+i)*bands[i%12]*3, 100+bands[i%12]); }
        } else if(sid==='dna'){ for(let i=0;i<40;i++){ pg.fill(0,255,200); pg.circle(cos(i+t)*300, sin(i+t)*100, 10+bands[i%12]/8); }}
        else if(sid==='nebula'){ let g=pg.drawingContext.createRadialGradient(0,0,0,0,0,600); g.addColorStop(0,'rgba(100,80,255,0.4)'); g.addColorStop(1,'rgba(0,0,0,0)'); pg.drawingContext.fillStyle=g; pg.rect(-960,-540,1920,1080); }
        else if(sid==='lightning'){ pg.stroke(255); drawBranch(pg, 0, 250, -PI/2, (bands[10]/1.5)*fI, 5); }
        else if(sid==='hex'){ pg.stroke(0,255,255); for(let j=0;j<4;j++){ pg.beginShape(); for(let i=0;i<6;i++) pg.vertex(cos(i*PI/3)*(250+bands[j]*2), sin(i*PI/3)*(250+bands[j]*2)); pg.endShape(CLOSE); }}
        else if(sid==='starfield'){ pg.stroke(255); for(let i=0; i<40; i++){ let r=noise(i,t)*2000-1000; pg.line(r, -540, r+cos(t)*bands[0], 540); }}
        else if(sid==='tunnel'){ for(let i=0; i<8; i++){ pg.stroke(255, 150); let r=(t*400+i*200)%1600; pg.rect(-r/2, -r/2, r, r); }}
        else if(sid==='radar'){ pg.stroke(0,255,0); pg.circle(0,0,400); pg.line(0,0, cos(t*3)*400, sin(t*3)*400); }
        else { pg.stroke(255, 100); pg.circle(0, 0, 300 + bands[0]); }
    }

    function drawBranch(pg, x, y, ang, len, gen) { if(gen <= 0 || len < 5) return; let nx = x + cos(ang)*len, ny = y + sin(ang)*len; pg.line(x, y, nx, ny); drawBranch(pg, nx, ny, ang+0.4, len*0.7, gen-1); drawBranch(pg, nx, ny, ang-0.4, len*0.7, gen-1); }
    function applyFilters(pg, vol) { let s = document.getElementById('bgArtStyle').value; if(s==='bw') pg.filter(GRAY); else if(s==='neon') { pg.drawingContext.shadowBlur=25*vol; pg.drawingContext.shadowColor='cyan'; } else if(s==='dreamy') pg.filter(BLUR, 2); }
    function updateUI() { if(audio && audio.isPlaying()){ document.getElementById('progFill').style.width = (audio.currentTime()/audio.duration()*100)+'%'; let m = floor(audio.currentTime()/60), s = floor(audio.currentTime()%60); document.getElementById('timeCode').innerText = `${nf(m,2)}:${nf(s,2)} / ${nf(floor(audio.duration()/60),2)}:${nf(floor(audio.duration()%60),2)}`; document.getElementById('fpsCounter').innerText = `FPS: ${floor(frameRate())}`; } }
    function handleFile(files) { audio = loadSound(URL.createObjectURL(files[0]), () => { document.getElementById('recBtn').disabled = false; document.getElementById('statusInfo').innerText = "오디오 분석 완료"; }); }
    async function toggleSync() { if (isPlaying) { audio.stop(); isPlaying = false; } else { if (getAudioContext().state === 'suspended') await userStartAudio(); const dest = getAudioContext().createMediaStreamDestination(); p5.soundOut.output.connect(dest); mediaRecorder = new MediaRecorder(new MediaStream([...canvasRef.captureStream(30).getVideoTracks(), ...dest.stream.getAudioTracks()]), { videoBitsPerSecond: 80000000 }); mediaRecorder.ondataavailable = e => recordedChunks.push(e.data); mediaRecorder.onstop = () => { const n = new Date(); let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/mp4' })); a.download = `${nf(year(),4)}${nf(month(),2)}${nf(day(),2)}${nf(hour(),2)}${nf(minute(),2)}${nf(second(),2)}.mp4`; a.click(); }; audio.play(); mediaRecorder.start(); isPlaying = true; document.getElementById('recBtn').innerText = "■ STOP & SAVE"; } }
    setInterval(() => { ['fxScale','fxInten'].forEach(id => { let el = document.getElementById(id); if(el) document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1)).innerText = el.value; }); }, 100);
</script>
</body>
</html>
