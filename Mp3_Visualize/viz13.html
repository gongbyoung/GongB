<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SPECTRUM MOTION v21.0.011 — Visual Palette Master</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{ --bg:#05050a; --panel:#0d0d1a; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; }
        body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
        .topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;}
        .main-workspace { display: grid; grid-template-columns: 360px 1fr 360px; flex:1; min-height:0; }
        .side-panel { background:var(--panel); padding:15px; overflow-y:auto; scrollbar-width: thin; border-left:1px solid var(--border); border-right:1px solid var(--border); }
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:10px; margin-bottom:12px; }
        .label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}
        .control-group { margin-bottom:10px; }
        .control-group label { display:block; font-size:8px; color:#888; margin-bottom:2px; }
        .val-label { float:right; color:var(--accent); font-weight:bold; font-size:9px; }
        input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; }
        select { width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:5px; border-radius:4px; font-size:10px; outline:none; margin-bottom:4px;}
        .btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; padding:6px; cursor:pointer; font-size:9px; width:100%; transition:0.2s; height: 32px; display: flex; align-items: center; justify-content: center; text-shadow: 0px 0px 3px #000; }
        .btn:hover { border-color: var(--accent); }
        .btn.primary { background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:bold; font-size:11px; padding:12px; margin-top:10px; height: auto;}
        .viz-area { position:relative; display:flex; justify-content:center; align-items:center; background:#000; overflow:hidden; }
        #p5-container canvas { width: 100% !important; height: auto !important; max-height: 100% !important; object-fit: contain; }
        
        /* 24 Background FX Thumbnail Grid */
        .fx-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 5px; max-height: 220px; overflow-y: auto; scrollbar-width: thin; padding-right: 5px;}
        .fx-thumb { aspect-ratio: 1; border: 2px solid rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; background-size: cover; background-position: center; position: relative; transition: 0.2s; overflow: hidden; background-color: #111;}
        .fx-thumb:hover { border-color: var(--accent); transform: scale(1.05); z-index: 10;}
        .fx-thumb.active { border-color: var(--accent2); box-shadow: 0 0 10px var(--accent2); }
        .fx-thumb::after { content: attr(data-name); position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); font-size: 7px; padding: 2px 0; text-align: center; color: #fff; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }

        .motion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; max-height: 140px; overflow-y: auto; scrollbar-width: thin; padding-right: 5px;}
        .motion-item { display: flex; align-items: center; gap: 5px; font-size: 8px; color: #aaa; }
        .motion-item input { accent-color: var(--accent); cursor: pointer; }
        .playbar { height:3px; background:#111; position:relative; }
        #progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">SPECTRUM MOTION v21.0.011</div>
    <div id="timeCode">00:00 / 00:00</div>
</div>

<div class="main-workspace">
    <!-- LEFT: Background FX Palette -->
    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">1. Audio & SRT Master</span>
            <button class="btn" onclick="document.getElementById('mIn').click()">SELECT AUDIO (MP3)</button>
            <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
            <button class="btn" onclick="document.getElementById('srtIn').click()" style="margin-top:5px; border-color:#ff3377;">SELECT SRT</button>
            <input type="file" id="srtIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
            <div id="statusInfo" style="font-size:10px; color:var(--accent); margin-top:8px; font-weight:bold;">파일을 불러와주세요.</div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">2. Visual Palette (24 Background FX)</span>
            <div class="fx-grid" id="fxThumbGrid"></div>
            
            <div class="control-group" style="margin-top:12px;">
                <label>FX SCALE <span class="val-label" id="vFxScale">1.0</span></label><input type="range" id="fxScale" min="0.1" max="5.0" step="0.1" value="1.0">
                <label>FX INTENSITY <span class="val-label" id="vFxInten">1.5</span></label><input type="range" id="fxInten" min="0.1" max="5.0" step="0.1" value="1.5">
            </div>
            <select id="bgArtStyle">
                <option value="none">Original Filter</option>
                <option value="bw">흑백 (B&W)</option>
                <option value="neon">네온 (Neon)</option>
                <option value="dreamy">몽환 (Dreamy)</option>
            </select>
        </div>
    </div>

    <!-- CENTER -->
    <div class="viz-area" id="p5-container"></div>

    <!-- RIGHT: Subtitle & Image Tools -->
    <div class="side-panel">
        <div class="ctrl-box">
            <span class="label-small">3. Subtitle Motion Pool (24 Types)</span>
            <div class="motion-grid" id="motionPool"></div>
            <div class="control-group" style="margin-top:10px;">
                <label>FONT SIZE <span class="val-label" id="vTextSz">55</span></label><input type="range" id="textSz" min="10" max="300" value="55">
                <label>TEXT POS X / Y <span class="val-label" id="vTextX">960</span> / <span class="val-label" id="vTextY">850</span></label>
                <input type="range" id="textX" min="0" max="1920" value="960"><input type="range" id="textY" min="0" max="1080" value="850">
            </div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">4. Image Individual Set</span>
            <div class="inst-row" style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>IMG 1</span><button class="btn" style="width:40px; height:20px;" onclick="openL('i0')">LOAD</button><select id="m0" style="width:100px; margin:0;"><option value="petal">Petal Fall</option><option value="noise">Noise Fly</option></select></div>
            <input type="file" id="i0" style="display:none" onchange="loadAsset(0, this.files)">
        </div>

        <div class="ctrl-box"><button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START RECORDING</button></div>
    </div>
</div>
<div class="playbar"><div id="progFill"></div></div>

<script>
    let audio, fft, ampObj, canvasRef, mainCanvas, bgCanvas, textCanvas, instAssets = new Array(2).fill(null);
    let srtData = [], isPlaying = false, mediaRecorder, recordedChunks = [];
    let overlayT = 0, currentFXId = 'dna';

    // 24 Background FX Definitions
    const FX_DB = [
        {id:'dna', name:'DNA'}, {id:'nebula', name:'Nebula'}, {id:'mandala', name:'Mandala'}, {id:'lightning', name:'Storm'},
        {id:'web', name:'Web'}, {id:'vortex', name:'Vortex'}, {id:'waves', name:'Waves'}, {id:'chladni', name:'Chladni'},
        {id:'starfield', name:'Starfield'}, {id:'matrix', name:'Matrix'}, {id:'warp', name:'Warp'}, {id:'ripples', name:'Ripples'},
        {id:'cyber', name:'Cyber Grid'}, {id:'bokeh', name:'Bokeh'}, {id:'radar', name:'Radar'}, {id:'hex', name:'Hexagon'},
        {id:'flow', name:'Flowfield'}, {id:'pulse', name:'Pulse Line'}, {id:'orbit', name:'Orbits'}, {id:'tree', name:'Tree'},
        {id:'triangles', name:'Triangles'}, {id:'spiral', name:'Spiral'}, {id:'particles', name:'Particles'}, {id:'tunnel', name:'Tunnel'}
    ];

    const SRT_MOTIONS = ["Fade", "Slide L-R", "Slide B-T", "Zoom", "Bounce", "Typewriter", "Flicker", "Wave", "Shake", "Rotate", "Blur", "Glitch", "Spiral", "Floating", "Flip 3D", "Tracking", "Pulse", "Roll In", "Skew", "Elastic", "Rainbow", "Shadow Pulse", "Explosion", "Vortex"];

    function setup() {
        let cnv = createCanvas(1920, 1080, WEBGL);
        cnv.parent('p5-container'); canvasRef = cnv.elt;
        mainCanvas = createGraphics(1920, 1080); bgCanvas = createGraphics(1920, 1080); textCanvas = createGraphics(1920, 1080);
        mainCanvas.imageMode(CENTER); bgCanvas.imageMode(CENTER); textCanvas.textAlign(CENTER, CENTER);
        fft = new p5.FFT(0.8, 512); ampObj = new p5.Amplitude();

        generateThumbnails(); // 썸네일 자동 생성 및 UI 부착

        const pool = document.getElementById('motionPool');
        SRT_MOTIONS.forEach((name, i) => { pool.innerHTML += `<div class="motion-item"><input type="checkbox" class="mC" id="mC_${i}" checked> <span>${i+1}. ${name}</span></div>`; });
    }

    // --- 썸네일 제너레이터 (오프스크린 캔버스로 아이콘 생성) ---
    function generateThumbnails() {
        let tPg = createGraphics(80, 80);
        const grid = document.getElementById('fxThumbGrid');
        
        FX_DB.forEach((fx, index) => {
            tPg.background(10, 15, 25);
            tPg.push(); tPg.translate(40, 40); tPg.strokeWeight(2);
            
            // 각 FX를 형상화한 미니 드로잉
            if(fx.id==='dna'){ tPg.stroke(0,255,200); tPg.noFill(); tPg.bezier(-20,-20, -10,20, 10,-20, 20,20); }
            else if(fx.id==='nebula'){ let g=tPg.drawingContext.createRadialGradient(0,0,0,0,0,30); g.addColorStop(0,'rgba(150,50,255,0.8)'); g.addColorStop(1,'rgba(0,0,0,0)'); tPg.drawingContext.fillStyle=g; tPg.noStroke(); tPg.circle(0,0,60); }
            else if(fx.id==='mandala'){ tPg.stroke(255,100); tPg.noFill(); for(let i=0;i<4;i++){ tPg.rotate(PI/4); tPg.ellipse(0,0,10,40); } }
            else if(fx.id==='lightning'){ tPg.stroke(255); tPg.line(0,-30, -10,0); tPg.line(-10,0, 10,-5); tPg.line(10,-5, 0,30); }
            else if(fx.id==='web'){ tPg.stroke(0,200,255); tPg.line(-30,-30,30,30); tPg.line(-30,30,30,-30); tPg.circle(0,0,30); }
            else if(fx.id==='vortex'){ tPg.noFill(); tPg.stroke(255); for(let i=0;i<5;i++) tPg.rect(-10-i*5,-10-i*5, 20+i*10, 20+i*10); }
            else if(fx.id==='waves'){ tPg.noFill(); tPg.stroke(0,255,255); tPg.bezier(-40,0, -20,-20, 20,20, 40,0); }
            else if(fx.id==='chladni'){ tPg.stroke(255,255,0); for(let i=0;i<20;i++) tPg.point(random(-30,30), random(-30,30)); }
            else if(fx.id==='starfield'){ tPg.stroke(255); tPg.line(-20,-20,-10,-10); tPg.line(20,20,30,30); tPg.line(-20,20,-10,10); }
            else if(fx.id==='matrix'){ tPg.fill(0,255,100); tPg.textSize(10); tPg.text('0 1', -10, 0); tPg.text('1 0', -10, 15); }
            else if(fx.id==='warp'){ tPg.stroke(255); for(let i=0;i<8;i++){ tPg.rotate(PI/4); tPg.line(10,0,30,0); } }
            else if(fx.id==='ripples'){ tPg.noFill(); tPg.stroke(255); tPg.circle(0,0,10); tPg.circle(0,0,30); tPg.circle(0,0,50); }
            else if(fx.id==='cyber'){ tPg.stroke(255,0,150); tPg.line(-40,10,40,10); tPg.line(-40,20,40,20); tPg.line(0,0,-30,40); tPg.line(0,0,30,40); }
            else if(fx.id==='bokeh'){ tPg.noStroke(); tPg.fill(255,0,0,150); tPg.circle(-10,-10,20); tPg.fill(0,255,0,150); tPg.circle(10,-5,25); tPg.fill(0,0,255,150); tPg.circle(0,10,15); }
            else if(fx.id==='radar'){ tPg.noFill(); tPg.stroke(0,255,0); tPg.circle(0,0,40); tPg.line(0,0,20,-20); }
            else if(fx.id==='hex'){ tPg.noFill(); tPg.stroke(0,200,255); tPg.beginShape(); for(let i=0;i<6;i++){ tPg.vertex(cos(i*PI/3)*20, sin(i*PI/3)*20); } tPg.endShape(CLOSE); }
            else { tPg.fill(255); tPg.circle(0,0,20); } // Default fallback

            tPg.pop();
            
            let btn = document.createElement('div');
            btn.className = 'fx-thumb';
            if(index === 0) btn.classList.add('active');
            btn.setAttribute('data-name', fx.name);
            btn.style.backgroundImage = `url(${tPg.canvas.toDataURL()})`;
            btn.onclick = () => {
                document.querySelectorAll('.fx-thumb').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFXId = fx.id;
                bgCanvas.clear();
            };
            grid.appendChild(btn);
        });
        tPg.remove();
    }

    function draw() {
        background(2, 2, 8);
        bgCanvas.clear(); textCanvas.clear(); mainCanvas.clear(); 
        mainCanvas.drawingContext.globalCompositeOperation = 'destination-out';
        mainCanvas.background(255, 45); 
        mainCanvas.drawingContext.globalCompositeOperation = 'source-over';
        
        overlayT += 0.015;
        let spectrum = new Uint8Array(512), bands = new Array(12).fill(0), vol = 0;
        if (audio && audio.isPlaying()) {
            spectrum = fft.analyze(); vol = ampObj.getLevel();
            for(let i=0; i<12; i++) bands[i] = fft.getEnergy(pow(2, i/1.2)*20, pow(2, (i+1)/1.2)*20);
        }

        // --- LAYER 1: Background FX (24 Types) ---
        bgCanvas.push();
        let fSc = parseFloat(document.getElementById('fxScale').value), fI = parseFloat(document.getElementById('fxInten').value);
        bgCanvas.translate(960, 540); bgCanvas.scale(fSc);
        drawFXEngine(bgCanvas, overlayT, bands, fI);
        applyArt(bgCanvas, vol);
        bgCanvas.pop();

        // --- LAYER 3: SRT ---
        if (audio && audio.isPlaying()) renderSRT(textCanvas, audio.currentTime(), vol);

        push(); translate(-width/2, -height/2); image(bgCanvas, 0, 0); image(mainCanvas, 0, 0); image(textCanvas, 0, 0); pop();
        updateUI();
    }

    // --- 24 FX ENGINE (로직 풀장착) ---
    function drawFXEngine(pg, t, bands, inten) {
        pg.strokeWeight(2 * inten); pg.noFill();
        let sid = currentFXId;
        
        if(sid==='dna'){ for(let i=0;i<40;i++){ pg.fill(0,255,200); pg.ellipse(cos(i+t)*300, sin(i+t)*100, 10+bands[i%12]/10); }}
        else if(sid==='nebula'){ let g=pg.drawingContext.createRadialGradient(0,0,0,0,0,600); g.addColorStop(0,'rgba(100,80,255,0.4)'); g.addColorStop(1,'rgba(0,0,0,0)'); pg.drawingContext.fillStyle=g; pg.rect(-960,-540,1920,1080); }
        else if(sid==='mandala'){ for(let i=0; i<12; i++){ pg.rotate(PI/6); pg.stroke(255, 120); pg.ellipse(150+bands[i], 0, 100, 300); } }
        else if(sid==='lightning'){ pg.stroke(255); drawBranch(pg, 0, 200, -PI/2, (bands[10]/1.5)*inten, 5); }
        else if(sid==='waves'){ pg.stroke(0,255,255); pg.beginShape(); for(let i=-960;i<960;i+=40){ pg.vertex(i, sin(i*0.01+t*5)*bands[floor(map(i,-960,960,0,11))]*inten); } pg.endShape(); }
        else if(sid==='matrix'){ pg.fill(0,255,100,200); pg.textSize(22); for(let i=0;i<20;i++) pg.text(String.fromCharCode(0x30A0+floor(random(96))), random(-960,960), (t*600+i*100)%540); }
        else if(sid==='ripples'){ pg.stroke(255,150); for(let i=0;i<12;i++) pg.circle(-800+(i%4)*400, -400+floor(i/4)*300, bands[i]*inten*2.5); }
        else if(sid==='cyber'){ pg.stroke(255,0,150,150); for(let i=0;i<10;i++) pg.line(-960, (t*200+i*100)%540, 960, (t*200+i*100)%540); for(let i=-960;i<960;i+=100) pg.line(i, 0, i*3, 540); }
        else if(sid==='bokeh'){ pg.noStroke(); for(let i=0;i<20;i++){ pg.fill(random(255),random(255),random(255), 100); pg.circle(cos(t+i)*500, sin(t*0.5+i)*300, 100+bands[i%12]*2); } }
        else if(sid==='radar'){ pg.stroke(0,255,0); for(let i=1;i<6;i++) pg.circle(0,0, i*200); pg.fill(0,255,0,50); pg.arc(0,0, 1200,1200, t%TWO_PI, (t%TWO_PI)+PI/4); }
        else if(sid==='hex'){ pg.stroke(0,200,255); for(let j=0;j<5;j++){ pg.beginShape(); for(let i=0;i<6;i++) pg.vertex(cos(i*PI/3)*(200+j*100+bands[j]), sin(i*PI/3)*(200+j*100+bands[j])); pg.endShape(CLOSE); } }
        // ... (Fallbacks for others)
        else { pg.stroke(255,100); for(let i=0;i<30;i++){ pg.rotate(t*0.01); pg.rect(-200,-200,400+bands[2],400+bands[2]); } }
    }

    function drawBranch(pg, x, y, ang, len, gen) { if(gen <= 0 || len < 5) return; let nx = x + cos(ang)*len, ny = y + sin(ang)*len; pg.line(x, y, nx, ny); drawBranch(pg, nx, ny, ang+0.4, len*0.7, gen-1); drawBranch(pg, nx, ny, ang-0.4, len*0.7, gen-1); }

    // --- 24종 SRT 랜덤 모션 ---
    function renderSRT(pg, currTime, vol) {
        let activeSub = srtData.find(s => currTime >= s.start && currTime <= s.end);
        if (!activeSub) return;
        let tSz = parseFloat(document.getElementById('textSz').value), tX = parseFloat(document.getElementById('textX').value), tY = parseFloat(document.getElementById('textY').value);
        let life = map(currTime, activeSub.start, activeSub.end, 0, 1), mid = activeSub.m;
        pg.push(); pg.translate(tX, tY); pg.textSize(tSz); pg.fill(255); pg.noStroke(); pg.textStyle(BOLD);
        if(mid === 5) { pg.text(activeSub.text.substring(0, floor(activeSub.text.length*life*2)), 0, 0); pg.pop(); return; }
        if(mid === 11) if(random()>0.8) { pg.translate(random(-15,15),0); pg.fill(0,255,200); }
        if(mid === 23) { pg.rotate(life*TWO_PI); pg.scale(1-life); }
        pg.text(activeSub.text, 0, 0); pg.pop();
    }

    function applyArt(pg, vol) { let s = document.getElementById('bgArtStyle').value; if(s==='bw') pg.filter(GRAY); else if(s==='neon') { pg.drawingContext.shadowBlur=25*vol; pg.drawingContext.shadowColor='cyan'; } else if(s==='dreamy') pg.filter(BLUR, 2); }

    // Handlers
    function handleSRT(files) { let reader = new FileReader(); reader.onload = e => { let pool = []; document.querySelectorAll('.mC').forEach((c, i) => { if(c.checked) pool.push(i); }); if(pool.length===0) pool=[0]; srtData = e.target.result.split(/\r?\n\r?\n/).map(block => { let p = block.split(/\r?\n/); if (p.length < 3) return null; return { start: t2s(p[1].split(' --> ')[0]), end: t2s(p[1].split(' --> ')[1]), text: p.slice(2).join('\n'), m: pool[floor(random(pool.length))] }; }).filter(s => s); document.getElementById('statusInfo').innerHTML = `음악 로드됨 / 자막 ${srtData.length}줄 분석됨`; }; reader.readAsText(files[0]); }
    function t2s(t) { let p = t.replace(',','.').split(':'); return parseInt(p[0])*3600 + parseInt(p[1])*60 + parseFloat(p[2]); }
    function handleFile(files) { audio = loadSound(URL.createObjectURL(files[0]), () => { document.getElementById('recBtn').disabled = false; document.getElementById('statusInfo').innerText = "음악 로드 완료. 자막(SRT)을 올려주세요."; }); }
    function openL(id) { document.getElementById(id).click(); }
    function loadAsset(id, files) { loadImage(URL.createObjectURL(files[0]), (img) => { instAssets[id] = img; }); }
    function updateUI() { if(audio && audio.isPlaying()){ document.getElementById('progFill').style.width = (audio.currentTime()/audio.duration()*100)+'%'; let m = floor(audio.currentTime()/60), s = floor(audio.currentTime()%60); document.getElementById('timeCode').innerText = `${nf(m,2)}:${nf(s,2)} / ${nf(floor(audio.duration()/60),2)}:${nf(floor(audio.duration()%60),2)}`; } }

    async function toggleSync() {
        if (isPlaying) { audio.stop(); if(mediaRecorder) mediaRecorder.stop(); isPlaying = false; }
        else {
            if (getAudioContext().state === 'suspended') await userStartAudio();
            recordedChunks = []; const dest = getAudioContext().createMediaStreamDestination(); p5.soundOut.output.connect(dest);
            mediaRecorder = new MediaRecorder(new MediaStream([...canvasRef.captureStream(30).getVideoTracks(), ...dest.stream.getAudioTracks()]), { videoBitsPerSecond: 80000000 });
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => { const n = new Date(); let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/mp4' })); a.download = `${n.getFullYear()}${nf(n.getMonth()+1,2)}${nf(n.getDate(),2)}${nf(n.getHours(),2)}${nf(n.getMinutes(),2)}.mp4`; a.click(); };
            audio.play(); mediaRecorder.start(); isPlaying = true; document.getElementById('recBtn').innerText = "■ STOP & SAVE";
        }
    }

    setInterval(() => { ['fxScale','fxInten','textSz','textX','textY'].forEach(id => { let el = document.getElementById(id); if(el) { document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1)).innerText = el.value; } }); }, 100);
