<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPECTRUM EXTREME v17.0.008 — Visual Tracker</title>
    <link rel="icon" href="data:,">
    <script src="p5.min.js"></script>
    <script src="p5.sound.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{ --bg:#010103; --panel:#0a0a12; --accent:#00ffcc; --accent2:#ff3377; --border:rgba(0,255,204,0.2); --text:#e0f0ff; }
        body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
        .topbar{ padding:10px 25px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .logo{letter-spacing:4px; color:var(--accent); font-weight:bold; font-size:14px;}
        .main-workspace { display: grid; grid-template-columns: 320px 1fr 320px; flex:1; min-height:0; }
        .side-panel { background:var(--panel); padding:15px; overflow-y:auto; scrollbar-width: thin; border-left:1px solid var(--border); border-right:1px solid var(--border); }
        .ctrl-box { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
        .label-small { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; border-bottom:1px solid rgba(0,255,204,0.1); padding-bottom:3px;}
        .control-group { margin-bottom:8px; }
        .control-group label { display:block; font-size:8px; color:#888; margin-bottom:2px; }
        .val-label { float:right; color:var(--accent); font-weight:bold; font-size:9px; }
        input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; height:2px; }
        select { width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:5px; border-radius:4px; font-size:10px; outline:none; margin-bottom:4px;}
        
        /* 썸네일 버튼 스타일 */
        .btn { 
            background:transparent; border:1px solid var(--border); border-radius:4px; color:#fff; 
            padding:6px; cursor:pointer; font-size:9px; width:100%; transition:0.2s; margin-bottom:4px; 
            background-position: center; background-size: cover; height: 35px; /* 높이 고정 */
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; text-shadow: 0px 0px 3px #000;
        }
        .btn:hover { border-color: var(--accent); }
        .btn.primary { background:var(--accent2); border-color:var(--accent2); font-weight:bold; font-size:11px; padding:12px; margin-top:10px; height: auto;}

        .viz-area { position:relative; display:flex; justify-content:center; align-items:center; background:#000; overflow:hidden; }
        #p5-container canvas { width: 100% !important; height: auto !important; max-height: 100% !important; object-fit: contain; }
        .inst-grid { display: grid; grid-template-columns: 45px 1fr 1fr; gap: 5px; align-items: center; margin-bottom: 5px; }
        .inst-grid span { font-size: 8px; color: var(--accent2); font-weight: bold; }
        .playbar { height:2px; background:#111; position:relative; }
        #progFill { position:absolute; left:0; top:0; height:100%; background:var(--accent); width:0%; transition: width 0.1s; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">SPECTRUM MASTER v17.0.008</div>
    <div id="timeCode">00:00 / 00:00</div>
</div>

<div class="main-workspace">
    <div class side-panel>
        <div class="ctrl-box">
            <span class="label-small">1. Audio Analysis</span>
            <button class="btn" onclick="document.getElementById('mIn').click()">SELECT MP3</button>
            <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleFile(this.files)">
            <button class="btn" id="analyzeBtn" onclick="runAnalysis()" disabled style="border-color:#ffcc00; color:#ffcc00;">PRE-ANALYZE & START</button>
        </div>

        <div class="ctrl-box">
            <span class="label-small">2. GPU Post-Process</span>
            <div class="control-group"><label>BLOOM INTEN. <span class="val-label" id="vBloomInten">1.5</span></label><input type="range" id="bloomInten" min="0" max="5" step="0.1" value="1.5"></div>
            <div class="control-group"><label>BLOOM REACT. <span class="val-label" id="vBloomReact">1.0</span></label><input type="range" id="bloomReact" min="0" max="3" step="0.1" value="1.0"></div>
            <div class="control-group"><label>CHROMA ABERR. <span class="val-label" id="vChroma">0.5</span></label><input type="range" id="chroma" min="0" max="2" step="0.1" value="0.5"></div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">3. Color & VFX Style</span>
            <select id="colorTheme" onchange="updateColors()"><option value="cyberpunk">Cyberpunk</option><option value="pastel">Pastel</option><option value="retro">Retro</option><option value="minimalist">Minimalist</option></select>
            <label style="font-size:8px; color:#888; margin-top:5px; display:block;">VFX OVERLAY</label>
            <select id="vfxStyle"><option value="none">Standard</option><option value="plexus">Molecules</option><option value="smoke">Fluid Smoke</option><option value="grain">Dust Grain</option></select>
            <div class="control-group" style="margin-top:5px;"><label>VFX INTENSITY <span class="val-label" id="vVfxInten">1.0</span></label><input type="range" id="vfxInten" min="0.1" max="3" step="0.1" value="1.0"></div>
        </div>
    </div>

    <div class="viz-area" id="p5-container"></div>

    <div class side-panel>
        <div class="ctrl-box">
            <span class="label-small">4. Background Rig</span>
            <button class="btn" id="btnBg" style="border-color:#00ffcc;" onclick="document.getElementById('bgIn').click()">LOAD BG PNG</button>
            <input type="file" id="bgIn" style="display:none" onchange="handleBG(this.files)">
            <div class="control-group" style="margin-top:8px;">
                <label>BG SCALE <span class="val-label" id="vBgScale">1.0</span></label>
                <input type="range" id="bgScale" min="0.5" max="3.0" step="0.05" value="1.0">
            </div>
        </div>

        <div class="ctrl-box">
            <span class="label-small">5. Instrument Motion</span>
            <div class="inst-grid"><span>KICK</span><button class="btn" id="btnI0" onclick="openL('i0')">IMG</button><select id="m0"><option value="relUp">Rel Up</option><option value="perlin">Perlin</option><option value="circular">Circular</option></select></div>
            <div class="inst-grid"><span>SNARE</span><button class="btn" id="btnI1" onclick="openL('i1')">IMG</button><select id="m1"><option value="perlin">Perlin</option><option value="relUp">Rel Up</option></select></div>
            <div class="inst-grid"><span>HIHAT</span><button class="btn" id="btnI2" onclick="openL('i2')">IMG</button><select id="m2"><option value="circular">Circular</option><option value="relSide">Side</option></select></div>
            <div class="inst-grid"><span>MELODY</span><button class="btn" id="btnI3" onclick="openL('i3')">IMG</button><select id="m3"><option value="relUp">Rel Up</option><option value="perlin">Perlin</option></select></div>
            <div class="inst-grid"><span>PERC</span><button class="btn" id="btnI4" onclick="openL('i4')">IMG</button><select id="m4"><option value="perlin">Perlin</option><option value="relSide">Side</option></select></div>
            
            <input type="file" id="i0" style="display:none" onchange="loadAsset(0, this.files)"><input type="file" id="i1" style="display:none" onchange="loadAsset(1, this.files)"><input type="file" id="i2" style="display:none" onchange="loadAsset(2, this.files)"><input type="file" id="i3" style="display:none" onchange="loadAsset(3, this.files)"><input type="file" id="i4" style="display:none" onchange="loadAsset(4, this.files)">
        </div>

        <div class="ctrl-box">
            <span class="label-small">6. Dynamics & Record</span>
            <div class="control-group"><label>GRAVITY <span class="val-label" id="vGrav">0.0</span></label><input type="range" id="grav" min="0" max="1" step="0.05" value="0"></div>
            <div class="control-group"><label>REACT FORCE <span class="val-label" id="vReactF">2.5</span></label><input type="range" id="reactF" min="0.1" max="10" step="0.1" value="2.5"></div>
            <button class="btn primary" id="recBtn" onclick="toggleSync()" disabled>▶ START RECORD (24fps)</button>
        </div>
    </div>
</div>
<div class="playbar"><div id="progFill"></div></div>

<script>
    const vertShader = `precision highp float; attribute vec3 aPosition; attribute vec2 aTexCoord; varying vec2 vTexCoord; void main() { vTexCoord = aTexCoord; vec4 pos = vec4(aPosition, 1.0); pos.xy = pos.xy * 2.0 - 1.0; gl_Position = pos; }`;
    const fragShader = `precision highp float; varying vec2 vTexCoord; uniform sampler2D uTex0; uniform vec2 uRes; uniform float uBloom; uniform float uBloomR; uniform float uChroma; void main() { vec2 uv = vTexCoord; uv.y = 1.0 - uv.y; float off = uChroma * 0.006; vec4 tex = vec4(texture2D(uTex0, uv + vec2(off, 0.0)).r, texture2D(uTex0, uv).g, texture2D(uTex0, uv - vec2(off, 0.0)).b, 1.0); vec2 bV = vec2(uBloomR) / uRes; vec4 glow = (texture2D(uTex0, uv + bV) + texture2D(uTex0, uv - bV)) * 0.5; gl_FragColor = tex + (glow * uBloom); }`;

    let audio, fft, ampObj, canvasRef, mainCanvas, extremeShader, bgImg = null;
    let particles = [], recordedChunks = [], instAssets = new Array(5).fill(null), isAnalyzed = false, isPlaying = false;

    function setup() {
        let cnv = createCanvas(1920, 1080, WEBGL); cnv.parent('p5-container'); canvasRef = cnv.elt;
        mainCanvas = createGraphics(1920, 1080); mainCanvas.colorMode(RGB, 255); mainCanvas.imageMode(CENTER);
        extremeShader = createShader(vertShader, fragShader);
        fft = new p5.FFT(0.8, 256); ampObj = new p5.Amplitude();
        initParticles();
    }

    function initParticles() {
        particles = [];
        for(let i=0; i<24; i++) particles.push(new MasterParticle(i, (i<4)?0:(i<8)?1:(i<13)?2:(i<19)?3:4));
    }

    function draw() {
        let vfx = document.getElementById('vfxStyle').value;
        mainCanvas.background(2, 2, 8, vfx === 'smoke' ? 15 : 45);
        let bands = new Array(24).fill(0), vol = 0, high = 0;
        if (audio && audio.isPlaying()) {
            fft.analyze(); vol = ampObj.getLevel(); high = fft.getEnergy(4000, 16000) / 255;
            for(let i=0; i<24; i++) bands[i] = fft.getEnergy(pow(2, i/2)*20, pow(2, (i+1)/2)*20) / 255;
        }

        if (bgImg) {
            mainCanvas.push(); mainCanvas.translate(mainCanvas.width/2, mainCanvas.height/2);
            let bSc = parseFloat(document.getElementById('bgScale').value);
            mainCanvas.image(bgImg, 0, 0, mainCanvas.width * bSc * (1.0+(bands[2]||0)*0.03), mainCanvas.height * bSc * (1.0+(bands[2]||0)*0.03));
            mainCanvas.pop();
        }

        const force = parseFloat(document.getElementById('reactF').value);
        const gravity = parseFloat(document.getElementById('grav').value);
        const vfxI = parseFloat(document.getElementById('vfxInten').value);

        if (vfx === 'plexus') {
            for(let i=0; i<particles.length; i++) {
                for(let j=i+1; j<particles.length; j++) {
                    let d = dist(particles[i].pos.x, particles[i].pos.y, particles[j].pos.x, particles[j].pos.y);
                    if(d < 200*vfxI) {
                        mainCanvas.stroke(particles[i].c[0], particles[i].c[1], particles[i].c[2], map(d,0,200*vfxI,100,0));
                        mainCanvas.line(particles[i].pos.x, particles[i].pos.y, particles[j].pos.x, particles[j].pos.y);
                    }
                }
            }
        }

        let assets = [...instAssets];
        for (let i = 3; i >= 0; i--) if (assets[i] === null) assets[i] = assets[i+1];
        const m = [document.getElementById('m0').value, document.getElementById('m1').value, document.getElementById('m2').value, document.getElementById('m3').value, document.getElementById('m4').value];

        for (let p of particles) {
            p.update(bands[p.id]||0, force, gravity, m[p.group], vfx, vfxI);
            p.display(bands[p.id]||0, assets, vfx, vfxI);
        }

        shader(extremeShader);
        extremeShader.setUniform('uTex0', mainCanvas);
        extremeShader.setUniform('uRes', [width, height]);
        extremeShader.setUniform('uBloom', parseFloat(document.getElementById('bloomInten').value) * (1.0 + high));
        extremeShader.setUniform('uBloomR', 3.0 + (vol + high) * parseFloat(document.getElementById('bloomReact').value) * 20.0);
        extremeShader.setUniform('uChroma', parseFloat(document.getElementById('chroma').value) * vol);
        rect(-width/2, -height/2, width, height);
        
        if(audio && audio.isPlaying()) {
            document.getElementById('progFill').style.width = (audio.currentTime()/audio.duration()*100)+'%';
            document.getElementById('timeCode').innerText = `${nf(floor(audio.currentTime()/60),2)}:${nf(floor(audio.currentTime()%60),2)} / ${nf(floor(audio.duration()/60),2)}:${nf(floor(audio.duration()%60),2)}`;
        }
    }

    class MasterParticle {
        constructor(id, group) {
            this.id = id; this.group = group; this.origin = createVector(random(1920), random(1080));
            this.pos = this.origin.copy(); this.vel = createVector(0,0); this.angle = random(TWO_PI);
            this.size = random(200, 400); this.updateColors();
        }
        updateColors() {
            const theme = document.getElementById('colorTheme').value;
            if(theme==='cyberpunk') this.c = random([[255,0,255],[0,255,255],[57,255,20]]);
            else if(theme==='pastel') this.c = [random(200,255),random(200,255),random(200,255)];
            else if(theme==='retro') this.c = random([[204,85,0],[225,173,1],[128,128,0]]);
            else this.c = [200,200,200];
        }
        update(amp, force, grav, move, vfx, vfxI) {
            if (vfx === 'smoke') {
                let a = noise(this.pos.x*0.005, this.pos.y*0.005, frameCount*0.01)*TWO_PI*2;
                this.pos.x += cos(a)*3*vfxI; this.pos.y += sin(a)*3*vfxI;
                if(this.pos.x<0)this.pos.x=1920; if(this.pos.x>1920)this.pos.x=0;
            } else {
                let push = amp * force * 12;
                if(move==='relUp') { this.pos.x = this.origin.x + cos(this.angle-HALF_PI)*push*5; this.pos.y = this.origin.y + sin(this.angle-HALF_PI)*push*5; }
                else if(move==='relSide') { this.pos.x = this.origin.x + cos(this.angle)*push*5; this.pos.y = this.origin.y + sin(this.angle)*push*5; }
                else if(move==='circular') { this.pos.x = this.origin.x + cos(frameCount*0.05+this.id)*push*3; this.pos.y = this.origin.y + sin(frameCount*0.05+this.id)*push*3; }
                else { this.vel.add(random(-push, push), random(-push, push)); this.vel.y += grav * 5; this.pos.add(this.vel); this.vel.mult(0.9); this.pos.add(p5.Vector.sub(this.origin,this.pos).mult(0.05)); }
            }
            this.angle += 0.01 + amp * 0.1;
        }
        display(amp, assets, vfx, vfxI) {
            mainCanvas.push(); mainCanvas.translate(this.pos.x, this.pos.y); mainCanvas.rotate(this.angle); mainCanvas.tint(this.c[0], this.c[1], this.c[2], 200);
            let sz = this.size * (0.8 + amp * 2.5);
            let img = assets[this.group];
            if(img) {
                if(vfx==='box3d') { mainCanvas.noFill(); mainCanvas.stroke(this.c[0],this.c[1],this.c[2],100); mainCanvas.rect(-sz/2,-sz/2,sz,sz); }
                mainCanvas.image(img, 0, 0, img.width*(sz/900), img.height*(sz/900));
                if(vfx==='grain' && amp>0.1) { for(let i=0; i<8*vfxI; i++) { mainCanvas.fill(this.c[0],this.c[1],this.c[2]); mainCanvas.rect(random(-sz/2,sz/2), random(-sz/2,sz/2), 2, 2); } }
            } else { mainCanvas.noStroke(); mainCanvas.fill(this.c[0],this.c[1],this.c[2],150); mainCanvas.ellipse(0,0,sz*0.6,sz); }
            mainCanvas.pop();
        }
    }

    // [New] 썸네일 처리 핸들러
    function setBtnThumb(id, file) {
        let btn = document.getElementById('btn' + id.charAt(0).toUpperCase() + id.slice(1));
        if(!btn) return;
        let reader = new FileReader();
        reader.onload = function(e) {
            btn.style.backgroundImage = `url(${e.target.result})`;
            btn.innerText = ""; // 이미지 로드 시 텍스트 제거
        }
        reader.readAsDataURL(file);
    }

    function openL(id) { let el = document.getElementById(id); if(el) el.click(); }
    function handleFile(files) { audio = loadSound(URL.createObjectURL(files[0]), () => { document.getElementById('analyzeBtn').disabled = false; }); }
    
    function handleBG(files) { 
        loadImage(URL.createObjectURL(files[0]), (img) => { bgImg = img; }); 
        setBtnThumb('bg', files[0]); // 배경 버튼 썸네일
    }
    
    function loadAsset(id, files) { 
        loadImage(URL.createObjectURL(files[0]), (img) => { 
            instAssets[id] = img; 
            particles.forEach(p=>p.updateColors()); 
        }); 
        setBtnThumb('i' + id, files[0]); // 악기 버튼 썸네일
    }

    function updateColors() { particles.forEach(p => p.updateColors()); }
    function runAnalysis() { isAnalyzed = true; document.getElementById('recBtn').disabled = false; }
    function setRes(res) { setup(); }

    async function toggleSync() {
        if (isPlaying) { audio.stop(); if (mediaRecorder) mediaRecorder.stop(); isPlaying = false; document.getElementById('recBtn').innerText = "▶ START RECORD"; }
        else {
            if (getAudioContext().state === 'suspended') await userStartAudio();
            recordedChunks = []; const stream = canvasRef.captureStream(24);
            const dest = getAudioContext().createMediaStreamDestination(); p5.soundOut.output.connect(dest);
            const combined = new MediaStream([...stream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
            mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/webm; codecs=vp9,opus', videoBitsPerSecond: 80000000 });
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => { 
                const n = new Date();
                const ts = `${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}${String(n.getHours()).padStart(2,'0')}${String(n.getMinutes()).padStart(2,'0')}${String(n.getSeconds()).padStart(2,'0')}`;
                let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/mp4' })); a.download = `${ts}.mp4`; a.click(); 
            };
            audio.play(); mediaRecorder.start(); isPlaying = true; document.getElementById('recBtn').innerText = "■ STOP & SAVE";
        }
    }

    ['bloomInten','bloomReact','chroma','vfxInten','grav','reactF','bgScale'].forEach(id => {
        let el = document.getElementById(id);
        if(el) el.oninput = function() { document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1)).innerText = this.value; };
    });
</script>
</body>
</html>
