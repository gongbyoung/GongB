<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM ART LAB v15.0.24 — Preset F-Curves</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#050505; --panel:#0d0d12; --accent:#00ffcc; --border:rgba(255,255,255,0.06); --text:#ffffff; }
body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo{letter-spacing:4px; color:var(--accent); font-weight:800; font-size:12px;}
.container { display: grid; grid-template-columns: 280px 1fr 300px; flex: 1; min-height: 0; }
.side-panel { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
.side-panel.right { border-right:none; border-left: 1px solid var(--border); }

/* F-CURVE EDITOR STYLE 제거 */
/*.curve-editor-container { background: #000; border: 1px solid #333; height: 150px; position: relative; margin-top: 10px; cursor: crosshair; }
#curveCanvas { width: 100%; height: 100%; display: block; }*/

.playbar { height: 60px; background: var(--panel); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 15px; flex-shrink: 0; }
.progress-container { flex: 1; display: flex; align-items: center; gap: 10px; font-family: monospace; font-size: 12px; color: var(--accent); }
#progBar { flex: 1; accent-color: var(--accent); height: 4px; }

h3 { font-size: 10px; color: #555; margin-bottom: 12px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-top: 15px;}
.control-group { margin-bottom: 12px; }
.control-group label { display: block; font-size: 9px; color: #777; margin-bottom: 6px; }
.val-label { float: right; color: var(--accent); font-weight: bold; }
input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; height: 3px;}
select { width: 100%; background: #000; border: 1px solid #333; color: var(--accent); padding: 8px; border-radius: 4px; font-size: 12px; outline: none; margin-bottom: 10px;}

.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 10px; cursor: pointer; font-size: 10px; border-radius: 4px; width: 100%; margin-bottom: 5px; transition: 0.2s;}
.btn.primary { background: var(--accent); color: #000; border: none; font-weight: bold; font-size: 12px; padding: 15px; margin-top: 10px;}
.btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.05); }

.viz-area { position: relative; background: #000; overflow: hidden; flex: 1; display: flex; justify-content: center; align-items: center; }
#artCanvas { background: #000; }
.log-panel { background: #000; border: 1px solid #222; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 10px; color: #888; line-height: 1.6; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM ART LAB v15.0.24</div>
  <div id="statusTag" style="font-size: 10px; color: #555;">PRESET F-CURVES READY</div>
</div>

<div class="container">
  <div class="side-panel">
    <h3>1. Assets Loading</h3>
    <button class="btn" onclick="document.getElementById('mIn').click()">LOAD MP3</button>
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleMusic(this.files)">
    <button class="btn" style="border-color: var(--accent); color: var(--accent);" onclick="document.getElementById('iIn').click()">LOAD SOURCE IMAGE</button>
    <input type="file" id="iIn" accept="image/*" style="display:none" onchange="handleImage(this.files)">
    
    <h3>2. Art Style</h3>
    <select id="artStyle">
        <option value="point">점묘 (Pointillism)</option>
        <option value="impression">인상 (Impressionism)</option>
        <option value="grayscale">흑백 (Grayscale)</option>
        <option value="watercolor">수채화 (Watercolor)</option>
        <option value="oil">유채화 (Oil Painting)</option>
        <option value="pencil">연필 (Pencil Sketch)</option>
        <option value="pastel">파스텔 (Pastel Texture)</option>
    </select>

    <h3>3. F-Curve Model Selector (Density Flow)</h3>
    <select id="curveModelSelector">
        <option value="linear">Linear (직선)</option>
        <option value="curveUp">Curve Up (커브 위)</option>
        <option value="curveDown">Curve Down (커브 아래)</option>
        <option value="uShape">U-Shape (U자)</option>
        <option value="inverseUShape" selected>Inverse U-Shape (U자 거꾸로)</option>
    </select>
    <div style="font-size: 9px; color: #555; margin-top:5px;">
        * Select a preset F-Curve model for density flow.
    </div>

    <div class="log-panel" style="margin-top: 15px;">
        <div>DENSITY SCALE: <b id="logCurve">0.00</b></div>
        <div>TIME POS: <b id="logTime">0%</b></div>
    </div>
  </div>

  <div class="viz-area">
    <canvas id="artCanvas"></canvas>
  </div>

  <div class="side-panel right">
    <h3>4. Global Parameters</h3>
    <div class="control-group">
      <label>MAX DENSITY <span class="val-label" id="densityVal">200</span></label>
      <input type="range" id="density" min="1" max="1000" value="200" oninput="document.getElementById('densityVal').innerText=this.value">
    </div>
    <div class="control-group">
      <label>BRUSH SCALE <span class="val-label" id="pScaleVal">1.0</span></label>
      <input type="range" id="paintScale" min="0.1" max="5.0" step="0.1" value="1.0" oninput="document.getElementById('pScaleVal').innerText=this.value">
    </div>
    <div class="control-group">
      <label>BRIGHTNESS <span class="val-label" id="brightVal">1.0</span></label>
      <input type="range" id="brightness" min="0.1" max="3.0" step="0.1" value="1.0" oninput="document.getElementById('brightVal').innerText=this.value">
    </div>

    <h3>5. Image Transform</h3>
    <div class="control-group">
      <label>SCALE / X / Y</label>
      <input type="range" id="imgScale" min="0.5" max="3.0" step="0.1" value="1.0" oninput="updateSamplingBuffer(); clearCanvas();">
      <input type="range" id="imgX" min="-500" max="500" value="0" oninput="updateSamplingBuffer(); clearCanvas();" style="margin-top:5px;">
      <input type="range" id="imgY" min="-500" max="500" value="0" oninput="updateSamplingBuffer(); clearCanvas();" style="margin-top:5px;">
    </div>

    <button class="btn primary" id="playBtn" onclick="togglePlay()">START PERFORMANCE</button>
    <button class="btn" onclick="clearCanvas()">REF CHECK & CLEAR</button>
    <button class="btn" onclick="saveArt()">SAVE STILL PNG</button>
  </div>
</div>

<div class="playbar">
    <div class="progress-container">
        <span id="currTime">00:00</span>
        <input type="range" id="progBar" value="0" min="0" max="100" step="0.1" disabled>
        <span id="totalTime">00:00</span>
    </div>
</div>

<script>
// --- F-CURVE SYSTEM (Preset Models) ---
const presetCurves = {
    linear: [{x: 0, y: 0.5}, {x: 1, y: 0.5}],
    curveUp: [{x: 0, y: 0.1}, {x: 1, y: 1.0}],
    curveDown: [{x: 0, y: 1.0}, {x: 1, y: 0.1}],
    uShape: [{x: 0, y: 1.0}, {x: 0.5, y: 0.1}, {x: 1, y: 1.0}],
    inverseUShape: [{x: 0, y: 0.1}, {x: 0.5, y: 1.0}, {x: 1, y: 0.1}]
};

let currentCurvePoints = presetCurves.inverseUShape; // 초기 모델 설정

function getCurveY(x) {
    currentCurvePoints.sort((a,b)=>a.x-b.x);
    if (x <= currentCurvePoints[0].x) return currentCurvePoints[0].y;
    if (x >= currentCurvePoints[currentCurvePoints.length-1].x) return currentCurvePoints[currentCurvePoints.length-1].y;
    for (let i=0; i < currentCurvePoints.length-1; i++) {
        let p1 = currentCurvePoints[i], p2 = currentCurvePoints[i+1];
        if (x >= p1.x && x <= p2.x) {
            let t = (x - p1.x) / (p2.x - p1.x);
            return p1.y + (p2.y - p1.y) * t; // Linear interpolation
        }
    }
    return 0;
}

// 드롭다운 변경 이벤트 리스너 추가
document.getElementById('curveModelSelector').addEventListener('change', (e) => {
    currentCurvePoints = presetCurves[e.target.value];
});

// F-CURVE 에디터 UI 및 이벤트 리스너 제거

// --- CORE ENGINE ---
let audioCtx, analyser, source, audioBuffer, isPlaying = false, startTime = 0, pauseOffset = 0;
let sourceImgObj = null;
const canvas = document.getElementById('artCanvas'), ctx = canvas.getContext('2d');
const samplingCanvas = document.createElement('canvas'), sCtx = samplingCanvas.getContext('2d');

function handleImage(files) {
    const img = new Image();
    img.onload = () => { sourceImgObj = img; updateSamplingBuffer(); clearCanvas(); };
    img.src = URL.createObjectURL(files[0]);
}

function updateSamplingBuffer() {
    if(!sourceImgObj) return;
    samplingCanvas.width = canvas.width; samplingCanvas.height = canvas.height;
    const scale = parseFloat(document.getElementById('imgScale').value);
    const mx = parseInt(document.getElementById('imgX').value), my = parseInt(document.getElementById('imgY').value);
    sCtx.fillStyle = "#000"; sCtx.fillRect(0,0,canvas.width,canvas.height);
    const ratio = Math.min(canvas.width/sourceImgObj.width, canvas.height/sourceImgObj.height) * scale;
    const nw = sourceImgObj.width*ratio, nh = sourceImgObj.height*ratio;
    sCtx.drawImage(sourceImgObj, (canvas.width-nw)/2+mx, (canvas.height-nh)/2+my, nw, nh);
}

function clearCanvas() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if(sourceImgObj && !isPlaying) {
        ctx.save(); ctx.globalAlpha = 0.2; ctx.drawImage(samplingCanvas, 0, 0); ctx.restore();
    }
    ctx.strokeStyle = 'var(--accent)'; ctx.lineWidth = 1; ctx.strokeRect(1, 1, canvas.width-2, canvas.height-2);
}

function animate() {
    if(!isPlaying) return;
    requestAnimationFrame(animate);

    const nowTime = audioCtx.currentTime - startTime;
    const progress = Math.min(1, nowTime / audioBuffer.duration);
    document.getElementById('progBar').value = progress * 100;
    document.getElementById('currTime').textContent = formatTime(nowTime);
    document.getElementById('logTime').innerText = Math.floor(progress*100) + "%";

    // Curve Sampling (Preset 데이터 사용)
    const curveVal = getCurveY(progress);
    document.getElementById('logCurve').innerText = curveVal.toFixed(2);

    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const amp = (data.reduce((a, b) => a + b, 0) / data.length) / 255;

    // Drawing Loop
    const maxDensity = parseInt(document.getElementById('density').value);
    const spawnCount = Math.floor(curveVal * (maxDensity / 5)); // F-Curve가 밀도 결정

    for(let i=0; i < spawnCount; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        paintArt(amp, x, y);
    }
}

function paintArt(amp, x, y) {
    const imgData = sCtx.getImageData(x, y, 1, 1).data;
    if(imgData[3] < 10 && sourceImgObj) return;

    const bright = parseFloat(document.getElementById('brightness').value);
    const pScale = parseFloat(document.getElementById('paintScale').value);
    const style = document.getElementById('artStyle').value;
    
    let r = Math.min(255, imgData[0] * bright);
    let g = Math.min(255, imgData[1] * bright);
    let b = Math.min(255, imgData[2] * bright);

    ctx.save();
    ctx.translate(x, y);
    
    switch(style) {
        case 'point':
            ctx.fillStyle = `rgba(${r},${g},${b},0.8)`;
            ctx.beginPath(); ctx.arc(0,0,(1+amp*20)*pScale,0,Math.PI*2); ctx.fill();
            break;
        case 'impression':
            ctx.fillStyle = `rgba(${r},${g},${b},0.7)`;
            ctx.rotate(Math.random()*Math.PI);
            ctx.fillRect(-(5*pScale),-1,(10+amp*60)*pScale, 2*pScale);
            break;
        case 'watercolor':
            ctx.globalAlpha = 0.1; ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.beginPath(); ctx.arc((Math.random()-0.5)*10,0,(10+amp*50)*pScale,0,Math.PI*2); ctx.fill();
            break;
        case 'pencil':
            ctx.strokeStyle = `rgba(${r},${g},${b},0.3)`; ctx.lineWidth = 0.5*pScale;
            ctx.rotate(Math.random()*0.5); ctx.beginPath(); ctx.moveTo(-15,0); ctx.lineTo(15,0); ctx.stroke();
            break;
        case 'pastel':
            ctx.shadowBlur = (5+amp*15)*pScale; ctx.shadowColor = `rgb(${r},${g},${b})`;
            ctx.fillStyle = `rgba(${r},${g},${b},0.4)`;
            ctx.beginPath(); ctx.arc(0,0,(2+amp*10)*pScale,0,Math.PI*2); ctx.fill();
            break;
        default:
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.beginPath(); ctx.arc(0,0,2*pScale,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

// --- UTILS ---
function formatTime(s) { const m=Math.floor(s/60), sec=Math.floor(s%60); return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`; }
function handleMusic(f) { 
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const r = new FileReader(); r.onload = (e) => audioCtx.decodeAudioData(e.target.result, (b) => { 
        audioBuffer = b; document.getElementById('totalTime').textContent = formatTime(b.duration); 
    }); r.readAsArrayBuffer(f[0]); 
}
async function togglePlay() {
    if(!audioBuffer) return alert("LOAD MP3 FIRST");
    if(audioCtx.state === 'suspended') await audioCtx.resume();
    if(isPlaying) { isPlaying = false; source.stop(); }
    else {
        source = audioCtx.createBufferSource(); source.buffer = audioBuffer;
        analyser = audioCtx.createAnalyser(); analyser.fftSize = 512;
        source.connect(analyser); analyser.connect(audioCtx.destination);
        source.start(0, pauseOffset); startTime = audioCtx.currentTime - pauseOffset;
        isPlaying = true; document.getElementById('playBtn').textContent = "STOP PERFORMANCE";
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
        animate();
    }
}
function setAspect(r) { document.querySelectorAll('.side-panel.right .btn').forEach(b=>b.classList.remove('active')); event.target.classList.add('active'); resize(); }
function resize() {
    const p = canvas.parentElement; 
    canvas.width = p.clientWidth-40; canvas.height = canvas.width/1.77;
    updateSamplingBuffer(); clearCanvas();
}
window.onresize = () => { resize(); /*initCurve(); 제거*/ };
window.onload = () => { resize(); /*initCurve(); 제거*/ };
function saveArt() { const a=document.createElement('a'); a.download='art.png'; a.href=canvas.toDataURL(); a.click(); }
</script>
