<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Audio Visualizer - Broadcast Studio</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        canvas { width: 100vw !important; height: 100vh !important; object-fit: contain; }

        /* UI 분할 */
        .ui-panel { 
            position: absolute; top: 15px; z-index: 10; 
            background: rgba(10, 10, 10, 0.85); padding: 18px; 
            border-radius: 8px; border: 1px solid #444;
            width: 280px; max-height: 90vh; overflow-y: auto;
            backdrop-filter: blur(15px); box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }
        #ui-left { left: 15px; }
        #ui-right { right: 15px; }
        
        h3 { margin-top: 0; color: #00ffcc; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 15px; text-align: center;}
        .section-title { font-size: 11px; color: #888; margin: 15px 0 5px 0; border-bottom: 1px dashed #333; padding-bottom: 3px;}
        
        .control-group { margin-bottom: 10px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; color: #ddd; }
        .control-group input[type="range"] { width: 100%; cursor: pointer; accent-color: #00ffcc; height: 4px;}
        .control-group input[type="color"] { width: 100%; height: 25px; border: none; cursor: pointer; background: none; }
        .control-group select, .file-btn { 
            width: 100%; padding: 6px; background: #222; color: #00ffcc; 
            border: 1px solid #555; border-radius: 4px; cursor: pointer; font-size: 11px;
        }
        
        .flex-row { display: flex; justify-content: space-between; align-items: center; }
        .flex-row label { margin-bottom: 0; width: 45%; color: #aaa; font-weight: bold; }
        .flex-row select { width: 55%; padding: 4px; }
        
        #audio-input-area { margin-top: 15px; border-top: 2px solid #00ffcc; padding-top: 15px; }
        input[type="file"] { margin-bottom: 10px; display: block; color: white; width: 100%; font-size: 11px; }
        
        .main-btn { 
            background-color: #00ffcc; border: none; padding: 10px; width: 100%;
            border-radius: 5px; cursor: pointer; color: black; font-weight: bold; font-size: 13px; transition: 0.2s;
        }
        .main-btn:hover { background-color: #00ccaa; }

        .record-btn { background-color: #ff3366; color: white; margin-top: 10px; display: none; box-shadow: 0 0 15px rgba(255, 51, 102, 0.6); }
        .record-btn:hover { background-color: #ff1144; }
        
        #status { font-size: 11px; color: #aaa; margin-top: 10px; line-height: 1.4; word-break: break-all; text-align: center;}
        .recording-badge { color: #ff3366; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
    </style>
</head>
<body>

<div id="ui-left" class="ui-panel">
    <h3>VFX 시스템 & 렌더링</h3>
    <div class="section-title">[비디오 해상도]</div>
    <div class="control-group">
        <select id="ctrl-ratio">
            <option value="16:9">가로형 (1920x1080 - 유튜브)</option>
            <option value="9:16">세로형 (1080x1920 - 쇼츠)</option>
            <option value="fit" selected>화면 맞춤 (브라우저 꽉차게)</option>
        </select>
    </div>

    <div class="section-title" style="color:#ff3366;">[포스트 프로세싱]</div>
    <div class="control-group">
        <label style="color: #ff88aa; font-weight:bold;">빛 번짐 강도 (Bloom) <span id="val-bloom">1.5</span></label>
        <input type="range" id="ctrl-bloom" min="0" max="4" value="1.5" step="0.1">
    </div>
    <div class="control-group">
        <label style="color: #00ffcc;">모션 부드러움 (Damping) <span id="val-smooth">0.85</span></label>
        <input type="range" id="ctrl-smooth" min="0.1" max="0.99" value="0.85" step="0.01">
    </div>

    <div class="section-title">[글로벌 설정]</div>
    <div class="control-group">
        <label>전체 감도 (Sensitivity) <span id="val-sens">1.0</span></label>
        <input type="range" id="ctrl-sens" min="0.1" max="3" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label>입자 기본 크기 <span id="val-size">2.0</span></label>
        <input type="range" id="ctrl-size" min="0.5" max="10" value="2.0" step="0.1">
    </div>
    <div class="control-group">
        <label>기본 색상 (Color)</label>
        <input type="color" id="ctrl-color" value="#00ffcc">
    </div>
    <div class="control-group">
        <label style="color: #ffaa00;">중앙 로고 교체 (PNG/JPG)</label>
        <input type="file" id="core-image-file" class="file-btn" accept="image/png, image/jpeg">
    </div>

    <div id="audio-input-area">
        <button id="init-btn" class="main-btn">오디오 엔진 켜기</button>
        <div id="file-select-box" style="display: none; margin-top:10px;">
            <input type="file" id="audio-file" accept="audio/*">
            <div id="status">음악 선택 후, 우측 패널에서 구도를 맞추세요.</div>
            <button id="record-btn" class="main-btn record-btn">▶ 녹화 및 재생 시작</button>
        </div>
    </div>
</div>

<div id="ui-right" class="ui-panel">
    <h3>VFX 모드 & 카메라 연출</h3>

    <div class="section-title" style="color:#00ffcc;">[시각 효과 모드]</div>
    <div class="control-group">
        <select id="ctrl-mode">
            <option value="fluid" selected>유체 흐름 (복합 다이나믹 모션)</option>
            <option value="terrain">오디오 지형 (Random Scattered 3D)</option>
            <option value="linear_bars">평면 이퀄라이저 (Linear)</option>
            <option value="circular_bars">원형 이퀄라이저 (Ring)</option>
            <option value="explosion">비트 폭발 (Constellation Web)</option>
            <option value="wormhole">은하계 터널 (Wormhole)</option>
            <option value="spiral">나선 은하 (Cross Spiral)</option>
        </select>
    </div>
    <div class="control-group">
        <select id="ctrl-freq-mode">
            <option value="5band" selected>정밀 5-Band 매핑 (권장)</option>
            <option value="3band">단순 3-Band 매핑</option>
        </select>
    </div>

    <div id="ui-shape-settings" style="display:none;">
        <div class="section-title" style="color:#aaff00;">[오브젝트 형태 제어 (통합 적용)]</div>
        <div class="control-group">
            <select id="ctrl-terrain-shape">
                <option value="points">기본 파티클 (Points)</option>
                <option value="cube" selected>정사각형 블록 (Cubes)</option>
                <option value="piano">피아노 건반 (Piano Keys)</option>
                <option value="knit">X자 엇갈림 (Knit Pattern)</option>
            </select>
        </div>
    </div>

    <div id="ui-fluid-settings">
        <div class="section-title">[대역별 유체 노이즈 알고리즘]</div>
        <div class="control-group flex-row"><label style="color:#ff5555;">Sub-Bass</label><select id="ctrl-noise-0"><option value="turbulence" selected>Turbulence</option><option value="curl">Curl</option><option value="perlin">Smooth</option><option value="cellular">Cellular</option><option value="glitch">Glitch</option></select></div>
        <div class="control-group flex-row"><label style="color:#ffaa00;">Low-Mid</label><select id="ctrl-noise-1"><option value="curl">Curl</option><option value="perlin" selected>Smooth</option><option value="turbulence">Turbulence</option><option value="cellular">Cellular</option><option value="glitch">Glitch</option></select></div>
        <div class="control-group flex-row"><label style="color:#00ffcc;">Mid</label><select id="ctrl-noise-2"><option value="curl" selected>Curl</option><option value="perlin">Smooth</option><option value="turbulence">Turbulence</option><option value="cellular">Cellular</option><option value="glitch">Glitch</option></select></div>
        <div class="control-group flex-row"><label style="color:#aa55ff;">High-Mid</label><select id="ctrl-noise-3"><option value="cellular" selected>Cellular</option><option value="curl">Curl</option><option value="perlin">Smooth</option><option value="turbulence">Turbulence</option><option value="glitch">Glitch</option></select></div>
        <div class="control-group flex-row"><label style="color:#ffffff;">Treble</label><select id="ctrl-noise-4"><option value="glitch" selected>Glitch</option><option value="cellular">Cellular</option><option value="curl">Curl</option><option value="perlin">Smooth</option><option value="turbulence">Turbulence</option></select></div>
    </div>

    <div class="section-title">[카메라 구도 세팅]</div>
    <div class="control-group">
        <label>카메라 X (좌/우) <span id="val-cam-x">0</span></label>
        <input type="range" id="ctrl-cam-x" min="-1000" max="1000" value="0" step="10">
    </div>
    <div class="control-group">
        <label>카메라 Y (상/하) <span id="val-cam-y">250</span></label>
        <input type="range" id="ctrl-cam-y" min="-1000" max="1000" value="250" step="10">
    </div>
    <div class="control-group">
        <label>카메라 Z (줌 인/아웃) <span id="val-cam-z">600</span></label>
        <input type="range" id="ctrl-cam-z" min="50" max="1500" value="600" step="10">
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
    // --- 1. Three.js & Post-Processing ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    scene.fog = new THREE.FogExp2(0x050505, 0.0012);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 4000);
    const renderer = new THREE.WebGLRenderer({antialias: true, preserveDrawingBuffer: true});
    renderer.toneMapping = THREE.ReinhardToneMapping; 
    document.body.appendChild(renderer.domElement);

    const renderScene = new THREE.RenderPass(scene, camera);
    const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0; bloomPass.strength = 1.5; bloomPass.radius = 0.5;

    const composer = new THREE.EffectComposer(renderer);
    composer.addPass(renderScene); composer.addPass(bloomPass);
    
    // UI 바인딩
    const ctrlRatio = document.getElementById('ctrl-ratio');
    const ctrlFreqMode = document.getElementById('ctrl-freq-mode');
    const ctrlMode = document.getElementById('ctrl-mode');
    const ctrlTerrainShape = document.getElementById('ctrl-terrain-shape');
    
    const uiFluidSettings = document.getElementById('ui-fluid-settings');
    const uiShapeSettings = document.getElementById('ui-shape-settings');

    const ctrlNoise = [ document.getElementById('ctrl-noise-0'), document.getElementById('ctrl-noise-1'), document.getElementById('ctrl-noise-2'), document.getElementById('ctrl-noise-3'), document.getElementById('ctrl-noise-4') ];

    const ctrlCamX = document.getElementById('ctrl-cam-x');
    const ctrlCamY = document.getElementById('ctrl-cam-y');
    const ctrlCamZ = document.getElementById('ctrl-cam-z');
    const ctrlSens = document.getElementById('ctrl-sens');
    const ctrlSmooth = document.getElementById('ctrl-smooth');
    const ctrlColor = document.getElementById('ctrl-color');
    const ctrlBloom = document.getElementById('ctrl-bloom');
    const updateUIVal = (id, val) => document.getElementById(id).innerText = val;

    function updateAspectRatio() {
        let val = ctrlRatio.value;
        let w = window.innerWidth, h = window.innerHeight;
        if (val === '16:9') { w = 1920; h = 1080; }
        else if (val === '9:16') { w = 1080; h = 1920; }
        renderer.setSize(w, h); composer.setSize(w, h); 
        camera.aspect = w / h; camera.updateProjectionMatrix();
    }
    ctrlRatio.onchange = updateAspectRatio;
    window.addEventListener('resize', () => { if (ctrlRatio.value === 'fit') updateAspectRatio(); });
    updateAspectRatio(); 

    ctrlCamX.oninput = (e) => updateUIVal('val-cam-x', e.target.value);
    ctrlCamY.oninput = (e) => updateUIVal('val-cam-y', e.target.value);
    ctrlCamZ.oninput = (e) => updateUIVal('val-cam-z', e.target.value);
    ctrlSens.oninput = (e) => updateUIVal('val-sens', e.target.value);
    ctrlSmooth.oninput = (e) => updateUIVal('val-smooth', e.target.value);
    ctrlBloom.oninput = (e) => { bloomPass.strength = parseFloat(e.target.value); updateUIVal('val-bloom', e.target.value); };
    let baseColor = new THREE.Color(ctrlColor.value);
    ctrlColor.oninput = (e) => baseColor.set(e.target.value);

    // 코어 로고
    const coreGeometry = new THREE.IcosahedronGeometry(25, 1);
    const coreMaterial = new THREE.MeshBasicMaterial({color: 0x00ffcc, wireframe: true, transparent: true, opacity: 0.8});
    const coreMesh = new THREE.Mesh(coreGeometry, coreMaterial);
    scene.add(coreMesh);

    let coreSprite = null; 
    document.getElementById('core-image-file').onchange = function(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const tex = new THREE.Texture(img); tex.needsUpdate = true;
                if(!coreSprite) {
                    const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true });
                    coreSprite = new THREE.Sprite(spriteMat);
                    coreSprite.scale.set(100, 100, 1); scene.add(coreSprite);
                } else { coreSprite.material.map = tex; }
                coreMesh.visible = false; 
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    // --- 2. 시각 요소 그룹 & 메쉬 설정 ---
    const particleGroup = new THREE.Group(); scene.add(particleGroup);
    
    const instancedGroup = new THREE.Group(); scene.add(instancedGroup);
    const boxGeo = new THREE.BoxGeometry(1, 1, 1);
    const instMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const instMesh = new THREE.InstancedMesh(boxGeo, instMat, 12000); 
    instMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    instancedGroup.add(instMesh);
    const dummy = new THREE.Object3D();

    const circleCanvas = document.createElement('canvas');
    circleCanvas.width = 64; circleCanvas.height = 64;
    const ctx = circleCanvas.getContext('2d');
    ctx.beginPath(); ctx.arc(32, 32, 30, 0, Math.PI * 2); ctx.fillStyle = "white"; ctx.fill();
    const circleTexture = new THREE.CanvasTexture(circleCanvas);

    const numGroups = 5;
    const particlesPerGroup = 2400; 
    const totalParticles = numGroups * particlesPerGroup;
    const geometries = [], posArrays = [], velArrays = [], origArrays = [], mats = [];
    const lifeArrays = [], lineGeos = [], lineMeshes = [];

    let shuffledGrid = [];
    for(let i=0; i<totalParticles; i++){
        shuffledGrid.push({ x: (i % 110) * 15 - 825, z: Math.floor(i / 110) * 15 - 825, origIndex: i });
    }
    for (let i = shuffledGrid.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffledGrid[i], shuffledGrid[j]] = [shuffledGrid[j], shuffledGrid[i]];
    }

    for (let g = 0; g < numGroups; g++) {
        let geo = new THREE.BufferGeometry();
        let p = new Float32Array(particlesPerGroup * 3);
        let v = new Float32Array(particlesPerGroup * 3);
        let o = new Float32Array(particlesPerGroup * 3);
        geo.setAttribute('position', new THREE.BufferAttribute(p, 3));
        let mat = new THREE.PointsMaterial({ color: baseColor, map: circleTexture, transparent: true, alphaTest: 0.1, blending: THREE.AdditiveBlending });
        geometries.push(geo); posArrays.push(p); velArrays.push(v); origArrays.push(o); mats.push(mat);
        particleGroup.add(new THREE.Points(geo, mat));

        lifeArrays.push(new Float32Array(particlesPerGroup)); 
        let lGeo = new THREE.BufferGeometry();
        lGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(particlesPerGroup * 6), 3));
        let lMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
        let lMesh = new THREE.LineSegments(lGeo, lMat);
        lineGeos.push(lGeo); lineMeshes.push(lMesh);
        particleGroup.add(lMesh);
    }

    let currentMode = ctrlMode.value;
    let terrainShape = ctrlTerrainShape.value;

    function resetMode() {
        currentMode = ctrlMode.value;
        terrainShape = ctrlTerrainShape.value;

        uiFluidSettings.style.display = (currentMode === 'fluid') ? 'block' : 'none';
        uiShapeSettings.style.display = (['terrain', 'linear_bars', 'circular_bars'].includes(currentMode)) ? 'block' : 'none';

        particleGroup.visible = false; instancedGroup.visible = false;
        let showCore = true;

        if (['terrain', 'linear_bars', 'circular_bars'].includes(currentMode) && terrainShape !== 'points') {
            instancedGroup.visible = true;
        } else {
            particleGroup.visible = true;
            if(currentMode === 'fluid') showCore = false;
            
            for(let g=0; g<numGroups; g++) { lifeArrays[g].fill(0); lineGeos[g].setDrawRange(0, 0); }

            for (let g = 0; g < numGroups; g++) {
                let pArr = posArrays[g], oArr = origArrays[g], vArr = velArrays[g];
                for (let i = 0; i < particlesPerGroup; i++) {
                    let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                    let globalIdx = (g * particlesPerGroup) + i;
                    
                    if (['terrain', 'linear_bars', 'circular_bars'].includes(currentMode)) {
                        pArr[ix] = shuffledGrid[globalIdx].x; pArr[iy] = -150; pArr[iz] = shuffledGrid[globalIdx].z;
                    } else if (currentMode === 'explosion') {
                        pArr[ix] = (Math.random() - 0.5) * 10; pArr[iy] = (Math.random() - 0.5) * 10; pArr[iz] = (Math.random() - 0.5) * 10;
                        vArr[ix] = vArr[iy] = vArr[iz] = 0;
                    } else if (currentMode === 'fluid') {
                        // ★ 변경: 화면에 꽉 차게 시작 범위를 800px로 축소 (초기 흩어짐 방지)
                        pArr[ix] = (Math.random() - 0.5) * 800; pArr[iy] = (Math.random() - 0.5) * 800; pArr[iz] = (Math.random() - 0.5) * 800;
                    } else if (currentMode === 'wormhole') {
                        let angle = Math.random() * Math.PI * 2; let radius = 80 + Math.random() * 300;
                        pArr[ix] = Math.cos(angle) * radius; pArr[iy] = Math.sin(angle) * radius; pArr[iz] = (Math.random() * 2000) - 1000;
                    } else if (currentMode === 'spiral') {
                        let arm = globalIdx % 4; let dir = (arm % 2 === 0) ? 1 : -1;
                        let angle = (globalIdx / 12000) * Math.PI * 2 * 8 * dir + (arm * Math.PI / 2);
                        let radius = (globalIdx / 12000) * 600 + (Math.random()*20);
                        pArr[ix] = Math.cos(angle) * radius; pArr[iy] = (Math.random() - 0.5) * 60; pArr[iz] = Math.sin(angle) * radius;
                    }
                    oArr[ix] = pArr[ix]; oArr[iy] = pArr[iy]; oArr[iz] = pArr[iz];
                }
                geometries[g].attributes.position.needsUpdate = true;
            }
        }
        if (coreSprite) { coreSprite.visible = showCore; coreMesh.visible = false; } else { coreMesh.visible = showCore; }
    }
    resetMode();
    ctrlMode.onchange = () => resetMode();
    ctrlTerrainShape.onchange = () => resetMode();

    // --- 3. 오디오 엔진 및 녹화 시스템 ---
    let audioCtx, analyser, dataArray, currentSource;
    let decodedBuffer = null; let isPlaying = false;    
    let mediaRecorder, recordedChunks = [];
    let smoothedData = new Float32Array(512);
    
    const initBtn = document.getElementById('init-btn');
    const fileSelectBox = document.getElementById('file-select-box');
    const audioInput = document.getElementById('audio-file');
    const recordBtn = document.getElementById('record-btn');
    const statusEl = document.getElementById('status');
    let loadedFileName = "";

    initBtn.onclick = function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512; dataArray = new Uint8Array(analyser.frequencyBinCount);
        initBtn.style.display = 'none'; fileSelectBox.style.display = 'block';
    };

    audioInput.onchange = function(event) {
        const file = event.target.files[0]; if (!file) return;
        loadedFileName = file.name;
        statusEl.innerText = "음원 디코딩 중... 잠시만 기다려주세요."; recordBtn.style.display = 'none';
        const reader = new FileReader();
        reader.onload = function(e) {
            audioCtx.decodeAudioData(e.target.result, function(buffer) {
                decodedBuffer = buffer;
                statusEl.innerHTML = "<strong>준비 완료!</strong> 구도 세팅을 마치고 재생버튼을 누르세요."; recordBtn.style.display = 'block';
            });
        };
        reader.readAsArrayBuffer(file);
    };

    recordBtn.onclick = function() {
        if (!decodedBuffer) return;
        if (currentSource) currentSource.stop();
        currentSource = audioCtx.createBufferSource(); currentSource.buffer = decodedBuffer; currentSource.connect(analyser);
        
        const audioDest = audioCtx.createMediaStreamDestination();
        analyser.connect(audioCtx.destination); analyser.connect(audioDest);            
        
        const canvasStream = renderer.domElement.captureStream(60);
        const combinedStream = new MediaStream([...canvasStream.getVideoTracks(), ...audioDest.stream.getAudioTracks()]);
        
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm; codecs=vp9' });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.style = 'display: none'; a.href = url;
            a.download = loadedFileName.replace(/\.[^/.]+$/, "") + `_VFX_${ctrlRatio.value.replace(':','x')}.webm`;
            document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url);
            
            statusEl.innerText = "녹화 완료! 영상이 저장되었습니다.";
            ctrlRatio.disabled = false; isPlaying = false;
            recordBtn.style.display = 'block'; recordBtn.innerText = "▶ 다시 녹화하기";
            for(let g=0; g<numGroups; g++) { lifeArrays[g].fill(0); lineGeos[g].setDrawRange(0, 0); }
        };

        currentSource.onended = () => { if(mediaRecorder.state === 'recording') mediaRecorder.stop(); };
        currentSource.start(0); mediaRecorder.start(); isPlaying = true;
        ctrlRatio.disabled = true; recordBtn.style.display = 'none';
        statusEl.innerHTML = `<span class="recording-badge">● REC</span> 자동 녹화 중: ${loadedFileName}`;
    };

    // --- 4. 메인 렌더링 루프 ---
    let time = 0;
    let burstIndices = [0, 0, 0, 0, 0];
    let baseFov = 75;

    function animate() {
        requestAnimationFrame(animate);
        time += 0.01;
        
        let sensitivity = parseFloat(ctrlSens.value);
        let smoothing = parseFloat(ctrlSmooth.value); 
        let lerpFactor = 1.0 - smoothing; 
        let freqMode = ctrlFreqMode.value; 
        
        let band1=0, band2=0, band3=0, band4=0, band5=0; 
        let bass=0, mid=0, treble=0; 

        if (isPlaying && analyser) {
            analyser.getByteFrequencyData(dataArray);
            for(let i=0; i<dataArray.length; i++) smoothedData[i] += (dataArray[i] - smoothedData[i]) * lerpFactor;

            let b1Sum=0, b2Sum=0, b3Sum=0, b4Sum=0, b5Sum=0;
            for(let i=0; i<10; i++) b1Sum += smoothedData[i];      
            for(let i=10; i<40; i++) b2Sum += smoothedData[i];     
            for(let i=40; i<100; i++) b3Sum += smoothedData[i];    
            for(let i=100; i<150; i++) b4Sum += smoothedData[i];   
            for(let i=150; i<200; i++) b5Sum += smoothedData[i];   
            
            band1 = (b1Sum / 10 / 255) * sensitivity; band2 = (b2Sum / 30 / 255) * sensitivity; band3 = (b3Sum / 60 / 255) * sensitivity;
            band4 = (b4Sum / 50 / 255) * sensitivity; band5 = (b5Sum / 50 / 255) * sensitivity;
            bass = band1; mid = (band2 + band3) / 2; treble = (band4 + band5) / 2;
        }

        let targetFov = baseFov - (bass * 15);
        camera.fov += (targetFov - camera.fov) * 0.15; camera.updateProjectionMatrix();
        camera.position.set(parseFloat(ctrlCamX.value), parseFloat(ctrlCamY.value), parseFloat(ctrlCamZ.value)); 
        camera.lookAt(0, 0, 0); 

        if(coreMesh.visible) {
            let scale = 1 + (bass * 3); coreMesh.scale.set(scale, scale, scale);
            coreMesh.rotation.x += 0.005 + (treble * 0.1); coreMesh.rotation.y += 0.005 + (mid * 0.05);
            if (bass > 0.5) coreMaterial.color.setHSL(0.02, 1.0, 0.6); else coreMaterial.color.setHex(0x00ffcc);
        }
        if(coreSprite && coreSprite.visible) {
            let imgScale = 100 * (1 + (bass * 1.0)); coreSprite.scale.set(imgScale, imgScale, 1);
        }

        // --- 다이나믹 메쉬 렌더링 ---
        if (['terrain', 'linear_bars', 'circular_bars'].includes(currentMode) && terrainShape !== 'points') {
            let activeInstances = (currentMode === 'terrain') ? 12000 : 128;
            instMesh.count = activeInstances;
            
            if (currentMode === 'terrain') { instancedGroup.rotation.y += 0.001; instancedGroup.rotation.x = 0; } 
            else if (currentMode === 'circular_bars') { instancedGroup.rotation.y += 0.002; instancedGroup.rotation.x = 0.2; } 
            else { instancedGroup.rotation.set(0,0,0); }

            for (let i = 0; i < activeInstances; i++) {
                let targetFreq = 0; let curColor = new THREE.Color();
                let bx = 0, by = 0, bz = 0; let origIndex = i;

                if (currentMode === 'terrain') {
                    let gridItem = shuffledGrid[i];
                    bx = gridItem.x; bz = gridItem.z; by = -150;
                    origIndex = gridItem.origIndex; 
                    
                    let g = Math.floor(i / 2400); 
                    if (freqMode === '5band') {
                        if (g===0) targetFreq=band1; else if (g===1) targetFreq=band2; else if (g===2) targetFreq=band3; else if (g===3) targetFreq=band4; else targetFreq=band5;
                        if (targetFreq > 0.4) {
                            if(g===0) curColor.setHSL(0.02, 1.0, 0.6); else if(g===1) curColor.setHSL(0.15, 1.0, 0.6); else if(g===2) curColor.lerpColors(baseColor, new THREE.Color(0xffffff), 0.5); else if(g===3) curColor.setHSL(0.6, 1.0, 0.7); else curColor.setHex(0xffffff);
                        } else curColor.copy(baseColor).multiplyScalar(0.4);
                    } else {
                        if (g===0) targetFreq=bass; else if (g===1||g===2) targetFreq=mid; else targetFreq=treble;
                        if (targetFreq > 0.4) {
                            if(g===0) curColor.setHSL(0.02, 1.0, 0.6); else if(g>2) curColor.setHex(0xffffff); else curColor.lerpColors(baseColor, new THREE.Color(0xffffff), 0.3);
                        } else curColor.copy(baseColor).multiplyScalar(0.4);
                    }
                } else {
                    targetFreq = smoothedData[i] / 255.0;
                    if (currentMode === 'circular_bars') {
                        let angle = (i / 128) * Math.PI * 2; bx = Math.cos(angle)*150; bz = Math.sin(angle)*150; by = 0;
                    } else { bx = (i - 64) * 8; bz = 0; by = -100; }
                    if(targetFreq > 0.6) curColor.setHex(0xffffff); else curColor.setHSL((i%128)/128, 1.0, 0.5);
                }
                
                if (terrainShape === 'piano') {
                    let colIndex = currentMode === 'terrain' ? (origIndex % 110) : i;
                    let isBlackKey = [1,3,6,8,10].includes(Math.abs(colIndex) % 12);
                    let baseC = isBlackKey ? new THREE.Color(0x111111) : new THREE.Color(0xcccccc);
                    curColor.lerpColors(baseC, curColor, Math.min(1, targetFreq * 2.5));
                    
                    if (isBlackKey) { bz -= (currentMode === 'circular_bars' ? 10 : 5); by += 2; dummy.scale.set(3, Math.max(1, targetFreq*200*sensitivity), 8); } 
                    else { dummy.scale.set(6, Math.max(1, targetFreq*150*sensitivity), 15); }
                    dummy.rotation.set(0,0,0);
                } 
                else if (terrainShape === 'cube') {
                    dummy.scale.set(10, Math.max(10, targetFreq*100), 10); dummy.rotation.set(0,0,0);
                } 
                else if (terrainShape === 'knit') {
                    dummy.scale.set(16, 2, 16); dummy.rotation.set(0, (i % 2 === 0 ? Math.PI/4 : -Math.PI/4), 0);
                }

                if (currentMode === 'terrain') {
                    let wave = Math.sin((bx * 0.03) + time * (3 + targetFreq)) * (15 + targetFreq*20);
                    dummy.position.set(bx, by + (targetFreq * 250 * sensitivity) + wave, bz);
                } else if (currentMode === 'circular_bars') {
                    dummy.position.set(bx, by + dummy.scale.y/2, bz); dummy.lookAt(0, dummy.position.y, 0); 
                } else {
                    dummy.position.set(bx, by + dummy.scale.y/2, bz);
                }

                dummy.updateMatrix(); instMesh.setMatrixAt(i, dummy.matrix); instMesh.setColorAt(i, curColor);
            }
            instMesh.instanceMatrix.needsUpdate = true;
            if(instMesh.instanceColor) instMesh.instanceColor.needsUpdate = true;
        }
        // --- 파티클 시스템 ---
        else {
            particleGroup.rotation.y += 0.001;
            for (let g = 0; g < numGroups; g++) {
                let pArr = posArrays[g], oArr = origArrays[g], vArr = velArrays[g];
                
                let targetFreq = 0;
                if (freqMode === '5band') {
                    if (g===0) targetFreq=band1; else if (g===1) targetFreq=band2; else if (g===2) targetFreq=band3; else if (g===3) targetFreq=band4; else targetFreq=band5;
                } else {
                    if (g===0) targetFreq=bass; else if (g===1||g===2) targetFreq=mid; else targetFreq=treble;
                }

                // ★ 유체 흐름 (Fluid Flow) 구형 바운더리 및 모션 고도화 ★
                if (currentMode === 'fluid') {
                    let nType = document.getElementById('ctrl-noise-'+g).value;
                    let t = time * 2.0;

                    for (let i = 0; i < particlesPerGroup; i++) {
                        let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                        let px = pArr[ix] * 0.005, py = pArr[iy] * 0.005, pz = pArr[iz] * 0.005;
                        let vx=0, vy=0, vz=0;

                        if (nType === 'curl') { vx=Math.sin(py+t); vy=Math.cos(pz+t); vz=Math.sin(px+t); }
                        else if (nType === 'perlin') { vx=Math.sin(px+t)+Math.sin(py*0.5-t); vy=Math.cos(py+t)+Math.cos(pz*0.5-t); vz=Math.sin(pz+t)+Math.cos(px*0.5+t); }
                        else if (nType === 'turbulence') { vx=Math.sin(px+t)+0.5*Math.sin(py*2-t*2); vy=Math.cos(py+t)+0.5*Math.cos(pz*2+t*2); vz=Math.sin(pz+t)+0.5*Math.cos(px*2-t*2); }
                        else if (nType === 'cellular') { vx=Math.abs(Math.sin(py+t))-0.5; vy=Math.abs(Math.cos(pz+t))-0.5; vz=Math.abs(Math.sin(px+t))-0.5; }
                        else if (nType === 'glitch') { vx=Math.round(Math.sin(py+t)); vy=Math.round(Math.cos(pz+t)); vz=Math.round(Math.sin(px+t)); }
                        vx*=2; vy*=2; vz*=2;

                        // 대역별 액션 (과도한 이탈 방지)
                        if (g === 0) { vz += targetFreq * 25.0; mats[g].size = 2.0 * (1 + targetFreq * 8); } 
                        else if (g === 1) { vy += (Math.random() > 0.5 ? 1 : -1) * targetFreq * 15.0; mats[g].size = 2.0 * (1 + targetFreq); } 
                        else if (g === 2) { if (targetFreq < 0.1) { vx*=0.1; vy*=0.1; vz*=0.1; } else { vx*=targetFreq*12; vy*=targetFreq*12; vz*=targetFreq*12; } mats[g].size = 2.0; } 
                        else if (g === 3) { if(targetFreq>0.3){ vx+=(Math.random()>0.5?15:-15)*targetFreq; vy+=(Math.random()>0.5?15:-15)*targetFreq; } mats[g].size=1.5; } 
                        else if (g === 4) { let d=Math.sqrt(pArr[ix]**2+pArr[iy]**2+pArr[iz]**2)+0.1; vx+=(pArr[ix]/d)*targetFreq*25; vy+=(pArr[iy]/d)*targetFreq*25; vz+=(pArr[iz]/d)*targetFreq*25; mats[g].size=2.0*(0.5+targetFreq*5); } 

                        // ★ 구형 장벽 (Spherical Containment) 
                        let dist = Math.sqrt(pArr[ix]**2 + pArr[iy]**2 + pArr[iz]**2) + 0.1;
                        if (dist > 500) {
                            let pull = (dist - 500) * 0.015;
                            vx -= (pArr[ix] / dist) * pull; vy -= (pArr[iy] / dist) * pull; vz -= (pArr[iz] / dist) * pull;
                        }

                        vx -= pArr[ix] * 0.0015; vy -= pArr[iy] * 0.0015; vz -= pArr[iz] * 0.0015;
                        pArr[ix] += vx; pArr[iy] += vy; pArr[iz] += vz;
                        
                        // 하드 리미트
                        if(Math.abs(pArr[ix])>800) pArr[ix]*=0.8; if(Math.abs(pArr[iy])>800) pArr[iy]*=0.8; if(Math.abs(pArr[iz])>800) pArr[iz]*=0.8;
                    }
                }
                else if (currentMode === 'explosion') {
                    let linePos = lineGeos[g].attributes.position.array;
                    let lineIdx = 0;

                    if (targetFreq > 0.5) {
                        let burstAmount = (g === 0) ? 60 : 20; 
                        for(let b=0; b<burstAmount; b++) {
                            let bIdx = burstIndices[g] % particlesPerGroup;
                            let idx = bIdx * 3;
                            pArr[idx] = 0; pArr[idx+1] = 0; pArr[idx+2] = 0; 
                            let u = Math.random(), v = Math.random();
                            let theta = u * 2.0 * Math.PI, phi = Math.acos(2.0 * v - 1.0);
                            let speed = 25 + (targetFreq * 70) + (Math.random() * 20);
                            vArr[idx] = Math.sin(phi) * Math.cos(theta) * speed;
                            vArr[idx+1] = Math.sin(phi) * Math.sin(theta) * speed;
                            vArr[idx+2] = Math.cos(phi) * speed;
                            
                            lifeArrays[g][bIdx] = 1.0; 
                            burstIndices[g]++;
                        }
                    }

                    for (let i = 0; i < particlesPerGroup; i++) {
                        let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                        if (lifeArrays[g][i] > 0) {
                            lifeArrays[g][i] -= 0.012; 
                            let life = lifeArrays[g][i];

                            if (life > 0.6) {
                                pArr[ix] += vArr[ix]; pArr[iy] += vArr[iy]; pArr[iz] += vArr[iz];
                                vArr[ix] *= 0.85; vArr[iy] *= 0.85; vArr[iz] *= 0.85;
                            } else if (life > 0.1) {
                                let dist = Math.sqrt(pArr[ix]**2 + pArr[iy]**2 + pArr[iz]**2);
                                if (dist > 500 && i > 0 && lifeArrays[g][i-1] > 0.1 && lifeArrays[g][i-1] <= 0.6) {
                                    linePos[lineIdx++] = pArr[ix-3]; linePos[lineIdx++] = pArr[iy-3]; linePos[lineIdx++] = pArr[iz-3];
                                    linePos[lineIdx++] = pArr[ix];   linePos[lineIdx++] = pArr[iy];   linePos[lineIdx++] = pArr[iz];
                                }
                            } else { pArr[ix] *= 0.8; pArr[iy] *= 0.8; pArr[iz] *= 0.8; }
                        } else { pArr[ix] = 0; pArr[iy] = 0; pArr[iz] = 0; }
                    }
                    lineGeos[g].setDrawRange(0, lineIdx / 3);
                    lineGeos[g].attributes.position.needsUpdate = true;
                }
                else if (currentMode === 'wormhole') {
                    particleGroup.rotation.z = time * 0.5 + (bass * 0.5);
                    let speed = 2 + (targetFreq * 50); 
                    for (let i = 0; i < particlesPerGroup; i++) {
                        let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                        pArr[iz] += speed; if (pArr[iz] > 300) pArr[iz] = -2000; 
                        let angle = Math.atan2(oArr[iy], oArr[ix]); let r = Math.sqrt(oArr[ix]**2 + oArr[iy]**2);
                        let targetR = r + (targetFreq * 100); 
                        pArr[ix] += (Math.cos(angle) * targetR - pArr[ix]) * 0.1; pArr[iy] += (Math.sin(angle) * targetR - pArr[iy]) * 0.1;
                    }
                }
                else if (currentMode === 'spiral') {
                    for (let i = 0; i < particlesPerGroup; i++) {
                        let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                        let globalIdx = (g * particlesPerGroup) + i;
                        let arm = globalIdx % 4; let dir = (arm % 2 === 0) ? 1 : -1;
                        let angle = Math.atan2(oArr[iz], oArr[ix]) + (time * 0.2 * dir) + (targetFreq * 0.2 * dir); 
                        let r = Math.sqrt(oArr[ix]**2 + oArr[iz]**2); let targetR = r * (1 + targetFreq * 0.8); 
                        pArr[ix] += (Math.cos(angle) * targetR - pArr[ix]) * 0.1; pArr[iz] += (Math.sin(angle) * targetR - pArr[iz]) * 0.1; pArr[iy] += (oArr[iy] - pArr[iy]) * 0.1; 
                    }
                }
                else if (currentMode === 'terrain') {
                    for (let i = 0; i < particlesPerGroup; i++) {
                        let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                        let wave = Math.sin((oArr[ix] * 0.03) + time * (3 + targetFreq)) * (15 + targetFreq*20);
                        pArr[iy] += ((oArr[iy] + (targetFreq * 200 * sensitivity) + wave) - pArr[iy]) * 0.1; 
                    }
                }

                if (currentMode !== 'fluid') mats[g].size = 2.0 * (1 + targetFreq * 3);
                
                if (targetFreq > 0.4) {
                    if (freqMode === '5band') {
                        if(g===0) mats[g].color.setHSL(0.02, 1.0, 0.6); else if(g===1) mats[g].color.setHSL(0.15, 1.0, 0.6); else if(g===2) mats[g].color.lerp(new THREE.Color(0xffffff), 0.5); else if(g===3) mats[g].color.setHSL(0.6, 1.0, 0.7); else mats[g].color.setHex(0xffffff);
                    } else {
                        if(g===0) mats[g].color.setHSL(0.02, 1.0, 0.6); else if(g>2) mats[g].color.setHex(0xffffff); else mats[g].color.lerp(new THREE.Color(0xffffff), 0.3);
                    }
                    lineMeshes[g].material.color.copy(mats[g].color);
                } else {
                    mats[g].color.lerp(baseColor, 0.05); lineMeshes[g].material.color.lerp(baseColor, 0.05);
                }
                geometries[g].attributes.position.needsUpdate = true;
            }
        }
        composer.render();
    }
    animate(); 
</script>
</body>
</html>
