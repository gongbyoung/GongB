<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>003</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        
        #ui { 
            position: absolute; top: 20px; left: 20px; z-index: 10; 
            background: rgba(15, 15, 15, 0.85); padding: 20px; 
            border-radius: 8px; border: 1px solid #333;
            width: 320px; backdrop-filter: blur(5px);
        }
        
        h3 { margin-top: 0; color: #00ffcc; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 18px;}
        
        .control-group { margin-bottom: 12px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; color: #ccc; }
        .control-group input[type="range"] { width: 100%; cursor: pointer; }
        .control-group input[type="color"] { width: 100%; height: 30px; border: none; cursor: pointer; background: none; }
        .control-group select { 
            width: 100%; padding: 8px; background: #222; color: #00ffcc; 
            border: 1px solid #555; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        
        #audio-input-area { display: none; margin-top: 15px; border-top: 1px solid #444; padding-top: 15px; }
        input[type="file"] { margin-bottom: 10px; display: block; color: white; width: 100%; font-size: 12px; }
        
        button { 
            background-color: #00ffcc; border: none; padding: 12px; width: 100%;
            border-radius: 5px; cursor: pointer; color: black; font-weight: bold; font-size: 14px; transition: 0.2s;
        }
        button:hover { background-color: #00ccaa; }
        
        #status { font-size: 12px; color: #aaa; margin-top: 10px; line-height: 1.4; word-break: break-all; }
        .recording-badge { color: #ff3366; font-weight: bold; animation: blink 1.5s infinite; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="ui">
    <h3>VFX 멀티 모드 비주얼라이저</h3>
    
    <div class="control-group">
        <label>파티클 모드 (VFX Mode)</label>
        <select id="ctrl-mode">
            <option value="fluid">유체 흐름 (Houdini Fluid Style)</option>
            <option value="terrain">오디오 지형 (Audio Terrain)</option>
            <option value="explosion">비트 폭발 (Emitter Explosion)</option>
        </select>
    </div>

    <div class="control-group">
        <label>줌 인/아웃 (Camera) <span id="val-zoom">250</span></label>
        <input type="range" id="ctrl-zoom" min="50" max="800" value="250" step="10">
    </div>
    <div class="control-group">
        <label>파티클 크기 (Size) <span id="val-size">2.0</span></label>
        <input type="range" id="ctrl-size" min="0.5" max="10" value="2.0" step="0.1">
    </div>
    <div class="control-group">
        <label>반응 감도 (Sensitivity) <span id="val-sens">1.0</span></label>
        <input type="range" id="ctrl-sens" min="0.1" max="3" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label>기본 색상 (Color)</label>
        <input type="color" id="ctrl-color" value="#00ffcc">
    </div>

    <button id="start-btn">오디오 시스템 시작</button>
    
    <div id="audio-input-area">
        <input type="file" id="audio-file" accept="audio/*">
        <div id="status">파일을 선택하면 자동 녹화가 시작됩니다.</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // --- 1. Three.js 기본 설정 ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
    const renderer = new THREE.WebGLRenderer({antialias: true, preserveDrawingBuffer: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    
    // UI 바인딩
    const ctrlMode = document.getElementById('ctrl-mode');
    const ctrlZoom = document.getElementById('ctrl-zoom');
    const ctrlSize = document.getElementById('ctrl-size');
    const ctrlSens = document.getElementById('ctrl-sens');
    const ctrlColor = document.getElementById('ctrl-color');
    const updateUIVal = (id, val) => document.getElementById(id).innerText = val;

    camera.position.z = parseFloat(ctrlZoom.value);
    ctrlZoom.oninput = (e) => { camera.position.z = parseFloat(e.target.value); updateUIVal('val-zoom', e.target.value); };
    ctrlSize.oninput = (e) => { mat.size = parseFloat(e.target.value); updateUIVal('val-size', e.target.value); };
    ctrlSens.oninput = (e) => { updateUIVal('val-sens', e.target.value); };

    let baseColor = new THREE.Color(ctrlColor.value);
    ctrlColor.oninput = (e) => { baseColor.set(e.target.value); };

    // --- [Concept 1] 코어 이퀄라이저 시스템 ---
    const coreGeometry = new THREE.IcosahedronGeometry(25, 1);
    const coreMaterial = new THREE.MeshBasicMaterial({color: 0x00ffcc, wireframe: true, transparent: true, opacity: 0.8});
    const coreMesh = new THREE.Mesh(coreGeometry, coreMaterial);
    scene.add(coreMesh);

    // --- 2. 파티클 시스템 구성 ---
    const circleCanvas = document.createElement('canvas');
    circleCanvas.width = 64; circleCanvas.height = 64;
    const ctx = circleCanvas.getContext('2d');
    ctx.beginPath(); ctx.arc(32, 32, 30, 0, Math.PI * 2); ctx.fillStyle = "white"; ctx.fill();
    const circleTexture = new THREE.CanvasTexture(circleCanvas);

    const particleCount = 10000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const velocities = new Float32Array(particleCount * 3);
    const originalPositions = new Float32Array(particleCount * 3);

    // [에러 해결!] 버퍼 지오메트리에 속성을 먼저 세팅해야 합니다.
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const mat = new THREE.PointsMaterial({
        color: baseColor, size: parseFloat(ctrlSize.value), 
        map: circleTexture, transparent: true, alphaTest: 0.1, blending: THREE.AdditiveBlending
    });
    const particleSystem = new THREE.Points(geometry, mat);
    scene.add(particleSystem);

    let currentMode = ctrlMode.value;

    // 모드 변경 시 파티클 초기화 함수
    function resetParticles(mode) {
        currentMode = mode;
        const posArray = geometry.attributes.position.array;
        
        for (let i = 0; i < particleCount; i++) {
            let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
            
            if (mode === 'terrain') {
                let x = (i % 100) - 50;
                let y = Math.floor(i / 100) - 50;
                posArray[ix] = x * 15;
                posArray[iy] = -150; 
                posArray[iz] = y * 15;
            } else if (mode === 'explosion') {
                posArray[ix] = (Math.random() - 0.5) * 10;
                posArray[iy] = (Math.random() - 0.5) * 10;
                posArray[iz] = (Math.random() - 0.5) * 10;
                velocities[ix] = velocities[iy] = velocities[iz] = 0;
            } else if (mode === 'fluid') {
                posArray[ix] = (Math.random() - 0.5) * 800;
                posArray[iy] = (Math.random() - 0.5) * 800;
                posArray[iz] = (Math.random() - 0.5) * 800;
            }
            originalPositions[ix] = posArray[ix];
            originalPositions[iy] = posArray[iy];
            originalPositions[iz] = posArray[iz];
        }
        geometry.attributes.position.needsUpdate = true;
    }

    // 초기 및 콤보박스 변경 이벤트 시 초기화
    resetParticles(currentMode);
    ctrlMode.onchange = (e) => resetParticles(e.target.value);

    // --- 3. 오디오 및 녹화 시스템 ---
    let audioCtx, analyser, dataArray, currentSource;
    let mediaRecorder;
    let recordedChunks = [];
    
    const startBtn = document.getElementById('start-btn');
    const audioInputArea = document.getElementById('audio-input-area');
    const audioInput = document.getElementById('audio-file');
    const statusEl = document.getElementById('status');

    startBtn.onclick = function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512; 
        dataArray = new Uint8Array(analyser.frequencyBinCount);

        startBtn.style.display = 'none';
        audioInputArea.style.display = 'block';
        statusEl.innerText = "이제 재생할 MP3 파일을 선택해주세요.";
        animate(); 
    };

    audioInput.onchange = function(event) {
        const file = event.target.files[0];
        if (!file) return;
        statusEl.innerText = "음원 분석 중... 잠시만 기다려주세요.";

        const reader = new FileReader();
        reader.onload = function(e) {
            audioCtx.decodeAudioData(e.target.result, function(buffer) {
                if (currentSource) currentSource.stop();
                currentSource = audioCtx.createBufferSource();
                currentSource.buffer = buffer;
                currentSource.connect(analyser);
                
                const audioDestination = audioCtx.createMediaStreamDestination();
                analyser.connect(audioCtx.destination);
                analyser.connect(audioDestination);
                
                const canvasStream = renderer.domElement.captureStream(60);
                const audioStream = audioDestination.stream;
                const combinedStream = new MediaStream([...canvasStream.getVideoTracks(), ...audioStream.getAudioTracks()]);
                
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm; codecs=vp9' });
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style = 'display: none'; a.href = url;
                    a.download = file.name.replace(/\.[^/.]+$/, "") + '_VFX.webm';
                    document.body.appendChild(a); a.click();
                    window.URL.revokeObjectURL(url);
                    statusEl.innerText = "녹화 완료! 영상이 저장되었습니다.";
                };

                currentSource.onended = () => { if(mediaRecorder.state === 'recording') mediaRecorder.stop(); };
                currentSource.start(0);
                mediaRecorder.start();
                statusEl.innerHTML = `<span class="recording-badge">● REC</span> 자동 녹화 중: ${file.name}`;
            });
        };
        reader.readAsArrayBuffer(file);
    };

    // --- 4. 렌더링 및 알고리즘 애니메이션 ---
    let time = 0;
    let burstIndex = 0; 

    function animate() {
        requestAnimationFrame(animate);
        time += 0.01;
        
        let sensitivity = parseFloat(ctrlSens.value);
        let bass = 0, mid = 0, treble = 0;

        if (analyser) {
            analyser.getByteFrequencyData(dataArray);
            let bSum = 0, mSum = 0, tSum = 0;
            for(let i=0; i<10; i++) bSum += dataArray[i];
            for(let i=10; i<100; i++) mSum += dataArray[i];
            for(let i=100; i<200; i++) tSum += dataArray[i];
            
            bass = (bSum / 10 / 255) * sensitivity;
            mid = (mSum / 90 / 255) * sensitivity;
            treble = (tSum / 100 / 255) * sensitivity;
        }

        // 코어 애니메이션
        let coreScale = 1 + (bass * 3);
        coreMesh.scale.set(coreScale, coreScale, coreScale);
        coreMesh.rotation.x += 0.005 + (treble * 0.1);
        coreMesh.rotation.y += 0.005 + (mid * 0.05);
        if (treble > 0.4) coreMaterial.color.setHSL((time * 0.5) % 1, 1.0, 0.6);
        else coreMaterial.color.setHex(0x00ffcc);

        const posArray = geometry.attributes.position.array;

        // 모드별 로직
        if (currentMode === 'terrain') {
            particleSystem.rotation.y = time * 0.1; 
            particleSystem.rotation.x = 0.2;
            for (let i = 0; i < particleCount; i++) {
                let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                let fftIndex = (i % 100) * 2; 
                let freqData = (dataArray && dataArray[fftIndex] !== undefined) ? (dataArray[fftIndex] / 255) : 0;
                
                let wave = Math.sin((originalPositions[ix] * 0.05) + time * 5) * 10;
                posArray[iy] = originalPositions[iy] + (freqData * 200 * sensitivity) + wave;
            }
        } 
        else if (currentMode === 'explosion') {
            particleSystem.rotation.y += 0.005;
            
            if (bass > 0.5) {
                let burstAmount = 150;
                for(let b=0; b<burstAmount; b++) {
                    let idx = burstIndex * 3;
                    posArray[idx] = 0; posArray[idx+1] = 0; posArray[idx+2] = 0; 
                    
                    let u = Math.random();
                    let v = Math.random();
                    let theta = u * 2.0 * Math.PI;
                    let phi = Math.acos(2.0 * v - 1.0);
                    let speed = 5 + (bass * 20) + (Math.random() * 5);
                    
                    velocities[idx] = Math.sin(phi) * Math.cos(theta) * speed;
                    velocities[idx+1] = Math.sin(phi) * Math.sin(theta) * speed;
                    velocities[idx+2] = Math.cos(phi) * speed;
                    
                    burstIndex = (burstIndex + 1) % particleCount; 
                }
            }
            
            for (let i = 0; i < particleCount; i++) {
                let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                posArray[ix] += velocities[ix];
                posArray[iy] += velocities[iy];
                posArray[iz] += velocities[iz];
                
                velocities[ix] *= 0.96;
                velocities[iy] *= 0.96;
                velocities[iz] *= 0.96;
                
                if(Math.abs(posArray[ix]) > 600 || Math.abs(posArray[iy]) > 600) {
                    posArray[ix] = 0; posArray[iy] = 0; posArray[iz] = 0;
                }
            }
        } 
        else if (currentMode === 'fluid') {
            particleSystem.rotation.y = 0;
            particleSystem.rotation.x = 0;
            let speedMult = 1.0 + (mid * 5); 

            for (let i = 0; i < particleCount; i++) {
                let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                
                let vx = Math.sin(posArray[iy] * 0.01 + time) * 2;
                let vy = Math.cos(posArray[iz] * 0.01 + time) * 2;
                let vz = Math.sin(posArray[ix] * 0.01 + time) * 2;
                
                vx -= posArray[ix] * 0.005;
                vy -= posArray[iy] * 0.005;
                vz -= posArray[iz] * 0.005;

                posArray[ix] += vx * speedMult;
                posArray[iy] += vy * speedMult;
                posArray[iz] += vz * speedMult;
            }
        }

        geometry.attributes.position.needsUpdate = true;
        
        if (bass > 0.7) mat.color.setHSL(Math.random(), 1.0, 0.6); 
        else mat.color.lerp(baseColor, 0.05);

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
    });
</script>
</body>
</html>
