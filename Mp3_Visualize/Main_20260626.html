<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages 오디오 반응형 파티클 시스템</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: monospace; }
        canvas { display: block; }
        #ui-overlay {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.8); padding: 15px;
            border: 1px solid #444; border-radius: 5px;
            pointer-events: none; /* 클릭 방지 */
        }
        .ui-item { margin-bottom: 8px; }
        .active-beat { color: #ff0055; text-shadow: 0 0 10px #ff0055; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div class="ui-item">
        <input type="file" id="audio-file" accept="audio/mp3">
    </div>
    <div class="ui-item">상태: <span id="status">파일을 선택해주세요</span></div>
    <div class="ui-item">BPM: <span id="bpm">--</span></div>
</div>

<script>
    // 오디오 파일 로딩 로직 추가
    const audioInput = document.getElementById('audio-file');
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    let audioSource = null;

    audioInput.onchange = function() {
        const file = this.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            audioContext.decodeAudioData(e.target.result, function(buffer) {
                if (audioSource) audioSource.stop(); // 이전 음악 정지
                
                audioSource = audioContext.createBufferSource();
                audioSource.buffer = buffer;
                
                // 분석기 연결
                audioSource.connect(audioAnalyzer);
                audioAnalyzer.connect(audioContext.destination);
                
                audioSource.start(0);
                document.getElementById('status').innerText = "재생 중: " + file.name;
            });
        };
        reader.readAsArrayBuffer(file);
    };

    // (이후 기존의 animate() 루프는 그대로 사용하면 됩니다)
</script>
</body>
</html>
