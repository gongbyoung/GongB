<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>UAV_V002</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; }
        
        canvas { width: 100vw !important; height: 100vh !important; object-fit: contain; }

        #ui { 
            position: absolute; top: 15px; left: 15px; z-index: 10; 
            background: rgba(10, 10, 10, 0.9); padding: 20px; 
            border-radius: 8px; border: 1px solid #444;
            width: 320px; max-height: 90vh; overflow-y: auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        
        h3 { margin-top: 0; color: #00ffcc; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 16px; text-align: center;}
        .section-title { font-size: 11px; color: #888; margin: 15px 0 5px 0; border-bottom: 1px dashed #333; padding-bottom: 3px;}
        
        .control-group { margin-bottom: 10px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; color: #ddd; }
        .control-group input[type="range"] { width: 100%; cursor: pointer; accent-color: #00ffcc; }
        .control-group input[type="color"] { width: 100%; height: 25px; border: none; cursor: pointer; background: none; }
        .control-group select, .file-btn { 
            width: 100%; padding: 6px; background: #222; color: #00ffcc; 
            border: 1px solid #555; border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        
        #audio-input-area { margin-top: 20px; border-top: 2px solid #00ffcc; padding-top: 15px; }
        input[type="file"] { margin-bottom: 10px; display: block; color: white; width: 100%; font-size: 12px; }
        
        .main-btn { 
            background-color: #00ffcc; border: none; padding: 12px; width: 100%;
            border-radius: 5px; cursor: pointer; color: black; font-weight: bold; font-size: 14px; transition: 0.2s;
        }
        .main-btn:hover { background-color: #00ccaa; }

        .record-btn {
            background-color: #ff3366; color: white; margin-top: 15px;
            animation: pulse 2s infinite; display: none;
        }
        .record-btn:hover { background-color: #ff1144; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 51, 102, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 51, 102, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 51, 102, 0); } }
        
        #status { font-size: 12px; color: #aaa; margin-top: 10px; line-height: 1.4; word-break: break-all; text-align: center;}
        .recording-badge { color: #ff3366; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    </style>
</head>
<body>

<div id="ui">
    <h3>VFX 뮤직비디오 프로덕션</h3>
    
    <div class="section-title">[비디오 및 모드 설정]</div>
    <div class="control-group">
        <label>화면 비율 (저장 해상도)</label>
        <select id="ctrl-ratio">
            <option value="16:9">가로형 (1920x1080 - 유튜브용)</option>
            <option value="9:16">세로형 (1080x1920 - 쇼츠용)</option>
            <option value="fit">화면 맞춤 (브라우저 크기)</option>
        </select>
    </div>
    <div class="control-group">
        <label>파티클 모드 (VFX Mode)</label>
        <select id="ctrl-mode">
            <option value="multilayer" selected>★ 멀티 레이어 (저/중/고음 완전 분리)</option>
            <option value="fluid">단일: 유체 흐름 (Houdini Fluid)</option>
            <option value="terrain">단일: 오디오 지형 (Terrain)</option>
            <option value="explosion">단일: 비트 폭발 (Emitter)</option>
            <option value="wormhole">단일: 은하계 터널 (Wormhole)</option>
            <option value="spiral">단일: 나선 은하 (Spiral)</option>
        </select>
    </div>

    <div class="section-title">[카메라 구도 세팅]</div>
    <div class="control-group">
        <label>카메라 X (좌우) <span id="val-cam-x">0</span></label>
        <input type="range" id="ctrl-cam-x" min="-1000" max="1000" value="0" step="10">
    </div>
    <div class="control-group">
        <label>카메라 Y (상하) <span id="val-cam-y">0</span></label>
        <input type="range" id="ctrl-cam-y" min="-1000" max="1000" value="0" step="10">
    </div>
    <div class="control-group">
        <label>카메라 Z (거리) <span id="val-cam-z">300</span></label>
        <input type="range" id="ctrl-cam-z" min="50" max="1500" value="300" step="10">
    </div>

    <div class="section-title">[글로벌 비주얼 설정]</div>
    <div class="control-group">
        <label>파티클 기본 크기 <span id="val-size">2.0</span></label>
        <input type="range" id="ctrl-size" min="0.5" max="10" value="2.0" step="0.1">
    </div>
    <div class="control-group">
        <label>크기 랜덤성 (Variation) <span id="val-random">1.5</span></label>
        <input type="range" id="ctrl-random" min="0" max="5" value="1.5" step="0.1">
    </div>
    <div class="control-group">
        <label>전체 반응 감도 (Sens.) <span id="val-sens">1.0</span></label>
        <input type="range" id="ctrl-sens" min="0.1" max="3" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label>기본 색상 (Color)</label>
        <input type="color" id="ctrl-color" value="#00ffcc">
    </div>
    <div class="control-group">
        <label style="color: #ffaa00;">중앙 로고 교체 (PNG/JPG)</label>
        <input type="file" id="core-image-file" class="file-btn" accept="image/png, image/jpeg">
    </div>

    <div id="audio-input-area">
        <button id="init-btn" class="main-btn">오디오 시스템 초기화</button>
        <div id="file-select-box" style="display: none; margin-top:10px;">
            <input type="file" id="audio-file" accept="audio/*">
            <div id="status">MP3를 선택하고 구도를 세팅하세요.</div>
            <button id="record-btn" class="main-btn record-btn">▶ 녹화 및 재생 시작</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // --- 1. Three.js 기본 설정 ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 4000);
    const renderer = new THREE.WebGLRenderer({antialias: true, preserveDrawingBuffer: true});
    document.body.appendChild(renderer.domElement);
    
    const ctrlRatio = document.getElementById('ctrl-ratio');
    const ctrlMode = document.getElementById('ctrl-mode');
    
    // 카메라 컨트롤 UI 바인딩
    const ctrlCamX = document.getElementById('ctrl-cam-x');
    const ctrlCamY = document.getElementById('ctrl-cam-y');
    const ctrlCamZ = document.getElementById('ctrl-cam-z');
    
    const ctrlSize = document.getElementById('ctrl-size');
    const ctrlRandom = document.getElementById('ctrl-random');
    const ctrlSens = document.getElementById('ctrl-sens');
    const ctrlColor = document.getElementById('ctrl-color');
    const updateUIVal = (id, val) => document.getElementById(id).innerText = val;

    function updateAspectRatio() {
        let val = ctrlRatio.value;
        let w = window.innerWidth, h = window.innerHeight;
        if (val === '16:9') { w = 1920; h = 1080; }
        else if (val === '9:16') { w = 1080; h = 1920; }

        renderer.setSize(w, h); 
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
    }
    ctrlRatio.onchange = updateAspectRatio;
    window.addEventListener('resize', () => { if (ctrlRatio.value === 'fit') updateAspectRatio(); });
    updateAspectRatio(); 

    ctrlCamX.oninput = (e) => updateUIVal('val-cam-x', e.target.value);
    ctrlCamY.oninput = (e) => updateUIVal('val-cam-y', e.target.value);
    ctrlCamZ.oninput = (e) => updateUIVal('val-cam-z', e.target.value);
    ctrlSens.oninput = (e) => updateUIVal('val-sens', e.target.value);
    let baseColor = new THREE.Color(ctrlColor.value);
    ctrlColor.oninput = (e) => baseColor.set(e.target.value);

    // --- 코어 시스템 ---
    const coreGeometry = new THREE.IcosahedronGeometry(25, 1);
    const coreMaterial = new THREE.MeshBasicMaterial({color: 0x00ffcc, wireframe: true, transparent: true, opacity: 0.8});
    const coreMesh = new THREE.Mesh(coreGeometry, coreMaterial);
    scene.add(coreMesh);

    let coreSprite = null; 
    document.getElementById('core-image-file').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const tex = new THREE.Texture(img);
                tex.needsUpdate = true;
                if(!coreSprite) {
                    const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true });
                    coreSprite = new THREE.Sprite(spriteMat);
                    coreSprite.scale.set(60, 60, 1);
                    scene.add(coreSprite);
                } else {
                    coreSprite.material.map = tex;
                }
                coreMesh.visible = false; 
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    // --- 2. 파티클 시스템 ---
    const circleCanvas = document.createElement('canvas');
    circleCanvas.width = 64; circleCanvas.height = 64;
    const ctx = circleCanvas.getContext('2d');
    ctx.beginPath(); ctx.arc(32, 32, 30, 0, Math.PI * 2); ctx.fillStyle = "white"; ctx.fill();
    const circleTexture = new THREE.CanvasTexture(circleCanvas);

    const numGroups = 5;
    const particlesPerGroup = 2400; 
    const geometries = [], posArrays = [], velArrays = [], origArrays = [], mats = [];

    for (let g = 0; g < numGroups; g++) {
        let geo = new THREE.BufferGeometry();
        let p = new Float32Array(particlesPerGroup * 3);
        let v = new Float32Array(particlesPerGroup * 3);
        let o = new Float32Array(particlesPerGroup * 3);
        geo.setAttribute('position', new THREE.BufferAttribute(p, 3));
        
        let mat = new THREE.PointsMaterial({
            color: baseColor, map: circleTexture, transparent: true, alphaTest: 0.1, blending: THREE.AdditiveBlending
        });
        
        geometries.push(geo); posArrays.push(p); velArrays.push(v); origArrays.push(o); mats.push(mat);
        scene.add(new THREE.Points(geo, mat));
    }

    function updateParticleSizes() {
        let baseSize = parseFloat(ctrlSize.value);
        let rand = parseFloat(ctrlRandom.value);
        mats[0].size = Math.max(0.1, baseSize + rand); 
        mats[1].size = Math.max(0.1, baseSize - (rand * 0.4)); 
        mats[2].size = baseSize; 
        mats[3].size = Math.max(0.1, baseSize - (rand * 0.8)); 
        mats[4].size = baseSize + (rand * 0.5); 
    }
    
    ctrlSize.oninput = (e) => { updateUIVal('val-size', e.target.value); updateParticleSizes(); };
    ctrlRandom.oninput = (e) => { updateUIVal('val-random', e.target.value); updateParticleSizes(); };
    updateParticleSizes(); 

    let currentMode = ctrlMode.value;

    function resetParticles(mode) {
        currentMode = mode;
        
        let showCore = (mode !== 'fluid');
        if (coreSprite) { coreSprite.visible = showCore; coreMesh.visible = false; } 
        else { coreMesh.visible = showCore; }

        for (let g = 0; g < numGroups; g++) {
            let pArr = posArrays[g], oArr = origArrays[g], vArr = velArrays[g];
            for (let i = 0; i < particlesPerGroup; i++) {
                let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                let globalIdx = (g * particlesPerGroup) + i;
                
                if (mode === 'multilayer') {
                    if (g === 0) { 
                        pArr[ix] = (Math.random() - 0.5) * 10; pArr[iy] = (Math.random() - 0.5) * 10; pArr[iz] = (Math.random() - 0.5) * 10;
                        vArr[ix] = vArr[iy] = vArr[iz] = 0;
                    } else if (g === 1 || g === 2) { 
                        pArr[ix] = (Math.random() - 0.5) * 1500; pArr[iy] = (Math.random() - 0.5) * 1500; pArr[iz] = (Math.random() - 0.5) * 1500;
                    } else { 
                        let angle = Math.random() * Math.PI * 2;
                        let radius = 100 + Math.random() * 400;
                        pArr[ix] = Math.cos(angle) * radius; pArr[iy] = (Math.random() - 0.5) * 100; pArr[iz] = Math.sin(angle) * radius;
                    }
                } 
                else if (mode === 'terrain') {
                    let x = (globalIdx % 110) * 15 - 825; let z = Math.floor(globalIdx / 110) * 15 - 825;
                    pArr[ix] = x; pArr[iy] = -150; pArr[iz] = z;
                } else if (mode === 'explosion') {
                    pArr[ix] = (Math.random() - 0.5) * 10; pArr[iy] = (Math.random() - 0.5) * 10; pArr[iz] = (Math.random() - 0.5) * 10;
                    vArr[ix] = vArr[iy] = vArr[iz] = 0;
                } else if (mode === 'fluid') {
                    pArr[ix] = (Math.random() - 0.5) * 1000; pArr[iy] = (Math.random() - 0.5) * 1000; pArr[iz] = (Math.random() - 0.5) * 1000;
                } else if (mode === 'wormhole') {
                    let angle = Math.random() * Math.PI * 2; let radius = 80 + Math.random() * 200;
                    pArr[ix] = Math.cos(angle) * radius; pArr[iy] = Math.sin(angle) * radius; pArr[iz] = (Math.random() * 2000) - 1000;
                } else if (mode === 'spiral') {
                    let arm = globalIdx % 4; let angle = (globalIdx / 12000) * Math.PI * 2 * 8 + (arm * Math.PI / 2);
                    let radius = (globalIdx / 12000) * 500 + (Math.random()*20);
                    pArr[ix] = Math.cos(angle) * radius; pArr[iy] = (Math.random() - 0.5) * 40; pArr[iz] = Math.sin(angle) * radius;
                }
                oArr[ix] = pArr[ix]; oArr[iy] = pArr[iy]; oArr[iz] = pArr[iz];
            }
            geometries[g].attributes.position.needsUpdate = true;
        }
    }

    resetParticles(currentMode);
    ctrlMode.onchange = (e) => resetParticles(e.target.value);

    // --- 3. 오디오 엔진 및 녹화 파이프라인 ---
    let audioCtx, analyser, dataArray, currentSource;
    let decodedBuffer = null; // 디코딩된 음악 저장용
    let isPlaying = false;    // 재생 상태 플래그
    let mediaRecorder, recordedChunks = [];
    
    const initBtn = document.getElementById('init-btn');
    const fileSelectBox = document.getElementById('file-select-box');
    const audioInput = document.getElementById('audio-file');
    const recordBtn = document.getElementById('record-btn');
    const statusEl = document.getElementById('status');
    let loadedFileName = "";

    // 1단계: 엔진 초기화
    initBtn.onclick = function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512; 
        dataArray = new Uint8Array(analyser.frequencyBinCount);

        initBtn.style.display = 'none';
        fileSelectBox.style.display = 'block';
    };

    // 2단계: 파일 로드 및 디코딩 (대기 상태)
    audioInput.onchange = function(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        loadedFileName = file.name;
        statusEl.innerText = "음원 디코딩 중... 잠시만 기다려주세요.";
        recordBtn.style.display = 'none';

        const reader = new FileReader();
        reader.onload = function(e) {
            audioCtx.decodeAudioData(e.target.result, function(buffer) {
                decodedBuffer = buffer;
                
                // 디코딩 성공, 구도 세팅 모드로 진입
                statusEl.innerHTML = "<strong>준비 완료!</strong> 카메라 구도와 비율을 세팅한 후 아래 버튼을 누르세요.";
                recordBtn.style.display = 'block';
            });
        };
        reader.readAsArrayBuffer(file);
    };

    // 3단계: 시작 버튼 클릭 (재생 및 녹화)
    recordBtn.onclick = function() {
        if (!decodedBuffer) return;
        
        // 이전 소스 정리
        if (currentSource) currentSource.stop();
        
        // 새로운 소스 노드 생성
        currentSource = audioCtx.createBufferSource();
        currentSource.buffer = decodedBuffer;
        currentSource.connect(analyser);
        
        // 녹음용 노드 생성 및 연결
        const audioDest = audioCtx.createMediaStreamDestination();
        analyser.connect(audioCtx.destination); // 스피커로 출력
        analyser.connect(audioDest);            // 녹화기로 출력
        
        // 화면 캡처 및 MediaRecorder 세팅
        const canvasStream = renderer.domElement.captureStream(60);
        const combinedStream = new MediaStream([...canvasStream.getVideoTracks(), ...audioDest.stream.getAudioTracks()]);
        
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm; codecs=vp9' });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style = 'display: none'; a.href = url;
            a.download = loadedFileName.replace(/\.[^/.]+$/, "") + `_VFX_${ctrlRatio.value.replace(':','x')}.webm`;
            document.body.appendChild(a); a.click();
            window.URL.revokeObjectURL(url);
            
            statusEl.innerText = "녹화 완료! 지정하신 해상도로 저장되었습니다.";
            ctrlRatio.disabled = false;
            isPlaying = false;
            recordBtn.style.display = 'block'; // 다시 녹화할 수 있게 버튼 표시
            recordBtn.innerText = "▶ 다시 녹화하기";
        };

        // 음악 종료 시 녹화 자동 종료
        currentSource.onended = () => { 
            if(mediaRecorder.state === 'recording') mediaRecorder.stop(); 
        };

        // 시작
        currentSource.start(0);
        mediaRecorder.start();
        isPlaying = true;
        
        // UI 잠금 및 상태 변경
        ctrlRatio.disabled = true; 
        recordBtn.style.display = 'none';
        statusEl.innerHTML = `<span class="recording-badge">● REC</span> 자동 녹화 중: ${loadedFileName}`;
    };

    // --- 4. 렌더링 루프 (대기 및 재생 상태 통합) ---
    let time = 0;
    let burstLocalIndex = 0;

    function animate() {
        requestAnimationFrame(animate);
        time += 0.01;
        
        // 카메라 강제 배치 (사용자 입력 X,Y,Z 값 즉시 적용)
        camera.position.set(parseFloat(ctrlCamX.value), parseFloat(ctrlCamY.value), parseFloat(ctrlCamZ.value));
        camera.lookAt(0, 0, 0); 
        
        let sensitivity = parseFloat(ctrlSens.value);
        let bass = 0, mid = 0, treble = 0;

        // 음악이 [재생 중일 때만] 오디오 데이터 업데이트
        if (isPlaying && analyser) {
            analyser.getByteFrequencyData(dataArray);
            let bSum = 0, mSum = 0, tSum = 0;
            for(let i=0; i<10; i++) bSum += dataArray[i];
            for(let i=10; i<100; i++) mSum += dataArray[i];
            for(let i=100; i<200; i++) tSum += dataArray[i];
            
            bass = (bSum / 10 / 255) * sensitivity;
            mid = (mSum / 90 / 255) * sensitivity;
            treble = (tSum / 100 / 255) * sensitivity;
        }

        // 코어 리액션
        if(coreMesh.visible) {
            let scale = 1 + (bass * 3);
            coreMesh.scale.set(scale, scale, scale);
            coreMesh.rotation.x += 0.005 + (treble * 0.1);
            coreMesh.rotation.y += 0.005 + (mid * 0.05);
            if (treble > 0.4) coreMaterial.color.setHSL((time * 0.5) % 1, 1.0, 0.6);
            else coreMaterial.color.setHex(0x00ffcc);
        }
        if(coreSprite && coreSprite.visible) {
            let imgScale = 60 * (1 + (bass * 1.5)); 
            coreSprite.scale.set(imgScale, imgScale, 1);
        }

        // 파티클 애니메이션
        for (let g = 0; g < numGroups; g++) {
            let pArr = posArrays[g], oArr = origArrays[g], vArr = velArrays[g];
            
            if (currentMode === 'multilayer') {
                if (g === 0) {
                    if (bass > 0.55) {
                        let burstAmount = 100;
                        for(let b=0; b<burstAmount; b++) {
                            let idx = (burstLocalIndex % particlesPerGroup) * 3;
                            pArr[idx] = 0; pArr[idx+1] = 0; pArr[idx+2] = 0; 
                            let u = Math.random(), v = Math.random();
                            let theta = u * 2.0 * Math.PI, phi = Math.acos(2.0 * v - 1.0);
                            let speed = 5 + (bass * 25) + (Math.random() * 5);
                            vArr[idx] = Math.sin(phi) * Math.cos(theta) * speed;
                            vArr[idx+1] = Math.sin(phi) * Math.sin(theta) * speed;
                            vArr[idx+2] = Math.cos(phi) * speed;
                            burstLocalIndex++;
                        }
                    }
                    for (let i = 0; i < particlesPerGroup; i++) {
                        let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                        pArr[ix] += vArr[ix]; pArr[iy] += vArr[iy]; pArr[iz] += vArr[iz];
                        vArr[ix] *= 0.94; vArr[iy] *= 0.94; vArr[iz] *= 0.94; 
                        if(Math.abs(pArr[ix]) > 1000) { pArr[ix] = 0; pArr[iy] = 0; pArr[iz] = 0; }
                    }
                    if (bass > 0.6) mats[g].color.setHSL(0.05, 1.0, 0.6); 
                    else mats[g].color.lerp(baseColor, 0.1);

                } else if (g === 1 || g === 2) {
                    let fluidSpeed = 1.0 + (mid * 8);
                    for (let i = 0; i < particlesPerGroup; i++) {
                        let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                        let vx = Math.sin(pArr[iy] * 0.005 + time) * 2;
                        let vy = Math.cos(pArr[iz] * 0.005 + time) * 2;
                        let vz = Math.sin(pArr[ix] * 0.005 + time) * 2;
                        vx -= pArr[ix] * 0.002; vy -= pArr[iy] * 0.002; vz -= pArr[iz] * 0.002;
                        pArr[ix] += vx * fluidSpeed; pArr[iy] += vy * fluidSpeed; pArr[iz] += vz * fluidSpeed;
                    }
                    mats[g].color.lerp(baseColor, 0.1);
                    if (mid > 0.5) mats[g].color.addScalar(0.05);

                } else {
                    for (let i = 0; i < particlesPerGroup; i++) {
                        let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                        let angle = Math.atan2(oArr[iz], oArr[ix]) - (time * 0.5) - (treble * 0.5);
                        let r = Math.sqrt(oArr[ix]**2 + oArr[iz]**2);
                        let targetR = r * (1 + treble * 0.8); 
                        pArr[ix] += (Math.cos(angle) * targetR - pArr[ix]) * 0.2;
                        pArr[iz] += (Math.sin(angle) * targetR - pArr[iz]) * 0.2;
                        pArr[iy] += (oArr[iy] - pArr[iy]) * 0.1; 
                    }
                    if (treble > 0.5) mats[g].color.setHex(0xffffff);
                    else mats[g].color.lerp(baseColor, 0.05);
                }
            } 
            else {
                if (currentMode === 'terrain') {
                    for (let i = 0; i < particlesPerGroup; i++) {
                        let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                        let globalIdx = (g * particlesPerGroup) + i;
                        let fftIndex = (globalIdx % 110) * 2; 
                        let freqData = (dataArray && dataArray[fftIndex] !== undefined) ? (dataArray[fftIndex] / 255) : 0;
                        let wave = Math.sin((oArr[ix] * 0.03) + time * 3) * 15;
                        pArr[iy] = oArr[iy] + (freqData * 200 * sensitivity) + wave;
                    }
                } 
                else if (currentMode === 'explosion') {
                    if (bass > 0.5 && g === 0) { 
                        let burstAmount = 150;
                        for(let b=0; b<burstAmount; b++) {
                            let idx = (burstLocalIndex % particlesPerGroup) * 3;
                            pArr[idx] = 0; pArr[idx+1] = 0; pArr[idx+2] = 0; 
                            let u = Math.random(), v = Math.random();
                            let theta = u * 2.0 * Math.PI, phi = Math.acos(2.0 * v - 1.0);
                            let speed = 5 + (bass * 25) + (Math.random() * 5);
                            vArr[idx] = Math.sin(phi) * Math.cos(theta) * speed;
                            vArr[idx+1] = Math.sin(phi) * Math.sin(theta) * speed;
                            vArr[idx+2] = Math.cos(phi) * speed;
                            burstLocalIndex++;
                        }
                    }
                    for (let i = 0; i < particlesPerGroup; i++) {
                        let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                        pArr[ix] += vArr[ix]; pArr[iy] += vArr[iy]; pArr[iz] += vArr[iz];
                        vArr[ix] *= 0.96; vArr[iy] *= 0.96; vArr[iz] *= 0.96;
                        if(Math.abs(pArr[ix]) > 800) { pArr[ix] = 0; pArr[iy] = 0; pArr[iz] = 0; }
                    }
                } 
                else if (currentMode === 'fluid') {
                    for (let i = 0; i < particlesPerGroup; i++) {
                        let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                        let vx = Math.sin(pArr[iy] * 0.01 + time) * 2;
                        let vy = Math.cos(pArr[iz] * 0.01 + time) * 2;
                        let vz = Math.sin(pArr[ix] * 0.01 + time) * 2;
                        vx -= pArr[ix] * 0.003; vy -= pArr[iy] * 0.003; vz -= pArr[iz] * 0.003;
                        pArr[ix] += vx * (1 + mid*5); pArr[iy] += vy * (1 + mid*5); pArr[iz] += vz * (1 + mid*5);
                    }
                }
                else if (currentMode === 'wormhole') {
                    let speed = 2 + (bass * 30); // 기본 속도 2 부여 (대기 상태에서도 비행)
                    for (let i = 0; i < particlesPerGroup; i++) {
                        let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                        pArr[iz] += speed;
                        if (pArr[iz] > 300) pArr[iz] = -2000; 
                        let angle = Math.atan2(oArr[iy], oArr[ix]);
                        let r = Math.sqrt(oArr[ix]**2 + oArr[iy]**2);
                        let targetR = r + (bass * 80);
                        pArr[ix] += (Math.cos(angle) * targetR - pArr[ix]) * 0.1;
                        pArr[iy] += (Math.sin(angle) * targetR - pArr[iy]) * 0.1;
                    }
                }
                else if (currentMode === 'spiral') {
                    for (let i = 0; i < particlesPerGroup; i++) {
                        let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                        let angle = Math.atan2(oArr[iz], oArr[ix]) - (time * 0.2) - (mid * 0.1); 
                        let r = Math.sqrt(oArr[ix]**2 + oArr[iz]**2);
                        let targetR = r * (1 + bass * 0.6); 
                        pArr[ix] += (Math.cos(angle) * targetR - pArr[ix]) * 0.1;
                        pArr[iz] += (Math.sin(angle) * targetR - pArr[iz]) * 0.1;
                        pArr[iy] += (oArr[iy] - pArr[iy]) * 0.1; 
                    }
                }
                if (bass > 0.7) mats[g].color.setHSL(Math.random(), 1.0, 0.6); 
                else mats[g].color.lerp(baseColor, 0.05);
            }
            
            geometries[g].attributes.position.needsUpdate = true;
        }

        renderer.render(scene, camera);
    }

    animate(); // 페이지 로드 시 백그라운드 렌더링 시작
</script>
</body>
</html>
