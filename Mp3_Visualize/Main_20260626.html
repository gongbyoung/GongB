<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Audio Visualizer002</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        
        /* 메인 UI 패널 스타일 */
        #ui { 
            position: absolute; top: 20px; left: 20px; z-index: 10; 
            background: rgba(15, 15, 15, 0.85); padding: 20px; 
            border-radius: 8px; border: 1px solid #333;
            width: 320px; backdrop-filter: blur(5px);
        }
        
        h3 { margin-top: 0; color: #00ffcc; border-bottom: 1px solid #444; padding-bottom: 10px; }
        
        /* 컨트롤 옵션 스타일 */
        .control-group { margin-bottom: 15px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; color: #ccc; }
        .control-group input[type="range"] { width: 100%; cursor: pointer; }
        .control-group input[type="color"] { width: 100%; height: 30px; border: none; cursor: pointer; background: none; }
        
        #audio-input-area { display: none; margin-top: 15px; border-top: 1px solid #444; padding-top: 15px; }
        input[type="file"] { margin-bottom: 10px; display: block; color: white; width: 100%; }
        
        button { 
            background-color: #00ffcc; border: none; padding: 12px; width: 100%;
            border-radius: 5px; cursor: pointer; color: black; font-weight: bold; font-size: 15px; transition: 0.2s;
        }
        button:hover { background-color: #00ccaa; }
        
        #status { font-size: 13px; color: #aaa; margin-top: 10px; line-height: 1.4; }
        .recording-badge { color: #ff3366; font-weight: bold; animation: blink 1.5s infinite; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="ui">
    <h3>VFX 비주얼라이저 제어반</h3>
    
    <div class="control-group">
        <label>줌 인/아웃 (Camera Z) <span id="val-zoom">200</span></label>
        <input type="range" id="ctrl-zoom" min="10" max="600" value="200" step="1">
    </div>
    <div class="control-group">
        <label>파티클 크기 (Size) <span id="val-size">2.0</span></label>
        <input type="range" id="ctrl-size" min="0.5" max="10" value="2.0" step="0.1">
    </div>
    <div class="control-group">
        <label>반응 감도 (Sensitivity) <span id="val-sens">1.0</span></label>
        <input type="range" id="ctrl-sens" min="0.1" max="3" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label>회전 속도 (Rotation) <span id="val-rot">0.002</span></label>
        <input type="range" id="ctrl-rot" min="0" max="0.02" value="0.002" step="0.001">
    </div>
    <div class="control-group">
        <label>기본 색상 (Color)</label>
        <input type="color" id="ctrl-color" value="#00ffcc">
    </div>

    <button id="start-btn">오디오 시스템 시작</button>
    
    <div id="audio-input-area">
        <input type="file" id="audio-file" accept="audio/*">
        <div id="status">파일을 선택하면 자동 녹화가 시작됩니다.</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // --- 1. Three.js 기본 및 UI 바인딩 ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({antialias: true, preserveDrawingBuffer: true}); // 녹화를 위해 버퍼 보존
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    
    // UI 요소 바인딩
    const ctrlZoom = document.getElementById('ctrl-zoom');
    const ctrlSize = document.getElementById('ctrl-size');
    const ctrlSens = document.getElementById('ctrl-sens');
    const ctrlRot = document.getElementById('ctrl-rot');
    const ctrlColor = document.getElementById('ctrl-color');

    // UI 값 업데이트 함수
    const updateUIVal = (id, val) => document.getElementById(id).innerText = val;

    camera.position.z = parseFloat(ctrlZoom.value);
    ctrlZoom.oninput = (e) => { camera.position.z = parseFloat(e.target.value); updateUIVal('val-zoom', e.target.value); };
    ctrlSize.oninput = (e) => { mat.size = parseFloat(e.target.value); updateUIVal('val-size', e.target.value); };
    ctrlSens.oninput = (e) => { updateUIVal('val-sens', e.target.value); };
    ctrlRot.oninput = (e) => { updateUIVal('val-rot', e.target.value); };
    ctrlColor.oninput = (e) => { baseColor.set(e.target.value); };

    // --- 2. 파티클 시스템 생성 (둥근 파티클 적용) ---
    // 네모난 점 대신 둥근 점을 렌더링하기 위한 캔버스 텍스처 생성
    const circleCanvas = document.createElement('canvas');
    circleCanvas.width = 64; circleCanvas.height = 64;
    const ctx = circleCanvas.getContext('2d');
    ctx.beginPath(); ctx.arc(32, 32, 30, 0, Math.PI * 2); ctx.fillStyle = "white"; ctx.fill();
    const circleTexture = new THREE.CanvasTexture(circleCanvas);

    const particleCount = 10000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const originalPositions = new Float32Array(particleCount * 3);

    for (let i = 0; i < particleCount * 3; i++) {
        let val = Math.random() * 800 - 400; // 공간을 더 넓게
        positions[i] = val;
        originalPositions[i] = val;
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    let baseColor = new THREE.Color(ctrlColor.value);
    const mat = new THREE.PointsMaterial({
        color: baseColor, 
        size: parseFloat(ctrlSize.value), 
        map: circleTexture, // 둥근 텍스처 적용
        transparent: true,
        alphaTest: 0.5,
        blending: THREE.AdditiveBlending
    });
    
    const particleSystem = new THREE.Points(geometry, mat);
    scene.add(particleSystem);

    // --- 3. 오디오 및 녹화(MediaRecorder) 시스템 ---
    let audioCtx, analyser, dataArray, currentSource;
    let mediaRecorder;
    let recordedChunks = [];

    const startBtn = document.getElementById('start-btn');
    const audioInputArea = document.getElementById('audio-input-area');
    const audioInput = document.getElementById('audio-file');
    const statusEl = document.getElementById('status');

    startBtn.onclick = function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        dataArray = new Uint8Array(analyser.frequencyBinCount);

        startBtn.style.display = 'none';
        audioInputArea.style.display = 'block';
        statusEl.innerText = "이제 재생할 MP3 파일을 선택해주세요.";
        
        animate(); 
    };

    audioInput.onchange = function(event) {
        const file = event.target.files[0];
        if (!file) return;

        statusEl.innerText = "음원 분석 중... 잠시만 기다려주세요.";

        const reader = new FileReader();
        reader.onload = function(e) {
            audioCtx.decodeAudioData(e.target.result, function(buffer) {
                if (currentSource) currentSource.stop();

                currentSource = audioCtx.createBufferSource();
                currentSource.buffer = buffer;
                currentSource.connect(analyser);
                
                // 오디오 출력을 스피커와 녹음기로 동시에 보냄
                const audioDestination = audioCtx.createMediaStreamDestination();
                analyser.connect(audioCtx.destination); // 스피커 출력
                analyser.connect(audioDestination);     // 녹음기 출력
                
                // --- 녹화 설정 ---
                const canvasStream = renderer.domElement.captureStream(60); // 60 FPS 캡처
                const audioStream = audioDestination.stream;
                const combinedStream = new MediaStream([...canvasStream.getVideoTracks(), ...audioStream.getAudioTracks()]);
                
                recordedChunks = [];
                // 브라우저 호환성을 위해 webm 사용 (mp4는 브라우저 네이티브에서 미지원)
                mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm; codecs=vp9' });
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                // 녹화 종료 시 파일 다운로드 트리거
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    document.body.appendChild(a);
                    a.style = 'display: none';
                    a.href = url;
                    a.download = file.name.replace(/\.[^/.]+$/, "") + '_Visualizer.webm'; // 원본 파일명 기반 저장
                    a.click();
                    window.URL.revokeObjectURL(url);
                    statusEl.innerText = "녹화 완료! 영상이 저장되었습니다.";
                };

                // 곡이 끝나면 자동으로 녹화 중지
                currentSource.onended = () => {
                    if(mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                };

                currentSource.start(0);
                mediaRecorder.start();

                statusEl.innerHTML = `<span class="recording-badge">● REC</span> 재생 및 자동 녹화 중: ${file.name}`;
            }, function(err) {
                statusEl.innerText = "오류: 지원하지 않는 음악 파일입니다.";
            });
        };
        reader.readAsArrayBuffer(file);
    };

    // --- 4. 렌더링 및 애니메이션 루프 ---
    function animate() {
        requestAnimationFrame(animate);
        
        let bass = 0;
        let sensitivity = parseFloat(ctrlSens.value);
        let rotationSpeed = parseFloat(ctrlRot.value);

        if (analyser) {
            analyser.getByteFrequencyData(dataArray);
            bass = (dataArray[2] / 255) * sensitivity; // 감도 조절 적용
        }

        particleSystem.rotation.y += rotationSpeed + (bass * 0.05);

        const posArray = particleSystem.geometry.attributes.position.array;

        for (let i = 0; i < particleCount; i++) {
            let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;

            if (bass > 0.6) { 
                posArray[ix] += (Math.random() - 0.5) * bass * 25;
                posArray[iy] += (Math.random() - 0.5) * bass * 25;
                posArray[iz] += (Math.random() - 0.5) * bass * 25;
            } else {
                posArray[ix] += (originalPositions[ix] - posArray[ix]) * 0.05;
                posArray[iy] += (originalPositions[iy] - posArray[iy]) * 0.05;
                posArray[iz] += (originalPositions[iz] - posArray[iz]) * 0.05;
            }
        }
        
        particleSystem.geometry.attributes.position.needsUpdate = true;
        
        // 색상 변화 로직
        if (bass > 0.85) {
            mat.color.setHSL(Math.random(), 1.0, 0.6); 
        } else {
            mat.color.lerp(baseColor, 0.05); // 지정한 기본 색상으로 복귀
        }

        renderer.render(scene, camera);
    }

    // 창 크기 조절 대응
    window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
    });
</script>
</body>
</html>
