<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Audio Reactive Particle Visualizer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px; }
        #audio-input-area { display: none; }
        input { margin-bottom: 10px; display: block; color: white; }
        button { background-color: #00ffcc; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; color: black; font-weight: bold; margin-bottom: 10px; }
        #status { font-size: 14px; color: #00ffcc; margin-top: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <h3>MP3 뮤직비디오 비주얼라이저</h3>
    <button id="start-btn">시작하기 (클릭)</button>
    <div id="audio-input-area">
        <input type="file" id="audio-file" accept="audio/*">
        <div id="status">파일을 선택하면 재생됩니다.</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // 1. Three.js 기본 설정
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    camera.position.z = 200;

    // 2. [수정됨] BufferGeometry를 사용한 고성능 파티클 시스템 생성
    const particleCount = 8000;
    const geometry = new THREE.BufferGeometry();
    
    // x, y, z 좌표를 담을 1차원 배열 (8000 * 3)
    const positions = new Float32Array(particleCount * 3);
    const originalPositions = new Float32Array(particleCount * 3);

    for (let i = 0; i < particleCount * 3; i++) {
        let val = Math.random() * 600 - 300;
        positions[i] = val;
        originalPositions[i] = val; // 원래 위치 기억
    }

    // geometry에 속성 부여
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const mat = new THREE.PointsMaterial({color: 0x00ffcc, size: 2, blending: THREE.AdditiveBlending});
    const particleSystem = new THREE.Points(geometry, mat);
    scene.add(particleSystem);

    // 3. 오디오 엔진 설정
    let audioCtx = null;
    let analyser = null;
    let dataArray = null;
    let currentSource = null;

    // UI 요소
    const startBtn = document.getElementById('start-btn');
    const audioInputArea = document.getElementById('audio-input-area');
    const audioInput = document.getElementById('audio-file');
    const statusEl = document.getElementById('status');

    // 4. 시작 버튼 클릭 이벤트
    startBtn.onclick = function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        dataArray = new Uint8Array(analyser.frequencyBinCount);

        startBtn.style.display = 'none';
        audioInputArea.style.display = 'block';
        statusEl.innerText = "이제 재생할 MP3 파일을 선택해주세요.";
        
        animate(); 
    };

    // 5. 파일 로딩 및 재생 로직
    audioInput.onchange = function(event) {
        const file = event.target.files[0];
        if (!file) return;

        statusEl.innerText = "음원 분석 중... 잠시만 기다려주세요.";

        const reader = new FileReader();
        reader.onload = function(e) {
            audioCtx.decodeAudioData(e.target.result, function(buffer) {
                if (currentSource) {
                    currentSource.stop();
                }

                currentSource = audioCtx.createBufferSource();
                currentSource.buffer = buffer;
                currentSource.connect(analyser);
                analyser.connect(audioCtx.destination);
                currentSource.start(0);

                statusEl.innerText = "재생 중: " + file.name;
            }, function(err) {
                statusEl.innerText = "오류: 지원하지 않는 음악 파일입니다.";
                console.error("Audio decoding failed: ", err);
            });
        };
        reader.readAsArrayBuffer(file);
    };

    // 6. [수정됨] BufferGeometry에 맞춘 애니메이션 및 물리 루프
    function animate() {
        requestAnimationFrame(animate);
        
        let bass = 0;
        if (analyser) {
            analyser.getByteFrequencyData(dataArray);
            bass = dataArray[2] / 255; 
        }

        particleSystem.rotation.y += 0.002 + (bass * 0.05);

        // BufferGeometry의 position 배열 가져오기
        const posArray = particleSystem.geometry.attributes.position.array;

        for (let i = 0; i < particleCount; i++) {
            let ix = i * 3;     // x
            let iy = i * 3 + 1; // y
            let iz = i * 3 + 2; // z

            if (bass > 0.6) { 
                // 강한 비트에서 무작위 확산
                posArray[ix] += (Math.random() - 0.5) * bass * 20;
                posArray[iy] += (Math.random() - 0.5) * bass * 20;
                posArray[iz] += (Math.random() - 0.5) * bass * 20;
            } else {
                // 약한 비트에서 원래 위치로 복귀 (보간법)
                posArray[ix] += (originalPositions[ix] - posArray[ix]) * 0.05;
                posArray[iy] += (originalPositions[iy] - posArray[iy]) * 0.05;
                posArray[iz] += (originalPositions[iz] - posArray[iz]) * 0.05;
            }
        }
        
        // 데이터가 변경되었음을 Three.js 엔진에 알림
        particleSystem.geometry.attributes.position.needsUpdate = true;
        
        // 색상 변화
        if (bass > 0.85) {
            mat.color.setHSL(Math.random(), 1.0, 0.6); 
        } else {
            mat.color.lerp(new THREE.Color(0x00ffcc), 0.1);
        }

        renderer.render(scene, camera);
    }

    // 창 크기 조절 대응
    window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
    });
</script>
</body>
</html>
