<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>PRO FIREWORK STUDIO v2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --pink: #ff007b; --bg: #0a0a0f; --panel: #161622; }
        body { background: var(--bg); color: #fff; margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; overflow: hidden; }
        
        /* Layout */
        #ui-layer { width: 350px; height: 100vh; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 10; }
        #canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        
        /* Scrollable Panels */
        .scroll-area { flex: 1; overflow-y: auto; padding: 20px; }
        .section { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid #2a2a3a; }
        h3 { font-size: 11px; color: var(--accent); margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        /* Controls */
        .ctrl-group { margin-bottom: 12px; }
        .ctrl-group label { display: flex; justify-content: space-between; font-size: 10px; color: #aaa; margin-bottom: 5px; }
        .ctrl-group label span { color: var(--accent); }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        select, button { width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        button:hover { border-color: var(--accent); background: #111; }
        .btn-main { background: var(--accent); color: #000; font-weight: bold; border: none; margin-top: 5px; }
        .btn-rec { border-color: var(--pink); color: var(--pink); margin-top: 10px; }
        .btn-rec.active { background: var(--pink); color: #fff; animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0.5; } }
        
        /* Log */
        #log { height: 100px; background: #000; font-family: monospace; font-size: 10px; padding: 10px; color: #0f0; overflow-y: hidden; border-top: 1px solid #333; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="scroll-area">
        <div class="section">
            <h3>1. Project Setup</h3>
            <div class="ctrl-group">
                <label>Canvas Ratio</label>
                <select id="resMode" onchange="changeResolution()">
                    <option value="169">16:9 Landscape (1280x720)</option>
                    <option value="916">9:16 Portrait (720x1280)</option>
                </select>
            </div>
            <button class="btn-main" onclick="document.getElementById('audioFile').click()">📂 Load Music (MP3)</button>
            <input type="file" id="audioFile" hidden accept="audio/*" onchange="loadAudio(this.files)">
        </div>

        <div class="section">
            <h3>2. Physics & Core</h3>
            <div class="ctrl-group">
                <label>Gravity <span id="v-grav">0.15</span></label>
                <input type="range" id="grav" min="0.05" max="0.5" step="0.01" value="0.15" oninput="updateVal('v-grav', this.value)">
            </div>
            <div class="ctrl-group">
                <label>Explosion Power <span id="v-pow">8</span></label>
                <input type="range" id="pow" min="2" max="20" step="1" value="10" oninput="updateVal('v-pow', this.value)">
            </div>
            <div class="ctrl-group">
                <label>Particle Count <span id="v-count">100</span></label>
                <input type="range" id="pCount" min="50" max="300" step="10" value="120" oninput="updateVal('v-count', this.value)">
            </div>
        </div>

        <div class="section">
            <h3>3. Audio Analysis</h3>
            <div class="ctrl-group">
                <label>Sensitivity (Threshold) <span id="v-thres">180</span></label>
                <input type="range" id="thres" min="100" max="255" step="1" value="200" oninput="updateVal('v-thres', this.value)">
            </div>
            <div class="ctrl-group">
                <label>Auto-Launch Rate <span id="v-auto">0.02</span></label>
                <input type="range" id="autoLaunch" min="0" max="0.2" step="0.01" value="0.02" oninput="updateVal('v-auto', this.value)">
            </div>
        </div>

        <div class="section">
            <h3>4. Visual Style</h3>
            <div class="ctrl-group">
                <label>Trail Length (Fade)</label>
                <input type="range" id="fade" min="5" max="100" step="5" value="40">
            </div>
            <div class="ctrl-group">
                <label>Color Mode</label>
                <select id="cMode">
                    <option value="multi">Multicolor Spectrum</option>
                    <option value="mono">Single Gold</option>
                    <option value="neon">Electric Neon</option>
                </select>
            </div>
        </div>
    </div>
    
    <div style="padding: 20px;">
        <button id="startBtn" class="btn-main" onclick="initEngine()" disabled>READY TO START</button>
        <button id="recBtn" class="btn-rec" onclick="toggleRecord()" disabled>🔴 START RECORDING</button>
    </div>

    <div id="log">System initialized. Waiting for audio...</div>
</div>

<div id="canvas-area"></div>

<script>
let audio, fft, isStarted = false, isRecording = false;
let fireworks = [];
let canvas;
let mediaRecorder, chunks = [];

function updateVal(id, val) { document.getElementById(id).innerText = val; }

function setup() {
    changeResolution();
    colorMode(HSB);
}

function changeResolution() {
    let mode = document.getElementById('resMode').value;
    let w = (mode === '169') ? 1280 : 540;
    let h = (mode === '169') ? 720 : 960;
    let cnv = createCanvas(w, h);
    cnv.parent('canvas-area');
    canvas = cnv.elt;
    // 화면 크기에 맞게 스케일 조정 (UI 방해 안되게)
    let scale = Math.min((window.innerWidth - 350) / w, window.innerHeight / h) * 0.9;
    cnv.style('transform', `scale(${scale})`);
}

function draw() {
    let fadeVal = document.getElementById('fade').value;
    background(0, 0, 0, map(fadeVal, 0, 100, 1, 0.5)); // 잔상 농도 조절
    
    if (isStarted) {
        // 1. 오디오 분석 기반 발사
        if (audio && audio.isPlaying()) {
            fft.analyze();
            let bass = fft.getEnergy("bass");
            let thres = document.getElementById('thres').value;
            if (bass > thres && random(1) > 0.9) {
                fireworks.push(new Firework());
            }
        }
        
        // 2. 자동 발사 (음악 없을 때나 보조용)
        let autoRate = parseFloat(document.getElementById('autoLaunch').value);
        if (random(1) < autoRate) {
            fireworks.push(new Firework());
        }
    }

    // 폭죽 업데이트 및 렌더링
    for (let i = fireworks.length - 1; i >= 0; i--) {
        fireworks[i].update();
        fireworks[i].show();
        if (fireworks[i].done()) fireworks.splice(i, 1);
    }
    
    if (frameCount % 60 === 0) {
        document.getElementById('log').innerText = `FPS: ${floor(frameRate())} | Particles: ${fireworks.length}`;
    }
}

// --- Firework Engine ---
class Firework {
    constructor() {
        this.hu = random(360);
        this.type = floor(random(12)); // 12종 모양
        this.trailType = floor(random(6)); // 6종 궤적
        this.firework = new Particle(random(width), height, this.hu, true, this.trailType);
        this.exploded = false;
        this.particles = [];
    }

    done() { return this.exploded && this.particles.length === 0; }

    update() {
        let gravityV = createVector(0, parseFloat(document.getElementById('grav').value));
        if (!this.exploded) {
            this.firework.applyForce(gravityV);
            this.firework.update();
            if (this.firework.vel.y >= 0) {
                this.exploded = true;
                this.explode();
            }
        }
        for (let i = this.particles.length - 1; i >= 0; i--) {
            this.particles[i].applyForce(gravityV);
            this.particles[i].update();
            if (this.particles[i].done()) this.particles.splice(i, 1);
        }
    }

    explode() {
        let count = parseInt(document.getElementById('pCount').value);
        let power = parseFloat(document.getElementById('pow').value);
        for (let i = 0; i < count; i++) {
            let p = new Particle(this.firework.pos.x, this.firework.pos.y, this.hu, false, this.type, power);
            this.particles.push(p);
        }
    }

    show() {
        if (!this.exploded) this.firework.show();
        for (let p of this.particles) p.show();
    }
}

class Particle {
    constructor(x, y, hu, isLead, type, power) {
        this.pos = createVector(x, y);
        this.isLead = isLead;
        this.lifespan = 255;
        this.hu = hu;
        this.type = type;
        this.acc = createVector(0, 0);
        
        if (this.isLead) {
            this.vel = createVector(0, random(-15, -8));
        } else {
            this.vel = this.getPattern(type);
            this.vel.mult(random(power * 0.5, power));
        }
    }

    getPattern(t) {
        let a = random(TWO_PI);
        switch(t) {
            case 0: return p5.Vector.fromAngle(a); // Circle
            case 1: // Heart
                let x = 16 * pow(sin(a), 3);
                let y = -(13 * cos(a) - 5 * cos(2*a) - 2 * cos(3*a) - cos(4*a));
                return createVector(x/15, y/15);
            case 2: // Star
                let r = (a % (TWO_PI/5) < TWO_PI/10) ? 1 : 0.4;
                return p5.Vector.fromAngle(a).mult(r);
            case 3: // Flower
                return p5.Vector.fromAngle(a).mult(sin(a*5));
            case 4: // Willow
                let v = p5.Vector.fromAngle(a);
                this.lifespan = 400; return v.mult(random(0.2, 1));
            case 5: return createVector(cos(a), sin(a)).mult(random() > 0.5 ? 1 : 0.2); // Ring
            case 6: return createVector(cos(a)*abs(cos(a)), sin(a)*abs(sin(a))); // Squareish
            default: return p5.Vector.random2D();
        }
    }

    applyForce(f) { this.acc.add(f); }

    update() {
        if (!this.isLead) {
            this.vel.mult(0.93); // Drag
            this.lifespan -= 4;
        }
        this.vel.add(this.acc);
        this.pos.add(this.vel);
        this.acc.mult(0);
    }

    done() { return this.lifespan < 0; }

    show() {
        let cm = document.getElementById('cMode').value;
        if (cm === 'mono') stroke(45, 80, 100, this.lifespan/255);
        else if (cm === 'neon') stroke(180, 100, 100, this.lifespan/255);
        else stroke(this.hu, 255, 255, this.lifespan/255);
        
        if (this.isLead) {
            strokeWeight(3);
            if (this.type % 2 === 0) { // 점선 궤적
                if (frameCount % 4 < 2) point(this.pos.x, this.pos.y);
            } else {
                point(this.pos.x, this.pos.y);
            }
        } else {
            strokeWeight(2);
            point(this.pos.x, this.pos.y);
        }
    }
}

// --- System Functions ---
function loadAudio(f) {
    if (audio) audio.stop();
    audio = loadSound(URL.createObjectURL(f[0]), () => {
        fft = new p5.FFT();
        document.getElementById('startBtn').disabled = false;
        document.getElementById('log').innerText = "Music Loaded. Press START.";
    });
}

function initEngine() {
    userStartAudio();
    isStarted = true;
    document.getElementById('recBtn').disabled = false;
    document.getElementById('startBtn').innerText = "ENGINE RUNNING";
}

function toggleRecord() {
    if (isRecording) {
        mediaRecorder.stop();
        audio.stop();
        isRecording = false;
        document.getElementById('recBtn').innerText = "🔴 START RECORDING";
        document.getElementById('recBtn').classList.remove('active');
    } else {
        chunks = [];
        let stream = canvas.captureStream(60);
        
        // 오디오 믹싱
        let ctx = p5.prototype.getAudioContext();
        let dest = ctx.createMediaStreamDestination();
        audio.connect(dest);
        stream.addTrack(dest.stream.getAudioTracks()[0]);

        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            let blob = new Blob(chunks, { type: 'video/webm' });
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Firework_Show_${Date.now()}.webm`;
            a.click();
        };
        mediaRecorder.start();
        audio.play();
        isRecording = true;
        document.getElementById('recBtn').innerText = "⬛ STOP & SAVE";
        document.getElementById('recBtn').classList.add('active');
    }
}
</script>
</body>
</html>
