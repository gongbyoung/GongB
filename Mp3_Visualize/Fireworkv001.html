<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Audio Reactive Campfire Grid Studio - Ultimate Custom</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020202; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; }
        canvas { width: 100vw !important; height: 100vh !important; object-fit: contain; }

        .ui-panel { 
            position: absolute; top: 15px; z-index: 10; 
            background: rgba(10, 10, 10, 0.85); padding: 16px; 
            border-radius: 8px; border: 1px solid #333;
            width: 280px; max-height: 90vh; overflow-y: auto;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #ui-left { left: 15px; }
        #ui-right { right: 15px; }
        
        h3 { margin-top: 0; color: #ff5500; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 15px; text-align: center;}
        .section-title { font-size: 11px; color: #aaa; margin: 15px 0 5px 0; border-bottom: 1px dashed #333; padding-bottom: 3px; font-weight: bold;}
        
        .control-group { margin-bottom: 12px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; color: #ccc; }
        .control-group input[type="range"] { width: 100%; cursor: pointer; accent-color: #ff5500; height: 4px;}
        .control-group select { width: 100%; padding: 6px; background: #222; color: #ffaa00; border: 1px solid #555; border-radius: 4px; cursor: pointer; font-size: 11px; }
        
        #audio-input-area { margin-top: 15px; border-top: 2px solid #ff5500; padding-top: 15px; }
        input[type="file"] { margin-bottom: 10px; display: block; color: white; width: 100%; font-size: 11px; }
        
        .main-btn { 
            background-color: #ff5500; border: none; padding: 10px; width: 100%;
            border-radius: 5px; cursor: pointer; color: white; font-weight: bold; font-size: 13px; transition: 0.2s;
        }
        .main-btn:hover { background-color: #ff3300; }
        
        .rand-btn {
            background-color: #ffaa00; color: black; margin-top: 5px; font-size: 12px; padding: 10px; font-weight: bold;
            box-shadow: 0 0 10px rgba(255, 170, 0, 0.4);
        }
        .rand-btn:hover { background-color: #ffcc00; box-shadow: 0 0 15px rgba(255, 170, 0, 0.7); }

        .record-btn { background-color: #00ffcc; color: black; margin-top: 10px; display: none; box-shadow: 0 0 15px rgba(0, 255, 204, 0.6); }
        .record-btn:hover { background-color: #00ccaa; }

        #status { font-size: 11px; color: #aaa; margin-top: 10px; line-height: 1.4; text-align: center;}
        .recording-badge { color: #00ffcc; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
    </style>
</head>
<body>

<div id="ui-left" class="ui-panel">
    <h3>파티클 모닥불 스튜디오</h3>
    
    <div class="section-title">[비디오 해상도]</div>
    <div class="control-group">
        <select id="ctrl-ratio">
            <option value="16:9">가로형 (1920x1080)</option>
            <option value="9:16">세로형 (1080x1920)</option>
            <option value="fit" selected>화면 맞춤 (전체화면)</option>
        </select>
    </div>

    <div class="section-title" style="color:#ffaa00;">[모닥불 배치 제어 (Grid)]</div>
    <div class="control-group">
        <label>가로 기본 배열 개수 <span id="val-cols">7</span></label>
        <input type="range" id="ctrl-cols" min="1" max="10" value="7" step="1">
    </div>
    <div class="control-group">
        <label>세로 기본 배열 개수 <span id="val-rows">3</span></label>
        <input type="range" id="ctrl-rows" min="1" max="5" value="3" step="1">
    </div>
    <div class="control-group">
        <label>기본 가로 간격 <span id="val-space-x">250</span></label>
        <input type="range" id="ctrl-space-x" min="50" max="800" value="250" step="10">
    </div>
    <div class="control-group">
        <label>기본 세로 간격 <span id="val-space-z">250</span></label>
        <input type="range" id="ctrl-space-z" min="50" max="800" value="250" step="10">
    </div>
    <div class="control-group">
        <label style="color:#00ffcc;">바닥 높이 (Base Y) <span id="val-base-y">-200</span></label>
        <input type="range" id="ctrl-base-y" min="-800" max="500" value="-200" step="10">
    </div>

    <div class="section-title" style="color:#ffaa00;">[제너러티브 랜덤 엔진]</div>
    <button id="btn-random-everything" class="main-btn rand-btn">🎲 높이 & 위치 무작위 섞기</button>

    <div class="section-title">[화염 디테일 & 테마]</div>
    <div class="control-group">
        <label>불기둥 기본 전체 높이 <span id="val-height">1.0</span></label>
        <input type="range" id="ctrl-height" min="0.5" max="3.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label>하단부 넓이 (Spread) <span id="val-spread">1.0</span></label>
        <input type="range" id="ctrl-spread" min="0.2" max="3.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <select id="ctrl-color-theme">
            <option value="classic" selected>클래식 (주황/빨강)</option>
            <option value="blue">가스불 (파랑/보라)</option>
            <option value="magic">마법의 불 (민트/초록)</option>
            <option value="neon">네온 사이버 (마젠타/시안)</option>
        </select>
    </div>

    <div id="audio-input-area">
        <button id="init-btn" class="main-btn">오디오 & 엔진 켜기</button>
        <div id="file-select-box" style="display: none; margin-top:10px;">
            <input type="file" id="audio-file" accept="audio/*">
            <div id="status">구도를 맞추고 재생을 시작하세요.</div>
            <button id="record-btn" class="main-btn record-btn">▶ 녹화 및 재생 시작 (MP4)</button>
        </div>
    </div>
</div>

<div id="ui-right" class="ui-panel">
    <h3>오디오 반응 & 카메라</h3>

    <div class="section-title" style="color:#ff3366;">[자유 카메라 구도]</div>
    <div class="control-group">
        <label>카메라 X (좌우 이동) <span id="val-cam-x">0</span></label>
        <input type="range" id="ctrl-cam-x" min="-1500" max="1500" value="0" step="10">
    </div>
    <div class="control-group">
        <label>카메라 Y (상하 시야) <span id="val-cam-y">100</span></label>
        <input type="range" id="ctrl-cam-y" min="-500" max="1500" value="100" step="10">
    </div>
    <div class="control-group">
        <label>카메라 Z (줌 인/아웃) <span id="val-cam-z">1200</span></label>
        <input type="range" id="ctrl-cam-z" min="200" max="3000" value="1200" step="10">
    </div>

    <div class="section-title" style="color:#00ffcc;">[5종 노이즈 오디오 다이나믹스]</div>
    <div class="control-group">
        <label>저음 (불기둥 펌핑) <span id="val-react-bass">1.0</span></label>
        <input type="range" id="ctrl-react-bass" min="0.0" max="3.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label>중음 (노이즈 요동침) <span id="val-react-mid">1.0</span></label>
        <input type="range" id="ctrl-react-mid" min="0.0" max="3.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label>고음 (스파크 온도 상승) <span id="val-react-treb">1.0</span></label>
        <input type="range" id="ctrl-react-treb" min="0.0" max="3.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label>모션 부드러움 (Damping) <span id="val-smooth">0.8</span></label>
        <input type="range" id="ctrl-smooth" min="0.1" max="0.99" value="0.8" step="0.01">
    </div>

    <div class="section-title" style="color:#aaff00;">[포스트 프로세싱]</div>
    <div class="control-group">
        <label>빛 번짐 (Bloom Glow) <span id="val-bloom">1.5</span></label>
        <input type="range" id="ctrl-bloom" min="0" max="4.0" value="1.5" step="0.1">
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
    // --- 1. Three.js 기본 환경 ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x020202, 0.0005); 

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 8000);
    const renderer = new THREE.WebGLRenderer({antialias: true, preserveDrawingBuffer: true});
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.body.appendChild(renderer.domElement);

    const renderScene = new THREE.RenderPass(scene, camera);
    const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0;
    const composer = new THREE.EffectComposer(renderer);
    composer.addPass(renderScene); composer.addPass(bloomPass);

    // --- UI 연동 ---
    const updateUIVal = (id, val) => document.getElementById(id).innerText = val;
    const ctrlRatio = document.getElementById('ctrl-ratio');
    
    const ctrlCols = document.getElementById('ctrl-cols');
    const ctrlRows = document.getElementById('ctrl-rows');
    const ctrlSpaceX = document.getElementById('ctrl-space-x');
    const ctrlSpaceZ = document.getElementById('ctrl-space-z');
    const ctrlBaseY = document.getElementById('ctrl-base-y');
    
    const ctrlHeight = document.getElementById('ctrl-height');
    const ctrlSpread = document.getElementById('ctrl-spread');
    const ctrlColorTheme = document.getElementById('ctrl-color-theme');
    
    const ctrlReactBass = document.getElementById('ctrl-react-bass');
    const ctrlReactMid = document.getElementById('ctrl-react-mid');
    const ctrlReactTreb = document.getElementById('ctrl-react-treb');
    const ctrlSmooth = document.getElementById('ctrl-smooth');

    const ctrlCamX = document.getElementById('ctrl-cam-x');
    const ctrlCamY = document.getElementById('ctrl-cam-y');
    const ctrlCamZ = document.getElementById('ctrl-cam-z');
    const ctrlBloom = document.getElementById('ctrl-bloom');

    function updateAspectRatio() {
        let val = ctrlRatio.value; let w = window.innerWidth, h = window.innerHeight;
        if (val === '16:9') { w = 1920; h = 1080; } else if (val === '9:16') { w = 1080; h = 1920; }
        renderer.setSize(w, h); composer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix();
    }
    ctrlRatio.onchange = updateAspectRatio; window.addEventListener('resize', () => { if(ctrlRatio.value==='fit') updateAspectRatio(); }); updateAspectRatio();

    ['cols', 'rows', 'space-x', 'space-z', 'base-y', 'height', 'spread', 'react-bass', 'react-mid', 'react-treb', 'smooth', 'cam-x', 'cam-y', 'cam-z', 'bloom'].forEach(id => {
        document.getElementById(`ctrl-${id}`).addEventListener('input', (e) => {
            updateUIVal(`val-${id}`, e.target.value);
            if(id === 'bloom') bloomPass.strength = parseFloat(e.target.value);
            if(['cols', 'rows', 'space-x', 'space-z', 'base-y'].includes(id)) {
                buildGrid(false); // 슬라이더 조절 시에는 랜덤 상수가 보존되거나 초기화된 기본형으로 재배치
            }
        });
    });

    // 바닥면
    const groundGeo = new THREE.PlaneGeometry(8000, 8000);
    const groundMat = new THREE.MeshBasicMaterial({ color: 0x0a0a0a, depthWrite: false });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // --- 2. 제너러티브 파티클 모닥불 엔진 시스템 ---
    const maxParticles = 30000; 
    const logsGroup = new THREE.Group(); scene.add(logsGroup);
    
    const fireGeo = new THREE.BufferGeometry();
    const fPos = new Float32Array(maxParticles * 3);
    const fCenter = new Float32Array(maxParticles * 3);
    const fLife = new Float32Array(maxParticles); 
    const fPhase = new Float32Array(maxParticles); 
    const fNoiseType = new Float32Array(maxParticles); 
    const fAngle = new Float32Array(maxParticles); 
    const fDist = new Float32Array(maxParticles);  
    const fFireIdx = new Float32Array(maxParticles); 
    const fColor = new Float32Array(maxParticles * 3);

    fireGeo.setAttribute('position', new THREE.BufferAttribute(fPos, 3));
    fireGeo.setAttribute('color', new THREE.BufferAttribute(fColor, 3));

    const cCanvas = document.createElement('canvas'); cCanvas.width = 64; cCanvas.height = 64;
    const ctx = cCanvas.getContext('2d');
    let grad = ctx.createRadialGradient(32,32,0, 32,32,32);
    grad.addColorStop(0, 'rgba(255,255,255,1)'); grad.addColorStop(0.2, 'rgba(255,255,255,0.8)'); grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad; ctx.fill(); ctx.beginPath(); ctx.arc(32,32,32,0,Math.PI*2); ctx.fill();
    const fireTex = new THREE.CanvasTexture(cCanvas);

    const fireShaderMat = new THREE.ShaderMaterial({
        uniforms: { map: { value: fireTex } },
        vertexShader: `
            varying vec3 vColor; varying float vOpacity;
            void main() {
                vColor = color; 
                vOpacity = smoothstep(1.0, 0.0, position.y / 700.0); 
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = 25.0 * (800.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `,
        fragmentShader: `
            uniform sampler2D map; varying vec3 vColor;
            void main() {
                vec4 texColor = texture2D(map, gl_PointCoord);
                gl_FragColor = vec4(vColor, texColor.a);
            }
        `,
        transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, vertexColors: true
    });

    const fireSystem = new THREE.Points(fireGeo, fireShaderMat);
    scene.add(fireSystem);

    let fireCenters = [];
    let fireUniquePhases = []; 
    
    // ★ 런타임 독립 무작위 상수 저장 배열들
    let fireHeightMultipliers = [];
    let fireXOffsets = [];
    let fireZOffsets = [];

    const logGeoTemplate = new THREE.CylinderGeometry(3, 3, 50, 6);
    const logMatTemplate = new THREE.MeshBasicMaterial({ color: 0x1a0a00 });

    // ★ 높이와 간격(위치)을 동시 무작위 매핑하는 통합 제어 로직
    function randomizeEverything() {
        let cols = parseInt(ctrlCols.value);
        let rows = parseInt(ctrlRows.value);
        let totalFires = cols * rows;
        let spX = parseFloat(ctrlSpaceX.value);
        let spZ = parseFloat(ctrlSpaceZ.value);

        fireHeightMultipliers = [];
        fireXOffsets = [];
        fireZOffsets = [];

        for(let i=0; i<totalFires; i++) {
            // 1. 최대 높이 무작위화 (0.35배 ~ 1.6배)
            fireHeightMultipliers.push(0.35 + Math.random() * 1.25);
            
            // 2. 가로/세로 간격 위치 무작위 오프셋 (현재 지정 간격의 최대 75%까지 자유 이탈)
            fireXOffsets.push((Math.random() - 0.5) * spX * 0.75);
            fireZOffsets.push((Math.random() - 0.5) * spZ * 0.75);
        }
        
        buildGrid(true); // 무작위 플래그 ON 상태로 그리드 갱신
    }

    document.getElementById('btn-random-everything').onclick = randomizeEverything;

    function buildGrid(isRandomTriggered) {
        let cols = parseInt(ctrlCols.value);
        let rows = parseInt(ctrlRows.value);
        let spX = parseFloat(ctrlSpaceX.value);
        let spZ = parseFloat(ctrlSpaceZ.value);
        let baseY = parseFloat(ctrlBaseY.value);
        let totalFires = cols * rows;

        // 슬라이더를 통해 임의 변경 시 랜덤 연산 초기화 (정렬 복귀 보호 장치)
        if (!isRandomTriggered) {
            fireHeightMultipliers = [];
            fireXOffsets = [];
            fireZOffsets = [];
            for(let i=0; i<totalFires; i++) {
                fireHeightMultipliers.push(1.0); // 일률적 균일 높이
                fireXOffsets.push(0);           // 오프셋 없음
                fireZOffsets.push(0);
            }
        }

        fireCenters = [];
        fireUniquePhases = [];
        while(logsGroup.children.length > 0) { logsGroup.remove(logsGroup.children[0]); }
        ground.position.y = baseY;

        let idx = 0;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                // 기본 정렬 격자에 주입된 무작위 간격 오프셋을 더함
                let cx = (c - (cols-1)/2) * spX + fireXOffsets[idx];
                let cz = (r - (rows-1)/2) * spZ + fireZOffsets[idx];
                
                fireCenters.push({x: cx, y: baseY, z: cz});
                fireUniquePhases.push(Math.random() * Math.PI * 10); 
                
                for(let j=0; j<3; j++) {
                    let log = new THREE.Mesh(logGeoTemplate, logMatTemplate);
                    log.position.set(cx, baseY + 2, cz);
                    log.rotation.z = Math.PI/2; log.rotation.y = (j * Math.PI) / 3; log.rotation.x = Math.PI/8; 
                    logsGroup.add(log);
                }
                idx++;
            }
        }

        let activeParticles = Math.min(maxParticles, totalFires * 1000); 
        fireGeo.setDrawRange(0, activeParticles);

        for(let i=0; i<maxParticles; i++) {
            if (i >= activeParticles) break;
            let fireIdx = i % totalFires;
            let center = fireCenters[fireIdx];
            
            fCenter[i*3] = center.x; fCenter[i*3+1] = center.y; fCenter[i*3+2] = center.z;
            fFireIdx[i] = fireIdx; 

            fPos[i*3] = center.x; fPos[i*3+1] = center.y; fPos[i*3+2] = center.z;
            fLife[i] = Math.random(); fPhase[i] = Math.random() * Math.PI * 2; fAngle[i] = Math.random() * Math.PI * 2; fDist[i] = Math.random();
            fNoiseType[i] = i % 5; 
        }
    }
    buildGrid(false);

    // --- 3. 오디오 엔진 및 녹화 모듈 ---
    let audioCtx, analyser, dataArray;
    let decodedBuffer = null; let isPlaying = false, currentSource = null;
    let smoothedData = new Float32Array(512);
    let mediaRecorder, recordedChunks = [];
    let loadedFileName = "";
    
    document.getElementById('init-btn').onclick = function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser(); analyser.fftSize = 512; dataArray = new Uint8Array(analyser.frequencyBinCount);
        this.style.display = 'none'; document.getElementById('file-select-box').style.display = 'block';
    };

    document.getElementById('audio-file').onchange = function(e) {
        const file = e.target.files[0]; if (!file) return;
        document.getElementById('status').innerText = "디코딩 중..."; loadedFileName = file.name;
        const reader = new FileReader();
        reader.onload = function(event) {
            audioCtx.decodeAudioData(event.target.result, function(buffer) {
                decodedBuffer = buffer; document.getElementById('status').innerText = "준비 완료! 만족하는 조합이 나올 때까지 랜덤 섞기를 누른 후 진행하세요.";
                document.getElementById('record-btn').style.display = 'block';
            });
        };
        reader.readAsArrayBuffer(file);
    };

    document.getElementById('record-btn').onclick = function() {
        if (!decodedBuffer) return; if (currentSource) { try { currentSource.stop(); } catch(e) {} }
        currentSource = audioCtx.createBufferSource(); currentSource.buffer = decodedBuffer; currentSource.connect(analyser);
        const audioDest = audioCtx.createMediaStreamDestination(); analyser.connect(audioCtx.destination); analyser.connect(audioDest);            
        const canvasStream = renderer.domElement.captureStream(60); const combinedStream = new MediaStream([...canvasStream.getVideoTracks(), ...audioDest.stream.getAudioTracks()]);
        
        let options = { mimeType: 'video/mp4; codecs=avc1', videoBitsPerSecond: 8000000 }; let ext = 'mp4';
        if (!MediaRecorder.isTypeSupported(options.mimeType)) { options = { mimeType: 'video/webm; codecs=vp9', videoBitsPerSecond: 8000000 }; ext = 'webm'; }
        
        recordedChunks = []; mediaRecorder = new MediaRecorder(combinedStream, options);
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: options.mimeType }); const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.style = 'display: none'; a.href = url; a.download = loadedFileName.replace(/\.[^/.]+$/, "") + `_GenerativeCampfireGrid.${ext}`;
            document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url); document.getElementById('status').innerText = `녹화 완료!`;
            ctrlRatio.disabled = false; isPlaying = false; document.getElementById('record-btn').style.display = 'block';
        };
        currentSource.onended = () => { if(mediaRecorder.state === 'recording') mediaRecorder.stop(); };
        currentSource.start(0); mediaRecorder.start(); isPlaying = true;
        ctrlRatio.disabled = true; this.style.display = 'none';
        document.getElementById('status').innerHTML = `<span class="recording-badge">● REC</span> 제너러티브 무작위 그리드 녹화 인코딩 중...`;
    };

    function getThemeColor(theme, progress, trebleReact) {
        let c = new THREE.Color();
        if (theme === 'classic') {
            if (progress < 0.2) c.setHex(0xffffff); else if (progress < 0.5) c.setHex(0xffaa00); else c.setHex(0xff2200);
        } else if (theme === 'blue') {
            if (progress < 0.2) c.setHex(0xffffff); else if (progress < 0.5) c.setHex(0x00ccff); else c.setHex(0x2200ff); 
        } else if (theme === 'magic') {
            if (progress < 0.2) c.setHex(0xccffcc); else if (progress < 0.5) c.setHex(0x00ffaa); else c.setHex(0x005522); 
        } else if (theme === 'neon') {
            if (progress < 0.3) c.setHex(0x00ffff); else c.setHex(0xff00ff); 
        }
        if (trebleReact > 0.3) c.lerp(new THREE.Color(0xffffff), Math.min(1.0, trebleReact * 0.5));
        c.multiplyScalar(Math.max(0.0, 1.0 - progress));
        return c;
    }

    // --- 4. 애니메이션 시뮬레이션 루프 ---
    let time = 0;
    function animate() {
        requestAnimationFrame(animate);
        time += 0.01;

        let rawBass = 0, rawMid = 0, rawTreble = 0;
        let smoothFactor = 1.0 - parseFloat(ctrlSmooth.value);

        if (isPlaying && analyser) {
            analyser.getByteFrequencyData(dataArray);
            for(let i=0; i<dataArray.length; i++) smoothedData[i] += (dataArray[i] - smoothedData[i]) * smoothFactor;
            let bSum=0, mSum=0, tSum=0;
            for(let i=0; i<10; i++) bSum += smoothedData[i];       
            for(let i=10; i<80; i++) mSum += smoothedData[i];      
            for(let i=80; i<200; i++) tSum += dataArray[i];        
            rawBass = (bSum / 10 / 255); rawMid = (mSum / 70 / 255); rawTreble = (tSum / 120 / 255);
        }

        let bReact = rawBass * parseFloat(ctrlReactBass.value);
        let mReact = rawMid * parseFloat(ctrlReactMid.value);
        let tReact = rawTreble * parseFloat(ctrlReactTreb.value);

        // 정적 수동 카메라 매핑 연동 (회전 완전 배제 및 Z축 시선 자동 정렬)
        let cX = parseFloat(ctrlCamX.value); let cY = parseFloat(ctrlCamY.value); let cZ = parseFloat(ctrlCamZ.value); let bY = parseFloat(ctrlBaseY.value);
        camera.position.set(cX, cY, cZ); camera.lookAt(cX, bY + 200, 0); 

        let bHeight = parseFloat(ctrlHeight.value);
        let bSpread = parseFloat(ctrlSpread.value);
        let theme = ctrlColorTheme.value;
        let baseMaxHeight = 500 * bHeight + (bReact * 400); 
        
        let positions = fireGeo.attributes.position.array;
        let colors = fireGeo.attributes.color.array;
        let activeLimit = fireGeo.drawRange.count;

        for (let i = 0; i < activeLimit; i++) {
            let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
            let cx = fCenter[ix], cy = fCenter[iy], cz = fCenter[iz];
            let myFireIdx = fFireIdx[i];
            let uniqueOffset = fireUniquePhases[myFireIdx];

            // ★ 실시간 다이나믹 무작위 화염 높이 계수 라우팅 주입
            let myHeightMultiplier = fireHeightMultipliers[myFireIdx] || 1.0;
            let localMaxHeight = baseMaxHeight * myHeightMultiplier;

            fLife[i] -= 0.01 * (1.0 + Math.random()*0.5);
            
            if (fLife[i] < 0) {
                fLife[i] = 1.0;
                let r = Math.random() * 40 * bSpread;
                positions[ix] = cx + Math.cos(fAngle[i]) * r;
                positions[iy] = cy;
                positions[iz] = cz + Math.sin(fAngle[i]) * r;
            }

            let progress = 1.0 - fLife[i]; 
            positions[iy] = cy + (progress * localMaxHeight * (0.3 + progress * 0.7));

            let nt = fNoiseType[i];
            let nx = 0, nz = 0;
            let t = (time * 2.0) + uniqueOffset; 

            if (nt === 0) { 
                nx = Math.sin(progress * 10 + fPhase[i] + t) * (20 + mReact*40); nz = Math.cos(progress * 12 + fPhase[i] + t) * (20 + mReact*40);
            } else if (nt === 1) { 
                nx = (Math.sin(progress * 5 + t) + Math.cos(fPhase[i])) * (30 + mReact*50); nz = (Math.sin(progress * 7 - t) + Math.cos(fPhase[i]*2)) * (15 + mReact*30);
            } else if (nt === 2) { 
                nx = Math.sin(progress * 25 + t*3) * 15 * (1 + mReact*3); nz = Math.cos(progress * 28 + t*3.5) * 15 * (1 + mReact*3);
            } else if (nt === 3) { 
                nx = (Math.abs(Math.sin(progress * 15 + t)) - 0.5) * 45; nz = (Math.abs(Math.cos(progress * 15 + t)) - 0.5) * 45;
            } else if (nt === 4) { 
                nx = Math.round(Math.sin(progress * 8 + t)) * 30; nz = Math.round(Math.cos(progress * 8 + t)) * 30;
            }

            let radius = (1.0 - progress) * 35 * bSpread * fDist[i];
            let baseX = cx + Math.cos(fAngle[i]) * radius;
            let baseZ = cz + Math.sin(fAngle[i]) * radius;

            positions[ix] += (baseX + nx * progress - positions[ix]) * 0.15;
            positions[iz] += (baseZ + nz * progress - positions[iz]) * 0.15;

            let c = getThemeColor(theme, progress, tReact);
            colors[ix] = c.r; colors[iy] = c.g; colors[iz] = c.b;
        }

        fireGeo.attributes.position.needsUpdate = true;
        fireGeo.attributes.color.needsUpdate = true;

        composer.render();
    }
    animate(); 
</script>
