<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>PRO FIREWORK STUDIO — Visual Focus Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --pink: #ff007b; --bg: #050508; --panel: #12121a; --border: #333; }
        body { background: var(--bg); color: #fff; margin: 0; font-family: 'Pretendard', sans-serif; display: flex; overflow: hidden; }
        
        /* Layout */
        #ui-sidebar { width: 360px; height: 100vh; background: var(--panel); border-right: 1px solid #222; display: flex; flex-direction: column; z-index: 100; }
        #canvas-viewport { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        
        /* Canvas Border Style */
        canvas { border: 2px solid var(--accent); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }

        .scroll-container { flex: 1; overflow-y: auto; padding: 20px; }
        .card { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        h3 { font-size: 11px; color: var(--accent); margin: 0 0 12px 0; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        .row { margin-bottom: 12px; }
        label { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 5px; }
        label span { color: var(--accent); }
        
        select, button, input[type=range] { width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; font-size: 12px; }
        input[type=range] { accent-color: var(--accent); height: 5px; }
        
        .btn-primary { background: var(--accent); color: #000; font-weight: bold; border: none; margin-top: 5px; cursor: pointer; }
        .btn-rec { border-color: var(--pink); color: var(--pink); margin-top: 10px; font-weight: bold; cursor: pointer; }
        .btn-rec.active { background: var(--pink); color: #fff; animation: pulse 1.5s infinite; }
        
        #log-console { height: 50px; background: #000; font-family: monospace; font-size: 10px; padding: 10px; color: #0f0; border-top: 1px solid #222; }
        @keyframes pulse { 50% { opacity: 0.6; } }
    </style>
</head>
<body>

<div id="ui-sidebar">
    <div class="scroll-container">
        <div class="card">
            <h3>📐 Project Display</h3>
            <div class="row">
                <label>Canvas Ratio & Resolution</label>
                <select id="resMode" onchange="changeResolution()">
                    <option value="fhd_wide">16:9 FHD (1920x1080)</option>
                    <option value="fhd_tall">9:16 FHD (1080x1920)</option>
                    <option value="hd_wide">16:9 HD (1280x720)</option>
                </select>
            </div>
        </div>

        <div class="card">
            <h3>🖼️ Background & Audio</h3>
            <button onclick="document.getElementById('m-file').click()">🎵 Load Audio (MP3)</button>
            <input type="file" id="m-file" hidden accept="audio/*" onchange="handleAudio(this.files)">
            <div style="margin-top:8px;"></div>
            <button onclick="document.getElementById('i-file').click()">🖼️ Load BG Image</button>
            <input type="file" id="i-file" hidden accept="image/*" onchange="handleImage(this.files)">
            <div class="row" style="margin-top:10px;">
                <label>BG Opacity <span id="v-bgop">30</span>%</label>
                <input type="range" id="bgop" min="0" max="100" value="30" oninput="updateUI('v-bgop', this.value)">
            </div>
        </div>

        <div class="card">
            <h3>🎆 Firework Style</h3>
            <div class="row">
                <label>Pattern Selection</label>
                <select id="fStyle">
                    <option value="-1">Random Mix (All Styles)</option>
                    <option value="0">Classic Sphere</option>
                    <option value="1">Romantic Heart</option>
                    <option value="2">Twinkle Star</option>
                    <option value="3">Golden Willow</option>
                    <option value="4">Blooming Flower</option>
                    <option value="5">Ring Satellite</option>
                    <option value="6">Square Matrix</option>
                </select>
            </div>
            <div class="row">
                <label>Quantity (Launch Rate) <span id="v-rate">High</span></label>
                <input type="range" id="rate" min="0.80" max="0.98" step="0.01" value="0.90">
            </div>
            <div class="row">
                <label>Explosion Size <span id="v-pow">15</span></label>
                <input type="range" id="pow" min="5" max="30" value="15" oninput="updateUI('v-pow', this.value)">
            </div>
        </div>
    </div>
    
    <div style="padding: 20px;">
        <button id="startBtn" class="btn-primary" onclick="startEngine()" disabled>ENGINE READY</button>
        <button id="recBtn" class="btn-rec" onclick="toggleRecording()" disabled>🔴 START RECORDING</button>
    </div>
    <div id="log-console">FHD System Standby...</div>
</div>

<div id="canvas-viewport"></div>

<script>
let audio, fft, bgImg, isStarted = false, isRecording = false;
let fireworks = [];
let gravity;
let mainCanvas;
let mediaRecorder, chunks = [];

function updateUI(id, val) { document.getElementById(id).innerText = val; }

function setup() {
    changeResolution();
    colorMode(HSB, 360, 100, 100, 100);
}

function changeResolution() {
    let mode = document.getElementById('resMode').value;
    let w, h;
    if (mode === 'fhd_wide') { w = 1920; h = 1080; }
    else if (mode === 'fhd_tall') { w = 1080; h = 1920; }
    else { w = 1280; h = 720; }
    
    mainCanvas = createCanvas(w, h);
    mainCanvas.parent('canvas-viewport');
    
    let scale = Math.min((window.innerWidth - 380) / w, window.innerHeight / h) * 0.9;
    mainCanvas.elt.style.transform = `scale(${scale})`;
    gravity = createVector(0, h * 0.00015); // 해상도 대응 중력
}

function draw() {
    background(0);

    // 1. 배경 이미지 (투명도 적용)
    if (bgImg) {
        push();
        let op = document.getElementById('bgop').value / 100;
        tint(255, op * 100);
        image(bgImg, 0, 0, width, height);
        pop();
    }

    // 2. 잔상 효과 (폭죽이 더 잘 보이도록 이전 프레임을 흐리게)
    fill(0, 0, 0, 15);
    rect(0, 0, width, height);

    if (isStarted && audio && audio.isPlaying()) {
        fft.analyze();
        let bass = fft.getEnergy("bass");
        let mid = fft.getEnergy("mid");
        let threshold = 180; // 고정 감도 혹은 슬라이더 연동 가능
        
        let launchRate = parseFloat(document.getElementById('rate').value);
        
        // 베이스가 강하거나 확률적으로 발사 (풍성함 유지)
        if ((bass > threshold || mid > threshold + 20) && random(1) > launchRate) {
            fireworks.push(new Firework());
        }
    }

    // 3. 폭죽 업데이트 및 렌더링
    for (let i = fireworks.length - 1; i >= 0; i--) {
        fireworks[i].update();
        fireworks[i].show();
        if (fireworks[i].done()) fireworks.splice(i, 1);
    }
}

class Firework {
    constructor() {
        this.hu = random(360);
        let selectedStyle = parseInt(document.getElementById('fStyle').value);
        this.type = (selectedStyle === -1) ? floor(random(7)) : selectedStyle;
        
        // 무작위 위치 발사
        this.firework = new Particle(random(width * 0.1, width * 0.9), height, this.hu, true);
        this.exploded = false;
        this.particles = [];
    }
    done() { return this.exploded && this.particles.length === 0; }
    update() {
        if (!this.exploded) {
            this.firework.applyForce(gravity);
            this.firework.update();
            if (this.firework.vel.y >= 0) {
                this.exploded = true;
                this.explode();
            }
        }
        for (let i = this.particles.length - 1; i >= 0; i--) {
            this.particles[i].applyForce(gravity);
            this.particles[i].update();
            if (this.particles[i].done()) this.particles.splice(i, 1);
        }
    }
    explode() {
        let pCount = 180; // 더 풍성하게
        let pwr = parseFloat(document.getElementById('pow').value);
        for (let i = 0; i < pCount; i++) {
            this.particles.push(new Particle(this.firework.pos.x, this.firework.pos.y, this.hu, false, this.type, pwr));
        }
    }
    show() {
        if (!this.exploded) this.firework.show();
        for (let p of this.particles) p.show();
    }
}

class Particle {
    constructor(x, y, hu, isLead, type, pwr) {
        this.pos = createVector(x, y);
        this.isLead = isLead;
        this.lifespan = 100; // 0-100%
        this.hu = hu;
        this.acc = createVector(0, 0);
        if (this.isLead) {
            this.vel = createVector(0, random(height * -0.015, height * -0.025));
        } else {
            this.vel = this.getShape(type, pwr);
        }
    }
    getShape(t, p) {
        let ang = random(TWO_PI);
        let v = p5.Vector.fromAngle(ang);
        switch(t) {
            case 1: // 하트
                let r1 = 16 * pow(sin(ang), 3);
                let y1 = -(13 * cos(ang) - 5 * cos(2*ang) - 2 * cos(3*ang) - cos(4*ang));
                v = createVector(r1, y1).mult(0.5); break;
            case 2: // 별
                let r2 = (ang % (TWO_PI/5) < TWO_PI/10) ? 1.2 : 0.5;
                v.mult(r2); break;
            case 3: // 버들 (Willow)
                v.mult(random(0.2, 1.5)); this.lifespan = 200; break;
            case 4: // 꽃
                v.mult(sin(ang * 6) + 0.5); break;
            case 5: // 링
                v.mult(random() > 0.9 ? 1.2 : 0.3); break;
            case 6: // 사각형
                v = createVector(cos(ang), sin(ang)).mult(1 / max(abs(cos(ang)), abs(sin(ang)))); break;
        }
        return v.mult(random(p * 0.7, p * 1.1));
    }
    applyForce(f) { this.acc.add(f); }
    update() {
        if (!this.isLead) { this.vel.mult(0.94); this.lifespan -= 1.8; }
        this.vel.add(this.acc);
        this.pos.add(this.vel);
        this.acc.mult(0);
    }
    done() { return this.lifespan < 0; }
    show() {
        push();
        // 발광 효과 추가 (배경 대비 선명도 강화)
        drawingContext.shadowBlur = this.isLead ? 10 : 6;
        drawingContext.shadowColor = color(this.hu, 80, 100);
        
        strokeWeight(this.isLead ? 5 : 3);
        stroke(this.hu, 80, 100, this.lifespan);
        point(this.pos.x, this.pos.y);
        pop();
    }
}

// --- Media & Sync ---
function handleAudio(files) {
    if (audio) audio.stop();
    audio = loadSound(URL.createObjectURL(files[0]), () => {
        fft = new p5.FFT();
        document.getElementById('startBtn').disabled = false;
        document.getElementById('log-console').innerText = "Audio Loaded Ready.";
    });
}

function handleImage(files) {
    let reader = new FileReader();
    reader.onload = (e) => {
        bgImg = loadImage(e.target.result);
        document.getElementById('log-console').innerText = "Background Image Ready.";
    };
    reader.readAsDataURL(files[0]);
}

function startEngine() {
    userStartAudio();
    isStarted = true;
    document.getElementById('recBtn').disabled = false;
    document.getElementById('startBtn').innerText = "ENGINE RUNNING";
}

function toggleRecording() {
    if (isRecording) {
        mediaRecorder.stop();
        audio.stop();
        isRecording = false;
        document.getElementById('recBtn').classList.remove('active');
        document.getElementById('recBtn').innerText = "🔴 START RECORDING";
    } else {
        chunks = [];
        let stream = mainCanvas.elt.captureStream(60);
        let ctx = p5.prototype.getAudioContext();
        let dest = ctx.createMediaStreamDestination();
        audio.connect(dest);
        stream.addTrack(dest.stream.getAudioTracks()[0]);

        mediaRecorder = new MediaRecorder(stream, { 
            mimeType: 'video/webm;codecs=vp9', 
            videoBitsPerSecond: 10000000 // 10Mbps 고화질
        });
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            let blob = new Blob(chunks, { type: 'video/webm' });
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Firework_Show_${Date.now()}.webm`;
            a.click();
        };
        mediaRecorder.start();
        audio.play();
        isRecording = true;
        document.getElementById('recBtn').classList.add('active');
        document.getElementById('recBtn').innerText = "⬛ STOP & SAVE";
    }
}
</script>
</body>
</html>
