<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ULTIMATE FIREWORK STUDIO — FHD Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --pink: #ff007b; --bg: #050508; --panel: #12121a; }
        body { background: var(--bg); color: #fff; margin: 0; font-family: 'Pretendard', sans-serif; display: flex; overflow: hidden; }
        
        /* UI Layout */
        #ui-sidebar { width: 380px; height: 100vh; background: var(--panel); border-right: 1px solid #222; display: flex; flex-direction: column; z-index: 100; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        #canvas-viewport { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .scroll-container { flex: 1; overflow-y: auto; padding: 20px; }
        .card { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 15px; margin-bottom: 20px; border: 1px solid #333; }
        h3 { font-size: 12px; color: var(--accent); margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 1.5px; display: flex; align-items: center; gap: 8px; }
        
        /* Control Elements */
        .row { margin-bottom: 12px; }
        label { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 6px; }
        label span { color: var(--accent); }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        select, button, textarea { width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 5px; font-size: 12px; transition: 0.2s; }
        textarea { height: 80px; font-family: monospace; resize: none; color: #ccc; }
        button:hover:not(:disabled) { border-color: var(--accent); background: rgba(0,242,255,0.1); cursor: pointer; }
        .btn-primary { background: var(--accent); color: #000; font-weight: bold; border: none; margin-top: 5px; }
        .btn-rec { border-color: var(--pink); color: var(--pink); margin-top: 10px; font-weight: bold; }
        .btn-rec.active { background: var(--pink); color: #fff; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        #log-console { height: 60px; background: #000; font-family: monospace; font-size: 10px; padding: 10px; color: #0f0; border-top: 1px solid #222; }
    </style>
</head>
<body>

<div id="ui-sidebar">
    <div class="scroll-container">
        <div class="card">
            <h3>📁 Media Assets</h3>
            <div class="row">
                <label>Music File (MP3)</label>
                <button onclick="document.getElementById('m-file').click()">🎵 Load Audio</button>
                <input type="file" id="m-file" hidden accept="audio/*" onchange="handleAudio(this.files)">
            </div>
            <div class="row">
                <label>Background Image</label>
                <button onclick="document.getElementById('i-file').click()">🖼️ Load Background</button>
                <input type="file" id="i-file" hidden accept="image/*" onchange="handleImage(this.files)">
            </div>
        </div>

        <div class="card">
            <h3>💬 Lyric Sync (Time:Text)</h3>
            <div class="row">
                <label>Format: [Seconds:Lyric]</label>
                <textarea id="lyricInput" placeholder="5:안녕하세요&#10;12:폭죽이 터집니다&#10;20:화려한 밤하늘">5:Welcome&#10;10:Sparkle Tonight&#10;15:Firework Studio</textarea>
            </div>
        </div>

        <div class="card">
            <h3>⚡ Engine Control</h3>
            <div class="row">
                <label>Sensitivity (Bass) <span id="v-sens">200</span></label>
                <input type="range" id="sens" min="100" max="255" value="210" oninput="updateUI('v-sens', this.value)">
            </div>
            <div class="row">
                <label>Explosion Power <span id="v-pow">12</span></label>
                <input type="range" id="pow" min="5" max="25" value="12" oninput="updateUI('v-pow', this.value)">
            </div>
            <div class="row">
                <label>Background Opacity <span id="v-bgop">30</span></label>
                <input type="range" id="bgop" min="0" max="100" value="30" oninput="updateUI('v-bgop', this.value)">
            </div>
        </div>
    </div>
    
    <div style="padding: 20px; background: rgba(0,0,0,0.5);">
        <button id="startBtn" class="btn-primary" onclick="startEngine()" disabled>ENGINE STANDBY</button>
        <button id="recBtn" class="btn-rec" onclick="toggleRecording()" disabled>🔴 REC FHD (1920x1080)</button>
    </div>

    <div id="log-console">System Online...</div>
</div>

<div id="canvas-viewport"></div>

<script>
let audio, fft, bgImg, isStarted = false, isRecording = false;
let fireworks = [];
let lyrics = [];
let currentLyric = "";
let gravity;
let mainCanvas;
let mediaRecorder, chunks = [];

function updateUI(id, val) { document.getElementById(id).innerText = val; }

function setup() {
    // FHD 해상도로 캔버스 생성
    mainCanvas = createCanvas(1920, 1080);
    mainCanvas.parent('canvas-viewport');
    
    // 뷰포트에 맞게 시각적 스케일만 조정
    let scale = Math.min((window.innerWidth - 380) / 1920, window.innerHeight / 1080) * 0.95;
    mainCanvas.elt.style.transform = `scale(${scale})`;
    
    gravity = createVector(0, 0.18);
    colorMode(HSB);
    textAlign(CENTER, CENTER);
    textFont('sans-serif');
}

function draw() {
    background(0);

    // 배경 이미지 렌더링
    if (bgImg) {
        push();
        let opacity = document.getElementById('bgop').value / 100;
        tint(255, opacity * 255);
        image(bgImg, 0, 0, width, height);
        pop();
    }
    
    // 잔상 레이어
    fill(0, 0, 0, 0.15);
    rect(0, 0, width, height);

    if (isStarted && audio && audio.isPlaying()) {
        let currTime = audio.currentTime();
        
        // 1. 오디오 분석 (Bass & Mid 대역 집중)
        fft.analyze();
        let energy = (fft.getEnergy("bass") * 0.8 + fft.getEnergy("lowMid") * 0.2);
        let threshold = document.getElementById('sens').value;
        
        if (energy > threshold && random(1) > 0.88) {
            fireworks.push(new Firework());
        }

        // 2. 가사 동기화 시스템
        checkLyrics(currTime);
    }

    // 폭죽 처리
    for (let i = fireworks.length - 1; i >= 0; i--) {
        fireworks[i].update();
        fireworks[i].show();
        if (fireworks[i].done()) fireworks.splice(i, 1);
    }

    // 가사 표시 (폭죽 한가운데가 아닌 화면 중앙 상단 등에 배치하여 가독성 확보)
    if (currentLyric !== "") {
        drawLyric();
    }
}

function drawLyric() {
    push();
    textSize(60);
    textStyle(BOLD);
    fill(255);
    stroke(0);
    strokeWeight(8);
    text(currentLyric, width/2, height/2 - 100);
    pop();
}

// --- 핵심 로직: 가사 파싱 ---
function checkLyrics(t) {
    let raw = document.getElementById('lyricInput').value.split('\n');
    let found = "";
    for (let line of raw) {
        let parts = line.split(':');
        if (parts.length >= 2) {
            let time = parseFloat(parts[0]);
            if (t > time && t < time + 3) { // 3초간 표시
                found = parts[1];
            }
        }
    }
    currentLyric = found;
}

class Firework {
    constructor() {
        this.hu = random(360);
        this.type = floor(random(12));
        this.firework = new Particle(random(width * 0.2, width * 0.8), height, this.hu, true);
        this.exploded = false;
        this.particles = [];
    }
    done() { return this.exploded && this.particles.length === 0; }
    update() {
        if (!this.exploded) {
            this.firework.applyForce(gravity);
            this.firework.update();
            if (this.firework.vel.y >= 0) {
                this.exploded = true;
                this.explode();
            }
        }
        for (let i = this.particles.length - 1; i >= 0; i--) {
            this.particles[i].applyForce(gravity);
            this.particles[i].update();
            if (this.particles[i].done()) this.particles.splice(i, 1);
        }
    }
    explode() {
        let pCount = 150;
        let pwr = parseFloat(document.getElementById('pow').value);
        for (let i = 0; i < pCount; i++) {
            this.particles.push(new Particle(this.firework.pos.x, this.firework.pos.y, this.hu, false, this.type, pwr));
        }
    }
    show() {
        if (!this.exploded) this.firework.show();
        for (let p of this.particles) p.show();
    }
}

class Particle {
    constructor(x, y, hu, isLead, type, pwr) {
        this.pos = createVector(x, y);
        this.isLead = isLead;
        this.lifespan = 255;
        this.hu = hu;
        this.acc = createVector(0, 0);
        if (this.isLead) {
            this.vel = createVector(0, random(-22, -14)); // FHD 대응 높이 상향
        } else {
            this.vel = this.getShape(type, pwr);
        }
    }
    getShape(t, p) {
        let ang = random(TWO_PI);
        let v = p5.Vector.fromAngle(ang);
        if (t === 1) { // 하트
            let r = 16 * pow(sin(ang), 3);
            let y = -(13 * cos(ang) - 5 * cos(2*ang) - 2 * cos(3*ang) - cos(4*ang));
            v = createVector(r, y).mult(0.6);
        } else if (t === 2) { // 별
            let r = (ang % (TWO_PI/5) < TWO_PI/10) ? 1 : 0.4;
            v.mult(r * 1.5);
        } else if (t === 3) { // 버들개지 (Willow)
            v.mult(random(0.1, 1.2));
            this.lifespan = 450;
        }
        return v.mult(random(p * 0.8, p * 1.2));
    }
    applyForce(f) { this.acc.add(f); }
    update() {
        if (!this.isLead) { this.vel.mult(0.94); this.lifespan -= 3; }
        this.vel.add(this.acc);
        this.pos.add(this.vel);
        this.acc.mult(0);
    }
    done() { return this.lifespan < 0; }
    show() {
        strokeWeight(this.isLead ? 4 : 2);
        stroke(this.hu, 255, 255, this.lifespan/255);
        point(this.pos.x, this.pos.y);
    }
}

// --- 미디어 핸들러 ---
function handleAudio(files) {
    if (audio) audio.stop();
    audio = loadSound(URL.createObjectURL(files[0]), () => {
        fft = new p5.FFT();
        document.getElementById('startBtn').disabled = false;
        document.getElementById('log-console').innerText = "Audio Loaded Ready.";
    });
}

function handleImage(files) {
    let reader = new FileReader();
    reader.onload = (e) => {
        bgImg = loadImage(e.target.result);
        document.getElementById('log-console').innerText = "Background Image Applied.";
    };
    reader.readAsDataURL(files[0]);
}

function startEngine() {
    userStartAudio();
    isStarted = true;
    document.getElementById('recBtn').disabled = false;
    document.getElementById('startBtn').innerText = "SYSTEM ACTIVE";
}

async function toggleRecording() {
    if (isRecording) {
        mediaRecorder.stop();
        audio.stop();
        isRecording = false;
        document.getElementById('recBtn').classList.remove('active');
        document.getElementById('recBtn').innerText = "🔴 REC FHD (1920x1080)";
    } else {
        chunks = [];
        let stream = mainCanvas.elt.captureStream(60); // 60fps 녹화
        
        // 오디오 믹싱 (음악 포함 녹화)
        let ctx = p5.prototype.getAudioContext();
        let dest = ctx.createMediaStreamDestination();
        audio.connect(dest);
        stream.addTrack(dest.stream.getAudioTracks()[0]);

        mediaRecorder = new MediaRecorder(stream, { 
            mimeType: 'video/webm;codecs=vp9', 
            videoBitsPerSecond: 8000000 // 8Mbps 고화질
        });
        
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            let blob = new Blob(chunks, { type: 'video/webm' });
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Firework_FHD_Show.webm`;
            a.click();
        };
        
        mediaRecorder.start();
        audio.play();
        isRecording = true;
        document.getElementById('recBtn').classList.add('active');
        document.getElementById('recBtn').innerText = "⬛ STOP & SAVE VIDEO";
    }
}
</script>
</body>
</html>
