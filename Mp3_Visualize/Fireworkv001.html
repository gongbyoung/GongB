<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FIREWORK STUDIO V001.002</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --pink: #ff007b; --bg: #020205; --panel: #0d0d14; }
        body { background: var(--bg); color: #fff; margin: 0; font-family: sans-serif; display: flex; overflow: hidden; height: 100vh; }
        #ui-sidebar { width: 360px; height: 100vh; background: var(--panel); border-right: 1px solid #222; display: flex; flex-direction: column; z-index: 100; flex-shrink: 0; }
        #canvas-viewport { flex: 1; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; overflow: hidden; position: relative; }
        canvas { border: 1px solid var(--accent); margin-top: 30px; transform-origin: top center; box-shadow: 0 0 40px rgba(0, 0, 0, 0.5); }
        .scroll-container { flex: 1; overflow-y: auto; padding: 20px; }
        .card { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid #2a2a35; }
        h3 { font-size: 11px; color: var(--accent); margin: 0 0 12px 0; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .row { margin-bottom: 15px; }
        label { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 5px; }
        label span { color: var(--accent); font-weight: bold; }
        .debug-bar-bg { width: 100%; height: 6px; background: #000; border-radius: 3px; overflow: hidden; margin-top: 4px; }
        .debug-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s; }
        select, button, input[type=range] { width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 4px; font-size: 12px; box-sizing: border-box; outline: none; }
        input[type=range] { accent-color: var(--accent); cursor: pointer; height: 4px; }
        .btn-primary { background: var(--accent); color: #000; font-weight: bold; border: none; cursor: pointer; }
        .btn-rec { border-color: var(--pink); color: var(--pink); margin-top: 10px; font-weight: bold; cursor: pointer; }
        #log-console { height: 100px; background: #050508; font-family: monospace; font-size: 10px; padding: 10px; color: #00ff00; border-top: 1px solid #222; overflow-y: auto; }
        .predict-box { font-size: 10px; color: var(--pink); text-align: right; margin-top: 5px; }
    </style>
</head>
<body>

<div id="ui-sidebar">
    <div class="scroll-container">
        <div class="card">
            <h3>📐 Canvas Display</h3>
            <select id="resMode" onchange="changeResolution()">
                <option value="fhd_wide">16:9 Landscape (1920x1080)</option>
                <option value="fhd_tall">9:16 Portrait (1080x1920)</option>
            </select>
        </div>
        <div class="card">
            <h3>📊 Master Analyzer</h3>
            <div class="row">
                <label>BASS (Beat) <span id="val-bass">0</span></label>
                <div class="debug-bar-bg"><div id="bar-bass" class="debug-bar-fill"></div></div>
            </div>
            <div class="row">
                <label>MID (Melody) <span id="val-mid">0</span></label>
                <div class="debug-bar-bg"><div id="bar-mid" class="debug-bar-fill"></div></div>
            </div>
        </div>
        <div class="card">
            <h3>⚡ Launch Engine</h3>
            <div class="row">
                <label>Sensitivity <span id="v-sens">163</span></label>
                <input type="range" id="sens" min="100" max="255" value="163" oninput="updateUI('v-sens', this.value); calcPredict();">
            </div>
            <div class="row">
                <label>Probability <span id="v-prob">19</span>%</label>
                <input type="range" id="prob" min="1" max="100" value="19" oninput="updateUI('v-prob', this.value); calcPredict();">
            </div>
            <div id="predict-text" class="predict-box">예측 밀도 계산 중...</div>
        </div>
        <div class="card">
            <h3>🎨 Media Assets</h3>
            <button class="btn-primary" onclick="document.getElementById('m-file').click()">🎵 LOAD MUSIC (MP3)</button>
            <input type="file" id="m-file" hidden accept="audio/*" onchange="handleAudio(this.files)">
            <div style="margin-top:8px;"></div>
            <button class="btn-primary" style="background:#333; color:#fff" onclick="document.getElementById('i-file').click()">🖼️ LOAD BG IMAGE</button>
            <input type="file" id="i-file" hidden accept="image/*" onchange="handleImage(this.files)">
        </div>
    </div>
    <div id="log-console">>> V001.002 Ready...</div>
    <div style="padding: 20px;">
        <button id="startBtn" class="btn-primary" onclick="startEngine()" disabled style="height:40px">ENGINE ACTIVE</button>
        <button id="recBtn" class="btn-rec" onclick="toggleRecording()" disabled style="height:40px">🔴 START RECORDING</button>
    </div>
</div>

<div id="canvas-viewport"></div>

<script>
let audio, fft, bgImg, isStarted = false, isRecording = false;
let fireworks = [];
let gravity;
let mainCanvas;
let mediaRecorder, chunks = [];

function updateUI(id, val) { document.getElementById(id).innerText = val; }

function addLog(b) {
    let log = document.getElementById('log-console');
    let msg = `[${new Date().toLocaleTimeString()}] Target Launch: Bass ${floor(b)}`;
    let div = document.createElement('div');
    div.innerText = msg;
    log.prepend(div);
    if(log.childNodes.length > 30) log.lastChild.remove();
}

function calcPredict() {
    let sens = parseInt(document.getElementById('sens').value);
    let prob = parseInt(document.getElementById('prob').value);
    let est = floor((255 - sens) * (prob/100) * 0.4);
    document.getElementById('predict-text').innerText = `예측 밀도: 10초당 약 ${max(1, est * 8)}개`;
}

function setup() {
    changeResolution();
    colorMode(HSB, 360, 100, 100, 100);
    calcPredict();
}

function changeResolution() {
    let mode = document.getElementById('resMode').value;
    let w = (mode === 'fhd_wide') ? 1920 : 1080;
    let h = (mode === 'fhd_wide') ? 1080 : 1920;
    if (mainCanvas) resizeCanvas(w, h);
    else { mainCanvas = createCanvas(w, h); mainCanvas.parent('canvas-viewport'); }
    scaleViewport();
    gravity = createVector(0, 0.2); // 파편용 중력만 사용
    fireworks = []; 
}

function scaleViewport() {
    let containerW = window.innerWidth - 360;
    let containerH = window.innerHeight - 60; 
    let scale = Math.min(containerW / width, containerH / height);
    mainCanvas.elt.style.transform = `scale(${scale})`;
}
window.onresize = scaleViewport;

function draw() {
    background(0);
    if (bgImg) { push(); tint(255, 100); image(bgImg, 0, 0, width, height); pop(); }
    fill(0, 0, 0, 25); rect(0, 0, width, height);

    if (isStarted && audio && audio.isPlaying()) {
        fft.analyze();
        let b = fft.getEnergy("bass");
        let m = fft.getEnergy("mid");
        document.getElementById('bar-bass').style.width = (b/255*100) + "%";
        document.getElementById('bar-mid').style.width = (m/255*100) + "%";
        document.getElementById('val-bass').innerText = floor(b);
        document.getElementById('val-mid').innerText = floor(m);

        let threshold = parseInt(document.getElementById('sens').value);
        let probability = parseInt(document.getElementById('prob').value) / 100;
        
        if (b > threshold && random(1) < probability) {
            fireworks.push(new Firework());
            addLog(b);
        }
    }

    for (let i = fireworks.length - 1; i >= 0; i--) {
        fireworks[i].update();
        fireworks[i].show();
        if (fireworks[i].done()) fireworks.splice(i, 1);
    }
}

class Firework {
    constructor() {
        this.hu = random(360);
        // 이동 방식: 시작점 -> 목표점(Target)
        this.startPos = createVector(random(width * 0.2, width * 0.8), height);
        // 목표 지점: 캔버스 가로 10~90%, 세로 10~50% 내부 안전 구역
        this.targetPos = createVector(random(width * 0.1, width * 0.9), random(height * 0.1, height * 0.5));
        
        this.pos = this.startPos.copy();
        this.pct = 0; // 진행도 (0 to 1)
        this.speed = random(0.015, 0.025); // 도달 속도 (프레임 단위)
        
        this.exploded = false;
        this.particles = [];
    }
    
    done() { return this.exploded && this.particles.length === 0; }
    
    update() {
        if (!this.exploded) {
            // Lerp 이동 (물리 무시, 목표 지점 정확 도달)
            this.pct += this.speed;
            this.pos = p5.Vector.lerp(this.startPos, this.targetPos, this.pct);
            
            if (this.pct >= 1) {
                this.exploded = true;
                this.explode();
            }
        }
        for (let i = this.particles.length - 1; i >= 0; i--) {
            this.particles[i].applyForce(gravity);
            this.particles[i].update();
            if (this.particles[i].done()) this.particles.splice(i, 1);
        }
    }
    
    explode() {
        for (let i = 0; i < 150; i++) {
            this.particles.push(new Particle(this.pos.x, this.pos.y, this.hu));
        }
    }
    
    show() {
        if (!this.exploded) {
            push();
            strokeWeight(4);
            stroke(this.hu, 100, 100);
            point(this.pos.x, this.pos.y);
            pop();
        }
        for (let p of this.particles) p.show();
    }
}

class Particle {
    constructor(x, y, hu) {
        this.pos = createVector(x, y);
        this.vel = p5.Vector.random2D().mult(random(width * 0.005, width * 0.015));
        this.acc = createVector(0, 0);
        this.lifespan = 100;
        this.hu = hu;
    }
    applyForce(f) { this.acc.add(f); }
    update() {
        this.vel.mult(0.95);
        this.vel.add(this.acc);
        this.pos.add(this.vel);
        this.acc.mult(0);
        this.lifespan -= 2.0;
    }
    done() { return this.lifespan < 0; }
    show() {
        push();
        drawingContext.shadowBlur = 6;
        drawingContext.shadowColor = color(this.hu, 100, 100);
        strokeWeight(3);
        stroke(this.hu, 90, 100, this.lifespan);
        point(this.pos.x, this.pos.y);
        pop();
    }
}

function handleAudio(files) {
    audio = loadSound(URL.createObjectURL(files[0]), () => {
        fft = new p5.FFT();
        document.getElementById('startBtn').disabled = false;
        document.getElementById('log-console').prepend(document.createTextNode(">> Audio Ready\n"));
    });
}
function handleImage(files) {
    let reader = new FileReader();
    reader.onload = (e) => { bgImg = loadImage(e.target.result); };
    reader.readAsDataURL(files[0]);
}
function startEngine() { userStartAudio(); isStarted = true; document.getElementById('recBtn').disabled = false; }
function toggleRecording() {
    if (isRecording) {
        mediaRecorder.stop(); audio.stop(); isRecording = false;
        document.getElementById('recBtn').innerText = "🔴 START RECORDING";
    } else {
        chunks = [];
        let stream = mainCanvas.elt.captureStream(60);
        let dest = p5.prototype.getAudioContext().createMediaStreamDestination();
        audio.connect(dest);
        stream.addTrack(dest.stream.getAudioTracks()[0]);
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 15000000 });
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            let blob = new Blob(chunks, { type: 'video/webm' });
            let a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `Firework_Target_V001.002.webm`; a.click();
        };
        mediaRecorder.start(); audio.play(); isRecording = true;
        document.getElementById('recBtn').innerText = "⬛ STOP & SAVE";
    }
}
</script>
</body>
</html>
