<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FIREWORK STUDIO v3.0 — Precision Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --pink: #ff007b; --bg: #050508; --panel: #12121a; }
        body { background: var(--bg); color: #fff; margin: 0; font-family: 'Pretendard', sans-serif; display: flex; overflow: hidden; }
        
        #ui-sidebar { width: 360px; height: 100vh; background: var(--panel); border-right: 1px solid #222; display: flex; flex-direction: column; z-index: 100; }
        #canvas-viewport { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        
        canvas { border: 2px solid #333; outline: 1px solid var(--accent); }

        .scroll-container { flex: 1; overflow-y: auto; padding: 20px; }
        .card { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        h3 { font-size: 11px; color: var(--accent); margin: 0 0 12px 0; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        .row { margin-bottom: 15px; }
        label { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 5px; }
        label span { color: var(--accent); font-weight: bold; }
        
        select, button, input[type=range] { width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; font-size: 12px; }
        input[type=range] { accent-color: var(--accent); cursor: pointer; }
        
        .btn-primary { background: var(--accent); color: #000; font-weight: bold; border: none; margin-top: 5px; cursor: pointer; }
        .btn-rec { border-color: var(--pink); color: var(--pink); margin-top: 10px; font-weight: bold; cursor: pointer; }
        .btn-rec.active { background: var(--pink); color: #fff; animation: pulse 1.5s infinite; }
        
        #log-console { height: 60px; background: #000; font-family: monospace; font-size: 10px; padding: 10px; color: #0f0; border-top: 1px solid #222; overflow: hidden; }
        @keyframes pulse { 50% { opacity: 0.6; } }
    </style>
</head>
<body>

<div id="ui-sidebar">
    <div class="scroll-container">
        <div class="card">
            <h3>📐 Canvas & Ratio</h3>
            <div class="row">
                <select id="resMode" onchange="changeResolution()">
                    <option value="fhd_wide">16:9 Landscape (1920x1080)</option>
                    <option value="fhd_tall">9:16 Portrait (1080x1920)</option>
                </select>
            </div>
        </div>

        <div class="card">
            <h3>🎵 Audio Analysis (Density)</h3>
            <div class="row">
                <label>Sensitivity (Threshold) <span id="v-sens">200</span></label>
                <input type="range" id="sens" min="100" max="255" value="200" oninput="updateUI('v-sens', this.value)">
                <p style="font-size:9px; color:#666; margin:4px 0;">낮을수록 작은 소리에도 터집니다.</p>
            </div>
            <div class="row">
                <label>Launch Probability <span id="v-prob">10</span>%</label>
                <input type="range" id="prob" min="1" max="50" value="10" oninput="updateUI('v-prob', this.value)">
                <p style="font-size:9px; color:#666; margin:4px 0;">비트가 감지되었을 때 실제 발사될 확률입니다.</p>
            </div>
        </div>

        <div class="card">
            <h3>🎆 Visual Options</h3>
            <div class="row">
                <label>BG Opacity <span id="v-bgop">30</span>%</label>
                <input type="range" id="bgop" min="0" max="100" value="30" oninput="updateUI('v-bgop', this.value)">
            </div>
            <div class="row">
                <label>Pattern Style</label>
                <select id="fStyle">
                    <option value="-1">Random Mix</option>
                    <option value="0">Sphere</option>
                    <option value="1">Heart</option>
                    <option value="2">Star</option>
                    <option value="3">Willow</option>
                </select>
            </div>
            <button onclick="document.getElementById('m-file').click()">🎵 Load MP3</button>
            <input type="file" id="m-file" hidden accept="audio/*" onchange="handleAudio(this.files)">
            <div style="margin-top:5px;"></div>
            <button onclick="document.getElementById('i-file').click()">🖼️ Load Image</button>
            <input type="file" id="i-file" hidden accept="image/*" onchange="handleImage(this.files)">
        </div>
    </div>
    
    <div style="padding: 20px;">
        <button id="startBtn" class="btn-primary" onclick="startEngine()" disabled>ENGINE STANDBY</button>
        <button id="recBtn" class="btn-rec" onclick="toggleRecording()" disabled>🔴 START RECORDING</button>
    </div>
    <div id="log-console">Ready to analyze...</div>
</div>

<div id="canvas-viewport"></div>

<script>
let audio, fft, bgImg, isStarted = false, isRecording = false;
let fireworks = [];
let gravity;
let mainCanvas;
let mediaRecorder, chunks = [];

function updateUI(id, val) { document.getElementById(id).innerText = val; }

function setup() {
    changeResolution();
    colorMode(HSB, 360, 100, 100, 100);
}

function changeResolution() {
    let mode = document.getElementById('resMode').value;
    let w = (mode === 'fhd_wide') ? 1920 : 1080;
    let h = (mode === 'fhd_wide') ? 1080 : 1920;
    
    if (mainCanvas) resizeCanvas(w, h);
    else {
        mainCanvas = createCanvas(w, h);
        mainCanvas.parent('canvas-viewport');
    }
    
    scaleViewport();
    gravity = createVector(0, height * 0.00018);
    fireworks = []; 
    document.getElementById('log-console').innerText = `Switched to ${w}x${h}. Buffer cleared.`;
}

function scaleViewport() {
    let scale = Math.min((window.innerWidth - 360) / width, window.innerHeight / height) * 0.9;
    mainCanvas.elt.style.transform = `scale(${scale})`;
}
window.onresize = scaleViewport;

function draw() {
    background(0);

    if (bgImg) {
        push();
        tint(255, document.getElementById('bgop').value);
        image(bgImg, 0, 0, width, height);
        pop();
    }

    fill(0, 0, 0, 20); // 잔상 강도
    rect(0, 0, width, height);

    if (isStarted && audio && audio.isPlaying()) {
        fft.analyze();
        let bass = fft.getEnergy("bass");
        let threshold = parseInt(document.getElementById('sens').value);
        let probability = parseInt(document.getElementById('prob').value) / 100;
        
        // 1. 음악 분석 기반 발사 제어
        if (bass > threshold && random(1) < probability) {
            fireworks.push(new Firework());
            logStatus(bass);
        }
    }

    for (let i = fireworks.length - 1; i >= 0; i--) {
        fireworks[i].update();
        fireworks[i].show();
        if (fireworks[i].done()) fireworks.splice(i, 1);
    }
}

function logStatus(b) {
    let log = document.getElementById('log-console');
    log.innerText = `[EVENT] Beat Detected: ${floor(b)} | Active Fireworks: ${fireworks.length}`;
}

class Firework {
    constructor() {
        this.hu = random(360);
        let s = parseInt(document.getElementById('fStyle').value);
        this.type = (s === -1) ? floor(random(5)) : s;
        
        // 중심체 발사 위치 제한: 좌우 15% 여백 확보 (중심이 화면 밖으로 나가지 않음)
        let safeX = random(width * 0.15, width * 0.85);
        this.firework = new Particle(safeX, height, this.hu, true);
        this.exploded = false;
        this.particles = [];
    }
    done() { return this.exploded && this.particles.length === 0; }
    update() {
        if (!this.exploded) {
            this.firework.applyForce(gravity);
            this.firework.update();
            if (this.firework.vel.y >= 0) {
                this.exploded = true;
                this.explode();
            }
        }
        for (let i = this.particles.length - 1; i >= 0; i--) {
            this.particles[i].applyForce(gravity);
            this.particles[i].update();
            if (this.particles[i].done()) this.particles.splice(i, 1);
        }
    }
    explode() {
        let count = 150;
        for (let i = 0; i < count; i++) {
            this.particles.push(new Particle(this.firework.pos.x, this.firework.pos.y, this.hu, false, this.type));
        }
    }
    show() {
        if (!this.exploded) this.firework.show();
        for (let p of this.particles) p.show();
    }
}

class Particle {
    constructor(x, y, hu, isLead, type) {
        this.pos = createVector(x, y);
        this.isLead = isLead;
        this.lifespan = 100;
        this.hu = hu;
        this.acc = createVector(0, 0);
        if (this.isLead) {
            // 발사체 속도: 수직 상승 위주로 설정 (중심이 옆으로 휘어 나가지 않게)
            this.vel = createVector(random(-1, 1), random(height * -0.018, height * -0.025));
        } else {
            this.vel = this.getShape(type);
            this.vel.mult(random(width * 0.006, width * 0.012));
        }
    }
    getShape(t) {
        let a = random(TWO_PI);
        let v = p5.Vector.fromAngle(a);
        if (t === 1) { // Heart
            let r = 16 * pow(sin(a), 3);
            let y = -(13 * cos(a) - 5 * cos(2*a) - 2 * cos(3*a) - cos(4*a));
            v = createVector(r, y).mult(0.06);
        } else if (t === 2) { // Star
            let r = (a % (TWO_PI/5) < TWO_PI/10) ? 1 : 0.4;
            v.mult(r);
        } else if (t === 3) { // Willow
            v.mult(random(0.2, 1.5)); this.lifespan = 250;
        } else if (t === 4) { // Flower
            v.mult(sin(a * 6));
        }
        return v;
    }
    applyForce(f) { this.acc.add(f); }
    update() {
        if (!this.isLead) { this.vel.mult(0.94); this.lifespan -= 2; }
        this.vel.add(this.acc);
        this.pos.add(this.vel);
        this.acc.mult(0);
    }
    done() { return this.lifespan < 0; }
    show() {
        push();
        drawingContext.shadowBlur = this.isLead ? 12 : 6;
        drawingContext.shadowColor = color(this.hu, 100, 100);
        strokeWeight(this.isLead ? 5 : 3);
        stroke(this.hu, 90, 100, this.lifespan);
        point(this.pos.x, this.pos.y);
        pop();
    }
}

// --- Media & Recording ---
function handleAudio(files) {
    audio = loadSound(URL.createObjectURL(files[0]), () => {
        fft = new p5.FFT();
        document.getElementById('startBtn').disabled = false;
        document.getElementById('log-console').innerText = "Audio analysis ready.";
    });
}
function handleImage(files) {
    let reader = new FileReader();
    reader.onload = (e) => { bgImg = loadImage(e.target.result); };
    reader.readAsDataURL(files[0]);
}
function startEngine() {
    userStartAudio(); isStarted = true;
    document.getElementById('recBtn').disabled = false;
    document.getElementById('startBtn').innerText = "ENGINE ACTIVE";
}
function toggleRecording() {
    if (isRecording) {
        mediaRecorder.stop(); audio.stop(); isRecording = false;
        document.getElementById('recBtn').classList.remove('active');
        document.getElementById('recBtn').innerText = "🔴 START RECORDING";
    } else {
        chunks = [];
        let stream = mainCanvas.elt.captureStream(60);
        let ctx = p5.prototype.getAudioContext();
        let dest = ctx.createMediaStreamDestination();
        audio.connect(dest);
        stream.addTrack(dest.stream.getAudioTracks()[0]);
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 15000000 });
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            let blob = new Blob(chunks, { type: 'video/webm' });
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Firework_Show.webm`;
            a.click();
        };
        mediaRecorder.start(); audio.play(); isRecording = true;
        document.getElementById('recBtn').classList.add('active');
        document.getElementById('recBtn').innerText = "⬛ STOP & SAVE";
    }
}
</script>
</body>
</html>
