<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FIREWORK STUDIO V001.006</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --pink: #ff007b; --bg: #020205; --panel: #0d0d14; }
        body { background: var(--bg); color: #fff; margin: 0; font-family: sans-serif; display: flex; overflow: hidden; height: 100vh; }
        #ui-sidebar { width: 360px; height: 100vh; background: var(--panel); border-right: 1px solid #222; display: flex; flex-direction: column; z-index: 100; flex-shrink: 0; }
        #canvas-viewport { flex: 1; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; overflow: hidden; position: relative; }
        canvas { border: 1px solid var(--accent); margin-top: 30px; transform-origin: top center; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        .scroll-container { flex: 1; overflow-y: auto; padding: 20px; }
        .card { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid #2a2a35; }
        h3 { font-size: 11px; color: var(--accent); margin: 0 0 12px 0; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .freq-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .freq-box { background: #000; padding: 8px; border-radius: 4px; border: 1px solid #222; text-align: center; }
        .freq-label { font-size: 9px; color: #666; margin-bottom: 4px; }
        .freq-bar-bg { width: 100%; height: 30px; background: #111; position: relative; border-radius: 2px; overflow: hidden; }
        .freq-bar-fill { position: absolute; bottom: 0; width: 100%; background: var(--accent); }
        .row { margin-bottom: 15px; }
        label { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 5px; }
        label span { color: var(--accent); font-weight: bold; }
        select, button, input[type=range] { width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 4px; font-size: 12px; box-sizing: border-box; outline: none; }
        input[type=range] { accent-color: var(--accent); cursor: pointer; height: 4px; }
        .btn-primary { background: var(--accent); color: #000; font-weight: bold; border: none; cursor: pointer; }
        .btn-rec { border-color: var(--pink); color: var(--pink); margin-top: 10px; font-weight: bold; cursor: pointer; }
        #log-console { height: 100px; background: #050508; font-family: monospace; font-size: 10px; padding: 10px; color: #00ff00; border-top: 1px solid #222; overflow-y: auto; }
    </style>
</head>
<body>

<div id="ui-sidebar">
    <div class="scroll-container">
        <div class="card">
            <h3>📊 Master Analyzer</h3>
            <div class="freq-grid">
                <div class="freq-box"><div class="freq-label">Sub</div><div class="freq-bar-bg"><div id="bar-sub" class="freq-bar-fill"></div></div></div>
                <div class="freq-box"><div class="freq-label">Bass</div><div class="freq-bar-bg"><div id="bar-bass" class="freq-bar-fill"></div></div></div>
                <div class="freq-box"><div class="freq-label">LowMid</div><div class="freq-bar-bg"><div id="bar-lowmid" class="freq-bar-fill"></div></div></div>
                <div class="freq-box"><div class="freq-label">Mid</div><div class="freq-bar-bg"><div id="bar-mid" class="freq-bar-fill"></div></div></div>
                <div class="freq-box"><div class="freq-label">HiMid</div><div class="freq-bar-bg"><div id="bar-highmid" class="freq-bar-fill"></div></div></div>
                <div class="freq-box"><div class="freq-label">Treble</div><div class="freq-bar-bg"><div id="bar-treble" class="freq-bar-fill"></div></div></div>
            </div>
        </div>
        <div class="card">
            <h3>⚡ Launch Sync</h3>
            <div class="row">
                <label>Target Mode</label>
                <select id="targetBand">
                    <option value="sub">Sub-Bass (Impact)</option>
                    <option value="bass" selected>Bass (Kick/Rhythm)</option>
                    <option value="vocal">Vocal / Speech (Voice)</option>
                    <option value="treble">Treble (Sharp)</option>
                </select>
            </div>
            <div class="row">
                <label>Sensitivity <span id="v-sens">160</span></label>
                <input type="range" id="sens" min="30" max="255" value="160" oninput="updateUI('v-sens', this.value)">
            </div>
        </div>
        <div class="card">
            <h3>🎨 Media Assets</h3>
            <button class="btn-primary" onclick="document.getElementById('m-file').click()">🎵 LOAD MP3</button>
            <input type="file" id="m-file" hidden accept="audio/*" onchange="handleAudio(this.files)">
            <div style="margin-top:8px;"></div>
            <button class="btn-primary" style="background:#333; color:#fff" onclick="document.getElementById('i-file').click()">🖼️ LOAD BG IMAGE</button>
            <input type="file" id="i-file" hidden accept="image/*" onchange="handleImage(this.files)">
        </div>
    </div>
    <div id="log-console">>> V001.006 Voice Sync Ready...</div>
    <div style="padding: 20px;">
        <button id="startBtn" class="btn-primary" onclick="startEngine()" disabled style="height:40px">ENGINE ACTIVE</button>
        <button id="recBtn" class="btn-rec" onclick="toggleRecording()" disabled style="height:40px">🔴 START RECORDING</button>
    </div>
</div>

<div id="canvas-viewport"></div>

<script>
let audio, fft, bgImg, isStarted = false, isRecording = false;
let fireworks = [];
let gravity;
let mainCanvas;
let mediaRecorder, chunks = [];

function updateUI(id, val) { const el = document.getElementById(id); if(el) el.innerText = val; }

function setup() {
    mainCanvas = createCanvas(1920, 1080);
    mainCanvas.parent('canvas-viewport');
    scaleViewport();
    colorMode(HSB, 360, 100, 100, 100);
    gravity = createVector(0, 0.15);
}

function scaleViewport() {
    let containerW = window.innerWidth - 360;
    let containerH = window.innerHeight - 60; 
    let scale = Math.min(containerW / width, containerH / height);
    mainCanvas.elt.style.transform = `scale(${scale})`;
}
window.onresize = scaleViewport;

function draw() {
    background(0);
    if (bgImg) { push(); tint(255, 100); image(bgImg, 0, 0, width, height); pop(); }
    fill(0, 0, 0, 20);
    rect(0, 0, width, height);

    if (isStarted && audio && audio.isPlaying()) {
        fft.analyze();
        
        // 실시간 분석 데이터 추출
        let energies = {
            sub: fft.getEnergy(20, 60),
            bass: fft.getEnergy(60, 250),
            lowmid: fft.getEnergy(250, 500),
            mid: fft.getEnergy(500, 2000),
            highmid: fft.getEnergy(2000, 4000),
            treble: fft.getEnergy(4000, 20000)
        };

        // UI 바 업데이트
        for(let k in energies) { updateFreqBar(k, energies[k]); }

        let mode = document.getElementById('targetBand').value;
        let threshold = parseInt(document.getElementById('sens').value);
        let trigger = false;

        if (mode === 'vocal') {
            // 보컬/음성 대역 (300Hz ~ 3000Hz) 집중 분석
            let vocalEnergy = (energies.lowmid + energies.mid + energies.highmid) / 3;
            if (vocalEnergy > threshold && random(1) < 0.12) trigger = true;
        } else {
            if (energies[mode] > threshold && random(1) < 0.15) trigger = true;
        }
        
        if (trigger) fireworks.push(new FireworkSystem());
    }

    for (let i = fireworks.length - 1; i >= 0; i--) {
        fireworks[i].run();
        if (fireworks[i].isDead()) fireworks.splice(i, 1);
    }
}

function updateFreqBar(id, val) { const el = document.getElementById('bar-' + id); if(el) el.style.height = (val/255*100) + "%"; }

class FireworkSystem {
    constructor() {
        this.hu = random(360);
        this.startPos = createVector(random(width * 0.2, width * 0.8), height);
        this.targetPos = createVector(random(width * 0.1, width * 0.9), random(height * 0.1, height * 0.4));
        this.lead = new LeadParticle(this.startPos, this.targetPos, this.hu);
        this.particles = [];
    }
    run() {
        if (this.lead) {
            this.lead.update(); this.lead.show();
            if (this.lead.arrived) { this.explode(this.lead.pos, 1); this.lead = null; }
        }
        for (let i = this.particles.length - 1; i >= 0; i--) {
            let p = this.particles[i]; p.applyForce(gravity); p.update(); p.show();
            if (p.level === 1 && p.canExplode && p.vel.y > -0.5 && p.vel.y < 0.5 && random(1) < 0.05) {
                this.explode(p.pos, 2); p.lifespan = 0;
            }
            if (p.isDead()) this.particles.splice(i, 1);
        }
    }
    explode(pos, level) {
        let count = level === 1 ? 150 : 40;
        for (let i = 0; i < count; i++) { this.particles.push(new Particle(pos, this.hu, level)); }
    }
    isDead() { return !this.lead && this.particles.length === 0; }
}

class LeadParticle {
    constructor(start, target, hu) {
        this.pos = start.copy(); this.start = start; this.target = target; this.hu = hu; this.pct = 0;
        this.speed = random(0.015, 0.025); this.arrived = false;
    }
    update() {
        this.pct += this.speed; this.pos = p5.Vector.lerp(this.start, this.target, this.pct);
        if (this.pct >= 1) this.arrived = true;
    }
    show() {
        push(); drawingContext.shadowBlur = 15; drawingContext.shadowColor = color(this.hu, 100, 100);
        strokeWeight(6); stroke(this.hu, 100, 100); point(this.pos.x, this.pos.y); pop();
    }
}

class Particle {
    constructor(pos, hu, level) {
        this.pos = pos.copy(); this.level = level; this.hu = hu + random(-20, 20);
        this.vel = p5.Vector.random2D().mult(random(level === 1 ? 4 : 2, level === 1 ? 16 : 8));
        this.acc = createVector(0, 0); this.lifespan = 100.0;
        this.decay = random(1.0, 3.0); this.canExplode = (level === 1 && random(1) > 0.8);
    }
    applyForce(f) { this.acc.add(f); }
    update() { this.vel.mult(0.94); this.vel.add(this.acc); this.pos.add(this.vel); this.acc.mult(0); this.lifespan -= this.decay; }
    show() {
        push(); drawingContext.shadowBlur = this.level === 1 ? 8 : 4; drawingContext.shadowColor = color(this.hu, 100, 100);
        strokeWeight(map(this.lifespan, 0, 100, 1, this.level === 1 ? 5 : 3));
        stroke(this.hu, 80, 100, this.lifespan); point(this.pos.x, this.pos.y); pop();
    }
    isDead() { return this.lifespan <= 0; }
}

function handleAudio(files) {
    audio = loadSound(URL.createObjectURL(files[0]), () => {
        fft = new p5.FFT(); document.getElementById('startBtn').disabled = false;
        document.getElementById('log-console').innerText = ">> Vocal Sync Engine Ready.";
    });
}
function handleImage(files) { let reader = new FileReader(); reader.onload = (e) => { bgImg = loadImage(e.target.result); }; reader.readAsDataURL(files[0]); }
function startEngine() { userStartAudio(); isStarted = true; document.getElementById('recBtn').disabled = false; }
function toggleRecording() {
    if (isRecording) {
        mediaRecorder.stop(); audio.stop(); isRecording = false;
        document.getElementById('recBtn').innerText = "🔴 START RECORDING";
    } else {
        chunks = []; let stream = mainCanvas.elt.captureStream(60);
        let dest = p5.prototype.getAudioContext().createMediaStreamDestination();
        audio.connect(dest); stream.addTrack(dest.stream.getAudioTracks()[0]);
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 15000000 });
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            let blob = new Blob(chunks, { type: 'video/webm' });
            let a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `Firework_Voice_V001.006.webm`; a.click();
        };
        mediaRecorder.start(); audio.play(); isRecording = true;
        document.getElementById('recBtn').innerText = "⬛ STOP & SAVE";
    }
}
</script>
</body>
</html>
