<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FIREWORK STUDIO V001.010</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --pink: #ff007b; --bg: #020205; --panel: #0d0d14; }
        body { background: var(--bg); color: #fff; margin: 0; font-family: sans-serif; display: flex; overflow: hidden; height: 100vh; }
        #ui-sidebar { width: 360px; height: 100vh; background: var(--panel); border-right: 1px solid #222; display: flex; flex-direction: column; z-index: 100; flex-shrink: 0; }
        #canvas-viewport { flex: 1; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; overflow: hidden; position: relative; }
        canvas { border: 1px solid var(--accent); margin-top: 30px; transform-origin: top center; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        .scroll-container { flex: 1; overflow-y: auto; padding: 20px; }
        .card { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid #2a2a35; }
        h3 { font-size: 11px; color: var(--accent); margin: 0 0 12px 0; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .row { margin-bottom: 15px; }
        label { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 5px; }
        label span { color: var(--accent); font-weight: bold; }
        select, button, input[type=range] { width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 4px; font-size: 12px; box-sizing: border-box; outline: none; }
        input[type=range] { accent-color: var(--accent); cursor: pointer; height: 4px; }
        .btn-primary { background: var(--accent); color: #000; font-weight: bold; border: none; cursor: pointer; }
        .btn-rec { border-color: var(--pink); color: var(--pink); margin-top: 10px; font-weight: bold; cursor: pointer; }
        #log-console { height: 80px; background: #050508; font-family: monospace; font-size: 10px; padding: 10px; color: #00ff00; border-top: 1px solid #222; overflow-y: auto; }
    </style>
</head>
<body>

<div id="ui-sidebar">
    <div class="scroll-container">
        <div class="card">
            <h3>🔥 Organic Fire UI</h3>
            <div class="row">
                <label>Vocal Sensitivity <span id="v-gain">3.0</span>x</label>
                <input type="range" id="vocalGain" min="1.0" max="10.0" step="0.1" value="3.0" oninput="updateUI('v-gain', this.value)">
            </div>
            <div class="row">
                <label>Flame Complexity <span id="v-noise">5.0</span></label>
                <input type="range" id="noiseScale" min="1.0" max="10.0" step="0.5" value="5.0" oninput="updateUI('v-noise', this.value)">
            </div>
        </div>
        <div class="card">
            <h3>⚡ Engine Sync</h3>
            <div class="row">
                <label>Sensitivity <span id="v-sens">100</span></label>
                <input type="range" id="sens" min="10" max="255" value="100" oninput="updateUI('v-sens', this.value)">
            </div>
        </div>
        <div class="card">
            <h3>🎨 Assets</h3>
            <button class="btn-primary" onclick="document.getElementById('m-file').click()">🎵 LOAD MP3</button>
            <input type="file" id="m-file" hidden accept="audio/*" onchange="handleAudio(this.files)">
            <button class="btn-primary" style="background:#333; color:#fff; margin-top:8px;" onclick="document.getElementById('i-file').click()">🖼️ LOAD BG</button>
            <input type="file" id="i-file" hidden accept="image/*" onchange="handleImage(this.files)">
        </div>
    </div>
    <div id="log-console">>> V001.010 Noise Fire Ready.</div>
    <div style="padding: 20px;">
        <button id="startBtn" class="btn-primary" onclick="startEngine()" disabled style="height:40px">ENGINE ACTIVE</button>
        <button id="recBtn" class="btn-rec" onclick="toggleRecording()" disabled style="height:40px">🔴 START RECORDING</button>
    </div>
</div>

<div id="canvas-viewport"></div>

<script>
let audio, fft, bgImg, isStarted = false, isRecording = false;
let organicFires = [];
let mainCanvas;
let mediaRecorder, chunks = [];

function updateUI(id, val) { const el = document.getElementById(id); if(el) el.innerText = val; }

function setup() {
    mainCanvas = createCanvas(1920, 1080);
    mainCanvas.parent('canvas-viewport');
    scaleViewport();
    colorMode(HSB, 360, 100, 100, 100);
}

function scaleViewport() {
    let containerW = window.innerWidth - 360;
    let containerH = window.innerHeight - 60; 
    let scale = Math.min(containerW / width, containerH / height);
    mainCanvas.elt.style.transform = `scale(${scale})`;
}
window.onresize = scaleViewport;

function draw() {
    background(0);
    if (bgImg) { push(); tint(255, 100); image(bgImg, 0, 0, width, height); pop(); }
    
    fill(0, 0, 0, 35);
    rect(0, 0, width, height);

    if (isStarted && audio && audio.isPlaying()) {
        fft.analyze();
        let midEnergy = fft.getEnergy(300, 3000);
        let gain = parseFloat(document.getElementById('vocalGain').value);
        let threshold = parseInt(document.getElementById('sens').value);
        let boosted = midEnergy * gain;

        if (boosted > threshold && random(1) < 0.2) {
            organicFires.push(new OrganicFire(boosted));
        }
    }

    for (let i = organicFires.length - 1; i >= 0; i--) {
        organicFires[i].update();
        organicFires[i].show();
        if (organicFires[i].isDead()) organicFires.splice(i, 1);
    }
}

class OrganicFire {
    constructor(energy) {
        // 공통 바닥 중심점 (화면 가로 20%~80% 사이 안전 구역)
        this.centerX = random(width * 0.2, width * 0.8);
        this.baseY = height;
        this.energy = energy;
        this.life = 100;
        this.noiseSeed = random(1000);
        this.noiseScale = parseFloat(document.getElementById('noiseScale').value);
        
        // 보컬 에너지에 따른 화염 가닥 개수
        this.numStrands = floor(map(energy, 0, 255, 5, 15));
        this.strands = [];
        
        for (let i = 0; i < this.numStrands; i++) {
            this.strands.push({
                angle: map(i, 0, this.numStrands - 1, -QUARTER_PI, QUARTER_PI),
                maxLen: map(energy, 0, 255, height * 0.2, height * 0.7) * random(0.8, 1.2),
                currentLen: 0,
                seed: random(100)
            });
        }
    }

    update() {
        for (let s of this.strands) {
            if (s.currentLen < s.maxLen) {
                s.currentLen += (s.maxLen - s.currentLen) * 0.1;
            }
        }
        this.life -= 1.8;
    }

    show() {
        push();
        noFill();
        for (let s of this.strands) {
            let points = 15;
            // 층마다 명암 차이: 바닥은 어둡게, 위는 밝게
            beginShape();
            for (let j = 0; j <= points; j++) {
                let hPos = map(j, 0, points, 0, s.currentLen);
                let progress = j / points;
                
                // Noise를 활용한 자연스러운 일렁임
                let n = noise(this.noiseSeed + s.seed + frameCount * 0.02 + j * 0.1);
                let xOff = map(n, 0, 1, -30, 30) * progress * this.noiseScale;
                
                let vx = this.centerX + sin(s.angle) * hPos + xOff;
                let vy = this.baseY - cos(s.angle) * hPos;

                // 화면 밖 나가지 않게 Clamp
                vx = constrain(vx, 0, width);
                vy = constrain(vy, 0, height);

                // 색상 그라데이션 및 명암 (바닥 어두움 -> 끝 밝음)
                let hu = map(progress, 0, 1, 0, 45); // 빨강 -> 주황
                let br = map(progress, 0, 1, 40, 100); // 명도 차이
                stroke(hu, 100, br, this.life);
                strokeWeight(map(progress, 0, 1, 12, 1));
                
                // 마지막 층은 점(Point)으로 표현
                if (j === points) {
                    fill(hu, 80, 100, this.life);
                    noStroke();
                    ellipse(vx, vy, random(4, 10));
                } else {
                    vertex(vx, vy);
                }
            }
            endShape();
        }
        pop();
    }

    isDead() { return this.life <= 0; }
}

function handleAudio(files) {
    audio = loadSound(URL.createObjectURL(files[0]), () => {
        fft = new p5.FFT(); document.getElementById('startBtn').disabled = false;
        document.getElementById('log-console').innerText = ">> Noise Fire Engine Ready.";
    });
}
function handleImage(files) { let reader = new FileReader(); reader.onload = (e) => { bgImg = loadImage(e.target.result); }; reader.readAsDataURL(files[0]); }
function startEngine() { userStartAudio(); isStarted = true; document.getElementById('recBtn').disabled = false; }
function toggleRecording() {
    if (isRecording) {
        mediaRecorder.stop(); audio.stop(); isRecording = false;
        document.getElementById('recBtn').innerText = "🔴 START RECORDING";
    } else {
        chunks = []; let stream = mainCanvas.elt.captureStream(60);
        let dest = p5.prototype.getAudioContext().createMediaStreamDestination();
        audio.connect(dest); stream.addTrack(dest.stream.getAudioTracks()[0]);
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 15000000 });
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            let blob = new Blob(chunks, { type: 'video/webm' });
            let a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `Organic_Fire_V001.010.webm`; a.click();
        };
        mediaRecorder.start(); audio.play(); isRecording = true;
        document.getElementById('recBtn').innerText = "⬛ STOP & SAVE";
    }
}
</script>
</body>
</html>
