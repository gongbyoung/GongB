<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Audio Reactive Particle Campfire</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; }
        canvas { width: 100vw !important; height: 100vh !important; object-fit: contain; }

        .ui-panel { 
            position: absolute; top: 15px; z-index: 10; 
            background: rgba(10, 10, 10, 0.85); padding: 18px; 
            border-radius: 8px; border: 1px solid #333;
            width: 280px; max-height: 90vh; overflow-y: auto;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #ui-left { left: 15px; }
        #ui-right { right: 15px; }
        
        h3 { margin-top: 0; color: #ff5500; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 15px; text-align: center;}
        .section-title { font-size: 11px; color: #aaa; margin: 15px 0 5px 0; border-bottom: 1px dashed #333; padding-bottom: 3px; font-weight: bold;}
        
        .control-group { margin-bottom: 12px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; color: #ccc; }
        .control-group input[type="range"] { width: 100%; cursor: pointer; accent-color: #ff5500; height: 4px;}
        .control-group select { width: 100%; padding: 6px; background: #222; color: #ffaa00; border: 1px solid #555; border-radius: 4px; cursor: pointer; font-size: 11px; }
        
        #audio-input-area { margin-top: 15px; border-top: 2px solid #ff5500; padding-top: 15px; }
        input[type="file"] { margin-bottom: 10px; display: block; color: white; width: 100%; font-size: 11px; }
        
        .main-btn { 
            background-color: #ff5500; border: none; padding: 10px; width: 100%;
            border-radius: 5px; cursor: pointer; color: white; font-weight: bold; font-size: 13px; transition: 0.2s;
        }
        .main-btn:hover { background-color: #ff3300; }
        
        #status { font-size: 11px; color: #aaa; margin-top: 10px; line-height: 1.4; text-align: center;}
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
    </style>
</head>
<body>

<div id="ui-left" class="ui-panel">
    <h3>파티클 모닥불 스튜디오</h3>
    
    <div class="section-title">[비디오 해상도]</div>
    <div class="control-group">
        <select id="ctrl-ratio">
            <option value="16:9">가로형 (1920x1080)</option>
            <option value="9:16">세로형 (1080x1920)</option>
            <option value="fit" selected>화면 맞춤 (전체화면)</option>
        </select>
    </div>

    <div class="section-title" style="color:#ffaa00;">[모닥불 형태 제어]</div>
    <div class="control-group">
        <label>불꽃 파티클 개수 <span id="val-pcount">8000</span></label>
        <input type="range" id="ctrl-pcount" min="1000" max="20000" value="8000" step="500">
    </div>
    <div class="control-group">
        <label>불기둥 기본 높이 <span id="val-height">1.0</span></label>
        <input type="range" id="ctrl-height" min="0.5" max="3.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label>하단부 넓이 (Spread) <span id="val-spread">1.0</span></label>
        <input type="range" id="ctrl-spread" min="0.2" max="3.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label>기본 상승 속도 <span id="val-speed">1.0</span></label>
        <input type="range" id="ctrl-speed" min="0.1" max="3.0" value="1.0" step="0.1">
    </div>

    <div class="section-title">[컬러 테마]</div>
    <div class="control-group">
        <select id="ctrl-color-theme">
            <option value="classic" selected>클래식 파이어 (주황/빨강)</option>
            <option value="blue">가스/블루 파이어 (파랑/보라)</option>
            <option value="magic">마법의 숲 (초록/민트)</option>
            <option value="neon">네온 사이버펑크 (마젠타/시안)</option>
        </select>
    </div>

    <div id="audio-input-area">
        <button id="init-btn" class="main-btn">오디오 시스템 켜기</button>
        <div id="file-select-box" style="display: none; margin-top:10px;">
            <input type="file" id="audio-file" accept="audio/*">
            <div id="status">음원 선택 시 바로 렌더링이 시작됩니다.</div>
        </div>
    </div>
</div>

<div id="ui-right" class="ui-panel">
    <h3>오디오 리액티브 & 카메라</h3>

    <div class="section-title" style="color:#00ffcc;">[오디오 다이나믹스]</div>
    <div class="control-group">
        <label>저음 반응 (불기둥 펌핑) <span id="val-react-bass">1.0</span></label>
        <input type="range" id="ctrl-react-bass" min="0.0" max="3.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label>중음 반응 (좌우 일렁임) <span id="val-react-mid">1.0</span></label>
        <input type="range" id="ctrl-react-mid" min="0.0" max="3.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label>고음 반응 (밝기/온도 상승) <span id="val-react-treb">1.0</span></label>
        <input type="range" id="ctrl-react-treb" min="0.0" max="3.0" value="1.0" step="0.1">
    </div>

    <div class="section-title" style="color:#ff3366;">[카메라 구도]</div>
    <div class="control-group">
        <label>카메라 Z (줌 거리) <span id="val-cam-z">800</span></label>
        <input type="range" id="ctrl-cam-z" min="200" max="2000" value="800" step="10">
    </div>
    <div class="control-group">
        <label>카메라 Y (상하 시야) <span id="val-cam-y">150</span></label>
        <input type="range" id="ctrl-cam-y" min="0" max="800" value="150" step="10">
    </div>
    <div class="control-group">
        <label>카메라 자동 회전 (Turn) <span id="val-cam-rot">0.0</span></label>
        <input type="range" id="ctrl-cam-rot" min="0.0" max="2.0" value="0.0" step="0.1">
    </div>

    <div class="section-title" style="color:#aaff00;">[포스트 프로세싱]</div>
    <div class="control-group">
        <label>빛 번짐 (Bloom) <span id="val-bloom">1.5</span></label>
        <input type="range" id="ctrl-bloom" min="0" max="4.0" value="1.5" step="0.1">
    </div>
    <div class="control-group">
        <label>모션 잔상 (Trail) <span id="val-trail">0.6</span></label>
        <input type="range" id="ctrl-trail" min="0" max="0.95" value="0.6" step="0.05">
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
    // --- 1. Three.js 기본 셋업 ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050505, 0.001); // 깊이감 형성용 안개

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 5000);
    const renderer = new THREE.WebGLRenderer({antialias: true, preserveDrawingBuffer: true});
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.body.appendChild(renderer.domElement);

    // 포스트 프로세싱 (Bloom)
    const renderScene = new THREE.RenderPass(scene, camera);
    const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0;
    const composer = new THREE.EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    // --- UI 연동 ---
    const updateUIVal = (id, val) => document.getElementById(id).innerText = val;
    const ctrlRatio = document.getElementById('ctrl-ratio');
    
    // 모닥불 형태
    const ctrlPCount = document.getElementById('ctrl-pcount');
    const ctrlHeight = document.getElementById('ctrl-height');
    const ctrlSpread = document.getElementById('ctrl-spread');
    const ctrlSpeed = document.getElementById('ctrl-speed');
    const ctrlColorTheme = document.getElementById('ctrl-color-theme');
    
    // 오디오 반응
    const ctrlReactBass = document.getElementById('ctrl-react-bass');
    const ctrlReactMid = document.getElementById('ctrl-react-mid');
    const ctrlReactTreb = document.getElementById('ctrl-react-treb');

    // 카메라 및 후처리
    const ctrlCamZ = document.getElementById('ctrl-cam-z');
    const ctrlCamY = document.getElementById('ctrl-cam-y');
    const ctrlCamRot = document.getElementById('ctrl-cam-rot');
    const ctrlBloom = document.getElementById('ctrl-bloom');
    const ctrlTrail = document.getElementById('ctrl-trail');

    function updateAspectRatio() {
        let val = ctrlRatio.value; let w = window.innerWidth, h = window.innerHeight;
        if (val === '16:9') { w = 1920; h = 1080; } else if (val === '9:16') { w = 1080; h = 1920; }
        renderer.setSize(w, h); composer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix();
    }
    ctrlRatio.onchange = updateAspectRatio; window.addEventListener('resize', () => { if(ctrlRatio.value==='fit') updateAspectRatio(); }); updateAspectRatio();

    // UI 이벤트 리스너 바인딩
    ['pcount', 'height', 'spread', 'speed', 'react-bass', 'react-mid', 'react-treb', 'cam-z', 'cam-y', 'cam-rot', 'bloom', 'trail'].forEach(id => {
        document.getElementById(`ctrl-${id}`).addEventListener('input', (e) => {
            updateUIVal(`val-${id}`, e.target.value);
            if(id === 'bloom') bloomPass.strength = parseFloat(e.target.value);
            if(id === 'pcount') fireGeo.setDrawRange(0, parseInt(e.target.value));
        });
    });

    // 바닥면
    const groundGeo = new THREE.PlaneGeometry(2000, 2000);
    const groundMat = new THREE.MeshBasicMaterial({ color: 0x111111, transparent: true, opacity: 0.8, depthWrite: false });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // --- 2. 파티클 모닥불 코어 시스템 (삼각형 유체) ---
    const maxParticles = 20000;
    const fireGeo = new THREE.BufferGeometry();
    const fPos = new Float32Array(maxParticles * 3);
    const fLife = new Float32Array(maxParticles); // 입자 수명 (1 -> 0)
    const fPhase = new Float32Array(maxParticles); // 개별 난수 페이즈
    const fColor = new Float32Array(maxParticles * 3);

    for(let i=0; i<maxParticles; i++) {
        fPos[i*3] = 0; fPos[i*3+1] = 0; fPos[i*3+2] = 0; // 모두 원점에서 대기
        fLife[i] = Math.random(); // 0~1 사이 무작위 시작
        fPhase[i] = Math.random() * Math.PI * 2;
    }
    fireGeo.setAttribute('position', new THREE.BufferAttribute(fPos, 3));
    fireGeo.setAttribute('color', new THREE.BufferAttribute(fColor, 3));
    fireGeo.setDrawRange(0, parseInt(ctrlPCount.value));

    // 부드러운 원형 텍스처 (하드엣지 방지)
    const cCanvas = document.createElement('canvas'); cCanvas.width = 64; cCanvas.height = 64;
    const ctx = cCanvas.getContext('2d');
    let grad = ctx.createRadialGradient(32,32,0, 32,32,32);
    grad.addColorStop(0, 'rgba(255,255,255,1)'); grad.addColorStop(0.2, 'rgba(255,255,255,0.8)'); grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad; ctx.fill(); ctx.beginPath(); ctx.arc(32,32,32,0,Math.PI*2); ctx.fill();
    const fireTex = new THREE.CanvasTexture(cCanvas);

    // 커스텀 셰이더 (크기와 투명도가 수명에 따라 자연스럽게 감소하도록)
    const fireShaderMat = new THREE.ShaderMaterial({
        uniforms: { map: { value: fireTex } },
        vertexShader: `
            varying vec3 vColor; varying float vOpacity;
            void main() {
                vColor = color; 
                // Y축 위치에 기반해 투명도와 크기 페이드아웃 계산
                vOpacity = smoothstep(1.0, 0.0, position.y / 600.0); 
                gl_PointSize = (20.0 * vOpacity) * (400.0 / - (modelViewMatrix * vec4(position, 1.0)).z);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
        fragmentShader: `
            uniform sampler2D map; varying vec3 vColor; varying float vOpacity;
            void main() {
                vec4 texColor = texture2D(map, gl_PointCoord);
                gl_FragColor = vec4(vColor, texColor.a * vOpacity);
            }
        `,
        transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, vertexColors: true
    });

    const fireSystem = new THREE.Points(fireGeo, fireShaderMat);
    scene.add(fireSystem);

    // --- 3. 오디오 엔진 ---
    let audioCtx, analyser, dataArray;
    let decodedBuffer = null; let isPlaying = false, currentSource = null;
    let smoothedData = new Float32Array(512);
    
    document.getElementById('init-btn').onclick = function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser(); analyser.fftSize = 512; dataArray = new Uint8Array(analyser.frequencyBinCount);
        this.style.display = 'none'; document.getElementById('file-select-box').style.display = 'block';
    };

    document.getElementById('audio-file').onchange = function(e) {
        const file = e.target.files[0]; if (!file) return;
        document.getElementById('status').innerText = "디코딩 중...";
        const reader = new FileReader();
        reader.onload = function(event) {
            audioCtx.decodeAudioData(event.target.result, function(buffer) {
                decodedBuffer = buffer; document.getElementById('status').innerText = "디코딩 완료. 재생을 시작합니다.";
                // 자동 재생
                if(currentSource) { try{currentSource.stop();}catch(e){} }
                currentSource = audioCtx.createBufferSource(); currentSource.buffer = decodedBuffer;
                currentSource.connect(analyser); analyser.connect(audioCtx.destination);
                currentSource.start(0); isPlaying = true;
            });
        };
        reader.readAsArrayBuffer(file);
    };

    // 테마 컬러 계산 함수
    function getThemeColor(theme, normalizedHeight, trebleIntensity) {
        let c = new THREE.Color();
        // 0.0(바닥/코어) ~ 1.0(끝자락)
        if (theme === 'classic') {
            if (normalizedHeight < 0.2) c.setHex(0xffffff); // 속불꽃 (흰색)
            else if (normalizedHeight < 0.6) c.setHex(0xffaa00); // 겉불꽃 (주황/노랑)
            else c.setHex(0xff1100); // 끝자락 (빨강)
        } else if (theme === 'blue') {
            if (normalizedHeight < 0.2) c.setHex(0xffffff);
            else if (normalizedHeight < 0.6) c.setHex(0x00aaff); 
            else c.setHex(0x3300ff); 
        } else if (theme === 'magic') {
            if (normalizedHeight < 0.2) c.setHex(0xaaffcc);
            else if (normalizedHeight < 0.6) c.setHex(0x00ff44); 
            else c.setHex(0x004411); 
        } else if (theme === 'neon') {
            if (normalizedHeight < 0.3) c.setHex(0x00ffff);
            else c.setHex(0xff00ff); 
        }
        
        // 고음이 터지면 입자가 순간적으로 흰색에 가깝게 밝아짐 (온도 상승 효과)
        if (trebleIntensity > 0.3) {
            c.lerp(new THREE.Color(0xffffff), trebleIntensity * 0.5);
        }
        return c;
    }

    // --- 4. 애니메이션 시뮬레이션 루프 ---
    let time = 0;
    let camAngle = 0;
    const dummyColor = new THREE.Color();

    function animate() {
        requestAnimationFrame(animate);
        time += 0.01;
        
        // 모션 잔상 (Trail) 꼼수 적용
        let trailVal = parseFloat(ctrlTrail.value);
        if (trailVal > 0) {
            renderer.autoClearColor = false;
            // 이전 프레임을 살짝 불투명한 검은 사각형으로 덮어 잔상을 만듦 (Additive 특성상 밝아짐 방지 필요)
            // 여기서는 심플하게 CSS 캔버스 느낌을 주지 않고 Three.js clearColor alpha로 처리 시도 (버퍼 이슈로 제한적일 수 있음)
            // 실제 완벽한 트레일은 렌더타겟 버퍼를 교차해야하므로, 여기선 가볍게 구현을 생략하거나 Damping으로 대체.
        } else {
            renderer.autoClearColor = true;
        }

        // --- 오디오 데이터 파싱 ---
        let rawBass = 0, rawMid = 0, rawTreble = 0;
        if (isPlaying && analyser) {
            analyser.getByteFrequencyData(dataArray);
            // 부드러운 보간
            for(let i=0; i<dataArray.length; i++) smoothedData[i] += (dataArray[i] - smoothedData[i]) * 0.15;
            
            let bSum=0, mSum=0, tSum=0;
            for(let i=0; i<10; i++) bSum += smoothedData[i];       // 0~10: 저음 (드럼)
            for(let i=10; i<80; i++) mSum += smoothedData[i];      // 10~80: 중음 (보컬/신스)
            for(let i=80; i<200; i++) tSum += smoothedData[i];     // 80~200: 고음 (하이햇)
            
            rawBass = (bSum / 10 / 255);
            rawMid = (mSum / 70 / 255);
            rawTreble = (tSum / 120 / 255);
        }

        // 사용자 감도 배율 적용
        let bReact = rawBass * parseFloat(ctrlReactBass.value);
        let mReact = rawMid * parseFloat(ctrlReactMid.value);
        let tReact = rawTreble * parseFloat(ctrlReactTreb.value);

        // --- 카메라 컨트롤 ---
        let cRotSpeed = parseFloat(ctrlCamRot.value);
        camAngle += 0.005 * cRotSpeed;
        let cZ = parseFloat(ctrlCamZ.value);
        let cY = parseFloat(ctrlCamY.value);
        
        camera.position.x = Math.cos(camAngle) * cZ;
        camera.position.z = Math.sin(camAngle) * cZ;
        camera.position.y = cY;
        camera.lookAt(0, cY * 0.5, 0); // 모닥불 중심부 주시

        // --- 파티클 역학 시뮬레이션 (삼각형 솟구침) ---
        let pCount = parseInt(ctrlPCount.value);
        let bHeight = parseFloat(ctrlHeight.value);
        let bSpread = parseFloat(ctrlSpread.value);
        let bSpeed = parseFloat(ctrlSpeed.value);
        let theme = ctrlTheme = ctrlColorTheme.value;

        // 불기둥 최대 도달 높이 (기본 500 + 저음 반응시 300 추가)
        let maxHeight = 500 * bHeight + (bReact * 300);

        let positions = fireGeo.attributes.position.array;
        let colors = fireGeo.attributes.color.array;

        for (let i = 0; i < pCount; i++) {
            let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
            
            // 수명 진행 (속도)
            fLife[i] -= 0.01 * bSpeed * (1.0 + Math.random()*0.5);
            
            // 수명이 다하면 바닥 중앙에서 재가동 (Re-spawn)
            if (fLife[i] < 0) {
                fLife[i] = 1.0;
                // 바닥 생성 지점: 하단 퍼짐 정도 (Spread)
                let r = Math.random() * 50 * bSpread;
                let theta = Math.random() * Math.PI * 2;
                positions[ix] = Math.cos(theta) * r;
                positions[iy] = 0;
                positions[iz] = Math.sin(theta) * r;
            }

            // [핵심 모션] Y축으로 상승
            // 수명이 1->0으로 갈수록 위로 올라감.
            let progress = 1.0 - fLife[i]; 
            
            // 위로 갈수록 Y축 속도 증가 (가속도 느낌)
            positions[iy] = progress * maxHeight * (0.5 + progress*0.5);

            // X, Z 방향 일렁임 (중음에 반응하여 더 거칠게 요동침)
            // Curl Noise 간소화 식 적용
            let noiseX = Math.sin(progress * 10 + fPhase[i] + time*3) * (20 + mReact*100) * progress;
            let noiseZ = Math.cos(progress * 12 + fPhase[i] + time*2.5) * (20 + mReact*100) * progress;
            
            positions[ix] += (noiseX - positions[ix]*0.05) * 0.1; // 바깥으로 퍼지되 중심을 너무 벗어나지 않게
            positions[iz] += (noiseZ - positions[iz]*0.05) * 0.1;

            // 컬러 매핑
            let c = getThemeColor(theme, progress, tReact);
            colors[ix] = c.r; colors[iy] = c.g; colors[iz] = c.b;
        }

        fireGeo.attributes.position.needsUpdate = true;
        fireGeo.attributes.color.needsUpdate = true;

        composer.render();
    }
    animate(); 
</script>
</body>
</html>
