<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Nature Fluid Studio: Bubbles, Waves & Clouds</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020205; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; }
        canvas { width: 100vw !important; height: 100vh !important; object-fit: contain; }

        .ui-panel { 
            position: absolute; top: 15px; z-index: 10; 
            background: rgba(10, 15, 20, 0.85); padding: 16px; 
            border-radius: 8px; border: 1px solid #334;
            width: 280px; max-height: 90vh; overflow-y: auto;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #ui-left { left: 15px; }
        #ui-right { right: 15px; }
        
        h3 { margin-top: 0; color: #00e5ff; border-bottom: 1px solid #445; padding-bottom: 10px; font-size: 15px; text-align: center;}
        .section-title { font-size: 11px; color: #aaa; margin: 15px 0 5px 0; border-bottom: 1px dashed #334; padding-bottom: 3px; font-weight: bold;}
        
        .control-group { margin-bottom: 12px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; color: #ccc; }
        .control-group input[type="range"] { width: 100%; cursor: pointer; accent-color: #00e5ff; height: 4px;}
        .control-group select { width: 100%; padding: 6px; background: #112; color: #00ffcc; border: 1px solid #445; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight:bold;}
        
        #audio-input-area { margin-top: 15px; border-top: 2px solid #00e5ff; padding-top: 15px; }
        input[type="file"] { margin-bottom: 10px; display: block; color: white; width: 100%; font-size: 11px; }
        
        .main-btn { 
            background-color: #00e5ff; border: none; padding: 10px; width: 100%;
            border-radius: 5px; cursor: pointer; color: black; font-weight: bold; font-size: 13px; transition: 0.2s;
        }
        .main-btn:hover { background-color: #00b3cc; }

        .record-btn { background-color: #ff3366; color: white; margin-top: 10px; display: none; box-shadow: 0 0 15px rgba(255, 51, 102, 0.6); }
        .record-btn:hover { background-color: #cc0044; }

        #status { font-size: 11px; color: #aaa; margin-top: 10px; line-height: 1.4; text-align: center;}
        .recording-badge { color: #ff3366; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
    </style>
</head>
<body>

<div id="ui-left" class="ui-panel">
    <h3>자연 유체 스튜디오 v3.0</h3>
    
    <div class="section-title" style="color:#00ffcc;">[시각 효과 모드 선택]</div>
    <div class="control-group">
        <select id="ctrl-mode">
            <option value="bubbles" selected>1. 물방울 상승 (Rising Bubbles)</option>
            <option value="waves">2. 하얀 파도 휩쓸기 (Surging Waves)</option>
            <option value="clouds">3. 에어브러시 구름 뭉탱이 (Clumping Clouds)</option>
        </select>
    </div>

    <div class="section-title">[비디오 해상도]</div>
    <div class="control-group">
        <select id="ctrl-ratio">
            <option value="16:9">가로형 (1920x1080)</option>
            <option value="9:16">세로형 (1080x1920)</option>
            <option value="fit" selected>화면 맞춤 (전체화면)</option>
        </select>
    </div>

    <div class="section-title" style="color:#ffaa00;">[오브젝트 공간 제어]</div>
    <div class="control-group">
        <label>입자 개수 (Density) <span id="val-pcount">15000</span></label>
        <input type="range" id="ctrl-pcount" min="1000" max="30000" value="15000" step="1000">
    </div>
    <div class="control-group">
        <label>효과 진행 속도 (Speed) <span id="val-speed">1.0</span></label>
        <input type="range" id="ctrl-speed" min="0.1" max="3.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label style="color:#ff3366;">물리적 바닥 높이 (Base Y) <span id="val-base-y">-400</span></label>
        <input type="range" id="ctrl-base-y" min="-1000" max="500" value="-400" step="10">
    </div>

    <div id="audio-input-area">
        <button id="init-btn" class="main-btn">오디오 & 엔진 켜기</button>
        <div id="file-select-box" style="display: none; margin-top:10px;">
            <input type="file" id="audio-file" accept="audio/*">
            <div id="status">모드를 변경하며 느낌을 확인하세요.</div>
            <button id="record-btn" class="main-btn record-btn">▶ MP4 렌더링 녹화</button>
        </div>
    </div>
</div>

<div id="ui-right" class="ui-panel">
    <h3>오디오 반응 & 카메라</h3>

    <div class="section-title" style="color:#ffaa00;">[자유 카메라 구도]</div>
    <div class="control-group">
        <label>카메라 X (좌우 이동) <span id="val-cam-x">0</span></label>
        <input type="range" id="ctrl-cam-x" min="-1500" max="1500" value="0" step="10">
    </div>
    <div class="control-group">
        <label>카메라 Y (상하 시야) <span id="val-cam-y">0</span></label>
        <input type="range" id="ctrl-cam-y" min="-1000" max="1500" value="0" step="10">
    </div>
    <div class="control-group">
        <label>카메라 Z (줌 인/아웃) <span id="val-cam-z">800</span></label>
        <input type="range" id="ctrl-cam-z" min="100" max="3000" value="800" step="10">
    </div>

    <div class="section-title" style="color:#00ffcc;">[오디오 다이나믹스]</div>
    <div class="control-group">
        <label>저음 반응 감도 (Bass) <span id="val-react-bass">1.0</span></label>
        <input type="range" id="ctrl-react-bass" min="0.0" max="3.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label>고음 반응 감도 (Treble) <span id="val-react-treb">1.0</span></label>
        <input type="range" id="ctrl-react-treb" min="0.0" max="3.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label>모션 부드러움 (Damping) <span id="val-smooth">0.8</span></label>
        <input type="range" id="ctrl-smooth" min="0.1" max="0.99" value="0.8" step="0.01">
    </div>

    <div class="section-title" style="color:#aaff00;">[포스트 프로세싱]</div>
    <div class="control-group">
        <label>빛 번짐 (Bloom Glow) <span id="val-bloom">1.5</span></label>
        <input type="range" id="ctrl-bloom" min="0" max="4.0" value="1.5" step="0.1">
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
    // --- 1. 기본 환경 세팅 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020205); 
    scene.fog = new THREE.FogExp2(0x020205, 0.0008); 

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 8000);
    const renderer = new THREE.WebGLRenderer({antialias: true, preserveDrawingBuffer: true});
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.body.appendChild(renderer.domElement);

    const renderScene = new THREE.RenderPass(scene, camera);
    const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0;
    const composer = new THREE.EffectComposer(renderer);
    composer.addPass(renderScene); composer.addPass(bloomPass);

    // --- UI 바인딩 ---
    const updateUIVal = (id, val) => document.getElementById(id).innerText = val;
    const ctrlRatio = document.getElementById('ctrl-ratio');
    const ctrlMode = document.getElementById('ctrl-mode');
    
    const ctrlPCount = document.getElementById('ctrl-pcount');
    const ctrlSpeed = document.getElementById('ctrl-speed');
    const ctrlBaseY = document.getElementById('ctrl-base-y');
    
    const ctrlCamX = document.getElementById('ctrl-cam-x');
    const ctrlCamY = document.getElementById('ctrl-cam-y');
    const ctrlCamZ = document.getElementById('ctrl-cam-z');
    
    const ctrlReactBass = document.getElementById('ctrl-react-bass');
    const ctrlReactTreb = document.getElementById('ctrl-react-treb');
    const ctrlSmooth = document.getElementById('ctrl-smooth');
    const ctrlBloom = document.getElementById('ctrl-bloom');

    function updateAspectRatio() {
        let val = ctrlRatio.value; let w = window.innerWidth, h = window.innerHeight;
        if (val === '16:9') { w = 1920; h = 1080; } else if (val === '9:16') { w = 1080; h = 1920; }
        renderer.setSize(w, h); composer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix();
    }
    ctrlRatio.onchange = updateAspectRatio; window.addEventListener('resize', () => { if(ctrlRatio.value==='fit') updateAspectRatio(); }); updateAspectRatio();

    ['pcount', 'speed', 'base-y', 'cam-x', 'cam-y', 'cam-z', 'react-bass', 'react-treb', 'smooth', 'bloom'].forEach(id => {
        document.getElementById(`ctrl-${id}`).addEventListener('input', (e) => {
            updateUIVal(`val-${id}`, e.target.value);
            if(id === 'bloom') bloomPass.strength = parseFloat(e.target.value);
            if(id === 'pcount') masterGeo.setDrawRange(0, parseInt(e.target.value));
        });
    });

    // --- 2. 통합 파티클 마스터 엔진 ---
    const maxParticles = 30000;
    const masterGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(maxParticles * 3);
    const pLife = new Float32Array(maxParticles); // 수명 및 위상(Phase) 공용
    const pSpeed = new Float32Array(maxParticles); 
    const pColor = new Float32Array(maxParticles * 3);

    for(let i=0; i<maxParticles; i++) {
        pPos[i*3] = (Math.random() - 0.5) * 2000;
        pPos[i*3+1] = (Math.random() - 0.5) * 2000;
        pPos[i*3+2] = (Math.random() - 0.5) * 2000;
        pLife[i] = Math.random() * Math.PI * 2; // 초기 랜덤 위상
        pSpeed[i] = 0.5 + Math.random();
        pColor[i*3] = 1; pColor[i*3+1] = 1; pColor[i*3+2] = 1;
    }
    masterGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    masterGeo.setAttribute('color', new THREE.BufferAttribute(pColor, 3));
    masterGeo.setDrawRange(0, parseInt(ctrlPCount.value));

    // 텍스처 팩토리
    function createTexture(type) {
        const c = document.createElement('canvas'); c.width = 64; c.height = 64;
        const ctx = c.getContext('2d');
        if (type === 'ring') { // 물방울용 도넛 형태
            ctx.beginPath(); ctx.arc(32,32,28,0,Math.PI*2); 
            ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.stroke();
            ctx.beginPath(); ctx.arc(32,32,15,0,Math.PI*2); ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fill();
        } else if (type === 'solid') { // 파도용 하드 원형
            ctx.beginPath(); ctx.arc(32,32,30,0,Math.PI*2); ctx.fillStyle = 'white'; ctx.fill();
        } else if (type === 'airbrush') { // 구름용 에어브러시 형태 (매우 부드러운 그라데이션)
            let grad = ctx.createRadialGradient(32,32,0, 32,32,32);
            grad.addColorStop(0, 'rgba(255,255,255,0.8)'); grad.addColorStop(0.4, 'rgba(255,255,255,0.2)'); grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad; ctx.fillRect(0,0,64,64);
        }
        return new THREE.CanvasTexture(c);
    }
    const texBubbles = createTexture('ring');
    const texWaves = createTexture('solid');
    const texClouds = createTexture('airbrush');

    // 통합 셰이더 매터리얼 (모드 변경에 따라 텍스처와 속성이 바뀜)
    const masterMat = new THREE.PointsMaterial({
        size: 15, map: texBubbles, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, depthWrite: false, vertexColors: true
    });
    const masterSystem = new THREE.Points(masterGeo, masterMat);
    scene.add(masterSystem);

    // 모드 변경 시 매터리얼 속성 재정의
    ctrlMode.onchange = function(e) {
        let mode = e.target.value;
        if (mode === 'bubbles') {
            masterMat.map = texBubbles; masterMat.size = 20; masterMat.opacity = 0.8;
        } else if (mode === 'waves') {
            masterMat.map = texWaves; masterMat.size = 12; masterMat.opacity = 0.6;
        } else if (mode === 'clouds') {
            // 구름은 크기를 거대하게 키우고 투명도를 극단적으로 낮춰 서로 겹칠 때만 덩어리지게 함
            masterMat.map = texClouds; masterMat.size = 250; masterMat.opacity = 0.05;
        }
        masterMat.needsUpdate = true;
    };

    // --- 3. 오디오 엔진 ---
    let audioCtx, analyser, dataArray;
    let decodedBuffer = null; let isPlaying = false, currentSource = null;
    let smoothedData = new Float32Array(512);
    let mediaRecorder, recordedChunks = [];
    let loadedFileName = "";
    
    document.getElementById('init-btn').onclick = function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser(); analyser.fftSize = 512; dataArray = new Uint8Array(analyser.frequencyBinCount);
        this.style.display = 'none'; document.getElementById('file-select-box').style.display = 'block';
    };

    document.getElementById('audio-file').onchange = function(e) {
        const file = e.target.files[0]; if (!file) return;
        document.getElementById('status').innerText = "디코딩 중..."; loadedFileName = file.name;
        const reader = new FileReader();
        reader.onload = function(event) {
            audioCtx.decodeAudioData(event.target.result, function(buffer) {
                decodedBuffer = buffer; document.getElementById('status').innerText = "준비 완료! 재생을 시작하세요.";
                document.getElementById('record-btn').style.display = 'block';
            });
        };
        reader.readAsArrayBuffer(file);
    };

    document.getElementById('record-btn').onclick = function() {
        if (!decodedBuffer) return; if (currentSource) { try { currentSource.stop(); } catch(e) {} }
        currentSource = audioCtx.createBufferSource(); currentSource.buffer = decodedBuffer; currentSource.connect(analyser);
        const audioDest = audioCtx.createMediaStreamDestination(); analyser.connect(audioCtx.destination); analyser.connect(audioDest);            
        const canvasStream = renderer.domElement.captureStream(60); const combinedStream = new MediaStream([...canvasStream.getVideoTracks(), ...audioDest.stream.getAudioTracks()]);
        
        let options = { mimeType: 'video/mp4; codecs=avc1', videoBitsPerSecond: 8000000 }; let ext = 'mp4';
        if (!MediaRecorder.isTypeSupported(options.mimeType)) { options = { mimeType: 'video/webm; codecs=vp9', videoBitsPerSecond: 8000000 }; ext = 'webm'; }
        
        recordedChunks = []; mediaRecorder = new MediaRecorder(combinedStream, options);
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: options.mimeType }); const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.style = 'display: none'; a.href = url; a.download = loadedFileName.replace(/\.[^/.]+$/, "") + `_FluidStudio.${ext}`;
            document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url); document.getElementById('status').innerText = `녹화 완료!`;
            ctrlRatio.disabled = false; isPlaying = false; document.getElementById('record-btn').style.display = 'block';
        };
        currentSource.onended = () => { if(mediaRecorder.state === 'recording') mediaRecorder.stop(); };
        currentSource.start(0); mediaRecorder.start(); isPlaying = true;
        ctrlRatio.disabled = true; this.style.display = 'none';
        document.getElementById('status').innerHTML = `<span class="recording-badge">● REC</span> 렌더링 중...`;
    };

    // --- 4. 애니메이션 루프 및 3가지 모드 물리 엔진 ---
    let time = 0;
    
    function animate() {
        requestAnimationFrame(animate);
        time += 0.01;

        // 카메라 설정 (고정 주시점은 원점으로 두되 위치는 슬라이더로 변경. Base Y와 완벽히 분리)
        let cX = parseFloat(ctrlCamX.value); let cY = parseFloat(ctrlCamY.value); let cZ = parseFloat(ctrlCamZ.value);
        camera.position.set(cX, cY, cZ);
        camera.lookAt(0, 0, 0); // 카메라는 항상 중앙(0,0,0)을 봅니다.

        // 오디오 파싱
        let rawBass = 0, rawTreble = 0;
        let smoothFactor = 1.0 - parseFloat(ctrlSmooth.value);

        if (isPlaying && analyser) {
            analyser.getByteFrequencyData(dataArray);
            for(let i=0; i<dataArray.length; i++) smoothedData[i] += (dataArray[i] - smoothedData[i]) * smoothFactor;
            
            let bSum=0, tSum=0;
            for(let i=0; i<15; i++) bSum += smoothedData[i];       
            for(let i=80; i<200; i++) tSum += smoothedData[i];     
            
            rawBass = (bSum / 15 / 255) * parseFloat(ctrlReactBass.value);
            rawTreble = (tSum / 120 / 255) * parseFloat(ctrlReactTreb.value);
        }

        let mode = ctrlMode.value;
        let globalSpeed = parseFloat(ctrlSpeed.value);
        let baseY = parseFloat(ctrlBaseY.value);
        let activeCount = parseInt(ctrlPCount.value);
        
        let positions = masterGeo.attributes.position.array;
        let colors = masterGeo.attributes.color.array;

        // --- 모드별 개별 물리 시뮬레이션 ---
        for (let i = 0; i < activeCount; i++) {
            let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
            
            if (mode === 'bubbles') {
                // [모드 1: 물방울 상승]
                // 베이스가 터질 때 물방울 상승 속도 극대화
                let speedY = (3.0 * pSpeed[i] + rawBass * 15.0) * globalSpeed;
                positions[iy] += speedY;
                
                // 물방울 특유의 좌우 살랑거림 (Wobble)
                positions[ix] += Math.sin(time * 3.0 + pLife[i]) * 1.5 * globalSpeed;
                positions[iz] += Math.cos(time * 2.5 + pLife[i]) * 1.5 * globalSpeed;

                // 화면 위로 벗어나면 바닥(Base Y)으로 리셋
                if (positions[iy] > 1000) {
                    positions[ix] = (Math.random() - 0.5) * 2000;
                    positions[iy] = baseY - (Math.random() * 200); // Base Y 적용 지점
                    positions[iz] = (Math.random() - 0.5) * 2000;
                }
                
                // 에메랄드/푸른빛 색상
                colors[ix] = 0.2; colors[iy] = 0.8 + rawTreble; colors[iz] = 1.0;

            } else if (mode === 'waves') {
                // [모드 2: 하얀 파도]
                // 시간과 Z축 위치를 결합한 거대한 사인파(Tide)
                let wavePhase = (time * 1.5 * globalSpeed) - (positions[iz] * 0.005);
                
                // 파도 형태 계산: 파도가 다가올 때 솟구침
                let surge = Math.sin(wavePhase) * 300; 
                
                // Base Y를 기준으로 파도가 치게 만듦
                let targetY = baseY + surge;
                
                // 베이스가 터지면 파도가 더 거칠고 높게 튐
                targetY += (Math.random() * 50) * rawBass;

                // Y 위치 보간
                positions[iy] += (targetY - positions[iy]) * 0.1;
                
                // Z축(앞뒤)으로 계속 밀려오도록 이동
                positions[iz] += (5.0 + rawBass * 10.0) * globalSpeed;
                if (positions[iz] > 1500) {
                    positions[iz] = -1500;
                    positions[ix] = (Math.random() - 0.5) * 3000;
                }

                // 파도가 정점(높을 때)에 하얗게 부서지는 느낌
                let foam = Math.max(0, surge / 300); 
                colors[ix] = foam + 0.1; colors[iy] = foam + 0.3; colors[iz] = 1.0;

            } else if (mode === 'clouds') {
                // [모드 3: 에어브러시 구름 뭉탱이]
                // 3D 공간의 난기류(Curl Noise 형태)를 천천히 유영함
                let cx = positions[ix] * 0.002;
                let cy = positions[iy] * 0.002;
                let cz = positions[iz] * 0.002;
                let t = time * 0.5 * globalSpeed;

                let vx = Math.sin(cy + t) + Math.sin(cz + t);
                let vy = Math.cos(cx + t) + Math.cos(cz + t);
                let vz = Math.sin(cx - t) + Math.cos(cy - t);

                positions[ix] += vx * 2.0 * globalSpeed;
                positions[iy] += vy * 2.0 * globalSpeed;
                positions[iz] += vz * 2.0 * globalSpeed;

                // 구름이 중앙을 너무 벗어나면 텔레포트
                let dist = Math.sqrt(positions[ix]**2 + (positions[iy]-baseY)**2 + positions[iz]**2);
                if (dist > 1200) {
                    positions[ix] = (Math.random() - 0.5) * 800;
                    positions[iy] = baseY + (Math.random() - 0.5) * 800;
                    positions[iz] = (Math.random() - 0.5) * 800;
                }

                // 고음(Treble)에 반응하여 번개 치듯 빛남
                let flash = rawTreble * 1.5;
                colors[ix] = 0.5 + flash; colors[iy] = 0.5 + flash; colors[iz] = 0.6 + flash;
            }
        }

        masterGeo.attributes.position.needsUpdate = true;
        masterGeo.attributes.color.needsUpdate = true;

        composer.render();
    }
    animate(); 
</script>
</body>
</html>
