<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Nature Fluid Studio v6.3 - Audio Reactive Coastline</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020205; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; }
        canvas { width: 100vw !important; height: 100vh !important; object-fit: contain; }

        .ui-panel { 
            position: absolute; top: 15px; z-index: 10; 
            background: rgba(10, 15, 20, 0.85); padding: 16px; 
            border-radius: 8px; border: 1px solid #334;
            width: 280px; max-height: 90vh; overflow-y: auto;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #ui-left { left: 15px; }
        #ui-right { right: 15px; }
        
        h3 { margin-top: 0; color: #00e5ff; border-bottom: 1px solid #445; padding-bottom: 10px; font-size: 15px; text-align: center;}
        .section-title { font-size: 11px; color: #aaa; margin: 15px 0 5px 0; border-bottom: 1px dashed #334; padding-bottom: 3px; font-weight: bold;}
        
        .control-group { margin-bottom: 12px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; color: #ccc; }
        .control-group input[type="range"] { width: 100%; cursor: pointer; accent-color: #00e5ff; height: 4px;}
        .control-group input[type="color"] { width: 100%; height: 25px; border: none; cursor: pointer; background: none; }
        .control-group select, .file-btn { 
            width: 100%; padding: 6px; background: #112; color: #00ffcc; border: 1px solid #445; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight:bold;}
        
        #audio-input-area { margin-top: 15px; border-top: 2px solid #00e5ff; padding-top: 15px; }
        input[type="file"] { margin-bottom: 10px; display: block; color: white; width: 100%; font-size: 11px; }
        
        .main-btn { 
            background-color: #00e5ff; border: none; padding: 10px; width: 100%;
            border-radius: 5px; cursor: pointer; color: black; font-weight: bold; font-size: 13px; transition: 0.2s;
        }
        .main-btn:hover { background-color: #00b3cc; }

        .rand-btn {
            background-color: #ffaa00; color: black; margin-top: 5px; font-size: 12px; padding: 10px; font-weight: bold;
            box-shadow: 0 0 10px rgba(255, 170, 0, 0.4);
        }
        .rand-btn:hover { background-color: #ffcc00; box-shadow: 0 0 15px rgba(255, 170, 0, 0.7); }

        .record-btn { background-color: #ff3366; color: white; margin-top: 10px; display: none; box-shadow: 0 0 15px rgba(255, 51, 102, 0.6); }
        .record-btn:hover { background-color: #cc0044; }

        #status { font-size: 11px; color: #aaa; margin-top: 10px; line-height: 1.4; text-align: center;}
        .recording-badge { color: #ff3366; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
        
        .color-grid { display: flex; justify-content: space-between; margin-bottom:10px; }
        .color-col { width: 31%; display: flex; flex-direction: column; align-items: center; }
        .color-col label { font-size: 9px; margin-bottom: 2px; color: #fff; }
        .color-col input { width: 100%; }
    </style>
</head>
<body>

<div id="ui-left" class="ui-panel">
    <h3>자연 유체 스튜디오 v6.3</h3>
    
    <div class="section-title" style="color:#00ffcc;">[시각 효과 모드 선택]</div>
    <div class="control-group">
        <select id="ctrl-mode">
            <option value="bubbles">1. 뭉탱이 물방울 (Rising Bubbles)</option>
            <option value="waves" selected>2. 리얼 해변 파도 (Realistic Waves)</option>
            <option value="snow">3. 눈 내리는 풍경 (Falling Snow)</option>
        </select>
    </div>

    <div id="panel-bubbles-opt" style="display:none;">
        <div class="control-group">
            <label style="color:#aaff00;">물방울 뭉탱이 크기 (Cluster) <span id="val-cluster">5</span></label>
            <input type="range" id="ctrl-cluster" min="3" max="15" value="5" step="1">
        </div>
    </div>
    
    <div id="panel-waves-opt" style="display:block;">
        <div class="control-group">
            <label style="color:#00ccff;">파도 방향 각도 (Angle) <span id="val-wave-angle">180°</span></label>
            <input type="range" id="ctrl-wave-angle" min="0" max="360" value="180" step="5">
        </div>
        <div class="control-group">
            <label style="color:#00ccff;">파도 기본 도달 거리 <span id="val-wave-dist">0.5</span></label>
            <input type="range" id="ctrl-wave-dist" min="0.1" max="1.0" value="0.5" step="0.05">
        </div>
        <div class="control-group">
            <label style="color:#00ccff;">파도 쪼개짐 디테일 (Detail) <span id="val-wave-detail">1.5</span></label>
            <input type="range" id="ctrl-wave-detail" min="0.5" max="4.0" value="1.5" step="0.1">
        </div>
    </div>

    <div class="section-title" style="color:#ffaa00;">[제너러티브 엔진]</div>
    <button id="btn-randomize" class="main-btn rand-btn">🎲 지형 & 노이즈 무작위 섞기</button>

    <div class="section-title">[비디오 해상도]</div>
    <div class="control-group">
        <select id="ctrl-ratio">
            <option value="16:9">가로형 (1920x1080)</option>
            <option value="9:16">세로형 (1080x1920)</option>
            <option value="fit" selected>화면 맞춤 (전체화면)</option>
        </select>
    </div>

    <div class="section-title" style="color:#ffaa00;">[오브젝트 물리 제어]</div>
    <div class="control-group">
        <label>입자 개수 (Density) <span id="val-pcount">15000</span></label>
        <input type="range" id="ctrl-pcount" min="1000" max="30000" value="15000" step="1000">
    </div>
    <div class="control-group">
        <label style="color:#ff3366;">물리적 시작/바닥 위치 (Base Y) <span id="val-base-y">-400</span></label>
        <input type="range" id="ctrl-base-y" min="-1000" max="500" value="-400" step="10">
    </div>

    <div id="audio-input-area">
        <button id="init-btn" class="main-btn">오디오 & 엔진 켜기</button>
        <div id="file-select-box" style="display: none; margin-top:10px;">
            <input type="file" id="audio-file" accept="audio/*">
            <div id="status">모드를 변경하며 파동의 효과를 확인하세요.</div>
            <button id="record-btn" class="main-btn record-btn">▶ MP4 렌더링 녹화 시작</button>
        </div>
    </div>
</div>

<div id="ui-right" class="ui-panel">
    <h3>오디오 & 카메라 정밀 튜닝</h3>

    <div class="section-title" style="color:#ffaa00;">[자유 카메라 구도]</div>
    <div class="control-group">
        <label>카메라 X (좌우) <span id="val-cam-x">0</span></label>
        <input type="range" id="ctrl-cam-x" min="-1500" max="1500" value="0" step="10">
    </div>
    <div class="control-group">
        <label>카메라 Y (상하) <span id="val-cam-y">1500</span></label>
        <input type="range" id="ctrl-cam-y" min="-1000" max="1500" value="1500" step="10">
    </div>
    <div class="control-group">
        <label>카메라 Z (줌 인/아웃) <span id="val-cam-z">0</span></label>
        <input type="range" id="ctrl-cam-z" min="0" max="3000" value="0" step="10">
    </div>

    <div class="section-title" style="color:#00ffcc;">[다이나믹 오디오 타격감]</div>
    <div class="control-group">
        <label>저음 파워 (Bass / 파도, 물방울) <span id="val-react-bass">1.5</span></label>
        <input type="range" id="ctrl-react-bass" min="0.0" max="3.0" value="1.5" step="0.1">
    </div>
    <div class="control-group">
        <label>중음 파워 (Mid / 흔들림) <span id="val-react-mid">1.0</span></label>
        <input type="range" id="ctrl-react-mid" min="0.0" max="3.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label>고음 파워 (Treble / 교차 파동) <span id="val-react-treb">1.5</span></label>
        <input type="range" id="ctrl-react-treb" min="0.0" max="3.0" value="1.5" step="0.1">
    </div>
    <div class="control-group">
        <label style="color:#ffaa00;">물방울 타격 흔들림 (Shake) <span id="val-shake">50</span></label>
        <input type="range" id="ctrl-shake" min="0" max="150" value="50" step="5">
    </div>
    <div class="control-group">
        <label>모션 부드러움 (Damping) <span id="val-smooth">0.8</span></label>
        <input type="range" id="ctrl-smooth" min="0.1" max="0.99" value="0.8" step="0.01">
    </div>
    
    <div class="section-title" style="color:#ffaa00;">[글로벌 색상 설정]</div>
    <div class="color-grid">
        <div class="color-col">
            <label>얕은 물/시작</label>
            <input type="color" id="ctrl-color-start" value="#20b2aa">
        </div>
        <div class="color-col">
            <label>깊은 바다/끝</label>
            <input type="color" id="ctrl-color-end" value="#005577">
        </div>
        <div class="color-col">
            <label>거품 (Foam)</label>
            <input type="color" id="ctrl-color-foam" value="#ffffff">
        </div>
    </div>

    <div class="section-title" style="color:#aaff00;">[아날로그 포스트 프로세싱]</div>
    <div class="control-group">
        <label>빛 번짐 (Bloom) <span id="val-bloom">1.0</span></label>
        <input type="range" id="ctrl-bloom" min="0" max="4.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label>필름 노이즈/그레인 <span id="val-grain">0.12</span></label>
        <input type="range" id="ctrl-grain" min="0" max="0.4" value="0.12" step="0.01">
    </div>
    <div class="control-group">
        <label>외곽 어두움 (Vignette) <span id="val-vignette">1.5</span></label>
        <input type="range" id="ctrl-vignette" min="0" max="3" value="1.5" step="0.1">
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
    // --- 1. 기본 환경 세팅 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020205); 
    scene.fog = new THREE.FogExp2(0x020205, 0.0005); 

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 8000);
    const renderer = new THREE.WebGLRenderer({antialias: true, preserveDrawingBuffer: true});
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.body.appendChild(renderer.domElement);

    const CustomArtShader = {
        uniforms: { "tDiffuse": { value: null }, "uTime": { value: 0.0 }, "uGrain": { value: 0.12 }, "uVignette": { value: 1.5 } },
        vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
        fragmentShader: `
            uniform sampler2D tDiffuse; uniform float uTime; uniform float uGrain; uniform float uVignette; varying vec2 vUv;
            float rand(vec2 co){ return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453); }
            void main() {
                vec4 color = texture2D(tDiffuse, vUv);
                vec2 uv = vUv - 0.5; float d = length(uv);
                color.rgb *= smoothstep(0.9, 0.3, d * uVignette);
                color.rgb += (rand(vUv + uTime) - 0.5) * uGrain;
                gl_FragColor = color;
            }
        `
    };

    const renderScene = new THREE.RenderPass(scene, camera);
    const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.0, 0.4, 0.85);
    bloomPass.threshold = 0;
    const artFilterPass = new THREE.ShaderPass(CustomArtShader);

    const composer = new THREE.EffectComposer(renderer);
    composer.addPass(renderScene); composer.addPass(bloomPass); composer.addPass(artFilterPass);

    let globalRandomSeed = 0.0; 

    // --- UI 바인딩 ---
    const updateUIVal = (id, val) => document.getElementById(id).innerText = val;
    const ctrlRatio = document.getElementById('ctrl-ratio');
    const ctrlMode = document.getElementById('ctrl-mode');
    const panelBubbles = document.getElementById('panel-bubbles-opt');
    const panelWaves = document.getElementById('panel-waves-opt');
    
    const ctrlCluster = document.getElementById('ctrl-cluster');
    const ctrlWaveAngle = document.getElementById('ctrl-wave-angle');
    const ctrlWaveDist = document.getElementById('ctrl-wave-dist');
    const ctrlWaveDetail = document.getElementById('ctrl-wave-detail');
    
    const ctrlPCount = document.getElementById('ctrl-pcount');
    const ctrlBaseY = document.getElementById('ctrl-base-y');
    const ctrlCamX = document.getElementById('ctrl-cam-x');
    const ctrlCamY = document.getElementById('ctrl-cam-y');
    const ctrlCamZ = document.getElementById('ctrl-cam-z');
    
    const ctrlReactBass = document.getElementById('ctrl-react-bass');
    const ctrlReactMid = document.getElementById('ctrl-react-mid');
    const ctrlReactTreb = document.getElementById('ctrl-react-treb'); // 고음 반응 파라미터 연동
    const ctrlShake = document.getElementById('ctrl-shake');
    const ctrlSmooth = document.getElementById('ctrl-smooth'); 
    
    const ctrlColorStart = document.getElementById('ctrl-color-start');
    const ctrlColorEnd = document.getElementById('ctrl-color-end');
    const ctrlColorFoam = document.getElementById('ctrl-color-foam'); 
    const ctrlBloom = document.getElementById('ctrl-bloom');
    const ctrlGrain = document.getElementById('ctrl-grain');
    const ctrlVignette = document.getElementById('ctrl-vignette');

    document.getElementById('btn-randomize').onclick = () => {
        globalRandomSeed = Math.random() * 1000.0; 
        if (ctrlMode.value === 'bubbles' || ctrlMode.value === 'snow') {
            resetParticles(parseInt(ctrlCluster.value)); 
        }
    };

    function updateAspectRatio() {
        let val = ctrlRatio.value; let w = window.innerWidth, h = window.innerHeight;
        if (val === '16:9') { w = 1920; h = 1080; } else if (val === '9:16') { w = 1080; h = 1920; }
        renderer.setSize(w, h); composer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix();
    }
    ctrlRatio.onchange = updateAspectRatio; window.addEventListener('resize', () => { if(ctrlRatio.value==='fit') updateAspectRatio(); }); updateAspectRatio();

    ['pcount', 'base-y', 'cam-x', 'cam-y', 'cam-z', 'react-bass', 'react-mid', 'react-treb', 'shake', 'smooth', 'bloom', 'grain', 'vignette', 'cluster', 'wave-angle', 'wave-dist', 'wave-detail'].forEach(id => {
        document.getElementById(`ctrl-${id}`).addEventListener('input', (e) => {
            updateUIVal(`val-${id}`, e.target.value + (id==='wave-angle'?'°':''));
            if(id === 'bloom') bloomPass.strength = parseFloat(e.target.value);
            if(id === 'grain') artFilterPass.uniforms.uGrain.value = parseFloat(e.target.value);
            if(id === 'vignette') artFilterPass.uniforms.uVignette.value = parseFloat(e.target.value);
            if(id === 'pcount') particleGeo.setDrawRange(0, parseInt(e.target.value));
        });
    });

    // --- 2-A. 파티클 엔진 (물방울 & 눈내림) ---
    const maxParticles = 30000;
    const particleGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(maxParticles * 3);
    const pBasePos = new Float32Array(maxParticles * 3); 
    const pGroup = new Float32Array(maxParticles); 
    const pSeed = new Float32Array(maxParticles); 

    let currentClusterSize = parseInt(ctrlCluster.value);
    
    function resetParticles(clusterSize) {
        let groupIdx = 0; let countInGroup = 0; let cX = 0, cY = 0, cZ = 0;
        let baseY = parseFloat(ctrlBaseY.value);
        
        for(let i=0; i<maxParticles; i++) {
            if (countInGroup >= clusterSize) {
                countInGroup = 0; groupIdx++;
                cX = (Math.random() - 0.5) * 2000; cY = baseY + Math.random() * 1500; cZ = (Math.random() - 0.5) * 2000;
            }
            pGroup[i] = groupIdx; pSeed[i] = Math.random(); 
            pPos[i*3] = cX + (Math.random()-0.5)*40; pPos[i*3+1] = cY + (Math.random()-0.5)*40; pPos[i*3+2] = cZ + (Math.random()-0.5)*40;
            pBasePos[i*3] = pPos[i*3]; pBasePos[i*3+1] = pPos[i*3+1]; pBasePos[i*3+2] = pPos[i*3+2];
            countInGroup++;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        particleGeo.setAttribute('aSeed', new THREE.BufferAttribute(pSeed, 1));
        particleGeo.setDrawRange(0, parseInt(ctrlPCount.value));
    }
    resetParticles(currentClusterSize);

    function createTexture(type) {
        const c = document.createElement('canvas'); c.width = 128; c.height = 128; const ctx = c.getContext('2d');
        if (type === 'ring') { 
            ctx.beginPath(); ctx.arc(64,64,50,0,Math.PI*2); ctx.lineWidth = 10; ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.stroke();
            ctx.beginPath(); ctx.arc(64,64,30,0,Math.PI*2); ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fill();
        } else if (type === 'snow') { 
            let grad = ctx.createRadialGradient(64,64,0, 64,64,64);
            grad.addColorStop(0, 'rgba(255,255,255,1.0)'); grad.addColorStop(0.3, 'rgba(255,255,255,0.8)'); grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad; ctx.fillRect(0,0,128,128);
        }
        return new THREE.CanvasTexture(c);
    }
    const texBubbles = createTexture('ring');
    const texSnow = createTexture('snow');

    const particleShaderMat = new THREE.ShaderMaterial({
        uniforms: {
            map: { value: texBubbles }, cStart: { value: new THREE.Color(ctrlColorStart.value) }, cEnd: { value: new THREE.Color(ctrlColorEnd.value) },
            uMode: { value: 0.0 }, uSize: { value: 25.0 }, uOpacity: { value: 0.8 }
        },
        vertexShader: `
            attribute float aSeed; varying vec3 vColor; varying float vOpacity;
            uniform vec3 cStart; uniform vec3 cEnd; uniform float uMode; uniform float uSize; uniform float uOpacity;
            void main() {
                if (uMode == 2.0) { vColor = mix(cStart, vec3(1.0, 1.0, 1.0), 0.7 + aSeed*0.3); } 
                else { vColor = mix(cStart, cEnd, aSeed); }
                vOpacity = uOpacity;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = uSize * (800.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `,
        fragmentShader: `
            uniform sampler2D map; varying vec3 vColor; varying float vOpacity;
            void main() { vec4 texColor = texture2D(map, gl_PointCoord); gl_FragColor = vec4(vColor, texColor.a * vOpacity); }
        `,
        transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
    });
    const particleSystem = new THREE.Points(particleGeo, particleShaderMat);
    scene.add(particleSystem);

    // --- 2-B. 진짜 해변 파도 셰이더 (Audio Staggering & Foaming Edge) ---
    const waveGeo = new THREE.PlaneGeometry(6000, 6000, 1, 1);
    const waveShaderMat = new THREE.ShaderMaterial({
        uniforms: {
            uTime: { value: 0.0 }, 
            uBass: { value: 0.0 }, 
            uTreble: { value: 0.0 }, // ★ 고음 유니폼 추가
            uAngle: { value: 0.0 }, 
            uDist: { value: 0.5 }, 
            uSeed: { value: 0.0 },
            uWaveDetail: { value: 1.5 }, 
            cSand: { value: new THREE.Color(0xd2b48c) }, 
            cShallow: { value: new THREE.Color(ctrlColorStart.value) }, 
            cDeep: { value: new THREE.Color(ctrlColorEnd.value) }, 
            cFoam: { value: new THREE.Color(ctrlColorFoam.value) } 
        },
        vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
        fragmentShader: `
            uniform float uTime; uniform float uBass; uniform float uTreble; 
            uniform float uAngle; uniform float uDist; uniform float uSeed; uniform float uWaveDetail;
            uniform vec3 cSand; uniform vec3 cShallow; uniform vec3 cDeep; uniform vec3 cFoam;
            varying vec2 vUv;
            
            vec2 hash( vec2 p ) { p = vec2( dot(p,vec2(127.1,311.7)), dot(p,vec2(269.5,183.3)) ); return -1.0 + 2.0*fract(sin(p)*43758.5453123); }
            float noise( in vec2 p ) {
                const float K1 = 0.366025404; const float K2 = 0.211324865;
                vec2 i = floor( p + (p.x+p.y)*K1 ); vec2 a = p - i + (i.x+i.y)*K2;
                vec2 o = (a.x>a.y) ? vec2(1.0,0.0) : vec2(0.0,1.0);
                vec2 b = a - o + K2; vec2 c = a - 1.0 + 2.0*K2;
                vec3 h = max( 0.5-vec3(dot(a,a), dot(b,b), dot(c,c) ), 0.0 );
                vec3 n = h*h*h*h*vec3( dot(a,hash(i+0.0)), dot(b,hash(i+o)), dot(c,hash(i+1.0)));
                return dot( n, vec3(70.0) );
            }

            void main() {
                float ang = radians(uAngle);
                float c = cos(ang); float s = sin(ang);
                mat2 rot = mat2(c, -s, s, c);
                vec2 rUv = rot * (vUv - 0.5) + 0.5 + vec2(uSeed * 0.1); 
                
                // 기본 파동 사이클
                float waveSine = sin(uTime * 1.2);
                
                // ★ 피드백 1: 저음과 고음이 X좌표(해안선 가로축)를 따라 교차하며 파도 길이를 다르게 만듦
                float audioReach = sin(rUv.x * 12.0 + uTime) * uBass * 0.15 
                                 + cos(rUv.x * 20.0 - uTime) * uTreble * 0.15;
                
                float wavePos = 0.5 + waveSine * 0.15 + audioReach; 
                
                // 해안선 랜덤 노이즈
                float edgeNoise = noise(rUv * 15.0 * uWaveDetail + uTime*0.5) * (0.1 * uDist) 
                                + noise(rUv * 30.0 * uWaveDetail - uTime) * 0.05;
                
                float distToWave = rUv.y - (wavePos + edgeNoise);
                
                // 파도가 최정점에 도달했는지 확인하는 계수 (1.0 = 끝까지 도달함)
                float peakFactor = smoothstep(0.5, 1.0, waveSine);
                
                vec3 finalColor;
                if (distToWave < 0.0) {
                    finalColor = cSand; 
                    if (distToWave > -0.06) finalColor *= 0.8; // 젖은 모래
                    
                    // ★ 피드백 2: 파도가 끝에 도달하고 사라질 때 쨍한 하얀색 찌꺼기(거품)를 남기며 사라짐
                    float residue = smoothstep(-0.04, 0.0, distToWave) * peakFactor;
                    float residueNoise = noise(rUv * 150.0 * uWaveDetail);
                    if (residue * abs(residueNoise) > 0.1) {
                        finalColor = mix(finalColor, cFoam, residue * 0.8);
                    }
                } else {
                    vec3 waterColor = mix(cShallow, cDeep, smoothstep(0.0, 0.4, distToWave));
                    
                    // 밀려오는 파도 선두의 거품띠 두께 (정점에서 폭발적으로 하얗게 변함)
                    float foamBand = 0.015 + (uBass * 0.02) + (peakFactor * 0.03); 
                    float isFoam = 1.0 - smoothstep(0.0, foamBand, distToWave); 
                    
                    // 가장 뾰족한 끝단은 완전한 순백색으로 (Pure White Edge)
                    float pureWhiteEdge = 1.0 - smoothstep(0.0, 0.005, distToWave);
                    
                    float foamNoise = noise(rUv * 80.0 * uWaveDetail + uTime * 3.0);
                    float finalFoam = isFoam * abs(foamNoise) * 2.0; 
                    
                    finalColor = mix(waterColor, cFoam, clamp(finalFoam + pureWhiteEdge, 0.0, 1.0));
                }
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `,
        side: THREE.DoubleSide
    });
    const waveMesh = new THREE.Mesh(waveGeo, waveShaderMat);
    waveMesh.rotation.x = -Math.PI / 2; 
    waveMesh.visible = (ctrlMode.value === 'waves'); 
    scene.add(waveMesh);

    // UI 이벤트 연동
    ctrlColorStart.oninput = (e) => { particleShaderMat.uniforms.cStart.value.set(e.target.value); waveShaderMat.uniforms.cShallow.value.set(e.target.value); };
    ctrlColorEnd.oninput = (e) => { particleShaderMat.uniforms.cEnd.value.set(e.target.value); waveShaderMat.uniforms.cDeep.value.set(e.target.value); };
    ctrlColorFoam.oninput = (e) => { waveShaderMat.uniforms.cFoam.value.set(e.target.value); }; 

    ctrlMode.onchange = function(e) {
        let mode = e.target.value;
        panelBubbles.style.display = (mode==='bubbles') ? 'block' : 'none';
        panelWaves.style.display = (mode==='waves') ? 'block' : 'none';
        
        if (mode === 'waves') {
            particleSystem.visible = false; waveMesh.visible = true;
            ctrlCamX.value = 0; ctrlCamY.value = 1500; ctrlCamZ.value = 0;
            updateUIVal('val-cam-x', 0); updateUIVal('val-cam-y', 1500); updateUIVal('val-cam-z', 0);
        } else {
            particleSystem.visible = true; waveMesh.visible = false;
            if(ctrlCamY.value == 1500) { ctrlCamY.value = 0; ctrlCamZ.value = 800; updateUIVal('val-cam-y', 0); updateUIVal('val-cam-z', 800); }
            
            if (mode === 'bubbles') {
                particleShaderMat.uniforms.map.value = texBubbles; particleShaderMat.uniforms.uMode.value = 0.0; particleShaderMat.uniforms.uSize.value = 25.0;
            } else if (mode === 'snow') {
                particleShaderMat.uniforms.map.value = texSnow; particleShaderMat.uniforms.uMode.value = 2.0; particleShaderMat.uniforms.uSize.value = 15.0;
            }
        }
    };
    ctrlMode.dispatchEvent(new Event('change'));

    ctrlCluster.oninput = (e) => { currentClusterSize = parseInt(e.target.value); if(ctrlMode.value === 'bubbles') resetParticles(currentClusterSize); };

    // --- 3. 오디오 & 녹화 시스템 ---
    let audioCtx, analyser, dataArray;
    let decodedBuffer = null; let isPlaying = false, currentSource = null;
    let smoothedData = new Float32Array(512);
    let mediaRecorder, recordedChunks = []; let loadedFileName = "";
    
    document.getElementById('init-btn').onclick = function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser(); analyser.fftSize = 512; dataArray = new Uint8Array(analyser.frequencyBinCount);
        this.style.display = 'none'; document.getElementById('file-select-box').style.display = 'block';
    };

    document.getElementById('audio-file').onchange = function(e) {
        const file = e.target.files[0]; if (!file) return;
        document.getElementById('status').innerText = "디코딩 중..."; loadedFileName = file.name;
        const reader = new FileReader();
        reader.onload = function(event) {
            audioCtx.decodeAudioData(event.target.result, function(buffer) {
                decodedBuffer = buffer; document.getElementById('status').innerText = "준비 완료! 재생을 시작하세요.";
                document.getElementById('record-btn').style.display = 'block';
            });
        };
        reader.readAsArrayBuffer(file);
    };

    document.getElementById('record-btn').onclick = function() {
        if (!decodedBuffer) return; if (currentSource) { try { currentSource.stop(); } catch(e) {} }
        currentSource = audioCtx.createBufferSource(); currentSource.buffer = decodedBuffer; currentSource.connect(analyser);
        const audioDest = audioCtx.createMediaStreamDestination(); analyser.connect(audioCtx.destination); analyser.connect(audioDest);            
        const canvasStream = renderer.domElement.captureStream(60); const combinedStream = new MediaStream([...canvasStream.getVideoTracks(), ...audioDest.stream.getAudioTracks()]);
        
        let options = { mimeType: 'video/mp4; codecs=avc1', videoBitsPerSecond: 8000000 }; let ext = 'mp4';
        if (!MediaRecorder.isTypeSupported(options.mimeType)) { options = { mimeType: 'video/webm; codecs=vp9', videoBitsPerSecond: 8000000 }; ext = 'webm'; }
        
        recordedChunks = []; mediaRecorder = new MediaRecorder(combinedStream, options);
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: options.mimeType }); const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.style = 'display: none'; a.href = url; a.download = loadedFileName.replace(/\.[^/.]+$/, "") + `_NatureStudio_Final.${ext}`;
            document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url); document.getElementById('status').innerText = `녹화 완료!`;
            ctrlRatio.disabled = false; isPlaying = false; document.getElementById('record-btn').style.display = 'block';
        };
        currentSource.onended = () => { if(mediaRecorder.state === 'recording') mediaRecorder.stop(); };
        currentSource.start(0); mediaRecorder.start(); isPlaying = true;
        ctrlRatio.disabled = true; this.style.display = 'none';
        document.getElementById('status').innerHTML = `<span class="recording-badge">● REC</span> 렌더링 중...`;
    };

    // --- 4. 애니메이션 루프 ---
    let time = 0;
    
    function animate() {
        requestAnimationFrame(animate);
        time += 0.01;

        let cX = parseFloat(ctrlCamX.value); let cY = parseFloat(ctrlCamY.value); let cZ = parseFloat(ctrlCamZ.value);
        camera.position.set(cX, cY, cZ); camera.lookAt(0, 0, 0); 

        let rawBass = 0, rawMid = 0, rawTreble = 0;
        let smoothFactor = 1.0 - parseFloat(ctrlSmooth.value);

        if (isPlaying && analyser) {
            analyser.getByteFrequencyData(dataArray);
            for(let i=0; i<dataArray.length; i++) smoothedData[i] += (dataArray[i] - smoothedData[i]) * smoothFactor;
            
            let bSum=0, mSum=0, tSum=0;
            for(let i=0; i<10; i++) bSum += dataArray[i]; 
            for(let i=10; i<80; i++) mSum += dataArray[i];
            for(let i=80; i<200; i++) tSum += dataArray[i]; 
            
            rawBass = (bSum / 10 / 255) * parseFloat(ctrlReactBass.value);
            rawMid = (mSum / 70 / 255) * parseFloat(ctrlReactMid.value); 
            // ★ 고음 반응값 연동
            rawTreble = (tSum / 120 / 255) * parseFloat(ctrlReactTreb.value);
        }

        let mode = ctrlMode.value;
        let baseY = parseFloat(ctrlBaseY.value);
        let activeCount = parseInt(ctrlPCount.value);
        let shakeVal = parseFloat(ctrlShake.value);

        if (mode === 'waves') {
            // [모드 2: 리얼 해변 파도] 
            waveShaderMat.uniforms.uTime.value = time;
            waveShaderMat.uniforms.uAngle.value = parseFloat(ctrlWaveAngle.value);
            
            // 저음과 고음 파형을 동시에 셰이더로 넘겨줌
            waveShaderMat.uniforms.uBass.value = rawBass * 2.0; 
            waveShaderMat.uniforms.uTreble.value = rawTreble * 2.5;
            
            waveShaderMat.uniforms.uDist.value = parseFloat(ctrlWaveDist.value);
            waveShaderMat.uniforms.uWaveDetail.value = parseFloat(ctrlWaveDetail.value); 
            waveShaderMat.uniforms.uSeed.value = globalRandomSeed; 
            waveMesh.position.y = baseY; 
        } 
        else {
            for (let i = 0; i < activeCount; i++) {
                let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                
                if (mode === 'bubbles') {
                    pBasePos[iy] += (1.5 + rawBass * 5.0); 
                    
                    let driftX = Math.sin(time*2.0 + pSeed[i]*10 + globalRandomSeed) * 20.0 + Math.sin(time*0.5 + pSeed[i]*5) * 30.0;
                    let driftZ = Math.cos(time*1.5 + pSeed[i]*8 + globalRandomSeed) * 20.0 + Math.cos(time*0.7 + pSeed[i]*4) * 30.0;
                    
                    let dynamicShakeX = Math.sin(time*15 + pSeed[i]*10) * shakeVal * rawMid;
                    let dynamicShakeZ = Math.cos(time*12 + pSeed[i]*8) * shakeVal * rawMid;

                    pPos[ix] = pBasePos[ix] + driftX + dynamicShakeX;
                    pPos[iy] = pBasePos[iy];
                    pPos[iz] = pBasePos[iz] + driftZ + dynamicShakeZ;

                    if (pBasePos[iy] > 1200) {
                        let gSeed = pGroup[i] * 0.1 + globalRandomSeed; 
                        pBasePos[ix] = Math.sin(gSeed * 100) * 1500 + (Math.random()-0.5)*50;
                        pBasePos[iy] = baseY - Math.random() * 200;
                        pBasePos[iz] = Math.cos(gSeed * 100) * 1500 + (Math.random()-0.5)*50;
                    }

                } else if (mode === 'snow') {
                    pBasePos[iy] -= (2.0 + rawBass * 2.0); 
                    
                    let windX = Math.sin(time*0.5 + globalRandomSeed) * 5.0 + Math.sin(time*1.5 + pSeed[i]*10) * (2.0 + rawBass*20.0);
                    let windZ = Math.cos(time*0.4 + globalRandomSeed) * 5.0 + Math.cos(time*1.2 + pSeed[i]*10) * (2.0 + rawBass*20.0);
                    
                    pBasePos[ix] += windX;
                    pBasePos[iz] += windZ;

                    let sShake = (Math.random()-0.5) * shakeVal * rawMid;

                    pPos[ix] = pBasePos[ix] + sShake;
                    pPos[iy] = pBasePos[iy] + sShake;
                    pPos[iz] = pBasePos[iz] + sShake;

                    if (pBasePos[iy] < baseY) {
                        pBasePos[iy] = baseY + 1500 + Math.random() * 500;
                        pBasePos[ix] = (Math.random() - 0.5) * 3000;
                        pBasePos[iz] = (Math.random() - 0.5) * 3000;
                    }
                }
            }
            particleGeo.attributes.position.needsUpdate = true;
        }

        composer.render();
    }
    animate(); 
</script>
