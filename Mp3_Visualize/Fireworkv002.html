<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Nature Fluid Studio v4.0</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020205; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; }
        canvas { width: 100vw !important; height: 100vh !important; object-fit: contain; }

        .ui-panel { 
            position: absolute; top: 15px; z-index: 10; 
            background: rgba(10, 15, 20, 0.85); padding: 16px; 
            border-radius: 8px; border: 1px solid #334;
            width: 280px; max-height: 90vh; overflow-y: auto;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #ui-left { left: 15px; }
        #ui-right { right: 15px; }
        
        h3 { margin-top: 0; color: #00e5ff; border-bottom: 1px solid #445; padding-bottom: 10px; font-size: 15px; text-align: center;}
        .section-title { font-size: 11px; color: #aaa; margin: 15px 0 5px 0; border-bottom: 1px dashed #334; padding-bottom: 3px; font-weight: bold;}
        
        .control-group { margin-bottom: 12px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; color: #ccc; }
        .control-group input[type="range"] { width: 100%; cursor: pointer; accent-color: #00e5ff; height: 4px;}
        .control-group input[type="color"] { width: 100%; height: 25px; border: none; cursor: pointer; background: none; }
        .control-group select, .file-btn { 
            width: 100%; padding: 6px; background: #112; color: #00ffcc; border: 1px solid #445; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight:bold;}
        
        #audio-input-area { margin-top: 15px; border-top: 2px solid #00e5ff; padding-top: 15px; }
        input[type="file"] { margin-bottom: 10px; display: block; color: white; width: 100%; font-size: 11px; }
        
        .main-btn { 
            background-color: #00e5ff; border: none; padding: 10px; width: 100%;
            border-radius: 5px; cursor: pointer; color: black; font-weight: bold; font-size: 13px; transition: 0.2s;
        }
        .main-btn:hover { background-color: #00b3cc; }

        .record-btn { background-color: #ff3366; color: white; margin-top: 10px; display: none; box-shadow: 0 0 15px rgba(255, 51, 102, 0.6); }
        .record-btn:hover { background-color: #cc0044; }

        #status { font-size: 11px; color: #aaa; margin-top: 10px; line-height: 1.4; text-align: center;}
        .recording-badge { color: #ff3366; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
    </style>
</head>
<body>

<div id="ui-left" class="ui-panel">
    <h3>자연 유체 스튜디오 v4.0</h3>
    
    <div class="section-title" style="color:#00ffcc;">[시각 효과 모드 선택]</div>
    <div class="control-group">
        <select id="ctrl-mode">
            <option value="bubbles" selected>1. 뭉탱이 물방울 (Rising Bubbles)</option>
            <option value="waves">2. 탑뷰 해변 파도 (Top-down Waves)</option>
            <option value="clouds">3. 워프 에어브러시 구름 (Warp Clouds)</option>
        </select>
    </div>

    <div id="panel-bubbles-opt" style="display:block;">
        <div class="control-group">
            <label style="color:#aaff00;">물방울 뭉탱이 크기 (Cluster Size) <span id="val-cluster">5</span></label>
            <input type="range" id="ctrl-cluster" min="3" max="12" value="5" step="1">
        </div>
    </div>
    
    <div id="panel-waves-opt" style="display:none;">
        <div class="control-group">
            <label style="color:#00ccff;">파도 밀려오는 방향 (Angle) <span id="val-wave-angle">0°</span></label>
            <input type="range" id="ctrl-wave-angle" min="0" max="360" value="0" step="5">
        </div>
        <div class="control-group">
            <label style="color:#ff55cc;">탑뷰 카메라 강제 고정 <input type="checkbox" id="ctrl-force-topview" checked></label>
        </div>
    </div>

    <div class="section-title">[비디오 해상도]</div>
    <div class="control-group">
        <select id="ctrl-ratio">
            <option value="16:9">가로형 (1920x1080)</option>
            <option value="9:16">세로형 (1080x1920)</option>
            <option value="fit" selected>화면 맞춤 (전체화면)</option>
        </select>
    </div>

    <div class="section-title" style="color:#ffaa00;">[오브젝트 물리 제어]</div>
    <div class="control-group">
        <label>입자 개수 (Density) <span id="val-pcount">15000</span></label>
        <input type="range" id="ctrl-pcount" min="1000" max="30000" value="15000" step="1000">
    </div>
    <div class="control-group">
        <label style="color:#ff3366;">물리적 바닥 높이 (Base Y) <span id="val-base-y">-400</span></label>
        <input type="range" id="ctrl-base-y" min="-1000" max="500" value="-400" step="10">
    </div>

    <div id="audio-input-area">
        <button id="init-btn" class="main-btn">오디오 & 엔진 켜기</button>
        <div id="file-select-box" style="display: none; margin-top:10px;">
            <input type="file" id="audio-file" accept="audio/*">
            <div id="status">모드를 변경하며 정밀한 효과를 테스트하세요.</div>
            <button id="record-btn" class="main-btn record-btn">▶ MP4 렌더링 녹화 시작</button>
        </div>
    </div>
</div>

<div id="ui-right" class="ui-panel">
    <h3>오디오 & 카메라 정밀 튜닝</h3>

    <div class="section-title" style="color:#ffaa00;">[자유 카메라 구도]</div>
    <div class="control-group">
        <label>카메라 X (좌우) <span id="val-cam-x">0</span></label>
        <input type="range" id="ctrl-cam-x" min="-1500" max="1500" value="0" step="10">
    </div>
    <div class="control-group">
        <label>카메라 Y (상하) <span id="val-cam-y">0</span></label>
        <input type="range" id="ctrl-cam-y" min="-1000" max="1500" value="0" step="10">
    </div>
    <div class="control-group">
        <label>카메라 Z (줌 인/아웃) <span id="val-cam-z">800</span></label>
        <input type="range" id="ctrl-cam-z" min="100" max="3000" value="800" step="10">
    </div>

    <div class="section-title" style="color:#00ffcc;">[다이나믹 오디오 브레이크 (Freeze & Shake)]</div>
    <div class="control-group">
        <label>저음 반응 감도 (Bass) <span id="val-react-bass">1.0</span></label>
        <input type="range" id="ctrl-react-bass" min="0.0" max="3.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label>중음 반응 감도 (Mid) <span id="val-react-mid">1.0</span></label>
        <input type="range" id="ctrl-react-mid" min="0.0" max="3.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label style="color:#ff3366;">멈춤 임계값 (Freeze Threshold) <span id="val-freeze-thres">0.7</span></label>
        <input type="range" id="ctrl-freeze-thres" min="0.1" max="1.5" value="0.7" step="0.1">
    </div>
    <div class="control-group">
        <label style="color:#ffaa00;">흔들림 강도 (Shake Intensity) <span id="val-shake">50</span></label>
        <input type="range" id="ctrl-shake" min="0" max="150" value="50" step="5">
    </div>
    
    <div class="section-title" style="color:#ffaa00;">[글로벌 색상 범위 (RGB Range)]</div>
    <div style="display: flex; justify-content: space-between; margin-bottom:10px;">
        <input type="color" id="ctrl-color-start" value="#00ffcc" style="width: 48%;">
        <input type="color" id="ctrl-color-end" value="#ff00cc" style="width: 48%;">
    </div>

    <div class="section-title" style="color:#aaff00;">[아날로그 포스트 프로세싱]</div>
    <div class="control-group">
        <label>빛 번짐 (Bloom) <span id="val-bloom">1.2</span></label>
        <input type="range" id="ctrl-bloom" min="0" max="4.0" value="1.2" step="0.1">
    </div>
    <div class="control-group">
        <label>필름 노이즈/그레인 <span id="val-grain">0.12</span></label>
        <input type="range" id="ctrl-grain" min="0" max="0.4" value="0.12" step="0.01">
    </div>
    <div class="control-group">
        <label>외곽 어두움 (Vignette) <span id="val-vignette">1.5</span></label>
        <input type="range" id="ctrl-vignette" min="0" max="3" value="1.5" step="0.1">
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
    // --- 1. 기본 환경 세팅 (배경, 카메라, 후처리 엔진) ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020205); 
    scene.fog = new THREE.FogExp2(0x020205, 0.0005); 

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 8000);
    const renderer = new THREE.WebGLRenderer({antialias: true, preserveDrawingBuffer: true});
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.body.appendChild(renderer.domElement);

    // 필름 노이즈 & 비네팅을 처리하는 커스텀 셰이더 패스
    const CustomArtShader = {
        uniforms: { "tDiffuse": { value: null }, "uTime": { value: 0.0 }, "uGrain": { value: 0.12 }, "uVignette": { value: 1.5 } },
        vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
        fragmentShader: `
            uniform sampler2D tDiffuse; uniform float uTime; uniform float uGrain; uniform float uVignette; varying vec2 vUv;
            float rand(vec2 co){ return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453); }
            void main() {
                vec4 color = texture2D(tDiffuse, vUv);
                vec2 uv = vUv - 0.5; float d = length(uv);
                color.rgb *= smoothstep(0.9, 0.3, d * uVignette);
                color.rgb += (rand(vUv + uTime) - 0.5) * uGrain;
                gl_FragColor = color;
            }
        `
    };

    const renderScene = new THREE.RenderPass(scene, camera);
    const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.4, 0.85);
    bloomPass.threshold = 0;
    const artFilterPass = new THREE.ShaderPass(CustomArtShader);

    const composer = new THREE.EffectComposer(renderer);
    composer.addPass(renderScene); composer.addPass(bloomPass); composer.addPass(artFilterPass);

    // --- UI 변수 연동 ---
    const updateUIVal = (id, val) => document.getElementById(id).innerText = val;
    const ctrlRatio = document.getElementById('ctrl-ratio');
    const ctrlMode = document.getElementById('ctrl-mode');
    
    // 모드 전용 UI
    const panelBubbles = document.getElementById('panel-bubbles-opt');
    const panelWaves = document.getElementById('panel-waves-opt');
    const ctrlCluster = document.getElementById('ctrl-cluster');
    const ctrlWaveAngle = document.getElementById('ctrl-wave-angle');
    const ctrlForceTopview = document.getElementById('ctrl-force-topview');
    
    // 공통 제어
    const ctrlPCount = document.getElementById('ctrl-pcount');
    const ctrlBaseY = document.getElementById('ctrl-base-y');
    const ctrlCamX = document.getElementById('ctrl-cam-x');
    const ctrlCamY = document.getElementById('ctrl-cam-y');
    const ctrlCamZ = document.getElementById('ctrl-cam-z');
    
    // 오디오 다이나믹스 제어
    const ctrlReactBass = document.getElementById('ctrl-react-bass');
    const ctrlReactMid = document.getElementById('ctrl-react-mid');
    const ctrlFreezeThres = document.getElementById('ctrl-freeze-thres');
    const ctrlShake = document.getElementById('ctrl-shake');
    
    const ctrlColorStart = document.getElementById('ctrl-color-start');
    const ctrlColorEnd = document.getElementById('ctrl-color-end');
    const ctrlBloom = document.getElementById('ctrl-bloom');
    const ctrlGrain = document.getElementById('ctrl-grain');
    const ctrlVignette = document.getElementById('ctrl-vignette');

    function updateAspectRatio() {
        let val = ctrlRatio.value; let w = window.innerWidth, h = window.innerHeight;
        if (val === '16:9') { w = 1920; h = 1080; } else if (val === '9:16') { w = 1080; h = 1920; }
        renderer.setSize(w, h); composer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix();
    }
    ctrlRatio.onchange = updateAspectRatio; window.addEventListener('resize', () => { if(ctrlRatio.value==='fit') updateAspectRatio(); }); updateAspectRatio();

    ['pcount', 'base-y', 'cam-x', 'cam-y', 'cam-z', 'react-bass', 'react-mid', 'freeze-thres', 'shake', 'bloom', 'grain', 'vignette', 'cluster', 'wave-angle'].forEach(id => {
        document.getElementById(`ctrl-${id}`).addEventListener('input', (e) => {
            updateUIVal(`val-${id}`, e.target.value + (id==='wave-angle'?'°':''));
            if(id === 'bloom') bloomPass.strength = parseFloat(e.target.value);
            if(id === 'grain') artFilterPass.uniforms.uGrain.value = parseFloat(e.target.value);
            if(id === 'vignette') artFilterPass.uniforms.uVignette.value = parseFloat(e.target.value);
            if(id === 'pcount') masterGeo.setDrawRange(0, parseInt(e.target.value));
        });
    });

    // --- 2. 3만개 통합 파티클 마스터 엔진 ---
    const maxParticles = 30000;
    const masterGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(maxParticles * 3);
    const pBasePos = new Float32Array(maxParticles * 3); // 흔들림 복원을 위한 원본 좌표 
    const pGroup = new Float32Array(maxParticles); // 물방울 뭉탱이 ID
    const pSeed = new Float32Array(maxParticles); // 컬러, 노이즈, 파도 거리 등 고유 난수

    let currentClusterSize = parseInt(ctrlCluster.value);
    
    function resetParticles(clusterSize) {
        let groupIdx = 0;
        let countInGroup = 0;
        let cX = 0, cY = 0, cZ = 0;

        for(let i=0; i<maxParticles; i++) {
            // 물방울 상승용 클러스터(뭉탱이) 알고리즘
            if (countInGroup >= clusterSize) {
                countInGroup = 0; groupIdx++;
                // 새 그룹 중심 좌표 지정
                cX = (Math.random() - 0.5) * 2000; cY = (Math.random() - 0.5) * 2000; cZ = (Math.random() - 0.5) * 2000;
            }
            
            pGroup[i] = groupIdx;
            pSeed[i] = Math.random(); 
            
            // 그룹 중심에서 반경 20 안쪽으로 미세하게 뭉치도록 좌표 설정
            pPos[i*3] = cX + (Math.random()-0.5)*40;
            pPos[i*3+1] = cY + (Math.random()-0.5)*40;
            pPos[i*3+2] = cZ + (Math.random()-0.5)*40;

            pBasePos[i*3] = pPos[i*3]; pBasePos[i*3+1] = pPos[i*3+1]; pBasePos[i*3+2] = pPos[i*3+2];
            countInGroup++;
        }
        masterGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        masterGeo.setAttribute('aSeed', new THREE.BufferAttribute(pSeed, 1));
        masterGeo.setDrawRange(0, parseInt(ctrlPCount.value));
    }
    resetParticles(currentClusterSize);

    // 텍스처 팩토리
    function createTexture(type) {
        const c = document.createElement('canvas'); c.width = 128; c.height = 128;
        const ctx = c.getContext('2d');
        if (type === 'ring') { // 물방울 도넛
            ctx.beginPath(); ctx.arc(64,64,50,0,Math.PI*2); ctx.lineWidth = 10; ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.stroke();
            ctx.beginPath(); ctx.arc(64,64,30,0,Math.PI*2); ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fill();
        } else if (type === 'solid') { // 해변 파도
            ctx.beginPath(); ctx.arc(64,64,55,0,Math.PI*2); ctx.fillStyle = 'white'; ctx.fill();
        } else if (type === 'airbrush') { // 우주 구름
            let grad = ctx.createRadialGradient(64,64,0, 64,64,64);
            grad.addColorStop(0, 'rgba(255,255,255,1.0)'); grad.addColorStop(0.3, 'rgba(255,255,255,0.5)'); grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad; ctx.fillRect(0,0,128,128);
        }
        return new THREE.CanvasTexture(c);
    }
    const texBubbles = createTexture('ring');
    const texWaves = createTexture('solid');
    const texClouds = createTexture('airbrush');

    // ★ 컬러 보간 및 알파(근접 시 증폭)를 처리하는 강력한 셰이더
    const masterShaderMat = new THREE.ShaderMaterial({
        uniforms: {
            map: { value: texBubbles },
            cStart: { value: new THREE.Color(ctrlColorStart.value) },
            cEnd: { value: new THREE.Color(ctrlColorEnd.value) },
            uMode: { value: 0.0 }, // 0:Bubbles, 1:Waves, 2:Clouds
            uSize: { value: 15.0 },
            uOpacity: { value: 0.8 },
            uBaseY: { value: -400.0 }
        },
        vertexShader: `
            attribute float aSeed;
            varying vec3 vColor; varying float vOpacity;
            uniform vec3 cStart; uniform vec3 cEnd; uniform float uMode; uniform float uSize; uniform float uOpacity; uniform float uBaseY;
            void main() {
                // Seed에 기반한 컬러 그라데이션
                vColor = mix(cStart, cEnd, aSeed);
                vOpacity = uOpacity;

                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                
                // 모드별 투명도/크기 예외 처리 (셰이더 안에서 최적화)
                if (uMode == 1.0) { // 해변 파도 (Y가 높을수록 투명)
                    vOpacity = uOpacity * smoothstep(200.0, 0.0, position.y - uBaseY);
                } else if (uMode == 2.0) { // 구름 (거대한 스케일 고정, 투명도 극소화)
                    gl_PointSize = 400.0 * (800.0 / -mvPosition.z);
                    vOpacity = 0.08; // 매우 옅게 겹침
                }
                
                if (uMode != 2.0) gl_PointSize = uSize * (800.0 / -mvPosition.z);
                
                gl_Position = projectionMatrix * mvPosition;
            }
        `,
        fragmentShader: `
            uniform sampler2D map; varying vec3 vColor; varying float vOpacity;
            void main() {
                vec4 texColor = texture2D(map, gl_PointCoord);
                gl_FragColor = vec4(vColor, texColor.a * vOpacity);
            }
        `,
        transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
    });

    const masterSystem = new THREE.Points(masterGeo, masterShaderMat);
    scene.add(masterSystem);

    ctrlColorStart.oninput = (e) => masterShaderMat.uniforms.cStart.value.set(e.target.value);
    ctrlColorEnd.oninput = (e) => masterShaderMat.uniforms.cEnd.value.set(e.target.value);

    ctrlMode.onchange = function(e) {
        let mode = e.target.value;
        panelBubbles.style.display = (mode==='bubbles') ? 'block' : 'none';
        panelWaves.style.display = (mode==='waves') ? 'block' : 'none';
        
        if (mode === 'bubbles') {
            masterShaderMat.uniforms.map.value = texBubbles; masterShaderMat.uniforms.uSize.value = 25.0; masterShaderMat.uniforms.uOpacity.value = 0.8; masterShaderMat.uniforms.uMode.value = 0.0;
        } else if (mode === 'waves') {
            masterShaderMat.uniforms.map.value = texWaves; masterShaderMat.uniforms.uSize.value = 10.0; masterShaderMat.uniforms.uOpacity.value = 0.7; masterShaderMat.uniforms.uMode.value = 1.0;
        } else if (mode === 'clouds') {
            masterShaderMat.uniforms.map.value = texClouds; masterShaderMat.uniforms.uMode.value = 2.0; // 구름은 셰이더 내부에서 사이즈/투명도 제어
            // 모드 전환 시 파티클 위치 초기화 (중앙 방사형)
            for(let i=0; i<maxParticles; i++) {
                pBasePos[i*3] = (Math.random()-0.5)*100; pBasePos[i*3+1] = (Math.random()-0.5)*100; pBasePos[i*3+2] = (Math.random()-0.5)*100;
            }
        }
        masterShaderMat.needsUpdate = true;
    };

    ctrlCluster.oninput = (e) => {
        currentClusterSize = parseInt(e.target.value);
        if(ctrlMode.value === 'bubbles') resetParticles(currentClusterSize); // 물방울 모드일때만 즉시 재편성
    };

    // --- 3. 오디오 & 녹화 시스템 ---
    let audioCtx, analyser, dataArray;
    let decodedBuffer = null; let isPlaying = false, currentSource = null;
    let smoothedData = new Float32Array(512);
    let mediaRecorder, recordedChunks = []; let loadedFileName = "";
    
    document.getElementById('init-btn').onclick = function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser(); analyser.fftSize = 512; dataArray = new Uint8Array(analyser.frequencyBinCount);
        this.style.display = 'none'; document.getElementById('file-select-box').style.display = 'block';
    };

    document.getElementById('audio-file').onchange = function(e) {
        const file = e.target.files[0]; if (!file) return;
        document.getElementById('status').innerText = "디코딩 중..."; loadedFileName = file.name;
        const reader = new FileReader();
        reader.onload = function(event) {
            audioCtx.decodeAudioData(event.target.result, function(buffer) {
                decodedBuffer = buffer; document.getElementById('status').innerText = "준비 완료! 재생을 시작하세요.";
                document.getElementById('record-btn').style.display = 'block';
            });
        };
        reader.readAsArrayBuffer(file);
    };

    document.getElementById('record-btn').onclick = function() {
        if (!decodedBuffer) return; if (currentSource) { try { currentSource.stop(); } catch(e) {} }
        currentSource = audioCtx.createBufferSource(); currentSource.buffer = decodedBuffer; currentSource.connect(analyser);
        const audioDest = audioCtx.createMediaStreamDestination(); analyser.connect(audioCtx.destination); analyser.connect(audioDest);            
        const canvasStream = renderer.domElement.captureStream(60); const combinedStream = new MediaStream([...canvasStream.getVideoTracks(), ...audioDest.stream.getAudioTracks()]);
        
        let options = { mimeType: 'video/mp4; codecs=avc1', videoBitsPerSecond: 8000000 }; let ext = 'mp4';
        if (!MediaRecorder.isTypeSupported(options.mimeType)) { options = { mimeType: 'video/webm; codecs=vp9', videoBitsPerSecond: 8000000 }; ext = 'webm'; }
        
        recordedChunks = []; mediaRecorder = new MediaRecorder(combinedStream, options);
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: options.mimeType }); const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.style = 'display: none'; a.href = url; a.download = loadedFileName.replace(/\.[^/.]+$/, "") + `_NatureFluid.${ext}`;
            document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url); document.getElementById('status').innerText = `녹화 완료!`;
            ctrlRatio.disabled = false; isPlaying = false; document.getElementById('record-btn').style.display = 'block';
        };
        currentSource.onended = () => { if(mediaRecorder.state === 'recording') mediaRecorder.stop(); };
        currentSource.start(0); mediaRecorder.start(); isPlaying = true;
        ctrlRatio.disabled = true; this.style.display = 'none';
        document.getElementById('status').innerHTML = `<span class="recording-badge">● REC</span> 렌더링 중...`;
    };

    // --- 4. 애니메이션 루프 및 3대 모드 물리역학 ---
    let time = 0;
    
    function animate() {
        requestAnimationFrame(animate);
        time += 0.01;

        let mode = ctrlMode.value;
        
        // 1. 카메라 설정 (탑뷰 강제 고정 확인)
        let cX = parseFloat(ctrlCamX.value); let cY = parseFloat(ctrlCamY.value); let cZ = parseFloat(ctrlCamZ.value);
        if (mode === 'waves' && ctrlForceTopview.checked) {
            // 탑뷰 강제 고정: Y를 매우 높게 띄우고 아래를 바라봄
            camera.position.set(0, 1500, 0); camera.lookAt(0, 0, 0);
        } else {
            camera.position.set(cX, cY, cZ); camera.lookAt(0, 0, 0);
        }

        // 2. 오디오 파싱 (멈춤 감지를 위한 즉각적 타격감 추출)
        let rawBass = 0, rawMid = 0, rawTreble = 0;
        if (isPlaying && analyser) {
            analyser.getByteFrequencyData(dataArray);
            let bSum=0, mSum=0;
            for(let i=0; i<10; i++) bSum += dataArray[i]; // 날 것의 데이터 사용 (반응성)      
            for(let i=10; i<80; i++) mSum += dataArray[i];      
            rawBass = (bSum / 10 / 255) * parseFloat(ctrlReactBass.value);
            rawMid = (mSum / 70 / 255) * parseFloat(ctrlReactMid.value);
        }

        let baseY = parseFloat(ctrlBaseY.value);
        masterShaderMat.uniforms.uBaseY.value = baseY; // 파도 높이 계산을 위해 셰이더로 전송
        let activeCount = parseInt(ctrlPCount.value);
        
        let freezeThreshold = parseFloat(ctrlFreezeThres.value);
        let isFreezing = (rawMid > freezeThreshold || rawBass > freezeThreshold); // 임계치 이상 시 멈춤 플래그 
        let shakeVal = parseFloat(ctrlShake.value);

        // 3. 모드별 물리학 계산
        for (let i = 0; i < activeCount; i++) {
            let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
            
            if (mode === 'bubbles') {
                // --- 🫧 물방울 뭉탱이 로직 ---
                if (isFreezing) {
                    // 스톱 & 쉐이크 모션: 상승(Base)은 멈추고 제자리에서 고유 주기로 거칠게 흔들림
                    pPos[ix] = pBasePos[ix] + Math.sin(time*20 + pSeed[i]*10) * shakeVal * rawMid;
                    pPos[iy] = pBasePos[iy] + Math.cos(time*22 + pSeed[i]*15) * shakeVal * rawMid;
                    pPos[iz] = pBasePos[iz] + Math.sin(time*18 + pSeed[i]*8) * shakeVal * rawMid;
                } else {
                    // 정상 상승 모션 (BasePos를 증가시킴)
                    pBasePos[iy] += 10.0 * pSpeed[i];
                    
                    if (pBasePos[iy] > 1200) {
                        // 그룹의 첫 파티클일 경우 그룹의 새 중심 좌표(X,Z)를 할당, 나머지는 그 주변에 생성
                        let gSeed = pGroup[i] * 0.1; // 그룹 고유 시드
                        pBasePos[ix] = Math.sin(gSeed * 100) * 1500;
                        pBasePos[iy] = baseY - Math.random() * 200;
                        pBasePos[iz] = Math.cos(gSeed * 100) * 1500;
                        
                        // 약간의 뭉탱이 오프셋
                        pBasePos[ix] += (Math.random()-0.5)*50;
                        pBasePos[iy] += (Math.random()-0.5)*50;
                        pBasePos[iz] += (Math.random()-0.5)*50;
                    }

                    // 부드러운 Wobble(살랑거림) 추가하여 실제 화면 좌표(pPos)에 반영
                    pPos[ix] = pBasePos[ix] + Math.sin(time * 3.0 + pSeed[i]*10) * 20.0;
                    pPos[iy] = pBasePos[iy];
                    pPos[iz] = pBasePos[iz] + Math.cos(time * 2.5 + pSeed[i]*10) * 20.0;
                }

            } else if (mode === 'waves') {
                // --- 🌊 탑뷰 해변 파도 로직 ---
                let angleDeg = parseFloat(ctrlWaveAngle.value);
                let angleRad = angleDeg * (Math.PI / 180);
                
                // 파도 진행 벡터 (밀려오는 방향)
                let dirX = Math.cos(angleRad);
                let dirZ = Math.sin(angleRad);
                
                // 파티클의 1차원 공간 축 위치 계산 (해안선을 향해 다가오는 정도)
                let spaceAxis = (pBasePos[ix] * dirX) + (pBasePos[iz] * dirZ);
                
                // 파도 물결(Sine Wave) 페이즈. 속도는 베이스에 반응
                let wavePhase = (time * 5.0) - (spaceAxis * 0.003); 
                let surge = Math.sin(wavePhase); // -1.0 ~ 1.0
                
                // 파도의 도달 거리를 무작위(pSeed)로 만들어 해안선이 구불구불하게 깨짐
                let waveLength = 200.0 + (pSeed[i] * 300.0);
                
                // surge 값이 클 때 (파도가 해변으로 올라올 때)
                if (surge > 0) {
                    pPos[iy] = baseY + (surge * waveLength); // Y축으로 치솟음 (탑뷰에서는 높이로 보임)
                } else {
                    pPos[iy] = baseY; // 물러갈 땐 바닥
                }

                // 거품이 흔들리는 스톱모션 이펙트 
                if (isFreezing && surge > 0.5) {
                    pPos[ix] += (Math.random()-0.5) * shakeVal * 0.5;
                    pPos[iz] += (Math.random()-0.5) * shakeVal * 0.5;
                } else {
                    // 정상적인 잔물결 
                    pPos[ix] = pBasePos[ix] + Math.sin(time*2 + pSeed[i]*10)*10.0;
                    pPos[iz] = pBasePos[iz] + Math.cos(time*2 + pSeed[i]*10)*10.0;
                }
                
                // 전체적으로 파도 축을 따라 계속 전진시켜 루프를 돌림
                pBasePos[ix] += dirX * (3.0 + rawBass*5.0);
                pBasePos[iz] += dirZ * (3.0 + rawBass*5.0);

                // 화면 밖을 벗어나면 반대편에 리스폰
                if (pBasePos[ix] > 2000) pBasePos[ix] = -2000; else if (pBasePos[ix] < -2000) pBasePos[ix] = 2000;
                if (pBasePos[iz] > 2000) pBasePos[iz] = -2000; else if (pBasePos[iz] < -2000) pBasePos[iz] = 2000;

            } else if (mode === 'clouds') {
                // --- ☁️ 우주 워프 구름 로직 ---
                // 중앙(0,0,0)에서 방사형으로 가속하며 뻗어나감 (Warp Speed)
                let dist = Math.sqrt(pBasePos[ix]**2 + pBasePos[iy]**2 + pBasePos[iz]**2) + 0.1;
                
                // 거리가 멀어질수록 기하급수적으로 빨라짐
                let warpSpeed = (dist * 0.05) + (rawBass * 50.0); 

                if (isFreezing) {
                    // 워프 브레이크 & 쉐이크
                    pPos[ix] = pBasePos[ix] + (Math.random()-0.5) * shakeVal;
                    pPos[iy] = pBasePos[iy] + (Math.random()-0.5) * shakeVal;
                    pPos[iz] = pBasePos[iz] + (Math.random()-0.5) * shakeVal;
                } else {
                    // 중앙 밖으로 전진
                    pBasePos[ix] += (pBasePos[ix] / dist) * warpSpeed;
                    pBasePos[iy] += (pBasePos[iy] / dist) * warpSpeed;
                    pBasePos[iz] += (pBasePos[iz] / dist) * warpSpeed;
                    
                    pPos[ix] = pBasePos[ix]; pPos[iy] = pBasePos[iy]; pPos[iz] = pBasePos[iz];
                }

                // 카메라 한계(2000)를 벗어나면 다시 중앙 근처 좁은 곳으로 소환 (가까운 파티클끼리 뭉치게 됨)
                if (dist > 2000) {
                    pBasePos[ix] = (Math.random() - 0.5) * 50; // 매우 중앙 밀집
                    pBasePos[iy] = (Math.random() - 0.5) * 50;
                    pBasePos[iz] = (Math.random() - 0.5) * 50;
                }
            }
        }

        masterGeo.attributes.position.needsUpdate = true;
        composer.render();
    }
    animate(); 
</script>
