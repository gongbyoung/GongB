<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 Music Video Creator v18.23 (Fluid Vignette)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c26; --border: rgba(255,255,255,0.08);
    --accent: #00ffcc; --accent2: #818cf8; --text: #f1f0ff; --muted: #888;
    --green: #4ade80; --red: #f87171; --amber: #fbbf24;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; overflow:hidden; display: flex; flex-direction: column; }
  header { padding: 1.2rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 1rem; background: var(--surface); flex-shrink:0; }
  header h1 { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--accent); letter-spacing: -0.03em; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .status-dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.5s infinite; }
  .status-dot.recording { background: var(--red); box-shadow: 0 0 8px var(--red); animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  .layout { display: grid; grid-template-columns: 360px 1fr 340px; height: calc(100vh - 61px - 60px); min-height: 0; }
  .panel { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }
  .panel.right { border-right:none; border-left: 1px solid var(--border); }
  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .section-label { font-size: 0.65rem; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.75rem; font-weight: 500; }
  .upload-zone { border: 1px dashed var(--border); border-radius: 10px; padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--surface2); position: relative; }
  .upload-zone:hover { border-color: var(--accent); background: rgba(0,255,204,0.05); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-zone .icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
  .upload-zone p { font-size: 0.75rem; color: var(--text); margin-bottom:2px;}
  .upload-zone span { font-size: 0.7rem; color: var(--accent); }
  .file-info { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.75rem; display: flex; align-items: center; gap: 0.75rem; margin-top: 5px; }
  .file-info .fi-name { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-info .fi-dur { color: var(--accent); white-space: nowrap; }
  .image-slot { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1rem; display: flex; flex-direction: column; gap: 0.7rem; transition: all 0.2s; cursor: pointer; }
  .image-slot.has-image { border-color: rgba(0,255,204,0.15); }
  .image-slot.active { border-color: var(--accent); background: #161a19; box-shadow: 0 0 10px rgba(0,255,204,0.08); }
  .slot-header { display: flex; align-items: center; gap: 0.6rem; }
  .slot-num { width: 20px; height: 20px; border-radius: 4px; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; color: var(--muted); flex-shrink: 0; }
  .slot-thumb { width: 40px; height: 32px; border-radius: 4px; object-fit: cover; border: 1px solid var(--border); }
  .slot-name { font-size: 0.72rem; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .slot-add-btn { background: none; border: 1px dashed var(--border); border-radius: 6px; color: var(--muted); font-size: 0.65rem; cursor: pointer; padding: 0.35rem 0.6rem; white-space: nowrap; }
  .slot-add-btn:hover { border-color: var(--accent); color: var(--accent); }
  .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; align-items: center; margin-top:2px; }
  .time-field { display: flex; flex-direction: column; gap: 0.2rem; }
  .time-field label { font-size: 0.55rem; color: var(--muted); text-transform: uppercase; }
  .time-field input[type="number"] { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; color: var(--accent); font-family: 'DM Mono', monospace; font-size: 0.7rem; padding: 0.35rem 0.5rem; width: 100%; }
  .time-field input[type="number"]:focus { outline: none; border-color: var(--accent); }
  .style-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; margin-top:5px; }
  .style-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 0.65rem; cursor: pointer; padding: 0.6rem; transition: all 0.18s; text-align:left; }
  .style-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.05); }
  input[type=range] { width: 100%; accent-color: var(--accent); height: 3px; cursor: pointer; margin-bottom: 10px;}
  label { font-size: 0.7rem; color: var(--muted); display:flex; justify-content:space-between; margin-bottom:3px; margin-top:8px;}
  .val-label { color: var(--accent); font-weight: 500; }
  .aspect-btn { background: #333; border: 1px solid #444; color: #aaa; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-family: monospace; font-size: 0.65rem; margin-top: 5px;}
  .aspect-btn:hover { background: #444; color: #fff; }
  .aspect-btn.active { background: var(--accent2); color: #fff; border-color: var(--accent2); font-weight: bold; }
  .btn-start { flex: 1; background: #fff; border: none; border-radius: 8px; color: #000; font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700; padding: 0.85rem; cursor: pointer; }
  .btn-start:disabled { background: #333; color: #666; cursor: not-allowed; }
  .btn-stop { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); border-radius: 8px; color: var(--red); font-size: 0.75rem; padding: 0.85rem 1.1rem; cursor: pointer; display: none; }
  .btn-stop.visible { display: block; }
  .canvas-area { background: #000; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  #mainCanvas { max-width: 100%; max-height: 100%; object-fit: contain; }
  .rec-badge { position: absolute; top: 1rem; right: 1rem; background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); border-radius: 20px; padding: 0.3rem 0.75rem; font-size: 0.65rem; color: var(--red); display: none; align-items: center; gap: 0.4rem; }
  .rec-badge.visible { display: flex; }
  .rec-dot { width:6px; height:6px; border-radius:50%; background: var(--red); animation: pulse 0.8s infinite; }
  .empty-hint { color: var(--muted); font-size: 0.75rem; text-align: center; }
  .empty-hint .big { font-size: 2.5rem; margin-bottom: 0.5rem; color:#222;}
  .playbar { height:60px; background:var(--surface); border-top:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:15px; flex-shrink:0; }
  .playbar input[type=range] { flex:1; accent-color:#444; margin:0;}
  .slot-file-input { display: none; }
  .ok { color: var(--green); font-size: 0.68rem; text-align:center; }
  .warn { color: var(--amber); font-size: 0.68rem; text-align:center; }
</style>
</head>
<body>

<header>
  <div class="status-dot" id="statusDot"></div>
  <h1>🎵 Music Video Creator</h1>
  <span style="font-size:0.65rem;color:var(--muted);margin-left:auto;">v18.23 Fluid Vignette</span>
</header>

<div class="layout">
  <div class="panel">
    <div>
      <div class="section-label">01 — 음악 파일</div>
      <div class="upload-zone" id="audioZone">
        <input type="file" accept="audio/*" id="audioInput">
        <div class="icon" style="color:#ffcc00">🎵</div>
        <p>MP3 파일을 업로드하세요</p>
      </div>
      <div class="file-info" id="audioInfo" style="display:none;">
        <span class="fi-name" id="audioName"></span>
        <span class="fi-dur" id="audioDur"></span>
      </div>
    </div>
    <div>
      <div class="section-label">02 — 이미지 슬롯</div>
      <div style="display:flex; gap:5px; margin-bottom:10px;">
          <button class="aspect-btn active" id="btn169" onclick="setAspectRatio(16, 9)">LANDSCAPE 16:9</button>
          <button class="aspect-btn" id="btn916" onclick="setAspectRatio(9, 16)">PORTRAIT 9:16</button>
      </div>
      <div id="imageSlots" style="display:flex;flex-direction:column;gap:0.75rem; max-height:400px; overflow-y:auto; padding-right:5px;"></div>
    </div>
    <div class="action-bar">
      <button class="btn-start" id="btnStart" disabled>▶ START REC</button>
      <button class="btn-stop" id="btnStop">■ STOP</button>
    </div>
    <p id="statusMsg"></p>
  </div>

  <div class="canvas-area">
    <canvas id="mainCanvas" width="1920" height="1080"></canvas>
    <div class="empty-hint" id="emptyHint"><div class="big">🎨</div>업로드 후 미리보기가 표시됩니다</div>
    <div class="rec-badge" id="recBadge"><div class="rec-dot"></div> REC</div>
  </div>

  <div class="panel right" id="editPanel" style="display:none;">
    <div class="section-label">03 — 슬롯 세팅</div>
    <label>아트 스타일</label>
    <div class="style-row" id="styleGrid"></div>
    <div style="margin-top:25px; background:var(--surface2); padding:15px; border-radius:8px; border:1px solid var(--border);">
        <div class="section-label" style="color:var(--text); margin-bottom:12px;">Active Transform</div>
        <label>Image Scale <span id="valScale" class="val-label">1.0</span></label>
        <input type="range" id="curScale" min="0.1" max="4.0" step="0.05" value="1.0" oninput="updateActiveTransform()">
        <label>Offset X (px) <span id="valX" class="val-label">0</span></label>
        <input type="range" id="curX" min="-1500" max="1500" step="5" value="0" oninput="updateActiveTransform()">
        <label>Offset Y (px) <span id="valY" class="val-label">0</span></label>
        <input type="range" id="curY" min="-1500" max="1500" step="5" value="0" oninput="updateActiveTransform()">
    </div>
  </div>
</div>

<div class="playbar">
  <span class="time-display" id="currTime" style="min-width:45px;">0:00</span>
  <input type="range" id="progBar" value="0" min="0" max="100" step="0.1" oninput="seekTime(this.value)">
  <span class="time-display" id="totalTime" style="color:#555; min-width:45px;">0:00</span>
</div>

<audio id="audioEl" style="display:none;"></audio>

<script>
// ─── STATE & CONFIG ─────────────────────────────────────
const NUM_SLOTS = 5;
let W = 1920, H = 1080, aspectStr = "16_9"; 
let audioFile = null, audioDuration = 0, isPlaying = false, currentActiveIdx = -1;
let slots = Array.from({length: NUM_SLOTS}, (_,i) => ({
  file: null, img: null, dataUrl: null, start: 0, end: 0, style: 'oil',
  index: i, scale: 1.0, offsetX: 0, offsetY: 0, preRenderedCanvas: null, preRenderedSketch: null 
}));
const STYLES = ['watercolor','oil','impressionism','anime','pencil'];
const STYLE_LABELS = { watercolor:'수채화', oil:'유채화', impressionism:'인상파', anime:'애니메이션', pencil:'연필화' };

const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');
const audioEl = document.getElementById('audioEl');
const maskCanvas = document.createElement('canvas'), compCanvas = document.createElement('canvas');
let mctx = maskCanvas.getContext('2d'), cctx = compCanvas.getContext('2d');
let mediaRecorder = null, recordedChunks = [], animFrameId = null, prevDist = 0;

// ─── ASPECT RATIO SYSTEM ──────────────────────────────────
function setAspectRatio(num, den) {
    if (aspectStr === `${num}_${den}`) return;
    
    if (num === 16) { W = 1920; H = 1080; aspectStr = "16_9"; } 
    else { W = 1080; H = 1920; aspectStr = "9_16"; }

    document.getElementById('btn169').className = (aspectStr === "16_9" ? 'aspect-btn active' : 'aspect-btn');
    document.getElementById('btn916').className = (aspectStr === "9_16" ? 'aspect-btn active' : 'aspect-btn');

    canvas.width = maskCanvas.width = compCanvas.width = W;
    canvas.height = maskCanvas.height = compCanvas.height = H;
    mctx = maskCanvas.getContext('2d'); cctx = compCanvas.getContext('2d'); 

    slots.forEach(s => { s.preRenderedCanvas = s.preRenderedSketch = null; });
    if (!isPlaying) drawFrame(audioEl.currentTime);
}

// ─── AUDIO ───────────────────────────────────────────────
document.getElementById('audioInput').onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  audioFile = f; audioEl.src = URL.createObjectURL(f);
  audioEl.onloadedmetadata = () => {
    audioDuration = audioEl.duration;
    document.getElementById('totalTime').textContent = fmtTime(audioDuration);
    document.getElementById('audioDur').textContent = fmtTime(audioDuration);
    document.getElementById('audioName').textContent = f.name;
    document.getElementById('audioInfo').style.display = 'flex';
    document.getElementById('audioZone').style.display = 'none';
    autoFillSlotTimes(); renderSlots(); checkReady();
  };
};

function autoFillSlotTimes() {
  const filled = slots.filter(s => s.file); if (!filled.length) return;
  const seg = audioDuration / filled.length;
  filled.forEach((s, i) => { s.start = i * seg; s.end = (i + 1) * seg; });
}

// ─── UI RENDER ───────────────────────────────────────────
function renderSlots() {
  const container = document.getElementById('imageSlots'); container.innerHTML = '';
  slots.forEach((slot, i) => {
    const div = document.createElement('div');
    div.className = 'image-slot' + (slot.file ? ' has-image' : '') + (i === currentActiveIdx ? ' active' : '');
    div.onclick = (e) => { if(slot.file) selectSlot(i, e); };
    div.innerHTML = `
      <div class="slot-header"><div class="slot-num">${i+1}</div>
        ${slot.img ? `<img class="slot-thumb" src="${slot.dataUrl}">` : ''}
        <span class="slot-name">${slot.file ? slot.file.name : '이미지 없음'}</span>
        ${!slot.file ? `<button class="slot-add-btn" onclick="triggerSlotInput(${i}, event)">+ 업로드</button>` : ''}
        <input type="file" accept="image/*" class="slot-file-input" id="slotInput-${i}">
      </div>
      ${slot.file ? `<div class="time-row">
        <div class="time-field"><label>시작</label><input type="number" class="slot-start" value="${slot.start.toFixed(1)}" step="0.1" onclick="event.stopPropagation()"></div>
        <div class="time-field"><label>종료</label><input type="number" class="slot-end" value="${slot.end.toFixed(1)}" step="0.1" onclick="event.stopPropagation()"></div>
      </div>` : ''}`;
    container.appendChild(div);
    if(slot.file) {
      div.querySelector('.slot-start').onchange = e => { slots[i].start = parseFloat(e.target.value) || 0; checkReady(); };
      div.querySelector('.slot-end').onchange = e => { slots[i].end = parseFloat(e.target.value) || 0; checkReady(); };
    }
    document.getElementById(`slotInput-${i}`).onchange = e => loadSlotImage(i, e.target.files[0]);
  });
}
function triggerSlotInput(idx, e) { e.stopPropagation(); document.getElementById(`slotInput-${idx}`).click(); }
function loadSlotImage(idx, file) {
  if (!file) return; const reader = new FileReader();
  reader.onload = e => {
    const img = new Image(); img.src = e.target.result;
    img.onload = () => {
      slots[idx].file = file; slots[idx].img = img; slots[idx].dataUrl = e.target.result;
      slots[idx].preRenderedCanvas = slots[idx].preRenderedSketch = null;
      if (audioDuration > 0) autoFillSlotTimes();
      renderSlots(); checkReady(); selectSlot(idx);
    };
  }; reader.readAsDataURL(file);
}

function selectSlot(idx, e) {
    if(e) e.stopPropagation(); currentActiveIdx = idx; renderSlots(); renderStyleGrid(idx);
    const s = slots[idx];
    document.getElementById('curScale').value = s.scale; document.getElementById('curX').value = s.offsetX; document.getElementById('curY').value = s.offsetY;
    document.getElementById('valScale').innerText = s.scale.toFixed(2); document.getElementById('valX').innerText = s.offsetX; document.getElementById('valY').innerText = s.offsetY;
    document.getElementById('editPanel').style.display = 'block'; document.getElementById('emptyHint').style.display = 'none';
    if(!isPlaying) drawFrame(audioEl.currentTime);
}

function renderStyleGrid(idx) {
    const grid = document.getElementById('styleGrid'); grid.innerHTML = '';
    STYLES.forEach(k => {
        const btn = document.createElement('button'); btn.className = `style-btn ${slots[idx].style === k ? 'active' : ''}`;
        btn.innerText = STYLE_LABELS[k]; btn.onclick = () => { slots[idx].style = k; slots[idx].preRenderedCanvas = null; slots[idx].preRenderedSketch = null; renderStyleGrid(idx); if(!isPlaying) drawFrame(audioEl.currentTime); };
        grid.appendChild(btn);
    });
}

function updateActiveTransform() {
    if(currentActiveIdx === -1) return; const s = slots[currentActiveIdx];
    s.scale = parseFloat(document.getElementById('curScale').value);
    s.offsetX = parseInt(document.getElementById('curX').value);
    s.offsetY = parseInt(document.getElementById('curY').value);
    document.getElementById('valScale').innerText = s.scale.toFixed(2); document.getElementById('valX').innerText = s.offsetX; document.getElementById('valY').innerText = s.offsetY;
    s.preRenderedCanvas = s.preRenderedSketch = null; if(!isPlaying) drawFrame(audioEl.currentTime);
}

function checkReady() {
  const ready = !!audioFile && slots.filter(s => s.file).length >= 4;
  document.getElementById('btnStart').disabled = !ready;
  const m = document.getElementById('statusMsg');
  if(ready) { m.textContent = '✓ 준비완료'; m.className = 'ok'; }
  else { m.textContent = `음악 및 이미지(${4-slots.filter(s=>s.file).length}장 더) 필요`; m.className = 'warn'; }
}

// ─── RENDER ENGINE ──────────────────────────────────────
function applyOilStyle(id, bri) {
    const d = id.data; for (let i = 0; i < d.length; i += 4) {
        let r = d[i], g = d[i+1], b = d[i+2], avg = (r+g+b)/3, sat = 1.35;
        d[i]=Math.min(255,(avg+(r-avg)*sat)*bri+5); d[i+1]=Math.min(255,(avg+(g-avg)*sat)*bri+5); d[i+2]=Math.min(255,(avg+(b-avg)*sat)*bri);
    }
}
function applyWatercolorStyle(id, bri) {
    const d = id.data; for (let i = 0; i < d.length; i += 4) {
        const r=d[i]*bri, g=d[i+1]*bri, b=d[i+2]*bri, gray=r*0.299+g*0.587+b*0.114, mix=0.3;
        d[i]=r*(1-mix)+gray*mix+20; d[i+1]=g*(1-mix)+gray*mix+20; d[i+2]=b*(1-mix)+gray*mix+30;
    }
}

function preRenderSlot(slot, w, h) {
    if (slot.preRenderedCanvas) return;
    const tc = document.createElement('canvas'); tc.width = w; tc.height = h; const tx = tc.getContext('2d');
    tx.fillStyle = '#f4f4f4'; tx.fillRect(0,0,w,h);
    const img = slot.img, cs = Math.max(w/img.width, h/img.height), s = cs * slot.scale;
    const dw = img.width * s, dh = img.height * s, dx = (w-dw)/2 + slot.offsetX, dy = (h-dh)/2 + slot.offsetY;
    tx.drawImage(img, dx, dy, dw, dh);
    const id = tx.getImageData(0,0,w,h);
    if(slot.style === 'watercolor') applyWatercolorStyle(id, 1.0);
    else if(slot.style === 'impressionism') applyOilStyle(id, 1.3);
    else applyOilStyle(id, 1.0);
    tx.putImageData(id, 0, 0); slot.preRenderedCanvas = tc;
}

// ─── [v18.23 핵심 픽스] preRenderSketch 변경 ───
function preRenderSketch(slot, w, h) {
    if(slot.preRenderedSketch) return;
    const tc = document.createElement('canvas'); tc.width = w; tc.height = h; const tx = tc.getContext('2d');
    
    // styled canvas를 grayscale로 변환하여 에지 검출용으로 사용
    const tcEdge = document.createElement('canvas'); tcEdge.width = w; tcEdge.height = h; const txEdge = tcEdge.getContext('2d');
    txEdge.filter = 'grayscale(1) contrast(1.8)'; // 에지 강조
    txEdge.drawImage(slot.preRenderedCanvas, 0, 0);
    txEdge.filter = 'none';
    
    const idEdge = txEdge.getImageData(0,0,w,h), dEdge = idEdge.data;
    
    // 바탕 그리기 (흰색 칠판)
    tx.fillStyle = '#f4f4f4'; tx.fillRect(0,0,w,h);
    
    // 연필 질감 그리기 (에지 기반)
    tx.strokeStyle = 'rgba(60,60,60,0.5)'; // 옅은 흑백 스케치선
    tx.lineWidth = 1.0;
    for(let i=0; i<60000; i++) {
        let x = Math.floor(Math.random()*w), y = Math.floor(Math.random()*h);
        if(dEdge[(y*w+x)*4] < Math.random()*200) {
            tx.save(); tx.translate(x, y); tx.rotate(Math.random()*Math.PI);
            tx.beginPath(); tx.moveTo(-3,0); tx.lineTo(3,0); tx.stroke(); tx.restore();
        }
    }
    
    // [v18.23 픽스] 각진 마스크 가리기 삭제 (레터박스/필러박스 제거)
    // tx.fillRect(0,0,w,py)... <- 이 코드를 삭제하여 전체 화면이 연필 스케치로 채워짐

    slot.preRenderedSketch = tc;
}

function drawWobblyWipe(mx, w, h, st, et) {
    const ang = (aspectStr === "16_9" ? Math.PI/6 : Math.PI/3);
    const sw = Math.max(w, h)*1.6, sh = Math.max(w, h)*1.6, sx = -sw/2, sy = -sh/2;
    const bs = Math.min(w,h) * 0.25; 
    const sweeps = Math.ceil(sh/(bs * (aspectStr === "16_9" ? 0.65 : 0.8))), rh = sh/sweeps, td = sweeps*sw, cd = et*td, pd = st*td;
    mx.save(); mx.translate(w/2, h/2); mx.rotate(ang);
    mx.lineCap = 'round'; mx.lineJoin = 'round'; mx.lineWidth = bs; mx.strokeStyle = '#fff'; mx.beginPath();
    let acc = 0, started = false;
    for(let i=0; i<sweeps; i++) {
        let l2r = (i%2===0), x0 = l2r?sx:sx+sw, y = sy+i*rh+rh/2;
        if(i>0) { acc += rh; if(acc > pd && !started) { started = true; mx.moveTo(x0, y-rh); }
            if(started) { if(acc > cd) { mx.lineTo(x0, y-rh+(cd-(acc-rh))); acc = cd; break; } mx.lineTo(x0, y); }
        }
        for(let j=1; j<=40; j++) {
            acc += sw/40; let pxs = l2r?x0+j*(sw/40):x0-j*(sw/40), wy = (aspectStr === "16_9" ? (Math.sin(pxs/60)*40 + Math.cos(pxs/30)*20) : (Math.sin(pxs/40)*30 + Math.cos(pxs/20)*15));
            if(acc > pd && !started) { started = true; mx.moveTo(pxs, y+wy); }
            if(started) { if(acc > cd) { let rem = cd-(acc-sw/40), rxs = l2r?x0+(j-1)*(sw/40)+rem:x0-(j-1)*(sw/40)-rem;
                mx.lineTo(rxs, y+(aspectStr === "16_9" ? (Math.sin(rxs/60)*40+Math.cos(rxs/30)*20) : (Math.sin(rxs/40)*30+Math.cos(rxs/20)*15))); acc = cd; break; } mx.lineTo(pxs, y+wy); }
        } if(acc >= cd) break;
    } mx.stroke(); mx.restore();
}

// ─── MAIN DRAW LOOP ──────────────────────────────────────
function drawFrame(ct) {
  const sl = slots.find(s => ct >= s.start && ct < s.end) || slots.filter(s=>s.file).pop();
  if (!sl || !sl.img) return; preRenderSlot(sl, W, H); preRenderSketch(sl, W, H);
  const elapsedT = ct-sl.start;
  const tSlot = Math.min(1, Math.max(0, (elapsedT)/(sl.end-sl.start || 1)));
  const RS = 0.8, pP = Math.min(1, tSlot/RS), vO = tSlot<RS?0:(tSlot-RS)/(1-RS);
  if (elapsedT === 0 || prevDist > pP) { mctx.clearRect(0,0,W,H); prevDist = 0; }
  
  // 1. [v18.23 픽스] 스케치 배경 그리기 (이제 캔버스 전체가 스케치로 채워짐)
  ctx.drawImage(sl.preRenderedSketch, 0, 0); 
  
  // 2. 누적 지우개 마스크 그리기
  if (pP > prevDist) { drawWobblyWipe(mctx, W, H, prevDist, pP); prevDist = pP; }
  
  // 3. [v18.23 픽스] 비네팅 영역 컨트롤 수정
  // 이전의 딱딱한 레터박스 여백을 제거하고, 전체 화면에 유기적인 비네팅만 적용
  if (vO > 0) {
      // 80% 이후에만 그라데이션 비네팅이 서서히 짙어지며 통합됨 (소스-오버)
      mctx.globalCompositeOperation = 'source-over';
      const rad = Math.max(W,H)*(0.45 + vO*0.55); // 그라데이션 반지름 조정
      const gradM = mctx.createRadialGradient(W/2, H/2, rad*0.2, W/2, H/2, rad);
      gradM.addColorStop(0, 'rgba(255,255,255,1)'); // 중앙은 컬러
      gradM.addColorStop(0.7 + vO*0.2, 'rgba(255,255,255,1)'); // 그라데이션 시작점 조절
      gradM.addColorStop(1, 'rgba(255,255,255,0)'); // 가장자리는 투명하게 스케치 배경 노출
      mctx.fillStyle = gradM;
      mctx.fillRect(0, 0, W, H);
  } else {
      // 80% 이전에는 지우개로 닦인 흰색 영역만 마스크로 유지
  }

  // 4. 합성
  cctx.clearRect(0,0,W,H); 
  cctx.drawImage(maskCanvas, 0, 0); 
  cctx.globalCompositeOperation = 'source-in'; // 마스크 영역에만 컬러 이미지
  cctx.drawImage(sl.preRenderedCanvas, 0, 0); 
  cctx.globalCompositeOperation = 'source-over';

  // 5. 최종 출력 (Fluid Letterbox 통합)
  ctx.drawImage(compCanvas, 0, 0); 
  
  // HUD (Vignette에 가려지지 않게 최상단)
  ctx.save(); ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '500 24px DM Mono, monospace'; ctx.fillText(STYLE_LABELS[sl.style], 36, H - 36); ctx.restore();
}

// ─── RECORDING ──────────────────────────────────────────
async function startSession() {
  recordedChunks = []; const stream = canvas.captureStream(24);
  const audioCtx = new AudioContext(), dest = audioCtx.createMediaStreamDestination(), source = audioCtx.createMediaElementSource(audioEl);
  source.connect(dest); source.connect(audioCtx.destination); stream.addTrack(dest.stream.getAudioTracks()[0]);
  mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9', videoBitsPerSecond: 15000000 });
  mediaRecorder.ondataavailable = e => { if(e.data.size>0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const url = URL.createObjectURL(new Blob(recordedChunks, {type:'video/webm'})), a = document.createElement('a');
    a.href = url; a.download = `Spectrum_v18.23_${aspectStr}_${Date.now()}.webm`; a.click();
  };
  mediaRecorder.start(100); audioEl.currentTime = 0; audioEl.play(); isPlaying = true;
  document.getElementById('statusDot').className = 'status-dot recording'; document.getElementById('recBadge').classList.add('visible');
  function loop() { if(!isPlaying) return; drawFrame(audioEl.currentTime); document.getElementById('progBar').value = (audioEl.currentTime/audioDuration*100); document.getElementById('currTime').textContent = fmtTime(audioEl.currentTime); animFrameId = requestAnimationFrame(loop); } loop();
}

function stopSession() { isPlaying = false; cancelAnimationFrame(animFrameId); audioEl.pause(); if(mediaRecorder) mediaRecorder.stop(); document.getElementById('statusDot').className = 'status-dot active'; document.getElementById('recBadge').classList.remove('visible'); document.getElementById('btnStart').disabled = false; }
document.getElementById('btnStart').onclick = startSession;
document.getElementById('btnStop').onclick = stopSession;
function fmtTime(s) { const m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${String(sec).padStart(2,'0')}`; }
function seekTime(v) { if(!audioDuration) return; audioEl.currentTime = (v/100)*audioDuration; drawFrame(audioEl.currentTime); }
</script>
