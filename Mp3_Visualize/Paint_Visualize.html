<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SPECTRUM ART LAB v18.25 — The Complete Fix</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#050505; --panel:#0d0d12; --accent:#00ffcc; --border:rgba(255,255,255,0.08); --text:#ffffff; }
body{ background:var(--bg); color:var(--text); font-family:sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo{letter-spacing:4px; color:var(--accent); font-weight:800; font-size:12px;}

.container { display: grid; grid-template-columns: 350px 1fr 340px; flex: 1; min-height: 0; }
.side-panel { background: var(--panel); padding: 15px; overflow-y: auto; border-right: 1px solid var(--border); }
.side-panel.right { border-right:none; border-left: 1px solid var(--border); }

.seq-item { background: #16161d; padding: 12px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #222; cursor: pointer; transition: 0.2s; }
.seq-item.active { border-color: var(--accent); background: #1a2523; box-shadow: 0 0 10px rgba(0,255,204,0.1); }
.seq-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.time-input { background:#000; border:1px solid #444; color:var(--accent); width:65px; padding:4px; font-size:12px; text-align:center; border-radius:4px; font-family:monospace; }
.time-input:focus { border-color:var(--accent); outline:none; }
.seq-style-row { display: flex; gap:5px; margin-top:5px; }

.viz-area { background: #000; flex: 1; display: flex; justify-content: center; align-items: center; overflow:hidden; }
canvas { box-shadow: 0 0 50px rgba(0,0,0,1); }

h3 { font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 10px; cursor: pointer; font-size: 11px; border-radius: 4px; width: 100%; margin-bottom: 5px; transition: 0.2s; }
.btn:hover { background: rgba(255,255,255,0.05); }
.btn.primary { background: var(--accent); color: #000; font-weight: bold; border:none; margin-top:10px; padding:12px;}
.btn.primary:hover { background: #00e6b8; }
.btn.active { border-color: var(--accent); color: var(--accent); }

input[type=range] { width: 100%; accent-color: var(--accent); height: 4px; cursor: pointer; margin-bottom: 10px;}
label { font-size: 9px; color: #888; display:block; margin-bottom:3px; margin-top:8px;}
select { width:100%; background:#000; color:var(--accent); border:1px solid #333; font-size:11px; padding:6px; border-radius:4px; margin-bottom:8px;}
.val-label { float: right; color: var(--accent); font-weight: bold; }

#audioInfo { font-family: monospace; font-size: 11px; color: #ffcc00; margin-bottom: 15px; padding: 8px; background: rgba(255,204,0,0.1); border-radius: 4px; display: none; text-align: center;}
</style>
</head>
<body>

<div class="topbar">
    <div class="logo">SPECTRUM ART LAB v18.25 [FIXED]</div>
    <div id="status" style="font-size:10px; color:var(--accent);">STANDBY</div>
</div>

<div class="container">
    <div class="side-panel">
        <h3>1. Audio & Sequence</h3>
        <button class="btn" onclick="document.getElementById('mIn').click()">🎵 LOAD MP3 AUDIO</button>
        <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleMusic(this.files)">
        
        <div id="audioInfo">TOTAL AUDIO: 0.0s (00:00)</div>

        <button class="btn primary" onclick="document.getElementById('iIn').click()">🖼️ ADD IMAGE</button>
        <input type="file" id="iIn" accept="image/*" style="display:none" onchange="handleImageAdd(this.files)">
        
        <div id="sequenceList" style="margin-top:20px;"></div>
    </div>

    <div class="viz-area" id="vArea"></div>

    <div class="side-panel right">
        <h3>2. Viewport & Canvas</h3>
        <div style="display: flex; gap:5px; margin-bottom:10px;">
            <button class="btn active" id="b169" onclick="setAspect('16:9')">16:9 Landscape</button>
            <button class="btn" id="b916" onclick="setAspect('9:16')">9:16 Portrait</button>
        </div>
        <div style="display: flex; align-items:center; gap:10px; margin-bottom:15px;">
            <label style="margin:0;">BG COLOR</label>
            <input type="color" id="canvasBg" value="#f4f4f4" style="height:25px; border:none; cursor:pointer;">
        </div>

        <h3>3. Rendering Engine FX</h3>
        <label>DRAWING FOCUS</label>
        <select id="drawDirection">
            <option value="diagonal">대각선 지우개 (Diagonal Master)</option>
            <option value="horizontal">좌우 지우개 (Horizontal ZigZag)</option>
            <option value="global">중앙 확산 (Center Expand)</option>
        </select>

        <label>PHASE CONTROL (작화 모드)</label>
        <select id="drawingPhase">
            <option value="auto">100% 자동 완성 진행 (Wipe to 80%)</option>
            <option value="sketch">강제: 스케치 배경 유지</option>
            <option value="finish">강제: 풀 컬러 아트 유지</option>
        </select>

        <label>BRUSH SCALE (지우개 굵기) <span class="val-label" id="valBScale">1.0</span></label>
        <input type="range" id="paintScale" min="0.1" max="5.0" step="0.1" value="1.0" oninput="document.getElementById('valBScale').innerText=this.value">
        
        <label>TRAIL (잔상) <span class="val-label" id="valT">0.0</span></label>
        <input type="range" id="trail" min="0" max="0.25" step="0.01" value="0" oninput="document.getElementById('valT').innerText=this.value">

        <h3>4. Active Transform</h3>
        <div id="seqUI" style="opacity: 0.3; pointer-events: none; background:#111; padding:10px; border-radius:8px;">
            <label>IMAGE SCALE <span id="txtS" class="val-label">1.0</span></label>
            <input type="range" id="curScale" min="0.1" max="4.0" step="0.05" value="1.0" oninput="updateCurSeq()">
            <label>OFFSET X <span id="txtX" class="val-label">0</span></label>
            <input type="range" id="curX" min="-800" max="800" value="0" oninput="updateCurSeq()">
            <label>OFFSET Y <span id="txtY" class="val-label">0</span></label>
            <input type="range" id="curY" min="-800" max="800" value="0" oninput="updateCurSeq()">
        </div>

        <button class="btn primary" id="recBtn" onclick="togglePlay()" style="margin-top:20px; background:#ff3e81; color:white;">🔴 START REC & AUTO SAVE</button>
        <div style="display:flex; gap:5px; margin-top:5px;">
            <button class="btn" onclick="clearCanvas()">CLEAR CANVAS</button>
            <button class="btn" onclick="saveArt()">SAVE PNG</button>
        </div>
    </div>
</div>

<div class="playbar" style="height:60px; background:var(--panel); border-top:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:15px;">
    <span id="currTime" style="font-size:14px; color:var(--accent); font-family:monospace; min-width:45px;">00:00</span>
    <input type="range" id="progBar" value="0" min="0" max="100" step="0.1" style="flex:1;" oninput="seekTime(this.value)">
    <span id="totalTime" style="font-size:14px; color:#888; font-family:monospace; min-width:45px;">00:00</span>
</div>

<audio id="audioEl" style="display:none;"></audio>

<script>
let audio, analyser, isPlaying = false, sequences = [], currentActiveIdx = -1;
let aspect = '16:9', canvasW = 1280, canvasH = 720;
let recorder, recordedChunks = [];

// 버퍼 (렌더링 최적화)
let paintBuffer, maskBuffer, vignetteBuffer;
let prevDist = 0;

function setup() {
    let cnv = createCanvas(canvasW, canvasH);
    cnv.parent('vArea');
    pixelDensity(1);
    
    // 버퍼 초기화 (FHD 고화질 유지)
    paintBuffer = createGraphics(canvasW, canvasH);
    maskBuffer = createGraphics(canvasW, canvasH);
    vignetteBuffer = createGraphics(canvasW, canvasH);
    paintBuffer.pixelDensity(1);
    maskBuffer.pixelDensity(1);
    vignetteBuffer.pixelDensity(1);
    
    // [핵심] 비네팅 버퍼 생성 (Target image 2번 스타일 그라데이션)
    generateVignetteBuffer();
    
    clearCanvas();
    analyser = new p5.FFT();
}

function generateVignetteBuffer() {
    let v = vignetteBuffer;
    v.clear();
    v.noStroke();
    
    // 중앙에서 외부로 검은색 그라데이션 (사각형 테두리 마스크 삭제)
    let maxDist = max(width, height) * 0.85;
    for(let r = 0; r < maxDist; r += 2) {
        let alpha = map(r, 0, maxDist, 0, 240); // 가장자리가 94% 어두워짐
        v.fill(0, alpha);
        v.ellipse(width/2, height/2, maxDist*2 - r*1.5);
    }
}

function handleMusic(files) {
    if(!files[0]) return;
    audio = loadSound(URL.createObjectURL(files[0]), (b)=>{
        let dur = audio.duration();
        document.getElementById('totalTime').innerText = formatTime(dur);
        document.getElementById('progBar').max = dur;
        document.getElementById('status').innerText = "AUDIO LOADED";
        
        let infoDiv = document.getElementById('audioInfo');
        infoDiv.style.display = "block";
        infoDiv.innerText = `TOTAL AUDIO: ${dur.toFixed(1)}s (${formatTime(dur)})`;

        audio.onended(() => { if(isPlaying) stopAndSave(); });
    });
}

function handleImageAdd(files) {
    if(!files[0]) return;
    loadImage(URL.createObjectURL(files[0]), (img) => {
        let lastEnd = sequences.length > 0 ? sequences[sequences.length-1].end : 0;
        let newSeq = {
            img: img, name: files[0].name,
            start: lastEnd, end: lastEnd + 10,
            style: 'oil', scale: 1.0, x: 0, y: 0,
            artBuffer: null, // [v18.25 핵심] 캐시 버퍼 추가
            sketchBuffer: null
        };
        sequences.push(newSeq);
        currentActiveIdx = sequences.length - 1;
        processImageData(newSeq);
        renderSeqList();
        enableUI(true);
    });
}

function renderSeqList() {
    const list = document.getElementById('sequenceList');
    list.innerHTML = "";
    sequences.forEach((s, i) => {
        let div = document.createElement('div');
        div.className = `seq-item ${i === currentActiveIdx ? 'active' : ''}`;
        div.onclick = () => selectSeq(i);
        
        div.innerHTML = `
            <div class="seq-info">
                <span style="font-size:12px; color:#fff; font-weight:bold;">${i+1}. ${s.name}</span>
                <div style="display:flex; align-items:center; gap:5px;">
                    <input class="time-input" type="number" step="0.1" value="${s.start.toFixed(1)}" onchange="updateSeqStart(${i}, this.value)">
                    <input class="time-input" type="number" step="0.1" value="${s.end.toFixed(1)}" onchange="cascadeTime(${i}, this.value)">
                </div>
            </div>
            <div class="seq-style-row">
                <button class="btn ${s.style==='oil'?'active':''}" onclick="setSeqStyle(${i}, 'oil')">유채화</button>
                <button class="btn ${s.style==='sketch'?'active':''}" onclick="setSeqStyle(${i}, 'sketch')">연필화</button>
                <button class="btn ${s.style==='point'?'active':''}" onclick="setSeqStyle(${i}, 'point')">점묘화</button>
            </div>
        `;
        list.appendChild(div);
    });
}

function setSeqStyle(idx, style) {
    sequences[idx].style = style;
    // [v18.25 핵심] 스타일 변경 시 버퍼 캐시 초기화
    sequences[idx].artBuffer = null;
    sequences[idx].sketchBuffer = null;
    renderSeqList();
    if(!isPlaying) drawGhostPreview();
}

function selectSeq(i) {
    currentActiveIdx = i;
    enableUI(true);
    let s = sequences[i];
    document.getElementById('curScale').value = s.scale;
    document.getElementById('curX').value = s.x;
    document.getElementById('curY').value = s.y;
    document.getElementById('txtS').innerText = s.scale;
    document.getElementById('txtX').innerText = s.x;
    document.getElementById('txtY').innerText = s.y;
    renderSeqList();
    if(!isPlaying) drawGhostPreview();
}

function updateCurSeq() {
    if(currentActiveIdx < 0) return;
    let s = sequences[currentActiveIdx];
    s.scale = Number(document.getElementById('curScale').value);
    s.x = Number(document.getElementById('curX').value);
    s.y = Number(document.getElementById('curY').value);
    document.getElementById('txtS').innerText = s.scale;
    document.getElementById('txtX').innerText = s.x;
    document.getElementById('txtY').innerText = s.y;
    // [v18.25 핵심] 트랜스폼 변경 시 버퍼 캐시 초기화
    s.artBuffer = null;
    s.sketchBuffer = null;
    if(!isPlaying) drawGhostPreview();
}

function draw() {
    let t = isPlaying && audio ? audio.currentTime() : Number(document.getElementById('progBar').value);
    document.getElementById('currTime').innerText = formatTime(t);
    document.getElementById('progBar').value = t;

    if(!isPlaying) return;

    let idx = sequences.findIndex(s => t >= s.start && t <= s.end);
    if(idx !== -1) {
        if(idx !== currentActiveIdx) {
            currentActiveIdx = idx;
            renderSeqList();
            // 슬롯 변경 시 버퍼 초기화
            paintBuffer.clear(); 
            prevDist = 0;
        }
        let s = sequences[idx];
        
        // [핵심] FHD 프리렌더링 버퍼 준비 (속도 유지)
        if (!s.artBuffer) preRenderArtBuffers(s);

        // 시간 진행률 (80% 룰)
        let prog = (t - s.start) / (s.end - s.start);
        let zigProg = min(1.0, prog / 0.8); // 80% 완결

        let phaseMode = document.getElementById('drawingPhase').value;
        if(phaseMode === 'sketch') { image(s.sketchBuffer, 0, 0); return; }
        if(phaseMode === 'finish') { image(s.artBuffer, 0, 0); return; }

        // [v18.25 픽스] 스케치 배경 그리기 (딱딱한 액자 마스크 삭제됨)
        image(s.sketchBuffer, 0, 0); 

        // [핵심] 유기적 칠판 지우개 마스크 생성 (그라데이션 통합)
        maskBuffer.clear();
        maskBuffer.background(0);
        maskBuffer.fill(255);
        maskBuffer.noStroke();
        
        let pScale = Number(document.getElementById('paintScale').value);
        let eraserSize = (width * 0.15) * pScale; // 화면 너비의 15% 기준

        // 물리 지우개 연출 (유기적 노이즈 Blob 마스킹)
        let pathT = zigProg;
        let pathX = lerp(eraserSize*0.5, width - eraserSize*0.5, pathT);
        let pathY = lerp(eraserSize*0.5, height - eraserSize*0.5, pathT);
        
        // 불규칙 사선 지우개 Blob 그리기
        if(zigProg > 0) {
            // [v18.25 픽스] 이전에 닦아낸 자취를 source-over로 누적하여 그림 (깜빡임 완벽 제거)
            maskBuffer.drawingContext.globalCompositeOperation = 'source-over';
            maskBuffer.noStroke(); maskBuffer.fill(255);
            // 수십 개의 둥근 덩어리로 유기적인 질감 생성
            let numBlobs = 100 * zigProg; 
            for(let i=0; i<numBlobs; i++) {
                let t_i = random(zigProg); // 지나온 경로상의 한 점
                let bx = lerp(eraserSize*0.5, width - eraserSize*0.5, t_i) + random(-eraserSize/2, eraserSize/2);
                let by = lerp(eraserSize*0.5, height - eraserSize*0.5, t_i) + random(-eraserSize/2, eraserSize/2);
                let bSize = eraserSize * random(0.8, 1.4);
                maskBuffer.ellipse(bx, by, bSize, bSize);
            }
        }
        
        // 지우개 헤드 바운스
        let bounce = audio ? (analyser.getEnergy("bass") / 255) * 20 : 0; 
        maskBuffer.ellipse(pathX, pathY + bounce, eraserSize * 1.5);

        // [v18.25 픽스] 마스크 합성 (Composed Buffer)
        // 1. 소스-인 합성으로 컬러 아트 추출
        paintBuffer.clear();
        paintBuffer.image(maskBuffer, 0, 0); // 바탕이 검고 지우개 경로만 흰색
        paintBuffer.drawingContext.globalCompositeOperation = 'source-in'; // 마스크의 흰색 영역에만 컬러 아트를 채움
        paintBuffer.image(s.artBuffer, 0, 0);
        paintBuffer.drawingContext.globalCompositeOperation = 'source-over'; // 원상복구

        // 최종 출력 (배경 스케치 위에 지워진 컬러 아트 덮기)
        image(paintBuffer, 0, 0);

        // 2. [v18.25 픽스] 비네팅 그라데이션 복구 & 통합
        // 비네팅은 가장 마지막에 오버레이하여 스타일까지 자연스럽게 어둡게 만듭니다.
        image(vignetteBuffer, 0, 0);
    }
}

// [v18.25 핵심] FHD 프리렌더링 버퍼 생성 (스타일/트랜스폼 완벽 반영)
function preRenderArtBuffers(seq) {
    document.getElementById('status').innerText = "GENERATING BUFFERS...";
    
    let art = createGraphics(width, height);
    let sk = createGraphics(width, height);
    art.pixelDensity(1); sk.pixelDensity(1);
    
    // 바탕색 (딱딱한 액자 마스크 삭제됨)
    art.background(document.getElementById('canvasBg').value);
    sk.background(document.getElementById('canvasBg').value);

    // [v18.25 픽스] 스타일 처리된 이미지 생성
    art.imageMode(CENTER);
    art.push();
    art.translate(width/2 + seq.x, height/2 + seq.y);
    art.scale(seq.scale);
    
    // 에지 검출용 grayscale 이미지 (연필 스케치용)
    let tcEdge = createGraphics(width, height); tcEdge.pixelDensity(1);
    tcEdge.imageMode(CENTER); tcEdge.background(255);
    tcEdge.filter = 'grayscale(1) contrast(1.8)';
    tcEdge.image(seq.img, width/2 + seq.x, height/2 + seq.y, seq.img.width, seq.img.height);
    let dEdge = tcEdge.get(); dEdge.loadPixels();
    
    // [핵심] 스타일 픽셀 연산 (전체 화면 대상)
    seq.img.loadPixels();
    let p = seq.img.pixels;
    let strokes = seq.style === 'point' ? 100000 : 80000;
    
    art.noStroke();
    for(let i=0; i<strokes; i++) {
        let x = floor(random(width)), y = floor(random(height));
        // 이미지 트랜스폼(Scale/Offset)을 반영한 픽셀 매핑
        let imgX = floor(map(x, width/2+seq.x - (width/2)*seq.scale, width/2+seq.x + (width/2)*seq.scale, 0, seq.img.width));
        let imgY = floor(map(y, height/2+seq.y - (height/2)*seq.scale, height/2+seq.y + (height/2)*seq.scale, 0, seq.img.height));
        
        if (imgX < 0 || imgX >= seq.img.width || imgY < 0 || imgY >= seq.img.height) continue;
        let idx = (imgY * seq.img.width + imgX) * 4;
        if (p[idx+3] < 50) continue; // 투명 픽셀 패스

        let r = p[idx], g = p[idx+1], b = p[idx+2];
        
        art.push();
        art.translate(x, y);
        let bSize = 10 * seq.scale; 

        if(seq.style === 'oil') {
            art.fill(r+random(-10,10), g+random(-10,10), b+random(-10,10), 230);
            art.rotate(random(TWO_PI));
            art.rect(-bSize, -bSize*0.3, bSize*2, bSize*0.6, 3);
        } else if(seq.style === 'sketch') {
            let lum = (0.299*r + 0.587*g + 0.114*b);
            if(lum < 160) {
                art.stroke(r*0.4, 180); art.strokeWeight(1.0*seq.scale);
                art.rotate(PI/4 + random(0.2)); art.line(-bSize, 0, bSize, 0);
            }
        } else if(seq.style === 'point') {
            art.fill(r, g, b, 255); art.ellipse(0,0, bSize*1.2);
        }
        art.pop();
    }
    tcEdge.remove();

    // 연필 스케치 배경 생성
    sk.drawingContext.filter = 'grayscale(1) contrast(1.5)';
    sk.image(seq.img, width/2 + seq.x, height/2 + seq.y, seq.img.width, seq.img.height);
    sk.drawingContext.filter = 'none';
    let dSk = sk.get(); dSk.loadPixels();
    
    sk.fillStyle = document.getElementById('canvasBg').value; sk.fillRect(0,0,width,height);
    sk.stroke(60, 100); sk.strokeWeight(1.0);
    for(let i=0; i<60000; i++) {
        let x = floor(random(width)), y = floor(random(height));
        if(dSk[(y*width+x)*4] < random(200)) {
            sk.push(); sk.translate(x, y); sk.rotate(random(PI));
            let l = 3 + random(5); sk.line(-l, 0, l, 0); sk.pop();
        }
    }
    
    seq.artBuffer = art;
    seq.sketchBuffer = sk;
    document.getElementById('status').innerText = "PLAYING...";
}

// DRAG & GHOST PREVIEW (v18.25 픽스)
function drawGhostPreview() {
    clearCanvas();
    if(currentActiveIdx !== -1) {
        let s = sequences[currentActiveIdx];
        if(!s.artBuffer) preRenderArtBuffers(s);
        // ghost preview는 full color 아트에 옅은 투명도를 줘서 보여줌
        tint(255, 128); image(s.artBuffer, 0, 0); noTint();
        image(vignetteBuffer, 0, 0); // vignette preview
    }
}

// 기본 유틸리티 함수들
function setAspect(r) {
    aspect = r;
    document.getElementById('b169').classList.toggle('active', r==='16:9');
    document.getElementById('b916').classList.toggle('active', r==='9:16');
    if(r==='16:9') { canvasW = 1280; canvasH = 720; } else { canvasW = 720; canvasH = 1280; }
    resizeCanvas(canvasW, canvasH);
    paintBuffer.resizeCanvas(canvasW, canvasH);
    maskBuffer.resizeCanvas(canvasW, canvasH);
    vignetteBuffer.resizeCanvas(canvasW, canvasH);
    generateVignetteBuffer();
    // 비율 변경 시 모든 캐시 초기화
    sequences.forEach(s => { s.artBuffer=null; s.sketchBuffer=null; });
    clearCanvas(); if(!isPlaying) drawGhostPreview();
}
function enableUI(on) { let ui = document.getElementById('seqUI'); ui.style.opacity = on ? "1" : "0.3"; ui.style.pointerEvents = on ? "all" : "none"; }
function formatTime(s) { let m=floor(s/60), sec=floor(s%60); return `${nf(m,2)}:${nf(sec,2)}`; }
function togglePlay() { if(!audio) return; isPlaying ? stopAndSave() : (clearCanvas(), startRecording(), audio.play(), isPlaying=true, document.getElementById('status').innerText="RECORDING..."); }
function startRecording() { recordedChunks = []; let stream = document.querySelector('canvas').captureStream(30); recorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' }); recorder.ondataavailable = e => recordedChunks.push(e.data); recorder.onstop = () => { let blob = new Blob(recordedChunks, { type: 'video/mp4' }); let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `ArtLab_v18.25_${Date.now()}.mp4`; a.click(); document.getElementById('status').innerText="SAVED!"; }; recorder.start(); }
function clearCanvas() { background(document.getElementById('canvasBg').value); }
function updateSeqStart(idx, val) { sequences[idx].start = Number(val); renderSeqList(); }
function cascadeTime(idx, val) { sequences[idx].end = Number(val); sequences.slice(idx+1).reduce((prev, curr) => (curr.start=prev.end, curr.end=prev.end+(sequences[idx].end-sequences[idx].start), curr), sequences[idx]); renderSeqList(); }
function seekTime(v) { if(!audio) return; audio.jump(Number(v)); if(!isPlaying) drawGhostPreview(); }
function processImageData(seq) { /* [Deprecated] FHD 캐싱 버퍼로 대체됨 */ }
function saveArt() { saveCanvas('Masterpiece', 'png'); }
</script>
