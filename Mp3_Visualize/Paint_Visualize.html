<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 Music/Video v1.02</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: rgba(255,255,255,0.08);
    --accent: #c084fc;
    --accent2: #818cf8;
    --text: #f1f0ff;
    --muted: #888;
    --green: #4ade80;
    --red: #f87171;
    --amber: #fbbf24;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--surface);
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.03em;
  }

  header .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  header .status-dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.5s infinite; }
  header .status-dot.recording { background: var(--red); box-shadow: 0 0 8px var(--red); animation: pulse 0.8s infinite; }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  .layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    height: calc(100vh - 65px);
  }

  .panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 1.2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface2);
    position: relative;
  }
  .upload-zone:hover { border-color: var(--accent); background: rgba(192,132,252,0.05); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-zone .icon { font-size: 1.5rem; margin-bottom: 0.4rem; }
  .upload-zone p { font-size: 0.75rem; color: var(--muted); }
  .upload-zone span { font-size: 0.7rem; color: var(--accent); }

  .file-info {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .file-info .fi-name { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-info .fi-dur { color: var(--accent); white-space: nowrap; }

  .image-slot {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
    transition: border-color 0.2s;
  }
  .image-slot.has-image { border-color: rgba(192,132,252,0.3); }

  .slot-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .slot-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem;
    color: var(--muted);
    flex-shrink: 0;
  }
  .slot-thumb {
    width: 40px; height: 32px;
    border-radius: 4px;
    object-fit: cover;
    border: 1px solid var(--border);
  }
  .slot-name { font-size: 0.72rem; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .slot-add-btn {
    background: none;
    border: 1px dashed var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    padding: 0.4rem 0.7rem;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .slot-add-btn:hover { border-color: var(--accent); color: var(--accent); }

  .time-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
    align-items: center;
  }
  .time-field {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }
  .time-field label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .time-field input[type="number"] {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 0.4rem 0.6rem;
    width: 100%;
    transition: border-color 0.2s;
  }
  .time-field input[type="number"]:focus { outline: none; border-color: var(--accent); }

  .style-row {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }
  .style-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    font-size: 0.62rem;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    padding: 0.3rem 0.65rem;
    transition: all 0.18s;
    letter-spacing: 0.04em;
  }
  .style-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .style-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .action-bar {
    display: flex;
    gap: 0.75rem;
    margin-top: auto;
    padding-top: 0.5rem;
  }

  .btn-start {
    flex: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-start:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-start:active { transform: translateY(0); }
  .btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-stop {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 8px;
    color: var(--red);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 0.85rem 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }
  .btn-stop:hover { background: rgba(248,113,113,0.2); }
  .btn-stop.visible { display: block; }

  .canvas-area {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  #mainCanvas {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  .canvas-overlay {
    position: absolute;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    pointer-events: none;
  }

  .progress-bar-wrap {
    width: 300px;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.1s linear;
    width: 0%;
  }

  .time-display {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.06em;
  }

  .rec-badge {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: rgba(248,113,113,0.15);
    border: 1px solid rgba(248,113,113,0.4);
    border-radius: 20px;
    padding: 0.3rem 0.75rem;
    font-size: 0.65rem;
    color: var(--red);
    letter-spacing: 0.08em;
    display: none;
    align-items: center;
    gap: 0.4rem;
  }
  .rec-badge.visible { display: flex; }
  .rec-dot { width:6px; height:6px; border-radius:50%; background: var(--red); animation: pulse 0.8s infinite; }

  .empty-hint {
    color: var(--muted);
    font-size: 0.75rem;
    text-align: center;
    line-height: 1.8;
  }
  .empty-hint .big { font-size: 2.5rem; margin-bottom: 0.5rem; }

  .progress-log {
    position: absolute;
    top: 1rem;
    left: 1rem;
    background: rgba(0,0,0,0.6);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.6);
    max-width: 220px;
    display: none;
  }
  .progress-log.visible { display: block; }

  .slot-file-input { display: none; }
  .warn { color: var(--amber); font-size: 0.68rem; }
  .ok { color: var(--green); font-size: 0.68rem; }
</style>
</head>
<body>

<header>
  <div class="status-dot" id="statusDot"></div>
  <h1>🎵 Music Video Creator</h1>
  <span style="font-size:0.65rem;color:var(--muted);margin-left:auto;">FHD 1080p | 24 FPS Export</span>
</header>

<div class="layout">
  <div class="panel" id="panel">
    <div>
      <div class="section-label">01 — 음악 파일</div>
      <div class="upload-zone" id="audioZone">
        <input type="file" accept="audio/*" id="audioInput">
        <div class="icon">🎵</div>
        <p>MP3 파일을 드래그하거나 클릭하세요</p>
        <span>MP3, AAC, WAV 지원</span>
      </div>
      <div class="file-info" id="audioInfo" style="display:none;">
        <span style="font-size:1.2rem;">🎵</span>
        <span class="fi-name" id="audioName"></span>
        <span class="fi-dur" id="audioDur"></span>
      </div>
    </div>

    <div>
      <div class="section-label">02 — 이미지 슬롯 (4~5장)</div>
      <div id="imageSlots" style="display:flex;flex-direction:column;gap:0.75rem;"></div>
    </div>

    <div class="action-bar">
      <button class="btn-start" id="btnStart" disabled>▶ START &amp; RECORD</button>
      <button class="btn-stop" id="btnStop">■ STOP</button>
    </div>

    <p id="statusMsg" style="font-size:0.68rem;color:var(--muted);text-align:center;"></p>
  </div>

  <div class="canvas-area" id="canvasArea">
    <canvas id="mainCanvas" width="1920" height="1080"></canvas>

    <div class="empty-hint" id="emptyHint">
      <div class="big">🎨</div>
      음악과 이미지를 업로드하면<br>여기에 미리보기가 표시됩니다
    </div>

    <div class="rec-badge" id="recBadge">
      <div class="rec-dot"></div> REC 24fps
    </div>

    <div class="progress-log" id="progressLog"></div>

    <div class="canvas-overlay" id="canvasOverlay" style="display:none;">
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
    </div>
  </div>
</div>

<audio id="audioEl" style="display:none;"></audio>

<script>
// ─── STATE ──────────────────────────────────────────────
const NUM_SLOTS = 5;
let audioFile = null;
let audioDuration = 0;
let slots = Array.from({length: NUM_SLOTS}, (_,i) => ({
  file: null, img: null, dataUrl: null,
  start: 0, end: 0,
  style: 'watercolor',
  index: i,
  preRenderedCanvas: null 
}));

const STYLES = ['watercolor','oil','impressionism','abstract','anime'];
const STYLE_LABELS = { watercolor:'수채화', oil:'유채화', impressionism:'인상파', abstract:'추상파', anime:'애니메이션' };

let mediaRecorder = null;
let recordedChunks = [];
let animFrameId = null;
let isPlaying = false;

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const audioEl = document.getElementById('audioEl');

// 마스크 성능 최적화를 위한 전역 캔버스 (가비지 컬렉션 방지)
const maskCanvas = document.createElement('canvas');
maskCanvas.width = 1920; maskCanvas.height = 1080;
const mctx = maskCanvas.getContext('2d');

const compCanvas = document.createElement('canvas');
compCanvas.width = 1920; compCanvas.height = 1080;
const cctx = compCanvas.getContext('2d');

// ─── AUDIO UPLOAD ────────────────────────────────────────
document.getElementById('audioInput').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  audioFile = f;
  const url = URL.createObjectURL(f);
  audioEl.src = url;
  audioEl.addEventListener('loadedmetadata', () => {
    audioDuration = audioEl.duration;
    document.getElementById('audioDur').textContent = fmtTime(audioDuration);
    document.getElementById('audioName').textContent = f.name;
    document.getElementById('audioInfo').style.display = 'flex';
    document.getElementById('audioZone').style.display = 'none';
    autoFillSlotTimes();
    renderSlots();
    checkReady();
  }, {once: true});
});

function autoFillSlotTimes() {
  const filledSlots = slots.filter(s => s.file);
  if (filledSlots.length === 0) return;
  const dur = audioDuration;
  const n = filledSlots.length;
  const seg = dur / n;
  filledSlots.forEach((s, i) => {
    s.start = parseFloat((i * seg).toFixed(2));
    s.end = parseFloat(((i + 1) * seg).toFixed(2));
    const row = document.getElementById(`slot-row-${s.index}`);
    if (row) {
      const startEl = row.querySelector('.slot-start');
      const endEl = row.querySelector('.slot-end');
      if (startEl) startEl.value = s.start.toFixed(1);
      if (endEl) endEl.value = s.end.toFixed(1);
    }
  });
}

// ─── SLOT RENDERING ─────────────────────────────────────
function renderSlots() {
  const container = document.getElementById('imageSlots');
  container.innerHTML = '';
  slots.forEach((slot, i) => {
    const div = document.createElement('div');
    div.className = 'image-slot' + (slot.file ? ' has-image' : '');
    div.id = `slot-row-${i}`;

    div.innerHTML = `
      <div class="slot-header">
        <div class="slot-num">${i+1}</div>
        ${slot.img ? `<img class="slot-thumb" src="${slot.dataUrl}">` : ''}
        <span class="slot-name">${slot.file ? slot.file.name : '이미지 없음'}</span>
        <button class="slot-add-btn" data-slot="${i}">+ 업로드</button>
        <input type="file" accept="image/*" class="slot-file-input" id="slotInput-${i}">
      </div>
      ${slot.file ? `
      <div class="time-row">
        <div class="time-field">
          <label>시작 (초)</label>
          <input type="number" class="slot-start" value="${slot.start.toFixed(1)}" min="0" step="0.1" data-slot="${i}">
        </div>
        <div class="time-field">
          <label>종료 (초)</label>
          <input type="number" class="slot-end" value="${slot.end.toFixed(1)}" min="0" step="0.1" data-slot="${i}">
        </div>
      </div>
      <div>
        <div class="section-label" style="margin-bottom:0.4rem;">아트 스타일</div>
        <div class="style-row">
          ${STYLES.map(s => `<button class="style-btn ${slot.style===s?'active':''}" data-slot="${i}" data-style="${s}">${STYLE_LABELS[s]}</button>`).join('')}
        </div>
      </div>
      ` : ''}
    `;
    container.appendChild(div);

    div.querySelector('.slot-add-btn').addEventListener('click', () => {
      document.getElementById(`slotInput-${i}`).click();
    });
    document.getElementById(`slotInput-${i}`).addEventListener('change', e => {
      loadSlotImage(i, e.target.files[0]);
    });

    if (slot.file) {
      div.querySelector('.slot-start').addEventListener('change', e => {
        slots[i].start = parseFloat(e.target.value) || 0;
        checkReady();
      });
      div.querySelector('.slot-end').addEventListener('change', e => {
        slots[i].end = parseFloat(e.target.value) || 0;
        checkReady();
      });
      div.querySelectorAll('.style-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          slots[i].style = btn.dataset.style;
          slots[i].preRenderedCanvas = null;
          renderSlots();
        });
      });
    }
  });
}
renderSlots();

function loadSlotImage(idx, file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      slots[idx].file = file;
      slots[idx].img = img;
      slots[idx].dataUrl = e.target.result;
      slots[idx].preRenderedCanvas = null; 
      
      if (audioDuration > 0) autoFillSlotTimes(); 
      renderSlots(); 
      checkReady();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function checkReady() {
  const hasAudio = !!audioFile;
  const hasImages = slots.filter(s => s.file).length >= 4;
  const ready = hasAudio && hasImages;
  document.getElementById('btnStart').disabled = !ready;
  if (ready) {
    document.getElementById('statusMsg').textContent = `✓ 준비완료 — ${slots.filter(s=>s.file).length}개 이미지, ${fmtTime(audioDuration)}`;
    document.getElementById('statusMsg').className = 'ok';
  } else {
    const missing = [];
    if (!hasAudio) missing.push('음악 파일');
    if (!hasImages) missing.push(`이미지 ${4-slots.filter(s=>s.file).length}장 더 필요`);
    document.getElementById('statusMsg').textContent = missing.join(' · ');
    document.getElementById('statusMsg').className = 'warn';
  }
}

// ─── ART STYLE FILTERS ───────────────────────────────────
function applyStyle(imgData, style, w, h) {
  const d = imgData.data;
  if (style === 'watercolor') {
    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], g = d[i+1], b = d[i+2];
      const gray = r*0.299 + g*0.587 + b*0.114;
      const mix = 0.25;
      d[i]   = Math.min(255, r*(1-mix) + gray*mix + 8);
      d[i+1] = Math.min(255, g*(1-mix) + gray*mix + 8);
      d[i+2] = Math.min(255, b*(1-mix) + gray*mix + 12);
    }
  } else if (style === 'oil') {
    for (let i = 0; i < d.length; i += 4) {
      let r = d[i]/255, g = d[i+1]/255, b = d[i+2]/255;
      const avg = (r+g+b)/3; const sat = 1.5;
      r = avg + (r-avg)*sat; g = avg + (g-avg)*sat; b = avg + (b-avg)*sat;
      r = ((r-0.5)*1.3+0.5); g = ((g-0.5)*1.3+0.5); b = ((b-0.5)*1.3+0.5);
      d[i]   = Math.min(255,Math.max(0,r*255));
      d[i+1] = Math.min(255,Math.max(0,g*255));
      d[i+2] = Math.min(255,Math.max(0,b*255));
    }
  } else if (style === 'impressionism') {
    for (let i = 0; i < d.length; i += 4) {
      let r = d[i], g = d[i+1], b = d[i+2];
      const noise = (Math.random()-0.5)*18;
      d[i]   = Math.min(255, Math.max(0, r + noise + 10));
      d[i+1] = Math.min(255, Math.max(0, g + noise*0.6));
      d[i+2] = Math.min(255, Math.max(0, b + noise - 5));
    }
  } else if (style === 'abstract') {
    for (let i = 0; i < d.length; i += 4) {
      const levels = 5;
      d[i]   = Math.round(d[i]   / 255 * levels) / levels * 255;
      d[i+1] = Math.round(d[i+1] / 255 * levels) / levels * 255;
      d[i+2] = Math.round(d[i+2] / 255 * levels) / levels * 255;
    }
  } else if (style === 'anime') {
    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], g = d[i+1], b = d[i+2];
      const levels = 8;
      d[i]   = Math.round(r/255*levels)/levels*255;
      d[i+1] = Math.round(g/255*levels)/levels*255;
      d[i+2] = Math.round(b/255*levels)/levels*255;
      const gray = d[i]*0.3+d[i+1]*0.59+d[i+2]*0.11;
      d[i]   = Math.min(255,d[i]  *1.2 - gray*0.2);
      d[i+1] = Math.min(255,d[i+1]*1.2 - gray*0.2);
      d[i+2] = Math.min(255,d[i+2]*1.2 - gray*0.2);
    }
  }
  return imgData;
}

// ─── OPTIMIZED RENDER LOGIC (CACHING) ────────────────────
function preRenderSlotImage(slot, w, h) {
  if (slot.preRenderedCanvas) return slot.preRenderedCanvas;

  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = w; tempCanvas.height = h;
  const tempCtx = tempCanvas.getContext('2d');

  const img = slot.img;
  const scale = Math.max(w/img.width, h/img.height);
  const dw = img.width * scale, dh = img.height * scale;
  const dx = (w - dw)/2, dy = (h - dh)/2;
  
  tempCtx.drawImage(img, dx, dy, dw, dh);

  const imageData = tempCtx.getImageData(0,0,w,h);
  applyStyle(imageData, slot.style, w, h);
  tempCtx.putImageData(imageData, 0, 0);

  slot.preRenderedCanvas = tempCanvas;
  return tempCanvas;
}

// ─── VIGNETTE ────────────────────────────────────────────
function drawVignette(ctx, w, h, strength) {
  const rad = Math.max(w,h) * (0.35 + strength * 0.65);
  const grad = ctx.createRadialGradient(w/2, h/2, rad*0.1, w/2, h/2, rad);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(0.5, `rgba(0,0,0,${0.4 * (1-strength)})`);
  grad.addColorStop(1, `rgba(0,0,0,${0.92 * (1-strength) + 0.08})`);
  
  ctx.save();
  ctx.globalCompositeOperation = 'multiply'; 
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  ctx.restore();
}

// ─── WOBBLY WIPE LOGIC (SIN/COS) ─────────────────────────
// 팀장님이 원하신 "직선이 아닌 사람이 그리는 듯한 울퉁불퉁한 지우개질"
function drawWobblyWipe(mctx, w, h, progress) {
  mctx.save();
  // 대각선 30도 각도로 세팅
  mctx.translate(w/2, h/2);
  mctx.rotate(Math.PI / 6); 

  const sweepW = w * 1.5;
  const sweepH = h * 1.5;
  const startX = -sweepW / 2;
  const startY = -sweepH / 2;

  const brushSize = 220; // 굵직한 칠판 지우개 크기
  const sweeps = Math.max(2, Math.ceil(sweepH / (brushSize * 0.65)));
  const rowH = sweepH / sweeps;
  const totalDist = sweeps * sweepW;
  const curDist = progress * totalDist;

  mctx.beginPath();
  mctx.lineCap = 'round';
  mctx.lineJoin = 'round';
  mctx.lineWidth = brushSize;
  mctx.strokeStyle = '#fff';

  mctx.moveTo(startX, startY + rowH/2);
  let acc = 0;

  for (let i = 0; i < sweeps; i++) {
    const isLtoR = (i % 2 === 0);
    const x0 = isLtoR ? startX : startX + sweepW;
    const x1 = isLtoR ? startX + sweepW : startX;
    const y = startY + i * rowH + rowH/2;

    // 수직 이동 (줄 바꿈)
    if (i > 0) {
      const dDist = rowH;
      if (acc + dDist > curDist) {
        mctx.lineTo(x0, y - rowH + (curDist - acc));
        acc = curDist; break;
      }
      mctx.lineTo(x0, y);
      acc += dDist;
    }

    // 수평 이동 (SIN/COS를 이용한 울퉁불퉁한 궤적)
    const sDist = sweepW;
    const steps = 40; // 곡선을 부드럽게 만들기 위한 세그먼트 수
    const stepDist = sDist / steps;

    for (let j = 1; j <= steps; j++) {
      if (acc + stepDist > curDist) {
        const rem = curDist - acc;
        const px = isLtoR ? x0 + rem : x0 - rem;
        // SIN과 COS의 조합으로 불규칙한 흔들림(wobble) 생성
        const wobbleY = Math.sin(px / 60) * 40 + Math.cos(px / 30) * 20;
        mctx.lineTo(px, y + wobbleY);
        acc = curDist; break;
      }
      const px = isLtoR ? x0 + j*stepDist : x0 - j*stepDist;
      const wobbleY = Math.sin(px / 60) * 40 + Math.cos(px / 30) * 20;
      mctx.lineTo(px, y + wobbleY);
      acc += stepDist;
    }
    if (acc >= curDist) break;
  }
  mctx.stroke();
  mctx.restore();
}

// ─── MAIN DRAW LOOP ──────────────────────────────────────
function getCurrentSlot(t) {
  const active = slots.filter(s => s.file);
  for (const sl of active) {
    if (t >= sl.start && t < sl.end) return sl;
  }
  return active[active.length-1] || null;
}

function drawFrame(currentTime) {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,w,h);

  const sl = getCurrentSlot(currentTime);
  if (!sl || !sl.img) return;

  const dur = sl.end - sl.start;
  const elapsed = currentTime - sl.start;
  const tSlot = Math.min(1, Math.max(0, elapsed / dur)); 

  // 80% 시점까지 지우개질 완료, 나머지 20%는 비네팅 확장
  const REVEAL_START = 0.80; 
  const paintProgress = Math.min(1, tSlot / REVEAL_START);
  const vignetteOpen = tSlot < REVEAL_START ? 0 : (tSlot - REVEAL_START) / (1 - REVEAL_START);

  // 캐싱된 컬러 이미지 가져오기
  const styledCanvas = preRenderSlotImage(sl, w, h);

  // 마스크 캔버스 초기화
  mctx.clearRect(0, 0, w, h);

  // 타겟 이미지 2번 스타일의 외곽 15% 비네팅(여백) 보호 영역
  const padX = w * 0.15;
  const padY = h * 0.15;
  const drawW = w - 2 * padX;
  const drawH = h - 2 * padY;

  // 1. 불규칙한 사선 지우개질 그리기
  if (paintProgress > 0) {
    drawWobblyWipe(mctx, w, h, paintProgress);
  }

  // 2. 비네팅 영역 컨트롤
  if (vignetteOpen === 0) {
    // 80% 이전: 지우개가 캔버스 외곽을 넘지 못하도록 패딩 바깥쪽을 잘라냄
    mctx.globalCompositeOperation = 'destination-in';
    mctx.fillStyle = '#fff';
    mctx.fillRect(padX, padY, drawW, drawH);
    mctx.globalCompositeOperation = 'source-over';
  } else {
    // 80% ~ 100%: 닦아낸 영역이 외곽까지 부드럽게 확장되며 100% 꽉 찬 그림이 됨
    mctx.fillStyle = `rgba(255,255,255,${vignetteOpen})`;
    const exX = padX * (1 - vignetteOpen);
    const exY = padY * (1 - vignetteOpen);
    mctx.fillRect(exX, exY, w - 2*exX, h - 2*exY);
  }

  // 3. 합성 (지우개 모양대로 컬러 이미지 오려내기)
  cctx.clearRect(0, 0, w, h);
  cctx.drawImage(maskCanvas, 0, 0);
  cctx.globalCompositeOperation = 'source-in';
  cctx.drawImage(styledCanvas, 0, 0);
  cctx.globalCompositeOperation = 'source-over';

  // 4. 메인 캔버스에 그리기
  ctx.drawImage(compCanvas, 0, 0);

  // 5. 검은색 그라데이션 비네팅 덮기
  drawVignette(ctx, w, h, vignetteOpen);

  // 6. HUD (FHD 비율에 맞게 폰트 크기 업)
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '500 26px DM Mono, monospace'; 
  ctx.fillText(STYLE_LABELS[sl.style], 36, h - 36);
  ctx.restore();
}

// ─── PLAYBACK & RECORDING ────────────────────────────────
document.getElementById('btnStart').addEventListener('click', startSession);
document.getElementById('btnStop').addEventListener('click', stopSession);

async function startSession() {
  if (!audioFile || slots.filter(s=>s.file).length < 4) return;

  slots.forEach(s => s.preRenderedCanvas = null);

  document.getElementById('emptyHint').style.display = 'none';
  document.getElementById('canvasOverlay').style.display = 'flex';
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').classList.add('visible');
  document.getElementById('recBadge').classList.add('visible');
  document.getElementById('progressLog').classList.add('visible');
  document.getElementById('statusDot').className = 'status-dot recording';

  const stream = canvas.captureStream(24); // 24FPS 시네마틱 프레임
  
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const dest = audioCtx.createMediaStreamDestination();
  const source = audioCtx.createMediaElementSource(audioEl);
  source.connect(dest);
  source.connect(audioCtx.destination);
  const audioTrack = dest.stream.getAudioTracks()[0];
  if (audioTrack) stream.addTrack(audioTrack);

  const mimeTypes = [
    'video/mp4;codecs=avc1.42E01E,mp4a.40.2',
    'video/mp4;codecs=h264',
    'video/mp4',
    'video/webm;codecs=vp9',
    'video/webm;codecs=vp8',
    'video/webm'
  ];
  let chosenMime = 'video/webm'; 
  for (const mt of mimeTypes) {
    if (MediaRecorder.isTypeSupported(mt)) { chosenMime = mt; break; }
  }

  recordedChunks = [];
  mediaRecorder = new MediaRecorder(stream, { mimeType: chosenMime, videoBitsPerSecond: 15000000 });
  mediaRecorder.ondataavailable = e => { if (e.data.size>0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => saveRecording(chosenMime);
  mediaRecorder.start(100);

  if(audioCtx.state === 'suspended') await audioCtx.resume();
  
  audioEl.currentTime = 0;
  audioEl.play();
  isPlaying = true;

  document.getElementById('progressLog').textContent = `🎬 녹화중 (FHD 24fps) — ${chosenMime.split(';')[0]}`;

  audioEl.onended = () => stopSession();

  function loop() {
    if (!isPlaying) return;
    const ct = audioEl.currentTime;
    const dur = audioDuration;
    drawFrame(ct);
    document.getElementById('progressFill').style.width = (ct/dur*100)+'%';
    document.getElementById('timeDisplay').textContent = `${fmtTime(ct)} / ${fmtTime(dur)}`;
    animFrameId = requestAnimationFrame(loop);
  }
  loop();
}

function stopSession() {
  if (!isPlaying) return;
  isPlaying = false;
  cancelAnimationFrame(animFrameId);
  audioEl.pause();
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  document.getElementById('btnStop').classList.remove('visible');
  document.getElementById('recBadge').classList.remove('visible');
  document.getElementById('statusDot').className = 'status-dot active';
  document.getElementById('progressLog').textContent = '⏸ 저장 중...';
}

function saveRecording(mime) {
  const ext = mime.includes('mp4') ? 'mp4' : 'webm';
  const blob = new Blob(recordedChunks, { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const fname = `MusicVideo_FHD_${pad(now.getMonth()+1)}${pad(now.getDate())}${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}.${ext}`;
  a.href = url;
  a.download = fname;
  a.click();
  URL.revokeObjectURL(url);
  document.getElementById('progressLog').textContent = `✓ 저장완료: ${fname}`;
  document.getElementById('btnStart').disabled = false;
  document.getElementById('canvasOverlay').style.display = 'none';
  document.getElementById('statusDot').className = 'status-dot';
  setTimeout(() => document.getElementById('progressLog').classList.remove('visible'), 4000);
}

// ─── UTILS ───────────────────────────────────────────────
function fmtTime(s) {
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60);
  return `${m}:${String(sec).padStart(2,'0')}`;
}

// ─── DRAG & DROP AUDIO ───────────────────────────────────
document.getElementById('audioZone').addEventListener('dragover', e => { e.preventDefault(); });
document.getElementById('audioZone').addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('audio/')) {
    const dt = new DataTransfer();
    dt.items.add(f);
    document.getElementById('audioInput').files = dt.files;
    document.getElementById('audioInput').dispatchEvent(new Event('change'));
  }
});

checkReady();
</script>
