<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>ART LAB v18.31 — The Final Light</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#050505; --panel:#0d0d12; --accent:#00ffcc; --border:rgba(255,255,255,0.08); --text:#ffffff; }
body{ background:var(--bg); color:var(--text); font-family:sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo{letter-spacing:4px; color:var(--accent); font-weight:800; font-size:12px;}
.container { display: grid; grid-template-columns: 350px 1fr 340px; flex: 1; min-height: 0; }
.side-panel { background: var(--panel); padding: 15px; overflow-y: auto; border-right: 1px solid var(--border); }
.side-panel.right { border-right:none; border-left: 1px solid var(--border); }
.seq-item { background: #16161d; padding: 12px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #222; cursor: pointer; }
.seq-item.active { border-color: var(--accent); background: #1a2523; }
.seq-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.time-input { background:#000; border:1px solid #444; color:var(--accent); width:65px; padding:4px; font-size:11px; text-align:center; border-radius:4px; }
.viz-area { background: #000; flex: 1; display: flex; justify-content: center; align-items: center; overflow:hidden; }
canvas { box-shadow: 0 0 50px rgba(0,0,0,1); }
h3 { font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 8px; cursor: pointer; font-size: 11px; border-radius: 4px; width: 100%; margin-bottom: 5px; }
.btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.05); }
input[type=range] { width: 100%; accent-color: var(--accent); height: 4px; cursor: pointer; margin-bottom: 10px;}
label { font-size: 9px; color: #888; display:block; margin-bottom:3px; margin-top:8px;}
.val-label { float: right; color: var(--accent); font-weight: bold; }
</style>
</head>
<body>

<div class="topbar">
    <div class="logo">ART LAB v18.31 FINAL LIGHT</div>
    <div id="status" style="font-size:10px; color:var(--accent);">STANDBY</div>
</div>

<div class="container">
    <div class="side-panel">
        <h3>1. Sequence</h3>
        <button class="btn" onclick="document.getElementById('mIn').click()">🎵 LOAD AUDIO</button>
        <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleMusic(this.files)">
        <button class="btn" style="background:var(--accent); color:#000; font-weight:bold; border:none; margin-top:10px;" onclick="document.getElementById('iIn').click()">🖼️ ADD IMAGES</button>
        <input type="file" id="iIn" accept="image/*" style="display:none" onchange="handleImageAdd(this.files)" multiple>
        <div id="sequenceList" style="margin-top:20px;"></div>
    </div>
    <div class="viz-area" id="vArea"></div>
    <div class="side-panel right">
        <h3>2. Canvas & Engine</h3>
        <div style="display: flex; gap:5px; margin-bottom:15px;">
            <button class="btn active" id="b169" onclick="setAspect('16:9')">16:9</button>
            <button class="btn" id="b916" onclick="setAspect('9:16')">9:16</button>
        </div>
        <label>BRUSH SCALE <span class="val-label" id="valBScale">1.5</span></label>
        <input type="range" id="paintScale" min="0.5" max="4.0" step="0.1" value="1.5" oninput="document.getElementById('valBScale').innerText=this.value">
        <h3>3. Active Transform</h3>
        <div id="seqUI" style="opacity: 0.3; pointer-events: none; background:#111; padding:10px; border-radius:8px;">
            <label>IMAGE SCALE <span id="txtS" class="val-label">1.0</span></label>
            <input type="range" id="curScale" min="0.1" max="4.0" step="0.05" value="1.0" oninput="updateCurSeq()">
            <label>OFFSET X <span id="txtX" class="val-label">0</span></label>
            <input type="range" id="curX" min="-1200" max="1200" step="5" value="0" oninput="updateCurSeq()">
            <label>OFFSET Y <span id="txtY" class="val-label">0</span></label>
            <input type="range" id="curY" min="-1200" max="1200" step="5" value="0" oninput="updateCurSeq()">
        </div>
        <button class="btn" id="recBtn" onclick="togglePlay()" style="margin-top:20px; background:#ff3e81; color:white; font-weight:bold; border:none; padding:12px;">🔴 START REC</button>
    </div>
</div>

<div class="playbar" style="height:60px; background:var(--panel); border-top:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:15px;">
    <span id="currTime" style="font-size:14px; color:var(--accent); font-family:monospace; min-width:50px;">00:00</span>
    <input type="range" id="progBar" value="0" min="0" max="100" step="0.1" style="flex:1;" oninput="seekTime(this.value)">
    <span id="totalTime" style="font-size:14px; color:#555; font-family:monospace; min-width:50px;">00:00</span>
</div>

<audio id="audioEl" style="display:none;"></audio>

<script>
let audio, isPlaying = false, sequences = [], currentActiveIdx = -1;
let aspect = '16:9', canvasW = 1280, canvasH = 720;
let paintBuffer, maskBuffer, vignetteBuffer;
let prevDist = 0;

function setup() {
    let cnv = createCanvas(canvasW, canvasH);
    cnv.parent('vArea');
    
    // 버퍼 초기화
    paintBuffer = createGraphics(canvasW, canvasH);
    maskBuffer = createGraphics(canvasW, canvasH);
    vignetteBuffer = createGraphics(canvasW, canvasH);
    
    updateVignette();
}

function updateVignette() {
    vignetteBuffer.resizeCanvas(width, height);
    vignetteBuffer.clear();
    vignetteBuffer.noStroke();
    let maxR = max(width, height) * 0.95;
    for(let r = 0; r < maxR; r += 5) {
        let alpha = map(r, 0, maxR, 0, 240);
        vignetteBuffer.fill(0, alpha);
        vignetteBuffer.ellipse(width/2, height/2, maxR*2.5 - r*2.0);
    }
}

function handleMusic(files) {
    if(!files[0]) return;
    audio = loadSound(URL.createObjectURL(files[0]), ()=>{
        document.getElementById('totalTime').innerText = formatTime(audio.duration());
        document.getElementById('progBar').max = audio.duration();
    });
}

function handleImageAdd(files) {
    for(let f of files) {
        loadImage(URL.createObjectURL(f), (img) => {
            let lastEnd = sequences.length > 0 ? sequences[sequences.length-1].end : 0;
            sequences.push({
                img: img, name: f.name, start: lastEnd, end: lastEnd + 10,
                style: 'oil', scale: 1.0, x: 0, y: 0, artBuffer: null, sketchBuffer: null
            });
            renderSeqList();
            if(currentActiveIdx === -1) selectSeq(0);
        });
    }
}

function renderSeqList() {
    const list = document.getElementById('sequenceList'); list.innerHTML = "";
    sequences.forEach((s, i) => {
        let div = document.createElement('div');
        div.className = `seq-item ${i === currentActiveIdx ? 'active' : ''}`;
        div.onclick = () => selectSeq(i);
        div.innerHTML = `<div class="seq-info"><span style="font-size:11px; color:#fff;">${i+1}. ${s.name}</span>
            <input class="time-input" type="number" step="0.1" value="${s.end.toFixed(1)}" onchange="cascadeTime(${i}, this.value)"></div>
            <div style="display:flex; gap:3px;">
                <button class="btn ${s.style==='oil'?'active':''}" onclick="setSeqStyle(${i}, 'oil')">유채</button>
                <button class="btn ${s.style==='pencil'?'active':''}" onclick="setSeqStyle(${i}, 'pencil')">연필</button>
                <button class="btn ${s.style==='point'?'active':''}" onclick="setSeqStyle(${i}, 'point')">점묘</button>
            </div>`;
        list.appendChild(div);
    });
}

function selectSeq(i) {
    currentActiveIdx = i;
    let s = sequences[i];
    document.getElementById('curScale').value = s.scale;
    document.getElementById('curX').value = s.x; document.getElementById('curY').value = s.y;
    document.getElementById('seqUI').style.opacity = "1"; document.getElementById('seqUI').style.pointerEvents = "all";
    renderSeqList();
    if(!isPlaying) drawFrame(audio ? audio.currentTime() : 0);
}

function updateCurSeq() {
    if(currentActiveIdx < 0) return;
    let s = sequences[currentActiveIdx];
    s.scale = Number(document.getElementById('curScale').value);
    s.x = Number(document.getElementById('curX').value);
    s.y = Number(document.getElementById('curY').value);
    document.getElementById('txtS').innerText = s.scale.toFixed(2);
    s.artBuffer = null; s.sketchBuffer = null;
    if(!isPlaying) drawFrame(audio ? audio.currentTime() : 0);
}

function setSeqStyle(i, style) {
    sequences[i].style = style; sequences[i].artBuffer = null;
    renderSeqList(); if(!isPlaying) drawFrame(audio ? audio.currentTime() : 0);
}

// [v18.31 핵심 픽스] 가장 안전한 버퍼 렌더링 방식으로 회귀
function preRenderBuffers(seq) {
    let art = createGraphics(width, height);
    let sk = createGraphics(width, height);
    art.pixelDensity(1); sk.pixelDensity(1);
    
    let img = seq.img;
    let imgR = Math.max(width/img.width, height/img.height) * seq.scale;
    let dw = img.width * imgR, dh = img.height * imgR;
    let dx = width/2 + seq.x, dy = height/2 + seq.y;

    // 1. 임시 버퍼에 이미지를 현재 변형 상태 그대로 그림
    let temp = createGraphics(width, height);
    temp.imageMode(CENTER);
    temp.image(img, dx, dy, dw, dh);
    temp.loadPixels();
    
    art.background("#f4f4f4");
    art.noStroke();
    
    // 2. 픽셀 데이터를 직접 읽어서 아트 스타일로 재구성
    let total = 130000;
    for(let i=0; i<total; i++) {
        let rx = floor(random(width)), ry = floor(random(height));
        let idx = (ry * width + rx) * 4;
        
        // 투명하거나 비어있는 부분 무시
        if (temp.pixels[idx+3] < 10) continue;

        let r = temp.pixels[idx];
        let g = temp.pixels[idx+1];
        let b = temp.pixels[idx+2];
        
        art.push();
        art.translate(rx, ry);
        let bSize = 12 * seq.scale;
        
        if(seq.style === 'oil') {
            art.fill(r+random(-10,10), g+random(-10,10), b+random(-10,10), 220);
            art.rotate(random(TWO_PI));
            art.rect(-bSize, -bSize*0.3, bSize*2, bSize*0.6, 2);
        } else if(seq.style === 'pencil') {
            let lum = (r*0.299 + g*0.587 + b*0.114);
            if(lum < 170) {
                art.stroke(r*0.4, 150); art.strokeWeight(1);
                art.rotate(PI/4 + random(0.2));
                art.line(-bSize, 0, bSize, 0);
            }
        } else {
            art.fill(r, g, b); art.ellipse(0, 0, bSize);
        }
        art.pop();
    }
    
    // 3. 스케치 배경 생성
    sk.background("#f4f4f4");
    sk.drawingContext.filter = 'grayscale(1) contrast(1.5)';
    sk.imageMode(CENTER);
    sk.image(img, dx, dy, dw, dh);
    sk.drawingContext.filter = 'none';
    sk.loadPixels();
    
    let skBuf = createGraphics(width, height);
    skBuf.background("#f4f4f4");
    skBuf.stroke(60, 100);
    for(let i=0; i<60000; i++) {
        let sx = floor(random(width)), sy = floor(random(height));
        let sIdx = (sy * width + sx) * 4;
        if(sk.pixels[sIdx] < random(200)) {
            skBuf.push(); skBuf.translate(sx, sy); skBuf.rotate(random(PI));
            skBuf.line(-4, 0, 4, 0); skBuf.pop();
        }
    }
    
    seq.artBuffer = art;
    seq.sketchBuffer = skBuf;
    temp.remove(); sk.remove();
    document.getElementById('status').innerText = "READY";
}

function drawFrame(ct) {
    const sl = sequences.find(s => ct >= s.start && ct < s.end) || sequences[sequences.length-1];
    if (!sl || !sl.img) return;
    if(!sl.artBuffer) preRenderBuffers(sl);

    let prog = (ct - sl.start) / (sl.end - sl.start || 1);
    let zigProg = Math.min(1.0, prog / 0.8);

    // 바탕 스케치
    image(sl.sketchBuffer, 0, 0);

    // 지우개 마스크
    maskBuffer.clear();
    maskBuffer.background(0);
    maskBuffer.fill(255);
    maskBuffer.noStroke();
    
    let pScale = Number(document.getElementById('paintScale').value);
    let eraserSize = (width * 0.18) * pScale;
    
    maskBuffer.drawingContext.globalCompositeOperation = 'source-over';
    for(let i=0; i<160 * zigProg; i++) {
        let ti = random(zigProg);
        let bx = lerp(0, width, ti) + (random()-0.5)*150;
        let by = lerp(0, height, ti) + (random()-0.5)*150;
        maskBuffer.push(); maskBuffer.translate(bx, by);
        maskBuffer.rotate(random(TWO_PI));
        maskBuffer.ellipse(0, 0, eraserSize * random(0.7, 1.3), eraserSize * random(0.4, 0.8));
        maskBuffer.pop();
    }

    // 결과 합성
    paintBuffer.clear();
    paintBuffer.image(maskBuffer, 0, 0);
    paintBuffer.drawingContext.globalCompositeOperation = 'source-in';
    paintBuffer.image(sl.artBuffer, 0, 0);
    paintBuffer.drawingContext.globalCompositeOperation = 'source-over';

    image(paintBuffer, 0, 0);
    // 비네팅
    image(vignetteBuffer, 0, 0);
}

function draw() {
    if(!isPlaying) return;
    let ct = audio.currentTime();
    document.getElementById('currTime').innerText = formatTime(ct);
    document.getElementById('progBar').value = ct;
    drawFrame(ct);
}

function setAspect(r) {
    aspect = r;
    document.getElementById('b169').className = r==='16:9'?'btn active':'btn';
    document.getElementById('b916').className = r==='9:16'?'btn active':'btn';
    if(r==='16:9') { canvasW=1280; canvasH=720; } else { canvasW=720; canvasH=1280; }
    resizeCanvas(canvasW, canvasH);
    paintBuffer.resizeCanvas(width, height); maskBuffer.resizeCanvas(width, height);
    updateVignette();
    sequences.forEach(s => { s.artBuffer = null; });
    drawFrame(0);
}

function togglePlay() {
    if(!audio) return;
    if(isPlaying) { audio.stop(); isPlaying = false; document.getElementById('recBtn').innerText = "🔴 START REC"; } 
    else { audio.play(); isPlaying = true; document.getElementById('recBtn').innerText = "⏹ STOP"; startRecording(); }
}

function startRecording() {
    recordedChunks = [];
    let stream = document.querySelector('canvas').captureStream(24);
    let recorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
    recorder.ondataavailable = e => recordedChunks.push(e.data);
    recorder.onstop = () => {
        let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks, {type:'video/mp4'}));
        a.download = `ArtLab_v18.31_${Date.now()}.mp4`; a.click();
    };
    recorder.start();
}

function formatTime(s) { let m=floor(s/60), sec=floor(s%60); return `${nf(m,2)}:${nf(sec,2)}`; }
function seekTime(v) { if(!audio) return; audio.jump(Number(v)); if(!isPlaying) drawFrame(Number(v)); }
function cascadeTime(i, v) { sequences[i].end=Number(v); for(let j=i+1; j<sequences.length; j++){ let d=sequences[j].end-sequences[j].start; sequences[j].start=sequences[j-1].end; sequences[j].end=sequences[j].start+d; } renderSeqList(); }
</script>
</body>
</html>
