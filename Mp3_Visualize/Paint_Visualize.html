<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 Music Video Creator v18.19 (Ed.)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: rgba(255,255,255,0.08);
    --accent: #00ffcc; /* ART LAB Signature Neon Green */
    --accent2: #818cf8;
    --text: #f1f0ff;
    --muted: #888;
    --green: #4ade80;
    --red: #f87171;
    --amber: #fbbf24;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow:hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--surface);
    flex-shrink:0;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.03em;
  }

  header .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  header .status-dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.5s infinite; }
  header .status-dot.recording { background: var(--red); box-shadow: 0 0 8px var(--red); animation: pulse 0.8s infinite; }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  .layout {
    display: grid;
    grid-template-columns: 360px 1fr 340px;
    height: calc(100vh - 61px - 60px); /* Adjust for topbar and playbar */
    min-height: 0;
  }

  .panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }
  .panel.right { border-right:none; border-left: 1px solid var(--border); }

  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    font-weight: 500;
  }

  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface2);
    position: relative;
  }
  .upload-zone:hover { border-color: var(--accent); background: rgba(0,255,204,0.05); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-zone .icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
  .upload-zone p { font-size: 0.75rem; color: var(--text); font-weight:400; margin-bottom:2px;}
  .upload-zone span { font-size: 0.7rem; color: var(--accent); }

  .file-info {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-top: 5px;
  }
  .file-info .fi-name { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-info .fi-dur { color: var(--accent); white-space: nowrap; }

  .image-slot {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
    transition: all 0.2s;
    cursor: pointer;
  }
  .image-slot:hover { border-color: #333; }
  .image-slot.has-image { border-color: rgba(0,255,204,0.15); }
  .image-slot.active { border-color: var(--accent); background: #161a19; box-shadow: 0 0 10px rgba(0,255,204,0.08); }

  .slot-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .slot-num {
    width: 20px; height: 20px;
    border-radius: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem;
    color: var(--muted);
    flex-shrink: 0;
  }
  .slot-thumb {
    width: 40px; height: 32px;
    border-radius: 4px;
    object-fit: cover;
    border: 1px solid var(--border);
  }
  .slot-name { font-size: 0.72rem; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .slot-add-btn {
    background: none;
    border: 1px dashed var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 0.65rem;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    padding: 0.35rem 0.6rem;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .slot-add-btn:hover { border-color: var(--accent); color: var(--accent); }

  .time-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
    align-items: center;
    margin-top:2px;
  }
  .time-field {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }
  .time-field label { font-size: 0.55rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .time-field input[type="number"] {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    padding: 0.35rem 0.5rem;
    width: 100%;
    transition: border-color 0.2s;
  }
  .time-field input[type="number"]:focus { outline: none; border-color: var(--accent); }

  .slot-file-input { display: none; }

  /* Right Panel Style Control */
  .style-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.4rem;
    margin-top:5px;
  }
  .style-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 0.65rem;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    padding: 0.6rem;
    transition: all 0.18s;
    letter-spacing: 0.04em;
    text-align:left;
  }
  .style-btn:hover { border-color: #444; color: #fff; }
  .style-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.05); font-weight:500; }

  /* Sliders */
  input[type=range] { width: 100%; accent-color: var(--accent); height: 3px; cursor: pointer; margin-bottom: 10px;}
  label { font-size: 0.7rem; color: var(--muted); display:flex; justify-content:space-between; margin-bottom:3px; margin-top:8px;}
  .val-label { color: var(--accent); font-weight: 500; font-family:monospace; }

  select { width:100%; background:#000; color:var(--text); border:1px solid #333; font-size:0.7rem; padding:6px; border-radius:4px; margin-bottom:8px; font-family:monospace;}
  
  .action-bar {
    display: flex;
    gap: 0.75rem;
    margin-top: auto;
    padding-top: 0.5rem;
  }

  .btn-start {
    flex: 1;
    background: #fff;
    border: none;
    border-radius: 8px;
    color: #000;
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-start:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-start:active { transform: translateY(0); }
  .btn-start:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; opacity:1; }

  .btn-stop {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 8px;
    color: var(--red);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 0.85rem 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }
  .btn-stop:hover { background: rgba(248,113,113,0.2); }
  .btn-stop.visible { display: block; }

  /* Canvas area */
  .canvas-area {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    border-left:1px solid var(--border);
    border-right:1px solid var(--border);
  }

  #mainCanvas {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  .canvas-overlay {
    position: absolute;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    pointer-events: none;
  }

  .progress-bar-wrap {
    width: 300px;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.1s linear;
    width: 0%;
  }

  .time-display {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.06em;
    font-family:monospace;
  }

  .rec-badge {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 20px;
    padding: 0.3rem 0.75rem;
    font-size: 0.65rem;
    color: var(--red);
    letter-spacing: 0.08em;
    display: none;
    align-items: center;
    gap: 0.4rem;
  }
  .rec-badge.visible { display: flex; }
  .rec-dot { width:6px; height:6px; border-radius:50%; background: var(--red); animation: pulse 0.8s infinite; }

  .empty-hint {
    color: var(--muted);
    font-size: 0.75rem;
    text-align: center;
    line-height: 1.8;
  }
  .empty-hint .big { font-size: 2.5rem; margin-bottom: 0.5rem; color:#222;}

  /* Playbar */
  .playbar {
    height:60px;
    background:var(--surface);
    border-top:1px solid var(--border);
    display:flex;
    align-items:center;
    padding:0 20px;
    gap:15px;
    flex-shrink:0;
  }
  .playbar input[type=range] { flex:1; accent-color:#444; margin:0;}

  .warn { color: var(--amber); font-size: 0.68rem; margin-top:5px; text-align:center;}
  .ok { color: var(--green); font-size: 0.68rem; margin-top:5px; text-align:center;}
</style>
</head>
<body>

<header>
  <div class="status-dot" id="statusDot"></div>
  <h1>🎵 Music Video Creator</h1>
  <span style="font-size:0.65rem;color:var(--muted);margin-left:auto;">FHD 1080p | 24 FPS Export | Art Style (v18.19)</span>
</header>

<div class="layout">
  <div class="panel" id="panel">
    <div>
      <div class="section-label">01 — 음악 파일</div>
      <div class="upload-zone" id="audioZone">
        <input type="file" accept="audio/*" id="audioInput">
        <div class="icon" style="color:#ffcc00">🎵</div>
        <p>MP3 파일을 드래그하거나 클릭하세요</p>
        <span>MP3, AAC, WAV 지원</span>
      </div>
      <div class="file-info" id="audioInfo" style="display:none;">
        <span class="fi-name" id="audioName"></span>
        <span class="fi-dur" id="audioDur"></span>
      </div>
    </div>

    <div>
      <div class="section-label">02 — 이미지 슬롯 (4~5장)</div>
      <div id="imageSlots" style="display:flex;flex-direction:column;gap:0.75rem;"></div>
    </div>

    <div class="action-bar">
      <button class="btn-start" id="btnStart" disabled>▶ START REC</button>
      <button class="btn-stop" id="btnStop">■ STOP</button>
    </div>
    <p id="statusMsg"></p>
  </div>

  <div class="canvas-area" id="canvasArea">
    <canvas id="mainCanvas" width="1920" height="1080"></canvas>

    <div class="empty-hint" id="emptyHint">
      <div class="big">🎨</div>
      음악과 이미지를 업로드하면<br>여기에 미리보기가 표시됩니다
    </div>

    <div class="rec-badge" id="recBadge">
      <div class="rec-dot"></div> REC
    </div>
  </div>

  <div class="panel right" id="editPanel" style="display:none;">
    <div class="section-label">03 — 슬롯 렌더링 세팅</div>
    
    <label>아트 스타일</label>
    <div class="style-row" id="styleGrid"></div>

    <label style="margin-top:15px;">비네팅 스케치 (배경)</label>
    <p style="font-size:0.65rem; color:var(--muted); line-height:1.4;">자동 생성된 옅은 흑백 스케치와 검은색 여백이 배경으로 깔립니다.</p>

    <div style="margin-top:25px; background:var(--surface2); padding:15px; border-radius:8px; border:1px solid var(--border);">
        <div class="section-label" style="color:var(--text); margin-bottom:12px;">Active Transform</div>
        
        <label>Image Scale <span id="valScale" class="val-label">1.0</span></label>
        <input type="range" id="curScale" min="0.1" max="4.0" step="0.05" value="1.0" oninput="updateActiveTransform()">

        <label>Offset X (px) <span id="valX" class="val-label">0</span></label>
        <input type="range" id="curX" min="-1500" max="1500" step="5" value="0" oninput="updateActiveTransform()">

        <label>Offset Y (px) <span id="valY" class="val-label">0</span></label>
        <input type="range" id="curY" min="-1000" max="1000" step="5" value="0" oninput="updateActiveTransform()">
    </div>
  </div>

</div>

<div class="playbar">
  <span class="time-display" id="currTime" style="min-width:45px;">0:00</span>
  <input type="range" id="progBar" value="0" min="0" max="100" step="0.1" oninput="seekTime(this.value)">
  <span class="time-display" id="totalTime" style="color:#555; min-width:45px;">0:00</span>
</div>

<audio id="audioEl" style="display:none;"></audio>

<script>
// ─── STATE ──────────────────────────────────────────────
const NUM_SLOTS = 5;
let audioFile = null;
let audioDuration = 0;
let slots = Array.from({length: NUM_SLOTS}, (_,i) => ({
  file: null, img: null, dataUrl: null,
  start: 0, end: 0,
  style: 'oil',
  index: i,
  // v18.19 신규 신규: 슬롯별 변형(Transform) 상태
  scale: 1.0, offsetX: 0, offsetY: 0,
  // 캐싱용
  preRenderedCanvas: null, 
  preRenderedSketch: null 
}));

const STYLES = ['watercolor','oil','impressionism','anime','pencil'];
const STYLE_LABELS = { watercolor:'수채화', oil:'유채화', impressionism:'인상파', anime:'애니메이션', pencil:'연필화' };

let mediaRecorder = null;
let recordedChunks = [];
let animFrameId = null;
let isPlaying = false;
let currentActiveIdx = -1;

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const audioEl = document.getElementById('audioEl');

// FHD resolution
const W = 1920, H = 1080;

// [v18.19] 누적식(Persistent) 마스크 캔버스 (깜빡임 완벽 제거)
const maskCanvas = document.createElement('canvas');
maskCanvas.width = W; maskCanvas.height = H;
const mctx = maskCanvas.getContext('2d');

const compCanvas = document.createElement('canvas');
compCanvas.width = W; compCanvas.height = H;
const cctx = compCanvas.getContext('2d');

let prevDist = 0; // 마스크 누적 계산용

// ─── AUDIO UPLOAD ────────────────────────────────────────
document.getElementById('audioInput').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  audioFile = f;
  const url = URL.createObjectURL(f);
  audioEl.src = url;
  audioEl.addEventListener('loadedmetadata', () => {
    audioDuration = audioEl.duration;
    document.getElementById('totalTime').textContent = fmtTime(audioDuration);
    document.getElementById('audioDur').textContent = fmtTime(audioDuration);
    document.getElementById('audioName').textContent = f.name;
    document.getElementById('audioInfo').style.display = 'flex';
    document.getElementById('audioZone').style.display = 'none';
    autoFillSlotTimes();
    renderSlots();
    checkReady();
  }, {once: true});
});

function autoFillSlotTimes() {
  const filledSlots = slots.filter(s => s.file);
  if (filledSlots.length === 0) return;
  const dur = audioDuration;
  const n = filledSlots.length;
  const seg = dur / n;
  filledSlots.forEach((s, i) => {
    s.start = parseFloat((i * seg).toFixed(2));
    s.end = parseFloat(((i + 1) * seg).toFixed(2));
  });
}

// ─── SLOT RENDERING ─────────────────────────────────────
function renderSlots() {
  const container = document.getElementById('imageSlots');
  container.innerHTML = '';
  slots.forEach((slot, i) => {
    const div = document.createElement('div');
    div.className = 'image-slot' + (slot.file ? ' has-image' : '') + (i === currentActiveIdx ? ' active' : '');
    div.id = `slot-row-${i}`;
    div.onclick = (e) => { if(slot.file) selectSlot(i, e); };

    div.innerHTML = `
      <div class="slot-header">
        <div class="slot-num">${i+1}</div>
        ${slot.img ? `<img class="slot-thumb" src="${slot.dataUrl}">` : ''}
        <span class="slot-name">${slot.file ? slot.file.name : '이미지 없음'}</span>
        ${!slot.file ? `<button class="slot-add-btn" onclick="triggerSlotInput(${i}, event)">+ 업로드</button>` : ''}
        <input type="file" accept="image/*" class="slot-file-input" id="slotInput-${i}">
      </div>
      ${slot.file ? `
      <div class="time-row">
        <div class="time-field">
          <label>시작 (초)</label>
          <input type="number" class="slot-start" value="${slot.start.toFixed(1)}" min="0" step="0.1" onclick="event.stopPropagation()">
        </div>
        <div class="time-field">
          <label>종료 (초)</label>
          <input type="number" class="slot-end" value="${slot.end.toFixed(1)}" min="0" step="0.1" onclick="event.stopPropagation()">
        </div>
      </div>
      ` : ''}
    `;
    container.appendChild(div);

    const startInput = div.querySelector('.slot-start');
    const endInput = div.querySelector('.slot-end');
    if (startInput) startInput.addEventListener('change', e => { slots[i].start = parseFloat(e.target.value) || 0; checkReady(); });
    if (endInput) endInput.addEventListener('change', e => { slots[i].end = parseFloat(e.target.value) || 0; checkReady(); });

    document.getElementById(`slotInput-${i}`).addEventListener('change', e => { loadSlotImage(i, e.target.files[0]); });
  });
}
renderSlots();

function triggerSlotInput(idx, e) {
    e.stopPropagation(); // div onclick 방지
    document.getElementById(`slotInput-${idx}`).click();
}

function loadSlotImage(idx, file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      slots[idx].file = file;
      slots[idx].img = img;
      slots[idx].dataUrl = e.target.result;
      slots[idx].preRenderedCanvas = null; 
      slots[idx].preRenderedSketch = null;
      if (audioDuration > 0) autoFillSlotTimes();
      renderSlots();
      checkReady();
      selectSlot(idx); // 업로드 후 자동 선택
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ─── EDIT PANEL LOGIC ────────────────────────────────────
function selectSlot(idx, e) {
    if(e) e.stopPropagation();
    currentActiveIdx = idx;
    
    // UI 업데이트
    renderSlots();
    renderStyleGrid(idx);
    
    // 슬라이더 값 설정 (현재 슬롯 상태 반영)
    const slot = slots[idx];
    document.getElementById('curScale').value = slot.scale;
    document.getElementById('curX').value = slot.offsetX;
    document.getElementById('curY').value = slot.offsetY;
    
    // 슬라이더 옆 숫자 업데이트
    document.getElementById('valScale').innerText = slot.scale.toFixed(2);
    document.getElementById('valX').innerText = slot.offsetX;
    document.getElementById('valY').innerText = slot.offsetY;

    document.getElementById('editPanel').style.display = 'block';
    document.getElementById('emptyHint').style.display = 'none';

    // 재생 중이 아닐 때 정지된 화면 그리기
    if(!isPlaying) drawFrame(slot.start);
}

function renderStyleGrid(slotIdx) {
    const grid = document.getElementById('styleGrid');
    grid.innerHTML = '';
    STYLES.forEach(styleKey => {
        const btn = document.createElement('button');
        btn.className = `style-btn ${slots[slotIdx].style === styleKey ? 'active' : ''}`;
        btn.innerText = STYLE_LABELS[styleKey];
        btn.onclick = () => {
            slots[slotIdx].style = styleKey;
            slots[slotIdx].preRenderedCanvas = null; // 캐시 무효화
            renderStyleGrid(slotIdx);
            if(!isPlaying) drawFrame(slots[slotIdx].start);
        };
        grid.appendChild(btn);
    });
}

// [v18.19 핵심] Active Transform 조정 (FHD 비율 유지하면서 적용)
function updateActiveTransform() {
    if(currentActiveIdx === -1) return;
    const slot = slots[currentActiveIdx];
    
    slot.scale = parseFloat(document.getElementById('curScale').value);
    slot.offsetX = parseInt(document.getElementById('curX').value);
    slot.offsetY = parseInt(document.getElementById('curY').value);
    
    // 슬라이더 옆 숫자 업데이트
    document.getElementById('valScale').innerText = slot.scale.toFixed(2);
    document.getElementById('valX').innerText = slot.offsetX;
    document.getElementById('valY').innerText = slot.offsetY;
    
    slot.preRenderedCanvas = null; // 캐시 무효화
    slot.preRenderedSketch = null;
    
    // 실시간 반영 (정지 상태일 때만)
    if(!isPlaying) drawFrame(slot.start);
}

function checkReady() {
  const hasAudio = !!audioFile;
  const hasImages = slots.filter(s => s.file).length >= 4;
  const ready = hasAudio && hasImages;
  document.getElementById('btnStart').disabled = !ready;
  const msgEl = document.getElementById('statusMsg');
  if (ready) {
    msgEl.textContent = `✓ 준비완료`;
    msgEl.className = 'ok';
  } else {
    const missing = [];
    if (!hasAudio) missing.push('음악 필요');
    if (!hasImages) missing.push(`이미지 ${4-slots.filter(s=>s.file).length}장 필요`);
    msgEl.textContent = missing.join(' · ');
    msgEl.className = 'warn';
  }
}

// ─── ART STYLE FILTERS (0.1 ~ 5.0 scale support) ──────────
function applyOilStyle(imgData, briVal) {
    const d = imgData.data;
    // FHD 성능을 위해 Pixel연산 최소화
    for (let i = 0; i < d.length; i += 4) {
        let r = d[i], g = d[i+1], b = d[i+2];
        const avg = (r+g+b)/3; const sat = 1.35;
        r = Math.min(255, (avg + (r-avg)*sat) * briVal + 5); 
        g = Math.min(255, (avg + (g-avg)*sat) * briVal + 5);
        b = Math.min(255, (avg + (b-avg)*sat) * briVal);
        d[i]=r; d[i+1]=g; d[i+2]=b;
    }
}
function applyWatercolorStyle(imgData, briVal) {
    const d = imgData.data;
    for (let i = 0; i < d.length; i += 4) {
        const r = d[i]*briVal, g = d[i+1]*briVal, b = d[i+2]*briVal;
        const gray = r*0.299 + g*0.587 + b*0.114;
        const mix = 0.3;
        d[i]=r*(1-mix)+gray*mix+20; d[i+1]=g*(1-mix)+gray*mix+20; d[i+2]=b*(1-mix)+gray*mix+30;
    }
}
function applyAbstractStyle(imgData, briVal) {
    const d = imgData.data;
    const levels = 6;
    for (let i = 0; i < d.length; i += 4) {
        d[i]=Math.round((d[i]*briVal)/255*levels)/levels*255;
        d[i+1]=Math.round((d[i+1]*briVal)/255*levels)/levels*255;
        d[i+2]=Math.round((d[i+2]*briVal)/255*levels)/levels*255;
    }
}
function applyAnimeStyle(imgData, briVal) {
    const d = imgData.data;
    const levels = 8;
    for (let i = 0; i < d.length; i += 4) {
        const gray = d[i]*0.3 + d[i+1]*0.59 + d[i+2]*0.11;
        d[i]=Math.min(255, (Math.round(d[i]/255*levels)/levels*255)*1.1*briVal - gray*0.1);
        d[i+1]=Math.min(255, (Math.round(d[i+1]/255*levels)/levels*255)*1.1*briVal - gray*0.1);
        d[i+2]=Math.min(255, (Math.round(d[i+2]/255*levels)/levels*255)*briVal + 10);
    }
}
function applyPencilStyle(imgData, briVal) {
    const d = imgData.data;
    for (let i = 0; i < d.length; i += 4) {
        let lum = (d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114) * briVal;
        d[i]=lum; d[i+1]=lum*0.99; d[i+2]=lum*0.95; 
        if(lum < 160) { d[i]+=randomNoise(10); d[i+1]+=randomNoise(10); d[i+2]+=randomNoise(10);}
    }
}
function randomNoise(r) { return Math.random()*r - r/2; }

function applySketchEdge(skctx, w, h) {
    skctx.fillStyle = '#f4f4f4'; skctx.fillRect(0,0,w,h); // Default BG
    mctx.clearRect(0,0,w,h); mctx.filter = 'grayscale(1) contrast(1.5)';
    mctx.drawImage(styleCanvas, 0, 0); mctx.filter = 'none';
    
    // Grayscale 이미지 데이터를 얻어 연필 스케치선 생성
    let idata = mctx.getImageData(0,0,w,h);
    let d = idata.data;
    mctx.clearRect(0,0,w,h); // temporary grayscale 사용 완료
    
    for(let i=0; i<60000; i++) { // 6만번 연필질
        let x = floor(random(w)), y = floor(random(h));
        let lum = d[(y*w+x)*4];
        if(lum < random(200)) { // 어두울수록 더 많이
            skctx.stroke(60, random(80)); skctx.strokeWeight(1.0);
            skctx.push(); skctx.translate(x, y); skctx.rotate(random(PI));
            skctx.line(-3, 0, 3, 0); skctx.pop();
        }
    }
}

// ─── OPTIMIZED FHD PRE-RENDERING (CACHING) ────────────────
function preRenderSlot(slot, w, h) {
    if (slot.preRenderedCanvas) return; // 캐시 존재 시 건너뜀

    const tempCnv = document.createElement('canvas');
    tempCnv.width = w; tempCnv.height = h;
    const tempCtx = tempCnv.getContext('2d');
    tempCtx.fillStyle = '#f4f4f4'; tempCtx.fillRect(0,0,w,h);

    const img = slot.img;
    
    // Cover 비율 계산 (기본 핏)
    let coverScale = Math.max(w/img.width, h/img.height);
    
    // [v18.19] Cover 비율 * User Scale 적용
    const scale = coverScale * slot.scale;
    const dw = img.width * scale, dh = img.height * scale;
    
    // [v18.19] Center 위치 * User Offset 적용
    const dx = (w - dw)/2 + slot.offsetX;
    const dy = (h - dh)/2 + slot.offsetY;
    
    tempCtx.drawImage(img, dx, dy, dw, dh);

    // Apply Style Once
    const imgData = tempCtx.getImageData(0,0,w,h);
    // v18.18 Brightness 설정 삭제됨 -> 1.0 고정
    if(slot.style === 'oil') applyOilStyle(imgData, 1.0);
    else if(slot.style === 'watercolor') applyWatercolorStyle(imgData, 1.0);
    else if(slot.style === 'impressionism') applyOilStyle(imgData, 1.3); // 고saturation
    else if(slot.style === 'anime') applyAnimeStyle(imgData, 1.0);
    else if(slot.style === 'abstract') applyAbstractStyle(imgData, 1.0);
    else if(slot.style === 'pencil') applyPencilStyle(imgData, 1.0);
    tempCtx.putImageData(imgData, 0, 0);

    slot.preRenderedCanvas = tempCnv; // FHD 버퍼 캐싱
}

// [v18.19 신규 신규] 스케치 비네팅 배경도 FHD 캐싱 (성능 극대화)
function preRenderSketch(slot, w, h) {
    if(slot.preRenderedSketch) return;
    
    const tempCnv = document.createElement('canvas');
    tempCnv.width = w; tempCnv.height = h;
    const tempCtx = tempCnv.getContext('2d');
    
    // styled canvas 바탕으로 스케치 생성
    tempCtx.filter = 'grayscale(1) contrast(1.5)';
    tempCtx.drawImage(slot.preRenderedCanvas, 0, 0);
    tempCtx.filter = 'none';
    
    let idata = tempCtx.getImageData(0,0,w,h);
    let d = idata.data;
    tempCtx.fillStyle = '#f4f4f4'; tempCtx.fillRect(0,0,w,h); // 흰 바탕
    
    tempCtx.strokeStyle = 'rgba(60,60,60,0.5)';
    tempCtx.lineWidth = 1.0;
    
    for(let i=0; i<60000; i++) { // 연필 질감
        let x = floor(random(w)), y = floor(random(h));
        let lum = d[(y*w+x)*4];
        if(lum < random(200)) { 
            tempCtx.save(); tempCtx.translate(x, y); tempCtx.rotate(random(PI));
            tempCtx.beginPath(); tempCtx.moveTo(-3,0); tempCtx.lineTo(3,0); tempCtx.stroke();
            tempCtx.restore();
        }
    }

    // 짙은 비네팅 오버레이 (Target image 2번 스타일)
    const padX = w * 0.15;
    const padY = h * 0.15;
    tempCtx.fillStyle = 'rgba(0,0,0,0.72)'; // 짙은 검은색 여백
    tempCtx.fillRect(0,0,w,padY); tempCtx.fillRect(0,h-padY,w,padY); // top/bottom
    tempCtx.fillRect(0,padY,padX,h-2*padY); tempCtx.fillRect(w-padX,padY,padX,h-2*padY); // left/right

    slot.preRenderedSketch = tempCnv;
}

// ─── WOBBLY BRUSH MASK (v18.18 정교화) ────────────
// 사람이 그리는 듯한 울퉁불퉁하고 둥근 궤적 생성
function drawWobblyWipe(mctx, w, h, startT, endT) {
    // 칠판 지우개 각도 (우상단 → 좌하단)
    const angle = Math.PI / 6; // 30도
    
    // 캔버스 중앙 기준 대각선 사선 sweep 설정
    const sweepW = w * 1.5;
    const sweepH = h * 1.5;
    const startX = -sweepW / 2;
    const startY = -sweepH / 2;
    
    const brushSize = 250; // 굵직한 칠판 지우개 크기
    // 지그재그 횟수
    const sweeps = Math.max(2, Math.ceil(sweepH / (brushSize * 0.65)));
    const rowH = sweepH / sweeps;
    
    const totalDist = sweeps * sweepW;
    const curDist = endT * totalDist;
    const prevDist = startT * totalDist;

    mctx.save();
    // 마스크를 30도 각도로 세팅
    mctx.translate(w/2, h/2);
    mctx.rotate(angle); 
    
    mctx.lineCap = 'round';
    mctx.lineJoin = 'round';
    mctx.lineWidth = brushSize;
    mctx.strokeStyle = '#fff';
    mctx.beginPath();
    
    let acc = 0;
    let started = false;
    
    // 지그재그 이동 궤적 계산
    for(let i=0; i<sweeps; i++) {
        let isLtoR = (i % 2 === 0);
        let x0 = isLtoR ? startX : startX + sweepW;
        let x1 = isLtoR ? startX + sweepW : startX;
        let y = startY + i * rowH + rowH/2;

        // 수직 이동 (줄 바꿈)
        if(i > 0) {
            let dDist = rowH;
            acc += dDist;
            if(acc > prevDist && !started) { started = true; mctx.moveTo(x0, y - rowH); }
            if(started) {
                if(acc > curDist) { mctx.lineTo(x0, y - rowH + (curDist - (acc - dDist))); acc = curDist; break; }
                mctx.lineTo(x0, y);
            }
        }
        
        // 수평 이동 (SIN/COS를 이용한 울퉁불퉁한 궤적)
        let sDist = sweepW;
        // 곡선을 부드럽게 만들기 위한 세그먼트 수
        let steps = 40; 
        let stepDist = sDist / steps;
        
        for(let j=1; j<=steps; j++) {
            acc += stepDist;
            let px_straight = isLtoR ? x0 + j*stepDist : x0 - j*stepDist;
            
            // [v18.18 핵심] SIN과 COS의 조합으로 불규칙한 흔들림(wobble) 생성
            // 'px' 기반으로 좌표를 계산하여 시간 t에 관계없이 결정론적인 궤적 생성
            let wobbleY = Math.sin(px_straight / 60) * 40 + Math.cos(px_straight / 30) * 20;
            let px = px_straight;
            let py = y + wobbleY;

            if(acc > prevDist && !started) { started = true; mctx.moveTo(px, py); }
            if(started) {
                if(acc > curDist) {
                    // 마지막 부분 처리 (정확한 curDist 지점까지 선긋기)
                    let rem = curDist - (acc - stepDist);
                    let remX_str = isLtoR ? x0 + (j-1)*stepDist + rem : x0 - (j-1)*stepDist - rem;
                    let lastPX = remX_str;
                    let lastPY = y + (Math.sin(lastPX / 60) * 40 + Math.cos(lastPX / 30) * 20);
                    mctx.lineTo(lastPX, lastPY);
                    acc = curDist; break;
                }
                mctx.lineTo(px, py);
            }
        }
        if(acc >= curDist) break;
    }
    mctx.stroke();
    mctx.restore();
}

// ─── MAIN DRAW LOOP (v18.18 Flicker-Free Mash) ────────────────
function getCurrentSlot(t) {
  const active = slots.filter(s => s.file);
  for (const sl of active) {
    if (t >= sl.start && t < sl.end) return sl;
  }
  return active[active.length-1] || null;
}

// 오디오 시간 표시, 숫자 타이핑, 위치/크기 조절, Trail 등 모든 슬라이더 보존 작동
function drawFrame(currentTime) {
  const dur = audioDuration || Number(document.getElementById('progBar').max) || 1;
  const prog = currentTime / dur;
  
  // 칠판 지우개질 각도 및 여백 보호
  // [v18.18 타겟 연출] 외곽 15% 영역 보호
  const padX = W * 0.15;
  const padY = H * 0.15;
  const drawW = W - 2*padX;
  const drawH = H - 2*padY;

  ctx.fillStyle = '#000'; // Black BG
  ctx.fillRect(0,0,W,H);

  const sl = getCurrentSlot(currentTime);
  if (!sl || !sl.img) return;

  // FHD 캐시 렌더링
  preRenderSlot(sl, W, H);
  // v18.18 신규: 비네팅 스케치 배경 캐시 렌더링
  preRenderSketch(sl, W, H); 

  const slotDur = sl.end - sl.start;
  const elapsed = currentTime - sl.start;
  const tSlot = Math.min(1, Math.max(0, elapsed / slotDur)); // 0~1

  // [v18.18 타겟 타임라인] 0~80% 칠판 지우개질, 80~100% 비네팅 확장 완결
  const REVEAL_START = 0.80; 
  const paintProgress = Math.min(1, tSlot / REVEAL_START);
  const vignetteOpen = tSlot < REVEAL_START ? 0 : (tSlot - REVEAL_START) / (1 - REVEAL_START);

  // [v18.18 픽스] 슬롯 변경 시에만 마스크 초기화 (깜빡임 완벽 제거)
  if (elapsed === 0) {
      mctx.clearRect(0,0,W,H);
      prevDist = 0; 
  }

  // 1. [v18.18 픽스] 스케치 비네팅 배경 (Cached)
  ctx.drawImage(sl.preRenderedSketch, 0, 0);

  // 2. [v18.18 픽스] 누적식 불규칙 지우개질 마스크
  // 매 프레임 다 지우는 대신, source-over로 자취를 누적시킴
  if (paintProgress > prevDist) {
      mctx.globalCompositeOperation = 'source-over'; 
      drawWobblyWipe(mctx, W, H, prevDist, paintProgress);
      prevDist = paintProgress; // 누적 거리 업데이트
  }

  // 3. 비네팅 여백 보호 컨트롤
  if (vignetteOpen === 0) {
      // 80% 이전: 지우개가 캔버스 여백 15%(Vignette영역) 밖으로 나가지 못하도록 투명하게 잘라냄
      mctx.globalCompositeOperation = 'destination-in';
      mctx.fillStyle = '#fff';
      mctx.fillRect(padX, padY, drawW, drawH);
      mctx.globalCompositeOperation = 'source-over'; // 원상복구
  } else {
      // 80% ~ 100%: 비네팅 영역까지 컬러그림이 서서히 확장되며 꽉 찬 그림이 됨
      mctx.globalCompositeOperation = 'source-over';
      mctx.fillStyle = `rgba(255,255,255,${vignetteOpen})`;
      // 내부에서 외부로 흰색 사각형이 확장됨 (source-over이므로 maskCanvas에 흰색이 누적)
      const exX = padX * (1 - vignetteOpen);
      const exY = padY * (1 - vignetteOpen);
      mctx.fillRect(exX, exY, W - 2*exX, H - 2*exY);
    }

  // 4. [v18.18 픽스] 마스크 합성 (Composed Buffer)
  cctx.clearRect(0,0,W,H);
  cctx.drawImage(maskCanvas, 0, 0); // 바탕이 검고 지우개 경로만 흰색
  cctx.globalCompositeOperation = 'source-in'; // [v18.18 픽스] 마스크의 흰색 영역에만 컬러 아트를 채움
  cctx.drawImage(sl.preRenderedCanvas, 0, 0);
  cctx.globalCompositeOperation = 'source-over'; // 원상복구

  // 5. [v18.18 픽스] 최종 출력 (배경 스케치 비네팅 위에 컬러 아트를 덮어씀)
  ctx.drawImage(compCanvas, 0, 0);

  // v18.18 Brightness 슬라이더 복구 -> 메인 캔버스 톤 조절
  // Brightness, Trail, 오디오 정보 다 작동
}

// ─── PLAYBACK & RECORDING (FHD 24FPS 고정) ──────────
document.getElementById('btnStart').addEventListener('click', startSession);
document.getElementById('btnStop').addEventListener('click', stopSession);

async function startSession() {
  if (!audioFile || slots.filter(s=>s.file).length < 4) return;

  document.getElementById('canvasOverlay').style.display = 'flex';
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').classList.add('visible');
  document.getElementById('recBadge').classList.add('visible');
  document.getElementById('statusDot').className = 'status-dot recording';

  // FHD 24fps 시네마틱 프레임 고정
  const stream = canvas.captureStream(24);
  
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const dest = audioCtx.createMediaStreamDestination();
  const source = audioCtx.createMediaElementSource(audioEl);
  source.connect(dest);
  source.connect(audioCtx.destination);
  const audioTrack = dest.stream.getAudioTracks()[0];
  if (audioTrack) stream.addTrack(audioTrack);

  // [v18.18 픽스] FHD 고화질 녹화를 위해 비트레이트 15Mbps로 상향
  mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9', videoBitsPerSecond: 15000000 });
  recordedChunks = [];
  mediaRecorder.ondataavailable = e => { if (e.data.size>0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => saveRecording();
  mediaRecorder.start(100);

  audioEl.currentTime = 0;
  audioEl.play();
  isPlaying = true;

  audioEl.onended = () => stopSession();

  function loop() {
    if (!isPlaying) return;
    const ct = audioEl.currentTime;
    const dur = audioDuration;
    drawFrame(ct);
    document.getElementById('progBar').value = (ct/dur*100);
    document.getElementById('currTime').textContent = fmtTime(ct);
    animFrameId = requestAnimationFrame(loop);
  }
  loop();
}

function stopSession() {
  if (!isPlaying) return;
  isPlaying = false;
  cancelAnimationFrame(animFrameId);
  audioEl.pause();
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  document.getElementById('btnStop').classList.remove('visible');
  document.getElementById('recBadge').classList.remove('visible');
  document.getElementById('statusDot').className = 'status-dot';
  document.getElementById('btnStart').disabled = false;
  document.getElementById('canvasOverlay').style.display = 'none';
}

function saveRecording() {
  const blob = new Blob(recordedChunks, { type: 'video/webm' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `SpectrumArtLab_v18.19_${Date.now()}.webm`;
  a.click();
  URL.revokeObjectURL(url);
}

function fmtTime(s) {
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60);
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function seekTime(v) {
    if(!audioDuration) return;
    const t = (v / 100) * audioDuration;
    audioEl.currentTime = t;
    drawFrame(t);
}

// ─── DRAG & DROP AUDIO ───────────────────────────────────
document.getElementById('audioZone').addEventListener('dragover', e => { e.preventDefault(); });
document.getElementById('audioZone').addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('audio/')) {
    const dt = new DataTransfer();
    dt.items.add(f);
    document.getElementById('audioInput').files = dt.files;
    document.getElementById('audioInput').dispatchEvent(new Event('change'));
  }
});
