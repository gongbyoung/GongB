<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SBLv18.26 — True Masterpiece</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#050505; --panel:#0d0d12; --accent:#00ffcc; --border:rgba(255,255,255,0.08); --text:#ffffff; }
body{ background:var(--bg); color:var(--text); font-family:sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo{letter-spacing:4px; color:var(--accent); font-weight:800; font-size:12px;}

.container { display: grid; grid-template-columns: 350px 1fr 340px; flex: 1; min-height: 0; }
.side-panel { background: var(--panel); padding: 15px; overflow-y: auto; border-right: 1px solid var(--border); }
.side-panel.right { border-right:none; border-left: 1px solid var(--border); }

.seq-item { background: #16161d; padding: 12px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #222; cursor: pointer; transition: 0.2s; }
.seq-item.active { border-color: var(--accent); background: #1a2523; box-shadow: 0 0 10px rgba(0,255,204,0.1); }
.seq-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.time-input { background:#000; border:1px solid #444; color:var(--accent); width:65px; padding:4px; font-size:12px; text-align:center; border-radius:4px; font-family:monospace; }

.viz-area { background: #000; flex: 1; display: flex; justify-content: center; align-items: center; overflow:hidden; }
canvas { box-shadow: 0 0 50px rgba(0,0,0,1); }

h3 { font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 8px; cursor: pointer; font-size: 11px; border-radius: 4px; width: 100%; margin-bottom: 5px; transition: 0.2s; }
.btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.05); }

input[type=range] { width: 100%; accent-color: var(--accent); height: 4px; cursor: pointer; margin-bottom: 10px;}
label { font-size: 9px; color: #888; display:block; margin-bottom:3px; margin-top:8px;}
.val-label { float: right; color: var(--accent); font-weight: bold; }

#audioInfo { font-family: monospace; font-size: 11px; color: #ffcc00; margin-bottom: 15px; padding: 8px; background: rgba(255,204,0,0.1); border-radius: 4px; display: none; text-align: center;}
</style>
</head>
<body>

<div class="topbar">
    <div class="logo">SPECTRUM ART LAB v18.26 MASTERPIECE</div>
    <div id="status" style="font-size:10px; color:var(--accent);">STANDBY</div>
</div>

<div class="container">
    <div class="side-panel">
        <h3>1. Audio & Sequence</h3>
        <button class="btn" onclick="document.getElementById('mIn').click()">🎵 LOAD MP3 AUDIO</button>
        <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleMusic(this.files)">
        <div id="audioInfo">TOTAL AUDIO: 0.0s (00:00)</div>
        <button class="btn" style="background:var(--accent); color:#000; font-weight:bold; border:none;" onclick="document.getElementById('iIn').click()">🖼️ ADD IMAGE</button>
        <input type="file" id="iIn" accept="image/*" style="display:none" onchange="handleImageAdd(this.files)">
        <div id="sequenceList" style="margin-top:20px;"></div>
    </div>

    <div class="viz-area" id="vArea"></div>

    <div class="side-panel right">
        <h3>2. Viewport & Canvas</h3>
        <div style="display: flex; gap:5px; margin-bottom:10px;">
            <button class="btn active" id="b169" onclick="setAspect('16:9')">16:9</button>
            <button class="btn" id="b916" onclick="setAspect('9:16')">9:16</button>
        </div>
        
        <h3>3. Rendering Engine FX</h3>
        <label>DRAWING FOCUS</label>
        <select id="drawDirection" style="width:100%; background:#000; color:#fff; border:1px solid #333; font-size:11px; padding:5px;">
            <option value="diagonal">대각선 지우개 (ZigZag Master)</option>
            <option value="global">중앙 확산 (Center Expand)</option>
        </select>

        <label>BRUSH SCALE (지우개 굵기) <span class="val-label" id="valBScale">1.0</span></label>
        <input type="range" id="paintScale" min="0.1" max="4.0" step="0.1" value="1.0" oninput="document.getElementById('valBScale').innerText=this.value">
        
        <h3>4. Active Transform</h3>
        <div id="seqUI" style="opacity: 0.3; pointer-events: none; background:#111; padding:10px; border-radius:8px;">
            <label>IMAGE SCALE <span id="txtS" class="val-label">1.0</span></label>
            <input type="range" id="curScale" min="0.1" max="4.0" step="0.05" value="1.0" oninput="updateCurSeq()">
            <label>OFFSET X <span id="txtX" class="val-label">0</span></label>
            <input type="range" id="curX" min="-800" max="800" value="0" oninput="updateCurSeq()">
            <label>OFFSET Y <span id="txtY" class="val-label">0</span></label>
            <input type="range" id="curY" min="-800" max="800" value="0" oninput="updateCurSeq()">
        </div>

        <button class="btn" id="recBtn" onclick="togglePlay()" style="margin-top:20px; background:#ff3e81; color:white; font-weight:bold; border:none; padding:12px;">🔴 START REC & AUTO SAVE</button>
        <div style="display:flex; gap:5px;">
            <button class="btn" onclick="clearCanvas()">CLEAR</button>
            <button class="btn" onclick="saveArt()">SAVE PNG</button>
        </div>
    </div>
</div>

<div class="playbar" style="height:60px; background:var(--panel); border-top:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:15px;">
    <span id="currTime" style="font-size:14px; color:var(--accent); font-family:monospace;">00:00</span>
    <input type="range" id="progBar" value="0" min="0" max="100" step="0.1" style="flex:1;">
    <span id="totalTime" style="font-size:14px; color:#555; font-family:monospace;">00:00</span>
</div>

<script>
let audio, isPlaying = false, sequences = [], currentActiveIdx = -1;
let aspect = '16:9', canvasW = 1280, canvasH = 720;
let recorder, recordedChunks = [];
let paintBuffer, maskBuffer, vignetteBuffer;
let prevDist = 0;

function setup() {
    let cnv = createCanvas(canvasW, canvasH);
    cnv.parent('vArea');
    pixelDensity(1);
    
    paintBuffer = createGraphics(canvasW, canvasH);
    maskBuffer = createGraphics(canvasW, canvasH);
    vignetteBuffer = createGraphics(canvasW, canvasH);
    
    updateVignette();
    clearCanvas();
}

function updateVignette() {
    vignetteBuffer.resizeCanvas(width, height);
    vignetteBuffer.clear();
    vignetteBuffer.noStroke();
    let maxR = max(width, height) * 0.9;
    for(let r = 0; r < maxR; r += 3) {
        let alpha = map(r, 0, maxR, 0, 250);
        vignetteBuffer.fill(0, alpha);
        vignetteBuffer.ellipse(width/2, height/2, maxR*2.2 - r*1.8);
    }
}

function handleMusic(files) {
    if(!files[0]) return;
    audio = loadSound(URL.createObjectURL(files[0]), (b)=>{
        document.getElementById('totalTime').innerText = formatTime(audio.duration());
        document.getElementById('progBar').max = audio.duration();
        document.getElementById('audioInfo').style.display = "block";
        document.getElementById('audioInfo').innerText = `TOTAL: ${audio.duration().toFixed(1)}s`;
        audio.onended(() => { if(isPlaying) stopAndSave(); });
    });
}

function handleImageAdd(files) {
    if(!files[0]) return;
    loadImage(URL.createObjectURL(files[0]), (img) => {
        let lastEnd = sequences.length > 0 ? sequences[sequences.length-1].end : 0;
        let newSeq = {
            img: img, name: files[0].name,
            start: lastEnd, end: lastEnd + 10,
            style: 'oil', scale: 1.0, x: 0, y: 0,
            artBuffer: null, sketchBuffer: null
        };
        sequences.push(newSeq);
        currentActiveIdx = sequences.length - 1;
        renderSeqList();
        enableUI(true);
    });
}

function renderSeqList() {
    const list = document.getElementById('sequenceList');
    list.innerHTML = "";
    sequences.forEach((s, i) => {
        let div = document.createElement('div');
        div.className = `seq-item ${i === currentActiveIdx ? 'active' : ''}`;
        div.onclick = () => selectSeq(i);
        div.innerHTML = `
            <div class="seq-info">
                <span style="font-size:11px; color:#fff;">${i+1}. ${s.name}</span>
                <input class="time-input" type="number" step="0.1" value="${s.end.toFixed(1)}" onchange="cascadeTime(${i}, this.value)">
            </div>
            <div style="display:flex; gap:3px;">
                <button class="btn ${s.style==='oil'?'active':''}" onclick="setSeqStyle(${i}, 'oil')">유채</button>
                <button class="btn ${s.style==='pencil'?'active':''}" onclick="setSeqStyle(${i}, 'pencil')">연필</button>
                <button class="btn ${s.style==='point'?'active':''}" onclick="setSeqStyle(${i}, '점묘')">점묘</button>
            </div>
        `;
        list.appendChild(div);
    });
}

function setSeqStyle(idx, style) {
    sequences[idx].style = style;
    sequences[idx].artBuffer = null;
    renderSeqList();
    if(!isPlaying) drawGhostPreview();
}

function selectSeq(i) {
    currentActiveIdx = i;
    enableUI(true);
    let s = sequences[i];
    document.getElementById('curScale').value = s.scale;
    document.getElementById('curX').value = s.x;
    document.getElementById('curY').value = s.y;
    document.getElementById('txtS').innerText = s.scale;
    document.getElementById('txtX').innerText = s.x;
    document.getElementById('txtY').innerText = s.y;
    renderSeqList();
    if(!isPlaying) drawGhostPreview();
}

function updateCurSeq() {
    if(currentActiveIdx < 0) return;
    let s = sequences[currentActiveIdx];
    s.scale = Number(document.getElementById('curScale').value);
    s.x = Number(document.getElementById('curX').value);
    s.y = Number(document.getElementById('curY').value);
    document.getElementById('txtS').innerText = s.scale;
    document.getElementById('txtX').innerText = s.x;
    document.getElementById('txtY').innerText = s.y;
    s.artBuffer = null; // 캐시 초기화
    if(!isPlaying) drawGhostPreview();
}

// [v18.26 픽스] preRenderArtBuffers 에러 해결 및 스타일 픽스
function preRenderArtBuffers(seq) {
    document.getElementById('status').innerText = "RENDERING STYLE...";
    let art = createGraphics(width, height);
    let sk = createGraphics(width, height);
    art.pixelDensity(1); sk.pixelDensity(1);
    
    let bg = "#f4f4f4";
    art.background(bg);
    sk.background(bg);

    // 이미지 트랜스폼 계산
    let img = seq.img;
    let r = Math.max(width/img.width, height/img.height) * seq.scale;
    let dw = img.width * r, dh = img.height * r;
    let dx = width/2 + seq.x, dy = height/2 + seq.y;

    // 스타일 렌더링
    let temp = createGraphics(width, height);
    temp.imageMode(CENTER);
    temp.image(img, dx, dy, dw, dh);
    let d = temp.get();
    d.loadPixels();
    
    art.noStroke();
    let total = 120000;
    for(let i=0; i<total; i++) {
        let x = floor(random(width)), y = floor(random(height));
        let col = d.get(x, y);
        if(alpha(col) < 50) continue;
        
        art.push();
        art.translate(x, y);
        let bSize = 12 * seq.scale;
        if(seq.style === 'oil') {
            art.fill(red(col)+random(-10,10), green(col)+random(-10,10), blue(col)+random(-10,10), 230);
            art.rotate(random(TWO_PI));
            art.rect(-bSize, -bSize*0.3, bSize*2, bSize*0.6, 2);
        } else if(seq.style === 'pencil') {
            let lum = (red(col)*0.299 + green(col)*0.587 + blue(col)*0.114);
            if(lum < 160) {
                art.stroke(red(col)*0.5, 180); art.strokeWeight(1.0);
                art.rotate(PI/4 + random(0.2)); art.line(-bSize, 0, bSize, 0);
            }
        } else {
            art.fill(col); art.ellipse(0,0,bSize);
        }
        art.pop();
    }
    
    // 스케치 배경 렌더링
    sk.drawingContext.filter = 'grayscale(1) contrast(1.5)';
    sk.imageMode(CENTER);
    sk.image(img, dx, dy, dw, dh);
    sk.drawingContext.filter = 'none';
    let skD = sk.get();
    
    sk.background(bg);
    sk.stroke(60, 100);
    for(let i=0; i<50000; i++) {
        let x = floor(random(width)), y = floor(random(height));
        if(brightness(skD.get(x,y)) < random(200)) {
            sk.push(); sk.translate(x, y); sk.rotate(random(PI));
            sk.line(-4, 0, 4, 0); sk.pop();
        }
    }
    
    seq.artBuffer = art;
    seq.sketchBuffer = sk;
    temp.remove();
    document.getElementById('status').innerText = "READY";
}

function draw() {
    let t = isPlaying && audio ? audio.currentTime() : Number(document.getElementById('progBar').value);
    document.getElementById('currTime').innerText = formatTime(t);
    document.getElementById('progBar').value = t;

    if(!isPlaying) return;

    let idx = sequences.findIndex(s => t >= s.start && t <= s.end);
    if(idx !== -1) {
        if(idx !== currentActiveIdx) { currentActiveIdx = idx; prevDist = 0; paintBuffer.clear(); }
        let s = sequences[idx];
        if(!s.artBuffer) preRenderArtBuffers(s);

        let prog = (t - s.start) / (s.end - s.start);
        let zigProg = min(1.0, prog / 0.8);

        image(s.sketchBuffer, 0, 0);

        maskBuffer.clear();
        maskBuffer.background(0);
        maskBuffer.fill(255);
        
        let pScale = Number(document.getElementById('paintScale').value);
        let eraserSize = (width * 0.15) * pScale;

        // [v18.26] 유기적 노이즈 지우개
        let pathX = lerp(0, width, zigProg);
        let pathY = lerp(0, height, zigProg);
        
        maskBuffer.drawingContext.globalCompositeOperation = 'source-over';
        for(let i=0; i<100 * zigProg; i++) {
            let ti = random(zigProg);
            let bx = lerp(0, width, ti) + random(-eraserSize, eraserSize);
            let by = lerp(0, height, ti) + random(-eraserSize, eraserSize);
            // 비원형 노이즈
            maskBuffer.push();
            maskBuffer.translate(bx, by);
            maskBuffer.rotate(random(TWO_PI));
            maskBuffer.ellipse(0, 0, eraserSize * random(0.7, 1.3), eraserSize * random(0.3, 0.8));
            maskBuffer.pop();
        }
        
        paintBuffer.clear();
        paintBuffer.image(maskBuffer, 0, 0);
        paintBuffer.drawingContext.globalCompositeOperation = 'source-in';
        paintBuffer.image(s.artBuffer, 0, 0);
        paintBuffer.drawingContext.globalCompositeOperation = 'source-over';

        image(paintBuffer, 0, 0);
        image(vignetteBuffer, 0, 0);
    }
}

function drawGhostPreview() {
    clearCanvas();
    if(currentActiveIdx !== -1) {
        let s = sequences[currentActiveIdx];
        if(!s.artBuffer) preRenderArtBuffers(s);
        tint(255, 130); image(s.artBuffer, 0, 0); noTint();
        image(vignetteBuffer, 0, 0);
    }
}

function cascadeTime(idx, val) {
    sequences[idx].end = Number(val);
    for(let i = idx + 1; i < sequences.length; i++) {
        let dur = sequences[i].end - sequences[i].start;
        sequences[i].start = sequences[i-1].end;
        sequences[i].end = sequences[i].start + dur;
    }
    renderSeqList();
}

function setAspect(r) {
    aspect = r;
    document.getElementById('b169').classList.toggle('active', r==='16:9');
    document.getElementById('b916').classList.toggle('active', r==='9:16');
    if(r==='16:9') { canvasW = 1280; canvasH = 720; } else { canvasW = 720; canvasH = 1280; }
    resizeCanvas(canvasW, canvasH);
    paintBuffer.resizeCanvas(width, height);
    maskBuffer.resizeCanvas(width, height);
    updateVignette();
    sequences.forEach(s => { s.artBuffer = null; });
    clearCanvas(); if(!isPlaying) drawGhostPreview();
}

function togglePlay() {
    if(!audio) return;
    if(isPlaying) { stopAndSave(); } 
    else { clearCanvas(); startRecording(); audio.play(); isPlaying = true; }
}

function stopAndSave() {
    if(audio) audio.stop(); isPlaying = false; recorder.stop();
    document.getElementById('status').innerText = "SAVED";
}

function startRecording() {
    recordedChunks = [];
    let stream = document.querySelector('canvas').captureStream(24);
    recorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
    recorder.ondataavailable = e => recordedChunks.push(e.data);
    recorder.onstop = () => {
        let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks, {type:'video/mp4'}));
        a.download = `ArtLab_v18.26_${Date.now()}.mp4`; a.click();
    };
    recorder.start();
}

function enableUI(on) { document.getElementById('seqUI').style.opacity = on ? "1" : "0.3"; document.getElementById('seqUI').style.pointerEvents = on ? "all" : "none"; }
function formatTime(s) { let m=floor(s/60), sec=floor(s%60); return `${nf(m,2)}:${nf(sec,2)}`; }
function clearCanvas() { background("#f4f4f4"); }
function saveArt() { saveCanvas('Masterpiece', 'png'); }
function seekTime(v) { if(!audio) return; audio.jump(Number(v)); if(!isPlaying) drawGhostPreview(); }
</script>
</body>
</html>
