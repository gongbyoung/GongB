<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>ART LAB v18.47 — Video Export Fixed</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#050505; --panel:#0d0d12; --accent:#00ffcc; --border:rgba(255,255,255,0.08); --text:#ffffff; }
body{ background:var(--bg); color:var(--text); font-family:sans-serif; height:100vh; overflow:hidden; display:flex; flex-direction:column; }
.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo{letter-spacing:4px; color:var(--accent); font-weight:800; font-size:12px;}
.container{ display:grid; grid-template-columns:360px 1fr 340px; flex:1; min-height:0; }
.side-panel{ background:var(--panel); padding:15px; overflow-y:auto; border-right:1px solid var(--border); }
.side-panel.right{ border-right:none; border-left:1px solid var(--border); }
.seq-item{ background:#16161d; padding:12px; border-radius:8px; margin-bottom:12px; border:1px solid #222; cursor:pointer; transition:0.2s; }
.seq-item.active{ border-color:var(--accent); background:#1a2523; }
.seq-info{ display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.time-input{ background:#000; border:1px solid #444; color:var(--accent); width:65px; padding:4px; font-size:11px; text-align:center; border-radius:4px; font-weight:bold; }
.viz-area{ background:#000; flex:1; display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative; }
#loader { display:none; position:absolute; inset:0; background:rgba(0,0,0,0.85); z-index:100; flex-direction:column; justify-content:center; align-items:center; backdrop-filter:blur(5px); }
#loaderTxt { color:var(--accent); font-size:28px; font-weight:900; letter-spacing:3px; font-family:monospace; margin-bottom:10px; }
#loaderSub { color:#888; font-size:12px; }

canvas{ box-shadow:0 0 50px rgba(0,0,0,1); }
h3{ font-size:10px; color:#555; text-transform:uppercase; margin-bottom:10px; border-bottom:1px solid var(--border); padding-bottom:5px; }
.btn{ background:transparent; border:1px solid var(--border); color:#fff; padding:8px; cursor:pointer; font-size:11px; border-radius:4px; width:100%; margin-bottom:5px; transition:0.2s; }
.btn.active{ border-color:var(--accent); color:var(--accent); background:rgba(0,255,204,0.05); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
input[type=range]{ width:100%; accent-color:var(--accent); height:4px; cursor:pointer; margin-bottom:10px; }
label{ font-size:9px; color:#888; display:block; margin-bottom:3px; margin-top:8px; }
.val-label{ float:right; color:var(--accent); font-weight:bold; }
.playbar{ height:60px; background:var(--panel); border-top:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:15px; }
</style>
</head>
<body>

<div class="topbar">
    <div class="logo">ART LAB v18.47 VIDEO EXPORT FIXED</div>
    <div id="status" style="font-size:10px; color:var(--accent);">READY</div>
</div>

<div class="container">
    <div class="side-panel">
        <h3>1. Sequence & Duration</h3>
        <button class="btn" onclick="document.getElementById('mIn').click()">🎵 LOAD AUDIO</button>
        <input type="file" id="mIn" aria-label="Audio Input" accept="audio/*" style="display:none" onchange="handleMusic(this.files)">
        <button class="btn" style="background:var(--accent); color:#000; font-weight:bold; border:none; margin-top:10px;" onclick="document.getElementById('iIn').click()">🖼️ ADD IMAGES</button>
        <input type="file" id="iIn" aria-label="Image Input" accept="image/*" style="display:none" onchange="handleImageAdd(this.files)" multiple>
        <div id="sequenceList" style="margin-top:20px;"></div>
    </div>
    
    <div class="viz-area" id="vArea">
        <div id="loader">
            <div id="loaderTxt">BAKING... 0%</div>
            <div id="loaderSub">메모리에 화풍을 캐싱하고 있습니다. UI 멈춤을 방지합니다.</div>
        </div>
    </div>
    
    <div class="side-panel right">
        <h3>2. Viewport</h3>
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <button class="btn active" id="b169" onclick="setAspect('16:9')">16:9</button>
            <button class="btn" id="b916" onclick="setAspect('9:16')">9:16</button>
        </div>
        
        <h3>3. Rendering Engine FX</h3>
        <label for="paintScale">WIPE SCALE (지우개 크기) <span class="val-label" id="valBScale">1.5</span></label>
        <input type="range" id="paintScale" min="0.5" max="4.0" step="0.1" value="1.5" oninput="document.getElementById('valBScale').innerText=this.value; if(!isPlaying && currentActiveIdx !== -1) showPreview(currentActiveIdx);">

        <label for="artBrushScale">ART BRUSH SCALE (화풍 붓 크기) <span class="val-label" id="valArtBrushScale">1.0</span></label>
        <input type="range" id="artBrushScale" min="0.2" max="3.0" step="0.1" value="1.0" oninput="document.getElementById('valArtBrushScale').innerText=parseFloat(this.value).toFixed(1)" onchange="updateArtBrushScale(this.value)">
        
        <label for="artIntensity">ART INTENSITY (화풍 세기) <span class="val-label" id="valArtIntensity">100%</span></label>
        <input type="range" id="artIntensity" min="0" max="100" step="1" value="100" oninput="document.getElementById('valArtIntensity').innerText=this.value+'%'" onchange="updateArtIntensity(this.value)">

        <label for="lightnessSlider">LIGHTNESS (밝기) <span class="val-label" id="valLightness">100%</span></label>
        <input type="range" id="lightnessSlider" min="0" max="200" step="1" value="100" oninput="updateLightness(this.value)">

        <h3>4. Active Transform</h3>
        <div id="seqUI" style="opacity:0.3; pointer-events:none; background:#111; padding:10px; border-radius:8px;">
            <label for="curScale">IMAGE SCALE <span id="valS" class="val-label">1.0</span></label>
            <input type="range" id="curScale" min="0.1" max="4.0" step="0.05" value="1.0" oninput="document.getElementById('valS').innerText=parseFloat(this.value).toFixed(2)" onchange="updateCurSeq()">
            <label for="curX">OFFSET X <span id="valX" class="val-label">0</span></label>
            <input type="range" id="curX" min="-1200" max="1200" step="5" value="0" oninput="document.getElementById('valX').innerText=this.value" onchange="updateCurSeq()">
            <label for="curY">OFFSET Y <span id="valY" class="val-label">0</span></label>
            <input type="range" id="curY" min="-1200" max="1200" step="5" value="0" oninput="document.getElementById('valY').innerText=this.value" onchange="updateCurSeq()">
        </div>
        <button class="btn" id="recBtn" onclick="togglePlay()" style="margin-top:20px; background:#ff3e81; color:white; font-weight:bold; border:none; padding:12px;">🔴 START REC</button>
    </div>
</div>

<div class="playbar">
    <span id="currTime" style="font-size:14px; color:var(--accent); font-family:monospace; min-width:50px;">00:00</span>
    <input type="range" id="progBar" aria-label="Progress Bar" value="0" min="0" max="100" step="0.1" style="flex:1;" oninput="seekTime(this.value)">
    <span id="totalTime" style="font-size:14px; color:#555; font-family:monospace; min-width:50px;">00:00</span>
</div>

<audio id="audioEl" aria-label="Audio Player" style="display:none;"></audio>

<script>
let audio, isPlaying = false, isBaking = false, sequences = [], currentActiveIdx = -1;
let canvasW = 1280, canvasH = 720;
let paintBuffer, maskBuffer, vignetteBuffer;
let globalRawCnv, globalRawCtx; 

let artBrushScaleGlobal = 1.0;
let artIntensityGlobal = 1.0; 
let lightnessGlobal = 100;

// [영상 저장 전역 변수 선언]
let mediaRecorder; 
let recordedChunks = [];

function setup() {
    let cnv = createCanvas(canvasW, canvasH);
    cnv.parent('vArea');
    paintBuffer = createGraphics(canvasW, canvasH);
    maskBuffer = createGraphics(canvasW, canvasH);
    vignetteBuffer = createGraphics(canvasW, canvasH);
    
    globalRawCnv = document.createElement('canvas');
    globalRawCtx = globalRawCnv.getContext('2d', { willReadFrequently: true });
    
    updateVignette();
}

function updateVignette() {
    vignetteBuffer.resizeCanvas(width, height);
    vignetteBuffer.clear();
    let ctx = vignetteBuffer.drawingContext;
    let cx = width / 2, cy = height / 2;
    let maxR = Math.max(width, height) * 0.75;
    
    let grad = ctx.createRadialGradient(cx, cy, maxR * 0.3, cx, cy, maxR);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.85)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, height);
}

function handleMusic(files) {
    if(!files[0]) return;
    audio = loadSound(URL.createObjectURL(files[0]), ()=>{
        document.getElementById('totalTime').innerText = formatTime(audio.duration());
        document.getElementById('progBar').max = audio.duration();
    });
}

function handleImageAdd(files) {
    let loadedCount = 0;
    for(let f of files) {
        loadImage(URL.createObjectURL(f), (img) => {
            let lastEnd = sequences.length > 0 ? sequences[sequences.length-1].end : 0;
            sequences.push({
                img: img, name: f.name, start: lastEnd, end: lastEnd + 10,
                style: 'oil', scale: 1.0, x: 0, y: 0, artBuffer: null, sketchBuffer: null
            });
            loadedCount++;
            renderSeqList();
            if(loadedCount === files.length && currentActiveIdx === -1) {
                selectSeq(0);
            }
        });
    }
}

function renderSeqList() {
    const list = document.getElementById('sequenceList'); list.innerHTML = "";
    sequences.forEach((s, i) => {
        let div = document.createElement('div');
        div.className = `seq-item ${i === currentActiveIdx ? 'active' : ''}`;
        div.onclick = () => selectSeq(i);
        div.innerHTML = `<div class="seq-info"><span style="font-size:11px; color:#fff; font-weight:bold;">${i+1}. ${s.name}</span>
            <input class="time-input" aria-label="End Time" type="number" step="0.1" value="${s.end.toFixed(1)}" onchange="updateSeqTime(${i}, this.value)" onclick="event.stopPropagation()" ${isBaking?'disabled':''}></div>
            <div style="display:flex; gap:2px; justify-content: space-between;">
                <button class="btn ${s.style==='oil'?'active':''}" onclick="setSeqStyle(${i}, 'oil', event)" ${isBaking?'disabled':''}>유채</button>
                <button class="btn ${s.style==='pencil'?'active':''}" onclick="setSeqStyle(${i}, 'pencil', event)" ${isBaking?'disabled':''}>연필</button>
                <button class="btn ${s.style==='point'?'active':''}" onclick="setSeqStyle(${i}, 'point', event)" ${isBaking?'disabled':''}>점묘</button>
                <button class="btn ${s.style==='raw'?'active':''}" onclick="setSeqStyle(${i}, 'raw', event)" style="background: rgba(255,204,0,0.1); border-color: #ffcc00; color: #ffcc00;" ${isBaking?'disabled':''}>原本</button>
            </div>`;
        list.appendChild(div);
    });
}

function updateSeqTime(idx, val) {
    if(isBaking) return;
    sequences[idx].end = parseFloat(val);
    for(let i = idx + 1; i < sequences.length; i++) {
        let dur = sequences[i].end - sequences[i].start;
        sequences[i].start = sequences[i-1].end;
        sequences[i].end = sequences[i].start + dur;
    }
    renderSeqList();
}

function showPreview(idx) {
    if(isPlaying || isBaking) return;
    let s = sequences[idx];
    if(!s || !s.artBuffer) return;
    
    let previewTime = s.start + (s.end - s.start) * 0.8;
    document.getElementById('progBar').value = previewTime;
    document.getElementById('currTime').innerText = formatTime(previewTime);
    drawFrame(previewTime); 
}

function selectSeq(i) {
    if(isBaking) return;
    currentActiveIdx = i;
    let s = sequences[i];
    document.getElementById('curScale').value = s.scale;
    document.getElementById('curX').value = s.x; document.getElementById('curY').value = s.y;
    document.getElementById('valS').innerText = s.scale.toFixed(2);
    document.getElementById('valX').innerText = s.x;
    document.getElementById('valY').innerText = s.y;
    document.getElementById('seqUI').style.opacity = "1"; document.getElementById('seqUI').style.pointerEvents = "all";
    renderSeqList();
    
    if(!s.artBuffer) {
        bakeArtwork(i);
    } else {
        showPreview(i);
    }
}

function updateCurSeq() {
    if(currentActiveIdx < 0 || isBaking) return;
    let s = sequences[currentActiveIdx];
    s.scale = Number(document.getElementById('curScale').value);
    s.x = Number(document.getElementById('curX').value);
    s.y = Number(document.getElementById('curY').value);
    bakeArtwork(currentActiveIdx);
}

function setSeqStyle(i, style, e) {
    e.stopPropagation();
    if(isBaking) return;
    sequences[i].style = style; 
    renderSeqList(); 
    bakeArtwork(i);
}

function updateArtBrushScale(val) {
    if(isBaking) return;
    artBrushScaleGlobal = parseFloat(val);
    if(currentActiveIdx !== -1) bakeArtwork(currentActiveIdx);
}

function updateArtIntensity(val) {
    if(isBaking) return;
    artIntensityGlobal = parseInt(val) / 100.0;
    if(currentActiveIdx !== -1) bakeArtwork(currentActiveIdx);
}

function updateLightness(val) {
    lightnessGlobal = parseInt(val);
    document.getElementById('valLightness').innerText = lightnessGlobal + '%';
    if(!isPlaying && currentActiveIdx !== -1 && !isBaking) {
        showPreview(currentActiveIdx);
    }
}

async function bakeArtwork(idx) {
    if(isBaking) return;
    isBaking = true;
    let seq = sequences[idx];
    
    document.getElementById('loader').style.display = 'flex';
    document.getElementById('loaderTxt').innerText = `BAKING... 0%`;
    renderSeqList(); 
    
    await new Promise(r => setTimeout(r, 50)); 
    
    let art = createGraphics(width, height);
    art.pixelDensity(1);
    art.background("#f4f4f4");
    
    let img = seq.img;
    let imgW = img.width, imgH = img.height;
    let r = Math.max(width/imgW, height/imgH) * seq.scale;
    let cx = width/2 + seq.x, cy = height/2 + seq.y;
    
    globalRawCnv.width = imgW;
    globalRawCnv.height = imgH;
    globalRawCtx.drawImage(img.canvas || img.elt, 0, 0, imgW, imgH);
    let d = globalRawCtx.getImageData(0, 0, imgW, imgH).data;

    if(artIntensityGlobal < 1.0 || seq.style === 'raw') {
        art.imageMode(CENTER);
        art.image(img, cx, cy, imgW * r, imgH * r);
    }
    
    art.noStroke();

    if(seq.style !== 'raw' && artIntensityGlobal > 0) {
        let total = 140000;
        let chunkSize = 15000; 
        let alphaMult = artIntensityGlobal;
        
        for(let i=0; i<total; i+=chunkSize) {
            for(let j=0; j<chunkSize && (i+j)<total; j++) {
                let rx = Math.floor(Math.random() * width);
                let ry = Math.floor(Math.random() * height);
                let ix = Math.floor((rx - cx) / r + imgW / 2);
                let iy = Math.floor((ry - cy) / r + imgH / 2);
                
                if (ix < 0 || ix >= imgW || iy < 0 || iy >= imgH) continue;
                
                let idx = (iy * imgW + ix) * 4;
                if (d[idx+3] < 10) continue; 

                let r_v = d[idx], g_v = d[idx+1], b_v = d[idx+2];
                art.push();
                art.translate(rx, ry);
                let bSize = (12 * seq.scale) * artBrushScaleGlobal;

                if(seq.style === 'oil') {
                    art.fill(r_v + random(-15,15), g_v + random(-15,15), b_v + random(-15,15), 230 * alphaMult);
                    art.rotate(random(TWO_PI));
                    art.rect(-bSize, -bSize*0.3, bSize*2, bSize*0.6, 2);
                } else if(seq.style === 'pencil') {
                    let lum = r_v*0.299 + g_v*0.587 + b_v*0.114;
                    if(lum < 180) {
                        art.stroke(r_v*0.5, 150 * alphaMult); 
                        art.strokeWeight(1.0 * artBrushScaleGlobal);
                        art.rotate(PI/4 + random(0.2)); art.line(-bSize, 0, bSize, 0);
                    }
                } else {
                    art.fill(r_v, g_v, b_v, 255 * alphaMult);
                    art.ellipse(0, 0, bSize);
                }
                art.pop();
            }
            let progress = Math.floor(((i + chunkSize) / total) * 100);
            document.getElementById('loaderTxt').innerText = `BAKING... ${Math.min(progress, 100)}%`;
            await new Promise(r => setTimeout(r, 0));
        }
    }
    seq.artBuffer = art;

    let skBuf = createGraphics(width, height);
    skBuf.pixelDensity(1);
    skBuf.background("#f4f4f4");
    
    if(seq.style !== 'raw') {
        skBuf.stroke(60, 100);
        let skTotal = 60000;
        let skChunkSize = 20000;
        for(let i=0; i<skTotal; i+=skChunkSize) {
            for(let j=0; j<skChunkSize && (i+j)<skTotal; j++) {
                let rx = Math.floor(Math.random() * width);
                let ry = Math.floor(Math.random() * height);
                let ix = Math.floor((rx - cx) / r + imgW / 2);
                let iy = Math.floor((ry - cy) / r + imgH / 2);
                if (ix < 0 || ix >= imgW || iy < 0 || iy >= imgH) continue;
                
                let idx = (iy * imgW + ix) * 4;
                let lum = d[idx]*0.299 + d[idx+1]*0.587 + d[idx+2]*0.114;
                
                if(lum < Math.random() * 200) {
                    skBuf.push(); skBuf.translate(rx, ry); skBuf.rotate(random(PI));
                    skBuf.line(-4, 0, 4, 0); skBuf.pop();
                }
            }
            await new Promise(r => setTimeout(r, 0));
        }
    }
    seq.sketchBuffer = skBuf;
    
    isBaking = false;
    document.getElementById('loader').style.display = 'none';
    renderSeqList(); 
    showPreview(idx); 
}

function drawFrame(ct) {
    if(isBaking) return;
    
    const sl = sequences.find(s => ct >= s.start && ct < s.end) || sequences[sequences.length-1];
    if (!sl || !sl.img || !sl.artBuffer || !sl.sketchBuffer) return;

    let slotIdx = sequences.indexOf(sl);
    let prog = (ct - sl.start) / (sl.end - sl.start || 1);
    
    let zigProg = Math.min(1.0, prog / 0.8);
    let expandProg = Math.max(0.0, Math.min(1.0, (prog - 0.8) / 0.2));

    image(sl.sketchBuffer, 0, 0);

    maskBuffer.clear();
    maskBuffer.noStroke();
    
    let pScale = Number(document.getElementById('paintScale').value);
    let eraserSize = (width * 0.22) * pScale;
    
    maskBuffer.drawingContext.globalCompositeOperation = 'source-over';
    maskBuffer.fill(255);
    
    let sweeps = 7;
    
    for(let i=0; i<300 * zigProg; i++) {
        let t = (i / 300);
        let curSweep = t * sweeps;
        
        let leftBound = eraserSize * 0.4 + (noise(curSweep * 0.5, slotIdx * 10, 0) - 0.5) * (width * 0.2);
        let rightBound = width - eraserSize * 0.4 + (noise(curSweep * 0.5, slotIdx * 10, 100) - 0.5) * (width * 0.2);
        
        let x = map(Math.sin(curSweep * Math.PI - Math.PI/2), -1, 1, leftBound, rightBound);
        let y = map(t, 0, 1, eraserSize*0.4, height - eraserSize*0.4);
        
        let organicOffsetX = (noise(t * 10, slotIdx) - 0.5) * eraserSize * 0.2;
        let organicOffsetY = (noise(t * 10 + 100, slotIdx) - 0.5) * eraserSize * 0.15;
        let organicRotate = (noise(t * 5, slotIdx) - 0.5) * Math.PI * 0.1;
        
        maskBuffer.push();
        maskBuffer.translate(x + organicOffsetX, y + organicOffsetY);
        maskBuffer.rotate(organicRotate);
        maskBuffer.ellipse(0, 0, eraserSize * (0.9+noise(t*15, slotIdx)*0.4), eraserSize * (0.5+noise(t*15+100, slotIdx)*0.3));
        maskBuffer.pop();
    }

    if (expandProg > 0) {
        maskBuffer.fill(255, 255 * expandProg);
        maskBuffer.rect(0, 0, width, height);
    }

    paintBuffer.clear();
    paintBuffer.image(maskBuffer, 0, 0);
    paintBuffer.drawingContext.globalCompositeOperation = 'source-in';
    paintBuffer.image(sl.artBuffer, 0, 0);
    paintBuffer.drawingContext.globalCompositeOperation = 'source-over';

    if(lightnessGlobal !== 100) {
        drawingContext.filter = `brightness(${lightnessGlobal}%)`;
    }
    image(paintBuffer, 0, 0);
    drawingContext.filter = 'none';

    image(vignetteBuffer, 0, 0);
}

function draw() {
    if(!isPlaying || isBaking) return;
    let ct = audio.currentTime();
    document.getElementById('currTime').innerText = formatTime(ct);
    document.getElementById('progBar').value = ct;
    drawFrame(ct);
}

function setAspect(r) {
    if(isBaking) return;
    if(r==='16:9') { canvasW=1280; canvasH=720; } else { canvasW=720; canvasH=1280; }
    resizeCanvas(canvasW, canvasH);
    paintBuffer.resizeCanvas(width, height); maskBuffer.resizeCanvas(width, height);
    updateVignette();
    sequences.forEach(s => { s.artBuffer = null; s.sketchBuffer = null; });
    document.getElementById('b169').className = r==='16:9'?'btn active':'btn';
    document.getElementById('b916').className = r==='9:16'?'btn active':'btn';
    if(currentActiveIdx !== -1) bakeArtwork(currentActiveIdx);
}

// [영상 저장 기능 픽스] STOP 시 녹화를 종료하고 다운로드
function togglePlay() {
    if(!audio || isBaking) return;
    if(isPlaying) { 
        audio.stop(); 
        isPlaying = false; 
        document.getElementById('recBtn').innerText = "🔴 START REC";
        
        // 추가: 녹화 종료 시 파일 생성 트리거
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
        }
    } 
    else { 
        audio.play(); 
        isPlaying = true; 
        document.getElementById('recBtn').innerText = "⏹ STOP"; 
        startRecording(); 
    }
}

// [영상 저장 기능 픽스] 메인 캔버스를 정확히 잡아 녹화 시작
function startRecording() {
    recordedChunks = [];
    
    // 숨겨진 캔버스가 아닌 현재 화면에 보이는 메인 캔버스 캡처
    let mainCanvas = document.querySelector('#vArea canvas');
    let stream = mainCanvas.captureStream(30); // 30fps로 부드럽게
    
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
    
    mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) recordedChunks.push(e.data);
    };
    
    mediaRecorder.onstop = () => {
        let blob = new Blob(recordedChunks, { type: 'video/webm' });
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.style.display = 'none';
        a.href = url;
        a.download = `ArtLab_Record_${Date.now()}.webm`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    };
    
    mediaRecorder.start();
}

function formatTime(s) { let m=Math.floor(s/60), sec=Math.floor(s%60); return `${nf(m,2)}:${nf(sec,2)}`; }
function seekTime(v) { 
    if(!audio || isBaking) return; 
    audio.jump(Number(v)); 
    if(!isPlaying) {
        document.getElementById('currTime').innerText = formatTime(Number(v));
        drawFrame(Number(v)); 
    }
}
</script>
