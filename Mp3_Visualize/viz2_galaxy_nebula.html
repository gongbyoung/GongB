<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualizer 02 — Galaxy Nebula</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020206;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #c0c0ff;
    overflow: hidden;
  }
  .label {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 6px;
    color: #3030aa;
    text-transform: uppercase;
  }
  canvas { display: block; }
  .controls {
    position: fixed;
    bottom: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
  }
  .drop-zone {
    border: 1px dashed #2020aa;
    border-radius: 10px;
    padding: 12px 32px;
    cursor: pointer;
    font-size: 12px;
    color: #5050aa;
    letter-spacing: 2px;
    transition: all 0.3s;
  }
  .drop-zone:hover { border-color: #6060ff; color: #9090ff; }
  input[type=file] { display: none; }
  button {
    background: rgba(20,20,60,0.7);
    border: 1px solid #2a2a66;
    border-radius: 6px;
    color: #8080cc;
    padding: 7px 16px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover { border-color: #5050aa; color: #e0e0ff; }
</style>
</head>
<body>
<div class="label">02 — GALAXY NEBULA</div>
<canvas id="c"></canvas>
<div class="controls">
  <div class="drop-zone" id="dz">♫ MP3 드래그 또는 클릭</div>
  <button id="playBtn" style="display:none">▶ PLAY</button>
</div>
<input type="file" id="fi" accept="audio/*">
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

let audioCtx, analyser, source, gainNode, isPlaying = false, audioBuffer, startTime = 0, pauseOffset = 0;
let t = 0;

// Particles
const PARTICLE_COUNT = 300;
const particles = Array.from({length: PARTICLE_COUNT}, () => ({
  angle: Math.random() * Math.PI * 2,
  radius: 20 + Math.random() * 60,
  speed: (Math.random() - 0.5) * 0.02,
  size: Math.random() * 2.5 + 0.5,
  hue: Math.random() * 60 + 200,
  life: Math.random(),
  originAngle: Math.random() * Math.PI * 2
}));

document.getElementById('dz').addEventListener('click', () => document.getElementById('fi').click());
document.getElementById('dz').addEventListener('dragover', e => e.preventDefault());
document.getElementById('dz').addEventListener('drop', e => { e.preventDefault(); load(e.dataTransfer.files[0]); });
document.getElementById('fi').addEventListener('change', e => load(e.target.files[0]));

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    gainNode = audioCtx.createGain();
    gainNode.connect(audioCtx.destination);
    analyser.connect(gainNode);
  }
}
function load(file) {
  initAudio();
  if (source) { try { source.stop(); source.disconnect(); } catch(e){} }
  const reader = new FileReader();
  reader.onload = e => {
    audioCtx.decodeAudioData(e.target.result, buf => {
      audioBuffer = buf; pauseOffset = 0;
      document.getElementById('playBtn').style.display = ''; play();
    });
  };
  reader.readAsArrayBuffer(file);
}
function play() {
  if (!audioBuffer) return;
  if (source) { try { source.stop(); source.disconnect(); } catch(e){} }
  source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(analyser);
  source.start(0, pauseOffset);
  startTime = audioCtx.currentTime - pauseOffset;
  isPlaying = true;
  document.getElementById('playBtn').textContent = '⏸ PAUSE';
  source.onended = () => { isPlaying = false; pauseOffset = 0; document.getElementById('playBtn').textContent = '▶ PLAY'; };
}
document.getElementById('playBtn').addEventListener('click', () => {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (isPlaying) {
    pauseOffset = audioCtx.currentTime - startTime;
    source.stop(); isPlaying = false;
    document.getElementById('playBtn').textContent = '▶ PLAY';
  } else play();
});

function draw() {
  requestAnimationFrame(draw);
  t += 0.008;
  ctx.fillStyle = 'rgba(2,2,6,0.18)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  const freqData = new Uint8Array(analyser ? analyser.frequencyBinCount : 256);
  if (analyser) analyser.getByteFrequencyData(freqData);

  // Compute average bass energy
  let bass = 0, mid = 0, high = 0;
  const flen = freqData.length;
  for (let i = 0; i < flen / 3; i++) bass += freqData[i];
  for (let i = flen / 3; i < (flen * 2) / 3; i++) mid += freqData[i];
  for (let i = (flen * 2) / 3; i < flen; i++) high += freqData[i];
  bass = bass / (flen / 3) / 255;
  mid = mid / (flen / 3) / 255;
  high = high / (flen / 3) / 255;

  const baseRadius = Math.min(W, H) * 0.28;

  // Glowing orb center
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, baseRadius * (0.5 + bass * 0.8));
  grd.addColorStop(0, `rgba(100, 80, 255, ${0.2 + bass * 0.4})`);
  grd.addColorStop(0.5, `rgba(40, 20, 180, ${0.05 + mid * 0.1})`);
  grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, baseRadius * (0.5 + bass * 0.8), 0, Math.PI * 2);
  ctx.fillStyle = grd;
  ctx.fill();

  // Outer frequency ring
  const bars = 128;
  for (let i = 0; i < bars; i++) {
    const angle = (i / bars) * Math.PI * 2 - Math.PI / 2;
    const fi = Math.floor((i / bars) * freqData.length);
    const amp = (freqData[fi] || 0) / 255;
    const r1 = baseRadius;
    const r2 = baseRadius + amp * baseRadius * 0.8;
    const hue = 200 + i * 1.2 + t * 30;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(angle) * r1, cy + Math.sin(angle) * r1);
    ctx.lineTo(cx + Math.cos(angle) * r2, cy + Math.sin(angle) * r2);
    ctx.strokeStyle = `hsla(${hue}, 85%, 65%, ${0.5 + amp * 0.5})`;
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }

  // Particles
  particles.forEach(p => {
    const fi = Math.floor((p.angle / (Math.PI * 2)) * freqData.length);
    const amp = (freqData[fi] || 0) / 255;
    p.angle += p.speed * (1 + amp * 3);
    const scatter = amp * baseRadius * 1.5;
    const r = baseRadius * (0.2 + p.radius / 80) + scatter * Math.sin(p.angle * 3 + t);
    const x = cx + Math.cos(p.angle) * r;
    const y = cy + Math.sin(p.angle) * r;
    const alpha = 0.3 + amp * 0.7;
    ctx.beginPath();
    ctx.arc(x, y, p.size * (1 + amp * 2), 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue + amp * 40}, 90%, 70%, ${alpha})`;
    ctx.fill();
  });

  // Inner core circle
  ctx.beginPath();
  ctx.arc(cx, cy, baseRadius * 0.15 + bass * 20, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(200, 180, 255, ${0.4 + bass * 0.6})`;
  ctx.lineWidth = 1.5;
  ctx.stroke();
}
draw();
</script>
</body>
</html>
