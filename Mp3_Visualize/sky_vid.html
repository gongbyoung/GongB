<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Sunset Sea Animation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="scene"></canvas>

<script>
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');

let width, height;
let offset = 0; // 카메라 이동을 위한 변수

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// 구름 데이터 생성
const clouds = Array.from({ length: 20 }, () => ({
    x: Math.random() * width * 2,
    y: Math.random() * (height * 0.4),
    size: Math.random() * 100 + 50,
    speed: Math.random() * 0.5 + 0.2
}));

function draw() {
    ctx.clearRect(0, 0, width, height);
    offset += 1; // 카메라가 오른쪽으로 이동하는 느낌

    // 1. 하늘 배경 (노을빛)
    const skyGrad = ctx.createLinearGradient(0, 0, 0, height);
    skyGrad.addColorStop(0, '#ff7e5f');
    skyGrad.addColorStop(0.5, '#feb47b');
    skyGrad.addColorStop(1, '#ffac71');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, width, height);

    // 2. 태양 (고정된 위치 혹은 느리게 이동)
    const sunX = width * 0.5 - (offset * 0.2 % width);
    const sunY = height * 0.3;
    
    // 빛 내리쬐는 효과 (God Rays)
    ctx.save();
    ctx.beginPath();
    const rayGrad = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, height);
    rayGrad.addColorStop(0, 'rgba(255, 255, 200, 0.5)');
    rayGrad.addColorStop(1, 'rgba(255, 255, 200, 0)');
    ctx.fillStyle = rayGrad;
    ctx.arc(sunX, sunY, height, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // 3. 구름 그리기 (카메라 이동 반영)
    ctx.filter = 'blur(40px)';
    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
    clouds.forEach(cloud => {
        let relX = (cloud.x - offset * cloud.speed) % (width * 2);
        if (relX < -200) relX += width * 2;
        
        ctx.beginPath();
        ctx.arc(relX, cloud.y, cloud.size, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.filter = 'none';

    // 4. 바다 그리기
    const seaY = height * 0.7;
    const seaGrad = ctx.createLinearGradient(0, seaY, 0, height);
    seaGrad.addColorStop(0, '#2c3e50');
    seaGrad.addColorStop(1, '#000000');
    ctx.fillStyle = seaGrad;
    ctx.fillRect(0, seaY, width, height - seaY);

    // 바다 위 반사광
    ctx.fillStyle = 'rgba(255, 215, 0, 0.2)';
    ctx.fillRect(sunX - 50, seaY, 100, height - seaY);

    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
