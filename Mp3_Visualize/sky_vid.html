<!DOCTYPE html>
<html>
<head>
    <title>Sunset God Rays - Three.js</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
        canvas { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. 기본 셋팅
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. 배경 (노을빛 스카이박스 느낌)
        scene.background = new THREE.Color(0xff5e00);
        const fog = new THREE.FogExp2(0xff5e00, 0.002);
        scene.fog = fog;

        // 3. 바다 (반사되는 평면)
        const waterGeo = new THREE.PlaneGeometry(1000, 1000);
        const waterMat = new THREE.MeshStandardMaterial({ 
            color: 0x112244, 
            roughness: 0.1, 
            metalness: 0.8 
        });
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.rotation.x = -Math.PI / 2;
        scene.add(water);

        // 4. 구름 생성 (입자형 구름)
        const cloudParticles = [];
        const loader = new THREE.TextureLoader();
        // 구름 텍스처 (연기/안개 이미지 주소 필요)
        loader.load('https://mrdoob.com/lab/javascript/threejs/clouds/cloud10.png', function(texture){
            const cloudGeo = new THREE.PlaneGeometry(500, 500);
            const cloudMat = new THREE.MeshLambertMaterial({
                map: texture,
                transparent: true,
                opacity: 0.6
            });

            for(let p=0; p<40; p++) {
                const cloud = new THREE.Mesh(cloudGeo, cloudMat);
                cloud.position.set(Math.random()*800 - 400, 200, Math.random()*500 - 500);
                cloud.rotation.x = 1.16;
                cloud.rotation.y = -0.12;
                cloud.rotation.z = Math.random()*360;
                cloud.material.opacity = 0.5;
                cloudParticles.push(cloud);
                scene.add(cloud);
            }
        });

        // 5. 햇살 (태양광 및 포인트 라이트)
        const directLight = new THREE.DirectionalLight(0xffccaa, 2);
        directLight.position.set(0, 100, -500);
        scene.add(directLight);

        // 6. 카메라 이동 애니메이션
        camera.position.set(0, 50, 200);
        
        function animate() {
            requestAnimationFrame(animate);

            // 카메라가 옆으로 부드럽게 이동
            camera.position.x += 0.2;
            camera.lookAt(0, 100, -500);

            // 구름이 흐르는 효과
            cloudParticles.forEach(p => {
                p.rotation.z -= 0.001;
            });

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
