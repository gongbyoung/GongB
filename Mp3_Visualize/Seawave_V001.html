<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Cinematic Wave & Smart Subtitle Studio v8.3</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020205; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; }
        canvas { width: 100vw !important; height: 100vh !important; object-fit: contain; }

        .ui-panel { 
            position: absolute; top: 15px; z-index: 10; 
            background: rgba(10, 15, 20, 0.85); padding: 18px; 
            border-radius: 8px; border: 1px solid #334;
            width: 310px; max-height: 90vh; overflow-y: auto;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #ui-left { left: 15px; }
        #ui-right { right: 15px; }
        
        h3 { margin-top: 0; color: #00e5ff; border-bottom: 1px solid #445; padding-bottom: 10px; font-size: 16px; text-align: center; letter-spacing: 1px;}
        .section-title { font-size: 11px; color: #aaa; margin: 15px 0 5px 0; border-bottom: 1px dashed #334; padding-bottom: 3px; font-weight: bold;}
        
        .control-group { margin-bottom: 12px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; color: #ccc; }
        .control-group input[type="range"] { width: 100%; cursor: pointer; accent-color: #00e5ff; height: 4px;}
        .control-group input[type="color"] { width: 100%; height: 25px; border: none; cursor: pointer; background: none; }
        .control-group select, .file-btn, textarea { 
            width: 100%; padding: 8px; background: #112; color: #00ffcc; border: 1px solid #445; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight:bold;}
        
        #audio-input-area { margin-top: 15px; border-top: 2px solid #00e5ff; padding-top: 15px; }
        input[type="file"] { margin-bottom: 10px; display: block; color: white; width: 100%; font-size: 11px; border: 1px dashed #556; padding: 5px; background: rgba(0,0,0,0.5);}
        
        .main-btn { 
            background-color: #00e5ff; border: none; padding: 12px; width: 100%;
            border-radius: 5px; cursor: pointer; color: black; font-weight: bold; font-size: 13px; transition: 0.2s; box-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
        }
        .main-btn:hover { background-color: #00b3cc; box-shadow: 0 0 15px rgba(0, 229, 255, 0.6); }

        .rand-btn { background-color: #ffaa00; color: black; margin-top: 5px; font-size: 12px; padding: 10px; font-weight: bold; box-shadow: 0 0 10px rgba(255, 170, 0, 0.4); }
        .rand-btn:hover { background-color: #ffcc00; box-shadow: 0 0 15px rgba(255, 170, 0, 0.7); }

        .record-btn { background-color: #ff3366; color: white; margin-top: 10px; display: none; box-shadow: 0 0 15px rgba(255, 51, 102, 0.6); }
        .record-btn:hover { background-color: #cc0044; }

        #status { font-size: 11px; color: #aaa; margin-top: 10px; line-height: 1.4; text-align: center;}
        .recording-badge { color: #ff3366; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
        
        .color-grid { display: flex; justify-content: space-between; margin-bottom:10px; }
        .color-col { width: 31%; display: flex; flex-direction: column; align-items: center; }
        .color-col label { font-size: 9px; margin-bottom: 2px; color: #fff; }
        .color-col input { width: 100%; }
        
        .file-label { font-size: 10px; color: #ffaa00; margin-bottom: 4px; display: block; font-weight: bold;}
    </style>
</head>
<body>

<div id="ui-left" class="ui-panel">
    <h3>시네마틱 파도 & 스마트 자막</h3>
    
    <div class="section-title" style="color:#00ffcc;">[파일 업로드]</div>
    <div>
        <span class="file-label">1. 자막 파일 (SRT) 선택</span>
        <input type="file" id="srt-file" accept=".srt">
    </div>

    <div class="section-title" style="color:#ffaa00;">[자막 크기 & 위치 제어]</div>
    <div class="control-group">
        <label>자막 기본 크기 <span id="val-sub-size">90</span></label>
        <input type="range" id="ctrl-sub-size" min="40" max="250" value="90" step="2">
    </div>
    <div class="control-group">
        <label>자막 상하 위치 (Y) <span id="val-sub-y">1800</span></label>
        <input type="range" id="ctrl-sub-y" min="200" max="3500" value="1800" step="10">
    </div>
    <div class="control-group">
        <label style="color:#00ffcc;">자막 가로 허용 폭 (Max Width) <span id="val-sub-max-w">1400</span></label>
        <input type="range" id="ctrl-sub-max-w" min="500" max="2048" value="1400" step="50">
    </div>
    <div class="control-group">
        <label style="color:#00ffcc;">줄 간격 (Line Height) <span id="val-sub-lh">1.4</span></label>
        <input type="range" id="ctrl-sub-lh" min="1.0" max="2.5" value="1.4" step="0.1">
    </div>

    <div class="section-title" style="color:#ff3366;">[자막 ↔ 파도 타이밍 동기화]</div>
    <div class="control-group">
        <label>파도 위치 (자막 닫힘 / 덮침) <span id="val-wave-cover-pos">0.25</span></label>
        <input type="range" id="ctrl-wave-cover-pos" min="0.0" max="1.0" value="0.25" step="0.05">
    </div>
    <div class="control-group">
        <label>파도 위치 (자막 열림 / 후퇴) <span id="val-wave-reveal-pos">0.75</span></label>
        <input type="range" id="ctrl-wave-reveal-pos" min="0.0" max="1.0" value="0.75" step="0.05">
    </div>
    <div class="control-group">
        <label>자막 노출 시간 오프셋 <span id="val-reveal-time">0.2초 전</span></label>
        <input type="range" id="ctrl-reveal-time" min="0.0" max="2.0" value="0.2" step="0.1">
    </div>
    <div class="control-group">
        <label>파도 덮침 속도 (Surge Speed) <span id="val-surge-speed">0.05</span></label>
        <input type="range" id="ctrl-surge-speed" min="0.01" max="0.1" value="0.05" step="0.01">
    </div>

    <div class="section-title" style="color:#aaff00;">[해변 파도 물리 제어]</div>
    <div class="control-group">
        <label style="color:#00ccff;">파도 방향 (0:위에서 아래로) <span id="val-wave-angle">0°</span></label>
        <input type="range" id="ctrl-wave-angle" min="0" max="360" value="0" step="5">
    </div>
    <div class="control-group">
        <label style="color:#00ccff;">파도 쪼개짐 디테일 <span id="val-wave-detail">2.0</span></label>
        <input type="range" id="ctrl-wave-detail" min="0.5" max="5.0" value="2.0" step="0.1">
    </div>

    <button id="btn-randomize" class="main-btn rand-btn">🎲 지형 무작위 섞기</button>

    <div class="section-title">[비디오 해상도]</div>
    <div class="control-group">
        <select id="ctrl-ratio">
            <option value="16:9">가로형 (1920x1080)</option>
            <option value="9:16" selected>세로형 (1080x1920)</option>
            <option value="fit">화면 맞춤 (전체화면)</option>
        </select>
    </div>

    <div id="audio-input-area">
        <span class="file-label">2. 오디오 파일 (MP3/WAV) 선택</span>
        <button id="init-btn" class="main-btn">오디오 엔진 켜기</button>
        <div id="file-select-box" style="display: none; margin-top:10px;">
            <input type="file" id="audio-file" accept="audio/*">
            <div id="status">오디오 로드 후 미리보기 타임라인이 활성화됩니다.</div>
            
            <div class="control-group" id="preview-box" style="display:none; margin-top:15px; border-top:1px dashed #445; padding-top:10px;">
                <label style="color:#ffaa00;">미리보기 타임라인 <span id="val-preview-time">0.0s</span></label>
                <input type="range" id="ctrl-preview-time" min="0" max="100" value="0" step="0.1">
            </div>

            <button id="record-btn" class="main-btn record-btn">▶ 영상 렌더링 녹화 시작 (MP4)</button>
        </div>
    </div>
</div>

<div id="ui-right" class="ui-panel">
    <h3>오디오 및 컬러 튜닝</h3>

    <div class="section-title" style="color:#00ffcc;">[다이나믹 오디오 타격감]</div>
    <div class="control-group">
        <label>저음 (Bass / 파도 밀림) <span id="val-react-bass">1.5</span></label>
        <input type="range" id="ctrl-react-bass" min="0.0" max="3.0" value="1.5" step="0.1">
    </div>
    <div class="control-group">
        <label>고음 (Treble / 해안선 왜곡) <span id="val-react-treb">1.5</span></label>
        <input type="range" id="ctrl-react-treb" min="0.0" max="3.0" value="1.5" step="0.1">
    </div>
    <div class="control-group">
        <label>모션 부드러움 (Damping) <span id="val-smooth">0.8</span></label>
        <input type="range" id="ctrl-smooth" min="0.1" max="0.99" value="0.8" step="0.01">
    </div>
    
    <div class="section-title" style="color:#ffaa00;">[글로벌 색상 설정]</div>
    <div class="color-grid">
        <div class="color-col">
            <label>얕은 물/시작</label>
            <input type="color" id="ctrl-color-start" value="#20b2aa">
        </div>
        <div class="color-col">
            <label>깊은 바다/끝</label>
            <input type="color" id="ctrl-color-end" value="#005577">
        </div>
        <div class="color-col">
            <label>거품 (Foam)</label>
            <input type="color" id="ctrl-color-foam" value="#ffffff">
        </div>
    </div>

    <div class="section-title" style="color:#aaff00;">[아날로그 포스트 프로세싱]</div>
    <div class="control-group">
        <label>빛 번짐 (Bloom) <span id="val-bloom">1.0</span></label>
        <input type="range" id="ctrl-bloom" min="0" max="4.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label>필름 노이즈/그레인 <span id="val-grain">0.10</span></label>
        <input type="range" id="ctrl-grain" min="0" max="0.4" value="0.10" step="0.01">
    </div>
    <div class="control-group">
        <label>외곽 어두움 (Vignette) <span id="val-vignette">1.5</span></label>
        <input type="range" id="ctrl-vignette" min="0" max="3" value="1.5" step="0.1">
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
    // --- 1. 기본 환경 세팅 (카메라 하드코딩) ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020205); 
    
    // 카메라 위치 고정 (UI 의존성 없음)
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 8000);
    camera.position.set(0, 1500, 0); 
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({antialias: true, preserveDrawingBuffer: true});
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.body.appendChild(renderer.domElement);

    const CustomArtShader = {
        uniforms: { "tDiffuse": { value: null }, "uTime": { value: 0.0 }, "uGrain": { value: 0.10 }, "uVignette": { value: 1.5 } },
        vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
        fragmentShader: `
            uniform sampler2D tDiffuse; uniform float uTime; uniform float uGrain; uniform float uVignette; varying vec2 vUv;
            float rand(vec2 co){ return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453); }
            void main() {
                vec4 color = texture2D(tDiffuse, vUv);
                vec2 uv = vUv - 0.5; float d = length(uv);
                color.rgb *= smoothstep(0.9, 0.3, d * uVignette);
                color.rgb += (rand(vUv + uTime) - 0.5) * uGrain;
                gl_FragColor = color;
            }
        `
    };

    const renderScene = new THREE.RenderPass(scene, camera);
    const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.0, 0.4, 0.85);
    bloomPass.threshold = 0;
    const artFilterPass = new THREE.ShaderPass(CustomArtShader);

    const composer = new THREE.EffectComposer(renderer);
    composer.addPass(renderScene); composer.addPass(bloomPass); composer.addPass(artFilterPass);

    let globalRandomSeed = 0.0; 

    // --- UI 연동 ---
    const updateUIVal = (id, val, suffix='') => document.getElementById(id).innerText = val + suffix;
    const ctrlRatio = document.getElementById('ctrl-ratio');
    const ctrlRevealTime = document.getElementById('ctrl-reveal-time');
    const ctrlWaveCoverPos = document.getElementById('ctrl-wave-cover-pos');
    const ctrlWaveRevealPos = document.getElementById('ctrl-wave-reveal-pos');
    const ctrlSurgeSpeed = document.getElementById('ctrl-surge-speed');
    const ctrlWaveAngle = document.getElementById('ctrl-wave-angle');
    const ctrlWaveDetail = document.getElementById('ctrl-wave-detail');
    const ctrlReactBass = document.getElementById('ctrl-react-bass');
    const ctrlReactTreb = document.getElementById('ctrl-react-treb');
    const ctrlSmooth = document.getElementById('ctrl-smooth'); 
    const ctrlColorStart = document.getElementById('ctrl-color-start');
    const ctrlColorEnd = document.getElementById('ctrl-color-end');
    const ctrlColorFoam = document.getElementById('ctrl-color-foam'); 
    const srtInput = document.getElementById('srt-file');
    const ctrlSubSize = document.getElementById('ctrl-sub-size');
    const ctrlSubY = document.getElementById('ctrl-sub-y');
    const ctrlSubMaxW = document.getElementById('ctrl-sub-max-w');
    const ctrlSubLh = document.getElementById('ctrl-sub-lh');
    const ctrlPreviewTime = document.getElementById('ctrl-preview-time');

    // 지형 무작위 섞기 버튼 로직
    document.getElementById('btn-randomize').onclick = () => { 
        globalRandomSeed = Math.random() * 50.0; 
        if(!isPlaying) renderFrame(manualTimeSec, true);
    };

    // 캔버스 해상도를 화면 비율에 맞춰 동적 조절 (잘림 방지 및 짝수 픽셀 보장)
    let textCanvasWidth = 2048;
    let textCanvasHeight = 2048;

    function updateAspectRatio() {
        let val = ctrlRatio.value; let w = window.innerWidth, h = window.innerHeight;
        if (val === '16:9') { w = 1920; h = 1080; } else if (val === '9:16') { w = 1080; h = 1920; }
        
        w = Math.floor(w / 2) * 2;
        h = Math.floor(h / 2) * 2;
        
        renderer.setSize(w, h); composer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix();
        
        textCanvasHeight = Math.floor(textCanvasWidth / camera.aspect);
        textCanvas.width = textCanvasWidth;
        textCanvas.height = textCanvasHeight;
        ctrlSubY.max = textCanvasHeight; 
        updateSubtitleCanvas(currentSubtitle); 
        
        if(!isPlaying) renderFrame(manualTimeSec, true);
    }
    ctrlRatio.onchange = updateAspectRatio; window.addEventListener('resize', () => { if(ctrlRatio.value==='fit') updateAspectRatio(); }); 

    // ★ 버그 픽스: HTML에 100% 존재하는 ID만 배열에 등록하여 안전하게 매핑
    const validUIInputs = [
        'react-bass', 'react-treb', 'smooth', 'bloom', 'grain', 'vignette', 
        'wave-angle', 'wave-detail', 'surge-speed', 'sub-size', 'sub-y', 
        'sub-max-w', 'sub-lh', 'wave-cover-pos', 'wave-reveal-pos', 'reveal-time'
    ];
    
    validUIInputs.forEach(id => {
        let element = document.getElementById(`ctrl-${id}`);
        if(element) {
            element.addEventListener('input', (e) => {
                let suffix = id==='wave-angle' ? '°' : (id==='reveal-time' ? '초 전' : '');
                updateUIVal(`val-${id}`, e.target.value, suffix);
                
                if(id === 'bloom') bloomPass.strength = parseFloat(e.target.value);
                if(id === 'grain') artFilterPass.uniforms.uGrain.value = parseFloat(e.target.value);
                if(id === 'vignette') artFilterPass.uniforms.uVignette.value = parseFloat(e.target.value);
                
                if(['sub-size', 'sub-y', 'sub-max-w', 'sub-lh'].includes(id)) {
                    updateSubtitleCanvas(currentSubtitle); 
                }
                
                if(!isPlaying) renderFrame(manualTimeSec, true);
            });
        }
    });

    // --- 2. 스마트 줄바꿈 자막 캔버스 엔진 ---
    const textCanvas = document.createElement('canvas');
    const textCtx = textCanvas.getContext('2d');
    const textTex = new THREE.CanvasTexture(textCanvas);
    textTex.generateMipmaps = false; textTex.minFilter = THREE.LinearFilter;

    let parsedSRT = [];
    let currentSubtitle = "미리보기 슬라이더를 드래그하여\n자막의 크기와 여백을\n실시간으로 확인하세요."; 

    function parseSRTData(data) {
        const regex = /(?:\d+)\s+(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\s+([\s\S]*?)(?=(?:\s*\n\s*\n|$))/g;
        let match; const result = [];
        while ((match = regex.exec(data)) !== null) {
            result.push({ start: timeMs(match[1]), end: timeMs(match[2]), text: match[3].trim() });
        }
        return result;
    }
    function timeMs(val) {
        const p = val.split(/[:,]/);
        return (parseInt(p[0])*3600 + parseInt(p[1])*60 + parseInt(p[2]))*1000 + parseInt(p[3]);
    }

    function updateSubtitleCanvas(text) {
        textCtx.clearRect(0, 0, textCanvasWidth, textCanvasHeight);
        if(!text) { textTex.needsUpdate = true; return; }

        let baseSize = parseInt(ctrlSubSize.value);
        let baseY = parseInt(ctrlSubY.value);
        let maxWidth = parseInt(ctrlSubMaxW.value); 
        let lineHeightExt = parseFloat(ctrlSubLh.value); 

        textCtx.font = 'bold ' + baseSize + 'px "Malgun Gothic", "Apple SD Gothic Neo", sans-serif';
        textCtx.fillStyle = 'rgba(255, 255, 255, 1.0)';
        textCtx.strokeStyle = 'rgba(0, 0, 0, 0.8)';
        textCtx.lineWidth = baseSize * 0.06;
        textCtx.lineJoin = 'round';
        textCtx.textAlign = 'center';
        textCtx.textBaseline = 'middle';
        textCtx.shadowColor = 'rgba(0, 0, 0, 0.6)';
        textCtx.shadowBlur = 15; 
        textCtx.shadowOffsetX = 4; textCtx.shadowOffsetY = 4;

        let rawLines = text.split('\n');
        let wrappedLines = [];

        // 스마트 줄바꿈
        for(let i=0; i<rawLines.length; i++) {
            let words = rawLines[i].split(' ');
            let currentLine = words[0];

            for(let j=1; j<words.length; j++) {
                let word = words[j];
                let testLine = currentLine + " " + word;
                if(textCtx.measureText(testLine).width < maxWidth) {
                    currentLine = testLine; 
                } else {
                    wrappedLines.push(currentLine); 
                    currentLine = word; 
                }
            }
            wrappedLines.push(currentLine); 
        }

        let totalHeight = (wrappedLines.length - 1) * (baseSize * lineHeightExt);
        let startY = baseY - (totalHeight / 2); 
        let centerX = textCanvasWidth / 2;
        
        for(let i=0; i<wrappedLines.length; i++) {
            let yPos = startY + (i * baseSize * lineHeightExt);
            textCtx.strokeText(wrappedLines[i], centerX, yPos);
            textCtx.fillText(wrappedLines[i], centerX, yPos);
        }
        textTex.needsUpdate = true;
    }

    document.getElementById('srt-file').onchange = function(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            parsedSRT = parseSRTData(event.target.result);
            document.getElementById('status').innerText = `SRT 로드 완료! 미리보기 슬라이더를 움직여보세요.`;
            currentSubtitle = ""; updateSubtitleCanvas(""); 
            if(!isPlaying) renderFrame(manualTimeSec, true);
        };
        reader.readAsText(file);
    };

    // --- 3. 오디오 연동 시네마틱 해변 셰이더 ---
    const waveGeo = new THREE.PlaneGeometry(6000, 6000, 1, 1);
    const waveShaderMat = new THREE.ShaderMaterial({
        uniforms: {
            uTime: { value: 0.0 }, uBass: { value: 0.0 }, uTreble: { value: 0.0 }, uAngle: { value: 0.0 }, uSeed: { value: 0.0 },
            uWaveDetail: { value: 2.0 }, uDist: { value: 0.6 }, uSurge: { value: 0.25 }, uSurgeVelocity: { value: 0.0 }, 
            uTextMap: { value: textTex }, uTextScale: { value: new THREE.Vector2(1.0, 1.0) },
            cSand: { value: new THREE.Color(0xd2b48c) }, cShallow: { value: new THREE.Color(ctrlColorStart.value) }, 
            cDeep: { value: new THREE.Color(ctrlColorEnd.value) }, cFoam: { value: new THREE.Color(ctrlColorFoam.value) } 
        },
        vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
        fragmentShader: `
            uniform float uTime; uniform float uBass; uniform float uTreble; 
            uniform float uAngle; uniform float uSeed; uniform float uWaveDetail; uniform float uDist;
            uniform float uSurge; uniform float uSurgeVelocity;
            uniform sampler2D uTextMap; uniform vec2 uTextScale;
            uniform vec3 cSand; uniform vec3 cShallow; uniform vec3 cDeep; uniform vec3 cFoam;
            varying vec2 vUv;
            
            vec2 hash( vec2 p ) { p = vec2( dot(p,vec2(127.1,311.7)), dot(p,vec2(269.5,183.3)) ); return -1.0 + 2.0*fract(sin(p)*43758.5453123); }
            float noise( in vec2 p ) {
                const float K1 = 0.366025404; const float K2 = 0.211324865;
                vec2 i = floor( p + (p.x+p.y)*K1 ); vec2 a = p - i + (i.x+i.y)*K2;
                vec2 o = (a.x>a.y) ? vec2(1.0,0.0) : vec2(0.0,1.0);
                vec2 b = a - o + K2; vec2 c = a - 1.0 + 2.0*K2;
                vec3 h = max( 0.5-vec3(dot(a,a), dot(b,b), dot(c,c) ), 0.0 );
                vec3 n = h*h*h*h*vec3( dot(a,hash(i+0.0)), dot(b,hash(i+o)), dot(c,hash(i+1.0)));
                return dot( n, vec3(70.0) );
            }

            void main() {
                float ang = radians(uAngle);
                float c = cos(ang); float s = sin(ang);
                mat2 rot = mat2(c, -s, s, c);
                vec2 rUv = rot * (vUv - 0.5) + 0.5 + vec2(uSeed * 0.1); 
                
                float waveSine = sin(uTime * 1.5);
                float reachScale = 1.0 - (uSurge * 0.5);
                float audioReach = (sin(rUv.x * 12.0 + uTime) * uBass * 0.15 + cos(rUv.x * 20.0 - uTime) * uTreble * 0.15) * reachScale;
                
                float wavePos = uSurge + (waveSine * 0.08) + audioReach; 
                float edgeNoise = noise(rUv * 15.0 * uWaveDetail + uTime*0.5) * (0.1 * uDist) + noise(rUv * 30.0 * uWaveDetail - uTime) * 0.04;
                float distToWave = rUv.y - (wavePos + edgeNoise);
                
                vec2 textUv = (vUv - 0.5) * uTextScale + 0.5; 
                vec4 textData = vec4(0.0);
                if(textUv.x >= 0.0 && textUv.x <= 1.0 && textUv.y >= 0.0 && textUv.y <= 1.0) {
                    textData = texture2D(uTextMap, textUv);
                }

                vec3 finalColor;
                if (distToWave < 0.0) { 
                    vec3 baseSand = cSand;
                    if (distToWave > -0.06 && distToWave <= 0.0) baseSand *= 0.85; 
                    finalColor = mix(baseSand, textData.rgb, textData.a); 
                    
                    float residue = smoothstep(-0.04, 0.0, distToWave);
                    float residueNoise = noise(rUv * 150.0 * uWaveDetail);
                    if (residue * abs(residueNoise) > 0.12) { finalColor = mix(finalColor, cFoam, residue * 0.6); }
                } else { 
                    vec3 waterColor = mix(cShallow, cDeep, smoothstep(0.0, 0.4, distToWave));
                    
                    // 파도 밑에서는 글씨가 물리적으로 가려짐 (80% 가림)
                    float textDistortion = noise(rUv * 30.0 + uTime) * 0.02 * clamp(distToWave*5.0, 0.0, 1.0);
                    vec2 distTextUv = textUv + textDistortion;
                    vec4 distTextData = vec4(0.0);
                    if(distTextUv.x >= 0.0 && distTextUv.x <= 1.0 && distTextUv.y >= 0.0 && distTextUv.y <= 1.0) {
                        distTextData = texture2D(uTextMap, distTextUv);
                    }
                    vec3 distSand = mix(cSand*0.8, distTextData.rgb, distTextData.a * 0.2); 
                    waterColor = mix(distSand, waterColor, smoothstep(0.0, 0.15, distToWave));

                    float surgeFoamPower = uSurgeVelocity * 10.0; 
                    float foamBand = 0.015 + (uBass * 0.02) + surgeFoamPower * 0.1; 
                    float isFoam = 1.0 - smoothstep(0.0, foamBand, distToWave); 
                    float pureWhiteEdge = 1.0 - smoothstep(0.0, 0.005, distToWave);
                    
                    float foamNoise = noise(rUv * 80.0 * uWaveDetail + uTime * 3.0);
                    float finalFoam = isFoam * abs(foamNoise) * (2.0 + surgeFoamPower); 
                    
                    finalColor = mix(waterColor, cFoam, clamp(finalFoam + pureWhiteEdge, 0.0, 1.0));
                }
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `,
        side: THREE.DoubleSide
    });
    const waveMesh = new THREE.Mesh(waveGeo, waveShaderMat);
    waveMesh.rotation.x = -Math.PI / 2; 
    // 하드코딩된 위치 고정
    waveMesh.position.y = 0; 
    scene.add(waveMesh);

    updateAspectRatio(); 

    ctrlColorStart.oninput = (e) => { waveShaderMat.uniforms.cShallow.value.set(e.target.value); if(!isPlaying) renderFrame(manualTimeSec, true); };
    ctrlColorEnd.oninput = (e) => { waveShaderMat.uniforms.cDeep.value.set(e.target.value); if(!isPlaying) renderFrame(manualTimeSec, true); };
    ctrlColorFoam.oninput = (e) => { waveShaderMat.uniforms.cFoam.value.set(e.target.value); if(!isPlaying) renderFrame(manualTimeSec, true); }; 

    // --- 4. 오디오 & 타임라인 미리보기 ---
    let audioCtx, analyser, dataArray;
    let decodedBuffer = null; let isPlaying = false, currentSource = null;
    let smoothedData = new Float32Array(512);
    let mediaRecorder, recordedChunks = []; let loadedFileName = "";
    let audioStartTime = 0; 
    let manualTimeSec = 0; 
    
    document.getElementById('init-btn').onclick = function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser(); analyser.fftSize = 512; dataArray = new Uint8Array(analyser.frequencyBinCount);
        this.style.display = 'none'; document.getElementById('file-select-box').style.display = 'block';
    };

    document.getElementById('audio-file').onchange = function(e) {
        const file = e.target.files[0]; if (!file) return;
        document.getElementById('status').innerText = "디코딩 중..."; loadedFileName = file.name;
        const reader = new FileReader();
        reader.onload = function(event) {
            audioCtx.decodeAudioData(event.target.result, function(buffer) {
                decodedBuffer = buffer; 
                document.getElementById('status').innerText = "준비 완료! 아래 슬라이더로 타이밍을 미리보세요.";
                document.getElementById('record-btn').style.display = 'block';
                document.getElementById('preview-box').style.display = 'block';
                ctrlPreviewTime.max = decodedBuffer.duration;
            });
        };
        reader.readAsArrayBuffer(file);
    };

    ctrlPreviewTime.addEventListener('input', (e) => {
        if (!isPlaying) {
            manualTimeSec = parseFloat(e.target.value);
            updateUIVal('val-preview-time', manualTimeSec.toFixed(1), 's');
            renderFrame(manualTimeSec, true); 
        }
    });

    document.getElementById('record-btn').onclick = function() {
        if (!decodedBuffer) return; if (currentSource) { try { currentSource.stop(); } catch(e) {} }
        currentSource = audioCtx.createBufferSource(); currentSource.buffer = decodedBuffer; currentSource.connect(analyser);
        const audioDest = audioCtx.createMediaStreamDestination(); analyser.connect(audioCtx.destination); analyser.connect(audioDest);            
        const canvasStream = renderer.domElement.captureStream(60); 
        const combinedStream = new MediaStream([...canvasStream.getVideoTracks(), ...audioDest.stream.getAudioTracks()]);
        
        let options = { mimeType: 'video/mp4; codecs=avc1', videoBitsPerSecond: 8000000 }; let ext = 'mp4';
        if (!MediaRecorder.isTypeSupported(options.mimeType)) { options = { mimeType: 'video/webm; codecs=vp9', videoBitsPerSecond: 8000000 }; ext = 'webm'; }
        
        recordedChunks = []; mediaRecorder = new MediaRecorder(combinedStream, options);
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: options.mimeType }); const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.style = 'display: none'; a.href = url; a.download = loadedFileName.replace(/\.[^/.]+$/, "") + `_WaveSubtitles_Final.${ext}`;
            document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url); document.getElementById('status').innerText = `녹화 완료!`;
            ctrlRatio.disabled = false; ctrlPreviewTime.disabled = false; isPlaying = false; document.getElementById('record-btn').style.display = 'block';
            updateSubtitleCanvas(""); renderFrame(0, true);
        };
        currentSource.onended = () => { if(mediaRecorder.state === 'recording') mediaRecorder.stop(); };
        
        audioStartTime = audioCtx.currentTime; 
        
        // 재생 플래그 설정 및 애니메이션 즉시 호출
        isPlaying = true;
        animate(); 

        currentSource.start(0); 
        try { mediaRecorder.start(); } catch(err) { console.error(err); alert("녹화 시작 중 에러 발생"); }
        
        ctrlRatio.disabled = true; ctrlPreviewTime.disabled = true; this.style.display = 'none';
        document.getElementById('status').innerHTML = `<span class="recording-badge">● REC</span> 자막 연동 렌더링 중...`;
    };

    // --- 5. 마스터 렌더링 엔진 (미리보기 & 녹화 겸용) ---
    function renderFrame(targetTimeSec, isPreview = false) {
        let fovRad = 45 * Math.PI / 180;
        let visibleHeight = 2 * Math.tan(fovRad / 2) * 1500; 
        let visibleWidth = visibleHeight * camera.aspect;
        waveShaderMat.uniforms.uTextScale.value.set(6000.0 / visibleWidth, 6000.0 / visibleHeight);

        let rawBass = 0, rawTreble = 0;
        if (isPlaying && analyser && !isPreview) {
            let smoothFactor = 1.0 - parseFloat(ctrlSmooth.value);
            analyser.getByteFrequencyData(dataArray);
            for(let i=0; i<dataArray.length; i++) smoothedData[i] += (dataArray[i] - smoothedData[i]) * smoothFactor;
            let bSum=0, tSum=0;
            for(let i=0; i<10; i++) bSum += dataArray[i]; 
            for(let i=80; i<200; i++) tSum += dataArray[i]; 
            rawBass = (bSum / 10 / 255) * parseFloat(ctrlReactBass.value);
            rawTreble = (tSum / 120 / 255) * parseFloat(ctrlReactTreb.value);
        }

        let elapsedMs = targetTimeSec * 1000;
        let coverPos = parseFloat(ctrlWaveCoverPos.value);
        let revealPos = parseFloat(ctrlWaveRevealPos.value);
        let targetSurge = coverPos; // 대기상태엔 기본으로 덮여있게 설정
        let activeText = "";
        
        if (parsedSRT.length > 0) {
            let offsetTime = parseFloat(ctrlRevealTime.value) * 1000; // 단일 슬라이더(오프셋)로 앞뒤 타이밍 조절

            for (let i = 0; i < parsedSRT.length; i++) {
                let sub = parsedSRT[i];
                let revealTime = sub.start - offsetTime;
                let coverTime = sub.end - offsetTime;

                if (elapsedMs >= revealTime && elapsedMs < coverTime) {
                    targetSurge = revealPos; 
                    activeText = sub.text;
                    break; 
                } else if (elapsedMs >= coverTime && i < parsedSRT.length - 1 && elapsedMs < parsedSRT[i+1].start - offsetTime) {
                    targetSurge = coverPos;
                    break;
                }
            }
        } else {
            targetSurge = revealPos; 
            if(!isPlaying) activeText = currentSubtitle;
        }

        if (activeText !== currentSubtitle) {
            currentSubtitle = activeText; updateSubtitleCanvas(activeText);
        }

        if (isPreview) {
            waveShaderMat.uniforms.uSurge.value = targetSurge;
            waveShaderMat.uniforms.uSurgeVelocity.value = 0.0;
        } else {
            let prevSurge = waveShaderMat.uniforms.uSurge.value;
            let surgeSpd = parseFloat(ctrlSurgeSpeed.value);
            waveShaderMat.uniforms.uSurge.value += (targetSurge - waveShaderMat.uniforms.uSurge.value) * surgeSpd;
            waveShaderMat.uniforms.uSurgeVelocity.value = Math.abs(waveShaderMat.uniforms.uSurge.value - prevSurge);
        }

        waveShaderMat.uniforms.uTime.value = targetTimeSec;
        waveShaderMat.uniforms.uAngle.value = parseFloat(ctrlWaveAngle.value);
        waveShaderMat.uniforms.uBass.value = rawBass * 2.0; 
        waveShaderMat.uniforms.uTreble.value = rawTreble * 2.5;
        waveShaderMat.uniforms.uWaveDetail.value = parseFloat(ctrlWaveDetail.value); 
        waveShaderMat.uniforms.uSeed.value = globalRandomSeed; 

        composer.render();
    }

    function animate() {
        if(isPlaying) {
            requestAnimationFrame(animate);
            let currentAudioTimeSec = audioCtx.currentTime - audioStartTime;
            ctrlPreviewTime.value = currentAudioTimeSec;
            updateUIVal('val-preview-time', currentAudioTimeSec.toFixed(1), 's');
            renderFrame(currentAudioTimeSec, false);
        }
    }
    
    // 초기 로딩 렌더링
    setTimeout(() => { renderFrame(0, true); }, 500);
</script>
</body>
