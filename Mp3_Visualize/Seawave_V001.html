<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Pure Cinematic Wave Generator (Full Screen)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        canvas { width: 100vw !important; height: 100vh !important; object-fit: contain; }

        .ui-panel { 
            position: absolute; top: 15px; left: 15px; z-index: 10; 
            background: rgba(10, 15, 20, 0.85); padding: 18px; 
            border-radius: 8px; border: 1px solid #334;
            width: 280px; max-height: 90vh; overflow-y: auto;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        
        h3 { margin-top: 0; color: #00e5ff; border-bottom: 1px solid #445; padding-bottom: 10px; font-size: 15px; text-align: center; }
        .section-title { font-size: 11px; color: #aaa; margin: 15px 0 5px 0; border-bottom: 1px dashed #334; padding-bottom: 3px; font-weight: bold;}
        
        .control-group { margin-bottom: 12px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; color: #ccc; }
        .control-group input[type="range"] { width: 100%; cursor: pointer; accent-color: #00e5ff; height: 4px;}
        .control-group select { width: 100%; padding: 8px; background: #112; color: #00ffcc; border: 1px solid #445; border-radius: 4px; font-size: 11px; font-weight: bold;}
        
        .color-grid { display: flex; justify-content: space-between; margin-bottom:10px; }
        .color-col { width: 31%; display: flex; flex-direction: column; align-items: center; }
        .color-col label { font-size: 9px; margin-bottom: 2px; color: #fff; }
        .color-col input[type="color"] { width: 100%; height: 25px; border: none; cursor: pointer; background: none; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
    </style>
</head>
<body>

<div class="ui-panel">
    <h3>순수 파도 제어 패널</h3>
    
    <div class="section-title" style="color:#00ffcc;">[비디오 해상도 고정]</div>
    <div class="control-group">
        <select id="ctrl-ratio">
            <option value="16:9">가로형 (1920x1080)</option>
            <option value="9:16" selected>세로형 (1080x1920)</option>
        </select>
    </div>

    <div class="section-title" style="color:#ffaa00;">[파도 물리 제어]</div>
    <div class="control-group">
        <label>파도 위치 (위아래) <span id="val-wave-pos">0.3</span></label>
        <input type="range" id="ctrl-wave-pos" min="0.0" max="1.0" value="0.3" step="0.01">
    </div>
    <div class="control-group">
        <label>파도 치는 속도 <span id="val-wave-speed">1.0</span></label>
        <input type="range" id="ctrl-wave-speed" min="0.1" max="3.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label>파도 방향 각도 <span id="val-wave-angle">0°</span></label>
        <input type="range" id="ctrl-wave-angle" min="0" max="360" value="0" step="1">
    </div>
    <div class="control-group">
        <label>해안선 굴곡 디테일 <span id="val-wave-detail">2.0</span></label>
        <input type="range" id="ctrl-wave-detail" min="0.5" max="4.0" value="2.0" step="0.1">
    </div>

    <div class="section-title" style="color:#aaff00;">[글로벌 색상 설정]</div>
    <div class="color-grid">
        <div class="color-col">
            <label>모래사장/얕은물</label>
            <input type="color" id="ctrl-color-shallow" value="#3ca3b5">
        </div>
        <div class="color-col">
            <label>깊은 바다</label>
            <input type="color" id="ctrl-color-deep" value="#0f3b4c">
        </div>
        <div class="color-col">
            <label>거품 (Foam)</label>
            <input type="color" id="ctrl-color-foam" value="#ffffff">
        </div>
    </div>
    <div class="control-group">
        <label>순수 모래 색상 설정</label>
        <input type="color" id="ctrl-color-sand" value="#d0b38c" style="width:100%; height:25px; border:none; background:none; cursor:pointer;">
    </div>

    <div class="section-title" style="color:#00e5ff;">[시네마틱 후보정]</div>
    <div class="control-group">
        <label>빛 번짐 (Bloom) <span id="val-bloom">0.3</span></label>
        <input type="range" id="ctrl-bloom" min="0" max="2.0" value="0.3" step="0.1">
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
    // =========================================================
    // 1. 완벽하게 고정된 화면 맞춤 환경 (카메라 컨트롤 영구 삭제)
    // =========================================================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020205); 
    
    // 화면에 꽉 차도록 카메라 높이를 1500으로 단단히 고정
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 8000);
    camera.position.set(0, 1500, 0); 
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({antialias: true, preserveDrawingBuffer: true});
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.body.appendChild(renderer.domElement);

    // =========================================================
    // 2. 포스트 프로세싱 (하얗게 뭉치지 않도록 Bloom 기본값 안정화)
    // =========================================================
    const renderScene = new THREE.RenderPass(scene, camera);
    const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.3, 0.4, 0.85);
    bloomPass.threshold = 0;

    const CustomArtShader = {
        uniforms: { "tDiffuse": { value: null }, "uTime": { value: 0.0 } },
        vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
        fragmentShader: `
            uniform sampler2D tDiffuse; uniform float uTime; varying vec2 vUv;
            float rand(vec2 co){ return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453); }
            void main() {
                vec4 color = texture2D(tDiffuse, vUv);
                float d = length(vUv - 0.5);
                color.rgb *= smoothstep(0.9, 0.4, d * 1.2); 
                color.rgb += (rand(vUv + uTime) - 0.5) * 0.08; 
                gl_FragColor = color;
            }
        `
    };
    const artFilterPass = new THREE.ShaderPass(CustomArtShader);

    const composer = new THREE.EffectComposer(renderer);
    composer.addPass(renderScene); 
    composer.addPass(bloomPass); 
    composer.addPass(artFilterPass);

    // =========================================================
    // 3. 화면 맞춤형 순수 파도 셰이더 매터리얼
    // =========================================================
    const waveGeo = new THREE.PlaneGeometry(6000, 6000, 1, 1);
    const waveShaderMat = new THREE.ShaderMaterial({
        uniforms: {
            uTime: { value: 0.0 }, 
            uAngle: { value: 0.0 }, 
            uWaveDetail: { value: 2.0 }, 
            uSurge: { value: 0.3 }, 
            uAspect: { value: 1.0 }, // 가로세로 비율 보정용
            cSand: { value: new THREE.Color('#d0b38c') }, 
            cShallow: { value: new THREE.Color('#3ca3b5') }, 
            cDeep: { value: new THREE.Color('#0f3b4c') }, 
            cFoam: { value: new THREE.Color('#ffffff') } 
        },
        vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
        fragmentShader: `
            uniform float uTime; 
            uniform float uAngle; 
            uniform float uWaveDetail;
            uniform float uSurge; 
            uniform float uAspect;
            uniform vec3 cSand; uniform vec3 cShallow; uniform vec3 cDeep; uniform vec3 cFoam;
            varying vec2 vUv;
            
            vec2 hash( vec2 p ) { p = vec2( dot(p,vec2(127.1,311.7)), dot(p,vec2(269.5,183.3)) ); return -1.0 + 2.0*fract(sin(p)*43758.5453123); }
            float noise( in vec2 p ) {
                const float K1 = 0.366025404; const float K2 = 0.211324865;
                vec2 i = floor( p + (p.x+p.y)*K1 ); vec2 a = p - i + (i.x+i.y)*K2;
                vec2 o = (a.x>a.y) ? vec2(1.0,0.0) : vec2(0.0,1.0);
                vec2 b = a - o + K2; vec2 c = a - 1.0 + 2.0*K2;
                vec3 h = max( 0.5-vec3(dot(a,a), dot(b,b), dot(c,c) ), 0.0 );
                vec3 n = h*h*h*h*vec3( dot(a,hash(i+0.0)), dot(b,hash(i+o)), dot(c,hash(i+1.0)));
                return dot( n, vec3(70.0) );
            }

            void main() {
                // 화면 비율에 맞춰 파도의 찌그러짐을 방지
                vec2 centeredUv = vUv - 0.5;
                centeredUv.x *= uAspect;
                
                float ang = radians(uAngle);
                float c = cos(ang); float s = sin(ang);
                mat2 rot = mat2(c, -s, s, c);
                
                vec2 rUv = rot * centeredUv + 0.5; 
                
                // 오디오 없이 자연스럽게 밀려오는 파도 공식
                float waveSine = sin(uTime * 1.2) * 0.05;
                float secondarySine = cos(uTime * 0.7) * 0.02;
                
                float wavePos = uSurge + waveSine + secondarySine; 
                float edgeNoise = noise(rUv * 15.0 * uWaveDetail + uTime * 0.5) * 0.08 + noise(rUv * 30.0 * uWaveDetail - uTime) * 0.04;
                float distToWave = rUv.y - (wavePos + edgeNoise);
                
                vec3 finalColor;
                if (distToWave < 0.0) { 
                    vec3 baseSand = cSand;
                    if (distToWave > -0.06 && distToWave <= 0.0) baseSand *= 0.85; 
                    finalColor = baseSand;
                    
                    float residue = smoothstep(-0.04, 0.0, distToWave);
                    float residueNoise = noise(rUv * 150.0 * uWaveDetail);
                    if (residue * abs(residueNoise) > 0.12) { finalColor = mix(finalColor, cFoam, residue * 0.6); }
                } else { 
                    vec3 waterColor = mix(cShallow, cDeep, smoothstep(0.0, 0.4, distToWave));
                    
                    float foamBand = 0.015 + (waveSine * 0.05); 
                    float isFoam = 1.0 - smoothstep(0.0, foamBand, distToWave); 
                    float pureWhiteEdge = 1.0 - smoothstep(0.0, 0.005, distToWave);
                    
                    float foamNoise = noise(rUv * 80.0 * uWaveDetail + uTime * 3.0);
                    float finalFoam = isFoam * abs(foamNoise) * 2.5; 
                    
                    finalColor = mix(waterColor, cFoam, clamp(finalFoam + pureWhiteEdge, 0.0, 1.0));
                }
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `,
        side: THREE.DoubleSide
    });
    const waveMesh = new THREE.Mesh(waveGeo, waveShaderMat);
    waveMesh.rotation.x = -Math.PI / 2; 
    scene.add(waveMesh);

    // =========================================================
    // 4. UI 이벤트 및 해상도 최적화 고정
    // =========================================================
    const updateUIVal = (id, val, suffix='') => {
        let el = document.getElementById(`val-${id}`);
        if(el) el.innerText = val + suffix;
    };

    const ctrlRatio = document.getElementById('ctrl-ratio');
    
    function updateAspectRatio() {
        let w = 1920; let h = 1080; // 기준 해상도 1920 완벽 고정
        if (ctrlRatio.value === '9:16') { w = 1080; h = 1920; }
        
        renderer.setSize(w, h); 
        composer.setSize(w, h); 
        camera.aspect = w / h; 
        camera.updateProjectionMatrix();
        
        // 셰이더의 파도 형태가 화면 비율에 맞춰 깨지지 않도록 보정
        waveShaderMat.uniforms.uAspect.value = w / h;
    }
    ctrlRatio.onchange = updateAspectRatio; 
    window.addEventListener('resize', updateAspectRatio);
    updateAspectRatio();

    // 슬라이더 이벤트 맵핑 (카메라 제어 완전 삭제됨)
    const sliders = ['wave-pos', 'wave-speed', 'wave-angle', 'wave-detail', 'bloom'];
    sliders.forEach(id => {
        let el = document.getElementById(`ctrl-${id}`);
        if(el) {
            el.addEventListener('input', (e) => {
                let suffix = id === 'wave-angle' ? '°' : '';
                updateUIVal(id, e.target.value, suffix);
                
                if(id === 'bloom') bloomPass.strength = parseFloat(e.target.value);
            });
        }
    });

    document.getElementById('ctrl-color-sand').oninput = (e) => waveShaderMat.uniforms.cSand.value.set(e.target.value);
    document.getElementById('ctrl-color-shallow').oninput = (e) => waveShaderMat.uniforms.cShallow.value.set(e.target.value);
    document.getElementById('ctrl-color-deep').oninput = (e) => waveShaderMat.uniforms.cDeep.value.set(e.target.value);
    document.getElementById('ctrl-color-foam').oninput = (e) => waveShaderMat.uniforms.cFoam.value.set(e.target.value);

    // =========================================================
    // 5. 무한 파도 렌더링 루프 (안정성 100%)
    // =========================================================
    let time = 0;
    
    function animate() {
        requestAnimationFrame(animate);
        
        // 속도 슬라이더 연동
        let speed = parseFloat(document.getElementById('ctrl-wave-speed').value);
        time += 0.01 * speed;
        artFilterPass.uniforms.uTime.value = time;
        
        waveShaderMat.uniforms.uTime.value = time;
        waveShaderMat.uniforms.uSurge.value = parseFloat(document.getElementById('ctrl-wave-pos').value);
        waveShaderMat.uniforms.uAngle.value = parseFloat(document.getElementById('ctrl-wave-angle').value);
        waveShaderMat.uniforms.uWaveDetail.value = parseFloat(document.getElementById('ctrl-wave-detail').value);

        composer.render();
    }
    
    animate(); 
</script>
</body>
</html>
