<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Audio Reactive Flower - Media Art Studio</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        canvas { width: 100vw !important; height: 100vh !important; object-fit: contain; }

        .ui-panel { 
            position: absolute; top: 15px; z-index: 10; 
            background: rgba(10, 10, 10, 0.85); padding: 18px; 
            border-radius: 8px; border: 1px solid #444;
            width: 280px; max-height: 90vh; overflow-y: auto;
            backdrop-filter: blur(15px); box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }
        #ui-left { left: 15px; }
        #ui-right { right: 15px; }
        
        h3 { margin-top: 0; color: #ff33aa; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 15px; text-align: center;}
        .section-title { font-size: 11px; color: #888; margin: 15px 0 5px 0; border-bottom: 1px dashed #333; padding-bottom: 3px;}
        
        .control-group { margin-bottom: 10px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; color: #ddd; }
        .control-group input[type="range"] { width: 100%; cursor: pointer; accent-color: #ff33aa; height: 4px;}
        .control-group select { width: 100%; padding: 6px; background: #222; color: #ff33aa; border: 1px solid #555; border-radius: 4px; cursor: pointer; font-size: 11px; }
        
        #audio-input-area { margin-top: 15px; border-top: 2px solid #ff33aa; padding-top: 15px; }
        input[type="file"] { margin-bottom: 10px; display: block; color: white; width: 100%; font-size: 11px; }
        
        .main-btn { 
            background-color: #ff33aa; border: none; padding: 10px; width: 100%;
            border-radius: 5px; cursor: pointer; color: white; font-weight: bold; font-size: 13px; transition: 0.2s;
        }
        .main-btn:hover { background-color: #ff1188; }

        .record-btn { background-color: #00ffcc; color: black; margin-top: 10px; display: none; box-shadow: 0 0 15px rgba(0, 255, 204, 0.6); }
        .record-btn:hover { background-color: #00ccaa; }
        
        #status { font-size: 11px; color: #aaa; margin-top: 10px; line-height: 1.4; word-break: break-all; text-align: center;}
        .recording-badge { color: #00ffcc; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
    </style>
</head>
<body>

<div id="ui-left" class="ui-panel">
    <h3>오디오 리액티브 플라워 (Flower Art)</h3>
    <div class="section-title">[비디오 해상도]</div>
    <div class="control-group">
        <select id="ctrl-ratio">
            <option value="16:9">가로형 (1920x1080 - 유튜브)</option>
            <option value="9:16">세로형 (1080x1920 - 쇼츠)</option>
            <option value="fit" selected>화면 맞춤 (전체화면)</option>
        </select>
    </div>

    <div class="section-title" style="color:#ff33aa;">[플라워 생성 옵션]</div>
    <div class="control-group">
        <label>꽃송이 개수 배열 (Instances)</label>
        <select id="ctrl-flower-count">
            <option value="1" selected>1송이 (중앙 집중형)</option>
            <option value="3">3송이 (트리오)</option>
            <option value="5">5송이 (펜타그램)</option>
            <option value="9">9송이 (3x3 그리드)</option>
        </select>
    </div>
    
    <div class="control-group">
        <label style="color:#aaff00; margin-top:10px;">꽃잎 모양 선택 (16종 디자인)</label>
        <select id="ctrl-petal-shape">
            <option value="1" selected>1. 기본 티어드롭 (Classic)</option>
            <option value="2">2. 날카로운 창 (Spear)</option>
            <option value="3">3. 하트 모양 (Heart)</option>
            <option value="4">4. 튤립 형태 (Tulip)</option>
            <option value="5">5. 마름모 (Diamond)</option>
            <option value="6">6. 네잎 클로버 (Clover)</option>
            <option value="7">7. 얇은 바늘 (Needle)</option>
            <option value="8">8. 방패 모양 (Shield)</option>
            <option value="9">9. 은행잎 (Ginkgo)</option>
            <option value="10">10. 물결 잎 (Wavy Oak)</option>
            <option value="11">11. 화살촉 (Arrowhead)</option>
            <option value="12">12. 평평한 끝 (Flat Top)</option>
            <option value="13">13. 왕관 모양 (Crown)</option>
            <option value="14">14. 육각형 (Hexagon)</option>
            <option value="15">15. 타오르는 불꽃 (Flame)</option>
            <option value="16">16. 별/스파이크 (Spike)</option>
        </select>
    </div>

    <div class="control-group" style="margin-top:10px;">
        <label>꽃 전체 크기 조절 <span id="val-scale">1.0</span></label>
        <input type="range" id="ctrl-scale" min="0.3" max="3.0" value="1.0" step="0.1">
    </div>

    <div id="audio-input-area">
        <button id="init-btn" class="main-btn">오디오 & 렌더링 엔진 켜기</button>
        <div id="file-select-box" style="display: none; margin-top:10px;">
            <input type="file" id="audio-file" accept="audio/*">
            <div id="status">음악 선택 후, 우측 패널에서 모션을 맞추세요.</div>
            <button id="record-btn" class="main-btn record-btn">▶ 녹화 및 재생 시작</button>
        </div>
    </div>
</div>

<div id="ui-right" class="ui-panel">
    <h3>모션 & 이펙트 튜닝</h3>

    <div class="section-title" style="color:#00ffcc;">[다이나믹 애니메이션]</div>
    <div class="control-group">
        <label>꽃잎 반응 감도 (Sensitivity) <span id="val-sens">1.0</span></label>
        <input type="range" id="ctrl-sens" min="0.1" max="3.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
        <label>꽃송이 부드러움 (Damping) <span id="val-smooth">0.85</span></label>
        <input type="range" id="ctrl-smooth" min="0.1" max="0.99" value="0.85" step="0.01">
    </div>
    <div class="control-group">
        <label>꽃잎 전체 회전 속도 <span id="val-rot">1.0</span></label>
        <input type="range" id="ctrl-rot" min="0" max="5" value="1.0" step="0.1">
    </div>

    <div class="section-title" style="color:#aaff00;">[배경 풀스크린 유체]</div>
    <div class="control-group">
        <label>랜덤 컬러 유체 속도 <span id="val-fluid">1.0</span></label>
        <input type="range" id="ctrl-fluid" min="0" max="5" value="1.0" step="0.1">
    </div>

    <div class="section-title" style="color:#ff3366;">[포스트 프로세싱 (네온 뷰)]</div>
    <div class="control-group">
        <label>빛 번짐 강도 (Bloom) <span id="val-bloom">1.5</span></label>
        <input type="range" id="ctrl-bloom" min="0" max="4" value="1.5" step="0.1">
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
    // --- 1. Three.js 환경 셋업 (탑뷰 고정) ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020205); 
    scene.fog = new THREE.FogExp2(0x020205, 0.001);

    // ★ 카메라 시야각(FOV)을 좁히고 멀리 띄워서 왜곡(누워보이는 현상) 제거
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 4000);
    camera.position.set(0, 0, 1200); // 완전한 직상단 탑뷰
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({antialias: true, preserveDrawingBuffer: true});
    renderer.toneMapping = THREE.ReinhardToneMapping; 
    document.body.appendChild(renderer.domElement);

    const renderScene = new THREE.RenderPass(scene, camera);
    const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.5, 0.85);
    bloomPass.threshold = 0; bloomPass.strength = 1.5; bloomPass.radius = 0.5;

    const composer = new THREE.EffectComposer(renderer);
    composer.addPass(renderScene); composer.addPass(bloomPass);
    
    // UI 바인딩
    const ctrlRatio = document.getElementById('ctrl-ratio');
    const ctrlFlowerCount = document.getElementById('ctrl-flower-count');
    const ctrlPetalShape = document.getElementById('ctrl-petal-shape');
    const ctrlScale = document.getElementById('ctrl-scale');
    const ctrlSens = document.getElementById('ctrl-sens');
    const ctrlSmooth = document.getElementById('ctrl-smooth');
    const ctrlRot = document.getElementById('ctrl-rot');
    const ctrlFluid = document.getElementById('ctrl-fluid');
    const ctrlBloom = document.getElementById('ctrl-bloom');
    const updateUIVal = (id, val) => document.getElementById(id).innerText = val;

    function updateAspectRatio() {
        let val = ctrlRatio.value;
        let w = window.innerWidth, h = window.innerHeight;
        if (val === '16:9') { w = 1920; h = 1080; }
        else if (val === '9:16') { w = 1080; h = 1920; }
        renderer.setSize(w, h); composer.setSize(w, h); 
        camera.aspect = w / h; camera.updateProjectionMatrix();
    }
    ctrlRatio.onchange = updateAspectRatio;
    window.addEventListener('resize', () => { if (ctrlRatio.value === 'fit') updateAspectRatio(); });
    updateAspectRatio(); 

    ctrlScale.oninput = (e) => { updateUIVal('val-scale', e.target.value); buildFlowers(); };
    ctrlFlowerCount.onchange = () => buildFlowers();
    ctrlPetalShape.onchange = () => buildFlowers();

    ctrlSens.oninput = (e) => updateUIVal('val-sens', e.target.value);
    ctrlSmooth.oninput = (e) => updateUIVal('val-smooth', e.target.value);
    ctrlRot.oninput = (e) => updateUIVal('val-rot', e.target.value);
    ctrlFluid.oninput = (e) => updateUIVal('val-fluid', e.target.value);
    ctrlBloom.oninput = (e) => { bloomPass.strength = parseFloat(e.target.value); updateUIVal('val-bloom', e.target.value); };

    // --- 2. 풀스크린 랜덤 컬러 유체 배경 ---
    const fluidCount = 4000;
    const fluidGeo = new THREE.BufferGeometry();
    const fluidPos = new Float32Array(fluidCount * 3);
    const fluidColors = new Float32Array(fluidCount * 3);

    for(let i=0; i<fluidCount; i++) {
        // 화면 전역 및 Z축 깊숙한 곳에 배치 (꽃에 간섭하지 않음)
        fluidPos[i*3] = (Math.random() - 0.5) * 4000;
        fluidPos[i*3+1] = (Math.random() - 0.5) * 4000;
        fluidPos[i*3+2] = (Math.random() - 0.5) * 1000 - 500; 

        // 100% 완전 랜덤 컬러
        let c = new THREE.Color().setHSL(Math.random(), 0.9, 0.6);
        fluidColors[i*3] = c.r; fluidColors[i*3+1] = c.g; fluidColors[i*3+2] = c.b;
    }
    fluidGeo.setAttribute('position', new THREE.BufferAttribute(fluidPos, 3));
    fluidGeo.setAttribute('color', new THREE.BufferAttribute(fluidColors, 3));

    const circleCanvas = document.createElement('canvas');
    circleCanvas.width = 64; circleCanvas.height = 64;
    const ctx = circleCanvas.getContext('2d');
    ctx.beginPath(); ctx.arc(32, 32, 30, 0, Math.PI * 2); ctx.fillStyle = "white"; ctx.fill();
    const circleTex = new THREE.CanvasTexture(circleCanvas);

    const fluidMat = new THREE.PointsMaterial({
        size: 10, vertexColors: true, map: circleTex, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending, depthWrite: false
    });
    const fluidSystem = new THREE.Points(fluidGeo, fluidMat);
    scene.add(fluidSystem);

    // --- 3. 16종 꽃잎 쉐이프 제너레이터 엔진 ---
    function getPetalGeometry(shapeType) {
        const s = new THREE.Shape();
        s.moveTo(0, 0); // 모든 꽃잎은 중앙(0,0)에서 시작해 위(+Y)로 자라남
        
        switch(parseInt(shapeType)) {
            case 1: // 1. 티어드롭 (Classic)
                s.bezierCurveTo(15, 10, 15, 30, 0, 40);
                s.bezierCurveTo(-15, 30, -15, 10, 0, 0); break;
            case 2: // 2. 스피어 (Sharp)
                s.lineTo(10, 15); s.lineTo(0, 45); s.lineTo(-10, 15); s.lineTo(0, 0); break;
            case 3: // 3. 하트 (Heart)
                s.bezierCurveTo(25, 15, 20, 35, 0, 30); s.bezierCurveTo(-20, 35, -25, 15, 0, 0); break;
            case 4: // 4. 튤립 (Tulip)
                s.bezierCurveTo(15, 10, 20, 25, 15, 40); s.lineTo(7, 33); s.lineTo(0, 45); s.lineTo(-7, 33); s.lineTo(-15, 40); s.bezierCurveTo(-20, 25, -15, 10, 0, 0); break;
            case 5: // 5. 마름모 (Diamond)
                s.lineTo(15, 20); s.lineTo(0, 40); s.lineTo(-15, 20); s.lineTo(0, 0); break;
            case 6: // 6. 클로버 (Clover)
                s.bezierCurveTo(30, 15, 15, 45, 0, 35); s.bezierCurveTo(-15, 45, -30, 15, 0, 0); break;
            case 7: // 7. 바늘 (Needle)
                s.bezierCurveTo(2, 10, 2, 30, 0, 50); s.bezierCurveTo(-2, 30, -2, 10, 0, 0); break;
            case 8: // 8. 방패 (Shield)
                s.bezierCurveTo(20, 5, 20, 25, 0, 40); s.bezierCurveTo(-20, 25, -20, 5, 0, 0); break;
            case 9: // 9. 은행잎 (Ginkgo)
                s.lineTo(20, 35); s.bezierCurveTo(10, 45, -10, 45, -20, 35); s.lineTo(0, 0); break;
            case 10: // 10. 물결잎 (Wavy Oak)
                s.bezierCurveTo(15, 5, 5, 15, 15, 25); s.bezierCurveTo(5, 35, 15, 40, 0, 45); s.bezierCurveTo(-15, 40, -5, 35, -15, 25); s.bezierCurveTo(-5, 15, -15, 5, 0, 0); break;
            case 11: // 11. 화살촉 (Arrowhead)
                s.bezierCurveTo(10, 0, 20, 10, 25, 20); s.lineTo(0, 45); s.lineTo(-25, 20); s.bezierCurveTo(-20, 10, -10, 0, 0, 0); break;
            case 12: // 12. 평평한 끝 (Flat Top)
                s.bezierCurveTo(10, 10, 15, 30, 10, 35); s.lineTo(-10, 35); s.bezierCurveTo(-15, 30, -10, 10, 0, 0); break;
            case 13: // 13. 왕관 (Crown)
                s.bezierCurveTo(15, 10, 25, 25, 30, 40); s.lineTo(10, 30); s.lineTo(0, 45); s.lineTo(-10, 30); s.lineTo(-30, 40); s.bezierCurveTo(-25, 25, -15, 10, 0, 0); break;
            case 14: // 14. 육각형 (Hexagon)
                s.lineTo(10, 10); s.lineTo(15, 25); s.lineTo(0, 40); s.lineTo(-15, 25); s.lineTo(-10, 10); s.lineTo(0,0); break;
            case 15: // 15. 불꽃 (Flame)
                s.bezierCurveTo(15, 10, 25, 20, 10, 30); s.bezierCurveTo(20, 40, 0, 50, 0, 50); s.bezierCurveTo(-10, 40, -20, 30, -10, 20); s.bezierCurveTo(-25, 10, -15, 0, 0, 0); break;
            case 16: // 16. 별/스파이크 (Spike)
                s.lineTo(5, 15); s.lineTo(20, 20); s.lineTo(5, 25); s.lineTo(0, 45); s.lineTo(-5, 25); s.lineTo(-20, 20); s.lineTo(-5, 15); s.lineTo(0,0); break;
        }
        return new THREE.ShapeGeometry(s);
    }

    const mainFlowerGroup = new THREE.Group();
    scene.add(mainFlowerGroup);
    let allFlowers = [];

    function createFlowerObj(x, y, scaleMult) {
        const flower = new THREE.Group();
        flower.position.set(x, y, 0);
        
        const globalScale = parseFloat(ctrlScale.value) * scaleMult * 3.5; // 꽃 사이즈 스케일업
        flower.scale.set(globalScale, globalScale, globalScale);

        const petals = [];
        const stamens = [];

        // 선택한 쉐이프 적용
        const selectedShapeType = ctrlPetalShape.value;
        const customGeo = getPetalGeometry(selectedShapeType);
        
        // 꽃술 전용 지오메트리 (바늘 형태 고정)
        const stamenGeo = getPetalGeometry(7); 

        // 16개의 거대한 외곽 꽃잎 (Petals)
        const petalMat = new THREE.MeshBasicMaterial({ 
            color: 0xffffff, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false
        });
        
        for(let i=0; i<16; i++) {
            let pMesh = new THREE.Mesh(customGeo, petalMat.clone());
            pMesh.rotation.z = -(i / 16) * Math.PI * 2; 
            pMesh.rotation.x = Math.PI / 2.2; // 기본적으로 위(카메라 쪽)로 심하게 오므려져 있음
            flower.add(pMesh);
            petals.push(pMesh);
        }

        // 16개의 안쪽 꽃술 (Stamens)
        const stamenMat = new THREE.MeshBasicMaterial({ 
            color: 0xffffff, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false
        });

        for(let i=0; i<16; i++) {
            let sMesh = new THREE.Mesh(stamenGeo, stamenMat.clone());
            sMesh.scale.set(0.6, 0.6, 1.0); // 꽃술은 짧고 날카롭게
            sMesh.rotation.z = -(i / 16) * Math.PI * 2 - (Math.PI / 32); // 꽃잎 사이 틈새 배치
            sMesh.rotation.x = Math.PI / 3; 
            flower.add(sMesh);
            stamens.push(sMesh);
        }

        // 중앙 코어
        const coreGeo = new THREE.CircleGeometry(5, 32);
        const coreMat = new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending});
        const core = new THREE.Mesh(coreGeo, coreMat);
        core.position.z = 2; 
        flower.add(core);

        mainFlowerGroup.add(flower);
        allFlowers.push({ group: flower, petals, stamens, core });
    }

    function buildFlowers() {
        while(mainFlowerGroup.children.length > 0) mainFlowerGroup.remove(mainFlowerGroup.children[0]);
        allFlowers = [];

        let count = parseInt(ctrlFlowerCount.value);
        if (count === 1) {
            createFlowerObj(0, 0, 1.0);
        } else if (count === 3) {
            createFlowerObj(0, 150, 0.7); createFlowerObj(-200, -100, 0.7); createFlowerObj(200, -100, 0.7);
        } else if (count === 5) {
            createFlowerObj(0, 0, 0.8); createFlowerObj(-250, 200, 0.4); createFlowerObj(250, 200, 0.4);
            createFlowerObj(-200, -200, 0.4); createFlowerObj(200, -200, 0.4);
        } else if (count === 9) {
            for(let x=-1; x<=1; x++) {
                for(let y=-1; y<=1; y++) {
                    let s = (x===0 && y===0) ? 0.7 : 0.4;
                    createFlowerObj(x*280, y*280, s);
                }
            }
        }
    }
    buildFlowers();

    // --- 4. 오디오 엔진 ---
    let audioCtx, analyser, dataArray, currentSource;
    let decodedBuffer = null; let isPlaying = false;    
    let mediaRecorder, recordedChunks = [];
    let smoothedData = new Float32Array(512);
    
    const initBtn = document.getElementById('init-btn');
    const fileSelectBox = document.getElementById('file-select-box');
    const audioInput = document.getElementById('audio-file');
    const recordBtn = document.getElementById('record-btn');
    const statusEl = document.getElementById('status');
    let loadedFileName = "";

    initBtn.onclick = function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512; dataArray = new Uint8Array(analyser.frequencyBinCount);
        initBtn.style.display = 'none'; fileSelectBox.style.display = 'block';
    };

    audioInput.onchange = function(event) {
        const file = event.target.files[0]; if (!file) return;
        loadedFileName = file.name;
        statusEl.innerText = "음원 디코딩 중... 잠시만 기다려주세요."; recordBtn.style.display = 'none';
        const reader = new FileReader();
        reader.onload = function(e) {
            audioCtx.decodeAudioData(e.target.result, function(buffer) {
                decodedBuffer = buffer;
                statusEl.innerHTML = "<strong>준비 완료!</strong> 셋팅을 마치고 재생버튼을 누르세요."; recordBtn.style.display = 'block';
            });
        };
        reader.readAsArrayBuffer(file);
    };

    recordBtn.onclick = function() {
        if (!decodedBuffer) return;
        if (currentSource) currentSource.stop();
        currentSource = audioCtx.createBufferSource(); currentSource.buffer = decodedBuffer; currentSource.connect(analyser);
        
        const audioDest = audioCtx.createMediaStreamDestination();
        analyser.connect(audioCtx.destination); analyser.connect(audioDest);            
        
        const canvasStream = renderer.domElement.captureStream(60);
        const combinedStream = new MediaStream([...canvasStream.getVideoTracks(), ...audioDest.stream.getAudioTracks()]);
        
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm; codecs=vp9' });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.style = 'display: none'; a.href = url;
            a.download = loadedFileName.replace(/\.[^/.]+$/, "") + `_FlowerArt_${ctrlRatio.value.replace(':','x')}.webm`;
            document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url);
            
            statusEl.innerText = "녹화 완료! 영상이 저장되었습니다.";
            ctrlRatio.disabled = false; isPlaying = false;
            recordBtn.style.display = 'block'; recordBtn.innerText = "▶ 다시 녹화하기";
        };

        currentSource.onended = () => { if(mediaRecorder.state === 'recording') mediaRecorder.stop(); };
        currentSource.start(0); mediaRecorder.start(); isPlaying = true;
        ctrlRatio.disabled = true; recordBtn.style.display = 'none';
        statusEl.innerHTML = `<span class="recording-badge">● REC</span> 자동 녹화 중: ${loadedFileName}`;
    };

    // --- 5. 렌더링 루프 (모션 애니메이션) ---
    let time = 0;

    function animate() {
        requestAnimationFrame(animate);
        time += 0.01;
        
        let sensitivity = parseFloat(ctrlSens.value);
        let smoothing = parseFloat(ctrlSmooth.value); 
        let lerpFactor = 1.0 - smoothing; 
        
        if (isPlaying && analyser) {
            analyser.getByteFrequencyData(dataArray);
            for(let i=0; i<dataArray.length; i++) smoothedData[i] += (dataArray[i] - smoothedData[i]) * lerpFactor;
        }

        // --- 백그라운드 유체 모션 ---
        let fluidSpeed = parseFloat(ctrlFluid.value);
        let fPos = fluidGeo.attributes.position.array;
        let t = time * 0.5;

        for (let i = 0; i < fluidCount; i++) {
            let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
            let px = fPos[ix] * 0.003, py = fPos[iy] * 0.003, pz = fPos[iz] * 0.003;
            
            let vx = Math.sin(py + t) + Math.sin(pz * 0.5);
            let vy = Math.cos(px + t) + Math.cos(pz * 0.5);
            let vz = Math.sin(px - t) + Math.cos(py - t);

            vx -= fPos[ix] * 0.0005; vy -= fPos[iy] * 0.0005;
            fPos[ix] += vx * fluidSpeed; fPos[iy] += vy * fluidSpeed; fPos[iz] += vz * fluidSpeed;
        }
        fluidGeo.attributes.position.needsUpdate = true;

        // --- 플라워 다이나믹 모션 ---
        let rotSpeed = parseFloat(ctrlRot.value);

        allFlowers.forEach((flowerObj, idx) => {
            // 꽃송이 자체 회전 (Z축)
            flowerObj.group.rotation.z -= 0.005 * rotSpeed * (idx % 2 === 0 ? 1 : -1); 

            // 코어 진동
            let bSum = 0; for(let i=0; i<10; i++) bSum += smoothedData[i];
            let bass = (bSum / 10 / 255) * sensitivity;
            let coreScale = 1 + (bass * 2.0);
            flowerObj.core.scale.set(coreScale, coreScale, 1);

            // 16개 외곽 꽃잎 (Petals) 반응 - 저음/중음역대
            for(let p=0; p<16; p++) {
                let sum = 0; let start = p * 4; 
                for(let j=0; j<4; j++) sum += smoothedData[start + j];
                let freqVal = (sum / 4 / 255) * sensitivity;

                let petal = flowerObj.petals[p];
                // 기본 오므려진 상태(PI/2.2)에서 비트가 치면 바닥(0)으로 쫙 펴짐
                let targetRotX = (Math.PI / 2.2) - (freqVal * (Math.PI / 2.2));
                petal.rotation.x = Math.max(0.0, targetRotX);

                // 색상: 인덱스에 따른 무지개 스펙트럼 + 비트에 따른 명도 상승
                petal.material.color.setHSL(((p/16) + time*0.1) % 1.0, 0.8, 0.2 + freqVal*0.5);
            }

            // 16개 안쪽 꽃술 (Stamens) 반응 - 고음역대
            for(let s=0; s<16; s++) {
                let sum = 0; let start = 100 + (s * 3); 
                for(let j=0; j<3; j++) sum += smoothedData[start + j];
                let freqVal = (sum / 3 / 255) * sensitivity;

                let stamen = flowerObj.stamens[s];
                // 기본 상태(PI/3)에서 비트가 치면 안으로 날카롭게 솟구쳐 오므라듦(PI/1.5 방향)
                let targetRotX = (Math.PI / 3) + (freqVal * (Math.PI / 4));
                stamen.rotation.x = Math.min(Math.PI / 1.5, targetRotX);
                
                // 꽃술 색상은 꽃잎과 반대되는 보색 계열로 회전
                stamen.material.color.setHSL(((s/16) - time*0.2) % 1.0, 1.0, 0.4 + freqVal*0.6);
            }
        });

        composer.render();
    }
    animate(); 
</script>
</body>
