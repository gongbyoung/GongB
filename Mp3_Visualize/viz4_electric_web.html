<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualizer 04 — Electric Web</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #010108;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  .label {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 6px;
    color: #00aaaa;
    text-transform: uppercase;
  }
  canvas { display: block; }
  .controls {
    position: fixed;
    bottom: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
  }
  .drop-zone {
    border: 1px dashed #006666;
    border-radius: 10px;
    padding: 12px 32px;
    cursor: pointer;
    font-size: 12px;
    color: #008888;
    letter-spacing: 2px;
    transition: all 0.3s;
  }
  .drop-zone:hover { border-color: #00ffff; color: #80ffff; }
  input[type=file] { display: none; }
  button {
    background: rgba(0,20,30,0.7);
    border: 1px solid #006666;
    border-radius: 6px;
    color: #00aaaa;
    padding: 7px 16px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover { border-color: #00ffff; color: #80ffff; }
</style>
</head>
<body>
<div class="label">04 — ELECTRIC WEB</div>
<canvas id="c"></canvas>
<div class="controls">
  <div class="drop-zone" id="dz">♫ MP3 드래그 또는 클릭</div>
  <button id="playBtn" style="display:none">▶ PLAY</button>
</div>
<input type="file" id="fi" accept="audio/*">
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

let audioCtx, analyser, source, gainNode, isPlaying = false, audioBuffer, startTime = 0, pauseOffset = 0;
let t = 0;

// Web nodes
const NODES = 16;
let nodes = [];
function initNodes() {
  nodes = Array.from({length: NODES}, (_, i) => {
    const angle = (i / NODES) * Math.PI * 2;
    return { angle, baseAngle: angle, speed: (Math.random() - 0.5) * 0.01 };
  });
}
initNodes();

document.getElementById('dz').addEventListener('click', () => document.getElementById('fi').click());
document.getElementById('dz').addEventListener('dragover', e => e.preventDefault());
document.getElementById('dz').addEventListener('drop', e => { e.preventDefault(); load(e.dataTransfer.files[0]); });
document.getElementById('fi').addEventListener('change', e => load(e.target.files[0]));

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    gainNode = audioCtx.createGain();
    gainNode.connect(audioCtx.destination);
    analyser.connect(gainNode);
  }
}
function load(file) {
  initAudio();
  if (source) { try { source.stop(); source.disconnect(); } catch(e){} }
  const reader = new FileReader();
  reader.onload = e => {
    audioCtx.decodeAudioData(e.target.result, buf => {
      audioBuffer = buf; pauseOffset = 0;
      document.getElementById('playBtn').style.display = ''; play();
    });
  };
  reader.readAsArrayBuffer(file);
}
function play() {
  if (!audioBuffer) return;
  if (source) { try { source.stop(); source.disconnect(); } catch(e){} }
  source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(analyser);
  source.start(0, pauseOffset);
  startTime = audioCtx.currentTime - pauseOffset;
  isPlaying = true;
  document.getElementById('playBtn').textContent = '⏸ PAUSE';
  source.onended = () => { isPlaying = false; pauseOffset = 0; document.getElementById('playBtn').textContent = '▶ PLAY'; };
}
document.getElementById('playBtn').addEventListener('click', () => {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (isPlaying) {
    pauseOffset = audioCtx.currentTime - startTime;
    source.stop(); isPlaying = false;
    document.getElementById('playBtn').textContent = '▶ PLAY';
  } else play();
});

function lightning(x1, y1, x2, y2, depth, amp) {
  if (depth === 0) {
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    return;
  }
  const mx = (x1 + x2) / 2 + (Math.random() - 0.5) * 30 * amp;
  const my = (y1 + y2) / 2 + (Math.random() - 0.5) * 30 * amp;
  lightning(x1, y1, mx, my, depth - 1, amp * 0.6);
  lightning(mx, my, x2, y2, depth - 1, amp * 0.6);
}

function draw() {
  requestAnimationFrame(draw);
  t += 0.01;
  ctx.fillStyle = 'rgba(1,1,8,0.3)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  const freqData = new Uint8Array(analyser ? analyser.frequencyBinCount : 256);
  if (analyser) analyser.getByteFrequencyData(freqData);

  let bass = 0;
  for (let i = 0; i < 8; i++) bass += (freqData[i] || 0);
  bass = bass / 8 / 255;

  const baseR = Math.min(W, H) * 0.35;

  // Update nodes
  nodes.forEach((n, i) => {
    const fi = Math.floor((i / NODES) * freqData.length * 0.6);
    const amp = (freqData[fi] || 0) / 255;
    n.angle = n.baseAngle + Math.sin(t * 0.5 + i) * 0.3 * (1 + amp);
    n.amp = amp;
    n.r = baseR * (0.7 + amp * 0.5);
    n.x = cx + Math.cos(n.angle) * n.r;
    n.y = cy + Math.sin(n.angle) * n.r;
  });

  // Draw web connections
  for (let i = 0; i < NODES; i++) {
    for (let j = i + 1; j < NODES; j++) {
      const dist = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
      const maxDist = baseR * 1.4;
      if (dist < maxDist) {
        const proximity = 1 - dist / maxDist;
        const energy = (nodes[i].amp + nodes[j].amp) * 0.5;
        if (energy > 0.1 || proximity > 0.6) {
          ctx.save();
          // Lightning bolt between nodes
          ctx.strokeStyle = `rgba(0, 220, 255, ${proximity * energy * 0.8})`;
          ctx.lineWidth = 0.5 + energy * 1.5;
          lightning(nodes[i].x, nodes[i].y, nodes[j].x, nodes[j].y, energy > 0.5 ? 2 : 1, energy);
          ctx.stroke();
          ctx.restore();
        }
      }
    }
    // Lines to center
    ctx.save();
    ctx.strokeStyle = `rgba(0, 180, 255, ${nodes[i].amp * 0.5})`;
    ctx.lineWidth = 0.5;
    lightning(cx, cy, nodes[i].x, nodes[i].y, 1, nodes[i].amp);
    ctx.stroke();
    ctx.restore();
  }

  // Draw node orbs
  nodes.forEach(n => {
    const grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, 12 + n.amp * 20);
    grd.addColorStop(0, `rgba(100, 255, 255, ${0.8 + n.amp * 0.2})`);
    grd.addColorStop(0.5, `rgba(0, 150, 255, ${0.3 + n.amp * 0.5})`);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(n.x, n.y, 12 + n.amp * 20, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(n.x, n.y, 3 + n.amp * 4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200, 255, 255, ${0.9})`;
    ctx.fill();
  });

  // Core burst
  const coreR = 15 + bass * 40;
  const coreGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR * 3);
  coreGrd.addColorStop(0, `rgba(100, 255, 255, ${0.6 + bass * 0.4})`);
  coreGrd.addColorStop(0.4, `rgba(0, 100, 255, 0.3)`);
  coreGrd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, coreR * 3, 0, Math.PI * 2);
  ctx.fillStyle = coreGrd;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, cy, coreR, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(200, 255, 255, ${0.9})`;
  ctx.fill();
}
draw();
</script>
</body>
</html>
