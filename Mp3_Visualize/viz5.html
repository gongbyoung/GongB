<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM v15.0.04 — Video Recording Edition</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#050505; --panel:#0d0d12; --accent:#00ffcc; --border:rgba(255,255,255,0.06); --text:#ffffff; }
body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

/* LAYOUT */
.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo{letter-spacing:4px; color:var(--accent); font-weight:800; font-size:12px;}
.container { display: grid; grid-template-columns: 280px 1fr 300px; flex: 1; min-height: 0; }
.side-panel { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
.side-panel.right { border-right:none; border-left: 1px solid var(--border); }

h3 { font-size: 10px; color: #555; margin-bottom: 12px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-top: 15px;}

/* INPUTS */
.input-text { width: 100%; background: #000; border: 1px solid #333; color: var(--accent); padding: 8px; font-size: 14px; font-weight: bold; border-radius: 4px; outline:none; margin-bottom:10px; }
.control-group { margin-bottom: 12px; }
.control-group label { display: block; font-size: 9px; color: #777; margin-bottom: 6px; }
.val-label { float: right; color: var(--accent); font-weight: bold; }
input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; height: 3px;}

/* BUTTONS */
.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 10px; cursor: pointer; font-size: 10px; border-radius: 4px; width: 100%; margin-bottom: 5px; transition: 0.2s;}
.btn.primary { background: var(--accent); color: #000; border: none; font-weight: bold; font-size: 12px; padding: 15px; margin-top: 10px;}
.btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.05); }

/* VIZ AREA */
.viz-area { position: relative; background: #000; overflow: hidden; flex: 1; display: flex; justify-content: center; align-items: center; }
#artCanvas { background: #000; }
.log-panel { background: #000; border: 1px solid #222; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 10px; color: #888; line-height: 1.6; margin-top: 10px; }
.log-panel b { color: var(--accent); }
#currentLyric { position: absolute; bottom: 40px; width: 100%; text-align: center; font-size: 14px; color: var(--accent); pointer-events: none; opacity: 0.8; font-weight: bold; text-shadow: 0 0 10px #000; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM ART LAB v15.0.04</div>
  <div id="timeCode" style="font-family: monospace; font-size: 14px; color: var(--accent);">00:00.00</div>
</div>

<div class="container">
  <div class="side-panel">
    <h3>1. Target Mask Shape</h3>
    <input type="text" id="maskTextInput" class="input-text" value="VOID" oninput="updateMask()">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom:15px;">
        <button class="btn active" id="modeH" onclick="setWriteMode('H')">가로 쓰기</button>
        <button class="btn" id="modeV" onclick="setWriteMode('V')">세로 쓰기</button>
    </div>

    <h3>2. Screen Ratio</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom:10px;">
        <button class="btn active" id="b169" onclick="setAspect('16:9')">16:9 가로</button>
        <button class="btn" id="b916" onclick="setAspect('9:16')">9:16 세로</button>
    </div>

    <h3>3. Assets Loading</h3>
    <button class="btn" onclick="document.getElementById('mIn').click()">LOAD MP3</button>
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleMusic(this.files)">
    <button class="btn" onclick="document.getElementById('sIn').click()">LOAD SRT</button>
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">

    <h3>4. Debug Status Log</h3>
    <div class="log-panel" id="logBox">
      <div>AUDIO: <b id="logAudio">IDLE</b></div>
      <div>AMP: <b id="logAmp">0.00</b> / <b id="logThr">0.00</b></div>
      <div>STATUS: <b id="logStatus">READY</b></div>
      <div>LYRICS: <b id="logLine">0 LINES</b></div>
    </div>
  </div>

  <div class="viz-area">
    <canvas id="artCanvas"></canvas>
    <div id="currentLyric">가사를 기다리는 중...</div>
  </div>

  <div class="side-panel right">
    <h3>5. Mask Position</h3>
    <div class="control-group">
      <label>SIZE <span class="val-label" id="sizeVal">1.0</span></label>
      <input type="range" id="maskSize" min="0.2" max="3.0" step="0.1" value="1.0" oninput="updateMask()">
    </div>
    <div class="control-group">
      <label>POSITION X / Y</label>
      <input type="range" id="maskX" min="-400" max="400" value="0" oninput="updateMask()">
      <input type="range" id="maskY" min="-400" max="400" value="0" oninput="updateMask()" style="margin-top:5px;">
    </div>

    <h3>6. RGB Range (Color)</h3>
    <div class="control-group"><label>R Range</label>
      <input type="range" id="rMin" min="0" max="255" value="100">
      <input type="range" id="rMax" min="0" max="255" value="255"></div>
    <div class="control-group"><label>G Range</label>
      <input type="range" id="gMin" min="0" max="255" value="0">
      <input type="range" id="gMax" min="0" max="255" value="180"></div>
    <div class="control-group"><label>B Range</label>
      <input type="range" id="bMin" min="0" max="255" value="150">
      <input type="range" id="bMax" min="0" max="255" value="255"></div>

    <h3>7. Control</h3>
    <div class="control-group">
      <label>DENSITY <span class="val-label" id="densityVal">30</span></label>
      <input type="range" id="density" min="1" max="100" value="30" oninput="document.getElementById('densityVal').innerText=this.value">
    </div>
    <div class="control-group">
      <label>SENSITIVITY <span class="val-label" id="sensVal">9</span></label>
      <input type="range" id="sens" min="1" max="10" value="9" oninput="document.getElementById('sensVal').innerText=this.value">
    </div>

    <button class="btn primary" id="playBtn" onclick="togglePlay()">START PERFORMANCE</button>
    <button class="btn" onclick="clearCanvas()">CLEAR CANVAS</button>
    <button class="btn" onclick="saveArt()">SAVE AS PNG</button>
  </div>
</div>

<script>
let aspect = '16:9', writeMode = 'H';
let srtData = [], audioCtx, analyser, source, audioBuffer, isPlaying = false, startTime = 0, pauseOffset = 0;
let lastPaintTime = 0, maskFinalFontSize = 0, maskDataCache = null;
let mediaRecorder, recordedChunks = [];

const canvas = document.getElementById('artCanvas'), ctx = canvas.getContext('2d');
const maskCanvas = document.createElement('canvas');
const maskCtx = maskCanvas.getContext('2d');

function setWriteMode(mode) {
    writeMode = mode;
    document.getElementById('modeH').classList.toggle('active', mode === 'H');
    document.getElementById('modeV').classList.toggle('active', mode === 'V');
    updateMask();
}

function updateMask() {
    const text = document.getElementById('maskTextInput').value;
    const sizeScale = parseFloat(document.getElementById('maskSize').value);
    const offsetX = parseInt(document.getElementById('maskX').value);
    const offsetY = parseInt(document.getElementById('maskY').value);
    document.getElementById('sizeVal').innerText = sizeScale.toFixed(1);

    maskCanvas.width = canvas.width;
    maskCanvas.height = canvas.height;
    maskCtx.fillStyle = "black";
    maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);
    maskCtx.fillStyle = "white";
    maskCtx.textAlign = "center";
    maskCtx.textBaseline = "middle";

    const centerX = maskCanvas.width / 2 + offsetX;
    const centerY = maskCanvas.height / 2 + offsetY;

    if (writeMode === 'H') {
        const baseFontSize = Math.min(maskCanvas.width / (text.length * 0.8), maskCanvas.height * 0.6);
        maskFinalFontSize = baseFontSize * sizeScale;
        maskCtx.font = `900 ${maskFinalFontSize}px Pretendard`;
        maskCtx.fillText(text, centerX, centerY);
    } else {
        const baseFontSize = Math.min(maskCanvas.width * 0.5, (maskCanvas.height / (text.length * 1.1)));
        maskFinalFontSize = baseFontSize * sizeScale;
        maskCtx.font = `900 ${maskFinalFontSize}px Pretendard`;
        const totalHeight = text.length * maskFinalFontSize * 1.05;
        const startY = centerY - (totalHeight / 2) + (maskFinalFontSize / 2);
        for (let i = 0; i < text.length; i++) {
            maskCtx.fillText(text[i], centerX, startY + (i * maskFinalFontSize * 1.05));
        }
    }
    maskDataCache = maskCtx.getImageData(0, 0, maskCanvas.width, maskCanvas.height).data;
    if (!isPlaying) drawPreviewOutline();
}

function drawPreviewOutline() {
    ctx.fillStyle = "#050505";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "rgba(0, 255, 204, 0.08)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const text = document.getElementById('maskTextInput').value;
    const offsetX = parseInt(document.getElementById('maskX').value);
    const offsetY = parseInt(document.getElementById('maskY').value);
    ctx.fillStyle = "black";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = `900 ${maskFinalFontSize}px Pretendard`;

    const centerX = canvas.width / 2 + offsetX;
    const centerY = canvas.height / 2 + offsetY;

    if (writeMode === 'H') {
        ctx.fillText(text, centerX, centerY);
    } else {
        const totalHeight = text.length * maskFinalFontSize * 1.05;
        const startY = centerY - (totalHeight / 2) + (maskFinalFontSize / 2);
        for (let i = 0; i < text.length; i++) {
            ctx.fillText(text[i], centerX, startY + (i * maskFinalFontSize * 1.05));
        }
    }
}

function getPointInMask() {
    if (!maskDataCache) return null;
    const W = canvas.width, H = canvas.height;
    for (let i = 0; i < 150; i++) {
        const x = Math.floor(Math.random() * W);
        const y = Math.floor(Math.random() * H);
        const index = (y * W + x) * 4;
        // 마스크 영역(흰색 글씨 부분) 판정: 128보다 크면 흰색 영역임
        if (maskDataCache[index] > 128) return { x, y }; 
    }
    return null;
}

function setAspect(r) {
    aspect = r;
    document.getElementById('b169').classList.toggle('active', r === '16:9');
    document.getElementById('b916').classList.toggle('active', r === '9:16');
    resize();
}

function resize() {
    const parent = canvas.parentElement;
    const pw = parent.clientWidth - 40, ph = parent.clientHeight - 40;
    if (aspect === '16:9') { canvas.width = Math.min(pw, ph * 1.77); canvas.height = canvas.width / 1.77; }
    else { canvas.height = Math.min(ph, pw * 0.56); canvas.width = canvas.height * 0.56; }
    updateMask();
}
window.onresize = resize; resize();

function handleSRT(files) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result.replace(/\r\n/g, '\n');
    const blocks = text.trim().split(/\n\s*\n/);
    srtData = blocks.map((b, idx) => {
      const lines = b.split('\n').filter(l => l.trim() !== "");
      const timeMatch = lines.find(l => l.includes('-->'))?.match(/(\d+:\d+:\d+,\d+) --> (\d+:\d+:\d+,\d+)/);
      if (!timeMatch) return null;
      const content = lines.slice(lines.indexOf(lines.find(l => l.includes('-->')))+1).join(' ').trim();
      return { start: toSec(timeMatch[1]), end: toSec(timeMatch[2]), text: content, chars: content.split('').filter(c => c !== " "), id: idx+1 };
    }).filter(x => x);
    document.getElementById('logLine').innerText = srtData.length + " LINES";
  };
  reader.readAsText(files[0]);
}
function toSec(t) { const [h, m, s] = t.split(':'); const [sec, ms] = s.split(','); return parseInt(h)*3600 + parseInt(m)*60 + parseInt(sec) + parseInt(ms)/1000; }

function handleMusic(files) {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const reader = new FileReader();
  reader.onload = (e) => { 
    audioCtx.decodeAudioData(e.target.result, (buf) => { 
      audioBuffer = buf; 
      document.getElementById('logAudio').innerText = "READY";
    }); 
  };
  reader.readAsArrayBuffer(files[0]);
}

async function togglePlay() {
  if(!audioBuffer || srtData.length === 0) return alert("파일을 로드해주세요.");
  if(audioCtx.state === 'suspended') await audioCtx.resume();
  
  if(isPlaying) {
    pauseOffset = audioCtx.currentTime - startTime;
    if(source) { source.onended = null; source.stop(); }
    isPlaying = false;
    document.getElementById('playBtn').textContent = "RESUME PERFORMANCE";
    if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
  } else {
    source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    
    source.onended = () => { if(isPlaying) togglePlay(); };
    source.start(0, pauseOffset);
    startTime = audioCtx.currentTime - pauseOffset;
    isPlaying = true;
    
    ctx.fillStyle = "black"; ctx.fillRect(0,0,canvas.width,canvas.height);
    document.getElementById('playBtn').textContent = "STOP & SAVE MP4";
    document.getElementById('logAudio').innerText = "PLAYING & RECORDING";
    
    startRecording();
    animate();
  }
}

function startRecording() {
    recordedChunks = [];
    const stream = canvas.captureStream(30); 
    // 브라우저 호환성을 위해 webm 형식을 기본으로 사용 (대부분의 환경에서 mp4로 인식 가능)
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = exportVideo;
    mediaRecorder.start();
}

function exportVideo() {
    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Spectrum_Art_${Date.now()}.mp4`;
    a.click();
}

let charPtr = 0, lastLineIdx = -1;

function animate() {
  if(!isPlaying) return;
  requestAnimationFrame(animate);
  const nowTime = audioCtx.currentTime - startTime;
  document.getElementById('timeCode').textContent = new Date(nowTime * 1000).toISOString().substr(14, 5);
  
  const currentLine = srtData.find(line => nowTime >= line.start && nowTime <= line.end);
  
  if (currentLine) {
    document.getElementById('currentLyric').textContent = currentLine.text;
    if (currentLine.id !== lastLineIdx) { charPtr = 0; lastLineIdx = currentLine.id; }

    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    let sum = 0; for(let i=0; i<100; i++) sum += data[i];
    const amp = sum / 100 / 255;
    
    const sensThreshold = 1.1 - (Number(document.getElementById('sens').value) / 10);
    document.getElementById('logAmp').innerText = amp.toFixed(2);
    document.getElementById('logThr').innerText = sensThreshold.toFixed(2);
    document.getElementById('logStatus').innerText = amp > sensThreshold ? "PAINTING" : "WAIT BIT";

    const now = Date.now();
    const densityLimit = 1000 / Number(document.getElementById('density').value);

    if (amp > sensThreshold && (now - lastPaintTime > densityLimit)) {
      const char = currentLine.chars[charPtr % currentLine.chars.length];
      const pos = getPointInMask();
      if (pos) { 
          paintStroke(char, amp, pos.x, pos.y); 
          charPtr++; 
      }
      lastPaintTime = now;
    }
  } else { document.getElementById('logStatus').innerText = "NO CUE"; }
}

function paintStroke(char, amp, x, y) {
  const r = Math.random()*(Number(document.getElementById('rMax').value)-Number(document.getElementById('rMin').value))+Number(document.getElementById('rMin').value);
  const g = Math.random()*(Number(document.getElementById('gMax').value)-Number(document.getElementById('gMin').value))+Number(document.getElementById('gMin').value);
  const b = Math.random()*(Number(document.getElementById('bMax').value)-Number(document.getElementById('bMin').value))+Number(document.getElementById('bMin').value);

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(Math.random()*Math.PI*0.3 - 0.15);
  const fontSize = (maskFinalFontSize * 0.1) + (amp * maskFinalFontSize * 0.25);
  ctx.fillStyle = `rgba(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)}, 0.85)`;
  ctx.font = `900 ${fontSize}px 'Pretendard'`;
  ctx.fillText(char, 0, 0);
  ctx.restore();
}

function clearCanvas() { ctx.fillStyle = 'black'; ctx.fillRect(0,0,canvas.width,canvas.height); if(!isPlaying) drawPreviewOutline(); }
function saveArt() { const link = document.createElement('a'); link.download=`art.png`; link.href=canvas.toDataURL(); link.click(); }
</script>
</body>
</html>
