<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRUSH PAINTER — Music Reactive</title>

<script>
(function(){
  if(typeof window==='undefined'||window.crossOriginIsolated)return;
  const SW=`
self.addEventListener('install',()=>self.skipWaiting());
self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));
self.addEventListener('fetch',function(e){
  if(e.request.cache==='only-if-cached'&&e.request.mode!=='same-origin')return;
  e.respondWith(fetch(e.request).then(function(r){
    if(!r||r.status===0||r.type==='opaque')return r;
    const h=new Headers(r.headers);
    h.set('Cross-Origin-Opener-Policy','same-origin');
    h.set('Cross-Origin-Embedder-Policy','require-corp');
    return new Response(r.body,{status:r.status,statusText:r.statusText,headers:h});
  }).catch(()=>fetch(e.request)));
});`;
  const blob=new Blob([SW],{type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:'/'})
    .then(()=>{ if(!navigator.serviceWorker.controller) window.addEventListener('load',()=>{ if(!window.crossOriginIsolated) location.reload(); }); })
    .catch(()=>{});
})();
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;800&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root{
  --ink:#0a0a0f;
  --paper:#f0ede8;
  --panel:#13131a;
  --panel2:#1c1c26;
  --line:rgba(255,255,255,0.06);
  --gold:#c8a96e;
  --gold2:#e8c98e;
  --red:#e05555;
  --dim:#44445a;
  --text:#d8d4cc;
}

html,body{height:100%;overflow:hidden;}
body{
  background:var(--ink);
  color:var(--text);
  font-family:'DM Mono',monospace;
  display:flex;flex-direction:column;
  height:100vh;
}

/* ── TOPBAR ── */
.bar{
  height:44px;background:var(--panel);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;
  padding:0 18px;gap:20px;flex-shrink:0;
}
.logo{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:13px;letter-spacing:3px;color:var(--gold);white-space:nowrap;
}
.bar-mid{display:flex;align-items:center;gap:14px;flex:1;justify-content:center;}
#timecode{font-size:17px;color:var(--gold);letter-spacing:3px;min-width:60px;text-align:center;}
.vu{width:120px;height:4px;background:#111;border-radius:2px;overflow:hidden;}
#vubar{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--red));border-radius:2px;transition:width 60ms;}
#recdot{width:7px;height:7px;border-radius:50%;background:#333;transition:.3s;}
#recdot.on{background:var(--red);box-shadow:0 0 8px var(--red);animation:blk .6s infinite;}
@keyframes blk{0%,100%{opacity:1}50%{opacity:.2}}
#recstatus{font-size:9px;color:var(--dim);letter-spacing:2px;}

/* ── LAYOUT ── */
.app{display:grid;grid-template-columns:240px 1fr 256px;flex:1;min-height:0;}

/* ── PANELS ── */
.pnl{
  background:var(--panel);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;
  padding:14px 12px;overflow-y:auto;gap:0;
}
.pnl.right{border-right:none;border-left:1px solid var(--line);}
.pnl::-webkit-scrollbar{width:2px;}
.pnl::-webkit-scrollbar-thumb{background:var(--gold);}

.sec{font-size:8px;color:var(--dim);letter-spacing:3px;text-transform:uppercase;
  padding:10px 0 5px;border-bottom:1px solid var(--line);margin-bottom:8px;font-family:'Syne',sans-serif;}
.sec:first-child{padding-top:0;}

/* LOAD BUTTONS */
.load-btn{
  display:flex;align-items:center;gap:8px;
  background:var(--panel2);border:1px solid var(--line);
  color:var(--dim);padding:8px 10px;border-radius:3px;
  cursor:pointer;font-size:9px;font-family:'DM Mono',monospace;
  letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;
  transition:.15s;width:100%;
}
.load-btn:hover{border-color:var(--gold);color:var(--gold);}
.load-btn.loaded{border-color:var(--gold);color:var(--gold);background:rgba(200,169,110,.07);}
.load-btn .icon{font-size:14px;flex-shrink:0;}
.load-btn .info{font-size:8px;color:var(--dim);margin-top:1px;}

/* SLIDERS */
.ctrl{margin-bottom:11px;}
.ctrl>label{
  display:flex;justify-content:space-between;align-items:center;
  font-size:8px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;
  margin-bottom:5px;
}
.ctrl>label span{color:var(--gold);font-weight:500;}
input[type=range]{
  width:100%;-webkit-appearance:none;height:2px;
  background:#222;border-radius:1px;cursor:pointer;outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:13px;height:13px;border-radius:50%;
  background:var(--gold);cursor:pointer;border:2px solid var(--ink);transition:.1s;
}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.3);}

/* SELECT */
select{
  width:100%;background:var(--panel2);border:1px solid var(--line);
  color:var(--text);padding:7px 9px;font-size:9px;
  font-family:'DM Mono',monospace;border-radius:3px;outline:none;
  cursor:pointer;margin-bottom:8px;letter-spacing:1px;
}
select:focus{border-color:var(--gold);}

/* FILL CURVE PREVIEW */
.curve-wrap{
  display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:10px;
}
.curve-opt{
  background:var(--panel2);border:1px solid var(--line);
  border-radius:3px;padding:6px;cursor:pointer;transition:.15s;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.curve-opt:hover{border-color:var(--gold);}
.curve-opt.on{border-color:var(--gold);background:rgba(200,169,110,.08);}
.curve-opt canvas{display:block;}
.curve-opt span{font-size:7px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;}

/* IMAGE POSITION */
.pos-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}

/* START BUTTON */
.start-btn{
  width:100%;padding:15px;margin-top:8px;
  background:var(--gold);color:var(--ink);
  border:none;border-radius:4px;cursor:pointer;
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:13px;letter-spacing:3px;text-transform:uppercase;
  transition:.2s;
}
.start-btn:hover{background:var(--gold2);}
.start-btn.running{background:var(--red);color:#fff;animation:blk .6s infinite;}
.clear-btn{
  width:100%;padding:9px;margin-top:4px;
  background:transparent;border:1px solid var(--line);
  color:var(--dim);border-radius:3px;cursor:pointer;
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;
  text-transform:uppercase;transition:.15s;
}
.clear-btn:hover{border-color:var(--dim);color:var(--text);}

/* LOG */
.logbox{
  background:#080810;border:1px solid #111;border-radius:3px;
  padding:8px 10px;font-size:8px;color:#333;line-height:2;margin-top:8px;
}
.logbox b{color:var(--gold);}

/* ── CANVAS AREA ── */
.stage{
  position:relative;background:#000;
  overflow:hidden;flex:1;
  display:flex;justify-content:center;align-items:center;
}
#cvs{display:block;cursor:crosshair;}
/* 미리보기 오버레이 캔버스 */
#previewCvs{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
}
#freqCvs{
  position:absolute;bottom:0;left:0;width:100%;height:48px;
  pointer-events:none;opacity:.5;
}
.stage-info{
  position:absolute;top:10px;left:12px;
  font-size:8px;color:rgba(255,255,255,.15);
  letter-spacing:2px;pointer-events:none;
}
/* 비율 버튼 */
.ratio-btns{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:10px;}
.ratio-btn{
  background:var(--panel2);border:1px solid var(--line);
  color:var(--dim);padding:8px 4px;border-radius:3px;cursor:pointer;
  font-size:10px;font-family:'Syne',sans-serif;font-weight:600;
  letter-spacing:2px;text-align:center;transition:.15s;
}
.ratio-btn:hover{border-color:var(--gold);color:var(--gold);}
.ratio-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(200,169,110,.1);}
/* 미리보기 중 안내 뱃지 */
#previewBadge{
  position:absolute;bottom:58px;left:50%;transform:translateX(-50%);
  background:rgba(10,10,15,.75);border:1px solid rgba(200,169,110,.35);
  color:var(--gold);font-size:8px;letter-spacing:2px;padding:4px 14px;
  border-radius:20px;pointer-events:none;font-family:'DM Mono',monospace;
  white-space:nowrap;
}

/* ── MODAL ── */
#modal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.9);z-index:9999;
  justify-content:center;align-items:center;
}
#modal.show{display:flex;}
.mbox{
  background:var(--panel);border:1px solid var(--gold);
  border-radius:6px;padding:32px 40px;text-align:center;width:340px;
}
.mbox h2{font-family:'Syne',sans-serif;font-size:12px;letter-spacing:4px;color:var(--gold);margin-bottom:10px;}
.mbox p{font-size:9px;color:var(--dim);line-height:1.8;}
.pw{width:100%;height:3px;background:#111;border-radius:2px;margin-top:14px;overflow:hidden;}
.pb{height:100%;width:0%;background:var(--gold);transition:width .3s;}
#mlog{font-size:8px;color:var(--dim);margin-top:8px;}
</style>
</head>
<body>

<div class="bar">
  <div class="logo">BRUSH PAINTER</div>
  <div class="bar-mid">
    <div id="recdot"></div>
    <div id="timecode">00:00</div>
    <div class="vu"><div id="vubar"></div></div>
    <div id="trackLabel" style="font-size:9px;color:var(--dim);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">NO TRACK</div>
  </div>
  <div id="recstatus">◉ READY</div>
</div>

<div class="app">

  <div class="pnl">

    <div class="sec">Assets</div>

    <label class="load-btn" id="mp3Btn">
      <span class="icon">♪</span>
      <div><div>LOAD MP3 / WAV</div><div class="info" id="mp3Info">파일 없음</div></div>
      <input type="file" id="mp3In" accept="audio/*" style="display:none">
    </label>

    <label class="load-btn" id="imgBtn">
      <span class="icon">◈</span>
      <div><div>LOAD IMAGE (COLOR)</div><div class="info" id="imgInfo">파일 없음</div></div>
      <input type="file" id="imgIn" accept="image/*" style="display:none">
    </label>

    <label class="load-btn" id="brushBtn">
      <span class="icon">◉</span>
      <div><div>LOAD BRUSH PNG</div><div class="info" id="brushInfo">파일 없음 (기본 브러쉬 사용)</div></div>
      <input type="file" id="brushIn" accept="image/png" style="display:none">
    </label>

    <div class="sec">Brush Style</div>
    <select id="brushStyle">
      <option value="point">● 점 (Point)</option>
      <option value="air">◎ 에어브러쉬 (Airbrush)</option>
      <option value="mosaic">▦ 모자이크 (Mosaic)</option>
      <option value="scatter">✦ 스캐터 (Scatter)</option>
    </select>

    <div class="ctrl">
      <label>BRUSH SIZE <span id="bsizeV">40</span>px</label>
      <input type="range" id="bsize" min="4" max="200" value="40"
             oninput="g('bsizeV').textContent=this.value">
    </div>

    <div class="ctrl">
      <label>OPACITY <span id="bopV">80</span>%</label>
      <input type="range" id="bop" min="5" max="100" value="80"
             oninput="g('bopV').textContent=this.value">
    </div>

    <div class="ctrl">
      <label>SCATTER SPREAD <span id="spreadV">1.0</span></label>
      <input type="range" id="spread" min="0.1" max="5" step="0.1" value="1"
             oninput="g('spreadV').textContent=parseFloat(this.value).toFixed(1)">
    </div>

    <div class="sec">Debug</div>
    <div class="logbox">
      <div>MP3: <b id="logMp3">—</b></div>
      <div>IMG: <b id="logImg">—</b></div>
      <div>BRUSH: <b id="logBrush">default</b></div>
      <div>AMP: <b id="logAmp">0.000</b></div>
      <div>FILL: <b id="logFill">0.000</b></div>
    </div>

  </div>

  <div class="stage">
    <canvas id="cvs"></canvas>
    <canvas id="previewCvs"></canvas>
    <canvas id="freqCvs"></canvas>
    <div class="stage-info" id="stageInfo">BRUSH PAINTER</div>
    <div id="previewBadge">◈ PREVIEW MODE — 이미지 위치/크기 조정 중</div>
  </div>

  <div class="pnl right">

    <div class="sec">Fill Curve (0→1)</div>
    <div class="curve-wrap" id="curveWrap">
      </div>

    <div class="ctrl">
      <label>DENSITY <span id="densV">60</span></label>
      <input type="range" id="dens" min="1" max="300" value="60"
             oninput="g('densV').textContent=this.value">
    </div>
    <div class="ctrl">
      <label>SENSITIVITY <span id="sensV">7</span></label>
      <input type="range" id="sens" min="1" max="10" value="7"
             oninput="g('sensV').textContent=this.value">
    </div>

    <div class="sec">Image Position</div>
    <div class="ctrl">
      <label>SCALE <span id="imgScaleV">1.00</span></label>
      <input type="range" id="imgScale" min="0.1" max="3" step="0.01" value="1"
             oninput="g('imgScaleV').textContent=parseFloat(this.value).toFixed(2);drawPreview()">
    </div>
    <div class="pos-grid">
      <div class="ctrl">
        <label>OFFSET X <span id="imgXV">0</span></label>
        <input type="range" id="imgX" min="-500" max="500" value="0"
               oninput="g('imgXV').textContent=this.value;drawPreview()">
      </div>
      <div class="ctrl">
        <label>OFFSET Y <span id="imgYV">0</span></label>
        <input type="range" id="imgY" min="-500" max="500" value="0"
               oninput="g('imgYV').textContent=this.value;drawPreview()">
      </div>
    </div>
    <div class="ctrl">
      <label>BG OPACITY (PLAY) <span id="bgOpV">0.08</span></label>
      <input type="range" id="bgOp" min="0" max="0.3" step="0.005" value="0.08"
             oninput="g('bgOpV').textContent=parseFloat(this.value).toFixed(3)">
    </div>

    <div class="sec">Canvas Ratio</div>
    <div class="ratio-btns">
      <div class="ratio-btn on" id="r169" onclick="setRatio('16:9')">16 : 9</div>
      <div class="ratio-btn"    id="r916" onclick="setRatio('9:16')">9 : 16</div>
    </div>

    <div class="sec">Trail</div>
    <div class="ctrl">
      <label>TRAIL FADE <span id="fadeV">0.00</span></label>
      <input type="range" id="fade" min="0" max="0.25" step="0.002" value="0"
             oninput="g('fadeV').textContent=parseFloat(this.value).toFixed(3)">
    </div>

    <button class="start-btn" id="startBtn" onclick="togglePlay()">▶ START</button>
    <button class="clear-btn" onclick="clearCvs()">⌫ CLEAR CANVAS</button>
    <button class="clear-btn" style="margin-top:3px;" onclick="savePng()">⤓ SAVE PNG</button>

  </div>
</div>

<div id="modal">
  <div class="mbox">
    <h2>⚙ MP4 변환 중</h2>
    <p>FFmpeg H.264 인코딩 중입니다.<br>길이에 따라 수 분이 걸릴 수 있습니다.</p>
    <div class="pw"><div class="pb" id="pb"></div></div>
    <div id="mlog">초기화 중...</div>
  </div>
</div>

<script>
const g = id => document.getElementById(id);
const gv = id => parseFloat(g(id).value);

let audioCtx, analyser, source, audioBuffer;
let isPlaying = false, startTime = 0, pauseOffset = 0, lastPaintTime = 0;
let animId = null, strokeCount = 0;
let mediaRecorder, recordedChunks = [];
let ffmpegLoaded = false, ffmpegInst = null;

let sourceImg = null, brushImg = null, srcImgData = null;
let srcW = 1, srcH = 1;
let curveMode = 'log-up';

const cvs = g('cvs'), ctx = cvs.getContext('2d');
const freqC = g('freqCvs'), freqX = freqC.getContext('2d');
const prevCvs = g('previewCvs'), prevCtx = prevCvs.getContext('2d');
const offCvs = document.createElement('canvas'), offCtx = offCvs.getContext('2d');

let aspectRatio = '16:9';

function setRatio(r){
  aspectRatio=r;
  g('r169').classList.toggle('on', r==='16:9');
  g('r916').classList.toggle('on', r==='9:16');
  resize();
}

function resize(){
  const p = cvs.parentElement;
  const pw = p.clientWidth - 2, ph = p.clientHeight - 2;
  const targetRatio = aspectRatio === '16:9' ? 16/9 : 9/16;
  if(pw/ph > targetRatio){
    cvs.height = ph; cvs.width = Math.floor(ph * targetRatio);
  } else {
    cvs.width = pw; cvs.height = Math.floor(pw / targetRatio);
  }
  prevCvs.width = cvs.width; prevCvs.height = cvs.height;
  freqC.width = p.clientWidth; freqC.height = 48;
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,cvs.width,cvs.height);
  drawPreview();
}
window.addEventListener('resize', resize);

const CURVES = [
  { id:'log-up',   label:'LOG ↑',   fn: x => Math.pow(x, 0.35) },
  { id:'log-down', label:'LOG ↓',   fn: x => 1 - Math.pow(1-x, 0.35) },
  { id:'u',         label:'U 자',    fn: x => Math.pow(2*Math.abs(x-0.5), 1.4) },
  { id:'inv-u',    label:'∩ 역U',   fn: x => 1 - Math.pow(2*Math.abs(x-0.5), 1.4) },
];

function buildCurveUI(){
  const wrap = g('curveWrap');
  wrap.innerHTML='';
  CURVES.forEach(cv=>{
    const div=document.createElement('div');
    div.className='curve-opt'+(cv.id===curveMode?' on':'');
    const cc=document.createElement('canvas');
    cc.width=88; cc.height=44;
    const c2=cc.getContext('2d');
    c2.strokeStyle = cv.id===curveMode ? '#c8a96e' : '#333';
    c2.beginPath();
    for(let i=0;i<=88;i++){
      const x=i/88, y=cv.fn(x);
      i===0?c2.moveTo(i,44-y*44):c2.lineTo(i,44-y*44);
    }
    c2.stroke();
    const sp=document.createElement('span'); sp.textContent=cv.label;
    div.appendChild(cc); div.appendChild(sp);
    div.onclick=()=>{ curveMode=cv.id; buildCurveUI(); };
    wrap.appendChild(div);
  });
}

function applyFillCurve(amp){
  const curve = CURVES.find(c=>c.id===curveMode);
  return curve ? Math.max(0,Math.min(1,curve.fn(amp))) : amp;
}

g('mp3In').addEventListener('change', e=>handleMusic(e.target.files));
g('imgIn').addEventListener('change', e=>handleImage(e.target.files));
g('brushIn').addEventListener('change', e=>handleBrush(e.target.files));

function handleMusic(files){
  const f=files[0]; if(!f)return;
  g('trackLabel').textContent=f.name; g('mp3Info').textContent=f.name;
  g('mp3Btn').classList.add('loaded'); g('logMp3').textContent=f.name;
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const r=new FileReader();
  r.onload=e=>audioCtx.decodeAudioData(e.target.result,buf=>{ audioBuffer=buf; });
  r.readAsArrayBuffer(f);
}

function handleImage(files){
  const f=files[0]; if(!f)return;
  const url=URL.createObjectURL(f);
  sourceImg=new Image();
  sourceImg.onload=()=>{
    srcW=sourceImg.width; srcH=sourceImg.height;
    offCvs.width=srcW; offCtx.drawImage(sourceImg,0,0);
    srcImgData=offCtx.getImageData(0,0,srcW,srcH).data;
    g('imgInfo').textContent=`${f.name} (${srcW}×${srcH})`;
    g('imgBtn').classList.add('loaded'); drawPreview();
  };
  sourceImg.src=url;
}

function handleBrush(files){
  const f=files[0]; if(!f)return;
  brushImg=new Image();
  brushImg.onload=()=>{
    g('brushInfo').textContent=f.name; g('brushBtn').classList.add('loaded');
  };
  brushImg.src=URL.createObjectURL(f);
}

function getImgDrawParams(){
  if(!sourceImg) return null;
  const scale = gv('imgScale'), ox = parseInt(g('imgX').value), oy = parseInt(g('imgY').value);
  const iw = sourceImg.width * scale, ih = sourceImg.height * scale;
  const dx = cvs.width/2 - iw/2 + ox, dy = cvs.height/2 - ih/2 + oy;
  return {iw, ih, dx, dy};
}

function drawPreview(){
  prevCtx.clearRect(0,0,prevCvs.width,prevCvs.height);
  if(!sourceImg || isPlaying) return;
  const p = getImgDrawParams();
  prevCtx.save();
  prevCtx.globalAlpha = 0.5;
  prevCtx.drawImage(sourceImg, p.dx, p.dy, p.iw, p.ih);
  prevCtx.strokeStyle = '#c8a96e'; prevCtx.setLineDash([5,5]);
  prevCtx.strokeRect(p.dx, p.dy, p.iw, p.ih);
  prevCtx.restore();
}

function drawPlayPreview() {
  prevCtx.clearRect(0,0,prevCvs.width,prevCvs.height);
  const op = gv('bgOp');
  if(op <= 0 || !sourceImg) return;
  const p = getImgDrawParams();
  prevCtx.save();
  prevCtx.globalAlpha = op;
  prevCtx.drawImage(sourceImg, p.dx, p.dy, p.iw, p.ih);
  prevCtx.restore();
}

function getColor(x,y){
  if(!srcImgData) return {r:200,g:180,b:140};
  const p = getImgDrawParams();
  const scale = gv('imgScale');
  const sx = Math.floor((x - p.dx) / scale), sy = Math.floor((y - p.dy) / scale);
  if(sx<0||sy<0||sx>=srcW||sy>=srcH) return {r:10,g:10,b:10};
  const idx=(sy*srcW+sx)*4;
  return {r:srcImgData[idx],g:srcImgData[idx+1],b:srcImgData[idx+2]};
}

function paintAt(x, y, amp, fill){
  const size = gv('bsize'), op = gv('bop')/100, style = g('brushStyle').value;
  const {r,g:g2,b} = getColor(x,y);
  ctx.save();
  ctx.globalAlpha = op * fill;
  if(brushImg && style !== 'mosaic'){
    const sw=size*(0.5+amp*1.5);
    if(style==='scatter'){
        const spread=gv('spread'); const cnt=Math.ceil(fill*8)+1;
        for(let i=0;i<cnt;i++){
            const sx=x+(Math.random()-.5)*size*spread*2, sy=y+(Math.random()-.5)*size*spread*2;
            ctx.drawImage(brushImg, sx-sw/2, sy-sw/2, sw, sw);
        }
    } else { ctx.drawImage(brushImg, x-sw/2, y-sw/2, sw, sw); }
  } else {
    const sw=size*(0.4+amp*1.2); ctx.fillStyle=`rgb(${r},${g2},${b})`;
    if(style==='point'){ ctx.beginPath();ctx.arc(x,y,sw/2,0,Math.PI*2);ctx.fill(); }
    else if(style==='air'){
        const grd=ctx.createRadialGradient(x,y,0,x,y,sw);
        grd.addColorStop(0,`rgba(${r},${g2},${b},1)`); grd.addColorStop(1,`rgba(${r},${g2},${b},0)`);
        ctx.fillStyle=grd; ctx.beginPath();ctx.arc(x,y,sw,0,Math.PI*2);ctx.fill();
    }
    else if(style==='mosaic'){ const cell=Math.max(4,sw*0.7); ctx.fillRect(Math.floor(x/cell)*cell,Math.floor(y/cell)*cell,cell,cell); }
    else if(style==='scatter'){
        const spread=gv('spread'); const cnt=Math.ceil(fill*10)+2;
        for(let i=0;i<cnt;i++){
            const sx=x+(Math.random()-.5)*sw*spread*2, sy=y+(Math.random()-.5)*sw*spread*2;
            ctx.beginPath();ctx.arc(sx,sy,sw*0.3,0,Math.PI*2);ctx.fill();
        }
    }
  }
  ctx.restore(); strokeCount++;
}

function animate(){
  if(!isPlaying) return;
  animId=requestAnimationFrame(animate);
  const nowTime=audioCtx.currentTime-startTime;
  g('timecode').textContent=`${String(Math.floor(nowTime/60)).padStart(2,'0')}:${String(Math.floor(nowTime%60)).padStart(2,'0')}`;
  const fd=new Uint8Array(analyser.frequencyBinCount); analyser.getByteFrequencyData(fd);
  const amp=fd.reduce((a,b)=>a+b,0)/fd.length/255; g('vubar').style.width=(amp*100)+'%';
  const fade=gv('fade');
  if(fade>0){ ctx.globalAlpha=fade; ctx.fillStyle='#000'; ctx.fillRect(0,0,cvs.width,cvs.height); ctx.globalAlpha=1; }
  drawPlayPreview();
  const sens = 1.1-(gv('sens')/10);
  if(amp<sens) return;
  const fill=applyFillCurve(amp);
  if(Date.now()-lastPaintTime > 1000/gv('dens')){
    let x, y; const p = getImgDrawParams();
    if(p){ x=p.dx+Math.random()*p.iw; y=p.dy+Math.random()*p.ih; }
    else { x=Math.random()*cvs.width; y=Math.random()*cvs.height; }
    paintAt(x,y,amp,fill); lastPaintTime=Date.now();
  }
}

async function togglePlay(){
  if(!audioBuffer){ alert('MP3/WAV 파일을 로드하세요!'); return; }
  if(!audioCtx) audioCtx=new AudioContext();
  if(isPlaying){
    isPlaying=false; source.stop(); g('startBtn').textContent='▶ START';
    g('recdot').classList.remove('on'); drawPreview();
    if(mediaRecorder && mediaRecorder.state==='recording') mediaRecorder.stop();
  } else {
    prevCtx.clearRect(0,0,prevCvs.width,prevCvs.height);
    source=audioCtx.createBufferSource(); source.buffer=audioBuffer;
    analyser=audioCtx.createAnalyser(); source.connect(analyser); analyser.connect(audioCtx.destination);
    source.start(0,pauseOffset); startTime=audioCtx.currentTime-pauseOffset;
    isPlaying=true; animate(); startRecording();
    g('startBtn').textContent='■ STOP & SAVE'; g('recdot').classList.add('on');
    source.onended=()=>{ if(isPlaying) togglePlay(); };
  }
}

function startRecording(){
  recordedChunks=[]; const cs=cvs.captureStream(30);
  mediaRecorder=new MediaRecorder(cs,{mimeType:'video/webm',videoBitsPerSecond:5000000});
  mediaRecorder.ondataavailable=e=>recordedChunks.push(e.data);
  mediaRecorder.onstop=()=>saveWebM(); mediaRecorder.start();
}

function saveWebM(){
  const blob=new Blob(recordedChunks,{type:'video/webm'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`paint_${Date.now()}.webm`; a.click();
}

function clearCvs(){ ctx.fillStyle='#000'; ctx.fillRect(0,0,cvs.width,cvs.height); strokeCount=0; }
function savePng(){ const a=document.createElement('a'); a.download=`paint.png`; a.href=cvs.toDataURL(); a.click(); }

resize(); buildCurveUI();
</script>
</body>
