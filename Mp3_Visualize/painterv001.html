<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AUDIO-WAVE STUDIO v2.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
    * { box-sizing: border-box; }
    body { background: #050508; color: #fff; font-family: -apple-system, sans-serif; display: flex; height: 100vh; margin: 0; overflow: hidden; }
    .sidebar { width: 340px; background: #0f0f14; padding: 20px; display: flex; flex-direction: column; gap: 12px; border-right: 1px solid #222; overflow-y: auto; }
    .main { flex: 1; display: flex; flex-direction: column; position: relative; }
    .canvas-zone { flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; background: #020205; }
    
    h2 { font-size: 14px; color: #00ffcc; letter-spacing: 1px; border-bottom: 1px solid #333; padding-bottom: 8px; margin: 0; }
    .control-group { display: flex; flex-direction: column; gap: 5px; font-size: 11px; color: #ccc; }
    .control-group label { display: flex; justify-content: space-between; align-items: center; }
    .file-btn { border: 1px dashed #444; padding: 8px; cursor: pointer; color: #aaa; text-align: center; background: #111; border-radius: 4px; }
    
    input[type=range] { width: 55%; accent-color: #00ffcc; }
    input[type=number], select { background: #000; border: 1px solid #333; color: #00ffcc; padding: 4px; font-weight: bold; width: 60px; text-align: right; }
    
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
    .studio-btn { border: 1px solid #444; color: white; padding: 8px; background: none; cursor: pointer; font-size: 11px; border-radius: 4px; transition: 0.2s; }
    .studio-btn.active { border-color: #00ffcc; color: #00ffcc; background: rgba(0,255,204,0.1); }
    
    .player-bar { height: 60px; background: #0f0f14; border-top: 1px solid #222; display: flex; align-items: center; padding: 0 20px; gap: 15px; }
    #loader { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; color: #00ffcc; font-family: monospace; font-size: 16px; }
</style>
</head>
<body>
<div class="sidebar">
    <h2>Studio Settings</h2>
    
    <div class="control-group">
        <span style="color:#fff; font-weight:bold;">1. 🖼️ 그림 이미지 파일</span>
        <input type="file" id="imgIn" accept="image/*" onchange="loadTarget(this.files)" class="file-btn">
    </div>
    
    <div class="control-group">
        <span style="color:#fff; font-weight:bold;">2. 🎵 음악 오디오 파일</span>
        <input type="file" id="audioIn" accept="audio/*" onchange="loadAudio(this.files)" class="file-btn">
    </div>

    <div class="control-group" style="border:1px solid #222; padding:10px; border-radius:4px; gap:8px;">
        <span style="color:#00ffcc;">3. 세부 설정 옵션</span>
        <label>비율: <select id="ratioOpt" onchange="updateSettings()"><option value="1.777">16:9</option><option value="0.562">9:16</option></select></label>
        <label>크기: <input type="range" id="scaleOpt" min="0.5" max="2.0" step="0.1" value="1.0" oninput="updateSettings()"></label>
        <label>위치 X: <input type="range" id="posXOpt" min="-400" max="400" value="0" step="10" oninput="updateSettings()"></label>
        <label>위치 Y: <input type="range" id="posYOpt" min="-400" max="400" value="0" step="10" oninput="updateSettings()"></label>
        <label>밝기: <input type="range" id="lightOpt" min="50" max="150" value="100" oninput="updateSettings()"></label>
        <label>총 그리는 시간(초): <input type="number" id="timeOpt" value="30" onchange="updateSettings()"></label>
    </div>

    <div class="control-group">
        <span style="color:#fff; font-weight:bold;">4. 브러쉬 화풍 (채색 단계용)</span>
        <div class="btn-grid">
            <button class="studio-btn active" id="sPencil" onclick="changeStyle('pencil')">연필</button>
            <button class="studio-btn" id="sOil" onclick="changeStyle('oil')">유화</button>
            <button class="studio-btn" id="sImp" onclick="changeStyle('impressionism')">인상파</button>
        </div>
    </div>
    
    <button id="recBtn" onclick="togglePlayback()" style="margin-top:auto; padding:15px; background:#ff3e81; color:white; border:none; font-weight:bold; cursor:pointer; border-radius:4px;" disabled>🔴 START DRAWING</button>
</div>

<div class="main">
    <div id="loader">ANALYZING FAST...</div>
    <div class="canvas-zone" id="canvasContainer"></div>
    <div class="player-bar">
        <span id="timeCurrent" style="font-family:monospace; color:#888;">00:00</span>
        <input type="range" id="timeline" style="flex:1; accent-color:#ff3e81;" value="0" min="0" max="100" step="0.1" oninput="seekTime(this.value)">
        <span id="timeTotal" style="font-family:monospace; color:#888;">00:00</span>
    </div>
</div>

<script>
let targetImg, loadedAudio, fft, isPlaying = false;
let paintBuffer;
let strokeSequence = [];
let lastDrawnIdx = 0;
let currentStyle = 'pencil';
let settings = { ratio: 1.777, scale: 1.0, x: 0, y: 0, light: 100, time: 30 };

function setup() {
    let cnv = createCanvas(1120, 630);
    cnv.parent('canvasContainer');
    paintBuffer = createGraphics(1120, 630);
    paintBuffer.background('#f4f3ec');
    fft = new p5.FFT();
}

function updateSettings() {
    settings.ratio = parseFloat(document.getElementById('ratioOpt').value);
    settings.scale = parseFloat(document.getElementById('scaleOpt').value);
    settings.x = parseInt(document.getElementById('posXOpt').value);
    settings.y = parseInt(document.getElementById('posYOpt').value);
    settings.light = parseInt(document.getElementById('lightOpt').value);
    settings.time = parseInt(document.getElementById('timeOpt').value);
    
    document.getElementById('timeTotal').innerText = formatTime(settings.time);
    
    let w = settings.ratio > 1 ? 1120 : 630;
    let h = settings.ratio > 1 ? 630 : 1120;
    resizeCanvas(w, h);
    paintBuffer = createGraphics(w, h);
    paintBuffer.background('#f4f3ec');
    
    if(targetImg) fastBakePaths();
}

function loadTarget(files) { loadImage(URL.createObjectURL(files[0]), img => { targetImg = img; updateSettings(); }); }
function loadAudio(files) { loadedAudio = loadSound(URL.createObjectURL(files[0]), () => { document.getElementById('timeTotal').innerText = formatTime(settings.time); checkReady(); }); }
function changeStyle(s) { currentStyle = s; document.querySelectorAll('.studio-btn').forEach(b => b.classList.remove('active')); document.getElementById('s'+s.charAt(0).toUpperCase()+s.slice(1)).classList.add('active'); if(targetImg) { paintBuffer.background('#f4f3ec'); lastDrawnIdx=0; drawFrame(loadedAudio ? loadedAudio.currentTime() : 0); } }
function checkReady() { if(targetImg && loadedAudio) document.getElementById('recBtn').disabled = false; }

// [핵심] 렉을 없앤 고속 정렬(O(N log N)) 드로잉 알고리즘
async function fastBakePaths() {
    document.getElementById('loader').style.display = 'flex';
    await new Promise(r => setTimeout(r, 50)); // UI 업데이트 양보

    paintBuffer.background('#f4f3ec');
    lastDrawnIdx = 0;
    strokeSequence = [];
    
    targetImg.loadPixels();
    let d = targetImg.pixels;
    let rScale = Math.max(width / targetImg.width, height / targetImg.height) * settings.scale;
    
    let edges = [];
    let flats = [];

    // 1. 픽셀 스캔 및 경계선 강도 계산 (고속화)
    for(let i=0; i<60000; i++) {
        let cx = random(width), cy = random(height);
        let ix = Math.floor((cx - width/2 - settings.x) / rScale + targetImg.width/2);
        let iy = Math.floor((cy - height/2 - settings.y) / rScale + targetImg.height/2);

        if (ix >= 0 && ix < targetImg.width-1 && iy >= 0 && iy < targetImg.height-1) {
            let pIdx = (iy * targetImg.width + ix) * 4;
            if (d[pIdx+3] > 10) {
                let nextIdx = (iy * targetImg.width + (ix+1)) * 4;
                let edgeScore = abs(d[pIdx]-d[nextIdx]) + abs(d[pIdx+1]-d[nextIdx+1]); // 엣지 강도
                
                let node = { x: cx, y: cy, r: d[pIdx], g: d[pIdx+1], b: d[pIdx+2], edge: edgeScore };
                if (edgeScore > 20) edges.push(node);
                else flats.push(node);
            }
        }
    }

    // 2. [요구사항 4] 연필 스케치는 '경계면'만 공간 흐름에 따라 그리기
    // 위에서 아래로 스윽 긋는 느낌을 위해 공간(y축 위주)으로 정렬
    edges.sort((a, b) => (a.y * 2 + a.x) - (b.y * 2 + b.x));
    
    edges.forEach((s, k) => {
        s.stage = 'sketch'; 
        s.targetProg = map(k, 0, edges.length, 0.0, 0.35); // 0~35% 타임라인 배정
        strokeSequence.push(s);
    });

    // 3. [요구사항 5,7] 채색은 '경계면'에서 시작해 '먼 쪽'으로 번져나가며 칠하기
    // 그리드 청크로 구역을 나눈 뒤, 각 구역 안에서 경계선과 가까운 곳(Edge가 높은 곳)부터 먼저 그리도록 정렬
    flats.sort((a, b) => {
        let chunkA = Math.floor(a.y/50)*100 + Math.floor(a.x/50);
        let chunkB = Math.floor(b.y/50)*100 + Math.floor(b.x/50);
        if (chunkA !== chunkB) return chunkA - chunkB; // 공간을 순차적으로 이동 (한 손 이동 시뮬레이션)
        return b.edge - a.edge; // 구역 내에서는 경계면(Edge)부터 우선 채색
    });

    flats.forEach((s, k) => {
        s.stage = 'color';
        s.targetProg = map(k, 0, flats.length, 0.35, 0.80); // 35~80% 채색 배정
        strokeSequence.push(s);
    });

    document.getElementById('loader').style.display = 'none';
    checkReady();
    
    if(!isPlaying) {
        document.getElementById('timeline').value = 80;
        seekTime(80);
    }
}

// 화가의 실제 스트로크를 묘사하는 렌더러
function drawStroke(g, prev, curr, waveOff) {
    let dSq = dist(prev.x, prev.y, curr.x, curr.y);
    let x2 = curr.x + waveOff, y2 = curr.y + waveOff;

    if (curr.stage === 'sketch') {
        // 거리가 멀면 펜을 뗀 것(이동), 가까우면 선을 이어 그음
        g.stroke(0, 150); g.strokeWeight(1);
        if (dSq < 50) g.line(prev.x, prev.y, x2, y2);
        else g.point(x2, y2);
    } 
    else {
        // 채색 단계: 선택된 브러시 스타일에 따라 경계에서 먼 곳으로 밀어치기
        if (currentStyle === 'oil') {
            g.stroke(curr.r, curr.g, curr.b, 220); g.strokeWeight(10 * settings.scale);
            if (dSq < 60) g.line(prev.x, prev.y, x2, y2);
            else g.ellipse(x2, y2, 8 * settings.scale);
        } else if (currentStyle === 'impressionism') {
            g.noStroke(); g.fill(curr.r, curr.g, curr.b, 200);
            g.ellipse(x2, y2, 8 * settings.scale);
        } else { // basic pencil color
            g.stroke(curr.r, curr.g, curr.b, 150); g.strokeWeight(2);
            if (dSq < 50) g.line(prev.x, prev.y, x2, y2);
            else g.point(x2, y2);
        }
    }
}

function drawFrame(ct) {
    if(strokeSequence.length < 2) return;
    
    let prog = Math.min(1.0, ct / settings.time);
    let targetIdx = Math.floor((strokeSequence.length - 1) * prog);

    if (targetIdx < lastDrawnIdx) {
        paintBuffer.background('#f4f3ec');
        lastDrawnIdx = 0;
    }

    let wave = [];
    if(isPlaying && fft) { fft.analyze(); wave = fft.waveform(); }

    // 이전 위치에서 현재 위치로 브러시를 이어 긋기
    for(let i = max(1, lastDrawnIdx); i <= targetIdx; i++) {
        let prev = strokeSequence[i-1];
        let curr = strokeSequence[i];
        let waveOff = (isPlaying && wave.length > 0) ? wave[i % 1024] * 12 : 0;
        
        drawStroke(paintBuffer, prev, curr, waveOff);
    }
    lastDrawnIdx = targetIdx;

    // 밝기 처리 및 출력
    background(244 * (settings.light/100), 243 * (settings.light/100), 236 * (settings.light/100));
    push();
    if(settings.light !== 100) tint(255, 255, 255, 255 * (settings.light/100));
    image(paintBuffer, 0, 0);
    pop();

    // [요구사항 6] 전체 80% 이후 원본의 완성도를 페이드인하여 100% 디테일 마감
    if(prog > 0.8) {
        let detailAlpha = map(prog, 0.8, 1.0, 0, 255);
        push();
        imageMode(CENTER);
        tint(255, detailAlpha);
        let rScale = Math.max(width / targetImg.width, height / targetImg.height) * settings.scale;
        image(targetImg, width/2 + settings.x, height/2 + settings.y, targetImg.width*rScale, targetImg.height*rScale);
        pop();
    }
}

function draw() {
    if(!isPlaying || !loadedAudio) return;
    let ct = loadedAudio.currentTime();
    if(ct >= settings.time) { togglePlayback(); seekTime(100); return; }
    
    document.getElementById('timeCurrent').innerText = formatTime(ct);
    document.getElementById('timeline').value = (ct / settings.time) * 100;
    drawFrame(ct);
}

function togglePlayback() {
    if(!loadedAudio) return;
    isPlaying = !isPlaying;
    let btn = document.getElementById('recBtn');
    if(isPlaying) {
        loadedAudio.rate(1.0); // 정속 재생 고정
        loadedAudio.play();
        btn.innerText = "⏹ STOP & SAVE";
        btn.style.background = "#00ffcc"; btn.style.color = "#000";
        
        // 레코딩 시작
        recordedChunks = [];
        let stream = document.querySelector('#canvasContainer canvas').captureStream(30);
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            let a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/webm' }));
            a.download = `MasterPiece_${Date.now()}.webm`;
            a.click();
        };
        mediaRecorder.start();
    } else {
        loadedAudio.stop();
        btn.innerText = "🔴 START DRAWING";
        btn.style.background = "#ff3e81"; btn.style.color = "#fff";
        if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    }
}

function seekTime(v) {
    if(!loadedAudio) return;
    let targetSec = (parseFloat(v) / 100) * settings.time;
    if(isPlaying) loadedAudio.jump(targetSec);
    else { document.getElementById('timeCurrent').innerText = formatTime(targetSec); drawFrame(targetSec); }
}

function formatTime(s) { return nf(floor(s/60), 2) + ":" + nf(floor(s%60), 2); }
</script>
</body>
</html>
