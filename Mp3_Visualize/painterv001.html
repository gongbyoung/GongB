<!DOCTYPE html>
<html lang="ko">

<style>
/* 디자인 스타일 유지 */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #0a0a0f; --panel: #12121a; --accent: #00ffcc; --text: #ffffff; --border: rgba(255,255,255,0.08); }
body { background: var(--bg); color: var(--text); font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; }
.control-sidebar { width: 380px; background: var(--panel); border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; gap: 20px; }
.main-viewport { flex: 1; display: flex; flex-direction: column; background: #020205; position: relative; }
.canvas-zone { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
.studio-btn { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 10px; font-size: 11px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
.studio-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.05); }
.file-btn { width: 100%; background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.15); color: #ccc; padding: 12px; font-size: 11px; text-align: center; border-radius: 6px; cursor: pointer; display: block; }
.file-btn.loaded { border-color: var(--accent); color: var(--accent); }
#bakeOverlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; color: var(--accent); }
</style>
</head>

    </div>

    </div>
    <div class="control-group">

        <div class="btn-grid-three">
            <button class="studio-btn" id="sPencil" onclick="changeStyle('pencil')">연필</button>

            <button class="studio-btn" id="sImp" onclick="changeStyle('impressionism')">인상파</button>
            <button class="studio-btn" id="sSur" onclick="changeStyle('surrealism')">초현실</button>
        </div>
    </div>
    <button id="recBtn" onclick="togglePlayback()" disabled>🔴 START DRAWING</button>
</div>

<div class="main-viewport">
    <div id="bakeOverlay"><div class="spinner"></div><div id="bakeText">ANALYZING PATH...</div></div>
    <div class="canvas-zone" id="canvasContainer"></div>
</div>

<script>
let targetImg, loadedAudio, fft;
let isPlaying = false, isBaking = false;
let currentStyle = 'pencil', paintingDuration = 30;
let strokeSequence = []; 

// 근접 경로 탐색(Nearest Neighbor)을 통한 선 드로잉 엔진
async function bakePaintingStrokes() {
    if(isBaking || !targetImg) return;
    isBaking = true;
    document.getElementById('bakeOverlay').style.display = 'flex';
    
    let tempNodes = [];
    targetImg.loadPixels();
    let d = targetImg.pixels;
    let rScale = Math.max(width / targetImg.width, height / targetImg.height);

    // 구도 우선순위 샘플링 (경계면 + 평면)
    for(let i=0; i<8000; i++) {
        let rx = random(width), ry = random(height);
        let ix = Math.floor((rx - width/2)/rScale + targetImg.width/2);
        let iy = Math.floor((ry - height/2)/rScale + targetImg.height/2);
        
        if(ix>=0 && ix<targetImg.width && iy>=0 && iy<targetImg.height) {
            let pIdx = (iy * targetImg.width + ix) * 4;
            if(d[pIdx+3] > 10) {
                tempNodes.push({ x: rx, y: ry, r: d[pIdx], g: d[pIdx+1], b: d[pIdx+2], edge: checkEdge(d, ix, iy, targetImg.width) });
            }
        }
    }

    // [핵심] 1. 경계선 우선 연필 드로잉 (EdgeScore 높은 순)
    let sorted = tempNodes.sort((a,b) => b.edge - a.edge);
    let sketchPath = sorted.filter(n => n.edge > 30);
    let colorPath = sorted.filter(n => n.edge <= 30);

    strokeSequence = [];
    
    // 경로 연결 알고리즘: 현재 지점에서 가장 가까운 픽셀로 연결
    function connectPath(nodes) {
        let path = [];
        let curr = nodes.shift();
        while(curr) {
            path.push(curr);
            let nearestIdx = 0;
            let minDist = 9999;
            for(let i=0; i<Math.min(nodes.length, 50); i++) {
                let d = dist(curr.x, curr.y, nodes[i].x, nodes[i].y);
                if(d < minDist) { minDist = d; nearestIdx = i; }
            }
            curr = nodes.splice(nearestIdx, 1)[0];
        }
        return path;
    }

    let finalSketch = connectPath(sketchPath);
    let finalColor = connectPath(colorPath);

    finalSketch.forEach((s, k) => {
        s.targetProg = map(k, 0, finalSketch.length, 0.0, 0.3);
        s.type = 'pencil';
        strokeSequence.push(s);
    });
    
    finalColor.forEach((s, k) => {
        s.targetProg = map(k, 0, finalColor.length, 0.3, 0.8);
        s.type = currentStyle;
        strokeSequence.push(s);
    });

    isBaking = false;
    document.getElementById('bakeOverlay').style.display = 'none';
}

function checkEdge(d, x, y, w) {
    let idx = (y * w + x) * 4;
    let nextIdx = (y * w + Math.min(x+1, w-1)) * 4;
    return Math.abs(d[idx]-d[nextIdx]) + Math.abs(d[idx+1]-d[nextIdx+1]);
}

</html>
