<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>v1.13</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
/* ... 기존 스타일 유지 ... */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #0a0a0f; --panel: #12121a; --accent: #00ffcc; --text: #ffffff; --border: rgba(255,255,255,0.08); }
body { background: var(--bg); color: var(--text); font-family: sans-serif; height: 100vh; display: flex; }
.control-sidebar { width: 380px; background: var(--panel); border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
.main-viewport { flex: 1; display: flex; flex-direction: column; background: #020205; position: relative; }
.canvas-zone { flex: 1; display: flex; justify-content: center; align-items: center; }
.studio-btn { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 10px; font-size: 11px; font-weight: bold; border-radius: 6px; cursor: pointer; }
.studio-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.05); }
#bakeOverlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; color: var(--accent); }
</style>
</head>
<body>
<div class="control-sidebar">
    <h2>Studio Settings</h2>
    <div class="control-group">
        <label>1. Target Image</label>
        <input type="file" id="imgIn" accept="image/*" onchange="loadTargetImage(this.files)">
    </div>
    <div class="control-group">
        <label>2. Audio File</label>
        <input type="file" id="audioIn" accept="audio/*" onchange="loadAudioFile(this.files)">
    </div>
    <div class="control-group">
        <label>5. Art Style</label>
        <div class="btn-grid-three">
            <button class="studio-btn" id="sPencil" onclick="changeStyle('pencil')">연필화</button>
            <button class="studio-btn" id="sOil" onclick="changeStyle('oil')">유화</button>
            <button class="studio-btn" id="sImp" onclick="changeStyle('impressionism')">인상파</button>
            <button class="studio-btn" id="sSur" onclick="changeStyle('surrealism')">초현실</button>
        </div>
    </div>
    <button id="recBtn" onclick="togglePlayback()" disabled>🔴 START DRAWING</button>
</div>
<div class="main-viewport"><div id="bakeOverlay"><div class="spinner"></div><div id="bakeText">ANALYZING...</div></div><div class="canvas-zone" id="canvasContainer"></div></div>

<script>
let targetImg, loadedAudio, fft;
let isPlaying = false, isBaking = false;
let currentStyle = 'pencil', paintingDuration = 30;
let strokeSequence = []; 
let paintingBuffer, lastBakedIdx = 0;

function setup() {
    let cnv = createCanvas(1120, 630);
    cnv.parent('canvasContainer');
    paintingBuffer = createGraphics(1120, 630);
    paintingBuffer.background('#f4f3ec');
    fft = new p5.FFT();
}

async function bakePaintingStrokes() {
    if(isBaking || !targetImg) return;
    isBaking = true;
    document.getElementById('bakeOverlay').style.display = 'flex';
    
    strokeSequence = [];
    targetImg.loadPixels();
    let d = targetImg.pixels;
    
    // 분석 프로세스: 경계면 우선순위 지정
    for(let i=0; i<100000; i++) {
        let rx = random(width), ry = random(height);
        let ix = Math.floor(rx * (targetImg.width/width));
        let iy = Math.floor(ry * (targetImg.height/height));
        let pIdx = (iy * targetImg.width + ix) * 4;
        
        let edge = calculateEdge(d, ix, iy, targetImg.width, targetImg.height);
        strokeSequence.push({ x:rx, y:ry, r:d[pIdx], g:d[pIdx+1], b:d[pIdx+2], edge: edge, seed: random() });
    }
    
    // 기획 적용: 연필 스케치 선행(Edge 우선) -> 경계면 채색 확산 순서 정렬
    strokeSequence.sort((a,b) => b.edge - a.edge);
    
    isBaking = false;
    document.getElementById('bakeOverlay').style.display = 'none';
}

function calculateEdge(d, x, y, w, h) {
    let idx = (y * w + x) * 4;
    let r = d[idx], g = d[idx+1], b = d[idx+2];
    let nextIdx = (y * w + Math.min(x+1, w-1)) * 4;
    return Math.abs(r - d[nextIdx]) + Math.abs(g - d[nextIdx+1]) + Math.abs(b - d[nextIdx+2]);
}

function renderStroke(s, sizeOffset, waveOffset) {
    let x = s.x + waveOffset;
    let y = s.y;
    
    if (s.edge > 30) { // 연필 윤곽 묘사
        stroke(s.r * 0.2, 180); strokeWeight(1);
        line(x-5, y, x+5, y);
    } else { // 화풍 채색
        if(currentStyle === 'oil') {
            fill(s.r, s.g, s.b, 200); rect(x, y, 10*sizeOffset, 10*sizeOffset);
        } else if(currentStyle === 'impressionism') {
            fill(s.r, s.g, s.b, 220); ellipse(x, y, 8*sizeOffset, 8*sizeOffset);
        }
        // ... (이후 스타일 구현)
    }
}

function drawFrame(ct) {
    let prog = ct / paintingDuration;
    let activeIdx = Math.floor(strokeSequence.length * prog);
    
    // 0~30% 연필 스케치, 30~80% 경계면 채색, 80~100% 원본 페이드인

}

function togglePlayback() {
    isPlaying = !isPlaying;
    if(isPlaying) { loadedAudio.play(); } else { loadedAudio.stop(); }
}
</script>
</body>
</html>
