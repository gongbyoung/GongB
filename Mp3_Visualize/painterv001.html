<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title> v1.11</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #0a0a0f; --panel: #12121a; --accent: #00ffcc; --text: #ffffff; --border: rgba(255,255,255,0.08); }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; height: 100vh; overflow: hidden; display: flex; }

.control-sidebar { width: 380px; background: var(--panel); border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; flex-shrink: 0; }
.main-viewport { flex: 1; display: flex; flex-direction: column; background: #020205; position: relative; }
.canvas-zone { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; overflow: hidden; }

h2 { font-size: 14px; letter-spacing: 3px; color: var(--accent); font-weight: 800; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
.control-group { display: flex; flex-direction: column; gap: 8px; }
.control-group label { font-size: 11px; color: #888; font-weight: 600; letter-spacing: 1px; }
.btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.btn-grid-three { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.studio-btn { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 10px; font-size: 11px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
.studio-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.05); }
.studio-btn:disabled { opacity: 0.2; cursor: not-allowed; }

.file-btn { width: 100%; background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.15); color: #ccc; padding: 12px; font-size: 11px; text-align: center; border-radius: 6px; cursor: pointer; display: block; }
.file-btn.loaded { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.02); }
.file-input { display: none; }
.num-input { background: #000; border: 1px solid rgba(255,255,255,0.1); color: var(--accent); font-size: 14px; font-weight: bold; padding: 10px; border-radius: 6px; text-align: center; width: 100%; font-family: monospace; }

.player-bar { height: 70px; background: var(--panel); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 30px; gap: 20px; }
.time-display { font-size: 13px; font-family: monospace; color: #666; min-width: 45px; }
.time-display.active { color: var(--accent); }
.slider-timeline { flex: 1; accent-color: var(--accent); height: 4px; background: rgba(255,255,255,0.1); cursor: pointer; }

#bakeOverlay { display: none; position: absolute; inset: 0; background: rgba(2,2,5,0.95); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; gap: 12px; backdrop-filter: blur(4px); }
.spinner { width: 40px; height: 40px; border: 3px solid rgba(0,255,204,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#bakeText { font-size: 20px; font-weight: 900; letter-spacing: 4px; color: var(--accent); font-family: monospace; }
</style>
</head>
<body>

<div class="control-sidebar">
    <h2>Studio Settings</h2>
    
    <div class="control-group">
        <label>1. 완성될 그림 선택 (Target Image)</label>
        <label class="file-btn" id="imgLabel" for="imgIn">🖼️ IMAGE UPLOAD</label>
        <input type="file" id="imgIn" class="file-input" accept="image/*" onchange="loadTargetImage(this.files)">
    </div>

    <div class="control-group">
        <label>2. 음악 파일 로딩 (Audio File)</label>
        <label class="file-btn" id="audioLabel" for="audioIn">🎵 AUDIO UPLOAD</label>
        <input type="file" id="audioIn" class="file-input" accept="audio/*" onchange="loadAudioFile(this.files)">
    </div>

    <div class="control-group">
        <label for="durationIn">3. 그림그리는 시간 설정 (초)</label>
        <input type="number" id="durationIn" class="num-input" value="30" min="5" max="300" onchange="updateDuration(this.value)">
    </div>

    <div class="control-group">
        <label>4. 비율 선택 (Aspect Ratio)</label>
        <div class="btn-grid">
            <button class="studio-btn active" id="ratio169" onclick="changeRatio('16:9')">16:9 Landscape</button>
            <button class="studio-btn" id="ratio916" onclick="changeRatio('9:16')">9:16 Portrait</button>
        </div>
    </div>

    <div class="control-group">
        <label>5. 그림 스타일 선택 (Art Style)</label>
        <div class="btn-grid-three">
            <button class="studio-btn active" id="styleOil" onclick="changeStyle('oil')">유채화</button>
            <button class="studio-btn" id="styleWater" onclick="changeStyle('watercolor')">수채화</button>
            <button class="studio-btn" id="stylePencil" onclick="changeStyle('pencil')">소묘</button>
        </div>
    </div>
    
    <div style="margin-top: auto;">
        <button class="studio-btn" id="recBtn" onclick="togglePlayback()" style="width:100%; background: #ff3e81; color:#fff; border:none; padding:14px; font-size:12px; font-weight:800; letter-spacing:2px;" disabled>🔴 START DRAWING</button>
    </div>
</div>

<div class="main-viewport">
    <div id="bakeOverlay">
        <div class="spinner"></div>
        <div id="bakeText">ANALYZING 0%</div>
        <div style="color: #666; font-size: 11px;">형태의 윤곽선과 확산 밀도를 계산하여 인간 화가의 드로잉 트랙을 구성 중입니다.</div>
    </div>

    <div class="canvas-zone" id="canvasContainer"></div>
    
    <div class="player-bar">
        <span class="time-display" id="timeCurrent">00:00</span>
        <input type="range" id="studioTimeline" class="slider-timeline" value="0" min="0" max="100" step="0.1" oninput="seekStudioTime(this.value)">
        <span class="time-display" id="timeTotal">00:00</span>
    </div>
</div>

<script>
let targetImg, loadedAudio, fft;
let isPlaying = false, isBaking = false;
let canvasW = 1120, canvasH = 630; 
let currentStyle = 'oil', paintingDuration = 30;
let strokeSequence = []; 

let paintingBuffer;
let lastBakedIdx = 0;

let mediaRecorder, recordedChunks = [];

function setup() {
    let cnv = createCanvas(canvasW, canvasH);
    cnv.parent('canvasContainer');
    cnv.canvas.getContext('2d', { willReadFrequently: true });
    
    paintingBuffer = createGraphics(canvasW, canvasH);
    paintingBuffer.pixelDensity(1);
    paintingBuffer.background('#f4f3ec');

    fft = new p5.FFT();
    background('#f4f3ec'); 
}

function loadTargetImage(files) {
    if(!files[0]) return;
    document.getElementById('imgLabel').innerText = "... IMAGE LOADING ...";
    loadImage(URL.createObjectURL(files[0]), (img) => {
        targetImg = img;
        document.getElementById('imgLabel').innerText = "✅ " + files[0].name.substring(0, 12) + "...";
        document.getElementById('imgLabel').classList.add('loaded');
        checkReadyState();
    });
}

function loadAudioFile(files) {
    if(!files[0]) return;
    document.getElementById('audioLabel').innerText = "... AUDIO LOADING ...";
    loadedAudio = loadSound(URL.createObjectURL(files[0]), () => {
        document.getElementById('audioLabel').innerText = "✅ " + files[0].name.substring(0, 12) + "...";
        document.getElementById('audioLabel').classList.add('loaded');
        document.getElementById('timeTotal').innerText = formatStudioTime(paintingDuration);
        checkReadyState();
    });
}

function checkReadyState() {
    if(targetImg && loadedAudio) {
        document.getElementById('recBtn').disabled = false;
        bakePaintingStrokes();
    }
}

function updateDuration(val) {
    paintingDuration = parseInt(val) || 30;
    document.getElementById('timeTotal').innerText = formatStudioTime(paintingDuration);
    if(targetImg) bakePaintingStrokes();
}

function changeRatio(r) {
    if(isBaking) return;
    document.getElementById('ratio169').classList.toggle('active', r === '16:9');
    document.getElementById('ratio916').classList.toggle('active', r === '9:16');
    if(r === '16:9') { canvasW = 1120; canvasH = 630; } else { canvasW = 450; canvasH = 800; }
    
    resizeCanvas(canvasW, canvasH);
    paintingBuffer = createGraphics(canvasW, canvasH);
    paintingBuffer.pixelDensity(1);
    resetPaintingBuffer();

    if(targetImg) bakePaintingStrokes();
}

function changeStyle(s) {
    if(isBaking) return;
    currentStyle = s;
    document.getElementById('styleOil').classList.toggle('active', s === 'oil');
    document.getElementById('styleWater').classList.toggle('active', s === 'watercolor');
    document.getElementById('stylePencil').classList.toggle('active', s === 'pencil');
    if(targetImg) bakePaintingStrokes();
}

function resetPaintingBuffer() {
    paintingBuffer.background('#f4f3ec');
    lastBakedIdx = 0;
}

async function bakePaintingStrokes() {
    if(isBaking || !targetImg) return;
    isBaking = true;
    
    document.getElementById('bakeOverlay').style.display = 'flex';
    document.getElementById('bakeText').innerText = `ANALYZING 0%`;
    await new Promise(r => setTimeout(r, 50));

    strokeSequence = [];
    resetPaintingBuffer();
    
    targetImg.loadPixels();
    let d = targetImg.pixels;
    let imgW = targetImg.width;
    let imgH = targetImg.height;
    let rScale = Math.max(width / imgW, height / imgH);

    let totalSamples = 130000;
    let chunkSize = 30000;
    let tempStrokes = [];

    // 1단계: 선행 이미지 분석 (0% ~ 60%)
    for (let i = 0; i < totalSamples; i += chunkSize) {
        for (let j = 0; j < chunkSize && (i + j) < totalSamples; j++) {
            let rx = Math.floor(Math.random() * width);
            let ry = Math.floor(Math.random() * height);

            let ix = Math.floor((rx - width / 2) / rScale + imgW / 2);
            let iy = Math.floor((ry - height / 2) / rScale + imgH / 2);

            if (ix >= 0 && ix < imgW && iy >= 0 && iy < imgH) {
                let pIdx = (iy * imgW + ix) * 4;
                let r = d[pIdx], g = d[pIdx + 1], b = d[pIdx + 2], a = d[pIdx + 3];

                if (a >= 10) {
                    let lum = r * 0.299 + g * 0.587 + b * 0.114;
                    
                    let ixRight = Math.min(imgW - 1, ix + 2);
                    let iyDown = Math.min(imgH - 1, iy + 2);
                    let idxRight = (iy * imgW + ixRight) * 4;
                    let idxDown = (iyDown * imgW + ix) * 4;
                    
                    let edgeScore = Math.abs(r - d[idxRight]) + Math.abs(g - d[idxRight+1]) + Math.abs(b - d[idxRight+2]) +
                                    Math.abs(r - d[idxDown]) + Math.abs(g - d[idxDown+1]) + Math.abs(b - d[idxDown+2]);

                    tempStrokes.push({
                        x: rx, y: ry, r: r, g: g, b: b, lum: lum, seed: Math.random(), edgeScore: edgeScore
                    });
                }
            }
        }
        let progress = Math.floor(((i + chunkSize) / totalSamples) * 60);
        document.getElementById('bakeText').innerText = `ANALYZING ${Math.min(progress, 60)}%`;
        await new Promise(r => setTimeout(r, 10));
    }

    // 2단계: 경계면 기반 비동기 분류 정렬 마일스톤 (70%)
    document.getElementById('bakeText').innerText = `PRE-SORTING 70%`;
    await new Promise(r => setTimeout(r, 10));

    let sketchStrokes = [];
    let colorStrokes = [];

    tempStrokes.forEach(s => {
        if(s.edgeScore > 32) {
            sketchStrokes.push({ ...s, isSketch: true }); 
        }
        colorStrokes.push({ ...s, isSketch: false }); 
    });

    sketchStrokes.sort((a, b) => b.edgeScore - a.edgeScore);
    colorStrokes.sort((a, b) => b.edgeScore - a.edgeScore);

    // 3단계: 시간의 80% 가속 페이즈 분리 설계 (85%)
    document.getElementById('bakeText').innerText = `BUILDING PATHS 85%`;
    await new Promise(r => setTimeout(r, 10));

    strokeSequence = [];
    sketchStrokes.forEach((s, k) => {
        s.targetProg = map(k, 0, sketchStrokes.length, 0.0, 0.30); 
        strokeSequence.push(s);
    });
    colorStrokes.forEach((s, k) => {
        s.targetProg = map(k, 0, colorStrokes.length, 0.30, 0.80); 
        strokeSequence.push(s);
    });

    strokeSequence.sort((a, b) => a.targetProg - b.targetProg);

    // 4단계: 드로잉 데이터 완성 마감 (100%)
    document.getElementById('bakeText').innerText = `COMPLETED 100%`;
    await new Promise(r => setTimeout(r, 50));

    isBaking = false;
    document.getElementById('bakeOverlay').style.display = 'none';
    
    if(!isPlaying) {
        let previewTime = paintingDuration * 0.8;
        document.getElementById('studioTimeline').value = 80;
        document.getElementById('timeCurrent').innerText = formatStudioTime(previewTime);
        drawFrame(previewTime);
    }
}

// [완벽 픽스] 오타 변수 Low를 완벽하게 소문자 low로 교정 완료 (무한 루프 소멸 보장)
function findActiveCount(prog) {
    let low = 0, high = strokeSequence.length - 1;
    let ans = 0;
    while(low <= high) {
        let mid = Math.floor((low + high) / 2);
        if(strokeSequence[mid].targetProg <= prog) {
            ans = mid + 1;
            low = mid + 1; // ◀ 대문자 'L'오타 완치
        } else {
            high = mid - 1;
        }
    }
    return ans;
}

function renderSingleStroke(g, s, xOffset, yOffset, sizeOffset) {
    let finalX = s.x + xOffset;
    let finalY = s.y + yOffset; 
    let finalSize = sizeOffset;
    
    if (s.isSketch) {
        if (g) {
            g.stroke(s.lum * 0.15, 150); g.strokeWeight(1); g.push();
            g.translate(finalX, finalY); g.rotate(s.seed * TWO_PI); g.line(-6, 0, 6, 0); g.pop();
        } else {
            stroke(s.lum * 0.15, 150); strokeWeight(1); push();
            translate(finalX, finalY); rotate(s.seed * TWO_PI); line(-6, 0, 6, 0); pop();
        }
        return;
    }

    if (currentStyle === 'oil') {
        let bW = 18 * finalSize;
        let bH = 6 * finalSize;
        let rot = s.seed * TWO_PI + (xOffset * 0.05);
        let r_v = s.r + random(-8, 8), g_v = s.g + random(-8, 8), b_v = s.b + random(-8, 8);

        if (g) {
            g.noStroke(); g.fill(r_v, g_v, b_v, 235); g.push();
            g.translate(finalX, finalY); g.rotate(rot); g.rect(-bW/2, -bH/2, bW, bH, 2); g.pop();
        } else {
            noStroke(); fill(r_v, g_v, b_v, 235); push();
            translate(finalX, finalY); rotate(rot); rect(-bW/2, -bH/2, bW, bH, 2); pop();
        }
    } 
    else if (currentStyle === 'watercolor') {
        let rDiam = (34 * finalSize) * (0.8 + noise(s.seed * 180) * 0.4);
        if (g) {
            g.noStroke(); g.fill(s.r, s.g, s.b, 45); g.ellipse(finalX, finalY, rDiam, rDiam);
        } else {
            noStroke(); fill(s.r, s.g, s.b, 45); ellipse(finalX, finalY, rDiam, rDiam);
        }
    } 
    else if (currentStyle === 'pencil') {
        let lLen = map(s.lum, 0, 255, 16, 4);
        let rot = PI/4 + (s.seed * 0.25);
        if (g) {
            g.stroke(s.lum * 0.25, 135); g.strokeWeight(1); g.push();
            g.translate(finalX, finalY); g.rotate(rot); g.line(-lLen, 0, lLen, 0); g.pop();
        } else {
            stroke(s.lum * 0.25, 135); strokeWeight(1); push();
            translate(finalX, finalY); rotate(rot); line(-lLen, 0, lLen, 0); pop();
        }
    }
}

function drawFrame(ct) {
    if(isBaking || strokeSequence.length === 0) return;

    let progress = ct / paintingDuration;
    if(progress > 1.0) progress = 1.0;

    let drawingProg = Math.min(1.0, progress / 0.8);
    let revealProg = Math.max(0.0, Math.min(1.0, (progress - 0.8) / 0.2));

    let activeStrokesCount = findActiveCount(drawingProg);

    if (activeStrokesCount < lastBakedIdx) {
        resetPaintingBuffer();
    }

    let targetBakeIdx = Math.max(0, activeStrokesCount - 1500);
    if (targetBakeIdx > lastBakedIdx) {
        for (let i = lastBakedIdx; i < targetBakeIdx; i++) {
            renderSingleStroke(paintingBuffer, strokeSequence[i], 0, 0, 1.0);
        }
        lastBakedIdx = targetBakeIdx;
    }

    background('#f4f3ec'); 
    image(paintingBuffer, 0, 0);

    let wave = [];
    let bassEnergy = 0;
    
    if(isPlaying && fft) {
        fft.analyze();
        let w = fft.waveform(); 
        if(w) wave = w; 
        bassEnergy = fft.getEnergy("bass"); 
    }

    let bassFactor = map(bassEnergy, 0, 255, 0.9, 1.7);

    for (let i = lastBakedIdx; i < activeStrokesCount; i++) {
        let s = strokeSequence[i];
        let xOffset = 0, yOffset = 0, sizeOffset = 1.0;

        if (isPlaying && wave && wave.length > 0) {
            let wIdx = Math.floor(s.seed * (wave.length - 1));
            xOffset = wave[wIdx] * 12; 
            yOffset = wave[(wIdx + 100) % wave.length] * 12; 
            sizeOffset = bassFactor;
        }
        renderSingleStroke(null, s, xOffset, yOffset, sizeOffset); 
    }

    if(revealProg > 0) {
        push();
        imageMode(CENTER);
        let imgW = targetImg.width, imgH = targetImg.height;
        let rScale = Math.max(width / imgW, height / imgH);
        tint(255, 255 * revealProg);
        image(targetImg, width/2, height/2, imgW*rScale, imgH*rScale);
        pop();
    }

    let ctx = drawingContext;
    let cx = width / 2, cy = height / 2;
    let maxR = Math.max(width, height) * 0.7;
    let grad = ctx.createRadialGradient(cx, cy, maxR * 0.4, cx, cy, maxR);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(10,10,15,0.75)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, height);
}

// [완벽 픽스] loadedAudio 변수 싱크 맞춤 적용
function draw() {
    if(!isPlaying || isBaking) return;
    
    let ct = loadedAudio.currentTime();
    if(ct >= paintingDuration) {
        togglePlayback();
        seekStudioTime(100);
        return;
    }
    
    document.getElementById('timeCurrent').innerText = formatStudioTime(ct);
    document.getElementById('studioTimeline').value = (ct / paintingDuration) * 100;
    drawFrame(ct);
}

function togglePlayback() {
    if(!loadedAudio || isBaking) return;
    
    if(isPlaying) {
        loadedAudio.stop();
        isPlaying = false;
        document.getElementById('timeCurrent').classList.remove('active');
        document.getElementById('recBtn').innerText = "🔴 START DRAWING";
        document.getElementById('recBtn').style.background = "#ff3e81";
        
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
        }
    } 
    else {
        loadedAudio.rate(1.0); // 배속 믹스 삭제 -> 언제나 기본 정속 고정
        loadedAudio.play();
        isPlaying = true;
        document.getElementById('timeCurrent').classList.add('active');
        document.getElementById('recBtn').innerText = "⏹ STOP & SAVE";
        document.getElementById('recBtn').style.background = "#00ffcc";
        document.getElementById('recBtn').style.color = "#000";
        
        startStudioRecording();
    }
}

function startStudioRecording() {
    recordedChunks = [];
    let targetCanvas = document.querySelector('#canvasContainer canvas');
    let stream = targetCanvas.captureStream(30); 
    
    let options = {};
    if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) {
        options = { mimeType: 'video/webm;codecs=vp9' };
    } else if (MediaRecorder.isTypeSupported('video/webm')) {
        options = { mimeType: 'video/webm' };
    } else if (MediaRecorder.isTypeSupported('video/mp4')) {
        options = { mimeType: 'video/mp4' };
    }
    
    try { mediaRecorder = new MediaRecorder(stream, options); } catch (e) { mediaRecorder = new MediaRecorder(stream); }

    mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) recordedChunks.push(e.data);
    };
    
    mediaRecorder.onstop = () => {
        let blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'video/webm' });
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.style.display = 'none';
        a.href = url;
        
        let ext = 'webm';
        if (mediaRecorder.mimeType && mediaRecorder.mimeType.includes('mp4')) ext = 'mp4';
        a.download = `AudioArt_Studio_Master_${Date.now()}.${ext}`;
        
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
    };
    mediaRecorder.start();
}

function seekStudioTime(v) {
    if(!loadedAudio || isBaking) return;
    let targetSec = (parseFloat(v) / 100) * paintingDuration;
    
    if(isPlaying) {
        loadedAudio.jump(targetSec);
    } else {
        document.getElementById('timeCurrent').innerText = formatStudioTime(targetSec);
        drawFrame(targetSec);
    }
}

function formatStudioTime(s) {
    let m = Math.floor(s / 60);
    let sec = Math.floor(s % 60);
    return `${nf(m, 2)}:${nf(sec, 2)}`;
}
</script>
</body>
</html>
