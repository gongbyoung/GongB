<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>v1.22</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
    *, *::before, *::after { box-sizing: border-box; }
    body { background: #050508; color: #fff; font-family: -apple-system, sans-serif; display: flex; height: 100vh; margin: 0; overflow: hidden; }
    .sidebar { width: 340px; background: #0f0f14; padding: 20px; display: flex; flex-direction: column; gap: 15px; border-right: 1px solid #222; overflow-y: auto; }
    .main { flex: 1; display: flex; flex-direction: column; position: relative; }
    .canvas-zone { flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    
    h2 { font-size: 14px; color: #00ffcc; letter-spacing: 2px; border-bottom: 1px solid #333; padding-bottom: 8px; margin: 0; }
    .control-group { display: flex; flex-direction: column; gap: 6px; font-size: 11px; color: #aaa; }
    .control-group label { display: flex; justify-content: space-between; align-items: center; }
    .file-btn { border: 1px dashed #444; padding: 10px; cursor: pointer; color: #ccc; text-align: center; background: rgba(255,255,255,0.02); border-radius: 4px; }
    
    input[type=range] { width: 60%; accent-color: #00ffcc; }
    input[type=number], select { background: #000; border: 1px solid #333; color: #00ffcc; padding: 4px; font-weight: bold; width: 60px; text-align: right; }
    
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
    .studio-btn { border: 1px solid #444; color: white; padding: 8px; background: none; cursor: pointer; font-size: 11px; border-radius: 4px; }
    .studio-btn.active { border-color: #00ffcc; color: #00ffcc; background: rgba(0,255,204,0.1); }
    
    .player-bar { height: 60px; background: #0f0f14; border-top: 1px solid #222; display: flex; align-items: center; padding: 0 20px; gap: 15px; }
    #bakeOverlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; color: #00ffcc; font-family: monospace; font-size: 18px; letter-spacing: 2px; }
</style>
</head>
<body>
<div class="sidebar">
    <h2>Studio Settings</h2>
    
    <div class="control-group">
        <span style="color:#fff; font-weight:bold;">1. 🖼️ 그림 이미지 파일</span>
        <input type="file" id="imgIn" accept="image/*" onchange="loadTarget(this.files)" class="file-btn">
    </div>
    
    <div class="control-group">
        <span style="color:#fff; font-weight:bold;">2. 🎵 음악 오디오 파일</span>
        <input type="file" id="audioIn" accept="audio/*" onchange="loadAudio(this.files)" class="file-btn">
    </div>

    <div class="control-group" style="border:1px solid #222; padding:10px; border-radius:4px; gap:10px;">
        <span style="color:#00ffcc;">3. 스튜디오 세부 옵션</span>
        <label>비율 설정: 
            <select id="ratioOpt" onchange="updateSettings()">
                <option value="1.777">16:9</option>
                <option value="0.562">9:16</option>
            </select>
        </label>
        <label>캔버스 크기: <input type="range" id="scaleOpt" min="0.5" max="2.5" step="0.1" value="1.0" oninput="updateSettings()"></label>
        <label>위치 (X축): <input type="range" id="posXOpt" min="-500" max="500" value="0" step="10" oninput="updateSettings()"></label>
        <label>위치 (Y축): <input type="range" id="posYOpt" min="-500" max="500" value="0" step="10" oninput="updateSettings()"></label>
        <label>전체 밝기: <input type="range" id="lightOpt" min="30" max="200" value="100" oninput="updateSettings()"></label>
        <label>총 그리는 시간: <input type="number" id="timeOpt" value="30" onchange="updateSettings()">초</label>
    </div>

    <div class="control-group">
        <span style="color:#fff; font-weight:bold;">7. 원 브러쉬 화풍 (단일 붓 채색)</span>
        <div class="btn-grid">
            <button class="studio-btn active" id="sPencil" onclick="changeStyle('pencil')">베이직</button>
            <button class="studio-btn" id="sOil" onclick="changeStyle('oil')">유화</button>
            <button class="studio-btn" id="sImp" onclick="changeStyle('impressionism')">인상파</button>
        </div>
    </div>
    
    <button id="recBtn" onclick="togglePlayback()" style="margin-top:auto; padding:15px; background:#ff3e81; color:white; border:none; font-weight:bold; letter-spacing:1px; cursor:pointer; border-radius:4px;" disabled>🔴 START DRAWING</button>
</div>

<div class="main">
    <div id="bakeOverlay"><div id="bakeText">ANALYZING PATHWAYS...</div></div>
    <div class="canvas-zone" id="canvasContainer"></div>
    <div class="player-bar">
        <span id="timeCurrent" style="font-family:monospace; color:#888;">00:00</span>
        <input type="range" id="timeline" style="flex:1; accent-color:#ff3e81;" value="0" min="0" max="100" step="0.1" oninput="seekTime(this.value)">
        <span id="timeTotal" style="font-family:monospace; color:#888;">00:00</span>
    </div>
</div>

<script>
let targetImg, loadedAudio, fft, isPlaying = false, isBaking = false;
let paintBuffer;
let strokeSequence = [];
let lastDrawnIdx = 0;
let currentStyle = 'pencil';
let settings = { ratio: 1.777, scale: 1.0, x: 0, y: 0, light: 100, time: 30 };
let mediaRecorder, recordedChunks = [];

function setup() {
    let cnv = createCanvas(1120, 630);
    cnv.parent('canvasContainer');
    paintBuffer = createGraphics(1120, 630);
    paintBuffer.background('#f4f3ec');
    fft = new p5.FFT();
}

function updateSettings() {
    settings.ratio = parseFloat(document.getElementById('ratioOpt').value);
    settings.scale = parseFloat(document.getElementById('scaleOpt').value);
    settings.x = parseInt(document.getElementById('posXOpt').value);
    settings.y = parseInt(document.getElementById('posYOpt').value);
    settings.light = parseInt(document.getElementById('lightOpt').value);
    settings.time = parseInt(document.getElementById('timeOpt').value);
    
    document.getElementById('timeTotal').innerText = formatTime(settings.time);
    
    let w = settings.ratio > 1 ? 1120 : 450;
    let h = settings.ratio > 1 ? 630 : 800;
    resizeCanvas(w, h);
    paintBuffer = createGraphics(w, h);
    paintBuffer.background('#f4f3ec');
    
    if(targetImg) buildArtistPathways();
}

function loadTarget(files) { loadImage(URL.createObjectURL(files[0]), img => { targetImg = img; updateSettings(); }); }
function loadAudio(files) { loadedAudio = loadSound(URL.createObjectURL(files[0]), () => { document.getElementById('timeTotal').innerText = formatTime(settings.time); checkReady(); }); }
function changeStyle(s) { currentStyle = s; document.querySelectorAll('.studio-btn').forEach(b => b.classList.remove('active')); document.getElementById('s'+(s==='impressionism'?'Imp':s.charAt(0).toUpperCase()+s.slice(1))).classList.add('active'); if(targetImg){ paintBuffer.background('#f4f3ec'); lastDrawnIdx=0; drawFrame(loadedAudio?loadedAudio.currentTime():0); } }
function checkReady() { if(targetImg && loadedAudio) document.getElementById('recBtn').disabled = false; }

// [핵심] 아티스트의 물리적 작업 동선(BFS Edge-to-Outward)을 0.1초 만에 분석하는 알고리즘
async function buildArtistPathways() {
    if(!targetImg || isBaking) return;
    isBaking = true;
    document.getElementById('bakeOverlay').style.display = 'flex';
    document.getElementById('bakeText').innerText = "1. 구도선 및 경계면 분석 중...";
    await new Promise(r => setTimeout(r, 50));

    paintBuffer.background('#f4f3ec');
    lastDrawnIdx = 0;
    strokeSequence = [];
    
    targetImg.loadPixels();
    let d = targetImg.pixels;
    let tw = targetImg.width, th = targetImg.height;
    let rScale = Math.max(width / tw, height / th) * settings.scale;

    // BFS(너비 우선 탐색)를 위한 고속 다운스케일 맵 생성
    let mapW = Math.floor(tw / 4), mapH = Math.floor(th / 4);
    let distMap = new Int32Array(mapW * mapH).fill(99999);
    let queue = [];
    
    // 경계선(Edge) 1차 추출
    for(let y=1; y<mapH-1; y++) {
        for(let x=1; x<mapW-1; x++) {
            let p = ((y*4)*tw + (x*4)) * 4;
            let pR = ((y*4)*tw + (x*4 + 4)) * 4;
            let pD = (((y+1)*4)*tw + (x*4)) * 4;
            
            let edge = abs(d[p]-d[pR]) + abs(d[p+1]-d[pR+1]) + abs(d[p]-d[pD]) + abs(d[p+1]-d[pD+1]);
            if(edge > 40 && d[p+3] > 10) {
                distMap[y*mapW + x] = 0; // 경계선 거리는 0
                queue.push({x:x, y:y, d:0});
            }
        }
    }

    document.getElementById('bakeText').innerText = "2. 채색 확산 경로(Diffusion) 매핑 중...";
    await new Promise(r => setTimeout(r, 50));

    // 경계선에서 바깥쪽으로 물감이 퍼져나가는 확산 지도 생성 (BFS)
    let head = 0;
    let dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    while(head < queue.length) {
        let curr = queue[head++];
        for(let dir of dirs) {
            let nx = curr.x + dir[0], ny = curr.y + dir[1];
            if(nx >= 0 && nx < mapW && ny >= 0 && ny < mapH) {
                let nIdx = ny * mapW + nx;
                if(distMap[nIdx] > curr.d + 1) {
                    distMap[nIdx] = curr.d + 1; // 경계선으로부터의 거리 기록
                    queue.push({x: nx, y: ny, d: curr.d + 1});
                }
            }
        }
    }

    let layoutNodes = [], sketchNodes = [], colorNodes = [];

    // 최종 좌표 샘플링 (거리에 따른 노드 분리)
    for(let i=0; i<70000; i++) {
        let cx = random(width), cy = random(height);
        let ix = Math.floor((cx - width/2 - settings.x) / rScale + tw/2);
        let iy = Math.floor((cy - height/2 - settings.y) / rScale + th/2);

        if (ix >= 0 && ix < tw && iy >= 0 && iy < th) {
            let p = (iy * tw + ix) * 4;
            if (d[p+3] > 10) {
                let distance = distMap[Math.floor(iy/4) * mapW + Math.floor(ix/4)] || 0;
                let lum = d[p]*0.3 + d[p+1]*0.59 + d[p+2]*0.11;
                let node = { x: cx, y: cy, r: d[p], g: d[p+1], b: d[p+2], lum: lum, dist: distance };
                
                if (distance === 0) sketchNodes.push(node);
                else colorNodes.push(node);
            }
        }
    }

    // [기획 4번] 스케치는 구도 중심(가운데)에 가까운 중요 경계선부터 먼저 그림
    let cxFocus = width/2 + settings.x, cyFocus = height/2 + settings.y;
    sketchNodes.sort((a,b) => dist(a.x,a.y, cxFocus,cyFocus) - dist(b.x,b.y, cxFocus,cyFocus));
    
    // [기획 5,7번] 채색은 경계면(dist=1)부터 시작해 거리가 먼 쪽(배경)으로 확산되며 칠해짐
    colorNodes.sort((a, b) => {
        if (a.dist !== b.dist) return a.dist - b.dist; // 1순위: 엣지로부터의 거리 (가까운 곳부터 채색)
        return (a.y*2 + a.x) - (b.y*2 + b.x);          // 2순위: 붓이 공간적으로 튀지 않고 부드럽게 이어지도록
    });

    // 구도선(Layout) 가이드 배치
    for(let i=0; i<150; i++) layoutNodes.push({ x: cxFocus + random(-300,300), y: cyFocus + random(-300,300) });

    // 전체 시퀀스(타임라인) 병합
    let totalLayout = layoutNodes.length, totalSketch = sketchNodes.length, totalColor = colorNodes.length;
    
    layoutNodes.forEach((s, i) => { s.stage = 'layout'; s.prog = map(i, 0, totalLayout, 0.0, 0.05); strokeSequence.push(s); });
    sketchNodes.forEach((s, i) => { s.stage = 'sketch'; s.prog = map(i, 0, totalSketch, 0.05, 0.35); strokeSequence.push(s); });
    colorNodes.forEach((s, i) => { s.stage = 'color'; s.prog = map(i, 0, totalColor, 0.35, 0.80); strokeSequence.push(s); });

    isBaking = false;
    document.getElementById('bakeOverlay').style.display = 'none';
    checkReady();
    
    if(!isPlaying) { document.getElementById('timeline').value = 80; seekTime(80); }
}

// [기획 7번] 점을 찍지 않고, 이전 위치에서부터 현재 위치로 선을 긋는 '단일 브러시' 렌더링
function drawSingleBrush(g, prev, curr, waveOff) {
    let dSq = dist(prev.x, prev.y, curr.x, curr.y);
    let x2 = curr.x + waveOff, y2 = curr.y + waveOff;

    if (curr.stage === 'layout') {
        g.stroke(0, 40); g.strokeWeight(1);
        if(curr.x > width/2) g.line(curr.x, 0, curr.x, height); // 세로 구도선
        else g.line(0, curr.y, width, curr.y);                  // 가로 구도선
    } 
    else if (curr.stage === 'sketch') {
        g.stroke(curr.lum * 0.2, 180); g.strokeWeight(1);
        if (dSq < 80) g.line(prev.x, prev.y, x2, y2); // 거리가 가까우면 펜을 떼지 않고 이음
        else g.point(x2, y2);
    } 
    else {
        // [클립스튜디오 기법 적용] 경계에서 멀어질수록(dist 증가) 붓의 크기가 커지며 평면을 넓게 채색
        let brushSize = Math.max(2, curr.dist * 1.5) * settings.scale; 
        
        if (currentStyle === 'oil') {
            g.stroke(curr.r, curr.g, curr.b, 230); g.strokeWeight(brushSize);
            if (dSq < 100) g.line(prev.x, prev.y, x2, y2); // 물감을 밀어 칠함
            else g.ellipse(x2, y2, brushSize);
        } else if (currentStyle === 'impressionism') {
            g.noStroke(); g.fill(curr.r, curr.g, curr.b, 200);
            g.ellipse(x2, y2, brushSize);
        } else {
            g.stroke(curr.r, curr.g, curr.b, 160); g.strokeWeight(brushSize * 0.6);
            if (dSq < 80) g.line(prev.x, prev.y, x2, y2);
            else g.point(x2, y2);
        }
    }
}

function drawFrame(ct) {
    if(isBaking || strokeSequence.length < 2) return;
    
    let prog = Math.min(1.0, ct / settings.time);
    let targetProgValue = prog;

    // 타임라인을 뒤로 돌렸을 경우 버퍼 리셋
    let targetIdx = findActiveCount(targetProgValue);
    if (targetIdx < lastDrawnIdx) {
        paintBuffer.background('#f4f3ec');
        lastDrawnIdx = 0;
    }

    let wave = [];
    if(isPlaying && fft) { fft.analyze(); wave = fft.waveform(); }

    for(let i = max(1, lastDrawnIdx); i < targetIdx; i++) {
        let prev = strokeSequence[i-1];
        let curr = strokeSequence[i];
        let waveOff = (isPlaying && wave.length > 0) ? wave[i % 1024] * 12 : 0;
        
        drawSingleBrush(paintBuffer, prev, curr, waveOff);
    }
    lastDrawnIdx = targetIdx;

    background(244 * (settings.light/100), 243 * (settings.light/100), 236 * (settings.light/100));
    push();
    if(settings.light !== 100) tint(255, 255, 255, 255 * (settings.light/100));
    image(paintBuffer, 0, 0);
    pop();

    // [기획 6번] 80% 이후, 원본의 조명과 세부 묘사를 페이드인하여 100% 완성도 달성
    if(prog > 0.8) {
        let detailAlpha = map(prog, 0.8, 1.0, 0, 255);
        push();
        imageMode(CENTER);
        tint(255, detailAlpha);
        let rScale = Math.max(width / targetImg.width, height / targetImg.height) * settings.scale;
        image(targetImg, width/2 + settings.x, height/2 + settings.y, targetImg.width*rScale, targetImg.height*rScale);
        pop();
    }
}

// 이진 탐색 최적화
function findActiveCount(prog) {
    let low = 0, high = strokeSequence.length - 1, ans = 0;
    while(low <= high) {
        let mid = Math.floor((low + high) / 2);
        if(strokeSequence[mid].prog <= prog) { ans = mid + 1; low = mid + 1; } 
        else { high = mid - 1; }
    }
    return ans;
}

function draw() {
    if(!isPlaying || !loadedAudio) return;
    let ct = loadedAudio.currentTime();
    if(ct >= settings.time) { togglePlayback(); seekTime(100); return; }
    
    document.getElementById('timeCurrent').innerText = formatTime(ct);
    document.getElementById('timeline').value = (ct / settings.time) * 100;
    drawFrame(ct);
}

function togglePlayback() {
    if(!loadedAudio || isBaking) return;
    isPlaying = !isPlaying;
    let btn = document.getElementById('recBtn');
    if(isPlaying) {
        loadedAudio.rate(1.0);
        loadedAudio.play();
        btn.innerText = "⏹ STOP & SAVE";
        btn.style.background = "#00ffcc"; btn.style.color = "#000";
        startRecording();
    } else {
        loadedAudio.stop();
        btn.innerText = "🔴 START DRAWING";
        btn.style.background = "#ff3e81"; btn.style.color = "#fff";
        if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    }
}

function startRecording() {
    recordedChunks = [];
    let stream = document.querySelector('#canvasContainer canvas').captureStream(30);
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
        let a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/webm' }));
        a.download = `AudioArt_Masterpiece_${Date.now()}.webm`;
        a.click();
    };
    mediaRecorder.start();
}

function seekTime(v) {
    if(!loadedAudio || isBaking) return;
    let targetSec = (parseFloat(v) / 100) * settings.time;
    if(isPlaying) loadedAudio.jump(targetSec);
    else { document.getElementById('timeCurrent').innerText = formatTime(targetSec); drawFrame(targetSec); }
}

function formatTime(s) { return nf(floor(s/60), 2) + ":" + nf(floor(s%60), 2); }
</script>
</body>
</html>
