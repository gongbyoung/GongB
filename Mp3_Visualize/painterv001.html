<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AUDIO-WAVE PAINTING STUDIO v1.16</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0a0a0f; --panel: #12121a; --accent: #00ffcc; --text: #ffffff; --border: rgba(255,255,255,0.08); }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; }
    .control-sidebar { width: 380px; background: var(--panel); border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; gap: 20px; }
    .main-viewport { flex: 1; display: flex; flex-direction: column; background: #020205; position: relative; }
    .canvas-zone { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .studio-btn { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 10px; font-size: 11px; font-weight: bold; border-radius: 6px; cursor: pointer; }
    .studio-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.05); }
    .file-btn { border: 1px dashed rgba(255,255,255,0.15); color: #ccc; padding: 12px; text-align: center; border-radius: 6px; cursor: pointer; display: block; margin-top: 5px; }
    .player-bar { height: 70px; background: var(--panel); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 30px; gap: 20px; }
    #bakeOverlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; color: var(--accent); }
</style>
</head>
<body>

<div class="control-sidebar">
    <h2>Studio Settings</h2>
    <input type="file" id="imgIn" accept="image/*" onchange="loadTargetImage(this.files)" class="file-btn">
    <input type="file" id="audioIn" accept="audio/*" onchange="loadAudioFile(this.files)" class="file-btn">
    <div class="btn-grid-four">
        <button class="studio-btn active" id="sPencil" onclick="changeStyle('pencil')">연필</button>
        <button class="studio-btn" id="sOil" onclick="changeStyle('oil')">유화</button>
        <button class="studio-btn" id="sImp" onclick="changeStyle('impressionism')">인상파</button>
        <button class="studio-btn" id="sSur" onclick="changeStyle('surrealism')">초현실</button>
    </div>
    <button id="recBtn" onclick="togglePlayback()" style="width:100%; padding:14px; background:#ff3e81; color:#fff; border:none; cursor:pointer;" disabled>🔴 START DRAWING</button>
</div>

<div class="main-viewport">
    <div id="bakeOverlay"><div id="bakeText">ANALYZING...</div></div>
    <div class="canvas-zone" id="canvasContainer"></div>
    <div class="player-bar">
        <span id="timeCurrent">00:00</span>
        <input type="range" id="studioTimeline" style="flex:1" value="0" min="0" max="100" step="0.1" oninput="seekStudioTime(this.value)">
        <span id="timeTotal">00:00</span>
    </div>
</div>

<script>
let targetImg, loadedAudio, fft;
let isPlaying = false, isBaking = false, currentStyle = 'pencil', paintingDuration = 30;
let strokeSequence = [], paintingBuffer, lastBakedIdx = 0;

function setup() {
    let cnv = createCanvas(1120, 630);
    cnv.parent('canvasContainer');
    paintingBuffer = createGraphics(1120, 630);
    paintingBuffer.background('#f4f3ec');
    fft = new p5.FFT();
}

function loadTargetImage(files) { loadImage(URL.createObjectURL(files[0]), img => { targetImg = img; checkReadyState(); }); }
function loadAudioFile(files) { loadedAudio = loadSound(URL.createObjectURL(files[0]), () => { document.getElementById('timeTotal').innerText = formatStudioTime(paintingDuration); checkReadyState(); }); }
function checkReadyState() { if(targetImg && loadedAudio) bakePaintingStrokes(); }

function changeStyle(s) {
    currentStyle = s;
    document.querySelectorAll('.studio-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('s'+s.charAt(0).toUpperCase()+s.slice(1)).classList.add('active');
    if(targetImg) bakePaintingStrokes();
}

async function bakePaintingStrokes() {
    isBaking = true;
    document.getElementById('bakeOverlay').style.display = 'flex';
    strokeSequence = [];
    paintingBuffer.background('#f4f3ec');
    lastBakedIdx = 0;
    
    targetImg.loadPixels();
    let d = targetImg.pixels;
    let rScale = Math.max(width/targetImg.width, height/targetImg.height);

    for(let i=0; i<80000; i++) {
        let rx = random(width), ry = random(height);
        let ix = Math.floor((rx - width/2)/rScale + targetImg.width/2);
        let iy = Math.floor((ry - height/2)/rScale + targetImg.height/2);
        let pIdx = (iy * targetImg.width + ix) * 4;
        if(d[pIdx+3] > 10) {
            let edge = Math.abs(d[pIdx]-d[pIdx+4] || 0);
            strokeSequence.push({ x:rx, y:ry, r:d[pIdx], g:d[pIdx+1], b:d[pIdx+2], lum:d[pIdx]*0.3 + d[pIdx+1]*0.59 + d[pIdx+2]*0.11, edge:edge, seed:random(), targetProg: 0 });
        }
    }

    // [핵심] 연필 스케치 선행 -> 채색 순서 정렬
    let sk = strokeSequence.filter(s => s.edge > 25).sort((a,b) => b.edge-a.edge);
    let col = strokeSequence.filter(s => s.edge <= 25).sort((a,b) => b.edge-a.edge);
    
    strokeSequence = [];
    sk.forEach((s, k) => { s.targetProg = map(k, 0, sk.length, 0, 0.3); s.isSketch = true; strokeSequence.push(s); });
    col.forEach((s, k) => { s.targetProg = map(k, 0, col.length, 0.3, 0.8); s.isSketch = false; strokeSequence.push(s); });
    
    isBaking = false;
    document.getElementById('bakeOverlay').style.display = 'none';
    document.getElementById('recBtn').disabled = false;
}

function draw() {
    if(!isPlaying || isBaking) return;
    let ct = loadedAudio.currentTime();
    let prog = ct / paintingDuration;
    
    // 누적 버퍼 렌더링
    let activeStrokes = strokeSequence.filter(s => s.targetProg <= prog);
    activeStrokes.forEach((s, i) => {
        if(i > lastBakedIdx) {
            let wave = fft.waveform();
            let xOff = (wave[i%1024] || 0) * 10;
            renderStroke(paintingBuffer, s, xOff, 1.0);
            lastBakedIdx = i;
        }
    });
    image(paintingBuffer, 0, 0);
    // [최종 페이드인]
    if(prog > 0.8) {
        tint(255, (prog-0.8)*500);
        image(targetImg, 0, 0, width, height);
    }
}

function renderStroke(g, s, xOff, size) {
    g.push();
    g.translate(s.x + xOff, s.y);
    if(s.isSketch) { g.stroke(0, 150); g.line(-5, 0, 5, 0); }
    else { g.noStroke(); g.fill(s.r, s.g, s.b, 200); g.ellipse(0, 0, 8*size, 8*size); }
    g.pop();
}

function togglePlayback() {
    isPlaying = !isPlaying;
    if(isPlaying) { loadedAudio.play(); } else { loadedAudio.stop(); }
}
function formatStudioTime(s) { return nf(floor(s/60), 2) + ":" + nf(floor(s%60), 2); }
function seekStudioTime(v) { loadedAudio.jump((v/100)*paintingDuration); }
</script>
</body>
</html>
