<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>v2.05</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
    * { box-sizing: border-box; }
    body { background: #050508; color: #fff; font-family: -apple-system, sans-serif; display: flex; height: 100vh; margin: 0; overflow: hidden; }
    .sidebar { width: 360px; background: #0f0f14; padding: 20px; display: flex; flex-direction: column; gap: 15px; border-right: 1px solid #222; overflow-y: auto; }
    .main { flex: 1; display: flex; flex-direction: column; position: relative; }
    .canvas-zone { flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; background: #020205; }
    
    h2 { font-size: 14px; color: #00ffcc; letter-spacing: 1px; border-bottom: 1px solid #333; padding-bottom: 8px; margin: 0; }
    .control-group { display: flex; flex-direction: column; gap: 5px; font-size: 11px; color: #ccc; }
    .control-group label { display: flex; justify-content: space-between; align-items: center; }
    .file-btn { border: 1px dashed #444; padding: 8px; cursor: pointer; color: #aaa; text-align: center; background: #111; border-radius: 4px; }
    
    input[type=range] { width: 50%; accent-color: #00ffcc; }
    input[type=number], select { background: #000; border: 1px solid #333; color: #00ffcc; padding: 4px; font-weight: bold; width: 65px; text-align: right; }
    
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
    .studio-btn { border: 1px solid #444; color: white; padding: 8px; background: none; cursor: pointer; font-size: 11px; border-radius: 4px; transition: 0.2s; }
    .studio-btn.active { border-color: #00ffcc; color: #00ffcc; background: rgba(0,255,204,0.1); }
    
    .player-bar { height: 60px; background: #0f0f14; border-top: 1px solid #222; display: flex; align-items: center; padding: 0 20px; gap: 15px; }
    #loader { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; color: #00ffcc; font-family: monospace; font-size: 14px; gap: 15px; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(0,255,204,0.2); border-top-color: #00ffcc; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="sidebar">
    <h2>Studio Settings</h2>
    
    <div class="control-group" style="border:1px solid #00ffcc; padding:10px; border-radius:4px; background:rgba(0,255,204,0.05);">
        <span style="color:#00ffcc; font-weight:bold;">1. ✏️ 스케치/선화 이미지 (0~30%)</span>
        <input type="file" id="sketchIn" accept="image/*" onchange="loadSketch(this.files)" class="file-btn">
    </div>

    <div class="control-group" style="border:1px solid #ff3e81; padding:10px; border-radius:4px; background:rgba(255,62,129,0.05);">
        <span style="color:#ff3e81; font-weight:bold;">2. 🎨 완성본/컬러 이미지 (30~80%)</span>
        <input type="file" id="imgIn" accept="image/*" onchange="loadTarget(this.files)" class="file-btn">
    </div>
    
    <div class="control-group">
        <span style="color:#fff; font-weight:bold;">3. 🎵 음악 오디오 (가속 동기화용)</span>
        <input type="file" id="audioIn" accept="audio/*" onchange="loadAudio(this.files)" class="file-btn">
    </div>

    <div class="control-group" style="border:1px solid #222; padding:10px; border-radius:4px; gap:8px;">
        <span style="color:#fff;">4. 아티스트 붓 터치 제어</span>
        <label>시작 방향: 
            <select id="startPosOpt" onchange="updateSettings()">
                <option value="top">위에서 아래로</option>
                <option value="bottom">아래서 위로</option>
                <option value="center">중앙에서 바깥으로</option>
            </select>
        </label>
        <label>선화 노이즈: <input type="range" id="noiseOpt" min="0" max="30" value="8"></label>
        <label>최소 붓 굵기: <input type="range" id="brushMin" min="1" max="10" value="2"></label>
        <label>최대 붓 굵기: <input type="range" id="brushMax" min="5" max="40" value="20"></label>
    </div>

    <div class="control-group" style="border:1px solid #222; padding:10px; border-radius:4px; gap:8px;">
        <span style="color:#fff;">5. 뷰포트 및 시간 설정</span>
        <label>비율: <select id="ratioOpt" onchange="updateSettings()"><option value="1.777">16:9</option><option value="0.562">9:16</option><option value="1.0">1:1</option></select></label>
        <label>크기: <input type="range" id="scaleOpt" min="0.5" max="2.0" step="0.1" value="1.0" oninput="updateSettings()"></label>
        <label>위치 X: <input type="range" id="posXOpt" min="-400" max="400" value="0" step="10" oninput="updateSettings()"></label>
        <label>위치 Y: <input type="range" id="posYOpt" min="-400" max="400" value="0" step="10" oninput="updateSettings()"></label>
        <label>배경 밝기: <input type="range" id="lightOpt" min="50" max="150" value="100" oninput="updateSettings()"></label>
        <label>드로잉 시간: <input type="number" id="timeOpt" value="30" onchange="updateSettings()"></label>
    </div>

    <div class="control-group">
        <span style="color:#fff; font-weight:bold;">6. 브러쉬 화풍 (채색 단계)</span>
        <div class="btn-grid">
            <button class="studio-btn active" id="sWater" onclick="changeStyle('watercolor')">수채화</button>
            <button class="studio-btn" id="sOil" onclick="changeStyle('oil')">유화</button>
            <button class="studio-btn" id="sPencil" onclick="changeStyle('pencil')">색연필</button>
        </div>
    </div>
    
    <button id="recBtn" onclick="togglePlayback()" style="margin-top:auto; padding:15px; background:#ff3e81; color:white; border:none; font-weight:bold; cursor:pointer; border-radius:4px;" disabled>🔴 START DRAWING</button>
</div>

<div class="main">
    <div id="loader">
        <div class="spinner"></div>
        <div id="bakeText">엔진 최적화 및 로딩 중...</div>
    </div>
    <div class="canvas-zone" id="canvasContainer"></div>
    <div class="player-bar">
        <span id="timeCurrent" style="font-family:monospace; color:#888;">00:00</span>
        <input type="range" id="timeline" style="flex:1; accent-color:#ff3e81;" value="0" min="0" max="100" step="0.1" oninput="seekTime(this.value)">
        <span id="timeTotal" style="font-family:monospace; color:#888;">00:00</span>
    </div>
</div>

<script>
let sketchImg = null;
let targetImg = null;
let loadedAudio, fft, isPlaying = false, isBaking = false;
let paintBuffer;
let renderQueue = []; 
let lastDrawnIdx = 0;
let simulatedTime = 0;
let lastMillis = 0;
let currentStyle = 'watercolor';
let noiseZ = 0;
let mediaRecorder, recordedChunks = [];

const paperColor = '#f0eee6'; 

function setup() {
    let cnv = createCanvas(1120, 630);
    cnv.parent('canvasContainer');
    paintBuffer = createGraphics(1120, 630);
    paintBuffer.background(paperColor);
    fft = new p5.FFT();
}

function getVal(id, parseFunc = parseFloat) { return parseFunc(document.getElementById(id).value); }

function updateSettings() {
    document.getElementById('timeTotal').innerText = formatTime(getVal('timeOpt'));
    let ratio = getVal('ratioOpt');
    let w = ratio > 1 ? 1120 : (ratio < 1 ? 450 : 800);
    let h = ratio > 1 ? 630 : (ratio < 1 ? 800 : 800);
    resizeCanvas(w, h);
    paintBuffer = createGraphics(w, h);
    paintBuffer.background(paperColor);
    
    if(sketchImg && targetImg) buildDualPathways();
}

function loadSketch(files) { if(files[0]) loadImage(URL.createObjectURL(files[0]), img => { sketchImg = img; checkReady(); }); }
function loadTarget(files) { if(files[0]) loadImage(URL.createObjectURL(files[0]), img => { targetImg = img; checkReady(); }); }
function loadAudio(files) { if(files[0]) loadedAudio = loadSound(URL.createObjectURL(files[0])); }

function checkReady() { 
    if(sketchImg && targetImg) { 
        document.getElementById('recBtn').disabled = false; 
        updateSettings(); 
    } 
}

function changeStyle(s) { 
    currentStyle = s; 
    document.querySelectorAll('.studio-btn').forEach(b => b.classList.remove('active')); 
    let btnId = 's' + (s === 'watercolor' ? 'Water' : (s === 'oil' ? 'Oil' : 'Pencil'));
    document.getElementById(btnId).classList.add('active'); 
    if(sketchImg && targetImg) { 
        paintBuffer.background(paperColor); 
        lastDrawnIdx = 0; 
        drawFrame(loadedAudio && isPlaying ? loadedAudio.currentTime() : simulatedTime); 
    } 
}

// ==========================================
// [초고속 엔진] 해상도 최적화 및 비동기 추적
// ==========================================
async function buildDualPathways() {
    if(isBaking) return;
    isBaking = true;
    let loader = document.getElementById('loader');
    let bakeText = document.getElementById('bakeText');
    loader.style.display = 'flex';
    bakeText.innerText = "1. 이미지 엔진 최적화 중...";
    await new Promise(r => setTimeout(r, 100)); // 브라우저 숨쉬기

    paintBuffer.background(paperColor);
    lastDrawnIdx = 0;
    renderQueue = [];
    
    // [해결책] 연산 속도를 위해 분석 캔버스를 최대 800px로 제한하여 그립니다.
    let maxDim = 800;
    let scaleRatio = Math.min(1.0, maxDim / Math.max(targetImg.width, targetImg.height));
    let analysisW = Math.floor(targetImg.width * scaleRatio);
    let analysisH = Math.floor(targetImg.height * scaleRatio);

    // 내부 분석용 버퍼 생성
    let sg = createGraphics(analysisW, analysisH);
    sg.image(sketchImg, 0, 0, analysisW, analysisH);
    sg.loadPixels();
    let sData = sg.pixels;

    let cg = createGraphics(analysisW, analysisH);
    cg.image(targetImg, 0, 0, analysisW, analysisH);
    cg.loadPixels();
    let cData = cg.pixels;

    bakeText.innerText = "2. 1번 스케치 선화 정밀 추출 중...";
    await new Promise(r => setTimeout(r, 100));

    // 화면 렌더링에 매핑할 배율 계산
    let displayScale = getVal('scaleOpt');
    let rScale = Math.max(width / targetImg.width, height / targetImg.height) * displayScale;
    let mapToCanvasX = (ax) => ((ax / scaleRatio) - targetImg.width/2) * rScale + width/2 + getVal('posXOpt', parseInt);
    let mapToCanvasY = (ay) => ((ay / scaleRatio) - targetImg.height/2) * rScale + height/2 + getVal('posYOpt', parseInt);

    // [해결책] Edge Walking (개미 걷기) 알고리즘으로 스케치 선을 한 줄씩 따냄
    let visited = new Uint8Array(analysisW * analysisH);
    let sketchPaths = [];
    
    for (let y = 1; y < analysisH - 1; y+=2) { // 2픽셀 단위로 스캔하여 속도 2배 향상
        for (let x = 1; x < analysisW - 1; x+=2) {
            let idx = y * analysisW + x;
            if (!visited[idx]) {
                let pIdx = idx * 4;
                let lum = sData[pIdx]*0.3 + sData[pIdx+1]*0.59 + sData[pIdx+2]*0.11;
                // 스케치 이미지에서 어두운 선을 발견하면
                if (lum < 150 && sData[pIdx+3] > 10) {
                    let currentLine = [];
                    let cx = x, cy = y;
                    
                    // 선을 따라가기
                    while(true) {
                        let cIdx = cy * analysisW + cx;
                        visited[cIdx] = 1;
                        currentLine.push({ x: mapToCanvasX(cx), y: mapToCanvasY(cy), r: sData[cIdx*4], g: sData[cIdx*4+1], b: sData[cIdx*4+2] });

                        // 주변 픽셀 탐색
                        let nextX = -1, nextY = -1;
                        for(let ny = cy - 2; ny <= cy + 2; ny++) {
                            for(let nx = cx - 2; nx <= cx + 2; nx++) {
                                if(nx >= 0 && nx < analysisW && ny >= 0 && ny < analysisH) {
                                    let nIdx = ny * analysisW + nx;
                                    if(!visited[nIdx]) {
                                        let nLum = sData[nIdx*4]*0.3 + sData[nIdx*4+1]*0.59 + sData[nIdx*4+2]*0.11;
                                        if(nLum < 150 && sData[nIdx*4+3] > 10) {
                                            nextX = nx; nextY = ny;
                                            break;
                                        }
                                    }
                                }
                            }
                            if(nextX !== -1) break;
                        }
                        
                        if(nextX !== -1) { cx = nextX; cy = nextY; } else break;
                    }
                    if (currentLine.length > 3) sketchPaths.push(currentLine); // 짧은 노이즈 제거
                }
            }
        }
    }

    bakeText.innerText = "3. 2번 컬러 이미지 색상 데이터 매핑 중...";
    await new Promise(r => setTimeout(r, 100));

    // 컬러 샘플링 (15,000개로 고정하여 성능 확보)
    let colorNodes = [];
    for(let i=0; i<15000; i++) {
        let ax = Math.floor(random(analysisW));
        let ay = Math.floor(random(analysisH));
        let pIdx = (ay * analysisW + ax) * 4;
        
        if(cData[pIdx+3] > 10 && (cData[pIdx]+cData[pIdx+1]+cData[pIdx+2]) < 730) {
            colorNodes.push({ x: mapToCanvasX(ax), y: mapToCanvasY(ay), r: cData[pIdx], g: cData[pIdx+1], b: cData[pIdx+2] });
        }
    }

    // 공간 동선 정렬
    let startPos = document.getElementById('startPosOpt').value;
    let getSortVal = (n) => {
        let chunkX = Math.floor(n.x / 40) * 40;
        let chunkY = Math.floor(n.y / 40) * 40;
        if(startPos === 'top') return chunkY * 1000 + chunkX;
        if(startPos === 'bottom') return (height - chunkY) * 1000 + chunkX;
        return dist(n.x, n.y, width/2, height/2); 
    };

    sketchPaths.sort((a, b) => getSortVal(a[0]) - getSortVal(b[0]));
    colorNodes.sort((a, b) => getSortVal(a) - getSortVal(b));

    // 타임라인 삽입
    let totalSketchNodes = sketchPaths.reduce((acc, line) => acc + line.length, 0);
    let sCount = 0;
    sketchPaths.forEach(line => {
        line.forEach(pt => {
            renderQueue.push({ type: 'sketch', x: pt.x, y: pt.y, r: pt.r, g: pt.g, b: pt.b, prog: map(sCount++, 0, totalSketchNodes, 0.0, 0.30) });
        });
        renderQueue.push({ type: 'lift', prog: map(sCount, 0, totalSketchNodes, 0.0, 0.30) });
    });

    colorNodes.forEach((pt, i) => {
        renderQueue.push({ type: 'color', x: pt.x, y: pt.y, r: pt.r, g: pt.g, b: pt.b, prog: map(i, 0, colorNodes.length, 0.30, 0.80) });
    });

    loader.style.display = 'none';
    isBaking = false;
    checkReady();
    
    if(!isPlaying) { simulatedTime = getVal('timeOpt') * 0.8; drawFrame(simulatedTime); document.getElementById('timeline').value = 80; }
    
    // 메모리 정리
    sg.remove(); cg.remove();
}

let prevPt = null;

function drawItem(g, item, energy) {
    if (item.type === 'lift') { prevPt = null; return; }
    if (!prevPt || prevPt.type !== item.type) { prevPt = item; return; }

    let dSq = dist(prevPt.x, prevPt.y, item.x, item.y);
    if (item.type === 'sketch' && dSq > 50) { prevPt = item; return; } 

    let noiseAmt = getVal('noiseOpt');
    let bMin = getVal('brushMin');
    let bMax = getVal('brushMax');

    let dynamicNoise = map(energy, 0, 255, 0, noiseAmt); 
    let midX = (prevPt.x + item.x) / 2 + (noise(prevPt.x*0.1, noiseZ) - 0.5) * dynamicNoise;
    let midY = (prevPt.y + item.y) / 2 + (noise(prevPt.y*0.1, noiseZ) - 0.5) * dynamicNoise;
    noiseZ += 0.05;

    if (item.type === 'sketch') {
        g.stroke(item.r, item.g, item.b, 220); 
        g.strokeWeight(bMin);
        g.noFill();
        g.beginShape(); g.vertex(prevPt.x, prevPt.y); g.quadraticVertex(midX, midY, item.x, item.y); g.endShape();
    } 
    else if (item.type === 'color') {
        let audioExpand = map(energy, 0, 255, 0, bMax * 0.5); 
        let finalSize = constrain(bMax * 0.7 + audioExpand + random(-2, 3), bMin, bMax * 1.5);
        
        let waveOff = map(energy, 0, 255, 0, 3) * (noise(item.x) - 0.5);
        let x2 = item.x + waveOff, y2 = item.y + waveOff;

        if (currentStyle === 'watercolor') {
            g.noStroke();
            let waterAlpha = 20; 
            g.fill(item.r, item.g, item.b, waterAlpha);
            
            g.beginShape();
            for(let a=0; a<TWO_PI; a+=1.0) {
                let rOff = finalSize + random(-finalSize*0.2, finalSize*0.2);
                g.vertex(x2 + rOff*cos(a), y2 + rOff*sin(a));
            }
            g.endShape(CLOSE);
            g.fill(item.r, item.g, item.b, waterAlpha * 0.5);
            g.ellipse(x2, y2, finalSize * 1.2);
            
        } else if (currentStyle === 'oil') {
            g.stroke(item.r, item.g, item.b, 240); g.strokeWeight(finalSize * 0.8);
            if (dSq < 60) g.line(prevPt.x, prevPt.y, x2, y2);
            else {
                let angle = random(TWO_PI);
                g.line(x2, y2, x2 + cos(angle)*finalSize, y2 + sin(angle)*finalSize); 
            }
        } else {
            g.stroke(item.r, item.g, item.b, 120); g.strokeWeight(bMin * 1.5);
            if (dSq < 50) g.line(prevPt.x, prevPt.y, x2, y2);
        }
    }
    prevPt = item;
}

function drawFrame(ct) {
    if(isBaking || renderQueue.length < 1) return;
    
    let isScrubbing = Math.abs(ct - lastTime) > 0.5;
    lastTime = ct;
    let totalTime = getVal('timeOpt');
    let targetProg = ct / totalTime;
    
    let low = 0, high = renderQueue.length - 1, expectedIdx = 0;
    while(low <= high) {
        let mid = Math.floor((low + high)/2);
        if(renderQueue[mid].prog <= targetProg) { expectedIdx = mid; low = mid + 1; }
        else { high = mid - 1; }
    }

    if (isScrubbing || expectedIdx < lastDrawnIdx) {
        paintBuffer.background(paperColor);
        lastDrawnIdx = 0; 
        prevPt = null;
    }

    let energy = 50; 
    if(isPlaying && loadedAudio && fft) { 
        fft.analyze(); 
        energy = fft.getEnergy("bass") * 0.6 + fft.getEnergy("mid") * 0.4; 
    }

    let speedFactor = (isPlaying && loadedAudio) ? map(energy, 0, 255, 0.2, 2.5) : 1.0; 
    let gap = expectedIdx - lastDrawnIdx;
    let step = Math.max(1, Math.floor(gap * speedFactor));
    if (gap <= 0) step = 0; 

    let drawUpToIdx = Math.min(renderQueue.length - 1, lastDrawnIdx + step);

    for(let i = lastDrawnIdx; i <= drawUpToIdx; i++) {
        drawItem(paintBuffer, renderQueue[i], energy);
    }
    lastDrawnIdx = drawUpToIdx + 1;

    let light = getVal('lightOpt');
    background(242 * (light/100), 239 * (light/100), 233 * (light/100));
    push();
    if(light !== 100) tint(255, 255 * (light/100));
    image(paintBuffer, 0, 0);
    pop();

    if(targetProg > 0.80 && targetImg) {
        let detailAlpha = map(targetProg, 0.80, 1.0, 0, 255);
        push();
        imageMode(CENTER);
        tint(255, detailAlpha);
        let rScale = Math.max(width / targetImg.width, height / targetImg.height) * getVal('scaleOpt');
        image(targetImg, width/2 + getVal('posXOpt', parseInt), height/2 + getVal('posYOpt', parseInt), targetImg.width*rScale, targetImg.height*rScale);
        pop();
    }
}

function draw() {
    if(!isPlaying) return;
    
    let totalTime = getVal('timeOpt');
    let ct = 0;

    if(loadedAudio) { ct = loadedAudio.currentTime(); } 
    else {
        simulatedTime += (millis() - lastMillis) / 1000;
        lastMillis = millis();
        ct = simulatedTime;
    }

    if(ct >= totalTime) { 
        ct = totalTime;
        togglePlayback(); 
        seekTime(100); 
        return; 
    }
    
    document.getElementById('timeCurrent').innerText = formatTime(ct);
    document.getElementById('timeline').value = (ct / totalTime) * 100;
    drawFrame(ct);
}

function togglePlayback() {
    if(isBaking) return;
    isPlaying = !isPlaying;
    let btn = document.getElementById('recBtn');
    if(isPlaying) {
        if(loadedAudio) { loadedAudio.rate(1.0); loadedAudio.play(); }
        lastMillis = millis(); 
        btn.innerText = "⏹ STOP & SAVE";
        btn.style.background = "#00ffcc"; btn.style.color = "#000";
        startRecording();
    } else {
        if(loadedAudio) loadedAudio.stop();
        btn.innerText = "🔴 START DRAWING";
        btn.style.background = "#ff3e81"; btn.style.color = "#fff";
        if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    }
}

function startRecording() {
    recordedChunks = [];
    let stream = document.querySelector('#canvasContainer canvas').captureStream(30);
    let options = { mimeType: 'video/webm' }; let ext = 'webm';
    if (MediaRecorder.isTypeSupported('video/mp4; codecs="avc1.42E01E"')) { options = { mimeType: 'video/mp4; codecs="avc1.42E01E"' }; ext = 'mp4'; } 
    else if (MediaRecorder.isTypeSupported('video/mp4')) { options = { mimeType: 'video/mp4' }; ext = 'mp4'; }
    try { mediaRecorder = new MediaRecorder(stream, options); } catch (e) { mediaRecorder = new MediaRecorder(stream); ext = 'webm'; }
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
        let a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'video/webm' }));
        a.download = `Optimized_DualCanvas_${Date.now()}.${ext}`; a.click();
    };
    mediaRecorder.start();
}

function seekTime(v) {
    if(isBaking) return;
    let totalTime = getVal('timeOpt');
    let targetSec = (parseFloat(v) / 100) * totalTime;
    
    if(isPlaying) {
        if(loadedAudio) loadedAudio.jump(targetSec);
        else simulatedTime = targetSec;
    } else { 
        simulatedTime = targetSec;
        document.getElementById('timeCurrent').innerText = formatTime(targetSec); 
        drawFrame(targetSec); 
    }
}

function formatTime(s) { return nf(floor(s/60), 2) + ":" + nf(floor(s%60), 2); }
</script>
</body>
</html>
