<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>v1.17</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
    body { background: #0a0a0f; color: #fff; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 350px; background: #12121a; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .main { flex: 1; display: flex; align-items: center; justify-content: center; }
    .studio-btn { border: 1px solid #333; color: white; padding: 10px; background: none; cursor: pointer; }
    .studio-btn.active { border-color: #00ffcc; color: #00ffcc; }
</style>
</head>
<body>
<div class="sidebar">
    <h2>Studio Settings</h2>
    <input type="file" id="imgIn" onchange="loadTarget(this.files)" class="file-btn">
    <input type="file" id="audioIn" onchange="loadAudio(this.files)" class="file-btn">
    <div class="btn-grid">
        <button class="studio-btn active" id="sPencil" onclick="changeStyle('pencil')">연필</button>
        <button class="studio-btn" id="sOil" onclick="changeStyle('oil')">유화</button>
        <button class="studio-btn" id="sImp" onclick="changeStyle('impressionism')">인상파</button>
    </div>
    <button id="recBtn" onclick="togglePlayback()" style="padding:15px; background:#ff3e81; color:white; border:none; cursor:pointer;" disabled>🔴 START DRAWING</button>
</div>
<div class="main" id="canvasContainer"></div>

<script>
let targetImg, loadedAudio, fft, isPlaying = false;
let currentStyle = 'pencil', paintingDuration = 30;
let fullPath = []; // 붓이 하나로 이어진 궤적 저장소

function setup() {
    let cnv = createCanvas(800, 600);
    cnv.parent('canvasContainer');
    fft = new p5.FFT();
    background('#f4f3ec');
}

function loadTarget(files) {
    loadImage(URL.createObjectURL(files[0]), img => { 
        targetImg = img;
        generateContinuousPath();
    });
}

// [핵심] 한 손으로 그리듯 하나로 이어진 선 생성 (Nearest Neighbor Pathing)
async function generateContinuousPath() {
    targetImg.loadPixels();
    let d = targetImg.pixels;
    let nodes = [];
    
    // 외곽선 경계 위주로 샘플링
    for(let i=0; i<5000; i++) {
        let x = random(targetImg.width), y = random(targetImg.height);
        let pIdx = (Math.floor(y)*targetImg.width + Math.floor(x))*4;
        if(d[pIdx+3] > 100) nodes.push({ x: x/targetImg.width*width, y: y/targetImg.height*height, r:d[pIdx], g:d[pIdx+1], b:d[pIdx+2], lum:d[pIdx]*0.3+d[pIdx+1]*0.59+d[pIdx+2]*0.11 });
    }

    // [로직] 시작점부터 가장 가까운 점을 차례대로 연결 (하나의 브러시 궤적)
    let path = [];
    let curr = nodes.shift();
    while(curr) {
        path.push(curr);
        let nearestIdx = 0, minDist = Infinity;
        for(let i=0; i<Math.min(nodes.length, 50); i++) {
            let distSq = dist(curr.x, curr.y, nodes[i].x, nodes[i].y);
            if(distSq < minDist) { minDist = distSq; nearestIdx = i; }
        }
        curr = nodes.splice(nearestIdx, 1)[0];
    }
    strokeSequence = path;
    document.getElementById('recBtn').disabled = false;
}

function draw() {
    if(!isPlaying) return;
    let ct = loadedAudio.currentTime();
    let prog = ct / paintingDuration;
    let activeIdx = Math.floor(strokeSequence.length * prog);
    
    // 하나의 브러시로 궤적을 따라 그리기
    let wave = fft.waveform();
    for(let i = max(0, activeIdx-5); i < activeIdx; i++) {
        let s = strokeSequence[i];
        let x = s.x + (wave[i%1024] || 0) * 5;
        let y = s.y;
        
        // 0~30%는 연필 스케치 선, 그 이후는 스타일 채색
        if(prog < 0.3) {
            stroke(0, 150); strokeWeight(1); line(strokeSequence[max(0,i-1)].x, strokeSequence[max(0,i-1)].y, x, y);
        } else {
            noStroke(); fill(s.r, s.g, s.b, 200); ellipse(x, y, 8, 8);
        }
    }
}

function togglePlayback() {
    isPlaying = !isPlaying;
    isPlaying ? loadedAudio.play() : loadedAudio.stop();
}
function loadAudio(files) { loadedAudio = loadSound(URL.createObjectURL(files[0])); }
function changeStyle(s) { currentStyle = s; }
</script>
</body>
</html>
