<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualizer 01 — DNA Helix</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #030308;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #c0c0ff;
    overflow: hidden;
  }
  .label {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 6px;
    color: #3030aa;
    text-transform: uppercase;
  }
  canvas { display: block; }
  .controls {
    position: fixed;
    bottom: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
  }
  .drop-zone {
    border: 1px dashed #2020aa;
    border-radius: 10px;
    padding: 12px 32px;
    cursor: pointer;
    font-size: 12px;
    color: #5050aa;
    letter-spacing: 2px;
    transition: all 0.3s;
  }
  .drop-zone:hover { border-color: #6060ff; color: #9090ff; }
  input[type=file] { display: none; }
  .btns { display: flex; gap: 10px; }
  button {
    background: rgba(20,20,60,0.7);
    border: 1px solid #2a2a66;
    border-radius: 6px;
    color: #8080cc;
    padding: 7px 16px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover { border-color: #5050aa; color: #e0e0ff; }
</style>
</head>
<body>
<div class="label">01 — DNA HELIX</div>
<canvas id="c"></canvas>
<div class="controls">
  <div class="drop-zone" id="dz">♫ MP3 드래그 또는 클릭</div>
  <div class="btns">
    <button id="playBtn" style="display:none">▶ PLAY</button>
  </div>
</div>
<input type="file" id="fi" accept="audio/*">
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let audioCtx, analyser, source, gainNode;
let isPlaying = false, audioBuffer, startTime = 0, pauseOffset = 0;
let t = 0;

document.getElementById('dz').addEventListener('click', () => document.getElementById('fi').click());
document.getElementById('dz').addEventListener('dragover', e => e.preventDefault());
document.getElementById('dz').addEventListener('drop', e => { e.preventDefault(); load(e.dataTransfer.files[0]); });
document.getElementById('fi').addEventListener('change', e => load(e.target.files[0]));

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    gainNode = audioCtx.createGain();
    gainNode.connect(audioCtx.destination);
    analyser.connect(gainNode);
  }
}

function load(file) {
  initAudio();
  if (source) { try { source.stop(); source.disconnect(); } catch(e){} }
  const reader = new FileReader();
  reader.onload = e => {
    audioCtx.decodeAudioData(e.target.result, buf => {
      audioBuffer = buf;
      pauseOffset = 0;
      document.getElementById('playBtn').style.display = '';
      play();
    });
  };
  reader.readAsArrayBuffer(file);
}

function play() {
  if (!audioBuffer) return;
  if (source) { try { source.stop(); source.disconnect(); } catch(e){} }
  source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(analyser);
  source.start(0, pauseOffset);
  startTime = audioCtx.currentTime - pauseOffset;
  isPlaying = true;
  document.getElementById('playBtn').textContent = '⏸ PAUSE';
  source.onended = () => { isPlaying = false; pauseOffset = 0; document.getElementById('playBtn').textContent = '▶ PLAY'; };
  draw();
}

document.getElementById('playBtn').addEventListener('click', () => {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (isPlaying) {
    pauseOffset = audioCtx.currentTime - startTime;
    source.stop();
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶ PLAY';
  } else { play(); }
});

let animId;
function draw() {
  animId = requestAnimationFrame(draw);
  t += 0.012;
  ctx.fillStyle = 'rgba(3,3,8,0.25)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  const freqData = new Uint8Array(analyser ? analyser.frequencyBinCount : 512);
  if (analyser) analyser.getByteFrequencyData(freqData);

  const strands = 2;
  const points = 64;
  const radius = Math.min(W, H) * 0.3;

  for (let s = 0; s < strands; s++) {
    const phaseOffset = (s / strands) * Math.PI;
    for (let i = 0; i < points; i++) {
      const angle = (i / points) * Math.PI * 2 + t + phaseOffset;
      const fi = Math.floor((i / points) * freqData.length / 2);
      const amp = (freqData[fi] || 0) / 255;
      const r = radius * (0.5 + amp * 0.7);
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r * 0.4 + Math.sin(angle * 3 + t) * radius * 0.15;
      const hue = 220 + s * 40 + amp * 60;
      const size = 2 + amp * 6;
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${hue}, 80%, 65%, ${0.6 + amp * 0.4})`;
      ctx.fill();
      if (i > 0) {
        const pAngle = ((i-1) / points) * Math.PI * 2 + t + phaseOffset;
        const pfi = Math.floor(((i-1) / points) * freqData.length / 2);
        const pamp = (freqData[pfi] || 0) / 255;
        const pr = radius * (0.5 + pamp * 0.7);
        const px = cx + Math.cos(pAngle) * pr;
        const py = cy + Math.sin(pAngle) * pr * 0.4 + Math.sin(pAngle * 3 + t) * radius * 0.15;
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(x, y);
        ctx.strokeStyle = `hsla(${hue}, 70%, 55%, ${0.3 + amp * 0.4})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }
    // Cross bridges
    for (let i = 0; i < points; i += 4) {
      const a1 = (i / points) * Math.PI * 2 + t;
      const a2 = (i / points) * Math.PI * 2 + t + Math.PI;
      const fi = Math.floor((i / points) * freqData.length / 2);
      const amp = (freqData[fi] || 0) / 255;
      const r1 = radius * (0.5 + amp * 0.7);
      const x1 = cx + Math.cos(a1) * r1;
      const y1 = cy + Math.sin(a1) * r1 * 0.4 + Math.sin(a1 * 3 + t) * radius * 0.15;
      const x2 = cx + Math.cos(a2) * r1;
      const y2 = cy + Math.sin(a2) * r1 * 0.4 + Math.sin(a2 * 3 + t) * radius * 0.15;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = `rgba(180,180,255,${amp * 0.3})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }
}
draw();
</script>
</body>
</html>
