<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PURE LED LYRIC VISUALIZER v10.0</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#050505; --panel:#0d0d12; --accent:#00ffcc; --accent-glow:rgba(0,255,204,0.3);
  --border:rgba(255,255,255,0.05); --text:#e0fff8; --muted:#334440;
}
body{background:var(--bg);color:var(--text);font-family:'Pretendard',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* TOP BAR */
.topbar{display:flex;align-items:center;padding:12px 20px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-size:12px;letter-spacing:4px;color:var(--accent);font-weight:900;text-transform:uppercase;}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:280px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px;overflow-y:auto;}
h3{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:12px;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:5px;}

.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:20px;}
.btn{background:transparent;border:1px solid var(--border);border-radius:4px;color:#888;padding:8px 4px;font-size:10px;cursor:pointer;transition:0.2s;}
.btn:hover{border-color:var(--accent);color:#fff;}
.btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,255,204,0.05);}
.btn.primary{background:var(--accent);color:#000;border:none;font-weight:bold;margin-top:10px;}

/* FILE BOX */
.file-box{border:1px dashed #333;padding:15px;text-align:center;margin-bottom:10px;cursor:pointer;border-radius:4px;font-size:11px;color:#666;}
.file-box.loaded{border-color:var(--accent);color:var(--accent);background:rgba(0,255,204,0.03);}
input[type=file]{display:none;}

/* OUTPUT */
.output-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative;}
#timeCode{position:absolute;top:20px;right:30px;font-family:monospace;color:var(--accent);font-size:12px;}

.stage-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;}
canvas{background:#000;box-shadow:0 0 50px rgba(0,0,0,0.5);border-radius:8px;}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">SPECTRUM ART LAB v10.0</span>
  <span style="margin-left:auto; font-size:9px; color:var(--muted);">PURE LED PERFORMANCE</span>
</div>

<div class="main">
  <div class="sidebar">
    <h3>Layout Ratio</h3>
    <div class="btn-grid">
      <button class="btn active" id="b169" onclick="setAspect('16:9')">16:9 Horizontal</button>
      <button class="btn" id="b916" onclick="setAspect('9:16')">9:16 Vertical</button>
    </div>

    <h3>Audio & Lyrics</h3>
    <div class="file-box" id="mBox" onclick="document.getElementById('mIn').click()">1. Load MP3<input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleMusic(this.files)"></div>
    <div class="file-box" id="sBox" onclick="document.getElementById('sIn').click()">2. Load SRT<input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)"></div>

    <h3 style="margin-top:20px;">Sensitivity</h3>
    <input type="range" id="sens" min="0.5" max="3" step="0.1" value="1.0" style="width:100%; accent-color:var(--accent);">
    
    <button class="btn primary" id="startBtn" onclick="togglePlay()">START PERFORMANCE</button>
    <button class="btn" style="margin-top:5px;" onclick="resetAll()">RESET</button>
  </div>

  <div class="output-area">
    <div id="timeCode">00:00.00</div>
    <div class="stage-wrap">
      <canvas id="stage"></canvas>
    </div>
  </div>
</div>

<script>
// --- STATE ---
let aspect = '16:9';
let audioCtx, analyser, source, audioBuffer, isPlaying = false, startTime = 0, pauseOffset = 0;
let srtCues = [], activeCueIdx = -1, lineHistory = [], flyingChars = [], pressedKeys = {};
let charSpawnQueue = [], lastCharSpawnTime = 0, currentTargetDelay = 0.1;
const canvas = document.getElementById('stage'), ctx = canvas.getContext('2d');

// --- HANGEUL MAP ---
const ROWS = [
  ['ㅂ','ㅈ','ㄷ','ㄱ','ㅅ','ㅛ','ㅕ','ㅑ','ㅐ','ㅔ'],
  ['ㅁ','ㄴ','ㅇ','ㄹ','ㅎ','ㅗ','ㅓ','ㅏ','ㅣ'],
  ['ㅋ','ㅌ','ㅊ','ㅍ','ㅠ','ㅜ','ㅡ']
];
const KOR_MAP = {'ㅃ':'ㅂ','ㅉ':'ㅈ','ㄸ':'ㄷ','ㄲ':'ㄱ','ㅆ':'ㅅ','ㅒ':'ㅐ','ㅖ':'ㅔ','ㅘ':'ㅗ','ㅙ':'ㅗ','ㅚ':'ㅗ','ㅝ':'ㅜ','ㅞ':'ㅜ','ㅟ':'ㅜ','ㅢ':'ㅡ'};

function charToKey(ch) {
  let c = ch.toUpperCase();
  if (KOR_MAP[c]) c = KOR_MAP[c];
  for (const row of ROWS) { for (const k of row) { if (k === c) return c; } }
  return (c === ' ') ? 'SPACE' : null;
}

function decompose(str) {
    let res = '';
    str.split('').forEach(ch => {
      const code = ch.charCodeAt(0) - 44032;
      if (code >= 0 && code < 11172) {
        const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
        const jung = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
        const jong = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
        res += cho[Math.floor(code/588)] + jung[Math.floor((code%588)/28)] + jong[code%28];
      } else res += ch;
    });
    return res;
}

// --- CORE ---
function setAspect(a) {
  aspect = a;
  document.getElementById('b169').classList.toggle('active', a === '16:9');
  document.getElementById('b916').classList.toggle('active', a === '9:16');
  resize();
}

function resize() {
  const container = canvas.parentElement;
  const cw = container.clientWidth, ch = container.clientHeight;
  if(aspect === '16:9') {
    canvas.width = Math.min(cw, ch * 1.77); canvas.height = canvas.width / 1.77;
  } else {
    canvas.height = Math.min(ch, cw * 1.77); canvas.width = canvas.height / 1.77;
  }
}
window.onresize = resize; resize();

function handleMusic(files) {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const reader = new FileReader();
  reader.onload = e => audioCtx.decodeAudioData(e.target.result, buf => { 
    audioBuffer = buf; document.getElementById('mBox').classList.add('loaded');
  });
  reader.readAsArrayBuffer(files[0]);
}

function handleSRT(files) {
  const reader = new FileReader();
  reader.onload = e => {
    const blocks = e.target.result.trim().split(/\n\s*\n/);
    srtCues = blocks.map(b => {
      const lines = b.split('\n');
      if(lines.length < 2) return null;
      const t = lines[1].match(/(\d+:\d+:\d+,\d+) --> (\d+:\d+:\d+,\d+)/);
      if(!t) return null;
      const txt = lines.slice(2).join(' ').trim();
      return { start: toSec(t[1]), end: toSec(t[2]), text: txt, decomposed: decompose(txt) };
    }).filter(x => x);
    document.getElementById('sBox').classList.add('loaded');
  };
  reader.readAsText(files[0]);
}
function toSec(s){ const m = s.match(/(\d+):(\d+):(\d+),(\d+)/); return +m[1]*3600 + +m[2]*60 + +m[3] + +m[4]/1000; }

async function togglePlay() {
  if(!audioBuffer || srtCues.length === 0) return alert("MP3와 SRT를 먼저 로드하세요.");
  if(audioCtx.state === 'suspended') await audioCtx.resume();
  if(isPlaying) { pauseOffset = audioCtx.currentTime - startTime; source.stop(); isPlaying = false; }
  else {
    source = audioCtx.createBufferSource(); source.buffer = audioBuffer;
    analyser = audioCtx.createAnalyser(); source.connect(analyser); analyser.connect(audioCtx.destination);
    source.start(0, pauseOffset); startTime = audioCtx.currentTime - pauseOffset; isPlaying = true;
    animate();
  }
  document.getElementById('startBtn').textContent = isPlaying ? "STOP" : "RESUME";
}

// --- RENDER ---
function computeLayout(W, H) {
  const kbdH = H * (aspect === '9:16' ? 0.4 : 0.45);
  const kbdY = H - kbdH;
  const keyAreaW = W * 0.9, keyAreaH = kbdH * 0.6, rowX = (W - keyAreaW)/2;
  const keyH = keyAreaH / 3.5, gap = keyH * 0.2, keys = [];
  
  ROWS.forEach((row, ri) => {
    const rW = keyAreaW * (ri===0?1 : ri===1?0.92 : 0.8);
    const rX = (W - rW)/2, kw = (rW - gap*(row.length-1))/row.length;
    row.forEach((label, ci) => {
      keys.push({ label, x: rX + ci*(kw+gap) + kw/2, y: kbdY + kbdH*0.2 + ri*(keyH+gap) + keyH/2, w: kw, h: keyH });
    });
  });
  keys.push({ label: 'SPACE', x: W/2, y: kbdY + kbdH*0.2 + 3*(keyH+gap) + keyH/2, w: keyAreaW*0.5, h: keyH });
  return { keys, kbdRect: { x:0, y:kbdY, w:W, h:kbdH } };
}

function animate() {
  if(!isPlaying) return;
  requestAnimationFrame(animate);
  const W = canvas.width, H = canvas.height, now = audioCtx.currentTime - startTime;
  ctx.fillStyle = '#050505'; ctx.fillRect(0,0,W,H);

  const { keys, kbdRect } = computeLayout(W, H);
  
  // 1. LED Keyboard Grid
  ctx.strokeStyle = '#1a2220'; ctx.lineWidth = 2;
  ctx.strokeRect(kbdRect.x+10, kbdRect.y+10, kbdRect.w-20, kbdRect.h-20);
  
  keys.forEach(k => {
    const pressed = pressedKeys[k.label];
    ctx.save();
    ctx.beginPath(); 
    const r = 4;
    ctx.roundRect(k.x-k.w/2, k.y-k.h/2, k.w, k.h, r);
    ctx.strokeStyle = pressed ? `rgba(0,255,204,${pressed.alpha})` : '#1a2522';
    ctx.stroke();
    if(pressed) {
      ctx.fillStyle = `rgba(0,255,204,${pressed.alpha * 0.2})`;
      ctx.shadowBlur = pressed.alpha * 20; ctx.shadowColor = '#00ffcc';
      ctx.fill();
    }
    ctx.fillStyle = pressed ? '#fff' : '#2a3532';
    ctx.font = `${k.h*0.4}px monospace`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(k.label === 'SPACE' ? '' : k.label, k.x, k.y);
    ctx.restore();
    if(pressed) { pressed.alpha -= 0.05; if(pressed.alpha <= 0) delete pressedKeys[k.label]; }
  });

  // 2. SRT & Typing
  let cueIdx = srtCues.findIndex(c => now >= c.start && now <= c.end);
  if(cueIdx !== -1 && cueIdx !== activeCueIdx) {
    if(activeCueIdx !== -1) { lineHistory.push(srtCues[activeCueIdx].text); if(lineHistory.length > 2) lineHistory.shift(); }
    activeCueIdx = cueIdx;
    const c = srtCues[activeCueIdx];
    currentTargetDelay = ((c.end - c.start) * 0.85) / Math.max(1, c.decomposed.length);
    charSpawnQueue = c.decomposed.split(''); lastCharSpawnTime = now;
  }

  const sens = parseFloat(document.getElementById('sens').value);
  if(charSpawnQueue.length > 0 && (now - lastCharSpawnTime > currentTargetDelay/sens)) {
    const ch = charSpawnQueue.shift(); lastCharSpawnTime = now;
    const kLabel = charToKey(ch);
    if(kLabel) {
      const k = keys.find(x => x.label === kLabel);
      if(k) {
        pressedKeys[kLabel] = { alpha: 1.0 };
        flyingChars.push({ ch, x: k.x, y: k.y, vx: (Math.random()-0.5)*4, vy: -(6+Math.random()*6), ay: 0.25, alpha: 1 });
      }
    }
  }

  // 3. Flying Chars
  flyingChars.forEach((fc, i) => {
    fc.x += fc.vx; fc.y += fc.vy; fc.vy += fc.ay; fc.alpha -= 0.02;
    ctx.save(); ctx.globalAlpha = fc.alpha;
    ctx.font = `bold ${W*0.05}px monospace`; ctx.fillStyle = '#00ffcc';
    ctx.shadowBlur = 15; ctx.shadowColor = '#00ffcc';
    ctx.fillText(fc.ch, fc.x, fc.y); ctx.restore();
    if(fc.alpha <= 0) flyingChars.splice(i, 1);
  });

  // 4. 3-Line Subtitles
  const fs = Math.max(20, Math.min(W*0.06, kbdRect.y*0.15)), lh = fs * 1.7;
  const currentText = srtCues[activeCueIdx] ? srtCues[activeCueIdx].text : "";
  const progress = srtCues[activeCueIdx] ? 1 - (charSpawnQueue.length / srtCues[activeCueIdx].decomposed.length) : 0;
  const typed = currentText.substring(0, Math.floor(currentText.length * progress));

  const all = [...lineHistory]; if(activeCueIdx !== -1) all.push(typed);
  const startY = (kbdRect.y/2) - ((all.length*lh)/2) + fs;

  all.forEach((line, i) => {
    ctx.save(); ctx.font = `900 ${fs}px Pretendard`; ctx.textAlign = 'center';
    ctx.fillStyle = (i === all.length-1 && activeCueIdx !== -1) ? '#00ffcc' : '#334440';
    if(i === all.length-1) { ctx.shadowBlur = 15; ctx.shadowColor = '#00ffcc'; }
    ctx.fillText(line, W/2, startY + i*lh); ctx.restore();
  });

  document.getElementById('timeCode').textContent = new Date(now*1000).toISOString().substr(14, 8);
}

function resetAll() {
    if(source) source.stop();
    isPlaying = false; pauseOffset = 0; activeCueIdx = -1; lineHistory = []; flyingChars = [];
    document.getElementById('startBtn').textContent = "START PERFORMANCE";
    ctx.clearRect(0,0,canvas.width,canvas.height);
}

// polyfill for roundRect
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
    this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r); return this;
  };
}
</script>
</body>
</html>
