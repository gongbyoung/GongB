<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM ART LAB v7.5 — Multi-Aspect Master</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    :root { --accent: #00ffcc; --bg: #050505; }
    body { background-color: var(--bg); font-family: 'Pretendard', sans-serif; overflow: hidden; height: 100vh; }
    
    /* 비주얼 영역: 가로/세로 비율 고정 */
    .viz-container {
        position: relative;
        width: 100%;
        height: 100%;
        background-color: #000;
        background-size: contain;
        background-position: center center;
        background-repeat: no-repeat;
    }
    
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
    
    /* 오버레이 UI */
    .ui-layer { position: absolute; inset: 0; z-index: 20; display: flex; flex-direction: column; pointer-events: none; }
    .interactive { pointer-events: auto; }
    
    .lyric-text {
        position: absolute;
        top: 20%;
        width: 100%;
        text-align: center;
        font-size: clamp(1.5rem, 5vw, 3rem);
        font-weight: 900;
        color: var(--accent);
        text-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
    }
</style>
</head>
<body>

<div class="ui-layer">
    <div class="flex justify-between items-center p-4 bg-black/60 backdrop-blur-md border-b border-white/10 interactive">
        <h1 class="text-xs font-black tracking-widest text-[#00ffcc]">SPECTRUM ART LAB v7.5</h1>
        <div id="timeDisplay" class="text-xs font-mono text-[#00ffcc]">00:00.00</div>
    </div>

    <div class="absolute left-4 top-20 w-56 space-y-4 interactive">
        <div class="p-4 bg-black/80 rounded-lg border border-white/10">
            <h3 class="text-[10px] text-gray-500 uppercase mb-3 tracking-tighter">1. Aspect & Background</h3>
            <div class="grid grid-cols-2 gap-2 mb-4">
                <button onclick="setAspect('16:9')" class="text-[9px] border border-white/20 py-1 hover:border-[#00ffcc] active:scale-95 transition">16:9 가로</button>
                <button onclick="setAspect('9:16')" class="text-[9px] border border-white/20 py-1 hover:border-[#00ffcc] active:scale-95 transition">9:16 세로</button>
            </div>
            <div class="space-y-2">
                <button onclick="changeBG('keyboard1.png')" class="w-full text-[9px] border border-white/20 py-1 text-left px-2">타자기 (Type A)</button>
                <button onclick="changeBG('keyboard2.png')" class="w-full text-[9px] border border-white/20 py-1 text-left px-2">키보드 (Type B)</button>
            </div>
        </div>

        <div class="p-4 bg-black/80 rounded-lg border border-white/10">
            <h3 class="text-[10px] text-gray-500 uppercase mb-3">2. Audio & Lyrics</h3>
            <label class="block border border-dashed border-gray-600 p-2 text-center text-[10px] text-gray-400 cursor-pointer hover:bg-white/5 mb-2">
                MP3 로드 <input type="file" id="audioIn" accept="audio/*" class="hidden" onchange="loadMusic(this.files)">
            </label>
            <label class="block border border-dashed border-gray-600 p-2 text-center text-[10px] text-gray-400 cursor-pointer hover:bg-white/5">
                SRT 로드 <input type="file" id="srtIn" accept=".srt" class="hidden" onchange="loadSRT(this.files)">
            </label>
        </div>
    </div>

    <div id="lyricDisplay" class="lyric-text"></div>

    <div class="mt-auto p-6 bg-gradient-to-t from-black to-transparent flex items-center gap-4 interactive">
        <button onclick="resetPerformance()" class="text-xs text-gray-400 px-4 py-2 hover:text-white">RESET</button>
        <button id="mainBtn" onclick="togglePerformance()" class="bg-[#00ffcc] text-black text-xs font-black px-8 py-3 rounded-full shadow-[0_0_20px_rgba(0,255,204,0.4)]">START PERFORMANCE</button>
        <div id="statusText" class="text-[10px] text-gray-600 flex-1 text-right">Waiting for assets...</div>
    </div>
</div>

<div id="vizFrame" class="viz-container" style="background-image: url('keyboard1.png');">
    <canvas id="mainCanvas"></canvas>
</div>

<script>
    // --- 키 매핑 (가로/세로 비율 보정 포함) ---
    const keyMap = {
        'ㅂ':{x:0.12, y:0.56}, 'ㅈ':{x:0.17, y:0.56}, 'ㄷ':{x:0.23, y:0.56}, 'ㄱ':{x:0.29, y:0.56}, 'ㅅ':{x:0.35, y:0.56},
        'ㅁ':{x:0.14, y:0.66}, 'ㄴ':{x:0.20, y:0.66}, 'ㅇ':{x:0.26, y:0.66}, 'ㄹ':{x:0.32, y:0.66}, 'ㅎ':{x:0.38, y:0.66},
        'ㅋ':{x:0.16, y:0.76}, 'ㅌ':{x:0.22, y:0.76}, 'ㅊ':{x:0.28, y:0.76}, 'ㅍ':{x:0.34, y:0.76},
        'default': {x: 0.5, y: 0.85}
    };

    let audioCtx, analyser, source, audioBuffer, srtData = [];
    let isPlaying = false, startTime = 0, pauseOffset = 0;
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [], flares = [];

    // --- 유틸리티: 한글 분해 ---
    function decompose(str) {
        const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
        const jung = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
        const jong = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
        let res = [];
        for (let i = 0; i < str.length; i++) {
            const code = str.charCodeAt(i) - 44032;
            if (code >= 0 && code <= 11172) {
                res.push(cho[Math.floor(code / 588)]);
                res.push(jung[Math.floor((code % 588) / 28)]);
                const j = code % 28; if (j !== 0) res.push(jong[j]);
            } else res.push(str[i]);
        }
        return res.filter(c => c.trim() !== "");
    }

    // --- 화면 설정 ---
    function setAspect(ratio) {
        const frame = document.getElementById('vizFrame');
        if (ratio === '16:9') {
            frame.style.width = '100vw'; frame.style.height = '56.25vw';
            frame.style.maxWidth = '100%'; frame.style.maxHeight = '100%';
        } else {
            frame.style.width = '56.25vh'; frame.style.height = '100vh';
            frame.style.maxWidth = '100%'; frame.style.maxHeight = '100%';
        }
        resize();
    }

    function changeBG(name) {
        document.getElementById('vizFrame').style.backgroundImage = `url('${name}')`;
    }

    // --- 파일 로드 ---
    function loadMusic(files) {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const reader = new FileReader();
        reader.onload = (e) => {
            audioCtx.decodeAudioData(e.target.result, (buf) => {
                audioBuffer = buf;
                document.getElementById('statusText').textContent = "Audio Ready.";
            });
        };
        reader.readAsArrayBuffer(files[0]);
    }

    function loadSRT(files) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2,}|\n*$)/g;
            let m; srtData = [];
            while ((m = regex.exec(e.target.result)) !== null) {
                srtData.push({
                    start: toSec(m[2]), end: toSec(m[3]),
                    text: m[4].replace(/\n/g, ' '),
                    tokens: decompose(m[4])
                });
            }
            document.getElementById('statusText').textContent = "Lyrics Synced.";
        };
        reader.readAsText(files[0]);
    }

    function toSec(t) {
        const [h, m, s] = t.split(':'); const [sec, ms] = s.split(',');
        return parseInt(h) * 3600 + parseInt(m) * 60 + parseInt(sec) + parseInt(ms) / 1000;
    }

    // --- 퍼포먼스 제어 ---
    async function togglePerformance() {
        if (!audioBuffer) return alert("음악 파일을 먼저 로드하세요.");
        if (audioCtx.state === 'suspended') await audioCtx.resume();

        if (isPlaying) {
            pauseOffset = audioCtx.currentTime - startTime;
            source.stop(); isPlaying = false;
            document.getElementById('mainBtn').textContent = "RESUME PERFORMANCE";
        } else {
            source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser); analyser.connect(audioCtx.destination);
            source.start(0, pauseOffset);
            startTime = audioCtx.currentTime - pauseOffset;
            isPlaying = true;
            document.getElementById('mainBtn').textContent = "STOP PERFORMANCE";
            animate();
        }
    }

    function resetPerformance() {
        particles = []; flares = [];
        ctx.clearRect(0,0,canvas.width,canvas.height);
        document.getElementById('lyricDisplay').textContent = "";
    }

    function resize() {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
    }
    window.onresize = resize; resize();

    // --- 메인 애니메이션 ---
    let lastIdx = -1, tokenIdx = 0;

    function animate() {
        if (!isPlaying) return;
        requestAnimationFrame(animate);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const now = audioCtx.currentTime - startTime;
        const lineIdx = srtData.findIndex(l => now >= l.start && now <= l.end);

        // 시간 코드
        const timeStr = new Date(now * 1000).toISOString().substr(14, 8);
        document.getElementById('timeDisplay').textContent = timeStr;

        if (lineIdx !== -1) {
            const line = srtData[lineIdx];
            document.getElementById('lyricDisplay').textContent = line.text;
            if (lineIdx !== lastIdx) { tokenIdx = 0; lastIdx = lineIdx; }

            const freq = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(freq);
            const amp = freq[10] / 255;

            if (amp > 0.6 && tokenIdx < line.tokens.length) {
                const token = line.tokens[tokenIdx];
                const pos = keyMap[token] || keyMap['default'];
                const kX = pos.x * canvas.width;
                const kY = pos.y * canvas.height;

                flares.push({ x: kX, y: kY, life: 1.0 });
                particles.push({
                    t: token, x: kX, y: kY,
                    tx: canvas.width / 2 + (Math.random()-0.5)*200,
                    ty: canvas.height * 0.2,
                    p: 0, s: 24 + amp*40, a: amp
                });
                tokenIdx++;
            }
        }

        // 효과 그리기
        flares.forEach((f, i) => {
            f.life -= 0.05;
            const grd = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, 80);
            grd.addColorStop(0, `rgba(0, 255, 204, ${f.life})`);
            grd.addColorStop(1, 'transparent');
            ctx.fillStyle = grd;
            ctx.beginPath(); ctx.arc(f.x, f.y, 100, 0, Math.PI*2); ctx.fill();
            if(f.life <= 0) flares.splice(i, 1);
        });

        particles.forEach((p, i) => {
            p.p += 0.03;
            const cx = p.x + (p.tx - p.x) * p.p;
            const cy = p.y + (p.ty - p.y) * p.p - Math.sin(p.p * Math.PI) * 150;
            ctx.save();
            ctx.font = `900 ${p.s}px Pretendard`;
            ctx.fillStyle = `rgba(0, 255, 204, ${1 - p.p})`;
            ctx.shadowBlur = p.a * 30; ctx.shadowColor = "#00ffcc";
            ctx.fillText(p.t, cx, cy);
            ctx.restore();
            if(p.p >= 1) particles.splice(i, 1);
        });
    }
</script>
</body>
</html>
