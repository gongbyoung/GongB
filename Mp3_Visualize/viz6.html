<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEYBOARD LYRIC VISUALIZER v9.2</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0e0d; --panel:#0d1412; --panel2:#111a18; --border:rgba(0,255,180,0.15);
  --accent:#00ffb4; --accent2:#00cc90; --text:#b0ffe0; --muted:#336655; --muted2:#558866; --red:#ff4455;
}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh;display:flex;flex-direction:column;}

.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-size:13px;letter-spacing:5px;color:var(--accent);font-weight:700;}
.version{font-size:9px;letter-spacing:3px;color:var(--muted2);}

.main{display:flex;flex:1;overflow:hidden;min-height:0;}

.sidebar{width:270px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;gap:0;overflow-y:auto;padding-bottom:20px;}
.sidebar::-webkit-scrollbar{width:3px;}.sidebar::-webkit-scrollbar-thumb{background:var(--muted);}

.sb-section{padding:14px 16px 10px;border-bottom:1px solid var(--border);}
.sb-label{font-size:9px;letter-spacing:4px;color:var(--muted2);text-transform:uppercase;margin-bottom:10px;}

.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
.toggle-btn{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted2);padding:8px 4px;font-family:'Courier New',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .2s;text-align:center;}
.toggle-btn:hover{border-color:var(--accent);color:var(--text);}
.toggle-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,255,180,.08);}

.file-btn{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border);border-radius:6px;padding:10px 12px;cursor:pointer;transition:all .2s;margin-bottom:6px;background:transparent;}
.file-btn:hover{border-color:var(--accent2);}
.file-btn.loaded{border-color:var(--accent);background:rgba(0,255,180,.06);}
.file-btn span{font-size:11px;letter-spacing:1px;color:var(--muted2);}
.file-btn.loaded span{color:var(--accent);}
.file-btn .check{font-size:14px;color:var(--accent);}
input[type=file]{display:none;}

.kbd-img-slot{border:1px dashed var(--border);border-radius:6px;padding:8px 12px;cursor:pointer;transition:all .2s;margin-bottom:6px;text-align:center;font-size:10px;color:var(--muted2);letter-spacing:1px;}
.kbd-img-slot:hover{border-color:var(--accent2);color:var(--text);}
.kbd-img-slot.loaded{border-color:var(--accent);color:var(--accent);}
.kbd-preview{width:100%;height:60px;object-fit:cover;border-radius:4px;margin-top:6px;display:none;}

.sens-row{display:flex;align-items:center;gap:8px;margin-top:4px;}
.sens-label{font-size:9px;letter-spacing:2px;color:var(--muted);white-space:nowrap;}
input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer;}

.output-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px;background:var(--bg);overflow:auto;gap:12px;}

.action-row{display:flex;align-items:center;gap:10px;width:100%;}
.act-btn{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted2);padding:8px 18px;font-family:'Courier New',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;transition:all .2s;}
.act-btn:hover{border-color:var(--accent);color:var(--text);}
.act-btn.primary{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}
.act-btn.primary:hover{background:var(--accent2);}
.act-btn.danger{border-color:var(--red);color:var(--red);}
.status-msg{margin-left:auto;font-size:11px;color:var(--muted2);letter-spacing:1px;}

.stage-wrap{position:relative;background:#000;border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0;}
.stage-wrap canvas{display:block;}

.srt-list{width:100%;max-height:160px;overflow-y:auto;background:var(--panel);border:1px solid var(--border);border-radius:6px;}
.srt-list::-webkit-scrollbar{width:3px;}.srt-list::-webkit-scrollbar-thumb{background:var(--muted);}
.srt-item{display:flex;align-items:baseline;gap:10px;padding:5px 12px;border-bottom:1px solid rgba(0,255,180,.05);font-size:11px;transition:background .2s;}
.srt-item.active{background:rgba(0,255,180,.08);}
.srt-time{color:var(--muted2);white-space:nowrap;min-width:90px;}
.srt-text{color:var(--text);}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">SPECTRUM ART LAB</span>
  <span class="version">v9.2 [KOR]</span>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-label">Aspect &amp; Theme</div>
      <div class="btn-grid">
        <button class="toggle-btn active" id="btn169" onclick="setAspect('16:9')">16:9 가로</button>
        <button class="toggle-btn" id="btn916" onclick="setAspect('9:16')">9:16 세로</button>
      </div>
      <div class="btn-grid">
        <button class="toggle-btn active" id="btnT1" onclick="setTheme('typewriter')">타자기</button>
        <button class="toggle-btn" id="btnT2" onclick="setTheme('keyboard')">키보드</button>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Loading Assets</div>
      <div class="file-btn" id="musicBtn" onclick="document.getElementById('musicInput').click()">
        <span id="musicLabel">Load Music (MP3)</span>
        <span class="check" id="musicCheck" style="display:none">✓</span>
      </div>
      <input type="file" id="musicInput" accept="audio/*">

      <div class="file-btn" id="srtBtn" onclick="document.getElementById('srtInput').click()">
        <span id="srtLabel">Load Subtitle (SRT)</span>
        <span class="check" id="srtCheck" style="display:none">✓</span>
      </div>
      <input type="file" id="srtInput" accept=".srt,.txt">

      <div class="sb-label" style="margin-top:12px;">Keyboard Image</div>
      <div class="kbd-img-slot" id="kbdSlot1" onclick="document.getElementById('kbdInput1').click()">
        타자기 이미지 (Type 1)
        <img id="kbdPreview1" class="kbd-preview">
      </div>
      <input type="file" id="kbdInput1" accept="image/*">

      <div class="kbd-img-slot" id="kbdSlot2" onclick="document.getElementById('kbdInput2').click()">
        키보드 이미지 (Type 2)
        <img id="kbdPreview2" class="kbd-preview">
      </div>
      <input type="file" id="kbdInput2" accept="image/*">
    </div>

    <div class="sb-section">
      <div class="sb-label">Sensitivity (Speed)</div>
      <div class="sens-row">
        <span class="sens-label">Slow</span>
        <input type="range" id="sensitivitySlider" min="0.5" max="3" step="0.1" value="1">
        <span class="sens-label">Fast</span>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Subtitle Preview</div>
      <div class="srt-list" id="srtList"></div>
    </div>
  </div>

  <div class="output-area" id="outputArea">
    <div class="action-row">
      <button class="act-btn danger" onclick="resetAll()">RESET</button>
      <button class="act-btn primary" id="resumeBtn" onclick="togglePlay()">START</button>
      <span class="status-msg" id="statusMsg">Ready to start!</span>
    </div>
    <div class="stage-wrap" id="stageWrap">
      <canvas id="stage"></canvas>
    </div>
  </div>
</div>

<script>
// --- STATE ---
let aspect = '16:9';
let theme = 'typewriter';
let audioCtx, analyser, gainNode, audioSource;
let audioBuffer = null, isPlaying = false;
let startTime = 0, pauseOffset = 0, duration = 0;
let srtCues = [];
let activeCueIdx = -1;
let sensitivity = 1;
let kbdImage1 = null, kbdImage2 = null;
let flyingChars = [];
let pressedKeys = {};
let animId = null;
let vizT = 0;

let builtText = '';
let lastCueIdx = -1;
let charSpawnQueue = [];
let lastCharSpawnTime = 0;
let currentTargetDelay = 0.1; 

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');

// --- HANGEUL KEYBOARD LAYOUT (한글 배열로 수정) ---
const ROWS = [
  ['ㅂ','ㅈ','ㄷ','ㄱ','ㅅ','ㅛ','ㅕ','ㅑ','ㅐ','ㅔ'],
  ['ㅁ','ㄴ','ㅇ','ㄹ','ㅎ','ㅗ','ㅓ','ㅏ','ㅣ'],
  ['ㅋ','ㅌ','ㅊ','ㅍ','ㅠ','ㅜ','ㅡ']
];

// 쌍자음 및 영문을 기본 한글 키로 매핑
const KOR_MAP = {
  'ㅃ':'ㅂ', 'ㅉ':'ㅈ', 'ㄸ':'ㄷ', 'ㄲ':'ㄱ', 'ㅆ':'ㅅ',
  'ㅒ':'ㅐ', 'ㅖ':'ㅔ', 'ㅘ':'ㅗ', 'ㅙ':'ㅗ', 'ㅚ':'ㅗ', 'ㅝ':'ㅜ', 'ㅞ':'ㅜ', 'ㅟ':'ㅜ', 'ㅢ':'ㅡ',
  'ㄳ':'ㄱ', 'ㄵ':'ㄴ', 'ㄶ':'ㄴ', 'ㄺ':'ㄹ', 'ㄻ':'ㄹ', 'ㄼ':'ㄹ', 'ㄽ':'ㄹ', 'ㄾ':'ㄹ', 'ㄿ':'ㄹ', 'ㅀ':'ㄹ', 'ㅄ':'ㅂ'
};

const ENG_MAP = {
  'Q':'ㅂ','W':'ㅈ','E':'ㄷ','R':'ㄱ','T':'ㅅ','Y':'ㅛ','U':'ㅕ','I':'ㅑ','O':'ㅐ','P':'ㅔ',
  'A':'ㅁ','S':'ㄴ','D':'ㅇ','F':'ㄹ','G':'ㅎ','H':'ㅗ','J':'ㅓ','K':'ㅏ','L':'ㅣ',
  'Z':'ㅋ','X':'ㅌ','C':'ㅊ','V':'ㅍ','B':'ㅠ','N':'ㅜ','M':'ㅡ'
};

function charToKey(ch) {
  let c = ch.toUpperCase();
  
  if (KOR_MAP[c]) c = KOR_MAP[c];
  if (/[A-Z]/.test(c) && ENG_MAP[c]) c = ENG_MAP[c];

  for (const row of ROWS) {
    for (const k of row) { if (k === c) return c; }
  }
  if (/[0-9]/.test(c)) return c;
  if (c === ' ') return 'SPACE';
  return null;
}

function getStageSize() {
  const area = document.getElementById('outputArea');
  const aw = area.clientWidth - 64;
  const ah = area.clientHeight - 120;
  if (aspect === '16:9') {
    const w = Math.min(aw, Math.floor(ah * 16/9));
    return { w, h: Math.round(w * 9/16) };
  } else {
    const h = Math.min(ah, Math.floor(aw * 16/9));
    return { w: Math.round(h * 9/16), h };
  }
}

function resizeStage() {
  const { w, h } = getStageSize();
  canvas.width = w; canvas.height = h;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
}
window.addEventListener('resize', resizeStage);
resizeStage();

function setAspect(a) {
  aspect = a;
  document.getElementById('btn169').classList.toggle('active', a === '16:9');
  document.getElementById('btn916').classList.toggle('active', a === '9:16');
  resizeStage();
}
function setTheme(t) {
  theme = t;
  document.getElementById('btnT1').classList.toggle('active', t === 'typewriter');
  document.getElementById('btnT2').classList.toggle('active', t === 'keyboard');
}

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  gainNode = audioCtx.createGain();
  analyser.connect(gainNode);
  gainNode.connect(audioCtx.destination);
}

document.getElementById('musicInput').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  initAudio();
  const reader = new FileReader();
  reader.onload = ev => {
    audioCtx.decodeAudioData(ev.target.result, buf => {
      audioBuffer = buf;
      duration = buf.duration;
      document.getElementById('musicBtn').classList.add('loaded');
      document.getElementById('musicLabel').textContent = '✓ ' + f.name.replace(/\.[^.]+$/, '');
      document.getElementById('musicCheck').style.display = 'block';
      setStatus('Music loaded');
    });
  };
  reader.readAsArrayBuffer(f);
});

function playAudio() {
  if (!audioBuffer || !audioCtx) return;
  if (audioSource) { try { audioSource.stop(); audioSource.disconnect(); } catch(e){} }
  audioSource = audioCtx.createBufferSource();
  audioSource.buffer = audioBuffer;
  audioSource.connect(analyser);
  audioSource.start(0, pauseOffset);
  startTime = audioCtx.currentTime - pauseOffset;
  isPlaying = true;
  audioSource.onended = () => { if (isPlaying) { isPlaying = false; pauseOffset = 0; updatePlayBtn(); }};
  updatePlayBtn();
}

function togglePlay() {
  initAudio();
  if (!audioBuffer) { setStatus('Load MP3 first'); return; }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (isPlaying) {
    pauseOffset = audioCtx.currentTime - startTime;
    if (audioSource) { try { audioSource.stop(); } catch(e){} }
    isPlaying = false;
  } else {
    playAudio();
  }
  updatePlayBtn();
}

function updatePlayBtn() {
  document.getElementById('resumeBtn').textContent = isPlaying ? 'PAUSE' : 'START';
}

function getElapsed() {
  if (!audioCtx) return 0;
  return isPlaying ? (audioCtx.currentTime - startTime) : pauseOffset;
}

document.getElementById('srtInput').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    srtCues = parseSRT(ev.target.result);
    document.getElementById('srtBtn').classList.add('loaded');
    document.getElementById('srtLabel').textContent = `✓ SRT Loaded (${srtCues.length})`;
    document.getElementById('srtCheck').style.display = 'block';
    renderSRTList();
  };
  reader.readAsText(f);
});

function parseSRT(text) {
  const cues = [];
  const blocks = text.trim().split(/\n\s*\n/);
  for (const block of blocks) {
    const lines = block.trim().split('\n');
    if (lines.length < 2) continue;
    const timeLine = lines.find(l => l.includes('-->'));
    if (!timeLine) continue;
    const [startStr, endStr] = timeLine.split('-->');
    const start = srtTimeToSec(startStr.trim());
    const end = srtTimeToSec(endStr.trim());
    const textLines = lines.filter(l => !l.includes('-->') && !/^\d+$/.test(l.trim()));
    
    // Decompose Hangeul directly when parsing
    let decomposedText = '';
    textLines.join(' ').split('').forEach(ch => {
       const code = ch.charCodeAt(0) - 44032;
       if (code > -1 && code < 11172) {
           const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
           const jung = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
           const jong = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
           decomposedText += cho[Math.floor(code / 588)];
           decomposedText += jung[Math.floor((code % 588) / 28)];
           const j = code % 28; if (j !== 0) decomposedText += jong[j];
       } else {
           decomposedText += ch;
       }
    });

    if (decomposedText) cues.push({ start, end, text: textLines.join(' '), decomposedText });
  }
  return cues;
}

function srtTimeToSec(s) {
  const m = s.match(/(\d+):(\d+):(\d+)[,.](\d+)/);
  return m ? (+m[1]*3600 + +m[2]*60 + +m[3] + +m[4]/1000) : 0;
}

function renderSRTList() {
  const list = document.getElementById('srtList');
  list.innerHTML = srtCues.map((c,i) => `
    <div class="srt-item" id="srt-${i}">
      <span class="srt-time">${secToStr(c.start)}</span>
      <span class="srt-text">${c.text}</span>
    </div>`).join('');
}

function secToStr(s) {
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m+':'+(sec<10?'0':'')+sec;
}

function loadKbdImage(slot, previewId, slotId, input) {
  input.addEventListener('change', e => {
    const f = e.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        if (slot === 1) kbdImage1 = img; else kbdImage2 = img;
        const prev = document.getElementById(previewId);
        prev.src = ev.target.result;
        prev.style.display = 'block';
        document.getElementById(slotId).classList.add('loaded');
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(f);
  });
}
loadKbdImage(1, 'kbdPreview1', 'kbdSlot1', document.getElementById('kbdInput1'));
loadKbdImage(2, 'kbdPreview2', 'kbdSlot2', document.getElementById('kbdInput2'));

document.getElementById('sensitivitySlider').addEventListener('input', e => {
  sensitivity = parseFloat(e.target.value);
});

function resetAll() {
  if (audioSource) { try { audioSource.stop(); } catch(e){} }
  isPlaying = false; pauseOffset = 0; activeCueIdx = -1;
  flyingChars = []; pressedKeys = {}; vizT = 0; builtText = ''; lastCueIdx = -1;
  updatePlayBtn(); setStatus('Reset complete');
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

function setStatus(msg) { document.getElementById('statusMsg').textContent = msg; }

function computeKeyLayout(W, H) {
  const isPortrait = aspect === '9:16';
  const kbdHeightRatio = isPortrait ? 0.45 : 0.5;
  const kbdY = H * (1 - kbdHeightRatio);
  const kbdH = H * kbdHeightRatio;
  const kbdW = W;
  const margin = kbdW * 0.05;
  const keyAreaX = margin;
  const keyAreaY = kbdY + kbdH * 0.35;
  const keyAreaW = kbdW - margin * 2;
  const keyAreaH = kbdH * 0.58;
  const rowCount = ROWS.length;
  const keyH = keyAreaH / (rowCount + 0.5);
  const keyGap = keyH * 0.12;
  const keys = [];
  ROWS.forEach((row, ri) => {
    const n = row.length;
    const rowW = keyAreaW * (ri === 0 ? 1 : ri === 1 ? 0.92 : 0.76);
    const rowX = keyAreaX + (keyAreaW - rowW) / 2;
    const kw = (rowW - keyGap * (n - 1)) / n;
    const ky = keyAreaY + ri * (keyH + keyGap * 0.5);
    row.forEach((label, ci) => {
      const kx = rowX + ci * (kw + keyGap);
      keys.push({ label, x: kx + kw/2, y: ky + keyH/2, w: kw, h: keyH });
    });
  });
  const spaceW = keyAreaW * 0.4;
  const spaceX = keyAreaX + (keyAreaW - spaceW) / 2;
  const spaceY = keyAreaY + rowCount * (keyH + keyGap * 0.5);
  keys.push({ label: 'SPACE', x: spaceX + spaceW/2, y: spaceY + keyH*0.4, w: spaceW, h: keyH * 0.8 });
  return { keys, kbdRect: { x: 0, y: kbdY, w: kbdW, h: kbdH } };
}

function spawnChar(ch, keyX, keyY, color) {
  flyingChars.push({
    ch, x: keyX, y: keyY,
    vx: (Math.random() - 0.5) * 2.5,
    vy: -(4 + Math.random() * 5),
    ax: 0, ay: 0.18, alpha: 1,
    scale: 0.4 + Math.random() * 0.4,
    rot: (Math.random() - 0.5) * 0.8,
    rotV: (Math.random() - 0.5) * 0.08,
    color, life: 1
  });
}

function getColors() {
  return theme === 'typewriter'
    ? { key: '#e8e0cc', keyPress: '#00ffb4', fly: '#00ffb4', text: '#e8e0cc', bg: '#1a1510' }
    : { key: '#334455', keyPress: '#4488ff', fly: '#4488ff', text: '#aaccff', bg: '#080c14' };
}

// --- RENDER LOOP ---
function render() {
  animId = requestAnimationFrame(render);
  vizT += 0.012;
  const W = canvas.width, H = canvas.height;
  const elapsed = getElapsed();
  const col = getColors();
  const freq = analyser ? new Uint8Array(analyser.frequencyBinCount) : new Uint8Array(0);
  if(analyser) analyser.getByteFrequencyData(freq);

  ctx.fillStyle = col.bg;
  ctx.fillRect(0, 0, W, H);

  const { keys, kbdRect } = computeKeyLayout(W, H);

  let cue = null;
  for (let i = 0; i < srtCues.length; i++) {
    if (elapsed >= srtCues[i].start && elapsed < srtCues[i].end) {
      cue = srtCues[i]; activeCueIdx = i; break;
    }
  }

  if (activeCueIdx !== lastCueIdx) {
    document.querySelectorAll('.srt-item').forEach((el, i) => el.classList.toggle('active', i === activeCueIdx));
    if (activeCueIdx >= 0) {
      const el = document.getElementById('srt-' + activeCueIdx);
      if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      
      const cueDuration = cue.end - cue.start;
      const charCount = cue.decomposedText.length || 1;
      currentTargetDelay = (cueDuration * 0.9) / charCount; 
      
      charSpawnQueue = cue.decomposedText.split('');
      builtText = '';
      lastCharSpawnTime = elapsed;
    } else {
        builtText = '';
    }
    lastCueIdx = activeCueIdx;
  }

  // 타이핑 동기화
  if (charSpawnQueue.length > 0 && isPlaying) {
    const adjustedDelay = currentTargetDelay / Math.max(0.1, sensitivity);
    
    if (elapsed - lastCharSpawnTime > adjustedDelay) {
      const ch = charSpawnQueue.shift();
      lastCharSpawnTime = elapsed;
      const keyLabel = charToKey(ch);
      let kx = W/2, ky = kbdRect.y + kbdRect.h * 0.6;
      if (keyLabel) {
        const k = keys.find(k => k.label === keyLabel);
        if (k) { kx = k.x; ky = k.y; }
        pressedKeys[keyLabel] = { alpha: 1 };
      }
      if (ch.trim()) spawnChar(ch, kx, ky, col.fly);
      
      // 조합된 글자로 표기하기 위해, 화면 표시는 별도 로직이 필요하지만 
      // 이 코드에서는 날아가는 파편 용도이므로 builtText에 그대로 누적
      builtText += ch;
    }
  }

  const kbdImg = theme === 'typewriter' ? kbdImage1 : kbdImage2;
  if (kbdImg) {
    ctx.drawImage(kbdImg, kbdRect.x, kbdRect.y, kbdRect.w, kbdRect.h);
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(kbdRect.x, kbdRect.y, kbdRect.w, kbdRect.h);
  } else {
    drawFallbackKeyboard(ctx, W, H, keys, kbdRect, col);
  }

  // Key Press
  for (const [label, state] of Object.entries(pressedKeys)) {
    const k = keys.find(k => k.label === label);
    if (!k) continue;
    ctx.save();
    ctx.globalAlpha = state.alpha;
    ctx.fillStyle = col.keyPress;
    ctx.shadowColor = col.keyPress;
    ctx.shadowBlur = 18;
    const r = Math.min(k.w, k.h) * 0.45;
    roundRect(ctx, k.x - k.w*0.45, k.y - k.h*0.45, k.w*0.9, k.h*0.9, r);
    ctx.fill();
    ctx.restore();
    state.alpha -= 0.05;
    if (state.alpha <= 0) delete pressedKeys[label];
  }

  // Flying Chars
  flyingChars.forEach(fc => {
    fc.x += fc.vx; fc.y += fc.vy; fc.vy += fc.ay;
    fc.rot += fc.rotV; fc.alpha -= 0.01;
    if (fc.alpha > 0) {
      const fontSize = Math.max(14, W * 0.03 * (0.5 + fc.alpha * 0.5));
      ctx.save();
      ctx.globalAlpha = fc.alpha;
      ctx.translate(fc.x, fc.y);
      ctx.rotate(fc.rot);
      ctx.font = `bold ${fontSize}px 'Courier New', monospace`;
      ctx.fillStyle = fc.color;
      ctx.shadowBlur = 10; ctx.shadowColor = fc.color;
      ctx.textAlign = 'center'; ctx.fillText(fc.ch, 0, 0);
      ctx.restore();
    }
  });
  flyingChars = flyingChars.filter(fc => fc.alpha > 0);

  // 완성된 가사 출력 (자음/모음이 아닌 원본 문장 사용)
  let displayString = '';
  if (cue) {
      // 진행도에 맞춰 원본 글자 수를 계산해서 보여줌
      const progress = 1 - (charSpawnQueue.length / Math.max(1, cue.decomposedText.length));
      const charsToShow = Math.floor(cue.text.length * progress);
      displayString = cue.text.substring(0, charsToShow);
  }
  
  drawSubtitleArea(ctx, W, 0, kbdRect.y, displayString, col, elapsed);
}

function drawSubtitleArea(ctx, W, aY, aH, text, col, elapsed) {
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, aY, W, aH);
  if (!text) return;

  const fontSize = Math.max(18, Math.min(W * 0.05, aH * 0.15));
  const lineH = fontSize * 1.4;
  const maxW = W * 0.85;
  ctx.font = `bold ${fontSize}px 'Courier New', monospace`;
  
  const words = text.split('');
  let line = '', lines = [];
  for (const ch of words) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxW) { lines.push(line); line = ch; }
    else { line = test; }
  }
  lines.push(line);

  const totalH = lines.length * lineH;
  const startY = aY + aH * 0.5 - totalH / 2 + fontSize;

  lines.forEach((l, i) => {
    const y = startY + i * lineH;
    ctx.save();
    ctx.textAlign = 'center';
    ctx.fillStyle = col.text;
    ctx.shadowColor = col.fly;
    ctx.shadowBlur = 10;
    ctx.fillText(l, W/2, y);
    ctx.restore();
  });

  if (Math.floor(elapsed * 4) % 2 === 0) {
    const lastL = lines[lines.length-1] || '';
    const lw = ctx.measureText(lastL).width;
    ctx.fillStyle = col.fly;
    ctx.fillRect(W/2 + lw/2 + 5, startY + (lines.length-1)*lineH - fontSize*0.9, 3, fontSize);
  }
}

function drawFallbackKeyboard(ctx, W, H, keys, kbdRect, col) {
  ctx.fillStyle = theme === 'typewriter' ? '#2a2520' : '#181c22';
  roundRect(ctx, kbdRect.x + 10, kbdRect.y + 10, kbdRect.w - 20, kbdRect.h - 20, 10);
  ctx.fill();
  keys.forEach(k => {
    const r = Math.min(k.w, k.h) * 0.2;
    ctx.fillStyle = col.key;
    roundRect(ctx, k.x - k.w*0.4, k.y - k.h*0.4, k.w*0.8, k.h*0.8, r);
    ctx.fill();
    ctx.fillStyle = '#888';
    ctx.font = `${Math.min(k.w*0.4, 12)}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(k.label === 'SPACE' ? '' : k.label, k.x, k.y);
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r); ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h); ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r); ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
}

render();
</script>
</body>
