<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM ART LAB v7.9 — Performance Final</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#000; --panel:#0f0f15; --accent:#00ffcc; --border:rgba(255,255,255,0.08); }
body{ background:var(--bg); color:#fff; font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.logo{letter-spacing:4px; color:var(--accent); font-weight:800; font-size:12px;}

.container { display: grid; grid-template-columns: 280px 1fr; flex: 1; min-height: 0; }
.side-panel { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; z-index: 50; }

/* 시각화 영역 */
.viz-area { position: relative; background-color: #000; background-size: contain; background-position: center bottom; background-repeat: no-repeat; overflow: hidden; flex: 1; }
#artCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: transparent; pointer-events: none; }

.file-box { border: 1px dashed #444; padding: 12px; text-align: center; margin-bottom: 12px; cursor: pointer; border-radius: 4px; font-size: 11px; color: #888; transition: 0.2s;}
.file-box:hover { border-color: var(--accent); color: #fff; background: rgba(0,255,204,0.05); }

.bottom-ctrl { padding: 15px 30px; background: #000; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 20px; z-index: 50; }
.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 8px 16px; cursor: pointer; font-size: 10px; border-radius: 4px; }
.btn.primary { background: var(--accent); color: #000; border: none; font-weight: bold; }

#currentLyric { position: absolute; top: 15%; left: 0; width: 100%; text-align: center; font-size: 36px; color: var(--accent); font-weight: 900; pointer-events: none; text-shadow: 0 0 30px rgba(0,255,204,0.8); z-index: 30; }
#countdownOverlay { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); z-index: 100; font-size: 120px; color: var(--accent); font-weight: 900; }
#status { font-size: 10px; color: #444; flex: 1; text-align: right; }
</style>
</head>
<body>

<div id="countdownOverlay">3</div>

<div class="topbar">
  <div class="logo">SPECTRUM ART LAB v7.9</div>
  <div id="timeCode" style="font-family:monospace; color:var(--accent); font-size: 14px;">00:00.00</div>
</div>

<div class="container">
  <div class="side-panel">
    <h3>1. Aspect & Theme</h3>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-bottom:10px;">
        <button class="btn" onclick="setAspect('16:9')">16:9 가로</button>
        <button class="btn" onclick="setAspect('9:16')">9:16 세로</button>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-bottom:20px;">
        <button class="btn" onclick="changeBG('keyboard1.png')">Type 1</button>
        <button class="btn" onclick="changeBG('keyboard2.png')">Type 2</button>
    </div>
    
    <h3>2. Music & SRT</h3>
    <div class="file-box" onclick="document.getElementById('mIn').click()">1. MP3 로드<input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleMusic(this.files)"></div>
    <div class="file-box" onclick="document.getElementById('sIn').click()">2. SRT 로드<input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)"></div>

    <h3>3. Settings</h3>
    <div style="margin-bottom:15px;">
        <label style="font-size:9px; color:#777;">SENSITIVITY (반응도)</label>
        <input type="range" id="pSens" min="1" max="10" value="9" style="width:100%; accent-color:var(--accent);">
    </div>
    <div>
        <label style="font-size:9px; color:#777;">LIFE LIMIT (자막 유지)</label>
        <input type="range" id="lifeLimit" min="1" max="5" value="2" style="width:100%; accent-color:var(--accent);">
    </div>
  </div>

  <div class="viz-area" id="bgLayer">
    <canvas id="artCanvas"></canvas>
    <div id="currentLyric"></div>
    <div class="bottom-ctrl">
      <button class="btn" onclick="resetArt()">RESET</button>
      <button class="btn primary" id="playBtn" onclick="startWithCountdown()">START PERFORMANCE</button>
      <div id="status">Ready.</div>
    </div>
  </div>
</div>

<script>
// --- 정밀 키보드 맵핑 ---
const keyMap = {
  'ㅂ':{x:0.12,y:0.56},'ㅈ':{x:0.17,y:0.56},'ㄷ':{x:0.23,y:0.56},'ㄱ':{x:0.29,y:0.56},'ㅅ':{x:0.35,y:0.56},'ㅛ':{x:0.41,y:0.56},'ㅕ':{x:0.47,y:0.56},'ㅑ':{x:0.53,y:0.56},'ㅐ':{x:0.59,y:0.56},'ㅔ':{x:0.65,y:0.56},
  'ㅁ':{x:0.14,y:0.66},'ㄴ':{x:0.20,y:0.66},'ㅇ':{x:0.26,y:0.66},'ㄹ':{x:0.32,y:0.66},'ㅎ':{x:0.38,y:0.66},'ㅗ':{x:0.44,y:0.66},'ㅓ':{x:0.50,y:0.66},'ㅏ':{x:0.56,y:0.66},'ㅣ':{x:0.62,y:0.66},
  'ㅋ':{x:0.16,y:0.76},'ㅌ':{x:0.22,y:0.76},'ㅊ':{x:0.28,y:0.76},'ㅍ':{x:0.34,y:0.76},'ㅠ':{x:0.40,y:0.76},'ㅜ':{x:0.46,y:0.76},'ㅡ':{x:0.52,y:0.76},
  'default': {x: 0.38, y: 0.88}
};

function decomposeHangeul(str) {
  const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
  const jung = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
  const jong = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
  let res = [];
  for (let i = 0; i < str.length; i++) {
    const code = str.charCodeAt(i) - 44032;
    if (code > -1 && code < 11172) {
      res.push(cho[Math.floor(code / 588)]);
      res.push(jung[Math.floor((code % 588) / 28)]);
      const j = code % 28; if (j !== 0) res.push(jong[j]);
    } else res.push(str.charAt(i));
  }
  return res.filter(c => c.trim() !== "");
}

class ArtChar {
  constructor(char, x, y, size, color, lineCounter) {
    this.char = char; this.x = x; this.y = y; this.size = size;
    this.color = color; this.bornAt = lineCounter;
    this.alpha = 1.0; this.noise = 0; this.isDead = false;
  }
  update(currentCounter, limit) {
    if (currentCounter - this.bornAt >= limit) {
      this.alpha -= 0.02; this.noise += 0.5; this.x += (Math.random()-0.5)*2;
    }
    if (this.alpha <= 0) this.isDead = true;
  }
  draw(ctx) {
    ctx.save(); ctx.globalAlpha = this.alpha;
    ctx.font = `900 ${this.size}px Pretendard`; ctx.fillStyle = this.color;
    ctx.shadowBlur = this.alpha * 15; ctx.shadowColor = this.color;
    ctx.fillText(this.char, this.x + this.noise, this.y); ctx.restore();
  }
}

let srtData = [], audioCtx, analyser, source, audioBuffer, isPlaying = false, startTime = 0, pauseOffset = 0;
const canvas = document.getElementById('artCanvas'), ctx = canvas.getContext('2d');
let artObjects = [], flares = [], globalLineCounter = 0, lastLineIdx = -1, charPtr = 0;

function setAspect(ratio) {
    const layer = document.getElementById('bgLayer');
    if(ratio === '16:9') { layer.style.maxWidth = '100%'; layer.style.aspectRatio = '16/9'; }
    else { layer.style.maxWidth = '56.25vh'; layer.style.aspectRatio = '9/16'; }
    setTimeout(resize, 100);
}
function changeBG(name) { document.getElementById('bgLayer').style.backgroundImage = `url('${name}')`; }

function handleSRT(files) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2,}|\n*$)/g;
    let m; srtData = [];
    while ((m = regex.exec(e.target.result)) !== null) {
      srtData.push({ start: timeToSec(m[2]), end: timeToSec(m[3]), text: m[4].replace(/\n/g, ' '), chars: decomposeHangeul(m[4]) });
    }
    document.getElementById('status').textContent = "SRT Ready.";
  };
  reader.readAsText(files[0]);
}

function timeToSec(t) { const [h, m, s] = t.split(':'); const [sec, ms] = s.split(','); return parseInt(h)*3600 + parseInt(m)*60 + parseInt(sec) + parseInt(ms)/1000; }

function handleMusic(files) {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const reader = new FileReader();
  reader.onload = (e) => {
    audioCtx.decodeAudioData(e.target.result, (buf) => { audioBuffer = buf; document.getElementById('status').textContent = "Audio Ready."; });
  };
  reader.readAsArrayBuffer(files[0]);
}

async function startWithCountdown() {
    if(!audioBuffer || srtData.length === 0) { alert("MP3와 SRT 파일을 먼저 로드해주세요."); return; }
    const overlay = document.getElementById('countdownOverlay');
    overlay.style.display = 'flex';
    let count = 3;
    overlay.textContent = count;
    const timer = setInterval(() => {
        count--;
        if(count > 0) { overlay.textContent = count; }
        else { clearInterval(timer); overlay.style.display = 'none'; togglePlay(); }
    }, 1000);
}

async function togglePlay() {
  if(audioCtx.state === 'suspended') await audioCtx.resume();
  if(isPlaying) { pauseOffset = audioCtx.currentTime - startTime; source.stop(); isPlaying = false; document.getElementById('playBtn').textContent = "RESUME"; }
  else {
    source = audioCtx.createBufferSource(); source.buffer = audioBuffer;
    analyser = audioCtx.createAnalyser(); source.connect(analyser); analyser.connect(audioCtx.destination);
    source.start(0, pauseOffset); startTime = audioCtx.currentTime - pauseOffset;
    isPlaying = true; document.getElementById('playBtn').textContent = "STOP";
    animate();
  }
}

function resetArt() { artObjects = []; flares = []; ctx.clearRect(0,0,canvas.width,canvas.height); document.getElementById('currentLyric').textContent = ""; }
function resize() { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; }
window.onresize = resize; resize();

function animate() {
  if(!isPlaying) return;
  requestAnimationFrame(animate);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const now = audioCtx.currentTime - startTime;
  document.getElementById('timeCode').textContent = `${Math.floor(now/60).toString().padStart(2,'0')}:${(now%60).toFixed(2).padStart(5,'0')}`;

  const lineIdx = srtData.findIndex(l => now >= l.start && now <= l.end);
  const limit = parseInt(document.getElementById('lifeLimit').value);

  if (lineIdx !== -1) {
    const line = srtData[lineIdx];
    document.getElementById('currentLyric').textContent = line.text;
    if (lineIdx !== lastLineIdx) { charPtr = 0; lastLineIdx = lineIdx; globalLineCounter++; }

    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const amp = data[20] / 255;
    const sens = parseInt(document.getElementById('pSens').value) / 10;

    // 강제 각인 로직: 비트가 약해도 가사가 나오는 동안 최소한 한 글자씩은 찍히도록 함
    if (amp > (1.05 - sens) || Math.random() < 0.05) {
      const char = line.chars[charPtr % line.chars.length];
      const pos = keyMap[char] || keyMap['default'];
      const color = `rgba(0, 255, 204, 1)`;
      const size = 30 + amp * 70;

      artObjects.push(new ArtChar(char, canvas.width/2, canvas.height/2, size, color, globalLineCounter));
      artObjects.push(new ArtChar(char, Math.random()*canvas.width, Math.random()*canvas.height, size, color, globalLineCounter));
      flares.push({ x: pos.x * canvas.width, y: pos.y * canvas.height, life: 1.0 });
      charPtr++;
    }
  } else { document.getElementById('currentLyric').textContent = ""; }

  flares.forEach((f, i) => {
    f.life -= 0.08;
    const grd = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, 100);
    grd.addColorStop(0, `rgba(0, 255, 204, ${f.life})`); grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(f.x, f.y, 120, 0, Math.PI*2); ctx.fill();
    if(f.life <= 0) flares.splice(i, 1);
  });

  for (let i = artObjects.length - 1; i >= 0; i--) {
    artObjects[i].update(globalLineCounter, limit); artObjects[i].draw(ctx);
    if (artObjects[i].isDead) artObjects.splice(i, 1);
  }
}
</script>
</body>
</html>
