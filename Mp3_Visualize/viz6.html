<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM ART LAB v6.0 — Keyboard Sync</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#050505;
  --panel:#0f0f15;
  --accent:#00ffcc;
  --border:rgba(255,255,255,0.08);
}
body{
  background:var(--bg); color:#fff;
  font-family:'Pretendard', sans-serif;
  height:100vh; overflow:hidden; display: flex; flex-direction: column;
}

/* UI STRUCTURE */
.topbar{
  padding:12px 20px; background:var(--panel); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.logo{letter-spacing:4px; color:var(--accent); font-weight:800; font-size:12px;}

.container { display: grid; grid-template-columns: 240px 1fr; flex: 1; min-height: 0; }

.side-panel {
  background: var(--panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 15px; overflow-y: auto;
}

.viz-area { position: relative; background: #000; overflow: hidden; display: flex; flex-direction: column; }
#artCanvas { flex: 1; width: 100%; height: 100%; }

/* FILE LOADERS */
.file-box { border: 1px dashed #444; padding: 10px; text-align: center; margin-bottom: 10px; cursor: pointer; border-radius: 4px; font-size: 11px; color: #888; }
.file-box:hover { border-color: var(--accent); background: rgba(0,255,204,0.05); }

.bottom-ctrl {
  padding: 15px 25px; background: #000; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 20px;
}
.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 10px 20px; cursor: pointer; font-size: 11px; }
.btn.primary { background: var(--accent); color: #000; border: none; font-weight: bold; }

#currentLyric { 
  position: absolute; top: 20%; left: 0; width: 100%; text-align: center; 
  font-size: 24px; color: var(--accent); font-weight: bold; pointer-events: none;
  text-shadow: 0 0 20px rgba(0,255,204,0.6);
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM ART LAB v6.0 [KEYBOARD SYNC]</div>
  <div id="timeCode" style="font-family:monospace; color:var(--accent);">00:00.00</div>
</div>

<div class="container">
  <div class="side-panel">
    <h3>1. Music</h3>
    <div class="file-box" onclick="document.getElementById('mIn').click()">파일 선택<input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleMusic(this.files)"></div>
    <h3>2. SRT</h3>
    <div class="file-box" onclick="document.getElementById('sIn').click()">SRT 로드<input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)"></div>
    
    <div style="margin-top: auto; font-size: 9px; color: #555; line-height: 1.6;">
      * 키보드 자판 위치에서 글자가 튀어나와 중앙 가사를 완성합니다.<br>
      * SRT 싱크에 맞춰 LED 타이핑 퍼포먼스가 진행됩니다.
    </div>
  </div>

  <div class="viz-area">
    <canvas id="artCanvas"></canvas>
    <div id="currentLyric"></div>
    <div class="bottom-ctrl">
      <button class="btn" onclick="resetArt()">RESET</button>
      <button class="btn primary" id="playBtn" onclick="togglePlay()">START PERFORMANCE</button>
      <div id="trackName" style="font-size:11px; color:#444; flex:1; text-align:right;">Ready..</div>
    </div>
  </div>
</div>

<script>
// --- 키보드 좌표 맵핑 (한글 2벌식 기준 근사치) ---
const keyMap = {
  'ㄱ':{x:0.45, y:0.75}, 'ㄴ':{x:0.35, y:0.75}, 'ㄷ':{x:0.25, y:0.75}, 'ㄹ':{x:0.20, y:0.75},
  'ㅁ':{x:0.15, y:0.75}, 'ㅂ':{x:0.12, y:0.65}, 'ㅅ':{x:0.22, y:0.65}, 'ㅇ':{x:0.38, y:0.75},
  'ㅈ':{x:0.18, y:0.65}, 'ㅎ':{x:0.32, y:0.75}, 'ㅏ':{x:0.55, y:0.75}, 'ㅑ':{x:0.62, y:0.65},
  'ㅓ':{x:0.48, y:0.75}, 'ㅕ':{x:0.42, y:0.65}, 'ㅗ':{x:0.52, y:0.85}, 'ㅛ':{x:0.48, y:0.65},
  'ㅜ':{x:0.58, y:0.85}, 'ㅠ':{x:0.52, y:0.65}, 'ㅡ':{x:0.65, y:0.85}, 'ㅣ':{x:0.68, y:0.75},
  'default': {x: 0.5, y: 0.9} // 스페이스바 위치
};

function decomposeHangeul(str) {
  const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
  const jung = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
  const jong = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
  let res = [];
  for (let i = 0; i < str.length; i++) {
    const code = str.charCodeAt(i) - 44032;
    if (code > -1 && code < 11172) {
      res.push(cho[Math.floor(code / 588)]);
      res.push(jung[Math.floor((code % 588) / 28)]);
      const j = code % 28; if (j !== 0) res.push(jong[j]);
    } else res.push(str.charAt(i));
  }
  return res.filter(c => c.trim() !== "");
}

// --- 엔진 변수 ---
let srtData = [], audioCtx, analyser, source, audioBuffer, isPlaying = false, startTime = 0, pauseOffset = 0;
const canvas = document.getElementById('artCanvas'), ctx = canvas.getContext('2d');
let particles = [];

function handleSRT(files) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2,}|\n*$)/g;
    let matches; srtData = [];
    while ((matches = regex.exec(e.target.result)) !== null) {
      srtData.push({
        start: timeToSec(matches[2]), end: timeToSec(matches[3]),
        text: matches[4].replace(/\n/g, ' '),
        chars: decomposeHangeul(matches[4])
      });
    }
    alert("SRT 로드 완료");
  };
  reader.readAsText(files[0]);
}

function timeToSec(t) {
  const [h, m, s] = t.split(':'); const [sec, ms] = s.split(',');
  return parseInt(h) * 3600 + parseInt(m) * 60 + parseInt(sec) + parseInt(ms) / 1000;
}

function handleMusic(files) {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const reader = new FileReader();
  reader.onload = (e) => {
    audioCtx.decodeAudioData(e.target.result, (buf) => { audioBuffer = buf; alert("음악 로드 완료"); });
  };
  reader.readAsArrayBuffer(files[0]);
}

function togglePlay() {
  if(isPlaying) {
    pauseOffset = audioCtx.currentTime - startTime;
    source.stop(); isPlaying = false;
    document.getElementById('playBtn').textContent = "RESUME";
  } else if(audioBuffer) {
    source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    analyser = audioCtx.createAnalyser();
    source.connect(analyser); analyser.connect(audioCtx.destination);
    source.start(0, pauseOffset);
    startTime = audioCtx.currentTime - pauseOffset;
    isPlaying = true;
    document.getElementById('playBtn').textContent = "STOP PERFORMANCE";
    animate();
  }
}

function resetArt() { particles = []; ctx.clearRect(0,0,canvas.width,canvas.height); }

function resize() { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; }
window.onresize = resize; resize();

// --- Main Loop ---
let lastLineIdx = -1, charIdx = 0;

function animate() {
  if(!isPlaying) return;
  requestAnimationFrame(animate);

  // 배경 잔상 처리
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const now = audioCtx.currentTime - startTime;
  const lineIdx = srtData.findIndex(l => now >= l.start && now <= l.end);

  if (lineIdx !== -1) {
    const line = srtData[lineIdx];
    document.getElementById('currentLyric').textContent = line.text;
    if (lineIdx !== lastLineIdx) { charIdx = 0; lastLineIdx = lineIdx; }

    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const amp = data[10] / 255; // 저음역 비트 감지

    if (amp > 0.65 && charIdx < line.chars.length) {
      const char = line.chars[charIdx];
      const pos = keyMap[char] || keyMap['default'];
      
      // 파티클 생성: 키보드 위치 -> 중앙 가사 위치
      particles.push({
        char: char,
        x: pos.x * canvas.width,
        y: pos.y * canvas.height,
        targetX: canvas.width / 2 + (Math.random()-0.5)*100,
        targetY: canvas.height * 0.25,
        progress: 0,
        size: 20 + amp * 40,
        color: `hsla(${150 + amp*100}, 100%, 60%, 0.8)`
      });
      charIdx++;
    }
  }

  // 파티클 그리기
  particles.forEach((p, i) => {
    p.progress += 0.05;
    const curX = p.x + (p.targetX - p.x) * p.progress;
    const curY = p.y + (p.targetY - p.y) * p.progress;

    ctx.save();
    ctx.font = `bold ${p.size}px Pretendard`;
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 15;
    ctx.shadowColor = p.color;
    ctx.globalAlpha = 1 - p.progress * 0.5;
    ctx.fillText(p.char, curX, curY);
    ctx.restore();

    if (p.progress >= 1) particles.splice(i, 1);
  });
}
</script>
</body>
</html>
