<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM ART LAB v6.7 — Perfect Keyboard Sync</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#020202;
  --panel:#0d0d12;
  --accent:#00ffcc;
  --border:rgba(255,255,255,0.08);
}
body{
  background:var(--bg); color:#fff;
  font-family:'Pretendard', sans-serif;
  height:100vh; overflow:hidden; display: flex; flex-direction: column;
}

.topbar{
  padding:12px 20px; background:var(--panel); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.logo{letter-spacing:4px; color:var(--accent); font-weight:800; font-size:12px;}

.container { display: grid; grid-template-columns: 260px 1fr; flex: 1; min-height: 0; }

.side-panel {
  background: var(--panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 18px; overflow-y: auto; z-index: 10;
}

/* 캔버스 영역: 배경 이미지가 보일 수 있도록 설정 */
.viz-area { 
    position: relative; 
    background-color: #000; 
    background-size: contain; 
    background-position: center bottom; 
    background-repeat: no-repeat;
    overflow: hidden; 
    display: flex; 
    flex-direction: column; 
}
#artCanvas { flex: 1; width: 100%; height: 100%; position: relative; z-index: 5; }

.file-box { border: 1px dashed #444; padding: 10px; text-align: center; margin-bottom: 12px; cursor: pointer; border-radius: 4px; font-size: 11px; color: #888; }
.file-box:hover { border-color: var(--accent); background: rgba(0,255,204,0.05); }

.bottom-ctrl {
  padding: 15px 25px; background: #000; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 20px; z-index: 10;
}
.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 10px 20px; cursor: pointer; font-size: 10px; }
.btn.primary { background: var(--accent); color: #000; border: none; font-weight: bold; }

#currentLyric { 
  position: absolute; top: 15%; left: 0; width: 100%; text-align: center; 
  font-size: 32px; color: var(--accent); font-weight: 900; pointer-events: none;
  text-shadow: 0 0 30px rgba(0,255,204,0.8); z-index: 15;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM ART LAB v6.7 [PERFECT SYNC]</div>
  <div id="timeCode" style="font-family:monospace; color:var(--accent);">00:00.00</div>
</div>

<div class="container">
  <div class="side-panel">
    <h3>1. Background Image</h3>
    <div class="file-box" onclick="document.getElementById('imgIn').click()">키보드 이미지 업로드 (필수)<input type="file" id="imgIn" accept="image/*" style="display:none" onchange="handleImage(this.files)"></div>
    
    <h3>2. Music & SRT</h3>
    <div class="file-box" onclick="document.getElementById('mIn').click()">MP3 파일 선택<input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleMusic(this.files)"></div>
    <div class="file-box" onclick="document.getElementById('sIn').click()">SRT 자막 선택<input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)"></div>
    
    <div style="margin-top: auto; font-size: 9px; color: #555; line-height: 1.6;">
      * 이미지를 올리면 배경으로 고정됩니다.<br>
      * 가사에 맞춰 자판 LED가 터지며 글자가 발사됩니다.
    </div>
  </div>

  <div class="viz-area" id="bgLayer">
    <canvas id="artCanvas"></canvas>
    <div id="currentLyric"></div>
    <div class="bottom-ctrl">
      <button class="btn" onclick="resetArt()">RESET</button>
      <button class="btn primary" id="playBtn" onclick="togglePlay()">RUN PERFORMANCE</button>
      <div id="trackName" style="font-size:11px; color:#444; flex:1; text-align:right;">Ready to start.</div>
    </div>
  </div>
</div>

<script>
// --- 정밀 키보드 맵핑 (108키 이미지 기준 비율) ---
const keyPos = {
  'ㅂ':{x:0.11, y:0.55}, 'ㅈ':{x:0.16, y:0.55}, 'ㄷ':{x:0.22, y:0.55}, 'ㄱ':{x:0.28, y:0.55}, 'ㅅ':{x:0.34, y:0.55}, 'ㅛ':{x:0.40, y:0.55}, 'ㅕ':{x:0.46, y:0.55}, 'ㅑ':{x:0.52, y:0.55}, 'ㅐ':{x:0.58, y:0.55}, 'ㅔ':{x:0.64, y:0.55},
  'ㅁ':{x:0.13, y:0.65}, 'ㄴ':{x:0.19, y:0.65}, 'ㅇ':{x:0.25, y:0.65}, 'ㄹ':{x:0.31, y:0.65}, 'ㅎ':{x:0.37, y:0.65}, 'ㅗ':{x:0.43, y:0.65}, 'ㅓ':{x:0.49, y:0.65}, 'ㅏ':{x:0.55, y:0.65}, 'ㅣ':{x:0.61, y:0.65},
  'ㅋ':{x:0.15, y:0.75}, 'ㅌ':{x:0.21, y:0.75}, 'ㅊ':{x:0.27, y:0.75}, 'ㅍ':{x:0.33, y:0.75}, 'ㅠ':{x:0.39, y:0.75}, 'ㅜ':{x:0.45, y:0.75}, 'ㅡ':{x:0.51, y:0.75},
  'default': {x: 0.38, y: 0.85} // 스페이스바
};

function decomposeHangeul(str) {
  const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
  const jung = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
  const jong = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
  let res = [];
  for (let i = 0; i < str.length; i++) {
    const code = str.charCodeAt(i) - 44032;
    if (code > -1 && code < 11172) {
      res.push(cho[Math.floor(code / 588)]);
      res.push(jung[Math.floor((code % 588) / 28)]);
      const j = code % 28; if (j !== 0) res.push(jong[j]);
    } else res.push(str.charAt(i));
  }
  return res.filter(c => c.trim() !== "");
}

let srtData = [], audioCtx, analyser, source, audioBuffer, isPlaying = false, startTime = 0, pauseOffset = 0;
const canvas = document.getElementById('artCanvas'), ctx = canvas.getContext('2d');
let particles = [], flares = [];

function handleImage(files) {
  const url = URL.createObjectURL(files[0]);
  document.getElementById('bgLayer').style.backgroundImage = `url(${url})`;
}

function handleSRT(files) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2,}|\n*$)/g;
    let matches; srtData = [];
    while ((matches = regex.exec(e.target.result)) !== null) {
      srtData.push({
        start: timeToSec(matches[2]), end: timeToSec(matches[3]),
        text: matches[4].replace(/\n/g, ' '),
        chars: decomposeHangeul(matches[4])
      });
    }
  };
  reader.readAsText(files[0]);
}

function timeToSec(t) {
  const [h, m, s] = t.split(':'); const [sec, ms] = s.split(',');
  return parseInt(h) * 3600 + parseInt(m) * 60 + parseInt(sec) + parseInt(ms) / 1000;
}

function handleMusic(files) {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const reader = new FileReader();
  reader.onload = (e) => {
    audioCtx.decodeAudioData(e.target.result, (buf) => { audioBuffer = buf; });
  };
  reader.readAsArrayBuffer(files[0]);
}

function togglePlay() {
  if(isPlaying) {
    pauseOffset = audioCtx.currentTime - startTime;
    source.stop(); isPlaying = false;
    document.getElementById('playBtn').textContent = "RESUME";
  } else if(audioBuffer) {
    source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    analyser = audioCtx.createAnalyser();
    source.connect(analyser); analyser.connect(audioCtx.destination);
    source.start(0, pauseOffset);
    startTime = audioCtx.currentTime - pauseOffset;
    isPlaying = true;
    document.getElementById('playBtn').textContent = "STOP PERFORMANCE";
    animate();
  }
}

function resetArt() { particles = []; flares = []; ctx.clearRect(0,0,canvas.width,canvas.height); }

function resize() { 
  canvas.width = canvas.clientWidth; 
  canvas.height = canvas.clientHeight; 
}
window.onresize = resize; resize();

let lastLineIdx = -1, charIdx = 0;

function animate() {
  if(!isPlaying) return;
  requestAnimationFrame(animate);

  // 캔버스 초기화 (투명 배경 유지 위해 clearRect 사용)
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const now = audioCtx.currentTime - startTime;
  const lineIdx = srtData.findIndex(l => now >= l.start && now <= l.end);

  if (lineIdx !== -1) {
    const line = srtData[lineIdx];
    document.getElementById('currentLyric').textContent = line.text;
    if (lineIdx !== lastLineIdx) { charIdx = 0; lastLineIdx = lineIdx; }

    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const amp = data[20] / 255;

    // 음악 저음 비트에 맞춰 글자 발사
    if (amp > 0.65 && charIdx < line.chars.length) {
      const char = line.chars[charIdx];
      const pos = keyPos[char] || keyPos['default'];
      const kX = pos.x * canvas.width;
      const kY = pos.y * canvas.height;

      // LED Flare 추가 (자판 위치)
      flares.push({ x: kX, y: kY, life: 1.0, color: `rgba(0, 255, 204, 1)` });

      // 글자 생성 (키보드 위치 -> 화면 상단 중앙)
      particles.push({
        char: char,
        x: kX, y: kY,
        targetX: canvas.width / 2 + (Math.random()-0.5)*300,
        targetY: canvas.height * 0.15,
        progress: 0,
        size: 30 + amp * 60,
        color: `rgba(0, 255, 204, ${0.5 + amp*0.5})`
      });
      charIdx++;
    }
  }

  // 1. LED Flare 효과 그리기
  flares.forEach((f, i) => {
    f.life -= 0.08;
    ctx.save();
    const grd = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, 80);
    grd.addColorStop(0, f.color);
    grd.addColorStop(1, 'transparent');
    ctx.globalAlpha = f.life;
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(f.x, f.y, 100, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    if(f.life <= 0) flares.splice(i, 1);
  });

  // 2. 글자 파편 그리기 (포물선 궤적)
  particles.forEach((p, i) => {
    p.progress += 0.03;
    const curX = p.x + (p.targetX - p.x) * p.progress;
    // 포물선 효과: 중간에 솟아올랐다가 타겟으로 이동
    const curY = p.y + (p.targetY - p.y) * p.progress - Math.sin(p.progress * Math.PI) * 150;

    ctx.save();
    ctx.font = `900 ${p.size}px Pretendard`;
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 20;
    ctx.shadowColor = p.color;
    ctx.globalAlpha = 1 - p.progress * 0.7;
    ctx.fillText(p.char, curX, curY);
    ctx.restore();

    if (p.progress >= 1) particles.splice(i, 1);
  });
}
</script>
</body>
</html>
