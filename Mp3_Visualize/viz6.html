<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEYBOARD LYRIC VISUALIZER v9.3</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0e0d; --panel:#0d1412; --panel2:#111a18; --border:rgba(0,255,180,0.15);
  --accent:#00ffb4; --accent2:#00cc90; --text:#b0ffe0; --muted:#336655; --muted2:#558866; --red:#ff4455;
}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh;display:flex;flex-direction:column;}

.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-size:13px;letter-spacing:5px;color:var(--accent);font-weight:700;}
.version{font-size:9px;letter-spacing:3px;color:var(--muted2);}

.main{display:flex;flex:1;overflow:hidden;min-height:0;}
.sidebar{width:270px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;gap:0;overflow-y:auto;padding-bottom:20px;}
.sidebar::-webkit-scrollbar{width:3px;}.sidebar::-webkit-scrollbar-thumb{background:var(--muted);}

.sb-section{padding:14px 16px 10px;border-bottom:1px solid var(--border);}
.sb-label{font-size:9px;letter-spacing:4px;color:var(--muted2);text-transform:uppercase;margin-bottom:10px;}

.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
.toggle-btn{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted2);padding:8px 4px;font-family:'Courier New',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .2s;text-align:center;}
.toggle-btn:hover{border-color:var(--accent);color:var(--text);}
.toggle-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,255,180,.08);}

.file-btn{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border);border-radius:6px;padding:10px 12px;cursor:pointer;transition:all .2s;margin-bottom:6px;background:transparent;}
.file-btn:hover{border-color:var(--accent2);}
.file-btn.loaded{border-color:var(--accent);background:rgba(0,255,180,.06);}
.file-btn span{font-size:11px;letter-spacing:1px;color:var(--muted2);}
.file-btn.loaded span{color:var(--accent);}
.file-btn .check{font-size:14px;color:var(--accent);}
input[type=file]{display:none;}

.kbd-img-slot{border:1px dashed var(--border);border-radius:6px;padding:8px 12px;cursor:pointer;transition:all .2s;margin-bottom:6px;text-align:center;font-size:10px;color:var(--muted2);letter-spacing:1px;}
.kbd-img-slot:hover{border-color:var(--accent2);color:var(--text);}
.kbd-img-slot.loaded{border-color:var(--accent);color:var(--accent);}
.kbd-preview{width:100%;height:60px;object-fit:cover;border-radius:4px;margin-top:6px;display:none;}

.sens-row{display:flex;align-items:center;gap:8px;margin-top:4px;}
.sens-label{font-size:9px;letter-spacing:2px;color:var(--muted);white-space:nowrap;}
input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer;}

.output-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px;background:var(--bg);overflow:auto;gap:12px;}
.action-row{display:flex;align-items:center;gap:10px;width:100%;}
.act-btn{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted2);padding:8px 18px;font-family:'Courier New',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;transition:all .2s;}
.act-btn.primary{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}
.act-btn.danger{border-color:var(--red);color:var(--red);}

.stage-wrap{position:relative;background:#000;border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0;}
.stage-wrap canvas{display:block;}

.srt-list{width:100%;max-height:160px;overflow-y:auto;background:var(--panel);border:1px solid var(--border);border-radius:6px;}
.srt-item{display:flex;padding:5px 12px;font-size:11px;border-bottom:1px solid rgba(0,255,180,.05);}
.srt-item.active{background:rgba(0,255,180,.12); color:var(--accent);}
</style>
</head>
<body>

<div class="topbar"><span class="logo">SPECTRUM ART LAB</span><span class="version">v9.3 [3-LINE SCROLL]</span></div>

<div class="main">
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-label">Aspect & Theme</div>
      <div class="btn-grid">
        <button class="toggle-btn active" id="btn169" onclick="setAspect('16:9')">16:9 가로</button>
        <button class="toggle-btn" id="btn916" onclick="setAspect('9:16')">9:16 세로</button>
      </div>
      <div class="btn-grid">
        <button class="toggle-btn active" id="btnT1" onclick="setTheme('typewriter')">타자기</button>
        <button class="toggle-btn" id="btnT2" onclick="setTheme('keyboard')">키보드</button>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Loading Assets</div>
      <div class="file-btn" onclick="document.getElementById('musicInput').click()">
        <span id="musicLabel">Load Music (MP3)</span>
        <span class="check" id="musicCheck" style="display:none">✓</span>
      </div>
      <input type="file" id="musicInput" accept="audio/*">
      <div class="file-btn" onclick="document.getElementById('srtInput').click()">
        <span id="srtLabel">Load Subtitle (SRT)</span>
        <span class="check" id="srtCheck" style="display:none">✓</span>
      </div>
      <input type="file" id="srtInput" accept=".srt,.txt">

      <div class="sb-label" style="margin-top:12px;">Keyboard Image</div>
      <div class="kbd-img-slot" id="kbdSlot1" onclick="document.getElementById('kbdInput1').click()">타자기 (Type 1)<img id="kbdPreview1" class="kbd-preview"></div>
      <input type="file" id="kbdInput1" accept="image/*">
      <div class="kbd-img-slot" id="kbdSlot2" onclick="document.getElementById('kbdInput2').click()">키보드 (Type 2)<img id="kbdPreview2" class="kbd-preview"></div>
      <input type="file" id="kbdInput2" accept="image/*">
    </div>

    <div class="sb-section">
      <div class="sb-label">Sync Speed</div>
      <input type="range" id="sensitivitySlider" min="0.5" max="3" step="0.1" value="1" style="width:100%;">
    </div>

    <div class="sb-section"><div class="sb-label">Subtitle Preview</div><div class="srt-list" id="srtList"></div></div>
  </div>

  <div class="output-area" id="outputArea">
    <div class="action-row">
      <button class="act-btn danger" onclick="resetAll()">RESET</button>
      <button class="act-btn primary" id="resumeBtn" onclick="togglePlay()">START</button>
      <span id="statusMsg" style="font-size:11px; margin-left:auto; color:var(--muted2);">Ready.</span>
    </div>
    <div class="stage-wrap" id="stageWrap"><canvas id="stage"></canvas></div>
  </div>
</div>

<script>
// --- STATE ---
let aspect = '16:9', theme = 'typewriter';
let audioCtx, analyser, gainNode, audioSource, audioBuffer = null, isPlaying = false;
let startTime = 0, pauseOffset = 0, duration = 0, srtCues = [], activeCueIdx = -1;
let kbdImage1 = null, kbdImage2 = null, flyingChars = [], pressedKeys = {}, vizT = 0;

// Typing & Scroll State
let builtText = '';
let lineHistory = []; // 보관된 이전 가사들 (최대 2개)
let lastCueIdx = -1;
let charSpawnQueue = [], lastCharSpawnTime = 0, currentTargetDelay = 0.1;

const canvas = document.getElementById('stage'), ctx = canvas.getContext('2d');
const ROWS = [['ㅂ','ㅈ','ㄷ','ㄱ','ㅅ','ㅛ','ㅕ','ㅑ','ㅐ','ㅔ'],['ㅁ','ㄴ','ㅇ','ㄹ','ㅎ','ㅗ','ㅓ','ㅏ','ㅣ'],['ㅋ','ㅌ','ㅊ','ㅍ','ㅠ','ㅜ','ㅡ']];
const KOR_MAP = {'ㅃ':'ㅂ','ㅉ':'ㅈ','ㄸ':'ㄷ','ㄲ':'ㄱ','ㅆ':'ㅅ','ㅒ':'ㅐ','ㅖ':'ㅔ','ㅘ':'ㅗ','ㅙ':'ㅗ','ㅚ':'ㅗ','ㅝ':'ㅜ','ㅞ':'ㅜ','ㅟ':'ㅜ','ㅢ':'ㅡ'};

function charToKey(ch) {
  let c = ch.toUpperCase();
  if (KOR_MAP[c]) c = KOR_MAP[c];
  for (const row of ROWS) { for (const k of row) { if (k === c) return c; } }
  return (c === ' ') ? 'SPACE' : null;
}

function resizeStage() {
  const area = document.getElementById('outputArea');
  const aw = area.clientWidth - 64, ah = area.clientHeight - 120;
  let w, h;
  if (aspect === '16:9') { w = Math.min(aw, Math.floor(ah * 16/9)); h = Math.round(w * 9/16); }
  else { h = Math.min(ah, Math.floor(aw * 16/9)); w = Math.round(h * 9/16); }
  canvas.width = w; canvas.height = h;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
}
window.addEventListener('resize', resizeStage); resizeStage();

function setAspect(a) { aspect = a; resizeStage(); }
function setTheme(t) { theme = t; }

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser(); analyser.fftSize = 1024;
  gainNode = audioCtx.createGain(); analyser.connect(gainNode); gainNode.connect(audioCtx.destination);
}

document.getElementById('musicInput').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  initAudio();
  const reader = new FileReader();
  reader.onload = ev => {
    audioCtx.decodeAudioData(ev.target.result, buf => {
      audioBuffer = buf; duration = buf.duration;
      document.getElementById('musicBtn')?.classList.add('loaded');
      document.getElementById('musicCheck').style.display = 'block';
    });
  };
  reader.readAsArrayBuffer(f);
});

document.getElementById('srtInput').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    srtCues = parseSRT(ev.target.result);
    document.getElementById('srtCheck').style.display = 'block';
    renderSRTList();
  };
  reader.readAsText(f);
});

function parseSRT(text) {
  const cues = [];
  const blocks = text.trim().split(/\n\s*\n/);
  for (const block of blocks) {
    const lines = block.trim().split('\n');
    if (lines.length < 2) continue;
    const timeLine = lines.find(l => l.includes('-->'));
    const [start, end] = timeLine.split('-->').map(s => {
      const m = s.trim().match(/(\d+):(\d+):(\d+)[,.](\d+)/);
      return m ? +m[1]*3600 + +m[2]*60 + +m[3] + +m[4]/1000 : 0;
    });
    const content = lines.slice(lines.indexOf(timeLine)+1).join(' ').trim();
    let decomposed = '';
    content.split('').forEach(ch => {
      const code = ch.charCodeAt(0) - 44032;
      if (code >= 0 && code < 11172) {
        const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
        const jung = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
        const jong = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
        decomposed += cho[Math.floor(code/588)] + jung[Math.floor((code%588)/28)] + jong[code%28];
      } else decomposed += ch;
    });
    cues.push({ start, end, text: content, decomposed });
  }
  return cues;
}

function renderSRTList() {
  document.getElementById('srtList').innerHTML = srtCues.map((c,i) => `<div class="srt-item" id="srt-${i}">${c.text}</div>`).join('');
}

function togglePlay() {
  initAudio();
  if (!audioBuffer) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (isPlaying) { pauseOffset = audioCtx.currentTime - startTime; audioSource.stop(); isPlaying = false; }
  else {
    audioSource = audioCtx.createBufferSource(); audioSource.buffer = audioBuffer;
    audioSource.connect(analyser); audioSource.start(0, pauseOffset);
    startTime = audioCtx.currentTime - pauseOffset; isPlaying = true;
  }
  document.getElementById('resumeBtn').textContent = isPlaying ? 'PAUSE' : 'START';
}

function computeKeyLayout(W, H) {
  const kbdH = H * (aspect === '9:16' ? 0.45 : 0.5);
  const kbdY = H - kbdH;
  const keyAreaY = kbdY + kbdH * 0.35, keyAreaW = W * 0.9, keyAreaH = kbdH * 0.5;
  const keyH = keyAreaH / 3.5, keyGap = keyH * 0.15, keys = [];
  ROWS.forEach((row, ri) => {
    const rowW = keyAreaW * (ri === 0 ? 1 : ri === 1 ? 0.9 : 0.7);
    const rowX = (W - rowW) / 2, kw = (rowW - keyGap * (row.length - 1)) / row.length;
    row.forEach((label, ci) => {
      keys.push({ label, x: rowX + ci * (kw + keyGap) + kw/2, y: keyAreaY + ri * (keyH + keyGap) + keyH/2, w: kw, h: keyH });
    });
  });
  keys.push({ label: 'SPACE', x: W/2, y: keyAreaY + 3 * (keyH + keyGap) + keyH/2, w: keyAreaW * 0.4, h: keyH });
  return { keys, kbdRect: { x: 0, y: kbdY, w: W, h: kbdH } };
}

function render() {
  requestAnimationFrame(render);
  const W = canvas.width, H = canvas.height, elapsed = isPlaying ? audioCtx.currentTime - startTime : pauseOffset;
  const col = theme === 'typewriter' ? { key: '#e8e0cc', keyPress: '#00ffb4', text: '#e8e0cc', bg: '#1a1510' } : { key: '#334455', keyPress: '#4488ff', text: '#aaccff', bg: '#080c14' };
  
  ctx.fillStyle = col.bg; ctx.fillRect(0, 0, W, H);
  const { keys, kbdRect } = computeKeyLayout(W, H);

  // --- Cue Update Logic ---
  let cueIdx = srtCues.findIndex(c => elapsed >= c.start && elapsed < c.end);
  if (cueIdx !== -1 && cueIdx !== activeCueIdx) {
    // 만약 이전 줄이 있었다면 히스토리에 추가 (밀어내기 준비)
    if (activeCueIdx !== -1) {
      lineHistory.push(srtCues[activeCueIdx].text);
      if (lineHistory.length > 2) lineHistory.shift(); // 최대 3줄 유지를 위해 히스토리는 2개만
    }
    activeCueIdx = cueIdx;
    const cue = srtCues[activeCueIdx];
    currentTargetDelay = ((cue.end - cue.start) * 0.8) / Math.max(1, cue.decomposed.length);
    charSpawnQueue = cue.decomposed.split('');
    builtText = ''; lastCharSpawnTime = elapsed;
    
    document.querySelectorAll('.srt-item').forEach((el, i) => el.classList.toggle('active', i === activeCueIdx));
    const activeEl = document.getElementById('srt-' + activeCueIdx);
    if(activeEl) activeEl.scrollIntoView({ block: 'nearest' });
  } else if (cueIdx === -1 && activeCueIdx !== -1) {
    // 자막 구간이 끝났을 때
    lineHistory.push(srtCues[activeCueIdx].text);
    if (lineHistory.length > 2) lineHistory.shift();
    activeCueIdx = -1; builtText = '';
  }

  // --- Typing Logic ---
  if (charSpawnQueue.length > 0 && isPlaying) {
    const sens = parseFloat(document.getElementById('sensitivitySlider').value);
    if (elapsed - lastCharSpawnTime > currentTargetDelay / sens) {
      const ch = charSpawnQueue.shift(); lastCharSpawnTime = elapsed;
      const keyLabel = charToKey(ch);
      if (keyLabel) {
        const k = keys.find(k => k.label === keyLabel);
        if (k) {
          pressedKeys[keyLabel] = { alpha: 1 };
          flyingChars.push({ ch, x: k.x, y: k.y, vx: (Math.random()-0.5)*3, vy: -(5+Math.random()*5), ay: 0.2, alpha: 1, rot: 0 });
        }
      }
      builtText += ch;
    }
  }

  // --- Draw Keyboard ---
  const kbdImg = theme === 'typewriter' ? kbdImage1 : kbdImage2;
  if (kbdImg) ctx.drawImage(kbdImg, kbdRect.x, kbdRect.y, kbdRect.w, kbdRect.h);
  
  for (const [label, state] of Object.entries(pressedKeys)) {
    const k = keys.find(k => k.label === label);
    if (k) {
      ctx.globalAlpha = state.alpha; ctx.fillStyle = col.keyPress; ctx.shadowBlur = 15; ctx.shadowColor = col.keyPress;
      ctx.beginPath(); ctx.arc(k.x, k.y, k.w/2.5, 0, Math.PI*2); ctx.fill();
      state.alpha -= 0.05; if (state.alpha <= 0) delete pressedKeys[label];
    }
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;

  // --- Draw Flying Chars ---
  flyingChars.forEach((fc, i) => {
    fc.x += fc.vx; fc.y += fc.vy; fc.vy += fc.ay; fc.alpha -= 0.015;
    ctx.save(); ctx.globalAlpha = fc.alpha; ctx.translate(fc.x, fc.y);
    ctx.font = `bold ${W*0.04}px Courier New`; ctx.fillStyle = col.keyPress;
    ctx.textAlign = 'center'; ctx.fillText(fc.ch, 0, 0); ctx.restore();
    if (fc.alpha <= 0) flyingChars.splice(i, 1);
  });

  // --- Draw Triple-Line Subtitles (맨 위가 가장 오래된 줄) ---
  const fontSize = Math.max(18, Math.min(W * 0.05, kbdRect.y * 0.15));
  const lineH = fontSize * 1.6;
  const currentFullText = srtCues[activeCueIdx] ? srtCues[activeCueIdx].text : "";
  
  // 현재 타이핑 중인 줄의 노출 글자수 계산
  const progress = srtCues[activeCueIdx] ? 1 - (charSpawnQueue.length / srtCues[activeCueIdx].decomposed.length) : 0;
  const currentTypedText = currentFullText.substring(0, Math.floor(currentFullText.length * progress));

  const allLines = [...lineHistory];
  if (activeCueIdx !== -1) allLines.push(currentTypedText);

  const totalH = allLines.length * lineH;
  const startY = (kbdRect.y / 2) - (totalH / 2) + fontSize;

  allLines.forEach((line, i) => {
    ctx.save();
    ctx.font = `bold ${fontSize}px Courier New`;
    ctx.textAlign = 'center';
    // 마지막 줄(현재 줄)은 더 밝게, 이전 줄들은 약간 어둡게
    ctx.fillStyle = (i === allLines.length - 1 && activeCueIdx !== -1) ? col.accent : col.muted2;
    ctx.shadowBlur = (i === allLines.length - 1) ? 10 : 0;
    ctx.shadowColor = col.accent;
    ctx.fillText(line, W/2, startY + i * lineH);
    ctx.restore();
  });
}

function resetAll() {
  if (audioSource) audioSource.stop();
  isPlaying = false; pauseOffset = 0; activeCueIdx = -1; lineHistory = []; flyingChars = []; builtText = '';
  document.getElementById('resumeBtn').textContent = 'START';
}

render();
</script>
</body>
</html>
