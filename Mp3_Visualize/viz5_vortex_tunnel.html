<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualizer 05 — Vortex Tunnel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020104;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  .label {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 6px;
    color: #6600aa;
    text-transform: uppercase;
  }
  canvas { display: block; }
  .controls {
    position: fixed;
    bottom: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
  }
  .drop-zone {
    border: 1px dashed #440066;
    border-radius: 10px;
    padding: 12px 32px;
    cursor: pointer;
    font-size: 12px;
    color: #660088;
    letter-spacing: 2px;
    transition: all 0.3s;
  }
  .drop-zone:hover { border-color: #aa00ff; color: #cc80ff; }
  input[type=file] { display: none; }
  button {
    background: rgba(20,0,40,0.7);
    border: 1px solid #440066;
    border-radius: 6px;
    color: #9040cc;
    padding: 7px 16px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover { border-color: #aa00ff; color: #dd80ff; }
</style>
</head>
<body>
<div class="label">05 — VORTEX TUNNEL</div>
<canvas id="c"></canvas>
<div class="controls">
  <div class="drop-zone" id="dz">♫ MP3 드래그 또는 클릭</div>
  <button id="playBtn" style="display:none">▶ PLAY</button>
</div>
<input type="file" id="fi" accept="audio/*">
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

let audioCtx, analyser, source, gainNode, isPlaying = false, audioBuffer, startTime = 0, pauseOffset = 0;
let t = 0;

document.getElementById('dz').addEventListener('click', () => document.getElementById('fi').click());
document.getElementById('dz').addEventListener('dragover', e => e.preventDefault());
document.getElementById('dz').addEventListener('drop', e => { e.preventDefault(); load(e.dataTransfer.files[0]); });
document.getElementById('fi').addEventListener('change', e => load(e.target.files[0]));

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    gainNode = audioCtx.createGain();
    gainNode.connect(audioCtx.destination);
    analyser.connect(gainNode);
  }
}
function load(file) {
  initAudio();
  if (source) { try { source.stop(); source.disconnect(); } catch(e){} }
  const reader = new FileReader();
  reader.onload = e => {
    audioCtx.decodeAudioData(e.target.result, buf => {
      audioBuffer = buf; pauseOffset = 0;
      document.getElementById('playBtn').style.display = ''; play();
    });
  };
  reader.readAsArrayBuffer(file);
}
function play() {
  if (!audioBuffer) return;
  if (source) { try { source.stop(); source.disconnect(); } catch(e){} }
  source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(analyser);
  source.start(0, pauseOffset);
  startTime = audioCtx.currentTime - pauseOffset;
  isPlaying = true;
  document.getElementById('playBtn').textContent = '⏸ PAUSE';
  source.onended = () => { isPlaying = false; pauseOffset = 0; document.getElementById('playBtn').textContent = '▶ PLAY'; };
}
document.getElementById('playBtn').addEventListener('click', () => {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (isPlaying) {
    pauseOffset = audioCtx.currentTime - startTime;
    source.stop(); isPlaying = false;
    document.getElementById('playBtn').textContent = '▶ PLAY';
  } else play();
});

function draw() {
  requestAnimationFrame(draw);
  t += 0.015;
  ctx.fillStyle = 'rgba(2,1,4,0.22)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  const freqData = new Uint8Array(analyser ? analyser.frequencyBinCount : 512);
  if (analyser) analyser.getByteFrequencyData(freqData);

  let bass = 0, mid = 0;
  for (let i = 0; i < 16; i++) bass += (freqData[i] || 0);
  bass = bass / 16 / 255;
  for (let i = 16; i < 80; i++) mid += (freqData[i] || 0);
  mid = mid / 64 / 255;

  const maxR = Math.min(W, H) * 0.48;
  const RINGS = 28;
  const SPOKES = 64;

  // Draw tunnel rings from outer to inner
  for (let ring = RINGS; ring >= 0; ring--) {
    const depthT = ring / RINGS;
    const baseR = maxR * depthT;
    const twist = t * (1.5 + bass * 2) * (1 - depthT * 0.5) + depthT * Math.PI;

    for (let s = 0; s < SPOKES; s++) {
      const angle = (s / SPOKES) * Math.PI * 2 + twist;
      const fi = Math.floor((s / SPOKES) * freqData.length * 0.5) + Math.floor(depthT * 20);
      const amp = (freqData[Math.min(fi, freqData.length - 1)] || 0) / 255;
      const r = baseR * (1 + amp * 0.25 * depthT);
      const nextAngle = ((s + 1) / SPOKES) * Math.PI * 2 + twist;
      const nx = cx + Math.cos(nextAngle) * r;
      const ny = cy + Math.sin(nextAngle) * r;
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r;

      const hue = 260 + depthT * 80 + s * 2 + t * 20;
      const alpha = (0.4 + amp * 0.5) * (0.3 + depthT * 0.7);

      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(nx, ny);
      ctx.strokeStyle = `hsla(${hue}, 90%, 60%, ${alpha})`;
      ctx.lineWidth = 0.8 + amp * 1.5 * depthT;
      ctx.stroke();

      // Spoke lines connecting to next ring
      if (ring < RINGS && s % 4 === 0) {
        const innerR = maxR * ((ring - 1) / RINGS);
        const innerTwist = t * (1.5 + bass * 2) * (1 - ((ring - 1) / RINGS) * 0.5) + ((ring - 1) / RINGS) * Math.PI;
        const innerAngle = (s / SPOKES) * Math.PI * 2 + innerTwist;
        const ix = cx + Math.cos(innerAngle) * innerR;
        const iy = cy + Math.sin(innerAngle) * innerR;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(ix, iy);
        ctx.strokeStyle = `hsla(${hue + 30}, 70%, 50%, ${alpha * 0.4})`;
        ctx.lineWidth = 0.4;
        ctx.stroke();
      }
    }
  }

  // Center vortex eye
  const eyeR = 5 + bass * 25 + mid * 15;
  const eyeGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, eyeR * 4);
  eyeGrd.addColorStop(0, `rgba(255, 200, 255, ${0.8 + bass * 0.2})`);
  eyeGrd.addColorStop(0.3, `rgba(180, 50, 255, 0.6)`);
  eyeGrd.addColorStop(0.7, `rgba(80, 0, 150, 0.2)`);
  eyeGrd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, eyeR * 4, 0, Math.PI * 2);
  ctx.fillStyle = eyeGrd;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, cy, eyeR, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255, 220, 255, 1)`;
  ctx.fill();
}
draw();
</script>
</body>
</html>
