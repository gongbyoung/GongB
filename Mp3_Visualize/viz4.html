<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM ART LAB v12.0 — Calligraphy Art</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#050505; --panel:#0d0d12; --accent:#00ffcc; --border:rgba(255,255,255,0.06); --text:#ffffff; }
body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.logo{letter-spacing:4px; color:var(--accent); font-weight:800; font-size:12px;}
.container { display: grid; grid-template-columns: 240px 1fr 300px; flex: 1; min-height: 0; }
.side-panel { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }
.side-panel.right { border-right:none; border-left: 1px solid var(--border); }
h3 { font-size: 10px; color: #555; margin-bottom: 12px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px;}
.file-box { border: 1px dashed #444; padding: 12px; text-align: center; margin-bottom: 10px; cursor: pointer; border-radius: 4px; transition: 0.2s;}
.file-box:hover { border-color: var(--accent); background: rgba(0,255,204,0.05); }
.viz-area { position: relative; background: #000; overflow: hidden; display: flex; flex-direction: column;}
#artCanvas { flex: 1; width: 100%; height: 100%; cursor: crosshair; }
.bottom-ctrl { padding: 12px 20px; background: #000; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 8px 14px; cursor: pointer; font-size: 10px; }
.btn.primary { background: var(--accent); color: #000; border: none; font-weight: bold; }
.control-group { margin-bottom: 15px; }
.control-group label { display: block; font-size: 9px; color: #777; margin-bottom: 5px; }
input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; height: 3px;}
#currentLyric { position: absolute; bottom: 80px; width: 100%; text-align: center; font-size: 14px; color: var(--accent); pointer-events: none; opacity: 0.5; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM ART LAB v12.0 [CALLIGRAPHY]</div>
  <div id="timeCode" style="font-family: monospace; font-size: 12px;">00:00.00</div>
</div>

<div class="container">
  <div class="side-panel">
    <h3>1. Assets</h3>
    <div class="file-box" onclick="document.getElementById('musicInput').click()"><span>MP3 Upload</span><input type="file" id="musicInput" accept="audio/*" style="display:none" onchange="handleMusic(this.files)"></div>
    <div class="file-box" onclick="document.getElementById('srtInput').click()"><span>SRT Upload</span><input type="file" id="srtInput" accept=".srt" style="display:none" onchange="handleSRT(this.files)"></div>
  </div>

  <div class="viz-area">
    <canvas id="artCanvas"></canvas>
    <div id="currentLyric"></div>
    <div class="bottom-ctrl">
      <button class="btn" onclick="clearCanvas()">CLEAR CANVAS</button>
      <button class="btn primary" id="playBtn" onclick="togglePlay()">RUN ARTIST</button>
      <button class="btn" onclick="saveImage()">SAVE PNG</button>
    </div>
  </div>

  <div class="side-panel right">
    <h3>Art Brush Config</h3>
    <div class="control-group">
      <label>DISTORTION (왜곡 강도)</label>
      <input type="range" id="distort" min="1" max="50" value="20">
    </div>
    <div class="control-group">
      <label>BRUSH OPACITY (투명도)</label>
      <input type="range" id="opacity" min="1" max="10" value="5">
    </div>
    <div class="control-group">
      <label>PERSISTENCE (보존력: 낮을수록 금방 흐려짐)</label>
      <input type="range" id="persistence" min="0" max="10" value="10">
    </div>
    <h3>RGB Color Range</h3>
    <div class="control-group"><label>R</label><input type="range" id="rMin" min="0" max="255" value="100"><input type="range" id="rMax" min="0" max="255" value="255"></div>
    <div class="control-group"><label>G</label><input type="range" id="gMin" min="0" max="255" value="0"><input type="range" id="gMax" min="0" max="255" value="255"></div>
    <div class="control-group"><label>B</label><input type="range" id="bMin" min="0" max="255" value="150"><input type="range" id="bMax" min="0" max="255" value="255"></div>
  </div>
</div>

<script>
let srtData = [];
let audioCtx, analyser, source, audioBuffer, isPlaying = false, startTime = 0, pauseOffset = 0;
const canvas = document.getElementById('artCanvas'), ctx = canvas.getContext('2d');

// --- 한글 분해 함수 (초성, 중성, 종성) ---
function decomposeHangul(str) {
  const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
  const jung = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
  const jong = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
  let result = [];
  for (let i = 0; i < str.length; i++) {
    const code = str.charCodeAt(i) - 44032;
    if (code > -1 && code < 11172) {
      result.push(cho[Math.floor(code / 588)]);
      result.push(jung[Math.floor((code % 588) / 28)]);
      const j = code % 28; if (j !== 0) result.push(jong[j]);
    } else if (str[i] !== " ") { result.push(str[i]); }
  }
  return result;
}

function handleSRT(files) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2,}|\n*$)/g;
    let matches; srtData = [];
    while ((matches = regex.exec(e.target.result)) !== null) {
      srtData.push({
        start: timeToSeconds(matches[2]),
        end: timeToSeconds(matches[3]),
        text: matches[4].replace(/\n/g, ' '),
        strokes: decomposeHangul(matches[4])
      });
    }
    alert("SRT 로드 완료: " + srtData.length + "구절");
  };
  reader.readAsText(files[0]);
}

function timeToSeconds(time) {
  const [h, m, s] = time.split(':');
  const [sec, ms] = s.split(',');
  return parseInt(h) * 3600 + parseInt(m) * 60 + parseInt(sec) + parseInt(ms) / 1000;
}

function handleMusic(files) {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const reader = new FileReader();
  reader.onload = (e) => { audioCtx.decodeAudioData(e.target.result, (buf) => { audioBuffer = buf; alert("음악 로드 완료"); }); };
  reader.readAsArrayBuffer(files[0]);
}

function togglePlay() {
  if(isPlaying) {
    pauseOffset = audioCtx.currentTime - startTime;
    source.stop(); isPlaying = false;
    document.getElementById('playBtn').textContent = "RESUME ARTIST";
  } else if(audioBuffer) {
    source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    source.start(0, pauseOffset);
    startTime = audioCtx.currentTime - pauseOffset;
    isPlaying = true;
    document.getElementById('playBtn').textContent = "STOP";
    animate();
  }
}

function clearCanvas() { ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height); }
function saveImage() { const link = document.createElement('a'); link.download=`calligraphy_art.png`; link.href=canvas.toDataURL(); link.click(); }
function resize() { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; clearCanvas(); }
window.onresize = resize; resize();

// --- Artist Engine ---
let lastLineIdx = -1;
let strokePtr = 0;

function animate() {
  if(!isPlaying) return;
  requestAnimationFrame(animate);

  const currentTime = audioCtx.currentTime - startTime;
  document.getElementById('timeCode').textContent = new Date(currentTime * 1000).toISOString().substr(14, 5);

  // Persistence 로직: 이전 프레임을 아주 미세하게 덮어씌워 풍화 효과를 줌
  const pers = parseInt(document.getElementById('persistence').value);
  if (pers < 10) {
      ctx.fillStyle = `rgba(0, 0, 0, ${0.1 - pers/100})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  const currentIdx = srtData.findIndex(line => currentTime >= line.start && currentTime <= line.end);
  
  if (currentIdx !== -1) {
    const currentLine = srtData[currentIdx];
    document.getElementById('currentLyric').textContent = currentLine.text;

    if (currentIdx !== lastLineIdx) { strokePtr = 0; lastLineIdx = currentIdx; }

    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const amp = data[10] / 255; // 저음부 반응

    // 음악 반응이 있을 때 자판을 치듯 가사를 획으로 뿌림
    if (amp > 0.5) {
      const char = currentLine.strokes[strokePtr % currentLine.strokes.length];
      paintStroke(char, amp);
      strokePtr++;
    }
  } else {
    document.getElementById('currentLyric').textContent = "";
  }
}

function paintStroke(char, amp) {
  const distort = parseInt(document.getElementById('distort').value);
  const opacity = parseInt(document.getElementById('opacity').value) / 10;
  
  const x = Math.random() * canvas.width;
  const y = Math.random() * canvas.height;
  
  const r = Math.random() * (parseInt(document.getElementById('rMax').value) - parseInt(document.getElementById('rMin').value)) + parseInt(document.getElementById('rMin').value);
  const g = Math.random() * (parseInt(document.getElementById('gMax').value) - parseInt(document.getElementById('gMin').value)) + parseInt(document.getElementById('gMin').value);
  const b = Math.random() * (parseInt(document.getElementById('bMax').value) - parseInt(document.getElementById('bMin').value)) + parseInt(document.getElementById('bMin').value);

  ctx.save();
  ctx.translate(x, y);
  
  // 예술적 왜곡 (붓의 획처럼 늘리고 기울이기)
  ctx.rotate(Math.random() * Math.PI * 2);
  ctx.scale(1 + Math.random() * distort/10 * amp, 1 + Math.random() * distort/10 * amp);
  ctx.transform(1, Math.random() * distort/100, Math.random() * distort/100, 1, 0, 0); // Skew

  ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${opacity * amp})`;
  ctx.shadowBlur = amp * 20;
  ctx.shadowColor = `rgb(${r}, ${g}, ${b})`;
  
  // 폰트 크기를 극단적으로 키워 획처럼 보이게 함
  ctx.font = `900 ${30 + amp * 150}px 'Pretendard'`;
  ctx.fillText(char, 0, 0);
  
  ctx.restore();
}
</script>
</body>
</html>
