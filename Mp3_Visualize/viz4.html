<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM ART LAB v12.5 — Calligraphy Painter</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#050505; --panel:#0d0d12; --accent:#00ffcc; --border:rgba(255,255,255,0.06); --text:#ffffff; }
body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.logo{letter-spacing:4px; color:var(--accent); font-weight:800; font-size:12px;}

.container { display: grid; grid-template-columns: 260px 1fr 300px; flex: 1; min-height: 0; }
.side-panel { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
.side-panel.right { border-right:none; border-left: 1px solid var(--border); }

h3 { font-size: 10px; color: #555; margin-bottom: 15px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px;}

.file-box { border: 1px dashed #444; padding: 15px; text-align: center; margin-bottom: 10px; cursor: pointer; border-radius: 4px; transition: 0.2s; position: relative;}
.file-box.loaded { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.05); }
.file-box span { font-size: 11px; }

.viz-area { position: relative; background: #000; overflow: hidden; display: flex; flex-direction: column;}
#artCanvas { flex: 1; width: 100%; height: 100%; cursor: crosshair; }

.bottom-ctrl { padding: 15px 20px; background: #000; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 10px 16px; cursor: pointer; font-size: 11px; border-radius: 4px;}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent); color: #000; border: none; font-weight: bold; }

.control-group { margin-bottom: 18px; }
.control-group label { display: block; font-size: 9px; color: #777; margin-bottom: 8px; }
input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; height: 3px;}

#currentLyric { position: absolute; bottom: 80px; width: 100%; text-align: center; font-size: 14px; color: var(--accent); pointer-events: none; opacity: 0.6; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,204,0.5);}
#statusInfo { position: absolute; top: 10px; left: 10px; font-size: 9px; color: #444; pointer-events: none;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM ART LAB v12.5 [KINETIC ART]</div>
  <div id="timeCode" style="font-family: monospace; font-size: 14px; color: var(--accent);">00:00.00</div>
</div>

<div class="container">
  <div class="side-panel">
    <h3>1. Assets Loading</h3>
    <div class="file-box" id="mBox" onclick="document.getElementById('musicInput').click()">
      <span id="mText">MP3 Upload</span>
      <input type="file" id="musicInput" accept="audio/*" style="display:none" onchange="handleMusic(this.files)">
    </div>
    <div class="file-box" id="sBox" onclick="document.getElementById('srtInput').click()">
      <span id="sText">SRT Upload</span>
      <input type="file" id="srtInput" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    </div>
    <div style="font-size: 9px; color: #444; line-height: 1.6; margin-top: 10px;">
      * 가사를 붓의 획으로 왜곡하여 추상화를 그립니다.<br>
      * 가사가 화면에 박히면 RESET 전까지 유지됩니다.
    </div>
  </div>

  <div class="viz-area">
    <div id="statusInfo">IDLE</div>
    <canvas id="artCanvas"></canvas>
    <div id="currentLyric">가사를 로드해주세요</div>
    <div class="bottom-ctrl">
      <button class="btn" onclick="clearCanvas()">CLEAR CANVAS</button>
      <button class="btn primary" id="playBtn" onclick="togglePlay()">RUN ARTIST</button>
      <button class="btn" onclick="saveImage()">SAVE PNG</button>
    </div>
  </div>

  <div class="side-panel right">
    <h3>Art Brush Config</h3>
    <div class="control-group">
      <label>DISTORTION (왜곡 강도)</label>
      <input type="range" id="distort" min="1" max="100" value="40">
    </div>
    <div class="control-group">
      <label>BRUSH OPACITY (투명도)</label>
      <input type="range" id="opacity" min="1" max="10" value="7">
    </div>
    <div class="control-group">
      <label>SENSITIVITY (반응 민감도)</label>
      <input type="range" id="sens" min="1" max="10" value="8">
    </div>
    
    <h3>RGB Color Palette</h3>
    <div class="control-group"><label>R Range</label><input type="range" id="rMin" min="0" max="255" value="100"><input type="range" id="rMax" min="0" max="255" value="255"></div>
    <div class="control-group"><label>G Range</label><input type="range" id="gMin" min="0" max="255" value="0"><input type="range" id="gMax" min="0" max="255" value="150"></div>
    <div class="control-group"><label>B Range</label><input type="range" id="bMin" min="0" max="255" value="150"><input type="range" id="bMax" min="0" max="255" value="255"></div>
  </div>
</div>

<script>
let srtData = [];
let audioCtx, analyser, source, audioBuffer, isPlaying = false, startTime = 0, pauseOffset = 0;
const canvas = document.getElementById('artCanvas'), ctx = canvas.getContext('2d');

// --- 한글 분해 로직 ---
function decomposeHangul(str) {
  const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
  const jung = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
  const jong = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
  let result = [];
  for (let i = 0; i < str.length; i++) {
    const code = str.charCodeAt(i) - 44032;
    if (code >= 0 && code < 11172) {
      result.push(cho[Math.floor(code / 588)]);
      result.push(jung[Math.floor((code % 588) / 28)]);
      const j = code % 28; if (j !== 0) result.push(jong[j]);
    } else if (str[i] !== " ") { result.push(str[i]); }
  }
  return result;
}

// --- 자막 로드 (정규식 강화) ---
function handleSRT(files) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result.replace(/\r\n/g, '\n'); // 윈도우 줄바꿈 대응
    const blocks = text.split(/\n\s*\n/);
    srtData = blocks.map(block => {
      const lines = block.split('\n').filter(l => l.trim() !== "");
      if (lines.length < 3) return null;
      const timeMatch = lines[1].match(/(\d+:\d+:\d+,\d+) --> (\d+:\d+:\d+,\d+)/);
      if (!timeMatch) return null;
      const content = lines.slice(2).join(' ');
      return {
        start: timeToSeconds(timeMatch[1]),
        end: timeToSeconds(timeMatch[2]),
        text: content,
        strokes: decomposeHangul(content)
      };
    }).filter(x => x !== null);
    
    document.getElementById('sBox').classList.add('loaded');
    document.getElementById('sText').textContent = "SRT READY (" + srtData.length + ")";
    document.getElementById('currentLyric').textContent = "준비 완료. 재생을 눌러주세요.";
  };
  reader.readAsText(files[0]);
}

function timeToSeconds(t) {
  const [h, m, s] = t.split(':');
  const [sec, ms] = s.split(',');
  return parseInt(h)*3600 + parseInt(m)*60 + parseInt(sec) + parseInt(ms)/1000;
}

function handleMusic(files) {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  document.getElementById('mText').textContent = "DECODING...";
  const reader = new FileReader();
  reader.onload = (e) => {
    audioCtx.decodeAudioData(e.target.result, (buf) => {
      audioBuffer = buf;
      document.getElementById('mBox').classList.add('loaded');
      document.getElementById('mText').textContent = "MUSIC READY";
    });
  };
  reader.readAsArrayBuffer(files[0]);
}

async function togglePlay() {
  if(!audioBuffer || srtData.length === 0) return alert("음악과 자막을 모두 로드해주세요.");
  if(audioCtx.state === 'suspended') await audioCtx.resume();

  if(isPlaying) {
    pauseOffset = audioCtx.currentTime - startTime;
    source.stop(); isPlaying = false;
    document.getElementById('playBtn').textContent = "RESUME ARTIST";
    document.getElementById('statusInfo').textContent = "PAUSED";
  } else {
    source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    source.start(0, pauseOffset);
    startTime = audioCtx.currentTime - pauseOffset;
    isPlaying = true;
    document.getElementById('playBtn').textContent = "STOP ARTIST";
    document.getElementById('statusInfo').textContent = "PAINTING...";
    animate();
  }
}

function clearCanvas() { ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height); }
function saveImage() { const link = document.createElement('a'); link.download=`calligraphy_art.png`; link.href=canvas.toDataURL(); link.click(); }
function resize() {
  const temp = ctx.getImageData(0,0,canvas.width,canvas.height);
  canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
  ctx.putImageData(temp, 0, 0);
  if(temp.data[3] === 0) clearCanvas();
}
window.onresize = resize; resize();

// --- Artist Engine ---
let lastLineIdx = -1;
let strokePtr = 0;

function animate() {
  if(!isPlaying) return;
  requestAnimationFrame(animate);

  const currentTime = audioCtx.currentTime - startTime;
  const m = Math.floor(currentTime / 60);
  const s = (currentTime % 60).toFixed(2);
  document.getElementById('timeCode').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(5,'0')}`;

  const currentIdx = srtData.findIndex(line => currentTime >= line.start && currentTime <= line.end);
  
  if (currentIdx !== -1) {
    const currentLine = srtData[currentIdx];
    document.getElementById('currentLyric').textContent = currentLine.text;

    if (currentIdx !== lastLineIdx) { strokePtr = 0; lastLineIdx = currentIdx; }

    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    
    // 저음~중음역대 에너지를 평균내어 감도 계산
    let sum = 0;
    for(let i=0; i<20; i++) sum += data[i];
    const amp = sum / 20 / 255;
    const sensThreshold = 1.1 - (parseInt(document.getElementById('sens').value) / 10);

    // 음악 반응에 따라 획을 그림
    if (amp > sensThreshold) {
      const char = currentLine.strokes[strokePtr % currentLine.strokes.length];
      paintStroke(char, amp);
      strokePtr++;
    }
  } else {
    document.getElementById('currentLyric').textContent = "---";
  }
}

function paintStroke(char, amp) {
  const distort = parseInt(document.getElementById('distort').value);
  const opacity = parseInt(document.getElementById('opacity').value) / 10;
  
  const x = Math.random() * canvas.width;
  const y = Math.random() * canvas.height;
  
  const r = Math.random() * (parseInt(document.getElementById('rMax').value) - parseInt(document.getElementById('rMin').value)) + parseInt(document.getElementById('rMin').value);
  const g = Math.random() * (parseInt(document.getElementById('gMax').value) - parseInt(document.getElementById('gMin').value)) + parseInt(document.getElementById('gMin').value);
  const b = Math.random() * (parseInt(document.getElementById('bMax').value) - parseInt(document.getElementById('bMin').value)) + parseInt(document.getElementById('bMin').value);

  ctx.save();
  ctx.translate(x, y);
  
  // 예술적 왜곡 (붓질처럼 변형)
  ctx.rotate(Math.random() * Math.PI * 2);
  
  // 가로세로를 음악 강도와 왜곡 설정값에 따라 비대칭으로 늘림
  const scaleX = 1 + (Math.random() * distort / 5 * amp);
  const scaleY = 1 + (Math.random() * distort / 20 * amp);
  ctx.scale(scaleX, scaleY);
  
  // 기울기(Skew) 적용
  ctx.transform(1, (Math.random()-0.5) * distort/50, (Math.random()-0.5) * distort/50, 1, 0, 0);

  const finalColor = `rgba(${r}, ${g}, ${b}, ${opacity * amp})`;
  ctx.fillStyle = finalColor;
  
  // 빛나는 효과(Glow) 추가
  ctx.shadowBlur = amp * 30;
  ctx.shadowColor = finalColor;
  
  // 획의 크기 설정
  const fontSize = 40 + (amp * 200);
  ctx.font = `900 ${fontSize}px 'Pretendard'`;
  ctx.fillText(char, 0, 0);
  
  ctx.restore();
}
</script>
</body>
</html>
