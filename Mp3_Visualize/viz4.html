<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM v13.7 — Proportional Typography Art</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#050505; --panel:#0d0d12; --accent:#00ffcc; --border:rgba(255,255,255,0.06); --text:#ffffff; }
body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.logo{letter-spacing:4px; color:var(--accent); font-weight:800; font-size:12px;}

.container { display: grid; grid-template-columns: 280px 1fr 300px; flex: 1; min-height: 0; }
.side-panel { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
.side-panel.right { border-right:none; border-left: 1px solid var(--border); }

h3 { font-size: 10px; color: #555; margin-bottom: 12px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-top: 15px;}

.input-group { margin-bottom: 15px; }
.input-group label { display: block; font-size: 9px; color: #777; margin-bottom: 5px; }
.input-text { width: 100%; background: #000; border: 1px solid #333; color: var(--accent); padding: 8px; font-size: 14px; font-weight: bold; border-radius: 4px; outline:none; }

.control-group { margin-bottom: 15px; }
.control-group label { display: block; font-size: 9px; color: #777; margin-bottom: 8px; }
.val-label { float: right; color: var(--accent); }
input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; height: 3px;}

.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 10px; cursor: pointer; font-size: 10px; border-radius: 4px; width: 100%; margin-bottom: 5px; transition: 0.2s;}
.btn.primary { background: var(--accent); color: #000; border: none; font-weight: bold; font-size: 12px; padding: 15px; margin-top: 10px;}
.btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.05); }
.btn:hover { border-color: var(--accent); }

.viz-area { position: relative; background: #000; overflow: hidden; flex: 1; display: flex; justify-content: center; align-items: center; }
#artCanvas { background: #000; box-shadow: 0 0 50px rgba(0,0,0,1); }

#currentLyric { position: absolute; bottom: 40px; width: 100%; text-align: center; font-size: 14px; color: var(--accent); pointer-events: none; opacity: 0.6; font-weight: bold; }
#ampLog { font-family: monospace; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM ART LAB v13.7</div>
  <div id="timeCode" style="font-family: monospace; font-size: 14px; color: var(--accent);">00:00.00</div>
</div>

<div class="container">
  <div class="side-panel">
    <h3>1. Target Mask Shape</h3>
    <div class="input-group">
      <label>TEXT SHAPE</label>
      <input type="text" id="maskTextInput" class="input-text" value="ART" oninput="updateMask()">
    </div>

    <div class="input-group">
      <label>WRITING MODE</label>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
        <button class="btn active" id="modeH" onclick="setWriteMode('H')">가로 쓰기</button>
        <button class="btn" id="modeV" onclick="setWriteMode('V')">세로 쓰기</button>
      </div>
    </div>
    
    <div class="control-group">
      <label>MASK SIZE <span class="val-label" id="sizeVal">1.0</span></label>
      <input type="range" id="maskSize" min="0.2" max="3.0" step="0.1" value="1.0" oninput="updateMask()">
    </div>

    <div class="control-group">
      <label>X POSITION <span class="val-label" id="xVal">0</span></label>
      <input type="range" id="maskX" min="-500" max="500" value="0" oninput="updateMask()">
    </div>

    <div class="control-group">
      <label>Y POSITION <span class="val-label" id="yVal">0</span></label>
      <input type="range" id="maskY" min="-500" max="500" value="0" oninput="updateMask()">
    </div>

    <h3>2. Ratio & Assets</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px;">
        <button class="btn" id="b169" onclick="setAspect('16:9')">16:9 가로</button>
        <button class="btn" id="b916" onclick="setAspect('9:16')">9:16 세로</button>
    </div>
    <button class="btn" onclick="document.getElementById('musicInput').click()">LOAD MP3</button>
    <input type="file" id="musicInput" accept="audio/*" style="display:none" onchange="handleMusic(this.files)">
    <button class="btn" onclick="document.getElementById('srtInput').click()">LOAD SRT</button>
    <input type="file" id="srtInput" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
  </div>

  <div class="viz-area">
    <canvas id="artCanvas"></canvas>
    <div id="currentLyric"></div>
    <div style="position:absolute; top:10px; left:10px; font-size:9px; color:#444;">AMP: <span id="ampLogDisplay">0.00</span></div>
  </div>

  <div class="side-panel right">
    <h3>3. Paint Config</h3>
    <div class="control-group">
      <label>DENSITY (밀도)</label>
      <input type="range" id="density" min="1" max="50" value="25">
    </div>
    <div class="control-group">
      <label>SENSITIVITY (반응도)</label>
      <input type="range" id="sens" min="1" max="10" value="9">
    </div>
    <div class="control-group">
      <label>DISTORTION (왜곡)</label>
      <input type="range" id="distort" min="1" max="100" value="25">
    </div>
    
    <h3>4. Color Range</h3>
    <div class="control-group"><label>R Range</label><input type="range" id="rMin" min="0" max="255" value="100"><input type="range" id="rMax" min="0" max="255" value="255"></div>
    <div class="control-group"><label>G Range</label><input type="range" id="gMin" min="0" max="255" value="0"><input type="range" id="gMax" min="0" max="255" value="200"></div>
    <div class="control-group"><label>B Range</label><input type="range" id="bMin" min="0" max="255" value="150"><input type="range" id="bMax" min="0" max="255" value="255"></div>

    <button class="btn primary" id="playBtn" onclick="togglePlay()">RUN PERFORMANCE</button>
    <button class="btn" onclick="clearCanvas()">CLEAR CANVAS</button>
    <button class="btn" onclick="saveArt()">SAVE AS PNG</button>
  </div>
</div>

<script>
let aspect = '16:9', writeMode = 'H';
let srtData = [], audioCtx, analyser, source, audioBuffer, isPlaying = false, startTime = 0, pauseOffset = 0;
let lastPaintTime = 0, maskFinalFontSize = 0;
const canvas = document.getElementById('artCanvas'), ctx = canvas.getContext('2d');
const maskCanvas = document.createElement('canvas');
const maskCtx = maskCanvas.getContext('2d', { willReadFrequently: true });

function setWriteMode(mode) {
    writeMode = mode;
    document.getElementById('modeH').classList.toggle('active', mode === 'H');
    document.getElementById('modeV').classList.toggle('active', mode === 'V');
    updateMask();
}

function updateMask() {
    const text = document.getElementById('maskTextInput').value;
    const sizeScale = parseFloat(document.getElementById('maskSize').value);
    const offsetX = parseInt(document.getElementById('maskX').value);
    const offsetY = parseInt(document.getElementById('maskY').value);

    document.getElementById('sizeVal').innerText = sizeScale.toFixed(1);
    document.getElementById('xVal').innerText = offsetX;
    document.getElementById('yVal').innerText = offsetY;

    maskCanvas.width = canvas.width;
    maskCanvas.height = canvas.height;
    maskCtx.fillStyle = "black";
    maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);
    maskCtx.fillStyle = "white";
    maskCtx.textAlign = "center";
    maskCtx.textBaseline = "middle";

    const centerX = maskCanvas.width / 2 + offsetX;
    const centerY = maskCanvas.height / 2 + offsetY;

    if (writeMode === 'H') {
        const baseFontSize = Math.min(maskCanvas.width / (text.length * 0.8), maskCanvas.height * 0.6);
        maskFinalFontSize = baseFontSize * sizeScale;
        maskCtx.font = `900 ${maskFinalFontSize}px Pretendard`;
        maskCtx.fillText(text, centerX, centerY);
    } else {
        const baseFontSize = Math.min(maskCanvas.width * 0.5, (maskCanvas.height / (text.length * 1.1)));
        maskFinalFontSize = baseFontSize * sizeScale;
        maskCtx.font = `900 ${maskFinalFontSize}px Pretendard`;
        const totalHeight = text.length * maskFinalFontSize * 1.05;
        const startY = centerY - (totalHeight / 2) + (maskFinalFontSize / 2);
        for (let i = 0; i < text.length; i++) {
            maskCtx.fillText(text[i], centerX, startY + (i * maskFinalFontSize * 1.05));
        }
    }
    if (!isPlaying) drawPreviewOutline();
}

function drawPreviewOutline() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const text = document.getElementById('maskTextInput').value;
    const offsetX = parseInt(document.getElementById('maskX').value);
    const offsetY = parseInt(document.getElementById('maskY').value);
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.strokeStyle = "rgba(0, 255, 204, 0.4)";
    ctx.lineWidth = 1.5;

    const centerX = canvas.width / 2 + offsetX;
    const centerY = canvas.height / 2 + offsetY;

    ctx.font = `900 ${maskFinalFontSize}px Pretendard`;
    if (writeMode === 'H') {
        ctx.strokeText(text, centerX, centerY);
    } else {
        const totalHeight = text.length * maskFinalFontSize * 1.05;
        const startY = centerY - (totalHeight / 2) + (maskFinalFontSize / 2);
        for (let i = 0; i < text.length; i++) {
            ctx.strokeText(text[i], centerX, startY + (i * maskFinalFontSize * 1.05));
        }
    }
}

function getPointInMask() {
    for (let i = 0; i < 40; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const pixel = maskCtx.getImageData(x, y, 1, 1).data;
        if (pixel[0] > 128) return { x, y };
    }
    return null;
}

function setAspect(r) { aspect = r; resize(); }
function resize() {
    const parent = canvas.parentElement;
    const pw = parent.clientWidth - 40, ph = parent.clientHeight - 40;
    if (aspect === '16:9') { canvas.width = Math.min(pw, ph * 1.77); canvas.height = canvas.width / 1.77; }
    else { canvas.height = Math.min(ph, pw * 0.56); canvas.width = canvas.height * 0.56; }
    updateMask();
}
window.onresize = resize; resize();

function decomposeHangul(str) {
  const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
  const jung = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
  const jong = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
  let res = [];
  for (let ch of str) {
    const code = ch.charCodeAt(0) - 44032;
    if (code >= 0 && code < 11172) {
      res.push(cho[Math.floor(code / 588)]);
      res.push(jung[Math.floor((code % 588) / 28)]);
      const j = code % 28; if (j !== 0) res.push(jong[j]);
    } else if (ch !== " ") { res.push(ch); }
  }
  return res;
}

function handleSRT(files) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result.replace(/\r\n/g, '\n');
    const blocks = text.split(/\n\s*\n/);
    srtData = blocks.map(b => {
      const lines = b.split('\n').filter(l => l.trim() !== "");
      if (lines.length < 3) return null;
      const t = lines[1].match(/(\d+:\d+:\d+,\d+) --> (\d+:\d+:\d+,\d+)/);
      if (!t) return null;
      const content = lines.slice(2).join(' ');
      return { start: toSec(t[1]), end: toSec(t[2]), text: content, strokes: decomposeHangul(content) };
    }).filter(x => x);
    alert("SRT LOADED");
  };
  reader.readAsText(files[0]);
}
function toSec(t) { const [h, m, s] = t.split(':'); const [sec, ms] = s.split(','); return parseInt(h)*3600 + parseInt(m)*60 + parseInt(sec) + parseInt(ms)/1000; }

function handleMusic(files) {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const reader = new FileReader();
  reader.onload = (e) => { audioCtx.decodeAudioData(e.target.result, (buf) => { audioBuffer = buf; alert("MUSIC LOADED"); }); };
  reader.readAsArrayBuffer(files[0]);
}

async function togglePlay() {
  if(!audioBuffer || srtData.length === 0) return alert("LOAD FILES FIRST");
  if(audioCtx.state === 'suspended') await audioCtx.resume();
  if(isPlaying) {
    pauseOffset = audioCtx.currentTime - startTime;
    source.stop(); isPlaying = false;
    document.getElementById('playBtn').textContent = "RESUME PERFORMANCE";
    drawPreviewOutline();
  } else {
    source = audioCtx.createBufferSource(); source.buffer = audioBuffer;
    analyser = audioCtx.createAnalyser(); analyser.fftSize = 512;
    source.connect(analyser); analyser.connect(audioCtx.destination);
    source.start(0, pauseOffset); startTime = audioCtx.currentTime - pauseOffset;
    isPlaying = true;
    ctx.fillStyle = "black"; ctx.fillRect(0,0,canvas.width,canvas.height);
    document.getElementById('playBtn').textContent = "STOP PERFORMANCE";
    animate();
  }
}

let lastLineIdx = -1, strokePtr = 0;

function animate() {
  if(!isPlaying) return;
  requestAnimationFrame(animate);
  const nowTime = audioCtx.currentTime - startTime;
  document.getElementById('timeCode').textContent = new Date(nowTime * 1000).toISOString().substr(14, 5);
  const currentIdx = srtData.findIndex(line => nowTime >= line.start && nowTime <= line.end);
  
  if (currentIdx !== -1) {
    const currentLine = srtData[currentIdx];
    document.getElementById('currentLyric').textContent = currentLine.text;
    if (currentIdx !== lastLineIdx) { strokePtr = 0; lastLineIdx = currentIdx; }

    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    let sum = 0; for(let i=0; i<15; i++) sum += data[i];
    const amp = sum / 15 / 255;
    document.getElementById('ampLogDisplay').innerText = amp.toFixed(2);
    
    const sensThreshold = 1.1 - (Number(document.getElementById('sens').value) / 10);
    const densityLimit = 1000 / Number(document.getElementById('density').value);

    const now = Date.now();
    if (amp > sensThreshold && (now - lastPaintTime > densityLimit)) {
      const char = currentLine.strokes[strokePtr % currentLine.strokes.length];
      const pos = getPointInMask();
      if (pos) { paintStroke(char, amp, pos.x, pos.y); strokePtr++; }
      lastPaintTime = now;
    }
  }
}

function paintStroke(char, amp, x, y) {
  const distort = Number(document.getElementById('distort').value);
  const r = Math.random()*(Number(document.getElementById('rMax').value)-Number(document.getElementById('rMin').value))+Number(document.getElementById('rMin').value);
  const g = Math.random()*(Number(document.getElementById('gMax').value)-Number(document.getElementById('gMin').value))+Number(document.getElementById('gMin').value);
  const b = Math.random()*(Number(document.getElementById('bMax').value)-Number(document.getElementById('bMin').value))+Number(document.getElementById('bMin').value);

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(Math.random()*Math.PI*2);
  
  // ⚡ 틀 글자 크기에 비례하는 폰트 크기 계산 (마스크 크기의 12~40% 사이)
  const fontSize = (maskFinalFontSize * 0.12) + (amp * maskFinalFontSize * 0.3);
  
  // ⚡ 왜곡 강도 완화 (형태 보존)
  const scaleX = 1 + (Math.random() * distort / 15 * amp);
  const scaleY = 1 + (Math.random() * distort / 50 * amp);
  ctx.scale(scaleX, scaleY);
  ctx.transform(1, (Math.random()-0.5)*distort/100, (Math.random()-0.5)*distort/100, 1, 0, 0);

  const col = `rgba(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)}, 0.8)`;
  ctx.fillStyle = col; 
  ctx.shadowBlur = amp * 15; ctx.shadowColor = col;
  ctx.font = `900 ${fontSize}px 'Pretendard'`;
  ctx.fillText(char, 0, 0);
  ctx.restore();
}

function clearCanvas() { ctx.fillStyle = 'black'; ctx.fillRect(0,0,canvas.width,canvas.height); if(!isPlaying) drawPreviewOutline(); }
function saveArt() { const link = document.createElement('a'); link.download=`art_${Date.now()}.png`; link.href=canvas.toDataURL(); link.click(); }
</script>
</body>
</html>
