<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM ART LAB v5.5 — Kinetic Painter</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#020204;
  --panel:#0a0a0f;
  --accent:#ff00ea;
  --border:rgba(255,255,255,0.05);
  --text:#ffffff;
}
body{
  background:var(--bg); color:var(--text);
  font-family:'Pretendard', sans-serif;
  height:100vh; overflow:hidden; display: flex; flex-direction: column;
}

.topbar{
  padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.logo{letter-spacing:4px; color:var(--accent); font-weight:800; font-size:12px;}

.container { display: grid; grid-template-columns: 240px 1fr 320px; flex: 1; min-height: 0; }

.side-panel {
  background: var(--panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 15px; overflow-y: auto;
}
.side-panel.right { border-right:none; border-left: 1px solid var(--border); }

h3 { font-size: 10px; letter-spacing: 1.5px; color: #555; margin-bottom: 12px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px;}

.file-box { border: 1px dashed #333; padding: 10px; text-align: center; margin-bottom: 10px; cursor: pointer; border-radius: 4px; transition: 0.2s;}
.file-box:hover { border-color: var(--accent); background: rgba(255,0,234,0.05); }
.file-box span { font-size: 10px; color: #666; }

.viz-area { position: relative; background: #000; display: flex; flex-direction: column;}
#artCanvas { flex: 1; width: 100%; height: 100%; }
#currentLyric { 
    position: absolute; bottom: 80px; left: 0; width: 100%; 
    text-align: center; font-size: 18px; color: var(--accent); 
    text-shadow: 0 0 10px rgba(255,0,234,0.5); pointer-events: none;
}

.bottom-ctrl {
  padding: 12px 20px; background: #000; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 8px 14px; cursor: pointer; font-size: 10px; }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent); color: #000; border: none; font-weight: bold; }

#timeCode { font-size: 12px; color: var(--accent); font-family: monospace; }

.control-group { margin-bottom: 15px; }
.control-group label { display: block; font-size: 9px; color: #777; margin-bottom: 5px; }
input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; height: 3px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM ART LAB v5.5 [KINETIC PAINTER]</div>
  <div id="timeCode">00:00.00</div>
</div>

<div class="container">
  <div class="side-panel">
    <h3>1. Audio</h3>
    <div class="file-box" onclick="document.getElementById('musicInput').click()">
      <span>MP3 Upload</span>
      <input type="file" id="musicInput" accept="audio/*" style="display:none" onchange="handleMusic(this.files)">
    </div>
    <h3>2. SRT</h3>
    <div class="file-box" onclick="document.getElementById('srtInput').click()">
      <span>SRT Upload</span>
      <input type="file" id="srtInput" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    </div>
  </div>

  <div class="viz-area">
    <canvas id="artCanvas"></canvas>
    <div id="currentLyric"></div>
    <div class="bottom-ctrl">
      <button class="btn" onclick="clearCanvas()">RESET</button>
      <button class="btn primary" id="playBtn" onclick="togglePlay()">RUN PERFORMANCE</button>
      <button class="btn" onclick="saveImage()">SAVE PNG</button>
    </div>
  </div>

  <div class="side-panel right">
    <h3>Kinetic Config</h3>
    <div class="control-group">
      <label>BRUSH SIZE (글자 크기)</label>
      <input type="range" id="pSize" min="10" max="200" value="50">
    </div>
    <div class="control-group">
      <label>FLOW SPEED (이동 속도)</label>
      <input type="range" id="pSpeed" min="1" max="20" value="8">
    </div>
    <div class="control-group">
      <label>SENSITIVITY (반응도)</label>
      <input type="range" id="pSens" min="1" max="10" value="7">
    </div>

    <h3>RGB Range</h3>
    <div class="control-group"><label>R</label><input type="range" id="rMin" min="0" max="255" value="150"><input type="range" id="rMax" min="0" max="255" value="255"></div>
    <div class="control-group"><label>G</label><input type="range" id="gMin" min="0" max="255" value="0"><input type="range" id="gMax" min="0" max="255" value="100"></div>
    <div class="control-group"><label>B</label><input type="range" id="bMin" min="0" max="255" value="100"><input type="range" id="bMax" min="0" max="255" value="255"></div>
  </div>
</div>

<script>
let srtData = [];
let audioCtx, analyser, source, audioBuffer, isPlaying = false, startTime = 0, pauseOffset = 0;
const canvas = document.getElementById('artCanvas'), ctx = canvas.getContext('2d');

function handleSRT(files) {
  const reader = new FileReader();
  reader.onload = (e) => { srtData = parseSRT(e.target.result); alert("SRT 로드 완료"); };
  reader.readAsText(files[0]);
}

function parseSRT(data) {
  const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2,}|\n*$)/g;
  let matches, result = [];
  while ((matches = regex.exec(data)) !== null) {
    result.push({
      start: timeToSeconds(matches[2]),
      end: timeToSeconds(matches[3]),
      text: matches[4].replace(/\n/g, ' '),
      chars: matches[4].replace(/\n/g, ' ').split('').filter(c => c.trim() !== "")
    });
  }
  return result;
}

function timeToSeconds(time) {
  const [h, m, s] = time.split(':');
  const [sec, ms] = s.split(',');
  return parseInt(h) * 3600 + parseInt(m) * 60 + parseInt(sec) + parseInt(ms) / 1000;
}

function handleMusic(files) {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const reader = new FileReader();
  reader.onload = (e) => { audioCtx.decodeAudioData(e.target.result, (buf) => { audioBuffer = buf; alert("음악 로드 완료"); }); };
  reader.readAsArrayBuffer(files[0]);
}

function togglePlay() {
  if(isPlaying) {
    pauseOffset = audioCtx.currentTime - startTime;
    source.stop(); isPlaying = false;
    document.getElementById('playBtn').textContent = "RESUME";
  } else if(audioBuffer) {
    source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    source.start(0, pauseOffset);
    startTime = audioCtx.currentTime - pauseOffset;
    isPlaying = true;
    document.getElementById('playBtn').textContent = "STOP";
    draw();
  }
}

function clearCanvas() { ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height); }
function saveImage() { const link = document.createElement('a'); link.download=`art.png`; link.href=canvas.toDataURL(); link.click(); }

function resize() {
  const temp = ctx.getImageData(0,0,canvas.width,canvas.height);
  canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
  ctx.putImageData(temp, 0, 0);
}
window.onresize = resize; resize();

// --- Performance Engine ---
let lastLineIdx = -1;
let charIdx = 0;

function draw() {
  if(!isPlaying) return;
  requestAnimationFrame(draw);

  const currentTime = audioCtx.currentTime - startTime;
  const m = Math.floor(currentTime / 60);
  const s = (currentTime % 60).toFixed(2);
  document.getElementById('timeCode').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(5,'0')}`;

  const lineIdx = srtData.findIndex(line => currentTime >= line.start && currentTime <= line.end);
  
  if (lineIdx !== -1) {
    const currentLine = srtData[lineIdx];
    document.getElementById('currentLyric').textContent = currentLine.text;

    if (lineIdx !== lastLineIdx) {
      charIdx = 0;
      lastLineIdx = lineIdx;
    }

    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const amp = data[Math.floor(Math.random()*data.length)] / 255;
    const sens = parseInt(document.getElementById('pSens').value);

    // 가사 시간 동안 계속 글자를 생성
    if (amp > (1.1 - sens/10)) {
      // 비트가 튈 때마다 현재 줄의 글자 중 하나를 선택 (순차적 혹은 랜덤)
      const char = currentLine.chars[charIdx % currentLine.chars.length];
      createKineticChar(char, amp);
      charIdx++;
    }
  } else {
    document.getElementById('currentLyric').textContent = "";
  }
}

function createKineticChar(char, amp) {
  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;
  const targetX = Math.random() * canvas.width;
  const targetY = Math.random() * canvas.height;
  const speed = parseInt(document.getElementById('pSpeed').value);
  const baseSize = parseInt(document.getElementById('pSize').value) * (0.5 + amp);
  
  let currentX = centerX;
  let currentY = centerY;
  let progress = 0;

  const r = Math.random() * (parseInt(document.getElementById('rMax').value) - parseInt(document.getElementById('rMin').value)) + parseInt(document.getElementById('rMin').value);
  const g = Math.random() * (parseInt(document.getElementById('gMax').value) - parseInt(document.getElementById('gMin').value)) + parseInt(document.getElementById('gMin').value);
  const b = Math.random() * (parseInt(document.getElementById('bMax').value) - parseInt(document.getElementById('bMin').value)) + parseInt(document.getElementById('bMin').value);
  const color = `rgba(${r}, ${g}, ${b}, ${0.3 + amp * 0.5})`;

  function animate() {
    if (progress >= 1) {
      // 최종 위치에 완전히 박힘 (기록)
      ctx.save();
      ctx.fillStyle = color;
      ctx.font = `900 ${baseSize}px 'Pretendard'`;
      ctx.shadowBlur = amp * 15;
      ctx.shadowColor = color;
      ctx.translate(targetX, targetY);
      ctx.rotate((Math.random()-0.5)*0.3);
      ctx.fillText(char, 0, 0);
      ctx.restore();
      return;
    }

    // 이동 중 궤적 그리기 (선택 사항, 행위예술 느낌 강화)
    ctx.fillStyle = color;
    ctx.font = `900 ${baseSize * progress}px 'Pretendard'`;
    ctx.fillText(char, currentX, currentY);

    progress += speed / 100;
    currentX = centerX + (targetX - centerX) * progress;
    currentY = centerY + (targetY - centerY) * progress;

    requestAnimationFrame(animate);
  }
  animate();
}
</script>
</body>
</html>
