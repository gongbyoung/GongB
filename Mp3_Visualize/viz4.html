<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM ART LAB v5.9 — Ephemera Painter</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#020204;
  --panel:#0d0d12;
  --accent:#00ffcc;
  --border:rgba(255,255,255,0.06);
  --text:#ffffff;
}
body{
  background:var(--bg); color:var(--text);
  font-family:'Pretendard', sans-serif;
  height:100vh; overflow:hidden; display: flex; flex-direction: column;
}

.topbar{
  padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.logo{letter-spacing:4px; color:var(--accent); font-weight:800; font-size:12px;}

.container { display: grid; grid-template-columns: 240px 1fr 320px; flex: 1; min-height: 0; }

.side-panel {
  background: var(--panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 15px; overflow-y: auto;
}
.side-panel.right { border-right:none; border-left: 1px solid var(--border); }

h3 { font-size: 10px; letter-spacing: 1.5px; color: #555; margin-bottom: 12px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px;}

.file-box { border: 1px dashed #444; padding: 12px; text-align: center; margin-bottom: 10px; cursor: pointer; border-radius: 4px; transition: 0.2s;}
.file-box:hover { border-color: var(--accent); background: rgba(0,255,204,0.05); }
.file-box span { font-size: 10px; color: #777; }

.viz-area { position: relative; background: #000; display: flex; flex-direction: column;}
#artCanvas { flex: 1; width: 100%; height: 100%; }
#currentLyric { 
    position: absolute; bottom: 80px; left: 0; width: 100%; 
    text-align: center; font-size: 16px; color: var(--accent); 
    text-shadow: 0 0 10px rgba(0,255,204,0.4); pointer-events: none; opacity: 0.7;
}

.bottom-ctrl {
  padding: 12px 20px; background: #000; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 8px 14px; cursor: pointer; font-size: 10px; }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent); color: #000; border: none; font-weight: bold; }

#timeCode { font-size: 12px; color: var(--accent); font-family: monospace; }

.control-group { margin-bottom: 15px; }
.control-group label { display: block; font-size: 9px; color: #777; margin-bottom: 5px; }
input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; height: 3px;}
select { width: 100%; background: #000; color: #fff; border: 1px solid var(--border); padding: 5px; font-size: 11px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM ART LAB v5.9 [EPHEMERA]</div>
  <div id="timeCode">00:00.00</div>
</div>

<div class="container">
  <div class="side-panel">
    <h3>1. Music</h3>
    <div class="file-box" onclick="document.getElementById('musicInput').click()">
      <span>MP3 Upload</span>
      <input type="file" id="musicInput" accept="audio/*" style="display:none" onchange="handleMusic(this.files)">
    </div>
    <h3>2. SRT</h3>
    <div class="file-box" onclick="document.getElementById('srtInput').click()">
      <span>SRT Upload</span>
      <input type="file" id="srtInput" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    </div>
  </div>

  <div class="viz-area">
    <canvas id="artCanvas"></canvas>
    <div id="currentLyric"></div>
    <div class="bottom-ctrl">
      <button class="btn" onclick="resetPerformance()">RESET</button>
      <button class="btn primary" id="playBtn" onclick="togglePlay()">RUN PERFORMANCE</button>
      <button class="btn" onclick="saveImage()">SAVE PNG</button>
    </div>
  </div>

  <div class="side-panel right">
    <h3>Ephemera Option (풍화)</h3>
    <div class="control-group">
      <label>SURVIVAL LIMIT (자막 유지 횟수)</label>
      <input type="range" id="lifeLimit" min="1" max="10" value="2">
      <span style="font-size:9px; color:#555;">* 설정한 횟수만큼 자막이 지나면 흐릿해집니다.</span>
    </div>
    <div class="control-group">
        <label>FADE STYLE (사라지는 방식)</label>
        <select id="fadeStyle">
          <option value="noise">Glow & Noise (입자화)</option>
          <option value="blur">Soft Blur (번짐)</option>
          <option value="simple">Simple Fade (투명도)</option>
        </select>
    </div>

    <h3>Brush Option</h3>
    <div class="control-group">
      <label>BRUSH SIZE</label>
      <input type="range" id="pSize" min="10" max="250" value="70">
    </div>
    <div class="control-group">
      <label>SENSITIVITY</label>
      <input type="range" id="pSens" min="1" max="10" value="8">
    </div>

    <h3>RGB Custom</h3>
    <div class="control-group"><label>R</label><input type="range" id="rMin" min="0" max="255" value="0"><input type="range" id="rMax" min="0" max="255" value="255"></div>
    <div class="control-group"><label>G</label><input type="range" id="gMin" min="0" max="255" value="100"><input type="range" id="gMax" min="0" max="255" value="255"></div>
    <div class="control-group"><label>B</label><input type="range" id="bMin" min="0" max="255" value="150"><input type="range" id="bMax" min="0" max="255" value="255"></div>
  </div>
</div>

<script>
let srtData = [];
let audioCtx, analyser, source, audioBuffer, isPlaying = false, startTime = 0, pauseOffset = 0;
const canvas = document.getElementById('artCanvas'), ctx = canvas.getContext('2d');

// --- 객체 지향형 입자 시스템 ---
let artObjects = []; // 캔버스에 박힌 모든 글자 객체들

class ArtChar {
  constructor(char, x, y, size, color, lineIdx) {
    this.char = char;
    this.x = x;
    this.y = y;
    this.size = size;
    this.color = color; // {r, g, b}
    this.bornLineIdx = lineIdx; // 태어난 자막 줄 번호
    this.alpha = 1.0;
    this.blur = 0;
    this.isDead = false;
  }

  update(currentLineIdx, limit) {
    const age = currentLineIdx - this.bornLineIdx;
    if (age >= limit) {
        const style = document.getElementById('fadeStyle').value;
        if (style === 'noise') {
            this.alpha -= 0.01;
            this.size += 0.2;
            this.x += (Math.random()-0.5) * 2;
            this.y += (Math.random()-0.5) * 2;
        } else if (style === 'blur') {
            this.alpha -= 0.005;
            this.blur += 0.5;
        } else {
            this.alpha -= 0.01;
        }
    }
    if (this.alpha <= 0) this.isDead = true;
  }

  draw() {
    ctx.save();
    if (this.blur > 0) ctx.filter = `blur(${this.blur}px)`;
    ctx.globalAlpha = this.alpha;
    ctx.font = `900 ${this.size}px 'Pretendard'`;
    ctx.fillStyle = `rgb(${this.color.r}, ${this.color.g}, ${this.color.b})`;
    ctx.shadowBlur = this.alpha * 15;
    ctx.shadowColor = ctx.fillStyle;
    ctx.fillText(this.char, this.x, this.y);
    ctx.restore();
  }
}

// --- Logic ---
function handleSRT(files) {
  const reader = new FileReader();
  reader.onload = (e) => { srtData = parseSRT(e.target.result); alert("SRT Sync Success"); };
  reader.readAsText(files[0]);
}

function parseSRT(data) {
  const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2,}|\n*$)/g;
  let matches, result = [];
  while ((matches = regex.exec(data)) !== null) {
    result.push({
      idx: parseInt(matches[1]),
      start: timeToSeconds(matches[2]),
      end: timeToSeconds(matches[3]),
      text: matches[4].replace(/\n/g, ' '),
      chars: matches[4].replace(/\n/g, ' ').split('').filter(c => c.trim() !== "")
    });
  }
  return result;
}

function timeToSeconds(time) {
  const [h, m, s] = time.split(':');
  const [sec, ms] = s.split(',');
  return parseInt(h) * 3600 + parseInt(m) * 60 + parseInt(sec) + parseInt(ms) / 1000;
}

function handleMusic(files) {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const reader = new FileReader();
  reader.onload = (e) => { audioCtx.decodeAudioData(e.target.result, (buf) => { audioBuffer = buf; alert("Music Load Success"); }); };
  reader.readAsArrayBuffer(files[0]);
}

function togglePlay() {
  if(isPlaying) {
    pauseOffset = audioCtx.currentTime - startTime;
    source.stop(); isPlaying = false;
    document.getElementById('playBtn').textContent = "RESUME";
  } else if(audioBuffer) {
    source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    source.start(0, pauseOffset);
    startTime = audioCtx.currentTime - pauseOffset;
    isPlaying = true;
    document.getElementById('playBtn').textContent = "STOP";
    animate();
  }
}

function resetPerformance() {
    artObjects = [];
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,canvas.width,canvas.height);
}

function saveImage() { const link = document.createElement('a'); link.download=`music_art.png`; link.href=canvas.toDataURL(); link.click(); }

function resize() {
  canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
}
window.onresize = resize; resize();

// --- Main Engine ---
let lastLineIdx = -1;
let globalLineCounter = 0; // 자막이 몇 번째 줄인지 추적
let charPtr = 0;

function animate() {
  if(!isPlaying) return;
  requestAnimationFrame(animate);

  // 1. 캔버스 지우기 (매 프레임 객체들을 다시 그려야 함)
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const currentTime = audioCtx.currentTime - startTime;
  const m = Math.floor(currentTime / 60);
  const s = (currentTime % 60).toFixed(2);
  document.getElementById('timeCode').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(5,'0')}`;

  const currentIdx = srtData.findIndex(line => currentTime >= line.start && currentTime <= line.end);
  const limit = parseInt(document.getElementById('lifeLimit').value);

  if (currentIdx !== -1) {
    const currentLine = srtData[currentIdx];
    document.getElementById('currentLyric').textContent = currentLine.text;

    if (currentIdx !== lastLineIdx) {
      charPtr = 0;
      lastLineIdx = currentIdx;
      globalLineCounter++; // 새로운 자막 줄 시작
    }

    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const amp = data[Math.floor(Math.random()*data.length)] / 255;
    const sens = parseInt(document.getElementById('pSens').value);

    // 음악 반응 시 새로운 글자 객체 생성
    if (amp > (1.1 - sens/10)) {
      const char = currentLine.chars[charPtr % currentLine.chars.length];
      
      const r = Math.random() * (parseInt(document.getElementById('rMax').value) - parseInt(document.getElementById('rMin').value)) + parseInt(document.getElementById('rMin').value);
      const g = Math.random() * (parseInt(document.getElementById('gMax').value) - parseInt(document.getElementById('gMin').value)) + parseInt(document.getElementById('gMax').value);
      const b = Math.random() * (parseInt(document.getElementById('bMax').value) - parseInt(document.getElementById('bMin').value)) + parseInt(document.getElementById('bMin').value);
      
      const size = parseInt(document.getElementById('pSize').value) * (0.6 + amp);
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height;

      // 중앙에 한 번 찍고
      artObjects.push(new ArtChar(char, canvas.width/2, canvas.height/2, size, {r,g,b}, globalLineCounter));
      // 랜덤 위치에 한 번 찍고
      artObjects.push(new ArtChar(char, x, y, size, {r,g,b}, globalLineCounter));
      
      charPtr++;
    }
  }

  // 2. 모든 객체 업데이트 및 그리기
  for (let i = artObjects.length - 1; i >= 0; i--) {
    const obj = artObjects[i];
    obj.update(globalLineCounter, limit);
    obj.draw();
    if (obj.isDead) artObjects.splice(i, 1);
  }
}
</script>
</body>
</html>
