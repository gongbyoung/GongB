<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM ART LAB v13.0 — Typography Mask</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#050505; --panel:#0d0d12; --accent:#00ffcc; --border:rgba(255,255,255,0.06); --text:#ffffff; }
body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.logo{letter-spacing:4px; color:var(--accent); font-weight:800; font-size:12px;}

.container { display: grid; grid-template-columns: 260px 1fr 300px; flex: 1; min-height: 0; }
.side-panel { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
.side-panel.right { border-right:none; border-left: 1px solid var(--border); }

h3 { font-size: 10px; color: #555; margin-bottom: 15px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px;}

.file-box { border: 1px dashed #444; padding: 12px; text-align: center; margin-bottom: 10px; cursor: pointer; border-radius: 4px; transition: 0.2s;}
.file-box.loaded { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.05); }

.input-group { margin-bottom: 15px; }
.input-group label { display: block; font-size: 9px; color: #777; margin-bottom: 5px; }
.input-text { width: 100%; background: #000; border: 1px solid #333; color: var(--accent); padding: 8px; font-size: 14px; font-weight: bold; border-radius: 4px; outline: none; }
.input-text:focus { border-color: var(--accent); }

.debug-log { background: #000; border: 1px solid #222; border-radius: 4px; padding: 10px; margin-top: 10px; font-family: monospace; font-size: 10px; color: #aaa; line-height: 1.6; }
.debug-log b { color: var(--accent); }

.viz-area { position: relative; background: #000; overflow: hidden; display: flex; flex-direction: column;}
#artCanvas { flex: 1; width: 100%; height: 100%; background: #000; }

.bottom-ctrl { padding: 15px 20px; background: #000; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 10px 16px; cursor: pointer; font-size: 11px; border-radius: 4px;}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent); color: #000; border: none; font-weight: bold; }

.control-group { margin-bottom: 18px; }
.control-group label { display: block; font-size: 9px; color: #777; margin-bottom: 8px; }
input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; height: 3px;}

#currentLyric { position: absolute; bottom: 80px; width: 100%; text-align: center; font-size: 14px; color: var(--accent); pointer-events: none; opacity: 0.8; font-weight: bold; text-shadow: 0 0 10px #000; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM ART LAB v13.0 [TYPOGRAPHY MASK]</div>
  <div id="timeCode" style="font-family: monospace; font-size: 14px; color: var(--accent);">00:00.00</div>
</div>

<div class="container">
  <div class="side-panel">
    <h3>1. Target Shape</h3>
    <div class="input-group">
      <label>SHAPE TEXT (배경 틀이 될 글자)</label>
      <input type="text" id="maskTextInput" class="input-text" value="DREAM" oninput="updateMask()">
    </div>
    <div class="control-group">
        <button class="btn" style="width: 100%;" onclick="toggleOutline()">TOGGLE OUTLINE (윤곽선 확인)</button>
    </div>

    <h3>2. Assets Loading</h3>
    <div class="file-box" id="mBox" onclick="document.getElementById('musicInput').click()"><span id="mText">MP3 Upload</span><input type="file" id="musicInput" accept="audio/*" style="display:none" onchange="handleMusic(this.files)"></div>
    <div class="file-box" id="sBox" onclick="document.getElementById('srtInput').click()"><span id="sText">SRT Upload</span><input type="file" id="srtInput" accept=".srt" style="display:none" onchange="handleSRT(this.files)"></div>
    
    <div class="debug-log" id="logPanel">
      <div>AMP: <b>0.00</b></div>
      <div>STATE: <b>WAITING</b></div>
    </div>
  </div>

  <div class="viz-area">
    <canvas id="artCanvas"></canvas>
    <div id="currentLyric"></div>
    <div class="bottom-ctrl">
      <button class="btn" onclick="clearCanvas()">CLEAR CANVAS</button>
      <button class="btn primary" id="playBtn" onclick="togglePlay()">START ART PERFORMANCE</button>
      <button class="btn" onclick="saveImage()">SAVE PNG</button>
    </div>
  </div>

  <div class="side-panel right">
    <h3>3. Brush Style</h3>
    <div class="control-group">
      <label>DENSITY (밀도)</label>
      <input type="range" id="density" min="1" max="50" value="15">
    </div>
    <div class="control-group">
      <label>DISTORTION (왜곡)</label>
      <input type="range" id="distort" min="1" max="100" value="30">
    </div>
    <div class="control-group">
      <label>SENSITIVITY (민감도)</label>
      <input type="range" id="sens" min="1" max="10" value="9">
    </div>
    
    <h3>4. Color Range</h3>
    <div class="control-group"><label>R Range</label><input type="range" id="rMin" min="0" max="255" value="50"><input type="range" id="rMax" min="0" max="255" value="255"></div>
    <div class="control-group"><label>G Range</label><input type="range" id="gMin" min="0" max="255" value="100"><input type="range" id="gMax" min="0" max="255" value="255"></div>
    <div class="control-group"><label>B Range</label><input type="range" id="bMin" min="0" max="255" value="150"><input type="range" id="bMax" min="0" max="255" value="255"></div>
  </div>
</div>

<script>
let srtData = [];
let audioCtx, analyser, source, audioBuffer, isPlaying = false, startTime = 0, pauseOffset = 0;
let lastPaintTime = 0, showOutline = true;
const canvas = document.getElementById('artCanvas'), ctx = canvas.getContext('2d');

// 마스크용 오프스크린 캔버스
const maskCanvas = document.createElement('canvas');
const maskCtx = maskCanvas.getContext('2d', { willReadFrequently: true });

function decomposeHangul(str) {
  const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
  const jung = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
  const jong = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
  let res = [];
  for (let i = 0; i < str.length; i++) {
    const code = str.charCodeAt(i) - 44032;
    if (code >= 0 && code < 11172) {
      res.push(cho[Math.floor(code / 588)]);
      res.push(jung[Math.floor((code % 588) / 28)]);
      const j = code % 28; if (j !== 0) res.push(jong[j]);
    } else if (str[i] !== " ") { res.push(str[i]); }
  }
  return res;
}

// --- Mask Logic ---
function updateMask() {
    maskCanvas.width = canvas.width;
    maskCanvas.height = canvas.height;
    const text = document.getElementById('maskTextInput').value;
    
    maskCtx.fillStyle = "black";
    maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);
    
    maskCtx.fillStyle = "white";
    const fontSize = Math.min(maskCanvas.width / (text.length * 0.7), maskCanvas.height * 0.8);
    maskCtx.font = `900 ${fontSize}px Pretendard`;
    maskCtx.textAlign = "center";
    maskCtx.textBaseline = "middle";
    maskCtx.fillText(text, maskCanvas.width / 2, maskCanvas.height / 2);
    
    if (!isPlaying) drawPreview();
}

function drawPreview() {
    if (isPlaying) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!showOutline) return;
    
    const text = document.getElementById('maskTextInput').value;
    const fontSize = Math.min(canvas.width / (text.length * 0.7), canvas.height * 0.8);
    ctx.font = `900 ${fontSize}px Pretendard`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.strokeStyle = "rgba(0, 255, 204, 0.3)";
    ctx.lineWidth = 2;
    ctx.strokeText(text, canvas.width / 2, canvas.height / 2);
}

function toggleOutline() {
    showOutline = !showOutline;
    drawPreview();
}

function getPointInMask() {
    // 텍스트 영역 내의 랜덤한 좌표를 찾을 때까지 반복 (최대 50번 시도)
    for (let i = 0; i < 50; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const pixel = maskCtx.getImageData(x, y, 1, 1).data;
        if (pixel[0] > 128) return { x, y }; // 흰색(텍스트) 영역이면 반환
    }
    return null;
}

// --- Assets Handling ---
function handleSRT(files) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result.replace(/\r\n/g, '\n');
    const blocks = text.split(/\n\s*\n/);
    srtData = blocks.map(b => {
      const lines = b.split('\n').filter(l => l.trim() !== "");
      if (lines.length < 3) return null;
      const t = lines[1].match(/(\d+:\d+:\d+,\d+) --> (\d+:\d+:\d+,\d+)/);
      if (!t) return null;
      const content = lines.slice(2).join(' ');
      return { start: toSec(t[1]), end: toSec(t[2]), text: content, strokes: decomposeHangul(content) };
    }).filter(x => x);
    document.getElementById('sBox').classList.add('loaded');
    document.getElementById('sText').textContent = "SRT READY";
  };
  reader.readAsText(files[0]);
}
function toSec(t) { const [h, m, s] = t.split(':'); const [sec, ms] = s.split(','); return parseInt(h)*3600 + parseInt(m)*60 + parseInt(sec) + parseInt(ms)/1000; }

function handleMusic(files) {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const reader = new FileReader();
  reader.onload = (e) => {
    audioCtx.decodeAudioData(e.target.result, (buf) => {
      audioBuffer = buf; document.getElementById('mBox').classList.add('loaded');
      document.getElementById('mText').textContent = "MUSIC READY";
    });
  };
  reader.readAsArrayBuffer(files[0]);
}

async function togglePlay() {
  if(!audioBuffer || srtData.length === 0) return alert("음악과 자막을 로드해주세요.");
  if(audioCtx.state === 'suspended') await audioCtx.resume();
  if(isPlaying) {
    pauseOffset = audioCtx.currentTime - startTime;
    source.stop(); isPlaying = false;
    document.getElementById('playBtn').textContent = "RESUME PERFORMANCE";
  } else {
    source = audioCtx.createBufferSource(); source.buffer = audioBuffer;
    analyser = audioCtx.createAnalyser(); analyser.fftSize = 512;
    source.connect(analyser); analyser.connect(audioCtx.destination);
    source.start(0, pauseOffset); startTime = audioCtx.currentTime - pauseOffset;
    isPlaying = true;
    ctx.fillStyle = "black"; ctx.fillRect(0,0,canvas.width,canvas.height); // 시작 시 화면 클리어
    document.getElementById('playBtn').textContent = "STOP PERFORMANCE";
    animate();
  }
}

function clearCanvas() { ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height); if(!isPlaying) drawPreview(); }
function saveImage() { const link = document.createElement('a'); link.download=`typography_art.png`; link.href=canvas.toDataURL(); link.click(); }
function resize() {
  canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
  updateMask();
}
window.onresize = resize; resize();

let lastLineIdx = -1, strokePtr = 0;

function animate() {
  if(!isPlaying) return;
  requestAnimationFrame(animate);

  const currentTime = audioCtx.currentTime - startTime;
  document.getElementById('timeCode').textContent = new Date(currentTime * 1000).toISOString().substr(14, 5);

  const currentIdx = srtData.findIndex(line => currentTime >= line.start && currentTime <= line.end);
  const logPanel = document.getElementById('logPanel');

  if (currentIdx !== -1) {
    const currentLine = srtData[currentIdx];
    document.getElementById('currentLyric').textContent = currentLine.text;
    if (currentIdx !== lastLineIdx) { strokePtr = 0; lastLineIdx = currentIdx; }

    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    let sum = 0; for(let i=0; i<15; i++) sum += data[i];
    const amp = sum / 15 / 255;
    
    const sensThreshold = 1.1 - (Number(document.getElementById('sens').value) / 10);
    const densityLimit = 1000 / Number(document.getElementById('density').value);

    logPanel.innerHTML = `<div>AMP: <b>${amp.toFixed(3)}</b></div><div>STATE: <b>PAINTING</b></div>`;

    const now = Date.now();
    if (amp > sensThreshold && (now - lastPaintTime > densityLimit)) {
      const char = currentLine.strokes[strokePtr % currentLine.strokes.length];
      const pos = getPointInMask(); // 마스크 내부 좌표 가져오기
      if (pos) {
          paintStroke(char, amp, pos.x, pos.y);
          strokePtr++;
      }
      lastPaintTime = now;
    }
  } else {
    document.getElementById('currentLyric').textContent = "";
    logPanel.innerHTML = `<div>STATE: <b>NO LYRIC CUE</b></div>`;
  }
}

function paintStroke(char, amp, x, y) {
  const distort = Number(document.getElementById('distort').value);
  const rMin = Number(document.getElementById('rMin').value), rMax = Number(document.getElementById('rMax').value);
  const gMin = Number(document.getElementById('gMin').value), gMax = Number(document.getElementById('gMax').value);
  const bMin = Number(document.getElementById('bMin').value), bMax = Number(document.getElementById('bMax').value);

  const r = Math.random() * (rMax - rMin) + rMin;
  const g = Math.random() * (gMax - gMin) + gMin;
  const b = Math.random() * (bMax - bMin) + bMin;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(Math.random() * Math.PI * 2);
  
  const scaleX = 1 + (Math.random() * distort / 5 * amp);
  const scaleY = 1 + (Math.random() * distort / 30 * amp);
  ctx.scale(scaleX, scaleY);
  ctx.transform(1, (Math.random()-0.5) * distort/50, (Math.random()-0.5) * distort/50, 1, 0, 0);

  const col = `rgba(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)}, 0.7)`;
  ctx.fillStyle = col; 
  ctx.shadowBlur = amp * 20; 
  ctx.shadowColor = col;
  
  ctx.font = `900 ${30 + (amp * 200)}px 'Pretendard'`;
  ctx.fillText(char, 0, 0);
  ctx.restore();
}
</script>
</body>
</html>
