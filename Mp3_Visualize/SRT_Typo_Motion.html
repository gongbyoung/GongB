<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO PARTICLE ENGINE v1.7 — Reverse Matrix Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #000; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: sans-serif; color: #fff; display: flex; }
        #canvas-container { flex: 1; }
        #panel { width: 300px; background: #0a0a0f; padding: 20px; border-left: 1px solid #1a1a1a; font-size: 11px; color: #666; overflow-y: auto; }
        .btn { width: 100%; padding: 12px; background: transparent; color: var(--accent); border: 1px solid var(--accent); cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn:hover { background: var(--accent); color: #000; }
        .status-box { padding: 10px; background: #111; border-radius: 4px; margin-top: 5px; color: #aaa; border: 1px solid #222; }
        b { color: var(--accent); }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="panel">
    <h3 style="color:white; margin-top:0;">TYPO & WAVE v1.7</h3>
    <p><b>1. FONT (필수)</b></p>
    <button class="btn" style="border-color:#ffcc00; color:#ffcc00;" onclick="document.getElementById('fIn').click()">📁 LOAD FONT (.ttf)</button>
    <input type="file" id="fIn" accept=".ttf,.otf" style="display:none" onchange="handleFont(this.files)">
    
    <p><b>2. MEDIA</b></p>
    <button class="btn" onclick="document.getElementById('mIn').click()">🎵 LOAD MP3</button>
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    <button class="btn" onclick="document.getElementById('sIn').click()">📄 LOAD SRT</button>
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    
    <button class="btn" id="startBtn" onclick="startEngine()" disabled style="border-color:#ff3377; color:#ff3377; margin-top:10px;">⚡ START ENGINE</button>
    <div class="status-box" id="status">파일을 로드해 주세요.</div>
</div>

<script>
    let audio, fft, myFont, subtitles = [], currentSub = "";
    let particles = [], ripples = [];
    let isFontReady = false;
    
    const INITIALS = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    const MEDIALS = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
    const FINALS = ["ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    const SOURCE_POOL = [...INITIALS, ...MEDIALS, ...FINALS];

    function setup() {
        let cnv = createCanvas(windowWidth - 300, windowHeight, WEBGL);
        cnv.parent('canvas-container');
        colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);

        // 배경에 모든 자음/모음 딱 한 번씩만 배열
        let spacing = 50;
        let cols = floor(width / spacing);
        let idx = 0;
        for (let i = 0; i < SOURCE_POOL.length; i++) {
            let x = (i % 15) * 80 - 400;
            let y = floor(i / 15) * 80 - 300;
            particles.push({
                char: SOURCE_POOL[i], bx: x, by: y, x: x, y: y, tx: x, ty: y,
                size: 14, tSize: 14, alpha: 20, tAlpha: 20, assigned: false
            });
        }
    }

    function draw() {
        background(0);
        if (!isFontReady || !myFont) return;

        let curTime = audio ? audio.currentTime() : 0;
        updateSubtitles(curTime);
        fft.analyze();
        
        // 6개 주파수 지점 설정 및 파장 생성
        let bands = [20, 150, 400, 1000, 2500, 5000];
        for(let i=0; i<6; i++) {
            let energy = fft.getEnergy(bands[i], bands[i]+200);
            if (energy > 200) { // 임계값 이상일 때 파장 생성
                ripples.push({
                    x: map(i, 0, 5, -width/3, width/3),
                    y: height/2 - 50,
                    r: 0,
                    a: map(energy, 200, 255, 30, 80),
                    hue: map(i, 0, 5, 180, 320)
                });
            }
        }

        // 파장 그리기 및 업데이트
        noFill();
        for (let i = ripples.length - 1; i >= 0; i--) {
            let r = ripples[i];
            stroke(r.hue, 80, 100, r.a);
            strokeWeight(2);
            ellipse(r.x, r.y, r.r);
            r.r += 10; // 퍼져나가는 속도
            r.a -= 1.5; // 서서히 사라짐
            if (r.a <= 0) ripples.splice(i, 1);
        }

        // --- 타이포 역산 로직 ---
        let needed = decomposeHangul(currentSub);
        particles.forEach(p => p.assigned = false);

        // 자막에 필요한 글자들 매칭
        needed.forEach(n => {
            let found = particles.find(p => !p.assigned && p.char === n.char);
            if (found) {
                found.assigned = true;
                found.tx = n.x;
                found.ty = n.y;
                found.tSize = 60; // 완성 시 크기
                found.tAlpha = 100;
            }
        });

        textFont(myFont);
        particles.forEach(p => {
            if (!p.assigned) {
                p.tx = p.bx; p.ty = p.by; p.tSize = 14; p.tAlpha = 20;
            }
            p.x = lerp(p.x, p.tx, 0.15);
            p.y = lerp(p.y, p.ty, 0.15);
            p.size = lerp(p.size, p.tSize, 0.1);
            p.alpha = lerp(p.alpha, p.tAlpha, 0.1);

            push();
            translate(p.x, p.y, p.assigned ? 50 : 0);
            fill(p.assigned ? 180 : 0, 0, 100, p.alpha);
            noStroke();
            textAlign(CENTER, CENTER);
            textSize(p.size);
            text(p.char, 0, 0);
            pop();
        });
    }

    function decomposeHangul(str) {
        let res = [];
        let syllableWidth = 100;
        let startX = -(str.length * syllableWidth) / 2;

        for (let i = 0; i < str.length; i++) {
            let code = str.charCodeAt(i) - 44032;
            let curX = startX + i * syllableWidth;

            if (code >= 0 && code <= 11171) {
                let choIdx = floor(code / 588);
                let jungIdx = floor((code % 588) / 28);
                let jongIdx = code % 28;

                // 위치 역산: 한글 조합 형태에 따른 정밀 배치
                res.push({ char: INITIALS[choIdx], x: curX - 15, y: -20 });
                res.push({ char: MEDIALS[jungIdx], x: curX + 20, y: 0 });
                if (jongIdx > 0) {
                    res.push({ char: FINALS[jongIdx - 1], x: curX, y: 30 });
                }
            } else {
                res.push({ char: str[i], x: curX, y: 0 });
            }
        }
        return res;
    }

    function handleFont(f) {
        if (f.length > 0) {
            loadFont(URL.createObjectURL(f[0]), (font) => {
                myFont = font; isFontReady = true;
                document.getElementById('status').innerText = "Font Ready. MP3를 로드하세요.";
            });
        }
    }

    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0]), () => { document.getElementById('status').innerText = "Audio Ready."; }); }
    function handleSRT(f) {
        const reader = new FileReader();
        reader.onload = (e) => {
            subtitles = parseSRT(e.target.result);
            document.getElementById('status').innerText = `SRT Ready (${subtitles.length} words)`;
            document.getElementById('startBtn').disabled = false;
        };
        reader.readAsText(f[0]);
    }

    function parseSRT(d) {
        const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2}|\n*$)/g;
        let m, r = [];
        while ((m = regex.exec(d)) !== null) { r.push({ start: tToS(m[2]), end: tToS(m[3]), text: m[4].trim() }); }
        return r;
    }
    function tToS(t) { let a = t.split(':'), s = a[2].split(','); return (+a[0])*3600 + (+a[1])*60 + (+s[0]) + (+s[1]/1000); }
    function updateSubtitles(t) { let f = subtitles.find(s => t >= s.start && t <= s.end); currentSub = f ? f.text : ""; }
    function startEngine() { if (audio && !audio.isPlaying()) { userStartAudio().then(() => { audio.play(); document.getElementById('startBtn').innerText = "ENGINE RUNNING..."; }); } }
</script>
</body>
</html>
