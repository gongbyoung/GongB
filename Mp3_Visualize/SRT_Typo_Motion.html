<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO PARTICLE ENGINE v1.8 — Cinematic Production</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #000; }
        body { margin: 0; background: #050505; overflow: hidden; font-family: sans-serif; color: #fff; display: flex; }
        #canvas-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        #panel { width: 320px; background: #0a0a0f; padding: 20px; border-left: 1px solid #1a1a1a; font-size: 11px; color: #666; overflow-y: auto; height: 100vh; }
        .btn { width: 100%; padding: 12px; background: transparent; color: var(--accent); border: 1px solid var(--accent); cursor: pointer; font-weight: bold; margin-bottom: 8px; }
        .btn:hover { background: var(--accent); color: #000; }
        .status-box { padding: 10px; background: #111; border-radius: 4px; margin-top: 5px; color: #aaa; border: 1px solid #222; }
        .ratio-btns { display: flex; gap: 5px; margin-bottom: 15px; }
        .btn-s { padding: 8px; flex: 1; font-size: 10px; border-color: #555; color: #888; }
        .active-r { border-color: var(--accent) !important; color: var(--accent) !important; }
        b { color: var(--accent); }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="panel">
    <h3 style="color:white; margin-top:0;">PRODUCTION v1.8</h3>
    
    <p><b>1. ASPECT RATIO</b></p>
    <div class="ratio-btns">
        <button id="r169" class="btn btn-s active-r" onclick="changeRatio(1280, 720, 'r169')">16:9 (Landscape)</button>
        <button id="r916" class="btn btn-s" onclick="changeRatio(720, 1280, 'r916')">9:16 (Shorts)</button>
    </div>

    <p><b>2. ASSET LOADING</b></p>
    <button class="btn" style="border-color:#ffcc00; color:#ffcc00;" onclick="document.getElementById('fIn').click()">📁 LOAD FONT (.ttf)</button>
    <input type="file" id="fIn" accept=".ttf,.otf" style="display:none" onchange="handleFont(this.files)">
    
    <button class="btn" onclick="document.getElementById('mIn').click()">🎵 LOAD MP3</button>
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    
    <button class="btn" onclick="document.getElementById('sIn').click()">📄 LOAD SRT</button>
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    
    <hr style="border:0; border-top:1px solid #1a1a1a; margin:15px 0;">
    
    <button class="btn" id="startBtn" onclick="startEngine()" disabled style="border-color:#ff3377; color:#ff3377; height: 60px;">🔴 START ENGINE & RECORD</button>
    
    <div class="status-box" id="status">Waiting for files...</div>
    <div id="rec-status" style="margin-top:10px; color: #ff3377; font-weight: bold; display:none;">● RECORDING...</div>
</div>

<script>
    let audio, fft, myFont, subtitles = [], currentSub = "";
    let particles = [], ripples = [];
    let isFontReady = false, canvasW = 1280, canvasH = 720;
    let recorder, recordedChunks = [];

    const INITIALS = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    const MEDIALS = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
    const FINALS = ["ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    const SOURCE_POOL = [...INITIALS, ...MEDIALS, ...FINALS];

    function setup() {
        let cnv = createCanvas(canvasW, canvasH, WEBGL);
        cnv.parent('canvas-container');
        colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);
        initGrid();
    }

    function initGrid() {
        particles = [];
        let count = SOURCE_POOL.length;
        let cols = Math.ceil(Math.sqrt(count * (width/height)));
        let rows = Math.ceil(count / cols);
        let sw = width / cols;
        let sh = height / rows;

        for (let i = 0; i < count; i++) {
            let cx = (i % cols) * sw - width/2 + sw/2;
            let cy = Math.floor(i / cols) * sh - height/2 + sh/2;
            particles.push({
                char: SOURCE_POOL[i],
                bx: cx, by: cy, x: cx, y: cy, tx: cx, ty: cy,
                size: sh * 0.4, tSize: sh * 0.4,
                hue: random(360),
                alpha: 20, tAlpha: 20,
                history: [],
                assigned: false
            });
        }
    }

    function draw() {
        background(0);
        if (!isFontReady || !myFont) {
            push(); fill(255); textAlign(CENTER); text("PLEASE LOAD FONT", 0, 0); pop();
            return;
        }

        let curTime = audio ? audio.currentTime() : 0;
        updateSubtitles(curTime);
        fft.analyze();

        // 파장 시스템
        let bands = [20, 150, 400, 1000, 2500, 5000];
        for(let i=0; i<6; i++) {
            let energy = fft.getEnergy(bands[i], bands[i]+200);
            if (energy > 210) {
                ripples.push({ x: map(i, 0, 5, -width/3, width/3), y: height/2 - 50, r: 0, a: 50, hue: map(i, 0, 5, 180, 320) });
            }
        }
        noFill();
        for (let i = ripples.length - 1; i >= 0; i--) {
            let r = ripples[i];
            stroke(r.hue, 80, 100, r.a); ellipse(r.x, r.y, r.r);
            r.r += 12; r.a -= 1.5;
            if (r.a <= 0) ripples.splice(i, 1);
        }

        // 타이포 로직
        let needed = decomposeHangul(currentSub);
        particles.forEach(p => p.assigned = false);

        needed.forEach(n => {
            let found = particles.find(p => !p.assigned && p.char === n.char);
            if (found) {
                found.assigned = true; found.tx = n.x; found.ty = n.y;
                found.tSize = 70 + fft.getEnergy("bass")*0.2; found.tAlpha = 100;
            }
        });

        textFont(myFont);
        particles.forEach(p => {
            if (!p.assigned) {
                p.tx = p.bx; p.ty = p.by; p.tSize = (height / 12) * 0.4; p.tAlpha = 20;
            } else {
                // 트레일 기록
                p.history.push({x: p.x, y: p.y});
                if (p.history.length > 10) p.history.shift();
            }

            // 트레일 그리기
            if (p.assigned && p.history.length > 1) {
                noFill(); stroke(p.hue, 80, 100, 30); strokeWeight(2);
                beginShape();
                p.history.forEach(pos => vertex(pos.x, pos.y, 40));
                endShape();
            }

            p.x = lerp(p.x, p.tx, 0.12);
            p.y = lerp(p.y, p.ty, 0.12);
            if(!p.assigned) p.history = []; // 복귀 시 트레일 삭제

            push();
            translate(p.x, p.y, p.assigned ? 50 : 0);
            // 원래 자리에 있을 때는 랜덤 색상, 이동 중엔 흰색/민트
            fill(p.assigned ? 180 : p.hue, p.assigned ? 0 : 70, 100, p.alpha);
            p.alpha = lerp(p.alpha, p.tAlpha, 0.1);
            p.size = lerp(p.size, p.tSize, 0.1);
            noStroke(); textAlign(CENTER, CENTER); textSize(p.size);
            text(p.char, 0, 0);
            pop();
        });
    }

    function decomposeHangul(str) {
        let res = [];
        let gap = width > height ? 100 : 70;
        let startX = -(str.length * gap) / 2;
        for (let i = 0; i < str.length; i++) {
            let code = str.charCodeAt(i) - 44032;
            let curX = startX + i * gap;
            if (code >= 0 && code <= 11171) {
                res.push({ char: INITIALS[Math.floor(code / 588)], x: curX - 15, y: -20 });
                res.push({ char: MEDIALS[Math.floor((code % 588) / 28)], x: curX + 20, y: 0 });
                let jong = code % 28;
                if (jong > 0) res.push({ char: FINALS[jong - 1], x: curX, y: 35 });
            } else { res.push({ char: str[i], x: curX, y: 0 }); }
        }
        return res;
    }

    function changeRatio(w, h, btnId) {
        canvasW = w; canvasH = h;
        resizeCanvas(w, h);
        document.querySelectorAll('.btn-s').forEach(b => b.classList.remove('active-r'));
        document.getElementById(btnId).classList.add('active-r');
        initGrid();
    }

    function handleFont(f) { loadFont(URL.createObjectURL(f[0]), (font) => { myFont = font; isFontReady = true; document.getElementById('status').innerText = "Font Ready."; }); }
    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0]), () => { 
        document.getElementById('status').innerText = "MP3 Ready."; 
        audio.onended(stopRecording); // 노래 끝나면 자동 저장
    }); }
    function handleSRT(f) {
        const reader = new FileReader();
        reader.onload = (e) => { subtitles = parseSRT(e.target.result); document.getElementById('status').innerText = `SRT Ready.`; document.getElementById('startBtn').disabled = false; };
        reader.readAsText(f[0]);
    }

    function parseSRT(d) {
        const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2}|\n*$)/g;
        let m, r = [];
        while ((m = regex.exec(d)) !== null) { r.push({ start: tToS(m[2]), end: tToS(m[3]), text: m[4].trim() }); }
        return r;
    }
    function tToS(t) { let a = t.split(':'), s = a[2].split(','); return (+a[0])*3600 + (+a[1])*60 + (+s[0]) + (+s[1]/1000); }
    function updateSubtitles(t) { let f = subtitles.find(s => t >= s.start && t <= s.end); currentSub = f ? f.text : ""; }

    function startEngine() {
        if (audio && !audio.isPlaying()) {
            userStartAudio().then(() => {
                startRecording();
                audio.play();
                document.getElementById('startBtn').innerText = "SYSTEM RUNNING...";
                document.getElementById('rec-status').style.display = "block";
            });
        }
    }

    function startRecording() {
        recordedChunks = [];
        let stream = document.querySelector('canvas').captureStream(60);
        recorder = new MediaRecorder(stream, { mimeType: 'video/mp4; codecs=avc1' });
        recorder.ondataavailable = e => recordedChunks.push(e.data);
        recorder.onstop = exportVideo;
        recorder.start();
    }

    function stopRecording() { if(recorder) recorder.stop(); }

    function exportVideo() {
        let blob = new Blob(recordedChunks, { type: 'video/mp4' });
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url; a.download = `typo_render_${Date.now()}.mp4`;
        a.click();
        document.getElementById('rec-status').style.display = "none";
        document.getElementById('startBtn').innerText = "DOWNLOADED. START AGAIN?";
    }
</script>
</body>
</html>
