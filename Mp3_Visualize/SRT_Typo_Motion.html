<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO PARTICLE ENGINE v1.9 — Perfect Assembly</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #000; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: #fff; display: flex; }
        #canvas-container { flex: 1; display: flex; align-items: center; justify-content: center; }
        #panel { width: 320px; background: #0a0a0f; padding: 20px; border-left: 1px solid #1a1a1a; font-size: 11px; color: #666; overflow-y: auto; height: 100vh; }
        .btn { width: 100%; padding: 12px; background: transparent; color: var(--accent); border: 1px solid var(--accent); cursor: pointer; font-weight: bold; margin-bottom: 8px; }
        .btn:hover { background: var(--accent); color: #000; }
        .status-box { padding: 10px; background: #111; border-radius: 4px; margin-top: 5px; color: #aaa; border: 1px solid #222; }
        .ratio-btns { display: flex; gap: 5px; margin-bottom: 15px; }
        .btn-s { padding: 8px; flex: 1; font-size: 10px; border-color: #555; color: #888; background: #000; cursor: pointer; }
        .active-r { border-color: var(--accent) !important; color: var(--accent) !important; }
        b { color: var(--accent); }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="panel">
    <h3 style="color:white; margin-top:0;">MASTER v1.9</h3>
    
    <p><b>1. ASPECT RATIO</b></p>
    <div class="ratio-btns">
        <button id="r169" class="btn btn-s active-r" onclick="changeRatio(1280, 720, 'r169')">16:9 Landscape</button>
        <button id="r916" class="btn btn-s" onclick="changeRatio(720, 1280, 'r916')">9:16 Shorts</button>
    </div>

    <p><b>2. ASSET LOAD</b></p>
    <button class="btn" style="border-color:#ffcc00; color:#ffcc00;" onclick="document.getElementById('fIn').click()">📁 FONT (.ttf)</button>
    <input type="file" id="fIn" accept=".ttf,.otf" style="display:none" onchange="handleFont(this.files)">
    <button class="btn" onclick="document.getElementById('mIn').click()">🎵 MP3</button>
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    <button class="btn" onclick="document.getElementById('sIn').click()">📄 SRT</button>
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    
    <hr style="border:0; border-top:1px solid #1a1a1a; margin:15px 0;">
    <button class="btn" id="startBtn" onclick="startEngine()" disabled style="border-color:#ff3377; color:#ff3377; height: 50px;">🔴 START & RECORD</button>
    <div class="status-box" id="status">Waiting...</div>
    <div id="rec-tag" style="color:#ff3377; font-weight:bold; display:none; margin-top:10px;">● REC NOW</div>
</div>

<script>
    let audio, fft, myFont, subtitles = [], currentSub = "";
    let particles = [], ripples = [];
    let isFontReady = false, canvasW = 1280, canvasH = 720;
    let recorder, recordedChunks = [];

    const INITIALS = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    const MEDIALS = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
    const FINALS = ["ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    const SOURCE_POOL = [...INITIALS, ...MEDIALS, ...FINALS];

    function setup() {
        let cnv = createCanvas(canvasW, canvasH, WEBGL);
        cnv.parent('canvas-container');
        colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);
        initGrid();
    }

    function initGrid() {
        particles = [];
        let count = SOURCE_POOL.length;
        let aspect = width / height;
        let cols = ceil(sqrt(count * aspect));
        let rows = ceil(count / cols);
        let sw = width / cols;
        let sh = height / rows;

        for (let i = 0; i < count; i++) {
            let cx = (i % cols) * sw - width/2 + sw/2;
            let cy = floor(i / cols) * sh - height/2 + sh/2;
            particles.push({
                char: SOURCE_POOL[i], bx: cx, by: cy, x: cx, y: cy, tx: cx, ty: cy,
                size: sh * 0.4, tSize: sh * 0.4, hue: random(360),
                alpha: 20, tAlpha: 20, history: [], assigned: false
            });
        }
    }

    function draw() {
        background(0);
        if (!isFontReady || !myFont) return;

        let curTime = audio ? audio.currentTime() : 0;
        updateSubtitles(curTime);
        fft.analyze();

        // 파장
        let bands = [20, 150, 400, 1000, 2500, 5000];
        for(let i=0; i<6; i++) {
            if (fft.getEnergy(bands[i]) > 210) {
                ripples.push({ x: map(i, 0, 5, -width/3, width/3), y: height/2 - 50, r: 0, a: 50, h: map(i, 0, 5, 180, 320) });
            }
        }
        noFill();
        for (let i = ripples.length - 1; i >= 0; i--) {
            let r = ripples[i];
            stroke(r.h, 80, 100, r.a); ellipse(r.x, r.y, r.r);
            r.r += 12; r.a -= 1.5;
            if (r.a <= 0) ripples.splice(i, 1);
        }

        // 역산 기반 타이포 로직
        let targetLocs = decomposeHangul(currentSub);
        particles.forEach(p => p.assigned = false);

        targetLocs.forEach(t => {
            let found = particles.find(p => !p.assigned && p.char === t.char);
            if (found) {
                found.assigned = true; found.tx = t.x; found.ty = t.y;
                found.tSize = 75 + fft.getEnergy("bass")*0.1; found.tAlpha = 100;
            }
        });

        textFont(myFont);
        particles.forEach(p => {
            if (!p.assigned) {
                p.tx = p.bx; p.ty = p.by; p.tSize = (height / 14); p.tAlpha = 20;
                p.history = [];
            } else {
                p.history.push({x: p.x, y: p.y});
                if (p.history.length > 8) p.history.shift();
                
                // 트레일
                noFill(); stroke(p.hue, 80, 100, 40); strokeWeight(2);
                beginShape();
                p.history.forEach(pos => vertex(pos.x, pos.y, 40));
                endShape();
            }

            p.x = lerp(p.x, p.tx, 0.12);
            p.y = lerp(p.y, p.ty, 0.12);
            p.alpha = lerp(p.alpha, p.tAlpha, 0.1);
            p.size = lerp(p.size, p.tSize, 0.1);

            push();
            translate(p.x, p.y, p.assigned ? 50 : 0);
            fill(p.assigned ? 0 : p.hue, p.assigned ? 0 : 80, 100, p.alpha);
            noStroke(); textAlign(CENTER, CENTER); textSize(p.size);
            text(p.char, 0, 0);
            pop();
        });
    }

    function decomposeHangul(str) {
        let res = [];
        let gap = width > height ? 100 : 80;
        let startX = -(str.length * gap) / 2;
        
        for (let i = 0; i < str.length; i++) {
            let charCode = str.charCodeAt(i);
            let curX = startX + i * gap;

            if (charCode >= 0xAC00 && charCode <= 0xD7A3) {
                let code = charCode - 0xAC00;
                let cho = floor(code / 588);
                let jung = floor((code % 588) / 28);
                let jong = code % 28;

                // [역산 로직] 모음 형태에 따른 배치
                let jungChar = MEDIALS[jung];
                let isVertical = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅣ"].includes(jungChar);
                
                if (isVertical) {
                    res.push({ char: INITIALS[cho], x: curX - 18, y: -10 });
                    res.push({ char: jungChar, x: curX + 18, y: 0 });
                } else {
                    res.push({ char: INITIALS[cho], x: curX, y: -22 });
                    res.push({ char: jungChar, x: curX, y: 15 });
                }
                
                if (jong > 0) {
                    res.push({ char: FINALS[jong - 1], x: curX, y: 35 });
                }
            } else {
                res.push({ char: str[i], x: curX, y: 0 });
            }
        }
        return res;
    }

    function changeRatio(w, h, id) {
        canvasW = w; canvasH = h;
        resizeCanvas(w, h);
        document.querySelectorAll('.btn-s').forEach(b => b.classList.remove('active-r'));
        document.getElementById(id).classList.add('active-r');
        initGrid();
    }

    function handleFont(f) { loadFont(URL.createObjectURL(f[0]), (font) => { myFont = font; isFontReady = true; document.getElementById('status').innerText = "Font OK"; }); }
    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0]), () => { document.getElementById('status').innerText = "MP3 OK"; audio.onended(stopRecording); }); }
    function handleSRT(f) {
        const reader = new FileReader();
        reader.onload = (e) => { subtitles = parseSRT(e.target.result); document.getElementById('status').innerText = "SRT OK"; document.getElementById('startBtn').disabled = false; };
        reader.readAsText(f[0]);
    }

    function parseSRT(d) {
        const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2}|\n*$)/g;
        let m, r = [];
        while ((m = regex.exec(d)) !== null) { r.push({ start: tToS(m[2]), end: tToS(m[3]), text: m[4].trim() }); }
        return r;
    }
    function tToS(t) { let a = t.split(':'), s = a[2].split(','); return (+a[0])*3600 + (+a[1])*60 + (+s[0]) + (+s[1]/1000); }
    function updateSubtitles(t) { let f = subtitles.find(s => t >= s.start && t <= s.end); currentSub = f ? f.text : ""; }

    function startEngine() {
        if (audio && !audio.isPlaying()) {
            userStartAudio().then(() => {
                startRecording();
                audio.play();
                document.getElementById('startBtn').innerText = "RECORDING...";
                document.getElementById('rec-tag').style.display = "block";
            });
        }
    }

    function startRecording() {
        recordedChunks = [];
        let stream = document.querySelector('canvas').captureStream(60);
        recorder = new MediaRecorder(stream, { mimeType: 'video/mp4; codecs=avc1' });
        recorder.ondataavailable = e => recordedChunks.push(e.data);
        recorder.onstop = () => {
            let blob = new Blob(recordedChunks, { type: 'video/mp4' });
            let a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `typo_master_${Date.now()}.mp4`; a.click();
            document.getElementById('rec-tag').style.display = "none";
            document.getElementById('startBtn').innerText = "DONE";
        };
        recorder.start();
    }
    function stopRecording() { if(recorder && recorder.state === "recording") recorder.stop(); }
</script>
</body>
</html>
