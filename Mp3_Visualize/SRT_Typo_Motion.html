<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO VFX MASTER v3.026 — Precision Master</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00ffcc; --comp: #ff3366; --bg: #000; }
        body { margin: 0; background: #050505; overflow: hidden; font-family: sans-serif; color: #fff; display: flex; }
        #canvas-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        #panel { width: 320px; background: #0a0a0f; padding: 20px; border-left: 1px solid #1a1a1a; font-size: 11px; color: #666; overflow-y: auto; height: 100vh; }
        .btn { width: 100%; padding: 12px; background: transparent; color: var(--accent); border: 1px solid var(--accent); cursor: pointer; font-weight: bold; margin-bottom: 8px; transition: 0.2s; }
        .btn:hover { background: var(--accent); color: #000; }
        .btn-active { border-color: var(--accent) !important; color: var(--accent) !important; background: rgba(0,255,204,0.1); }
        .slider-row { margin: 15px 0; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        .status-box { padding: 10px; background: #111; border-radius: 4px; margin-top: 5px; color: #aaa; border: 1px solid #222; }
        b { color: var(--accent); }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="panel">
    <h3 style="color:white; margin-top:0;">PRODUCTION v3.026</h3>
    
    <p><b>1. LAYOUT & RATIO</b></p>
    <div style="display:flex; gap:5px; margin-bottom:5px;">
        <button id="r169" class="btn btn-active" style="font-size:10px" onclick="changeRatio(1280, 720, 'r169')">16:9</button>
        <button id="r916" class="btn" style="font-size:10px" onclick="changeRatio(720, 1280, 'r916')">9:16</button>
    </div>
    <button id="vSrt" class="btn" onclick="toggleVertical()">↕️ VERTICAL SRT: OFF</button>

    <p><b>2. VISUAL MODE</b></p>
    <div style="display:flex; gap:5px; margin-bottom:15px;">
        <button id="mStar" class="btn btn-active" style="flex:1" onclick="setMode('star')">🌌 STAR</button>
        <button id="mWave" class="btn" style="flex:1" onclick="setMode('wave')">🌊 WAVE</button>
    </div>

    <p><b>3. VFX CONTROL</b></p>
    <div class="slider-row">
        <label>TRAIL TIME: <span id="valT">0.5</span>s</label>
        <input type="range" id="trailT" min="0.1" max="1.0" step="0.1" value="0.5" oninput="document.getElementById('valT').innerText=this.value">
    </div>
    <div class="slider-row">
        <label>FONT SIZE: <span id="valP2">70</span></label>
        <input type="range" id="p2" min="30" max="150" value="70" oninput="document.getElementById('valP2').innerText=this.value">
    </div>

    <p><b>4. ASSET LOADING</b></p>
    <button class="btn" style="border-color:#ffcc00; color:#ffcc00;" onclick="document.getElementById('fIn').click()">📁 LOAD FONT (.ttf)</button>
    <input type="file" id="fIn" accept=".ttf,.otf" style="display:none" onchange="handleFont(this.files)">
    <button class="btn" onclick="document.getElementById('mIn').click()">🎵 LOAD MP3</button>
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    <button class="btn" onclick="document.getElementById('sIn').click()">📄 LOAD SRT</button>
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    
    <button class="btn" id="startBtn" onclick="startEngine()" disabled style="border-color:#ff3377; color:#ff3377; height: 50px; margin-top:10px;">🔴 START & RECORD</button>
    <div class="status-box" id="status">Vowel Mapping Fixed (v3.026)</div>
</div>

<script>
    let audio, fft, myFont, subtitles = [], currentSub = "";
    let particles = [], visualMode = 'star', isVerticalSRT = false;
    let isFontReady = false, canvasW = 1280, canvasH = 720;
    let recorder, recordedChunks = [];

    const INITIALS = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    // [v3.026] 모음 중복 ㅜ 제거 및 인덱스 정밀 보정
    const MEDIALS = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
    const FINALS = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];

    function setup() {
        let cnv = createCanvas(canvasW, canvasH, WEBGL);
        cnv.parent('canvas-container');
        colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);
        initParticles();
    }

    function initParticles() {
        particles = [];
        for (let i = 0; i < 1500; i++) {
            let hX = random(-width, width);
            let hY = visualMode === 'wave' ? height/2.2 : random(-height, height);
            let hZ = visualMode === 'wave' ? random(-100, 100) : random(-1000, -200);
            particles.push({
                x: hX, y: hY, z: hZ, hx: hX, hy: hY, hz: hZ,
                tx: 0, ty: 0, tz: 0, tScale: 0.1, curScale: 0.1,
                history: [], assigned: false,
                size: random(2, 5), hue: random(170, 240)
            });
        }
    }

    function toggleVertical() {
        isVerticalSRT = !isVerticalSRT;
        document.getElementById('vSrt').innerText = isVerticalSRT ? "↕️ VERTICAL SRT: ON" : "↕️ VERTICAL SRT: OFF";
        document.getElementById('vSrt').classList.toggle('btn-active', isVerticalSRT);
    }

    function setMode(m) { 
        visualMode = m; 
        document.getElementById('mStar').classList.toggle('btn-active', m === 'star');
        document.getElementById('mWave').classList.toggle('btn-active', m === 'wave');
        initParticles(); 
    }

    function draw() {
        background(0);
        if (!isFontReady || !myFont) return;

        // 보색 프레임 (Magenta)
        push(); noFill(); stroke(340, 80, 100); strokeWeight(10);
        rect(-width/2, -height/2, width, height); pop();

        let curTime = audio ? audio.currentTime() : 0;
        updateSubtitles(curTime);
        fft.analyze();
        let bass = fft.getEnergy("bass");
        let treble = fft.getEnergy(4000, 8000);

        if (visualMode === 'wave') drawDynamicWaves(bass, treble);
        else drawStarField();

        let fSize = parseInt(document.getElementById('p2').value);
        let trailTime = parseFloat(document.getElementById('trailT').value);
        let targetLocs = decomposeHangul(currentSub, fSize);

        particles.forEach(p => p.assigned = false);
        targetLocs.forEach((t, i) => {
            if (i < particles.length) {
                let p = particles[i];
                p.assigned = true; p.char = t.char;
                p.tx = t.x; p.ty = t.y; p.tz = 150; p.tScale = 1.0;
            }
        });

        textFont(myFont);
        particles.forEach(p => {
            if (p.assigned) {
                let maxH = floor(trailTime * 60);
                p.history.push({x: p.x, y: p.y, z: p.z});
                if (p.history.length > maxH) p.history.shift();

                p.x = lerp(p.x, p.tx, 0.1);
                p.y = lerp(p.y, p.ty, 0.1);
                p.z = lerp(p.z, p.tz, 0.1);
                p.curScale = lerp(p.curScale, p.tScale, 0.1);

                if(p.history.length > 1) {
                    noFill(); stroke(p.hue, 40, 100, 35); strokeWeight(1.5);
                    beginShape(); p.history.forEach(h => vertex(h.x, h.y, h.z)); endShape();
                }

                push(); translate(p.x, p.y, p.z); scale(p.curScale);
                fill(0, 0, 100); noStroke(); textAlign(CENTER, CENTER); textSize(fSize);
                text(p.char, 0, 0); pop();
            } else {
                p.tx = p.hx; p.ty = p.hy; p.tz = p.hz; p.tScale = 0.1;
                p.x = lerp(p.x, p.tx, 0.05); p.y = lerp(p.y, p.ty, 0.05); p.z = lerp(p.z, p.tz, 0.05);
                p.curScale = lerp(p.curScale, p.tScale, 0.1);
                p.history = [];
                push(); translate(p.x, p.y, p.z);
                if (visualMode === 'star') { fill(p.hue, 20, 100, 40); sphere(p.size * 0.5); }
                pop();
            }
        });
    }

    function drawStarField() {
        for(let i=0; i<10; i++) {
            push(); translate(random(-width, width), random(-height, height), -800);
            fill(0,0,100,10); ellipse(0,0,random(2,5)); pop();
        }
    }

    function drawDynamicWaves(bass, treble) {
        push(); translate(-width/2, height/3.5, -200);
        stroke(200, 80, 100, 45); noFill();
        let crash = treble > 150 ? map(treble, 150, 255, 10, 120) : 0;
        for (let j = 0; j < 6; j++) {
            beginShape();
            for (let i = 0; i <= 25; i++) {
                let x = map(i, 0, 25, 0, width);
                let waveY = sin(i * 0.4 + frameCount * 0.05 + j) * (30 + bass * 0.2 + (i % 2 === 0 ? crash : 0));
                vertex(x, waveY, j * 45);
                let pIdx = j * 25 + i;
                if(particles[pIdx] && !particles[pIdx].assigned) {
                    particles[pIdx].hx = x - width/2;
                    particles[pIdx].hy = waveY + height/3.5;
                }
            }
            endShape();
        }
        pop();
    }

    function decomposeHangul(str, fSize) {
        let res = [];
        let gap = fSize * 1.15;
        
        if (isVerticalSRT) {
            let totalH = str.length * gap;
            let startY = -totalH / 2 + gap/2;
            for (let i = 0; i < str.length; i++) {
                let charCode = str.charCodeAt(i) - 44032;
                let curY = startY + i * (gap * 1.2);
                let curX = 0;
                if (charCode >= 0 && charCode <= 11171) {
                    let cho = Math.floor(charCode / 588);
                    let jung = Math.floor((charCode % 588) / 28);
                    let jong = charCode % 28;
                    let jungChar = MEDIALS[jung];
                    let isV = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅣ"].includes(jungChar);
                    if (isV) {
                        res.push({ char: INITIALS[cho], x: curX - fSize*0.25, y: curY - fSize*0.15 });
                        res.push({ char: jungChar, x: curX + fSize*0.25, y: curY });
                    } else {
                        res.push({ char: INITIALS[cho], x: curX, y: curY - fSize*0.3 });
                        res.push({ char: jungChar, x: curX, y: curY + fSize*0.1 });
                    }
                    if (jong > 0) res.push({ char: FINALS[jong], x: curX, y: curY + fSize*0.45 });
                } else { res.push({ char: str[i], x: curX, y: curY }); }
            }
        } else {
            let totalW = str.length * gap;
            let startX = -totalW / 2 + gap/2;
            for (let i = 0; i < str.length; i++) {
                let charCode = str.charCodeAt(i) - 44032;
                let curX = startX + i * gap;
                if (charCode >= 0 && charCode <= 11171) {
                    let cho = Math.floor(charCode / 588);
                    let jung = Math.floor((charCode % 588) / 28);
                    let jong = charCode % 28;
                    let jungChar = MEDIALS[jung];
                    let isV = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅣ"].includes(jungChar);
                    let isC = ["ㅘ","ㅙ","ㅚ","ㅝ","ㅞ","ㅟ","ㅢ"].includes(jungChar);
                    
                    if (isV) {
                        res.push({ char: INITIALS[cho], x: curX - fSize*0.26, y: -fSize*0.15 });
                        res.push({ char: jungChar, x: curX + fSize*0.26, y: -fSize*0.05 });
                    } else if (isC) {
                        res.push({ char: INITIALS[cho], x: curX - fSize*0.15, y: -fSize*0.3 });
                        res.push({ char: jungChar, x: curX + fSize*0.15, y: -fSize*0.05 });
                    } else {
                        res.push({ char: INITIALS[cho], x: curX, y: -fSize*0.35 });
                        res.push({ char: jungChar, x: curX, y: fSize*0.12 });
                    }
                    if (jong > 0) res.push({ char: FINALS[jong], x: curX, y: fSize*0.48 });
                } else { res.push({ char: str[i], x: curX, y: 0 }); }
            }
        }
        return res;
    }

    function changeRatio(w, h, id) {
        canvasW = w; canvasH = h; resizeCanvas(w, h);
        document.getElementById('r169').classList.toggle('btn-active', id === 'r169');
        document.getElementById('r916').classList.toggle('btn-active', id === 'r916');
        initParticles();
    }
    function handleFont(f) { loadFont(URL.createObjectURL(f[0]), (font) => { myFont = font; isFontReady = true; }); }
    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0]), () => { audio.onended(stopRecording); }); }
    function handleSRT(f) {
        const reader = new FileReader();
        reader.onload = (e) => { subtitles = parseSRT(e.target.result); document.getElementById('startBtn').disabled = false; document.getElementById('status').innerText="Ready."; };
        reader.readAsText(f[0]);
    }
    function parseSRT(d) {
        const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2}|\n*$)/g;
        let m, r = [];
        while ((m = regex.exec(d)) !== null) { r.push({ start: tToS(m[2]), end: tToS(m[3]), text: m[4].trim() }); }
        return r;
    }
    function tToS(t) { let a = t.split(':'), s = a[2].split(','); return (+a[0])*3600 + (+a[1])*60 + (+s[0]) + (+s[1]/1000); }
    function updateSubtitles(t) { let f = subtitles.find(s => t >= s.start && t <= s.end); currentSub = f ? f.text : ""; }
    function startEngine() { if (audio && !audio.isPlaying()) { userStartAudio().then(() => { startRecording(); audio.play(); }); } }
    function startRecording() {
        recordedChunks = [];
        let stream = document.querySelector('canvas').captureStream(60);
        recorder = new MediaRecorder(stream, { mimeType: 'video/mp4; codecs=avc1' });
        recorder.ondataavailable = e => recordedChunks.push(e.data);
        recorder.onstop = () => {
            let blob = new Blob(recordedChunks, { type: 'video/mp4' });
            let a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `Production_v3026_${Date.now()}.mp4`; a.click();
        };
        recorder.start();
    }
    function stopRecording() { if(recorder) recorder.stop(); }
</script>
</body>
</html>
