<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO PARTICLE ENGINE v1.2 — Professional Kinetic</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #030305; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Pretendard', sans-serif; color: #fff; display: flex; }
        #canvas-container { flex: 1; }
        #panel { width: 300px; background: #0a0a0f; padding: 20px; border-left: 1px solid #1a1a1a; font-size: 11px; color: #666; }
        .btn { width: 100%; padding: 12px; background: transparent; color: var(--accent); border: 1px solid var(--accent); cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn:hover { background: var(--accent); color: #000; }
        b { color: var(--accent); }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="panel">
    <h3 style="color:white; margin-top:0;">TYPO & EQ ENGINE</h3>
    <button class="btn" onclick="document.getElementById('mIn').click()">🎵 1. LOAD MP3</button>
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    
    <button class="btn" onclick="document.getElementById('sIn').click()">📄 2. LOAD SRT</button>
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    
    <button class="btn" id="startBtn" onclick="startEngine()" disabled style="border-color:#ff3377; color:#ff3377;">⚡ 3. START ENGINE</button>
    
    <div id="status">파일을 로드해 주세요.</div>
    <hr style="border:0; border-top:1px solid #1a1a1a; margin:15px 0;">
    <p><b>6-BAND VISUALIZER:</b><br>Sub/Bass/LowMid/Mid/HighMid/Treble</p>
    <p><b>TYPO SYSTEM:</b><br>배경의 자음/모음이 단어 위치로 정확히 합쳐진 후 비산합니다.</p>
</div>

<script>
    let audio, fft, subtitles = [], currentSub = "";
    let particles = [];
    let eqCircles = [];
    
    const INITIALS = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    const MEDIALS = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
    const FINALS = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    const SOURCE_POOL = [...INITIALS, ...MEDIALS, ...FINALS.filter(x=>x!="")];

    function setup() {
        let cnv = createCanvas(windowWidth - 300, windowHeight, WEBGL);
        cnv.parent('canvas-container');
        colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);

        // 1. 입자 풀 생성 (배경에 흩뿌리기)
        for (let i = 0; i < 400; i++) {
            let rx = random(-width/2, width/2);
            let ry = random(-height/2, height/2);
            particles.push({
                char: random(SOURCE_POOL),
                bx: rx, by: ry, // 원래 배경 위치
                x: rx, y: ry,
                tx: rx, ty: ry, // 타겟 위치
                size: 12, tSize: 12,
                alpha: 15, tAlpha: 15,
                assigned: false
            });
        }

        // 2. 6개 EQ 위치 설정 (하단 가로 배치)
        for(let i=0; i<6; i++) {
            eqCircles.push({ x: map(i, 0, 5, -width/3, width/3), y: height/2 - 100 });
        }
    }

    function draw() {
        background(5);
        orbitControl(1, 1, 0); // 3D 시점 조절 가능
        
        let curTime = audio ? audio.currentTime() : 0;
        updateSubtitles(curTime);
        
        fft.analyze();
        let bands = [
            fft.getEnergy(20, 100),   // Sub
            fft.getEnergy(100, 250),  // Bass
            fft.getEnergy(250, 1000), // LowMid
            fft.getEnergy(1000, 2000),// Mid
            fft.getEnergy(2000, 4000),// HighMid
            fft.getEnergy(4000, 8000) // Treble
        ];

        // --- 6개 원형 비주얼라이저 ---
        noFill();
        strokeWeight(2);
        for(let i=0; i<6; i++) {
            let b = bands[i];
            push();
            translate(eqCircles[i].x, eqCircles[i].y);
            stroke(map(i, 0, 5, 180, 300), 80, 100, 50);
            ellipse(0, 0, 50 + b*0.8);
            stroke(map(i, 0, 5, 180, 300), 80, 100, 20);
            ellipse(0, 0, 80 + b*1.2);
            pop();
        }

        // --- 타이포 입자 시스템 ---
        let needed = decomposeHangul(currentSub);
        
        // 입자 할당 초기화
        particles.forEach(p => p.assigned = false);

        // 현재 단어에 필요한 입자 매칭
        needed.forEach((n, idx) => {
            let found = particles.find(p => !p.assigned && p.char === n.char);
            if (found) {
                found.assigned = true;
                // 글자 내 위치 계산 (n.x, n.y는 decomposeHangul에서 계산됨)
                found.tx = n.x;
                found.ty = n.y;
                found.tSize = 45 + bands[1]*0.1; // 베이스에 반응
                found.tAlpha = 100;
            }
        });

        // 입자 애니메이션 및 출력
        particles.forEach(p => {
            if (!p.assigned) {
                p.tx = p.bx; p.ty = p.by;
                p.tSize = 12; p.tAlpha = 15;
            }
            
            p.x = lerp(p.x, p.tx, 0.12);
            p.y = lerp(p.y, p.ty, 0.12);
            p.size = lerp(p.size, p.tSize, 0.1);
            p.alpha = lerp(p.alpha, p.tAlpha, 0.1);

            push();
            translate(p.x, p.y, p.assigned ? 50 : 0);
            fill(p.assigned ? 170 : 0, 0, 100, p.alpha);
            noStroke();
            textAlign(CENTER, CENTER);
            textSize(p.size);
            text(p.char, 0, 0);
            pop();
        });
    }

    // 한글 분해 및 상대 좌표 계산 로직
    function decomposeHangul(str) {
        let result = [];
        let startX = -(str.length * 40) / 2;
        
        for (let i = 0; i < str.length; i++) {
            let charCode = str.charCodeAt(i) - 44032;
            let curX = startX + i * 80;

            if (charCode >= 0 && charCode <= 11171) {
                let cho = Math.floor(charCode / 588);
                let jung = Math.floor((charCode % 588) / 28);
                let jong = charCode % 28;

                // 초성 위치
                result.push({ char: INITIALS[cho], x: curX, y: -20 });
                // 중성 위치
                result.push({ char: MEDIALS[jung], x: curX + 25, y: 0 });
                // 종성 위치
                if (jong !== 0) result.push({ char: FINALS[jong], x: curX, y: 25 });
            } else {
                result.push({ char: str[i], x: curX, y: 0 });
            }
        }
        return result;
    }

    function handleAudio(f) {
        audio = loadSound(URL.createObjectURL(f[0]), () => {
            document.getElementById('status').innerText = "오디오 준비 완료. SRT를 로드하세요.";
        });
    }

    function handleSRT(f) {
        const reader = new FileReader();
        reader.onload = (e) => {
            subtitles = parseSRT(e.target.result);
            document.getElementById('status').innerText = `자막 로드 완료 (${subtitles.length}단어). 엔진을 시작하세요.`;
            document.getElementById('startBtn').disabled = false;
        };
        reader.readAsText(f[0]);
    }

    function parseSRT(data) {
        const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2}|\n*$)/g;
        let m, res = [];
        while ((m = regex.exec(data)) !== null) {
            res.push({ start: tToS(m[2]), end: tToS(m[3]), text: m[4].trim() });
        }
        return res;
    }

    function tToS(t) {
        let a = t.split(':');
        let s = a[2].split(',');
        return (+a[0])*3600 + (+a[1])*60 + (+s[0]) + (+s[1]/1000);
    }

    function updateSubtitles(t) {
        let found = subtitles.find(s => t >= s.start && t <= s.end);
        currentSub = found ? found.text : "";
    }

    function startEngine() {
        if (audio && !audio.isPlaying()) {
            userStartAudio().then(() => {
                audio.play();
                document.getElementById('startBtn').innerText = "ENGINE RUNNING...";
                document.getElementById('startBtn').disabled = true;
            });
        }
    }
</script>
</body>
</html>
