<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO PARTICLE ENGINE v1.6 — Zero External Link</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #030305; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: sans-serif; color: #fff; display: flex; }
        #canvas-container { flex: 1; }
        #panel { width: 300px; background: #0a0a0f; padding: 20px; border-left: 1px solid #1a1a1a; font-size: 11px; color: #666; overflow-y: auto; }
        .btn { width: 100%; padding: 12px; background: transparent; color: var(--accent); border: 1px solid var(--accent); cursor: pointer; font-weight: bold; margin-bottom: 10px; transition: 0.2s; }
        .btn:hover { background: var(--accent); color: #000; }
        .btn-font { border-color: #ffcc00; color: #ffcc00; }
        .status-box { padding: 10px; background: #15151a; border-radius: 4px; margin-top: 5px; color: #aaa; border: 1px solid #222; }
        b { color: var(--accent); }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="panel">
    <h3 style="color:white; margin-top:0;">TYPO & EQ v1.6</h3>
    
    <p><b>1. FONT (필수)</b></p>
    <button class="btn btn-font" onclick="document.getElementById('fIn').click()">📁 LOAD LOCAL FONT (.ttf)</button>
    <input type="file" id="fIn" accept=".ttf,.otf" style="display:none" onchange="handleFont(this.files)">
    <div class="status-box" id="f-status">폰트 파일을 대기 중입니다.</div>

    <p><b>2. MEDIA</b></p>
    <button class="btn" onclick="document.getElementById('mIn').click()">🎵 LOAD MP3</button>
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    <button class="btn" onclick="document.getElementById('sIn').click()">📄 LOAD SRT</button>
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    
    <button class="btn" id="startBtn" onclick="startEngine()" disabled style="border-color:#ff3377; color:#ff3377; margin-top:10px;">⚡ START ENGINE</button>
    
    <div class="status-box" id="status">파일 로드 후 버튼이 활성화됩니다.</div>
</div>

<script>
    let audio, fft, myFont, subtitles = [], currentSub = "";
    let particles = [], eqCircles = [];
    let isFontReady = false;
    
    const INITIALS = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    const MEDIALS = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
    const FINALS = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    const SOURCE_POOL = [...INITIALS, ...MEDIALS, ...FINALS.filter(x=>x!="")];

    // [중요] 외부 폰트 preload 로직을 완전히 제거하여 404 에러 방지

    function setup() {
        let cnv = createCanvas(windowWidth - 300, windowHeight, WEBGL);
        cnv.parent('canvas-container');
        colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);

        for (let i = 0; i < 450; i++) {
            let rx = random(-width/2, width/2);
            let ry = random(-height/2, height/2);
            particles.push({
                char: random(SOURCE_POOL), bx: rx, by: ry, x: rx, y: ry, tx: rx, ty: ry,
                size: 12, tSize: 12, alpha: 20, tAlpha: 20, assigned: false
            });
        }
        for(let i=0; i<6; i++) eqCircles.push({ x: map(i, 0, 5, -width/3, width/3), y: height/2 - 120 });
    }

    function draw() {
        background(5);
        
        // 폰트가 로드되지 않았으면 대기 메시지만 출력
        if (!isFontReady || !myFont) {
            cursor(WAIT);
            return; 
        }
        cursor(ARROW);

        let curTime = audio ? audio.currentTime() : 0;
        updateSubtitles(curTime);
        fft.analyze();
        let b = [fft.getEnergy(20,120), fft.getEnergy(120,300), fft.getEnergy(300,1000), fft.getEnergy(1000,2000), fft.getEnergy(2000,4500), fft.getEnergy(4500,8000)];

        // EQ
        noFill();
        for(let i=0; i<6; i++) {
            push(); translate(eqCircles[i].x, eqCircles[i].y);
            stroke(map(i,0,5,180,320), 80, 100, 40); ellipse(0,0, 60+b[i]*0.9);
            stroke(map(i,0,5,180,320), 80, 100, 15); ellipse(0,0, 90+b[i]*1.3);
            pop();
        }

        // TYPO
        let needed = decomposeHangul(currentSub);
        particles.forEach(p => p.assigned = false);
        needed.forEach(n => {
            let found = particles.find(p => !p.assigned && p.char === n.char);
            if (found) {
                found.assigned = true; found.tx = n.x; found.ty = n.y;
                found.tSize = 50 + b[1]*0.15; found.tAlpha = 100;
            }
        });

        textFont(myFont);
        particles.forEach(p => {
            if (!p.assigned) { p.tx = p.bx; p.ty = p.by; p.tSize = 12; p.tAlpha = 20; }
            p.x = lerp(p.x, p.tx, 0.14); p.y = lerp(p.y, p.ty, 0.14);
            p.size = lerp(p.size, p.tSize, 0.1); p.alpha = lerp(p.alpha, p.tAlpha, 0.1);
            push(); translate(p.x, p.y, p.assigned ? 60 : 0);
            fill(p.assigned ? 180 : 0, 0, 100, p.alpha); noStroke();
            textAlign(CENTER, CENTER); textSize(p.size); text(p.char, 0, 0);
            pop();
        });
    }

    function handleFont(f) {
        if (f.length > 0) {
            loadFont(URL.createObjectURL(f[0]), (font) => {
                myFont = font;
                isFontReady = true;
                document.getElementById('f-status').innerText = `Font Ready: ${f[0].name}`;
            });
        }
    }

    function decomposeHangul(str) {
        let res = [], startX = -(str.length * 45) / 2;
        for (let i = 0; i < str.length; i++) {
            let code = str.charCodeAt(i) - 44032, curX = startX + i * 90;
            if (code >= 0 && code <= 11171) {
                res.push({ char: INITIALS[Math.floor(code / 588)], x: curX, y: -25 });
                res.push({ char: MEDIALS[Math.floor((code % 588) / 28)], x: curX + 28, y: 5 });
                let jong = code % 28; if (jong !== 0) res.push({ char: FINALS[jong], x: curX, y: 35 });
            } else { res.push({ char: str[i], x: curX, y: 0 }); }
        }
        return res;
    }

    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0]), () => { document.getElementById('status').innerText = "Audio Ready."; }); }
    function handleSRT(f) {
        const reader = new FileReader();
        reader.onload = (e) => {
            subtitles = parseSRT(e.target.result);
            document.getElementById('status').innerText = `SRT Ready (${subtitles.length} words)`;
            document.getElementById('startBtn').disabled = false;
        };
        reader.readAsText(f[0]);
    }
    function parseSRT(d) {
        const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2}|\n*$)/g;
        let m, r = [];
        while ((m = regex.exec(d)) !== null) { r.push({ start: tToS(m[2]), end: tToS(m[3]), text: m[4].trim() }); }
        return r;
    }
    function tToS(t) { let a = t.split(':'), s = a[2].split(','); return (+a[0])*3600 + (+a[1])*60 + (+s[0]) + (+s[1]/1000); }
    function updateSubtitles(t) { let f = subtitles.find(s => t >= s.start && t <= s.end); currentSub = f ? f.text : ""; }
    function startEngine() { if (audio && !audio.isPlaying()) { userStartAudio().then(() => { audio.play(); document.getElementById('startBtn').innerText = "ENGINE RUNNING..."; }); } }
</script>
</body>
</html>
