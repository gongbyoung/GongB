<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO SCRAMBLE v1.1 — Kinetic Subtitle</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #050505; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Pretendard', sans-serif; color: #fff; display: flex; }
        #canvas-container { flex: 1; position: relative; }
        #ctrl-panel { width: 320px; background: #0a0a0a; padding: 25px; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; gap: 15px; }
        .btn { width: 100%; padding: 12px; background: transparent; color: var(--accent); border: 1px solid var(--accent); cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: var(--accent); color: #000; }
        .btn:disabled { border-color: #333; color: #333; cursor: not-allowed; }
        #srt-status { font-size: 11px; color: #666; line-height: 1.6; }
        .info { font-size: 11px; color: #444; border-top: 1px solid #1a1a1a; pt: 15px; }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="ctrl-panel">
    <h3 style="color:var(--accent); margin-top:0;">TYPO ENGINE</h3>
    
    <button class="btn" onclick="document.getElementById('audioIn').click()">🎵 1. LOAD MP3</button>
    <input type="file" id="audioIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    
    <button class="btn" onclick="document.getElementById('srtIn').click()">📄 2. LOAD SRT</button>
    <input type="file" id="srtIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    
    <button class="btn" id="startBtn" onclick="startEngine()" disabled style="border-color: #ff3377; color: #ff3377;">⚡ 3. START ENGINE</button>
    
    <div id="srt-status">준비 상태: 파일 대기 중...</div>
    
    <div class="info">
        * 배경의 각 자음/모음은 단 하나씩만 존재합니다.<br>
        * SRT 자막 생성 시 해당 자음/모음이 중앙으로 차출됩니다.<br>
        * <b>반드시 로컬 서버(Live Server 등)에서 실행하세요.</b>
    </div>
</div>

<script>
    let audio, fft, subtitles = [], currentSub = "";
    let particles = [];
    const JA = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    const MO = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
    // 종성용 자음 추가 (복합 자음 포함)
    const FINAL_JA = ["ㄳ","ㄵ","ㄶ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅄ"];
    const SOURCE_CHARS = [...JA, ...MO, ...FINAL_JA];

    function setup() {
        let cnv = createCanvas(windowWidth - 320, windowHeight);
        cnv.parent('canvas-container');
        colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT();
        
        // 배경에 자음/모음 딱 한 번씩만 배치
        let cols = 15;
        let rows = Math.ceil(SOURCE_CHARS.length / cols);
        let spacingX = width / (cols + 1);
        let spacingY = height / (rows + 1);

        let idx = 0;
        for (let r = 1; r <= rows; r++) {
            for (let c = 1; c <= cols; c++) {
                if (idx < SOURCE_CHARS.length) {
                    let bx = c * spacingX;
                    let by = r * spacingY;
                    
                    // 중앙 자막 공간 비우기
                    if (dist(bx, by, width/2, height/2) < 220) {
                        bx += (bx < width/2 ? -150 : 150);
                    }

                    particles.push({
                        char: SOURCE_CHARS[idx],
                        baseX: bx,
                        baseY: by,
                        x: bx,
                        y: by,
                        tx: bx,
                        ty: by,
                        size: 14,
                        targetSize: 14,
                        col: color(0, 0, 30),
                        targetCol: color(0, 0, 30),
                        isUsed: false
                    });
                    idx++;
                }
            }
        }
    }

    function draw() {
        background(5);
        let curTime = audio ? audio.currentTime() : 0;
        updateSubtitles(curTime);

        // FFT 분석 데이터 가져오기
        let spectrum = fft.analyze();
        let bass = fft.getEnergy("bass");

        // 현재 자막에 필요한 글자들 분해
        let needed = decomposeHangul(currentSub);

        particles.forEach(p => {
            // 해당 글자가 자막에 필요한지 체크 (중복 사용 방지 로직 포함)
            let useIdx = needed.indexOf(p.char);
            
            if (useIdx !== -1) {
                // 자막으로 차출됨
                p.tx = width / 2 + (useIdx - needed.length/2) * 25;
                p.ty = height / 2;
                p.targetSize = 32 + bass * 0.1;
                p.targetCol = color(170, 80, 100);
                needed[useIdx] = null; // 이미 사용한 글자는 소거
            } else {
                // 제자리로 복귀
                p.tx = p.baseX;
                p.ty = p.baseY;
                p.targetSize = 14;
                p.targetCol = color(0, 0, 20);
            }

            // 물리 효과 (Lerp)
            p.x = lerp(p.x, p.tx, 0.15);
            p.y = lerp(p.y, p.ty, 0.15);
            p.size = lerp(p.size, p.targetSize, 0.1);
            
            fill(p.targetCol);
            noStroke();
            textSize(p.size);
            textAlign(CENTER, CENTER);
            text(p.char, p.x, p.y);
        });

        // 중앙 가이드 텍스트 (희미하게)
        if (currentSub) {
            fill(0, 0, 100, 10);
            textSize(60 + bass*0.2);
            text(currentSub, width/2, height/2 + 80);
        }
    }

    // 한글 분해 함수 (초/중/종성)
    function decomposeHangul(str) {
        let res = [];
        for (let i = 0; i < str.length; i++) {
            let code = str.charCodeAt(i) - 44032;
            if (code > -1 && code < 11172) {
                res.push(JA[Math.floor(code / 588)]);
                res.push(MO[Math.floor((code % 588) / 28)]);
                let finalIdx = code % 28;
                if (finalIdx > 0) {
                    // 실제 종성 리스트 매핑 필요하지만 여기서는 간략화
                    res.push("ㄱㄴㄷㄹㅁㅂㅅㅇㅈㅊㅋㅌㅍㅎ"[finalIdx-1]); 
                }
            } else {
                res.push(str[i]);
            }
        }
        return res;
    }

    function startEngine() {
        if (audio && !audio.isPlaying()) {
            userStartAudio().then(() => {
                audio.play();
                document.getElementById('startBtn').innerText = "ENGINE RUNNING...";
                document.getElementById('startBtn').disabled = true;
            });
        }
    }

    function handleAudio(files) {
        audio = loadSound(URL.createObjectURL(files[0]), () => {
            document.getElementById('srt-status').innerText = "오디오 로드 완료. SRT를 선택하세요.";
        });
    }

    function handleSRT(files) {
        const reader = new FileReader();
        reader.onload = (e) => {
            subtitles = parseSRT(e.target.result);
            document.getElementById('srt-status').innerText = `자막 로드 완료 (${subtitles.length}문장). 엔진을 시작하세요.`;
            document.getElementById('startBtn').disabled = false;
        };
        reader.readAsText(files[0]);
    }

    function parseSRT(data) {
        const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2}|\n*$)/g;
        let matches, result = [];
        while ((matches = regex.exec(data)) !== null) {
            result.push({
                start: timeToSec(matches[2]),
                end: timeToSec(matches[3]),
                text: matches[4].replace(/\n/g, " ")
            });
        }
        return result;
    }

    function timeToSec(t) {
        let a = t.split(':');
        let s = a[2].split(',');
        return (+a[0]) * 3600 + (+a[1]) * 60 + (+s[0]) + (+s[1] / 1000);
    }

    function updateSubtitles(t) {
        let found = subtitles.find(s => t >= s.start && t <= s.end);
        currentSub = found ? found.text : "";
    }
</script>
</body>
</html>
