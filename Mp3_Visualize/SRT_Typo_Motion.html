<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO ELEMENTAL ENGINE v3.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #000; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: #fff; display: flex; }
        #canvas-container { flex: 1; display: flex; align-items: center; justify-content: center; }
        #panel { width: 320px; background: #0a0a0f; padding: 20px; border-left: 1px solid #1a1a1a; font-size: 11px; color: #666; overflow-y: auto; height: 100vh; }
        .btn { width: 100%; padding: 12px; background: transparent; color: var(--accent); border: 1px solid var(--accent); cursor: pointer; font-weight: bold; margin-bottom: 8px; }
        .btn:hover { background: var(--accent); color: #000; }
        .mode-btns { display: flex; gap: 5px; margin-bottom: 15px; }
        .btn-s { padding: 8px; flex: 1; font-size: 10px; border-color: #555; color: #888; background: #000; cursor: pointer; }
        .active-m { border-color: var(--accent) !important; color: var(--accent) !important; }
        .status-box { padding: 10px; background: #111; border-radius: 4px; margin-top: 5px; color: #aaa; border: 1px solid #222; }
        b { color: var(--accent); }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="panel">
    <h3 style="color:white; margin-top:0;">ELEMENTAL v3.0</h3>
    
    <p><b>1. VISUAL MODE</b></p>
    <div class="mode-btns">
        <button id="modeStar" class="btn btn-s active-m" onclick="setMode('star')">🌌 STARS</button>
        <button id="modeWave" class="btn btn-s" onclick="setMode('wave')">🌊 WAVES</button>
    </div>

    <p><b>2. ASPECT RATIO</b></p>
    <div class="mode-btns">
        <button id="r169" class="btn btn-s active-m" onclick="changeRatio(1280, 720, 'r169')">16:9</button>
        <button id="r916" class="btn btn-s" onclick="changeRatio(720, 1280, 'r916')">9:16</button>
    </div>

    <p><b>3. ASSET LOAD</b></p>
    <button class="btn" style="border-color:#ffcc00; color:#ffcc00;" onclick="document.getElementById('fIn').click()">📁 FONT (.ttf)</button>
    <input type="file" id="fIn" accept=".ttf,.otf" style="display:none" onchange="handleFont(this.files)">
    <button class="btn" onclick="document.getElementById('mIn').click()">🎵 MP3</button>
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    <button class="btn" onclick="document.getElementById('sIn').click()">📄 SRT</button>
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    
    <hr style="border:0; border-top:1px solid #1a1a1a; margin:15px 0;">
    <button class="btn" id="startBtn" onclick="startEngine()" disabled style="border-color:#ff3377; color:#ff3377; height: 50px;">🔴 START & RECORD</button>
    <div class="status-box" id="status">Waiting for assets...</div>
</div>

<script>
    let audio, fft, myFont, subtitles = [], currentSub = "";
    let particles = [], ripples = [], visualMode = 'star';
    let isFontReady = false, canvasW = 1280, canvasH = 720;
    let recorder, recordedChunks = [];

    const INITIALS = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    const MEDIALS = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
    const FINALS = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    
    function setup() {
        let cnv = createCanvas(canvasW, canvasH, WEBGL);
        cnv.parent('canvas-container');
        colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);
        initParticles();
    }

    function initParticles() {
        particles = [];
        // 배경 자음 모음 대신 일반 파티클 풀 생성
        for (let i = 0; i < 800; i++) {
            particles.push({
                x: random(-width, width), y: random(-height, height), z: random(-500, 500),
                tx: 0, ty: 0, tz: 0,
                vx: random(-1, 1), vy: random(-1, 1),
                char: '', assigned: false,
                size: random(2, 5), hue: random(180, 240)
            });
        }
    }

    function setMode(m) {
        visualMode = m;
        document.querySelectorAll('.active-m').forEach(b => b.classList.remove('active-m'));
        document.getElementById(m === 'star' ? 'modeStar' : 'modeWave').classList.add('active-m');
    }

    function draw() {
        background(0);
        if (!isFontReady || !myFont) return;

        let curTime = audio ? audio.currentTime() : 0;
        updateSubtitles(curTime);
        fft.analyze();
        let bass = fft.getEnergy("bass");

        // --- 배경 로직 ---
        if (visualMode === 'star') {
            drawStars();
        } else {
            drawWaves();
        }

        // --- 타이포 정밀 역산 로직 ---
        let targetLocs = decomposeHangul(currentSub);
        // 파티클 초기화 및 할당
        particles.forEach(p => p.assigned = false);

        targetLocs.forEach((t, i) => {
            if (i < particles.length) {
                let p = particles[i];
                p.assigned = true;
                p.char = t.char;
                p.tx = t.x; p.ty = t.y; p.tz = 100;
            }
        });

        textFont(myFont);
        particles.forEach(p => {
            if (p.assigned) {
                // 글자로 모이는 움직임
                p.x = lerp(p.x, p.tx, 0.15);
                p.y = lerp(p.y, p.ty, 0.15);
                p.z = lerp(p.z, p.tz, 0.15);
                
                push();
                translate(p.x, p.y, p.z);
                fill(0, 0, 100); noStroke();
                textAlign(CENTER, CENTER); textSize(60 + bass * 0.1);
                text(p.char, 0, 0);
                pop();
            } else {
                // 배경으로 표류
                p.x += p.vx; p.y += p.vy;
                if (abs(p.x) > width) p.x = -p.x;
                if (abs(p.y) > height) p.y = -p.y;
                
                push();
                translate(p.x, p.y, p.z);
                if (visualMode === 'star') {
                    fill(p.hue, 50, 100, 50); noStroke();
                    sphere(p.size);
                } else {
                    // 파도는 drawWaves에서 별도 처리
                }
                pop();
            }
        });
    }

    function drawStars() {
        // 별 반짝임 효과
        for(let i=0; i<50; i++) {
            push();
            translate(random(-width, width), random(-height, height), -500);
            fill(200, 20, 100, random(20, 80));
            ellipse(0, 0, random(1, 4));
            pop();
        }
    }

    function drawWaves() {
        push();
        rotateX(PI/3);
        translate(-width, 0, -200);
        stroke(180, 80, 100, 30); noFill();
        for (let z = 0; z < 20; z++) {
            beginShape();
            for (let x = 0; x < 40; x++) {
                let y = sin(x * 0.3 + frameCount * 0.05 + z * 0.5) * 50;
                vertex(x * 50, y, z * 50);
            }
            endShape();
        }
        pop();
    }

    function decomposeHangul(str) {
        let res = [];
        let gap = width > height ? 110 : 90;
        let startX = -(str.length * gap) / 2;

        for (let i = 0; i < str.length; i++) {
            let charCode = str.charCodeAt(i);
            let curX = startX + i * gap;

            if (charCode >= 0xAC00 && charCode <= 0xD7A3) {
                let code = charCode - 0xAC00;
                let cho = Math.floor(code / 588);
                let jung = Math.floor((code % 588) / 28);
                let jong = code % 28;

                let jungChar = MEDIALS[jung];
                let isVertical = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅣ"].includes(jungChar);
                let isComplex = ["ㅘ","ㅙ","ㅚ","ㅝ","ㅞ","ㅟ","ㅢ"].includes(jungChar);
                
                // [좌표 정밀 수정] 이미지 image_ff7915.png 피드백 반영
                if (isVertical) {
                    res.push({ char: INITIALS[cho], x: curX - 25, y: -20 }); // 초성을 더 왼쪽 위로
                    res.push({ char: jungChar, x: curX + 25, y: -5 });  // 중성을 더 오른쪽으로
                } else if (isComplex) {
                    res.push({ char: INITIALS[cho], x: curX - 20, y: -30 });
                    res.push({ char: jungChar, x: curX + 20, y: -10 });
                } else { // 가로형
                    res.push({ char: INITIALS[cho], x: curX, y: -35 });
                    res.push({ char: jungChar, x: curX, y: 10 });
                }
                
                if (jong > 0) {
                    // 받침이 있을 경우 전체적으로 위로 살짝 올리고 받침 배치
                    res.push({ char: FINALS[jong], x: curX, y: 45 });
                }
            } else {
                res.push({ char: str[i], x: curX, y: 0 });
            }
        }
        return res;
    }

    function changeRatio(w, h, id) {
        canvasW = w; canvasH = h;
        resizeCanvas(w, h);
        document.querySelectorAll('.active-m').forEach(b => b.classList.remove('active-m')); // 비율 버튼에도 같은 클래스 사용중이면 주의
        initParticles();
    }

    function handleFont(f) { loadFont(URL.createObjectURL(f[0]), (font) => { myFont = font; isFontReady = true; document.getElementById('status').innerText = "Font Ready."; }); }
    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0]), () => { document.getElementById('status').innerText = "MP3 Ready."; audio.onended(stopRecording); }); }
    function handleSRT(f) {
        const reader = new FileReader();
        reader.onload = (e) => { subtitles = parseSRT(e.target.result); document.getElementById('status').innerText = "SRT Ready."; document.getElementById('startBtn').disabled = false; };
        reader.readAsText(f[0]);
    }

    function parseSRT(d) {
        const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2}|\n*$)/g;
        let m, r = [];
        while ((m = regex.exec(d)) !== null) { r.push({ start: tToS(m[2]), end: tToS(m[3]), text: m[4].trim() }); }
        return r;
    }
    function tToS(t) { let a = t.split(':'), s = a[2].split(','); return (+a[0])*3600 + (+a[1])*60 + (+s[0]) + (+s[1]/1000); }
    function updateSubtitles(t) { let f = subtitles.find(s => t >= s.start && t <= s.end); currentSub = f ? f.text : ""; }

    function startEngine() {
        if (audio && !audio.isPlaying()) {
            userStartAudio().then(() => {
                startRecording();
                audio.play();
                document.getElementById('status').innerText = "PRODUCING...";
            });
        }
    }

    function startRecording() {
        recordedChunks = [];
        let stream = document.querySelector('canvas').captureStream(60);
        recorder = new MediaRecorder(stream, { mimeType: 'video/mp4; codecs=avc1' });
        recorder.ondataavailable = e => recordedChunks.push(e.data);
        recorder.onstop = () => {
            let blob = new Blob(recordedChunks, { type: 'video/mp4' });
            let a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `viz_production_${Date.now()}.mp4`; a.click();
            document.getElementById('status').innerText = "DOWNLOADED";
        };
        recorder.start();
    }
    function stopRecording() { if(recorder && recorder.state === "recording") recorder.stop(); }
</script>
</body>
</html>
