<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO VFX FINAL v3.3 — Perfect Alignment</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #000; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: #fff; display: flex; }
        #canvas-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        #panel { width: 320px; background: #0a0a0f; padding: 20px; border-left: 1px solid #1a1a1a; font-size: 11px; color: #666; overflow-y: auto; height: 100vh; }
        .btn { width: 100%; padding: 12px; background: transparent; color: var(--accent); border: 1px solid var(--accent); cursor: pointer; font-weight: bold; margin-bottom: 8px; }
        .btn:hover { background: var(--accent); color: #000; }
        .slider-row { margin: 15px 0; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        .status-box { padding: 10px; background: #111; border-radius: 4px; margin-top: 5px; color: #aaa; border: 1px solid #222; }
        b { color: var(--accent); }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="panel">
    <h3 style="color:white; margin-top:0;">VFX FINAL v3.3</h3>
    
    <p><b>1. VISUAL MODE</b></p>
    <div style="display:flex; gap:5px; margin-bottom:15px;">
        <button id="mStar" class="btn" style="flex:1" onclick="setMode('star')">🌌 STAR</button>
        <button id="mWave" class="btn" style="flex:1" onclick="setMode('wave')">🌊 3D MESH</button>
    </div>

    <p><b>2. LAYOUT CONTROL</b></p>
    <div class="slider-row">
        <label>FONT SIZE: <span id="valP2">70</span></label>
        <input type="range" id="p2" min="30" max="180" value="70" oninput="document.getElementById('valP2').innerText=this.value">
    </div>
    <div class="slider-row">
        <label>Y-POSITION: <span id="valP3">0</span></label>
        <input type="range" id="p3" min="-300" max="300" value="0" oninput="document.getElementById('valP3').innerText=this.value">
    </div>

    <p><b>3. PRODUCTION ASSETS</b></p>
    <button class="btn" style="border-color:#ffcc00; color:#ffcc00;" onclick="document.getElementById('fIn').click()">📁 LOAD FONT (.ttf)</button>
    <input type="file" id="fIn" accept=".ttf,.otf" style="display:none" onchange="handleFont(this.files)">
    <button class="btn" onclick="document.getElementById('mIn').click()">🎵 LOAD MP3</button>
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    <button class="btn" onclick="document.getElementById('sIn').click()">📄 LOAD SRT</button>
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    
    <hr style="border:0; border-top:1px solid #1a1a1a; margin:15px 0;">
    <button class="btn" id="startBtn" onclick="startEngine()" disabled style="border-color:#ff3377; color:#ff3377; height: 50px;">🔴 START & RECORD MP4</button>
    <div class="status-box" id="status">Waiting for files...</div>
</div>

<script>
    let audio, fft, myFont, subtitles = [], currentSub = "";
    let particles = [], visualMode = 'star';
    let isFontReady = false;
    let recorder, recordedChunks = [];

    const INITIALS = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    const MEDIALS = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
    const FINALS = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];

    function setup() {
        let cnv = createCanvas(1280, 720, WEBGL);
        cnv.parent('canvas-container');
        colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);
        initParticles();
    }

    function initParticles() {
        particles = [];
        for (let i = 0; i < 1500; i++) {
            let hX = random(-width, width);
            let hY = random(-height, height);
            let hZ = random(-1200, -300);
            particles.push({
                x: hX, y: hY, z: hZ, hx: hX, hy: hY, hz: hZ,
                tx: 0, ty: 0, tz: 0,
                curScale: 0.1, tScale: 0.1,
                history: [], assigned: false,
                size: random(1.5, 4), hue: random(170, 240)
            });
        }
    }

    function setMode(m) { visualMode = m; initParticles(); }

    function draw() {
        background(0);
        if (!isFontReady || !myFont) return;

        let curTime = audio ? audio.currentTime() : 0;
        updateSubtitles(curTime);
        fft.analyze();
        let bass = fft.getEnergy("bass");

        // --- 배경 드로잉 (3D 메시 파도) ---
        if (visualMode === 'wave') draw3DMeshOcean(bass);
        else drawStarField();

        // --- 레이아웃 및 역산 배치 ---
        let fSize = parseInt(document.getElementById('p2').value);
        let yOff = parseInt(document.getElementById('p3').value);
        let targetLocs = decomposeHangul(currentSub, fSize, yOff);

        particles.forEach(p => p.assigned = false);

        targetLocs.forEach((t, i) => {
            if (i < particles.length) {
                let p = particles[i];
                p.assigned = true; p.char = t.char;
                p.tx = t.x; p.ty = t.y; p.tz = 100; p.tScale = 1.0;
            }
        });

        textFont(myFont);
        particles.forEach(p => {
            if (p.assigned) {
                p.history.push({x: p.x, y: p.y, z: p.z});
                if (p.history.length > 6) p.history.shift();

                p.x = lerp(p.x, p.tx, 0.14);
                p.y = lerp(p.y, p.ty, 0.14);
                p.z = lerp(p.z, p.tz, 0.14);
                p.curScale = lerp(p.curScale, p.tScale, 0.12);

                // Trail 그리기
                if(p.history.length > 1) {
                    noFill(); stroke(p.hue, 40, 100, 25); strokeWeight(1.5);
                    beginShape();
                    p.history.forEach(h => vertex(h.x, h.y, h.z));
                    endShape();
                }

                push();
                translate(p.x, p.y, p.z);
                scale(p.curScale);
                fill(0, 0, 100); noStroke();
                textAlign(CENTER, CENTER); textSize(fSize);
                text(p.char, 0, 0);
                pop();
            } else {
                p.tx = p.hx; p.ty = p.hy; p.tz = p.hz; p.tScale = 0.1;
                p.x = lerp(p.x, p.tx, 0.05); p.y = lerp(p.y, p.ty, 0.05); p.z = lerp(p.z, p.tz, 0.05);
                p.curScale = lerp(p.curScale, p.tScale, 0.1);
                p.history = [];

                push();
                translate(p.x, p.y, p.z);
                if (visualMode === 'star') {
                    fill(p.hue, 20, 100, random(20, 50)); noStroke();
                    sphere(p.size);
                }
                pop();
            }
        });
    }

    function drawStarField() {
        for(let i=0; i<15; i++) {
            push(); translate(random(-width, width), random(-height, height), -900);
            fill(0, 0, 100, random(5, 20)); ellipse(0, 0, random(2, 6)); pop();
        }
    }

    function draw3DMeshOcean(bass) {
        push();
        rotateX(PI/2.5); // 평면을 눕힘
        translate(-width, 0, -400);
        stroke(190, 90, 100, 35); noFill();
        let rows = 20, cols = 30;
        let spacingX = (width * 2) / cols;
        let spacingZ = 800 / rows;

        for (let z = 0; z < rows; z++) {
            // 가로선
            beginShape();
            for (let x = 0; x <= cols; x++) {
                let y = noise(x * 0.15, z * 0.15, frameCount * 0.03) * 180 + bass * 0.4;
                vertex(x * spacingX, y, z * spacingZ);
            }
            endShape();
            
            // 세로선 (그리드 메시 완성)
            if (z < rows - 1) {
                for (let x = 0; x <= cols; x++) {
                    beginShape();
                    let y1 = noise(x * 0.15, z * 0.15, frameCount * 0.03) * 180 + bass * 0.4;
                    let y2 = noise(x * 0.15, (z+1) * 0.15, frameCount * 0.03) * 180 + bass * 0.4;
                    vertex(x * spacingX, y1, z * spacingZ);
                    vertex(x * spacingX, y2, (z+1) * spacingZ);
                    endShape();
                }
            }
        }
        pop();
    }

    // --- 한글 정밀 역산 로직 (v3.3 핵심) ---
    function decomposeHangul(str, fSize, yOff) {
        let res = [];
        let gap = fSize * 1.1; // 글자 간격
        let totalW = str.length * gap;
        let startX = -totalW / 2 + gap / 2;

        for (let i = 0; i < str.length; i++) {
            let charCode = str.charCodeAt(i) - 44032;
            let curX = startX + i * gap;

            if (charCode >= 0 && charCode <= 11171) {
                let cho = Math.floor(charCode / 588);
                let jung = Math.floor((code = charCode % 588) / 28);
                let jong = code % 28;
                
                let jungChar = MEDIALS[jung];
                // 세로형 모음 판별
                let isVertical = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅣ"].includes(jungChar);
                // 복합형 모음 판별 (ㅘ, ㅝ 등)
                let isComplex = ["ㅘ","ㅙ","ㅚ","ㅝ","ㅞ","ㅟ","ㅢ"].includes(jungChar);

                if (isVertical) {
                    // 초성(좌), 중성(우)
                    res.push({ char: INITIALS[cho], x: curX - fSize * 0.22, y: yOff - fSize * 0.12 });
                    res.push({ char: jungChar, x: curX + fSize * 0.22, y: yOff });
                } else if (isComplex) {
                    // 초성(좌상), 중성(우하)
                    res.push({ char: INITIALS[cho], x: curX - fSize * 0.18, y: yOff - fSize * 0.25 });
                    res.push({ char: jungChar, x: curX + fSize * 0.15, y: yOff + fSize * 0.05 });
                } else {
                    // 가로형 (ㅗ, ㅜ, ㅡ) -> 초성(상), 중성(하)
                    res.push({ char: INITIALS[cho], x: curX, y: yOff - fSize * 0.28 });
                    res.push({ char: jungChar, x: curX, y: yOff + fSize * 0.12 });
                }
                
                // 종성(받침) 처리
                if (jong > 0) {
                    res.push({ char: FINALS[jong], x: curX, y: yOff + fSize * 0.42 });
                }
            } else {
                res.push({ char: str[i], x: curX, y: yOff });
            }
        }
        return res;
    }

    function handleFont(f) { loadFont(URL.createObjectURL(f[0]), (font) => { myFont = font; isFontReady = true; document.getElementById('status').innerText="Font Ready."; }); }
    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0]), () => { document.getElementById('status').innerText="Audio Ready."; audio.onended(stopRecording); }); }
    function handleSRT(f) {
        const reader = new FileReader();
        reader.onload = (e) => { subtitles = parseSRT(e.target.result); document.getElementById('startBtn').disabled = false; document.getElementById('status').innerText="All Ready."; };
        reader.readAsText(f[0]);
    }

    function parseSRT(d) {
        const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2}|\n*$)/g;
        let m, r = [];
        while ((m = regex.exec(d)) !== null) { r.push({ start: tToS(m[2]), end: tToS(m[3]), text: m[4].trim() }); }
        return r;
    }
    function tToS(t) { let a = t.split(':'), s = a[2].split(','); return (+a[0])*3600 + (+a[1])*60 + (+s[0]) + (+s[1]/1000); }
    function updateSubtitles(t) { let f = subtitles.find(s => t >= s.start && t <= s.end); currentSub = f ? f.text : ""; }

    function startEngine() {
        if (audio && !audio.isPlaying()) {
            userStartAudio().then(() => { startRecording(); audio.play(); document.getElementById('status').innerText = "RECORDING..."; });
        }
    }

    function startRecording() {
        recordedChunks = [];
        let stream = document.querySelector('canvas').captureStream(60);
        recorder = new MediaRecorder(stream, { mimeType: 'video/mp4; codecs=avc1' });
        recorder.ondataavailable = e => recordedChunks.push(e.data);
        recorder.onstop = () => {
            let blob = new Blob(recordedChunks, { type: 'video/mp4' });
            let a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `VFX_final_render_${Date.now()}.mp4`; a.click();
            document.getElementById('status').innerText = "DONE.";
        };
        recorder.start();
    }
    function stopRecording() { if(recorder) recorder.stop(); }
</script>
</body>
</html>
