<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO VFX MASTER v3.2 — Production Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #000; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: #fff; display: flex; }
        #canvas-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        #panel { width: 320px; background: #0a0a0f; padding: 20px; border-left: 1px solid #1a1a1a; font-size: 11px; color: #666; overflow-y: auto; height: 100vh; }
        .btn { width: 100%; padding: 12px; background: transparent; color: var(--accent); border: 1px solid var(--accent); cursor: pointer; font-weight: bold; margin-bottom: 8px; }
        .btn:hover { background: var(--accent); color: #000; }
        .slider-row { margin: 15px 0; }
        input[type=range] { width: 100%; accent-color: var(--accent); }
        .status-box { padding: 10px; background: #111; border-radius: 4px; margin-top: 5px; color: #aaa; border: 1px solid #222; }
        b { color: var(--accent); }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="panel">
    <h3 style="color:white; margin-top:0;">VFX MASTER v3.2</h3>
    
    <p><b>1. VISUAL MODE</b></p>
    <div style="display:flex; gap:5px; margin-bottom:15px;">
        <button id="mStar" class="btn" style="flex:1" onclick="setMode('star')">🌌 STAR</button>
        <button id="mWave" class="btn" style="flex:1" onclick="setMode('wave')">🌊 OCEAN</button>
    </div>

    <p><b>2. LAYOUT CONTROL</b></p>
    <div class="slider-row">
        <label>FONT SIZE: <span id="valP2">50</span></label>
        <input type="range" id="p2" min="20" max="150" value="50" oninput="document.getElementById('valP2').innerText=this.value">
    </div>
    <div class="slider-row">
        <label>Y-POSITION: <span id="valP3">0</span></label>
        <input type="range" id="p3" min="-300" max="300" value="0" oninput="document.getElementById('valP3').innerText=this.value">
    </div>

    <p><b>3. ASSET LOAD</b></p>
    <button class="btn" style="border-color:#ffcc00; color:#ffcc00;" onclick="document.getElementById('fIn').click()">📁 FONT</button>
    <input type="file" id="fIn" accept=".ttf,.otf" style="display:none" onchange="handleFont(this.files)">
    <button class="btn" onclick="document.getElementById('mIn').click()">🎵 MP3</button>
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    <button class="btn" onclick="document.getElementById('sIn').click()">📄 SRT</button>
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    
    <button class="btn" id="startBtn" onclick="startEngine()" disabled style="border-color:#ff3377; color:#ff3377; height: 50px; margin-top:10px;">🔴 START RECORD</button>
    <div class="status-box" id="status">Ready...</div>
</div>

<script>
    let audio, fft, myFont, subtitles = [], currentSub = "";
    let particles = [], ripples = [], visualMode = 'star';
    let isFontReady = false, canvasW = 1280, canvasH = 720;
    let recorder, recordedChunks = [];

    const INITIALS = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    const MEDIALS = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
    const FINALS = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];

    function setup() {
        let cnv = createCanvas(1280, 720, WEBGL);
        cnv.parent('canvas-container');
        colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);
        initParticles();
    }

    function initParticles() {
        particles = [];
        for (let i = 0; i < 1200; i++) {
            let hX = random(-width, width);
            let hY = random(-height, height);
            let hZ = random(-1000, -200);
            particles.push({
                x: hX, y: hY, z: hZ, hx: hX, hy: hY, hz: hZ,
                tx: 0, ty: 0, tz: 0,
                curScale: 0.1, tScale: 0.1,
                history: [], assigned: false,
                size: random(1, 4), hue: random(180, 260)
            });
        }
    }

    function setMode(m) { visualMode = m; initParticles(); }

    function draw() {
        background(0);
        if (!isFontReady || !myFont) return;

        let curTime = audio ? audio.currentTime() : 0;
        updateSubtitles(curTime);
        fft.analyze();
        let bass = fft.getEnergy("bass");

        // 배경 연출
        if (visualMode === 'wave') draw3DMeshOcean(bass);
        else drawStarSpace();

        // 텍스트 레이아웃 설정
        let fSize = parseInt(document.getElementById('p2').value);
        let yOff = parseInt(document.getElementById('p3').value);
        let targetLocs = decomposeHangul(currentSub, fSize, yOff);

        particles.forEach(p => p.assigned = false);

        targetLocs.forEach((t, i) => {
            if (i < particles.length) {
                let p = particles[i];
                p.assigned = true;
                p.char = t.char;
                p.tx = t.x; p.ty = t.y; p.tz = 100;
                p.tScale = 1.0;
            }
        });

        textFont(myFont);
        particles.forEach((p, idx) => {
            if (p.assigned) {
                // 트레일 기록 (중앙으로 날아올 때)
                p.history.push({x: p.x, y: p.y, z: p.z});
                if (p.history.length > 5) p.history.shift();

                p.x = lerp(p.x, p.tx, 0.12);
                p.y = lerp(p.y, p.ty, 0.12);
                p.z = lerp(p.z, p.tz, 0.12);
                p.curScale = lerp(p.curScale, p.tScale, 0.1);

                // 트레일 렌더링
                if(p.history.length > 1) {
                    noFill(); stroke(p.hue, 40, 100, 30);
                    beginShape();
                    p.history.forEach(h => vertex(h.x, h.y, h.z));
                    endShape();
                }

                push();
                translate(p.x, p.y, p.z);
                scale(p.curScale);
                fill(0, 0, 100); noStroke();
                textAlign(CENTER, CENTER); textSize(fSize + bass*0.05);
                text(p.char, 0, 0);
                pop();
            } else {
                p.tx = p.hx; p.ty = p.hy; p.tz = p.hz;
                p.tScale = 0.1;
                p.x = lerp(p.x, p.tx, 0.05);
                p.y = lerp(p.y, p.ty, 0.05);
                p.z = lerp(p.z, p.tz, 0.05);
                p.curScale = lerp(p.curScale, p.tScale, 0.1);
                p.history = [];

                push();
                translate(p.x, p.y, p.z);
                if (visualMode === 'star') {
                    fill(p.hue, 20, 100, 40); noStroke();
                    sphere(p.size);
                }
                pop();
            }
        });
    }

    function drawStarSpace() {
        for(let i=0; i<20; i++) {
            push();
            translate(random(-width, width), random(-height, height), -800);
            fill(0, 0, 100, random(5, 30));
            ellipse(0, 0, random(2, 5));
            pop();
        }
    }

    function draw3DMeshOcean(bass) {
        push();
        rotateX(PI/3);
        translate(-width, 0, -300);
        stroke(200, 80, 100, 25); noFill();
        let detail = 25;
        for (let z = 0; z < 15; z++) {
            beginShape(LINES);
            for (let x = 0; x < detail; x++) {
                let y1 = noise(x * 0.1, z * 0.1, frameCount * 0.02) * 150 + bass*0.5;
                let y2 = noise((x+1) * 0.1, z * 0.1, frameCount * 0.02) * 150 + bass*0.5;
                vertex(x * (width*2/detail), y1, z * 60);
                vertex((x+1) * (width*2/detail), y2, z * 60);
            }
            endShape();
        }
        pop();
    }

    function decomposeHangul(str, fSize, yOff) {
        let res = [];
        let gap = fSize * 0.85;
        let totalW = str.length * gap;
        let startX = -totalW / 2 + gap/2;

        for (let i = 0; i < str.length; i++) {
            let code = str.charCodeAt(i) - 44032;
            let curX = startX + i * gap;

            if (code >= 0 && code <= 11171) {
                let cho = Math.floor(code / 588);
                let jung = Math.floor((code % 588) / 28);
                let jong = code % 28;
                let isV = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅣ"].includes(MEDIALS[jung]);
                
                if (isV) {
                    res.push({ char: INITIALS[cho], x: curX - fSize*0.25, y: yOff - fSize*0.15 });
                    res.push({ char: MEDIALS[jung], x: curX + fSize*0.25, y: yOff - fSize*0.05 });
                } else {
                    res.push({ char: INITIALS[cho], x: curX, y: yOff - fSize*0.3 });
                    res.push({ char: MEDIALS[jung], x: curX, y: yOff + fSize*0.1 });
                }
                if (jong > 0) res.push({ char: FINALS[jong], x: curX, y: yOff + fSize*0.45 });
            } else {
                res.push({ char: str[i], x: curX, y: yOff });
            }
        }
        return res;
    }

    function handleFont(f) { loadFont(URL.createObjectURL(f[0]), (font) => { myFont = font; isFontReady = true; }); }
    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0]), () => { audio.onended(stopRecording); }); }
    function handleSRT(f) {
        const reader = new FileReader();
        reader.onload = (e) => { subtitles = parseSRT(e.target.result); document.getElementById('startBtn').disabled = false; };
        reader.readAsText(f[0]);
    }

    function parseSRT(d) {
        const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2}|\n*$)/g;
        let m, r = [];
        while ((m = regex.exec(d)) !== null) { r.push({ start: tToS(m[2]), end: tToS(m[3]), text: m[4].trim() }); }
        return r;
    }
    function tToS(t) { let a = t.split(':'), s = a[2].split(','); return (+a[0])*3600 + (+a[1])*60 + (+s[0]) + (+s[1]/1000); }
    function updateSubtitles(t) { let f = subtitles.find(s => t >= s.start && t <= s.end); currentSub = f ? f.text : ""; }

    function startEngine() {
        if (audio && !audio.isPlaying()) {
            userStartAudio().then(() => {
                startRecording();
                audio.play();
                document.getElementById('status').innerText = "REC ON";
            });
        }
    }

    function startRecording() {
        recordedChunks = [];
        let stream = document.querySelector('canvas').captureStream(60);
        recorder = new MediaRecorder(stream, { mimeType: 'video/mp4; codecs=avc1' });
        recorder.ondataavailable = e => recordedChunks.push(e.data);
        recorder.onstop = () => {
            let blob = new Blob(recordedChunks, { type: 'video/mp4' });
            let a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `VFX_viz_${Date.now()}.mp4`; a.click();
        };
        recorder.start();
    }
    function stopRecording() { if(recorder) recorder.stop(); }
</script>
</body>
</html>
