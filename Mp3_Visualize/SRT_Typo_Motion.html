<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO ARTISTIC v3.068</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #030305; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: sans-serif; color: #fff; display: flex; }
        #canvas-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        #panel { width: 320px; background: #0a0a0f; padding: 20px; border-left: 1px solid #1a1a1a; font-size: 11px; color: #666; overflow-y: auto; height: 100vh; }
        .btn { width: 100%; padding: 10px; background: transparent; color: var(--accent); border: 1px solid var(--accent); cursor: pointer; font-weight: bold; margin-bottom: 5px; }
        .btn:hover { background: var(--accent); color: #000; }
        .btn-active { background: var(--accent) !important; color: #000 !important; }
        .select-group { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .slider-row { margin: 10px 0; }
        input[type=range] { width: 100%; accent-color: var(--accent); }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="panel">
    <h3 style="color:white; margin-top:0;">MASTER v3.068</h3>
    
    <div class="select-group">
        <p><b>1. RATIO & LAYOUT</b></p>
        <div style="display:flex; gap:4px;">
            <button id="r169" class="btn btn-active" onclick="changeRatio(1280, 720, 'r169')">16:9</button>
            <button id="r916" class="btn" onclick="changeRatio(720, 1280, 'r916')">9:16</button>
        </div>
        <button id="vSrt" class="btn" style="margin-top:5px;" onclick="toggleVertical()">↕️ VERTICAL: OFF</button>
    </div>

    <div class="select-group">
        <p><b>2. ART STYLE</b></p>
        <button id="sDefault" class="btn btn-active" onclick="setStyle('default')">STANDARD</button>
        <button id="sPastel" class="btn" onclick="setStyle('pastel')">PASTEL</button>
        <button id="sNeon" class="btn" onclick="setStyle('neon')">NEON GLOW</button>
        <button id="sImp" class="btn" onclick="setStyle('impression')">IMPRESSIONISM</button>
    </div>

    <div class="select-group">
        <p><b>3. COLOR PALETTE</b></p>
        <button id="pRandom" class="btn btn-active" onclick="setPalette('random')">RANDOM</button>
        <button id="pBW" class="btn" onclick="setPalette('bw')">B&W</button>
        <button id="pSepia" class="btn" onclick="setPalette('sepia')">SEPIA</button>
    </div>

    <div class="select-group">
        <p><b>4. VISUAL MODE</b></p>
        <button id="mStar" class="btn btn-active" onclick="setMode('star')">🌌 STAR FIELD</button>
        <button id="mWave" class="btn" onclick="setMode('wave')">🌊 WAVE REVEAL</button>
    </div>

    <div class="slider-row">
        <label>TRAIL: <span id="valT">0.5</span>s</label>
        <input type="range" id="trailT" min="0.1" max="1.0" step="0.1" value="0.5" oninput="document.getElementById('valT').innerText=this.value">
    </div>

    <p><b>5. ASSETS</b></p>
    <button class="btn" style="border-color:#ffcc00; color:#ffcc00;" onclick="document.getElementById('fIn').click()">📁 LOAD FONT</button>
    <input type="file" id="fIn" accept=".ttf,.otf" style="display:none" onchange="handleFont(this.files)">
    <button class="btn" onclick="document.getElementById('mIn').click()">🎵 LOAD MP3</button>
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    <button class="btn" onclick="document.getElementById('sIn').click()">📄 LOAD SRT</button>
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    
    <button class="btn" id="startBtn" onclick="startEngine()" disabled style="border-color:#ff3377; color:#ff3377; height: 45px; margin-top:10px;">🔴 START RECORD</button>
</div>

<script>
    let audio, fft, myFont, subtitles = [], currentSub = "", lastSub = "";
    let particles = [], visualMode = 'star', artStyle = 'default', colorPalette = 'random';
    let isFontReady = false, isVertical = false, canvasW = 1280, canvasH = 720;
    let waveRevealY = 0, recorder, recordedChunks = [];

    function setup() {
        let cnv = createCanvas(canvasW, canvasH, WEBGL);
        cnv.parent('canvas-container');
        colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);
        initParticles();
    }

    function initParticles() {
        particles = [];
        for (let i = 0; i < 2000; i++) {
            particles.push({
                x: random(-width, width), y: random(-height, height), z: random(-800, -200),
                hx: random(-width, width), hy: random(-height, height), hz: random(-800, -200),
                tx: 0, ty: 0, tz: 0, curScale: 0.1, tScale: 0.1, history: [], assigned: false,
                hue: random(360)
            });
        }
    }

    function setStyle(s) {
        artStyle = s;
        document.querySelectorAll('[id^="s"]').forEach(b => b.classList.remove('btn-active'));
        document.getElementById('s' + s.charAt(0).toUpperCase() + s.slice(1)).classList.add('btn-active');
    }

    function setPalette(p) {
        colorPalette = p;
        document.querySelectorAll('[id^="p"]').forEach(b => b.classList.remove('btn-active'));
        document.getElementById('p' + p.toUpperCase()).classList.add('btn-active');
    }

    function toggleVertical() {
        isVertical = !isVertical;
        document.getElementById('vSrt').innerText = isVertical ? "↕️ VERTICAL: ON" : "↕️ VERTICAL: OFF";
        document.getElementById('vSrt').classList.toggle('btn-active');
    }

    function setMode(m) {
        visualMode = m;
        document.getElementById('mStar').classList.toggle('btn-active', m === 'star');
        document.getElementById('mWave').classList.toggle('btn-active', m === 'wave');
    }

    function draw() {
        background(0);
        if (!isFontReady || !myFont) return;

        push(); noFill(); stroke(340, 80, 100); strokeWeight(10);
        rect(-width/2, -height/2, width, height); pop();

        let curTime = audio ? audio.currentTime() : 0;
        updateSubtitles(curTime);
        fft.analyze();
        let bass = fft.getEnergy("bass");

        if (currentSub !== lastSub) {
            if (visualMode === 'wave') waveRevealY = height;
            lastSub = currentSub;
        }
        waveRevealY = lerp(waveRevealY, 0, 0.1);

        if (visualMode === 'wave') drawOcean(bass, waveRevealY);
        else drawStarField();

        let fSize = 120;
        let trailTime = parseFloat(document.getElementById('trailT').value);
        
        // 텍스트 위치 및 스케일 업데이트
        particles.forEach(p => p.assigned = false);
        if (currentSub !== "") {
            let pts = myFont.textToPoints(currentSub, 0, 0, fSize, { sampleFactor: 0.1 });
            let bounds = myFont.textBounds(currentSub, 0, 0, fSize);
            pts.forEach((pt, i) => {
                if (i < particles.length) {
                    let p = particles[i];
                    p.assigned = true;
                    p.tx = pt.x - bounds.w / 2;
                    p.ty = pt.y + bounds.h / 2;
                    p.tz = 100; p.tScale = 1.0;
                }
            });

            // --- SOLID TEXT DRAW ---
            push();
            translate(0, 0, 100);
            applyArtStyle(bass);
            textAlign(CENTER, CENTER);
            textSize(fSize);
            if (isVertical) {
                let chars = currentSub.split('');
                chars.forEach((c, i) => text(c, 0, (i - chars.length/2) * fSize * 1.2));
            } else {
                text(currentSub, 0, 0);
            }
            pop();
        }

        // --- PARTICLE MOVEMENT ---
        particles.forEach(p => {
            if (p.assigned) {
                p.x = lerp(p.x, p.tx, 0.1); p.y = lerp(p.y, p.ty, 0.1); p.z = lerp(p.z, p.tz, 0.1);
                p.curScale = lerp(p.curScale, p.tScale, 0.1);
                p.history.push({x:p.x, y:p.y, z:p.z});
                if(p.history.length > trailTime*60) p.history.shift();
                
                noFill(); stroke(getColor(p.hue, 50)); 
                beginShape(); p.history.forEach(h => vertex(h.x, h.y, h.z)); endShape();
            } else {
                p.x = lerp(p.x, p.hx, 0.05); p.y = lerp(p.y, p.hy, 0.05); p.z = lerp(p.z, p.hz, 0.05);
                p.curScale = lerp(p.curScale, 0.1, 0.1); p.history = [];
            }
        });
    }

    function applyArtStyle(bass) {
        let c = getColor(200, 100);
        if (artStyle === 'pastel') {
            fill(hue(c), 40, 90, 80);
        } else if (artStyle === 'neon') {
            drawingContext.shadowBlur = 20 + bass * 0.2;
            drawingContext.shadowColor = 'white';
            fill(hue(c), 80, 100);
        } else if (artStyle === 'impression') {
            fill(hue(c), 70, 90, 60);
            for(let i=0; i<3; i++) {
                push();
                translate(random(-5, 5), random(-5, 5));
                text(currentSub, 0, 0);
                pop();
            }
        } else {
            fill(255);
        }
    }

    function getColor(h, a) {
        if (colorPalette === 'bw') return color(0, 0, random(50, 100), a);
        if (colorPalette === 'sepia') return color(35, 40, 80, a);
        return color(h, 70, 100, a);
    }

    function drawStarField() {
        for(let i=0; i<10; i++) {
            push(); translate(random(-width, width), random(-height, height), -800);
            fill(0,0,100,20); ellipse(0,0,3,3); pop();
        }
    }

    function drawOcean(bass, revealY) {
        push(); translate(-width/2, height/2 - revealY, -200);
        fill(200, 80, 100, 50); noStroke();
        beginShape(); vertex(0, 0);
        for (let i = 0; i <= 20; i++) {
            vertex(map(i, 0, 20, 0, width), -sin(i*0.5 + frameCount*0.1) * (50 + bass*0.5));
        }
        vertex(width, height); vertex(0, height);
        endShape(CLOSE); pop();
    }

    function changeRatio(w, h, id) {
        canvasW = w; canvasH = h; resizeCanvas(w, h);
        document.querySelectorAll('[id^="r169"], [id^="r916"]').forEach(b => b.classList.remove('btn-active'));
        document.getElementById(id).classList.add('btn-active');
    }

    function handleFont(f) { myFont = loadFont(URL.createObjectURL(f[0]), () => isFontReady = true); }
    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0]), () => audio.onended(stopRecording)); }
    function handleSRT(f) {
        const reader = new FileReader();
        reader.onload = (e) => { subtitles = parseSRT(e.target.result); document.getElementById('startBtn').disabled = false; };
        reader.readAsText(f[0]);
    }
    function parseSRT(d) {
        const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2}|\n*$)/g;
        let m, r = [];
        while ((m = regex.exec(d)) !== null) r.push({ start: tToS(m[2]), end: tToS(m[3]), text: m[4].trim() });
        return r;
    }
    function tToS(t) { let a = t.split(':'), s = a[2].split(','); return (+a[0])*3600 + (+a[1])*60 + (+s[0]) + (+s[1]/1000); }
    function updateSubtitles(t) { let f = subtitles.find(s => t >= s.start && t <= s.end); currentSub = f ? f.text : ""; }
    function startEngine() { if (audio && !audio.isPlaying()) { userStartAudio().then(() => { startRecording(); audio.play(); }); } }
    function startRecording() {
        recordedChunks = [];
        let stream = document.querySelector('canvas').captureStream(60);
        recorder = new MediaRecorder(stream, { mimeType: 'video/mp4; codecs=avc1' });
        recorder.ondataavailable = e => recordedChunks.push(e.data);
        recorder.onstop = () => {
            let blob = new Blob(recordedChunks, { type: 'video/mp4' });
            let a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `VFX_Artistic_v3068.mp4`; a.click();
        };
        recorder.start();
    }
    function stopRecording() { if(recorder) recorder.stop(); }
</script>
</body>
</html>
