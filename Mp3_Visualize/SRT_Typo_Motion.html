<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO VFX MASTER v3.058 — Shape-Aware Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00ffcc; --comp: #ff3366; --bg: #000; }
        body { margin: 0; background: #050505; overflow: hidden; font-family: sans-serif; color: #fff; display: flex; }
        #canvas-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        #panel { width: 320px; background: #0a0a0f; padding: 20px; border-left: 1px solid #1a1a1a; font-size: 11px; color: #666; overflow-y: auto; height: 100vh; }
        .btn { width: 100%; padding: 12px; background: transparent; color: var(--accent); border: 1px solid var(--accent); cursor: pointer; font-weight: bold; margin-bottom: 8px; transition: 0.2s; }
        .btn:hover { background: var(--accent); color: #000; }
        .btn-active { border-color: var(--accent) !important; color: var(--accent) !important; background: rgba(0,255,204,0.1); }
        .slider-row { margin: 15px 0; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        .status-box { padding: 10px; background: #111; border-radius: 4px; margin-top: 5px; color: #aaa; border: 1px solid #222; }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="panel">
    <h3 style="color:white; margin-top:0;">PRODUCTION v3.058</h3>
    
    <p><b>1. RATIO</b></p>
    <div style="display:flex; gap:5px; margin-bottom:15px;">
        <button id="r169" class="btn btn-active" onclick="changeRatio(1280, 720, 'r169')">16:9</button>
        <button id="r916" class="btn" onclick="changeRatio(720, 1280, 'r916')">9:16</button>
    </div>

    <p><b>2. VFX CONTROL</b></p>
    <div class="slider-row">
        <label>TRAIL TIME: <span id="valT">0.5</span>s</label>
        <input type="range" id="trailT" min="0.1" max="1.0" step="0.1" value="0.5" oninput="document.getElementById('valT').innerText=this.value">
    </div>
    <div class="slider-row">
        <label>FONT SIZE: <span id="valP2">120</span></label>
        <input type="range" id="p2" min="50" max="250" value="120" oninput="document.getElementById('valP2').innerText=this.value">
    </div>

    <p><b>3. ASSET LOAD</b></p>
    <button class="btn" style="border-color:#ffcc00; color:#ffcc00;" onclick="document.getElementById('fIn').click()">📁 FONT (.ttf)</button>
    <input type="file" id="fIn" accept=".ttf,.otf" style="display:none" onchange="handleFont(this.files)">
    <button class="btn" onclick="document.getElementById('mIn').click()">🎵 MP3</button>
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    <button class="btn" onclick="document.getElementById('sIn').click()">📄 SRT</button>
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    
    <button class="btn" id="startBtn" onclick="startEngine()" disabled style="border-color:#ff3377; color:#ff3377; height: 50px; margin-top:10px;">🔴 START & RECORD</button>
    <div class="status-box" id="status">Shape Engine Ready.</div>
</div>

<script>
    let audio, fft, myFont, subtitles = [], currentSub = "", lastSub = "";
    let particles = [], staticStars = [];
    let isFontReady = false, canvasW = 1280, canvasH = 720;
    let recorder, recordedChunks = [];

    function setup() {
        let cnv = createCanvas(canvasW, canvasH, WEBGL);
        cnv.parent('canvas-container');
        colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);
        initParticles();
    }

    function initParticles() {
        particles = [];
        for (let i = 0; i < 2500; i++) {
            particles.push(new Particle());
        }
    }

    class Particle {
        constructor() {
            this.reset();
        }
        reset() {
            this.pos = createVector(random(-width, width), random(-height, height), random(-1000, -500));
            this.target = this.pos.copy();
            this.history = [];
            this.assigned = false;
            this.hue = random(180, 240);
            this.size = random(2, 4);
            this.angle = random(TWO_PI);
        }
        update(trailTime) {
            if (this.assigned) {
                let maxH = floor(trailTime * 60);
                this.history.push(this.pos.copy());
                if (this.history.length > maxH) this.history.shift();
                this.pos.lerp(this.target, 0.1);
            } else {
                this.history = [];
            }
        }
        show() {
            if (this.assigned && this.history.length > 1) {
                noFill(); stroke(this.hue, 40, 100, 30);
                beginShape(); this.history.forEach(h => vertex(h.x, h.y, h.z)); endShape();
            }
            push(); translate(this.pos.x, this.pos.y, this.pos.z);
            fill(this.assigned ? 0 : this.hue, 0, 100, this.assigned ? 100 : 30);
            noStroke(); ellipse(0, 0, this.size, this.size);
            pop();
        }
    }

    function draw() {
        background(0);
        if (!isFontReady || !myFont) return;

        // 보색 Magenta 테두리
        push(); noFill(); stroke(340, 80, 100); strokeWeight(10);
        rect(-width/2, -height/2, width, height); pop();

        let curTime = audio ? audio.currentTime() : 0;
        updateSubtitles(curTime);
        fft.analyze();

        // 고정된 별들 (사라진 자막 조각들)
        staticStars.forEach(s => {
            push(); translate(s.x, s.y, s.z); fill(0,0,100,40); noStroke(); ellipse(0,0,2,2); pop();
        });

        if (currentSub !== lastSub) {
            // 사라질 때 별로 고정
            particles.filter(p => p.assigned).forEach(p => {
                if(random() > 0.7) staticStars.push(p.pos.copy());
                p.reset();
            });
            lastSub = currentSub;
        }

        let fSize = parseInt(document.getElementById('p2').value);
        let trailTime = parseFloat(document.getElementById('trailT').value);
        
        // 형태 인지형 경로 추출
        let pts = [];
        if (currentSub !== "") {
            for(let char of currentSub) {
                let charPts = myFont.textToPoints(char, 0, 0, fSize, { sampleFactor: 0.15 });
                pts.push({ char: char, pts: charPts });
            }
        }

        let totalWidth = currentSub.length * (fSize * 0.7);
        let currentX = -totalWidth / 2;

        particles.forEach(p => p.assigned = false);
        let pIdx = 0;

        pts.forEach(group => {
            group.pts.forEach(pt => {
                if (pIdx < particles.length) {
                    let p = particles[pIdx];
                    if (!p.assigned) {
                        p.assigned = true;
                        p.target.set(pt.x + currentX, pt.y + fSize/3, 100);
                        
                        // [v3.058] 형태별 진입 로직
                        if ("ㅅㅆㅈㅉㅊ".includes(group.char)) { // 시옷 계열: 하단 대각선
                            p.pos.set(p.target.x + (random() > 0.5 ? 500 : -500), p.target.y + 500, 100);
                        } else if ("ㅁㅂㅃㅍ".includes(group.char)) { // 미음 계열: 사방
                            let r = floor(random(4));
                            if(r==0) p.pos.set(p.target.x+800, p.target.y, 100);
                            else if(r==1) p.pos.set(p.target.x-800, p.target.y, 100);
                            else if(r==2) p.pos.set(p.target.x, p.target.y+800, 100);
                            else p.pos.set(p.target.x, p.target.y-800, 100);
                        } else if ("ㅇㅎ".includes(group.char)) { // 이응 계열: 원형 회전
                            let ang = random(TWO_PI);
                            p.pos.set(p.target.x + cos(ang)*600, p.target.y + sin(ang)*600, 100);
                        }
                    }
                    pIdx++;
                }
            });
            currentX += fSize * 0.8;
        });

        particles.forEach(p => { p.update(trailTime); p.show(); });
    }

    function changeRatio(w, h, id) {
        canvasW = w; canvasH = h; resizeCanvas(w, h);
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('btn-active'));
        document.getElementById(id).classList.add('btn-active');
    }
    function handleFont(f) { myFont = loadFont(URL.createObjectURL(f[0]), () => { isFontReady = true; }); }
    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0]), () => { audio.onended(stopRecording); }); }
    function handleSRT(f) {
        const reader = new FileReader();
        reader.onload = (e) => { subtitles = parseSRT(e.target.result); document.getElementById('startBtn').disabled = false; };
        reader.readAsText(f[0]);
    }
    function parseSRT(d) {
        const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2}|\n*$)/g;
        let m, r = [];
        while ((m = regex.exec(d)) !== null) { r.push({ start: tToS(m[2]), end: tToS(m[3]), text: m[4].trim() }); }
        return r;
    }
    function tToS(t) { let a = t.split(':'), s = a[2].split(','); return (+a[0])*3600 + (+a[1])*60 + (+s[0]) + (+s[1]/1000); }
    function updateSubtitles(t) { let f = subtitles.find(s => t >= s.start && t <= s.end); currentSub = f ? f.text : ""; }
    function startEngine() { if (audio && !audio.isPlaying()) { userStartAudio().then(() => { startRecording(); audio.play(); }); } }
    function startRecording() {
        recordedChunks = [];
        let stream = document.querySelector('canvas').captureStream(60);
        recorder = new MediaRecorder(stream, { mimeType: 'video/mp4; codecs=avc1' });
        recorder.ondataavailable = e => recordedChunks.push(e.data);
        recorder.onstop = () => {
            let blob = new Blob(recordedChunks, { type: 'video/mp4' });
            let a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `VFX_Shape_v3058.mp4`; a.click();
        };
        recorder.start();
    }
    function stopRecording() { if(recorder) recorder.stop(); }
</script>
</body>
</html>
