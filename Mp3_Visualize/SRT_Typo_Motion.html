<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO ELEMENTAL v3.1 — Homecoming & Splash</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #000; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: #fff; display: flex; }
        #canvas-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        #panel { width: 320px; background: #0a0a0f; padding: 20px; border-left: 1px solid #1a1a1a; font-size: 11px; color: #666; overflow-y: auto; height: 100vh; }
        .btn { width: 100%; padding: 12px; background: transparent; color: var(--accent); border: 1px solid var(--accent); cursor: pointer; font-weight: bold; margin-bottom: 8px; }
        .btn:hover { background: var(--accent); color: #000; }
        .mode-btns { display: flex; gap: 5px; margin-bottom: 15px; }
        .btn-s { padding: 8px; flex: 1; font-size: 10px; border-color: #555; color: #888; background: #000; cursor: pointer; }
        .active-m { border-color: var(--accent) !important; color: var(--accent) !important; }
        .status-box { padding: 10px; background: #111; border-radius: 4px; margin-top: 5px; color: #aaa; border: 1px solid #222; }
        b { color: var(--accent); }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="panel">
    <h3 style="color:white; margin-top:0;">PRODUCTION v3.1</h3>
    
    <p><b>1. VISUAL MODE</b></p>
    <div class="mode-btns">
        <button id="mStar" class="btn btn-s active-m" onclick="setMode('star')">🌌 STAR FIELD</button>
        <button id="mWave" class="btn btn-s" onclick="setMode('wave')">🌊 OCEAN WAVE</button>
    </div>

    <p><b>2. ASPECT RATIO</b></p>
    <div class="mode-btns">
        <button id="r169" class="btn btn-s active-m" onclick="changeRatio(1280, 720, 'r169')">16:9 (YouTube)</button>
        <button id="r916" class="btn btn-s" onclick="changeRatio(720, 1280, 'r916')">9:16 (Shorts)</button>
    </div>

    <p><b>3. ASSET LOAD</b></p>
    <button class="btn" style="border-color:#ffcc00; color:#ffcc00;" onclick="document.getElementById('fIn').click()">📁 LOAD FONT (.ttf)</button>
    <input type="file" id="fIn" accept=".ttf,.otf" style="display:none" onchange="handleFont(this.files)">
    <button class="btn" onclick="document.getElementById('mIn').click()">🎵 LOAD MP3</button>
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    <button class="btn" onclick="document.getElementById('sIn').click()">📄 LOAD SRT</button>
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    
    <hr style="border:0; border-top:1px solid #1a1a1a; margin:15px 0;">
    <button class="btn" id="startBtn" onclick="startEngine()" disabled style="border-color:#ff3377; color:#ff3377; height: 50px;">🔴 START & RECORD</button>
    <div class="status-box" id="status">Waiting for files...</div>
</div>

<script>
    let audio, fft, myFont, subtitles = [], currentSub = "";
    let particles = [], visualMode = 'star';
    let isFontReady = false, canvasW = 1280, canvasH = 720;
    let recorder, recordedChunks = [];

    const INITIALS = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    const MEDIALS = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
    const FINALS = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];

    function setup() {
        let cnv = createCanvas(canvasW, canvasH, WEBGL);
        cnv.parent('canvas-container');
        colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);
        initParticles();
    }

    function initParticles() {
        particles = [];
        // 1000개의 영구 파티클 생성 (Home Position 기억)
        for (let i = 0; i < 1000; i++) {
            let hX = random(-width, width);
            let hY = random(-height, height);
            let hZ = random(-800, 200);
            particles.push({
                x: hX, y: hY, z: hZ,
                hx: hX, hy: hY, hz: hZ, // Home Position
                tx: hX, ty: hY, tz: hZ, // Target Position
                vx: random(-0.5, 0.5), vy: random(-0.5, 0.5),
                char: '', assigned: false,
                size: random(2, 5), hue: random(180, 240)
            });
        }
    }

    function setMode(m) {
        visualMode = m;
        document.querySelectorAll('.btn-s').forEach(b => {
            if(b.id === 'mStar' || b.id === 'mWave') b.classList.remove('active-m');
        });
        document.getElementById(m === 'star' ? 'mStar' : 'mWave').classList.add('active-m');
        initParticles(); // 모드 변경 시 초기화
    }

    function draw() {
        background(0);
        if (!isFontReady || !myFont) return;

        let curTime = audio ? audio.currentTime() : 0;
        updateSubtitles(curTime);
        fft.analyze();
        let bass = fft.getEnergy("bass");

        // --- 배경 드로잉 ---
        if (visualMode === 'wave') drawOcean();
        else drawStarField();

        // --- 타이포 역산 및 할당 로직 ---
        let targetLocs = decomposeHangul(currentSub);
        particles.forEach(p => p.assigned = false);

        targetLocs.forEach((t, i) => {
            if (i < particles.length) {
                let p = particles[i];
                p.assigned = true;
                p.char = t.char;
                p.tx = t.x; p.ty = t.y; p.tz = 100;
            }
        });

        // --- 파티클 업데이트 및 렌더링 ---
        textFont(myFont);
        particles.forEach(p => {
            if (p.assigned) {
                // 글자 합체 모드
                p.x = lerp(p.x, p.tx, 0.15);
                p.y = lerp(p.y, p.ty, 0.15);
                p.z = lerp(p.z, p.tz, 0.15);
                
                push();
                translate(p.x, p.y, p.z);
                fill(0, 0, 100, 100); noStroke();
                textAlign(CENTER, CENTER); textSize(55 + bass * 0.12);
                text(p.char, 0, 0);
                pop();
            } else {
                // 회귀 및 유영 모드
                p.tx = p.hx; p.ty = p.hy; p.tz = p.hz;
                p.x = lerp(p.x, p.tx, 0.05);
                p.y = lerp(p.y, p.ty, 0.05);
                p.z = lerp(p.z, p.tz, 0.05);
                
                // 미세 움직임
                p.hx += p.vx; p.hy += p.vy;
                if(abs(p.hx) > width) p.vx *= -1;
                if(abs(p.hy) > height) p.vy *= -1;

                push();
                translate(p.x, p.y, p.z);
                if (visualMode === 'star') {
                    fill(p.hue, 30, 100, 60); noStroke();
                    sphere(p.size * 0.5);
                } else {
                    // 바다 모드에서 대기 입자는 수면 아래로
                    fill(200, 80, 100, 20); noStroke();
                    ellipse(0, 0, 2, 2);
                }
                pop();
            }
        });
    }

    function drawStarField() {
        for(let i=0; i<30; i++) {
            push();
            translate(random(-width, width), random(-height, height), -600);
            fill(0, 0, 100, random(10, 50));
            ellipse(0, 0, random(1, 3));
            pop();
        }
    }

    function drawOcean() {
        push();
        rotateX(PI/2.5);
        translate(-width, 0, -100);
        stroke(200, 70, 100, 30); noFill();
        for (let z = 0; z < 15; z++) {
            beginShape();
            for (let x = 0; x < 30; x++) {
                let y = sin(x * 0.4 + frameCount * 0.04 + z * 0.6) * 40;
                vertex(x * 70, y, z * 60);
            }
            endShape();
        }
        pop();
    }

    function decomposeHangul(str) {
        let res = [];
        let gap = width > height ? 100 : 80;
        let startX = -(str.length * gap) / 2;

        for (let i = 0; i < str.length; i++) {
            let code = str.charCodeAt(i) - 44032;
            let curX = startX + i * gap;

            if (code >= 0 && code <= 11171) {
                let cho = Math.floor(code / 588);
                let jung = Math.floor((code % 588) / 28);
                let jong = code % 28;

                let jungChar = MEDIALS[jung];
                let isV = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅣ"].includes(jungChar);
                
                // [역산 좌표 정밀 튜닝]
                if (isV) {
                    res.push({ char: INITIALS[cho], x: curX - 25, y: -15 });
                    res.push({ char: jungChar, x: curX + 25, y: -5 });
                } else {
                    res.push({ char: INITIALS[cho], x: curX, y: -30 });
                    res.push({ char: jungChar, x: curX, y: 10 });
                }
                if (jong > 0) res.push({ char: FINALS[jong], x: curX, y: 40 });
            } else {
                res.push({ char: str[i], x: curX, y: 0 });
            }
        }
        return res;
    }

    function changeRatio(w, h, id) {
        canvasW = w; canvasH = h;
        resizeCanvas(w, h);
        document.querySelectorAll('.active-m').forEach(b => {
            if(b.id === 'r169' || b.id === 'r916') b.classList.remove('active-m');
        });
        document.getElementById(id).classList.add('active-m');
        initParticles();
    }

    function handleFont(f) { loadFont(URL.createObjectURL(f[0]), (font) => { myFont = font; isFontReady = true; document.getElementById('status').innerText = "Font OK"; }); }
    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0]), () => { document.getElementById('status').innerText = "MP3 OK"; audio.onended(stopRecording); }); }
    function handleSRT(f) {
        const reader = new FileReader();
        reader.onload = (e) => { subtitles = parseSRT(e.target.result); document.getElementById('status').innerText = "SRT OK"; document.getElementById('startBtn').disabled = false; };
        reader.readAsText(f[0]);
    }

    function parseSRT(d) {
        const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2}|\n*$)/g;
        let m, r = [];
        while ((m = regex.exec(d)) !== null) { r.push({ start: tToS(m[2]), end: tToS(m[3]), text: m[4].trim() }); }
        return r;
    }
    function tToS(t) { let a = t.split(':'), s = a[2].split(','); return (+a[0])*3600 + (+a[1])*60 + (+s[0]) + (+s[1]/1000); }
    function updateSubtitles(t) { let f = subtitles.find(s => t >= s.start && t <= s.end); currentSub = f ? f.text : ""; }

    function startEngine() {
        if (audio && !audio.isPlaying()) {
            userStartAudio().then(() => {
                startRecording();
                audio.play();
                document.getElementById('status').innerText = "RECORDING...";
            });
        }
    }

    function startRecording() {
        recordedChunks = [];
        let stream = document.querySelector('canvas').captureStream(60);
        recorder = new MediaRecorder(stream, { mimeType: 'video/mp4; codecs=avc1' });
        recorder.ondataavailable = e => recordedChunks.push(e.data);
        recorder.onstop = () => {
            let blob = new Blob(recordedChunks, { type: 'video/mp4' });
            let a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `viz_master_${Date.now()}.mp4`; a.click();
            document.getElementById('status').innerText = "DOWNLOADED";
        };
        recorder.start();
    }
    function stopRecording() { if(recorder && recorder.state === "recording") recorder.stop(); }
</script>
</body>
</html>
