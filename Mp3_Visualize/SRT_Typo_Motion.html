<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO VFX MASTER v3.208 — Timeline Precision</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #030305; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: sans-serif; color: #fff; display: flex; }
        #canvas-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        #panel { width: 340px; background: #0a0a0f; padding: 20px; border-left: 1px solid #1a1a1a; font-size: 11px; color: #666; overflow-y: auto; height: 100vh; }
        .btn { width: 100%; padding: 10px; background: transparent; color: var(--accent); border: 1px solid var(--accent); cursor: pointer; font-weight: bold; margin-bottom: 5px; transition: 0.2s; }
        .btn:hover { background: var(--accent); color: #000; }
        .btn-active { background: var(--accent) !important; color: #000 !important; }
        .select-group { margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .slider-row { margin: 8px 0; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="panel">
    <h3 style="color:white; margin-top:0;">PRODUCTION v3.208</h3>
    
    <div class="select-group">
        <p><b>1. VISUAL MODE</b></p>
        <div style="display:flex; gap:4px;">
            <button id="mStar" class="btn btn-active" onclick="setMode('star')">🌌 STAR FIELD</button>
            <button id="mWave" class="btn" onclick="setMode('wave')">🌊 TIDAL SWEEP</button>
        </div>
    </div>

    <div class="select-group">
        <p><b>2. LAYOUT (16 Ratio Sync)</b></p>
        <button id="vSrt" class="btn" onclick="toggleVertical()">↕️ VERTICAL MODE: OFF</button>
        <div style="display:flex; gap:4px; margin-top:5px;">
            <button id="r169" class="btn btn-active" onclick="changeRatio(1280, 720, 'r169')">16:9</button>
            <button id="r916" class="btn" onclick="changeRatio(720, 1280, 'r916')">9:16</button>
        </div>
    </div>

    <div class="select-group">
        <p><b>3. VFX & TEXT CONTROL</b></p>
        <div class="slider-row">
            <label>FONT SIZE: <span id="valS">120</span></label>
            <input type="range" id="fSize" min="30" max="300" value="120" oninput="document.getElementById('valS').innerText=this.value">
        </div>
        <div class="slider-row">
            <label>LETTER SPACING: <span id="valSpace">0</span></label>
            <input type="range" id="tracking" min="-30" max="100" value="0" oninput="document.getElementById('valSpace').innerText=this.value">
        </div>
        <div class="slider-row">
            <label>Y-POSITION: <span id="valY">0</span></label>
            <input type="range" id="yOff" min="-500" max="500" value="0" oninput="document.getElementById('valY').innerText=this.value">
        </div>
        <div class="slider-row">
            <label>TRAIL STRENGTH: <span id="valT">0.8</span></label>
            <input type="range" id="trailT" min="0.1" max="2.0" step="0.1" value="0.8" oninput="document.getElementById('valT').innerText=this.value">
        </div>
    </div>

    <div class="select-group">
        <p><b>4. ART STYLE</b></p>
        <button id="sDefault" class="btn btn-active" onclick="setStyle('default')">SOLID WHITE</button>
        <button id="sNeon" class="btn" onclick="setStyle('neon')">NEON GLOW</button>
        <button id="sImp" class="btn" onclick="setStyle('impression')">IMPRESSIONIST</button>
    </div>

    <div class="select-group">
        <p><b>5. TIMELINE PREVIEW</b></p>
        <div class="slider-row">
            <label>TIME: <span id="valTime">0.0</span>s</label>
            <input type="range" id="timeline" min="0" max="100" step="0.1" value="0" oninput="document.getElementById('valTime').innerText=this.value">
        </div>
    </div>

    <p><b>6. ASSETS</b></p>
    <button class="btn" style="border-color:#ffcc00; color:#ffcc00;" onclick="document.getElementById('fIn').click()">📁 LOAD FONT</button>
    <input type="file" id="fIn" accept=".ttf,.otf" style="display:none" onchange="handleFont(this.files)">
    <button class="btn" onclick="document.getElementById('mIn').click()">🎵 LOAD MP3</button>
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    <button class="btn" onclick="document.getElementById('sIn').click()">📄 LOAD SRT</button>
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    
    <button class="btn" id="startBtn" onclick="startEngine()" disabled style="border-color:#ff3377; color:#ff3377; height: 50px; margin-top:10px;">🔴 START RECORDING</button>
</div>

<script>
    let audio, fft, myFont, subtitles = [], nextSub = "", displaySub = "";
    let stars = [], particles = [], visualMode = 'star', artStyle = 'default';
    let isFontReady = false, isVertical = false, canvasW = 1280, canvasH = 720;
    
    let sweepPhase = 0, sweepProgress = 0, sweepDir = 1, textSwapped = false;
    let lastFSize = 120, lastYPos = 0, lastTracking = 0, lastIsVertical = false;
    let recorder, recordedChunks = [];

    function setup() {
        let cnv = createCanvas(canvasW, canvasH, WEBGL);
        cnv.parent('canvas-container');
        colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);
        initStars();
        initParticles();
    }

    function initStars() {
        stars = [];
        for (let i = 0; i < 500; i++) {
            stars.push({ 
                x: random(-width, width), y: random(-height, height), z: random(-1200, -500), 
                vx: random(-1, 1), vy: random(-1, 1),
                s: random(1.5, 4), glintSpeed: random(0.02, 0.06), glintOffset: random(TWO_PI)
            });
        }
    }

    function initParticles() {
        particles = [];
        for (let i = 0; i < 2000; i++) {
            particles.push({
                x: random(-width, width), y: random(-height, height), z: random(-1000, -400),
                hx: random(-width, width), hy: random(-height, height), hz: random(-1000, -400),
                tx: 0, ty: 0, tz: 0, history: [], assigned: false, hue: random(180, 240)
            });
        }
    }

    function draw() {
        background(0);
        drawStars(); 

        if (!isFontReady || !myFont) return;

        // [v3.208] 타임라인(플레이바) 동기화 로직
        let curTime = 0;
        let isPlaying = audio && audio.isPlaying();
        let timelineUI = document.getElementById('timeline');

        if (isPlaying) {
            curTime = audio.currentTime();
            timelineUI.value = curTime;
            document.getElementById('valTime').innerText = curTime.toFixed(1);
        } else {
            curTime = parseFloat(timelineUI.value);
        }

        let targetSub = subtitles.find(s => curTime >= s.start && curTime <= s.end);
        let currentLogicalSub = targetSub ? targetSub.text : "";
        
        fft.analyze();
        let bass = isPlaying ? fft.getEnergy("bass") : 0;
        let mid = isPlaying ? fft.getEnergy("mid") : 0;

        let fSize = parseInt(document.getElementById('fSize').value);
        let tracking = parseInt(document.getElementById('tracking').value);
        let yPos = parseInt(document.getElementById('yOff').value);
        let isPort = canvasH > canvasW; 

        if (currentLogicalSub !== nextSub) {
            nextSub = currentLogicalSub;
            // 재생 중일 때만 파도 스윕 발동, 일시정지 상태(스크러빙)에선 즉각 변경
            if (visualMode === 'wave' && isPlaying) {
                sweepPhase = 1; sweepProgress = 0;
                sweepDir = random() > 0.5 ? 1 : -1; 
                textSwapped = false;
            } else {
                displaySub = nextSub;
                updateTextParticles(fSize, yPos, tracking);
            }
        }

        if (sweepPhase === 1) {
            sweepProgress += 0.04; 
            if (sweepProgress >= 0.5 && !textSwapped) {
                textSwapped = true;
                displaySub = nextSub;
                updateTextParticles(fSize, yPos, tracking);
                particles.forEach(p => { if (p.assigned) { p.x = p.tx; p.y = p.ty; p.history = []; } });
            }
            if (sweepProgress >= 1.0) { sweepPhase = 0; sweepProgress = 0; }
        }

        if (fSize !== lastFSize || isVertical !== lastIsVertical || yPos !== lastYPos || tracking !== lastTracking) {
            updateTextParticles(fSize, yPos, tracking);
            // 레이아웃 변경 시 잔상 제거 스냅
            particles.forEach(p => { if(p.assigned) { p.x = p.tx; p.y = p.ty; p.history = []; } });
            lastFSize = fSize; lastIsVertical = isVertical; lastYPos = yPos; lastTracking = tracking;
        }

        if (visualMode === 'wave') {
            drawIllustWave(bass, mid, true, isPort); 
            if (displaySub !== "") renderMasterText(displaySub, fSize, yPos, tracking);
            renderParticles(); 
            drawIllustWave(bass, mid, false, isPort); 
        } else {
            if (displaySub !== "") renderMasterText(displaySub, fSize, yPos, tracking);
            renderParticles();
        }

        push(); noFill(); stroke(340, 80, 100, 50); strokeWeight(5); translate(0,0,200); rect(-width/2, -height/2, width, height); pop();
    }

    // [v3.208] 자간(Tracking)을 포함한 역산 파티클 생성
    function updateTextParticles(fSize, yPos, tracking) {
        if (displaySub === "") {
            particles.forEach(p => p.assigned = false);
            return;
        }
        let pts = [];
        let chars = displaySub.split('');

        if (isVertical) {
            let totalH = (chars.length - 1) * (fSize + tracking);
            chars.forEach((c, i) => {
                if(c && c.trim() !== '') {
                    let yOffset = (i * (fSize + tracking)) - totalH/2;
                    let bounds = myFont.textBounds(c, 0, 0, fSize);
                    let charPts = myFont.textToPoints(c, -bounds.w/2, yOffset + bounds.h/2, fSize, { sampleFactor: 0.15 });
                    pts.push(...charPts);
                }
            });
        } else {
            let widths = chars.map(c => myFont.textBounds(c, 0, 0, fSize).w + tracking);
            let totalW = widths.length > 0 ? widths.reduce((a,b)=>a+b, 0) - tracking : 0;
            let curX = -totalW/2;
            chars.forEach((c, i) => {
                if(c && c.trim() !== '') {
                    let bounds = myFont.textBounds(c, 0, 0, fSize);
                    let charPts = myFont.textToPoints(c, curX, bounds.h/2, fSize, { sampleFactor: 0.15 });
                    pts.push(...charPts);
                }
                curX += widths[i];
            });
        }

        particles.forEach(p => p.assigned = false);
        pts.forEach((pt, i) => {
            if (i < particles.length) {
                particles[i].assigned = true;
                particles[i].tx = pt.x;
                particles[i].ty = pt.y + yPos; 
            }
        });
    }

    function drawStars() {
        push(); noStroke();
        for (let s of stars) {
            s.x += s.vx; s.y += s.vy;
            if (s.x > width) s.x = -width; else if (s.x < -width) s.x = width;
            if (s.y > height) s.y = -height; else if (s.y < -height) s.y = height;
            
            let alpha = map(sin(frameCount * s.glintSpeed + s.glintOffset), -1, 1, 10, 100);
            fill(0, 0, 100, alpha);
            push(); translate(s.x, s.y, s.z); ellipse(0, 0, s.s, s.s); pop();
        }
        pop();
    }

    function drawIllustWave(bass, mid, isBack, isPort) {
        let startLayer = isBack ? 0 : 5; 
        let endLayer = isBack ? 5 : 6;
        let waveLen = isPort ? height : width;

        push();
        if (isPort) {
            translate(-width/2, 0, isBack ? -50 : 100);
            rotateZ(HALF_PI); 
        } else {
            translate(0, height/2.2, isBack ? -50 : 100);
        }
        
        for(let j = startLayer; j < endLayer; j++) {
            let h = map(j, 0, 5, 210, 180);
            fill(h, 90, isBack ? 60 : 100, isBack ? 95 : 85); 
            noStroke();
            
            beginShape();
            vertex(-waveLen/2, 500); 
            for(let i=0; i<=45; i++) {
                let x = map(i, 0, 45, -waveLen*0.6, waveLen*0.6);
                let noiseVal = noise(i * 0.1, j, frameCount * 0.02);
                let waveH = -sin(i * 0.3 + frameCount * 0.05 + j) * (30 + bass * 0.4 + mid * 0.2) * noiseVal;
                
                let sweepY = 0;
                if (!isBack && j === 5 && sweepPhase === 1) {
                    let px = map(sweepProgress, 0, 1, -waveLen*0.8, waveLen*0.8);
                    if (sweepDir === -1) px = map(sweepProgress, 0, 1, waveLen*0.8, -waveLen*0.8);
                    let dist = abs(x - px);
                    let peakH = isPort ? width * 1.6 : height * 1.6; 
                    let spread = waveLen * 0.45;
                    let cover = exp(-sq(dist)/sq(spread)); 
                    sweepY = -peakH * cover;
                }

                vertex(x, waveH - (j * 20) + sweepY);
                
                if (!isBack && j === 5 && i % 2 === 0) {
                    push(); fill(0, 0, 100, 90); ellipse(x, waveH - (j*20) + sweepY - 10, 8, 8); pop();
                }
            }
            vertex(waveLen*0.6, 500);
            endShape(CLOSE);
        }
        pop();
    }

    // [v3.208] 렌더링 중첩 버그 픽스 (커스텀 텍스트 드로어)
    function drawCustomText(txt, fSize, tracking, xOff, yOff) {
        let chars = txt.split('');
        if (isVertical) {
            let totalH = (chars.length - 1) * (fSize + tracking);
            chars.forEach((c, i) => {
                let y = (i * (fSize + tracking)) - totalH/2;
                text(c, xOff, yOff + y);
            });
        } else {
            let widths = chars.map(c => myFont.textBounds(c, 0, 0, fSize).w + tracking);
            let totalW = widths.length > 0 ? widths.reduce((a,b)=>a+b, 0) - tracking : 0;
            let curX = -totalW/2;
            chars.forEach((c, i) => {
                let bounds = myFont.textBounds(c, 0, 0, fSize);
                text(c, xOff + curX + bounds.w/2, yOff);
                curX += widths[i];
            });
        }
    }

    function renderMasterText(txt, fSize, yPos, tracking) {
        if (!txt || !myFont) return;
        push(); translate(0, yPos, 0);
        textFont(myFont); textAlign(CENTER, CENTER); textSize(fSize);
        
        if (artStyle === 'neon') {
            for(let i=0; i<3; i++) { 
                fill(255, 40); 
                drawCustomText(txt, fSize, tracking, random(-4,4), random(-4,4)); 
            }
            fill(255);
        } else if (artStyle === 'impression') {
            for(let i=0; i<5; i++) { 
                fill(random(180, 240), 70, 100, 60); 
                drawCustomText(txt, fSize, tracking, random(-8,8), random(-8,8)); 
            }
            fill(255, 90);
        } else {
            fill(255);
        }

        drawCustomText(txt, fSize, tracking, 0, 0);
        pop();
    }

    function renderParticles() {
        let trailStr = parseFloat(document.getElementById('trailT').value);
        particles.forEach(p => {
            if (p.assigned) {
                p.x = lerp(p.x, p.tx, 0.08); p.y = lerp(p.y, p.ty, 0.08); p.z = lerp(p.z, p.tz, 0.08);
            } else {
                p.x = lerp(p.x, p.hx, 0.04); p.y = lerp(p.y, p.hy, 0.04); p.z = lerp(p.z, p.hz, 0.04);
            }
            
            p.history.push(createVector(p.x, p.y, p.z));
            if (p.history.length > 25) p.history.shift();

            if (p.history.length > 1) {
                noFill(); stroke(p.hue, 60, 100, 50 * trailStr); strokeWeight(2.5 * trailStr);
                beginShape(); for (let v of p.history) vertex(v.x, v.y, v.z); endShape();
            }

            push(); translate(p.x, p.y, p.z); 
            if (p.assigned) {
                let alpha = map(sin(frameCount * 0.2 + p.hue), -1, 1, 30, 100);
                fill(p.hue, 30, 100, alpha); noStroke(); ellipse(0,0, 4); 
            } else {
                fill(p.hue, 50, 100, 50); noStroke(); ellipse(0,0, 2.5); 
            }
            pop();
        });
    }

    function setMode(m) { visualMode = m; document.getElementById('mStar').classList.toggle('btn-active', m === 'star'); document.getElementById('mWave').classList.toggle('btn-active', m === 'wave'); }
    function toggleVertical() { isVertical = !isVertical; let btn = document.getElementById('vSrt'); btn.innerText = isVertical ? "↕️ VERTICAL MODE: ON" : "↕️ VERTICAL MODE: OFF"; btn.classList.toggle('btn-active'); }
    function setStyle(s) { artStyle = s; document.querySelectorAll('[id^="s"]').forEach(b => b.classList.remove('btn-active')); let tId = s === 'impression' ? 'sImp' : (s === 'neon' ? 'sNeon' : 'sDefault'); document.getElementById(tId).classList.add('btn-active'); }
    function changeRatio(w, h, id) { canvasW = w; canvasH = h; resizeCanvas(w, h); document.querySelectorAll('[id^="r1"]').forEach(b => b.classList.remove('btn-active')); document.getElementById(id).classList.add('btn-active'); initStars(); initParticles(); }
    
    function handleFont(f) { if(!f || f.length===0) return; isFontReady = false; myFont = loadFont(URL.createObjectURL(f[0]), () => isFontReady = true); }
    function handleAudio(f) { 
        if(!f || f.length===0) return; 
        audio = loadSound(URL.createObjectURL(f[0]), () => {
            document.getElementById('timeline').max = audio.duration(); // 오디오 로드 시 타임라인 최대치 설정
            audio.onended(stopRecording);
        }); 
    }
    function handleSRT(f) { if(!f || f.length===0) return; const reader = new FileReader(); reader.onload = (e) => { subtitles = parseSRT(e.target.result); document.getElementById('startBtn').disabled = false; }; reader.readAsText(f[0]); }
    
    function parseSRT(d) { const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2}|\n*$)/g; let m, r = []; while ((m = regex.exec(d)) !== null) r.push({ start: tToS(m[2]), end: tToS(m[3]), text: m[4].trim() }); return r; }
    function tToS(t) { let a = t.split(':'), s = a[2].split(','); return (+a[0])*3600 + (+a[1])*60 + (+s[0]) + (+s[1]/1000); }
    function startEngine() { if (audio && !audio.isPlaying()) { userStartAudio().then(() => { startRecording(); audio.play(); }); } }
    function startRecording() { recordedChunks = []; let stream = document.querySelector('canvas').captureStream(60); recorder = new MediaRecorder(stream, { mimeType: 'video/mp4; codecs=avc1' }); recorder.ondataavailable = e => recordedChunks.push(e.data); recorder.onstop = () => { let blob = new Blob(recordedChunks, { type: 'video/mp4' }); let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `VFX_Precision_v3208.mp4`; a.click(); }; recorder.start(); }
    function stopRecording() { if(recorder) recorder.stop(); }
</script>
</body>
</html>
