<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TYPO PARTICLE ENGINE v1.3 — Font Master Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #030305; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Pretendard', sans-serif; color: #fff; display: flex; }
        #canvas-container { flex: 1; }
        #panel { width: 300px; background: #0a0a0f; padding: 20px; border-left: 1px solid #1a1a1a; font-size: 11px; color: #666; overflow-y: auto; }
        .btn { width: 100%; padding: 12px; background: transparent; color: var(--accent); border: 1px solid var(--accent); cursor: pointer; font-weight: bold; margin-bottom: 10px; transition: 0.2s; }
        .btn:hover { background: var(--accent); color: #000; }
        .btn-font { border-color: #ffcc00; color: #ffcc00; }
        .btn-font:hover { background: #ffcc00; color: #000; }
        b { color: var(--accent); }
        .status-box { padding: 8px; background: #15151a; border-radius: 4px; margin-top: 5px; color: #aaa; }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="panel">
    <h3 style="color:white; margin-top:0;">TYPO & EQ v1.3</h3>
    
    <p><b>STEP 1: FONT SETTING</b></p>
    <button class="btn btn-font" onclick="document.getElementById('fIn').click()">🔠 CHOOSE YOUR FONT (.ttf, .otf)</button>
    <input type="file" id="fIn" accept=".ttf,.otf" style="display:none" onchange="handleFont(this.files)">
    <div class="status-box" id="f-status">Default: Roboto (Auto-loaded)</div>

    <p><b>STEP 2: MEDIA LOADING</b></p>
    <button class="btn" onclick="document.getElementById('mIn').click()">🎵 LOAD MP3</button>
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleAudio(this.files)">
    
    <button class="btn" onclick="document.getElementById('sIn').click()">📄 LOAD SRT</button>
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    
    <button class="btn" id="startBtn" onclick="startEngine()" disabled style="border-color:#ff3377; color:#ff3377; margin-top:10px;">⚡ START ENGINE</button>
    
    <div class="status-box" id="status">파일 대기 중...</div>
    
    <hr style="border:0; border-top:1px solid #1a1a1a; margin:20px 0;">
    <p><b>SYSTEM INFO:</b><br>- 6-Band EQ: 악기별 주파수 분리 시각화<br>- Particle Typo: 한글 분해 및 물리 합체 로직<br>- Font: WEBGL 전용 폰트 렌더러 적용</p>
</div>

<script>
    let audio, fft, myFont, subtitles = [], currentSub = "";
    let particles = [];
    let eqCircles = [];
    let fontLoaded = false;
    
    const INITIALS = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    const MEDIALS = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
    const FINALS = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    const SOURCE_POOL = [...INITIALS, ...MEDIALS, ...FINALS.filter(x=>x!="")];

    function preload() {
        // [핵심] 에러 방지를 위해 기본 폰트를 미리 로드합니다.
        // 만약 이 경로가 막히더라도 draw에서 체크 로직이 보호해줍니다.
        myFont = loadFont('https://cdnjs.cloudflare.com/ajax/libs/ink/3.1.10/fonts/Roboto-Regular.ttf', 
            () => { fontLoaded = true; console.log("Default font loaded."); },
            () => { console.log("Font load failed, waiting for user font."); }
        );
    }

    function setup() {
        let cnv = createCanvas(windowWidth - 300, windowHeight, WEBGL);
        cnv.parent('canvas-container');
        colorMode(HSB, 360, 100, 100, 100);
        fft = new p5.FFT(0.8, 512);

        for (let i = 0; i < 450; i++) {
            let rx = random(-width/2, width/2);
            let ry = random(-height/2, height/2);
            particles.push({
                char: random(SOURCE_POOL),
                bx: rx, by: ry, x: rx, y: ry, tx: rx, ty: ry,
                size: 12, tSize: 12, alpha: 15, tAlpha: 15, assigned: false
            });
        }

        for(let i=0; i<6; i++) {
            eqCircles.push({ x: map(i, 0, 5, -width/3, width/3), y: height/2 - 120 });
        }
    }

    function draw() {
        background(5);
        
        // [중요] 폰트가 로드되지 않았으면 텍스트를 그리지 않고 루프를 넘깁니다. (에러 원천 차단)
        if (!fontLoaded || !myFont) return;

        let curTime = audio ? audio.currentTime() : 0;
        updateSubtitles(curTime);
        
        fft.analyze();
        let bands = [
            fft.getEnergy(20, 120),   // Sub
            fft.getEnergy(120, 300),  // Bass
            fft.getEnergy(300, 1000), // LowMid
            fft.getEnergy(1000, 2000),// Mid
            fft.getEnergy(2000, 4500),// HighMid
            fft.getEnergy(4500, 8000) // Treble
        ];

        // 6-BAND EQ
        noFill();
        for(let i=0; i<6; i++) {
            let b = bands[i];
            push();
            translate(eqCircles[i].x, eqCircles[i].y);
            stroke(map(i, 0, 5, 180, 320), 80, 100, 40);
            ellipse(0, 0, 60 + b*0.9);
            stroke(map(i, 0, 5, 180, 320), 80, 100, 15);
            ellipse(0, 0, 90 + b*1.3);
            pop();
        }

        // TYPO SYSTEM
        let needed = decomposeHangul(currentSub);
        particles.forEach(p => p.assigned = false);

        needed.forEach((n, idx) => {
            let found = particles.find(p => !p.assigned && p.char === n.char);
            if (found) {
                found.assigned = true;
                found.tx = n.x; found.ty = n.y;
                found.tSize = 48 + bands[1]*0.15;
                found.tAlpha = 100;
            }
        });

        textFont(myFont); // 폰트 적용
        particles.forEach(p => {
            if (!p.assigned) {
                p.tx = p.bx; p.ty = p.by; p.tSize = 12; p.tAlpha = 15;
            }
            p.x = lerp(p.x, p.tx, 0.14);
            p.y = lerp(p.y, p.ty, 0.14);
            p.size = lerp(p.size, p.tSize, 0.1);
            p.alpha = lerp(p.alpha, p.tAlpha, 0.1);

            push();
            translate(p.x, p.y, p.assigned ? 60 : 0);
            fill(p.assigned ? 175 : 0, 0, 100, p.alpha);
            noStroke();
            textAlign(CENTER, CENTER);
            textSize(p.size);
            text(p.char, 0, 0);
            pop();
        });
    }

    function handleFont(files) {
        if (files.length > 0) {
            let fontUrl = URL.createObjectURL(files[0]);
            loadFont(fontUrl, (f) => {
                myFont = f;
                fontLoaded = true;
                document.getElementById('f-status').innerText = `Font Loaded: ${files[0].name}`;
                console.log("User font updated.");
            });
        }
    }

    function decomposeHangul(str) {
        let result = [];
        let startX = -(str.length * 45) / 2;
        for (let i = 0; i < str.length; i++) {
            let code = str.charCodeAt(i) - 44032;
            let curX = startX + i * 90;
            if (code >= 0 && code <= 11171) {
                result.push({ char: INITIALS[Math.floor(code / 588)], x: curX, y: -25 });
                result.push({ char: MEDIALS[Math.floor((code % 588) / 28)], x: curX + 28, y: 5 });
                let jong = code % 28;
                if (jong !== 0) result.push({ char: FINALS[jong], x: curX, y: 35 });
            } else {
                result.push({ char: str[i], x: curX, y: 0 });
            }
        }
        return result;
    }

    function handleAudio(f) { audio = loadSound(URL.createObjectURL(f[0]), () => { document.getElementById('status').innerText = "MP3 준비 완료."; }); }
    function handleSRT(f) {
        const reader = new FileReader();
        reader.onload = (e) => {
            subtitles = parseSRT(e.target.result);
            document.getElementById('status').innerText = `SRT 완료 (${subtitles.length}단어). START를 누르세요.`;
            document.getElementById('startBtn').disabled = false;
        };
        reader.readAsText(f[0]);
    }
    function parseSRT(d) {
        const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2}|\n*$)/g;
        let m, r = [];
        while ((m = regex.exec(d)) !== null) { r.push({ start: tToS(m[2]), end: tToS(m[3]), text: m[4].trim() }); }
        return r;
    }
    function tToS(t) { let a = t.split(':'), s = a[2].split(','); return (+a[0])*3600 + (+a[1])*60 + (+s[0]) + (+s[1]/1000); }
    function updateSubtitles(t) { let f = subtitles.find(s => t >= s.start && t <= s.end); currentSub = f ? f.text : ""; }
    function startEngine() { if (audio && !audio.isPlaying()) { userStartAudio().then(() => { audio.play(); document.getElementById('startBtn').innerText = "ENGINE RUNNING..."; }); } }
</script>
</body>
</html>
