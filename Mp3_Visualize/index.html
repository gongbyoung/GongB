<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM — Music Player</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#07070f;
  --panel:#0d0d1e;
  --panel2:#111128;
  --border:rgba(80,80,180,0.2);
  --border2:rgba(100,100,220,0.4);
  --accent:#5555ff;
  --accent2:#8888ff;
  --text:#c8c8ff;
  --muted:#44447a;
  --muted2:#6666aa;
  --active-bg:rgba(85,85,255,0.15);
  --hover-bg:rgba(80,80,180,0.1);
  --red:#ff4466;
  --green:#44ffaa;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Courier New',monospace;
  min-height:100vh;
  display:grid;
  grid-template-rows:auto 1fr auto;
  grid-template-columns:1fr;
  overflow:hidden;
  height:100vh;
}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;gap:16px;
  padding:14px 20px;
  border-bottom:1px solid var(--border);
  background:var(--panel);
  flex-shrink:0;
}
.logo{font-size:16px;letter-spacing:6px;color:var(--accent2);font-weight:300;}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center;}

/* ── MAIN LAYOUT ── */
.main{
  display:grid;
  grid-template-columns:320px 1fr;
  overflow:hidden;
  min-height:0;
}

/* ── LEFT PANEL ── */
.left-panel{
  display:flex;flex-direction:column;
  border-right:1px solid var(--border);
  overflow:hidden;
  background:var(--panel);
}

/* playlist header */
.panel-head{
  padding:14px 16px 10px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
}
.panel-title{font-size:10px;letter-spacing:4px;color:var(--muted2);text-transform:uppercase;flex:1;}

/* drop zone */
.drop-zone{
  margin:12px;
  border:1px dashed var(--muted);
  border-radius:10px;
  padding:14px 12px;
  text-align:center;
  cursor:pointer;
  transition:all .25s;
  flex-shrink:0;
}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:rgba(85,85,255,.08);}
.drop-zone .dz-icon{font-size:18px;margin-bottom:4px;}
.drop-zone .dz-text{font-size:11px;color:var(--muted2);letter-spacing:1px;}
#fileInput{display:none;}

/* playlist controls */
.playlist-controls{
  display:flex;align-items:center;gap:6px;
  padding:8px 12px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.pill-btn{
  background:transparent;
  border:1px solid var(--border);
  border-radius:20px;
  color:var(--muted2);
  padding:4px 12px;
  font-family:'Courier New',monospace;
  font-size:10px;letter-spacing:1px;
  cursor:pointer;transition:all .2s;
  white-space:nowrap;
}
.pill-btn:hover{border-color:var(--accent2);color:var(--text);}
.pill-btn.active{border-color:var(--accent);color:var(--accent2);background:var(--active-bg);}
.count-badge{
  margin-left:auto;font-size:10px;color:var(--muted);letter-spacing:1px;
}

/* playlist */
.playlist{
  flex:1;overflow-y:auto;
  padding:4px 0;
}
.playlist::-webkit-scrollbar{width:4px;}
.playlist::-webkit-scrollbar-track{background:transparent;}
.playlist::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px;}

.pl-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;
  cursor:pointer;
  transition:background .15s;
  border-radius:0;
  position:relative;
}
.pl-item:hover{background:var(--hover-bg);}
.pl-item.active{background:var(--active-bg);}
.pl-item.active .pl-title{color:#e0e0ff;}

.pl-num{
  font-size:10px;color:var(--muted);
  min-width:20px;text-align:right;flex-shrink:0;
}
.pl-item.active .pl-num{display:none;}
.pl-playing-icon{
  display:none;width:20px;flex-shrink:0;text-align:right;
  font-size:10px;color:var(--accent2);
}
.pl-item.active .pl-playing-icon{display:block;}

.pl-info{flex:1;min-width:0;}
.pl-title{
  font-size:12px;color:var(--text);letter-spacing:.5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.pl-dur{font-size:10px;color:var(--muted);margin-top:2px;}

.pl-remove{
  opacity:0;background:none;border:none;color:var(--muted2);
  cursor:pointer;font-size:14px;padding:2px 4px;
  transition:opacity .15s,color .15s;flex-shrink:0;
}
.pl-item:hover .pl-remove{opacity:1;}
.pl-remove:hover{color:var(--red);}

/* ── RIGHT PANEL ── */
.right-panel{
  display:flex;flex-direction:column;
  overflow:hidden;
  background:var(--bg);
}

/* now playing */
.now-playing{
  padding:16px 20px 12px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.np-label{font-size:9px;letter-spacing:5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.np-title{font-size:18px;font-weight:300;letter-spacing:2px;color:#e0e0ff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.np-sub{font-size:11px;color:var(--muted2);}

/* progress */
.progress-wrap{
  height:4px;background:var(--panel);cursor:pointer;flex-shrink:0;
  position:relative;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  width:0%;transition:width .1s;
  position:relative;
}
.progress-fill::after{
  content:'';position:absolute;right:-4px;top:-4px;
  width:10px;height:10px;border-radius:50%;
  background:var(--accent2);opacity:0;transition:opacity .2s;
}
.progress-wrap:hover .progress-fill::after{opacity:1;}

/* main controls */
.controls{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:14px 20px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.ctrl-btn{
  background:transparent;border:1px solid var(--border);
  border-radius:8px;color:var(--muted2);
  padding:8px 14px;
  font-family:'Courier New',monospace;font-size:11px;letter-spacing:1px;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.ctrl-btn:hover{border-color:var(--accent2);color:var(--text);}
.ctrl-btn.active{border-color:var(--accent);color:var(--accent2);background:var(--active-bg);}
.ctrl-btn.primary{
  background:var(--accent);border-color:var(--accent);color:#fff;
  padding:10px 28px;font-size:13px;
}
.ctrl-btn.primary:hover{background:var(--accent2);border-color:var(--accent2);}

.time-display{
  font-size:11px;color:var(--muted);letter-spacing:1px;
  padding:0 8px;white-space:nowrap;
}

/* vol row */
.vol-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 20px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.vol-label{font-size:10px;color:var(--muted);letter-spacing:3px;}
input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer;height:3px;}
.vol-val{font-size:10px;color:var(--muted);min-width:32px;text-align:right;}

/* viz section */
.viz-section{
  flex:1;overflow:hidden;display:flex;flex-direction:column;
  min-height:0;
}
.viz-section-head{
  padding:12px 16px 8px;
  font-size:9px;letter-spacing:5px;color:var(--muted);text-transform:uppercase;
  border-bottom:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;gap:12px;
}
.viz-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  padding:10px;
  overflow-y:auto;
}
.viz-grid::-webkit-scrollbar{width:3px;}
.viz-grid::-webkit-scrollbar-thumb{background:var(--muted);}

.viz-card{
  border:1px solid var(--border);
  border-radius:8px;overflow:hidden;
  cursor:pointer;transition:all .2s;
  position:relative;
}
.viz-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.viz-card.selected{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
.viz-card canvas{display:block;width:100%;aspect-ratio:16/9;}
.viz-card-label{
  padding:4px 6px;
  font-size:9px;letter-spacing:2px;color:var(--muted2);
  background:var(--panel);
  border-top:1px solid var(--border);
}
.viz-card.selected .viz-card-label{color:var(--accent2);}
.viz-sel-badge{
  display:none;position:absolute;top:4px;right:4px;
  background:var(--accent);color:#fff;
  font-size:8px;letter-spacing:1px;padding:2px 6px;border-radius:3px;
}
.viz-card.selected .viz-sel-badge{display:block;}

.launch-viz-btn{
  margin-left:auto;
  background:transparent;border:1px solid var(--border);
  border-radius:6px;color:var(--muted2);
  padding:4px 12px;font-family:'Courier New',monospace;
  font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .2s;
}
.launch-viz-btn:hover{border-color:var(--accent2);color:var(--text);}
.launch-viz-btn:disabled{opacity:.3;cursor:default;}

/* ── BOTTOM BAR ── */
.bottombar{
  padding:10px 20px;
  border-top:1px solid var(--border);
  background:var(--panel);
  display:flex;align-items:center;gap:16px;
  flex-shrink:0;font-size:10px;color:var(--muted);letter-spacing:1px;
}
.status-dot{
  width:6px;height:6px;border-radius:50%;background:var(--muted);
  flex-shrink:0;transition:background .3s;
}
.status-dot.playing{background:var(--green);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ── FULLSCREEN VIZ OVERLAY ── */
#vizOverlay{
  display:none;position:fixed;inset:0;z-index:999;
  flex-direction:column;background:#000;
}
#vizOverlay.active{display:flex;}
#vizCanvas{flex:1;display:block;width:100%;min-height:0;}

#vizOverlayBar{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;
  background:rgba(7,7,15,.95);
  border-top:1px solid var(--border);
  flex-shrink:0;
  backdrop-filter:blur(8px);
}
.ov-progress{
  flex:1;height:3px;background:rgba(255,255,255,.1);
  border-radius:2px;cursor:pointer;position:relative;
}
.ov-progress-fill{
  height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:2px;width:0%;transition:width .1s;
}
.ov-title{font-size:10px;color:var(--muted2);letter-spacing:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.ov-time{font-size:10px;color:var(--muted);white-space:nowrap;}
.ov-btn{
  background:rgba(30,30,80,.8);border:1px solid var(--border);
  border-radius:5px;color:var(--muted2);
  padding:5px 12px;font-family:'Courier New',monospace;
  font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .2s;
  white-space:nowrap;
}
.ov-btn:hover{border-color:var(--accent2);color:var(--text);}
.ov-mode-badge{
  font-size:9px;letter-spacing:2px;color:var(--muted);
  padding:4px 8px;border:1px solid var(--border);border-radius:4px;
  white-space:nowrap;
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">SPECTRUM</div>
  <div class="topbar-right">
    <span style="font-size:10px;color:var(--muted);letter-spacing:2px;">MUSIC PLAYER + VISUALIZER</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LEFT: PLAYLIST -->
  <div class="left-panel">
    <div class="panel-head">
      <span class="panel-title">Playlist</span>
    </div>

    <div class="drop-zone" id="dz">
      <div class="dz-icon">♫</div>
      <div class="dz-text">MP3 파일 여러 개 드래그 또는 클릭</div>
    </div>
    <input type="file" id="fileInput" accept="audio/*" multiple>

    <div class="playlist-controls">
      <button class="pill-btn active" id="btnSeq" onclick="setPlayMode('seq')">순차</button>
      <button class="pill-btn" id="btnRand" onclick="setPlayMode('rand')">랜덤</button>
      <button class="pill-btn" id="btnRepeat" onclick="toggleRepeat()">반복</button>
      <span class="count-badge" id="countBadge">0 곡</span>
    </div>

    <div class="playlist" id="playlist">
      <div style="padding:24px 16px;text-align:center;color:var(--muted);font-size:11px;letter-spacing:1px;">
        곡을 추가해 주세요
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">

    <!-- NOW PLAYING -->
    <div class="now-playing">
      <div class="np-label">Now Playing</div>
      <div class="np-title" id="npTitle">—</div>
      <div class="np-sub" id="npSub">파일을 추가하고 재생을 시작하세요</div>
    </div>

    <!-- PROGRESS -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      <button class="ctrl-btn" id="btnPrev" onclick="prevTrack()">⏮ PREV</button>
      <button class="ctrl-btn primary" id="btnPlay" onclick="togglePlay()">▶ PLAY</button>
      <button class="ctrl-btn" id="btnNext" onclick="nextTrack()">NEXT ⏭</button>
      <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
    </div>

    <!-- VOL -->
    <div class="vol-row">
      <span class="vol-label">VOL</span>
      <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8">
      <span class="vol-val" id="volVal">80%</span>
    </div>

    <!-- VIZ SECTION -->
    <div class="viz-section">
      <div class="viz-section-head">
        <span>Visualizer</span>
        <button class="launch-viz-btn" id="launchVizBtn" onclick="openVizOverlay()" disabled>전체화면 ↗</button>
      </div>
      <div class="viz-grid" id="vizGrid"></div>
    </div>

  </div>
</div>

<!-- BOTTOM STATUS BAR -->
<div class="bottombar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">대기 중</span>
  <span style="margin-left:auto;" id="modeStatus">순차 재생</span>
</div>

<!-- FULLSCREEN VIZ OVERLAY -->
<div id="vizOverlay">
  <canvas id="vizCanvas"></canvas>
  <div id="vizOverlayBar">
    <div class="ov-title" id="ovTitle">—</div>
    <div class="ov-progress" id="ovProgress">
      <div class="ov-progress-fill" id="ovProgressFill"></div>
    </div>
    <div class="ov-time" id="ovTime">0:00 / 0:00</div>
    <div class="ov-mode-badge" id="ovModeBadge">순차</div>
    <button class="ov-btn" id="ovPrevBtn" onclick="prevTrack()">⏮</button>
    <button class="ov-btn" id="ovPlayBtn" onclick="togglePlay()">⏸</button>
    <button class="ov-btn" id="ovNextBtn" onclick="nextTrack()">⏭</button>
    <button class="ov-btn" onclick="closeVizOverlay()">✕ 닫기</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  VISUALIZER DEFINITIONS
// ═══════════════════════════════════════════════
const VIZS = [
  { id:'dna',    num:'01', name:'DNA Helix',      bg:'#030308', draw:drawDNA    },
  { id:'nebula', num:'02', name:'Galaxy Nebula',  bg:'#020206', draw:drawNebula },
  { id:'mandala',num:'03', name:'Mandala',        bg:'#040206', draw:drawMandala},
  { id:'web',    num:'04', name:'Electric Web',   bg:'#010108', draw:drawWeb    },
  { id:'vortex', num:'05', name:'Vortex Tunnel',  bg:'#020104', draw:drawVortex },
  { id:'aurora', num:'06', name:'Aurora Rings',   bg:'#010306', draw:drawAurora },
  { id:'clouds',  num:'07', name:'Cloud Drift',    bg:'#0a0a1a', draw:drawClouds  },
  { id:'meadow',  num:'08', name:'Floral Meadow',  bg:'#050a05', draw:drawMeadow  },
  { id:'ocean',   num:'09', name:'Deep Ocean',     bg:'#000510', draw:drawOcean   },
  { id:'horizon', num:'10', name:'Neon Horizon',   bg:'#000000', draw:drawHorizon },
  { id:'rain',    num:'11', name:'Digital Rain',   bg:'#020205', draw:drawRain    },
  { id:'particles',num:'12', name:'Star Flight',   bg:'#000000', draw:drawFlight  },
];

// ═══════════════════════════════════════════════
//  AUDIO ENGINE
// ═══════════════════════════════════════════════
let audioCtx, analyser, gainNode, source;
let audioBuffer = null, isPlaying = false;
let startTime = 0, pauseOffset = 0, duration = 0;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  gainNode = audioCtx.createGain();
  gainNode.gain.value = 0.8;
  analyser.connect(gainNode);
  gainNode.connect(audioCtx.destination);
}

function loadAndPlay(idx) {
  const track = playlist[idx];
  if (!track) return;
  currentIdx = idx;
  initAudio();
  if (source) { try { source.stop(); source.disconnect(); } catch(e){} }
  isPlaying = false;
  pauseOffset = 0;

  // decode
  const reader = new FileReader();
  reader.onload = e => {
    audioCtx.decodeAudioData(e.target.result, buf => {
      audioBuffer = buf;
      duration = buf.duration;
      pauseOffset = 0;
      track.duration = buf.duration;
      updatePlaylistUI();
      updateNowPlaying();
      playAudio();
    });
  };
  reader.readAsArrayBuffer(track.file);
}

function playAudio() {
  if (!audioBuffer) return;
  if (source) { try { source.stop(); source.disconnect(); } catch(e){} }
  source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(analyser);
  source.start(0, pauseOffset);
  startTime = audioCtx.currentTime - pauseOffset;
  isPlaying = true;
  updatePlayBtns();
  setStatusPlaying(true);
  source.onended = () => {
    if (!isPlaying) return;
    isPlaying = false;
    onTrackEnded();
  };
}

function togglePlay() {
  if (!audioCtx && playlist.length === 0) return;
  if (!audioBuffer && playlist.length > 0) { loadAndPlay(currentIdx >= 0 ? currentIdx : 0); return; }
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (isPlaying) {
    pauseOffset = audioCtx.currentTime - startTime;
    source.stop(); isPlaying = false;
    setStatusPlaying(false);
  } else {
    playAudio();
  }
  updatePlayBtns();
}

function onTrackEnded() {
  setStatusPlaying(false);
  if (repeatMode) {
    pauseOffset = 0;
    loadAndPlay(currentIdx);
  } else {
    nextTrack(true);
  }
}

function getFreqData() {
  const d = new Uint8Array(analyser ? analyser.frequencyBinCount : 512);
  if (analyser) analyser.getByteFrequencyData(d);
  return d;
}
function getTimeData() {
  const d = new Uint8Array(analyser ? analyser.frequencyBinCount : 512);
  if (analyser) analyser.getByteTimeDomainData(d);
  return d;
}

// ═══════════════════════════════════════════════
//  PLAYLIST
// ═══════════════════════════════════════════════
let playlist = [];
let currentIdx = -1;
let playMode = 'seq'; // 'seq' | 'rand'
let repeatMode = false;
let shuffleOrder = [];

function addFiles(files) {
  const arr = Array.from(files).filter(f => f.type.startsWith('audio/') || /\.(mp3|wav|ogg|flac|aac|m4a)$/i.test(f.name));
  if (!arr.length) return;
  arr.forEach(f => {
    playlist.push({ file: f, name: f.name.replace(/\.[^.]+$/, ''), duration: null });
  });
  buildShuffleOrder();
  updatePlaylistUI();
  document.getElementById('launchVizBtn').disabled = false;
  if (currentIdx < 0) { currentIdx = 0; }
}

function buildShuffleOrder() {
  shuffleOrder = Array.from({length: playlist.length}, (_, i) => i);
  for (let i = shuffleOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffleOrder[i], shuffleOrder[j]] = [shuffleOrder[j], shuffleOrder[i]];
  }
}

function setPlayMode(m) {
  playMode = m;
  document.getElementById('btnSeq').classList.toggle('active', m === 'seq');
  document.getElementById('btnRand').classList.toggle('active', m === 'rand');
  if (m === 'rand') buildShuffleOrder();
  updateModeStatus();
}
function toggleRepeat() {
  repeatMode = !repeatMode;
  document.getElementById('btnRepeat').classList.toggle('active', repeatMode);
  updateModeStatus();
}
function updateModeStatus() {
  const mode = playMode === 'rand' ? '랜덤 재생' : '순차 재생';
  const rep = repeatMode ? ' · 반복' : '';
  document.getElementById('modeStatus').textContent = mode + rep;
  document.getElementById('ovModeBadge').textContent = mode + rep;
}

function getNextIdx(dir = 1) {
  if (playlist.length === 0) return -1;
  if (playlist.length === 1) return 0;
  if (playMode === 'rand') {
    // pick a random idx that isn't current
    let r;
    do { r = Math.floor(Math.random() * playlist.length); } while (r === currentIdx && playlist.length > 1);
    return r;
  }
  let next = currentIdx + dir;
  if (next >= playlist.length) next = 0;
  if (next < 0) next = playlist.length - 1;
  return next;
}

function nextTrack(auto = false) {
  if (playlist.length === 0) return;
  const next = getNextIdx(1);
  if (next < 0) return;
  loadAndPlay(next);
}
function prevTrack() {
  if (playlist.length === 0) return;
  // if more than 3s played, restart; else go prev
  const elapsed = isPlaying ? audioCtx.currentTime - startTime : pauseOffset;
  if (elapsed > 3) { pauseOffset = 0; playAudio(); return; }
  const prev = getNextIdx(-1);
  if (prev < 0) return;
  loadAndPlay(prev);
}

function removeTrack(idx) {
  playlist.splice(idx, 1);
  if (playlist.length === 0) {
    currentIdx = -1; audioBuffer = null; isPlaying = false;
    if (source) { try { source.stop(); } catch(e){} }
    updateNowPlaying(); setStatusPlaying(false);
    document.getElementById('launchVizBtn').disabled = true;
  } else {
    if (idx < currentIdx) currentIdx--;
    else if (idx === currentIdx) {
      if (currentIdx >= playlist.length) currentIdx = playlist.length - 1;
      loadAndPlay(currentIdx);
    }
  }
  buildShuffleOrder();
  updatePlaylistUI();
}

function formatTime(s) {
  if (!s || isNaN(s)) return '—';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function updatePlaylistUI() {
  const el = document.getElementById('playlist');
  document.getElementById('countBadge').textContent = playlist.length + ' 곡';
  if (playlist.length === 0) {
    el.innerHTML = '<div style="padding:24px 16px;text-align:center;color:var(--muted);font-size:11px;letter-spacing:1px;">곡을 추가해 주세요</div>';
    return;
  }
  el.innerHTML = playlist.map((t, i) => `
    <div class="pl-item${i === currentIdx ? ' active' : ''}" onclick="loadAndPlay(${i})">
      <span class="pl-num">${i + 1}</span>
      <span class="pl-playing-icon">▶</span>
      <div class="pl-info">
        <div class="pl-title">${escHtml(t.name)}</div>
        <div class="pl-dur">${t.duration ? formatTime(t.duration) : '...'}</div>
      </div>
      <button class="pl-remove" onclick="event.stopPropagation();removeTrack(${i})" title="삭제">✕</button>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateNowPlaying() {
  const track = playlist[currentIdx];
  if (!track) {
    document.getElementById('npTitle').textContent = '—';
    document.getElementById('npSub').textContent = '파일을 추가하고 재생을 시작하세요';
    document.getElementById('ovTitle').textContent = '—';
    return;
  }
  document.getElementById('npTitle').textContent = track.name;
  document.getElementById('npSub').textContent = (currentIdx + 1) + ' / ' + playlist.length + '  ·  ' + (track.duration ? formatTime(track.duration) : '...');
  document.getElementById('ovTitle').textContent = track.name;
}

function updatePlayBtns() {
  const label = isPlaying ? '⏸ PAUSE' : '▶ PLAY';
  document.getElementById('btnPlay').textContent = label;
  document.getElementById('ovPlayBtn').textContent = isPlaying ? '⏸' : '▶';
}

function setStatusPlaying(p) {
  document.getElementById('statusDot').classList.toggle('playing', p);
  const track = playlist[currentIdx];
  document.getElementById('statusText').textContent = p && track
    ? '재생 중: ' + track.name
    : (track ? '일시정지' : '대기 중');
}

// Progress
function updateProgress() {
  if (!isPlaying || !audioBuffer) return;
  const elapsed = Math.min(audioCtx.currentTime - startTime, duration);
  const pct = (elapsed / duration * 100).toFixed(1);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('ovProgressFill').style.width = pct + '%';
  const t = formatTime(elapsed) + ' / ' + formatTime(duration);
  document.getElementById('timeDisplay').textContent = t;
  document.getElementById('ovTime').textContent = t;
}

document.getElementById('progressWrap').addEventListener('click', e => {
  if (!audioBuffer) return;
  const r = e.currentTarget.getBoundingClientRect();
  pauseOffset = ((e.clientX - r.left) / r.width) * duration;
  if (isPlaying) playAudio();
  else document.getElementById('progressFill').style.width = (pauseOffset / duration * 100) + '%';
});
document.getElementById('ovProgress').addEventListener('click', e => {
  if (!audioBuffer) return;
  const r = e.currentTarget.getBoundingClientRect();
  pauseOffset = ((e.clientX - r.left) / r.width) * duration;
  if (isPlaying) playAudio();
});

document.getElementById('volSlider').addEventListener('input', e => {
  if (gainNode) gainNode.gain.value = e.target.value;
  document.getElementById('volVal').textContent = Math.round(e.target.value * 100) + '%';
});

// File input
document.getElementById('dz').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('dz').addEventListener('dragover', e => { e.preventDefault(); document.getElementById('dz').classList.add('drag-over'); });
document.getElementById('dz').addEventListener('dragleave', () => document.getElementById('dz').classList.remove('drag-over'));
document.getElementById('dz').addEventListener('drop', e => {
  e.preventDefault(); document.getElementById('dz').classList.remove('drag-over');
  addFiles(e.dataTransfer.files);
});
document.getElementById('fileInput').addEventListener('change', e => { addFiles(e.target.files); e.target.value = ''; });

// keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') nextTrack();
  if (e.code === 'ArrowLeft') prevTrack();
  if (e.code === 'Escape') closeVizOverlay();
});

const vizGrid = document.getElementById('vizGrid');
VIZS.forEach(viz => {
  const card = document.createElement('div');
  card.className = 'viz-card' + (viz === selectedViz ? ' selected' : '');
  card.id = 'vc-' + viz.id;
  card.innerHTML = `
    <canvas id="vp-${viz.id}" width="200" height="112"></canvas>
    <div class="viz-card-label">${viz.num} ${viz.name}</div>
    <div class="viz-sel-badge">ON</div>
  `;
  card.addEventListener('click', () => selectViz(viz));
  vizGrid.appendChild(card);
  startPreview(viz, document.getElementById('vp-' + viz.id));
});

function selectViz(viz) {
  document.querySelectorAll('.viz-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('vc-' + viz.id).classList.add('selected');
  selectedViz = viz;
  // if overlay is open, switch live
  if (document.getElementById('vizOverlay').classList.contains('active')) {
    overlayViz = viz;
    document.getElementById('vizCanvas').style.background = viz.bg;
  }
}

function startPreview(viz, canvas) {
  const ctx = canvas.getContext('2d');
  let t = Math.random() * 100;
  function tick() {
    requestAnimationFrame(tick);
    t += 0.025;
    const fakeFreq = new Uint8Array(256);
    for (let i = 0; i < 256; i++) {
      fakeFreq[i] = Math.max(0, Math.min(255,
        128 + Math.sin(t * 1.4 + i * 0.18) * 65
            + Math.sin(t * 3.3 + i * 0.06) * 38
            + (Math.random() - 0.5) * 15
      ));
    }
    const W = canvas.width, H = canvas.height;
    try {
      ctx.fillStyle = viz.bg + 'ee';
      ctx.fillRect(0, 0, W, H);
      viz.draw(ctx, W, H, t, fakeFreq, null);
    } catch(err) { /* isolate per-card errors */ }
  }
  tick();
}

// ═══════════════════════════════════════════════
const vizOverlay = document.getElementById('vizOverlay');
const vizCanvas = document.getElementById('vizCanvas');
const vizCtx = vizCanvas.getContext('2d');
let overlayAnimId = null;
let overlayT = 0;
let overlayViz = selectedViz;

function openVizOverlay() {
  overlayViz = selectedViz;
  vizOverlay.classList.add('active');
  vizCanvas.style.background = overlayViz.bg;
  resizeVizCanvas();
  window.addEventListener('resize', resizeVizCanvas);
  if (overlayAnimId) cancelAnimationFrame(overlayAnimId);
  overlayT = 0;
  function tick() {
    overlayAnimId = requestAnimationFrame(tick);
    overlayT += 0.012;
    const W = vizCanvas.width, H = vizCanvas.height;
    const freq = getFreqData();
    const time_ = getTimeData();
    vizCtx.fillStyle = overlayViz.bg + '40';
    vizCtx.fillRect(0, 0, W, H);
    overlayViz.draw(vizCtx, W, H, overlayT, freq, time_);
    updateProgress();
    updateNowPlaying();
    updatePlaylistUI();
  }
  tick();
}

function resizeVizCanvas() {
  const bar = document.getElementById('vizOverlayBar');
  vizCanvas.width = window.innerWidth;
  vizCanvas.height = window.innerHeight - bar.offsetHeight;
}

function closeVizOverlay() {
  vizOverlay.classList.remove('active');
  if (overlayAnimId) { cancelAnimationFrame(overlayAnimId); overlayAnimId = null; }
  window.removeEventListener('resize', resizeVizCanvas);
}

// Main RAF loop for progress
(function loop() { requestAnimationFrame(loop); updateProgress(); })();

function drawDNA(ctx,W,H,t,freq){try{

      const angle=(i/points)*Math.PI*2+t+po;
      const fi=Math.floor((i/points)*freq.length/2);
      const amp=(freq[fi]||0)/255;
      const r=radius*(0.5+amp*0.7);
      const x=cx+Math.cos(angle)*r,y=cy+Math.sin(angle)*r*0.4+Math.sin(angle*3+t)*radius*0.15;
      const hue=220+s*40+amp*60,sz=2+amp*6;
      ctx.beginPath();ctx.arc(x,y,sz,0,Math.PI*2);
      ctx.fillStyle=`hsla(${hue},80%,65%,${0.6+amp*0.4})`;ctx.fill();
      if(i>0){
        const pa=((i-1)/points)*Math.PI*2+t+po,pfi=Math.floor(((i-1)/points)*freq.length/2);
        const pa_amp=(freq[pfi]||0)/255,pr=radius*(0.5+pa_amp*0.7);

        ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(x,y);

    }
    for(let i=0;i<points;i+=4){
      const a1=(i/points)*Math.PI*2+t,a2=a1+Math.PI;
      const fi=Math.floor((i/points)*freq.length/2),amp=(freq[fi]||0)/255;
      const r1=radius*(0.5+amp*0.7);
      const x1=cx+Math.cos(a1)*r1,y1=cy+Math.sin(a1)*r1*0.4+Math.sin(a1*3+t)*radius*0.15;
      const x2=cx+Math.cos(a2)*r1,y2=cy+Math.sin(a2)*r1*0.4+Math.sin(a2*3+t)*radius*0.15;
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
      ctx.strokeStyle=`rgba(180,180,255,${amp*0.3})`;ctx.lineWidth=0.5;ctx.stroke();
    }
  }
}catch(e){}}

  const eyeR=Math.max(1,5+bass*25+mid*15),eg=ctx.createRadialGradient(cx,cy,0,cx,cy,eyeR*4);
  eg.addColorStop(0,`rgba(255,200,255,${0.8+bass*0.2})`);eg.addColorStop(0.3,'rgba(180,50,255,0.6)');eg.addColorStop(0.7,'rgba(80,0,150,0.2)');eg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(cx,cy,eyeR*4,0,Math.PI*2);ctx.fillStyle=eg;ctx.fill();ctx.beginPath();ctx.arc(cx,cy,eyeR,0,Math.PI*2);ctx.fillStyle='rgba(255,220,255,1)';ctx.fill();
}catch(e){}}

const _aR=Array.from({length:6},(_,i)=>({offset:(i/6)*Math.PI*2,phaseSpeed:0.003+i*0.0015,colorShift:i*40,thickness:8+i*4,ringScale:0.5+i*0.09}));
function drawAurora(ctx,W,H,t,freq){try{
  const cx=W/2,cy=H/2;let bass=0;for(let i=0;i<12;i++)bass+=(freq[i]||0);bass=bass/12/255;
  const maxR=Math.min(W,H)*0.46;
  _aR.forEach(ribbon=>{
    let avgAmp=0;for(let i=0;i<Math.min(80,freq.length);i++)avgAmp+=freq[i];avgAmp=avgAmp/80/255;
    const r=maxR*ribbon.ringScale;ctx.beginPath();let started=false;
    for(let i=0;i<=180;i++){
      const angle=(i/180)*Math.PI*2+ribbon.offset+t*ribbon.phaseSpeed*60;
      const fi=Math.min(Math.floor((i/180)*freq.length*0.7),freq.length-1),amp=(freq[fi]||0)/255;
      const pr=Math.max(1,r+Math.sin(angle*3+t*2)*amp*r*0.25+Math.sin(angle*5-t*1.5+ribbon.offset)*amp*r*0.12);
      const x=cx+Math.cos(angle)*pr,y=cy+Math.sin(angle)*pr*0.55;
      if(!started){ctx.moveTo(x,y);started=true;}else ctx.lineTo(x,y);
    }
    ctx.closePath();const hue=140+ribbon.colorShift+avgAmp*60+Math.sin(t*0.5)*30;
    ctx.strokeStyle=`hsla(${hue},90%,65%,${0.15+avgAmp*0.5})`;ctx.lineWidth=ribbon.thickness*(0.5+avgAmp*1.5);ctx.stroke();
    ctx.strokeStyle=`hsla(${hue+20},100%,85%,${0.3+avgAmp*0.5})`;ctx.lineWidth=1.5;ctx.stroke();
  });
  const hg=ctx.createRadialGradient(cx,cy,maxR*0.4,cx,cy,maxR*1.1);hg.addColorStop(0,'rgba(0,0,0,0)');hg.addColorStop(0.7,`rgba(0,80,40,${0.05+bass*0.15})`);hg.addColorStop(1,`rgba(0,150,80,${0.1+bass*0.2})`);
  ctx.beginPath();ctx.arc(cx,cy,maxR*1.1,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill();
  const coreR=Math.max(1,40+bass*60),cg=ctx.createRadialGradient(cx,cy,0,cx,cy,coreR);cg.addColorStop(0,`rgba(200,255,230,${0.7+bass*0.3})`);cg.addColorStop(0.4,'rgba(0,200,120,0.3)');cg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(cx,cy,coreR,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();ctx.beginPath();ctx.arc(cx,cy,Math.max(1,6+bass*10),0,Math.PI*2);ctx.fillStyle='rgba(220,255,240,1)';ctx.fill();
}catch(e){}}
  // 07. Cloud Drift (구름 사이를 누비는 느낌)
function drawClouds(ctx,W,H,t,freq){
  try {
    const cx=W/2, cy=H/2;
    let bass=0; for(let i=0;i<10;i++) bass+=(freq[i]||0); bass/=2550;
    ctx.save();
    for(let i=0; i<15; i++) {
      const x = (Math.sin(t*0.2 + i)*W*0.5) + cx;
      const y = (Math.cos(t*0.3 + i)*H*0.3) + cy;
      const size = (100 + bass*300) * (1 + Math.sin(t+i)*0.2);
      const grd = ctx.createRadialGradient(x,y,0,x,y,size);
      grd.addColorStop(0, `rgba(200, 220, 255, ${0.1 + bass})`);
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(x,y,size,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  } catch(e){}
}

// 08. Floral Meadow (꽃밭 위를 비행하는 느낌)
function drawMeadow(ctx,W,H,t,freq){
  try {
    const segments = 12;
    for(let i=0; i<segments; i++){
      const fi = Math.floor((i/segments)*freq.length*0.2);
      const amp = (freq[fi]||0)/255;
      const x = (i/segments)*W + (W/segments/2);
      const h = amp * H * 0.6;
      const hue = 100 + i*10 + amp*50;
      // 꽃대
      ctx.strokeStyle = `hsla(${hue}, 40%, 30%, 0.5)`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x, H); ctx.quadraticCurveTo(x+Math.sin(t+i)*50, H-h/2, x, H-h); ctx.stroke();
      // 꽃송이
      ctx.fillStyle = `hsla(${hue}, 80%, 60%, ${0.5+amp*0.5})`;
      ctx.beginPath(); ctx.arc(x, H-h, 5+amp*20, 0, Math.PI*2); ctx.fill();
    }
  } catch(e){}
}

// 09. Deep Ocean (바다 수면의 일렁임)
function drawOcean(ctx,W,H,t,freq){
  try {
    ctx.save();
    for(let j=0; j<5; j++) {
      ctx.beginPath();
      ctx.moveTo(0, H);
      const offset = j * 40;
      for(let i=0; i<=W; i+=20) {
        const fi = Math.floor((i/W)*100);
        const amp = (freq[fi]||0)/255;
        const y = H*0.7 + Math.sin(i*0.01 + t + j)*30 + (amp*50);
        ctx.lineTo(i, y + offset);
      }
      ctx.lineTo(W, H);
      ctx.fillStyle = `rgba(0, 100, 255, ${0.1 + (j*0.05)})`;
      ctx.fill();
    }
    ctx.restore();
  } catch(e){}
}

// 10. Neon Horizon (드론 시점의 지평선 비행)
function drawHorizon(ctx,W,H,t,freq){
  try {
    const cx=W/2, cy=H/2;
    let bass=0; for(let i=0;i<5;i++) bass+=(freq[i]||0); bass/=1275;
    ctx.strokeStyle = `rgba(255, 0, 255, ${0.3 + bass*0.7})`;
    ctx.lineWidth = 2;
    // 가로선 (속도감)
    for(let i=0; i<10; i++) {
      const y = cy + (Math.tan((t + i/10)%Math.PI/2) * 20);
      if(y > cy) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }
    }
    // 세로선 (소실점)
    for(let i=-5; i<=5; i++) {
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + i*W*0.2, H); ctx.stroke();
    }
  } catch(e){}
}

// 11. Digital Rain (비 내리는 풍경의 데이터화)
function drawRain(ctx,W,H,t,freq){
  try {
    const cols = 40;
    const cw = W/cols;
    for(let i=0; i<cols; i++) {
      const fi = Math.floor((i/cols)*freq.length*0.5);
      const amp = (freq[fi]||0)/255;
      const x = i * cw;
      const h = amp * H;
      const speed = 5 + amp*20;
      const y = (t * speed * 100 + (i*137)) % (H + 100) - 100;
      
      const grd = ctx.createLinearGradient(x, y, x, y+h);
      grd.addColorStop(0, 'rgba(0, 255, 150, 0)');
      grd.addColorStop(1, `rgba(0, 255, 150, ${amp})`);
      ctx.fillStyle = grd;
      ctx.fillRect(x, y, 2, h);
    }
  } catch(e){}
}

// 12. Star Flight (광속 비행하는 입자들)
const _stars = Array.from({length:100}, () => ({x:Math.random(), y:Math.random(), z:Math.random()}));
function drawFlight(ctx,W,H,t,freq){
  try {
    const cx=W/2, cy=H/2;
    let bass=0; for(let i=0;i<5;i++) bass+=(freq[i]||0); bass/=1275;
    _stars.forEach(s => {
      s.z -= 0.01 + bass*0.05;
      if(s.z <= 0) s.z = 1;
      const x = (s.x - 0.5) * (1/s.z) * W + cx;
      const y = (s.y - 0.5) * (1/s.z) * H + cy;
      const size = (1-s.z) * 5;
      ctx.fillStyle = `rgba(255, 255, 255, ${1-s.z})`;
      ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2); ctx.fill();
    });
  } catch(e){}
}
