<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GongB MP3 Visualizer Factory</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <nav id="sidebar">
        <h2>🎨 Sketches</h2>
        <ul id="sketch-list">
            <li data-sketch="001_p5_wave.js" class="active">001: P5 Waveform</li>
            <li data-sketch="002_three_cube.js">002: Three.js Beat Cube</li>
            <li data-sketch="003_glsl_noise.js">003: GLSL Liquid Noise</li>
        </ul>

        <hr class="menu-divider">

        <h2>⚙️ Export Setting</h2>
        <div class="control-group">
            <label>화면 비율 (Ratio)</label>
            <div class="btn-row">
                <button id="btn-ratio-full" class="active">Full</button>
                <button id="btn-ratio-169">16:9</button>
                <button id="btn-ratio-916">9:16</button>
            </div>
        </div>

        <div class="control-group">
            <label>MP4 레코더 (h.264)</label>
            <button id="btn-record" class="btn-primary">🔴 녹화 시작 (Record)</button>
        </div>
    </nav>

    <main id="visualizer-container">
        <div id="audio-panel">
            <audio id="audio-player" controls src="assets/sample.mp3"></audio>
        </div>
        
        <div id="stage-wrapper" class="ratio-full">
            <div id="canvas-stage"></div>
        </div>
    </main>

    <script type="module" src="src/main.js"></script>
</body>
</html>
