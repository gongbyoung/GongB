<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mp3 Visualizer Study Control Tower</title>
  
  <!-- 라이브러리 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <!-- 💡 style.css 로딩 -->
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    /* 💥 고정 레이아웃 가드: main.js가 클래스를 밀어도 3단 레이아웃은 파괴되지 않음 */
    .main-layout { display: flex !important; width: 100vw !important; height: 100vh !important; overflow: hidden; }
    .center-canvas-zone { flex: 1 !important; display: flex !important; align-items: center !important; justify-content: center !important; background-color: #060810; position: relative; }
    #canvas-container { width: 100%; height: 100%; position: relative; }
    .ratio-169 { aspect-ratio: 16/9 !important; height: auto !important; }
    .ratio-916 { aspect-ratio: 9/16 !important; width: auto !important; height: 100% !important; }
  </style>
</head>
<body>

  <div class="main-layout" id="stage-wrapper">
    
    <!-- 1️⃣ 왼쪽 사이드바 -->
    <div class="left-sidebar">
      <h3>🎵 Media Resources</h3>
      <div class="control-group">
        <div class="file-input-wrapper"><span>🔊 MP3:</span><input type="file" id="file-audio" accept="audio/*"></div>
        <div class="file-input-wrapper"><span>📝 SRT:</span><input type="file" id="file-srt" accept=".srt"></div>
        <div class="file-input-wrapper"><span>🖼️ BG:</span><input type="file" id="file-image" accept="image/*"></div>
      </div>

      <h3>📂 Sketches</h3>
      <ul class="sketches-list-wrapper" id="sketch-list">
        <li class="sketch-btn active" data-sketch="001_p5_wave.js">001 파형</li>
        <li class="sketch-btn" data-sketch="002_three_cube.js">002 큐브</li>
        <li class="sketch-btn" data-sketch="003_glsl_noise.js">003 노이즈</li>
        <li class="sketch-btn" data-sketch="004_three_typography.js">004 타이포</li>
        <li class="sketch-btn" data-sketch="005_three_floor_eq.js">005 그리드</li>
        <li class="sketch-btn" data-sketch="006_three_organic_flower.js">006 메이커</li>
        <li class="sketch-btn" data-sketch="007_three_cosmic_nebula.js">007 성운</li>
        <li class="sketch-btn" data-sketch="008_three_pendulum_wave.js">008 진자</li>
        <li class="sketch-btn" data-sketch="009_three_fireworks.js">009 불꽃</li>
        <li class="sketch-btn" data-sketch="010_p5_datawave_512.js">010 데이터</li>
        <li class="sketch-btn" data-sketch="011_p5_ocean_wave.js">011 물보라</li>
        <li class="sketch-btn" data-sketch="012_p5_ocean_wave_spaced.js">012 레이어</li>
        <li class="sketch-btn" data-sketch="013_p5_ink_meteor_shower.js">013 유성우</li>
        <li class="sketch-btn" data-sketch="014_p5_pendulums.js">014 오르브</li>
        <li class="sketch-btn" data-sketch="015_three_p5_aurora.js">015 유체</li>
        <li class="sketch-btn" data-sketch="020_p5_srt_canvas.js">020 자막</li>
      </ul>

      <!-- 💡 오디오 경로를 assets/sample.mp3로 고정 -->
      <audio id="audio-player" controls src="assets/sample.mp3"></audio>
    </div>

    <!-- 2️⃣ 중앙 영역 -->
    <div class="center-canvas-zone">
      <div id="canvas-container"></div>
    </div>

    <!-- 3️⃣ 오른쪽 사이드바 -->
    <div class="right-sidebar">
      <h3>Cosmic Studio Tuning</h3>
      <div class="control-group"><label>Shuffle</label><div class="slider-row"><input type="range" id="num-cosmic-seed" min="1" max="500" value="42"></div></div>
      <div class="control-group"><label>Range</label><div class="slider-row"><input type="range" id="num-cosmic-scatter" min="5" max="50" value="22"></div></div>
      <div class="control-group"><label>Scale</label><div class="slider-row"><input type="range" id="num-cosmic-glow" min="10" max="250" value="85"></div></div>
      <div class="control-group"><label>Volume</label><div class="slider-row"><input type="range" id="num-cosmic-gain" min="10" max="500" value="100"></div></div>
      <div class="control-group"><label>Gauge</label><div class="slider-row"><input type="range" id="num-cosmic-gauge" min="0" max="100" value="50"></div></div>
      
      <button class="action-master-btn" id="btn-apply-cosmic">현재 수치 즉시 적용 (RESET)</button>
      
      <h3>📹 Export Setting</h3>
      <div class="preset-btn-row">
        <button class="action-mini-btn" id="btn-ratio-full">Full</button>
        <button class="action-mini-btn" id="btn-ratio-169">16:9</button>
        <button class="action-mini-btn" id="btn-ratio-916">9:16</button>
      </div>
      <button class="record-master-btn" id="btn-record">🔴 녹화 시작 (Record)</button>
    </div>

  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
