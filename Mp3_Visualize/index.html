<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GongB MP3 Visualizer Factory</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* 💡 가로 한 줄 밀착 배치를 위한 프리미엄 인라인 헬퍼 스타일 매립 */
        .cosmic-row-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 8px 14px;
            background: #161920;
            border-radius: 6px;
            margin-bottom: 6px;
            border: 1px solid #222530;
        }
        .cosmic-row-item .label-area {
            flex: 0 0 75px;
        }
        .cosmic-row-item .label-area label {
            color: #00ffcc;
            font-weight: bold;
            font-size: 0.85rem;
            display: block;
        }
        .cosmic-row-item .label-area span {
            font-size: 0.6rem;
            color: #666;
            display: block;
            margin-top: 1px;
        }
        .cosmic-row-item .num-input {
            width: 55px;
            padding: 5px;
            background: #0b0c10;
            color: #00ffcc;
            border: 1px solid #333;
            text-align: center;
            font-family: monospace;
            font-size: 0.8rem;
            border-radius: 4px;
            font-weight: bold;
        }
        .cosmic-row-item .range-input {
            flex: 1;
            -webkit-appearance: none;
            background: #252830;
            height: 6px;
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }
        .cosmic-row-item .range-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #00ffcc;
            cursor: pointer;
            box-shadow: 0 0 5px #00ffcc;
            transition: transform 0.1s;
        }
        .cosmic-row-item .range-input::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body>

    <!-- 📁 왼쪽 UI: 미디어 리소스 및 스케치 목록 전용 -->
    <nav id="sidebar">
        <h2>📁 Media Resources</h2>
     <!-- 왼쪽 스케치 사이드바의 변경된 2열 그리드 마크업 구조 -->
<div class="sketches-sidebar">
  <h2 style="color: #fff; font-size: 14px; margin-bottom: 5px;">🔮 Sketches</h2>
  
  <div class="sketches-grid-container">
    <button class="sketch-item-btn active" onclick="loadSketch('001')">001 파형</button>
    <button class="sketch-item-btn" onclick="loadSketch('002')">002 큐브</button>
    <button class="sketch-item-btn" onclick="loadSketch('003')">003 노이즈</button>
    <button class="sketch-item-btn" onclick="loadSketch('004')">004 타이포</button>
    <button class="sketch-item-btn" onclick="loadSketch('005')">005 그리드</button>
    <button class="sketch-item-btn" onclick="loadSketch('006')">006 메이커</button>
    <button class="sketch-item-btn" onclick="loadSketch('007')">007 성운</button>
    <button class="sketch-item-btn" onclick="loadSketch('008')">008 진자</button>
    <button class="sketch-item-btn" onclick="loadSketch('009')">009 불꽃</button>
    <button class="sketch-item-btn" onclick="loadSketch('010')">010 데이터</button>
    <button class="sketch-item-btn" onclick="loadSketch('011')">011 물보라</button>
    <button class="sketch-item-btn" onclick="loadSketch('012')">012 레이어</button>
    <button class="sketch-item-btn" onclick="loadSketch('013')">013 유성우</button>
    <button class="sketch-item-btn" onclick="loadSketch('014')">014 오르브</button>
    <button class="sketch-item-btn" onclick="loadSketch('015')">015 유체</button>
    <button class="sketch-item-btn" onclick="loadSketch('020')">020 자막</button>
  </div>
</div>
    </nav>

    <!-- 📺 중앙 메인 프리뷰 구역 -->
    <main id="visualizer-container">
        <div id="audio-panel">
            <audio id="audio-player" controls src="assets/sample.mp3"></audio>
        </div>
        <div id="stage-wrapper" class="ratio-full">
            <div id="canvas-stage"></div>
        </div>
    </main>

    <!-- 👉 오른쪽 UI -->
    <nav id="right-sidebar">
        <h2>🌌 Cosmic Studio Tuning</h2>
         
        <!-- 💡 1열 통합형 Shuffle 단락 -->
        <div class="cosmic-row-item">
            <div class="label-area">
                <label>Shuffle</label>
                <span>1 ~ 500</span>
            </div>
            <input type="number" id="num-cosmic-seed" min="1" max="500" value="42" class="num-input">
            <input type="range" id="slide-cosmic-seed" min="1" max="500" value="42" class="range-input">
        </div>

        <!-- 💡 1열 통합형 Range 단락 -->
        <div class="cosmic-row-item">
            <div class="label-area">
                <label>Range</label>
                <span>5 ~ 50</span>
            </div>
            <input type="number" id="num-cosmic-scatter" min="5" max="50" value="22" class="num-input">
            <input type="range" id="slide-cosmic-scatter" min="5" max="50" value="22" class="range-input">
        </div>

        <div class="control-group slider-group">
            <label style="color: #00ffcc; font-weight: bold; font-size: 0.8rem; display:block; margin-bottom: 6px;">Color Style Palette</label>
            <select id="select-cosmic-color" style="width:100%; background:#111; color:#fff; border:1px solid #333; padding:8px; border-radius:4px; font-size:0.8rem; cursor:pointer; margin-bottom:8px;">
                <option value="monochrome">No1 : MONO COLOR</option>
                <option value="neon">No2 : CYBER PUNK NEON</option>
                <option value="pastel">No3 : DEEP SPACE PASTEL</option>
                <option value="custom">No4 : CUSTOM COLOR</option>
                <option value="full-random">No5 : PURE FULL RANDOM COLOR</option>
            </select>
             
            <div id="custom-color-pickers" style="display:flex; gap:5px; margin-top:5px;">
                <div style="flex:1;">
                    <label style="font-size:0.7rem; color:#888;">Color 1</label>
                    <input type="color" id="picker-gas1" value="#ff0055" style="width:100%; height:25px; border:none; background:none; cursor:pointer;">
                </div>
                <div style="flex:1;">
                    <label style="font-size:0.7rem; color:#888;">Color 2</label>
                    <input type="color" id="picker-gas2" value="#00ffcc" style="width:100%; height:25px; border:none; background:none; cursor:pointer;">
                </div>
                <div style="flex:1;">
                    <label style="font-size:0.7rem; color:#888;">Color 3</label>
                    <input type="color" id="picker-star" value="#ffffff" style="width:100%; height:25px; border:none; background:none; cursor:pointer;">
                </div>
            </div>
        </div>

        <!-- 💡 1열 통합형 Scale 단락 -->
        <div class="cosmic-row-item">
            <div class="label-area">
                <label>Scale</label>
                <span>10 ~ 250</span>
            </div>
            <input type="number" id="num-cosmic-glow" min="10" max="250" value="85" class="num-input">
            <input type="range" id="slide-cosmic-glow" min="10" max="250" value="85" class="range-input">
        </div>

        <!-- 💡 1열 통합형 Volume 단락 -->
        <div class="cosmic-row-item">
            <div class="label-area">
                <label>Volume</label>
                <span>10 ~ 500</span>
            </div>
            <input type="number" id="num-cosmic-gain" min="10" max="500" value="100" class="num-input">
            <input type="range" id="slide-cosmic-gain" min="10" max="500" value="100" class="range-input">
        </div>

        <div class="control-group slider-group">
            <label style="color: #00ffcc; font-weight: bold; font-size: 0.8rem; margin-bottom:8px; display:block;">3D Position Offset (X, Y, Z)</label>
            <div style="display: flex; gap: 4px;">
                <div style="flex:1; display:flex; align-items:center; background:#111; border:1px solid #333; padding:5px; border-radius:4px;">
                    <span style="font-size:0.7rem; color:#ff0055; font-weight:bold; margin-right:4px;">X</span>
                    <input type="number" id="num-offset-x" value="0" step="0.1" style="width:100%; background:transparent; border:none; color:#fff; font-family:monospace; font-size:0.8rem; text-align:center;">
                </div>
                <div style="flex:1; display:flex; align-items:center; background:#111; border:1px solid #333; padding:5px; border-radius:4px;">
                    <span style="font-size:0.7rem; color:#00ffcc; font-weight:bold; margin-right:4px;">Y</span>
                    <input type="number" id="num-offset-y" value="0" step="0.1" style="width:100%; background:transparent; border:none; color:#fff; font-family:monospace; font-size:0.8rem; text-align:center;">
                </div>
                <div style="flex:1; display:flex; align-items:center; background:#111; border:1px solid #333; padding:5px; border-radius:4px;">
                    <span style="font-size:0.7rem; color:#0077ff; font-weight:bold; margin-right:4px;">Z</span>
                    <input type="number" id="num-offset-z" value="0" step="0.1" style="width:100%; background:transparent; border:none; color:#fff; font-family:monospace; font-size:0.8rem; text-align:center;">
                </div>
            </div>
        </div>

        <!-- 💡 1열 통합형 Gauge 단락 -->
        <div class="cosmic-row-item">
            <div class="label-area">
                <label>Gauge</label>
                <span>0 ~ 100</span>
            </div>
            <input type="number" id="num-cosmic-gauge" min="0" max="100" value="50" class="num-input">
            <input type="range" id="slide-cosmic-gauge" min="0" max="100" value="50" class="range-input">
        </div>

        <hr class="menu-divider">

        <h2>💾 Preset Save & Load</h2>
        <div class="control-group">
            <div class="btn-row" style="margin-bottom:6px; gap:4px;">
                <button id="btn-save-preset" style="background: #0077ff; border: none; font-weight: bold; font-size:0.72rem; padding:10px 4px;">💾 다른이름 저장</button>
                <button id="btn-load-preset" style="background: #252525; border: 1px solid #444; font-size:0.72rem; padding:10px 4px;">📂 프리셋 파일 열기</button>
            </div>
            <input type="file" id="hidden-preset-file-input" accept=".json" style="display: none;">
            
            <button id="btn-apply-cosmic" style="width:100%; padding:10px; background:linear-gradient(135deg, #00ffcc, #0077ff); color:#111; border:none; border-radius:4px; font-weight:bold; font-size:0.8rem; cursor:pointer; transition:all 0.2s;">⚡ 현재 수치 즉시 적용 (RESET)</button>
            <p id="preset-status" style="font-size: 0.75rem; color: #00ffcc; margin-top: 8px; text-align: center;">가변 프리셋 탐색 준비 완료</p>
        </div>

        <hr class="menu-divider">

        <h2>🎛️ Audio Tuning</h2>
        <div class="control-group slider-group">
            <div class="slider-header" style="margin-bottom: 8px;">
                <label style="color: #00ffcc; font-weight: bold;">주파수 분할 필터 스펙트럼</label>
                <span id="val-audio-bounds" style="font-family: monospace; font-size: 0.75rem; color: #fff;">25% | 75%</span>
            </div>
            <div class="dual-range-slider-container" style="position: relative; width: 100%; height: 8px; background: #222530; border-radius: 4px; margin: 18px 0 22px 0;">
                <div id="dual-filled-track" style="position: absolute; left: 25%; right: 25%; height: 100%; background: #00ffcc; border-radius: 4px;"></div>
                <input type="range" id="slide-audio-low" min="5" max="45" value="25" style="position: absolute; width: 100%; top: -4px; left: 0; background: none; pointer-events: none; -webkit-appearance: none; margin: 0;">
                <input type="range" id="slide-audio-high" min="55" max="95" value="75" style="position: absolute; width: 100%; top: -4px; left: 0; background: none; pointer-events: none; -webkit-appearance: none; margin: 0;">
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 0.7rem; color: #888; line-height: 1.4; border-top: 1px solid #222530; padding-top: 6px;">
                <div>🔴 <strong>Bass</strong><br><span id="lbl-bass-range">0% ~ 25%</span></div>
                <div style="text-align: center;">🟢 <strong>Mid</strong><br><span id="lbl-mid-range">25% ~ 75%</span></div>
                <div style="text-align: right;">🔵 <strong>Treble</strong><br><span id="lbl-treble-range">75% ~ 100%</span></div>
            </div>
        </div>

        <hr class="menu-divider">

        <h2>⚙️ Export Setting</h2>
        <div class="control-group">
            <label>화면 비율 (Ratio)</label>
            <div class="btn-row">
                <button id="btn-ratio-full" class="active">Full</button>
                <button id="btn-ratio-169">16:9</button>
                <button id="btn-ratio-916">9:16</button>
            </div>
        </div>
        <div class="control-group">
            <label>MP4 레코더 (h.264)</label>
            <button id="btn-record" class="btn-primary">🔴 녹화 시작 (Record)</button>
        </div>
    </nav>

    <script type="module" src="src/main.js"></script>
    
    <!-- 💡 스크립트 단독 양방향 슬라이더-인풋 바인딩 스크립트 주입 -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const bindPairs = [
                { num: "num-cosmic-seed", slide: "slide-cosmic-seed" },
                { num: "num-cosmic-scatter", slide: "slide-cosmic-scatter" },
                { num: "num-cosmic-glow", slide: "slide-cosmic-glow" },
                { num: "num-cosmic-gain", slide: "slide-cosmic-gain" },
                { num: "num-cosmic-gauge", slide: "slide-cosmic-gauge" }
            ];
            bindPairs.forEach(pair => {
                const nEl = document.getElementById(pair.num);
                const sEl = document.getElementById(pair.slide);
                if (nEl && sEl) {
                    nEl.addEventListener("input", () => { sEl.value = nEl.value; });
                    sEl.addEventListener("input", () => { nEl.value = sEl.value; nEl.dispatchEvent(new Event('input')); });
                }
            });
        });
    </script>
</body>
</html>
