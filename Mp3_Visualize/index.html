<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mp3 Visualizer Study Control Tower</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="main-layout" id="stage-wrapper">
    
    <!-- 1️⃣ 왼쪽 사이드바 -->
    <div class="left-sidebar">
      <h3 style="margin-top:0; font-size:13px; color:#8fa0b5; margin-bottom: 10px;">🎵 Media Resources</h3>
      <div class="control-group" style="margin-bottom:15px; padding: 8px;">
        <div class="file-input-wrapper">
          <span>🔊 MP3 오디오:</span>
          <input type="file" id="file-audio" accept="audio/*">
        </div>
        <div class="file-input-wrapper">
          <span>📝 SRT 자막:</span>
          <input type="file" id="file-srt" accept=".srt">
        </div>
        <div class="file-input-wrapper">
          <span>🖼️ 배경 이미지:</span>
          <input type="file" id="file-image" accept="image/*">
        </div>
      </div>

      <h3 style="margin-top:0; font-size:13px; color:#8fa0b5; margin-bottom: 5px;">📂 Sketches</h3>
      <ul class="sketches-list-wrapper" id="sketch-list">
        <li class="sketch-btn active" data-sketch="001_p5_wave.js">001 파형</li>
        <li class="sketch-btn" data-sketch="002_three_cube.js">002 큐브</li>
        <li class="sketch-btn" data-sketch="003_glsl_noise.js">003 노이즈</li>
        <li class="sketch-btn" data-sketch="004_three_typography.js">004 타이포</li>
        <li class="sketch-btn" data-sketch="005_three_floor_eq.js">005 그리드</li>
        <li class="sketch-btn" data-sketch="006_three_organic_flower.js">006 메이커</li>
        <li class="sketch-btn" data-sketch="007_three_cosmic_nebula.js">007 성운</li>
        <li class="sketch-btn" data-sketch="008_three_pendulum_wave.js">008 진자</li>
        <li class="sketch-btn" data-sketch="009_three_fireworks.js">009 불꽃</li>
        <li class="sketch-btn" data-sketch="010_p5_datawave_512.js">010 데이터</li>
        <li class="sketch-btn" data-sketch="011_p5_ocean_wave.js">011 물보라</li>
        <li class="sketch-btn" data-sketch="012_p5_ocean_wave_spaced.js">012 레이어</li>
        <li class="sketch-btn" data-sketch="013_p5_ink_meteor_shower.js">013 유성우</li>
        <li class="sketch-btn" data-sketch="014_p5_pendulums.js">014 오르브</li>
        <li class="sketch-btn" data-sketch="015_three_p5_aurora.js">015 유체</li>
        <li class="sketch-btn" data-sketch="016_p5_stylized_painter.js">016 화가</li>
        <li class="sketch-btn" data-sketch="017_p5_fbm_cloud.js">017 구름</li>
        <li class="sketch-btn" data-sketch="018_glsl_noise.js">018 GLSL</li>
        <li class="sketch-btn" data-sketch="019_p5_512_circles.js">019 원반</li>
        <li class="sketch-btn" data-sketch="020_p5_srt_canvas.js">020 자막</li>
      </ul>

      <div style="margin-top:auto;">
        <audio id="audio-player" controls src="assets/sample.mp3"></audio>
      </div>
    </div>

    <!-- 2️⃣ 중앙 영역: 💡 [중요] ID를 canvas-stage로 원복하여 main.js와 매칭 -->
    <div class="center-canvas-zone">
      <div id="canvas-stage" style="width:100%; height:100%;"></div>
    </div>

    <!-- 3️⃣ 오른쪽 사이드바 -->
    <div class="right-sidebar">
      <!-- ... (이전과 동일) -->
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
