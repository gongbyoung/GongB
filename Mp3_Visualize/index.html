<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가족 노래 오디오 비주얼라이저</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #ui { position: absolute; bottom: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; pointer-events: auto; }
        input[type="file"] { margin-bottom: 10px; display: block; }
        button { background: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-right: 10px;}
        button:hover { background: #2980b9; }
        #song-info { margin-top: 10px; font-size: 14px; opacity: 0.8; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="ui">
        <input type="file" id="audio-file" accept="audio/*">
        <button id="play-btn">재생</button>
        <button id="pause-btn">일시정지</button>
        <div id="song-info">노래를 선택해 주세요 (ACE 1.5, Suno 등)</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const audioFile = document.getElementById('audio-file');
        const playBtn = document.getElementById('play-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const songInfo = document.getElementById('song-info');

        let audioCtx, analyser, source, dataArray, bufferLength;
        let isPlaying = false;

        // 캔버스 크기 설정
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 오디오 컨텍스트 초기화
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256; // 비주얼라이저 해상도 (2의 거듭제곱)
                bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
            }
        }

        // 파일 로드 시 오디오 소스 연결
        audioFile.addEventListener('change', function() {
            initAudio();
            const files = this.files;
            if (files.length === 0) return;
            
            const file = files[0];
            songInfo.textContent = `재생 중: ${file.name}`;

            if (source) source.disconnect();

            const reader = new FileReader();
            reader.onload = function(e) {
                audioCtx.decodeAudioData(e.target.result, function(buffer) {
                    source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    source.connect(analyser);
                    analyser.connect(audioCtx.destination);
                    source.start(0);
                    isPlaying = true;
                    animate();
                });
            };
            reader.readAsArrayBuffer(file);
        });

        // 재생/일시정지 컨트롤
        playBtn.addEventListener('click', () => {
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
                isPlaying = true;
            }
        });

        pauseBtn.addEventListener('click', () => {
            if (audioCtx && audioCtx.state === 'running') {
                audioCtx.suspend();
                isPlaying = false;
            }
        });

        // 비주얼라이제이션 애니메이션 (막대 그래프 형태)
        function animate() {
            if (!isPlaying) return;
            requestAnimationFrame(animate);

            analyser.getByteFrequencyData(dataArray);

            // 캔버스 초기화 (약간의 잔상 효과)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const barWidth = (canvas.width / bufferLength) * 2.5;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const barHeight = dataArray[i] * 1.5; // 높이 가중치
                
                // 주파수에 따른 색상 변화 (Hone-Sat-Lightness)
                const hue = i * 3; 
                ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;

                // 막대 그리기 (중앙 기준 대칭)
                const y = canvas.height - barHeight;
                ctx.fillRect(x, y, barWidth, barHeight);

                x += barWidth + 1;
            }
        }
    </script>
</body>
</html>
