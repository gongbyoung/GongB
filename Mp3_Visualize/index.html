<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mp3 Visualizer Study Control Tower</title>
  
  <!-- 코어 라이브러리 로드 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <!-- css 폴더 안의 style.css 정확하게 로딩 -->
  <link rel="stylesheet" href="css/style.css">

  <style>
    /* 오리지널 기본 레이아웃 및 스케치 2열 그리드 사양 박제 */
    body {
      margin: 0;
      padding: 0;
      background-color: #05070c;
      color: #fff;
      font-family: sans-serif;
    }
    
    .main-layout {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .left-sidebar {
      width: 300px;
      height: 100vh;
      background-color: #0c0f17;
      border-right: 1px solid #1e293b;
      padding: 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    .center-canvas-zone {
      flex: 1;
      height: 100vh;
      position: relative;
    }

    .right-sidebar {
      width: 350px;
      height: 100vh;
      background-color: #0c0f17;
      border-left: 1px solid #1e293b;
      padding: 20px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    /* 스케치 리스트 영역 2열 바둑판 그리드 정렬 */
    .sketches-list-wrapper {
      display: grid !important;
      grid-template-columns: 1fr 1fr !important;
      grid-gap: 6px !important;
      margin-top: 10px;
      margin-bottom: 20px;
    }

    .sketch-btn {
      width: 100%;
      height: 38px;
      background-color: #1e293b;
      border: 1px solid #334155;
      border-radius: 4px;
      color: #cbd5e1;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.2s;
    }

    .sketch-btn:hover, .sketch-btn.active {
      background-color: #00ffcc;
      border-color: #00ffcc;
      color: #0f172a;
      font-weight: bold;
    }

    .control-group {
      margin-bottom: 15px;
      background-color: rgba(30, 41, 59, 0.2);
      padding: 10px;
      border-radius: 6px;
      border: 1px solid rgba(51, 65, 85, 0.3);
    }
    .control-group label {
      display: block;
      font-size: 12px;
      color: #00ffcc;
      margin-bottom: 5px;
      font-weight: bold;
    }
    
    /* 파일 파일 로더 전용 폰트 셋 */
    .file-input-wrapper {
      margin-bottom: 8px;
    }
    .file-input-wrapper span {
      display: inline-block;
      width: 75px;
      font-size: 11px;
      color: #94a3b8;
    }
    .file-input-wrapper input[type="file"] {
      font-size: 11px;
      color: #cbd5e1;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .slider-row input[type="range"] {
      flex: 1;
    }
    .slider-row input[type="number"] {
      width: 50px;
      background: #0f172a;
      border: 1px solid #334155;
      color: #fff;
      text-align: center;
      border-radius: 4px;
    }
    .offset-row {
      display: flex;
      gap: 5px;
    }
    .offset-unit {
      flex: 1;
      display: flex;
      align-items: center;
      background: #0f172a;
      border: 1px solid #334155;
      padding: 2px 5px;
      border-radius: 4px;
    }
    .offset-unit span { color: #00ffcc; font-size: 10px; margin-right: 3px; }
    .offset-unit input { width: 100%; background: transparent; border: none; color: #fff; text-align: center; }
    
    select, button.action-mini-btn, button.action-master-btn {
      width: 100%;
      height: 32px;
      background: #0f172a;
      border: 1px solid #334155;
      color: #fff;
      border-radius: 4px;
      padding: 0 5px;
      font-size: 11.5px;
    }
    
    /* 프리셋 전용 미니 버튼 레이아웃 */
    .preset-btn-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }
    button.action-mini-btn {
      background: #1e293b;
      cursor: pointer;
      font-size: 11px;
    }
    button.action-mini-btn:hover { background: #334155; }

    button.action-master-btn {
      margin-top: 5px;
      background: #0284c7;
      font-weight: bold;
      cursor: pointer;
    }
    button.action-master-btn:hover { background: #0369a1; }
    
    .record-master-btn {
      width: 100%;
      height: 38px;
      background: #e11d48;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      font-size: 13px;
      box-shadow: 0 4px 12px rgba(225, 29, 72, 0.25);
    }
    .record-master-btn:hover { background: #f43f5e; }
  </style>
</head>
<body>

  <div class="main-layout">
    
    <!-- 1️⃣ 왼쪽 사이드바: 2열 그리드 스케치 리스트 및 미디어 리소스 로더 -->
    <div class="left-sidebar">
      <!-- 💡 [복구완료]: 외부 확장 미디어 리소스 통합 로더 섹션 -->
      <h3 style="margin-top:0; font-size:13px; color:#8fa0b5; margin-bottom: 10px;">🎵 Media Resources</h3>
      <div class="control-group" style="margin-bottom:15px; padding: 8px;">
        <div class="file-input-wrapper">
          <span>🔊 MP3 오디오:</span>
          <input type="file" id="upload-mp3-file" accept="audio/*">
        </div>
        <div class="file-input-wrapper">
          <span>📝 SRT 자막:</span>
          <input type="file" id="upload-srt-file" accept=".srt">
        </div>
        <div class="file-input-wrapper">
          <span>🖼️ 배경 이미지:</span>
          <input type="file" id="upload-bg-image" accept="image/*">
        </div>
      </div>

      <h3 style="margin-top:0; font-size:13px; color:#8fa0b5; margin-bottom: 5px;">📂 Sketches</h3>
      <div class="sketches-list-wrapper">
        <button class="sketch-btn active" data-id="001">001 파형</button>
        <button class="sketch-btn" data-id="002">002 큐브</button>
        <button class="sketch-btn" data-id="003">003 노이즈</button>
        <button class="sketch-btn" data-id="004">004 타이포</button>
        <button class="sketch-btn" data-id="005">005 그리드</button>
        <button class="sketch-btn" data-id="006">006 메이커</button>
        <button class="sketch-btn" data-id="007">007 성운</button>
        <button class="sketch-btn" data-id="008">008 진자</button>
        <button class="sketch-btn" data-id="009">009 불꽃</button>
        <button class="sketch-btn" data-id="010">010 데이터</button>
        <button class="sketch-btn" data-id="011">011 물보라</button>
        <button class="sketch-btn" data-id="012">012 레이어</button>
        <button class="sketch-btn" data-id="013">013 유성우</button>
        <button class="sketch-btn" data-id="014">014 오르브</button>
        <button class="sketch-btn" data-id="015">015 유체</button>
        <button class="sketch-btn" data-id="020">020 자막</button>
      </div>

      <div style="margin-top:auto;">
        <audio id="main-audio-element" controls src="ambient_meditation.mp3"></audio>
      </div>
    </div>

    <!-- 2️⃣ 중앙 영역: 메인 미디어 아트 디스플레이 컨테이너 -->
    <div class="center-canvas-zone">
      <div id="canvas-container" style="width:100%; height:100%;"></div>
    </div>

    <!-- 3️⃣ 오른쪽 사이드바: 7대 관제탑 및 프리셋, 비디오 세이브 익스포트 연동단 -->
    <div class="right-sidebar">
      <h3 style="margin-top:0; font-size:14px; color:#00ffcc; border-left:3px solid #00ffcc; padding-left:5px;">Cosmic Studio Tuning</h3>
      
      <div class="control-group">
        <label>Shuffle</label>
        <div class="slider-row">
          <input type="range" id="num-cosmic-seed" min="1" max="500" value="42">
          <input type="number" id="val-cosmic-seed" value="42" readonly>
        </div>
      </div>

      <div class="control-group">
        <label>Range</label>
        <div class="slider-row">
          <input type="range" id="num-cosmic-scatter" min="5" max="50" value="22">
          <input type="number" id="val-cosmic-scatter" value="22" readonly>
        </div>
      </div>

      <div class="control-group">
        <label>Scale</label>
        <div class="slider-row">
          <input type="range" id="num-cosmic-glow" min="10" max="250" value="85">
          <input type="number" id="val-cosmic-glow" value="85" readonly>
        </div>
      </div>

      <div class="control-group">
        <label>Volume</label>
        <div class="slider-row">
          <input type="range" id="num-cosmic-gain" min="10" max="500" value="100">
          <input type="number" id="val-cosmic-gain" value="100" readonly>
        </div>
      </div>

      <div class="control-group">
        <label>Gauge</label>
        <div class="slider-row">
          <input type="range" id="num-cosmic-gauge" min="0" max="100" value="50">
          <input type="number" id="val-cosmic-gauge" value="50" readonly>
        </div>
      </div>

      <div class="control-group">
        <label>Color Style Palette</label>
        <select id="select-cosmic-color">
          <option value="monochrome" selected>No1 : 차분한 모스그린 힐링 톤</option>
          <option value="neon">No2 : 따뜻한 샌드베이지 아날로그 톤</option>
          <option value="pastel">No3 : 은은한 대지 / 새벽녘 라벤더 톤</option>
          <option value="custom">No4 : 커스텀 수혈 칼라 파이프라인</option>
          <option value="random">No5 : 올 랜덤 아날로그 오로라 시프팅</option>
        </select>
      </div>

      <div class="control-group">
        <label>3D Position Offset (X, Y, Z)</label>
        <div class="offset-row">
          <div class="offset-unit"><span>X</span><input type="number" id="pos-offset-x" value="0"></div>
          <div class="offset-unit"><span>Y</span><input type="number" id="pos-offset-y" value="0"></div>
          <div class="offset-unit"><span>Z</span><input type="number" id="pos-offset-z" value="0"></div>
        </div>
      </div>

      <!-- 💡 [복구완료]: 브라우저 로컬 저장소 스토리지 Preset Save / Load 장치 인터페이스 -->
      <h3 style="font-size:12px; color:#8fa0b5; margin-bottom: 6px;">💾 Preset Save & Load</h3>
      <div class="control-group" style="padding: 8px;">
        <div class="preset-btn-row">
          <button class="action-mini-btn" id="btn-preset-save">📂 디바이스 저장</button>
          <button class="action-mini-btn" id="btn-preset-load">📁 프리셋 불러오기</button>
        </div>
        <button class="action-master-btn" id="btn-master-reset">현재 수치 즉시 적용 (RESET)</button>
      </div>

      <!-- 💡 [복구완료]: MP4 녹화 저장 스트림 파이프라인 엔진 트리거 -->
      <h3 style="font-size:12px; color:#8fa0b5; margin-bottom: 2px;">📹 Export Setting</h3>
      <button class="record-master-btn" id="btn-video-record">🔴 녹화 시작 (Record)</button>
    </div>

  </div>

  <!-- 데이터 바인딩 락인 및 확장 이벤트 리스너 통합 복구 -->
  <script>
    window.cosmicEngineSettings = {
      seed: 42,
      scatterExponent: 22,
      glowIntensity: 85,
      audioGain: 100,
      gaugeValue: 50,
      colorStyle: 'monochrome',
      customColors: { gas1: '#ff0055', gas2: '#00ffcc', star: '#ffffff' },
      positionOffset: { x: 0, y: 0, z: 0 }
    };

    const binder = (sliderId, textId, key) => {
      const slider = document.getElementById(sliderId);
      const text = document.getElementById(textId);
      if(!slider || !text) return;

      slider.addEventListener('input', (e) => {
        text.value = e.target.value;
        window.cosmicEngineSettings[key] = parseFloat(e.target.value);
      });
    };

    binder('num-cosmic-seed', 'val-cosmic-seed', 'seed');
    binder('num-cosmic-scatter', 'val-cosmic-scatter', 'scatterExponent');
    binder('num-cosmic-glow', 'val-cosmic-glow', 'glowIntensity');
    binder('num-cosmic-gain', 'val-cosmic-gain', 'audioGain');
    binder('num-cosmic-gauge', 'val-cosmic-gauge', 'gaugeValue');

    const colorStyleSelect = document.getElementById('select-cosmic-color');
    if (colorStyleSelect) {
      colorStyleSelect.addEventListener('change', (e) => {
        window.cosmicEngineSettings.colorStyle = e.target.value;
      });
    }

    const bindOffset = (id, key) => {
      const el = document.getElementById(id);
      if(el) {
        el.addEventListener('input', (e) => {
          window.cosmicEngineSettings.positionOffset[key] = parseFloat(e.target.value) || 0;
        });
      }
    };
    bindOffset('pos-offset-x', 'x');
    bindOffset('pos-offset-y', 'y');
    bindOffset('pos-offset-z', 'z');
  </script>
</body>
</html>
