<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM — Music Player</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#07070f;
  --panel:#0d0d1e;
  --panel2:#111128;
  --border:rgba(80,80,180,0.2);
  --border2:rgba(100,100,220,0.4);
  --accent:#5555ff;
  --accent2:#8888ff;
  --text:#c8c8ff;
  --muted:#44447a;
  --muted2:#6666aa;
  --active-bg:rgba(85,85,255,0.15);
  --hover-bg:rgba(80,80,180,0.1);
  --red:#ff4466;
  --green:#44ffaa;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Courier New',monospace;
  min-height:100vh;
  display:grid;
  grid-template-rows:auto 1fr auto;
  grid-template-columns:1fr;
  overflow:hidden;
  height:100vh;
}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;gap:16px;
  padding:14px 20px;
  border-bottom:1px solid var(--border);
  background:var(--panel);
  flex-shrink:0;
}
.logo{font-size:16px;letter-spacing:6px;color:var(--accent2);font-weight:300;}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center;}

/* ── MAIN LAYOUT ── */
.main{
  display:grid;
  grid-template-columns:320px 1fr;
  overflow:hidden;
  min-height:0;
}

/* ── LEFT PANEL ── */
.left-panel{
  display:flex;flex-direction:column;
  border-right:1px solid var(--border);
  overflow:hidden;
  background:var(--panel);
}

/* playlist header */
.panel-head{
  padding:14px 16px 10px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
}
.panel-title{font-size:10px;letter-spacing:4px;color:var(--muted2);text-transform:uppercase;flex:1;}

/* drop zone */
.drop-zone{
  margin:12px;
  border:1px dashed var(--muted);
  border-radius:10px;
  padding:14px 12px;
  text-align:center;
  cursor:pointer;
  transition:all .25s;
  flex-shrink:0;
}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:rgba(85,85,255,.08);}
.drop-zone .dz-icon{font-size:18px;margin-bottom:4px;}
.drop-zone .dz-text{font-size:11px;color:var(--muted2);letter-spacing:1px;}
#fileInput{display:none;}

/* playlist controls */
.playlist-controls{
  display:flex;align-items:center;gap:6px;
  padding:8px 12px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.pill-btn{
  background:transparent;
  border:1px solid var(--border);
  border-radius:20px;
  color:var(--muted2);
  padding:4px 12px;
  font-family:'Courier New',monospace;
  font-size:10px;letter-spacing:1px;
  cursor:pointer;transition:all .2s;
  white-space:nowrap;
}
.pill-btn:hover{border-color:var(--accent2);color:var(--text);}
.pill-btn.active{border-color:var(--accent);color:var(--accent2);background:var(--active-bg);}
.count-badge{
  margin-left:auto;font-size:10px;color:var(--muted);letter-spacing:1px;
}

/* playlist */
.playlist{
  flex:1;overflow-y:auto;
  padding:4px 0;
}
.playlist::-webkit-scrollbar{width:4px;}
.playlist::-webkit-scrollbar-track{background:transparent;}
.playlist::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px;}

.pl-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;
  cursor:pointer;
  transition:background .15s;
  border-radius:0;
  position:relative;
}
.pl-item:hover{background:var(--hover-bg);}
.pl-item.active{background:var(--active-bg);}
.pl-item.active .pl-title{color:#e0e0ff;}

.pl-num{
  font-size:10px;color:var(--muted);
  min-width:20px;text-align:right;flex-shrink:0;
}
.pl-item.active .pl-num{display:none;}
.pl-playing-icon{
  display:none;width:20px;flex-shrink:0;text-align:right;
  font-size:10px;color:var(--accent2);
}
.pl-item.active .pl-playing-icon{display:block;}

.pl-info{flex:1;min-width:0;}
.pl-title{
  font-size:12px;color:var(--text);letter-spacing:.5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.pl-dur{font-size:10px;color:var(--muted);margin-top:2px;}

.pl-remove{
  opacity:0;background:none;border:none;color:var(--muted2);
  cursor:pointer;font-size:14px;padding:2px 4px;
  transition:opacity .15s,color .15s;flex-shrink:0;
}
.pl-item:hover .pl-remove{opacity:1;}
.pl-remove:hover{color:var(--red);}

/* ── RIGHT PANEL ── */
.right-panel{
  display:flex;flex-direction:column;
  overflow:hidden;
  background:var(--bg);
}

/* now playing */
.now-playing{
  padding:16px 20px 12px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.np-label{font-size:9px;letter-spacing:5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.np-title{font-size:18px;font-weight:300;letter-spacing:2px;color:#e0e0ff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.np-sub{font-size:11px;color:var(--muted2);}

/* progress */
.progress-wrap{
  height:4px;background:var(--panel);cursor:pointer;flex-shrink:0;
  position:relative;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  width:0%;transition:width .1s;
  position:relative;
}
.progress-fill::after{
  content:'';position:absolute;right:-4px;top:-4px;
  width:10px;height:10px;border-radius:50%;
  background:var(--accent2);opacity:0;transition:opacity .2s;
}
.progress-wrap:hover .progress-fill::after{opacity:1;}

/* main controls */
.controls{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:14px 20px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.ctrl-btn{
  background:transparent;border:1px solid var(--border);
  border-radius:8px;color:var(--muted2);
  padding:8px 14px;
  font-family:'Courier New',monospace;font-size:11px;letter-spacing:1px;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.ctrl-btn:hover{border-color:var(--accent2);color:var(--text);}
.ctrl-btn.active{border-color:var(--accent);color:var(--accent2);background:var(--active-bg);}
.ctrl-btn.primary{
  background:var(--accent);border-color:var(--accent);color:#fff;
  padding:10px 28px;font-size:13px;
}
.ctrl-btn.primary:hover{background:var(--accent2);border-color:var(--accent2);}

.time-display{
  font-size:11px;color:var(--muted);letter-spacing:1px;
  padding:0 8px;white-space:nowrap;
}

/* vol row */
.vol-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 20px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.vol-label{font-size:10px;color:var(--muted);letter-spacing:3px;}
input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer;height:3px;}
.vol-val{font-size:10px;color:var(--muted);min-width:32px;text-align:right;}

/* viz section */
.viz-section{
  flex:1;overflow:hidden;display:flex;flex-direction:column;
  min-height:0;
}
.viz-section-head{
  padding:12px 16px 8px;
  font-size:9px;letter-spacing:5px;color:var(--muted);text-transform:uppercase;
  border-bottom:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;gap:12px;
}
.viz-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  padding:10px;
  overflow-y:auto;
}
.viz-grid::-webkit-scrollbar{width:3px;}
.viz-grid::-webkit-scrollbar-thumb{background:var(--muted);}

.viz-card{
  border:1px solid var(--border);
  border-radius:8px;overflow:hidden;
  cursor:pointer;transition:all .2s;
  position:relative;
}
.viz-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.viz-card.selected{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
.viz-card canvas{display:block;width:100%;aspect-ratio:16/9;}
.viz-card-label{
  padding:4px 6px;
  font-size:9px;letter-spacing:2px;color:var(--muted2);
  background:var(--panel);
  border-top:1px solid var(--border);
}
.viz-card.selected .viz-card-label{color:var(--accent2);}
.viz-sel-badge{
  display:none;position:absolute;top:4px;right:4px;
  background:var(--accent);color:#fff;
  font-size:8px;letter-spacing:1px;padding:2px 6px;border-radius:3px;
}
.viz-card.selected .viz-sel-badge{display:block;}

.launch-viz-btn{
  margin-left:auto;
  background:transparent;border:1px solid var(--border);
  border-radius:6px;color:var(--muted2);
  padding:4px 12px;font-family:'Courier New',monospace;
  font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .2s;
}
.launch-viz-btn:hover{border-color:var(--accent2);color:var(--text);}
.launch-viz-btn:disabled{opacity:.3;cursor:default;}

/* ── BOTTOM BAR ── */
.bottombar{
  padding:10px 20px;
  border-top:1px solid var(--border);
  background:var(--panel);
  display:flex;align-items:center;gap:16px;
  flex-shrink:0;font-size:10px;color:var(--muted);letter-spacing:1px;
}
.status-dot{
  width:6px;height:6px;border-radius:50%;background:var(--muted);
  flex-shrink:0;transition:background .3s;
}
.status-dot.playing{background:var(--green);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ── FULLSCREEN VIZ OVERLAY ── */
#vizOverlay{
  display:none;position:fixed;inset:0;z-index:999;
  flex-direction:column;background:#000;
}
#vizOverlay.active{display:flex;}
#vizCanvas{flex:1;display:block;width:100%;min-height:0;}

#vizOverlayBar{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;
  background:rgba(7,7,15,.95);
  border-top:1px solid var(--border);
  flex-shrink:0;
  backdrop-filter:blur(8px);
}
.ov-progress{
  flex:1;height:3px;background:rgba(255,255,255,.1);
  border-radius:2px;cursor:pointer;position:relative;
}
.ov-progress-fill{
  height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:2px;width:0%;transition:width .1s;
}
.ov-title{font-size:10px;color:var(--muted2);letter-spacing:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.ov-time{font-size:10px;color:var(--muted);white-space:nowrap;}
.ov-btn{
  background:rgba(30,30,80,.8);border:1px solid var(--border);
  border-radius:5px;color:var(--muted2);
  padding:5px 12px;font-family:'Courier New',monospace;
  font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .2s;
  white-space:nowrap;
}
.ov-btn:hover{border-color:var(--accent2);color:var(--text);}
.ov-mode-badge{
  font-size:9px;letter-spacing:2px;color:var(--muted);
  padding:4px 8px;border:1px solid var(--border);border-radius:4px;
  white-space:nowrap;
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">SPECTRUM</div>
  <div class="topbar-right">
    <span style="font-size:10px;color:var(--muted);letter-spacing:2px;">MUSIC PLAYER + VISUALIZER</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LEFT: PLAYLIST -->
  <div class="left-panel">
    <div class="panel-head">
      <span class="panel-title">Playlist</span>
    </div>

    <div class="drop-zone" id="dz">
      <div class="dz-icon">♫</div>
      <div class="dz-text">MP3 파일 여러 개 드래그 또는 클릭</div>
    </div>
    <input type="file" id="fileInput" accept="audio/*" multiple>

    <div class="playlist-controls">
      <button class="pill-btn active" id="btnSeq" onclick="setPlayMode('seq')">순차</button>
      <button class="pill-btn" id="btnRand" onclick="setPlayMode('rand')">랜덤</button>
      <button class="pill-btn" id="btnRepeat" onclick="toggleRepeat()">반복</button>
      <span class="count-badge" id="countBadge">0 곡</span>
    </div>

    <div class="playlist" id="playlist">
      <div style="padding:24px 16px;text-align:center;color:var(--muted);font-size:11px;letter-spacing:1px;">
        곡을 추가해 주세요
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">

    <!-- NOW PLAYING -->
    <div class="now-playing">
      <div class="np-label">Now Playing</div>
      <div class="np-title" id="npTitle">—</div>
      <div class="np-sub" id="npSub">파일을 추가하고 재생을 시작하세요</div>
    </div>

    <!-- PROGRESS -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      <button class="ctrl-btn" id="btnPrev" onclick="prevTrack()">⏮ PREV</button>
      <button class="ctrl-btn primary" id="btnPlay" onclick="togglePlay()">▶ PLAY</button>
      <button class="ctrl-btn" id="btnNext" onclick="nextTrack()">NEXT ⏭</button>
      <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
    </div>

    <!-- VOL -->
    <div class="vol-row">
      <span class="vol-label">VOL</span>
      <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8">
      <span class="vol-val" id="volVal">80%</span>
    </div>

    <!-- VIZ SECTION -->
    <div class="viz-section">
      <div class="viz-section-head">
        <span>Visualizer</span>
        <button class="launch-viz-btn" id="launchVizBtn" onclick="openVizOverlay()" disabled>전체화면 ↗</button>
      </div>
      <div class="viz-grid" id="vizGrid"></div>
    </div>

  </div>
</div>

<!-- BOTTOM STATUS BAR -->
<div class="bottombar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">대기 중</span>
  <span style="margin-left:auto;" id="modeStatus">순차 재생</span>
</div>

<!-- FULLSCREEN VIZ OVERLAY -->
<div id="vizOverlay">
  <canvas id="vizCanvas"></canvas>
  <div id="vizOverlayBar">
    <div class="ov-title" id="ovTitle">—</div>
    <div class="ov-progress" id="ovProgress">
      <div class="ov-progress-fill" id="ovProgressFill"></div>
    </div>
    <div class="ov-time" id="ovTime">0:00 / 0:00</div>
    <div class="ov-mode-badge" id="ovModeBadge">순차</div>
    <button class="ov-btn" id="ovPrevBtn" onclick="prevTrack()">⏮</button>
    <button class="ov-btn" id="ovPlayBtn" onclick="togglePlay()">⏸</button>
    <button class="ov-btn" id="ovNextBtn" onclick="nextTrack()">⏭</button>
    <button class="ov-btn" onclick="closeVizOverlay()">✕ 닫기</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  VISUALIZER DEFINITIONS
// ═══════════════════════════════════════════════
const VIZS = [
  { id:'dna',       num:'01', name:'DNA Helix',       bg:'#030308', draw:drawDNA       },
  { id:'nebula',    num:'02', name:'Galaxy Nebula',   bg:'#020206', draw:drawNebula    },
  { id:'mandala',   num:'03', name:'Mandala',         bg:'#040206', draw:drawMandala   },
  { id:'web',       num:'04', name:'Electric Web',    bg:'#010108', draw:drawWeb       },
  { id:'vortex',    num:'05', name:'Vortex Tunnel',   bg:'#020104', draw:drawVortex    },
  { id:'aurora',    num:'06', name:'Aurora Rings',    bg:'#010306', draw:drawAurora    },
  { id:'fire',      num:'07', name:'Fire Ring',       bg:'#080200', draw:drawFire      },
  { id:'ocean',     num:'08', name:'Ocean Wave',      bg:'#000510', draw:drawOcean     },
  { id:'crystal',   num:'09', name:'Crystal Shards',  bg:'#010108', draw:drawCrystal   },
  { id:'starfield', num:'10', name:'Starfield',       bg:'#010106', draw:drawStarfield },
  { id:'lissajous', num:'11', name:'Lissajous',       bg:'#040002', draw:drawLissajous },
  { id:'ripple',    num:'12', name:'Ripple Rings',    bg:'#000308', draw:drawRipple    },
  { id:'flower',    num:'13', name:'Petal Bloom',     bg:'#050002', draw:drawFlower    },
  { id:'matrix',    num:'14', name:'Matrix Rain',     bg:'#000500', draw:drawMatrix    },
  { id:'plasma',    num:'15', name:'Plasma Field',    bg:'#020008', draw:drawPlasma    },
  { id:'snake',     num:'16', name:'Neon Snake',      bg:'#000802', draw:drawSnake     },
  { id:'radar',     num:'17', name:'Radar Sweep',     bg:'#000804', draw:drawRadar     },
  { id:'geo',       num:'18', name:'Geo Pulse',       bg:'#040400', draw:drawGeo       },
  { id:'tentacle',  num:'19', name:'Tentacles',       bg:'#030008', draw:drawTentacle  },
  { id:'mirror',    num:'20', name:'Mirror Scope',    bg:'#080004', draw:drawMirror    },
  { id:'bubble',    num:'21', name:'Bubble Surge',    bg:'#000408', draw:drawBubble    },
  { id:'ribbon',    num:'22', name:'Silk Ribbon',     bg:'#020500', draw:drawRibbon    },
  { id:'nova',      num:'23', name:'Supernova',       bg:'#050000', draw:drawNova      },
  { id:'grid',      num:'24', name:'Grid Pulse',      bg:'#010108', draw:drawGrid      },
  { id:'helix3d',   num:'25', name:'Helix 3D',        bg:'#000408', draw:drawHelix3D   },
  { id:'storm',     num:'26', name:'Lightning Storm', bg:'#010204', draw:drawStorm     },
  { id:'kaleid',    num:'27', name:'Kaleidoscope',    bg:'#040004', draw:drawKaleid    },
  { id:'comet',     num:'28', name:'Comet Trail',     bg:'#010108', draw:drawComet     },
  { id:'warp',      num:'29', name:'Warp Speed',      bg:'#000010', draw:drawWarp      },
  { id:'atomic',    num:'30', name:'Atomic Orbit',    bg:'#000804', draw:drawAtomic    },
];

// ═══════════════════════════════════════════════
//  AUDIO ENGINE
// ═══════════════════════════════════════════════
let audioCtx, analyser, gainNode, source;
let audioBuffer = null, isPlaying = false;
let startTime = 0, pauseOffset = 0, duration = 0;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  gainNode = audioCtx.createGain();
  gainNode.gain.value = 0.8;
  analyser.connect(gainNode);
  gainNode.connect(audioCtx.destination);
}

function loadAndPlay(idx) {
  const track = playlist[idx];
  if (!track) return;
  currentIdx = idx;
  initAudio();
  if (source) { try { source.stop(); source.disconnect(); } catch(e){} }
  isPlaying = false;
  pauseOffset = 0;

  // decode
  const reader = new FileReader();
  reader.onload = e => {
    audioCtx.decodeAudioData(e.target.result, buf => {
      audioBuffer = buf;
      duration = buf.duration;
      pauseOffset = 0;
      track.duration = buf.duration;
      updatePlaylistUI();
      updateNowPlaying();
      playAudio();
    });
  };
  reader.readAsArrayBuffer(track.file);
}

function playAudio() {
  if (!audioBuffer) return;
  if (source) { try { source.stop(); source.disconnect(); } catch(e){} }
  source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(analyser);
  source.start(0, pauseOffset);
  startTime = audioCtx.currentTime - pauseOffset;
  isPlaying = true;
  updatePlayBtns();
  setStatusPlaying(true);
  source.onended = () => {
    if (!isPlaying) return;
    isPlaying = false;
    onTrackEnded();
  };
}

function togglePlay() {
  if (!audioCtx && playlist.length === 0) return;
  if (!audioBuffer && playlist.length > 0) { loadAndPlay(currentIdx >= 0 ? currentIdx : 0); return; }
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (isPlaying) {
    pauseOffset = audioCtx.currentTime - startTime;
    source.stop(); isPlaying = false;
    setStatusPlaying(false);
  } else {
    playAudio();
  }
  updatePlayBtns();
}

function onTrackEnded() {
  setStatusPlaying(false);
  if (repeatMode) {
    pauseOffset = 0;
    loadAndPlay(currentIdx);
  } else {
    nextTrack(true);
  }
}

function getFreqData() {
  const d = new Uint8Array(analyser ? analyser.frequencyBinCount : 512);
  if (analyser) analyser.getByteFrequencyData(d);
  return d;
}
function getTimeData() {
  const d = new Uint8Array(analyser ? analyser.frequencyBinCount : 512);
  if (analyser) analyser.getByteTimeDomainData(d);
  return d;
}

// ═══════════════════════════════════════════════
//  PLAYLIST
// ═══════════════════════════════════════════════
let playlist = [];
let currentIdx = -1;
let playMode = 'seq'; // 'seq' | 'rand'
let repeatMode = false;
let shuffleOrder = [];

function addFiles(files) {
  const arr = Array.from(files).filter(f => f.type.startsWith('audio/') || /\.(mp3|wav|ogg|flac|aac|m4a)$/i.test(f.name));
  if (!arr.length) return;
  arr.forEach(f => {
    playlist.push({ file: f, name: f.name.replace(/\.[^.]+$/, ''), duration: null });
  });
  buildShuffleOrder();
  updatePlaylistUI();
  document.getElementById('launchVizBtn').disabled = false;
  if (currentIdx < 0) { currentIdx = 0; }
}

function buildShuffleOrder() {
  shuffleOrder = Array.from({length: playlist.length}, (_, i) => i);
  for (let i = shuffleOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffleOrder[i], shuffleOrder[j]] = [shuffleOrder[j], shuffleOrder[i]];
  }
}

function setPlayMode(m) {
  playMode = m;
  document.getElementById('btnSeq').classList.toggle('active', m === 'seq');
  document.getElementById('btnRand').classList.toggle('active', m === 'rand');
  if (m === 'rand') buildShuffleOrder();
  updateModeStatus();
}
function toggleRepeat() {
  repeatMode = !repeatMode;
  document.getElementById('btnRepeat').classList.toggle('active', repeatMode);
  updateModeStatus();
}
function updateModeStatus() {
  const mode = playMode === 'rand' ? '랜덤 재생' : '순차 재생';
  const rep = repeatMode ? ' · 반복' : '';
  document.getElementById('modeStatus').textContent = mode + rep;
  document.getElementById('ovModeBadge').textContent = mode + rep;
}

function getNextIdx(dir = 1) {
  if (playlist.length === 0) return -1;
  if (playlist.length === 1) return 0;
  if (playMode === 'rand') {
    // pick a random idx that isn't current
    let r;
    do { r = Math.floor(Math.random() * playlist.length); } while (r === currentIdx && playlist.length > 1);
    return r;
  }
  let next = currentIdx + dir;
  if (next >= playlist.length) next = 0;
  if (next < 0) next = playlist.length - 1;
  return next;
}

function nextTrack(auto = false) {
  if (playlist.length === 0) return;
  const next = getNextIdx(1);
  if (next < 0) return;
  loadAndPlay(next);
}
function prevTrack() {
  if (playlist.length === 0) return;
  // if more than 3s played, restart; else go prev
  const elapsed = isPlaying ? audioCtx.currentTime - startTime : pauseOffset;
  if (elapsed > 3) { pauseOffset = 0; playAudio(); return; }
  const prev = getNextIdx(-1);
  if (prev < 0) return;
  loadAndPlay(prev);
}

function removeTrack(idx) {
  playlist.splice(idx, 1);
  if (playlist.length === 0) {
    currentIdx = -1; audioBuffer = null; isPlaying = false;
    if (source) { try { source.stop(); } catch(e){} }
    updateNowPlaying(); setStatusPlaying(false);
    document.getElementById('launchVizBtn').disabled = true;
  } else {
    if (idx < currentIdx) currentIdx--;
    else if (idx === currentIdx) {
      if (currentIdx >= playlist.length) currentIdx = playlist.length - 1;
      loadAndPlay(currentIdx);
    }
  }
  buildShuffleOrder();
  updatePlaylistUI();
}

function formatTime(s) {
  if (!s || isNaN(s)) return '—';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function updatePlaylistUI() {
  const el = document.getElementById('playlist');
  document.getElementById('countBadge').textContent = playlist.length + ' 곡';
  if (playlist.length === 0) {
    el.innerHTML = '<div style="padding:24px 16px;text-align:center;color:var(--muted);font-size:11px;letter-spacing:1px;">곡을 추가해 주세요</div>';
    return;
  }
  el.innerHTML = playlist.map((t, i) => `
    <div class="pl-item${i === currentIdx ? ' active' : ''}" onclick="loadAndPlay(${i})">
      <span class="pl-num">${i + 1}</span>
      <span class="pl-playing-icon">▶</span>
      <div class="pl-info">
        <div class="pl-title">${escHtml(t.name)}</div>
        <div class="pl-dur">${t.duration ? formatTime(t.duration) : '...'}</div>
      </div>
      <button class="pl-remove" onclick="event.stopPropagation();removeTrack(${i})" title="삭제">✕</button>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateNowPlaying() {
  const track = playlist[currentIdx];
  if (!track) {
    document.getElementById('npTitle').textContent = '—';
    document.getElementById('npSub').textContent = '파일을 추가하고 재생을 시작하세요';
    document.getElementById('ovTitle').textContent = '—';
    return;
  }
  document.getElementById('npTitle').textContent = track.name;
  document.getElementById('npSub').textContent = (currentIdx + 1) + ' / ' + playlist.length + '  ·  ' + (track.duration ? formatTime(track.duration) : '...');
  document.getElementById('ovTitle').textContent = track.name;
}

function updatePlayBtns() {
  const label = isPlaying ? '⏸ PAUSE' : '▶ PLAY';
  document.getElementById('btnPlay').textContent = label;
  document.getElementById('ovPlayBtn').textContent = isPlaying ? '⏸' : '▶';
}

function setStatusPlaying(p) {
  document.getElementById('statusDot').classList.toggle('playing', p);
  const track = playlist[currentIdx];
  document.getElementById('statusText').textContent = p && track
    ? '재생 중: ' + track.name
    : (track ? '일시정지' : '대기 중');
}

// Progress
function updateProgress() {
  if (!isPlaying || !audioBuffer) return;
  const elapsed = Math.min(audioCtx.currentTime - startTime, duration);
  const pct = (elapsed / duration * 100).toFixed(1);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('ovProgressFill').style.width = pct + '%';
  const t = formatTime(elapsed) + ' / ' + formatTime(duration);
  document.getElementById('timeDisplay').textContent = t;
  document.getElementById('ovTime').textContent = t;
}

document.getElementById('progressWrap').addEventListener('click', e => {
  if (!audioBuffer) return;
  const r = e.currentTarget.getBoundingClientRect();
  pauseOffset = ((e.clientX - r.left) / r.width) * duration;
  if (isPlaying) playAudio();
  else document.getElementById('progressFill').style.width = (pauseOffset / duration * 100) + '%';
});
document.getElementById('ovProgress').addEventListener('click', e => {
  if (!audioBuffer) return;
  const r = e.currentTarget.getBoundingClientRect();
  pauseOffset = ((e.clientX - r.left) / r.width) * duration;
  if (isPlaying) playAudio();
});

document.getElementById('volSlider').addEventListener('input', e => {
  if (gainNode) gainNode.gain.value = e.target.value;
  document.getElementById('volVal').textContent = Math.round(e.target.value * 100) + '%';
});

// File input
document.getElementById('dz').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('dz').addEventListener('dragover', e => { e.preventDefault(); document.getElementById('dz').classList.add('drag-over'); });
document.getElementById('dz').addEventListener('dragleave', () => document.getElementById('dz').classList.remove('drag-over'));
document.getElementById('dz').addEventListener('drop', e => {
  e.preventDefault(); document.getElementById('dz').classList.remove('drag-over');
  addFiles(e.dataTransfer.files);
});
document.getElementById('fileInput').addEventListener('change', e => { addFiles(e.target.files); e.target.value = ''; });

// keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') nextTrack();
  if (e.code === 'ArrowLeft') prevTrack();
  if (e.code === 'Escape') closeVizOverlay();
});

const vizGrid = document.getElementById('vizGrid');
VIZS.forEach(viz => {

  card.className = 'viz-card' + (viz === selectedViz ? ' selected' : '');
  card.id = 'vc-' + viz.id;

  `;
  card.addEventListener('click', () => selectViz(viz));

});

function selectViz(viz) {
  document.querySelectorAll('.viz-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('vc-' + viz.id).classList.add('selected');
  selectedViz = viz;
  // if overlay is open, switch live
  if (document.getElementById('vizOverlay').classList.contains('active')) {
    overlayViz = viz;
    document.getElementById('vizCanvas').style.background = viz.bg;
  }
}

function startPreview(viz, canvas) {
  const ctx = canvas.getContext('2d');
  let t = Math.random() * 100;
  function tick() {
    requestAnimationFrame(tick);
    t += 0.025;
    const fakeFreq = new Uint8Array(256);
    for (let i = 0; i < 256; i++) {
      fakeFreq[i] = Math.max(0, Math.min(255,
        128 + Math.sin(t * 1.4 + i * 0.18) * 65
            + Math.sin(t * 3.3 + i * 0.06) * 38
            + (Math.random() - 0.5) * 15
      ));
    }
    const W = canvas.width, H = canvas.height;
    try {
      ctx.fillStyle = viz.bg + 'ee';
      ctx.fillRect(0, 0, W, H);
      viz.draw(ctx, W, H, t, fakeFreq, null);
    } catch(err) { /* isolate per-card errors */ }
  }
  tick();
}

// ═══════════════════════════════════════════════
const vizOverlay = document.getElementById('vizOverlay');
const vizCanvas = document.getElementById('vizCanvas');
const vizCtx = vizCanvas.getContext('2d');
let overlayAnimId = null;
let overlayT = 0;
let overlayViz = selectedViz;

function openVizOverlay() {
  overlayViz = selectedViz;
  vizOverlay.classList.add('active');
  vizCanvas.style.background = overlayViz.bg;
  resizeVizCanvas();
  window.addEventListener('resize', resizeVizCanvas);
  if (overlayAnimId) cancelAnimationFrame(overlayAnimId);
  overlayT = 0;
  function tick() {
    overlayAnimId = requestAnimationFrame(tick);
    overlayT += 0.012;
    const W = vizCanvas.width, H = vizCanvas.height;
    const freq = getFreqData();
    const time_ = getTimeData();
    vizCtx.fillStyle = overlayViz.bg + '40';
    vizCtx.fillRect(0, 0, W, H);
    overlayViz.draw(vizCtx, W, H, overlayT, freq, time_);
    updateProgress();
    updateNowPlaying();
    updatePlaylistUI();
  }
  tick();
}

function resizeVizCanvas() {
  const bar = document.getElementById('vizOverlayBar');
  vizCanvas.width = window.innerWidth;
  vizCanvas.height = window.innerHeight - bar.offsetHeight;
}

function closeVizOverlay() {
  vizOverlay.classList.remove('active');
  if (overlayAnimId) { cancelAnimationFrame(overlayAnimId); overlayAnimId = null; }
  window.removeEventListener('resize', resizeVizCanvas);
}

// Main RAF loop for progress
(function loop() { requestAnimationFrame(loop); updateProgress(); })();

function drawDNA(ctx,W,H,t,freq){try{
  const cx=W/2,cy=H/2,radius=Math.min(W,H)*0.3,strands=2,points=64;
  for(let s=0;s<strands;s++){
    const po=(s/strands)*Math.PI;
    for(let i=0;i<points;i++){
      const angle=(i/points)*Math.PI*2+t+po;
      const fi=Math.floor((i/points)*freq.length/2);
      const amp=(freq[fi]||0)/255;
      const r=radius*(0.5+amp*0.7);
      const x=cx+Math.cos(angle)*r,y=cy+Math.sin(angle)*r*0.4+Math.sin(angle*3+t)*radius*0.15;
      const hue=220+s*40+amp*60,sz=2+amp*6;
      ctx.beginPath();ctx.arc(x,y,sz,0,Math.PI*2);
      ctx.fillStyle=`hsla(${hue},80%,65%,${0.6+amp*0.4})`;ctx.fill();
      if(i>0){
        const pa=((i-1)/points)*Math.PI*2+t+po,pfi=Math.floor(((i-1)/points)*freq.length/2);
        const pa_amp=(freq[pfi]||0)/255,pr=radius*(0.5+pa_amp*0.7);
        const px=cx+Math.cos(pa)*pr,py=cy+Math.sin(pa)*pr*0.4+Math.sin(pa*3+t)*radius*0.15;
        ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(x,y);
        ctx.strokeStyle=`hsla(${hue},70%,55%,${0.3+amp*0.4})`;ctx.lineWidth=1;ctx.stroke();
      }
    }
    for(let i=0;i<points;i+=4){
      const a1=(i/points)*Math.PI*2+t,a2=a1+Math.PI;
      const fi=Math.floor((i/points)*freq.length/2),amp=(freq[fi]||0)/255;
      const r1=radius*(0.5+amp*0.7);
      const x1=cx+Math.cos(a1)*r1,y1=cy+Math.sin(a1)*r1*0.4+Math.sin(a1*3+t)*radius*0.15;
      const x2=cx+Math.cos(a2)*r1,y2=cy+Math.sin(a2)*r1*0.4+Math.sin(a2*3+t)*radius*0.15;
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
      ctx.strokeStyle=`rgba(180,180,255,${amp*0.3})`;ctx.lineWidth=0.5;ctx.stroke();
    }
  }
}catch(e){}}

const _nebP=Array.from({length:300},()=>({angle:Math.random()*Math.PI*2,radius:20+Math.random()*60,speed:(Math.random()-0.5)*0.02,size:Math.random()*2.5+0.5,hue:Math.random()*60+200}));
function drawNebula(ctx,W,H,t,freq){
  try{
    const cx=W/2,cy=H/2,flen=freq.length;
    let bass=0,mid=0;
    for(let i=0;i<Math.floor(flen/3);i++)bass+=freq[i]||0;
    bass=bass/Math.max(1,Math.floor(flen/3))/255;
    for(let i=Math.floor(flen/3);i<Math.floor(flen*2/3);i++)mid+=freq[i]||0;
    mid=mid/Math.max(1,Math.floor(flen/3))/255;
    const baseR=Math.min(W,H)*0.28;
    const outerR=Math.max(1,baseR*(0.5+bass*0.8));
    const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,outerR);
    grd.addColorStop(0,`rgba(100,80,255,${0.2+bass*0.4})`);
    grd.addColorStop(0.5,`rgba(40,20,180,${0.05+mid*0.1})`);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(cx,cy,outerR,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
    for(let i=0;i<128;i++){
      const angle=(i/128)*Math.PI*2-Math.PI/2;
      const fi=Math.min(Math.floor((i/128)*freq.length),freq.length-1);
      const amp=(freq[fi]||0)/255;
      const r2=baseR+amp*baseR*0.8,hue=200+i*1.2+t*30;
      ctx.beginPath();ctx.moveTo(cx+Math.cos(angle)*baseR,cy+Math.sin(angle)*baseR);
      ctx.lineTo(cx+Math.cos(angle)*r2,cy+Math.sin(angle)*r2);
      ctx.strokeStyle=`hsla(${hue},85%,65%,${0.5+amp*0.5})`;ctx.lineWidth=2.5;ctx.stroke();
    }
    _nebP.forEach(p=>{
      // keep angle in [0, 2π] to avoid fi going out of range
      p.angle=(p.angle+p.speed*(1+0.01))%(Math.PI*2);
      if(p.angle<0)p.angle+=Math.PI*2;
      const fi=Math.min(Math.floor((p.angle/(Math.PI*2))*freq.length),freq.length-1);
      const amp=(freq[fi]||0)/255;
      const baseOffset=baseR*(0.2+p.radius/80);
      const wave=amp*baseR*1.2*Math.sin(p.angle*3+t);
      const r=Math.max(1,baseOffset+wave);
      ctx.beginPath();ctx.arc(cx+Math.cos(p.angle)*r,cy+Math.sin(p.angle)*r,Math.max(0.5,p.size*(1+amp*2)),0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue+amp*40},90%,70%,${0.3+amp*0.7})`;ctx.fill();
    });
    const innerR=Math.max(1,baseR*0.15+bass*20);
    ctx.beginPath();ctx.arc(cx,cy,innerR,0,Math.PI*2);
    ctx.strokeStyle=`rgba(200,180,255,${0.4+bass*0.6})`;ctx.lineWidth=1.5;ctx.stroke();
  }catch(e){}
}

}catch(e){}}

function _ls(ctx,x1,y1,x2,y2,d,amp){if(d===0){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);return;}const mx=(x1+x2)/2+(Math.random()-0.5)*30*amp,my=(y1+y2)/2+(Math.random()-0.5)*30*amp;_ls(ctx,x1,y1,mx,my,d-1,amp*0.6);_ls(ctx,mx,my,x2,y2,d-1,amp*0.6);}

  const coreR=Math.max(1,15+bass*40),cg=ctx.createRadialGradient(cx,cy,0,cx,cy,coreR*3);cg.addColorStop(0,`rgba(100,255,255,${0.6+bass*0.4})`);cg.addColorStop(0.4,'rgba(0,100,255,0.3)');cg.addColorStop(1,'rgba(0,0,0,0)');ctx.beginPath();ctx.arc(cx,cy,coreR*3,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();ctx.beginPath();ctx.arc(cx,cy,coreR,0,Math.PI*2);ctx.fillStyle='rgba(200,255,255,0.9)';ctx.fill();
}catch(e){}}

function drawVortex(ctx,W,H,t,freq){try{
  const cx=W/2,cy=H/2;let bass=0,mid=0;for(let i=0;i<16;i++)bass+=(freq[i]||0);bass=bass/16/255;for(let i=16;i<80;i++)mid+=(freq[i]||0);mid=mid/64/255;

const _aR=Array.from({length:6},(_,i)=>({offset:(i/6)*Math.PI*2,phaseSpeed:0.003+i*0.0015,colorShift:i*40,thickness:8+i*4,ringScale:0.5+i*0.09}));

// ── 07 FIRE RING ──────────────────────────────
function drawFire(ctx,W,H,t,freq){try{

  let bass=0;for(let i=0;i<12;i++)bass+=(freq[i]||0);bass=bass/12/255;
  const pts=120;
  for(let layer=0;layer<3;layer++){
    ctx.beginPath();let first=true;
    for(let i=0;i<=pts;i++){
      const a=(i/pts)*Math.PI*2;
      const fi=Math.min(Math.floor((i/pts)*freq.length*0.7),freq.length-1);
      const amp=(freq[fi]||0)/255;
      const flicker=Math.sin(t*8+i*0.4+layer)*0.06;
      const r=baseR*(0.6+layer*0.15)+amp*baseR*(0.5-layer*0.1)+flicker*baseR;
      const x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;

    }
    ctx.closePath();

    ctx.lineWidth=3-layer;ctx.stroke();
    ctx.fillStyle=`hsla(${hue},100%,${40+layer*10}%,${Math.max(0,alpha)})`;ctx.fill();
  }

  for(let i=0;i<40;i++){
    const a=(i/40)*Math.PI*2+t*0.3;
    const fi=Math.min(Math.floor((i/40)*freq.length),freq.length-1);
    const amp=(freq[fi]||0)/255;
    const r=baseR*(0.9+amp*0.6+Math.sin(t*4+i)*0.1);
    const x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;

    ctx.beginPath();ctx.arc(x,y,sz,0,Math.PI*2);
    ctx.fillStyle=`hsla(${20+amp*60},100%,${70+amp*30}%,${0.4+amp*0.6})`;ctx.fill();
  }
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(1,baseR*0.4+bass*40));
  cg.addColorStop(0,`rgba(255,200,50,${0.5+bass*0.4})`);cg.addColorStop(1,'rgba(255,60,0,0)');
  ctx.beginPath();ctx.arc(cx,cy,Math.max(1,baseR*0.4+bass*40),0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();

// ── 08 OCEAN WAVE ─────────────────────────────
function drawOcean(ctx,W,H,t,freq){try{
  const cx=W/2,cy=H/2;
  let bass=0;for(let i=0;i<10;i++)bass+=(freq[i]||0);bass=bass/10/255;
  const layers=6;
  for(let l=0;l<layers;l++){
    const yBase=cy-60+l*30+Math.sin(t*0.5+l)*10;
    const depth=l/layers;
    ctx.beginPath();ctx.moveTo(0,yBase);
    for(let x=0;x<=W;x+=4){
      const fi=Math.min(Math.floor((x/W)*freq.length),freq.length-1);
      const amp=(freq[fi]||0)/255;
      const wave=Math.sin(x*0.015+t*2+l*0.8)*30*amp
                +Math.sin(x*0.008-t*1.3+l)*20*(bass+0.2)
                +Math.sin(x*0.03+t*3.5)*8*amp;
      ctx.lineTo(x,yBase+wave);
    }
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
    const hue=190+l*12;
    ctx.fillStyle=`hsla(${hue},80%,${30+depth*30}%,${0.12+depth*0.18})`;ctx.fill();
    ctx.strokeStyle=`hsla(${hue},90%,${60+depth*20}%,${0.3+depth*0.3})`;ctx.lineWidth=1.5;ctx.stroke();
  }
  // foam bubbles
  for(let i=0;i<20;i++){
    const bx=(Math.sin(t*0.7+i*1.3)*0.5+0.5)*W;
    const by=cy+Math.sin(t*1.2+i*0.9)*40-20;
    const fi=Math.min(Math.floor((bx/W)*freq.length),freq.length-1);
    const amp=(freq[fi]||0)/255;
    const r=Math.max(0.5,2+amp*8);
    ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(150,220,255,${0.3+amp*0.5})`;ctx.lineWidth=0.8;ctx.stroke();
  }
}catch(e){}}

// ── 09 CRYSTAL SHARDS ─────────────────────────
function drawCrystal(ctx,W,H,t,freq){try{

// ── 10 STARFIELD ──────────────────────────────
const _stars=Array.from({length:200},()=>({x:Math.random()*2-1,y:Math.random()*2-1,z:Math.random(),speed:0.002+Math.random()*0.005}));

// ── 11 LISSAJOUS ──────────────────────────────
function drawLissajous(ctx,W,H,t,freq){try{

  const fl=freq.length;
  for(let i=0;i<fl/3;i++)bass+=(freq[i]||0);bass=bass/(fl/3)/255;
  for(let i=Math.floor(fl/3);i<Math.floor(fl*2/3);i++)mid+=(freq[i]||0);mid=mid/(fl/3)/255;
  for(let i=Math.floor(fl*2/3);i<fl;i++)hi+=(freq[i]||0);hi=hi/(fl/3)/255;

      grad.addColorStop(1,`hsla(${320+mid*60},100%,70%,${0.6+hi*0.4})`);
      ctx.strokeStyle=grad;ctx.lineWidth=1.5;ctx.stroke();

// ── 12 RIPPLE RINGS ───────────────────────────
const _ripples=[];let _rippleTimer=0;
function drawRipple(ctx,W,H,t,freq){try{
  const cx=W/2,cy=H/2;
  let bass=0;for(let i=0;i<8;i++)bass+=(freq[i]||0);bass=bass/8/255;

  if(_ripples.length>30)_ripples.splice(0,_ripples.length-30);
  _ripples.forEach((rp,i)=>{
    rp.r+=3+bass*8;rp.alpha-=0.012;

    }

  // standing freq rings
  const rings=12;
  for(let r=0;r<rings;r++){

  }
}catch(e){}}

// ── 14 MATRIX RAIN ────────────────────────────

// ── 15 PLASMA FIELD ───────────────────────────
function drawPlasma(ctx,W,H,t,freq){try{
  const cx=W/2,cy=H/2;

  const step=12;
  for(let y=0;y<H;y+=step){
    for(let x=0;x<W;x+=step){
      const dx=(x-cx)/W,dy=(y-cy)/H;
      const fi=Math.min(Math.floor((Math.sqrt(dx*dx+dy*dy)*2)*freq.length),freq.length-1);
      const amp=(freq[fi]||0)/255;

}catch(e){}}

// ── 16 NEON SNAKE ─────────────────────────────
const _snakeSegs=Array.from({length:80},(_,i)=>({x:0,y:0,hue:180+i*2}));
let _snakeAngle=0;
function drawSnake(ctx,W,H,t,freq){try{
  const cx=W/2,cy=H/2;
  let bass=0;for(let i=0;i<10;i++)bass+=(freq[i]||0);bass=bass/10/255;
  let energy=0;for(let i=0;i<freq.length;i++)energy+=(freq[i]||0);energy=energy/freq.length/255;
  _snakeAngle+=0.05+energy*0.15;

  const headY=cy+Math.sin(_snakeAngle)*Math.min(W,H)*0.25*(0.5+bass*0.5);
  for(let i=_snakeSegs.length-1;i>0;i--){_snakeSegs[i].x=_snakeSegs[i-1].x;_snakeSegs[i].y=_snakeSegs[i-1].y;}
  _snakeSegs[0].x=headX;_snakeSegs[0].y=headY;
  for(let i=1;i<_snakeSegs.length;i++){
    const s=_snakeSegs[i],p=_snakeSegs[i-1];
    const fi=Math.min(Math.floor((i/_snakeSegs.length)*freq.length),freq.length-1);
    const amp=(freq[fi]||0)/255;
    const alpha=(1-i/_snakeSegs.length)*(0.5+amp*0.5);
    const size=Math.max(0.5,(1-i/_snakeSegs.length)*10*(1+amp*2));

    ctx.strokeStyle=`hsla(${s.hue+t*20},100%,60%,${alpha})`;ctx.lineWidth=size;ctx.stroke();
    ctx.beginPath();ctx.arc(s.x,s.y,size*0.4,0,Math.PI*2);
    ctx.fillStyle=`hsla(${s.hue+t*20},100%,80%,${alpha*0.8})`;ctx.fill();
  }
}catch(e){}}

// ── 17 RADAR SWEEP ────────────────────────────
const _radarBlips=[];
function drawRadar(ctx,W,H,t,freq){try{
  const cx=W/2,cy=H/2,R=Math.min(W,H)*0.42;
  let energy=0;for(let i=0;i<freq.length;i++)energy+=(freq[i]||0);energy=energy/freq.length/255;
  // rings
  for(let r=1;r<=4;r++){
    ctx.beginPath();ctx.arc(cx,cy,R*r/4,0,Math.PI*2);
    ctx.strokeStyle=`rgba(0,200,80,0.15)`;ctx.lineWidth=1;ctx.stroke();
  }
  ctx.beginPath();ctx.moveTo(cx-R,cy);ctx.lineTo(cx+R,cy);ctx.moveTo(cx,cy-R);ctx.lineTo(cx,cy+R);
  ctx.strokeStyle='rgba(0,200,80,0.1)';ctx.lineWidth=0.5;ctx.stroke();
  // sweep
  const sweepAngle=t*2;
  const grad=ctx.createConicalGradient?null:null;
  for(let a=0;a<60;a++){
    const ang=sweepAngle-a*(Math.PI/180)*3;
    const alpha=Math.max(0,(60-a)/60)*0.4*(0.5+energy*0.5);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(ang)*R,cy+Math.sin(ang)*R);
    ctx.strokeStyle=`rgba(0,255,80,${alpha})`;ctx.lineWidth=2;ctx.stroke();
  }
  // blips from freq
  for(let i=0;i<16;i++){
    const a=(i/16)*Math.PI*2;
    const fi=Math.min(Math.floor((i/16)*freq.length),freq.length-1);
    const amp=(freq[fi]||0)/255;
    if(amp>0.4){
      const r=R*(0.2+amp*0.7);
      _radarBlips.push({x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r,alpha:1,hue:120+amp*60});
    }
  }
  if(_radarBlips.length>60)_radarBlips.splice(0,_radarBlips.length-60);
  _radarBlips.forEach(b=>{
    b.alpha-=0.02;
    if(b.alpha>0){ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fillStyle=`hsla(${b.hue},100%,70%,${b.alpha})`;ctx.fill();}
  });
  for(let i=_radarBlips.length-1;i>=0;i--)if(_radarBlips[i].alpha<=0)_radarBlips.splice(i,1);
}catch(e){}}

// ── 18 GEO PULSE ──────────────────────────────
function drawGeo(ctx,W,H,t,freq){try{
  const cx=W/2,cy=H/2,R=Math.min(W,H)*0.38;
  let energy=0;for(let i=0;i<freq.length;i++)energy+=(freq[i]||0);energy=energy/freq.length/255;
  const shapes=[3,4,5,6,8];
  shapes.forEach((n,li)=>{
    const r=R*(0.2+li*0.2);
    const rot=t*(li%2===0?0.3:-0.2)+li*0.5;
    const fi=Math.min(Math.floor((li/shapes.length)*freq.length),freq.length-1);
    const amp=(freq[fi]||0)/255;
    const rr=r*(1+amp*0.3);
    ctx.beginPath();
    for(let i=0;i<=n;i++){const a=(i/n)*Math.PI*2+rot;i===0?ctx.moveTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr):ctx.lineTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr);}
    ctx.closePath();
    const hue=40+li*40+t*15;
    ctx.strokeStyle=`hsla(${hue},90%,65%,${0.5+amp*0.5})`;ctx.lineWidth=1.5+amp*2;ctx.stroke();
    ctx.fillStyle=`hsla(${hue},80%,50%,${0.04+amp*0.1})`;ctx.fill();
  });
}catch(e){}}

// ── 19 TENTACLES ──────────────────────────────
function drawTentacle(ctx,W,H,t,freq){try{
  const cx=W/2,cy=H/2,baseR=Math.min(W,H)*0.35;
  let bass=0;for(let i=0;i<8;i++)bass+=(freq[i]||0);bass=bass/8/255;
  const count=8;
  for(let ti=0;ti<count;ti++){
    const baseAngle=(ti/count)*Math.PI*2+t*0.2;
    const segs=20;
    ctx.beginPath();
    let px=cx,py=cy;
    for(let s=0;s<segs;s++){
      const progress=s/segs;
      const fi=Math.min(Math.floor(progress*freq.length),freq.length-1);
      const amp=(freq[fi]||0)/255;
      const wriggle=Math.sin(t*3+s*0.5+ti)*0.4*amp;
      const angle=baseAngle+wriggle+progress*Math.PI*0.8;
      const len=(baseR/segs)*(1-progress*0.4)*(0.6+amp*0.8);
      const nx=px+Math.cos(angle)*len,ny=py+Math.sin(angle)*len;
      s===0?ctx.moveTo(px,py):ctx.lineTo(nx,ny);
      px=nx;py=ny;
    }
    const hue=260+ti*15+t*10;
    ctx.strokeStyle=`hsla(${hue},80%,60%,0.7)`;ctx.lineWidth=3*(1-0.6);ctx.stroke();
    // tip glow
    ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);
    ctx.fillStyle=`hsla(${hue+40},100%,80%,0.9)`;ctx.fill();
  }
}catch(e){}}

// ── 20 MIRROR SCOPE ───────────────────────────
function drawMirror(ctx,W,H,t,freq){try{
  const cx=W/2,cy=H/2;
  const pts=256,R=Math.min(W,H)*0.4;
  const mirrors=4;
  for(let m=0;m<mirrors;m++){
    ctx.save();ctx.translate(cx,cy);ctx.rotate((m/mirrors)*Math.PI*2);
    ctx.beginPath();
    for(let i=0;i<=pts/mirrors;i++){
      const fi=Math.min(Math.floor((i/(pts/mirrors))*freq.length),freq.length-1);
      const amp=(freq[fi]||0)/255;
      const a=(i/(pts/mirrors))*(Math.PI*2/mirrors);
      const r=R*(0.3+amp*0.7);
      const x=Math.cos(a+t*0.3)*r,y=Math.sin(a+t*0.3)*r;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    const hue=300+m*30+t*15;
    ctx.strokeStyle=`hsla(${hue},90%,65%,0.7)`;ctx.lineWidth=1.5;ctx.stroke();
    // mirror
    ctx.scale(1,-1);ctx.strokeStyle=`hsla(${hue},90%,65%,0.3)`;ctx.stroke();
    ctx.restore();
  }
}catch(e){}}

// ── 21 BUBBLE SURGE ───────────────────────────

// ── 22 SILK RIBBON ────────────────────────────
const _ribPts=Array.from({length:6},(_,i)=>({angle:(i/6)*Math.PI*2,radius:0.3+i*0.05,speed:0.01+i*0.007,phase:i*1.1}));

// ── 23 SUPERNOVA ──────────────────────────────
const _novaParticles=Array.from({length:200},()=>({angle:Math.random()*Math.PI*2,r:0,speed:1+Math.random()*3,hue:Math.random()*60+10,alpha:1}));
function drawNova(ctx,W,H,t,freq){try{
  const cx=W/2,cy=H/2,maxR=Math.min(W,H)*0.45;

  let energy=0;for(let i=0;i<freq.length;i++)energy+=(freq[i]||0);energy=energy/freq.length/255;
  _novaParticles.forEach(p=>{
    const fi=Math.min(Math.floor((p.angle/(Math.PI*2))*freq.length),freq.length-1);
    const amp=(freq[fi]||0)/255;
    p.r+=p.speed*(0.5+energy*4+amp*3);

    const x=cx+Math.cos(p.angle)*p.r,y=cy+Math.sin(p.angle)*p.r;
    const sz=Math.max(0.3,2*(1-p.r/maxR)*(1+amp*3));
    ctx.beginPath();ctx.arc(x,y,sz,0,Math.PI*2);

  });
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(1,60+bass*80));

  ctx.beginPath();ctx.arc(cx,cy,Math.max(1,60+bass*80),0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();

// ── 24 GRID PULSE ─────────────────────────────
function drawGrid(ctx,W,H,t,freq){try{
  const cols=20,rows=12;
  const cw=W/cols,ch=H/rows;
  let energy=0;for(let i=0;i<freq.length;i++)energy+=(freq[i]||0);energy=energy/freq.length/255;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const fi=Math.min(Math.floor((c/cols)*freq.length),freq.length-1);
      const amp=(freq[fi]||0)/255;
      const wave=Math.sin(c*0.4+t*2+r*0.3)*0.5+0.5;
      const pulse=amp*wave;
      const x=c*cw+cw/2,y=r*ch+ch/2;
      const size=Math.max(1,(cw*0.35)*(0.2+pulse*1.5));
      const hue=180+c*8+r*12+t*20;
      ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);
      ctx.fillStyle=`hsla(${hue},85%,60%,${0.15+pulse*0.6})`;ctx.fill();
      if(pulse>0.4){
        ctx.beginPath();ctx.arc(x,y,size*1.6,0,Math.PI*2);
        ctx.strokeStyle=`hsla(${hue},90%,75%,${(pulse-0.4)*0.8})`;ctx.lineWidth=0.5;ctx.stroke();
      }
    }
  }
}catch(e){}}

// ── 25 HELIX 3D ───────────────────────────────
function drawHelix3D(ctx,W,H,t,freq){try{
  const cx=W/2,cy=H/2,R=Math.min(W,H)*0.35;
  let energy=0;for(let i=0;i<freq.length;i++)energy+=(freq[i]||0);energy=energy/freq.length/255;
  const strands=3,pts=80;
  for(let s=0;s<strands;s++){
    const phaseOff=(s/strands)*Math.PI*2;
    ctx.beginPath();let first=true;
    for(let i=0;i<pts;i++){
      const progress=i/pts;
      const fi=Math.min(Math.floor(progress*freq.length),freq.length-1);
      const amp=(freq[fi]||0)/255;
      const angle=progress*Math.PI*4+t+phaseOff;
      const depth=Math.sin(progress*Math.PI*2+t*0.5);
      const r=R*(0.4+amp*0.5)*(1+depth*0.15);
      const x=cx+Math.cos(angle)*r;
      const y=cy+(progress-0.5)*H*0.7+Math.sin(angle)*r*0.3+depth*20*amp;
      first?(ctx.moveTo(x,y),first=false):ctx.lineTo(x,y);
    }
    const hue=180+s*80+t*20;
    ctx.strokeStyle=`hsla(${hue},85%,65%,0.8)`;ctx.lineWidth=2;ctx.stroke();
  }
  // connection rungs
  for(let i=0;i<pts;i+=4){
    const progress=i/pts;
    const fi=Math.min(Math.floor(progress*freq.length),freq.length-1);
    const amp=(freq[fi]||0)/255;
    const angle=progress*Math.PI*4+t;
    const r=R*(0.4+amp*0.5);
    const x1=cx+Math.cos(angle)*r,y1=cy+(progress-0.5)*H*0.7+Math.sin(angle)*r*0.3;
    const x2=cx+Math.cos(angle+Math.PI*2/3)*r,y2=cy+(progress-0.5)*H*0.7+Math.sin(angle+Math.PI*2/3)*r*0.3;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
    ctx.strokeStyle=`rgba(150,220,255,${amp*0.4})`;ctx.lineWidth=0.8;ctx.stroke();
  }
}catch(e){}}

// ── 26 LIGHTNING STORM ────────────────────────
function drawStorm(ctx,W,H,t,freq){try{
  const cx=W/2,cy=H/2;
  let bass=0;for(let i=0;i<8;i++)bass+=(freq[i]||0);bass=bass/8/255;
  let energy=0;for(let i=0;i<freq.length;i++)energy+=(freq[i]||0);energy=energy/freq.length/255;
  // cloud-like dark bg
  const cg=ctx.createRadialGradient(cx,cy*0.6,0,cx,cy,Math.max(1,Math.min(W,H)*0.5));
  cg.addColorStop(0,`rgba(20,10,40,${0.3+energy*0.3})`);cg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(cx,cy,Math.min(W,H)*0.5,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();
  // bolts
  const bolts=5+Math.floor(energy*10);
  for(let b=0;b<bolts;b++){
    if(Math.random()>0.4-energy*0.3)continue;
    const startX=cx+(Math.random()-0.5)*W*0.8;
    const startY=0;
    let x=startX,y=startY;
    const targetX=cx+(Math.random()-0.5)*W*0.4;
    const targetY=H;
    const segs=10+Math.floor(energy*10);
    const hue=200+Math.random()*60;
    ctx.beginPath();ctx.moveTo(x,y);
    for(let s=0;s<segs;s++){
      const progress=(s+1)/segs;
      x=startX+(targetX-startX)*progress+(Math.random()-0.5)*80*(1-progress);
      y=startY+(targetY-startY)*progress;
      ctx.lineTo(x,y);
    }
    const alpha=0.4+energy*0.5;
    ctx.strokeStyle=`hsla(${hue},80%,90%,${alpha})`;ctx.lineWidth=1+bass*3;ctx.stroke();
    ctx.strokeStyle=`hsla(${hue},60%,70%,${alpha*0.3})`;ctx.lineWidth=4+bass*8;ctx.stroke();
  }
  // freq bars at bottom
  const bars=48;
  for(let i=0;i<bars;i++){
    const fi=Math.min(Math.floor((i/bars)*freq.length),freq.length-1);
    const amp=(freq[fi]||0)/255;
    const bw=W/bars,bh=amp*H*0.25;
    ctx.fillStyle=`hsla(${220+amp*60},90%,${50+amp*40}%,${0.4+amp*0.4})`;
    ctx.fillRect(i*bw,H-bh,bw-1,bh);
  }
}catch(e){}}

// ── 27 KALEIDOSCOPE ───────────────────────────
function drawKaleid(ctx,W,H,t,freq){try{

// ── 28 COMET TRAIL ────────────────────────────
const _comets=Array.from({length:8},(_,i)=>({angle:(i/8)*Math.PI*2,r:0.2+i*0.08,speed:0.008+i*0.003,trail:[],hue:180+i*22}));

// ── 29 WARP SPEED ─────────────────────────────
const _warpStars=Array.from({length:300},()=>({x:Math.random()*2-1,y:Math.random()*2-1,z:Math.random(),hue:180+Math.random()*80}));

// ── 30 ATOMIC ORBIT ───────────────────────────

  const ng=ctx.createRadialGradient(cx,cy,0,cx,cy,nucR);
  ng.addColorStop(0,`rgba(255,240,100,${0.9+bass*0.1})`);
  ng.addColorStop(0.5,'rgba(255,100,20,0.7)');ng.addColorStop(1,'rgba(255,0,0,0)');
  ctx.beginPath();ctx.arc(cx,cy,nucR,0,Math.PI*2);ctx.fillStyle=ng;ctx.fill();
  // orbits
  const orbits=5;
  for(let o=0;o<orbits;o++){
    const fi=Math.min(Math.floor((o/orbits)*freq.length),freq.length-1);
    const amp=(freq[fi]||0)/255;
    const orbitR=baseR*(0.2+o*0.18)*(1+amp*0.2);
    const tilt=(o*37+20)*Math.PI/180;
    const speed=(0.8+o*0.4)*(1+energy*2);
    const electronAngle=t*speed+o*1.3;
    // ellipse orbit
    ctx.save();ctx.translate(cx,cy);ctx.rotate(tilt);
    ctx.beginPath();ctx.ellipse(0,0,orbitR,orbitR*0.4,0,0,Math.PI*2);
    ctx.strokeStyle=`hsla(${160+o*30},70%,50%,${0.1+amp*0.15})`;ctx.lineWidth=0.8;ctx.stroke();
    // electron
    const ex=Math.cos(electronAngle)*orbitR,ey=Math.sin(electronAngle)*orbitR*0.4;
    const eg=ctx.createRadialGradient(ex,ey,0,ex,ey,Math.max(1,6+amp*10));
    eg.addColorStop(0,`rgba(100,200,255,${0.9+amp*0.1})`);
    eg.addColorStop(0.5,`rgba(0,100,255,0.5)`);eg.addColorStop(1,'rgba(0,50,255,0)');
    ctx.beginPath();ctx.arc(ex,ey,Math.max(1,6+amp*10),0,Math.PI*2);ctx.fillStyle=eg;ctx.fill();
    // electron trail
    for(let tr=1;tr<=8;tr++){
      const ta=electronAngle-tr*0.15;
      const tx=Math.cos(ta)*orbitR,ty=Math.sin(ta)*orbitR*0.4;
      ctx.beginPath();ctx.arc(tx,ty,Math.max(0.3,3-tr*0.3),0,Math.PI*2);
      ctx.fillStyle=`rgba(100,180,255,${(1-tr/8)*0.4*amp})`;ctx.fill();
    }
    ctx.restore();
  }
}catch(e){}}
</script>
