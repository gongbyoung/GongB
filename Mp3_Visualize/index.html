<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Ambient Media Art Studio</title>
  
  <!-- Three.js 및 p5.js 코어 라이브러리 선 로드 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <style>
    /* ==========================================================================
       🌌 000호 전체 프레임 하드웨어 박제 레이아웃 마스터 CSS 스타일시트
       ========================================================================== */
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body, html {
      width: 100%;
      height: 100vh;
      background-color: #05070c;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #ffffff;
      overflow: hidden; /* 💥 화면 전체 스크롤바 원천 차단 */
    }

    /* 메인 3단 분할 레이아웃 시스템 */
    .studio-container {
      display: flex;
      width: 100%;
      height: 100vh;
      position: relative;
    }

    /* --------------------------------------------------------------------------
       1️⃣ 왼쪽 사이드바: 2열 바둑판 스케치 매트릭스 목록
       -------------------------------------------------------------------------- */
    .sketches-sidebar {
      width: 250px;
      height: 100vh;
      background-color: #0b0e14;
      border-right: 1px solid #1a2233;
      padding: 20px 14px;
      display: flex;
      flex-direction: column;
      z-index: 10;
    }

    .sidebar-title {
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* 💡 [대수술 복구]: 대표단어 2열 종대 그리드 배치 컨테이너 */
    .sketches-grid-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-gap: 8px;
      margin-top: 15px;
      overflow-y: auto; /* 만약 버튼이 너무 많아지면 내부에서만 스크롤 */
      padding-right: 2px;
    }

    /* 스크롤바 디자인 슬림 최적화 */
    .sketches-grid-container::-webkit-scrollbar {
      width: 4px;
    }
    .sketches-grid-container::-webkit-scrollbar-thumb {
      background: #1f2a3d;
      border-radius: 2px;
    }

    .sketch-item-btn {
      width: 100%;
      height: 40px;
      background-color: #141a29;
      border: 1px solid #222e45;
      border-radius: 6px;
      color: #c5d1e0;
      font-size: 11.5px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: all 0.2s ease-in-out;
    }

    .sketch-item-btn:hover, .sketch-item-btn.active {
      background-color: #00ffcc;
      border-color: #00ffcc;
      color: #05070c;
      font-weight: bold;
      box-shadow: 0 0 12px rgba(0, 255, 204, 0.4);
    }

    /* 하단 오디오 고정 컨트롤러 플레이어 */
    .sidebar-audio-box {
      margin-top: auto;
      padding-top: 15px;
      border-top: 1px solid #1a2233;
    }

    .sidebar-audio-box audio {
      width: 100%;
      height: 32px;
      outline: none;
    }

    /* --------------------------------------------------------------------------
       2️⃣ 중앙 미디어 아트 메인 디스플레이 영역 (캔버스 공간)
       -------------------------------------------------------------------------- */
    .media-art-viewport {
      flex: 1;
      height: 100vh;
      position: relative;
      background-color: #060810;
    }

    /* 실시간 드로잉 캔버스가 부착될 절대 래퍼 */
    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* --------------------------------------------------------------------------
       3️⃣ 오른쪽 사이드바: 고정형 콤팩트 핏 관제탑 제어 패널
       -------------------------------------------------------------------------- */
    .control-panel-right {
      width: 340px;
      height: 100vh;
      background-color: #090c14;
      border-left: 1px solid #1a2233;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between; /* 요소들을 균등 분산하여 스크롤 유발 억제 */
      z-index: 10;
    }

    .panel-header-title {
      font-size: 14px;
      font-weight: 700;
      color: #00ffcc;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      text-transform: uppercase;
      border-left: 3px solid #00ffcc;
      padding-left: 6px;
    }

    /* 튜닝 박스 슬림 인클로저 */
    .control-section {
      background-color: rgba(20, 26, 41, 0.45);
      border: 1px solid #151e2e;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }

    .section-title {
      font-size: 11px;
      font-weight: bold;
      color: #8fa0b5;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    /* 슬라이더 라벨, 폼 레이아웃 정렬 */
    .slider-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
    }

    .slider-group:last-child {
      margin-bottom: 0;
    }

    .slider-group label {
      font-size: 11.5px;
      color: #ffffff;
      font-weight: 600;
      width: 65px;
    }

    .slider-group input[type="range"] {
      flex: 1;
      height: 4px;
      background: #1a2333;
      border-radius: 2px;
      outline: none;
      margin: 0 10px;
    }

    /* 관제탑 입력 인풋 폼 가시성 확대 패치 */
    .slider-group input[type="number"], .control-section select {
      width: 55px;
      height: 24px;
      background-color: #101524;
      border: 1px solid #2c3a57;
      color: #ffffff;
      font-size: 11.5px;
      text-align: center;
      border-radius: 4px;
      outline: none;
    }

    .control-section select {
      width: 100%;
      height: 28px;
      text-align: left;
      padding-left: 5px;
      margin-top: 2px;
    }

    /* 컬러 픽커 칩 배열 배치 */
    .color-picker-row {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }
    .picker-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10.5px;
      color: #aaa;
    }
    .picker-item input[type="color"] {
      width: 24px;
      height: 20px;
      border: none;
      background: none;
      cursor: pointer;
    }

    /* 3D 카메라 위치 조정 컨트롤 박스 구조화 */
    .offset-box-wrapper {
      display: flex;
      justify-content: space-between;
      gap: 6px;
    }
    .offset-input-unit {
      flex: 1;
      display: flex;
      align-items: center;
      background: #101524;
      border: 1px solid #2c3a57;
      border-radius: 4px;
      padding: 2px 4px;
    }
    .offset-input-unit span {
      font-size: 10px;
      color: #00ffcc;
      font-weight: bold;
      margin-right: 4px;
    }
    .offset-input-unit input {
      width: 100%;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 11px;
      text-align: center;
      outline: none;
    }

    /* 프리셋 기동 및 RESET 마스터 단추 가로화 패치 */
    .btn-row {
      display: flex;
      gap: 6px;
      margin-bottom: 5px;
    }
    .action-btn {
      flex: 1;
      height: 32px;
      border: none;
      border-radius: 5px;
      font-size: 11.5px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .btn-blue { background-color: #1e3a8a; color: #fff; }
    .btn-dark { background-color: #1f2937; color: #fff; }
    
    /* 💥 RESET 마스터 대형 단추 단독 튜닝 */
    .reset-master-btn {
      width: 100%;
      height: 36px;
      background-color: #0088cc;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 12.5px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 136, 204, 0.3);
      transition: background 0.2s ease;
    }
    .reset-master-btn:hover { background-color: #00aaff; }

    /* 익스포트 녹화 시작 대형 단추 */
    .record-btn-master {
      width: 100%;
      height: 38px;
      background-color: #e11d48;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(225, 29, 72, 0.3);
    }
    .record-btn-master:hover { background-color: #f43f5e; }
  </style>
</head>
<body>

  <div class="studio-container">
    
    <!-- ------------------------------------------------------------------------
         1️⃣ LEFT SIDEBAR: 번호와 대표단어 2열 그리드 스케치 매트릭스
         ------------------------------------------------------------------------ -->
    <div class="sketches-sidebar">
      <div class="sidebar-title">📁 Media Stages</div>
      
      <div class="sketches-grid-container" id="sketches-grid-root">
        <button class="sketch-item-btn active" data-id="001">001 파형</button>
        <button class="sketch-item-btn" data-id="002">002 큐브</button>
        <button class="sketch-item-btn" data-id="003">003 노이즈</button>
        <button class="sketch-item-btn" data-id="004">004 타이포</button>
        <button class="sketch-item-btn" data-id="005">005 그리드</button>
        <button class="sketch-item-btn" data-id="006">006 메이커</button>
        <button class="sketch-item-btn" data-id="007">007 성운</button>
        <button class="sketch-item-btn" data-id="008">008 진자</button>
        <button class="sketch-item-btn" data-id="009">009 불꽃</button>
        <button class="sketch-item-btn" data-id="010">010 데이터</button>
        <button class="sketch-item-btn" data-id="011">011 물보라</button>
        <button class="sketch-item-btn" data-id="012">012 레이어</button>
        <button class="sketch-item-btn" data-id="013">013 유성우</button>
        <button class="sketch-item-btn" data-id="014">014 오르브</button>
        <button class="sketch-item-btn" data-id="015">015 유체</button>
        <button class="sketch-item-btn" data-id="020">020 자막</button>
      </div>

      <div class="sidebar-audio-box">
        <audio id="main-audio-element" controls src="assets/ambient_meditation.mp3"></audio>
      </div>
    </div>

    <!-- ------------------------------------------------------------------------
         2️⃣ CENTER VIEWPORT: 미디어 아트 디스플레이 실시간 렌더 스페이스
         ------------------------------------------------------------------------ -->
    <div class="media-art-viewport">
      <div id="canvas-container"></div>
    </div>

    <!-- ------------------------------------------------------------------------
         3️⃣ RIGHT SIDEBAR: 스크롤 차단 고정형 명상 7대 관제탑 패널
         ------------------------------------------------------------------------ -->
    <div class="control-panel-right">
      <div>
        <div class="panel-header-title">Cosmic Studio Tuning</div>

        <!-- 섹션 1: 7대 물리 코어 엔진 제어계 -->
        <div class="control-section">
          <div class="section-title">🎛️ 물리 반응 코어 파이프라인</div>
          
          <div class="slider-group">
            <label>Shuffle</label>
            <input type="range" id="num-cosmic-seed" min="1" max="500" value="42">
            <input type="number" id="val-cosmic-seed" value="42" readonly>
          </div>
          
          <div class="slider-group">
            <label>Range</label>
            <input type="range" id="num-cosmic-scatter" min="5" max="50" value="22">
            <input type="number" id="val-cosmic-scatter" value="22" readonly>
          </div>

          <div class="slider-group">
            <label>Scale</label>
            <input type="range" id="num-cosmic-glow" min="10" max="250" value="85">
            <input type="number" id="val-cosmic-glow" value="85" readonly>
          </div>

          <div class="slider-group">
            <label>Volume</label>
            <input type="range" id="num-cosmic-gain" min="10" max="500" value="100">
            <input type="number" id="val-cosmic-gain" value="100" readonly>
          </div>

          <div class="slider-group">
            <label>Gauge</label>
            <input type="range" id="num-cosmic-gauge" min="0" max="100" value="50">
            <input type="number" id="val-cosmic-gauge" value="50" readonly>
          </div>
        </div>

        <!-- 섹션 2: 아날로그 자연 명상 색채 필터 연동 -->
        <div class="control-section">
          <div class="section-title">🎨 Color Style Palette</div>
          <select id="select-cosmic-color">
            <option value="monochrome" selected>No1 : 차분한 모스그린 힐링 톤</option>
            <option value="neon">No2 : 따뜻한 샌드베이지 아날로그 톤</option>
            <option value="pastel">No3 : 은은한 대지 / 새벽녘 라벤더 톤</option>
            <option value="custom">No4 : 커스텀 수혈 칼라 파이프라인</option>
            <option value="random">No5 : 올 랜덤 아날로그 오로라 시프팅</option>
          </select>
          
          <div class="color-picker-row">
            <div class="picker-item"><input type="color" id="picker-gas1" value="#ff0055"> <span>C1</span></div>
            <div class="picker-item"><input type="color" id="picker-gas2" value="#00ffcc"> <span>C2</span></div>
            <div class="picker-item"><input type="color" id="picker-star" value="#ffffff"> <span>Core</span></div>
          </div>
        </div>

        <!-- 섹션 3: 가상 시네마 3D 카메라 앵글 축 변위 매퍼 -->
        <div class="control-section">
          <div class="section-title">🎥 3D Position Offset (X, Y, Z)</div>
          <div class="offset-box-wrapper">
            <div class="offset-input-unit"><span>X</span><input type="number" id="pos-offset-x" value="0"></div>
            <div class="offset-input-unit"><span>Y</span><input type="number" id="pos-offset-y" value="0"></div>
            <div class="offset-input-unit"><span>Z</span><input type="number" id="pos-offset-z" value="0"></div>
          </div>
        </div>

        <!-- 섹션 4: 로컬 프리셋 세이브/로드 및 RESET 하드웨어 매핑 -->
        <div class="control-section" style="background: none; border: none; padding: 0;">
          <div class="btn-row">
            <button class="action-btn btn-blue">💾 디바이스 저장</button>
            <button class="action-btn btn-dark">📂 프리셋 불러오기</button>
          </div>
          <button class="reset-master-btn" id="btn-master-reset">현재 수치 즉시 적용 (RESET)</button>
        </div>
      </div>

      <!-- 섹션 5: MP4 영상 녹화 저장 익스포트 파이프라인 -->
      <div>
        <button class="record-btn-master">🔴 녹화 시작 (Record)</button>
      </div>
    </div>

  </div>

  <!-- 글로벌 설정 데이터 락인 변수 선언 스크립트 -->
  <script>
    window.cosmicEngineSettings = {
      seed: 42,
      scatterExponent: 22,
      glowIntensity: 85,
      audioGain: 100,
      gaugeValue: 50,
      colorStyle: 'monochrome',
      customColors: { gas1: '#ff0055', gas2: '#00ffcc', star: '#ffffff' },
      positionOffset: { x: 0, y: 0, z: 0 }
    };

    // 슬라이더 및 넘버 박스 상호 실시간 미러링 로직 바인딩
    const binder = (sliderId, textId, key) => {
      const slider = document.getElementById(sliderId);
      const text = document.getElementById(textId);
      if(!slider || !text) return;

      const sync = (val) => {
        text.value = val;
        window.cosmicEngineSettings[key] = parseFloat(val);
      };

      slider.addEventListener('input', (e) => sync(e.target.value));
    };

    binder('num-cosmic-seed', 'val-cosmic-seed', 'seed');
    binder('num-cosmic-scatter', 'val-cosmic-scatter', 'scatterExponent');
    binder('num-cosmic-glow', 'val-cosmic-glow', 'glowIntensity');
    binder('num-cosmic-gain', 'val-cosmic-gain', 'audioGain');
    binder('num-cosmic-gauge', 'val-cosmic-gauge', 'gaugeValue');

    // 드롭다운 및 컬러 변수 결합 수리
    const colorStyleSelect = document.getElementById('select-cosmic-color');
    if (colorStyleSelect) {
      colorStyleSelect.addEventListener('change', (e) => {
        window.cosmicEngineSettings.colorStyle = e.target.value;
      });
    }

    const bindOffset = (id, key) => {
      const el = document.getElementById(id);
      if(el) {
        el.addEventListener('input', (e) => {
          window.cosmicEngineSettings.positionOffset[key] = parseFloat(e.target.value) || 0;
        });
      }
    };
    bindOffset('pos-offset-x', 'x');
    bindOffset('pos-offset-y', 'y');
    bindOffset('pos-offset-z', 'z');
  </script>
</body>
</html>
