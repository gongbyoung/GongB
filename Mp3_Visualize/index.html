<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Mp3 Visualizer Study Control Tower</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* 💡 레이아웃 보호: 캔버스 외곽을 절대 벗어나지 않게 하는 가드 */
    .center-canvas-zone { display: flex; align-items: center; justify-content: center; }
    #stage-wrapper { transition: all 0.3s ease; }
    .ratio-full { width: 100%; height: 100%; }
    .ratio-169 { aspect-ratio: 16/9; height: auto !important; width: 100%; }
    .ratio-916 { aspect-ratio: 9/16; height: 100% !important; width: auto; }
    
    /* 슬라이더 옆 수치 표시창 정렬 */
    .slider-row { display: flex; align-items: center; gap: 8px; }
    .slider-row input[type="number"] { width: 50px; background: #0f172a; color: #fff; border: 1px solid #334155; border-radius: 4px; }
  </style>
</head>
<body>

  <div class="main-layout">
    <div class="left-sidebar">
      <!-- Media Resources & Sketches -->
      <ul class="sketches-list-wrapper" id="sketch-list">
        <li class="sketch-btn active" data-sketch="001_p5_wave.js">001 파형</li>
        <li class="sketch-btn" data-sketch="002_three_cube.js">002 큐브</li>
        <li class="sketch-btn" data-sketch="003_glsl_noise.js">003 노이즈</li>
        <li class="sketch-btn" data-sketch="004_three_typography.js">004 타이포</li>
        <li class="sketch-btn" data-sketch="005_three_floor_eq.js">005 그리드</li>
        <li class="sketch-btn" data-sketch="006_three_organic_flower.js">006 메이커</li>
        <li class="sketch-btn" data-sketch="007_three_cosmic_nebula.js">007 성운</li>
        <li class="sketch-btn" data-sketch="008_three_pendulum_wave.js">008 진자</li>
        <li class="sketch-btn" data-sketch="009_three_fireworks.js">009 불꽃</li>
        <li class="sketch-btn" data-sketch="010_p5_datawave_512.js">010 데이터</li>
        <li class="sketch-btn" data-sketch="011_p5_ocean_wave.js">011 물보라</li>
        <li class="sketch-btn" data-sketch="012_p5_ocean_wave_spaced.js">012 레이어</li>
        <li class="sketch-btn" data-sketch="013_p5_ink_meteor_shower.js">013 유성우</li>
        <li class="sketch-btn" data-sketch="014_p5_pendulums.js">014 오르브</li>
        <li class="sketch-btn" data-sketch="015_three_p5_aurora.js">015 유체</li>
        <li class="sketch-btn" data-sketch="016_p5_stylized_painter.js">016 화가</li>
        <li class="sketch-btn" data-sketch="017_p5_fbm_cloud.js">017 구름</li>
        <li class="sketch-btn" data-sketch="018_glsl_noise.js">018 GLSL</li>
        <li class="sketch-btn" data-sketch="019_p5_512_circles.js">019 원반</li>
        <li class="sketch-btn" data-sketch="020_p5_srt_canvas.js">020 자막</li>
      </ul>
      <audio id="audio-player" controls src="assets/sample.mp3"></audio>
    </div>

    <div class="center-canvas-zone">
      <div id="stage-wrapper" class="ratio-full">
         <div id="canvas-stage" style="width:100%; height:100%;"></div>
      </div>
    </div>

    <div class="right-sidebar">
      <h3>Cosmic Studio Tuning</h3>
      <div class="control-group"><label>Shuffle (Seed)</label><div class="slider-row"><input type="range" id="num-cosmic-seed" min="1" max="500" value="42"><input type="number" id="val-cosmic-seed" value="42"></div></div>
      <div class="control-group"><label>Range (Scatter)</label><div class="slider-row"><input type="range" id="num-cosmic-scatter" min="5" max="50" value="22"><input type="number" id="val-cosmic-scatter" value="22"></div></div>
      <div class="control-group"><label>Scale (Glow)</label><div class="slider-row"><input type="range" id="num-cosmic-glow" min="10" max="250" value="85"><input type="number" id="val-cosmic-glow" value="85"></div></div>
      <div class="control-group"><label>Volume (Gain)</label><div class="slider-row"><input type="range" id="num-cosmic-gain" min="10" max="500" value="100"><input type="number" id="val-cosmic-gain" value="100"></div></div>
      <div class="control-group"><label>Gauge</label><div class="slider-row"><input type="range" id="num-cosmic-gauge" min="0" max="100" value="50"><input type="number" id="val-cosmic-gauge" value="50"></div></div>
      
      <button class="action-master-btn" id="btn-apply-cosmic">현재 수치 즉시 적용 (RESET)</button>
      
      <h3>💾 Preset Save & Load</h3>
      <div id="preset-status" style="font-size:10px; margin-bottom:5px;">상태: 대기 중</div>
      <div class="preset-btn-row">
        <button class="action-mini-btn" id="btn-save-preset">📂 디바이스 저장</button>
        <button class="action-mini-btn" id="btn-load-preset">📁 불러오기</button>
        <input type="file" id="hidden-preset-file-input" accept=".json" style="display:none;">
      </div>

      <button class="record-master-btn" id="btn-record">🔴 녹화 시작 (Record)</button>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
  <script>
    // 20260713 백업본 main.js와 동기화된 UI 동기화 루프
    function syncValue(rangeId, numId) {
      const range = document.getElementById(rangeId);
      const num = document.getElementById(numId);
      range.addEventListener('input', () => { num.value = range.value; });
      num.addEventListener('input', () => { range.value = num.value; });
    }
    syncValue('num-cosmic-seed', 'val-cosmic-seed');
    syncValue('num-cosmic-scatter', 'val-cosmic-scatter');
    syncValue('num-cosmic-glow', 'val-cosmic-glow');
    syncValue('num-cosmic-gain', 'val-cosmic-gain');
    syncValue('num-cosmic-gauge', 'val-cosmic-gauge');
  </script>
</body>
</html>
