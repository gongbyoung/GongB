<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Audio Visualizer for Video Production</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Pretendard', sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* 상단 타이틀바 스타일 UI */
        #header-ui { 
            position: absolute; top: 0; left: 0; width: 100%; height: 50px;
            background: rgba(20, 20, 20, 0.9); display: flex; align-items: center;
            padding: 0 20px; box-sizing: border-box; z-index: 100;
            border-bottom: 1px solid #333;
        }
        .controls { display: flex; gap: 10px; align-items: center; }
        button { 
            background: #444; color: white; border: 1px solid #666; padding: 5px 15px; 
            border-radius: 4px; cursor: pointer; font-size: 13px; transition: 0.2s;
        }
        button:hover { background: #666; border-color: #fff; }
        button.active { background: #3498db; border-color: #3498db; }
        input[type="file"] { color: #ccc; font-size: 12px; }
        #song-title { margin-left: auto; color: #888; font-size: 12px; }
    </style>
</head>
<body>
    <div id="header-ui">
        <div class="controls">
            <input type="file" id="audio-file" accept="audio/*">
            <button id="btn-play">PLAY</button>
            <button id="btn-pause">PAUSE</button>
            <span style="color:#555; margin: 0 10px;">|</span>
            <button class="mode-btn active" data-mode="bar">BAR</button>
            <button class="mode-btn" data-mode="circle">CIRCLE</button>
            <button class="mode-btn" data-mode="wave">WAVE</button>
        </div>
        <div id="song-title">준비됨</div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const audioFile = document.getElementById('audio-file');
        const songTitle = document.getElementById('song-title');
        
        let audioCtx, analyser, source, dataArray, bufferLength;
        let isPlaying = false;
        let currentMode = 'bar';

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 모드 변경 이벤트
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentMode = e.target.dataset.mode;
            });
        });

        audioFile.addEventListener('change', function() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 512;
                bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
            }

            const file = this.files[0];
            songTitle.textContent = file.name;
            const reader = new FileReader();
            reader.onload = function(e) {
                audioCtx.decodeAudioData(e.target.result, function(buffer) {
                    if (source) source.stop();
                    source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    source.connect(analyser);
                    analyser.connect(audioCtx.destination);
                    source.start(0);
                    isPlaying = true;
                    draw();
                });
            };
            reader.readAsArrayBuffer(file);
        });

        document.getElementById('btn-play').onclick = () => audioCtx?.resume();
        document.getElementById('btn-pause').onclick = () => audioCtx?.suspend();

        function draw() {
            if (!isPlaying) return;
            requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; // 잔상 효과
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (currentMode === 'bar') drawBar();
            else if (currentMode === 'circle') drawCircle();
            else if (currentMode === 'wave') drawWave();
        }

        // 1. BAR MODE (개선된 버전)
        function drawBar() {
            const barWidth = (canvas.width / bufferLength) * 2;
            let x = 0;
            for (let i = 0; i < bufferLength; i++) {
                const barHeight = dataArray[i] * 2;
                ctx.fillStyle = `hsl(${i * 2 + 180}, 80%, 50%)`;
                ctx.fillRect(x, canvas.height - barHeight, barWidth - 1, barHeight);
                x += barWidth;
            }
        }

        // 2. CIRCLE MODE (뮤직비디오용 추천)
        function drawCircle() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 150;

            for (let i = 0; i < bufferLength; i++) {
                const barHeight = dataArray[i] * 1.2;
                const angle = (i / bufferLength) * Math.PI * 2;
                const x1 = centerX + Math.cos(angle) * radius;
                const y1 = centerY + Math.sin(angle) * radius;
                const x2 = centerX + Math.cos(angle) * (radius + barHeight);
                const y2 = centerY + Math.sin(angle) * (radius + barHeight);

                ctx.strokeStyle = `hsl(${i + 200}, 100%, 60%)`;
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
        }

        // 3. WAVE MODE (환각적인 느낌)
        function drawWave() {
            ctx.beginPath();
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#fff';
            const sliceWidth = canvas.width / bufferLength;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = v * canvas.height / 2;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
                x += sliceWidth;
            }
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();
        }
    </script>
</body>
</html>
