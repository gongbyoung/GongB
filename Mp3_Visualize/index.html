<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Ambient Media Art Studio</title>
  
  <!-- Three.js 및 p5.js 코어 라이브러리 선 로드 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  
  <!-- 외부 스타일시트 결합 연결 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="studio-container">
    
    <!-- 1️⃣ LEFT SIDEBAR: 번호와 대표단어 2열 그리드 스케치 매트릭스 목록 -->
    <div class="sketches-sidebar">
      <div class="sidebar-title">📁 Media Stages</div>
      
      <div class="sketches-grid-container" id="sketches-grid-root">
        <button class="sketch-item-btn active" data-id="001">001 파형</button>
        <button class="sketch-item-btn" data-id="002">002 큐브</button>
        <button class="sketch-item-btn" data-id="003">003 노이즈</button>
        <button class="sketch-item-btn" data-id="004">004 타이포</button>
        <button class="sketch-item-btn" data-id="005">005 그리드</button>
        <button class="sketch-item-btn" data-id="006">006 메이커</button>
        <button class="sketch-item-btn" data-id="007">007 성운</button>
        <button class="sketch-item-btn" data-id="008">008 진자</button>
        <button class="sketch-item-btn" data-id="009">009 불꽃</button>
        <button class="sketch-item-btn" data-id="010">010 데이터</button>
        <button class="sketch-item-btn" data-id="011">011 물보라</button>
        <button class="sketch-item-btn" data-id="012">012 레이어</button>
        <button class="sketch-item-btn" data-id="013">013 유성우</button>
        <button class="sketch-item-btn" data-id="014">014 오르브</button>
        <button class="sketch-item-btn" data-id="015">015 유체</button>
        <button class="sketch-item-btn" data-id="020">020 자막</button>
      </div>

      <div class="sidebar-audio-box">
        <audio id="main-audio-element" controls src="assets/ambient_meditation.mp3"></audio>
      </div>
    </div>

    <!-- 2️⃣ CENTER VIEWPORT: 미디어 아트 디스플레이 실시간 렌더 스페이스 -->
    <div class="media-art-viewport">
      <div id="canvas-container"></div>
    </div>

    <!-- 3️⃣ RIGHT SIDEBAR: 고정형 명상 7대 관제탑 패널 -->
    <div class="control-panel-right">
      <div>
        <div class="panel-header-title">Cosmic Studio Tuning</div>

        <!-- 섹션 1: 7대 물리 코어 엔진 제어계 -->
        <div class="control-section">
          <div class="section-title">🎛️ 물리 반응 코어 파이프라인</div>
          
          <div class="slider-group">
            <label>Shuffle</label>
            <input type="range" id="num-cosmic-seed" min="1" max="500" value="42">
            <input type="number" id="val-cosmic-seed" value="42" readonly>
          </div>
          
          <div class="slider-group">
            <label>Range</label>
            <input type="range" id="num-cosmic-scatter" min="5" max="50" value="22">
            <input type="number" id="val-cosmic-scatter" value="22" readonly>
          </div>

          <div class="slider-group">
            <label>Scale</label>
            <input type="range" id="num-cosmic-glow" min="10" max="250" value="85">
            <input type="number" id="val-cosmic-glow" value="85" readonly>
          </div>

          <div class="slider-group">
            <label>Volume</label>
            <input type="range" id="num-cosmic-gain" min="10" max="500" value="100">
            <input type="number" id="val-cosmic-gain" value="100" readonly>
          </div>

          <div class="slider-group">
            <label>Gauge</label>
            <input type="range" id="num-cosmic-gauge" min="0" max="100" value="50">
            <input type="number" id="val-cosmic-gauge" value="50" readonly>
          </div>
        </div>

        <!-- 섹션 2: 아날로그 자연 명상 색채 필터 연동 -->
        <div class="control-section">
          <div class="section-title">🎨 Color Style Palette</div>
          <select id="select-cosmic-color">
            <option value="monochrome" selected>No1 : 차분한 모스그린 힐링 톤</option>
            <option value="neon">No2 : 따뜻한 샌드베이지 아날로그 톤</option>
            <option value="pastel">No3 : 은은한 대지 / 새벽녘 라벤더 톤</option>
            <option value="custom">No4 : 커스텀 수혈 칼라 파이프라인</option>
            <option value="random">No5 : 올 랜덤 아날로그 오로라 시프팅</option>
          </select>
          
          <div class="color-picker-row">
            <div class="picker-item"><input type="color" id="picker-gas1" value="#ff0055"> <span>C1</span></div>
            <div class="picker-item"><input type="color" id="picker-gas2" value="#00ffcc"> <span>C2</span></div>
            <div class="picker-item"><input type="color" id="picker-star" value="#ffffff"> <span>Core</span></div>
          </div>
        </div>

        <!-- 섹션 3: 가상 시네마 3D 카메라 앵글 축 변위 매퍼 -->
        <div class="control-section">
          <div class="section-title">🎥 3D Position Offset (X, Y, Z)</div>
          <div class="offset-box-wrapper">
            <div class="offset-input-unit"><span>X</span><input type="number" id="pos-offset-x" value="0"></div>
            <div class="offset-input-unit"><span>Y</span><input type="number" id="pos-offset-y" value="0"></div>
            <div class="offset-input-unit"><span>Z</span><input type="number" id="pos-offset-z" value="0"></div>
          </div>
        </div>

        <!-- 섹션 4: 로컬 프리셋 세이브/로드 및 RESET 하드웨어 매핑 -->
        <div class="control-section" style="background: none; border: none; padding: 0;">
          <div class="btn-row">
            <button class="action-btn btn-blue">💾 디바이스 저장</button>
            <button class="action-btn btn-dark">📂 프리셋 불러오기</button>
          </div>
          <button class="reset-master-btn" id="btn-master-reset">현재 수치 즉시 적용 (RESET)</button>
        </div>
      </div>

      <!-- 섹션 5: MP4 영상 녹화 저장 익스포트 파이프라인 -->
      <div>
        <button class="record-btn-master">🔴 녹화 시작 (Record)</button>
      </div>
    </div>

  </div>

  <!-- 글로벌 설정 데이터 락인 변수 선언 스크립트 -->
  <script>
    window.cosmicEngineSettings = {
      seed: 42,
      scatterExponent: 22,
      glowIntensity: 85,
      audioGain: 100,
      gaugeValue: 50,
      colorStyle: 'monochrome',
      customColors: { gas1: '#ff0055', gas2: '#00ffcc', star: '#ffffff' },
      positionOffset: { x: 0, y: 0, z: 0 }
    };

    const binder = (sliderId, textId, key) => {
      const slider = document.getElementById(sliderId);
      const text = document.getElementById(textId);
      if(!slider || !text) return;

      const sync = (val) => {
        text.value = val;
        window.cosmicEngineSettings[key] = parseFloat(val);
      };

      slider.addEventListener('input', (e) => sync(e.target.value));
    };

    binder('num-cosmic-seed', 'val-cosmic-seed', 'seed');
    binder('num-cosmic-scatter', 'val-cosmic-scatter', 'scatterExponent');
    binder('num-cosmic-glow', 'val-cosmic-glow', 'glowIntensity');
    binder('num-cosmic-gain', 'val-cosmic-gain', 'audioGain');
    binder('num-cosmic-gauge', 'val-cosmic-gauge', 'gaugeValue');

    const colorStyleSelect = document.getElementById('select-cosmic-color');
    if (colorStyleSelect) {
      colorStyleSelect.addEventListener('change', (e) => {
        window.cosmicEngineSettings.colorStyle = e.target.value;
      });
    }

    const bindOffset = (id, key) => {
      const el = document.getElementById(id);
      if(el) {
        el.addEventListener('input', (e) => {
          window.cosmicEngineSettings.positionOffset[key] = parseFloat(e.target.value) || 0;
        });
      }
    };
    bindOffset('pos-offset-x', 'x');
    bindOffset('pos-offset-y', 'y');
    bindOffset('pos-offset-z', 'z');
  </script>
</body>
</html>
