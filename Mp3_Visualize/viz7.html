<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM ART LAB v17.0 — True Progressive</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#050505; --panel:#0d0d12; --accent:#00ffcc; --border:rgba(255,255,255,0.06); --text:#ffffff; }
body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

/* LAYOUT */
.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo{letter-spacing:4px; color:var(--accent); font-weight:800; font-size:12px;}
.container { display: grid; grid-template-columns: 280px 1fr 300px; flex: 1; min-height: 0; }
.side-panel { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
.side-panel.right { border-right:none; border-left: 1px solid var(--border); }

/* BOTTOM PLAYBAR */
.playbar { height: 60px; background: var(--panel); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 15px; flex-shrink: 0; }
.progress-container { flex: 1; display: flex; align-items: center; gap: 10px; font-family: monospace; font-size: 12px; color: var(--accent); }
#progBar { flex: 1; accent-color: var(--accent); height: 4px; cursor: pointer; }

h3 { font-size: 10px; color: #555; margin-bottom: 12px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-top: 15px;}
.control-group { margin-bottom: 12px; }
.control-group label { display: block; font-size: 9px; color: #777; margin-bottom: 6px; }
.val-label { float: right; color: var(--accent); font-weight: bold; }
input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; height: 3px;}
select { width: 100%; background: #000; border: 1px solid #333; color: var(--accent); padding: 8px; border-radius: 4px; font-size: 12px; outline: none; margin-bottom: 10px;}

.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 10px; cursor: pointer; font-size: 10px; border-radius: 4px; width: 100%; margin-bottom: 5px; transition: 0.2s;}
.btn.primary { background: var(--accent); color: #000; border: none; font-weight: bold; font-size: 12px; padding: 15px; margin-top: 10px;}
.btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.05); }

.viz-area { position: relative; background: #000; overflow: hidden; flex: 1; display: flex; justify-content: center; align-items: center; }
#artCanvas { background: #000; }
.log-panel { background: #000; border: 1px solid #222; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 10px; color: #888; line-height: 1.6; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM ART LAB v17.0</div>
  <div id="statusTag" style="font-size: 10px; color: #555;">TRUE PROGRESSIVE ENGINE READY</div>
</div>

<div class="container">
  <div class="side-panel">
    <h3>1. Assets Loading</h3>
    <button class="btn" onclick="document.getElementById('mIn').click()">LOAD MP3</button>
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleMusic(this.files)">
    <button class="btn" style="border-color: var(--accent); color: var(--accent);" onclick="document.getElementById('iIn').click()">LOAD SOURCE IMAGE</button>
    <input type="file" id="iIn" accept="image/*" style="display:none" onchange="handleImage(this.files)">
    
    <h3>2. Art Style (Brush)</h3>
    <select id="artStyle" onchange="document.getElementById('logStyle').innerText=this.value.toUpperCase()">
        <option value="point">점묘 (Pointillism)</option>
        <option value="impression">인상 (Impressionism)</option>
        <option value="grayscale">흑백 (Grayscale)</option>
        <option value="watercolor">수채화 (Watercolor)</option>
        <option value="oil">유채화 (Oil Painting)</option>
        <option value="pencil">연필 (Pencil Sketch)</option>
        <option value="pastel">파스텔 (Pastel Texture)</option>
    </select>
    
    <button class="btn" style="border-color: #ffcc00; color: #ffcc00;" onclick="document.getElementById('bIn').click()">LOAD CUSTOM PNG ALPHA</button>
    <input type="file" id="bIn" accept="image/png" style="display:none" onchange="handleBrushPNG(this.files)">

    <h3>3. Real Painting Phase</h3>
    <div class="control-group">
      <label>DRAWING FOCUS</label>
      <select id="drawDirection">
          <option value="global">전체 캔버스 (Global Scatter)</option>
          <option value="diagonal">좌상 → 우하 방향성 (Diagonal)</option>
          <option value="horizontal">좌 → 우 방향성 (Horizontal)</option>
      </select>
    </div>
    <div class="control-group">
        <label>PHASE CONTROL <span class="val-label" id="phaseVal">AUTO</span></label>
        <select id="drawingPhase" onchange="document.getElementById('phaseVal').innerText=this.options[this.selectedIndex].text">
            <option value="auto">자동 진행 (7-Step Auto)</option>
            <option value="sketch">1. 밑그림 (Sketch)</option>
            <option value="coarse">2. 큰 덩어리 채색 (Coarse)</option>
            <option value="mid">3. 중간 요소 묘사 (Mid)</option>
            <option value="fine">4. 세부 묘사 (Fine)</option>
            <option value="light_shadow">5. 빛과 그림자 (Light & Shadow)</option>
            <option value="finish">6. 마무리 (Finish)</option>
        </select>
    </div>

    <div class="log-panel" style="margin-top: 10px;">
      <div>STYLE: <b id="logStyle">POINT</b></div>
      <div>AMP: <b id="logAmp">0.00</b></div>
      <div>PHASE: <b id="logPhase" style="color:var(--accent);">WAITING</b></div>
    </div>
  </div>

  <div class="viz-area">
    <canvas id="artCanvas"></canvas>
  </div>

  <div class="side-panel right">
    <h3>4. Image Transform</h3>
    <div class="control-group">
      <label>IMAGE OFFSET X / Y</label>
      <input type="range" id="imgX" min="-500" max="500" value="0" oninput="updateSamplingBuffer(); clearCanvas();">
      <input type="range" id="imgY" min="-500" max="500" value="0" oninput="updateSamplingBuffer(); clearCanvas();" style="margin-top:5px;">
    </div>
    <div class="control-group">
      <label>IMAGE SCALE <span class="val-label" id="imgScaleVal">1.0</span></label>
      <input type="range" id="imgScale" min="0.5" max="3.0" step="0.1" value="1.0" oninput="document.getElementById('imgScaleVal').innerText=this.value; updateSamplingBuffer(); clearCanvas();">
    </div>

    <h3>5. Rendering FX</h3>
    <div class="control-group">
      <label>DENSITY <span class="val-label" id="densityVal">100</span></label>
      <input type="range" id="density" min="1" max="800" value="100" oninput="document.getElementById('densityVal').innerText=this.value">
    </div>
    <div class="control-group">
      <label>BRUSH SCALE <span class="val-label" id="pScaleVal">1.0</span></label>
      <input type="range" id="paintScale" min="0.1" max="5.0" step="0.1" value="1.0" oninput="document.getElementById('pScaleVal').innerText=this.value">
    </div>
    <div class="control-group">
      <label>BRIGHTNESS <span class="val-label" id="brightVal">1.0</span></label>
      <input type="range" id="brightness" min="0.1" max="3.0" step="0.1" value="1.0" oninput="document.getElementById('brightVal').innerText=this.value">
    </div>
    <div class="control-group">
      <label>TRAIL (0=Cumulative) <span class="val-label" id="trailVal">0.00</span></label>
      <input type="range" id="trailPower" min="0" max="0.2" step="0.005" value="0.00" oninput="document.getElementById('trailVal').innerText=this.value">
    </div>

    <h3>6. Canvas Settings</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom:15px;">
        <button class="btn active" id="b169" onclick="setAspect('16:9')">16:9</button>
        <button class="btn" id="b916" onclick="setAspect('9:16')">9:16</button>
    </div>
    <div class="control-group">
      <label>CANVAS BG / BOUNDARY</label>
      <input type="color" id="canvasBg" value="#f4f4f4" oninput="clearCanvas()">
      <input type="color" id="boundaryColor" value="#00ffcc" oninput="clearCanvas()" style="margin-top:5px;">
    </div>

    <button class="btn primary" id="playBtn" onclick="togglePlay()">START ART PERFORMANCE</button>
    <button class="btn" onclick="clearCanvas()">CHECK REF & CLEAR</button>
    <button class="btn" onclick="saveArt()">SAVE STILL PNG</button>
  </div>
</div>

<div class="playbar">
    <div class="progress-container">
        <span id="currTime">00:00</span>
        <input type="range" id="progBar" value="0" min="0" max="100" step="0.1" onchange="seekAudio(this.value)">
        <span id="totalTime">00:00</span>
    </div>
</div>

<script>
let aspect = '16:9', audioCtx, analyser, source, audioBuffer, isPlaying = false, startTime = 0, pauseOffset = 0;
let sourceImgObj = null, customBrushImg = null;
let mediaRecorder, recordedChunks = [];

const canvas = document.getElementById('artCanvas'), ctx = canvas.getContext('2d', { alpha: false });
const samplingCanvas = document.createElement('canvas'), sCtx = samplingCanvas.getContext('2d', { willReadFrequently: true });
const tintCanvas = document.createElement('canvas'), tCtx = tintCanvas.getContext('2d');
const edgeCanvas = document.createElement('canvas'), eCtx = edgeCanvas.getContext('2d', { willReadFrequently: true });

let sImageData = null;
let eImageData = null;

function handleBrushPNG(files) {
    if(!files || files.length===0) return;
    const img = new Image();
    img.onload = () => { customBrushImg = img; tintCanvas.width = img.width; tintCanvas.height = img.height; document.getElementById('statusTag').innerText = "CUSTOM ALPHA LOADED"; };
    img.src = URL.createObjectURL(files[0]);
}

function handleImage(files) {
    if(!files || files.length===0) return;
    const img = new Image();
    img.onload = () => {
        sourceImgObj = img;
        updateSamplingBuffer();
        clearCanvas();
    };
    img.src = URL.createObjectURL(files[0]);
}

function updateSamplingBuffer() {
    if(!sourceImgObj) return;
    samplingCanvas.width = canvas.width; samplingCanvas.height = canvas.height;
    edgeCanvas.width = canvas.width; edgeCanvas.height = canvas.height;
    
    const imgScale = parseFloat(document.getElementById('imgScale').value);
    const mX = parseInt(document.getElementById('imgX').value);
    const mY = parseInt(document.getElementById('imgY').value);
    
    sCtx.fillStyle = "black";
    sCtx.fillRect(0, 0, samplingCanvas.width, samplingCanvas.height);
    
    const ratio = Math.min(canvas.width / sourceImgObj.width, canvas.height / sourceImgObj.height) * imgScale;
    const nw = sourceImgObj.width * ratio;
    const nh = sourceImgObj.height * ratio;
    const nx = (canvas.width - nw) / 2 + mX;
    const ny = (canvas.height - nh) / 2 + mY;
    
    sCtx.drawImage(sourceImgObj, nx, ny, nw, nh);
    sImageData = sCtx.getImageData(0, 0, samplingCanvas.width, samplingCanvas.height);
    extractEdges(sImageData, edgeCanvas.width, edgeCanvas.height);
}

// 윤곽선(Edge) 추출 엔진 (스케치 페이즈 용)
function extractEdges(imageData, width, height) {
    const data = imageData.data;
    const edgeData = new ImageData(width, height);
    const eData = edgeData.data;

    for (let y = 1; y < height - 1; y++) {
        for (let x = 1; x < width - 1; x++) {
            const idx = (y * width + x) * 4;
            const diff = Math.abs(data[idx - 4] - data[idx + 4]) + Math.abs(data[idx - width * 4] - data[idx + width * 4]);
            
            eData[idx] = 0; eData[idx+1] = 0; eData[idx+2] = 0;
            eData[idx+3] = diff > 40 ? 255 : 0; 
        }
    }
    eCtx.putImageData(edgeData, 0, 0);
    eImageData = eCtx.getImageData(0, 0, width, height);
}

function clearCanvas() {
    ctx.fillStyle = document.getElementById('canvasBg').value;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    if(sourceImgObj && !isPlaying) {
        ctx.save(); ctx.globalAlpha = 0.2;
        ctx.drawImage(samplingCanvas, 0, 0);
        ctx.restore();
    }
    ctx.strokeStyle = document.getElementById('boundaryColor').value;
    ctx.lineWidth = 1; ctx.strokeRect(1, 1, canvas.width-2, canvas.height-2);
}

function animate() {
    if(!isPlaying) return;
    requestAnimationFrame(animate);

    const nowTime = audioCtx.currentTime - startTime;
    let progress = 0;

    if (audioBuffer) {
        progress = nowTime / audioBuffer.duration;
        document.getElementById('progBar').value = progress * 100;
        document.getElementById('currTime').textContent = formatTime(nowTime);
        if(progress >= 1) { togglePlay(); return; }
    }

    const trail = parseFloat(document.getElementById('trailPower').value);
    if(trail > 0) {
        ctx.fillStyle = document.getElementById('canvasBg').value + Math.floor(trail * 255).toString(16).padStart(2, '0');
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const amp = (data.reduce((a, b) => a + b, 0) / data.length) / 255;
    document.getElementById('logAmp').innerText = amp.toFixed(2);

    if (amp > 0.03 && sImageData) { 
        drawProgressiveArt(amp, progress);
    }
}

function drawProgressiveArt(amp, progress) {
    const density = parseInt(document.getElementById('density').value);
    const drawDir = document.getElementById('drawDirection').value;
    let manualPhase = document.getElementById('drawingPhase').value;
    
    let currentPhase = manualPhase;
    // 7단계 실제 작화법 오토 페이즈 로직
    if (manualPhase === 'auto') {
        if (progress < 0.15) currentPhase = 'sketch';          // 1. 구상 및 밑그림
        else if (progress < 0.35) currentPhase = 'coarse';     // 2. 큰 덩어리 채색
        else if (progress < 0.55) currentPhase = 'mid';        // 3. 중간 요소 묘사
        else if (progress < 0.75) currentPhase = 'fine';       // 4. 세부 묘사
        else if (progress < 0.90) currentPhase = 'light_shadow';// 5. 빛과 그림자
        else currentPhase = 'finish';                          // 6. 마무리
    }
    document.getElementById('logPhase').innerText = currentPhase.toUpperCase();

    const numBrushes = Math.floor(amp * (density / 5));
    for(let i=0; i < numBrushes; i++) {
        let targetX, targetY;
        
        // 방향성 제어 (Global Scatter를 기본으로 하여 전체 캔버스 작화)
        if (drawDir === 'global') {
            targetX = Math.random() * canvas.width;
            targetY = Math.random() * canvas.height;
        } else if (drawDir === 'diagonal') {
            let lineX = progress * canvas.width;
            let lineY = progress * canvas.height;
            targetX = lineX + (Math.random() - 0.5) * canvas.width * 0.4;
            targetY = lineY + (Math.random() - 0.5) * canvas.height * 0.4;
        } else if (drawDir === 'horizontal') {
            let lineX = progress * canvas.width;
            targetX = lineX + (Math.random() - 0.5) * canvas.width * 0.3;
            targetY = Math.random() * canvas.height;
        }

        targetX = Math.max(0, Math.min(canvas.width - 1, Math.floor(targetX)));
        targetY = Math.max(0, Math.min(canvas.height - 1, Math.floor(targetY)));

        paintArt(targetX, targetY, amp, currentPhase);
    }
}

function paintArt(x, y, amp, phase) {
    const idx = (y * canvas.width + x) * 4;
    const sData = sImageData.data;
    
    let r = sData[idx], g = sData[idx+1], b = sData[idx+2], a = sData[idx+3] / 255;
    if(a < 0.1 && sourceImgObj) return;

    const bright = parseFloat(document.getElementById('brightness').value);
    let pScale = parseFloat(document.getElementById('paintScale').value);
    r = Math.min(255, r * bright); g = Math.min(255, g * bright); b = Math.min(255, b * bright);

    const style = document.getElementById('artStyle').value;

    ctx.save();
    ctx.translate(x, y);

    // --- PHASE별 드로잉 속성 정의 (진짜 그림 그리는 순서) ---
    if (phase === 'sketch') {
        const isEdge = eImageData && eImageData.data[idx+3] > 128;
        if (isEdge || Math.random() > 0.98) {
            ctx.strokeStyle = `rgba(100, 100, 100, ${0.1 + amp*0.5})`; // 연필 느낌
            ctx.lineWidth = (0.5 + amp) * pScale;
            const len = (10 + Math.random() * 20) * pScale;
            ctx.rotate(Math.random() * Math.PI);
            ctx.beginPath(); ctx.moveTo(-len, 0); ctx.lineTo(len, 0); ctx.stroke();
        }
        ctx.restore();
        return;
    } 
    else if (phase === 'coarse') {
        pScale *= 4; // 큰 붓
        ctx.globalAlpha = 0.15; // 옅은 투명도로 넓게 채움
    } 
    else if (phase === 'mid') {
        pScale *= 2; // 중간 붓
        ctx.globalAlpha = 0.4;
    } 
    else if (phase === 'fine') {
        pScale *= 1; // 기본 붓
        ctx.globalAlpha = 0.8;
    } 
    else if (phase === 'light_shadow') {
        // 빛과 그림자 (명암 대비)
        const luminance = 0.299*r + 0.587*g + 0.114*b;
        pScale *= 0.8;
        if (luminance > 180) { // 밝은 곳 (하이라이트)
            ctx.globalAlpha = 0.9;
            r=Math.min(255, r*1.2); g=Math.min(255, g*1.2); b=Math.min(255, b*1.2);
        } else if (luminance < 80) { // 어두운 곳 (그림자)
            ctx.globalAlpha = 0.9;
            r*=0.7; g*=0.7; b*=0.7;
        } else {
            ctx.restore(); return; // 중간톤은 스킵
        }
    } 
    else if (phase === 'finish') {
        pScale *= 0.5; // 가장 작은 붓으로 마무리 점찍기/선정리
        ctx.globalAlpha = 1.0;
    }

    // --- 스타일별 브러시 모양 렌더링 ---
    let brushSize = (3 + amp * 20) * pScale;

    switch(style) {
        case 'point':
            ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${ctx.globalAlpha})`;
            ctx.beginPath(); ctx.arc(0, 0, brushSize, 0, Math.PI*2); ctx.fill();
            break;
        case 'impression':
            ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${ctx.globalAlpha})`;
            ctx.rotate(Math.random() * Math.PI);
            ctx.fillRect(-(brushSize*1.5), -(brushSize*0.3), brushSize*3, brushSize*0.6);
            break;
        case 'grayscale':
            const gray = 0.299*r + 0.587*g + 0.114*b;
            ctx.fillStyle = `rgba(${gray}, ${gray}, ${gray}, ${ctx.globalAlpha})`;
            ctx.beginPath(); ctx.arc(0, 0, brushSize, 0, Math.PI*2); ctx.fill();
            break;
        case 'watercolor':
            ctx.globalAlpha *= 0.3; // 수채화는 더 투명하게
            ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
            for(let j=0; j<2; j++) {
                ctx.beginPath();
                ctx.arc((Math.random()-0.5)*brushSize, (Math.random()-0.5)*brushSize, brushSize*1.5, 0, Math.PI*2);
                ctx.fill();
            }
            break;
        case 'oil':
            ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${ctx.globalAlpha})`;
            ctx.lineWidth = brushSize;
            ctx.lineCap = 'round';
            ctx.rotate(Math.random() * 0.5);
            ctx.beginPath(); ctx.moveTo(-brushSize, 0); ctx.lineTo(brushSize*1.5, 0); ctx.stroke();
            break;
        case 'pencil':
            ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${ctx.globalAlpha * 0.5})`;
            ctx.lineWidth = 0.5 * pScale;
            for(let k=0; k<3; k++) {
                ctx.rotate(Math.random()*0.2);
                ctx.beginPath(); ctx.moveTo(-brushSize, -brushSize); ctx.lineTo(brushSize, brushSize); ctx.stroke();
            }
            break;
        case 'pastel':
            ctx.shadowBlur = brushSize;
            ctx.shadowColor = `rgb(${r}, ${g}, ${b})`;
            ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${ctx.globalAlpha * 0.7})`;
            ctx.beginPath(); ctx.arc(0, 0, brushSize*0.8, 0, Math.PI*2); ctx.fill();
            break;
    }
    
    // 커스텀 PNG 브러시 렌더링
    if(customBrushImg && style === 'point') {
        const size = brushSize * 2;
        tCtx.globalCompositeOperation = 'source-over';
        tCtx.clearRect(0,0,tintCanvas.width, tintCanvas.height);
        tCtx.drawImage(customBrushImg, 0, 0);
        tCtx.globalCompositeOperation = 'source-in';
        tCtx.fillStyle = `rgba(${r},${g},${b}, ${ctx.globalAlpha})`;
        tCtx.fillRect(0,0,tintCanvas.width, tintCanvas.height);
        ctx.drawImage(tintCanvas, -size/2, -size/2, size, size);
    }

    ctx.restore();
}

async function togglePlay() {
    if(!audioBuffer) return alert("MP3 파일을 로드하세요.");
    if(audioCtx.state === 'suspended') await audioCtx.resume();

    if(isPlaying) {
        isPlaying = false; source.stop(); if(mediaRecorder) mediaRecorder.stop();
        document.getElementById('playBtn').textContent = "START ART PERFORMANCE";
    } else {
        source = audioCtx.createBufferSource(); source.buffer = audioBuffer;
        analyser = audioCtx.createAnalyser(); analyser.fftSize = 512;
        source.connect(analyser); analyser.connect(audioCtx.destination);
        
        const prog = document.getElementById('progBar').value;
        pauseOffset = (prog / 100) * audioBuffer.duration;
        
        source.start(0, pauseOffset); 
        startTime = audioCtx.currentTime - pauseOffset;
        isPlaying = true; 
        document.getElementById('playBtn').textContent = "STOP & SAVE MP4";
        
        if(pauseOffset === 0) {
            updateSamplingBuffer();
            clearCanvas();
        }
        
        animate(); startRecording();
    }
}

function seekAudio(val) { if(isPlaying) togglePlay().then(() => togglePlay()); }
function startRecording() {
    recordedChunks = [];
    const stream = canvas.captureStream(30);
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
    mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
    mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/mp4' });
        const now = new Date();
        const dateStr = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0') + "_" + String(now.getHours()).padStart(2, '0') + String(now.getMinutes()).padStart(2, '0');
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `SpectrumArt_${dateStr}.mp4`; a.click();
    };
    mediaRecorder.start();
}

function formatTime(s) { const mins = Math.floor(s / 60); const secs = Math.floor(s % 60); return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`; }
function handleMusic(f) { 
    if(!f || f.length===0) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const r = new FileReader(); r.onload = (e) => audioCtx.decodeAudioData(e.target.result, (b) => { audioBuffer = b; document.getElementById('totalTime').textContent = formatTime(b.duration); }); r.readAsArrayBuffer(f[0]); 
}
function setAspect(r) { 
    aspect = r;
    document.getElementById('b169').classList.toggle('active', r === '16:9');
    document.getElementById('b916').classList.toggle('active', r === '9:16');
    resize(); 
}
function resize() { 
    const p = canvas.parentElement; 
    const pw = p.clientWidth - 40, ph = p.clientHeight - 40;
    if (aspect === '16:9') { canvas.width = Math.min(pw, ph * 1.77); canvas.height = canvas.width / 1.77; }
    else { canvas.height = Math.min(ph, pw * 0.56); canvas.width = canvas.height * 0.56; }
    updateSamplingBuffer();
    clearCanvas();
}
window.onresize = resize; resize();
function saveArt() { const a = document.createElement('a'); a.download=`FineArt_Still.png`; a.href=canvas.toDataURL(); a.click(); }
</script>
</body>
