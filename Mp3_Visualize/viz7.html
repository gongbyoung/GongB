<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM ART LAB v18.0 — Sequence Art Director</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#050505; --panel:#0d0d12; --accent:#00ffcc; --border:rgba(255,255,255,0.06); --text:#ffffff; --pink:#ff3e81; }
body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo{letter-spacing:4px; color:var(--accent); font-weight:800; font-size:12px;}
.container { display: grid; grid-template-columns: 320px 1fr 340px; flex: 1; min-height: 0; }
.side-panel { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }
.side-panel.right { border-right:none; border-left: 1px solid var(--border); }

.viz-area { position: relative; background: #000; overflow: hidden; flex: 1; display: flex; justify-content: center; align-items: center; }
#artCanvas { background: #000; box-shadow: 0 0 30px rgba(0,0,0,1); }

/* SEQUENCE LIST */
.seq-item { background: #1a1a24; padding: 12px; border-radius: 6px; margin-bottom: 10px; border-left: 4px solid var(--accent); position: relative; }
.seq-item.active { border-color: var(--pink); background: #251a2a; }
.seq-info { font-size: 10px; color: #aaa; display: flex; gap: 10px; margin-top: 5px; }
.seq-info input { width: 50px; background: #000; border: 1px solid #444; color: var(--accent); font-size: 10px; padding: 2px 4px; }
.seq-remove { position: absolute; top: 5px; right: 8px; color: #ff4444; cursor: pointer; font-size: 12px; font-weight: bold; }

.playbar { height: 70px; background: var(--panel); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 15px; flex-shrink: 0; }
.progress-container { flex: 1; display: flex; align-items: center; gap: 10px; font-family: monospace; font-size: 12px; color: var(--accent); }
#progBar { flex: 1; accent-color: var(--accent); cursor: pointer; }

h3 { font-size: 10px; color: #555; margin-bottom: 10px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-top: 10px;}
.control-group { margin-bottom: 10px; }
.control-group label { display: block; font-size: 9px; color: #777; margin-bottom: 4px; }
.val-label { float: right; color: var(--accent); }
input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; height: 3px;}
select { width: 100%; background: #000; border: 1px solid #333; color: var(--accent); padding: 8px; border-radius: 4px; font-size: 11px; outline: none; margin-bottom: 8px;}

.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 8px; cursor: pointer; font-size: 10px; border-radius: 4px; width: 100%; margin-bottom: 5px; }
.btn.primary { background: var(--accent); color: #000; border: none; font-weight: bold; font-size: 11px; padding: 12px; margin-top: 5px;}
.btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.05); }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">ART LAB v18.0 — SEQUENCE DIRECTOR</div>
  <div id="statusTag" style="font-size: 10px; color: #555;">SEQUENCE ENGINE READY</div>
</div>

<div class="container">
  <div class="side-panel">
    <h3>1. Assets Loading</h3>
    <button class="btn" onclick="document.getElementById('mIn').click()">LOAD MP3 AUDIO</button>
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleMusic(this.files)">
    <button class="btn primary" onclick="document.getElementById('iIn').click()">+ ADD IMAGE TO SEQUENCE</button>
    <input type="file" id="iIn" accept="image/*" style="display:none" onchange="handleImageAdd(this.files)">
    
    <h3>2. Art Style (Brush)</h3>
    <select id="artStyle">
        <option value="oil">유채화 (Impasto Oil)</option>
        <option value="impression">인상주의 (Impressionist)</option>
        <option value="pencil">연필화 (Graphite)</option>
        <option value="watercolor">수채화 (Watercolor)</option>
    </select>

    <h3>3. Active Sequence</h3>
    <div id="sequenceList">
      <div style="font-size:11px; color:#444; text-align:center; padding:20px;">No images loaded.</div>
    </div>
  </div>

  <div class="viz-area">
    <canvas id="artCanvas"></canvas>
  </div>

  <div class="side-panel right">
    <h3>4. Image Geometry</h3>
    <div class="control-group">
      <label>GLOBAL SCALE <span class="val-label" id="imgScaleVal">1.0</span></label>
      <input type="range" id="imgScale" min="0.5" max="3.0" step="0.1" value="1.0" oninput="document.getElementById('imgScaleVal').innerText=this.value; updateSamplingBuffer();">
    </div>

    <h3>5. Rendering Control</h3>
    <div class="control-group">
      <label>DENSITY <span class="val-label" id="densityVal">150</span></label>
      <input type="range" id="density" min="10" max="800" value="150" oninput="document.getElementById('densityVal').innerText=this.value">
    </div>
    <div class="control-group">
      <label>BRUSH SIZE <span class="val-label" id="pScaleVal">1.0</span></label>
      <input type="range" id="paintScale" min="0.1" max="5.0" step="0.1" value="1.0" oninput="document.getElementById('pScaleVal').innerText=this.value">
    </div>
    <div class="control-group">
      <label>TRAIL (0=Cumulative)</label>
      <input type="range" id="trailPower" min="0" max="0.2" step="0.005" value="0.00">
    </div>

    <h3>6. Canvas Settings</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom:10px;">
        <button class="btn active" id="b169" onclick="setAspect('16:9')">16:9</button>
        <button class="btn" id="b916" onclick="setAspect('9:16')">9:16</button>
    </div>
    <input type="color" id="canvasBg" value="#f0f0f0" style="width:100%; height:25px; border:none; margin-bottom:10px;" oninput="clearCanvas()">

    <button class="btn primary" id="playBtn" onclick="togglePlay()">START SEQUENCE PERFORMANCE</button>
    <button class="btn" onclick="clearCanvas()">CLEAR CANVAS</button>
    <button class="btn" onclick="saveArt()">STILL PNG</button>

    <div id="logArea" style="margin-top:auto;" class="seq-item">
      <div style="font-size:10px; color:var(--accent);">REALTIME ANALYTICS</div>
      <div id="curTargetImg" style="font-size:11px; margin-top:5px;">Waiting for signal...</div>
    </div>
  </div>
</div>

<div class="playbar">
    <div class="progress-container">
        <span id="currTime">00:00</span>
        <input type="range" id="progBar" value="0" min="0" max="100" step="0.1" oninput="seekPreview(this.value)">
        <span id="totalTime">00:00</span>
    </div>
</div>

<script>
let aspect = '16:9', audioCtx, analyser, source, audioBuffer, isPlaying = false, startTime = 0, pauseOffset = 0;
let sequences = []; // {img, start, end, targetCompletion, sCanvas, sData, eData}
let currentActiveIdx = -1;

const canvas = document.getElementById('artCanvas'), ctx = canvas.getContext('2d', { alpha: false });

function handleImageAdd(files) {
    if(!files || files.length === 0) return;
    const img = new Image();
    img.onload = () => {
        const sCanvas = document.createElement('canvas');
        const eCanvas = document.createElement('canvas');
        const defaultDuration = audioBuffer ? audioBuffer.duration / 4 : 30;
        const lastEnd = sequences.length > 0 ? sequences[sequences.length-1].end : 0;

        const newSeq = {
            img: img,
            name: files[0].name,
            start: lastEnd,
            end: lastEnd + defaultDuration,
            targetCompletion: 100,
            sCanvas: sCanvas,
            eCanvas: eCanvas,
            sData: null,
            eData: null
        };
        sequences.push(newSeq);
        updateSamplingBuffer(newSeq);
        renderSequenceList();
    };
    img.src = URL.createObjectURL(files[0]);
}

function renderSequenceList() {
    const list = document.getElementById('sequenceList');
    list.innerHTML = "";
    sequences.forEach((seq, idx) => {
        const div = document.createElement('div');
        div.className = `seq-item ${idx === currentActiveIdx ? 'active' : ''}`;
        div.innerHTML = `
            <div class="seq-remove" onclick="removeSeq(${idx})">×</div>
            <div style="font-weight:bold; font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${idx+1}. ${seq.name}</div>
            <div class="seq-info">
                <span>START: <input type="number" value="${seq.start.toFixed(1)}" onchange="updateSeq(${idx}, 'start', this.value)">s</span>
                <span>END: <input type="number" value="${seq.end.toFixed(1)}" onchange="updateSeq(${idx}, 'end', this.value)">s</span>
            </div>
            <div class="seq-info">
                <span>TARGET DONE: <input type="number" value="${seq.targetCompletion}" onchange="updateSeq(${idx}, 'targetCompletion', this.value)">%</span>
            </div>
        `;
        list.appendChild(div);
    });
}

function updateSeq(idx, prop, val) {
    sequences[idx][prop] = parseFloat(val);
    if(prop === 'start' || prop === 'end') sequences.sort((a,b) => a.start - b.start);
    renderSequenceList();
}

function removeSeq(idx) {
    sequences.splice(idx, 1);
    renderSequenceList();
}

function updateSamplingBuffer(seq) {
    const sCanvas = seq.sCanvas;
    const eCanvas = seq.eCanvas;
    sCanvas.width = canvas.width; sCanvas.height = canvas.height;
    eCanvas.width = canvas.width; eCanvas.height = canvas.height;
    
    const sCtx = sCanvas.getContext('2d');
    const eCtx = eCanvas.getContext('2d');
    const imgScale = parseFloat(document.getElementById('imgScale').value);
    
    sCtx.fillStyle = "black";
    sCtx.fillRect(0, 0, sCanvas.width, sCanvas.height);
    
    const ratio = Math.min(canvas.width / seq.img.width, canvas.height / seq.img.height) * imgScale;
    const nw = seq.img.width * ratio;
    const nh = seq.img.height * ratio;
    const nx = (canvas.width - nw) / 2;
    const ny = (canvas.height - nh) / 2;
    
    sCtx.drawImage(seq.img, nx, ny, nw, nh);
    seq.sData = sCtx.getImageData(0, 0, sCanvas.width, sCanvas.height);
    
    // Edge extraction for sketch
    const data = seq.sData.data;
    const edgeData = new ImageData(sCanvas.width, sCanvas.height);
    for (let y = 1; y < sCanvas.height - 1; y++) {
        for (let x = 1; x < sCanvas.width - 1; x++) {
            const i = (y * sCanvas.width + x) * 4;
            const diff = Math.abs(data[i] - data[i+4]) + Math.abs(data[i] - data[i + sCanvas.width*4]);
            edgeData.data[i+3] = diff > 40 ? 255 : 0;
        }
    }
    eCtx.putImageData(edgeData, 0, 0);
    seq.eData = eCtx.getImageData(0, 0, sCanvas.width, sCanvas.height);
}

function clearCanvas() {
    ctx.fillStyle = document.getElementById('canvasBg').value;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function animate() {
    if(!isPlaying) return;
    requestAnimationFrame(animate);

    const nowTime = audioCtx.currentTime - startTime;
    if (audioBuffer) {
        document.getElementById('progBar').value = (nowTime / audioBuffer.duration) * 100;
        document.getElementById('currTime').textContent = formatTime(nowTime);
    }

    const trail = parseFloat(document.getElementById('trailPower').value);
    if(trail > 0) {
        ctx.fillStyle = document.getElementById('canvasBg').value + Math.floor(trail * 255).toString(16).padStart(2, '0');
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const amp = (data.reduce((a, b) => a + b, 0) / data.length) / 255;

    // 시퀀스 엔진 핵심: 현재 시간에 맞는 이미지 찾기
    const seqIdx = sequences.findIndex(s => nowTime >= s.start && nowTime <= s.end);
    if(seqIdx !== -1) {
        if(seqIdx !== currentActiveIdx) {
            currentActiveIdx = seqIdx;
            renderSequenceList();
            document.getElementById('curTargetImg').innerText = `Drawing: ${sequences[seqIdx].name}`;
        }
        
        const seq = sequences[seqIdx];
        const seqDuration = seq.end - seq.start;
        const seqElapsed = nowTime - seq.start;
        const rawProgress = seqElapsed / seqDuration; // 0.0 ~ 1.0
        // 사용자가 설정한 최종 완성도(%)를 진행도에 반영
        const targetProgress = rawProgress * (seq.targetCompletion / 100);
        
        drawArt(amp, seq, targetProgress);
    }
}

function drawArt(amp, seq, progress) {
    const density = parseInt(document.getElementById('density').value);
    const num = Math.floor(amp * density);
    const pScale = parseFloat(document.getElementById('paintScale').value);
    const style = document.getElementById('artStyle').value;

    // 7단계 작화 로직 (10%씩 분배된 스케쥴러)
    let phase = 'done';
    let phaseProg = 0;
    if (progress <= 0.1) { phase = 'sketch'; phaseProg = progress / 0.1; }
    else if (progress <= 0.2) { phase = 'coarse'; phaseProg = (progress - 0.1) / 0.1; }
    else if (progress <= 0.4) { phase = 'mid'; phaseProg = (progress - 0.2) / 0.2; }
    else if (progress <= 0.6) { phase = 'fine'; phaseProg = (progress - 0.4) / 0.2; }
    else if (progress <= 0.7) { phase = 'shadow'; phaseProg = (progress - 0.6) / 0.1; }
    else if (progress <= 0.8) { phase = 'finish'; phaseProg = (progress - 0.7) / 0.1; }

    if(phase === 'done') return;

    for(let i=0; i<num; i++) {
        const x = Math.floor(Math.random() * canvas.width);
        const y = Math.floor(Math.random() * canvas.height);
        const idx = (y * canvas.width + x) * 4;
        
        if(!seq.sData) continue;
        const r = seq.sData.data[idx], g = seq.sData.data[idx+1], b = seq.sData.data[idx+2], a = seq.sData.data[idx+3];
        if(a < 10) continue;

        ctx.save();
        ctx.translate(x, y);

        if (phase === 'sketch') {
            // 십자 가이드 (매우 초반)
            if(progress < 0.02 && (Math.abs(x - canvas.width/2) < 2 || Math.abs(y - canvas.height/2) < 2)) {
                ctx.strokeStyle = `rgba(150,150,150,0.1)`; ctx.strokeRect(-20, -20, 40, 40);
            }
            if(seq.eData.data[idx+3] > 128) {
                ctx.strokeStyle = `rgba(100,100,100,0.4)`; ctx.rotate(Math.random()*PI);
                ctx.beginPath(); ctx.moveTo(-5,0); ctx.lineTo(5,0); ctx.stroke();
            }
        } else {
            // 경계면 우선 채색 로직
            const isEdge = seq.eData.data[idx+3] > 128;
            if(!isEdge && Math.random() > phaseProg) { ctx.restore(); continue; }

            let sizeMul = 1;
            let alphaMul = 1;
            if(phase === 'coarse') { sizeMul = 5; alphaMul = 0.2; }
            else if(phase === 'mid') { sizeMul = 2.5; alphaMul = 0.5; }
            else if(phase === 'shadow') { alphaMul = 0.8; }

            const finalSize = (3 + amp * 20) * pScale * sizeMul;
            // 인상파 색상 지터링
            const jr = r + (Math.random()-0.5)*30;
            const jg = g + (Math.random()-0.5)*30;
            const jb = b + (Math.random()-0.5)*30;

            ctx.fillStyle = `rgba(${jr},${jg},${jb},${alphaMul})`;
            if(style === 'oil' || style === 'impression') {
                ctx.rotate(Math.random()*TWO_PI);
                ctx.fillRect(-finalSize, -finalSize/3, finalSize*2, finalSize/1.5);
            } else {
                ctx.beginPath(); ctx.arc(0,0, finalSize, 0, TWO_PI); ctx.fill();
            }
        }
        ctx.restore();
    }
}

async function togglePlay() {
    if(!audioBuffer) return alert("음악을 먼저 로드하세요.");
    if(audioCtx.state === 'suspended') await audioCtx.resume();
    if(isPlaying) {
        isPlaying = false; source.stop(); if(mediaRecorder) mediaRecorder.stop();
        document.getElementById('playBtn').textContent = "START SEQUENCE";
    } else {
        source = audioCtx.createBufferSource(); source.buffer = audioBuffer;
        analyser = audioCtx.createAnalyser(); analyser.fftSize = 512;
        source.connect(analyser); analyser.connect(audioCtx.destination);
        source.start(0, pauseOffset); startTime = audioCtx.currentTime - pauseOffset;
        isPlaying = true; document.getElementById('playBtn').textContent = "STOP & SAVE";
        animate(); startRecording();
    }
}

function seekPreview(val) {
    pauseOffset = (val / 100) * (audioBuffer ? audioBuffer.duration : 100);
    document.getElementById('valTime').innerText = pauseOffset.toFixed(1);
    if(!isPlaying) {
        // 프리뷰 시 해당 시간대의 그림을 보여줌 (필요시 clearCanvas() 후 다시 그리기 로직 추가 가능)
    }
}

function handleMusic(f) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const r = new FileReader(); r.onload = (e) => audioCtx.decodeAudioData(e.target.result, (b) => { 
        audioBuffer = b; document.getElementById('totalTime').textContent = formatTime(b.duration);
        document.getElementById('timeline').max = b.duration;
    }); r.readAsArrayBuffer(f[0]);
}

function startRecording() {
    recordedChunks = [];
    const stream = canvas.captureStream(30);
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
    mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
    mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/mp4' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `SequenceArt_${Date.now()}.mp4`; a.click();
    };
    mediaRecorder.start();
}

function setAspect(r) { aspect = r; resize(); }
function resize() {
    const p = canvas.parentElement; 
    const pw = p.clientWidth - 40, ph = p.clientHeight - 40;
    if (aspect === '16:9') { canvas.width = Math.min(pw, ph * 1.77); canvas.height = canvas.width / 1.77; }
    else { canvas.height = Math.min(ph, pw * 0.56); canvas.width = canvas.height * 0.56; }
    sequences.forEach(s => updateSamplingBuffer(s));
    clearCanvas();
}
function formatTime(s) { const mins = Math.floor(s / 60); const secs = Math.floor(s % 60); return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`; }
function saveArt() { const a = document.createElement('a'); a.download=`Sequence_Still.png`; a.href=canvas.toDataURL(); a.click(); }
window.onresize = resize; resize();
const PI = Math.PI, TWO_PI = Math.PI * 2;
</script>
</body>
</html>
