<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>ART LAB v18.4 — Perfect Closure Edition</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#050505; --panel:#0d0d12; --accent:#00ffcc; --border:rgba(255,255,255,0.08); --text:#ffffff; }
body{ background:var(--bg); color:var(--text); font-family:sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo{letter-spacing:4px; color:var(--accent); font-weight:800; font-size:12px;}
.container { display: grid; grid-template-columns: 350px 1fr 320px; flex: 1; min-height: 0; }
.side-panel { background: var(--panel); padding: 15px; overflow-y: auto; border-right: 1px solid var(--border); }
.side-panel.right { border-right:none; border-left: 1px solid var(--border); }

.seq-item { background: #16161d; padding: 12px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #222; cursor: pointer; }
.seq-item.active { border-color: var(--accent); background: #1a2523; }
.seq-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
.time-input { background:#000; border:1px solid #333; color:var(--accent); width:70px; padding:2px; font-size:11px; text-align:center; }

.viz-area { background: #000; flex: 1; display: flex; justify-content: center; align-items: center; }
canvas { box-shadow: 0 0 50px rgba(0,0,0,1); }

h3 { font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 8px; cursor: pointer; font-size: 10px; border-radius: 4px; width: 100%; margin-bottom: 5px; }
.btn.primary { background: var(--accent); color: #000; font-weight: bold; border:none; margin-top:10px; padding:12px;}
.btn.active { border-color: var(--accent); color: var(--accent); }
input[type=range] { width: 100%; accent-color: var(--accent); height: 3px; cursor: pointer; }
label { font-size: 9px; color: #777; display:block; margin-top:8px;}
</style>
</head>
<body>

<div class="topbar">
    <div class="logo">ART LAB v18.4 Perfect Closure</div>
    <div id="status">READY</div>
</div>

<div class="container">
    <div class="side-panel">
        <h3>1. Audio & Sequence</h3>
        <button class="btn" onclick="document.getElementById('mIn').click()">🎵 LOAD MP3</button>
        <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleMusic(this.files)">
        <button class="btn primary" onclick="document.getElementById('iIn').click()">🖼️ ADD IMAGE</button>
        <input type="file" id="iIn" accept="image/*" style="display:none" onchange="handleImageAdd(this.files)">
        <div id="sequenceList" style="margin-top:15px;"></div>
    </div>

    <div class="viz-area" id="vArea"></div>

    <div class="side-panel right">
        <h3>2. Global Config</h3>
        <div style="display: flex; gap:5px; margin-bottom:15px;">
            <button class="btn active" id="b169" onclick="setAspect('16:9')">16:9</button>
            <button class="btn" id="b916" onclick="setAspect('9:16')">9:16</button>
        </div>
        <label>DENSITY</label><input type="range" id="density" min="10" max="1000" value="350">
        <label>BRUSH SCALE</label><input type="range" id="paintScale" min="0.1" max="5.0" step="0.1" value="1.0">
        
        <h3>3. Active Transform</h3>
        <div id="seqUI" style="opacity: 0.3; pointer-events: none;">
            <label>IMAGE SCALE <span id="txtS">1.0</span></label>
            <input type="range" id="curScale" min="0.1" max="4.0" step="0.05" value="1.0" oninput="updateCurSeq()">
            <label>OFFSET X <span id="txtX">0</span></label>
            <input type="range" id="curX" min="-800" max="800" value="0" oninput="updateCurSeq()">
            <label>OFFSET Y <span id="txtY">0</span></label>
            <input type="range" id="curY" min="-800" max="800" value="0" oninput="updateCurSeq()">
        </div>

        <button class="btn primary" id="recBtn" onclick="togglePlay()" style="margin-top:20px;">🔴 START REC & PLAY</button>
        <button class="btn" onclick="clearCanvas()">CLEAR CANVAS</button>
    </div>
</div>

<script>
let audio, analyser, isPlaying = false, sequences = [], currentActiveIdx = -1;
let aspect = '16:9', canvasW = 1280, canvasH = 720;
let recorder, recordedChunks = [];

function setup() {
    let cnv = createCanvas(canvasW, canvasH);
    cnv.parent('vArea');
    pixelDensity(1);
    background(240);
}

function handleMusic(files) {
    if(!files[0]) return;
    audio = loadSound(URL.createObjectURL(files[0]), (b)=>{
        document.getElementById('status').innerText = "AUDIO LOADED";
    });
    analyser = new p5.FFT();
}

function handleImageAdd(files) {
    if(!files[0]) return;
    loadImage(URL.createObjectURL(files[0]), (img) => {
        let lastEnd = sequences.length > 0 ? sequences[sequences.length-1].end : 0;
        let newSeq = {
            img: img, name: files[0].name,
            start: lastEnd, end: lastEnd + 10,
            style: 'oil', scale: 1.0, x: 0, y: 0,
            sData: null, eData: null
        };
        sequences.push(newSeq);
        currentActiveIdx = sequences.length - 1;
        processImageData(newSeq);
        renderSeqList();
        enableUI(true);
    });
}

function renderSeqList() {
    const list = document.getElementById('sequenceList');
    list.innerHTML = "";
    sequences.forEach((s, i) => {
        let div = document.createElement('div');
        div.className = `seq-item ${i === currentActiveIdx ? 'active' : ''}`;
        div.onclick = () => selectSeq(i);
        div.innerHTML = `
            <div class="seq-info">
                <span style="font-size:11px; color:#fff;">${i+1}. ${s.name}</span>
                <input class="time-input" type="number" value="${s.end}" onchange="cascadeTime(${i}, this.value)">
            </div>
            <div style="font-size:9px; color:#555;">Start: ${s.start.toFixed(1)}s | End: ${s.end.toFixed(1)}s (Done at 80%)</div>
        `;
        list.appendChild(div);
    });
}

function cascadeTime(idx, val) {
    sequences[idx].end = Number(val);
    for(let i = idx + 1; i < sequences.length; i++) {
        sequences[i].start = sequences[i-1].end;
        sequences[i].end = sequences[i].start + 10;
    }
    renderSeqList();
}

function selectSeq(i) {
    currentActiveIdx = i;
    enableUI(true);
    let s = sequences[i];
    document.getElementById('curScale').value = s.scale;
    document.getElementById('curX').value = s.x;
    document.getElementById('curY').value = s.y;
    renderSeqList();
}

function updateCurSeq() {
    if(currentActiveIdx < 0) return;
    let s = sequences[currentActiveIdx];
    s.scale = Number(document.getElementById('curScale').value);
    s.x = Number(document.getElementById('curX').value);
    s.y = Number(document.getElementById('curY').value);
    document.getElementById('txtS').innerText = s.scale;
    document.getElementById('txtX').innerText = s.x;
    document.getElementById('txtY').innerText = s.y;
    processImageData(s);
}

function processImageData(seq) {
    let temp = createGraphics(width, height);
    temp.background(0);
    let r = Math.min(width/seq.img.width, height/seq.img.height) * seq.scale;
    temp.imageMode(CENTER);
    temp.image(seq.img, width/2 + seq.x, height/2 + seq.y, seq.img.width*r, seq.img.height*r);
    seq.sData = temp.get();
    let edge = createGraphics(width, height);
    edge.image(seq.sData, 0, 0);
    edge.filter(THRESHOLD, 0.1); 
    seq.eData = edge.get();
    temp.remove(); edge.remove();
}

function draw() {
    if(!isPlaying && currentActiveIdx !== -1) {
        background(240); tint(255, 100);
        image(sequences[currentActiveIdx].sData, 0, 0); noTint();
        return;
    }
    
    if(isPlaying) {
        let t = audio.currentTime();
        let idx = sequences.findIndex(s => t >= s.start && t <= s.end);
        if(idx !== -1) {
            let s = sequences[idx];
            // [v18.4 핵심] 진행도를 0.8로 나누어 80% 시점에서 1.0(완성)이 되게 함
            let rawProg = (t - s.start) / (s.end - s.start);
            let progress = min(1.0, rawProg / 0.8); 
            
            let amp = analyser.getEnergy(20, 200) / 255;
            if(progress < 1.0) paint(s, progress, amp);
        }
    }
}

function paint(seq, prog, amp) {
    let dens = Number(document.getElementById('density').value) * (amp + 0.2);
    let pScale = Number(document.getElementById('paintScale').value);
    
    let phase = 'done';
    if(prog <= 0.1) phase = 'sketch';
    else if(prog <= 0.2) phase = 'coarse';
    else if(prog <= 0.4) phase = 'mid';
    else if(prog <= 0.6) phase = 'fine';
    else if(prog <= 0.7) phase = 'shadow';
    else if(prog <= 0.9) phase = 'finish'; // 80% 즈음 마무리
    if(phase === 'done') return;

    for(let i=0; i<dens/8; i++) {
        let x = floor(random(width)), y = floor(random(height));
        let col = seq.sData.get(x, y);
        if(alpha(col) < 20) continue;

        push();
        translate(x, y);
        if(phase === 'sketch') {
            if(alpha(seq.eData.get(x, y)) > 128) {
                stroke(100, 150); rotate(random(PI)); line(-8, 0, 8, 0);
            }
        } else {
            let sMul = (phase==='coarse')? 5 : (phase==='mid'? 2.5 : 1);
            let a = (phase==='coarse')? 40 : 180;
            noStroke(); fill(red(col), green(col), blue(col), a);
            rotate(random(TWO_PI));
            rect(-10*pScale*sMul, -3*pScale*sMul, 20*pScale*sMul, 6*pScale*sMul);
        }
        pop();
    }
}

function togglePlay() {
    if(!audio) return alert("LOAD MP3");
    if(isPlaying) {
        audio.stop(); isPlaying = false; recorder.stop();
        document.getElementById('recBtn').innerText = "🔴 START REC & PLAY";
    } else {
        clearCanvas(); startRecording(); audio.play(); isPlaying = true;
        document.getElementById('recBtn').innerText = "⏹ STOP & SAVE";
    }
}

function startRecording() {
    recordedChunks = [];
    let stream = document.querySelector('canvas').captureStream(30);
    recorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
    recorder.ondataavailable = e => recordedChunks.push(e.data);
    recorder.onstop = () => {
        let blob = new Blob(recordedChunks, { type: 'video/mp4' });
        let a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `PerfectArt_v18.4_${Date.now()}.mp4`; a.click();
    };
    recorder.start();
}

function setAspect(r) {
    aspect = r;
    document.getElementById('b169').classList.toggle('active', r==='16:9');
    document.getElementById('b916').classList.toggle('active', r==='9:16');
    if(r==='16:9') { canvasW = 1280; canvasH = 720; } else { canvasW = 720; canvasH = 1280; }
    resizeCanvas(canvasW, canvasH);
    sequences.forEach(s => processImageData(s));
    clearCanvas();
}

function enableUI(on) { 
    let ui = document.getElementById('seqUI');
    ui.style.opacity = on ? "1" : "0.3"; ui.style.pointerEvents = on ? "all" : "none";
}
function clearCanvas() { background(240); }
</script>
</body>
</html>
