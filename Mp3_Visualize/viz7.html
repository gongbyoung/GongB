<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>ART LAB v18.15 — Physical Wiping Protocol</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#050505; --panel:#0d0d12; --accent:#00ffcc; --border:rgba(255,255,255,0.08); --text:#ffffff; }
body{ background:var(--bg); color:var(--text); font-family:sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo{letter-spacing:4px; color:var(--accent); font-weight:800; font-size:12px;}
.container { display: grid; grid-template-columns: 350px 1fr 340px; flex: 1; min-height: 0; }
.side-panel { background: var(--panel); padding: 15px; overflow-y: auto; border-right: 1px solid var(--border); }
.side-panel.right { border-right:none; border-left: 1px solid var(--border); }

.seq-item { background: #16161d; padding: 12px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #222; cursor: pointer; transition: 0.2s; }
.seq-item.active { border-color: var(--accent); background: #1a2523; box-shadow: 0 0 10px rgba(0,255,204,0.1); }
.seq-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.time-input { background:#000; border:1px solid #444; color:var(--accent); width:65px; padding:4px; font-size:12px; text-align:center; border-radius:4px; font-family:monospace; }
.time-input:focus { border-color:var(--accent); outline:none; }
.seq-style-row { display: flex; gap:5px; margin-top:5px; }

.viz-area { background: #000; flex: 1; display: flex; justify-content: center; align-items: center; overflow:hidden; }
canvas { box-shadow: 0 0 50px rgba(0,0,0,1); }

h3 { font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 10px; cursor: pointer; font-size: 11px; border-radius: 4px; width: 100%; margin-bottom: 5px; transition: 0.2s; }
.btn:hover { background: rgba(255,255,255,0.05); }
.btn.primary { background: var(--accent); color: #000; font-weight: bold; border:none; margin-top:10px; padding:12px;}
.btn.primary:hover { background: #00e6b8; }
.btn.active { border-color: var(--accent); color: var(--accent); }

input[type=range] { width: 100%; accent-color: var(--accent); height: 4px; cursor: pointer; margin-bottom: 10px;}
label { font-size: 9px; color: #888; display:block; margin-bottom:3px; margin-top:8px;}
select { width:100%; background:#000; color:var(--accent); border:1px solid #333; font-size:11px; padding:6px; border-radius:4px; margin-bottom:8px;}
.val-label { float: right; color: var(--accent); font-weight: bold; }

#audioInfo { font-family: monospace; font-size: 11px; color: #ffcc00; margin-bottom: 15px; padding: 8px; background: rgba(255,204,0,0.1); border-radius: 4px; display: none; text-align: center;}
</style>
</head>
<body>

<div class="topbar">
    <div class="logo">ART LAB v18.15 PHYSICAL WIPE</div>
    <div id="status" style="font-size:10px; color:var(--accent);">STANDBY</div>
</div>

<div class="container">
    <div class="side-panel">
        <h3>1. Audio & Sequence</h3>
        <button class="btn" onclick="document.getElementById('mIn').click()">🎵 1. LOAD MP3 (필수)</button>
        <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleMusic(this.files)">
        
        <div id="audioInfo">TOTAL AUDIO: 0.0s (00:00)</div>

        <button class="btn primary" onclick="document.getElementById('iIn').click()">🖼️ 2. ADD IMAGES</button>
        <input type="file" id="iIn" accept="image/*" style="display:none" onchange="handleImageAdd(this.files)">
        <button class="btn" style="border-color:#ffcc00; color:#ffcc00; margin-top:5px;" onclick="document.getElementById('bIn').click()">PNG ALPHA BRUSH (점묘용)</button>
        <input type="file" id="bIn" accept="image/png" style="display:none" onchange="handleBrushPNG(this.files)">
        
        <div id="sequenceList" style="margin-top:20px;"></div>
    </div>

    <div class="viz-area" id="vArea"></div>

    <div class="side-panel right">
        <h3>2. Viewport & Canvas</h3>
        <div style="display: flex; gap:5px; margin-bottom:10px;">
            <button class="btn active" id="b169" onclick="setAspect('16:9')">16:9</button>
            <button class="btn" id="b916" onclick="setAspect('9:16')">9:16</button>
        </div>
        <div style="display: flex; align-items:center; gap:10px; margin-bottom:15px;">
            <label style="margin:0;">BG COLOR</label>
            <input type="color" id="canvasBg" value="#f4f4f4" onchange="invalidateArtBuffers()" style="height:25px; border:none; cursor:pointer;">
        </div>

        <h3>3. Rendering Engine FX</h3>
        <label>DRAWING FOCUS (칠판 지우개 연출)</label>
        <select id="drawDirection">
            <option value="diagonal">사선 지우개 (Diagonal ZigZag)</option>
            <option value="horizontal">좌우 지우개 (Horizontal ZigZag)</option>
            <option value="global">중앙 확산 (Center Expand)</option>
        </select>

        <label>PHASE CONTROL (작화 모드)</label>
        <select id="drawingPhase">
            <option value="auto">100% 자동 완성 진행 (Wipe to 80%)</option>
            <option value="sketch">강제: 스케치 비네팅 유지 (Vignette)</option>
            <option value="finish">강제: 풀 컬러 아트 유지</option>
        </select>

        <label>BRUSH SCALE (지우개 굵기) <span class="val-label" id="valBScale">1.0</span></label>
        <input type="range" id="paintScale" min="0.1" max="5.0" step="0.1" value="1.0" onchange="invalidateArtBuffers()" oninput="document.getElementById('valBScale').innerText=this.value">
        
        <label>BRIGHTNESS <span class="val-label" id="valBri">1.0</span></label>
        <input type="range" id="brightness" min="0.1" max="3.0" step="0.1" value="1.0" onchange="invalidateArtBuffers()" oninput="document.getElementById('valBri').innerText=this.value">
        
        <label>TRAIL (잔상) <span class="val-label" id="valT">0.0</span></label>
        <input type="range" id="trail" min="0" max="0.25" step="0.01" value="0" oninput="document.getElementById('valT').innerText=this.value">

        <h3>4. Active Transform</h3>
        <div id="seqUI" style="opacity: 0.3; pointer-events: none; background:#111; padding:10px; border-radius:8px;">
            <label>IMAGE SCALE <span id="txtS" class="val-label">1.0</span></label>
            <input type="range" id="curScale" min="0.1" max="4.0" step="0.05" value="1.0" oninput="updateCurSeq()">
            <label>OFFSET X <span id="txtX" class="val-label">0</span></label>
            <input type="range" id="curX" min="-800" max="800" value="0" oninput="updateCurSeq()">
            <label>OFFSET Y <span id="txtY" class="val-label">0</span></label>
            <input type="range" id="curY" min="-800" max="800" value="0" oninput="updateCurSeq()">
        </div>

        <button class="btn primary" id="recBtn" onclick="togglePlay()" style="margin-top:20px; background:#ff3e81; color:white;">🔴 START REC & AUTO SAVE</button>
        <div style="display:flex; gap:5px; margin-top:5px;">
            <button class="btn" onclick="clearCanvas()">CLEAR CANVAS</button>
            <button class="btn" onclick="saveArt()">SAVE PNG</button>
        </div>
    </div>
</div>

<div class="playbar" style="height:60px; background:var(--panel); border-top:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:15px;">
    <span id="currTime" style="font-size:14px; color:var(--accent); font-family:monospace; min-width:45px;">00:00</span>
    <input type="range" id="progBar" value="0" min="0" max="100" step="0.1" style="flex:1;" oninput="seekTime(this.value)">
    <span id="totalTime" style="font-size:14px; color:#888; font-family:monospace; min-width:45px;">00:00</span>
</div>

<script>
let audio, analyser, isPlaying = false, sequences = [], currentActiveIdx = -1;
let aspect = '16:9', canvasW = 1280, canvasH = 720;
let recorder, recordedChunks = [];
let customBrushImg = null;

// [v18.15] 물리적 마스크 버퍼
let maskBuffer, viewBuffer;

function setup() {
    let cnv = createCanvas(canvasW, canvasH);
    cnv.parent('vArea');
    pixelDensity(1);
    
    maskBuffer = createGraphics(canvasW, canvasH);
    viewBuffer = createGraphics(canvasW, canvasH);
    maskBuffer.pixelDensity(1);
    viewBuffer.pixelDensity(1);
    
    clearCanvas();
    analyser = new p5.FFT();
}

function handleMusic(files) {
    if(!files[0]) return;
    audio = loadSound(URL.createObjectURL(files[0]), (b)=>{
        let dur = audio.duration();
        document.getElementById('totalTime').innerText = formatTime(dur);
        document.getElementById('progBar').max = dur;
        document.getElementById('status').innerText = "AUDIO LOADED";
        
        let infoDiv = document.getElementById('audioInfo');
        infoDiv.style.display = "block";
        infoDiv.innerText = `TOTAL AUDIO: ${dur.toFixed(1)}s (${formatTime(dur)})`;

        audio.onended(() => { if(isPlaying) stopAndSave(); });
    });
}

function handleBrushPNG(files) {
    if(!files[0]) return;
    loadImage(URL.createObjectURL(files[0]), (img) => {
        customBrushImg = img;
        document.getElementById('status').innerText = "CUSTOM BRUSH LOADED";
        invalidateArtBuffers();
    });
}

function handleImageAdd(files) {
    if(!files[0]) return;
    loadImage(URL.createObjectURL(files[0]), (img) => {
        let lastEnd = sequences.length > 0 ? sequences[sequences.length-1].end : 0;
        let newSeq = {
            img: img, name: files[0].name,
            start: lastEnd, end: lastEnd + 10,
            style: 'oil', scale: 1.0, x: 0, y: 0,
            sData: null, eData: null,
            artBuffer: null, sketchBuffer: null
        };
        sequences.push(newSeq);
        currentActiveIdx = sequences.length - 1;
        processImageData(newSeq);
        renderSeqList();
        enableUI(true);
    });
}

function renderSeqList() {
    const list = document.getElementById('sequenceList');
    list.innerHTML = "";
    sequences.forEach((s, i) => {
        let div = document.createElement('div');
        div.className = `seq-item ${i === currentActiveIdx ? 'active' : ''}`;
        div.onclick = () => selectSeq(i);
        
        div.innerHTML = `
            <div class="seq-info">
                <span style="font-size:12px; color:#fff; font-weight:bold; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:130px;">${i+1}. ${s.name}</span>
                <div style="display:flex; align-items:center; gap:5px;">
                    <input class="time-input" type="number" step="0.1" value="${s.start.toFixed(1)}" onchange="updateSeqStart(${i}, this.value)" onclick="event.stopPropagation()">
                    <span style="color:#666;">~</span>
                    <input class="time-input" type="number" step="0.1" value="${s.end.toFixed(1)}" onchange="cascadeTime(${i}, this.value)" onclick="event.stopPropagation()">
                </div>
            </div>
            <div class="seq-style-row">
                <select style="margin:0; padding:4px;" onchange="sequences[${i}].style=this.value; invalidateArtBuffers(); event.stopPropagation();">
                    <option value="oil" ${s.style==='oil'?'selected':''}>유채화 (Oil)</option>
                    <option value="impression" ${s.style==='impression'?'selected':''}>인상파 (Impression)</option>
                    <option value="pencil" ${s.style==='pencil'?'selected':''}>연필화 (Pencil)</option>
                    <option value="watercolor" ${s.style==='watercolor'?'selected':''}>수채화 (Water)</option>
                    <option value="pastel" ${s.style==='pastel'?'selected':''}>파스텔 (Pastel)</option>
                    <option value="grayscale" ${s.style==='grayscale'?'selected':''}>흑백 (Grayscale)</option>
                    <option value="point" ${s.style==='point'?'selected':''}>점묘 (Point)</option>
                </select>
            </div>
        `;
        list.appendChild(div);
    });
}

function updateSeqStart(idx, val) {
    let newStart = Number(val);
    let dur = sequences[idx].end - sequences[idx].start;
    sequences[idx].start = newStart;
    sequences[idx].end = newStart + dur;
    if(idx > 0) sequences[idx-1].end = newStart;
    cascadeTime(idx, sequences[idx].end);
}

function cascadeTime(idx, val) {
    sequences[idx].end = Number(val);
    for(let i = idx + 1; i < sequences.length; i++) {
        let dur = sequences[i].end - sequences[i].start;
        sequences[i].start = sequences[i-1].end;
        sequences[i].end = sequences[i].start + dur;
    }
    renderSeqList();
}

function selectSeq(i) {
    currentActiveIdx = i;
    enableUI(true);
    let s = sequences[i];
    document.getElementById('curScale').value = s.scale;
    document.getElementById('curX').value = s.x;
    document.getElementById('curY').value = s.y;
    document.getElementById('txtS').innerText = s.scale;
    document.getElementById('txtX').innerText = s.x;
    document.getElementById('txtY').innerText = s.y;
    renderSeqList();
    if(!isPlaying) drawGhostPreview();
}

function updateCurSeq() {
    if(currentActiveIdx < 0) return;
    let s = sequences[currentActiveIdx];
    s.scale = Number(document.getElementById('curScale').value);
    s.x = Number(document.getElementById('curX').value);
    s.y = Number(document.getElementById('curY').value);
    document.getElementById('txtS').innerText = s.scale;
    document.getElementById('txtX').innerText = s.x;
    document.getElementById('txtY').innerText = s.y;
    processImageData(s);
    if(!isPlaying) drawGhostPreview();
}

function invalidateArtBuffers() {
    if(currentActiveIdx >= 0 && sequences[currentActiveIdx]) {
        sequences[currentActiveIdx].artBuffer = null;
    }
    if(!isPlaying) drawGhostPreview();
}

function processImageData(seq) {
    let temp = createGraphics(width, height);
    temp.background(255);
    let r = Math.min(width/seq.img.width, height/seq.img.height) * seq.scale;
    temp.imageMode(CENTER);
    temp.image(seq.img, width/2 + seq.x, height/2 + seq.y, seq.img.width*r, seq.img.height*r);
    seq.sData = temp.get();
    
    let edge = createGraphics(width, height);
    edge.image(seq.sData, 0, 0);
    edge.filter(THRESHOLD, 0.2); 
    seq.eData = edge.get();
    temp.remove(); edge.remove();
    seq.artBuffer = null; 
}

// [v18.15] 백그라운드 프리렌더링 (Targeting Image 2)
function generateArtBuffers(seq) {
    document.getElementById('status').innerText = "GENERATING BUFFERS...";
    
    let art = createGraphics(width, height);
    let sk = createGraphics(width, height);
    art.pixelDensity(1); sk.pixelDensity(1);
    
    let bgCol = document.getElementById('canvasBg').value;
    art.background(bgCol);
    sk.background(bgCol);

    seq.sData.loadPixels();
    seq.eData.loadPixels();
    let p = seq.sData.pixels;
    let e = seq.eData.pixels;

    let pScale = Number(document.getElementById('paintScale').value);
    let bri = Number(document.getElementById('brightness').value);

    // 1. 스케치 비네팅 버퍼
    sk.stroke(50, 160); sk.strokeWeight(1.0);
    let padX = width * 0.15;
    let padY = height * 0.15;
    
    for(let i=0; i<80000; i++) {
        let x = floor(random(width)), y = floor(random(height));
        let idx = (y * width + x) * 4;
        if(e[idx+3] > 128) {
            let distToPad = min(x, width-x, y, height-y);
            let prob = distToPad < padX ? 1.0 : max(0.0, 1.0 - (distToPad - padX) / (width*0.2));
            if(prob > 0.05) {
                sk.push(); sk.translate(x, y); sk.rotate(random(PI));
                let l = 5 + random(5);
                sk.line(-l, 0, l, 0); sk.pop();
            }
        }
    }
    // 짙은 비네팅 오버레이 
    sk.fill(0, 180); sk.noStroke(); 
    sk.rect(0,0,width,padY); sk.rect(0,height-padY,width,padY);
    sk.rect(0,padY,padX,height-2*padY); sk.rect(width-padX,padY,padX,height-2*padY);
    seq.sketchBuffer = sk;

    // 2. 풀 컬러 버퍼 생성
    let totalStrokes = 150000; 
    art.noStroke();
    let baseSize = 12 * pScale; 
    
    for(let i=0; i<totalStrokes; i++) {
        let x = floor(random(width)), y = floor(random(height));
        let idx = (y * width + x) * 4;
        if (p[idx+3] < 20) continue;

        let r = min(255, p[idx]*bri), g = min(255, p[idx+1]*bri), b = min(255, p[idx+2]*bri);
        
        art.push();
        art.translate(x, y);
        let sMul = random(0.8, 1.3);
        let bSize = baseSize * sMul; 

        if(seq.style === 'oil') {
            art.fill(r+random(-15,15), g+random(-15,15), b+random(-15,15), 250);
            art.rotate(random(TWO_PI));
            art.rect(-bSize, -bSize*0.3, bSize*2, bSize*0.6, 2);
        } else if(seq.style === 'impression') {
            art.fill(r+random(-25,25), g+random(-25,25), b+random(-25,25), 230);
            art.rotate(random(TWO_PI));
            art.rect(-bSize, -bSize*0.4, bSize*2, bSize*0.8);
        } else if(seq.style === 'pencil') {
            let lum = 0.299*r + 0.587*g + 0.114*b;
            if(lum < 160) {
                art.stroke(r*0.5, 200); art.strokeWeight(0.8 * pScale);
                art.rotate(PI/4 + random(0.2)); art.line(-bSize, 0, bSize, 0);
                if(lum < 80 && random()<0.7) { art.rotate(PI/2); art.line(-bSize, 0, bSize, 0); }
            }
        } else if(seq.style === 'watercolor') {
            art.fill(r, g, b, 70); art.ellipse(0,0, bSize*1.5);
        } else if(seq.style === 'pastel') {
            art.fill(r, g, b, 180); art.ellipse(0,0, bSize);
        } else if(seq.style === 'grayscale') {
            let lum = 0.299*r + 0.587*g + 0.114*b;
            art.fill(lum, lum, lum, 240); art.ellipse(0,0, bSize);
        } else if(seq.style === 'point') {
            art.fill(r, g, b, 255); art.ellipse(0,0, bSize);
        }
        art.pop();
    }
    
    seq.artBuffer = art;
    document.getElementById('status').innerText = "PLAYING...";
}

// [v18.15 핵심] 물리적 지우개 엔진 (선이 아닌 두꺼운 Path)
function draw() {
    let t = isPlaying && audio ? audio.currentTime() : Number(document.getElementById('progBar').value);
    document.getElementById('currTime').innerText = formatTime(t);
    document.getElementById('progBar').value = t;

    if(!isPlaying) return;

    let idx = sequences.findIndex(s => t >= s.start && t <= s.end);
    if(idx !== -1) {
        if(idx !== currentActiveIdx) { currentActiveIdx = idx; renderSeqList(); }
        let s = sequences[idx];
        
        if (!s.artBuffer) generateArtBuffers(s);

        let prog = (t - s.start) / (s.end - s.start);
        let zigProg = min(1.0, prog / 0.8); // 80% 완결
        let expandProg = max(0.0, (prog - 0.8) / 0.2); // 80~100% 확장

        let phaseMode = document.getElementById('drawingPhase').value;
        if(phaseMode === 'sketch') { image(s.sketchBuffer, 0, 0); return; }
        if(phaseMode === 'finish') { image(s.artBuffer, 0, 0); return; }

        // 스케치 비네팅 배경
        let trail = Number(document.getElementById('trail').value);
        if(trail > 0) {
            let c = color(document.getElementById('canvasBg').value);
            c.setAlpha(trail * 255); fill(c); noStroke(); rect(0,0,width,height);
        } else {
            image(s.sketchBuffer, 0, 0); 
        }

        maskBuffer.clear(); 
        maskBuffer.background(0); // 검은색 배경에
        
        // 지우개 굵기는 Brush Scale에 정확히 비례
        let pScale = Number(document.getElementById('paintScale').value);
        let eraserSize = (width * 0.08) * pScale; // 화면 너비의 8% 기준

        // 물리적 선(Path)으로 마스크 그리기
        maskBuffer.stroke(255); // 흰색으로 칠함
        maskBuffer.strokeWeight(eraserSize);
        maskBuffer.strokeJoin(ROUND);
        maskBuffer.strokeCap(ROUND);
        maskBuffer.noFill();

        let drawDir = document.getElementById('drawDirection').value;
        let padX = width * 0.15;
        let padY = height * 0.15;
        let drawW = width - 2*padX;
        let drawH = height - 2*padY;

        if (drawDir === 'diagonal' || drawDir === 'horizontal') {
            maskBuffer.push();
            
            // 대각선 모드일 경우 화면 중앙을 기준으로 45도 회전
            if (drawDir === 'diagonal') {
                maskBuffer.translate(width/2, height/2);
                maskBuffer.rotate(PI/4); // 45도 사선
            } else {
                maskBuffer.translate(width/2, height/2); // 중앙 정렬
            }

            // 회전된 캔버스에서의 칠판 영역 (대각선일 경우 더 넓은 영역 커버 필요)
            let sweepAreaW = (drawDir === 'diagonal') ? width * 1.5 : drawW;
            let sweepAreaH = (drawDir === 'diagonal') ? height * 1.5 : drawH;
            
            let startX = -sweepAreaW / 2;
            let startY = -sweepAreaH / 2;

            // 지우개 크기에 맞춰 겹치게(0.8) 지그재그 라인 계산
            let sweeps = Math.ceil(sweepAreaH / (eraserSize * 0.8));
            if(sweeps < 2) sweeps = 2;
            let rowH = sweepAreaH / sweeps;
            let totalLen = sweeps * sweepAreaW;
            let curLen = zigProg * totalLen;
            let acc = 0;

            maskBuffer.beginShape();
            maskBuffer.vertex(startX, startY + rowH/2); // 시작점

            for(let i=0; i<sweeps; i++) {
                let isLtoR = (i%2 === 0);
                let x0 = isLtoR ? startX : startX + sweepAreaW;
                let x1 = isLtoR ? startX + sweepAreaW : startX;
                let y = startY + i*rowH + rowH/2;

                // 다음 줄로 내려가는 수직 선
                if (i > 0) {
                    let dDist = rowH;
                    if(acc + dDist > curLen) {
                        maskBuffer.vertex(x0, y - rowH + (curLen - acc));
                        acc = curLen; break;
                    }
                    maskBuffer.vertex(x0, y);
                    acc += dDist;
                }

                // 가로로 긋는 선
                let sDist = sweepAreaW;
                if(acc + sDist > curLen) {
                    let rem = curLen - acc;
                    let px = isLtoR ? x0 + rem : x0 - rem;
                    maskBuffer.vertex(px, y);
                    acc = curLen; break;
                }
                maskBuffer.vertex(x1, y);
                acc += sDist;
            }
            maskBuffer.endShape();
            maskBuffer.pop();

            // 80% 이전에는 외곽 비네팅 영역을 넘지 않도록 검은색으로 마스킹 (지우개 가두기)
            if(expandProg === 0) {
                maskBuffer.fill(0); maskBuffer.noStroke();
                maskBuffer.rect(0, 0, width, padY);
                maskBuffer.rect(0, height-padY, width, padY);
                maskBuffer.rect(0, padY, padX, drawH);
                maskBuffer.rect(width-padX, padY, padX, drawH);
            }
        } 
        else {
            // 중앙 확산
            maskBuffer.fill(255); maskBuffer.noStroke();
            let headR = eraserSize * zigProg * 5;
            maskBuffer.ellipse(width/2, height/2, headR, headR);
        }

        // [v18.15] 80% 이후 전체 영역 마스킹 (Vignette 확장)
        if(expandProg > 0) {
            maskBuffer.fill(255); maskBuffer.noStroke();
            // 내부에서 외부로 흰색 사각형이 확장됨
            let exX = padX * (1 - expandProg);
            let exY = padY * (1 - expandProg);
            maskBuffer.rect(exX, exY, width - 2*exX, height - 2*exY);
        }

        // 소스-인 합성으로 컬러 아트 추출
        viewBuffer.clear();
        viewBuffer.image(maskBuffer, 0, 0); // 바탕이 검고 지우개 경로만 흰색
        viewBuffer.drawingContext.globalCompositeOperation = 'source-in';
        viewBuffer.image(s.artBuffer, 0, 0); // 흰색 영역에만 컬러 아트를 채움
        viewBuffer.drawingContext.globalCompositeOperation = 'source-over'; 

        // 최종 출력 (비네팅 스케치 위에 지워진 컬러 아트 덮기)
        image(viewBuffer, 0, 0);
    }
}

function clearCanvas() { background(document.getElementById('canvasBg').value); }

function drawGhostPreview() {
    clearCanvas();
    if(currentActiveIdx !== -1 && sequences[currentActiveIdx].sData) {
        tint(255, 80); image(sequences[currentActiveIdx].sData, 0, 0); noTint();
    }
}

function togglePlay() {
    if(!audio) return alert("오디오 파일(MP3)을 로드해주세요.");
    if(isPlaying) {
        if(audio) audio.stop(); isPlaying = false; 
        if(recorder && recorder.state !== "inactive") recorder.stop();
        document.getElementById('recBtn').innerText = "🔴 START REC & AUTO SAVE";
        document.getElementById('status').innerText = "STANDBY";
    } else {
        clearCanvas(); startRecording(); 
        if(audio) audio.play(); 
        isPlaying = true;
        document.getElementById('status').innerText = "RECORDING & PLAYING...";
        document.getElementById('recBtn').innerText = "⏹ STOP (AUTO SAVING)";
    }
}

function stopAndSave() {
    if(audio) audio.stop(); isPlaying = false;
    if(recorder && recorder.state !== "inactive") recorder.stop();
    document.getElementById('status').innerText = "SAVING VIDEO...";
    document.getElementById('recBtn').innerText = "🔴 START REC & AUTO SAVE";
}

function startRecording() {
    recordedChunks = [];
    let stream = document.querySelector('canvas').captureStream(30);
    recorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
    recorder.ondataavailable = e => recordedChunks.push(e.data);
    recorder.onstop = () => {
        let blob = new Blob(recordedChunks, { type: 'video/mp4' });
        let a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `PhysicalWipe_v18.15_${Date.now()}.mp4`; a.click();
        document.getElementById('status').innerText = "VIDEO SAVED!";
    };
    recorder.start();
}

function setAspect(r) {
    aspect = r;
    document.getElementById('b169').classList.toggle('active', r==='16:9');
    document.getElementById('b916').classList.toggle('active', r==='9:16');
    if(r==='16:9') { canvasW = 1280; canvasH = 720; } else { canvasW = 720; canvasH = 1280; }
    resizeCanvas(canvasW, canvasH);
    maskBuffer.resizeCanvas(canvasW, canvasH);
    viewBuffer.resizeCanvas(canvasW, canvasH);
    sequences.forEach(s => { processImageData(s); s.artBuffer=null; });
    clearCanvas();
    if(!isPlaying) drawGhostPreview();
}

function enableUI(on) { 
    let ui = document.getElementById('seqUI');
    ui.style.opacity = on ? "1" : "0.3"; ui.style.pointerEvents = on ? "all" : "none";
}
function formatTime(s) { let m=floor(s/60), sec=floor(s%60); return `${nf(m,2)}:${nf(sec,2)}`; }
function seekTime(v) { if(!isPlaying) { drawGhostPreview(); } }
function saveArt() { saveCanvas('StillMasterpiece', 'png'); }
</script>
