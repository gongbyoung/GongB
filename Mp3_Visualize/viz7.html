<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM ART LAB v15.0.19 — Atelier Studio</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#050505; --panel:#0d0d12; --accent:#00ffcc; --border:rgba(255,255,255,0.06); --text:#ffffff; }
body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

/* LAYOUT */
.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo{letter-spacing:4px; color:var(--accent); font-weight:800; font-size:12px;}
.container { display: grid; grid-template-columns: 280px 1fr 300px; flex: 1; min-height: 0; }
.side-panel { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
.side-panel.right { border-right:none; border-left: 1px solid var(--border); }

/* BOTTOM PLAYBAR */
.playbar { height: 60px; background: var(--panel); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 15px; flex-shrink: 0; }
.progress-container { flex: 1; display: flex; align-items: center; gap: 10px; font-family: monospace; font-size: 12px; color: var(--accent); }
#progBar { flex: 1; accent-color: var(--accent); height: 4px; cursor: pointer; }

h3 { font-size: 10px; color: #555; margin-bottom: 12px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-top: 15px;}
.control-group { margin-bottom: 12px; }
.control-group label { display: block; font-size: 9px; color: #777; margin-bottom: 6px; }
.val-label { float: right; color: var(--accent); font-weight: bold; }
input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; height: 3px;}
input[type=color] { width: 100%; border:none; background:none; cursor:pointer; height: 20px;}
select { width: 100%; background: #000; border: 1px solid #333; color: var(--text); padding: 5px; font-size: 11px; margin-bottom: 10px; border-radius: 4px;}

.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 10px; cursor: pointer; font-size: 10px; border-radius: 4px; width: 100%; margin-bottom: 5px; transition: 0.2s;}
.btn.primary { background: var(--accent); color: #000; border: none; font-weight: bold; font-size: 12px; padding: 15px; margin-top: 10px;}
.btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.05); }

.viz-area { position: relative; background: #000; overflow: hidden; flex: 1; display: flex; justify-content: center; align-items: center; }
#artCanvas { background: #000; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
.log-panel { background: #000; border: 1px solid #222; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 10px; color: #888; line-height: 1.6; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM ART LAB v15.0.19</div>
  <div id="statusTag" style="font-size: 10px; color: #555;">ATELIER READY</div>
</div>

<div class="container">
  <div class="side-panel">
    <h3>1. Music & Image</h3>
    <button class="btn" onclick="document.getElementById('mIn').click()">LOAD MP3</button>
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleMusic(this.files)">
    <button class="btn" style="border-color: var(--accent); color: var(--accent);" onclick="document.getElementById('iIn').click()">LOAD SOURCE IMAGE</button>
    <input type="file" id="iIn" accept="image/*" style="display:none" onchange="handleImage(this.files)">
    
    <h3>2. Brush Settings</h3>
    <button class="btn" style="border-color: #ffcc00; color: #ffcc00;" onclick="document.getElementById('bIn').click()">LOAD BRUSH PNG</button>
    <input type="file" id="bIn" accept="image/png" style="display:none" onchange="handleBrushPNG(this.files)">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 3px; margin-top:5px;">
        <button class="btn active" id="bPoint" onclick="setBrush('point')">점묘</button>
        <button class="btn" id="bStroke" onclick="setBrush('stroke')">인상</button>
        <button class="btn" id="bCustom" onclick="setBrush('custom')">PNG 브러시</button>
        <button class="btn" id="bText" onclick="setBrush('text')">가사</button>
    </div>

    <h3>3. Simulation</h3>
    <div class="control-group">
      <label>DENSITY (동시 입자수) <span class="val-label" id="densityVal">100</span></label>
      <input type="range" id="density" min="1" max="500" value="100" oninput="document.getElementById('densityVal').innerText=this.value">
    </div>
    <div class="control-group">
      <label>BRUSH SCALE <span class="val-label" id="pScaleVal">1.0</span></label>
      <input type="range" id="paintScale" min="0.1" max="5.0" step="0.1" value="1.0" oninput="document.getElementById('pScaleVal').innerText=this.value">
    </div>
    <div class="log-panel" style="margin-top: 10px;">
      <div>BRUSH: <b id="logBrush">DEFAULT</b></div>
      <div>IMAGE: <b id="logImg">NOT LOADED</b></div>
      <div>AMP: <b id="logAmp">0.00</b></div>
    </div>
  </div>

  <div class="viz-area">
    <canvas id="artCanvas"></canvas>
  </div>

  <div class="side-panel right">
    <h3>4. Color Setup</h3>
    <select id="colorMode" onchange="updateColorSettings()">
        <option value="sampling">소스 이미지 샘플링</option>
        <option value="palette">커스텀 컬러 팔레트</option>
    </select>
    <div id="paletteSettings" style="display: none;">
        <div class="control-group"><label>Color 1</label><input type="color" id="pal1" value="#ff00cc"></div>
        <div class="control-group"><label>Color 2</label><input type="color" id="pal2" value="#00ffcc"></div>
        <div class="control-group"><label>Color 3</label><input type="color" id="pal3" value="#ffff00"></div>
    </div>

    <h3>5. Rendering FX</h3>
    <div class="control-group">
      <label>BRIGHTNESS <span class="val-label" id="brightVal">1.0</span></label>
      <input type="range" id="brightness" min="0.1" max="3.0" step="0.1" value="1.0" oninput="document.getElementById('brightVal').innerText=this.value">
    </div>
    <div class="control-group">
      <label>TRAIL (잔상 - 0은 무한축적) <span class="val-label" id="trailVal">0.00</span></label>
      <input type="range" id="trailPower" min="0" max="0.2" step="0.005" value="0.00" oninput="document.getElementById('trailVal').innerText=this.value">
    </div>

    <h3>6. Canvas & Easel setup</h3>
    <select id="canvasShape" onchange="clearCanvas()">
        <option value="rect">직사각형 캔버스</option>
        <option value="circular">원형 캔버스</option>
        <option value="heart">하트 캔버스</option>
    </select>
    <select id="canvasTexture" onchange="clearCanvas()">
        <option value="linen">텍스처: 린넨</option>
        <option value="sketchbook">텍스처: 스케치북</option>
        <option value="agedpaper">텍스처: 오래된 종이</option>
        <option value="wood">텍스처: 나무판</option>
        <option value="none">텍스처: 없음</option>
    </select>
    <select id="canvasFrame" onchange="clearCanvas()">
        <option value="none">액자: 없음</option>
        <option value="wood">액자: 심플 우드</option>
        <option value="gold">액자: 앤티크 골드</option>
    </select>

    <button class="btn primary" id="playBtn" onclick="togglePlay()">START PERFORMANCE</button>
    <button class="btn" onclick="clearCanvas()">CLEAR CANVAS</button>
    <button class="btn" onclick="saveArt()">SAVE STILL PNG</button>
    
    <div class="log-panel" style="margin-top: 20px; border-color: var(--accent);">
        <div style="color: var(--accent); font-weight: bold;">REC STATUS</div>
        <div id="logSave">READY</div>
    </div>
  </div>
</div>

<div class="playbar">
    <div class="progress-container">
        <span id="currTime">00:00</span>
        <input type="range" id="progBar" value="0" min="0" max="100" step="0.1">
        <span id="totalTime">00:00</span>
    </div>
</div>

<script>
let aspect = '16:9', brushMode = 'point';
let srtData = [], audioCtx, analyser, source, audioBuffer, isPlaying = false, startTime = 0, pauseOffset = 0;
let lastPaintTime = 0, sourceImgObj = null, customBrushImg = null;
let mediaRecorder, recordedChunks = [];

const canvas = document.getElementById('artCanvas'), ctx = canvas.getContext('2d');
const samplingCanvas = document.createElement('canvas'), sCtx = samplingCanvas.getContext('2d');
const tintCanvas = document.createElement('canvas'), tCtx = tintCanvas.getContext('2d');

function setBrush(m) {
    brushMode = m;
    ['bPoint', 'bStroke', 'bText', 'bCustom'].forEach(id => document.getElementById(id).classList.remove('active'));
    const target = document.getElementById('b' + m.charAt(0).toUpperCase() + m.slice(1));
    if(target) target.classList.add('active');
}

function handleBrushPNG(files) {
    const img = new Image();
    img.onload = () => { customBrushImg = img; tintCanvas.width = img.width; tintCanvas.height = img.height; setBrush('custom'); document.getElementById('logBrush').innerText = "PNG LOADED"; };
    img.src = URL.createObjectURL(files[0]);
}

function handleImage(files) {
    const img = new Image();
    img.onload = () => {
        sourceImgObj = img;
        updateSamplingBuffer();
        document.getElementById('logImg').innerText = "READY";
        clearCanvas();
    };
    img.src = URL.createObjectURL(files[0]);
}

function updateSamplingBuffer() {
    if(!sourceImgObj) return;
    samplingCanvas.width = canvas.width;
    samplingCanvas.height = canvas.height;
    sCtx.drawImage(sourceImgObj, 0, 0, canvas.width, canvas.height);
}

function clearCanvas() {
    ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    // 이젤 및 배경 텍스처 그리기
    drawEasel();
    drawTexture();
    drawFrame();
}

function drawEasel() {
    ctx.save();
    ctx.strokeStyle = '#3e2723'; ctx.lineWidth = 15;
    ctx.beginPath(); ctx.moveTo(canvas.width*0.2, canvas.height); ctx.lineTo(canvas.width*0.3, canvas.height*0.1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(canvas.width*0.8, canvas.height); ctx.lineTo(canvas.width*0.7, canvas.height*0.1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(canvas.width*0.15, canvas.height*0.8); ctx.lineTo(canvas.width*0.85, canvas.height*0.8); ctx.stroke();
    ctx.restore();
}

function drawTexture() {
    const texture = document.getElementById('canvasTexture').value;
    if(texture === 'none') return;
    const size = 5; ctx.save();
    for(let y=0; y<canvas.height; y+=size) {
        for(let x=0; x<canvas.width; x+=size) {
            let color;
            if(texture === 'linen') color = `hsla(30, 20%, ${Math.random()*20+60}%, 0.1)`;
            else if(texture === 'sketchbook') color = `hsla(0, 0%, ${Math.random()*10+90}%, 0.15)`;
            else if(texture === 'agedpaper') color = `hsla(40, 40%, ${Math.random()*30+50}%, 0.2)`;
            else if(texture === 'wood') color = `hsla(25, 50%, ${Math.random()*40+20}%, 0.3)`;
            ctx.fillStyle = color; ctx.fillRect(x, y, size, size);
        }
    }
    ctx.restore();
}

function drawFrame() {
    const frame = document.getElementById('canvasFrame').value;
    if(frame === 'none') return;
    const shape = document.getElementById('canvasShape').value;
    ctx.save(); ctx.lineWidth = 30;
    if(frame === 'wood') ctx.strokeStyle = '#5d4037';
    else if(frame === 'gold') ctx.strokeStyle = '#ffd700';

    if(shape === 'rect') ctx.strokeRect(15, 15, canvas.width-30, canvas.height-30);
    else if(shape === 'circular') {
        ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, Math.min(canvas.width, canvas.height)/2-15, 0, Math.PI*2); ctx.stroke();
    } else if(shape === 'heart') {
        drawHeart(ctx, 30); ctx.stroke();
    }
    ctx.restore();
}

function drawHeart(c, offset) {
    const w = canvas.width, h = canvas.height;
    c.beginPath();
    c.moveTo(w/2, h/5+offset);
    c.bezierCurveTo(w/2, h/5.5+offset, w/2.2-offset, h/10+offset, w/4, h/10+offset);
    c.bezierCurveTo(offset, h/10+offset, offset, h/2.2-offset, w/2, h-offset);
    c.bezierCurveTo(w-offset, h/2.2-offset, w-offset, h/10+offset, w*3/4, h/10+offset);
    c.bezierCurveTo(w/1.8+offset, h/10+offset, w/2, h/5.5+offset, w/2, h/5+offset);
}

function updateColorSettings() {
    const mode = document.getElementById('colorMode').value;
    document.getElementById('paletteSettings').style.display = (mode === 'palette') ? 'block' : 'none';
}

function animate() {
    if(!isPlaying) return;
    requestAnimationFrame(animate);

    const nowTime = audioCtx.currentTime - startTime;
    if (audioBuffer) {
        document.getElementById('progBar').value = (nowTime / audioBuffer.duration) * 100;
        document.getElementById('currTime').textContent = formatTime(nowTime);
        document.getElementById('totalTime').textContent = formatTime(audioBuffer.duration);
    }

    // 잔상(Trail) 효과
    const trail = parseFloat(document.getElementById('trailPower').value);
    if(trail > 0) { ctx.fillStyle = `rgba(0, 0, 0, ${trail})`; ctx.fillRect(0, 0, canvas.width, canvas.height); }

    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const amp = (data.reduce((a, b) => a + b, 0) / data.length) / 255;
    document.getElementById('logAmp').innerText = amp.toFixed(2);

    const now = Date.now(), density = parseInt(document.getElementById('density').value);
    
    // 비주얼라이제이션 루프
    if (amp > 0.05) { 
        for(let i=0; i < Math.floor(amp * (density/10)); i++) {
            const pos = getPointInCanvas();
            if(pos) paintStroke(amp, pos.x, pos.y);
        }
    }
}

function getPointInCanvas() {
    const shape = document.getElementById('canvasShape').value;
    const w = canvas.width, h = canvas.height;
    let x, y, valid = false;
    while(!valid) {
        x = Math.random() * w; y = Math.random() * h;
        if(shape === 'rect') valid = true;
        else if(shape === 'circular') {
            valid = (Math.pow(x-w/2, 2) + Math.pow(y-h/2, 2) <= Math.pow(Math.min(w,h)/2-15, 2));
        } else if(shape === 'heart') {
            // 하트 영역 체크 로직은 복잡하여 간단하게 80% 영역으로 대체
            valid = (x > w*0.1 && x < w*0.9 && y > h*0.1 && y < h*0.9);
        }
    }
    return {x, y};
}

function paintStroke(amp, x, y) {
    let r=255, g=255, b=255;
    const colorMode = document.getElementById('colorMode').value;
    if (colorMode === 'sampling' && sourceImgObj) {
        const p = sCtx.getImageData(x, y, 1, 1).data; r = p[0]; g = p[1]; b = p[2];
    } else if (colorMode === 'palette') {
        const pal = [document.getElementById('pal1').value, document.getElementById('pal2').value, document.getElementById('pal3').value];
        const color = pal[Math.floor(Math.random()*pal.length)];
        const rgb = hexToRgb(color); r = rgb.r; g = rgb.g; b = rgb.b;
    }
    
    const bright = parseFloat(document.getElementById('brightness').value);
    r = Math.min(255, r * bright); g = Math.min(255, g * bright); b = Math.min(255, b * bright);

    const pScale = parseFloat(document.getElementById('paintScale').value);
    ctx.save(); ctx.translate(x, y); ctx.rotate(Math.random() * Math.PI * 2);

    if (brushMode === 'custom' && customBrushImg) {
        const size = (5 + amp * 50) * pScale;
        tCtx.globalCompositeOperation = 'source-over'; tCtx.clearRect(0,0,tintCanvas.width, tintCanvas.height);
        tCtx.drawImage(customBrushImg, 0, 0); tCtx.globalCompositeOperation = 'source-in';
        tCtx.fillStyle = `rgb(${r},${g},${b})`; tCtx.fillRect(0,0,tintCanvas.width, tintCanvas.height);
        ctx.drawImage(tintCanvas, -size/2, -size/2, size, size);
    } else if (brushMode === 'point') {
        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.7)`;
        const rad = (2 + amp * 20) * pScale; ctx.beginPath(); ctx.arc(0, 0, rad, 0, Math.PI*2); ctx.fill();
    } else if (brushMode === 'stroke') {
        ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, 0.6)`; ctx.lineWidth = (1 + amp * 10) * pScale;
        const len = (5 + amp * 60) * pScale; ctx.beginPath(); ctx.moveTo(-len/2, 0); ctx.lineTo(len/2, 0); ctx.stroke();
    }
    ctx.restore();
}

// --- 유틸리티 및 오디오/레코딩 (기존 v15.0.18 로직 유지) ---
function hexToRgb(hex) {
    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : {r:255,g:255,b:255};
}
function handleMusic(f) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); const r = new FileReader(); r.onload = (e) => audioCtx.decodeAudioData(e.target.result, (b) => { audioBuffer = b; document.getElementById('totalTime').textContent = formatTime(b.duration); }); r.readAsArrayBuffer(f[0]); }
function togglePlay() { if(!audioBuffer) return alert("MP3 파일을 로드하세요."); if(audioCtx.state === 'suspended') audioCtx.resume(); if(isPlaying) { isPlaying = false; source.stop(); if(mediaRecorder) mediaRecorder.stop(); document.getElementById('playBtn').textContent = "RESUME PERFORMANCE"; } else { source = audioCtx.createBufferSource(); source.buffer = audioBuffer; analyser = audioCtx.createAnalyser(); analyser.fftSize = 512; source.connect(analyser); analyser.connect(audioCtx.destination); source.start(0, pauseOffset); startTime = audioCtx.currentTime - pauseOffset; isPlaying = true; document.getElementById('playBtn').textContent = "STOP & SAVE"; if(sourceImgObj) updateSamplingBuffer(); animate(); startRecording(); } }
function startRecording() { recordedChunks = []; const stream = canvas.captureStream(30); mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' }); mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data); mediaRecorder.onstop = () => { const blob = new Blob(recordedChunks, { type: 'video/mp4' }); const now = new Date(); const dateStr = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0') + "_" + String(now.getHours()).padStart(2, '0') + String(now.getMinutes()).padStart(2, '0') + String(now.getSeconds()).padStart(2, '0'); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Spectrum_${dateStr}.mp4`; a.click(); document.getElementById('logSave').innerText = "SAVED"; }; mediaRecorder.start(); document.getElementById('logSave').innerText = "REC ON"; }
function formatTime(s) { const mins = Math.floor(s / 60); const secs = Math.floor(s % 60); return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`; }
function resize() { const p = canvas.parentElement; canvas.width = p.clientWidth-40; canvas.height = canvas.width/1.77; if(sourceImgObj) updateSamplingBuffer(); clearCanvas(); }
window.onresize = resize; resize();
function saveArt() { const a = document.createElement('a'); a.download=`Art_Studio.png`; a.href=canvas.toDataURL(); a.click(); }
function savePreset() { alert("프리셋 저장 기능은 v15.0.11 로직과 동일하게 작동합니다."); }
</script>
</body>
</html>
