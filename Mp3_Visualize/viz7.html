<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRUM ART LAB v15.0.13 — Image & Impressionism</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ --bg:#050505; --panel:#0d0d12; --accent:#00ffcc; --border:rgba(255,255,255,0.06); --text:#ffffff; }
body{ background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }
.topbar{ padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo{letter-spacing:4px; color:var(--accent); font-weight:800; font-size:12px;}
.container { display: grid; grid-template-columns: 280px 1fr 300px; flex: 1; min-height: 0; }
.side-panel { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
.side-panel.right { border-right:none; border-left: 1px solid var(--border); }
h3 { font-size: 10px; color: #555; margin-bottom: 12px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-top: 15px;}
.input-text { width: 100%; background: #000; border: 1px solid #333; color: var(--accent); padding: 8px; font-size: 14px; font-weight: bold; border-radius: 4px; outline:none; margin-bottom:10px; }
.control-group { margin-bottom: 12px; }
.control-group label { display: block; font-size: 9px; color: #777; margin-bottom: 6px; }
.val-label { float: right; color: var(--accent); font-weight: bold; }
input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; height: 3px;}
.btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 10px; cursor: pointer; font-size: 10px; border-radius: 4px; width: 100%; margin-bottom: 5px; transition: 0.2s;}
.btn.primary { background: var(--accent); color: #000; border: none; font-weight: bold; font-size: 12px; padding: 15px; margin-top: 10px;}
.btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.05); }
.viz-area { position: relative; background: #000; overflow: hidden; flex: 1; display: flex; justify-content: center; align-items: center; }
#artCanvas { background: #000; }
.log-panel { background: #000; border: 1px solid #222; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 10px; color: #888; line-height: 1.6; margin-top: 10px; }
#currentLyric { position: absolute; bottom: 40px; width: 100%; text-align: center; font-size: 14px; color: var(--accent); pointer-events: none; opacity: 0.8; font-weight: bold; text-shadow: 0 0 10px #000; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SPECTRUM ART LAB v15.0.13</div>
  <div id="timeCode" style="font-family: monospace; font-size: 14px; color: var(--accent);">00:00.00</div>
</div>

<div class="container">
  <div class="side-panel">
    <h3>1. Target Mask Shape</h3>
    <input type="text" id="maskTextInput" class="input-text" value="LOVE" oninput="updateMask()">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom:15px;">
        <button class="btn active" id="modeH" onclick="setWriteMode('H')">가로 쓰기</button>
        <button class="btn" id="modeV" onclick="setWriteMode('V')">세로 쓰기</button>
    </div>

    <h3>2. Assets Loading</h3>
    <button class="btn" onclick="document.getElementById('mIn').click()">LOAD MP3</button>
    <input type="file" id="mIn" accept="audio/*" style="display:none" onchange="handleMusic(this.files)">
    <button class="btn" onclick="document.getElementById('sIn').click()">LOAD SRT</button>
    <input type="file" id="sIn" accept=".srt" style="display:none" onchange="handleSRT(this.files)">
    <button class="btn" style="border-color: #ff00cc; color: #ff00cc;" onclick="document.getElementById('iIn').click()">LOAD IMAGE (FOR COLOR)</button>
    <input type="file" id="iIn" accept="image/*" style="display:none" onchange="handleImage(this.files)">

    <h3>3. Brush System</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; margin-bottom:10px;">
        <button class="btn active" id="bPoint" onclick="setBrush('point')">점묘</button>
        <button class="btn" id="bStroke" onclick="setBrush('stroke')">인상</button>
        <button class="btn" id="bText" onclick="setBrush('text')">가사</button>
    </div>
    <div class="control-group">
      <label>BRUSH SCALE <span class="val-label" id="pScaleVal">1.0</span></label>
      <input type="range" id="paintScale" min="0.1" max="5.0" step="0.1" value="1.0" oninput="document.getElementById('pScaleVal').innerText=this.value">
    </div>

    <h3>4. Flow Control</h3>
    <div class="control-group">
      <label>DENSITY <span class="val-label" id="densityVal">30</span></label>
      <input type="range" id="density" min="1" max="200" value="30" oninput="document.getElementById('densityVal').innerText=this.value">
    </div>
    <div class="control-group">
      <label>SENSITIVITY <span class="val-label" id="sensVal">9</span></label>
      <input type="range" id="sens" min="1" max="10" value="9" oninput="document.getElementById('sensVal').innerText=this.value">
    </div>

    <h3>5. Debug Log</h3>
    <div class="log-panel">
      <div>IMG DATA: <b id="logImg">NONE</b></div>
      <div>AMP / SAVE: <b id="logAmp">0.00</b> / <b id="logSave">IDLE</b></div>
    </div>
  </div>

  <div class="viz-area">
    <canvas id="artCanvas"></canvas>
    <div id="currentLyric">가사를 기다리는 중...</div>
  </div>

  <div class="side-panel right">
    <h3>6. Mask FX & Position</h3>
    <div class="control-group">
      <label>MASK NOISE / GHOST</label>
      <input type="range" id="maskNoise" min="0" max="50" value="0" oninput="updateMask()">
      <input type="range" id="maskGhost" min="0" max="0.5" step="0.01" value="0.1" style="margin-top:5px;">
    </div>
    <div class="control-group">
      <label>SIZE / X / Y</label>
      <input type="range" id="maskSize" min="0.2" max="3.0" step="0.1" value="1.0" oninput="updateMask()">
      <input type="range" id="maskX" min="-400" max="400" value="0" oninput="updateMask()" style="margin-top:5px;">
      <input type="range" id="maskY" min="-400" max="400" value="0" oninput="updateMask()" style="margin-top:5px;">
    </div>

    <h3>7. Mode Switch</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom:5px;">
        <button class="btn active" id="pInside" onclick="setPaintMode('inside')">안쪽</button>
        <button class="btn" id="pOutside" onclick="setPaintMode('outside')">바깥쪽</button>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom:15px;">
        <button class="btn active" id="rRandom" onclick="setRotMode('random')">랜덤회전</button>
        <button class="btn" id="rFixed" onclick="setRotMode('fixed')">정면고정</button>
    </div>

    <h3>8. Global Color Filter</h3>
    <div class="control-group"><label>RED MAX</label>
      <input type="range" id="rMax" min="0" max="255" value="255"></div>
    <div class="control-group"><label>GREEN MAX</label>
      <input type="range" id="gMax" min="0" max="255" value="255"></div>
    <div class="control-group"><label>BLUE MAX</label>
      <input type="range" id="bMax" min="0" max="255" value="255"></div>

    <button class="btn primary" id="playBtn" onclick="togglePlay()">START PERFORMANCE</button>
    <button class="btn" onclick="clearCanvas()">CLEAR CANVAS</button>
    <button class="btn" onclick="saveArt()">SAVE AS PNG</button>
    <button class="btn" style="border-color: #ffcc00;" onclick="savePreset()">SAVE PRESET</button>
  </div>
</div>

<script>
let aspect = '16:9', writeMode = 'H', paintMode = 'inside', rotMode = 'random', brushMode = 'point';
let srtData = [], audioCtx, analyser, source, audioBuffer, isPlaying = false, startTime = 0, pauseOffset = 0;
let lastPaintTime = 0, maskFinalFontSize = 0, maskDataCache = null;
let mediaRecorder, recordedChunks = [];
let charPtr = 0, lastLineIdx = -1;
let sourceImageData = null;

const canvas = document.getElementById('artCanvas'), ctx = canvas.getContext('2d');
const maskCanvas = document.createElement('canvas'), maskCtx = maskCanvas.getContext('2d');
const imgCanvas = document.createElement('canvas'), imgCtx = imgCanvas.getContext('2d');

function setBrush(m) {
    brushMode = m;
    ['bPoint', 'bStroke', 'bText'].forEach(id => document.getElementById(id).classList.remove('active'));
    document.getElementById('b' + m.charAt(0).toUpperCase() + m.slice(1)).classList.add('active');
}

function setWriteMode(m) { writeMode = m; updateMask(); }
function setPaintMode(m) { paintMode = m; }
function setRotMode(m) { rotMode = m; }

function handleImage(files) {
    const reader = new FileReader();
    reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
            imgCanvas.width = canvas.width; imgCanvas.height = canvas.height;
            imgCtx.drawImage(img, 0, 0, canvas.width, canvas.height);
            sourceImageData = imgCtx.getImageData(0, 0, canvas.width, canvas.height).data;
            document.getElementById('logImg').innerText = "LOADED";
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(files[0]);
}

function updateMask() {
    const text = document.getElementById('maskTextInput').value;
    const sizeScale = parseFloat(document.getElementById('maskSize').value);
    const mX = parseInt(document.getElementById('maskX').value), mY = parseInt(document.getElementById('maskY').value);
    maskCanvas.width = canvas.width; maskCanvas.height = canvas.height;
    maskCtx.fillStyle = "black"; maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);
    maskCtx.fillStyle = "white"; maskCtx.textAlign = "center"; maskCtx.textBaseline = "middle";
    const centerX = maskCanvas.width/2 + mX, centerY = maskCanvas.height/2 + mY;
    
    if (writeMode === 'H') {
        maskFinalFontSize = Math.min(maskCanvas.width/(text.length*0.8), maskCanvas.height*0.6) * sizeScale;
        maskCtx.font = `900 ${maskFinalFontSize}px Pretendard`;
        maskCtx.fillText(text, centerX, centerY);
    } else {
        maskFinalFontSize = Math.min(maskCanvas.width*0.5, (maskCanvas.height/(text.length*1.1))) * sizeScale;
        maskCtx.font = `900 ${maskFinalFontSize}px Pretendard`;
        const startY = centerY - (text.length*maskFinalFontSize*1.05/2) + (maskFinalFontSize/2);
        for(let i=0; i<text.length; i++) maskCtx.fillText(text[i], centerX, startY+(i*maskFinalFontSize*1.05));
    }
    maskDataCache = maskCtx.getImageData(0, 0, maskCanvas.width, maskCanvas.height).data;
    if (!isPlaying) drawPreviewOutline();
}

function drawPreviewOutline() {
    ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    const ghost = parseFloat(document.getElementById('maskGhost').value);
    if(ghost > 0) { ctx.save(); ctx.globalAlpha = ghost; ctx.drawImage(maskCanvas, 0, 0); ctx.restore(); }
}

function getPointInMask() {
    if (!maskDataCache) return null;
    const invasion = parseInt(document.getElementById('invasion').value);
    for (let i = 0; i < 100; i++) {
        const x = Math.floor(Math.random()*canvas.width), y = Math.floor(Math.random()*canvas.height);
        if (Math.random()*100 < invasion) return { x, y };
        const isMask = maskDataCache[(y*canvas.width + x)*4] > 128;
        if (paintMode === 'inside' ? isMask : !isMask) return { x, y }; 
    }
    return null;
}

function animate() {
    if(!isPlaying) return;
    requestAnimationFrame(animate);
    const nowTime = audioCtx.currentTime - startTime;
    document.getElementById('timeCode').textContent = new Date(nowTime * 1000).toISOString().substr(14, 5);
    
    const currentLine = srtData.find(line => nowTime >= line.start && nowTime <= line.end);
    if (currentLine) {
        document.getElementById('currentLyric').textContent = currentLine.text;
        if (currentLine.id !== lastLineIdx) { charPtr = 0; lastLineIdx = currentLine.id; }
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        const amp = (data.reduce((a, b) => a + b, 0) / data.length) / 255;
        const sens = 1.1 - (Number(document.getElementById('sens').value)/10);
        document.getElementById('logAmp').innerText = amp.toFixed(2);
        
        const now = Date.now(), densityLimit = 1000 / Number(document.getElementById('density').value);
        if (amp > sens && (now - lastPaintTime > densityLimit)) {
            const pos = getPointInMask();
            if (pos) {
                const char = currentLine.chars[charPtr % currentLine.chars.length];
                paintStroke(char, amp, pos.x, pos.y);
                charPtr++;
            }
            lastPaintTime = now;
        }
    }
}

function paintStroke(char, amp, x, y) {
    let r=200, g=200, b=200;
    if (sourceImageData) {
        const idx = (Math.floor(y) * canvas.width + Math.floor(x)) * 4;
        r = sourceImageData[idx]; g = sourceImageData[idx+1]; b = sourceImageData[idx+2];
    }
    // 컬러 필터 적용
    r = Math.min(r, document.getElementById('rMax').value);
    g = Math.min(g, document.getElementById('gMax').value);
    b = Math.min(b, document.getElementById('bMax').value);

    const pScale = parseFloat(document.getElementById('paintScale').value);
    ctx.save();
    ctx.translate(x, y);
    if (rotMode === 'random') ctx.rotate(Math.random()*Math.PI*0.3 - 0.15);
    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.8)`;

    if (brushMode === 'point') {
        const rad = (5 + amp * 20) * pScale;
        ctx.beginPath(); ctx.arc(0, 0, rad, 0, Math.PI*2); ctx.fill();
    } else if (brushMode === 'stroke') {
        const len = (10 + amp * 50) * pScale;
        const thick = (2 + amp * 10) * pScale;
        ctx.rotate(Math.random()*Math.PI);
        ctx.fillRect(-len/2, -thick/2, len, thick);
    } else {
        const fontSize = (maskFinalFontSize*0.1 + amp*maskFinalFontSize*0.3) * pScale;
        ctx.font = `900 ${fontSize}px Pretendard`;
        ctx.fillText(char, 0, 0);
    }
    ctx.restore();
}

// --- 오디오/기타 유틸리티 (기존 로직 유지) ---
function handleMusic(f) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); const r = new FileReader(); r.onload = (e) => audioCtx.decodeAudioData(e.target.result, (b) => { audioBuffer = b; }); r.readAsArrayBuffer(f[0]); }
function handleSRT(f) { const r = new FileReader(); r.onload = (e) => { const text = e.target.result; const blocks = text.trim().split(/\n\s*\n/); srtData = blocks.map((b, idx) => { const lines = b.split('\n'); const timeMatch = lines[1]?.match(/(\d+:\d+:\d+,\d+) --> (\d+:\d+:\d+,\d+)/); if(!timeMatch) return null; return { start: toSec(timeMatch[1]), end: toSec(timeMatch[2]), text: lines.slice(2).join(' '), chars: lines.slice(2).join('').split('').filter(c => c !== " "), id: idx }; }).filter(x => x); }; r.readAsText(f[0]); }
function toSec(t) { const [h, m, s] = t.split(':'); const [sec, ms] = s.split(','); return parseInt(h)*3600 + parseInt(m)*60 + parseInt(sec) + parseInt(ms)/1000; }
async function togglePlay() { if(!audioBuffer) return; if(audioCtx.state === 'suspended') await audioCtx.resume(); if(isPlaying) { isPlaying = false; source.stop(); } else { source = audioCtx.createBufferSource(); source.buffer = audioBuffer; analyser = audioCtx.createAnalyser(); analyser.fftSize = 512; source.connect(analyser); analyser.connect(audioCtx.destination); source.start(0, pauseOffset); startTime = audioCtx.currentTime - pauseOffset; isPlaying = true; animate(); startRecording(); } }
function startRecording() { recordedChunks = []; const stream = canvas.captureStream(30); mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' }); mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data); mediaRecorder.onstop = () => { const blob = new Blob(recordedChunks, { type: 'video/mp4' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Art_${Date.now()}.mp4`; a.click(); }; mediaRecorder.start(); }
function setAspect(r) { aspect = r; resize(); }
function resize() { const p = canvas.parentElement; canvas.width = aspect === '16:9' ? p.clientWidth-40 : (p.clientHeight-40)*0.56; canvas.height = aspect === '16:9' ? canvas.width/1.77 : p.clientHeight-40; updateMask(); }
window.onresize = resize; resize();
function clearCanvas() { ctx.fillStyle='black'; ctx.fillRect(0,0,canvas.width,canvas.height); }
function saveArt() { const a = document.createElement('a'); a.download=`art.png`; a.href=canvas.toDataURL(); a.click(); }
</script>
</body>
</html>
