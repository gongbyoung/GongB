<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Audio Studio - Variable FFT Calibrator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body, html {
      width: 100%;
      height: 100%;
      background-color: #05070f;
      color: #cbd5e1;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    .main-layout {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      padding: 15px;
      gap: 12px;
    }
    header {
      background: #0b0f19;
      border: 1px solid #1e293b;
      border-radius: 6px;
      padding: 10px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }
    h1 {
      font-size: 14px;
      color: #00ffcc;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .toolbar-groups {
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    .control-unit {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .control-unit label {
      font-size: 11px;
      color: #94a3b8;
      font-weight: bold;
    }
    select {
      background: #020617;
      color: #00ffcc;
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      outline: none;
      cursor: pointer;
    }
    .btn {
      background: #1e293b;
      color: #cbd5e1;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn:hover {
      background: rgba(0, 240, 255, 0.1);
      color: #00f0ff;
      border-color: #00f0ff;
    }
    .btn-export {
      background: #0284c7;
      color: #fff;
      border-color: #0369a1;
    }
    audio {
      height: 26px;
      background: #020617;
      border-radius: 4px;
      border: 1px solid #334155;
    }

    /* 💡 [핵심 레이아웃]: 하드웨어 이퀄라이저 룩앤필 마스터 콘솔 보드 */
    .console-board-viewport {
      flex: 1;
      background: #010306;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 15px;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      gap: 6px; /* 대역이 늘어남에 따라 유연하게 좁혀지는 간격 규격 */
      overflow-x: auto;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
    }

    /* 💡 1:1 수직 결합 채널 스트립 (음악바 아래 슬라이더 노브 배치 구조) */
    .channel-strip {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(51, 65, 85, 0.3);
      border-radius: 4px;
      padding: 10px 4px;
      align-items: center;
      min-width: 32px; /* 32채널 밀집 압착 시 찌그러짐 방지 한계 가드선 */
    }

    /* 상단: 세로형 오디오 레벨 미터 탱크 */
    .v-meter-track {
      width: 100%;
      flex: 1;
      background: #04060a;
      border: 1px solid #1e293b;
      border-radius: 3px;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
      position: relative;
    }
    .v-meter-fill {
      width: 100%;
      height: 2%; /* 주파수 대입선에 의해 60FPS 실시간 승강 */
      background: linear-gradient(0deg, #0044ff 0%, #00ffcc 75%, #ff0055 100%);
      border-radius: 2px 2px 0 0;
      box-shadow: 0 0 8px rgba(0, 255, 204, 0.4);
      transition: height 0.04s ease;
    }

    /* 중간: 채널 라벨 인덱서 */
    .strip-info-tag {
      font-size: 10px;
      font-family: monospace;
      font-weight: 900;
      color: #38bdf8;
      margin: 8px 0;
      text-align: center;
    }

    /* 하단: 채널별 마스터 주파수 컷오프 경계 제어 박스 */
    .fader-control-box {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .fader-control-box input[type="range"] {
      width: 90%;
      height: 4px;
      background: #1e293b;
      outline: none;
      appearance: none;
      border-radius: 2px;
      cursor: pointer;
    }
    .fader-control-box input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff0055;
      box-shadow: 0 0 6px #ff0055;
    }
    .fader-control-box input[type="range"]:disabled::-webkit-slider-thumb {
      background: #475569;
      box-shadow: none;
      cursor: not-allowed;
    }
    .fader-value-badge {
      font-size: 9px;
      font-family: monospace;
      color: #00ffcc;
      background: #000;
      padding: 2px 4px;
      border-radius: 2px;
      min-width: 24px;
      text-align: center;
      border: 1px solid #1e293b;
    }
  </style>
</head>
<body>

  <div class="main-layout">
    <header>
      <h1>🎛️ Live Frequency Split Workstation</h1>
      
      <div class="toolbar-groups">
        <!-- 가변 채널 해상도 드롭다운 셀렉터 -->
        <div class="control-unit">
          <label for="band-count-select">채널 수:</label>
          <select id="band-count-select"></select>
        </div>

        <!-- 독립 음악 파일 인젝션 계통 -->
        <div class="control-unit">
          <input type="file" id="file-audio-local" accept="audio/*" style="display:none;">
          <button class="btn" onclick="document.getElementById('file-audio-local').click()">📂 오디오 로드</button>
          <audio id="local-audio-player" controls></audio>
        </div>

        <div class="preset-actions">
          <button class="btn" id="btn-import-json">📂 프리셋 로드</button>
          <button class="btn btn-export" id="btn-export-json">💾 프리셋 저장</button>
          <input type="file" id="file-import-hidden" accept=".json" style="display:none;">
        </div>
      </div>
    </header>

    <!-- 💡 음악바와 조정 슬라이더가 1:1로 결합되어 가로로 통일 배열되는 메인 크레이트 무대 -->
    <main class="console-board-viewport" id="console-master-board"></main>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const consoleBoard = document.getElementById('console-master-board');
      const bandCountSelect = document.getElementById('band-count-select');
      const exportBtn = document.getElementById('btn-export-json');
      const importBtn = document.getElementById('btn-import-json');
      const fileInput = document.getElementById('file-import-hidden');
      const localAudioInput = document.getElementById('file-audio-local');
      const localAudioPlayer = document.getElementById('local-audio-player');

      const broadcast = new BroadcastChannel('cosmic_fft_channel');

      // 3부터 32까지 선택 드롭다운 옵션 엔진 자동 적재
      for (let i = 3; i <= 32; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.innerText = `${i} 채널 분할`;
        if (i === 32) opt.selected = true; // 32채널 기본 마운트
        bandCountSelect.appendChild(opt);
      }

      let activeBandsCount = 32;
      let splitPoints = []; // N-1 개의 컷오프 경계 배열
      let currentBandsConfig = { totalBands: activeBandsCount, ranges: [] };

      let audioCtx = null;
      let analyser = null;
      let sourceNode = null;

      // 로컬 파일 오디오 바인딩 수혈
      localAudioInput.addEventListener('change', (e) => {
        const file = e.target.files[0]; if (!file) return;
        localAudioPlayer.src = URL.createObjectURL(file);
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioCtx.createAnalyser();
          analyser.fftSize = 512;
          sourceNode = audioCtx.createMediaElementSource(localAudioPlayer);
          sourceNode.connect(analyser);
          analyser.connect(audioCtx.destination);
        }
      });

      // 주파수 실시간 연산 60FPS 애니메이션 루프 구동
      function localTickerLoop() {
        requestAnimationFrame(localTickerLoop);
        if (analyser && !localAudioPlayer.paused) {
          const bufferLength = analyser.frequencyBinCount;
          const dataArray = new Uint8Array(bufferLength);
          analyser.getByteFrequencyData(dataArray);
          calculateLiveBands(dataArray);
        }
      }
      localTickerLoop();

      // 무선 채널을 통한 외부 메인 윈도우 오디오 신호 포워딩 리스너
      broadcast.onmessage = (e) => {
        if (localAudioPlayer.paused && e.data && e.data.type === 'AUDIO_STREAM' && e.data.raw) {
          calculateLiveBands(e.data.raw);
        }
      };

      // 💡 [가변 채널 빌더]: 3~32개 입력에 맞추어 경계 점들을 균등 계산하여 스토리지 복원
      function initCalibrationWorkspace() {
        activeBandsCount = parseInt(bandCountSelect.value);
        const saved = localStorage.getItem(`cosmic_fft_contiguous_v2_${activeBandsCount}ch`);
        
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed) && parsed.length === activeBandsCount - 1) {
              splitPoints = parsed;
              rebuildRangesAndSync();
              return;
            }
          } catch(e) {}
        }
        
        // 데이터가 없거나 변형되었을 경우 균등 그리드 분할 연산
        splitPoints = [];
        const step = Math.floor(256 / activeBandsCount);
        for (let i = 0; i < activeBandsCount - 1; i++) {
          splitPoints.push((i + 1) * step - 1);
        }
        rebuildRangesAndSync();
      }

      // 💡 [중복 방지 연쇄 회로]: 컷오프 슬라이더 위치에 기반하여 3~32개 영역 경계선을 충돌 없이 전사
      function rebuildRangesAndSync() {
        currentBandsConfig.totalBands = activeBandsCount;
        currentBandsConfig.ranges = [];
        
        for (let i = 0; i < activeBandsCount; i++) {
          let startIdx = 0; let endIdx = 255;
          if (i === 0) {
            startIdx = 0; endIdx = splitPoints[0];
          } else if (i === activeBandsCount - 1) {
            startIdx = splitPoints[activeBandsCount - 2] + 1; endIdx = 255;
          } else {
            startIdx = splitPoints[i - 1] + 1; endIdx = splitPoints[i];
          }
          currentBandsConfig.ranges.push({ id: i, name: `ch_${i+1}`, start: startIdx, end: endIdx });
        }

        renderConsoleStrips();
        localStorage.setItem(`cosmic_fft_contiguous_v2_${activeBandsCount}ch`, JSON.stringify(splitPoints));
        broadcast.postMessage({ type: 'RANGE_UPDATE', config: currentBandsConfig });
      }

      // 💡 [1:1 하드웨어 룩 매핑 팩토리]: 음악바 바로 아래 슬라이더 노브 배치 조립
      function renderConsoleStrips() {
        consoleBoard.innerHTML = '';
        
        for (let i = 0; i < activeBandsCount; i++) {
          const strip = document.createElement('div');
          strip.className = 'channel-strip';
          
          const currentRange = currentBandsConfig.ranges[i];
          const isLast = (i === activeBandsCount - 1);
          
          // 양옆 슬라이더와 교차 충돌하지 않도록 가동 제한 한계값(min, max) 실시간 계산
          const minAllowed = (i === 0) ? 0 : splitPoints[i - 1] + 1;
          const maxAllowed = isLast ? 255 : (i === activeBandsCount - 2) ? 254 : splitPoints[i + 1] - 1;
          const currentVal = isLast ? 255 : splitPoints[i];
          
          strip.innerHTML = `
            <div class="v-meter-track">
              <div class="v-meter-fill" id="v-bar-${i}"></div>
            </div>
            <div class="strip-info-tag">CH${String(i+1).padStart(2, '0')}</div>
            <div class="fader-control-box">
              <input type="range" min="${minAllowed}" max="${maxAllowed}" value="${currentVal}" ${isLast ? 'disabled' : ''}>
              <div class="fader-value-badge">${currentVal}</div>
            </div>
          `;

          if (!isLast) {
            const slider = strip.querySelector('input[type="range"]');
            slider.addEventListener('input', (e) => {
              const val = parseInt(e.target.value);
              splitPoints[i] = val;
              // 슬라이더 조작 즉시 주파수 데이터 갱신 및 인접 슬라이더 한계 락인
              rebuildRangesAndSync();
            });
          }

          consoleBoard.appendChild(strip);
        }
      }

      // 60FPS 실시간 음악 신호 반응 게이지 제어 처리기
      function calculateLiveBands(rawFFT) {
        currentBandsConfig.ranges.forEach((band, idx) => {
          const bar = document.getElementById(`v-bar-${idx}`);
          if (!bar) return;

          let sum = 0; let count = 0;
          for (let i = band.start; i <= band.end; i++) {
            sum += rawFFT[i] || 0; count++;
          }
          let average = count > 0 ? sum / count : 0;
          let heightPercent = Math.min(100, Math.max(2, Math.round((average / 255) * 100)));
          
          bar.style.height = `${heightPercent}%`;
        });
      }

      bandCountSelect.addEventListener('change', () => { initCalibrationWorkspace(); });

      // 프리셋 저장 처리
      exportBtn.addEventListener('click', () => {
        const outData = { totalBands: activeBandsCount, splits: splitPoints };
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(outData, null, 2));
        const dlAnchor = document.createElement('a');
        dlAnchor.setAttribute("href", dataStr);
        dlAnchor.setAttribute("download", `cosmic_preset_${activeBandsCount}ch.json`);
        dlAnchor.click(); dlAnchor.remove();
      });

      // 프리셋 불러오기 처리
      importBtn.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const parsed = JSON.parse(event.target.result);
            if (parsed.totalBands && Array.isArray(parsed.splits)) {
              activeBandsCount = parsed.totalBands;
              bandCountSelect.value = activeBandsCount;
              splitPoints = parsed.splits;
              rebuildRangesAndSync();
            }
          } catch(err) {}
        };
        reader.readAsText(file); fileInput.value = '';
      });

      initCalibrationWorkspace();
    });
  </script>
</body>
</html>
