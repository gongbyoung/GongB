<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Audio Studio - Spectral Peak Wavelength Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    body, html { width: 100%; height: 100%; background-color: #04060a; color: #cbd5e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
    .main-layout { display: flex; flex-direction: column; width: 100%; height: 100%; padding: 15px; gap: 12px; }
    
    header { background: #090d16; border: 1px solid #1e293b; border-radius: 6px; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
    h1 { font-size: 13px; color: #00ffcc; text-transform: uppercase; letter-spacing: 0.5px; }
    .toolbar-groups { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
    .control-unit { display: flex; align-items: center; gap: 8px; font-size: 11px; }
    .control-unit label { color: #94a3b8; font-weight: bold; }
    select, input[type="number"] { background: #010409; color: #00ffcc; border: 1px solid #334155; border-radius: 4px; padding: 4px 8px; font-size: 11px; outline: none; }
    input[type="number"] { width: 50px; text-align: center; }
    
    .btn { background: #1e293b; color: #cbd5e1; border: 1px solid #475569; border-radius: 4px; padding: 5px 10px; font-size: 11px; font-weight: bold; cursor: pointer; }
    .btn:hover { background: rgba(0, 240, 255, 0.1); color: #00f0ff; border-color: #00f0ff; }
    audio { height: 26px; background: #010409; border-radius: 4px; border: 1px solid #334155; }

    /* 📊 [신설]: 256개 전체 파장을 모니터링하는 노광 분석계 하이테크 스펙트럼 무대 */
    .master-analyzer-viewport { height: 180px; background: #010204; border: 1px solid #1e293b; border-radius: 6px; position: relative; overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.9); }
    #spectrum-canvas { width: 100%; height: 100%; display: block; }
    .canvas-overlay-tag { position: absolute; top: 8px; left: 12px; font-size: 10px; font-family: monospace; color: #64748b; pointer-events: none; }

    /* 🎛️ 하단 32채널 필터 스트립 작업대 */
    .console-board-viewport { flex: 1; background: #020407; border: 1px solid #1e293b; border-radius: 6px; padding: 12px; display: flex; flex-direction: row; justify-content: space-between; gap: 4px; overflow-x: auto; }
    
    /* 1:1 매칭 채널 스트립 디스플레이 */
    .channel-strip { flex: 1; display: flex; flex-direction: column; background: rgba(15, 23, 42, 0.3); border: 1px solid rgba(51, 65, 85, 0.15); border-radius: 4px; padding: 6px 2px; align-items: center; min-width: 34px; }
    .v-meter-track { width: 100%; flex: 1; background: #000; border: 1px solid #151f32; border-radius: 2px; display: flex; align-items: flex-end; overflow: hidden; }
    .v-meter-fill { width: 100%; height: 0%; background: linear-gradient(0deg, #0044ff 0%, #34d399 75%, #f43f5e 100%); transition: height 0.04s ease; }
    
    .strip-info-tag { font-size: 9px; font-family: monospace; color: #64748b; margin-top: 5px; }
    
    /* 💡 [락온 디스플레이]: 현재 필터가 포착한 파장 인덱스 번호 배지 */
    .wavelength-lock-badge { font-size: 9px; font-family: monospace; font-weight: bold; color: #00ffcc; background: #090d16; border: 1px solid #1e293b; padding: 2px 0; width: 90%; text-align: center; border-radius: 2px; margin-top: 4px; }
    .strip-status-dot { width: 4px; height: 4px; background: #64748b; border-radius: 50%; margin-top: 4px; }
    .strip-status-dot.active { background: #00ffcc; box-shadow: 0 0 6px #00ffcc; }
  </style>
</head>
<body>

  <div class="main-layout">
    <header>
      <h1>🎛️ Spectral Wavelength Peak-Picking Station</h1>
      
      <div class="toolbar-groups">
        <!-- 필터 수 선택 구역 -->
        <div class="control-unit">
          <label>추적 필터 수:</label>
          <select id="band-count-select">
            <option value="4">4개 채널</option>
            <option value="8">8개 채널</option>
            <option value="16">16개 채널</option>
            <option value="24">24개 채널</option>
            <option value="32" selected>32개 채널 (최대)</option>
          </select>
        </div>

        <!-- 💡 [신설]: 노광 분석용 하이/로우 패스 게이트 제어 노브 -->
        <div class="control-unit" style="border-left: 1px solid #2d3748; padding-left: 12px;">
          <label>하한 노이즈 컷 (Gate):</label>
          <input type="number" id="num-peak-threshold" value="15" min="0" max="150">
        </div>
        <div class="control-unit">
          <label>추적 감도 (Smooth):</label>
          <select id="select-tracking-smooth">
            <option value="0.9">⚡ 실시간 하드 격발</option>
            <option value="0.3" selected>🔄 유기적 미끄러짐 (추천)</option>
            <option value="0.1">⏳ 묵직한 잔상 추적</option>
          </select>
        </div>

        <!-- 로컬 파일 입력단 -->
        <div class="control-unit" style="border-left: 1px solid #2d3748; padding-left: 12px;">
          <input type="file" id="file-audio-local" accept="audio/*" style="display:none;">
          <button class="btn" onclick="document.getElementById('file-audio-local').click()">📂 오디오 로드</button>
          <audio id="local-audio-player" controls></audio>
        </div>
      </div>
    </header>

    <!-- 💡 [중앙 집중 모니터]: 256개 전체 파장 및 필터 락온 점선이 실시간 오버레이되는 그래픽 메인보드 -->
    <section class="master-analyzer-viewport">
      <div class="canvas-overlay-tag">🔬 REAL-TIME WAVE-LENGTH exposure METER (0 ~ 255 FFT BINS)</div>
      <canvas id="spectrum-canvas"></canvas>
    </section>

    <!-- 하단: 락온된 주파수만 취해서 볼륨 명암을 뿜어내는 32단 콘솔 스트립 -->
    <main class="console-board-viewport" id="console-master-board"></main>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const canvas = document.getElementById('spectrum-canvas');
      const ctx = canvas.getContext('2d');
      const consoleBoard = document.getElementById('console-master-board');
      const bandCountSelect = document.getElementById('band-count-select');
      const peakThresholdInput = document.getElementById('num-peak-threshold');
      const smoothSelect = document.getElementById('select-tracking-smooth');
      const localAudioInput = document.getElementById('file-audio-local');
      const localAudioPlayer = document.getElementById('local-audio-player');

      const broadcast = new BroadcastChannel('cosmic_fft_channel');

      let activeTrackersCount = 32;
      let currentBandsConfig = { totalBands: activeTrackersCount, ranges: [] };

      // 💡 [피크 추적 코어 메모리]: 가상의 필터 소자들이 포착한 파장 위치와 음압을 고정 보존하는 구조체
      let activeTrackers = []; 

      let audioCtx = null; let analyser = null; let sourceNode = null;
      let lastRawFFT = new Uint8Array(256);

      // 캔버스 크기 정밀 동화 시공
      function resizeCanvas() {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      localAudioInput.addEventListener('change', (e) => {
        const file = e.target.files[0]; if (!file) return;
        localAudioPlayer.src = URL.createObjectURL(file);
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioCtx.createAnalyser(); analyser.fftSize = 512;
          sourceNode = audioCtx.createMediaElementSource(localAudioPlayer);
          sourceNode.connect(analyser); analyser.connect(audioCtx.destination);
        }
      });

      // 60FPS 실시간 그래픽 렌더 틱 가동
      function engineTickLoop() {
        requestAnimationFrame(engineTickLoop);
        
        let dataArray = null;
        if (analyser && !localAudioPlayer.paused) {
          dataArray = new Uint8Array(analyser.frequencyBinCount);
          analyser.getByteFrequencyData(dataArray);
          lastRawFFT = dataArray;
        } else {
          // 로컬 오디오가 안 돌때는 외부 메인 무대에서 들어온 배열 자산을 디스플레이 소스로 우회 사용
          dataArray = lastRawFFT;
        }

        if (dataArray && dataArray.length > 0) {
          // 💡 핵심 파장 추출 연산 장치 가동
          processSpectralPeakPicking(dataArray);
          // 📊 중앙 모니터 및 하단 콘솔 갱신 드로우
          drawMasterSpectrumMonitor(dataArray);
          updateConsoleStrips();
        }
      }
      engineTickLoop();

      // 메인 무대 창 통신선 결합
      broadcast.onmessage = (e) => {
        if (localAudioPlayer.paused && e.data && e.data.type === 'AUDIO_STREAM' && e.data.raw) {
          lastRawFFT = new Uint8Array(e.data.raw);
        }
      };

      // 💡 [반도체 필터식 알고리즘]: 주변보다 볼륨이 높게 튀는 '진짜 범인 파장' 검출 파이프라인
      function processSpectralPeakPicking(rawFFT) {
        activeTrackersCount = parseInt(bandCountSelect.value);
        const threshold = parseInt(peakThresholdInput.value) || 15;
        const lerpFactor = parseFloat(smoothSelect.value) || 0.3;

        // 1단계: Local Maxima (양옆보다 우뚝 솟은 봉우리 파장 인덱스 번호) 전수 스캔
        let detectedPeaks = [];
        for (let i = 2; i < 254; i++) {
          let currentVol = rawFFT[i];
          if (currentVol > threshold && currentVol > rawFFT[i - 1] && currentVol > rawFFT[i + 1]) {
            detectedPeaks.push({ index: i, volume: currentVol });
          }
        }

        // 2단계: 검출된 파장들을 볼륨 에너지가 가장 강한 순서대로 정렬 (Sorting)
        detectedPeaks.sort((a, b) => b.volume - a.volume);

        // 3단계: 가상 필터 소자 개수(3~32개)만큼 추적 어레이 뼈대 방 동적 유지 관리
        if (activeTrackers.length !== activeTrackersCount) {
          activeTrackers = [];
          for (let i = 0; i < activeTrackersCount; i++) {
            activeTrackers.push({ currentIndex: Math.floor((i / activeTrackersCount) * 255), currentVolume: 0, isLocked: false });
          }
        }

        // 4단계: [지터 현상 원천 배제 고정 추적 알고리즘]
        // 강한 피크 순서대로 내 필터 소자 중 가장 가까운 소자를 찾아 매핑시켜 급격히 튀는 번쩍거림 방지
        let assignedPeakFlags = new Array(detectedPeaks.length).fill(false);

        activeTrackers.forEach((tracker) => {
          let bestPeakIdx = -1;
          let minDistance = 20; // 락온 허용 최대 파장 근접 사정거리

          for (let p = 0; p < detectedPeaks.length; p++) {
            if (assignedPeakFlags[p]) continue;
            let dist = Math.abs(detectedPeaks[p].index - tracker.currentIndex);
            if (dist < minDistance) {
              minDistance = dist;
              bestPeakIdx = p;
            }
          }

          if (bestPeakIdx !== -1) {
            // 사정거리 내에 매칭되는 진짜 악기 파장이 존재하면 그 방향으로 미끄러지듯 인덱스 축 이동 (Lerp)
            tracker.currentIndex += (detectedPeaks[bestPeakIdx].index - tracker.currentIndex) * lerpFactor;
            tracker.currentVolume += (detectedPeaks[bestPeakIdx].volume - tracker.currentVolume) * 0.4;
            tracker.isLocked = true;
            assignedPeakFlags[bestPeakIdx] = true;
          } else {
            // 주변에 잡히는 소리 에너지가 없으면 필터 볼륨을 감쇠시키고 대기 상태로 전환
            tracker.currentVolume += (0 - tracker.currentVolume) * 0.2;
            tracker.isLocked = tracker.currentVolume > 2;
          }
        });

        // 5단계: 무대가 저음역부터 고음역까지 직관적으로 튕기도록 필터 소자들을 파장 순서대로 가로 일렬 정렬 (Sort left to right)
        activeTrackers.sort((a, b) => a.currentIndex - b.currentIndex);

        // 6단계: 메인 무대 main.js로 이 알짜배기 파장 경계선 데이터를 정규 포맷 프로필로 가공해 전사 공중 분사
        syncAndBroadcastRanges();
      }

      // 추출한 피크 인덱스를 하위 호환 가동이 가능한 가상 Range 테이블 구조로 가공 포장
      function syncAndBroadcastRanges() {
        currentBandsConfig.totalBands = activeTrackersCount;
        currentBandsConfig.ranges = [];

        activeTrackers.forEach((tracker, idx) => {
          let exactIdx = Math.round(tracker.currentIndex);
          // 오차 범위를 상하 1칸씩 타격 영역으로 마스킹하는 필터 대역 슬릿 빌드
          currentBandsConfig.ranges.push({
            id: idx,
            name: `peak_${idx+1}`,
            start: Math.max(0, exactIdx - 1),
            end: Math.min(255, exactIdx + 1)
          });
        });

        localStorage.setItem('cosmic_fft_active_latest', JSON.stringify(currentBandsConfig));
        broadcast.postMessage({ type: 'RANGE_UPDATE', config: currentBandsConfig });
      }

      // 📊 [중앙 분석계 드로우 부]: 256개 전체 파장 막대기 위에 필터 락온 조준선을 쏘아 올리는 시각화 팩토리
      function drawMasterSpectrumMonitor(rawFFT) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const barCount = 256;
        const barWidth = canvas.width / barCount;

        // 1. 전체 백그라운드 256 기본 스펙트럼 실사 도포 (어두운 회청색)
        for (let i = 0; i < barCount; i++) {
          let val = rawFFT[i] || 0;
          let h = (val / 255) * (canvas.height * 0.75);
          
          ctx.fillStyle = 'rgba(30, 41, 59, 0.4)';
          ctx.fillRect(i * barWidth, canvas.height - h, barWidth - 0.5, h);
        }

        // 2. 가상 필터 소자가 락온(Lock-on) 타격 중인 '진짜 핵심 파장 슬릿' 위에 네온 스포트라이트 조준선 투사
        activeTrackers.forEach((tracker) => {
          if (!tracker.isLocked) return;

          let exactX = (tracker.currentIndex / 255) * canvas.width;
          let val = rawFFT[Math.round(tracker.currentIndex)] || tracker.currentVolume;
          let h = (val / 255) * (canvas.height * 0.75);

          // 수직 조준 스릿선 빔 방출
          ctx.strokeStyle = 'rgba(0, 255, 204, 0.6)';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(exactX, canvas.height);
          ctx.lineTo(exactX, canvas.height - h - 15);
          ctx.stroke();

          // 파장 꼭대기에 노광 반응을 증명하는 붉은색 타격 도트(Floating Peak) 가설
          ctx.fillStyle = '#f43f5e';
          ctx.shadowBlur = 8;
          ctx.shadowColor = '#f43f5e';
          ctx.beginPath();
          ctx.arc(exactX, canvas.height - h - 15, 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0; // 컨텍스트 리셋
        });
      }

      // 하단 콘솔 채널 스트립 인터페이스 정렬 빌드
      function updateConsoleStrips() {
        // 채널 개수 동적 증감 대응
        if (consoleBoard.children.length !== activeTrackersCount) {
          consoleBoard.innerHTML = '';
          for (let i = 0; i < activeTrackersCount; i++) {
            const strip = document.createElement('div');
            strip.className = 'channel-strip';
            strip.innerHTML = `
              <div class="v-meter-track"><div class="v-meter-fill" id="peak-fbar-${i}"></div></div>
              <div class="strip-info-tag">CH${String(i+1).padStart(2, '0')}</div>
              <div class="wavelength-lock-badge" id="peak-fidx-${i}">--</div>
              <div class="strip-status-dot" id="peak-fdot-${i}"></div>
            `;
            consoleBoard.appendChild(strip);
          }
        }

        // 각 스트립 요소 내부에 실시간 추출된 파장 넘버 배지와 레벨 미터 수혈
        activeTrackers.forEach((tracker, idx) => {
          const bar = document.getElementById(`peak-fbar-${idx}`);
          const badge = document.getElementById(`peak-fidx-${idx}`);
          const dot = document.getElementById(`peak-fdot-${idx}`);

          if (!bar || !badge || !dot) return;

          let heightPercent = Math.min(100, Math.round((tracker.currentVolume / 255) * 100));
          bar.style.height = `${heightPercent}%`;
          
          // 현재 락온 고정된 정밀 파장 인덱스(Wavelength Slot) 번호 출력
          badge.innerText = Math.round(tracker.currentIndex);

          if (tracker.isLocked && tracker.currentVolume > 5) {
            dot.classList.add('active');
          } else {
            dot.classList.remove('active');
          }
        });
      }

      bandCountSelect.addEventListener('change', () => { activeTrackers = []; });
    });
  </script>
</body>
</html>
