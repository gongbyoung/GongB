<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Audio Studio - 32Ch FFT Boundary Calibrator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body, html {
      width: 100%;
      height: 100%;
      background-color: #060913;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    .main-layout {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      padding: 20px;
      gap: 15px;
    }
    header {
      border-bottom: 1px solid rgba(0, 240, 255, 0.15);
      padding-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    h1 {
      font-size: 15px;
      color: #00ffcc;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .preset-actions {
      display: flex;
      gap: 8px;
    }
    .btn {
      background: #1e293b;
      color: #cbd5e1;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn:hover {
      background: rgba(0, 240, 255, 0.1);
      color: #00f0ff;
      border-color: #00f0ff;
    }
    .btn-export {
      background: #0284c7;
      color: #fff;
      border-color: #0369a1;
    }
    .btn-export:hover {
      background: #0369a1;
    }

    /* 💡 [중앙 배치]: 32채널 그래픽 레벨 미터 무대 */
    .center-visualizer-zone {
      flex: 2;
      background: #020408;
      border: 1px solid #1e293b;
      border-radius: 8px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 25px 30px;
      gap: 4px;
      position: relative;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
    }
    .meter-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
      position: relative;
    }
    .meter-bar-fill {
      width: 100%;
      height: 2%; /* 초기값 */
      background: linear-gradient(0deg, #0066ff 0%, #00ffcc 70%, #ff0055 100%);
      border-radius: 2px 2px 0 0;
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
      transition: height 0.04s ease;
    }
    .meter-index-tag {
      font-size: 9px;
      font-family: monospace;
      color: #475569;
      margin-top: 6px;
      position: absolute;
      bottom: -18px;
    }

    /* 💡 [하단 배치]: 31개 경계 제어 슬라이더 구역 */
    .bottom-controls-zone {
      flex: 3;
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(51, 65, 85, 0.5);
      border-radius: 8px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .section-subtitle {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      font-weight: bold;
      border-bottom: 1px dashed #334155;
      padding-bottom: 4px;
    }
    .sliders-grid-container {
      flex: 1;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding-right: 5px;
    }
    .split-card {
      background: #0b0f19;
      border: 1px solid #1e293b;
      border-radius: 4px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .split-title {
      font-size: 10px;
      font-weight: bold;
      color: #f43f5e;
      min-width: 55px;
      font-family: monospace;
    }
    .split-slider-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .split-slider-wrapper input[type="range"] {
      flex: 1;
      height: 4px;
      background: #1e293b;
      outline: none;
      appearance: none;
      border-radius: 2px;
    }
    .split-slider-wrapper input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f43f5e;
      cursor: pointer;
    }
    .split-value-badge {
      width: 35px;
      background: #020617;
      color: #00ffcc;
      border: 1px solid #334155;
      border-radius: 3px;
      text-align: center;
      font-size: 10px;
      font-family: monospace;
      padding: 1px 0;
    }

    .sliders-grid-container::-webkit-scrollbar { width: 4px; }
    .sliders-grid-container::-webkit-scrollbar-track { background: transparent; }
    .sliders-grid-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  </style>
</head>
<body>

  <div class="main-layout">
    <header>
      <h1>🎛️ 32-Band Contiguous Frequency Workspace</h1>
      <div class="preset-actions">
        <button class="btn" id="btn-import-json">📂 프리셋 불러오기</button>
        <button class="btn btn-export" id="btn-export-json">💾 프리셋 내보내기</button>
        <input type="file" id="file-import-hidden" accept=".json" style="display:none;">
      </div>
    </header>

    <!-- 💡 화면 정중앙 배치: 32개 이퀄라이저 기둥 무대 -->
    <main class="center-visualizer-zone" id="equalizer-stage"></main>

    <!-- 💡 화면 하단 배치: 중복 유실 없는 31개 경계 컨트롤러 -->
    <section class="bottom-controls-zone">
      <div class="section-subtitle">✂️ 31 Boundary Split Points Calibration (FFT Index 0 ~ 255)</div>
      <div class="sliders-grid-container" id="sliders-grid"></div>
    </section>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const eqStage = document.getElementById('equalizer-stage');
      const slidersGrid = document.getElementById('sliders-grid');
      const exportBtn = document.getElementById('btn-export-json');
      const importBtn = document.getElementById('btn-import-json');
      const fileInput = document.getElementById('file-import-hidden');

      const broadcast = new BroadcastChannel('cosmic_fft_channel');

      const TOTAL_BANDS = 32;
      const TOTAL_SPLITS = 31;

      // 💡 [수학적 정렬 설계]: 31개의 잘라낼 경계선 번호 배열 관리 체계 (초기값 균등 분배)
      // P[0]=7 이면 CH01은 0~7, CH02는 8부터 시작
      let splitPoints = [];
      let currentBandsConfig = { totalBands: TOTAL_BANDS, ranges: [] };

      // 32개 기둥 그래픽 엘리먼트 사전 구축
      for (let i = 0; i < TOTAL_BANDS; i++) {
        const col = document.createElement('div');
        col.className = 'meter-column';
        col.innerHTML = `
          <div class="meter-bar-fill" id="eq-bar-${i}"></div>
          <div class="meter-index-tag">B${String(i+1).padStart(2, '0')}</div>
        `;
        eqStage.appendChild(col);
      }

      // 60FPS 유입 오디오 수신 파이프라인
      broadcast.onmessage = (e) => {
        if (e.data && e.data.type === 'AUDIO_STREAM' && e.data.raw) {
          calculateLiveBands(e.data.raw);
        }
      };

      function initCalibrationSystem() {
        const saved = localStorage.getItem('cosmic_fft_contiguous_config');
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed) && parsed.length === TOTAL_SPLITS) {
              splitPoints = parsed;
              rebuildRangesAndSync();
              return;
            }
          } catch(e) {}
        }
        
        // 데이터가 없거나 꼬여있을 때 초기 8단위 등간격 강제 빌드 (7, 15, 23 ... 247)
        splitPoints = [];
        for (let i = 0; i < TOTAL_SPLITS; i++) {
          splitPoints.push((i + 1) * 8 - 1);
        }
        rebuildRangesAndSync();
      }

      // 💡 [중복/누수 원천 봉쇄 알고리즘]: 31개 절단선을 기준으로 32개 연쇄 구역 도출
      function rebuildRangesAndSync() {
        currentBandsConfig.ranges = [];
        
        for (let i = 0; i < TOTAL_BANDS; i++) {
          let startIdx = 0;
          let endIdx = 255;
          
          if (i === 0) {
            startIdx = 0;
            endIdx = splitPoints[0];
          } else if (i === TOTAL_BANDS - 1) {
            startIdx = splitPoints[TOTAL_SPLITS - 1] + 1;
            endIdx = 255;
          } else {
            startIdx = splitPoints[i - 1] + 1;
            endIdx = splitPoints[i];
          }
          
          currentBandsConfig.ranges.push({
            id: i,
            name: `ch_${String(i+1).padStart(2, '0')}`,
            start: startIdx,
            end: endIdx
          });
        }

        renderGridSliders();
        localStorage.setItem('cosmic_fft_contiguous_config', JSON.stringify(splitPoints));
        broadcast.postMessage({ type: 'RANGE_UPDATE', config: currentBandsConfig });
      }

      // 31개 경계 제어 컴포넌트 출력
      function renderGridSliders() {
        slidersGrid.innerHTML = '';
        
        for (let i = 0; i < TOTAL_SPLITS; i++) {
          const card = document.createElement('div');
          card.className = 'split-card';
          
          // 💡 상하한선 안전 장치 조율: 이전 슬라이더 위치보다 무조건 +1 커야 하고 다음 슬라이더보다 -1 작아야 함
          const minAllowed = (i === 0) ? 0 : splitPoints[i - 1] + 1;
          const maxAllowed = (i === TOTAL_SPLITS - 1) ? 254 : splitPoints[i + 1] - 1;
          
          card.innerHTML = `
            <div class="split-title">SPLIT ${String(i+1).padStart(2, '0')}</div>
            <div class="split-slider-wrapper">
              <input type="range" min="${minAllowed}" max="${maxAllowed}" value="${splitPoints[i]}">
              <div class="split-value-badge">${splitPoints[i]}</div>
            </div>
          `;

          const slider = card.querySelector('input[type="range"]');
          const badge = card.querySelector('.split-value-badge');

          slider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            splitPoints[i] = val;
            badge.innerText = val;
            
            // 한 라인이 움직이면 즉시 전체 규칙 재연산 및 양옆 노브 한계치 실시간 연쇄 봉쇄
            rebuildRangesAndSync();
          });

          slidersGrid.appendChild(card);
        }
      }

      // 실시간 중앙 32개 네온 바 출력 높이 연산 루프
      function calculateLiveBands(rawFFT) {
        currentBandsConfig.ranges.forEach((band, idx) => {
          const bar = document.getElementById(`eq-bar-${idx}`);
          if (!bar) return;

          let sum = 0;
          let count = 0;
          for (let i = band.start; i <= band.end; i++) {
            sum += rawFFT[i] || 0;
            count++;
          }

          let average = count > 0 ? sum / count : 0;
          // 높이 감도 정규화 가드 배율
          let heightPercent = Math.min(100, Math.max(2, Math.round((average / 255) * 100)));
          
          bar.style.height = `${heightPercent}%`;
        });
      }

      // 프리셋 파일 저장 조작
      exportBtn.addEventListener('click', () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(splitPoints, null, 2));
        const dlAnchor = document.createElement('a');
        dlAnchor.setAttribute("href", dataStr);
        dlAnchor.setAttribute("download", `cosmic_31split_master.json`);
        dlAnchor.click();
        dlAnchor.remove();
      });

      // 프리셋 파일 적재 조작
      importBtn.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const parsed = JSON.parse(event.target.result);
            if (Array.isArray(parsed) && parsed.length === TOTAL_SPLITS) {
              splitPoints = parsed;
              rebuildRangesAndSync();
            }
          } catch(err) {}
        };
        reader.readAsText(file);
        fileInput.value = '';
      });

      initCalibrationSystem();
    });
  </script>
</body>
</html>
