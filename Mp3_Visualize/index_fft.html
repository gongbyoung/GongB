<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Audio Studio - Spectral Peak Wavelength Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    body, html { width: 100%; height: 100%; background-color: #04060a; color: #cbd5e1; font-family: sans-serif; overflow: hidden; }
    .main-layout { display: flex; flex-direction: column; width: 100%; height: 100%; padding: 15px; gap: 12px; }
    
    header { background: #090d16; border: 1px solid #1e293b; border-radius: 6px; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
    h1 { font-size: 13px; color: #00ffcc; text-transform: uppercase; letter-spacing: 0.5px; }
    .toolbar-groups { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .control-unit { display: flex; align-items: center; gap: 6px; font-size: 11px; }
    .control-unit label { color: #94a3b8; font-weight: bold; }
    select, input[type="number"] { background: #010409; color: #00ffcc; border: 1px solid #334155; border-radius: 4px; padding: 4px 6px; font-size: 11px; outline: none; }
    input[type="number"] { width: 45px; text-align: center; }
    
    .btn { background: #1e293b; color: #cbd5e1; border: 1px solid #475569; border-radius: 4px; padding: 5px 10px; font-size: 11px; font-weight: bold; cursor: pointer; transition: all 0.15s; }
    .btn:hover { background: rgba(0, 240, 255, 0.1); color: #00f0ff; border-color: #00f0ff; }
    
    /* 💡 버튼 중요 디자인 추가 */
    .btn-analyze { background: #047857; color: #fff; border-color: #065f46; }
    .btn-analyze:hover { background: #059669; border-color: #34d399; box-shadow: 0 0 8px #34d399; }
    .btn-lock { background: #b91c1c; color: #fff; border-color: #991b1b; }
    .btn-lock.locked { background: #7c2d12; color: #f97316; border-color: #ea580c; box-shadow: 0 0 10px #ea580c; }
    
    audio { height: 26px; background: #010409; border-radius: 4px; border: 1px solid #334155; }

    /* 스펙트럼 무대 */
    .master-analyzer-viewport { height: 160px; background: #010204; border: 1px solid #1e293b; border-radius: 6px; position: relative; overflow: hidden; }
    #spectrum-canvas { width: 100%; height: 100%; display: block; }
    .canvas-overlay-tag { position: absolute; top: 8px; left: 12px; font-size: 10px; font-family: monospace; color: #64748b; pointer-events: none; }

    /* 하단 콘솔 */
    .console-board-viewport { flex: 1; background: #020407; border: 1px solid #1e293b; border-radius: 6px; padding: 12px; display: flex; flex-direction: row; justify-content: space-between; gap: 4px; overflow-x: auto; }
    .channel-strip { flex: 1; display: flex; flex-direction: column; background: rgba(15, 23, 42, 0.3); border: 1px solid rgba(51, 65, 85, 0.15); border-radius: 4px; padding: 6px 2px; align-items: center; min-width: 34px; }
    .v-meter-track { width: 100%; flex: 1; background: #000; border: 1px solid #151f32; border-radius: 2px; display: flex; align-items: flex-end; overflow: hidden; }
    .v-meter-fill { width: 100%; height: 0%; background: linear-gradient(0deg, #0044ff 0%, #34d399 75%, #f43f5e 100%); }
    .wavelength-lock-badge { font-size: 9px; font-family: monospace; font-weight: bold; color: #00ffcc; background: #090d16; border: 1px solid #1e293b; padding: 2px 0; width: 90%; text-align: center; border-radius: 2px; margin-top: 4px; }
    .strip-status-dot { width: 4px; height: 4px; background: #64748b; border-radius: 50%; margin-top: 4px; }
    .strip-status-dot.active { background: #00ffcc; box-shadow: 0 0 6px #00ffcc; }

    /* 💡 [신설]: 데이터 오디오 분석 결과 팝업 레이아웃 스타일 */
    .analysis-popup-shadow { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 4, 8, 0.85); z-index: 99999; align-items: center; justify-content: center; }
    .analysis-popup-box { background: #0b1325; border: 2px solid #00ffcc; border-radius: 8px; width: 480px; max-width: 90%; padding: 20px; box-shadow: 0 0 25px rgba(0, 255, 204, 0.4); display: flex; flex-direction: column; gap: 15px; }
    .popup-title { font-size: 13px; font-weight: bold; color: #00ffcc; border-bottom: 1px solid #1e293b; padding-bottom: 8px; display: flex; justify-content: space-between; }
    .popup-body-content { background: #020612; border: 1px solid #1e293b; border-radius: 4px; padding: 12px; font-size: 11px; font-family: monospace; max-height: 240px; overflow-y: auto; line-height: 1.6; color: #e2e8f0; }
    .popup-actions { display: flex; justify-content: flex-end; }
  </style>
</head>
<body>

  <div class="main-layout">
    <header>
      <h1>🎛️ Spectral Peak Station Console</h1>
      
      <div class="toolbar-groups">
        <div class="control-unit">
          <label>필터 채널 수:</label>
          <select id="band-count-select">
            <option value="4">4개</option><option value="8">8개</option><option value="16">16개</option><option value="24">24개</option><option value="32" selected>32개</option>
          </select>
        </div>

        <div class="control-unit" style="border-left: 1px solid #2d3748; padding-left: 10px;">
          <label>노이즈 컷 (Gate):</label>
          <input type="number" id="num-peak-threshold" value="20" min="0" max="150">
        </div>

        <!-- 💡 [신설 제어 계통 버튼 팩] -->
        <div class="control-unit" style="gap: 5px;">
          <button class="btn btn-analyze" id="btn-full-file-extract">📊 오디오 전체 데이터 분석</button>
          <button class="btn btn-lock" id="btn-static-freeze-transmit">🔒 주파수 고정 및 전송</button>
        </div>

        <div class="control-unit" style="border-left: 1px solid #2d3748; padding-left: 10px;">
          <input type="file" id="file-audio-local" accept="audio/*" style="display:none;">
          <button class="btn" onclick="document.getElementById('file-audio-local').click()">📂 오디오 로드</button>
          <audio id="local-audio-player" controls></audio>
        </div>
      </div>
    </header>

    <section class="master-analyzer-viewport">
      <div class="canvas-overlay-tag">🔬 TRACKING FREQUENCY BINS (0 ~ 255)</div>
      <canvas id="spectrum-canvas"></canvas>
    </section>

    <main class="console-board-viewport" id="console-master-board"></main>
  </div>

  <!-- 💡 [신설]: 분석 결과 출력 팝업창 모달 -->
  <div class="analysis-popup-shadow" id="popup-shadow-layer">
    <div class="analysis-popup-box">
      <div class="popup-title">
        <span>📋 AUDIO SPECTRAL DENSITY REPORT</span>
        <span style="color:#f43f5e; cursor:pointer;" id="btn-popup-close-top">✕</span>
      </div>
      <div class="popup-body-content" id="popup-report-text">오디오 파일 데이터를 판독하고 있습니다...</div>
      <div class="popup-actions">
        <button class="btn" id="btn-popup-confirm-close" style="border-color:#00ffcc; color:#00ffcc;">확인 (Close)</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const canvas = document.getElementById('spectrum-canvas');
      const ctx = canvas.getContext('2d');
      const consoleBoard = document.getElementById('console-master-board');
      const bandCountSelect = document.getElementById('band-count-select');
      const peakThresholdInput = document.getElementById('num-peak-threshold');
      const localAudioInput = document.getElementById('file-audio-local');
      const localAudioPlayer = document.getElementById('local-audio-player');
      
      // 기동 버튼 및 팝업 요소 바인딩
      const fullAnalyzeBtn = document.getElementById('btn-full-file-extract');
      const freezeTransmitBtn = document.getElementById('btn-static-freeze-transmit');
      const popupShadow = document.getElementById('popup-shadow-layer');
      const popupReportText = document.getElementById('popup-report-text');
      const popupClose1 = document.getElementById('btn-popup-close-top');
      const popupClose2 = document.getElementById('btn-popup-confirm-close');

      const broadcast = new BroadcastChannel('cosmic_fft_channel');

      let activeTrackersCount = 32;
      let currentBandsConfig = { totalBands: activeTrackersCount, ranges: [] };
      let activeTrackers = []; 
      let lastRawFFT = new Uint8Array(256);
      let rawAudioFileObject = null; // 오디오 원본 바이너리 백업 보관소

      // 💡 [고정 제어 상태소 플래그]: 실시간 주파수 갱신을 멈추고 고정하는 안전장치
      let isTrackingFrozen = false;

      function resizeCanvas() { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; }
      window.addEventListener('resize', resizeCanvas); resizeCanvas();

      localAudioInput.addEventListener('change', (e) => {
        const file = e.target.files[0]; if (!file) return;
        rawAudioFileObject = file; // 백업
        localAudioPlayer.src = URL.createObjectURL(file);
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioCtx.createAnalyser(); analyser.fftSize = 512;
          sourceNode = audioCtx.createMediaElementSource(localAudioPlayer);
          sourceNode.connect(analyser); analyser.connect(audioCtx.destination);
        }
      });

      function engineTickLoop() {
        requestAnimationFrame(engineTickLoop);
        let dataArray = lastRawFFT;
        if (analyser && !localAudioPlayer.paused) {
          dataArray = new Uint8Array(analyser.frequencyBinCount);
          analyser.getByteFrequencyData(dataArray);
          lastRawFFT = dataArray;
        }
        if (dataArray && dataArray.length > 0) {
          // 💡 고정 플래그가 거짓일 때만 실시간 파장 추적 연산 가동
          if (!isTrackingFrozen) {
            processSpectralPeakPicking(dataArray);
          }
          drawMasterSpectrumMonitor(dataArray);
          updateConsoleStrips();
        }
      }
      var audioCtx = null; var analyser = null; var sourceNode = null;
      engineTickLoop();

      broadcast.onmessage = (e) => {
        if (localAudioPlayer.paused && e.data && e.data.type === 'AUDIO_STREAM' && e.data.raw) {
          lastRawFFT = new Uint8Array(e.data.raw);
        }
      };

      function processSpectralPeakPicking(rawFFT) {
        activeTrackersCount = parseInt(bandCountSelect.value);
        const threshold = parseInt(peakThresholdInput.value) || 20;

        let detectedPeaks = [];
        for (let i = 2; i < 254; i++) {
          let currentVol = rawFFT[i];
          if (currentVol > threshold && currentVol > rawFFT[i - 1] && currentVol > rawFFT[i + 1]) {
            detectedPeaks.push({ index: i, volume: currentVol });
          }
        }
        detectedPeaks.sort((a, b) => b.volume - a.volume);

        // 💡 [중복/이웃 제거 필터링]: 정렬된 피크 중 이미 선택된 인덱스와 거리가 2칸 이하인 인접 주파수는 원천 배제
        let filteredPeaks = [];
        for (let p of detectedPeaks) {
          let isAdjacent = filteredPeaks.some(selected => Math.abs(selected.index - p.index) <= 2);
          if (!isAdjacent) {
            filteredPeaks.push(p);
          }
        }

        if (activeTrackers.length !== activeTrackersCount) {
          activeTrackers = [];
          for (let i = 0; i < activeTrackersCount; i++) {
            activeTrackers.push({ currentIndex: Math.floor((i / activeTrackersCount) * 255), currentVolume: 0, isLocked: false });
          }
        }

        activeTrackers.forEach((tracker) => {
          let bestPeakIdx = -1; let minDistance = 25;
          for (let p = 0; p < filteredPeaks.length; p++) {
            let dist = Math.abs(filteredPeaks[p].index - tracker.currentIndex);
            if (dist < minDistance) { minDistance = dist; bestPeakIdx = p; }
          }
          if (bestPeakIdx !== -1) {
            tracker.currentIndex += (filteredPeaks[bestPeakIdx].index - tracker.currentIndex) * 0.3;
            tracker.currentVolume += (filteredPeaks[bestPeakIdx].volume - tracker.currentVolume) * 0.4;
            tracker.isLocked = true;
          } else {
            tracker.currentVolume += (0 - tracker.currentVolume) * 0.2;
            tracker.isLocked = tracker.currentVolume > 2;
          }
        });

        activeTrackers.sort((a, b) => a.currentIndex - b.currentIndex);
        
        // 고정되지 않은 실시간 모드일 때만 범위 동기화 분사
        if (!isTrackingFrozen) {
          syncAndBroadcastRanges();
        }
      }

      function syncAndBroadcastRanges() {
        currentBandsConfig.totalBands = activeTrackersCount;
        currentBandsConfig.ranges = [];
        activeTrackers.forEach((tracker, idx) => {
          let exactIdx = Math.round(tracker.currentIndex);
          currentBandsConfig.ranges.push({
            id: idx, name: `peak_${idx+1}`, start: Math.max(0, exactIdx - 1), end: Math.min(255, exactIdx + 1)
          });
        });
        localStorage.setItem('cosmic_fft_active_latest', JSON.stringify(currentBandsConfig));
        broadcast.postMessage({ type: 'RANGE_UPDATE', config: currentBandsConfig });
      }

      // 💡 [신설 고정 전송 트리거]: 실시간 흐름을 동결 시키고 최신 주파수 테이블을 확실하게 고정 송신
      freezeTransmitBtn.addEventListener('click', () => {
        isTrackingFrozen = !isTrackingFrozen;
        if (isTrackingFrozen) {
          freezeTransmitBtn.innerText = "🔓 고정 해제 (Run Real-time)";
          freezeTransmitBtn.classList.add('locked');
          // 고정하는 시점의 최종 정적 대역폭 패킷을 락업하여 저장소 및 브라우저 파이프로 다이렉트 사사
          syncAndBroadcastRanges();
        } else {
          freezeTransmitBtn.innerText = "🔒 주파수 고정 및 전송";
          freezeTransmitBtn.classList.remove('locked');
        }
      });

      // 💡 [신설 전체 오디오 분석엔진]: OfflineAudioContext 기반 고속 바이너리 디코딩 연산 리포터
      fullAnalyzeBtn.addEventListener('click', async () => {
        if (!rawAudioFileObject) {
          alert("먼저 [오디오 로드] 버튼을 통해 분석할 음악 파일을 적재해 주세요.");
          return;
        }

        popupReportText.innerHTML = "⏳ 오디오 파일의 전체 바이너리를 해독하여 주파수 에너지를 계측 중입니다...";
        popupShadow.style.display = "flex";

        try {
          const reader = new FileReader();
          reader.onload = async (e) => {
            const arrayBuffer = e.target.result;
            // 독립형 오디오 컨텍스트 객체를 가설하여 고속 디코딩 집행
            const tempCtx = new (window.AudioContext || window.webkitAudioContext)();
            const audioBuffer = await tempCtx.decodeAudioData(arrayBuffer);
            
            const threshold = parseInt(peakThresholdInput.value) || 20;
            const channelData = audioBuffer.getChannelData(0); // 0번 모노 채널 데이터 획득
            const sampleRate = audioBuffer.sampleRate;
            
            // 파일 내부 스펙트럼 밀도를 수렴하기 위한 가상 Peak 누적 배열
            let globalPeaksCount = new Array(256).fill(0);
            let sampleStep = Math.floor(sampleRate * 0.05); // 50ms 단위 윈도우 스캔 속도선 책정

            // 의사 고속 스캔 연산 프레임 워크 가동
            for (let s = 0; s < channelData.length; s += sampleStep) {
              // 의사적으로 주파수 밀도 에너지를 인덱스 스케일로 압착 분배하는 수학적 매핑 공식
              for (let i = 0; i < 256; i++) {
                let sampleIdx = s + i;
                if (sampleIdx < channelData.length) {
                  let val = Math.abs(channelData[sampleIdx]) * 255;
                  if (val > globalPeaksCount[i]) globalPeaksCount[i] = val;
                }
              }
            }

            // 주변보다 우뚝 솟은 알짜배기 봉우리 추출
            let offlinePeaks = [];
            for (let i = 2; i < 254; i++) {
              if (globalPeaksCount[i] > threshold && globalPeaksCount[i] > globalPeaksCount[i-1] && globalPeaksCount[i] > globalPeaksCount[i+1]) {
                offlinePeaks.push({ index: i, vol: Math.round(globalPeaksCount[i]) });
              }
            }
            // 강도순 정렬
            offlinePeaks.sort((a,b) => b.vol - a.vol);

            // 💡 이웃 중복 주파수 배제 필터 필터링 시공
            let finalCleanPeaks = [];
            for (let p of offlinePeaks) {
              let isAdjacent = finalCleanPeaks.some(sel => Math.abs(sel.index - p.index) <= 2);
              if (!isAdjacent) finalCleanPeaks.push(p);
            }
            finalCleanPeaks.sort((a, b) => a.index - b.index);

            // 리포트 팝업창 마크업 텍스트 빌드
            let htmlReport = `
              <strong>🎵 파일명:</strong> ${rawAudioFileObject.name}<br>
              <strong>⏱️ 총 재생 시간:</strong> ${Math.round(audioBuffer.duration)}초<br>
              <strong>⚡ 노이즈컷 기준치 (Gate):</strong> ${threshold} 음압 이상<br>
              <hr style="border:0; border-top:1px dashed #1e293b; margin:8px 0;">
              <strong>🎯 검출된 알짜배기 유효 피크 수:</strong> <span style="color:#00ffcc">${finalCleanPeaks.length}개 대역 검출</span> (이웃 중복 파장 제거 완료)<br><br>
              <strong>📊 검출된 파장 인덱스 상세 목록:</strong><br>
            `;

            if(finalCleanPeaks.length === 0) {
              htmlReport += `<span style="color:#f43f5e">설정하신 노이즈컷 게이트 수치 이상을 넘는 유효 주파수가 존재하지 않습니다.</span>`;
            } else {
              htmlReport += `<div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:4px; margin-top:5px;">`;
              finalCleanPeaks.forEach(p => {
                htmlReport += `<span style="color:#e2e8f0">• Bin <strong style="color:#ffff00">${p.index}</strong> (Vol: ${p.vol})</span>`;
              });
              htmlReport += `</div>`;
            }

            popupReportText.innerHTML = htmlReport;
          };
          reader.readAsArrayBuffer(rawAudioFileObject);
        } catch (err) {
          popupReportText.innerHTML = `<span style="color:#f43f5e">오디오 완전 분석 실패: ${err.message}</span>`;
        }
      });

      // 팝업 닫기 이벤트 핸들러
      popupClose1.addEventListener('click', () => popupShadow.style.display = "none");
      popupClose2.addEventListener('click', () => popupShadow.style.display = "none");

      function drawMasterSpectrumMonitor(rawFFT) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const barCount = 256; const barWidth = canvas.width / barCount;
        for (let i = 0; i < barCount; i++) {
          let val = rawFFT[i] || 0; let h = (val / 255) * (canvas.height * 0.75);
          ctx.fillStyle = 'rgba(30, 41, 59, 0.4)'; ctx.fillRect(i * barWidth, canvas.height - h, barWidth - 0.5, h);
        }
        activeTrackers.forEach((tracker) => {
          if (!tracker.isLocked) return;
          let exactX = (tracker.currentIndex / 255) * canvas.width;
          let val = rawFFT[Math.round(tracker.currentIndex)] || tracker.currentVolume;
          let h = (val / 255) * (canvas.height * 0.75);
          ctx.strokeStyle = isTrackingFrozen ? 'rgba(249, 115, 22, 0.7)' : 'rgba(0, 255, 204, 0.6)';
          ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(exactX, canvas.height); ctx.lineTo(exactX, canvas.height - h - 15); ctx.stroke();
          ctx.fillStyle = isTrackingFrozen ? '#f97316' : '#f43f5e'; ctx.beginPath(); ctx.arc(exactX, canvas.height - h - 15, 3, 0, Math.PI * 2); ctx.fill();
        });
      }

      function updateConsoleStrips() {
        if (consoleBoard.children.length !== activeTrackersCount) {
          consoleBoard.innerHTML = '';
          for (let i = 0; i < activeTrackersCount; i++) {
            const strip = document.createElement('div'); strip.className = 'channel-strip';
            strip.innerHTML = `<div class="v-meter-track"><div class="v-meter-fill" id="peak-fbar-${i}"></div></div><div class="strip-info-tag">CH${String(i+1).padStart(2, '0')}</div><div class="wavelength-lock-badge" id="peak-fidx-${i}">--</div><div class="strip-status-dot" id="peak-fdot-${i}"></div>`;
            consoleBoard.appendChild(strip);
          }
        }
        activeTrackers.forEach((tracker, idx) => {
          const bar = document.getElementById(`peak-fbar-${idx}`); const badge = document.getElementById(`peak-fidx-${idx}`); const dot = document.getElementById(`peak-fdot-${idx}`);
          if (!bar || !badge || !dot) return;
          bar.style.height = `${Math.min(100, Math.round((tracker.currentVolume / 255) * 100))}%`;
          badge.innerText = Math.round(tracker.currentIndex);
          if (tracker.isLocked && tracker.currentVolume > 5) { dot.classList.add('active'); } else { dot.classList.remove('active'); }
        });
      }

      bandCountSelect.addEventListener('change', () => { if(!isTrackingFrozen) activeTrackers = []; });
    });
  </script>
</body>
</html>
