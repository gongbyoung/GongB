<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Audio Studio - Unified FFT Calibrator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body, html {
      width: 100%;
      height: 100%;
      background-color: #05070f;
      color: #cbd5e1;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    .main-layout {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      padding: 15px;
      gap: 15px;
    }
    header {
      background: #0b0f19;
      border: 1px solid #1e293b;
      border-radius: 6px;
      padding: 10px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }
    h1 {
      font-size: 14px;
      color: #00ffcc;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .toolbar-groups {
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    .control-unit {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .control-unit label {
      font-size: 11px;
      color: #94a3b8;
      font-weight: bold;
    }
    select {
      background: #020617;
      color: #00ffcc;
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      outline: none;
      cursor: pointer;
    }
    .btn {
      background: #1e293b;
      color: #cbd5e1;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn:hover {
      background: rgba(0, 240, 255, 0.1);
      color: #00f0ff;
      border-color: #00f0ff;
    }
    .btn-export {
      background: #0284c7;
      color: #fff;
      border-color: #0369a1;
    }
    audio {
      height: 26px;
      background: #020617;
      border-radius: 4px;
      border: 1px solid #334155;
    }

    /* 마스터 작업대 프레임 */
    .console-board-viewport {
      flex: 1;
      background: #010306;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 25px;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
    }

    /* 상단: 일렬로 정렬된 음악 레벨 미터 구역 */
    .meters-container-row {
      flex: 1;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      gap: 4px;
      align-items: flex-end;
    }
    .meter-column-strip {
      flex: 1;
      height: 100%;
      background: rgba(15, 23, 42, 0.2);
      border: 1px solid rgba(51, 65, 85, 0.15);
      border-radius: 3px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      position: relative;
    }
    .v-meter-fill-bar {
      width: 100%;
      height: 2%; 
      background: linear-gradient(0deg, #0044ff 0%, #00ffcc 75%, #ff0055 100%);
      border-radius: 2px 2px 0 0;
      box-shadow: 0 0 8px rgba(0, 255, 204, 0.3);
      transition: height 0.04s ease;
    }
    .strip-text-label {
      font-size: 9px;
      font-family: monospace;
      color: #475569;
      position: absolute;
      bottom: -16px;
    }

    /* 💡 [핵심 개혁]: 나누지 않고 하나로 쭉 이어서 붙인 단일 마스터 슬라이더 트랙 구역 */
    .unified-slider-track-zone {
      height: 50px;
      background: #090d16;
      border: 1px solid #1e293b;
      border-radius: 6px;
      position: relative;
      margin-top: 15px;
      padding: 0 20px; /* 양끝 노브 마진 확보 */
      display: flex;
      align-items: center;
    }
    .unified-base-line {
      width: 100%;
      height: 6px;
      background: #151f32;
      border-radius: 3px;
      position: relative;
    }
    
    /* 단일 트랙 위를 유영하는 경계 노브 점 디스플레이 */
    .unified-slider-thumb {
      position: absolute;
      width: 14px;
      height: 14px;
      background: #ff0055;
      border-radius: 50%;
      top: -4px;
      transform: translateX(-50%);
      cursor: pointer;
      box-shadow: 0 0 8px #ff0055;
      z-index: 10;
      transition: transform 0.1s;
    }
    .unified-slider-thumb:hover {
      transform: translateX(-50%) scale(1.2);
      background: #00ffcc;
      box-shadow: 0 0 8px #00ffcc;
    }
    /* 노브 상단에 실시간으로 표시되는 0~255 Cutoff 인덱스 번호 말풍선 */
    .thumb-index-balloon {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      font-family: monospace;
      color: #00ffcc;
      background: #000;
      padding: 1px 4px;
      border-radius: 2px;
      border: 1px solid #1e293b;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="main-layout">
    <header>
      <h1>🎛️ Contiguous Multi-Thumb Monitor Console</h1>
      
      <div class="toolbar-groups">
        <!-- 3~32개 가변 해상도 대역 제어 드롭다운 -->
        <div class="control-unit">
          <label for="band-count-select">분할 채널 수:</label>
          <select id="band-count-select"></select>
        </div>

        <!-- 독립 오디오 장치 -->
        <div class="control-unit">
          <input type="file" id="file-audio-local" accept="audio/*" style="display:none;">
          <button class="btn" onclick="document.getElementById('file-audio-local').click()">📂 오디오 로드</button>
          <audio id="local-audio-player" controls></audio>
        </div>

        <div class="preset-actions">
          <button class="btn" id="btn-import-json">📂 프리셋 로드</button>
          <button class="btn btn-export" id="btn-export-json">💾 프리셋 저장</button>
          <input type="file" id="file-import-hidden" accept=".json" style="display:none;">
        </div>
      </div>
    </header>

    <!-- 메인 연동 작업 대지 -->
    <main class="console-board-viewport">
      <!-- 상단: 오디오 크기 기둥 레이어 -->
      <div class="meters-container-row" id="meters-stage"></div>

      <!-- 하단: 32개로 쪼개지 않고 하나로 이어서 만든 통째 주파수 트랙 라인 -->
      <div class="unified-slider-track-zone">
        <div class="unified-base-line" id="master-track-line"></div>
      </div>
    </main>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const metersStage = document.getElementById('meters-stage');
      const masterTrackLine = document.getElementById('master-track-line');
      const bandCountSelect = document.getElementById('band-count-select');
      const exportBtn = document.getElementById('btn-export-json');
      const importBtn = document.getElementById('btn-import-json');
      const fileInput = document.getElementById('file-import-hidden');
      const localAudioInput = document.getElementById('file-audio-local');
      const localAudioPlayer = document.getElementById('local-audio-player');

      const broadcast = new BroadcastChannel('cosmic_fft_channel');

      // 3채널부터 32채널까지 옵션 생성
      for (let i = 3; i <= 32; i++) {
        const opt = document.createElement('option');
        opt.value = i; opt.innerText = `${i} 채널 분할`;
        if (i === 32) opt.selected = true;
        bandCountSelect.appendChild(opt);
      }

      let activeBandsCount = 32;
      let splitPoints = []; // 컷오프 인덱스 경계값들 (크기는 언제나 activeBandsCount - 1)
      let currentBandsConfig = { totalBands: activeBandsCount, ranges: [] };

      // 마우스 드래그 상태 관리 변수
      let isDragging = false;
      let activeThumbIdx = -1;

      let audioCtx = null; let analyser = null; let sourceNode = null;

      localAudioInput.addEventListener('change', (e) => {
        const file = e.target.files[0]; if (!file) return;
        localAudioPlayer.src = URL.createObjectURL(file);
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioCtx.createAnalyser(); analyser.fftSize = 512;
          sourceNode = audioCtx.createMediaElementSource(localAudioPlayer);
          sourceNode.connect(analyser); analyser.connect(audioCtx.destination);
        }
      });

      function localTickerLoop() {
        requestAnimationFrame(localTickerLoop);
        if (analyser && !localAudioPlayer.paused) {
          const bufferLength = analyser.frequencyBinCount;
          const dataArray = new Uint8Array(bufferLength);
          analyser.getByteFrequencyData(dataArray);
          calculateLiveBands(dataArray);
        }
      }
      localTickerLoop();

      broadcast.onmessage = (e) => {
        if (localAudioPlayer.paused && e.data && e.data.type === 'AUDIO_STREAM' && e.data.raw) {
          calculateLiveBands(e.data.raw);
        }
      };

      // 💡 [가변 셋업 연산]: 채널 선택에 맞춰 균등 배분 및 스토리지 데이터 마운트
      function initUnifiedWorkspace() {
        activeBandsCount = parseInt(bandCountSelect.value);
        const saved = localStorage.getItem(`cosmic_fft_unified_v3_${activeBandsCount}ch`);
        
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed) && parsed.length === activeBandsCount - 1) {
              splitPoints = parsed;
              rebuildRangesAndSync();
              return;
            }
          } catch(e) {}
        }
        
        splitPoints = [];
        const step = Math.floor(256 / activeBandsCount);
        for (let i = 0; i < activeBandsCount - 1; i++) {
          splitPoints.push((i + 1) * step - 1);
        }
        rebuildRangesAndSync();
      }

      // 💡 [연속 구간 획득 연산]: 단일 트랙 노브 좌표를 32개 영역 대역폭으로 변환
      function rebuildRangesAndSync() {
        currentBandsConfig.totalBands = activeBandsCount;
        currentBandsConfig.ranges = [];
        
        for (let i = 0; i < activeBandsCount; i++) {
          let startIdx = 0; let endIdx = 255;
          if (i === 0) {
            startIdx = 0; endIdx = splitPoints[0];
          } else if (i === activeBandsCount - 1) {
            startIdx = splitPoints[activeBandsCount - 2] + 1; endIdx = 255;
          } else {
            startIdx = splitPoints[i - 1] + 1; endIdx = splitPoints[i];
          }
          currentBandsConfig.ranges.push({ id: i, name: `ch_${i+1}`, start: startIdx, end: endIdx });
        }

        renderMetersAndTrackSliders();
        localStorage.setItem(`cosmic_fft_unified_v3_${activeBandsCount}ch`, JSON.stringify(splitPoints));
        broadcast.postMessage({ type: 'RANGE_UPDATE', config: currentBandsConfig });
      }

      // 💡 [일렬 배치 팩토리]: 상단 독립 기둥 세트와 하단 단일 쭉 이어진 트랙 노브 매핑 조립
      function renderMetersAndTrackSliders() {
        // 1. 상단 소리 바 기둥 재생성
        metersStage.innerHTML = '';
        for (let i = 0; i < activeBandsCount; i++) {
          const strip = document.createElement('div');
          strip.className = 'meter-column-strip';
          strip.innerHTML = `
            <div class="v-meter-fill-bar" id="v-bar-${i}"></div>
            <div class="strip-text-label">CH${String(i+1).padStart(2, '0')}</div>
          `;
          metersStage.appendChild(strip);
        }

        // 2. 하단 단일 마스터 라인 위 노브(점) 재생성
        masterTrackLine.innerHTML = '';
        const totalSplitsNum = activeBandsCount - 1;
        
        for (let i = 0; i < totalSplitsNum; i++) {
          const thumb = document.createElement('div');
          thumb.className = 'unified-slider-thumb';
          
          // 0~255 수치를 백분율 위치로 치환하여 선 위에 정밀 마운트
          let positionPercentage = (splitPoints[i] / 255) * 100;
          thumb.style.left = `${positionPercentage}%`;
          
          thumb.innerHTML = `
            <div class="thumb-index-balloon">${splitPoints[i]}</div>
          `;

          // 마우스 누름 핸들러 연결
          thumb.addEventListener('mousedown', (e) => {
            isDragging = true;
            activeThumbIdx = i;
            e.preventDefault();
          });

          masterTrackLine.appendChild(thumb);
        }
      }

      // 💡 [마스터 드래그 제어 회로]: 단일 트랙 위에서 노브들이 겹치지 않고 연속적으로 미끄러지도록 마우스 트래킹 구현
      document.addEventListener('mousemove', (e) => {
        if (!isDragging || activeThumbIdx === -1) return;

        const rect = masterTrackLine.getBoundingClientRect();
        let mouseX = e.clientX - rect.left;
        let percentage = mouseX / rect.width;
        
        let targetVal = Math.round(percentage * 255);
        if (targetVal < 0) targetVal = 0;
        if (targetVal > 255) targetVal = 255;

        // 양옆 노브 영역 침범 예방을 위한 실시간 상하한 가드선 연산
        const i = activeThumbIdx;
        const minAllowed = (i === 0) ? 0 : splitPoints[i - 1] + 1;
        const maxAllowed = (i === activeBandsCount - 2) ? 254 : splitPoints[i + 1] - 1;

        if (targetVal >= minAllowed && targetVal <= maxAllowed) {
          splitPoints[i] = targetVal;
          rebuildRangesAndSync();
        }
      });

      document.addEventListener('mouseup', () => {
        isDragging = false;
        activeThumbIdx = -1;
      });

      function calculateLiveBands(rawFFT) {
        currentBandsConfig.ranges.forEach((band, idx) => {
          const bar = document.getElementById(`v-bar-${idx}`);
          if (!bar) return;

          let sum = 0; let count = 0;
          for (let i = band.start; i <= band.end; i++) {
            sum += rawFFT[i] || 0; count++;
          }
          let average = count > 0 ? sum / count : 0;
          let heightPercent = Math.min(100, Math.max(2, Math.round((average / 255) * 100)));
          
          bar.style.height = `${heightPercent}%`;
        });
      }

      bandCountSelect.addEventListener('change', () => { initUnifiedWorkspace(); });

      exportBtn.addEventListener('click', () => {
        const outData = { totalBands: activeBandsCount, splits: splitPoints };
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(outData, null, 2));
        const dlAnchor = document.createElement('a');
        dlAnchor.setAttribute("href", dataStr);
        dlAnchor.setAttribute("download", `cosmic_contiguous_${activeBandsCount}ch.json`);
        dlAnchor.click(); dlAnchor.remove();
      });

      importBtn.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const parsed = JSON.parse(event.target.result);
            if (parsed.totalBands && Array.isArray(parsed.splits)) {
              activeBandsCount = parsed.totalBands;
              bandCountSelect.value = activeBandsCount;
              splitPoints = parsed.splits;
              rebuildRangesAndSync();
            }
          } catch(err) {}
        };
        reader.readAsText(file); fileInput.value = '';
      });

      initUnifiedWorkspace();
    });
  </script>
</body>
</html>
