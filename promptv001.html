<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComfyUI Prompt Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 { text-align: center; color: #4CAF50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #aaa; }
        select, input[type="text"] {
            width: 100%; padding: 10px; border-radius: 5px;
            border: 1px solid #444; background-color: #1e1e1e; color: #fff;
            box-sizing: border-box; font-size: 14px;
        }
        button {
            width: 100%; padding: 12px; border: none; border-radius: 5px;
            background-color: #4CAF50; color: white; font-size: 16px; font-weight: bold;
            cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        button:hover { background-color: #45a049; }
        .result-box {
            margin-top: 20px; padding: 15px; border-radius: 5px;
            background-color: #1e1e1e; border: 1px solid #444;
        }
        .result-title { font-weight: bold; margin-bottom: 10px; }
        .positive-title { color: #4CAF50; }
        .negative-title { color: #f44336; }
        textarea {
            width: 100%; height: 100px; padding: 10px; border-radius: 5px;
            border: 1px solid #444; background-color: #2d2d2d; color: #fff;
            box-sizing: border-box; resize: vertical; font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🛠️ ComfyUI Prompt Generator</h2>

    <div style="display: flex; gap: 15px;">
        <div class="form-group" style="flex: 1;">
            <label>타겟 AI 모델</label>
            <select id="targetModel">
                <option value="sd15">SD 1.5 (단어 위주)</option>
                <option value="sdxl">SDXL (자연어 문장형)</option>
                <option value="animatediff">AnimateDiff (영상/모션)</option>
                <option value="audio">Audio (배경음악/효과음)</option>
            </select>
        </div>
        <div class="form-group" style="flex: 1;">
            <label>최종 출력물</label>
            <select id="outputType">
                <option value="image">Image (이미지)</option>
                <option value="video">Video (비디오 시퀀스)</option>
                <option value="mp3">MP3 (오디오)</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>주제 (Subject)</label>
        <input type="text" id="subject" value="귀여운 초코송이 버섯 캐릭터가 뛰어가는 모습">
    </div>
    <div class="form-group">
        <label>배경 (Background)</label>
        <input type="text" id="background" value="비가 내리고 물방울이 튀는 어두운 숲속">
    </div>
    <div class="form-group">
        <label>스타일 (Style)</label>
        <input type="text" id="style" value="3D 렌더링, 블렌더, 후디니 파티클 시뮬레이션 느낌, 언리얼 엔진 5">
    </div>
    <div class="form-group">
        <label>상세 디테일 (Details)</label>
        <input type="text" id="details" value="초고해상도, 시네마틱 라이팅, 텍스처 디테일, 8k">
    </div>

    <button onclick="generatePrompt()">프롬프트 생성하기</button>

    <div class="result-box">
        <div class="result-title positive-title">✅ 긍정 프롬프트 (Positive Prompt)</div>
        <textarea id="posResult" readonly></textarea>
    </div>
    <div class="result-box">
        <div class="result-title negative-title">❌ 부정 프롬프트 (Negative Prompt)</div>
        <textarea id="negResult" readonly></textarea>
    </div>
</div>

<script>
    function generatePrompt() {
        // 1. 입력값 가져오기
        const model = document.getElementById('targetModel').value;
        const subject = document.getElementById('subject').value;
        const background = document.getElementById('background').value;
        const style = document.getElementById('style').value;
        const details = document.getElementById('details').value;

        let posPrompt = "";
        let negPrompt = "";

        // 2. 모델별 분기 처리 (핵심 로직)
        if (model === "sd15") {
            posPrompt = `${subject}, ${background}, ${style}, ${details}, masterpiece, best quality, highly detailed`;
            negPrompt = "worst quality, low quality, bad anatomy, blurry, watermark, cropped";
        } 
        else if (model === "sdxl") {
            posPrompt = `A high quality 3D render of ${subject}, situated in ${background}. The artwork is executed in the style of ${style}. Additional details: ${details}.`;
            negPrompt = "deformed, ugly, poor lighting, low resolution, bad proportions";
        } 
        else if (model === "animatediff") {
            // 영상은 움직임과 일관성 키워드가 중요함
            posPrompt = `(masterpiece:1.2), ${subject}, ${background}, ${style}, ${details}, dynamic motion, smooth animation, perfect camera movement`;
            negPrompt = "static, motionless, flickering, mutated, jittering, worst quality";
        } 
        else if (model === "audio") {
            // 오디오는 bpm, 무드 키워드 중심
            posPrompt = `BGM for ${background}, featuring ${subject} mood, ${style} sound, high quality audio, clear tone`;
            negPrompt = "noise, static, low bitrate, vocal, speech";
        }

        // 3. 화면에 출력
        document.getElementById('posResult').value = posPrompt;
        document.getElementById('negResult').value = negPrompt;
    }
</script>

</body>
</html>
