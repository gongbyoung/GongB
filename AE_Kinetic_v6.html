<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AE Kinetic Typo Pro v6.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;700;900&display=swap');

:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --panel: #13131f;
  --border: #1e1e30;
  --accent: #00e5ff;
  --pink: #ff2d78;
  --gold: #ffd000;
  --green: #00ff88;
  --text: #c8c8e0;
  --text-dim: #555570;
  --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.logo {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 2px;
}
.logo span { color: var(--pink); }
.version-badge {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  background: var(--pink);
  color: #fff;
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 1px;
}

/* Main layout */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Left: textarea */
.left {
  flex: 1.3;
  display: flex;
  flex-direction: column;
  padding: 16px;
  gap: 10px;
  border-right: 1px solid var(--border);
}
.left-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
}
textarea {
  flex: 1;
  background: #050508;
  color: #00e5ff;
  border: 1px solid var(--border);
  padding: 20px;
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  border-radius: var(--radius);
  outline: none;
  line-height: 1.9;
  resize: none;
  transition: border-color 0.2s;
}
textarea:focus { border-color: var(--accent); }

/* Right: controls */
.right {
  width: 380px;
  background: var(--panel);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.right-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.right-scroll::-webkit-scrollbar { width: 4px; }
.right-scroll::-webkit-scrollbar-thumb { background: #2a2a40; border-radius: 2px; }

/* Section */
.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid var(--border);
}
.section-icon {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}
.section-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
}
.section-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }

/* Mode toggle */
.mode-toggle {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.mode-btn {
  padding: 12px 8px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}
.mode-btn.active {
  border-color: var(--accent);
  background: rgba(0,229,255,0.08);
  color: var(--accent);
}
.mode-btn.subtitle-active {
  border-color: var(--gold);
  background: rgba(255,208,0,0.08);
  color: var(--gold);
}

/* Subtitle position (hidden by default) */
.sub-position { display: none; }
.sub-position.visible { display: flex; }
.pos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
.pos-btn {
  padding: 8px 4px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}
.pos-btn.active {
  border-color: var(--gold);
  background: rgba(255,208,0,0.08);
  color: var(--gold);
}

/* Row */
.row { display: flex; gap: 8px; }
.field { display: flex; flex-direction: column; gap: 5px; flex: 1; }
.field-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}
input[type="text"], input[type="number"], select {
  padding: 9px 11px;
  background: #050508;
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 7px;
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
input[type="text"]:focus, input[type="number"]:focus, select:focus { border-color: var(--accent); }

input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
  margin: 4px 0;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}
.range-row { display: flex; align-items: center; gap: 10px; }
.range-val {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--accent);
  min-width: 36px;
  text-align: right;
}

input[type="color"] {
  width: 100%;
  height: 36px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  padding: 2px;
}

/* Chip grid */
.chip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.chip {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 10px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 600;
}
.chip:has(input:checked) { border-color: var(--pink); background: rgba(255,45,120,0.08); color: var(--text); }
.chip input { display: none; }
.chip-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  border: 1px solid currentColor;
  flex-shrink: 0;
  transition: background 0.15s;
}
.chip:has(input:checked) .chip-dot { background: var(--pink); border-color: var(--pink); }

/* Fade direction chips */
.chip-grid.fade .chip:has(input:checked) { border-color: var(--gold); background: rgba(255,208,0,0.07); color: var(--text); }
.chip-grid.fade .chip:has(input:checked) .chip-dot { background: var(--gold); border-color: var(--gold); }

/* Select all row */
.select-row { display: flex; gap: 6px; }
.select-btn {
  flex: 1;
  padding: 6px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-size:10px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
}
.select-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Action buttons */
.action-area {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.btn {
  width: 100%;
  padding: 14px;
  font-weight: 700;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.btn-generate {
  background: var(--pink);
  color: #fff;
  position: relative;
  overflow: hidden;
}
.btn-generate::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0);
  transition: background 0.15s;
}
.btn-generate:hover::after { background: rgba(255,255,255,0.08); }
.btn-download {
  background: transparent;
  color: var(--green);
  border: 1px solid var(--green);
  display: none;
}
.btn-download:hover { background: rgba(0,255,136,0.08); }

/* Status bar */
.status {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  padding: 4px 14px 0;
  text-align: center;
}
.status.ok { color: var(--green); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">AE <span>KINETIC</span> TYPO</div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span style="font-size:11px;color:var(--text-dim);">After Effects JSX Generator</span>
    <span class="version-badge">v6.0</span>
  </div>
</div>

<div class="main">
  <!-- LEFT -->
  <div class="left">
    <div class="left-label">가사 / 자막 입력</div>
    <textarea id="lyricsArea" placeholder="한 줄씩 텍스트를 입력하세요.
띄어쓰기마다 자동 줄바꿈됩니다.

예시:
Hello World
안녕하세요
This is kinetic typography"></textarea>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="right-scroll">

      <!-- 모드 선택 -->
      <div class="section">
        <div class="section-header">
          <div class="section-icon" style="background:var(--gold)"></div>
          <div class="section-title">표시 모드</div>
        </div>
        <div class="section-body">
          <div class="mode-toggle">
            <button class="mode-btn active" id="modeFullBtn" onclick="setMode('full')">
              🖥 전체화면<br><span style="font-size:10px;font-weight:400;color:inherit;opacity:0.7">가사/MV 스타일</span>
            </button>
            <button class="mode-btn" id="modeSubBtn" onclick="setMode('subtitle')">
              📺 자막<br><span style="font-size:10px;font-weight:400;color:inherit;opacity:0.7">하단 고정 자막</span>
            </button>
          </div>
          <!-- 자막 위치 -->
          <div class="sub-position" id="subPositionArea">
            <div class="field">
              <div class="field-label">자막 위치</div>
              <div class="pos-grid">
                <button class="pos-btn" onclick="setSubPos('top_L')">↖ 좌상단</button>
                <button class="pos-btn" onclick="setSubPos('top_C')">↑ 상단</button>
                <button class="pos-btn" onclick="setSubPos('top_R')">↗ 우상단</button>
                <button class="pos-btn" onclick="setSubPos('mid_L')">← 좌중간</button>
                <button class="pos-btn" onclick="setSubPos('mid_C')">· 중앙</button>
                <button class="pos-btn" onclick="setSubPos('mid_R')">→ 우중간</button>
                <button class="pos-btn" onclick="setSubPos('bot_L')">↙ 좌하단</button>
                <button class="pos-btn active" onclick="setSubPos('bot_C')">↓ 하단</button>
                <button class="pos-btn" onclick="setSubPos('bot_R')">↘ 우하단</button>
              </div>
            </div>
          </div>
          <!-- 자막 크기 비율 -->
          <div id="subSizeArea" style="display:none">
            <div class="field">
              <div class="field-label">자막 영역 높이 비율</div>
              <div class="range-row">
                <input type="range" id="subAreaHeight" min="5" max="40" value="20" oninput="document.getElementById('subAreaHeightVal').textContent=this.value+'%'">
                <span class="range-val" id="subAreaHeightVal">20%</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 배치 방식 -->
      <div class="section">
        <div class="section-header">
          <div class="section-icon"></div>
          <div class="section-title">배치 방식</div>
        </div>
        <div class="section-body">
          <div class="field">
            <select id="syncMode">
              <option value="marker">마커 기준 (강력 추천)</option>
              <option value="linear">균등 분할 (줄당 2초)</option>
            </select>
          </div>
        </div>
      </div>

      <!-- 폰트 & 크기 -->
      <div class="section">
        <div class="section-header">
          <div class="section-icon" style="background:var(--accent)"></div>
          <div class="section-title">폰트 & 크기</div>
        </div>
        <div class="section-body">
          <div class="row">
            <div class="field">
              <div class="field-label">폰트 (영문명)</div>
              <select id="fontPreset" onchange="applyFontPreset()">
                <option value="custom">직접 입력</option>
                <optgroup label="-- Sans Serif --">
                  <option value="Arial-Black">Arial Black</option>
                  <option value="ArialMT">Arial</option>
                  <option value="Helvetica-Bold">Helvetica Bold</option>
                  <option value="Impact">Impact</option>
                  <option value="Verdana-Bold">Verdana Bold</option>
                  <option value="Tahoma-Bold">Tahoma Bold</option>
                  <option value="Futura-Bold">Futura Bold</option>
                  <option value="Gill Sans">Gill Sans</option>
                </optgroup>
                <optgroup label="-- Serif --">
                  <option value="Georgia-Bold">Georgia Bold</option>
                  <option value="TimesNewRomanPS-BoldMT">Times New Roman Bold</option>
                  <option value="Garamond-Bold">Garamond Bold</option>
                </optgroup>
                <optgroup label="-- Monospace --">
                  <option value="Courier-Bold">Courier Bold</option>
                  <option value="CourierNewPS-BoldMT">Courier New Bold</option>
                </optgroup>
                <optgroup label="-- 한국어 --">
                  <option value="NanumGothicExtraBold">나눔고딕 ExtraBold</option>
                  <option value="NanumSquareEB">나눔스퀘어 EB</option>
                  <option value="NotoSansKR-Black">Noto Sans KR Black</option>
                  <option value="GmarketSansBold">Gmarket Sans Bold</option>
                  <option value="SpoqaHanSansNeo-Bold">스포카 한 산스 Bold</option>
                  <option value="BlackHanSans-Regular">검은고딕</option>
                </optgroup>
              </select>
            </div>
          </div>
          <div class="field">
            <div class="field-label">폰트 직접 입력</div>
            <input type="text" id="fontName" value="Arial-Black" placeholder="AE에서 사용하는 폰트 영문명">
          </div>
          <div class="row">
            <div class="field">
              <div class="field-label">글자 크기 (px)</div>
              <div class="range-row">
                <input type="range" id="fontSize" min="20" max="300" value="120" oninput="syncFontSize(this.value)">
                <span class="range-val" id="fontSizeVal">120</span>
              </div>
              <input type="number" id="fontSizeNum" value="120" min="1" max="9999" oninput="syncFontSizeNum(this.value)" style="margin-top:4px">
            </div>
          </div>
          <div class="field">
            <div class="field-label">자동 크기 조절</div>
            <select id="autoScale">
              <option value="fit">화면에 맞게 자동 조절</option>
              <option value="fixed">고정 (입력 크기 그대로)</option>
            </select>
          </div>
          <div class="row">
            <div class="field">
              <div class="field-label">글자 색상</div>
              <input type="color" id="fontColor" value="#ffffff">
            </div>
            <div class="field">
              <div class="field-label">획 색상</div>
              <input type="color" id="strokeColor" value="#000000">
            </div>
          </div>
          <div class="field">
            <div class="field-label">획 두께 (0 = 없음)</div>
            <div class="range-row">
              <input type="range" id="strokeWidth" min="0" max="30" value="0" oninput="document.getElementById('strokeWidthVal').textContent=this.value">
              <span class="range-val" id="strokeWidthVal">0</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Fade In 효과 -->
      <div class="section">
        <div class="section-header">
          <div class="section-icon" style="background:var(--gold)"></div>
          <div class="section-title">Fade In 방향</div>
        </div>
        <div class="section-body">
          <div class="field">
            <div class="field-label">Fade 방식</div>
            <select id="fadeMode">
              <option value="random">랜덤 믹스 (체크된 것 중)</option>
              <option value="fixed">고정 (체크된 첫 번째만)</option>
            </select>
          </div>
          <div class="select-row">
            <button class="select-btn" onclick="selectAllFade(true)">전체 선택</button>
            <button class="select-btn" onclick="selectAllFade(false)">전체 해제</button>
          </div>
          <div class="chip-grid fade" id="fadePool">
            <label class="chip"><input type="checkbox" value="fade_h" checked><div class="chip-dot"></div>→ 가로 Fade</label>
            <label class="chip"><input type="checkbox" value="fade_v" checked><div class="chip-dot"></div>↓ 세로 Fade</label>
            <label class="chip"><input type="checkbox" value="fade_diag_tl" checked><div class="chip-dot"></div>↘ 대각 (좌→우)</label>
            <label class="chip"><input type="checkbox" value="fade_diag_tr"><div class="chip-dot"></div>↙ 대각 (우→좌)</label>
            <label class="chip"><input type="checkbox" value="fade_zoom_in" checked><div class="chip-dot"></div>⊕ 줌인</label>
            <label class="chip"><input type="checkbox" value="fade_zoom_out"><div class="chip-dot"></div>⊖ 줌아웃</label>
          </div>
        </div>
      </div>

      <!-- 모션 효과 -->
      <div class="section">
        <div class="section-header">
          <div class="section-icon" style="background:var(--pink)"></div>
          <div class="section-title">모션 효과 풀</div>
        </div>
        <div class="section-body">
          <div class="select-row">
            <button class="select-btn" onclick="selectAll(true)">전체 선택</button>
            <button class="select-btn" onclick="selectAll(false)">전체 해제</button>
          </div>
          <div class="chip-grid" id="effectPool">
            <label class="chip"><input type="checkbox" value="pop" checked><div class="chip-dot"></div>Pop Bounce</label>
            <label class="chip"><input type="checkbox" value="side_L" checked><div class="chip-dot"></div>Elastic L</label>
            <label class="chip"><input type="checkbox" value="side_R" checked><div class="chip-dot"></div>Elastic R</label>
            <label class="chip"><input type="checkbox" value="top" checked><div class="chip-dot"></div>Drop Down</label>
            <label class="chip"><input type="checkbox" value="bottom" checked><div class="chip-dot"></div>Rise Up</label>
            <label class="chip"><input type="checkbox" value="zoom" checked><div class="chip-dot"></div>Power Zoom</label>
            <label class="chip"><input type="checkbox" value="glitch" checked><div class="chip-dot"></div>Glitch</label>
            <label class="chip"><input type="checkbox" value="swing" checked><div class="chip-dot"></div>Swing</label>
            <label class="chip"><input type="checkbox" value="blur" checked><div class="chip-dot"></div>Blur In</label>
            <label class="chip"><input type="checkbox" value="typewriter"><div class="chip-dot"></div>Typewriter</label>
            <label class="chip"><input type="checkbox" value="wave" checked><div class="chip-dot"></div>Wave Move</label>
            <label class="chip"><input type="checkbox" value="flash" checked><div class="chip-dot"></div>Flash In</label>
            <label class="chip"><input type="checkbox" value="rubber"><div class="chip-dot"></div>Rubber Band</label>
            <label class="chip"><input type="checkbox" value="spin"><div class="chip-dot"></div>Spin Drop</label>
          </div>
        </div>
      </div>

    </div><!-- end right-scroll -->

    <div class="action-area">
      <div class="status" id="statusMsg">가사를 입력하고 생성 버튼을 누르세요.</div>
      <button class="btn btn-download" id="downloadBtn" onclick="saveFile()">💾 .JSX 파일 저장</button>
      <button class="btn btn-generate" id="generateBtn" onclick="doBuild()">⚡ JSX 스크립트 생성</button>
    </div>
  </div><!-- end right -->
</div><!-- end main -->

<script>
let codeBuffer = "";
let currentMode = "full";
let currentSubPos = "bot_C";

function setMode(mode) {
  currentMode = mode;
  const fullBtn = document.getElementById('modeFullBtn');
  const subBtn = document.getElementById('modeSubBtn');
  const subPos = document.getElementById('subPositionArea');
  const subSize = document.getElementById('subSizeArea');

  if (mode === 'full') {
    fullBtn.className = 'mode-btn active';
    subBtn.className = 'mode-btn';
    subPos.className = 'sub-position';
    subSize.style.display = 'none';
  } else {
    fullBtn.className = 'mode-btn';
    subBtn.className = 'mode-btn subtitle-active';
    subPos.className = 'sub-position visible';
    subSize.style.display = 'block';
  }
}

function setSubPos(pos) {
  currentSubPos = pos;
  document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function applyFontPreset() {
  const v = document.getElementById('fontPreset').value;
  if (v !== 'custom') document.getElementById('fontName').value = v;
}

function syncFontSize(v) {
  document.getElementById('fontSizeVal').textContent = v;
  document.getElementById('fontSizeNum').value = v;
}
function syncFontSizeNum(v) {
  const clamped = Math.max(1, Math.min(9999, parseInt(v) || 120));
  document.getElementById('fontSize').value = Math.min(clamped, 300);
  document.getElementById('fontSizeVal').textContent = clamped;
}

function selectAll(val) {
  document.querySelectorAll('#effectPool input').forEach(el => el.checked = val);
}
function selectAllFade(val) {
  document.querySelectorAll('#fadePool input').forEach(el => el.checked = val);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  return `[${r.toFixed(3)}, ${g.toFixed(3)}, ${b.toFixed(3)}]`;
}

function doBuild() {
  const lyricsText = document.getElementById('lyricsArea').value;
  const rawLines = lyricsText.split('\n').filter(s => s.trim() !== "" && !s.trim().startsWith('['));
  if (rawLines.length === 0) {
    document.getElementById('statusMsg').textContent = '⚠ 입력된 텍스트가 없습니다.';
    document.getElementById('statusMsg').className = 'status';
    return;
  }

  const font        = document.getElementById('fontName').value;
  const color       = hexToRgb(document.getElementById('fontColor').value);
  const strokeColor = hexToRgb(document.getElementById('strokeColor').value);
  const strokeWidth = parseInt(document.getElementById('strokeWidth').value);
  const fontSize    = parseInt(document.getElementById('fontSizeNum').value) || 120;
  const autoScale   = document.getElementById('autoScale').value;
  const syncMode    = document.getElementById('syncMode').value;
  const subHeight   = parseInt(document.getElementById('subAreaHeight').value) / 100;
  const effects     = Array.from(document.querySelectorAll('#effectPool input:checked')).map(el => el.value);
  const fadeEffects = Array.from(document.querySelectorAll('#fadePool input:checked')).map(el => el.value);
  const fadeMode    = document.getElementById('fadeMode').value;

  if (effects.length === 0) {
    document.getElementById('statusMsg').textContent = '⚠ 모션 효과를 하나 이상 선택하세요.';
    return;
  }
  if (fadeEffects.length === 0) {
    document.getElementById('statusMsg').textContent = '⚠ Fade In 방향을 하나 이상 선택하세요.';
    return;
  }

  const processedLines = rawLines.map(line => {
    const words = line.trim().split(/\s+/);
    return words.map(word => {
      let chunked = "";
      for (let i = 0; i < word.length; i += 8) {
        chunked += word.substring(i, i+8) + (i+8 < word.length ? "\r" : "");
      }
      return chunked;
    }).join('\r');
  });

  // Subtitle position calc helper
  const subPosMap = {
    top_L:  `[comp.width * 0.1, comp.height * ${subHeight / 2}]`,
    top_C:  `[comp.width * 0.5, comp.height * ${subHeight / 2}]`,
    top_R:  `[comp.width * 0.9, comp.height * ${subHeight / 2}]`,
    mid_L:  `[comp.width * 0.1, comp.height * 0.5]`,
    mid_C:  `[comp.width * 0.5, comp.height * 0.5]`,
    mid_R:  `[comp.width * 0.9, comp.height * 0.5]`,
    bot_L:  `[comp.width * 0.1, comp.height * ${1 - subHeight / 2}]`,
    bot_C:  `[comp.width * 0.5, comp.height * ${1 - subHeight / 2}]`,
    bot_R:  `[comp.width * 0.9, comp.height * ${1 - subHeight / 2}]`,
  };
  const subPosCode = subPosMap[currentSubPos] || subPosMap['bot_C'];

  codeBuffer = `/* =====================================================
   AE Kinetic Typo Script v6.0
   Mode: ${currentMode === 'full' ? 'Fullscreen' : 'Subtitle (' + currentSubPos + ')'}
   Generated: ${new Date().toLocaleString('ko-KR')}
   ===================================================== */
(function() {
    app.beginUndoGroup("v6.0 Kinetic Typo");
    var comp = app.project.activeItem;
    if (!comp || !(comp instanceof CompItem)) {
        alert("활성 컴포지션을 선택하세요.");
        return;
    }

    var selLayer = comp.selectedLayers[0];
    var useMarker = ${syncMode === 'marker'};
    var isSubtitle = ${currentMode === 'subtitle'};
    var subHeight = ${subHeight};
    var effectsPool = ${JSON.stringify(effects)};
    var fadePool = ${JSON.stringify(fadeEffects)};
    var fadeMode = "${fadeMode}";
    var lines = ${JSON.stringify(processedLines)};

    /* ---- 위치 영역 계산 ---- */
    var targetW, targetH, baseY, baseX;
    if (isSubtitle) {
        // 자막 모드: 지정된 영역 내에 배치
        targetW = comp.width * 0.9;
        targetH = comp.height * subHeight;
        var subPos = ${subPosCode};
        baseX = subPos[0];
        baseY = subPos[1];
    } else {
        // 전체화면 모드
        targetW = comp.width * 0.92;
        targetH = comp.height * 0.85;
        baseX = comp.width / 2;
        baseY = comp.height * 0.05;
    }

    /* ---- 자막 배경 박스 추가 (자막 모드 시) ---- */
    if (isSubtitle) {
        var bgShape = comp.layers.addShape();
        bgShape.name = "자막 배경";
        var bgContents = bgShape.property("ADBE Root Vectors Group");
        var bgRect = bgContents.addProperty("ADBE Vector Shape - Rect");
        bgRect.property("ADBE Vector Rect Size").setValue([comp.width, comp.height * subHeight]);
        var bgFill = bgContents.addProperty("ADBE Vector Graphic - Fill");
        bgFill.property("ADBE Vector Fill Color").setValue([0, 0, 0]);
        bgShape.property("ADBE Layer Overrides").property("ADBE Opacity").setValue(65);
        bgShape.position.setValue([comp.width / 2, ${subPosCode}[1]]);
    }

    /* ---- 텍스트 레이어 생성 ---- */
    for (var i = 0; i < lines.length; i++) {
        var layer = comp.layers.addText(lines[i]);
        layer.name = "Line_" + (i + 1) + "_" + lines[i].substring(0, 10);

        var sourceText = layer.property("ADBE Text Properties").property("ADBE Text Document");
        var doc = sourceText.value;
        doc.fontSize = ${fontSize};
        doc.font = "${font}";
        doc.fillColor = ${color};
        ${strokeWidth > 0 ? `doc.strokeColor = ${strokeColor}; doc.strokeWidth = ${strokeWidth}; doc.strokeOverFill = true;` : ''}
        doc.justification = ParagraphJustification.CENTER_JUSTIFY;
        doc.leading = ${Math.round(fontSize * 0.8)};
        sourceText.setValue(doc);

        /* 타임라인 배치 */
        var st, et;
        if (useMarker && selLayer && i < selLayer.marker.numKeys) {
            st = selLayer.marker.keyTime(i + 1);
            et = (i + 1 < selLayer.marker.numKeys) ? selLayer.marker.keyTime(i + 2) : st + 2.0;
        } else {
            st = i * 2;
            et = st + 1.8;
        }
        layer.startTime = st;
        layer.outPoint = et;

        /* 크기 및 위치 */
        var rect = layer.sourceRectAtTime(st, false);
        layer.anchorPoint.setValue([rect.left + rect.width / 2, rect.top + rect.height / 2]);

        if (!isSubtitle) {
            /* 전체화면: 자동/고정 스케일 */
            ${autoScale === 'fit' ? `
            var scalePct = Math.min((targetW / rect.width) * 100, (targetH / rect.height) * 100);
            if (scalePct > 450) scalePct = 450;
            layer.scale.setValue([scalePct, scalePct]);
            layer.position.setValue([baseX, baseY + (rect.height * scalePct / 200)]);
            ` : `
            layer.scale.setValue([100, 100]);
            layer.position.setValue([baseX, comp.height / 2]);
            `}
        } else {
            /* 자막 모드: 영역 내 자동 맞춤 */
            var scalePct = Math.min((targetW / rect.width) * 100, (targetH / rect.height) * 100);
            if (scalePct > 200) scalePct = 200;
            layer.scale.setValue([scalePct, scalePct]);
            layer.position.setValue([baseX, baseY]);
        }

        /* Fade In 효과 선택 */
        var thisFade;
        if (fadeMode === "random") {
            thisFade = fadePool[Math.floor(Math.random() * fadePool.length)];
        } else {
            thisFade = fadePool[0];
        }

        /* 모션 효과 선택 (1~3개) */
        var numPick = Math.floor(Math.random() * 3) + 1;
        var picks = [];
        var tempPool = effectsPool.slice();
        for (var k = 0; k < numPick; k++) {
            if (tempPool.length === 0) break;
            var rIdx = Math.floor(Math.random() * tempPool.length);
            picks.push(tempPool[rIdx]);
            tempPool.splice(rIdx, 1);
        }

        applyEffects(layer, picks, thisFade, st, et, comp);
    }

    /* ============ 효과 적용 함수 ============ */
    function applyEffects(l, picks, fade, start, end, comp) {

        /* --- Fade In 투명도 --- */
        l.property("ADBE Transform Group").property("ADBE Opacity").setValueAtTime(start, 0);
        l.property("ADBE Transform Group").property("ADBE Opacity").setValueAtTime(start + 0.15, 100);

        /* --- Fade 방향 --- */
        var pos = l.position.value;
        var sc  = l.scale.value;

        if (fade === "fade_h") {
            /* 가로: 왼쪽에서 슬라이드인 */
            l.position.setValueAtTime(start, [pos[0] - comp.width * 0.12, pos[1]]);
            l.position.setValueAtTime(start + 0.25, pos);
        } else if (fade === "fade_v") {
            /* 세로: 아래에서 올라옴 */
            l.position.setValueAtTime(start, [pos[0], pos[1] + comp.height * 0.08]);
            l.position.setValueAtTime(start + 0.25, pos);
        } else if (fade === "fade_diag_tl") {
            /* 대각 (좌상→현재) */
            l.position.setValueAtTime(start, [pos[0] - comp.width * 0.1, pos[1] - comp.height * 0.06]);
            l.position.setValueAtTime(start + 0.25, pos);
        } else if (fade === "fade_diag_tr") {
            /* 대각 (우상→현재) */
            l.position.setValueAtTime(start, [pos[0] + comp.width * 0.1, pos[1] - comp.height * 0.06]);
            l.position.setValueAtTime(start + 0.25, pos);
        } else if (fade === "fade_zoom_in") {
            /* 줌인 */
            l.scale.setValueAtTime(start, [sc[0] * 0.5, sc[1] * 0.5]);
            l.scale.setValueAtTime(start + 0.25, sc);
        } else if (fade === "fade_zoom_out") {
            /* 줌아웃 */
            l.scale.setValueAtTime(start, [sc[0] * 1.6, sc[1] * 1.6]);
            l.scale.setValueAtTime(start + 0.25, sc);
        }

        /* 이징 적용 */
        try {
            var posKeys = l.position.numKeys;
            for (var ki = 1; ki <= posKeys; ki++) {
                l.position.setTemporalEaseAtKey(ki,
                    [new KeyframeEase(0, 50)], [new KeyframeEase(0, 50)]);
            }
            var scKeys = l.scale.numKeys;
            for (var ki2 = 1; ki2 <= scKeys; ki2++) {
                l.scale.setTemporalEaseAtKey(ki2,
                    [new KeyframeEase(0, 50)], [new KeyframeEase(0, 50)]);
            }
        } catch(e) {}

        /* --- 모션 효과 --- */
        for (var m = 0; m < picks.length; m++) {
            var type = picks[m];
            try {
                if (type === "side_L") {
                    var p2 = l.position.value;
                    l.position.setValueAtTime(start, [p2[0] - comp.width * 0.35, p2[1]]);
                    l.position.setValueAtTime(start + 0.1, [p2[0] + 30, p2[1]]);
                    l.position.setValueAtTime(start + 0.22, p2);
                }
                if (type === "side_R") {
                    var p3 = l.position.value;
                    l.position.setValueAtTime(start, [p3[0] + comp.width * 0.35, p3[1]]);
                    l.position.setValueAtTime(start + 0.1, [p3[0] - 30, p3[1]]);
                    l.position.setValueAtTime(start + 0.22, p3);
                }
                if (type === "top") {
                    var p4 = l.position.value;
                    l.position.setValueAtTime(start, [p4[0], p4[1] - comp.height * 0.4]);
                    l.position.setValueAtTime(start + 0.12, [p4[0], p4[1] + 25]);
                    l.position.setValueAtTime(start + 0.25, p4);
                }
                if (type === "bottom") {
                    var p5 = l.position.value;
                    l.position.setValueAtTime(start, [p5[0], p5[1] + comp.height * 0.4]);
                    l.position.setValueAtTime(start + 0.12, [p5[0], p5[1] - 25]);
                    l.position.setValueAtTime(start + 0.25, p5);
                }
                if (type === "pop") {
                    var sc2 = l.scale.value;
                    l.scale.setValueAtTime(start,       [sc2[0] * 0.1, sc2[1] * 0.1]);
                    l.scale.setValueAtTime(start + 0.12,[sc2[0] * 1.2, sc2[1] * 1.2]);
                    l.scale.setValueAtTime(start + 0.22, sc2);
                }
                if (type === "zoom") {
                    var sc3 = l.scale.value;
                    l.scale.setValueAtTime(start,        [sc3[0] * 3.5, sc3[1] * 3.5]);
                    l.scale.setValueAtTime(start + 0.18, sc3);
                }
                if (type === "glitch") {
                    /* Glitch: 위치 흔들기 키프레임 방식으로 교체 */
                    var gp = l.position.value;
                    var gOpacity = l.property("ADBE Transform Group").property("ADBE Opacity");
                    l.position.setValueAtTime(start,        [gp[0] + 18, gp[1] - 10]);
                    l.position.setValueAtTime(start + 0.04, [gp[0] - 15, gp[1] + 12]);
                    l.position.setValueAtTime(start + 0.08, [gp[0] + 10, gp[1] - 8]);
                    l.position.setValueAtTime(start + 0.12, [gp[0] - 8,  gp[1] + 5]);
                    l.position.setValueAtTime(start + 0.16, gp);
                    gOpacity.setValueAtTime(start,        20);
                    gOpacity.setValueAtTime(start + 0.04, 90);
                    gOpacity.setValueAtTime(start + 0.08, 40);
                    gOpacity.setValueAtTime(start + 0.12, 100);
                }
                if (type === "swing") {
                    /* Swing: 회전 키프레임 */
                    var ap = l.anchorPoint.value;
                    l.anchorPoint.setValue([ap[0], ap[1] - 80]);
                    l.rotation.setValueAtTime(start,        -35);
                    l.rotation.setValueAtTime(start + 0.15,  20);
                    l.rotation.setValueAtTime(start + 0.28, -10);
                    l.rotation.setValueAtTime(start + 0.40,   5);
                    l.rotation.setValueAtTime(start + 0.50,   0);
                }
                if (type === "blur") {
                    var blur = l.property("ADBE Effect Parade").addProperty("ADBE Gaussian Blur 2");
                    blur.property("ADBE Gaussians Blurriness").setValueAtTime(start,        80);
                    blur.property("ADBE Gaussians Blurriness").setValueAtTime(start + 0.3,   0);
                }
                if (type === "typewriter") {
                    /* Typewriter: 문자 애니메이터 */
                    var animGroup = l.property("ADBE Text Properties")
                                     .property("ADBE Text Animators")
                                     .addProperty("ADBE Text Animator");
                    animGroup.name = "Typewriter";
                    var rangeSel = animGroup.property("ADBE Text Selectors")
                                            .addProperty("ADBE Text Range Selector");
                    rangeSel.property("ADBE Text Index Start").setValue(0);
                    var animProps = animGroup.property("ADBE Text Animator Properties");
                    var opProp = animProps.addProperty("ADBE Text Opacity");
                    opProp.setValue(0);
                    rangeSel.property("ADBE Text Index End").setValueAtTime(start, 0);
                    var textLen = l.property("ADBE Text Properties")
                                   .property("ADBE Text Document").value.toString().length;
                    rangeSel.property("ADBE Text Index End").setValueAtTime(
                        start + Math.min(textLen * 0.06, 0.8), textLen);
                }
                if (type === "wave") {
                    var wp = l.position.value;
                    var dur = end - start;
                    for (var wi = 0; wi <= 8; wi++) {
                        var wt = start + (dur * wi / 8);
                        var wy = wp[1] + Math.sin(wi * Math.PI / 2) * 30;
                        l.position.setValueAtTime(wt, [wp[0], wy]);
                    }
                }
                if (type === "flash") {
                    var fo = l.property("ADBE Transform Group").property("ADBE Opacity");
                    fo.setValueAtTime(start,        0);
                    fo.setValueAtTime(start + 0.04, 100);
                    fo.setValueAtTime(start + 0.09, 20);
                    fo.setValueAtTime(start + 0.13, 100);
                    fo.setValueAtTime(start + 0.18, 60);
                    fo.setValueAtTime(start + 0.22, 100);
                }
                if (type === "rubber") {
                    var sc4 = l.scale.value;
                    l.scale.setValueAtTime(start,        [sc4[0] * 1.5, sc4[1] * 0.5]);
                    l.scale.setValueAtTime(start + 0.1,  [sc4[0] * 0.8, sc4[1] * 1.3]);
                    l.scale.setValueAtTime(start + 0.18, [sc4[0] * 1.1, sc4[1] * 0.9]);
                    l.scale.setValueAtTime(start + 0.26, sc4);
                }
                if (type === "spin") {
                    l.rotation.setValueAtTime(start,        -180);
                    l.rotation.setValueAtTime(start + 0.2,    10);
                    l.rotation.setValueAtTime(start + 0.3,   0);
                    var sc5 = l.scale.value;
                    l.scale.setValueAtTime(start,        [sc5[0] * 0.1, sc5[1] * 0.1]);
                    l.scale.setValueAtTime(start + 0.2,   sc5);
                }
            } catch (effErr) {
                // 효과 적용 실패 시 건너뜀
            }
        }

        /* --- Fade Out --- */
        var fadeOutTime = end - 0.15;
        if (fadeOutTime > start + 0.3) {
            l.property("ADBE Transform Group").property("ADBE Opacity")
             .setValueAtTime(fadeOutTime, 100);
            l.property("ADBE Transform Group").property("ADBE Opacity")
             .setValueAtTime(end, 0);
        }
    }

    app.endUndoGroup();
    alert("✅ 완료! " + lines.length + "개 레이어가 생성되었습니다.\\n모드: ${currentMode === 'full' ? '전체화면' : '자막 (' + currentSubPos + ')'}");
})();`;

  document.getElementById('downloadBtn').style.display = "block";
  document.getElementById('statusMsg').textContent = `✅ ${rawLines.length}줄 생성 완료`;
  document.getElementById('statusMsg').className = 'status ok';
}

function saveFile() {
  if (!codeBuffer) return;
  const blob = new Blob([codeBuffer], { type: 'text/javascript' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `AE_Kinetic_v6_${currentMode}_${new Date().toISOString().slice(0,10)}.jsx`;
  a.click();
}
</script>
