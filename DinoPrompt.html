<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>디노 이미지 프롬프트 빌더 v1.0 (2026.03.20)</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1f2430;
      --line: #2c3444;
      --text: #f3f5f7;
      --sub: #aab4c3;
      --accent: #7dd3fc;
      --good: #86efac;
      --warn: #f9a8d4;
      --bad: #fca5a5;
      --picker-bg: #111827;
      --picker-chip: #1f2937;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", Arial, sans-serif;
      background: linear-gradient(180deg, #0c0f14, #11151d);
      color: var(--text);
    }

    body.modal-open {
      overflow: hidden;
    }

    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero { margin-bottom: 18px; }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }
    .sub {
      color: var(--sub);
      line-height: 1.5;
    }

    .quick-guide {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid rgba(125, 211, 252, 0.28);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(25, 35, 52, 0.9), rgba(18, 26, 40, 0.88));
      color: #dbeafe;
      font-size: 13px;
      line-height: 1.55;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    }

    .quick-guide strong {
      color: var(--accent);
      font-weight: 800;
      margin-right: 6px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(360px, 0.8fr);
      gap: 20px;
      align-items: start;
    }

    .card {
      background: rgba(23, 26, 33, 0.95);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    .sticky-card {
      position: sticky;
      top: 16px;
      max-height: calc(100vh - 32px);
      overflow: auto;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 14px;
      color: var(--sub);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    input[type="text"], textarea {
      width: 100%;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.5;
    }

    .picker-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
      width: 100%;
    }

    .picker-trigger {
      flex: 0 0 84px;
      min-width: 84px;
      max-width: 84px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 12px;
      padding: 0 12px;
      font-size: 14px;
      outline: none;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0;
      white-space: nowrap;
      overflow: hidden;
    }

    .picker-trigger .value {
      display: none;
    }

    .picker-trigger .placeholder { display: none; }
    .picker-trigger .arrow {
      color: var(--accent);
      font-size: 12px;
      flex: 0 0 auto;
    }

    .mini-btn {
      min-width: 58px;
      padding: 0 10px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #243041;
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .mini-btn.random {
      background: #243041;
      border-color: var(--line);
      color: var(--text);
    }

    details {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(31, 36, 48, 0.5);
      padding: 12px 14px;
      margin-top: 8px;
    }

    summary {
      cursor: pointer;
      color: var(--accent);
      font-weight: 700;
      list-style: none;
    }
    summary::-webkit-details-marker { display: none; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
      color: #071019;
      background: var(--accent);
      font-weight: 700;
    }

    button.secondary {
      background: #273142;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .result-box {
      width: 100%;
      min-height: 420px;
      white-space: pre-wrap;
      line-height: 1.7;
      background: #0f1520;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      color: #e8edf2;
      font-size: 13px;
      font-family: Consolas, Monaco, 'Courier New', monospace;
      resize: vertical;
    }

    .prompt-tabs {
      display: flex;
      gap: 8px;
      margin: 10px 0 12px;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: #273142;
      color: var(--text);
      border: 1px solid var(--line);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab-btn.active {
      background: #123041;
      color: var(--accent);
      border-color: #38bdf8;
    }

    .copy-bar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      margin: 0 0 12px;
      padding: 10px 0 12px;
      background: linear-gradient(180deg, rgba(23,26,33,0.98), rgba(23,26,33,0.92));
      border-bottom: 1px solid rgba(44,52,68,0.8);
    }

    .primary-copy-btn {
      width: 100%;
      min-height: 54px;
      padding: 14px 18px;
      background: linear-gradient(135deg, #38bdf8, #22c55e);
      color: #04121a;
      box-shadow: 0 10px 22px rgba(34, 197, 94, 0.18);
      border: 1px solid rgba(125, 211, 252, 0.45);
      font-size: 15px;
      white-space: nowrap;
    }

    .helper {
      font-size: 12px;
      color: var(--sub);
      line-height: 1.45;
    }

    .status {
      font-size: 13px;
      color: var(--good);
      min-height: 20px;
      margin-top: 8px;
      line-height: 1.45;
    }

    .status.error { color: var(--bad); }
    .divider {
      height: 1px;
      background: var(--line);
      margin: 16px 0;
    }

    .copy-fallback {
      margin-top: 14px;
      padding: 12px;
      border: 1px dashed var(--line);
      border-radius: 14px;
      background: rgba(15, 21, 32, 0.7);
      display: none;
    }

    .copy-fallback.active { display: block; }
    .copy-fallback textarea {
      min-height: 120px;
      margin-top: 10px;
      font-size: 13px;
    }

    

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(4, 8, 14, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 24px;
      overscroll-behavior: contain;
    }

    .modal.active { display: flex; }

    .modal-card {
      width: min(1120px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: var(--picker-bg);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      position: sticky;
      top: -20px;
      padding: 4px 0 12px;
      background: var(--picker-bg);
      z-index: 3;
    }

    .modal-title {
      font-size: 22px;
      font-weight: 800;
      margin: 0;
    }

    .modal-close {
      background: #243041;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .modal-search { margin-bottom: 16px; }
    .modal-search input {
      width: 100%;
      background: #0f172a;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--text);
      padding: 13px 15px;
      font-size: 15px;
    }

    .picker-category { margin-bottom: 18px; }
    .picker-category h3 {
      margin: 0 0 12px;
      font-size: 17px;
      font-weight: 800;
      color: var(--accent);
    }

    .picker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }

    .picker-option {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #3a475f;
      background: #243041;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.55;
      text-align: left;
    }

    .picker-option:hover {
      border-color: var(--accent);
      background: #304562;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      .sticky-card {
        position: static;
        max-height: none;
        overflow: visible;
      }
      .picker-grid { grid-template-columns: 1fr; }
      .picker-row { flex-wrap: wrap; }
      .mini-btn { min-height: 42px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>디노 이미지 프롬프트 빌더 v1.0 (2026.03.20)</h1>
      <div class="sub">
        최신 버전은 채널을 참조해주세요<br>
        https://www.youtube.com/@Denoise-AI
      </div>
      <div class="quick-guide">
        <strong>기본 사용법</strong>
        왼쪽 항목을 원하는 만큼 채워넣고, 오른쪽의 복사 버튼을 눌러서 GPT 또는 제미나이에 입력하세요
      </div>
    </div>

    <div class="layout">
      <div class="card">
        <h2 class="section-title">기본 입력</h2>

        <div class="field full">
          <label><span>주제 (이것만 입력해도 잘 작동 합니다)</span></label>
          <textarea id="topic" placeholder="예: 중년 남자 가수가 무대에서 감성적으로 노래하는 모습 / 아기 래브라도가 공원에서 신나게 뛰노는 장면"></textarea>
        </div>

        <div class="grid">
          <div class="field">
            <label><span>피사체 위치</span></label>
            <div class="picker-row">
              <input id="subjectPosition" type="text" placeholder="예: 화면 정중앙에 위치, 왼쪽 여백을 크게 두고 위치" />
              <button class="picker-trigger" type="button" data-picker="subjectPosition">
                <span class="value placeholder" id="subjectPositionDisplay"></span>
                <span class="arrow">프리셋</span>
              </button>
              <button class="mini-btn random" type="button" data-random="subjectPosition">랜덤</button>
              <button class="mini-btn" type="button" data-clear="subjectPosition">취소</button>
            </div>
          </div>

          <div class="field">
            <label><span>피사체 설명</span></label>
            <div class="picker-row">
              <input id="subjectDetail" type="text" placeholder="예 : 피사체를 설명하는데 도움이 될만한 정보를 입력하세요" />
              <button class="picker-trigger" type="button" data-picker="subjectDetail">
                <span class="value placeholder" id="subjectDetailDisplay"></span>
                <span class="arrow">프리셋</span>
              </button>
              <button class="mini-btn random" type="button" data-random="subjectDetail">랜덤</button>
              <button class="mini-btn" type="button" data-clear="subjectDetail">취소</button>
            </div>
          </div>

          <div class="field">
            <label><span>배경/장소</span></label>
            <div class="picker-row">
              <input id="background" type="text" placeholder="예: 콘서트 무대, 해질녘 공원, 고급 스튜디오" />
              <button class="picker-trigger" type="button" data-picker="background">
                <span class="value placeholder" id="backgroundDisplay"></span>
                <span class="arrow">프리셋</span>
              </button>
              <button class="mini-btn random" type="button" data-random="background">랜덤</button>
              <button class="mini-btn" type="button" data-clear="background">취소</button>
            </div>
          </div>

          <div class="field">
            <label><span>인물 포즈</span></label>
            <div class="picker-row">
              <input id="pose" type="text" placeholder="예: 의자에 다리를 꼬고 앉아 있는 자세" />
              <button class="picker-trigger" type="button" data-picker="pose">
                <span class="value placeholder" id="poseDisplay"></span>
                <span class="arrow">프리셋</span>
              </button>
              <button class="mini-btn random" type="button" data-random="pose">랜덤</button>
              <button class="mini-btn" type="button" data-clear="pose">취소</button>
            </div>
          </div>

          <div class="field">
            <label><span>카메라 각도</span></label>
            <div class="picker-row">
              <input id="angle" type="text" placeholder="예: 아래에서 올려다보는 시점" />
              <button class="picker-trigger" type="button" data-picker="angle">
                <span class="value placeholder" id="angleDisplay"></span>
                <span class="arrow">프리셋</span>
              </button>
              <button class="mini-btn random" type="button" data-random="angle">랜덤</button>
              <button class="mini-btn" type="button" data-clear="angle">취소</button>
            </div>
          </div>

          <div class="field">
            <label><span>구도</span></label>
            <div class="picker-row">
              <input id="composition" type="text" placeholder="예: 허리 위 중간 샷" />
              <button class="picker-trigger" type="button" data-picker="composition">
                <span class="value placeholder" id="compositionDisplay"></span>
                <span class="arrow">프리셋</span>
              </button>
              <button class="mini-btn random" type="button" data-random="composition">랜덤</button>
              <button class="mini-btn" type="button" data-clear="composition">취소</button>
            </div>
          </div>

          <div class="field">
            <label><span>분위기</span></label>
            <div class="picker-row">
              <input id="mood" type="text" placeholder="예: 따뜻하고 감성적인 분위기" />
              <button class="picker-trigger" type="button" data-picker="mood">
                <span class="value placeholder" id="moodDisplay"></span>
                <span class="arrow">프리셋</span>
              </button>
              <button class="mini-btn random" type="button" data-random="mood">랜덤</button>
              <button class="mini-btn" type="button" data-clear="mood">취소</button>
            </div>
          </div>

          <div class="field">
            <label><span>스타일</span></label>
            <div class="picker-row">
              <input id="style" type="text" placeholder="예: 시네마틱 리얼리즘" />
              <button class="picker-trigger" type="button" data-picker="style">
                <span class="value placeholder" id="styleDisplay"></span>
                <span class="arrow">프리셋</span>
              </button>
              <button class="mini-btn random" type="button" data-random="style">랜덤</button>
              <button class="mini-btn" type="button" data-clear="style">취소</button>
            </div>
          </div>
        </div>

        <div class="field full">
          <label><span>추가 디테일</span></label>
          <textarea id="details" placeholder="예: 금속 마이크, 젖은 바닥 반사광, 무대 뒤 조명 번짐, 털결이 선명함"></textarea>
        </div>

        <details>
          <summary>고급 설정 펼치기</summary>
          <div class="grid" style="margin-top: 14px;">
            <div class="field">
              <label><span>조명</span></label>
              <div class="picker-row">
                <input id="lighting" type="text" placeholder="직접 입력하거나 프리셋으로 선택" />
                <button class="picker-trigger" type="button" data-picker="lighting">
                  <span class="value placeholder" id="lightingDisplay"></span>
                  <span class="arrow">프리셋</span>
                </button>
                <button class="mini-btn random" type="button" data-random="lighting">랜덤</button>
                <button class="mini-btn" type="button" data-clear="lighting">취소</button>
              </div>
            </div>

            <div class="field">
              <label><span>색감</span></label>
              <div class="picker-row">
                <input id="color" type="text" placeholder="직접 입력하거나 프리셋으로 선택" />
                <button class="picker-trigger" type="button" data-picker="color">
                  <span class="value placeholder" id="colorDisplay"></span>
                  <span class="arrow">프리셋</span>
                </button>
                <button class="mini-btn random" type="button" data-random="color">랜덤</button>
                <button class="mini-btn" type="button" data-clear="color">취소</button>
              </div>
            </div>

            <div class="field">
              <label><span>의상/소품</span></label>
              <input id="props" type="text" placeholder="예: 검은 정장, 빈티지 마이크, 빨간 리본, 작은 핸드마이크" />
            </div>

            <div class="field">
              <label><span>심도</span></label>
              <div class="picker-row">
                <input id="depth" type="text" placeholder="예: 배경이 크게 흐려지는 얕은 심도" />
                <button class="picker-trigger" type="button" data-picker="depth">
                  <span class="value placeholder" id="depthDisplay"></span>
                  <span class="arrow">프리셋</span>
                </button>
                <button class="mini-btn random" type="button" data-random="depth">랜덤</button>
                <button class="mini-btn" type="button" data-clear="depth">취소</button>
              </div>
            </div>

            <div class="field">
              <label><span>렌즈</span></label>
              <div class="picker-row">
                <input id="lens" type="text" placeholder="예: 85mm 인물용 망원 렌즈 느낌" />
                <button class="picker-trigger" type="button" data-picker="lens">
                  <span class="value placeholder" id="lensDisplay"></span>
                  <span class="arrow">프리셋</span>
                </button>
                <button class="mini-btn random" type="button" data-random="lens">랜덤</button>
                <button class="mini-btn" type="button" data-clear="lens">취소</button>
              </div>
            </div>

            <div class="field">
              <label><span>ISO</span></label>
              <div class="picker-row">
                <input id="iso" type="text" placeholder="예: ISO 200" />
                <button class="picker-trigger" type="button" data-picker="iso">
                  <span class="value placeholder" id="isoDisplay"></span>
                  <span class="arrow">프리셋</span>
                </button>
                <button class="mini-btn random" type="button" data-random="iso">랜덤</button>
                <button class="mini-btn" type="button" data-clear="iso">취소</button>
              </div>
            </div>

            <div class="field">
              <label><span>셔터스피드</span></label>
              <div class="picker-row">
                <input id="shutter" type="text" placeholder="예: 1/250초의 선명한 셔터스피드" />
                <button class="picker-trigger" type="button" data-picker="shutter">
                  <span class="value placeholder" id="shutterDisplay"></span>
                  <span class="arrow">프리셋</span>
                </button>
                <button class="mini-btn random" type="button" data-random="shutter">랜덤</button>
                <button class="mini-btn" type="button" data-clear="shutter">취소</button>
              </div>
            </div>

            <div class="field">
              <label><span>초점</span></label>
              <div class="picker-row">
                <input id="focus" type="text" placeholder="예: 눈에 정확히 초점이 맞는 설정" />
                <button class="picker-trigger" type="button" data-picker="focus">
                  <span class="value placeholder" id="focusDisplay"></span>
                  <span class="arrow">프리셋</span>
                </button>
                <button class="mini-btn random" type="button" data-random="focus">랜덤</button>
                <button class="mini-btn" type="button" data-clear="focus">취소</button>
              </div>
            </div>

            <div class="field full">
              <label><span>기술 디테일 직접 입력</span></label>

    const displayMap = {
      subjectDetail: 'subjectDetailDisplay',
      background: 'backgroundDisplay',
      mood: 'moodDisplay',
      subjectPosition: 'subjectPositionDisplay',
      pose: 'poseDisplay',
      angle: 'angleDisplay',
      composition: 'compositionDisplay',
      style: 'styleDisplay',
      lighting: 'lightingDisplay',
      color: 'colorDisplay',
      depth: 'depthDisplay',
      lens: 'lensDisplay',
      iso: 'isoDisplay',
      shutter: 'shutterDisplay',
      focus: 'focusDisplay'
    };

    function getVal(id) {
      const el = document.getElementById(id);
      return el ? el.value.trim() : '';
    }

    function setVal(id, value) {
      const el = document.getElementById(id);
      if (el) el.value = value || '';
      if (displayMap[id]) updatePickerDisplay(id);
    }

    function getValues() {
      return Object.fromEntries(ids.map(id => [id, getVal(id)]));
    }

    function updatePickerDisplay(key) {
      const el = document.getElementById(displayMap[key]);
      if (!el) return;
      const value = getVal(key);
      el.textContent = value || '';
      el.className = value ? 'value' : 'value placeholder';
    }

    function getFlatOptions(key) {
      return Object.values(pickerData[key].categories).flat();
    }

    function pickRandomForKey(key) {
      const options = getFlatOptions(key);
      if (!options.length) return;
      const randomValue = options[Math.floor(Math.random() * options.length)];
      setVal(key, randomValue);
      updateResult();
      setStatus(`${labels[key]} 랜덤 선택 완료`);
    }

    function clearPresetValue(key) {
      setVal(key, '');
      updateResult();
      setStatus(`${labels[key]} 선택 취소 완료`);
    }

    function buildGuideTextFromValues(v) {
      const presentIds = ids.filter(id => {
        const value = v[id];
        return typeof value === 'string' && value.trim() !== '';
      });

      const missingIds = ids.filter(id => !presentIds.includes(id));

      const userProvided = presentIds.length > 0
        ? presentIds.map(id => `${labels[id]}: ${v[id].trim()}`).join('\n')
        : '사용자가 명시적으로 입력한 항목 없음';

      const fieldsToInfer = missingIds.length > 0
        ? missingIds.map(id => labels[id]).join(', ')
        : '없음';

      return `You are a world-class image prompt engineer and prompt enhancer.
` +
        `Read the structured inputs below and generate exactly THREE different final prompt options.

` +
        `Output format rules:
` +
        `1. Output exactly 3 options in total.
` +
        `2. For each option, write the English image-generation prompt first as one continuous paragraph.
` +
        `3. Immediately below it, write a short Korean summary explaining the concept, intention, and photographic direction of that prompt.
` +
        `4. Separate Option 1, Option 2, and Option 3 clearly.
` +
        `5. Use this exact section format for each option:
` +
        `Option 1
<English prompt>
<한국어 요약>

` +
        `Option 2
<English prompt>
<한국어 요약>

` +
        `Option 3
<English prompt>
<한국어 요약>

` +
        `6. Do not use markdown code blocks.
` +
        `7. Do not add any extra explanation before, after, or between the options.
` +
        `8. Do not output bullet points, greetings, commentary, or labels other than Option 1, Option 2, and Option 3.

` +
        `Variation rules:
` +
        `1. All three options must stay faithful to the same core user intent.
` +
        `2. However, each option should differ in photographic direction, mood emphasis, composition logic, or stylistic treatment.
` +
        `3. Make the three options feel meaningfully different, not like minor rewrites.

` +
        `Quality rules:
` +
        `1. Never change the user's core intent.
` +
        `2. The user-provided fields are explicit constraints and must be respected.
` +
        `3. The fields listed under [Fields To Infer] were not provided by the user. They are not literal values, and they must be intelligently inferred and completed from context.
` +
        `4. Never output placeholder concepts such as empty, blank, missing, none, unspecified, or not provided inside the final prompt.
` +
        `5. Do not write a short or weak prompt. Each English prompt must be dense, professional, visually rich, and ready to paste directly into an image model.
` +
        `6. Enrich the result with subject presence, body language, facial details, skin or fur texture, outfit material, prop material, foreground, midground, background, spatial depth, lighting direction, shadow structure, highlight behavior, lens feel, focal emphasis, depth of field, bokeh, realism, mood density, and premium editorial or cinematic details.
` +
        `7. If the user directly provided technical details such as lens feel, aperture, ISO, exposure, shutter, focus plane, shallow depth of field, or background blur, prioritize them. If not, infer realistic values and expressions that fit the scene and style.
` +
        `8. Use the omitted fields as creative guidance targets: fill them in with tasteful, visually strong, context-consistent decisions that improve image quality and coherence.

` +
        `Additional user expansion note: ${v.enhanceNote && v.enhanceNote.trim() ? v.enhanceNote.trim() : '없음'}

` +
        `[User-Provided Input]
${userProvided}

` +
        `[Fields To Infer]
${fieldsToInfer}`;
    }

    function buildGuideText() {
      return buildGuideTextFromValues(getValues());
    }

    function setStatus(msg, isError = false) {
      const status = document.getElementById('status');
      status.textContent = msg;
      status.classList.toggle('error', isError);
      clearTimeout(setStatus._timer);
      setStatus._timer = setTimeout(() => {
        status.textContent = '';
        status.classList.remove('error');
      }, 2600);
    }

    function showManualCopy(text, message) {
      const fallback = document.getElementById('copyFallback');
      const area = document.getElementById('manualCopyArea');
      area.value = text;
      fallback.classList.add('active');
      area.focus();
      area.select();
      area.setSelectionRange(0, area.value.length);
      setStatus(message, true);
    }

    function hideManualCopy() {
      document.getElementById('copyFallback').classList.remove('active');
      document.getElementById('manualCopyArea').value = '';
    }

    function legacyCopy(text) {
      const temp = document.createElement('textarea');
      temp.value = text;
      temp.setAttribute('readonly', '');
      temp.style.position = 'fixed';
      temp.style.top = '-9999px';
      temp.style.left = '-9999px';
      document.body.appendChild(temp);
      temp.focus();
      temp.select();
      temp.setSelectionRange(0, temp.value.length);
      let success = false;
      try { success = document.execCommand('copy'); } catch (error) { success = false; }
      document.body.removeChild(temp);
      return success;
    }

    async function safeCopy(text, successMessage) {
      if (!text || !text.trim()) {
        setStatus('복사할 내용이 없어요.', true);
        return false;
      }
      hideManualCopy();
      try {
        if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
          await navigator.clipboard.writeText(text);
          setStatus(successMessage);
          return true;
        }
      } catch (error) {}

      if (legacyCopy(text)) {
        setStatus(successMessage + ' (대체 복사 방식 사용)');
        return true;
      }

      showManualCopy(text, '자동 복사가 제한되어 수동 복사창을 열었어요. Ctrl+C로 복사해 주세요.');
      return false;
    }

    function updateResult() {
      document.getElementById('resultBox').value = buildGuideText();
    }

    function attachTabHandlers() {
      document.querySelectorAll('[data-result-tab]').forEach(btn => {
        btn.addEventListener('click', () => {
          activeResultTab = 'guide';
          document.querySelectorAll('[data-result-tab]').forEach(x => x.classList.remove('active'));
          btn.classList.add('active');
          updateResult();
        });
      });
    }

    function attachLiveHandlers() {
      ids.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const handler = () => updateResult();
        el.addEventListener('input', handler);
        el.addEventListener('change', handler);
      });
    }

    function attachMainHandlers() {
      document.getElementById('clearBtn').addEventListener('click', () => {
        ids.forEach(id => setVal(id, ''));
        hideManualCopy();
        updateAllDisplays();
        updateResult();
        setStatus('입력 초기화 완료');
      });

      document.getElementById('randomAllBtn').addEventListener('click', () => {
        presetKeys.forEach(key => pickRandomForKey(key));
        setStatus('모든 프리셋 랜덤 선택 완료');
      });

      document.getElementById('copyGuideBtn').addEventListener('click', async () => {
        await safeCopy(buildGuideText(), 'LLM 확장 지시문 복사 완료');
      });
    }

    function openPicker(key) {
      currentPickerKey = key;
      const modal = document.getElementById('pickerModal');
      const title = document.getElementById('pickerTitle');
      const search = document.getElementById('pickerSearch');
      title.textContent = pickerData[key].title;
      search.value = '';
      renderPickerOptions(key, '');
      modal.classList.add('active');
      document.body.classList.add('modal-open');
      search.focus();
    }

    function closePicker() {
      document.getElementById('pickerModal').classList.remove('active');
      document.body.classList.remove('modal-open');
      currentPickerKey = null;
    }

    function renderPickerOptions(key, query) {
      const config = pickerData[key];
      const content = document.getElementById('pickerContent');
      const lower = (query || '').trim().toLowerCase();
      const html = Object.entries(config.categories).map(([cat, items]) => {
        const filtered = items.filter(item => item.toLowerCase().includes(lower));
        if (!filtered.length) return '';
        return `
          <div class="picker-category">
            <h3>${cat}</h3>
            <div class="picker-grid">
              ${filtered.map(item => `<button type="button" class="picker-option">${item}</button>`).join('')}
            </div>
          </div>
        `;
      }).join('');
      content.innerHTML = html || '<div class="helper">검색 결과가 없습니다.</div>';

      content.querySelectorAll('.picker-option').forEach(btn => {
        btn.addEventListener('click', () => {
          setVal(key, btn.textContent);
          updateResult();
          closePicker();
          setStatus(`${labels[key]} 선택 완료`);
        });
      });
    }

    function attachPickerHandlers() {
      document.querySelectorAll('[data-picker]').forEach(btn => {
        btn.addEventListener('click', () => openPicker(btn.dataset.picker));
      });

      document.querySelectorAll('[data-random]').forEach(btn => {
        btn.addEventListener('click', () => pickRandomForKey(btn.dataset.random));
      });

      document.querySelectorAll('[data-clear]').forEach(btn => {
        btn.addEventListener('click', () => clearPresetValue(btn.dataset.clear));
      });

      document.getElementById('closePickerBtn').addEventListener('click', closePicker);
      document.getElementById('pickerModal').addEventListener('click', (e) => {
        if (e.target.id === 'pickerModal') closePicker();
      });
      document.getElementById('pickerSearch').addEventListener('input', (e) => {
        if (currentPickerKey) renderPickerOptions(currentPickerKey, e.target.value);
      });
      document.getElementById('pickerRandomBtn').addEventListener('click', () => {
        if (!currentPickerKey) return;
        pickRandomForKey(currentPickerKey);
        closePicker();
      });
      document.getElementById('pickerClearBtn').addEventListener('click', () => {
        if (!currentPickerKey) return;
        clearPresetValue(currentPickerKey);
        closePicker();
      });
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closePicker();
      });
    }

    function updateAllDisplays() {
      Object.keys(displayMap).forEach(updatePickerDisplay);
    }

    function assert(condition, message) {
      if (!condition) throw new Error(message);
    }

    attachTabHandlers();
    attachLiveHandlers();
    attachMainHandlers();
    attachPickerHandlers();
    updateAllDisplays();
    updateResult();
  </script>
