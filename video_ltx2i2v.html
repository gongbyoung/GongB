<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LTX-2 Prompt JSON Generator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; }
        textarea { width: 100%; height: 60px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer; }
        pre { background: #f8f9fa; padding: 15px; border: 1px solid #dee2e6; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h2>LTX-2 Prompt JSON Generator</h2>
        <label>Core Actions:</label>
        <textarea id="action"></textarea>
        
        <label>Visual Details:</label>
        <textarea id="visual"></textarea>
        
        <label>Audio/Dialogue:</label>
        <textarea id="audio"></textarea>
        
        <button onclick="generateJSON()">Generate JSON</button>
        
        <pre id="result">{}</pre>
    </div>

    <script>
        function generateJSON() {
            const data = {
                core_actions: document.getElementById('action').value,
                visual_details: document.getElementById('visual').value,
                audio_cues: document.getElementById('audio').value,
                full_prompt: `${document.getElementById('action').value}, ${document.getElementById('visual').value}, ${document.getElementById('audio').value}`
            };
            document.getElementById('result').innerText = JSON.stringify(data, null, 4);
        }
    </script>
</body>
</html>
