<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LTX-2 프롬프트 생성기</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; }
        textarea { width: 100%; height: 80px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: #f4f4f4; border: 1px solid #ccc; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <h2>LTX-2 프롬프트 생성기</h2>
        <label>1. Core Actions (사건/동작):</label>
        <textarea id="action" placeholder="예: 꽃잎이 천천히 바람에 흔들리며 오른쪽으로 떨어진다."></textarea>
        
        <label>2. Visual Details (시각적 묘사):</label>
        <textarea id="visual" placeholder="예: 햇살이 비치는 들판, 근접 촬영, 고화질, 영화 같은 조명."></textarea>
        
        <label>3. Audio/Dialogue (사운드):</label>
        <textarea id="audio" placeholder="예: 부드러운 바람 소리, 새소리, 배경의 잔잔한 피아노 음악."></textarea>
        
        <button onclick="generate()">프롬프트 만들기</button>
        
        <div id="result">여기에 결과가 출력됩니다.</div>
    </div>

    <script>
        function generate() {
            const action = document.getElementById('action').value;
            const visual = document.getElementById('visual').value;
            const audio = document.getElementById('audio').value;
            
            const prompt = `[Core Actions] ${action}\n\n[Visual Details] ${visual}\n\n[Audio] ${audio}`;
            document.getElementById('result').innerText = prompt;
        }
    </script>
</body>
</html>
