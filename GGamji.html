<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AE Kinetic Typo - Revision v8.0 (Chaos Stamp)</title>
    <style>
        :root { --bg: #050505; --panel: #111116; --accent: #00ffaa; --pink: #ff3e81; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .left-side { flex: 1.5; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        textarea { flex: 1; background: #000; color: var(--accent); border: 1px solid #333; padding: 25px; font-family: 'Fira Code', monospace; font-size: 14px; border-radius: 12px; outline: none; line-height: 1.6; }
        .right-side { flex: 1; background: var(--panel); padding: 25px; border-left: 1px solid #333; overflow-y: auto; box-sizing: border-box; display: flex; flex-direction: column; }
        h2 { font-size: 1rem; color: var(--accent); text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .item { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; background: #050505; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 13px; }
        .theme-select { display: flex; gap: 10px; margin-bottom: 15px; }
        .theme-btn { flex: 1; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; border: 2px solid #444; font-size: 12px; font-weight: bold; }
        .theme-btn.active { border-color: var(--pink); background: #31274a; }
        button { width: 100%; padding: 18px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 10px; font-size: 16px; transition: 0.2s; }
        #generateBtn { background: var(--pink); color: #fff; }
        #downloadBtn { background: #22c55e; color: #fff; display: none; }
    </style>
</head>
<body>

    <div class="left-side">
        <label style="font-size: 1.1rem; color: #fff; margin-bottom: 10px;">가사 입력창 (Revision v8.0)</label>
        <textarea id="lyricsArea">[사용 설명서 Revision v8.0 - 카오스 깜지 모드]

1. [등장 로직]
- 마커 위치에서 가사가 화면 "중앙"에 거대하게 등장합니다. (Active Color 적용)
- "다음 마커"가 찍히는 순간, 해당 글자는 배경의 "랜덤한 위치"로 날아가 박힙니다.
- 박히는 순간 색상이 테마 색(흰/검)으로 변하며 각도와 크기가 랜덤하게 조절됩니다.

2. [가사 입력] 
- 이 내용을 지우고 가사를 한 줄씩 입력하세요. 
- 띄어쓰기는 자동으로 줄바꿈 처리되어 화면 가득 찬 덩어리가 됩니다.

3. [실행 방법]
- AE에서 마커가 찍힌 오디오 레이어를 '선택'한 상태로 실행하세요.
- 101줄의 가사가 화면 여기저기에 흩뿌려져 처절한 깜지가 완성됩니다.

4. [에러 수정]
- 이전 버전의 모든 구문 에러와 이펙트(Glow) 충돌을 해결했습니다.</textarea>
    </div>

    <div class="right-side">
        <h2>CHAOS STAMP v8.0</h2>
        
        <div class="item">
            <label>배경 테마 (박제 색상)</label>
            <div class="theme-select">
                <div id="themeBlack" class="theme-btn active" onclick="setTheme('black')">BLACK (흰글씨 박제)</div>
                <div id="themeWhite" class="theme-btn" onclick="setTheme('white')">WHITE (검은글씨 박제)</div>
            </div>
        </div>

        <div class="item">
            <label>등장 시 글자 색상</label>
            <input type="color" id="activeColor" value="#ff3e81">
        </div>

        <div class="item">
            <label>폰트 (시스템 영문명)</label>
            <input type="text" id="fontName" value="Arial-Black">
        </div>

        <div class="button-area">
            <button id="downloadBtn" onclick="saveFile()">.JSX 파일 저장하기 💾</button>
            <button id="generateBtn" onclick="doBuild()">JSX 스크립트 생성</button>
        </div>
    </div>

    <script>
        let currentTheme = 'black';
        let codeBuffer = "";

        function setTheme(t) {
            currentTheme = t;
            document.getElementById('themeBlack').classList.toggle('active', t === 'black');
            document.getElementById('themeWhite').classList.toggle('active', t === 'white');
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            return `[${r.toFixed(3)}, ${g.toFixed(3)}, ${b.toFixed(3)}]`;
        }

        function doBuild() {
            const lyricsText = document.getElementById('lyricsArea').value;
            const rawLines = lyricsText.split('\n').filter(s => s.trim() !== "" && !s.includes('['));
            const activeColor = hexToRgb(document.getElementById('activeColor').value);
            const stampColor = (currentTheme === 'black') ? "[1,1,1]" : "[0,0,0]";
            const bgRgb = (currentTheme === 'black') ? "[0,0,0]" : "[1,1,1]";
            const font = document.getElementById('fontName').value;

            const processedLines = rawLines.map(line => {
                const words = line.trim().split(/\s+/);
                return words.map(w => {
                    let c = "";
                    for(let i=0; i<w.length; i+=6) c += w.substring(i, i+6) + (i+6 < w.length ? "\r" : "");
                    return c;
                }).join('\r');
            });

            codeBuffer = `/* AE Chaos Stamp Script v8.0 */
(function() {
    app.beginUndoGroup("v8.0 Chaos Stamp");
    var comp = app.project.activeItem;
    if (!comp) { alert("컴포지션을 선택하세요."); return; }
    
    var bg = comp.layers.addSolid(${bgRgb}, "Background", comp.width, comp.height, comp.pixelAspect);
    bg.moveToEnd();

    var selLayer = comp.selectedLayers[0];
    if (!selLayer || !selLayer.marker || selLayer.marker.numKeys < 1) {
        alert("마커가 찍힌 레이어를 선택하고 실행하세요.");
        return;
    }

    var lines = ${JSON.stringify(processedLines)};
    var numLines = lines.length;

    for (var i = 0; i < numLines; i++) {
        var layer = comp.layers.addText(lines[i]);
        var sourceText = layer.property("Source Text");
        var doc = sourceText.value;
        doc.font = "${font}";
        doc.justification = ParagraphJustification.CENTER_JUSTIFY;
        doc.fillColor = ${stampColor};
        doc.leading = 90;
        sourceText.setValue(doc);

        // 마커 기준 타이밍
        var st = selLayer.marker.keyTime(i + 1);
        // 다음 가사가 나오는 시점 (다음 마커)
        var nt = (i + 1 < selLayer.marker.numKeys) ? selLayer.marker.keyTime(i + 2) : st + 1.0;
        
        layer.startTime = st;
        layer.outPoint = comp.duration; // 끝까지 유지

        // 랜덤 데이터 생성
        var randX = comp.width * (0.05 + Math.random() * 0.9);
        var randY = comp.height * (0.05 + Math.random() * 0.9);
        var randRot = (Math.random() - 0.5) * 60; 
        var randS = 12 + Math.random() * 25; 

        var rect = layer.sourceRectAtTime(st, false);
        layer.anchorPoint.setValue([rect.left + rect.width/2, rect.top + rect.height/2]);

        // --- 모션 제어 (중앙 -> 랜덤 위치) ---
        // 1. 위치
        layer.position.setValueAtTime(st, [comp.width/2, comp.height/2]);
        layer.position.setValueAtTime(nt, [randX, randY]);
        
        // 2. 스케일 (등장 시 화면에 꽉 차게 계산)
        var fitS = Math.min((comp.width*0.8/rect.width)*100, (comp.height*0.6/rect.height)*100);
        if(fitS > 300) fitS = 300;
        layer.scale.setValueAtTime(st, [fitS, fitS]);
        layer.scale.setValueAtTime(nt, [randS, randS]);

        // 3. 회전
        layer.rotation.setValueAtTime(st, 0);
        layer.rotation.setValueAtTime(nt, randRot);

        // --- 비주얼 제어 (효과 중첩) ---
        // 등장 시 컬러 + 스트로크
        doc.applyStroke = true;
        doc.strokeWidth = 10;
        doc.strokeColor = [Math.random(), Math.random(), Math.random()];
        doc.fillColor = ${activeColor};
        sourceText.setValueAtTime(st, doc);

        // 다음 마커에서 박제 컬러로 변경
        var sDoc = sourceText.value;
        sDoc.applyStroke = false;
        sDoc.fillColor = ${stampColor};
        sourceText.setValueAtTime(nt, sDoc);

        // 안전한 글로우 (Drop Shadow)
        try {
            var glow = layer.property("ADBE Effect Parade").addProperty("ADBE Drop Shadow");
            glow.property("Shadow Color").setValue(${activeColor});
            glow.property("Distance").setValue(0);
            glow.property("Softness").setValueAtTime(st, 100);
            glow.property("Softness").setValueAtTime(nt, 0);
        } catch(e) {}
        
        // 등장 텐션 (Expression)
        layer.scale.expression = "f=3; a=30; d=5; t=time-inPoint; s=a*Math.sin(f*t*2*Math.PI)/Math.exp(d*t); [value[0]+s, value[1]+s];";
    }
    app.endUndoGroup();
})();`;
            document.getElementById('downloadBtn').style.display = "block";
        }

        function saveFile() {
            const blob = new Blob([codeBuffer], { type: 'text/javascript' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "AE_Chaos_Stamp_v8.jsx";
            a.click();
        }
    </script>
</body>
</html>
