<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AE Kinetic Typo - Revision v6.1 (Polaroid Fixed)</title>
    <style>
        :root { --bg: #0a0a0c; --panel: #16161e; --accent: #00ffaa; --pink: #ff3e81; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .left-side { flex: 1.5; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        textarea { flex: 1; background: #000; color: var(--accent); border: 1px solid #333; padding: 25px; font-family: 'Fira Code', monospace; font-size: 14px; border-radius: 12px; outline: none; line-height: 1.6; }
        .right-side { flex: 1; background: var(--panel); padding: 25px; border-left: 1px solid #333; overflow-y: auto; box-sizing: border-box; display: flex; flex-direction: column; }
        h2 { font-size: 1rem; color: var(--accent); text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .item { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; background: #050505; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 13px; }
        .theme-select { display: flex; gap: 10px; margin-bottom: 15px; }
        .theme-btn { flex: 1; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; border: 2px solid #444; font-size: 12px; font-weight: bold; }
        .theme-btn.active { border-color: var(--pink); background: #31274a; }
        button { width: 100%; padding: 18px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 10px; font-size: 16px; transition: 0.2s; }
        #generateBtn { background: var(--pink); color: #fff; }
        #downloadBtn { background: #22c55e; color: #fff; display: none; }
    </style>
</head>
<body>

    <div class="left-side">
        <label style="font-size: 1.1rem; color: #fff; margin-bottom: 10px;">가사 입력창 (Revision v6.1)</label>
        <textarea id="lyricsArea">[사용 설명서 Revision v6.1 - 폴라로이드 깜지 모드]

1. [가사 입력]
- 이 내용을 지우고 가사를 한 줄씩 입력하세요. 
- 한 문장 안에서 띄어쓰기를 하면 자동으로 줄바꿈 처리되어 화면을 채웁니다.

2. [작동 원리]
- 가사가 시작될 때: 화면 상단 중앙에서 화려한 색상 + 랜덤 스트로크 + 글로우 효과와 함께 크게 나타납니다.
- 가사가 끝날 때: 효과가 사라지고 흰색(혹은 검정색) 글씨로 변하며 배경 그리드 위치에 딱 '박제'됩니다.
- 101줄이 모두 끝나면 화면 가득 가사가 채워진 '깜지' 형태가 완성됩니다.

3. [에러 수정 완료]
- Line 8 구문 오류(괄호 누락) 수정 완료.
- ADBE Glow 이펙트 충돌 문제 해결 (안전한 Drop Shadow 방식 채택).
- 기준점을 상단으로 정렬하여 하단 잘림 현상 방지.

4. [준비 사항]
- AE에서 마커가 찍힌 오디오 레이어를 '선택'한 상태로 스크립트를 실행하세요.</textarea>
    </div>

    <div class="right-side">
        <h2>POLAROID v6.1</h2>
        
        <div class="item">
            <label>바탕화면 테마 (박제 글씨 색상)</label>
            <div class="theme-select">
                <div id="themeBlack" class="theme-btn active" onclick="setTheme('black')">BLACK (흰글씨)</div>
                <div id="themeWhite" class="theme-btn" onclick="setTheme('white')">WHITE (검은글씨)</div>
            </div>
        </div>

        <div class="item">
            <label>강조될 때 글자 색상 (Floating Color)</label>
            <input type="color" id="activeColor" value="#00ffaa">
        </div>

        <div class="item">
            <label>폰트 (시스템 영문명)</label>
            <input type="text" id="fontName" value="Arial-Black">
        </div>

        <div class="item">
            <label>배치 방식</label>
            <select id="syncMode">
                <option value="marker">마커 기준 (추천)</option>
                <option value="linear">균등 분할 (2초 간격)</option>
            </select>
        </div>

        <div class="button-area">
            <button id="downloadBtn" onclick="saveFile()">.JSX 파일 저장하기 💾</button>
            <button id="generateBtn" onclick="doBuild()">JSX 스크립트 생성</button>
        </div>
    </div>

    <script>
        let currentTheme = 'black';
        let codeBuffer = "";

        function setTheme(t) {
            currentTheme = t;
            document.getElementById('themeBlack').classList.toggle('active', t === 'black');
            document.getElementById('themeWhite').classList.toggle('active', t === 'white');
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            return `[${r.toFixed(3)}, ${g.toFixed(3)}, ${b.toFixed(3)}]`;
        }

        function doBuild() {
            const lyricsText = document.getElementById('lyricsArea').value;
            const rawLines = lyricsText.split('\n').filter(s => s.trim() !== "" && !s.includes('['));
            const activeColor = hexToRgb(document.getElementById('activeColor').value);
            const stampColor = (currentTheme === 'black') ? "[1,1,1]" : "[0,0,0]";
            const bgHex = (currentTheme === 'black') ? "[0,0,0]" : "[1,1,1]";
            const font = document.getElementById('fontName').value;
            const syncMode = document.getElementById('syncMode').value;

            // 띄어쓰기 줄바꿈 로직
            const processedLines = rawLines.map(line => {
                const words = line.trim().split(/\s+/);
                return words.map(w => {
                    let c = "";
                    for(let i=0; i<w.length; i+=6) c += w.substring(i, i+6) + (i+6 < w.length ? "\r" : "");
                    return c;
                }).join('\r');
            });

            codeBuffer = `/* AE Polaroid Stamp Script v6.1 - Fixed */
(function() {
    app.beginUndoGroup("v6.1 Polaroid Mode");
    var comp = app.project.activeItem;
    if (!comp) { alert("컴포지션을 선택하세요."); return; }
    
    // 배경 생성 (Line 8 에러 수정 완료)
    var bg = comp.layers.addSolid(${bgHex}, "Background", comp.width, comp.height, comp.pixelAspect);
    bg.moveToEnd();

    var selLayer = comp.selectedLayers[0];
    var lines = ${JSON.stringify(processedLines)};
    var numLines = lines.length;

    // 그리드 계산
    var cols = Math.ceil(Math.sqrt(numLines * (comp.width/comp.height)));
    var rows = Math.ceil(numLines / cols);
    var cellW = comp.width / cols;
    var cellH = comp.height / rows;

    for (var i = 0; i < numLines; i++) {
        var layer = comp.layers.addText(lines[i]);
        var sourceText = layer.property("Source Text");
        var doc = sourceText.value;
        doc.font = "${font}";
        doc.justification = ParagraphJustification.CENTER_JUSTIFY;
        doc.fillColor = ${stampColor};
        doc.leading = 90;
        sourceText.setValue(doc);

        var st = (selLayer && i < selLayer.marker.numKeys) ? selLayer.marker.keyTime(i + 1) : i * 1.5;
        var et = (selLayer && i + 1 < selLayer.marker.numKeys) ? selLayer.marker.keyTime(i + 2) : st + 1.0;
        
        layer.startTime = st;
        layer.outPoint = comp.duration;

        var transDur = 0.3;
        var midTime = et; // 강조가 끝나는 시점에 박제

        var col = i % cols;
        var row = Math.floor(i / cols);
        var gridX = (col * cellW) + (cellW / 2);
        var gridY = (row * cellH) + (cellH / 2);

        // 상단 정렬 및 위치 애니메이션
        var rect = layer.sourceRectAtTime(st, false);
        layer.anchorPoint.setValue([rect.left + rect.width/2, rect.top]);
        
        layer.position.setValueAtTime(st, [comp.width/2, comp.height * 0.1]);
        layer.position.setValueAtTime(midTime, [gridX, gridY - (cellH/3)]); // 그리드 상단 정렬 보정

        var stampScale = Math.min((cellW / rect.width) * 90, (cellH / rect.height) * 90);
        if (stampScale > 30) stampScale = 30;

        layer.scale.setValueAtTime(st, [finalS_calc(rect, comp, 0.8), finalS_calc(rect, comp, 0.8)]);
        layer.scale.setValueAtTime(midTime, [stampScale, stampScale]);

        function finalS_calc(r, c, p) {
            var s = Math.min((c.width*p / r.width) * 100, (c.height*0.4 / r.height) * 100);
            return s > 300 ? 300 : s;
        }

        // --- 효과 적용 (Glow 우회 및 스트로크) ---
        var randStroke = [Math.random(), Math.random(), Math.random()];
        
        // 시작 시 강조 (컬러 + 스트로크)
        doc.applyStroke = true;
        doc.strokeWidth = 6;
        doc.strokeColor = randStroke;
        doc.fillColor = ${activeColor};
        sourceText.setValueAtTime(st, doc);

        // 종료 시 박제 (기본 색상)
        var sDoc = sourceText.value;
        sDoc.applyStroke = false;
        sDoc.fillColor = ${stampColor};
        sourceText.setValueAtTime(midTime, sDoc);

        // 안전한 글로우 효과 (ADBE Glow 대신 Drop Shadow 활용)
        try {
            var glow = layer.property("ADBE Effect Parade").addProperty("ADBE Drop Shadow");
            glow.property("Shadow Color").setValue(${activeColor});
            glow.property("Distance").setValue(0);
            glow.property("Softness").setValueAtTime(st, 60);
            glow.property("Softness").setValueAtTime(midTime, 0);
        } catch(e) {}
    }
    app.endUndoGroup();
})();`;
            generatedCode = codeBuffer;
            document.getElementById('downloadBtn').style.display = "block";
        }

        function saveFile() {
            const blob = new Blob([generatedCode], { type: 'text/javascript' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "AE_Polaroid_v6_1_Fixed.jsx";
            a.click();
        }
    </script>
</body>
</html>
