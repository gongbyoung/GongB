<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AE Motion Script Pro</title>
    <style>
        :root { --bg: #111115; --card: #1c1c24; --accent: #cf63ff; --text: #f0f0f0; --border: #333340; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; overflow: hidden; }
        
        /* Layout Structure */
        .left-panel { flex: 1.5; padding: 30px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .right-panel { flex: 1; padding: 30px; background: var(--card); overflow-y: auto; }

        h2 { color: var(--accent); margin-top: 0; font-size: 1.2rem; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; color: #999; }
        
        /* Left: Lyrics Area */
        textarea { flex: 1; width: 100%; padding: 20px; border-radius: 12px; border: 1px solid var(--border); background: #0a0a0c; color: #fff; font-size: 16px; line-height: 1.6; resize: none; outline: none; transition: 0.3s; }
        textarea:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(207, 99, 255, 0.2); }

        /* Right: Controls Area */
        .control-group { margin-bottom: 25px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #0a0a0c; color: white; box-sizing: border-box; margin-bottom: 10px; }
        
        .motion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .motion-item { background: #2d2d3d; padding: 8px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; text-align: center; font-size: 13px; }
        .motion-item input { display: none; }
        .motion-item:has(input:checked) { border-color: var(--accent); background: #3d2a4d; color: var(--accent); font-weight: bold; }

        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 15px; }
        .btn-gen { background: var(--accent); color: white; margin-top: 20px; }
        .btn-down { background: #00c853; color: white; display: none; margin-top: 10px; }
        button:hover { filter: brightness(1.2); transform: translateY(-2px); }

        pre { background: #000; padding: 15px; border-radius: 10px; font-size: 12px; color: #9cdcfe; border: 1px solid #333; overflow-x: auto; max-height: 200px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="left-panel">
    <h2>🎵 Lyrics Editor</h2>
    <textarea id="lyricsInput" placeholder="이곳에 노래 가사를 입력하세요. 줄바꿈을 기준으로 각 줄에 다른 랜덤 효과가 적용됩니다.">Hello After Effects
Motion Graphic Script
Creative Flow
Next Generation</textarea>
</div>

<div class="right-panel">
    <h2>⚙️ Generation Options</h2>
    
    <div class="control-group">
        <label>글자 크기 (px)</label>
        <input type="number" id="fontSize" value="120">
        
        <label>폰트 (PostScript Name)</label>
        <input type="text" id="fontName" placeholder="ex) Pretendard-Bold, Arial-BoldMT" value="Arial-BoldMT">
        
        <label>글자 색상</label>
        <input type="color" id="textColor" value="#ffffff">
        
        <label>간격 속도 (초)</label>
        <input type="range" id="speed" min="0.1" max="5.0" step="0.1" value="1.5" oninput="speedVal.innerText = this.value">
        <span id="speedVal">1.5</span>s
    </div>

    <div class="control-group">
        <label>적용할 랜덤 모션 풀 (복수 선택)</label>
        <div class="motion-grid" id="motionTypes">
            <label class="motion-item"><input type="checkbox" value="fadeIn" checked><span>Fade In</span></label>
            <label class="motion-item"><input type="checkbox" value="pop" checked><span>Pop Scale</span></label>
            <label class="motion-item"><input type="checkbox" value="slideLeft" checked><span>Slide Left</span></label>
            <label class="motion-item"><input type="checkbox" value="drop" checked><span>Drop Down</span></label>
            <label class="motion-item"><input type="checkbox" value="rotateIn"><span>Rotation In</span></label>
            <label class="motion-item"><input type="checkbox" value="blurIn"><span>Blur In</span></label>
            <label class="motion-item"><input type="checkbox" value="tracking"><span>Tracking Anim</span></label>
            <label class="motion-item"><input type="checkbox" value="wiggle"><span>Wiggle Idle</span></label>
        </div>
    </div>

    <button class="btn-gen" onclick="generateAE()">애프터 이펙트 스크립트 생성 ✨</button>
    <button id="downBtn" class="btn-down" onclick="downloadJSX()">.JSX 파일 다운로드 💾</button>

    <div id="outputContainer" style="display:none;">
        <label>Preview Code</label>
        <pre id="codePreview"></pre>
    </div>
</div>

<script>
    // After Effects 전용 효과 라이브러리 (여기에 코드를 추가하면 효과가 늘어납니다)
    const aeLibrary = {
        fadeIn: (i, s) => `l.opacity.setValueAtTime(${i*s}, 0); l.opacity.setValueAtTime(${i*s + 0.5}, 100);`,
        pop: (i, s) => `l.scale.setValueAtTime(${i*s}, [0,0]); l.scale.setValuesAtTime([${i*s + 0.3}, ${i*s + 0.5}], [[120,120], [100,100]]);`,
        slideLeft: (i, s) => `var p = l.position.value; l.position.setValueAtTime(${i*s}, [p[0]-300, p[1]]); l.position.setValueAtTime(${i*s + 0.6}, [p[0], p[1]]); l.opacity.setValueAtTime(${i*s}, 0); l.opacity.setValueAtTime(${i*s + 0.4}, 100);`,
        drop: (i, s) => `var p = l.position.value; l.position.setValueAtTime(${i*s}, [p[0], p[1]-200]); l.position.setValueAtTime(${i*s + 0.5}, [p[0], p[1]]);`,
        rotateIn: (i, s) => `l.rotation.setValueAtTime(${i*s}, -90); l.rotation.setValueAtTime(${i*s + 0.7}, 0);`,
        blurIn: (i, s) => `var b = l.Effects.addProperty("ADBE Fast Blur"); b.property(1).setValueAtTime(${i*s}, 50); b.property(1).setValueAtTime(${i*s + 0.8}, 0);`,
        tracking: (i, s) => `var t = l.property("Source Text").animator.addProperty("ADBE Text Animator"); t.property("ADBE Text Units").setValue(1); var tr = t.property("ADBE Text Animator Properties").addProperty("ADBE Text Tracking Amount"); tr.setValueAtTime(${i*s}, 50); tr.setValueAtTime(${i*s + 1}, 0);`,
        wiggle: (i, s) => `l.position.expression = "wiggle(2, 30)";`
    };

    function hexToRgbArray(hex) {
        var r = parseInt(hex.slice(1, 3), 16) / 255;
        var g = parseInt(hex.slice(3, 5), 16) / 255;
        var b = parseInt(hex.slice(5, 7), 16) / 255;
        return `[${r.toFixed(3)}, ${g.toFixed(3)}, ${b.toFixed(3)}]`;
    }

    let lastCode = "";

    function generateAE() {
        const lines = document.getElementById('lyricsInput').value.split('\n').filter(l => l.trim() !== "");
        const selectedMotions = Array.from(document.querySelectorAll('#motionTypes input:checked')).map(c => c.value);
        const fontSize = document.getElementById('fontSize').value;
        const fontName = document.getElementById('fontName').value;
        const color = hexToRgbArray(document.getElementById('textColor').value);
        const speed = parseFloat(document.getElementById('speed').value);

        if (lines.length === 0 || selectedMotions.length === 0) return alert("가사와 모션을 선택해주세요!");

        let script = `(function() {\n  app.beginUndoGroup("Generate Lyrics");\n  var comp = app.project.activeItem;\n  if (!(comp instanceof CompItem)) { alert("컴포지션을 선택해주세요."); return; }\n\n`;

        lines.forEach((line, idx) => {
            const randomMotion = selectedMotions[Math.floor(Math.random() * selectedMotions.length)];
            script += `  // Line ${idx + 1}: ${line}\n`;
            script += `  var l = comp.layers.addText("${line.replace(/"/g, '\\"')}");\n`;
            script += `  var doc = l.property("Source Text").value;\n`;
            script += `  doc.fontSize = ${fontSize};\n`;
            script += `  doc.font = "${fontName}";\n`;
            script += `  doc.fillColor = ${color};\n`;
            script += `  doc.justification = ParagraphJustification.CENTER_JUSTIFY;\n`;
            script += `  l.property("Source Text").setValue(doc);\n`;
            script += `  l.position.setValue([comp.width/2, comp.height/2]);\n`;
            script += `  ${aeLibrary[randomMotion](idx, speed)}\n`;
            script += `  l.startTime = ${idx * speed};\n\n`;
        });

        script += `  app.endUndoGroup();\n})();`;

        lastCode = script;
        document.getElementById('codePreview').textContent = script;
        document.getElementById('outputContainer').style.display = "block";
        document.getElementById('downBtn').style.display = "block";
    }

    function downloadJSX() {
        const blob = new Blob([lastCode], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "LyricMotion_" + Date.now() + ".jsx";
        a.click();
    }
</script>

</body>
</html>
