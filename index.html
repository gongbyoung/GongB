<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AE Kinetic Typo Pro - Revision v5.0</title>
    <style>
        :root { --bg: #0a0a0c; --panel: #16161e; --accent: #00ffaa; --pink: #ff3e81; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .left-side { flex: 1.5; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        textarea { flex: 1; background: #000; color: var(--accent); border: 1px solid #333; padding: 25px; font-family: 'Fira Code', monospace; font-size: 16px; border-radius: 12px; outline: none; line-height: 1.8; }
        .right-side { flex: 1; background: var(--panel); padding: 25px; border-left: 1px solid #333; overflow-y: auto; box-sizing: border-box; display: flex; flex-direction: column; }
        h2 { font-size: 1rem; color: var(--accent); text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .item { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; background: #050505; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 13px; }
        .motion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .motion-opt { background: #2d2d3d; padding: 8px; border-radius: 6px; font-size: 11px; cursor: pointer; border: 1px solid transparent; display: flex; align-items: center; }
        .motion-opt:has(input:checked) { border-color: var(--pink); background: #31274a; }
        button { width: 100%; padding: 18px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 10px; font-size: 16px; transition: 0.2s; }
        #generateBtn { background: var(--pink); color: #fff; }
        #downloadBtn { background: #22c55e; color: #fff; display: none; }
    </style>
</head>
<body>

    <div class="left-side">
        <label style="font-size: 1.1rem; color: #fff; margin-bottom: 10px;">가사 입력 (Revision v5.0 - Super Mix)</label>
        <textarea id="lyricsArea">[사용 설명서 v5.0 - 효과 12종 강화 버전]

1. [가사 입력] 한 줄씩 가사를 입력하세요. 띄어쓰기마다 줄바꿈됩니다.
2. [효과 선택] 우측 하단 체크박스에서 원하는 효과를 모두 체크하세요.
3. [랜덤 믹스] 레이어마다 체크된 효과 중 1~3개가 무작위로 섞여 적용됩니다.

* 신규 추가 효과:
- Glitch (지지직거리는 떨림)
- Swing (추처럼 흔들거리며 등장)
- Blur In (뿌연 화면에서 선명하게)
- Skew (기울어지며 날렵하게 등장)
- Wave (물결치듯 포지션 이동)
- Flash (번쩍이며 등장)</textarea>
    </div>

    <div class="right-side">
        <h2>MAX IMPACT v5.0</h2>
        <div class="item">
            <label>배치 방식</label>
            <select id="syncMode">
                <option value="marker">마커 기준 (강력 추천)</option>
                <option value="linear">균등 분할 (줄당 2초)</option>
            </select>
        </div>
        <div class="item">
            <label>폰트 (시스템 영문명)</label>
            <input type="text" id="fontName" value="Arial-Black">
        </div>
        <div class="item">
            <label>글자 색상</label>
            <input type="color" id="fontColor" value="#ffffff">
        </div>
        <div class="item">
            <label>랜덤 효과 풀 (전체 체크 시 가장 화려함)</label>
            <div class="motion-grid" id="effectPool">
                <label class="motion-opt"><input type="checkbox" value="pop" checked> Pop Bounce</label>
                <label class="motion-opt"><input type="checkbox" value="side_L" checked> Elastic L</label>
                <label class="motion-opt"><input type="checkbox" value="side_R" checked> Elastic R</label>
                <label class="motion-opt"><input type="checkbox" value="top" checked> Drop Down</label>
                <label class="motion-opt"><input type="checkbox" value="bottom" checked> Rise Up</label>
                <label class="motion-opt"><input type="checkbox" value="zoom" checked> Power Zoom</label>
                <label class="motion-opt"><input type="checkbox" value="glitch" checked> Glitch</label>
                <label class="motion-opt"><input type="checkbox" value="swing" checked> Swing</label>
                <label class="motion-opt"><input type="checkbox" value="blur" checked> Blur In</label>
                <label class="motion-opt"><input type="checkbox" value="skew" checked> Skew In</label>
                <label class="motion-opt"><input type="checkbox" value="wave" checked> Wave Move</label>
                <label class="motion-opt"><input type="checkbox" value="flash" checked> Flash In</label>
            </div>
        </div>
        <div class="button-area">
            <button id="downloadBtn" onclick="saveFile()">.JSX 파일 저장하기 💾</button>
            <button id="generateBtn" onclick="doBuild()">JSX 스크립트 생성</button>
        </div>
    </div>

    <script>
        let codeBuffer = "";
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            return `[${r.toFixed(3)}, ${g.toFixed(3)}, ${b.toFixed(3)}]`;
        }
        function doBuild() {
            const lyricsText = document.getElementById('lyricsArea').value;
            const rawLines = lyricsText.split('\n').filter(s => s.trim() !== "" && !s.includes('['));
            const font = document.getElementById('fontName').value;
            const color = hexToRgb(document.getElementById('fontColor').value);
            const syncMode = document.getElementById('syncMode').value;
            const effects = Array.from(document.querySelectorAll('#effectPool input:checked')).map(el => el.value);

            const processedLines = rawLines.map(line => {
                const words = line.trim().split(/\s+/);
                return words.map(word => {
                    let chunked = "";
                    for(let i=0; i<word.length; i+=6) {
                        chunked += word.substring(i, i+6) + (i+6 < word.length ? "\r" : "");
                    }
                    return chunked;
                }).join('\r');
            });

            codeBuffer = `/* AE Kinetic Typo Script v5.0 - Super Multi-Mix */
(function() {
    app.beginUndoGroup("v5.0 Super Impact");
    var comp = app.project.activeItem;
    if (!comp) { alert("컴포지션을 선택하세요."); return; }
    
    var selLayer = comp.selectedLayers[0];
    var useMarker = ${syncMode === 'marker'};
    var effectsPool = ${JSON.stringify(effects)};
    var lines = ${JSON.stringify(processedLines)};
    
    var targetW = comp.width * 0.9;
    var targetH = comp.height * 0.85;

    for (var i = 0; i < lines.length; i++) {
        var layer = comp.layers.addText(lines[i]);
        var sourceText = layer.property("Source Text");
        var doc = sourceText.value;
        doc.fontSize = 120; doc.font = "${font}"; doc.fillColor = ${color};
        doc.justification = ParagraphJustification.CENTER_JUSTIFY;
        doc.leading = 95;
        sourceText.setValue(doc);

        var st = (useMarker && selLayer && i < selLayer.marker.numKeys) ? selLayer.marker.keyTime(i + 1) : i * 2;
        var et = (useMarker && selLayer && i + 1 < selLayer.marker.numKeys) ? selLayer.marker.keyTime(i + 2) : st + 1.2;
        layer.startTime = st;
        layer.outPoint = et;

        var rect = layer.sourceRectAtTime(st, false);
        layer.anchorPoint.setValue([rect.left + rect.width/2, rect.top]);
        
        var finalS = Math.min((targetW / rect.width) * 100, (targetH / rect.height) * 100);
        if (finalS > 420) finalS = 420;
        layer.scale.setValue([finalS, finalS]);
        layer.position.setValue([comp.width/2, comp.height * 0.05]);

        // --- 효과 조합 로직 (1~3개 랜덤 선택) ---
        var numToPick = Math.floor(Math.random() * 3) + 1;
        var picks = [];
        var tempPool = effectsPool.slice();
        for(var k=0; k<numToPick; k++){
            if(tempPool.length==0) break;
            var rIdx = Math.floor(Math.random()*tempPool.length);
            picks.push(tempPool[rIdx]);
            tempPool.splice(rIdx, 1);
        }

        applyMixEffects(layer, picks, st, comp.width, comp.height, finalS);
    }

    function applyMixEffects(l, picks, start, w, h, s) {
        var posExp = "f=3.5; a=600; d=6; t=time-inPoint; v=a*Math.cos(f*t*2*Math.PI)/Math.exp(d*t); result=value;";
        var scExp = "f=3.5; a=45; d=6; t=time-inPoint; s=a*Math.sin(f*t*2*Math.PI)/Math.exp(d*t); result=value;";
        var rotExp = "f=2; a=10; d=5; t=time-inPoint; r=a*Math.cos(f*t*2*Math.PI)/Math.exp(d*t); result=value+r;";

        for(var m=0; m<picks.length; m++){
            var type = picks[m];
            if(type=="side_L") posExp += "result += [v, 0];";
            if(type=="side_R") posExp += "result -= [v, 0];";
            if(type=="top") posExp += "result -= [0, v];";
            if(type=="bottom") posExp += "result += [0, v];";
            if(type=="pop") scExp += "result += [s, s];";
            if(type=="stretch") scExp += "result += [s*2.5, -s];";
            if(type=="zoom") { l.scale.setValueAtTime(start, [s*3, s*3]); l.scale.setValueAtTime(start+0.2, [s, s]); }
            if(type=="glitch") { posExp = "if(time-inPoint<0.3) value + [random(-20,20), random(-20,20)] else value;"; l.opacity.expression = "if(time-inPoint<0.3) random(30,100) else 100;"; }
            if(type=="swing") { rotExp = "f=4; a=40; d=4; t=time-inPoint; value + a*Math.sin(f*t*2*Math.PI)/Math.exp(d*t);"; l.anchorPoint.setValue([l.anchorPoint.value[0], l.anchorPoint.value[1]-200]); }
            if(type=="blur") { var b = l.property('ADBE Effect Parade').addProperty('ADBE Gaussian Blur'); b.property(1).setValueAtTime(start, 60); b.property(1).setValueAtTime(start+0.3, 0); }
            if(type=="skew") { var sk = l.property('ADBE Effect Parade').addProperty('ADBE Skew'); sk.property(2).setValueAtTime(start, 40); sk.property(2).setValueAtTime(start+0.3, 0); }
            if(type=="flash") { l.opacity.setValueAtTime(start, 0); l.opacity.setValueAtTime(start+0.05, 100); l.opacity.setValueAtTime(start+0.1, 30); l.opacity.setValueAtTime(start+0.15, 100); }
            if(type=="wave") { posExp += "result + [0, Math.sin(t*10)*50];"; }
        }

        l.position.expression = posExp + "result;";
        l.scale.expression = scExp + "result;";
        l.rotation.expression = rotExp + "result;";
    }
    app.endUndoGroup();
})();`;
            document.getElementById('downloadBtn').style.display = "block";
        }
        function saveFile() {
            const blob = new Blob([codeBuffer], { type: 'text/javascript' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "AE_Kinetic_v5_0_SuperMix.jsx";
            a.click();
        }
    </script>
</body>
</html>
