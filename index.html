<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AE Kinetic Typo - Chewy Motion</title>
    <style>
        :root {
            --bg: #050505;
            --panel: #111116;
            --accent: #00ffaa; /* 쫀득한 느낌의 민트 */
            --text: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        .left-side { flex: 1.5; display: flex; flex-direction: column; padding: 20px; }
        .right-side { flex: 1; background: var(--panel); padding: 30px; overflow-y: auto; border-left: 1px solid #222; }
        textarea { flex: 1; background: #000; color: var(--accent); border: 1px solid #333; padding: 20px; font-family: 'Fira Code', monospace; font-size: 18px; border-radius: 12px; outline: none; line-height: 1.8; }
        h2 { font-size: 1rem; color: var(--accent); text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .item { margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 12px; background: #1a1a24; border: 1px solid #333; color: white; border-radius: 8px; }
        .motion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .motion-opt { background: #1a1a24; padding: 12px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid transparent; display: flex; align-items: center; }
        .motion-opt:has(input:checked) { border-color: var(--accent); background: #152a24; }
        .btn-main { background: var(--accent); color: #000; font-weight: bold; border: none; padding: 18px; border-radius: 10px; cursor: pointer; margin-top: 10px; font-size: 16px; width: 100%; }
        .btn-down { background: #fff; color: #000; font-weight: bold; border: none; padding: 18px; border-radius: 10px; cursor: pointer; margin-top: 10px; font-size: 16px; width: 100%; display: none; }
        #msg { color: var(--accent); text-align: center; margin-top: 10px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="left-side">
        <label>가사 입력 (한 줄씩)</label>
        <textarea id="lyricsArea">DYNAMICS
CHEWY MOTION
POWERFUL TYPO
LETS GO</textarea>
    </div>

    <div class="right-side">
        <h2>Motion Settings</h2>
        
        <div class="item">
            <label>화면 사이즈</label>
            <select id="resPreset">
                <option value="1920,1080">Youtube (16:9)</option>
                <option value="1080,1920">TikTok/Shorts (9:16)</option>
            </select>
        </div>

        <div class="item">
            <label>폰트 (시스템 설치 이름)</label>
            <input type="text" id="fontName" value="Arial-Black">
        </div>

        <div class="item">
            <label>글자 색상</label>
            <input type="color" id="fontColor" value="#ffffff">
        </div>

        <div class="item">
            <label>노출 간격 (초)</label>
            <input type="number" id="speed" value="1.5" step="0.1">
        </div>

        <label>적용할 쫀득한 모션 (중복 선택)</label>
        <div class="motion-grid" id="effectPool">
            <label class="motion-opt"><input type="checkbox" value="popBounce" checked> Pop Bounce</label>
            <label class="motion-opt"><input type="checkbox" value="slideElastic" checked> Slide Elastic</label>
            <label class="motion-opt"><input type="checkbox" value="overshoot" checked> Overshoot Rotation</label>
            <label class="motion-opt"><input type="checkbox" value="stamp"> Heavy Stamp</label>
            <label class="motion-opt"><input type="checkbox" value="snapFade"> Snap Fade</label>
            <label class="motion-opt"><input type="checkbox" value="stretchIn"> Stretch In</label>
        </div>

        <button class="btn-main" onclick="buildScript()">JSX 스크립트 생성</button>
        <button id="downloadBtn" class="btn-down" onclick="downloadFile()">JSX 파일 저장 💾</button>
        <div id="msg">✅ 생성 완료!</div>
    </div>

    <script>
        let generatedCode = "";

        function hexToAeRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            return `[${r.toFixed(3)}, ${g.toFixed(3)}, ${b.toFixed(3)}]`;
        }

        function buildScript() {
            const lyrics = document.getElementById('lyricsArea').value.split('\n').filter(s => s.trim() !== "");
            const fontName = document.getElementById('fontName').value;
            const color = hexToAeRgb(document.getElementById('fontColor').value);
            const speed = parseFloat(document.getElementById('speed').value);
            const [w, h] = document.getElementById('resPreset').value.split(',');
            const selectedEffects = Array.from(document.querySelectorAll('#effectPool input:checked')).map(el => el.value);

            let script = `(function() {
    app.beginUndoGroup("Create Chewy Typography");
    var comp = app.project.activeItem || app.project.items.addComp("MotionOutput", ${w}, ${h}, 1, 30, 60);
    var lines = ${JSON.stringify(lyrics)};

    for (var i = 0; i < lines.length; i++) {
        var layer = comp.layers.addText(lines[i]);
        var sourceText = layer.property("Source Text");
        var textDoc = sourceText.value;
        textDoc.fontSize = ${h * 0.18}; // 화면에 가득 차도록 크게 설정
        textDoc.font = "${fontName}";
        textDoc.fillColor = ${color};
        textDoc.justification = ParagraphJustification.CENTER_JUSTIFY;
        textDoc.tracking = -50;
        sourceText.setValue(textDoc);

        layer.position.setValue([${w}/2, ${h}/2]);
        layer.startTime = i * ${speed};
        layer.outPoint = (i + 1) * ${speed};

        applyChewyEffect(layer, "${selectedEffects[Math.floor(Math.random()*selectedEffects.length)]}", i * ${speed});
    }

    function applyChewyEffect(l, type, start) {
        switch(type) {
            case "popBounce": // 팍 튀어나오는 느낌
                l.scale.setValueAtTime(start, [0,0]);
                l.scale.expression = "freq = 3; amp = 40; decay = 5.0; t = time - inPoint; if (t < 0) [0,0]; else { s = amp*Math.sin(freq*t*2*Math.PI)/Math.exp(decay*t); [100+s, 100+s]; }";
                break;
            case "slideElastic": // 옆에서 쫀득하게 들어옴
                l.position.setValueAtTime(start, [${w}+500, ${h}/2]);
                l.position.expression = "freq = 2; amp = 600; decay = 5; t = time - inPoint; if (t < 0) value; else { x = amp*Math.cos(freq*t*2*Math.PI)/Math.exp(decay*t); [value[0]+x, value[1]]; }";
                break;
            case "overshoot": // 회전하며 딱 멈춤
                l.rotation.setValueAtTime(start, -45);
                l.rotation.expression = "freq = 2; amp = 45; decay = 6; t = time - inPoint; if (t < 0) value; else { r = amp*Math.cos(freq*t*2*Math.PI)/Math.exp(decay*t); value + r; }";
                break;
            case "stamp": // 위에서 쾅 찍힘
                l.scale.setValueAtTime(start, [300, 300]);
                l.scale.setValueAtTime(start + 0.2, [100, 100]);
                l.opacity.setValueAtTime(start, 0);
                l.opacity.setValueAtTime(start + 0.1, 100);
                break;
            case "snapFade": // 빠르게 스냅하며 나타남
                l.scale.setValueAtTime(start, [150, 80]);
                l.scale.setValueAtTime(start + 0.3, [100, 100]);
                l.opacity.setValueAtTime(start, 0);
                l.opacity.setValueAtTime(start + 0.2, 100);
                break;
            case "stretchIn": // 양옆으로 늘어났다 좁혀짐
                l.scale.setValueAtTime(start, [200, 20]);
                l.scale.setValueAtTime(start + 0.4, [100, 100]);
                break;
        }
    }
    app.endUndoGroup();
})();`;
            generatedCode = script;
            document.getElementById('downBtn').style.display = "block";
            document.getElementById('msg').style.display = "block";
        }

        function downloadFile() {
            const blob = new Blob([generatedCode], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "Chewy_Typo_Script.jsx";
            a.click();
        }
    </script>
</body>
</html>
