<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AE Typography Motion Generator</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --panel-color: #1a1a24;
            --accent-color: #00d4ff;
            --text-color: #e0e0e0;
            --btn-hover: #00a3cc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
        }
        /* 레이아웃 구성 */
        .left-side {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        .right-side {
            flex: 1;
            background-color: var(--panel-color);
            padding: 25px;
            overflow-y: auto;
            border-left: 1px solid #333;
            box-sizing: border-box;
        }
        h2 { margin-top: 0; color: var(--accent-color); font-size: 1.2rem; }
        
        /* 왼쪽 가사 입력창 */
        textarea {
            flex: 1;
            background: #050505;
            color: #00ff00;
            border: 1px solid #333;
            padding: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 16px;
            border-radius: 8px;
            outline: none;
            line-height: 1.6;
        }

        /* 오른쪽 컨트롤 패널 */
        .control-item { margin-bottom: 20px; }
        label { display: block; font-size: 13px; margin-bottom: 5px; color: #888; }
        input[type="text"], input[type="number"], select {
            width: 100%; padding: 10px; background: #2a2a35; border: 1px solid #444; color: white; border-radius: 5px;
        }
        input[type="range"] { width: 100%; accent-color: var(--accent-color); }
        
        /* 체크박스 모션 선택 */
        .motion-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .motion-opt {
            background: #2a2a35;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
        }
        .motion-opt input { margin-right: 8px; width: auto; }
        .motion-opt:has(input:checked) { border-color: var(--accent-color); background: #31274a; }

        /* 버튼 스타일 */
        button {
            width: 100%;
            padding: 15px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }
        .btn-main { background: var(--accent-color); color: #000; }
        .btn-download { background: #22c55e; color: white; display: none; }
        button:hover { opacity: 0.9; transform: scale(0.98); }

        pre {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            font-size: 11px;
            color: #888;
            overflow-x: auto;
            max-height: 200px;
        }
    </style>
</head>
<body>

    <div class="left-side">
        <label style="font-size: 1.1rem; color: #fff; margin-bottom: 10px;">LYRICS / TEXT INPUT</label>
        <textarea id="lyricsArea" placeholder="가사를 줄바꿈하여 입력하세요. 한 줄에 하나의 효과가 할당됩니다.">별 헤는 밤
창가에 비친 조각달
그 아래 우리들</textarea>
    </div>

    <div class="right-side">
        <h2>AE CONFIGURATION</h2>
        
        <div class="control-item">
            <label>폰트 크기 (Size)</label>
            <input type="number" id="fontSize" value="150">
        </div>

        <div class="control-group">
            <label>폰트 이름 (PostScript Name)</label>
            <input type="text" id="fontName" value="Arial-BoldMT" placeholder="설치된 폰트 이름">
        </div>

        <div class="control-group">
            <label>텍스트 색상</label>
            <input type="color" id="fontColor" value="#ffffff" style="height: 40px; padding: 2px;">
        </div>

        <div class="control-group">
            <label>모션 재생 속도 (초): <span id="speedVal">1.5</span>s</label>
            <input type="range" id="animSpeed" min="0.5" max="4.0" step="0.1" value="1.5" oninput="document.getElementById('speedVal').innerText=this.value">
        </div>

        <div class="control-group">
            <label>랜덤 포함할 효과 선택</label>
            <div class="motion-grid" id="effectPool">
                <label class="motion-opt"><input type="checkbox" value="elastic" checked> Elastic Bounce</label>
                <label class="motion-opt"><input type="checkbox" value="glitch" checked> Glitch Flicker</label>
                <label class="motion-opt"><input type="checkbox" value="typewriter" checked> Typewriter</label>
                <label class="motion-opt"><input type="checkbox" value="rotate3d"> 3D Rotation</label>
                <label class="motion-opt"><input type="checkbox" value="blur"> Blur Ease</label>
                <label class="motion-opt"><input type="checkbox" value="tracking"> Tracking Slide</label>
            </div>
        </div>

        <button class="btn-main" onclick="buildScript()">JSX 스크립트 생성</button>
        <button id="downloadBtn" class="btn-down" onclick="downloadFile()">파일로 저장 (.jsx)</button>

        <div id="previewArea" style="display:none; margin-top:20px;">
            <label>생성된 코드 미리보기</label>
            <pre id="codeOutput"></pre>
        </div>
    </div>

    <script>
        let finalOutputCode = "";

        // 색상 변환기 (Hex -> AE RGB Ratio)
        function hexToAeRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            return `[${r.toFixed(3)}, ${g.toFixed(3)}, ${b.toFixed(3)}]`;
        }

        function buildScript() {
            const lyrics = document.getElementById('lyricsArea').value.split('\n').filter(s => s.trim() !== "");
            const fontSize = document.getElementById('fontSize').value;
            const fontName = document.getElementById('fontName').value;
            const color = hexToAeRgb(document.getElementById('fontColor').value);
            const speed = document.getElementById('animSpeed').value;
            const selectedEffects = Array.from(document.querySelectorAll('#effectPool input:checked')).map(el => el.value);

            if (linesIsEmpty(lyrics)) return;
            if (selectedEffects.length === 0) { alert("최소 한 개의 효과를 선택해 주세요."); return; }

            let scriptText = `
/* After Effects Auto Typography Script */
(function() {
    app.beginUndoGroup("Create Typography");
    var comp = app.project.activeItem;
    if (!(comp instanceof CompItem)) {
        alert("컴포지션을 선택한 후 실행해 주세요.");
        return;
    }

    var lines = ${JSON.stringify(lyrics)};
    var fontSize = ${fontSize};
    var fontName = "${fontName}";
    var textColor = ${color};
    var interval = ${speed};

    for (var i = 0; i < lines.length; i++) {
        var layer = comp.layers.addText(lines[i]);
        var sourceText = layer.property("Source Text");
        var textDoc = sourceText.value;

        textDoc.fontSize = fontSize;
        textDoc.font = fontName;
        textDoc.fillColor = textColor;
        textDoc.justification = ParagraphJustification.CENTER_JUSTIFY;
        sourceText.setValue(textDoc);

        layer.position.setValue([comp.width / 2, comp.height / 2]);
        layer.startTime = i * interval;
        layer.outPoint = (i + 1) * interval;

        var effectType = ${JSON.stringify(selectedEffects)}[Math.floor(Math.random() * ${selectedEffects.length})];

        applyEffect(layer, effectType, i * interval, interval);
    }

    function applyEffect(layer, type, start, duration) {
        switch(type) {
            case "elastic":
                layer.scale.setValueAtTime(start, [0, 0]);
                layer.scale.expression = "var freq = 3; var amp = 40; var decay = 6.0; var t = time - inPoint; if (t < 0) [0,0]; else { var s = amp * Math.sin(freq * t * 2 * Math.PI) / Math.exp(decay * t); [100 + s, 100 + s]; }";
                break;
            case "glitch":
                layer.opacity.expression = "random(0, 100) > 80 ? 100 : 20;";
                break;
            case "typewriter":
                var anim = layer.Text.Animators.addProperty("ADBE Text Animator");
                anim.property("ADBE Text Animator Properties").addProperty("ADBE Text Opacity").setValue(0);
                var sel = anim.property("ADBE Text Selectors").addProperty("ADBE Text Selector");
                sel.property("Start").setValueAtTime(start, 0);
                sel.property("Start").setValueAtTime(start + 0.8, 100);
                break;
            case "slideLeft":
                layer.position.setValueAtTime(start, [layer.position.value[0]-400, layer.position.value[1]]);
                layer.position.setInterpolationTypeAtKey(1, KeyframeInterpolationType.BEZIER);
                layer.position.setValueAtTime(start + 0.5, [layer.position.value[0], layer.position.value[1]]);
                break;
            case "rotate3d":
                layer.threeDLayer = true;
                layer.rotationY.setValueAtTime(start, 90);
                layer.rotationY.setValueAtTime(start + 0.6, 0);
                break;
            case "blur":
                var blr = layer.Effects.addProperty("ADBE Fast Blur");
                blr.property(1).setValueAtTime(start, 40);
                blr.property(1).setValueAtTime(start + 0.5, 0);
                break;
            case "tracking":
                var anim = layer.Text.Animators.addProperty("ADBE Text Animator");
                var tr = anim.property("ADBE Text Animator Properties").addProperty("ADBE Text Tracking Amount");
                tr.setValueAtTime(start, 100);
                tr.setValueAtTime(start + 0.8, 0);
                break;
            case "drop":
                layer.position.setValueAtTime(start, [layer.position.value[0], -200]);
                layer.position.setValueAtTime(start + 0.5, [layer.position.value[0], layer.position.value[1]]);
                break;
        }
    }

    app.endUndoGroup();
})();`;

        generatedCode = script;
        document.getElementById('codePreview').textContent = script;
        document.getElementById('outputContainer').style.display = "block";
        document.getElementById('downBtn').style.display = "block";
    }

    function linesIsEmpty(arr) {
        return arr.length === 0 || (arr.length === 1 && arr[0] === "");
    }

    function downloadFile() {
        const blob = new Blob([generatedCode], { type: 'text/javascript' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "LyricToMotion_AE.jsx";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
</script>
</body>
</html>
