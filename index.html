<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Motion Lab</title>
    <style>
        :root { --bg: #0a0a0c; --card: #16161e; --accent: #7c4dff; --text: #efeff1; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 900px; width: 100%; background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #2d2d3d; }
        h1 { text-align: center; color: var(--accent); margin-bottom: 25px; letter-spacing: -1px; }
        
        /* Layout */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .full { grid-column: 1 / -1; }

        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; color: #aaa; }
        textarea, input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #2d2d3d; background: #0a0a0c; color: white; box-sizing: border-box; }
        
        /* 속도/색상 컨트롤 */
        .control-panel { background: #1e1e2a; padding: 15px; border-radius: 12px; display: flex; gap: 20px; align-items: center; }
        .control-item { flex: 1; }
        input[type="color"] { height: 40px; padding: 2px; cursor: pointer; }

        .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .checkbox-group label { background: #2d2d3d; padding: 6px 12px; border-radius: 20px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .checkbox-group input { display: none; }
        .checkbox-group input:checked + span { color: var(--accent); font-weight: bold; }
        .checkbox-group label:has(input:checked) { border-color: var(--accent); background: #251b3d; }

        button { width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 16px; }
        .btn-gen { background: var(--accent); color: white; }
        .btn-down { background: #00c853; color: white; display: none; }
        button:hover { filter: brightness(1.2); transform: translateY(-2px); }

        #output { margin-top: 25px; display: none; }
        pre { background: #000; padding: 20px; border-radius: 10px; overflow-x: auto; font-size: 13px; color: #9cdcfe; border: 1px solid #333; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Motion Script Lab</h1>

    <div class="grid">
        <div class="full">
            <label>1. 가사 또는 텍스트 입력</label>
            <textarea id="lyricsInput" placeholder="여기에 가사를 입력하세요... (줄바꿈 기준)">Hello World&#10;Motion Graphic&#10;Creative Code</textarea>
        </div>

        <div class="full control-panel">
            <div class="control-item">
                <label>글자 색상</label>
                <input type="color" id="textColor" value="#ffffff">
            </div>
            <div class="control-item">
                <label>애니메이션 속도 (0.1 ~ 3.0)</label>
                <input type="range" id="speed" min="0.1" max="3.0" step="0.1" value="1.0" oninput="speedVal.innerText = this.value">
                <span id="speedVal" style="font-size: 12px;">1.0</span>s
            </div>
        </div>

        <div>
            <label>2. 모션 랜덤 풀 선택</label>
            <div class="checkbox-group" id="motionTypes">
                <label><input type="checkbox" value="fade" checked><span>Fade</span></label>
                <label><input type="checkbox" value="scale" checked><span>Scale</span></label>
                <label><input type="checkbox" value="slide" checked><span>Slide</span></label>
                <label><input type="checkbox" value="bounce"><span>Bounce</span></label>
            </div>
        </div>

        <div>
            <label>3. 타겟 플랫폼</label>
            <select id="platform">
                <option value="ae">After Effects (.jsx)</option>
                <option value="blender">Blender (.py)</option>
            </select>
        </div>
    </div>

    <button class="btn-gen" onclick="generate()">스크립트 생성 및 최적화 ✨</button>
    <button id="downBtn" class="btn-down" onclick="downloadFile()">파일로 내보내기 (.zip 제외 단일파일) 💾</button>

    <div id="output">
        <pre id="codeDisplay"></pre>
    </div>
</div>

<script>
    /* =========================================================
       1. 효과 추가 가이드 (Snippet Library)
       ---------------------------------------------------------
       새로운 효과를 넣으려면 각 플랫폼 객체 안에 
       "효과명: (text, index, speed, color) => `코드...`" 형식으로 추가하세요.
       =========================================================
    */
    const motionSnips = {
        ae: {
            fade: (t, i, s, c) => `// ${t} Fade\nvar l${i} = comp.layers.addText("${t}");\nvar fill = l${i}.property("Source Text").value;\nfill.fillColor = ${hexToAE(c)};\nl${i}.property("Source Text").setValue(fill);\nl${i}.opacity.setValueAtTime(${i*s}, 0);\nl${i}.opacity.setValueAtTime(${(i+1)*s}, 100);`,
            
            scale: (t, i, s, c) => `// ${t} Scale\nvar l${i} = comp.layers.addText("${t}");\nl${i}.scale.setValueAtTime(${i*s}, [0,0]);\nl${i}.scale.setValueAtTime(${(i+0.5)*s}, [100,100]);`,
            
            slide: (t, i, s, c) => `// ${t} Slide\nvar l${i} = comp.layers.addText("${t}");\nl${i}.position.setValueAtTime(${i*s}, [-500, 540]);\nl${i}.position.setValueAtTime(${(i+1)*s}, [960, 540]);`,

            bounce: (t, i, s, c) => `// ${t} Bounce\nvar l${i} = comp.layers.addText("${t}");\nl${i}.position.expression = "var freq = 3; var amp = 50; var decay = 5; amp*Math.sin(freq*time*2*Math.PI)/Math.exp(decay*time) + value;";`
        },
        blender: {
            fade: (t, i, s, c) => `create_text("${t}", ${i*s*24}, "${c}", "fade")`,
            scale: (t, i, s, c) => `create_text("${t}", ${i*s*24}, "${c}", "scale")`,
            slide: (t, i, s, c) => `create_text("${t}", ${i*s*24}, "${c}", "slide")`,
            bounce: (t, i, s, c) => `create_text("${t}", ${i*s*24}, "${c}", "bounce")`
        }
    };

    // Helper: Hex Color to AE RGB ([0,0,0] ~ [1,1,1])
    function hexToAE(hex) {
        var r = parseInt(hex.slice(1, 3), 16) / 255;
        var g = parseInt(hex.slice(3, 5), 16) / 255;
        var b = parseInt(hex.slice(5, 7), 16) / 255;
        return `[${r.toFixed(2)}, ${g.toFixed(2)}, ${b.toFixed(2)}]`;
    }

    let generatedCode = "";
    let fileExt = "txt";

    function generate() {
        const text = document.getElementById('lyricsInput').value.trim();
        const lines = text.split('\n').filter(l => l.trim() !== "");
        const selectedMotions = Array.from(document.querySelectorAll('#motionTypes input:checked')).map(c => c.value);
        const platform = document.getElementById('platform').value;
        const color = document.getElementById('textColor').value;
        const speed = parseFloat(document.getElementById('speed').value);

        if (lines.length === 0 || selectedMotions.length === 0) return alert("가사와 모션을 선택해주세요!");

        let finalCode = platform === 'ae' ? "var comp = app.project.activeItem;\n" : "import bpy\n# Blender Helper Functions...\n";
        
        lines.forEach((line, idx) => {
            const randomType = selectedMotions[Math.floor(Math.random() * selectedMotions.length)];
            const snippetFunc = motionSnips[platform][randomType];
            if (snippetFunc) {
                finalCode += snippetFunc(line.replace(/"/g, '\\"'), idx, speed, color) + "\n\n";
            }
        });

        generatedCode = finalCode;
        fileExt = platform === 'ae' ? "jsx" : "py";
        document.getElementById('codeDisplay').textContent = finalCode;
        document.getElementById('output').style.display = "block";
        document.getElementById('downBtn').style.display = "block";
    }

    function downloadFile() {
        const blob = new Blob([generatedCode], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `motion_script_${Date.now()}.${fileExt}`;
        a.click();
    }
</script>

</body>
</html>
