<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AE 쫀득한 타이포 제너레이터</title>
    <style>
        :root {
            --bg: #0c0c0e;
            --panel: #1a1a24;
            --accent: #00ffaa;
            --text: #ffffff;
            --success: #00e676;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        
        /* 왼쪽: 가사 입력 (비중 크게) */
        .left-side { flex: 1.5; display: flex; flex-direction: column; padding: 25px; box-sizing: border-box; }
        textarea { flex: 1; background: #000; color: var(--accent); border: 1px solid #333; padding: 25px; font-family: 'Fira Code', monospace; font-size: 17px; border-radius: 12px; outline: none; line-height: 1.8; }

        /* 오른쪽: 설정 패널 */
        .right-side { flex: 1; background: var(--panel); padding: 30px; overflow-y: auto; border-left: 1px solid #222; box-sizing: border-box; display: flex; flex-direction: column; }
        h2 { font-size: 1rem; color: var(--accent); text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; letter-spacing: 1px; }
        
        .item { margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 12px; background: #0a0a0c; border: 1px solid #333; color: white; border-radius: 8px; font-size: 14px; }
        
        /* 모드 선택 버튼 */
        .mode-select { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; background: #2d2d3d; padding: 12px; text-align: center; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; font-weight: bold; font-size: 13px; }
        .mode-btn.active { border-color: var(--accent); background: #152a24; color: var(--accent); }

        /* 효과 체크박스 그리드 */
        .motion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .motion-opt { background: #2d2d3d; padding: 12px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid transparent; display: flex; align-items: center; }
        .motion-opt input { margin-right: 10px; width: auto; scale: 1.2; }
        .motion-opt:has(input:checked) { border-color: var(--accent); background: #152a24; }

        /* 생성 및 다운로드 버튼 */
        .button-area { margin-top: auto; padding-top: 20px; }
        button { width: 100%; padding: 18px; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 12px; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .btn-main { background: var(--accent); color: #000; }
        .btn-down { background: var(--success); color: white; display: none; } /* 처음엔 숨김 */
        button:hover { opacity: 0.9; transform: scale(0.98); }
        
        #statusMsg { color: var(--success); text-align: center; font-size: 14px; font-weight: bold; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="left-side">
        <label style="font-size: 1rem; color: #fff;">가사 입력창</label>
        <textarea id="lyricsArea">[사용방법]
1. 이 내용을 모두 지우고 가사를 한 줄씩 입력하세요.
2. 오른쪽에서 [유튜브/틱톡] 및 [자막/전체화면] 모드를 고르세요.
3. 쫀득한 효과들을 여러 개 체크하세요.
4. [JSX 스크립트 생성]을 클릭하세요.
5. 아래에 나타난 [파일 저장하기] 버튼으로 다운로드 하세요.
6. 에프터 이펙트에서 File -> Scripts -> Run Script File로 실행하세요.</textarea>
</div>

    <div class="right-side">
        <h2>Canvas & Motion</h2>
        
        <div class="item">
            <label>화면 사이즈</label>
            <select id="resPreset">
                <option value="1920,1080">Youtube (16:9)</option>
                <option value="1080,1920">TikTok/Shorts (9:16)</option>
            </select>
        </div>

        <div class="item">
            <label>작업 모드</label>
            <div class="mode-select">
                <div id="modeSub" class="mode-btn active" onclick="setMode('sub')">자막 모드</div>
                <div id="modeFull" class="mode-btn" onclick="setMode('full')">전체 화면</div>
            </div>
        </div>

        <div class="item">
            <label>폰트 (PostScript Name)</label>
            <input type="text" id="fontName" value="Arial-Black">
        </div>

        <div class="item">
            <label>글자 색상</label>
            <input type="color" id="fontColor" value="#ffffff" style="height:45px; padding:3px;">
        </div>

        <div class="item">
            <label>간격 (초)</label>
            <input type="number" id="speed" value="1.5" step="0.1">
        </div>

        <div class="item">
            <label>쫀득한 효과 선택 (중복 가능)</label>
            <div class="motion-grid" id="effectPool">
                <label class="motion-opt"><input type="checkbox" value="popBounce" checked> Pop Bounce</label>
                <label class="motion-opt"><input type="checkbox" value="slideElastic" checked> Slide Elastic</label>
                <label class="motion-opt"><input type="checkbox" value="stretch" checked> Stretch In</label>
                <label class="motion-opt"><input type="checkbox" value="overshoot" checked> Overshoot</label>
                <label class="motion-opt"><input type="checkbox" value="stamp"> Heavy Stamp</label>
            </div>
        </div>

        <div class="button-area">
            <div id="statusMsg">✅ 스크립트 생성 완료!</div>
            <button id="downloadBtn" class="btn-down" onclick="downloadFile()">JSX 파일 저장하기 💾</button>
            <button class="btn-main" onclick="buildScript()">JSX 스크립트 생성</button>
        </div>
    </div>

    <script>
        let currentMode = 'sub';
        let finalJsxCode = "";

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('modeSub').classList.toggle('active', mode === 'sub');
            document.getElementById('modeFull').classList.toggle('active', mode === 'full');
        }

        function hexToAeRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            return `[${r.toFixed(3)}, ${g.toFixed(3)}, ${b.toFixed(3)}]`;
        }

        function buildScript() {
            const lyricsText = document.getElementById('lyricsArea').value;
            const lyrics = lyricsText.split('\n').filter(s => s.trim() !== "" && !s.includes('['));
            const fontName = document.getElementById('fontName').value;
            const color = hexToAeRgb(document.getElementById('fontColor').value);
            const speed = parseFloat(document.getElementById('speed').value);
            const [w, h] = document.getElementById('resPreset').value.split(',');
            const selectedEffects = Array.from(document.querySelectorAll('#effectPool input:checked')).map(el => el.value);

            if (lyrics.length === 0) { alert("가사를 입력하세요."); return; }
            if (selectedEffects.length === 0) { alert("효과를 선택하세요."); return; }

            // 모드별 수치: 전체화면일 때 글자 크기를 25%까지 확대
            const fontSize = (currentMode === 'sub') ? (h * 0.06) : (h * 0.25);
            const posY = (currentMode === 'sub') ? (h * 0.85) : (h * 0.5);

            let script = `(function() {
    app.beginUndoGroup("Create Chewy Motion");
    var comp = app.project.activeItem || app.project.items.addComp("TextOutput", ${w}, ${h}, 1, 30, 60);
    var lines = ${JSON.stringify(lyrics)};

    for (var i = 0; i < lines.length; i++) {
        var layer = comp.layers.addText(lines[i]);
        var sourceText = layer.property("Source Text");
        var textDoc = sourceText.value;
        textDoc.fontSize = ${fontSize};
        textDoc.font = "${fontName}";
        textDoc.fillColor = ${color};
        textDoc.justification = ParagraphJustification.CENTER_JUSTIFY;
        textDoc.tracking = -30;
        sourceText.setValue(textDoc);

        layer.position.setValue([${w}/2, ${posY}]);
        layer.startTime = i * ${speed};
        layer.outPoint = (i + 1) * ${speed};

        var type = "${selectedEffects[0]}"; 
        var effArr = ${JSON.stringify(selectedEffects)};
        var myEff = effArr[Math.floor(Math.random() * effArr.length)];

        applyChewy(layer, myEff, i * ${speed}, ${w});
    }

    function applyChewy(l, type, start, w) {
        try {
            if (type === "popBounce") {
                l.scale.setValueAtTime(start, [0,0]);
                l.scale.expression = "f=3; a=40; d=5; t=time-inPoint; if(t<0)[0,0]; else { s=a*Math.sin(f*t*2*Math.PI)/Math.exp(d*t); [100+s, 100+s]; }";
            } else if (type === "slideElastic") {
                l.position.setValueAtTime(start, [w+600, l.position.value[1]]);
                l.position.expression = "f=2; a=600; d=5; t=time-inPoint; if(t<0)value; else { x=a*Math.cos(f*t*2*Math.PI)/Math.exp(d*t); [value[0]+x, value[1]]; }";
            } else if (type === "stretch") {
                l.scale.setValueAtTime(start, [250, 20]);
                l.scale.setValueAtTime(start + 0.3, [100, 100]);
            } else if (type === "overshoot") {
                l.rotation.setValueAtTime(start, -30);
                l.rotation.expression = "f=2; a=30; d=6; t=time-inPoint; r=a*Math.cos(f*t*2*Math.PI)/Math.exp(d*t); value+r;";
            } else if (type === "stamp") {
                l.scale.setValueAtTime(start, [400, 400]);
                l.scale.setValueAtTime(start + 0.2, [100, 100]);
                l.opacity.setValueAtTime(start, 0);
                l.opacity.setValueAtTime(start + 0.1, 100);
            }
        } catch(e) {}
    }
    app.endUndoGroup();
})();`;

            finalJsxCode = script;
            
            // UI 업데이트: 결과창과 다운로드 버튼 표시
            document.getElementById('statusMsg').style.display = "block";
            document.getElementById('downloadBtn').style.display = "block";
        }

        function downloadFile() {
            if(!finalJsxCode) return;
            const blob = new Blob([finalJsxCode], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "Chewy_Motion_Script.jsx";
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
