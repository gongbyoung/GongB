<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AE Motion Pro - Final</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --panel-color: #1a1a24;
            --accent-color: #00d4ff;
            --text-color: #e0e0e0;
            --success: #22c55e;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; display: flex; height: 100vh; }
        
        /* 레이아웃 */
        .left-side { flex: 1.5; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .right-side { flex: 1; background-color: var(--panel-color); padding: 25px; overflow-y: auto; border-left: 1px solid #333; box-sizing: border-box; }
        
        h2 { margin-top: 0; color: var(--accent-color); font-size: 1.1rem; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        /* 왼쪽 가사창 */
        textarea { flex: 1; background: #050505; color: #00ff00; border: 1px solid #333; padding: 20px; font-family: 'Fira Code', monospace; font-size: 16px; border-radius: 8px; outline: none; line-height: 1.6; }

        /* 오른쪽 컨트롤 */
        .item { margin-bottom: 15px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; color: #888; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 10px; background: #2a2a35; border: 1px solid #444; color: white; border-radius: 5px; }
        
        .mode-select { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; background: #2a2a35; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        .mode-btn.active { border-color: var(--accent-color); background: #31274a; }

        .motion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .motion-opt { background: #2a2a35; padding: 8px; border-radius: 5px; font-size: 12px; cursor: pointer; border: 1px solid transparent; display: flex; align-items: center; }
        .motion-opt input { margin-right: 8px; }
        .motion-opt:has(input:checked) { border-color: var(--accent-color); background: #31274a; }

        /* 버튼 */
        button { width: 100%; padding: 15px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-main { background: var(--accent-color); color: #000; }
        .btn-down { background: var(--success); color: white; display: none; } /* 초기엔 숨김 */
        button:hover { opacity: 0.9; transform: scale(0.98); }

        #codePreviewArea { margin-top: 20px; display: none; }
        pre { background: #000; padding: 15px; border-radius: 8px; font-size: 11px; color: #888; overflow-x: auto; max-height: 150px; }
    </style>
</head>
<body>

    <div class="left-side">
        <label style="font-size: 1rem; color: #fff;">LYRICS INPUT</label>
        <textarea id="lyricsArea" placeholder="가사를 입력하세요...">1. 효과 중첩 적용 (Multi-Effect)
기존 코드에서는 switch 문으로 하나만 선택했지만, 새 코드에서는 applySelectedEffects 함수 내에서 **반복문(for)**을 사용합니다.

예: 사용자가 Fade In과 Scale과 Blur In을 체크하면, 텍스트 레이어 하나에 이 3가지 효과를 위한 키프레임과 이펙트가 모두 생성됩니다.

2. 효과 코드 상세 구현
Fade In: 불투명도 0 -> 100.

Elastic: 통통 튀는 탄성 수식 적용.

Typewriter: 한 글자씩 써지는 애니메이터 적용.

Drop Down: 화면 위에서 아래로 떨어지는 이동.

Slide In: 화면 오른쪽 밖에서 안으로 들어오는 이동.

3D Rotate: Y축으로 90도 회전하며 등장.

Blur In: Fast Blur를 이용해 흐릿했다가 선명해짐.

Tracking: 넓게 퍼진 자간이 좁혀지며 밀도 있게 등장.

Neon: Glow 효과 추가 및 불규칙하게 깜빡이는 익스프레션 추가.

3. 전문가용 레이아웃 (유튜브/틱톡 최적화)
왼쪽 화면: 가사를 넓게 입력할 수 있도록 텍스트 편집기 배치.

오른쪽 화면: 설정값을 배치하고, 특히 **"자막 모드"**와 "전체 화면 모드" 버튼을 두어 클릭 한 번으로 글자 크기와 하단/중앙 위치가 세팅되게 했습니다.

💡 팁: 새로운 효과 직접 추가하기
applySelectedEffects 함수 내의 switch(type) 부분에 case "내효과이름":을 추가하기만 하면 됩니다. 중첩 구조이기 때문에 다른 효과에 영향을 주지 않고 본인만의 코드를 끼워넣을 수 있습니다.</textarea>
    </div>

    <div class="right-side">
        <h2>AE SETTINGS</h2>
        
        <div class="item">
            <label>화면 사이즈</label>
            <select id="resPreset" onchange="toggleCustom()">
                <option value="1920,1080">Youtube (16:9)</option>
                <option value="1080,1920">TikTok/Shorts (9:16)</option>
                <option value="custom">Custom</option>
            </select>
        </div>

        <div id="customRes" class="item" style="display:none; display: flex; gap:10px;">
            <input type="number" id="customW" placeholder="W" value="1080">
            <input type="number" id="customH" placeholder="H" value="1080">
        </div>

        <div class="item">
            <label>작업 모드</label>
            <div class="mode-select">
                <div id="modeSub" class="mode-btn active" onclick="setMode('sub')">자막 모드</div>
                <div id="modeFull" class="mode-btn" onclick="setMode('full')">전체 화면</div>
            </div>
        </div>

        <div class="item">
            <label>폰트 (PostScript Name)</label>
            <input type="text" id="fontName" value="Arial-BoldMT">
        </div>

        <div class="item">
            <label>글자 색상</label>
            <input type="color" id="fontColor" value="#ffffff">
        </div>

        <div class="item">
            <label>간격 (초): <span id="speedVal">2.0</span>s</label>
            <input type="range" id="animSpeed" min="0.5" max="5.0" step="0.1" value="2.0" oninput="document.getElementById('speedVal').innerText=this.value">
        </div>

        <label>효과 선택 (중복 가능)</label>
        <div class="motion-grid" id="effectPool">
            <label class="motion-opt"><input type="checkbox" value="fadeIn" checked> Fade In</label>
            <label class="motion-opt"><input type="checkbox" value="elastic" checked> Elastic</label>
            <label class="motion-opt"><input type="checkbox" value="typewriter"> Typewriter</label>
            <label class="motion-opt"><input type="checkbox" value="dropDown"> Drop Down</label>
            <label class="motion-opt"><input type="checkbox" value="rotate3D"> 3D Rotate</label>
            <label class="motion-opt"><input type="checkbox" value="blurIn"> Blur In</label>
            <label class="motion-opt"><input type="checkbox" value="neon"> Neon Flicker</label>
            <label class="motion-opt"><input type="checkbox" value="swing"> Swing</label>
        </div>

        <button class="btn-main" onclick="buildScript()">JSX 스크립트 생성</button>
        <button id="downloadBtn" class="btn-down" onclick="downloadFile()">.JSX 파일 저장 💾</button>

        <div id="codePreviewArea">
            <pre id="codeOutput"></pre>
        </div>
    </div>

    <script>
        let currentMode = 'sub';
        let generatedCode = "";

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('modeSub').classList.toggle('active', mode === 'sub');
            document.getElementById('modeFull').classList.toggle('active', mode === 'full');
        }

        function toggleCustom() {
            const val = document.getElementById('resPreset').value;
            document.getElementById('customRes').style.display = (val === 'custom') ? 'flex' : 'none';
        }

        function hexToAeRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            return `[${r.toFixed(3)}, ${g.toFixed(3)}, ${b.toFixed(3)}]`;
        }

        function buildScript() {
            const lyrics = document.getElementById('lyricsArea').value.split('\n').filter(s => s.trim() !== "");
            const fontName = document.getElementById('fontName').value;
            const color = hexToAeRgb(document.getElementById('fontColor').value);
            const speed = parseFloat(document.getElementById('animSpeed').value);
            const selectedEffects = Array.from(document.querySelectorAll('#effectPool input:checked')).map(el => el.value);

            let w, h;
            const resVal = document.getElementById('resPreset').value;
            if(resVal === 'custom') {
                w = document.getElementById('customW').value; h = document.getElementById('customH').value;
            } else {
                [w, h] = resVal.split(',');
            }

            const fontSize = (currentMode === 'sub') ? (h * 0.05) : (h * 0.12);
            const posY = (currentMode === 'sub') ? (h * 0.85) : (h * 0.5);

            let script = `(function() {
    app.beginUndoGroup("Create Typography");
    var comp = app.project.activeItem || app.project.items.addComp("MotionOutput", ${w}, ${h}, 1, 30, 60);
    var lines = ${JSON.stringify(lyrics)};

    for (var i = 0; i < lines.length; i++) {
        var layer = comp.layers.addText(lines[i]);
        var sourceText = layer.property("Source Text");
        var textDoc = sourceText.value;
        textDoc.fontSize = ${fontSize};
        textDoc.font = "${fontName}";
        textDoc.fillColor = ${color};
        textDoc.justification = ParagraphJustification.CENTER_JUSTIFY;
        sourceText.setValue(textDoc);

        layer.position.setValue([${w}/2, ${posY}]);
        layer.startTime = i * ${speed};
        layer.outPoint = (i + 1) * ${speed};

        applyEffects(layer, ${JSON.stringify(selectedEffects)}, i * ${speed}, ${w}, ${h});
    }

    function applyEffects(l, effects, start, w, h) {
        for (var j = 0; j < effects.length; j++) {
            var type = effects[j];
            switch(type) {
                case "fadeIn":
                    l.opacity.setValueAtTime(start, 0);
                    l.opacity.setValueAtTime(start + 0.4, 100);
                    break;
                case "elastic":
                    l.scale.setValueAtTime(start, [0, 0]);
                    l.scale.expression = "var freq=3; var amp=40; var decay=5; t=time-inPoint; if(t<0)[0,0]; else { s=amp*Math.sin(freq*t*2*Math.PI)/Math.exp(decay*t); [100+s, 100+s]; }";
                    break;
                case "typewriter":
                    var anim = l.Text.Animators.addProperty("ADBE Text Animator");
                    anim.property("ADBE Text Animator Properties").addProperty("ADBE Text Opacity").setValue(0);
                    var sel = anim.property("ADBE Text Selectors").addProperty("ADBE Text Selector");
                    sel.property("Start").setValueAtTime(start, 0);
                    sel.property("Start").setValueAtTime(start + 0.8, 100);
                    break;
                case "dropDown":
                    var curPos = l.position.value;
                    l.position.setValueAtTime(start, [curPos[0], -200]);
                    l.position.setInterpolationTypeAtKey(1, KeyframeInterpolationType.BEZIER);
                    l.position.setValueAtTime(start + 0.5, curPos);
                    break;
                case "rotate3D":
                    l.threeDLayer = true;
                    l.rotationY.setValueAtTime(start, 90);
                    l.rotationY.setValueAtTime(start + 0.6, 0);
                    break;
                case "blurIn":
                    var blr = l.Effects.addProperty("ADBE Fast Blur");
                    blr.property(1).setValueAtTime(start, 50);
                    blr.property(1).setValueAtTime(start + 0.5, 0);
                    break;
                case "neon":
                    var g = l.Effects.addProperty("ADBE Glow");
                    l.opacity.expression = "random(0,100) > 85 ? 100 : 60;";
                    break;
                case "swing":
                    var b = l.sourceRectAtTime(0, false);
                    l.anchorPoint.setValue([b.width/2, 0]);
                    l.rotation.expression = "Math.sin((time-inPoint) * 4) * 20;";
                    break;
            }
        }
    }
    app.endUndoGroup();
})();`;

            generatedCode = script;
            document.getElementById('codeOutput').textContent = "스크립트 생성 완료! 아래 버튼을 눌러 저장하세요.";
            document.getElementById('outputContainer')?.style.display || (document.getElementById('codePreviewArea').style.display = "block");
            document.getElementById('downloadBtn').style.display = "block";
        }

        function downloadFile() {
            const blob = new Blob([generatedCode], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "AE_Pro_Typography.jsx";
            a.click();
        }
    </script>
</body>
</html>
