<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AE Kinetic Typo - 101 Marker Sync</title>
    <style>
        :root { --bg: #0a0a0c; --panel: #16161e; --accent: #00ffaa; --pink: #ff3e81; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .left-side { flex: 1.5; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        textarea { flex: 1; background: #000; color: var(--accent); border: 1px solid #333; padding: 25px; font-size: 16px; border-radius: 12px; outline: none; line-height: 1.8; }
        .right-side { flex: 1; background: var(--panel); padding: 25px; border-left: 1px solid #333; overflow-y: auto; box-sizing: border-box; display: flex; flex-direction: column; }
        h2 { font-size: 1rem; color: var(--accent); text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .item { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; background: #050505; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 14px; }
        .motion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .motion-opt { background: #2d2d3d; padding: 10px; border-radius: 8px; font-size: 12px; cursor: pointer; border: 2px solid transparent; display: flex; align-items: center; }
        .motion-opt:has(input:checked) { border-color: var(--pink); background: #31274a; }
        .button-area { margin-top: auto; padding-top: 20px; }
        button { width: 100%; padding: 18px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 10px; font-size: 16px; transition: 0.2s; }
        #generateBtn { background: var(--pink); color: #fff; }
        #downloadBtn { background: #22c55e; color: #fff; display: none; }
    </style>
</head>
<body>

    <div class="left-side">
        <label style="font-size: 1.1rem; color: #fff; margin-bottom: 10px;">가사 101줄 입력 (띄어쓰기=자동 줄바꿈)</label>
        <textarea id="lyricsArea">[101줄 마커 싱크 가이드]
1. AE에서 마커(*)를 101개 찍으세요.
2. 마커가 찍힌 레이어를 '선택'한 상태에서 스크립트를 실행하세요.
3. 띄어쓰기 기준으로 단어들이 세로로 쌓여 화면을 꽉 채웁니다.
4. 모든 레이어에 랜덤한 쫀득 모션이 섞여서 들어갑니다.</textarea>
    </div>

    <div class="right-side">
        <h2>AE MARKER SYNC SETTINGS</h2>
        <div class="item">
            <label>폰트 (시스템 영문명)</label>
            <input type="text" id="fontName" value="Arial-Black">
        </div>
        <div class="item">
            <label>글자 색상</label>
            <input type="color" id="fontColor" value="#ffffff">
        </div>
        <div class="item">
            <label>효과 풀 (전체 체크 권장)</label>
            <div class="motion-grid" id="effectPool">
                <label class="motion-opt"><input type="checkbox" value="pop" checked> Pop Bounce</label>
                <label class="motion-opt"><input type="checkbox" value="side_L" checked> Elastic Left</label>
                <label class="motion-opt"><input type="checkbox" value="side_R" checked> Elastic Right</label>
                <label class="motion-opt"><input type="checkbox" value="top" checked> Drop Down</label>
                <label class="motion-opt"><input type="checkbox" value="bottom" checked> Rise Up</label>
                <label class="motion-opt"><input type="checkbox" value="zoom" checked> Power Zoom</label>
            </div>
        </div>
        <div class="button-area">
            <button id="downloadBtn" onclick="saveFile()">.JSX 파일 저장하기 💾</button>
            <button id="generateBtn" onclick="doBuild()">JSX 스크립트 생성</button>
        </div>
    </div>

    <script>
        let codeBuffer = "";
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            return `[${r.toFixed(3)}, ${g.toFixed(3)}, ${b.toFixed(3)}]`;
        }
        function doBuild() {
            const lyricsText = document.getElementById('lyricsArea').value;
            const rawLines = lyricsText.split('\n').filter(s => s.trim() !== "" && !s.includes('['));
            const font = document.getElementById('fontName').value;
            const color = hexToRgb(document.getElementById('fontColor').value);
            const effects = Array.from(document.querySelectorAll('#effectPool input:checked')).map(el => el.value);

            // 띄어쓰기 -> 줄바꿈 처리 로직
            const processedLines = rawLines.map(line => {
                const words = line.trim().split(/\s+/);
                return words.map(word => {
                    let chunked = "";
                    for(let i=0; i<word.length; i+=6) {
                        chunked += word.substring(i, i+6) + (i+6 < word.length ? "\r" : "");
                    }
                    return chunked;
                }).join('\r');
            });

            codeBuffer = `(function() {
    app.beginUndoGroup("Final 101 Marker Sync");
    var comp = app.project.activeItem;
    if (!comp) { alert("컴포지션을 선택하세요."); return; }
    
    var selLayer = comp.selectedLayers[0];
    if (!selLayer || !selLayer.marker || selLayer.marker.numKeys < 1) {
        alert("마커가 찍힌 레이어를 먼저 선택(클릭)하고 실행하세요!");
        return;
    }

    var lines = ${JSON.stringify(processedLines)};
    var effPool = ${JSON.stringify(effects)};
    var targetW = comp.width * 0.85;
    var targetH = comp.height * 0.85;

    for (var i = 0; i < lines.length; i++) {
        var layer = comp.layers.addText(lines[i]);
        var sourceText = layer.property("Source Text");
        var doc = sourceText.value;
        doc.fontSize = 100; doc.font = "${font}"; doc.fillColor = ${color};
        doc.justification = ParagraphJustification.CENTER_JUSTIFY;
        doc.leading = 90;
        sourceText.setValue(doc);

        // --- 마커 동기화 핵심 ---
        var startTime = (i < selLayer.marker.numKeys) ? selLayer.marker.keyTime(i + 1) : i * 1.5;
        var endTime = (i + 1 < selLayer.marker.numKeys) ? selLayer.marker.keyTime(i + 2) : startTime + 1.2;
        layer.startTime = startTime;
        layer.outPoint = endTime;

        // 크기 및 위치 자동 조절
        var rect = layer.sourceRectAtTime(startTime, false);
        var finalS = Math.min((targetW / rect.width) * 100, (targetH / rect.height) * 100);
        if (finalS > 400) finalS = 400;
        layer.scale.setValue([finalS, finalS]);
        layer.position.setValue([comp.width/2, comp.height/2]);

        // 랜덤 효과 믹스
        var p1 = effPool[Math.floor(Math.random()*effPool.length)];
        var p2 = effPool[Math.floor(Math.random()*effPool.length)];

        var posExp = "f=3.5; a=600; d=6; t=time-inPoint; v=a*Math.cos(f*t*2*Math.PI)/Math.exp(d*t);";
        if (p1=="side_L" || p2=="side_L") posExp += "[value[0]+v, value[1]];";
        else if (p1=="side_R" || p2=="side_R") posExp += "[value[0]-v, value[1]];";
        else if (p1=="top" || p2=="top") posExp += "[value[0], value[1]-v];";
        else if (p1=="bottom" || p2=="bottom") posExp += "[value[0], value[1]+v];";
        else posExp += "value;";
        layer.position.expression = posExp;

        var scExp = "f=3.5; a=45; d=6; t=time-inPoint; s=a*Math.sin(f*t*2*Math.PI)/Math.exp(d*t);";
        if (p1=="zoom" || p2=="zoom") {
            layer.scale.setValueAtTime(startTime, [finalS*3, finalS*3]);
            layer.scale.setValueAtTime(startTime+0.25, [finalS, finalS]);
            scExp = "value;";
        } else if (p1=="stretch" || p2=="stretch") scExp += "[value[0]+s*2, value[1]-s];";
        else scExp += "[value[0]+s, value[1]+s];";
        
        layer.scale.expression = scExp;
        layer.rotation.expression = "f=2; a=12; d=5; t=time-inPoint; r=a*Math.cos(f*t*2*Math.PI)/Math.exp(d*t); value+r;";
    }
    app.endUndoGroup();
})();`;
            document.getElementById('downloadBtn').style.display = "block";
        }
        function saveFile() {
            const blob = new Blob([codeBuffer], { type: 'text/javascript' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "AE_Final_MarkerSync_101.jsx";
            a.click();
        }
    </script>
</body>
</html>
