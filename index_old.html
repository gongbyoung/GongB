<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AE Motion Pro - Button Fixed</title>
    <style>
        :root {
            --bg: #0c0c0e; 
            --panel: #1a1a24;
            --accent: #00ffaa;
            --success: #22c55e;
        }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; }
        
        /* 왼쪽: 가사창 */
        .left-side { flex: 1.5; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        textarea { flex: 1; background: #000; color: var(--accent); border: 1px solid #444; padding: 20px; font-size: 16px; border-radius: 10px; line-height: 1.6; }

        /* 오른쪽: 설정 */
        .right-side { flex: 1; background: var(--panel); padding: 25px; border-left: 1px solid #333; display: flex; flex-direction: column; box-sizing: border-box; overflow-y: auto; }
        .item { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; background: #0a0a0c; border: 1px solid #444; color: #fff; border-radius: 6px; }
        
        .mode-btn { display: inline-block; width: 45%; padding: 10px; text-align: center; background: #2d2d3d; border-radius: 6px; cursor: pointer; border: 2px solid transparent; margin-right: 5px; font-size: 13px; }
        .mode-btn.active { border-color: var(--accent); color: var(--accent); }

        .motion-opt { display: inline-block; background: #2d2d3d; padding: 8px 12px; border-radius: 6px; margin: 4px; font-size: 12px; cursor: pointer; border: 1px solid transparent; }
        .motion-opt:has(input:checked) { border-color: var(--accent); color: var(--accent); }

        /* 버튼 영역 */
        .button-area { margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
        button { width: 100%; padding: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 10px; font-size: 16px; }
        
        #generateBtn { background: var(--accent); color: #000; }
        #downloadBtn { background: var(--success); color: #fff; display: none; } /* JS에서 block으로 변경 */
        
        #status { text-align: center; font-size: 13px; color: var(--accent); margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <div class="left-side">
        <label>가사 입력 (줄바꿈 단위로 효과가 적용됩니다)</label>
        <textarea id="lyricsArea">[사용방법]
1. 이 내용을 지우고 가사를 입력하세요.
2. 효과를 체크하고 아래 [JSX 스크립트 생성]을 누르세요.
3. [파일 저장하기] 버튼이 나타나면 클릭해서 다운로드하세요.
4. 애프터 이펙트 File -> Scripts -> Run Script File로 실행!</textarea>
    </div>

    <div class="right-side">
        <h2>AE SETTINGS</h2>
        
        <div class="item">
            <label>화면 사이즈</label>
            <select id="resPreset">
                <option value="1920,1080">Youtube (16:9)</option>
                <option value="1080,1920">TikTok/Shorts (9:16)</option>
            </select>
        </div>

        <div class="item">
            <label>작업 모드</label>
            <div id="modeSub" class="mode-btn active" onclick="setMode('sub')">자막용</div>
            <div id="modeFull" class="mode-btn" onclick="setMode('full')">전체화면(크게)</div>
        </div>

        <div class="item">
            <label>폰트 (시스템 설치 영문명)</label>
            <input type="text" id="fontName" value="Arial-Black">
        </div>

        <div class="item">
            <label>글자 색상</label>
            <input type="color" id="fontColor" value="#ffffff">
        </div>

        <div class="item">
            <label>모션들 (여러 개 선택 가능)</label>
            <div id="effectPool">
                <label class="motion-opt"><input type="checkbox" value="pop" checked> Pop</label>
                <label class="motion-opt"><input type="checkbox" value="elastic" checked> Elastic</label>
                <label class="motion-opt"><input type="checkbox" value="stretch" checked> Stretch</label>
                <label class="motion-opt"><input type="checkbox" value="drop" checked> Drop</label>
            </div>
        </div>

        <div class="button-area">
            <div id="status">✅ 준비되었습니다!</div>
            <button id="downloadBtn" onclick="saveFile()">.JSX 파일 저장하기 💾</button>
            <button id="generateBtn" onclick="doBuild()">JSX 스크립트 생성</button>
        </div>
    </div>

    <script>
        let mode = 'sub';
        let codeBuffer = "";

        function setMode(m) {
            mode = m;
            document.getElementById('modeSub').classList.toggle('active', m === 'sub');
            document.getElementById('modeFull').classList.toggle('active', m === 'full');
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            return `[${r.toFixed(3)}, ${g.toFixed(3)}, ${b.toFixed(3)}]`;
        }

        function doBuild() {
            const lyricsText = document.getElementById('lyricsArea').value;
            const lines = lyricsText.split('\n').filter(s => s.trim() !== "" && !s.includes('['));
            const font = document.getElementById('fontName').value;
            const color = hexToRgb(document.getElementById('fontColor').value);
            const [w, h] = document.getElementById('resPreset').value.split(',');
            const checks = Array.from(document.querySelectorAll('#effectPool input:checked')).map(el => el.value);

            if (lines.length === 0) { alert("가사를 입력해주세요."); return; }
            if (checks.length === 0) { alert("효과를 선택해주세요."); return; }

            const fSize = (mode === 'sub') ? (h * 0.06) : (h * 0.22);
            const posY = (mode === 'sub') ? (h * 0.85) : (h * 0.5);

            codeBuffer = `(function() {
    app.beginUndoGroup("Create Motion");
    var comp = app.project.activeItem || app.project.items.addComp("Video", ${w}, ${h}, 1, 30, 60);
    var lines = ${JSON.stringify(lines)};
    for (var i = 0; i < lines.length; i++) {
        var layer = comp.layers.addText(lines[i]);
        var sourceText = layer.property("Source Text");
        var doc = sourceText.value;
        doc.fontSize = ${fSize};
        doc.font = "${font}";
        doc.fillColor = ${color};
        doc.justification = ParagraphJustification.CENTER_JUSTIFY;
        sourceText.setValue(doc);
        layer.position.setValue([${w}/2, ${posY}]);
        layer.startTime = i * 2;
        layer.outPoint = (i + 1) * 2;
        applyEffect(layer, "${checks[0]}", i * 2);
    }
    function applyEffect(l, type, start) {
        if(type === "pop") {
            l.scale.setValueAtTime(start, [0,0]);
            l.scale.expression = "f=3; a=40; d=5; t=time-inPoint; if(t<0)[0,0]; else { s=a*Math.sin(f*t*2*Math.PI)/Math.exp(d*t); [100+s, 100+s]; }";
        } else if(type === "elastic") {
            l.position.setValueAtTime(start, [${w}+500, ${posY}]);
            l.position.expression = "f=2; a=500; d=5; t=time-inPoint; if(t<0)value; else { x=a*Math.cos(f*t*2*Math.PI)/Math.exp(d*t); [value[0]+x, value[1]]; }";
        } else if(type === "stretch") {
            l.scale.setValueAtTime(start, [300, 20]);
            l.scale.setValueAtTime(start + 0.3, [100, 100]);
        } else if(type === "drop") {
            l.position.setValueAtTime(start, [${w}/2, -200]);
            l.position.setValueAtTime(start + 0.4, [${w}/2, ${posY}]);
        }
    }
    app.endUndoGroup();
})();`;

            // 버튼 강제 노출 로직
            const downBtn = document.getElementById('downloadBtn');
            const statusMsg = document.getElementById('status');
            
            downBtn.style.display = "block";  // 버튼 보이기
            statusMsg.style.display = "block"; // 메시지 보이기
            
            console.log("Script Generated Successfully");
        }

        function saveFile() {
            if(!codeBuffer) return;
            const blob = new Blob([codeBuffer], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "AE_Motion_Script.jsx";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
