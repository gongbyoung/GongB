<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Element Guard v0.19 (Editor & Pathfinding)</title>
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0a; --panel: #1a1a1a; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .hidden { display: none !important; }
        
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; width: 450px; }
        .btn-large { padding: 12px; background: #2a2a2a; border: 2px solid #444; color: white; cursor: pointer; border-radius: 8px; font-size: 0.9em; transition: 0.2s; }
        .btn-large:hover { background: var(--primary); color: black; }

        #header { width: 920px; background: var(--panel); padding: 8px 15px; display: flex; justify-content: space-between; border-radius: 0 0 8px 8px; align-items: center; border-bottom: 2px solid #333; z-index: 10; box-sizing: border-box; }
        #game-container { position: relative; margin: 10px; border: 2px solid #333; line-height: 0; background: #000; }
        canvas { background: #000; cursor: crosshair; }

        /* 에디터 사이드바 */
        #editor-sidebar { position: absolute; right: 0; top: 60px; width: 220px; background: rgba(26, 26, 26, 0.9); border: 1px solid var(--primary); padding: 15px; z-index: 150; font-size: 12px; text-align: left; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        
        .ui-panel { width: 920px; background: var(--panel); padding: 12px; border-radius: 8px; display: flex; gap: 10px; box-sizing: border-box; }
        .tower-btn { width: 85px; padding: 10px; background: #333; border: 2px solid #555; color: white; cursor: pointer; border-radius: 5px; text-align: center; font-size: 0.8em; }
        .tower-btn.selected { border-color: var(--primary); background: #224433; box-shadow: 0 0 10px var(--primary); }
        
        .modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; background: #1a1a1a; border: 2px solid var(--primary); padding: 25px; border-radius: 15px; z-index: 200; }
        .stats { font-weight: bold; color: var(--primary); }
        #pause-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; pointer-events: none; color: var(--primary); font-size: 2em; font-weight: bold; opacity: 0; transition: 0.3s; }
        #pause-overlay.visible { opacity: 1; }
        #version-tag { cursor: pointer; user-select: none; padding: 2px 6px; background: #222; border-radius: 4px; font-size: 11px; }
    </style>
</head>
<body>

<div id="main-menu" class="screen">
    <h1 style="color:var(--primary); font-size: 3.5em; margin:0;">ELEMENT GUARD</h1>
    <p id="load-msg" style="color:#ff00ff; font-weight:bold;">Loading...</p>
    <div class="menu-grid">
        <button class="btn-large" onclick="initStage(1)">TUT 1</button>
        <button class="btn-large" id="tut-2" onclick="initStage(2)" disabled>TUT 2</button>
        <button class="btn-large" id="tut-3" onclick="initStage(3)" disabled>TUT 3</button>
        <button class="btn-large" id="tut-4" onclick="initStage(4)" disabled>TUT 4</button>
        <button class="btn-large" id="tut-5" onclick="initStage(5)" disabled>TUT 5</button>
        <button class="btn-large" id="survival-btn" style="grid-column: span 3; color:#ffaa00;" disabled>SURVIVAL MODE</button>
    </div>
</div>

<div id="header" class="hidden">
    <div id="stage-title" class="stats">STAGE 1</div>
    <div id="version-tag" onclick="handleVersionClick()">v0.19</div>
    <div>💰 <span id="money-ui" class="stats">0</span></div>
    <div>❤️ <span id="lives-ui" class="stats">20</span></div>
    <div>WAVE: <span id="wave-ui" class="stats">0</span> / 10</div>
    <button class="btn-large" style="padding:4px 10px; font-size:11px;" onclick="quitGame()">종료</button>
</div>

<div id="game-container" class="hidden">
    <canvas id="gameCanvas"></canvas>
    <div id="pause-overlay">PAUSED</div>

    <!-- 에디터 사이드바 -->
    <div id="editor-sidebar" class="hidden">
        <h3 style="color:var(--primary); margin-top:0;">🛠 EDITOR</h3>
        <p>1. 맵 클릭: 벽 설치/제거<br>2. S키: 콘솔에 JSON 출력</p>
        <button class="btn-large" style="width:100%; font-size:11px; margin-bottom:5px;" onclick="money += 5000; updateUI();">돈 추가 (+5000)</button>
        <button class="btn-large" style="width:100%; font-size:11px; margin-bottom:5px;" onclick="downloadMapJSON()">MAP 다운로드</button>
        <button class="btn-large" style="width:100%; font-size:11px; background:#444;" onclick="toggleEditor(false)">에디터 닫기</button>
    </div>
    
    <div id="upgrade-modal" class="modal hidden">
        <h3 id="up-title" style="margin:0; color:var(--primary);">TOWER CONTROL</h3>
        <p id="up-info">Level 1</p>
        <button class="btn-large" id="up-confirm-btn" style="width:100%;">Upgrade</button>
        <button class="btn-large" id="sell-btn" style="width:100%; margin-top:10px; background:#441111;">Sell Tower</button>
        <button class="btn-large" style="width:100%; margin-top:10px; background:#333;" onclick="closeUpgrade()">Resume</button>
    </div>
</div>

<div class="ui-panel hidden" id="tower-menu"></div>

<script>
/** 1. 데이터 로드 **/
let elementData = [], enemyData = [], reactionData = [], stagesData = [];
async function loadAllData() {
    const msg = document.getElementById('load-msg');
    try {
        const [re, rc, rr, rs] = await Promise.all([
            fetch('elements.json?v='+Date.now()), fetch('compounds.json?v='+Date.now()), 
            fetch('reactions.json?v='+Date.now()), fetch('stages.json?v='+Date.now())
        ]);
        const f = (o) => Array.isArray(o) ? o : Object.values(o).find(v => Array.isArray(v)) || [];
        elementData = f(await re.json()); enemyData = f(await rc.json());
        reactionData = f(await rr.json()); stagesData = f(await rs.json());
        msg.innerText = "v0.19 Loaded Successfully";
        updateMenuLock();
    } catch (e) {
        msg.innerText = "Local Mode Active";
        elementData = [{ id: "Na", symbol: "Na", cost: 50, range: 150, fireRate: 1000, color: "#e0e0e0", type: "Alkaline" }];
        enemyData = [{ id: "HCl", formula: "HCl", hp: 100, speed: 0.7, type: "Acid", reward: 20, color: "#ff4444", byproduct: "NaCl" }];
        stagesData = [{ name: "Lab 1", start: {r:5, c:0}, end: {r:5, c:19}, walls: [] }];
    }
}

/** 2. 엔진 설정 **/
const TILE_SIZE = 40, COLS = 20, ROWS = 10;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = COLS * TILE_SIZE; canvas.height = ROWS * TILE_SIZE;

let grid, towers, enemies, projectiles, money, lives, wave, activeMap, gameActive = false, isPaused = false;
let selectedTowerIdx = 0, waveTimer = null, isEditorEnabled = false, verClickCount = 0;

/** 3. 적 및 경로 로직 **/
class Enemy {
    constructor(data) {
        this.data = data; this.hp = data.hp; this.maxHp = data.hp;
        this.x = activeMap.start.c * 40 + 20; this.y = activeMap.start.r * 40 + 20;
        this.path = findPath(activeMap.start.r, activeMap.start.c); this.pathIdx = 0;
    }
    update() {
        if (!this.path || this.pathIdx >= this.path.length - 1) { lives--; return false; }
        let target = this.path[this.pathIdx + 1];
        let tx = target.c * 40 + 20, ty = target.r * 40 + 20;
        let dist = Math.hypot(tx - this.x, ty - this.y);
        if (dist < 2) { this.pathIdx++; return true; }
        this.x += ((tx - this.x) / dist) * (this.data.speed || 1);
        this.y += ((ty - this.y) / dist) * (this.data.speed || 1);
        return true;
    }
    recalculatePath() {
        let curR = Math.floor(this.y / 40), curC = Math.floor(this.x / 40);
        let newP = findPath(curR, curC);
        if (newP) { this.path = newP; this.pathIdx = 0; }
    }
    draw() {
        ctx.fillStyle = this.data.color || "#f00"; ctx.beginPath(); ctx.arc(this.x, this.y, 14, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "white"; ctx.font = "bold 9px Arial"; ctx.textAlign="center"; ctx.fillText(this.data.formula || "", this.x, this.y+4);
        ctx.fillStyle = "#444"; ctx.fillRect(this.x-15, this.y-22, 30, 3);
        ctx.fillStyle = "#0f8"; ctx.fillRect(this.x-15, this.y-22, 30*(this.hp/this.maxHp), 3);
    }
}

function findPath(sr, sc) {
    if(!activeMap) return null;
    let q = [{r: sr, c: sc, path: [{r: sr, c: sc}]}];
    let v = Array.from({length:ROWS},()=>Array(COLS).fill(false));
    v[sr][sc] = true;
    while(q.length > 0) {
        let {r, c, path} = q.shift();
        if(r === activeMap.end.r && c === activeMap.end.c) return path;
        for(let d of [{r:1,c:0},{r:-1,c:0},{r:0,c:1},{r:0,c:-1}]) {
            let nr=r+d.r, nc=c+d.c;
            if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS && !v[nr][nc] && grid[nr][nc] === 0) {
                v[nr][nc]=true; q.push({r:nr, nc:nc, path: [...path, {r:nr, c:nc}]});
            }
        }
    }
    return null;
}

/** 4. 에디터 및 클릭 로직 **/
function handleVersionClick() {
    if(++verClickCount >= 5) { toggleEditor(true); verClickCount = 0; }
}

function toggleEditor(show) {
    isEditorEnabled = show;
    document.getElementById('editor-sidebar').classList.toggle('hidden', !show);
    if(show) alert("에디터 모드 활성화: 맵을 클릭하여 벽을 설치하세요.");
}

function downloadMapJSON() {
    let walls = [];
    for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) if(grid[r][c] === 2) walls.push({r, c, w:1, h:1});
    let data = JSON.stringify({ ...activeMap, walls }, null, 2);
    let blob = new Blob([data], {type: "application/json"});
    let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "map_export.json"; a.click();
}

canvas.onclick = (ev) => {
    let rect = canvas.getBoundingClientRect();
    let c = Math.floor((ev.clientX - rect.left)/40), r = Math.floor((ev.clientY - rect.top)/40);
    if(r<0 || r>=ROWS || c<0 || c>=COLS) return;

    // 에디터 모드일 때 (벽 토글)
    if (isEditorEnabled) {
        grid[r][c] = (grid[r][c] === 2) ? 0 : 2;
        enemies.forEach(e => e.recalculatePath());
        return;
    }

    // 게임 모드일 때
    isPaused = true; document.getElementById('pause-overlay').classList.add('visible');
    const existing = towers.find(t => t.r === r && t.c === c);
    if (existing) { openUpgrade(existing); return; }

    if (grid[r][c] === 0) {
        let d = elementData[selectedTowerIdx];
        if (money >= d.cost) {
            grid[r][c] = 1;
            let mainP = findPath(activeMap.start.r, activeMap.start.c);
            let blocked = enemies.some(e => !findPath(Math.floor(e.y/40), Math.floor(e.x/40)));
            if (mainP && !blocked) {
                towers.push(new Tower(r, c, d)); money -= d.cost; updateUI();
                enemies.forEach(e => e.recalculatePath());
                setTimeout(() => { isPaused = false; document.getElementById('pause-overlay').classList.remove('visible'); }, 300);
            } else { grid[r][c] = 0; alert("길을 막을 수 없습니다!"); resumeAfterDelay(); }
        } else resumeAfterDelay();
    } else resumeAfterDelay();
};

function resumeAfterDelay() { setTimeout(() => { isPaused = false; document.getElementById('pause-overlay').classList.remove('visible'); }, 300); }

/** 5. 초기화 및 루프 **/
function initStage(num) {
    activeMap = stagesData[(num-1) % stagesData.length];
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('header').classList.remove('hidden');
    document.getElementById('game-container').classList.remove('hidden');
    document.getElementById('tower-menu').classList.remove('hidden');
    grid = Array.from({length:ROWS}, () => Array(COLS).fill(0));
    if(activeMap.walls) activeMap.walls.forEach(w => { for(let r=w.r;r<w.r+w.h;r++)for(let c=w.c;c<w.c+w.w;c++)grid[r][c]=2; });
    towers = []; enemies = []; projectiles = []; money = 500; lives = 20; wave = 0; gameActive = true;
    updateUI(); initTowerMenu(); spawnWave(); requestAnimationFrame(gameLoop);
}

function gameLoop() {
    if (!gameActive) return;
    if (!isPaused) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        renderMap();
        towers.forEach(t => t.update());
        projectiles = projectiles.filter(p => !p.update());
        enemies = enemies.filter(e => e.hp > 0 && e.update());
        if (lives <= 0) { alert("Game Over"); location.reload(); return; }
        if (wave >= 10 && enemies.length === 0) { alert("STAGE CLEAR!"); quitGame(); }
    }
    renderEntities(); requestAnimationFrame(gameLoop);
}

/** 클래스 및 UI 유틸리티 **/
class Tower {
    constructor(r,c,d) { this.r=r;this.c=c;this.x=c*40+20;this.y=r*40+20;this.data=d;this.lastShot=0;this.level=1;this.totalInvested=d.cost; }
    get range() { return this.data.range * Math.pow(1.05, this.level-1); }
    get damage() { return 25 * Math.pow(1.05, this.level-1); }
    update() {
        if(isPaused) return; let now = Date.now();
        if(now - this.lastShot > (this.data.fireRate || 1000)) {
            let target = enemies.find(e => Math.hypot(e.x-this.x, e.y-this.y) < this.range);
            if(target) { projectiles.push(new Projectile(this.x, this.y, target, this.data, this.damage)); this.lastShot = now; }
        }
    }
    draw() { ctx.fillStyle = this.data.color || "#555"; ctx.beginPath(); ctx.roundRect(this.c*40+4, this.r*40+4, 32, 32, 5); ctx.fill(); ctx.fillStyle="#000"; ctx.font="bold 11px Arial"; ctx.textAlign="center"; ctx.fillText(this.data.symbol, this.x, this.y+4); }
}
class Projectile {
    constructor(x,y,t,d,dmg) { this.x=x;this.y=y;this.target=t;this.data=d;this.dmg=dmg;this.speed=10; }
    update() {
        let dx = this.target.x-this.x, dy = this.target.y-this.y, dist = Math.hypot(dx, dy);
        if(dist < 10) { 
            let fDmg = this.dmg;
            let r = reactionData.find(re => re.attacker_type === this.data.type && re.target_type === this.target.data.type);
            if(r) fDmg *= r.multiplier; this.target.hp -= fDmg; return true; 
        }
        this.x += (dx/dist)*this.speed; this.y += (dy/dist)*this.speed; return false;
    }
    draw() { ctx.fillStyle = this.data.color; ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill(); }
}
function renderMap() {
    for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) {
        ctx.strokeStyle = "#151515"; ctx.strokeRect(c*40, r*40, 40, 40);
        if(grid[r][c]===2) { ctx.fillStyle = "#333"; ctx.fillRect(c*40+2, r*40+2, 36, 36); }
    }
    ctx.fillStyle = "rgba(0,255,136,0.1)"; ctx.fillRect(activeMap.start.c*40, activeMap.start.r*40, 40, 40);
    ctx.fillStyle = "rgba(255,68,68,0.1)"; ctx.fillRect(activeMap.end.c*40, activeMap.end.r*40, 40, 40);
}
function renderEntities() { towers.forEach(t => t.draw()); enemies.forEach(e => e.draw()); projectiles.forEach(p => p.draw()); }
function spawnWave() {
    if(!gameActive || wave >= 10) return;
    wave++; updateUI();
    let count = 0, spawnCount = 3 + Math.floor(wave/2);
    waveTimer = setInterval(() => {
        if(isPaused) return;
        let d = enemyData[Math.floor(Math.random()*enemyData.length)];
        enemies.push(new Enemy({...d, hp: d.hp*(1+(wave-1)*0.2), speed: (d.speed||0.7)+(wave*0.02)}));
        if(++count >= spawnCount) clearInterval(waveTimer);
    }, 1200);
}
function updateUI() { document.getElementById('money-ui').innerText = money; document.getElementById('lives-ui').innerText = lives; document.getElementById('wave-ui').innerText = wave; }
function initTowerMenu() { document.getElementById('tower-menu').innerHTML = elementData.map((t,i) => `<div class="tower-btn ${i===selectedTowerIdx?'selected':''}" style="background:${t.color}; color:#000;" onclick="selectedTowerIdx=${i};initTowerMenu()"><b>${t.symbol}</b><br>${t.cost}</div>`).join(""); }
function updateMenuLock() { let prog = parseInt(localStorage.getItem('chem_progress') || "1"); for(let i=2; i<=5; i++) if(prog >= i) document.getElementById(`tut-${i}`).disabled = false; }
function quitGame() { location.reload(); }
function openUpgrade(t) { isPaused = true; document.getElementById('pause-overlay').classList.add('visible'); const modal = document.getElementById('upgrade-modal'); const upCost = Math.floor(t.data.cost * 0.8 * t.level); document.getElementById('up-info').innerText = `Level ${t.level} (Next: ${upCost}G)`; document.getElementById('up-confirm-btn').onclick = () => { if(money>=upCost){ money-=upCost; t.level++; t.totalInvested+=upCost; updateUI(); closeUpgrade(); } }; document.getElementById('sell-btn').onclick = () => { money += Math.floor(t.totalInvested*0.7); grid[t.r][t.c]=0; towers=towers.filter(tw=>tw!==t); enemies.forEach(e=>e.recalculatePath()); updateUI(); closeUpgrade(); }; modal.classList.remove('hidden'); }
function closeUpgrade() { isPaused = false; document.getElementById('pause-overlay').classList.remove('visible'); document.getElementById('upgrade-modal').classList.add('hidden'); }

loadAllData();
</script>
</body>
</html>
