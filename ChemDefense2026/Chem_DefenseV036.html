<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Element Guard v0.36 (Stability Update)</title>
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0a; --panel: #1a1a1a; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .hidden { display: none !important; }
        
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; width: 500px; }
        .menu-btn { padding: 15px; background: #222; border: 2px solid #444; color: white; cursor: pointer; border-radius: 8px; font-size: 1em; transition: 0.3s; }
        .menu-btn:hover:not(:disabled) { background: var(--primary); color: black; border-color: #fff; }
        .menu-btn:disabled { opacity: 0.1; color: #444; }

        #header { width: 1000px; background: var(--panel); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; box-sizing: border-box; }
        #game-container { position: relative; border: 2px solid #333; background: #000; line-height: 0; margin-top: 10px; overflow: hidden; }
        canvas { background: #000; cursor: crosshair; }

        .ui-panel { width: 1000px; background: var(--panel); padding: 15px; border-radius: 8px; display: flex; gap: 10px; box-sizing: border-box; margin-top: 10px; min-height: 100px; justify-content: center; overflow-x: auto; }
        .tower-card { padding: 10px; background: #333; border: 2px solid #555; cursor: pointer; border-radius: 6px; text-align: center; min-width: 95px; transition: 0.2s; flex-shrink: 0; }
        .tower-card.selected { border-color: var(--primary); background: #224433; box-shadow: 0 0 10px var(--primary); }
        
        .modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 420px; background: #111; border: 2px solid var(--primary); padding: 30px; border-radius: 20px; z-index: 200; box-shadow: 0 0 50px #000; }
        .stats { font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div id="main-menu" class="screen">
    <h1 style="color:var(--primary); font-size: 4em; margin:0;">ELEMENT GUARD</h1>
    <p id="load-status" style="color:#ff00ff; font-weight:bold;">데이터 확인 중...</p>
    <div class="menu-grid">
        <button class="menu-btn" onclick="initStage(1)">TUTORIAL 1</button>
        <button class="menu-btn" id="tut-2" onclick="initStage(2)" disabled>TUTORIAL 2</button>
        <button class="menu-btn" id="tut-3" onclick="initStage(3)" disabled>TUTORIAL 3</button>
        <button class="menu-btn" id="tut-4" onclick="initStage(4)" disabled>TUTORIAL 4</button>
        <button class="menu-btn" id="tut-5" onclick="initStage(5)" disabled>TUTORIAL 5</button>
        <button class="menu-btn" id="survival-btn" style="grid-column: span 3; color:#ffaa00;" onclick="initStage('survival')" disabled>SURVIVAL MODE</button>
    </div>
    <p style="color:#444; font-size: 11px; margin-top: 30px;">v0.36 | Stability & Safety Update</p>
</div>

<div id="header" class="hidden">
    <div id="stage-title" class="stats">STAGE 1</div>
    <div style="font-size:12px; color:#aaa;">타겟: <span id="target-enemy" style="color:white;">-</span></div>
    <div>💰 <span id="money-ui" class="stats">0</span></div>
    <div>❤️ <span id="lives-ui" class="stats">20</span></div>
    <div>WAVE: <span id="wave-ui" class="stats">0</span> / 10</div>
    <button style="padding:5px 10px; background:#444; color:white; border:none; border-radius:4px; cursor:pointer;" onclick="location.reload()">EXIT</button>
</div>

<div id="game-layout" class="hidden" style="display:flex; flex-direction:column; align-items:center;">
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="result-modal" class="modal hidden">
            <h2 id="result-title" style="color:var(--primary); margin:0;">MISSION COMPLETE!</h2>
            <div id="result-content" style="text-align:left; margin: 20px 0; line-height: 1.8;">
                스테이지: <span id="res-name" class="stats"></span><br>
                정산 결과: <span class="stats">안전하게 중화되었습니다.</span>
            </div>
            <button class="menu-btn" style="width:100%; background:var(--primary); color:black;" onclick="location.reload()">저장 및 메뉴로</button>
        </div>
    </div>
    <div class="ui-panel" id="tower-menu"></div>
</div>

<script>
/** [1] 비상용 백업 데이터 (JSON 로드 실패 시 사용) **/
const BACKUP_ELEMENTS = [
    {id:"Na", symbol:"Na", name:"나트륨(NaOH)", cost:50, range:160, fire_rate:1.0, color:"#e0e0e0", type:"Alkaline", atomic_number:11, unlock_stage:1},
    {id:"O", symbol:"O", name:"산소", cost:70, range:140, fire_rate:0.8, color:"#5af", type:"Oxidation", atomic_number:8, unlock_stage:2},
    {id:"Cl", symbol:"Cl", name:"염소", cost:100, range:180, fire_rate:0.9, color:"#dfd", type:"Oxidation", atomic_number:17, unlock_stage:2},
    {id:"Mg", symbol:"Mg", name:"마그네슘", cost:120, range:150, fire_rate:1.1, color:"#f88", type:"Alkaline", atomic_number:12, unlock_stage:3}
];
const BACKUP_ENEMIES = [
    {id:"HCl", formula:"HCl", hp:100, speed:0.7, type:"Acid", reward:20, atomic_sum:18},
    {id:"CH4", formula:"CH4", hp:150, speed:1.1, type:"Flammable", reward:30, atomic_sum:10}
];
const BACKUP_STAGES = [
    {name:"기초 실험실", start:{r:5,c:0}, end:{r:5,c:24}, walls:[], target_enemies:["HCl"], allowed_towers:["Na"]}
];

let elementData = [], enemyData = [], reactionData = [], stagesData = [];
let grid, towers, enemies, projectiles, money, lives, wave, activeMap;
let gameActive = false, currentStage = 1, selectedTowerIdx = 0, isWaveSpawning = false, isGameOver = false;

const TILE_SIZE = 40, COLS = 25, ROWS = 12;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = COLS * TILE_SIZE; canvas.height = ROWS * TILE_SIZE;

/** [2] 안전한 데이터 로딩 함수 **/
function extractArray(data) {
    if (Array.isArray(data)) return data;
    if (data && typeof data === 'object') {
        for (let key in data) { if (Array.isArray(data[key])) return data[key]; }
    }
    return null;
}

async function loadAllData() {
    const status = document.getElementById('load-status');
    const cb = `?v=${Date.now()}`;
    try {
        const [re, rc, rr, rs] = await Promise.all([
            fetch('elements.json'+cb).then(r=>r.json()).catch(e=>null),
            fetch('compounds.json'+cb).then(r=>r.json()).catch(e=>null),
            fetch('reactions.json'+cb).then(r=>r.json()).catch(e=>null),
            fetch('stages.json'+cb).then(r=>r.json()).catch(e=>null)
        ]);

        elementData = extractArray(re) || BACKUP_ELEMENTS;
        enemyData = extractArray(rc) || BACKUP_ENEMIES;
        reactionData = extractArray(rr) || [{attacker_type:"Alkaline", target_type:"Acid", multiplier:2.5}];
        stagesData = extractArray(rs) || BACKUP_STAGES;

        // 튜토리얼 매핑 강제 보정 (v0.35와 동일 로직)
        const rules = [
            { target: ["HCl"], allowed: ["Na"] },
            { target: ["CH4"], allowed: ["O", "Cl"] },
            { target: ["H2SO4"], allowed: ["Mg", "Na"] }
        ];
        stagesData.forEach((s, idx) => {
            if (idx < rules.length) {
                if(!s.target_enemies) s.target_enemies = rules[idx].target;
                if(!s.allowed_towers) s.allowed_towers = rules[idx].allowed;
            }
            if(!s.start) s.start = {r:5,c:0};
            if(!s.end) s.end = {r:5,c:24};
        });

        status.innerText = "연결 성공 (v0.36)"; status.style.color = "#0f8";
        updateMenuLock();
    } catch (e) {
        console.error(e);
        status.innerText = "데이터 로드 오류 (백업 사용)";
        elementData = BACKUP_ELEMENTS; enemyData = BACKUP_ENEMIES; stagesData = BACKUP_STAGES;
        updateMenuLock();
    }
}

/** [3] 타워 클래스 (실제 사거리 기반 궤도 시각화) **/
class Tower {
    constructor(r,c,d) {
        this.r=r; this.c=c; this.x=c*40+20; this.y=r*40+20;
        this.data=d; this.lastShot=0; this.level=1;
        this.rotation = Math.random() * Math.PI * 2;
        this.atomicNumber = d.atomic_number || 1;
    }
    get range() { return this.data.range * Math.pow(1.05, this.level-1); }

    update() {
        if(isGameOver) return;
        this.rotation += 0.03;
        if(Date.now() - this.lastShot > (this.data.fire_rate * 1000 || 1000)) {
            let targetsInRange = enemies.filter(e => Math.hypot(e.x-this.x, e.y-this.y) < this.range);
            let validTarget = targetsInRange.find(e => {
                let myType = this.data.damage_type || this.data.type;
                return reactionData.some(r => r.attacker_type === myType && r.target_type === e.data.type);
            });
            if(validTarget) { projectiles.push(new Projectile(this.x, this.y, validTarget, this.data)); this.lastShot = Date.now(); }
        }
    }

    draw() {
        ctx.fillStyle = this.data.color || "#555";
        ctx.beginPath(); ctx.arc(this.x, this.y, 12, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#000"; ctx.font = "bold 10px Arial"; ctx.textAlign="center";
        let label = this.data.symbol === "Na" ? "NaOH" : this.data.symbol;
        ctx.fillText(label, this.x, this.y+4);

        const actualRange = this.range;
        ctx.strokeStyle = this.data.color + "33";
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 5]);
        ctx.beginPath(); ctx.arc(this.x, this.y, actualRange, 0, Math.PI*2); ctx.stroke();
        ctx.setLineDash([]);

        for(let i=0; i < this.atomicNumber; i++) {
            let angle = this.rotation + (i * (Math.PI * 2 / this.atomicNumber));
            let ex = this.x + Math.cos(angle) * actualRange;
            let ey = this.y + Math.sin(angle) * actualRange;
            ctx.fillStyle = this.data.color;
            ctx.beginPath(); ctx.arc(ex, ey, 3, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 0.2;
            ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(ex, ey); ctx.stroke();
            ctx.globalAlpha = 1.0;
        }
    }
}

/** [4] 게임 루프 및 보조 로직 **/
function gameLoop() {
    if (!gameActive || isGameOver) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    renderMap();
    towers.forEach(t => { t.update(); t.draw(); });
    projectiles = projectiles.filter(p => !p.update());
    projectiles.forEach(p => p.draw());
    enemies = enemies.filter(e => {
        if (e.hp <= 0) { money += (Number(e.data.atomic_sum) || 20); updateUI(); return false; }
        return e.update();
    });
    enemies.forEach(e => e.draw());
    if (lives <= 0) { endStage(false); return; }
    if (currentStage !== 'survival' && wave >= 10 && enemies.length === 0 && !isWaveSpawning) { endStage(true); return; }
    if (!isWaveSpawning && enemies.length === 0 && wave < 10) spawnWave();
    requestAnimationFrame(gameLoop);
}

function initStage(num) {
    currentStage = num; isGameOver = false;
    activeMap = (num === 'survival') ? stagesData[Math.floor(Math.random()*stagesData.length)] : stagesData[(num-1)%stagesData.length];
    
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('header').classList.remove('hidden');
    document.getElementById('game-layout').classList.remove('hidden');
    document.getElementById('target-enemy').innerText = activeMap.target_enemies ? activeMap.target_enemies.join(", ") : "HCl";
    document.getElementById('stage-title').innerText = num === 'survival' ? "SURVIVAL" : "STAGE " + num;

    grid = Array.from({length:ROWS}, () => Array(COLS).fill(0));
    if(activeMap.walls) activeMap.walls.forEach(w => { 
        for(let r=w.r; r < Math.min(w.r+w.h, ROWS); r++) 
            for(let c=w.c; c < Math.min(w.c+w.w, COLS); c++) if(grid[r]) grid[r][c]=2; 
    });
    
    towers=[]; enemies=[]; projectiles=[]; money=500; lives=20; wave=0;
    gameActive=true; selectedTowerIdx=0;
    updateUI(); initTowerMenu(); spawnWave(); requestAnimationFrame(gameLoop);
}

function initTowerMenu() {
    const menu = document.getElementById('tower-menu');
    const allowed = activeMap.allowed_towers || ["Na"];
    const available = elementData.filter(t => currentStage === 'survival' || allowed.includes(t.symbol) || allowed.includes(t.id));
    menu.innerHTML = available.map((t, i) => {
        let label = t.symbol === "Na" ? "NaOH" : t.symbol;
        return `<div class="tower-card ${i===selectedTowerIdx?'selected':''}" style="border-bottom:4px solid ${t.color};" onclick="selectedTowerIdx=${i};initTowerMenu()"><b>${label}</b><br><small>${t.name}</small><br>${t.cost}G</div>`;
    }).join("");
}

function endStage(isWin) {
    isGameOver = true; gameActive = false;
    const modal = document.getElementById('result-modal');
    document.getElementById('result-title').innerText = isWin ? "STAGE CLEAR!" : "MISSION FAILED";
    document.getElementById('res-name').innerText = activeMap.name;
    if(isWin && typeof currentStage === 'number') {
        let p = parseInt(localStorage.getItem('chem_progress') || "1");
        if(currentStage == p) localStorage.setItem('chem_progress', p + 1);
    }
    modal.classList.remove('hidden');
}

/** [기타 물리 로직 - v0.35 동일] **/
class Projectile { constructor(x,y,t,d){this.x=x;this.y=y;this.target=t;this.data=d;this.speed=18;} update(){let dx=this.target.x-this.x,dy=this.target.y-this.y,dist=Math.hypot(dx,dy);if(dist<10){let fDmg=35;let myType=this.data.damage_type||this.data.type;let r=reactionData.find(re=>re.attacker_type===myType&&re.target_type===this.target.data.type);if(r)fDmg*=r.multiplier||1;this.target.hp-=fDmg;return true;}this.x+=(dx/dist)*this.speed;this.y+=(dy/dist)*this.speed;return false;} draw(){ctx.fillStyle=this.data.color;ctx.beginPath();ctx.arc(this.x,this.y,4,0,Math.PI*2);ctx.fill();} }
class Enemy { constructor(data){this.data=data;this.hp=data.hp;this.maxHp=data.hp;this.x=activeMap.start.c*40+20;this.y=activeMap.start.r*40+20;this.path=findPath(activeMap.start.r,activeMap.start.c,activeMap.end.r,activeMap.end.c);this.pathIdx=0;} update(){if(!this.path||this.pathIdx>=this.path.length-1){lives--;return false;}let target=this.path[this.pathIdx+1];let tx=target.c*40+20,ty=target.r*40+20;let dist=Math.hypot(tx-this.x,ty-this.y);if(dist<2){this.pathIdx++;return true;}this.x+=((tx-this.x)/dist)*(this.data.speed||1);this.y+=((ty-this.y)/dist)*(this.data.speed||1);return true;} draw(){ctx.fillStyle=this.data.color||"#f44";ctx.beginPath();ctx.arc(this.x,this.y,14,0,Math.PI*2);ctx.fill();ctx.fillStyle="white";ctx.font="bold 9px Arial";ctx.textAlign="center";ctx.fillText(this.data.formula||"",this.x,this.y+4);ctx.fillStyle="#00ff88";ctx.fillRect(this.x-15,this.y-22,30*(this.hp/this.maxHp),3);} }
function renderMap(){for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){ctx.strokeStyle="#151515";ctx.strokeRect(c*40,r*40,40,40);if(grid[r][c]===2){ctx.fillStyle="#333";ctx.fillRect(c*40+2,r*40+2,36,36);}}ctx.fillStyle="rgba(0,255,136,0.05)";ctx.fillRect(activeMap.start.c*40,activeMap.start.r*40,40,40);ctx.fillStyle="rgba(255,68,68,0.05)";ctx.fillRect(activeMap.end.c*40,activeMap.end.r*40,40,40);}
canvas.onclick=(ev)=>{let rect=canvas.getBoundingClientRect();let c=Math.floor((ev.clientX-rect.left)/40),r=Math.floor((ev.clientY-rect.top)/40);if(grid[r][c]!==0)return;const allowed=activeMap.allowed_towers||[];const available=elementData.filter(t=>currentStage==='survival'||allowed.includes(t.symbol)||allowed.includes(t.id));let d=available[selectedTowerIdx];if(d&&money>=d.cost){grid[r][c]=1;if(findPath(activeMap.start.r,activeMap.start.c,activeMap.end.r,activeMap.end.c)){towers.push(new Tower(r,c,d));money-=d.cost;updateUI();}else grid[r][c]=0;}};
function findPath(sr,sc,er,ec){let q=[{r:sr,c:sc,p:[{r:sr,c:sc}]}],v=Array.from({length:ROWS},()=>Array(COLS).fill(false));if(sr<0||sr>=ROWS||sc<0||sc>=COLS)return null;v[sr][sc]=true;while(q.length>0){let curr=q.shift();if(curr.r===er&&curr.c===ec)return curr.p;for(let d of [{r:1,c:0},{r:-1,c:0},{r:0,c:1},{r:0,c:-1}]){let nr=curr.r+d.r,nc=curr.c+d.c;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!v[nr][nc]&&grid[nr][nc]===0){v[nr][nc]=true;q.push({r:nr,c:nc,p:[...curr.p,{r:nr,c:nc}]});}}}return null;}
function spawnWave(){if(!gameActive||(currentStage!=='survival'&&wave>=10))return;wave++;updateUI();isWaveSpawning=true;let allowedEnemies=enemyData.filter(e=>activeMap.target_enemies.includes(e.id)||activeMap.target_enemies.includes(e.formula));if(allowedEnemies.length===0)allowedEnemies=enemyData;let count=0,spawnCount=3+Math.floor(wave/2);let timer=setInterval(()=>{let d=allowedEnemies[Math.floor(Math.random()*allowedEnemies.length)];enemies.push(new Enemy({...d,hp:d.hp*(1+(wave-1)*0.35),speed:(d.speed||0.7)+(wave*0.03)}));if(++count>=spawnCount){clearInterval(timer);isWaveSpawning=false;}},1200);}
function updateUI(){document.getElementById('money-ui').innerText=money;document.getElementById('lives-ui').innerText=lives;document.getElementById('wave-ui').innerText=wave;}
function updateMenuLock(){let prog=parseInt(localStorage.getItem('chem_progress')||"1");for(let i=2;i<=5;i++){let b=document.getElementById(`tut-${i}`);if(b)b.disabled=(prog<i);}let sBtn=document.getElementById('survival-btn');if(sBtn)sBtn.disabled=(prog<=5);}
loadAllData();
</script>
</body>
</html>
