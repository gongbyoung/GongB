<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Element Guard v0.20 (Perfect Mazing)</title>
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0a; --panel: #1a1a1a; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .hidden { display: none !important; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; width: 450px; }
        .btn-large { padding: 12px; background: #2a2a2a; border: 2px solid #444; color: white; cursor: pointer; border-radius: 8px; font-size: 0.9em; transition: 0.2s; }
        .btn-large:hover { background: var(--primary); color: black; }
        #header { width: 920px; background: var(--panel); padding: 8px 15px; display: flex; justify-content: space-between; border-radius: 0 0 8px 8px; align-items: center; border-bottom: 2px solid #333; z-index: 10; box-sizing: border-box; }
        #game-container { position: relative; margin: 10px; border: 2px solid #333; line-height: 0; background: #000; }
        canvas { background: #000; cursor: crosshair; }
        .ui-panel { width: 920px; background: var(--panel); padding: 12px; border-radius: 8px; display: flex; gap: 10px; box-sizing: border-box; }
        .tower-btn { width: 85px; padding: 10px; background: #333; border: 2px solid #555; color: white; cursor: pointer; border-radius: 5px; text-align: center; font-size: 0.8em; }
        .tower-btn.selected { border-color: var(--primary); background: #224433; box-shadow: 0 0 10px var(--primary); }
        .stats { font-weight: bold; color: var(--primary); }
        #pause-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; pointer-events: none; color: var(--primary); font-size: 2em; font-weight: bold; opacity: 0; transition: 0.2s; z-index: 50; }
        #pause-overlay.visible { opacity: 1; }
        #version-tag { cursor: pointer; padding: 2px 6px; background: #222; border-radius: 4px; font-size: 11px; }
        #editor-sidebar { position: absolute; right: 0; top: 60px; width: 200px; background: rgba(20,20,20,0.9); border: 1px solid var(--primary); padding: 15px; z-index: 150; font-size: 12px; }
    </style>
</head>
<body>

<div id="main-menu" class="screen">
    <h1 style="color:var(--primary); font-size: 3.5em; margin:0;">ELEMENT GUARD</h1>
    <p id="load-msg" style="color:#ff00ff; font-weight:bold;">Initializing System...</p>
    <div class="menu-grid">
        <button class="btn-large" onclick="initStage(1)">TUTORIAL 1</button>
        <button class="btn-large" id="tut-2" onclick="initStage(2)" disabled>TUTORIAL 2</button>
        <button class="btn-large" id="tut-3" onclick="initStage(3)" disabled>TUTORIAL 3</button>
        <button class="btn-large" id="tut-4" onclick="initStage(4)" disabled>TUTORIAL 4</button>
        <button class="btn-large" id="tut-5" onclick="initStage(5)" disabled>TUTORIAL 5</button>
        <button class="btn-large" id="survival-btn" style="grid-column: span 3; color:#ffaa00;" disabled>SURVIVAL MODE</button>
    </div>
</div>

<div id="header" class="hidden">
    <div id="stage-title" class="stats">STAGE 1</div>
    <div id="version-tag" onclick="handleVersionClick()">v0.20</div>
    <div>💰 <span id="money-ui" class="stats">0</span></div>
    <div>❤️ <span id="lives-ui" class="stats">20</span></div>
    <div>WAVE: <span id="wave-ui" class="stats">0</span> / 10</div>
    <button class="btn-large" style="padding:4px 10px; font-size:11px;" onclick="location.reload()">종료</button>
</div>

<div id="game-container" class="hidden">
    <canvas id="gameCanvas"></canvas>
    <div id="pause-overlay">SYSTEM PAUSED</div>
    
    <div id="editor-sidebar" class="hidden">
        <h3 style="color:var(--primary); margin:0;">🛠 EDITOR</h3>
        <p>Click map to toggle walls.</p>
        <button class="btn-large" style="width:100%; font-size:11px;" onclick="money+=5000; updateUI();">Add Gold</button>
        <button class="btn-large" style="width:100%; font-size:11px; margin-top:5px;" onclick="downloadMap()">Download Map</button>
    </div>
</div>

<div class="ui-panel hidden" id="tower-menu"></div>

<script>
/** 1. 데이터 로드 시스템 **/
let elementData = [], enemyData = [], reactionData = [], stagesData = [];
async function loadAllData() {
    const msg = document.getElementById('load-msg');
    try {
        const [re, rc, rr, rs] = await Promise.all([
            fetch('elements.json?v='+Date.now()), fetch('compounds.json?v='+Date.now()), 
            fetch('reactions.json?v='+Date.now()), fetch('stages.json?v='+Date.now())
        ]);
        const getArr = (o) => Array.isArray(o) ? o : Object.values(o).find(v => Array.isArray(v)) || [];
        elementData = getArr(await re.json()); enemyData = getArr(await rc.json());
        reactionData = getArr(await rr.json()); stagesData = getArr(await rs.json());
        msg.innerText = "v0.20 Ready to Guard"; updateMenuLock();
    } catch (e) {
        msg.innerText = "Error: JSON not found";
        elementData = [{id:"Na", symbol:"Na", cost:50, range:150, fireRate:1000, color:"#e0e0e0", type:"Alkaline"}];
        enemyData = [{id:"HCl", formula:"HCl", hp:100, speed:0.7, type:"Acid", reward:20, color:"#ff4444", byproduct:"NaCl"}];
        stagesData = [{name:"Lab Alpha", start:{r:5,c:0}, end:{r:5,c:19}, walls:[]}];
    }
}

/** 2. 엔진 설정 **/
const TILE_SIZE = 40, COLS = 20, ROWS = 10;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = COLS * TILE_SIZE; canvas.height = ROWS * TILE_SIZE;

let grid, towers, enemies, projectiles, money, lives, wave, activeMap, gameActive = false, isPaused = false;
let selectedTowerIdx = 0, waveTimer = null, isEditorEnabled = false, verClickCount = 0;

/** 3. 경로 탐색 (BFS) - 완벽한 검증 로직 **/
function getPath(sr, sc, er, ec) {
    if(sr < 0 || sr >= ROWS || sc < 0 || sc >= COLS) return null;
    let q = [{r: sr, c: sc, p: [{r: sr, c: sc}]}];
    let v = Array.from({length:ROWS},()=>Array(COLS).fill(false));
    v[sr][sc] = true;

    while(q.length > 0) {
        let curr = q.shift();
        if(curr.r === er && curr.c === ec) return curr.p;
        
        for(let d of [{r:1,c:0},{r:-1,c:0},{r:0,c:1},{r:0,c:-1}]) {
            let nr=curr.r+d.r, nc=curr.c+d.c;
            // grid[r][c] === 0 (빈칸) 일때만 지나감. 벽(2)이나 타워(1)는 못 지나감.
            if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS && !v[nr][nc] && grid[nr][nc] === 0) {
                v[nr][nc]=true;
                q.push({r:nr, c:nc, p: [...curr.p, {r:nr, c:nc}]});
            }
        }
    }
    return null;
}

/** 4. 적군 클래스 **/
class Enemy {
    constructor(data) {
        this.data = data; this.hp = data.hp; this.maxHp = data.hp;
        this.x = activeMap.start.c * 40 + 20; this.y = activeMap.start.r * 40 + 20;
        this.path = getPath(activeMap.start.r, activeMap.start.c, activeMap.end.r, activeMap.end.c);
        this.pathIdx = 0;
    }
    update() {
        if (!this.path || this.pathIdx >= this.path.length - 1) { lives--; return false; }
        let target = this.path[this.pathIdx + 1];
        let tx = target.c * 40 + 20, ty = target.r * 40 + 20;
        let dist = Math.hypot(tx - this.x, ty - this.y);
        if (dist < 2) { this.pathIdx++; return true; }
        this.x += ((tx - this.x) / dist) * (this.data.speed || 1);
        this.y += ((ty - this.y) / dist) * (this.data.speed || 1);
        return true;
    }
    recalculate() {
        let cr = Math.floor(this.y / 40), cc = Math.floor(this.x / 40);
        let newP = getPath(cr, cc, activeMap.end.r, activeMap.end.c);
        if (newP) { this.path = newP; this.pathIdx = 0; }
    }
    draw() {
        ctx.fillStyle = this.data.color || "#f00"; ctx.beginPath(); ctx.arc(this.x, this.y, 14, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "white"; ctx.font = "bold 9px Arial"; ctx.textAlign="center"; ctx.fillText(this.data.formula || "", this.x, this.y+4);
        ctx.fillStyle = "#444"; ctx.fillRect(this.x-15, this.y-22, 30, 3);
        ctx.fillStyle = "#0f8"; ctx.fillRect(this.x-15, this.y-22, 30*(this.hp/this.maxHp), 3);
    }
}

/** 5. 타워 설치 및 미로 체크 (핵심) **/
canvas.onclick = (ev) => {
    if(isPaused && !isEditorEnabled) { resume(); return; }
    
    let rect = canvas.getBoundingClientRect();
    let c = Math.floor((ev.clientX - rect.left)/40), r = Math.floor((ev.clientY - rect.top)/40);
    if(r<0 || r>=ROWS || c<0 || c>=COLS) return;

    // 1. 에디터 모드
    if (isEditorEnabled) {
        grid[r][c] = (grid[r][c] === 2) ? 0 : 2;
        enemies.forEach(e => e.recalculate());
        return;
    }

    // 2. 기존 타워 클릭
    const existing = towers.find(t => t.r === r && t.c === c);
    if (existing) { pause(); openUpgrade(existing); return; }

    // 3. 신규 타워 설치 시도
    if (grid[r][c] === 0) {
        let tData = elementData[selectedTowerIdx];
        if (money >= tData.cost) {
            pause();
            // 가상 배치
            grid[r][c] = 1;
            
            // 검증 A: 입구에서 출구까지 길이 있는가?
            let canExit = getPath(activeMap.start.r, activeMap.start.c, activeMap.end.r, activeMap.end.c);
            
            // 검증 B: 현재 맵에 있는 모든 적들이 갇히지 않는가?
            let allEnemiesCanEscape = enemies.every(e => {
                return getPath(Math.floor(e.y/40), Math.floor(e.x/40), activeMap.end.r, activeMap.end.c) !== null;
            });

            if (canExit && allEnemiesCanEscape) {
                // 설치 확정
                towers.push(new Tower(r, c, tData));
                money -= tData.cost; updateUI();
                enemies.forEach(e => e.recalculate());
                setTimeout(resume, 300);
            } else {
                // 원복
                grid[r][c] = 0;
                alert("그곳에 타워를 놓으면 길이 완전히 막힙니다!");
                resume();
            }
        }
    }
};

function pause() { isPaused = true; document.getElementById('pause-overlay').classList.add('visible'); }
function resume() { isPaused = false; document.getElementById('pause-overlay').classList.remove('visible'); }

/** 6. 초기화 및 루프 **/
function initStage(num) {
    activeMap = stagesData[(num-1) % stagesData.length];
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('header').classList.remove('hidden');
    document.getElementById('game-container').classList.remove('hidden');
    document.getElementById('tower-menu').classList.remove('hidden');
    grid = Array.from({length:ROWS}, () => Array(COLS).fill(0));
    if(activeMap.walls) activeMap.walls.forEach(w => { for(let r=w.r;r<w.r+w.h;r++)for(let c=w.c;c<w.c+w.w;c++)grid[r][c]=2; });
    towers = []; enemies = []; projectiles = []; money = 500; lives = 20; wave = 0; gameActive = true; resume();
    updateUI(); initTowerMenu(); spawnWave(); requestAnimationFrame(gameLoop);
}

function gameLoop() {
    if (!gameActive) return;
    if (!isPaused) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        renderMap();
        towers.forEach(t => t.update());
        projectiles = projectiles.filter(p => !p.update());
        enemies = enemies.filter(e => e.hp > 0 && e.update());
        if (lives <= 0) { alert("City Overwhelmed!"); location.reload(); return; }
        if (wave >= 10 && enemies.length === 0) { alert("STAGE CLEAR!"); location.reload(); }
    }
    renderEntities(); requestAnimationFrame(gameLoop);
}

/** 클래스 및 렌더링 **/
class Tower {
    constructor(r,c,d) { this.r=r;this.c=c;this.x=c*40+20;this.y=r*40+20;this.data=d;this.lastShot=0;this.level=1;this.totalInvested=d.cost; }
    update() {
        if(isPaused) return; let now = Date.now();
        if(now - this.lastShot > (this.data.fireRate || 1000)) {
            let target = enemies.find(e => Math.hypot(e.x-this.x, e.y-this.y) < (this.data.range * Math.pow(1.05, this.level-1)));
            if(target) { projectiles.push(new Projectile(this.x, this.y, target, this.data, 25*Math.pow(1.05, this.level-1))); this.lastShot = now; }
        }
    }
    draw() { ctx.fillStyle = this.data.color || "#555"; ctx.beginPath(); ctx.roundRect(this.c*40+4, this.r*40+4, 32, 32, 5); ctx.fill(); ctx.fillStyle="#000"; ctx.font="bold 11px Arial"; ctx.textAlign="center"; ctx.fillText(this.data.symbol, this.x, this.y+4); }
}
class Projectile {
    constructor(x,y,t,d,dmg) { this.x=x;this.y=y;this.target=t;this.data=d;this.dmg=dmg;this.speed=12; }
    update() {
        let dx = this.target.x-this.x, dy = this.target.y-this.y, dist = Math.hypot(dx, dy);
        if(dist < 10) { 
            let fDmg = this.dmg;
            let r = reactionData.find(re => re.attacker_type === this.data.type && re.target_type === this.target.data.type);
            if(r) fDmg *= r.multiplier; this.target.hp -= fDmg; return true; 
        }
        this.x += (dx/dist)*this.speed; this.y += (dy/dist)*this.speed; return false;
    }
    draw() { ctx.fillStyle = this.data.color; ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill(); }
}
function renderMap() {
    for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) {
        ctx.strokeStyle = "#151515"; ctx.strokeRect(c*40, r*40, 40, 40);
        if(grid[r][c]===2) { ctx.fillStyle = "#333"; ctx.fillRect(c*40+2, r*40+2, 36, 36); }
    }
    ctx.fillStyle = "rgba(0,255,136,0.15)"; ctx.fillRect(activeMap.start.c*40, activeMap.start.r*40, 40, 40);
    ctx.fillStyle = "rgba(255,68,68,0.15)"; ctx.fillRect(activeMap.end.c*40, activeMap.end.r*40, 40, 40);
}
function renderEntities() { towers.forEach(t => t.draw()); enemies.forEach(e => e.draw()); projectiles.forEach(p => p.draw()); }
function spawnWave() {
    if(!gameActive || wave >= 10) return;
    wave++; updateUI();
    let count = 0, spawnCount = 3 + Math.floor(wave/2);
    waveTimer = setInterval(() => {
        if(isPaused) return;
        let d = enemyData[Math.floor(Math.random()*enemyData.length)];
        enemies.push(new Enemy({...d, hp: d.hp*(1+(wave-1)*0.25), speed: (d.speed||0.7)+(wave*0.02)}));
        if(++count >= spawnCount) clearInterval(waveTimer);
    }, 1500);
}
function updateUI() { document.getElementById('money-ui').innerText = money; document.getElementById('lives-ui').innerText = lives; document.getElementById('wave-ui').innerText = wave; }
function initTowerMenu() { document.getElementById('tower-menu').innerHTML = elementData.map((t,i) => `<div class="tower-btn ${i===selectedTowerIdx?'selected':''}" style="background:${t.color}; color:#000;" onclick="selectedTowerIdx=${i};initTowerMenu()"><b>${t.symbol}</b><br>${t.cost}</div>`).join(""); }
function updateMenuLock() { let prog = parseInt(localStorage.getItem('chem_progress') || "1"); for(let i=2; i<=5; i++) if(prog >= i) document.getElementById(`tut-${i}`).disabled = false; }
function handleVersionClick() { if(++verClickCount >= 5) { isEditorEnabled = true; document.getElementById('editor-sidebar').classList.remove('hidden'); alert("Editor Mode Active"); verClickCount = 0; } }
function downloadMap() { let walls = []; for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(grid[r][c]===2)walls.push({r,c,w:1,h:1}); console.log(JSON.stringify(walls)); }

loadAllData();
</script>
</body>
</html>
