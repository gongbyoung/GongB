<!DOCTYPE html><html lang=\"ko\"><head><meta charset=\"UTF-8\"><title>Chemical Guardians - v0.008 VOC Adsorption</title><style>body { background: #222; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; } canvas { background: #333; border: 2px solid #555; cursor: crosshair; } .ui { margin: 10px; padding: 10px; background: #444; border-radius: 5px; width: 800px; display: flex; justify-content: space-between; align-items: center; } .controls { display: flex; gap: 5px; } button { padding: 8px; cursor: pointer; border: none; border-radius: 3px; font-weight: bold; font-size: 12px; } #btnCa { background: #ddd; } #btnNa { background: #ffeb3b; } #btnC { background: #555; color: white; } button.active { outline: 3px solid #00ff00; } .formula { color: #00ff00; font-family: monospace; font-size: 13px; }</style></head><body><h2>Chemical Guardians: Stage 3 - 벤젠(C6H6) 흡착 대응 (v0.008)</h2><div class=\"ui\"><div>HP: <span id=\"hp\">100</span> | $: <span id=\"money\">150</span></div><div class=\"controls\"><button id=\"btnCa\" class=\"active\" onclick=\"selectTower('Ca')\">Ca (불산용)</button><button id=\"btnNa\" onclick=\"selectTower('Na')\">Na (염산용)</button><button id=\"btnC\" onclick=\"selectTower('C')\">C (벤젠/VOC용)</button></div><div class=\"formula\" id=\"reactionDisplay\">사고 대응 준비...</div></div><canvas id=\"gameCanvas\" width=\"800\" height=\"400\"></canvas><script>const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d'); const gridSize = 40; const cols = 20, rows = 10; let hp = 100, money = 150, selectedTowerType = 'Ca'; let enemies = [], towers = [], grid = Array(cols).fill().map(() => Array(rows).fill(0)); const startNode = { x: 0, y: 5 }, endNode = { x: 19, y: 5 }; const TOWER_DATA = { 'Ca': { color: '#ddd', cost: 20, target: 'HF', formula: '2HF + Ca(OH)2 -> CaF2 + 2H2O' }, 'Na': { color: '#ffeb3b', cost: 30, target: 'HCl', formula: 'HCl + NaOH -> NaCl + H2O' }, 'C': { color: '#111', cost: 40, target: 'C6H6', formula: 'C6H6 + C(Activated) -> Adsorption' } }; function selectTower(type) { selectedTowerType = type; ['btnCa','btnNa','btnC'].forEach(id => document.getElementById(id).className = id === 'btn'+type ? 'active' : ''); } function getPath() { const queue = [endNode], visited = Array(cols).fill().map(() => Array(rows).fill(null)); visited[endNode.x][endNode.y] = { x: 0, y: 0 }; while (queue.length > 0) { const curr = queue.shift(); const dirs = [{x:1,y:0}, {x:-1,y:0}, {x:0,y:1}, {x:0,y:-1}]; for (let d of dirs) { const nx = curr.x + d.x, ny = curr.y + d.y; if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && grid[nx][ny] === 0 && visited[nx][ny] === null) { visited[nx][ny] = { x: -d.x, y: -d.y }; queue.push({ x: nx, y: ny }); } } } return visited; } let pathMap = getPath(); class Enemy { constructor(type) { this.type = type; this.gx = startNode.x; this.gy = startNode.y; this.x = this.gx * gridSize + 20; this.y = this.gy * gridSize + 20; this.hp = 100; this.speed = type === 'C6H6' ? 1.2 : 2.0; this.color = type === 'C6H6' ? '#9c27b0' : (type === 'HCl' ? '#ff5722' : '#adff2f'); } update() { const dir = pathMap[this.gx][this.gy]; if (!dir) return; const tx = (this.gx + dir.x) * gridSize + 20, ty = (this.gy + dir.y) * gridSize + 20; const dx = tx - this.x, dy = ty - this.y, d = Math.hypot(dx, dy); if (d < this.speed) { this.gx += dir.x; this.gy += dir.y; } else { this.x += (dx / d) * this.speed; this.y += (dy / d) * this.speed; } } draw() { ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, 12, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = 'white'; ctx.font = '10px Arial'; ctx.fillText(this.type, this.x-10, this.y+4); } } canvas.addEventListener('mousedown', (e) => { const r = canvas.getBoundingClientRect(), gx = Math.floor((e.clientX - r.left) / gridSize), gy = Math.floor((e.clientY - r.top) / gridSize); if ((gx === startNode.x && gy === startNode.y) || (gx === endNode.x && gy === endNode.y)) return; const tInfo = TOWER_DATA[selectedTowerType]; if (money >= tInfo.cost && grid[gx][gy] === 0) { grid[gx][gy] = 1; if (getPath()[startNode.x][startNode.y] === null) { grid[gx][gy] = 0; } else { pathMap = getPath(); towers.push({ x: gx*gridSize+20, y: gy*gridSize+20, gx, gy, type: selectedTowerType }); money -= tInfo.cost; document.getElementById('money').innerText = money; } } }); function gameLoop() { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.strokeStyle = '#444'; for(let i=0; i<cols; i++) for(let j=0; j<rows; j++) ctx.strokeRect(i*gridSize, j*gridSize, gridSize, gridSize); ctx.fillStyle = '#e74c3c'; ctx.fillRect(endNode.x*gridSize, endNode.y*gridSize, gridSize, gridSize); if (Math.random() < 0.015) enemies.push(new Enemy(['HF','HCl','C6H6'][Math.floor(Math.random()*3)])); enemies.forEach((en, i) => { en.update(); en.draw(); towers.forEach(t => { if (Math.hypot(t.x - en.x, t.y - en.y) < 100) { let dmg = 0.5; if (t.type === 'Ca' && en.type === 'HF') dmg = 3; if (t.type === 'Na' && en.type === 'HCl') dmg = 3; if (t.type === 'C' && en.type === 'C6H6') dmg = 3; en.hp -= dmg; if (dmg > 1) document.getElementById('reactionDisplay').innerText = TOWER_DATA[t.type].formula; } }); if (en.hp <= 0) { enemies.splice(i, 1); money += 15; document.getElementById('money').innerText = money; } else if (en.gx === endNode.x && en.gy === endNode.y) { enemies.splice(i, 1); hp -= 10; document.getElementById('hp').innerText = hp; } }); towers.forEach(t => { ctx.fillStyle = TOWER_DATA[t.type].color; ctx.fillRect(t.gx*gridSize+5, t.gy*gridSize+5, gridSize-10, gridSize-10); ctx.fillStyle = t.type==='C'?'white':'black'; ctx.fillText(t.type, t.x-8, t.y+5); }); if (hp > 0) requestAnimationFrame(gameLoop); else { ctx.fillStyle='white'; ctx.font='40px Arial'; ctx.fillText('GAME OVER', 280, 200); } } gameLoop();</script></body></html>
