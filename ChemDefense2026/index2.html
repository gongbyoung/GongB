<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n    <meta charset=\"UTF-8\">\n    <title>Chemical Guardians - v0.006 Pathfinding</title>\n    
  <style>\n        body { background: #222; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }\n        
    canvas { background: #333; border: 2px solid #555; cursor: crosshair; }\n        
    .ui { margin: 10px; padding: 10px; background: #444; border-radius: 5px; width: 800px; display: flex; justify-content: space-between; }\n        
    .warning { color: #ff4444; font-weight: bold; }\n    </style>\n</head>\n<body>\n    <h2>Chemical Guardians: 경로 최적화 시뮬레이션 (v0.006)</h2>\n    <div class=\"ui\">\n       
      <div>환경 안전도: <span id=\"hp\">100</span>%</div>\n        <div>보유 자원: <span id=\"money\">100</span>$</div>\n        <div id=\"msg\" class=\"warning\"></div>\n   
    </div>\n    <canvas id=\"gameCanvas\" width=\"800\" height=\"400\"></canvas>\n\n<script>\nconst canvas = document.getElementById('gameCanvas');
      \nconst ctx = canvas.getContext('2d');\nconst gridSize = 40;\nconst cols = canvas.width / gridSize;\nconst rows = canvas.height / gridSize;\n\nlet hp = 100;
      \nlet money = 100;\nlet enemies = [];\nlet towers = [];\nlet grid = Array(cols).fill().map(() => Array(rows).fill(0));\nlet pathMap = [];\n\
        nconst startNode = { x: 0, y: Math.floor(rows / 2) };\nconst endNode = { x: cols - 1, y: Math.floor(rows / 2) };\n\nfunction getPath() 
      {\n    const queue = [endNode];\n    const visited = Array(cols).fill().map(() => Array(rows).fill(null));\n    
        visited[endNode.x][endNode.y] = { x: 0, y: 0 };\n\n    while (queue.length > 0) {\n        const curr = queue.shift();\n        
          const dirs = [{x:1,y:0}, {x:-1,y:0}, {x:0,y:1}, {x:0,y:-1}];\n        \n        for (let d of dirs) {\n            
            const nx = curr.x + d.x;\n            const ny = curr.y + d.y;\n            if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && grid[nx][ny] === 0 && visited[nx][ny] === null) {\n               
              visited[nx][ny] = { x: -d.x, y: -d.y };\n                queue.push({ x: nx, y: ny });\n            }\n        }\n    }\n   
          return visited;\n}\n\npathMap = getPath();\n\nclass Enemy {\n    constructor() {\n       
        this.gx = startNode.x;\n        this.gy = startNode.y;\n        this.x = this.gx * gridSize + gridSize / 2;\n     
          this.y = this.gy * gridSize + gridSize / 2;\n        this.hp = 100;\n        this.speed = 2;\n    }\n    update() {\n       
        const dir = pathMap[this.gx][this.gy];\n        if (!dir) return;\n        \n        const targetX = (this.gx + dir.x) * gridSize + gridSize / 2;\n      
          const targetY = (this.gy + dir.y) * gridSize + gridSize / 2;\n\n        const dx = targetX - this.x;\n        
            const dy = targetY - this.y;\n        const dist = Math.hypot(dx, dy);\n\n        if (dist < this.speed) {\n            
              this.gx += dir.x;\n            this.gy += dir.y;\n        } else {\n            this.x += (dx / dist) * this.speed;\n           
              this.y += (dy / dist) * this.speed;\n        }\n    }\n    draw() {\n        ctx.fillStyle = \"#adff2f\";\n      
        ctx.beginPath();\n        ctx.arc(this.x, this.y, 12, 0, Math.PI * 2);\n        ctx.fill();\n    }\n}\n\ncanvas.addEventListener('mousedown', (e) => {\n    const rect = canvas.getBoundingClientRect();\n   
        const gx = Math.floor((e.clientX - rect.left) / gridSize);\n    const gy = Math.floor((e.clientY - rect.top) / gridSize);\n\n   
          if (gx === startNode.x && gy === startNode.y || gx === endNode.x && gy === endNode.y) return;\n    if (money >= 20 && grid[gx][gy] === 0) {\n      
            grid[gx][gy] = 1;\n        const testPath = getPath();\n        if (testPath[startNode.x][startNode.y] === null) {\n          
              grid[gx][gy] = 0;\n            document.getElementById('msg').innerText = \"길을 완전히 막을 수 없습니다!\";\n        } else {\n    
                pathMap = testPath;\n            towers.push({ x: gx * gridSize + gridSize/2, y: gy * gridSize + gridSize/2, gx, gy });\n     
                money -= 20;\n            document.getElementById('money').innerText = money;\n            document.getElementById('msg').innerText = \"\";\n   
                  }\n    }\n});\n\nfunction gameLoop() {\n    ctx.clearRect(0, 0, canvas.width, canvas.height);\n  
        ctx.strokeStyle = \"#333\";\n    for(let i=0; i<cols; i++) {\n        for(let j=0; j<rows; j++) {\n           
          ctx.strokeRect(i*gridSize, j*gridSize, gridSize, gridSize);\n        }\n    }\n    ctx.fillStyle = \"#444\";\n   
        ctx.fillRect(endNode.x * gridSize, endNode.y * gridSize, gridSize, gridSize);\n\n    if (Math.random() < 0.01) enemies.push(new Enemy());\n\n  
        enemies.forEach((enemy, i) => {\n        enemy.update();\n        enemy.draw();\n        towers.forEach(t => {\n          
          if (Math.hypot(t.x - enemy.x, t.y - enemy.y) < 80) enemy.hp -= 0.5;\n        });\n      
          if (enemy.hp <= 0) { enemies.splice(i, 1); money += 5; document.getElementById('money').innerText = money; }\n     
            if (enemy.gx === endNode.x && enemy.gy === endNode.y) { enemies.splice(i, 1); hp -= 10; document.getElementById('hp').innerText = hp; }\n    });\n\n  
          towers.forEach(t => {\n        ctx.fillStyle = \"#ddd\";\n        ctx.fillRect(t.gx * gridSize + 5, t.gy * gridSize + 5, gridSize - 10, gridSize - 10);\n    });\n\n    if (hp > 0) requestAnimationFrame(gameLoop);\n    else {\n       
            ctx.fillStyle = \"white\";\n        ctx.font = \"30px Arial\";\n        ctx.fillText(\"GAME OVER\", 300, 200);\n    }\n}\ngameLoop();\n</script>\n</body>\n</html>
